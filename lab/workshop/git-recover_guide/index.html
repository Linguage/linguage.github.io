n## 本次拯救（摘要）\n\n1) 用 `reflog` 找到目标提交 `\u003csha\u003e`（历史未丢，只是指针偏了）。\n\n2) 二选一恢复：\n\n```bash\n# 安全合并法（推荐）\ngit checkout -b restore-work \u003csha\u003e\ngit checkout main\ngit merge restore-work\n\n# 或：直接重置法（快捷）\ngit checkout main\ngit reset --hard \u003csha\u003e\n```\n\n3) 如远端历史需以本地为准：`git push -f origin main`\n\n## 恢复步骤\n\n```bash\n# 1) 快速浏览当前可达历史\ngit log --oneline -10\n\n# 2) 关键：查看 HEAD 的移动“航迹记录”\ngit reflog -20\n```\n\n- 在 `reflog` 输出中，**找到你需要回到的那次正确提交的 SHA**（记为 `\u003csha\u003e`）。\n\n## 两种恢复方式（择一）\n\n  ```bash\n  # 从目标提交创建保护分支\n  git checkout -b restore-work \u003csha\u003e\n\n  # 回到主分支并合并恢复\n  git checkout main\n  git merge restore-work\n  ```\n  说明：保留现场，历史连贯，最不容易出岔子。\n\n  ```bash\n  git checkout main\n  git reset --hard \u003csha\u003e\n  ```\n  说明：让当前分支指针“瞬移”到 `\u003csha\u003e`；如远端不是你想要的历史，后续可能需要强推。\n\n## 同步远端（如有需要）\n\n```bash\n# 仅当你确认“本地才是正确历史”时才执行强推！\ngit push -f origin main\n```\n\n## 预防与习惯（精简版）\n\n\n- **查看旧版本用新分支**：`git checkout -b inspect-\u003cdate\u003e \u003csha\u003e`。\n- **小步提交，及时推送**：远端即备份。\n- **危险操作前打快照**：`git branch backup-\u003cdate\u003e` 或 `git tag safety-\u003cdate\u003e`。\n- **丢历史先看 reflog**：优先 `git reflog`，再考虑其他。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L15\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"lab\",\"slug\":\"git-recover_guide\",\"slugSegments\":[\"workshop\",\"git-recover_guide\"],\"pathSegments\":[\"workshop\",\"git-recover_guide\"],\"urlPath\":\"/lab/workshop/git-recover_guide\",\"href\":\"/lab/workshop/git-recover_guide\",\"category\":\"技术分享\",\"title\":\"Git 历史回退自救手册：reflog 找回与分支指针恢复\",\"date\":\"2025-09-28T13:29:00.000Z\",\"excerpt\":\"$undefined\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$16\",\"tags\":[\"Git\",\"数据恢复\",\"分支管理\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Git 历史回退自救手册：reflog 找回与分支指针恢复\
