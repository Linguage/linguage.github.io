nonymize_ip: true,\\n              send_page_view: true,\\n            });\\n          \"}]]}]}]]}],{\"children\":[[\"slug\",\"lab/workshop/telegram-integration\",\"c\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L8\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",[\"$\",\"$1\",\"c\",{\"children\":[\"$Lb\",null,[\"$\",\"$Lc\",null,{\"children\":[\"$Ld\",[\"$\",\"$Le\",null,{\"promise\":\"$@f\"}]]}]]}],{},null,false]},null,false]},null,false],[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L10\",null,{\"children\":\"$L11\"}],null],[\"$\",\"$L12\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$3\",null,{\"fallback\":null,\"children\":\"$L13\"}]}]}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$14\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"15:I[1203,[\"197\",\"static/chunks/197-f7c33a0114fc3db3.js\",\"373\",\"static/chunks/373-816263e744b1a0a1.js\",\"738\",\"static/chunks/738-b97c8b45db2c8cb9.js\",\"48\",\"static/chunks/app/%5B...slug%5D/page-b39f4036a39e3cb5.js\"],\"default\"]\n16:T193f,"])</script><script>self.__next_f.push([1,"为了方便读者及时获取更新，我为 AlpacaNotes 博客增加了 Telegram 频道自动推送功能。每当有新文章发布时，GitHub Actions 会自动触发脚本，将文章标题和链接发送到订阅频道。以下是实现这一功能的简要流程。\n\n## 1. 申请 Telegram Bot\n\n首先，你需要拥有一个 Telegram 账号并申请一个机器人：\n\n1.  在 Telegram 中搜索 **@BotFather**。\n2.  发送指令 `/newbot` 创建新机器人。\n3.  按照提示设置机器人的名称（Name）和用户名（Username）。\n4.  创建成功后，BotFather 会给你一个 **HTTP API Token**（类似 `123456789:ABCdef...`），请妥善保管。\n\n## 2. 设置频道并获取 Chat ID\n\n1.  创建一个新的 Telegram Channel（频道），或者使用现有频道。\n2.  将你刚才创建的机器人添加为频道管理员（Administrator），赋予发送消息的权限。\n3.  为了获取频道的 `Chat ID`，你可以先在频道里随便发一条消息，然后转发给 **@getidsbot**（或其他类似 ID 查询机器人），它会返回以 `-100` 开头的频道 ID（例如 `-1003229698152`）。\n\n## 3. 配置 GitHub Secrets\n\n为了安全起见，不要将 Token 直接硬编码在代码中。\n\n1.  进入博客项目的 GitHub 仓库页面。\n2.  点击 **Settings** -\u003e **Secrets and variables** -\u003e **Actions**。\n3.  新建 Repository Secret：\n    *   `TELEGRAM_TOKEN`: 填入 BotFather 给你的 Token。\n\n## 4. 编写自动化脚本\n\n在项目中编写一个 Node.js 脚本（`scripts/telegram-notify.js`），用于检测变更并发送消息。\n\n主要逻辑如下：\n1.  使用 `git diff` 识别本次提交中**新增**的 `.md` 文件。\n2.  解析 Markdown 文件的 Frontmatter（元数据），提取标题和描述。\n3.  调用 Telegram 的 `sendMessage` API，将文章标题、描述和链接格式化后发送到指定频道。\n\n## 5. 配置 GitHub Actions 工作流\n\n最后，修改 `.github/workflows/deploy.yml` 文件，在部署流程中加入通知步骤：\n\n```yaml\n- name: Check for new content and notify\n  if: success()\n  env:\n    TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}\n    TELEGRAM_TO: \"-1003229698152\" # 你的频道 ID\n    SITE_URL: \"https://linguista.cn\"\n    BASE_PATH: \"/alpacanotes\"\n  run: node scripts/telegram-notify.js\n```\n\n## 6. 静态站点部署配置\n\n本博客使用 Next.js 构建，并托管在 GitHub Pages 上。为了确保静态资源加载正确（特别是当部署在子路径如 `/alpacanotes` 下时），需要在 `next.config.ts` 中进行特别配置：\n\n```typescript\nconst isProd = process.env.NODE_ENV === \"production\";\n\nconst nextConfig: NextConfig = {\n  // 启用静态导出模式，生成纯 HTML/CSS/JS 文件\n  output: isProd ? \"export\" : undefined,\n  \n  // 禁用 Next.js 自带的图片优化服务（GitHub Pages 不支持 Node.js 运行时）\n  images: {\n    unoptimized: true,\n  },\n  \n  // 设置子路径，匹配 GitHub Pages 的仓库名\n  basePath: isProd ? \"/alpacanotes\" : \"\",\n  assetPrefix: isProd ? \"/alpacanotes/\" : \"\",\n};\n```\n\n此外，部署工作流目前已经改为 shell 方式同步 `out` 目录到外部 `gh-pages` 分支，并显式补上 `.nojekyll`，以避免 GitHub Pages 忽略 `_next` 目录导致静态资源丢失。\n\n## 7. 配置 Telegram Instant View (即时预览)\n\n为了让用户在 Telegram 中获得更好的阅读体验（无需跳转浏览器即可秒开文章），我们配置了 Instant View。\n\n### 7.1 创建 Instant View 模板\n\n1.  登录 [Telegram Instant View Editor](https://instantview.telegram.org/my/)。\n2.  输入你的博客文章示例链接（例如 `https://linguista.cn/alpacanotes/articles/telegram-integration`）。\n3.  编写提取规则。早期规则曾依赖 `text-xl`、`mt-16` 之类的样式类名，后来在实际排查中证实过于脆弱。当前更可靠的做法是让页面模板输出稳定的 `data-iv-*` 标记，并在同域名多模板场景下保留回退规则。核心思路如下：\n\n```yaml\n~version: \"2.1\"\n\nbody: //*[@data-iv-body] | //article[contains(@class, \"docs-content\")]//div[contains(@class, \"md-theme-amp\")]\ntitle: //*[@data-iv-title] | //article[contains(@class, \"docs-content\")]//div[contains(@class, \"md-theme-amp\")]//h1[1]\nsubtitle: //*[@data-iv-subtitle] | //article[contains(@class, \"docs-content\")]//div[contains(@class, \"md-theme-amp\")]//h1[1]/following-sibling::p[1]\nauthor: //*[@data-iv-author] | //article[contains(@class, \"docs-content\")]//div[contains(@class, \"text-muted\") and contains(@class, \"text-sm\")][1]/span[1]\npublished_date: //*[@data-iv-published]/@data-iv-published | //article[contains(@class, \"docs-content\")]//div[contains(@class, \"text-muted\") and contains(@class, \"text-sm\")][1]/span[last()]\n@split_parent: //p/img\n@remove: //*[@data-iv-ignore] | //article[contains(@class, \"docs-content\")]//div[contains(@class, \"mb-4\")]\n```\n\n4.  点击 **Mark as Published**，你将获得一个 **rhash**（一串哈希值，例如 `d41d8cd98f00b204e980`）。\n\n### 7.2 配置 GitHub Secrets\n\n1.  回到 GitHub 仓库的 **Settings** \u003e **Secrets and variables** \u003e **Actions**。\n2.  新建 Secret `TELEGRAM_IV_RHASH`，填入刚才获得的 hash 值。\n\n### 7.3 脚本支持\n\n`link_preview_options` 可以作为 Bot 推送中的辅助能力，但它并不是一个“填了就完美生效”的万能开关。后续排查中确认了几个更接近真实情况的结论：\n\n1.  `t.me/iv?url=...\u0026rhash=...` 裸链接本身可以作为私有 Instant View 入口直接使用；\n2.  通过 Bot API 指定 `link_preview_options.url = t.me/iv?...`，并不总能稳定复现“手动粘贴裸 IV 链接”的行为；\n3.  消息结构、GitHub Pages 发布时序、Telegram 客户端缓存都会影响卡片最终是否挂上 `INSTANT VIEW`；\n4.  更稳妥的工程做法是：先确保页面已经真正公网可抓取，再发送消息，并始终保留原始文章链接作为阅读兜底。\n\n如果你想看这一轮排查的完整经过，可以继续阅读：\n\n- [《为静态站点配置 Telegram Instant View：从页面标记到部署等待》](https://linguista.cn/labs/workshop/telegram-instant-view-settings/)（实操指南）\n- [《Instant View 踩坑记：折腾了一整天，答案是「等一下」》](https://linguista.cn/alpacanotes/articles/instant-view-in-chaos)（排查故事）\n\n---\n\n*本文即为该功能的测试文章。如果你在 Telegram 频道看到了这条推送，说明自动化流程已配置成功！*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L15\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"la
