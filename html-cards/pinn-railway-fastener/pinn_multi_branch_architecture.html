<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f4f0;
  --bg-tertiary: #eae9e4;
  --text-primary: #2c2c2a;
  --text-secondary: #5f5e5a;
  --text-tertiary: #888780;
  --border: rgba(0,0,0,0.12);
  --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
  --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
  --coral-50: #FAECE7; --coral-600: #993C1D; --coral-800: #712B13;
  --purple-50: #EEEDFE; --purple-600: #534AB7; --purple-800: #3C3489;
  --gray-50: #F1EFE8; --gray-600: #5F5E5A; --gray-800: #444441;
  --font-sans: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a18;
    --bg-secondary: #2c2c2a;
    --bg-tertiary: #3d3d3a;
    --text-primary: #e8e6dc;
    --text-secondary: #b4b2a9;
    --text-tertiary: #888780;
    --border: rgba(255,255,255,0.12);
    --blue-50: #042C53; --blue-600: #85B7EB; --blue-800: #B5D4F4;
    --teal-50: #04342C; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
    --coral-50: #4A1B0C; --coral-600: #F0997B; --coral-800: #F5C4B3;
    --purple-50: #26215C; --purple-600: #AFA9EC; --purple-800: #CECBF6;
    --gray-50: #2C2C2A; --gray-600: #B4B2A9; --gray-800: #D3D1C7;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  padding: 2rem;
  min-height: 100vh;
}
h1 {
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 6px;
}
.subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}
.stage-pills {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.pill {
  font-family: var(--font-sans);
  font-size: 13px;
  padding: 7px 16px;
  border-radius: 8px;
  border: 0.5px solid var(--border);
  background: var(--bg-primary);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.pill:hover { background: var(--bg-secondary); }
.pill.active {
  background: var(--blue-50);
  color: var(--blue-800);
  border-color: var(--blue-600);
}
.desc-bar {
  background: var(--bg-secondary);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 14px;
  color: var(--text-primary);
  min-height: 44px;
  display: flex;
  align-items: center;
  transition: opacity 0.3s;
}
.svg-container {
  background: var(--bg-secondary);
  border-radius: 12px;
  padding: 24px 16px;
  border: 0.5px solid var(--border);
}
.legend {
  display: flex;
  gap: 20px;
  margin-top: 16px;
  font-size: 12px;
  color: var(--text-secondary);
  flex-wrap: wrap;
}
.legend span {
  display: flex;
  align-items: center;
  gap: 5px;
}
.legend .dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}
svg text { font-family: var(--font-sans); }
.node-rect { transition: opacity 0.4s; }
.arr-line { transition: opacity 0.4s; }
</style>
</head>

function setStage(i) {
  document.querySelectorAll('.pill').forEach((p, j) => p.classList.toggle('active', j === i));
  const s = stages[i];
  s.highlight.forEach(id => { const e = document.getElementById(id); if (e) { e.style.opacity = '1'; e.style.transition = 'opacity 0.4s'; } });
  s.dim.forEach(id => { const e = document.getElementById(id); if (e) { e.style.opacity = '0.12'; e.style.transition = 'opacity 0.4s'; } });
  document.getElementById('desc-bar').textContent = s.desc;
}
