wth\",\"category\":\"tldr\",\"title\":\"工程师如何真实且有节奏地建立技术社群影响力\",\"date\":\"2026-04-15\",\"excerpt\":\"工程师 Evan Boyle 分享三个月内从 500 增长到 7500 粉丝的经验：通过展示真实工作、公开构建、复用素材控制时间成本，在不干扰开发的前提下建立社群影响力。\",\"coverImage\":\"$undefined\"},{\"slug\":\"codex-for-developers-workflow\",\"href\":\"/whatsup/tldr/hn-2026-p4/codex-for-developers-workflow\",\"category\":\"tldr\",\"title\":\"新版 Codex 如何重塑开发者工作流\",\"date\":\"2026-04-15\",\"excerpt\":\"文章介绍新版 Codex 桌面应用如何从写代码助手升级为贯穿软件开发全流程的智能伙伴，包括电脑操作、浏览器内联互动、图像生成、插件扩展、自动化与记忆等能力，并概述其面向团队与企业的可用性规划。\",\"coverImage\":\"$undefined\"},{\"slug\":\"france-microsoft-windows-linux-transition\",\"href\":\"/whatsup/tldr/hn-2026-p4/france-microsoft-windows-linux-transition\",\"category\":\"tldr\",\"title\":\"法国加速政企系统从Windows迁移至Linux\",\"date\":\"2026-04-15\",\"excerpt\":\"法国政府加速推进数字主权战略，计划将政府工作系统从微软Windows迁移至Linux，要求各部门在秋季前提交去非欧洲技术依赖路线图。\",\"coverImage\":\"$undefined\"},{\"slug\":\"seeing-is-believing-wemby-jokic-curry-russell-bird-west\",\"href\":\"/whatsup/tldr/hn-2026-p4/seeing-is-believing-wemby-jokic-curry-russell-bird-west\",\"category\":\"tldr\",\"title\":\"现代球星照亮传奇：眼见为实的篮球传承\",\"date\":\"2026-04-15\",\"excerpt\":\"现代球星文班亚马、约基奇和库里的比赛风格，为理解拉塞尔、伯德、韦斯特等传奇巨星何以统治各自时代提供了直观参照，诠释了眼见为实的篮球逻辑传承。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-productivity-workforce-training-social-cohesion\",\"href\":\"/whatsup/tldr/hn-2026-p4/ai-productivity-workforce-training-social-cohesion\",\"category\":\"tldr\",\"title\":\"AI生产力悖论与技能断层危机\",\"date\":\"2026-04-14\",\"excerpt\":\"AI提升生产力但并未减轻工作负担，反而被再投资于更多活动。初级岗位消失切断专业技能传承链，亟需大规模培训投入以平衡技术红利与社会公平。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-assisted-workflow-review\",\"href\":\"/whatsup/tldr/hn-2026-p4/ai-assisted-workflow-review\",\"category\":\"tldr\",\"title\":\"AI辅助工作流的系统性思辨\",\"date\":\"2026-04-14\",\"excerpt\":\"介绍一种结构化AI辅助开发工作流，强调在编码前通过深思熟虑的规划、PRD编写、垂直切片拆解和多轮审查来保持软件的可维护性，而非让AI跳过思考直接生成代码。\",\"coverImage\":\"$undefined\"},{\"slug\":\"arguing-with-agents\",\"href\":\"/whatsup/tldr/hn-2026-p4/arguing-with-agents\",\"category\":\"tldr\",\"title\":\"Arguing With Agents\",\"date\":\"2026-04-14\",\"excerpt\":\"一位 AuDHD 程序员发现 AI 代理忽略规则的根本原因并非提示词不够严厉，而是 RLHF 训练出的高语境沟通范式与神经多样性者的字面沟通方式发生了系统性碰撞。\",\"coverImage\":\"$undefined\"},{\"slug\":\"scaling-trusted-access-for-cyber-defense\",\"href\":\"/whatsup/tldr/hn-2026-p4/scaling-trusted-access-for-cyber-defense\",\"category\":\"tldr\",\"title\":\"OpenAI 扩大可信网络安全防御计划\",\"date\":\"2026-04-14\",\"excerpt\":\"OpenAI 宣布扩大可信网络安全访问计划，推出专为防御性网络安全微调的 GPT-5.4-Cyber 模型，并阐述其民主化准入、迭代部署和生态系统韧性三大原则。\",\"coverImage\":\"$undefined\"},{\"slug\":\"critical-examination-of-osint-between-civic-tool-and-surveillance-weapon\",\"href\":\"/whatsup/tldr/hn-2026-p4/critical-examination-of-osint-between-civic-tool-and-surveillance-weapon\",\"category\":\"tldr\",\"title\":\"OSINT：公民工具还是监控武器？\",\"date\":\"2026-04-14\",\"excerpt\":\"OSINT 并非天生符合伦理或民主的工具，它在公民调查和反民主滥用之间摇摆，取决于使用者及其目的。\",\"coverImage\":\"$undefined\"},{\"slug\":\"introducing-swe-check-bug-detection\",\"href\":\"/whatsup/tldr/hn-2026-p4/introducing-swe-check-bug-detection\",\"category\":\"tldr\",\"title\":\"SWE-Check：专用化 bug 检测模型\",\"date\":\"2026-04-14\",\"excerpt\":\"Cognition 联合 Applied Compute 通过 RL 训练出专用 bug 检测模型 SWE-check，在特定任务上匹敌前沿通用模型，速度提升 10 倍且推理成本大幅降低，已集成到 Windsurf IDE。\",\"coverImage\":\"$undefined\"},{\"slug\":\"swe-check-10x-faster-bug-detection\",\"href\":\"/whatsup/tldr/hn-2026-p4/swe-check-10x-faster-bug-detection\",\"category\":\"tldr\",\"title\":\"SWE-check：专用小模型如何以十倍速度实现前沿级漏洞检测\",\"date\":\"2026-04-14\",\"excerpt\":\"Cognition AI 与 Applied Compute 合作，通过强化学习训练了专用漏洞检测模型 SWE-check，该模型在分发内评估中性能媲美顶尖前沿模型 Opus 4.6，同时推理速度提升约 10 倍，已在 Windsurf Next 中提供预览，核心创新包括生产环境对齐训练、奖励线性化技术和两阶段后训练策略。\",\"coverImage\":\"$undefined\"},{\"slug\":\"human-brain-critical-infrastructure-no-firewall\",\"href\":\"/whatsup/tldr/hn-2026-p4/human-brain-critical-infrastructure-no-firewall\",\"category\":\"tldr\",\"title\":\"人脑：无防火墙的关键基础设施\",\"date\":\"2026-04-14\",\"excerpt\":\"面对信息操纵，法国等国仍聚焦于控制信息源，但法律、技术和心理三重限制使此范式失效。文章提出将重心转向接收
