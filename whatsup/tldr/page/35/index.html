ification-research\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-work-intensification-research\",\"category\":\"tldr\",\"title\":\"AI并未减轻工作负担——反而加剧工作强度\",\"date\":\"2026-02-09\",\"excerpt\":\"研究显示AI工具并未如预期减少工作量，反而持续加剧员工工作强度，企业需重新审视AI应用策略和员工培训方式。\",\"coverImage\":\"$undefined\"},{\"slug\":\"musk-orbital-data-centers-challenges\",\"href\":\"/whatsup/tldr/hn-2026-p3/musk-orbital-data-centers-challenges\",\"category\":\"tldr\",\"title\":\"马斯克的太空数据中心雄心与现实困境\",\"date\":\"2026-02-06\",\"excerpt\":\"埃隆·马斯克的SpaceX收购xAI后雄心勃勃地计划在地球轨道上部署100万个数据中心，声称利用太空持续的太阳能可以解决地面电网的压力。然而多位专家指出这一计划仍面临巨大的工程和经济挑战。\",\"coverImage\":\"$undefined\"},{\"slug\":\"what-ultimately-is-there-metaphysics-ruliad\",\"href\":\"/whatsup/tldr/hn-2026-p4/what-ultimately-is-there-metaphysics-ruliad\",\"category\":\"tldr\",\"title\":\"形而上学与鲁利亚德：终极实在的计算新解\",\"date\":\"2026-02-04\",\"excerpt\":\"斯蒂芬·沃尔夫拉姆基于计算科学和物理学的突破，提出了一种形式化的科学形而上学框架，以 ruliad 为核心概念，探讨宇宙终极根基与观察者如何必然涌现出空间、时间与客观实在。\",\"coverImage\":\"$undefined\"},{\"slug\":\"modern-antique-tech-reveal-dynamic-cosmos\",\"href\":\"/whatsup/tldr/hn-2026-p3/modern-antique-tech-reveal-dynamic-cosmos\",\"category\":\"tldr\",\"title\":\"古老底片与超级望远镜共绘动态宇宙\",\"date\":\"2026-02-03\",\"excerpt\":\"文章探讨如何利用历史玻璃底片与现代薇拉鲁宾天文台相结合，揭示宇宙动态变化的全貌，展示时域天文学跨越百年的宏大图景。\",\"coverImage\":\"$undefined\"},{\"slug\":\"cognition-ai-billionaire-devin\",\"href\":\"/whatsup/tldr/hn-2026-p3/cognition-ai-billionaire-devin\",\"category\":\"tldr\",\"title\":\"vibe coding公司Cognition融资后估值超百亿 CTO成AI亿万富翁\",\"date\":\"2026-01-31\",\"excerpt\":\"报道AI编程初创公司Cognition以102亿美元估值融资4亿美元，其CTO Steven Hao因此成为新晋亿万富翁，三位创始人财富状况曝光。\",\"coverImage\":\"$undefined\"},{\"slug\":\"astrocytes-neuromodulation-brain-supervisors\",\"href\":\"/whatsup/tldr/hn-2026-p3/astrocytes-neuromodulation-brain-supervisors\",\"category\":\"tldr\",\"title\":\"星形胶质细胞：大脑真正的幕后主管\",\"date\":\"2026-01-30\",\"excerpt\":\"2025年三篇Science论文揭示星形胶质细胞并非神经元附属，而是大脑神经调节的关键主管者，深刻改变我们对脑功能的认知。\",\"coverImage\":\"$undefined\"},{\"slug\":\"satellites-detect-ocean-plastic-pollution\",\"href\":\"/whatsup/tldr/hn-2026-p3/satellites-detect-ocean-plastic-pollution\",\"category\":\"tldr\",\"title\":\"卫星遥感技术助力全球海洋塑料污染监测\",\"date\":\"2026-01-27\",\"excerpt\":\"卫星遥感技术正成为全球海洋塑料污染监测的新手段，科学家利用光谱签名识别漂浮塑料，未来纳米卫星将实现近实时监控。\",\"coverImage\":\"$undefined\"},{\"slug\":\"windows-insider-notepad-paint-updates\",\"href\":\"/whatsup/tldr/hn-2026-p3/windows-insider-notepad-paint-updates\",\"category\":\"tldr\",\"title\":\"Windows预览版Notepad和Paint迎来更新\",\"date\":\"2026-01-22\",\"excerpt\":\"This article announces new updates for Notepad and Paint apps rolling out to Windows Insiders in Canary and Dev Channels. Notepad adds Markdown formatting support (strikethrough, nested lists), a new welcome experience, and streaming AI text features. Paint introduces an AI-powered Coloring Book feature and a fill tolerance slider for the Fill tool.\",\"coverImage\":\"$undefined\"},{\"slug\":\"programmers-elimination-history-software-simplification\",\"href\":\"/whatsup/tldr/hn-2026-p3/programmers-elimination-history-software-simplification\",\"category\":\"tldr\",\"title\":\"消除程序员的历史：六十年的徒劳承诺\",\"date\":\"2026-01-22\",\"excerpt\":\"本文回顾了软件行业60多年来反复出现的消除程序员承诺，从1959年COBOL到当今AI代码生成，每次技术浪潮都宣称将让编程民主化，但最终都创造了新的专业编程岗位而非消除程序员。\",\"coverImage\":\"$undefined\"},{\"slug\":\"using-obsidian-with-claude-code\",\"href\":\"/whatsup/tldr/hn-2026-p3/using-obsidian-with-claude-code\",\"category\":\"tldr\",\"title\":\"如何在 Obsidian 中使用 Claude Code\",\"date\":\"2026-01-21\",\"excerpt\":\"作者介绍了如何在 Obsidian 笔记库中使用 Claude Code 作为协作伙伴，通过终端扩展让 AI 直接读写和遍历笔记，采用简洁的文件夹结构和内容地图组织知识，实现思考深化的工作流程。\",\"coverImage\":\"$undefined\"},{\"slug\":\"japanese-haiku-death-poems\",\"href\":\"/whatsup/tldr/hn-2026-p3/japanese-haiku-death-poems\",\"category\":\"tldr\",\"title\":\"日本俳句诗人辞世诗选（第三部）\",\"date\":\"2026-01-17\",\"excerpt\":\"This article presents 16 death poems (jisei) by haiku poets across Edo-Meiji periods, exploring mortality through detailed biographical contexts.\",\"coverImage\":\"$undefined\"},{\"slug
