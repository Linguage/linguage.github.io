\":\"/whatsup/tldr/hn-2026-p3/mit-ultrasound-wristband-robotic-hand-control\",\"category\":\"tldr\",\"title\":\"MIT超声波腕带实现实时手势追踪与机器人控制\",\"date\":\"2026-03-25\",\"excerpt\":\"MIT工程师开发了一款超声波腕带，能实时追踪手部动作并通过AI算法将其转化为机器人或虚拟环境中的精确操作，为人形机器人训练和VR交互开辟新路径。\",\"coverImage\":\"$undefined\"},{\"slug\":\"why-no-alphafold-for-materials\",\"href\":\"/whatsup/tldr/hn-2026-p3/why-no-alphafold-for-materials\",\"category\":\"tldr\",\"title\":\"为什么材料科学没有AlphaFold时刻\",\"date\":\"2026-03-25\",\"excerpt\":\"MIT教授Heather Kulik分享AI驱动材料发现的十年经验，探讨为何材料科学难以复制AlphaFold的成功，以及领域专业知识与AI深度融合的必要性。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-writing-changes-mathematical-thought\",\"href\":\"/whatsup/tldr/hn-2026-p3/how-writing-changes-mathematical-thought\",\"category\":\"tldr\",\"title\":\"书写如何改变数学思维\",\"date\":\"2026-03-25\",\"excerpt\":\"数学史学家David Dunning探讨数学符号系统如何作为一种技术深刻影响数学思维与实践，从数字演变到微积分符号之争，揭示书写形式与思想的共生关系。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-to-become-so-creative-it-feels-illegal\",\"href\":\"/whatsup/tldr/hn-2026-p3/how-to-become-so-creative-it-feels-illegal\",\"category\":\"tldr\",\"title\":\"创造力不是天赋，而是被你亲手埋没的意识状态\",\"date\":\"2026-03-25\",\"excerpt\":\"Dan Koe 从自身创作瓶颈出发，提出创造力的本质是开放的意识状态，而非天赋技能，并提供了一套通过无聊与减速来恢复创造力的七日方案。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-anthropics-claude-thinks-internals\",\"href\":\"/whatsup/tldr/hn-2026-p3/how-anthropics-claude-thinks-internals\",\"category\":\"tldr\",\"title\":\"拆解Claude的思维黑箱：AI如何真正思考\",\"date\":\"2026-03-25\",\"excerpt\":\"Anthropic的可解释性团队通过构建特征归因工具深入Claude内部，揭示了其在数学计算、诗歌创作和多语言处理中展现出的与表面解释截然不同的真实推理机制。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-to-become-so-creative-it-feels-illegal-2\",\"href\":\"/whatsup/tldr/hn-2026-p3/how-to-become-so-creative-it-feels-illegal-2\",\"category\":\"tldr\",\"title\":\"放慢节奏，找回被过度刺激吞噬的创造力\",\"date\":\"2026-03-25\",\"excerpt\":\"作者从个人创作倦怠出发，剖析现代人创造力丧失的三大根源，并提出通过主动拥抱无聊与信息断食来重获创意状态的七日恢复方案。\",\"coverImage\":\"$undefined\"},{\"slug\":\"math-rigor-digitized-proofs-lean\",\"href\":\"/whatsup
