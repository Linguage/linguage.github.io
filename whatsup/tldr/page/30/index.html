3/stripe-2025-annual-letter-gdp-internet\",\"category\":\"tldr\",\"title\":\"Stripe 2025年报：互联网GDP的持续扩张\",\"date\":\"2026-02-24\",\"excerpt\":\"a16z解读Stripe 2025年度公开信，展示Stripe以1.9万亿美元支付体量驱动互联网经济增长，覆盖全球超500万企业的金融基础设施版图。\",\"coverImage\":\"$undefined\"},{\"slug\":\"end-of-swe-bench-verified\",\"href\":\"/whatsup/tldr/hn-2026-p3/end-of-swe-bench-verified\",\"category\":\"tldr\",\"title\":\"SWE-Bench Verified 评估基准的终结\",\"date\":\"2026-02-24\",\"excerpt\":\"OpenAI 宣布正式废弃 SWE-Bench Verified 代码评估基准，原因是测试集已饱和且存在严重数据污染问题，同时推荐转向更严格的 SWE-Bench Pro，并展望下一代代码评估方向。\",\"coverImage\":\"$undefined\"},{\"slug\":\"soybeans-geopolitical-weapon\",\"href\":\"/whatsup/tldr/hn-2026-p3/soybeans-geopolitical-weapon\",\"category\":\"tldr\",\"title\":\"大豆：隐秘而关键的地缘政治武器\",\"date\":\"2026-02-24\",\"excerpt\":\"大豆从普通农作物演变为地缘政治博弈的核心筹码，中美贸易战中成为双方相互施压的关键工具，中国正通过全球产业链布局降低对美依赖。\",\"coverImage\":\"$undefined\"},{\"slug\":\"llm-as-microservice-architecture\",\"href\":\"/whatsup/tldr/hn-2026-p3/llm-as-microservice-architecture\",\"category\":\"tldr\",\"title\":\"将LLM作为微服务：高延迟时代的架构设计\",\"date\":\"2026-02-24\",\"excerpt\":\"探讨将大语言模型作为微服务集成时的架构挑战，从延迟、流式输出、失败率和可变成本四个维度分析LLM的独特性，并提出同步调用和编排器模式等解决方案。\",\"coverImage\":\"$undefined\"},{\"slug\":\"global-urban-shade-inequality\",\"href\":\"/whatsup/tldr/hn-2026-p3/global-urban-shade-inequality\",\"category\":\"tldr\",\"title\":\"树荫分配不平等：城市热岛中的贫富温差\",\"date\":\"2026-02-24\",\"excerpt\":\"MIT牵头国际研究发现全球城市行人遮荫覆盖与社区财富水平高度相关，建议沿公共交通线路优先植树以缩小遮荫差距。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-to-use-ai-for-job-interview\",\"href\":\"/whatsup/tldr/hn-2026-p3/how-to-use-ai-for-job-interview\",\"category\":\"tldr\",\"title\":\"用AI重塑求职面试准备的完整指南\",\"date\":\"2026-02-24\",\"excerpt\":\"基于30多位科技行业从业者的真实经验，介绍如何利用AI工具构建面试反馈闭环，并提供免费的Claude Code面试教练工具。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ensuring-scientific-integrity\",\"href\":\"/whatsup/tldr/hn-2026-p3/ensuring-scientific-integrity\",\"category\":\"tldr\",\"title\":\"科研诚信的挑战与制度保障\",\"date\":\"2026-02-24\",\"excerpt\":\"法
