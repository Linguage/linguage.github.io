\":\"tldr\",\"title\":\"AI编程的隐性代价\",\"date\":\"2026-02-15\",\"excerpt\":\"文章揭示AI编程工具的隐性代价：技能退化、认知债务、审查悖论与资深工程师培养体系崩溃。\",\"coverImage\":\"$undefined\"},{\"slug\":\"stop-memorizing-system-design-start-simulating\",\"href\":\"/whatsup/tldr/hn-2026-p3/stop-memorizing-system-design-start-simulating\",\"category\":\"tldr\",\"title\":\"别再死记系统设计，开始模拟实战\",\"date\":\"2026-02-15\",\"excerpt\":\"作者提出系统设计学习应从死记硬背转向模拟实战，推出了覆盖金融正确性、极端并发和数据完整性的三卷本架构师课程，并附带职业发展指南。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ilia-malinin-olympic-grace\",\"href\":\"/whatsup/tldr/hn-2026-p3/ilia-malinin-olympic-grace\",\"category\":\"tldr\",\"title\":\"失误后的优雅：Ilia Malinin的冬奥答卷\",\"date\":\"2026-02-15\",\"excerpt\":\"21岁花滑选手Ilia Malinin在2026年冬奥会严重失误仅获第八名，赛后平静礼貌接受采访，展现令人敬佩的体育精神。\",\"coverImage\":\"$undefined\"},{\"slug\":\"world-order-collapse-2026\",\"href\":\"/whatsup/tldr/hn-2026-p3/world-order-collapse-2026\",\"category\":\"tldr\",\"title\":\"战后世界秩序崩塌：大国竞争与循环周期\",\"date\":\"2026-02-15\",\"excerpt\":\"本文基于2026年慕尼黑安全会议，探讨战后世界秩序崩塌的背景及达里奥关于外部秩序“大循环”六阶段模型的理论框架。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ibm-tripling-gen-z-hiring-ai-era\",\"href\":\"/whatsup/tldr/hn-2026-p3/ibm-tripling-gen-z-hiring-ai-era\",\"category\":\"tldr\",\"title\":\"IBM逆势扩招：AI时代为何三倍招聘Z世代人才\",\"date\":\"2026-02-14\",\"excerpt\":\"IBM宣布将初级岗位招聘数量增加两倍，重新定义职位以适应AI时代，认为削减初级人才将损害企业长期发展。\",\"coverImage\":\"$undefined\"},{\"slug\":\"mit-graduate-ai-figure-skating-tool\",\"href\":\"/whatsup/tldr/hn-2026-p3/mit-graduate-ai-figure-skating-tool\",\"category\":\"tldr\",\"title\":\"MIT毕业生用AI解密奥运花样滑冰难度\",\"date\":\"2026-02-14\",\"excerpt\":\"MIT毕业生Jerry Lu开发AI工具帮助NBC观众理解花样滑冰运动员的高难度动作，包括跳跃高度、旋转速度等数据可视化。\",\"coverImage\":\"$undefined\"},{\"slug\":\"token-anxiety-era\",\"href\":\"/whatsup/tldr/hn-2026-p3/token-anxiety-era\",\"category\":\"tldr\",\"title\":\"令牌焦虑：硅谷的新时代神经质\",\"date\":\"2026-02-14\",\"excerpt\":\"本文描绘了硅谷科技圈正在蔓延的一种新型集体焦虑：人们对AI代理的痴迷与依赖，从社交聚会到日常对话，从娱乐消遣到睡眠时间，一切都被重新定义为可计算的token成本，引发了前所未有的效率焦虑和存在焦虑。\",\"coverImage\":\"$undefined\"},{\"s
