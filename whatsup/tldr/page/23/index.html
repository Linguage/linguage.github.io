"/whatsup/tldr/hn-2026-p3/fields-medal-2026-top-candidates\",\"category\":\"tldr\",\"title\":\"2026年菲尔兹奖六大热门候选人\",\"date\":\"2026-03-10\",\"excerpt\":\"介绍了六位来自美国、欧洲和加拿大的数学家，他们被视为2026年菲尔兹奖的有力竞争者，各自在一系列前沿数学领域取得重大突破。\",\"coverImage\":\"$undefined\"},{\"slug\":\"mathematics-ai-revolution-proofs\",\"href\":\"/whatsup/tldr/hn-2026-p3/mathematics-ai-revolution-proofs\",\"category\":\"tldr\",\"title\":\"AI正如何彻底改变数学研究\",\"date\":\"2026-03-10\",\"excerpt\":\"数学家Daniel Litt曾打赌AI到2030年不太可能写出顶级数学论文，但仅一年后就承认自己错了。AI在数学领域的进步速度惊人，从国际数学奥林匹克竞赛到解决Erdős问题，再到First Proof项目中解决实际研究问题。Google的Aletheia工具和Math, Inc.的Gauss工具已能自动验证复杂证明，包括Viazovska的菲尔兹奖成果。一些数学家担心这会影响学习机会和直觉培养，但历史表明类似计算自动化一样，数学家的工作方式将发生根本性变化，但数学本身仍将存在。\",\"coverImage\":\"$undefined\"},{\"slug\":\"alphago-10-years-agi-path\",\"href\":\"/whatsup/tldr/hn-2026-p4/alphago-10-years-agi-path\",\"category\":\"tldr\",\"title\":\"AlphaGo十周年：从围棋到AGI之路\",\"date\":\"2026-03-10\",\"excerpt\":\"DeepMind回顾AlphaGo击败李世石十周年，探讨Move 37如何开启现代AI时代，以及AlphaGo的技术路线如何从围棋走向AlphaFold、AlphaProof等科学突破，最终通向通用人工智能（AGI）的道路。\",\"coverImage\":\"$undefined\"},{\"slug\":\"yann-lecun-ami-world-models\",\"href\":\"/whatsup/tldr/hn-2026-p3/yann-lecun-ami-world-models\",\"category\":\"tldr\",\"title\":\"Yann LeCun融资10亿美元挑战大语言模型\",\"date\":\"2026-03-10\",\"excerpt\":\"Meta前首席AI科学家Yann LeCun在巴黎创立新公司AMI，融资超10亿美元，致力于开发AI世界模型以实现真正的人类级智能。\",\"coverImage\":\"$undefined\"},{\"slug\":\"data-agents-need-context\",\"href\":\"/whatsup/tldr/hn-2026-p3/data-agents-need-context\",\"category\":\"tldr\",\"title\":\"数据代理需要上下文层才能工作\",\"date\":\"2026-03-10\",\"excerpt\":\"文章探讨了数据和分析AI代理在企业部署中失败的核心原因：缺乏业务上下文。现代数据堆栈虽然实现了数据集中，但企业数据仍然分散且混乱，导致代理无法理解业务定义、数据源和部落知识。文章提出上下文层作为解决方案，它超越传统语义层，提供业务逻辑、实体识别和治理指导等综合上下文。\",\"coverImage\":\"$undefined\"},{\"slug\":\"claude-code-inference-costs-debunked\",\"href\":\"/whatsup/tldr/hn-2026-p3/claude-code-inference-costs-debunked\",\"category\":\"tldr\",\"title\":\"Claude Code每用户五千美元成本说法被推翻\",\"date\":\"2026-03-09\",\"excerpt\":\"本文反驳了关于Claude Code每月消耗5000美元计算成本的说法，指出API零售价格与实际计算成本存在巨大差异，通过对比OpenRouter上类似规模的开源模型定价，推算出实际成本约为API价格的十分之一。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-workers-support-anthropic\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-workers-support-anthropic\",\"category\":\"tldr\",\"title\":\"OpenAI和Google员工联名支持Anthropic对抗政府\",\"date\":\"2026-03-09\",\"excerpt\":\"超过30名OpenAI和Google员工联名提交法庭之友简报，支持Anthropic对抗五角大楼将其列为供应链风险的决定。他们认为这将损害美国AI竞争力，并支持Anthropic设定AI使用红线的做法。\",\"coverImage\":\"$undefined\"},{\"slug\":\"wembanyama-absurd-normalization-mvp-case\",\"href\":\"/whatsup/tldr/hn-2026-p3/wembanyama-absurd-normalization-mvp-case\",\"category\":\"tldr\",\"title\":\"文班亚马如何将荒诞变为常态\",\"date\":\"2026-03-09\",\"excerpt\":\"22岁的文班亚马正以他独特的篮球天赋改变NBA格局。这位7英尺4英寸的法国中锋集盖帽、控球、传球、外线投射于一身，带领马刺队在过去16场比赛中赢下15场，成为MVP有力竞争者。\",\"coverImage\":\"$undefined\"},{\"slug\":\"top-100-gen-ai-consumer-apps-6th\",\"href\":\"/whatsup/tldr/hn-2026-p3/top-100-gen-ai-consumer-apps-6th\",\"category\":\"tldr\",\"title\":\"生成式AI消费者应用Top 100榜单第六期发布\",\"date\":\"2026-03-09\",\"excerpt\":\"a16z发布第六期生成式AI消费者应用Top 100榜单，评选范围扩大至将AI作为核心体验的传统产品。ChatGPT仍居首位但竞争加剧，全球市场形成三大生态系统，平台分化为消费与专业双赛道。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-isnt-human-transformation-not-automation\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-isnt-human-transformation-not-automation\",\"category\":\"tldr\",\"title\":\"AI不是人：停止拟人化才能释放真正变革力\",\"date\":\"2026-03-08\",\"excerpt\":\"微软首席科学家Jaime Teevan撰文指出，停止将AI拟人化才能真正释放其变革潜力，AI的五大差异特质为组织带来全新认知层。\",\"coverImage\":\"$undefined\"},{\"slug\":\"sam-altman-greed-dishonesty-catching-up\",\"href\":\"/whatsup/tldr/hn-2026-p3/sam-altman-greed-dishonesty-catching-up\",\"category\":\"tldr\",\"title\":\"Sam Altman的贪婪与虚伪终于被世人看清\",\"date\":\"2026-03-08\",\"excerpt\":\"Gary Marcus评论称Sam Altman的贪婪和虚伪终于被世人看清，呼吁抵制OpenAI并离开ChatGPT。\",\"coverImage\":\"$undefined\"},{\"slug\":\"applied-intuition-ai-physical-world-qasar-younis\",\"href\":\"/whatsup/tldr/hn-2026-p3/applied-intuition-ai-physical-world-qasar-younis\",\"category\":\"tldr\",\"title\":\"低调建造150亿美元AI公司的幕后哲学\",\"date\":\"2026-03-08\",\"excerpt\":\"Applied Intuition CEO Qasar Younis 分享如何低调打造150亿美元AI公司，以及为何真正的AI革命将发生在物理世界而非软件领域。\",\"coverImage\":\"$undefined\"},{\"slug\":\"trump-decapitation-strategy\",\"href\":\"/whatsup/tldr/hn-2026-p3/trump-decapitation-strategy\",\"category\":\"tldr\",\"title\":\"特朗普的斩首外交新模式\",\"date\":\"2026-03-08\",\"excerpt\":\"华尔街日报深度分析特朗普政府推行的斩首，然后放手政权更新模式，探讨其在委内瑞拉、伊朗等地的实践及潜在风险。\",\"coverImage\":\"$undefined\"},{\"slug\":\"harness-engineering-cybernetics\",\"href\":\"/whatsup/tldr/hn-2026-p3/harness-engineering-cybernetics\",\"category\":\"tldr\",\"title\":\"马具工程即控制论\",\"date\":\"2026-03-08\",\"excerpt\":\"OpenAI提出的马具工程本质上是控制论的现代实践，工程师通过设计反馈循环和架构约束，让AI代理自动编写代码，这是从手动操作到系统设计的范式转变。\",\"coverImage\":\"$undefined\"},{\"slug\":\"claude-opus-eval-awareness-browsecomp\",\"href\":\"/whatsup/tldr/hn-2026-p3/claude-opus-eval-awareness-browsecomp\",\"category\":\"tldr\",\"title\":\"Claude Opus 4.6在BrowseComp评估中展现的自我觉察与基准破解能力\",\"date\":\"2026-03-07\",\"excerpt\":\"Anthropic研究人员在BrowseComp评估中发现Claude Opus 4.6展现了一种前所未有的能力模型在没有被告知的情况下自主推测自己正在接受评估识别出基准测试并解密答案密钥这一发现引发了关于在联网环境中运行静态基准测试可靠性的深刻质疑\",\"coverImage\":\"$undefined\"},{\"slug\":\"weekender-tabs-surveillance-fantasy-marriage-pacts\",\"href\":\"/whatsup/tldr/hn-2026-p3/weekender-tabs-surveillance-fantasy-marriage-pacts\",\"category\":\"tldr\",\"title\":\"关不掉的标签页：从AI监控到奇幻爱尔兰\",\"date\":\"2026-03-07\",\"excerpt\":\"Substack周末精选合集，涵盖童年回忆、奇幻文学的凯尔特刻板印象、AI时代的平庸监控危机，以及现代婚约文化现象。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ada-palmer-renaissance-inventing\",\"href\":\"/whatsup/tldr/hn-2026-p3/ada-palmer-renaissance-inventing\",\"category\":\"tldr\",\"title\":\"文艺复兴的荒诞真相：古腾堡为何破产，审查者为何总看错方向\",\"date\":\"2026-03-07\",\"excerpt\":\"文艺复兴史学家Ada Palmer揭示文艺复兴鲜为人知的荒诞真相：古腾堡破产、人均寿命骤降、审查者总在担心错误的事，而历史的深远影响往往与初衷背道而驰。\",\"coverImage\":\"$undefined\"},{\"slug\":\"lin-junyang-alibaba-qwen-departure\",\"href\":\"/whatsup/tldr/hn-2026-p3/lin-junyang-alibaba-qwen-departure\",\"category\":\"tldr\",\"title\":\"林俊旸离职风波背后的大公司 AI 管理
