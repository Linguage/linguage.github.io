sup/tldr/hn-2026-p3/tlt-efficient-reasoning-llm-training\",\"category\":\"tldr\",\"title\":\"利用空闲算力加速推理大模型训练的新方法\",\"date\":\"2026-02-26\",\"excerpt\":\"MIT等机构研究人员提出TLT方法，利用强化学习训练中的处理器空闲时间自适应训练小型推测模型，将推理型大模型训练速度提升最高2.1倍且不损失精度。\",\"coverImage\":\"$undefined\"},{\"slug\":\"developer-productivity-shift\",\"href\":\"/whatsup/tldr/hn-2026-p3/developer-productivity-shift\",\"category\":\"tldr\",\"title\":\"开发者生产力的根本转变：从执行到规划\",\"date\":\"2026-02-26\",\"excerpt\":\"本文探讨了AI时代开发者生产力的根本转变，指出随着实现成本降低，明确的需求定义和规划能力比编码效率更为重要。\",\"coverImage\":\"$undefined\"},{\"slug\":\"physics-processing-unit-materials-discovery\",\"href\":\"/whatsup/tldr/hn-2026-p3/physics-processing-unit-materials-discovery\",\"category\":\"tldr\",\"title\":\"用AI搜索所有可能的材料空间\",\"date\":\"2026-02-26\",\"excerpt\":\"Max Welling从量子引力到材料科学的跨界之旅，探讨物理处理单元概念、AI驱动的材料发现平台CuspAI，以及对称性在深度学习中的重要性。\",\"coverImage\":\"$undefined\"},{\"slug\":\"video-podcast-rebrand-awkward-question\",\"href\":\"/whatsup/tldr/hn-2026-p3/video-podcast-rebrand-awkward-question\",\"category\":\"tldr\",\"title\":\"视频播客时代：我们为何还叫它播客？\",\"date\":\"2026-02-26\",\"excerpt\":\"随着视频播客的兴起，播客这一术语的准确性受到质疑。该词源于iPod+广播的组合，而iPod已于2022年停产。YouTube已成为美国最大播客平台，苹果音频应用市场份额持续下滑，行业正讨论是否需要重新命名。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-bubble-this-time-different\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-bubble-this-time-different\",\"category\":\"tldr\",\"title\":\"这一次真的不同吗：AI 泡沫的三种走向与长远影响\",\"date\":\"2026-02-26\",\"excerpt\":\"文章以此前历次技术泡沫为参照，探讨人工智能热潮是否真的与众不同。评论者从泡沫类型、硬件基础设施投资以及 LLM 实际应用价值等多角度切入，整体倾向于认为 AI 将像互联网一样具有深远渗透性，而非悄然消失。\",\"coverImage\":\"$undefined\"},{\"slug\":\"underground-power-lines-cost-massachusetts\",\"href\":\"/whatsup/tldr/hn-2026-p3/underground-power-lines-cost-massachusetts\",\"category\":\"tldr\",\"title\":\"马萨诸塞州为何不大规模将电力线路埋入地下\",\"date\":\"2026-02-26\",\"excerpt\":\"文章探讨马萨诸塞州为何不大规模将电线埋入地下，核心原因是成本高昂、维修困难，专家建议采取针对性策略而非全面地下化。\",\"coverImage\":\"$undefined\"},{\"slug\":\"infinite-jest-techno-optimist-canon\",\"href\":\"/whatsup/tldr/hn-2026-p
