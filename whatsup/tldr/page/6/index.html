href\":\"/whatsup/tldr/hn-2026-p4/automated-alignment-researchers\",\"category\":\"tldr\",\"title\":\"自动化对齐研究者：用大模型扩展可扩展监督\",\"date\":\"2026-04-14\",\"excerpt\":\"Anthropic 让九份 Claude Opus 4.6 自主进行对齐研究，在弱到强监督问题上以 PGR 0.97 远超人类基线 0.23，展示了 AI 加速对齐研究的潜力。\",\"coverImage\":\"$undefined\"},{\"slug\":\"seven-stocks-for-coming-quantum-boom\",\"href\":\"/whatsup/tldr/hn-2026-p4/seven-stocks-for-coming-quantum-boom\",\"category\":\"tldr\",\"title\":\"量子计算浪潮中的七只潜力股\",\"date\":\"2026-04-14\",\"excerpt\":\"Motley Fool Stock Advisor 的营销文案，将量子计算类比为 2016 年 AI 投资机会，宣称处于 Tier Zero 阶段，列举历史成功推荐建立信任，最终引导读者付费获取 7 只量子计算股票名单。\",\"coverImage\":\"$undefined\"},{\"slug\":\"teaching-in-the-time-of-chatgpt-pain\",\"href\":\"/whatsup/tldr/hn-2026-p4/teaching-in-the-time-of-chatgpt-pain\",\"category\":\"tldr\",\"title\":\"ChatGPT时代的教学之痛\",\"date\":\"2026-04-13\",\"excerpt\":\"一位大学兼职教师以亲身经历讲述生成式AI如何让教学变得令人沮丧——LLM不仅助长了学术不端，更在根本上侵蚀了学习的意义与教育的价值。\",\"coverImage\":\"$undefined\"},{\"slug\":\"github-fake-star-economy-analysis\",\"href\":\"/whatsup/tldr/hn-2026-p4/github-fake-star-economy-analysis\",\"category\":\"tldr\",\"title\":\"GitHub 虚假星标的黑色产业链：600万刷星背后的融资骗局\",\"date\":\"2026-04-13\",\"excerpt\":\"GitHub 星标本是衡量开源项目受欢迎程度的重要指标，却已演变为一条成熟的黑色产业链。卡内基梅隆大学发表于 ICSE 2026 的同行评审研究显示，平台上存在约 600 万个可疑虚假星标，涉及 18,617 个仓库与 30 万个账号。更为严峻的是，风险投资机构将星标数量作为项目筛选信号，由此催生了一个以低廉成本制造融资可信度的灰色市场，深刻影响着整个科技创业生态。\",\"coverImage\":\"$undefined\"},{\"slug\":\"mit-parking-aware-navigation-system\",\"href\":\"/whatsup/tldr/hn-2026-p4/mit-parking-aware-navigation-system\",\"category\":\"tldr\",\"title\":\"MIT研发停车感知导航，精准估算出行时间\",\"date\":\"2026-04-13\",\"excerpt\":\"MIT研究人员开发了一款停车感知导航系统，将停车位可用性和步行时间纳入总出行时间计算，实测可将一趟60分钟行程缩减至26分钟，同时减少车辆巡游带来的拥堵和排放。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-can-i-keep-from-singing\",\"href\":\"/whatsup/tldr/hn-2026-p4/how-can-i-keep-from-singing\",\"category\":\"tldr\",\"title\":\"38岁开始学唱歌：一段声音与喜悦的旅程\",\"date\":\"2026-04-12\",\"excerpt\":\"作者38岁意外开始学唱歌，在幸福主义理念引导下突破自我怀疑，拓宽音域，学会享受不完美，找到沉浸式快乐与生命能量。证明：神经可塑性永不消失，开始学习永远不晚。\",\"coverImage\":\"$undefined\"},{\"slug\":\"agent-memory-deep-dive\",\"href\":\"/whatsup/tldr/hn-2026-p4/agent-memory-deep-dive\",\"category\":\"tldr\",\"title\":\"Agent Memory 深度解析\",\"date\":\"2026-04-12\",\"excerpt\":\"Agent Memory 并非存储或检索问题，而是系统如何在时间中维持连续性、治理过去如何进入现在、并把经验固化为能力的深度架构挑战。\",\"coverImage\":\"$undefined\"},{\"slug\":\"cleaner-ant-arizona-mutualism\",\"href\":\"/whatsup/tldr/hn-2026-p4/cleaner-ant-arizona-mutualism\",\"category\":\"tldr\",\"title\":\"亚利桑那沙漠首例清洁蚂蚁观察记\",\"date\":\"2026-04-12\",\"excerpt\":\"文章记录亚利桑那沙漠中一种疑似首例清洁蚂蚁与红收获蚁之间的跨种清洁互动现象，作者基于野外长期观察，提出类比清洁鱼的合作关系，并讨论其潜在互惠机制及未来研究方向。\",\"coverImage\":\"$undefined\"},{\"slug\":\"wembanyama-math-lesson-65-game-rule\",\"href\":\"/whatsup/tldr/hn-2026-p4/wembanyama-math-lesson-65-game-rule\",\"category\":\"tldr\",\"title\":\"文班亚马心算拆解65场规则\",\"date\":\"2026-04-12\",\"excerpt\":\"文班亚马在赛季末通过现场心算探讨65场出场限制的利弊，提出以总出场时间和比赛比例来替代固定场次的见解，展现其独特思维。\",\"coverImage\":\"$undefined\"},{\"slug\":\"first-cleaner-ant-arizona-desert\",\"href\":\"/whatsup/tldr/hn-2026-p4/first-cleaner-ant-arizona-desert\",\"category\":\"tldr\",\"title\":\"沙漠中的蚂蚁清洁站\",\"date\":\"2026-04-12\",\"excerpt\":\"一篇记述亚利桑那沙漠中一种未命名Dorymyrmex蚂蚁与Pogonomyrmex barbatus收割蚁之间类似清洁鱼行为的观察报告，揭示了昆虫界首次发现的清洁共生现象。\",\"coverImage\":\"$undefined\"},{\"slug\":\"jazz-key-of-life-miguel-zenon\",\"href\":\"/whatsup/tldr/hn-2026-p4/jazz-key-of-life-miguel-zenon\",\"category\":\"tldr\",\"title\":\"米格尔·泽农：爵士即兴与波多黎各传统的交响\",\"date\":\"2026-04-12\",\"excerpt\":\"格莱美获奖萨克斯手与MIT教授米格尔·泽农将波多黎各传统音乐语汇融入爵士即兴，在智性与情感、传统与创新的平衡中创造出独特的音乐语言\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-agent-benchmark-vulnerabilities\",\"href\":\"/whatsup/tldr/hn-2026-p4/ai-agent-benchmark-vulnerabilities\",\"category\":\"tldr\",\"title\":\"顶级AI智能体基准测试为何全面失效\",\"date\":\"2026-04-12\",\"excerpt\":\"研究团队构建自动化扫描智能体，成功利用漏洞黑掉了八大主流AI基准测试并取得近乎完美的分数，揭示了当前AI评估体系的系统性缺陷。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-gps-works\",\"href\":\"/whatsup/tldr/hn-2026-p4/how-gps-works\",\"category\":\"tldr\",\"title\":\"GPS究竟如何工作？从几何、计时到爱因斯坦的交互式解读\",\"date\":\"2026-04-11\",\"excerpt\":\"GPS的本质是将时间转化为距离。卫星以光速发送信号，手机通过测量信号传播时间计算与卫星的距离。单颗卫星只能确定一个环形范围，三颗卫星通过三边测量法交汇确定位置，第四颗卫星则校正手机廉价的石英时钟误差。此外，工程师还必须计入爱因斯坦相对论效应——卫星在高速运动和弱引力场中时间流逝与地面不同，若不校正每天将产生约10公里漂移。\",\"coverImage\":\"$undefined\"},{\"slug\":\"nasa-artemis-ii-crew-safe-splashdown\",\"href\":\"/whatsup/tldr/hn-2026-p4/nasa-artemis-ii-crew-safe-splashdown\",\"category\":\"tldr\",\"title\":\"阿尔忒弥斯二号宇航员绕月归来\",\"date\":\"2026-04-11\",\"excerpt\":\"NASA阿尔忒弥斯二号任务圆满完成，四名宇航员历时十天绕月飞行并安全返回地球，打破了人类最远航行距离纪录。\",\"coverImage\":\"$undefined\"},{\"slug\":\"artemis-ii-splashdown-analysis\",\"href\":\"/whatsup/tldr/hn-2026-p4/artemis-ii-splashdown-analysis\",\"category\":\"tldr\",\"title\":\"阿尔忒弥斯二号溅落：为火星征途铺路\",\"date\":\"2026-04-11\",\"excerpt\":\"阿尔忒弥斯二号成功溅落返回地球，MIT教授解读此次绕月试飞任务对推进载人火星探索的关键意义。\",\"coverImage\":\"$undefined\"},{\"slug\":\"anthropic-project-glasswing-claude-mythos-security\",\"href\":\"/whatsup/tldr/hn-2026-p4/anthropic-project-glasswing-claude-mythos-security\",\"category\":\"tldr\",\"title\":\"Anthropic限制高危模型发布，AI网络安全能力引发行业震动\",\"date\":\"2026-04-10\",\"excerpt\":\"Anthropic因最新模型Claude Mythos具备极强的自主漏洞挖掘与利用能力，决定通过Project Glasswing项目仅向特定安全合作伙伴开放，作者对此谨慎举措表示支持。\",\"coverImage\":\"$undefined\"},{\"slug\":\"claude-managed-agents-overview\",\"href\":\"/whatsup/tldr/hn-2026-p4/claude-managed-agents-overview\",\"category\":\"tldr\",\"title\":\"Claude托管代理服务全面解析\",\"date\":\"2026-04-10\",\"excerpt\":\"Anthropic推出的Claude托管代理服务，提供无需自建循环的基础设施，适用于长时间运行及异步任务。\",\"coverImage\":\"$undefined\"},{\"slug\":\"backend-for-ai-coded-apps\",\"href\":\"/whatsup/tldr/hn-2026-p4/backend-for-ai-coded-apps\",\"category\":\"tldr\",\"title\":\"Instant：面向AI编程应用的全栈后端架构\",\"date\":\"2026-04-10\",\"excerpt\":\"Instant 1.0 是一款专为 AI 编码设计的开源后端，通过多租户架构和内置同步引擎，让智能体用极少代码快速构建具备实时与离线功能的全栈应用。\",\"coverImage\":\"$undefined\"},{\"slug\":\"littlesnitch-for-linux-overview\",\"href\":\"/whatsup/tldr/hn-2026-p4/littlesnitch-for-linux-overview\",\"category\":\"tldr\",\"tit
