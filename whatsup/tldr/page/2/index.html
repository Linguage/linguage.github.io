,\"href\":\"/whatsup/tldr/hn-2026-p4/beware-software-brain\",\"category\":\"tldr\",\"title\":\"警惕软件脑：AI狂热与公众厌恶的鸿沟\",\"date\":\"2026-04-23\",\"excerpt\":\"科技行业以软件思维看待世界，将一切简化为数据库和算法，这种思维方式被AI放大后，造成了行业狂热与公众厌恶之间日益巨大的鸿沟。\",\"coverImage\":\"$undefined\"},{\"slug\":\"elon-musk-admits-millions-of-tesla-owners-need-upgrades-for-true-full-self-driving\",\"href\":\"/whatsup/tldr/hn-2026-p4/elon-musk-admits-millions-of-tesla-owners-need-upgrades-for-true-full-self-driving\",\"category\":\"tldr\",\"title\":\"马斯克承认数百万特斯拉车主需硬件升级才能实现真正完全自动驾驶\",\"date\":\"2026-04-23\",\"excerpt\":\"马斯克在特斯拉季度财报电话会议上首次明确承认，搭载Hardware 3系统的数百万辆特斯拉汽车无法通过软件更新实现无需人工监督的完全自动驾驶功能，必须进行包括计算机和摄像头在内的硬件更换。这一表态与特斯拉多年承诺相悖，可能使公司面临大量车主的法律诉讼。\",\"coverImage\":\"$undefined\"},{\"slug\":\"no-more-prs-open-source-maintainer\",\"href\":\"/whatsup/tldr/hn-2026-p4/no-more-prs-open-source-maintainer\",\"category\":\"tldr\",\"title\":\"AI 时代开源协作方式的重构：我不再需要你的 PR\",\"date\":\"2026-04-22\",\"excerpt\":\"在 LLM 工具普及之后，传统的 Pull Request 协作方式已失去大部分价值。审查陌生人代码带来的安全顾虑、风格偏好冲突、跨时区同步成本，叠加 LLM 可以快速生成高质量代码的现实，使得合并外部 PR 的收益大幅缩水。作者重新梳理了贡献者真正能帮上忙的方式，呼吁社区重新理解开源协作的本质。\",\"coverImage\":\"$undefined\"},{\"slug\":\"anthropic-briefly-removes-claude-code-from-pro-plan\",\"href\":\"/whatsup/tldr/hn-2026-p4/anthropic-briefly-removes-claude-code-from-pro-plan\",\"category\":\"tldr\",\"title\":\"Anthropic 短暂将 Claude Code 从 20 美元 Pro 订阅计划中移除\",\"date\":\"2026-04-22\",\"excerpt\":\"2026 年 4 月 21 日，Anthropic 悄然将旗下 AI 编程工具 Claude Code 从每月 20 美元的 Pro 订阅计划中移除，相关定价页面和支持文档均随之更新。事件曝光后，Anthropic 增长负责人将此解释为针对约 2% 新用户的小规模测试，但未能就支持文档的同步修改给出合理说明。随后 Anthropic 撤销了全部改动，恢复了原有的订阅权益说明。\",\"coverImage\":\"$undefined\"},{\"slug\":\"claude-code-pricing-confusion\",\"href\":\"/whatsup/tldr/hn-2026-p4/claude-code-pricing-confusion\",\"category\":\"tldr\",\"title\":\"Claude Code 定价风波：涨价传言与信任危机\",\"date\":\"2026-04-22\",\"excerpt\":\"2026 年 4 月 22 日，Anthropic 悄然更新了定价页面，将 Claude Code 从每月 20 美元的 Pro 计划中移除，仅保留在每月 100 至 200 美元的 Max 计划内。\",\"coverImage\":\"$undefined\"},{\"slug\":\"claude-opus-system-prompt-4-6-to-4-7-changes\",\"href\":\"/whatsup/tldr/hn-2026-p4/claude-opus-system-prompt-4-6-to-4-7-changes\",\"category\":\"tldr\",\"title\":\"Claude Opus 系统提示词从 4.6 到 4.7 版本的变化解析\",\"date\":\"2026-04-22\",\"excerpt\":\"本文由 Simon Willison 撰写，深入分析了 Anthropic 在 Claude Opus 4.7 发布时对官方系统提示词所做的更新。Anthropic 是目前唯一一家公开发布其用户端系统提示词的主流 AI 公司。文章通过构建 Git 版本历史的方式，对比了 4.6 与 4.7 版本之间的差异，涵盖安全策略强化、行为规范调整、新功能接入以及冗余内容删减等多个维度，为开发者和研究者提供了...\",\"coverImage\":\"$undefined\"},{\"slug\":\"clojure-transducers\",\"href\":\"/whatsup/tldr/hn-2026-p4/clojure-transducers\",\"category\":\"tldr\",\"title\":\"Clojure - Transducers\",\"date\":\"2026-04-22\",\"excerpt\":\"Transducers 是 Clojure 中一种可组合的算法变换机制，与输入和输出源完全解耦，仅描述对单个元素的变换逻辑，可应用于集合、流、通道等多种处理上下文。\",\"coverImage\":\"$undefined\"},{\"slug\":\"cursors-25-year-old-ceo-spacex-60-billion-deal\",\"href\":\"/whatsup/tldr/hn-2026-p4/cursors-25-year-old-ceo-spacex-60-billion-deal\",\"category\":\"tldr\",\"title\":\"Cursor 25岁 CEO 与 SpaceX 达成 600 亿美元潜在收购协议\",\"date\":\"2026-04-22\",\"excerpt\":\"AI 编程工具公司 Cursor 的 25 岁 CEO Michael Truell 与 Elon Musk 旗下的 SpaceX 达成一项重磅协议：SpaceX 获得今年晚些时候以 600 亿美元收购 Cursor 的权利，若未执行收购则需支付 100 亿美元合作费用。Truell 从 MIT 辍学后，将大学期间的兴趣项目发展为硅谷增长最快的初创企业之一，个人身家估计达 13 亿美元。\",\"coverImage\":\"$undefined\"},{\"slug\":\"meta-employee-surveillance-ai-training-data\",\"href\":\"/whatsup/tldr/hn-2026-p4/meta-employee-surveillance-ai-training-data\",\"category\":\"tldr\",\"title\":\"Meta 监控员工键盘与鼠标行为，用于训练 AI 模型\",\"date\":\"2026-04-22\",\"excerpt\":\"Meta 正在美国员工的工作电脑上安装追踪软件，记录鼠标移动、点击行为与键盘输入，并定期截取屏幕内容，用于训练其 AI 模型。该项目名为模型能力计划（MCI），是 Meta 大规模 AI 转型战略的组成部分。公司表示，这些数据仅用于模型训练，不会用于绩效考核，但此举仍引发了隐私专家和劳工法学者的广泛关切。\",\"coverImage\":\"$undefined\"},{\"slug\":\"introducing-gpt-5-5\",\"href\":\"/whatsup/tldr/hn-2026-p4/introducing-gpt-5-5\",\"category\":\"tldr\",\"title\":\"OpenAI 发布 GPT-5.5：面向实际工作的全新智能模型\",\"date\":\"2026-04-22\",\"excerpt\":\"OpenAI 于 2025 年 4 月 23 日发布 GPT-5.5，称其迄今为止最智能且最直观的模型。该模型在代理式编码、计算机使用、知识工作和早期科学研究方面表现突出，能够理解复杂意图、自主规划并使用工具完成任务，同时保持与 GPT-5.4 相当的推理速度，且令牌效率显著提升。GPT-5.5 配备 OpenAI 迄今最强的安全防护措施，正逐步向 ChatGPT 和 Codex 的付费用户推出。\",\"coverImage\":\"$undefined\"},{\"slug\":\"chatgpt-for-clinicians-launch\",\"href\":\"/whatsup/tldr/hn-2026-p4/chatgpt-for-clinicians-launch\",\"category\":\"tldr\",\"title\":\"OpenAI推出面向临床医生的免费ChatGPT专业版\",\"date\":\"2026-04-22\",\"excerpt\":\"OpenAI正式发布ChatGPT for Clinicians，专为临床工作设计的AI工具，面向美国经认证的医生、执业护士、助理医师和药剂师免费开放。该产品支持病历文档、医学研究和临床咨询等核心任务，并提供HIPAA合规选项、继续医学教育学分等专属功能，旨在缓解医疗系统压力，让临床医生将更多时间投入患者照护。\",\"coverImage\":\"$undefined\"},{\"slug\":\"practitioner-view-of-program-analysis\",\"href\":\"/whatsup/tldr/hn-2026-p4/practitioner-view-of-program-analysis\",\"category\":\"tldr\",\"title\":\"从实践者视角看程序分析：如何确保软件真正正确\",\"date\":\"2026-04-22\",\"excerpt\":\"本文作者 Rory Sawyer 以一名软件从业者的视角，探讨了如何确保程序真正符合人们的期望。文章引入语义鸿沟这一核心概念，指出代码作为沟通媒介的局限性，并阐明静态分析在弥补这一鸿沟中的独特价值。作者认为，程序的正确性不仅是技术问题，更是多方认知一致的社会性问题。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\",\"coverImage\":\"$undefined\"},{\"slug\":\"multi-agents-whats-actually-working\",\"href\":\"/whatsup/tldr/hn-2026-p4/multi-agents-whats-actually-working\",\"category\":\"tldr\",\"title\":\"多智能体系统实战：什么真正奏效\",\"date\":\"2026-04-22\",\"excerpt\":\"Cognition团队分享构建多智能体系统的实践经验。文章指出并行写作智能体仍存在脆弱性，但单线程写作配合多智能体贡献智能的模式已验证可行。核心发现包括清洁上下文能显著提升代码审查效果，以及强弱模型协作的\\\"聪明朋友\\\"模式在特定条件下有效，同时探讨了更高级别的任务委派前景。\",\"coverImage\":\"$undefined\"},{\"slug\":\"it-s-time-to-reclaim-the-word-palantir-for-j-r-r-tolkien\",\"href\":\"/whatsup/tldr/hn-2026-p4/it-s-time-to-reclaim-the-word-palantir-for-j-r-r-tolkien\",\"category\":\"tldr\",\"title\":\"夺回帕兰提尔：从托尔金到监控资本主义的语词之战\",\"date\":\"2026-04-22\",\"excerpt\":\"前Palantir员工Juan Sebastián Pinto借托尔金《魔戒》中的帕兰提尔石之名，呼吁公众夺回被科技公司垄断的语言。文章剖析云监控平台的输入-分析-自动化三层架构，揭示 ontology 等哲学术语如何被武器化为意识形态工具，并以Palantir参与伊朗米纳卜儿童屠杀、协助特朗普政府清洗性别研究等为例，论证这些系统如何通过数据分类与预测分析侵蚀民主问责，最终号召非技术背景的普通公民...\",\"coverImage\":\"$undefined\"},{\"slug\":\"crawshaw-2026-04-22\",\"href\":\"/whatsup/tldr/hn-2026-p4/crawshaw-2026-04-22\",\"category\":\"tldr\",\"title\":\"我在建造一朵云\",\"date\":\"2026-04-22\",\"excerpt\":\"David Crawshaw 宣布其新创公司 exe.dev 完成 A 轮融资，并阐述了他再次创业的动机：他喜欢计算机，但对现有云计算感到不满。他认为当前云服务的核心抽象存在根本缺陷，包括虚拟机绑定资源、远程块存储性能低下、网络出口费用高昂以及 API 设计糟糕。随着 AI 智能体的普及，软件数量将激增，这些问题会更加突出。exe.dev 正从头开始重建云计算基础设施，提供更灵活的资源分配、本地 ...\",\"coverImage\":\"$undefined\"},{\"slug\":\"meet-the-neon-king-of-new-orleans\",\"href\":\"/whatsup/tldr/hn-2026-p4/meet-the-neon-king-of-new-orleans\",\"category\":\"tldr\",\"title\":\"新奥尔良的霓虹之王\",\"date\":\"2026-04-22\",\"excerpt\":\"艺术家内特·谢弗在新奥尔良经营着一家名为 Big Sexy Neon 的工作室，致力于修复历史霓虹灯牌并创作原创玻璃管作品。这位来自宾夕法尼亚州的工匠掌握着濒临失传的百年技艺，在氩气、氪气和水银的化学世界中延续着这座城市的璀璨传统，让运河街曾经的六百块霓虹招牌所代表的辉煌年代不至于彻底熄灭。\",\"coverImage\":\"$undefined\"},{\"slug\":\"french-govt-agency-data-breach-ants\",\"href\":\"/whatsup/tldr/hn-2026-p4/french-govt-agency-data-breach-ants\",\"category\":\"tldr\",\"title\":\"法国 ANTS 遭入侵，1170 万用户数据泄露\",\"date\":\"2026-04-22\",\"excerpt\":\"法国政府证件管理机构 ANTS 遭入侵，黑客声称窃取 1900 万条记录并出售，官方确认约 1170 万账户受影响，数据可用于钓鱼攻击。\",\"coverImage\":\"$undefined\"},{\"slug\":\"types-and-neural-networks\",\"href\":\"/whatsup/tldr/hn-2026-p4/types-and-neural-networks\",\"category\":\"tldr\",\"title\":\"类型系统与神经网络的深度融合\",\"date\":\"2026-04-22\",\"excerpt\":\"本文探讨了大型语言模型（LLM）在生成类型化代码时所面临的根本性挑战。当前 LLM 的输出类型固定为词元列表，类型检查被剥离在训练流程之外。作者系统梳理了现有的两种推理期修正方案，并提出一种更具前景的方向：将类型结构直接编码进训练过程，使模型真正学会生成具有类型意义的输出。\",\"coverImage\":\"$undefined\"},{\"slug\":\"eighth-generation-tpu-agentic-era\",\"href\":\"/whatsup/tldr/hn-2026-p4/eighth-generation-tpu-agentic-era\",\"category\":\"tldr\",\"title\":\"谷歌第八代TPU：专为智能体时代打造的双芯架构\",\"date\":\"2026-04-22\",\"excerpt\":\"谷歌在Cloud Next大会上发布第八代张量处理单元，推出TPU 8t训练芯片与TPU 8i推理芯片两款专用架构。这一历时十余年的技术结晶，通过与Google DeepMind联合设计，针对智能体时代的多步推理、持续学习和协作执行等需求进行优化，在算力规模、能效比和系统可靠性方面实现重大突破。\",\"coverImage\":\"$undefined\"}],\"heatmapDateCounts\":{\"2026-04-25\":3,\"2026-04-24\":7,\"2026-04-23\":13,\"2026-04-22\":18,\"2026-04-21\":12,\"2026-04-20\":8,\"2026-04-19\":2,\"2026-04-18\":2,\"2026-04-17\":6,\"2026-04-16\":8,\"2026-04-15\":12,\"2026-04-14\":12,\
