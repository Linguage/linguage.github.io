sup/tldr/hn-2026-p3/the-great-crew-change-ai-oilgas\",\"category\":\"tldr\",\"title\":\"AI如何拯救美国油气行业的大换班危机\",\"date\":\"2026-02-19\",\"excerpt\":\"美国油气行业面临代际更替危机，AI成为捕获即将退休一代的隐性知识并填补人才缺口的关键技术。\",\"coverImage\":\"$undefined\"},{\"slug\":\"software-shakeout-durable-ai-era\",\"href\":\"/whatsup/tldr/hn-2026-p3/software-shakeout-durable-ai-era\",\"category\":\"tldr\",\"title\":\"AI时代的软件行业大洗牌：谁将存活\",\"date\":\"2026-02-19\",\"excerpt\":\"本文提出一个判断AI时代软件公司存活能力的二维框架——切换成本与复利价值，将公司分为持久型、缓慢侵蚀型和快速侵蚀型三类，并逐一分析各类护城河的强弱变化。\",\"coverImage\":\"$undefined\"},{\"slug\":\"anthropic-agent-autonomy-study\",\"href\":\"/whatsup/tldr/hn-2026-p3/anthropic-agent-autonomy-study\",\"category\":\"tldr\",\"title\":\"Anthropic发布Agent自主性实测数据\",\"date\":\"2026-02-19\",\"excerpt\":\"Anthropic发布Claude Code使用数据研究，揭示AI Agent自主性在实践中如何演变，涵盖编码时间、用户信任度和人机协作模式等关键指标。\",\"coverImage\":\"$undefined\"},{\"slug\":\"parking-aware-navigation-system\",\"href\":\"/whatsup/tldr/hn-2026-p3/parking-aware-navigation-system\",\"category\":\"tldr\",\"title\":\"停车感知导航系统\",\"date\":\"2026-02-19\",\"excerpt\":\"MIT研究人员开发了一种考虑停车因素的智能导航系统，通过概率感知方法预测停车场可用性，在拥堵场景下可节省高达66%的出行时间（约35分钟），同时减少拥堵和尾气排放。\",\"coverImage\":\"$undefined\"},{\"slug\":\"agentic-ai-explained-mit-sloan\",\"href\":\"/whatsup/tldr/hn-2026-p3/agentic-ai-explained-mit-sloan\",\"category\":\"tldr\",\"title\":\"智能体AI全面解读：从自主决策到企业实践\",\"date\":\"2026-02-19\",\"excerpt\":\"MIT Sloan深度解读智能体AI的定义、商业应用与实施挑战，探讨其如何从聊天机器人演进为自主决策系统，并为企业带来生产力提升与治理风险并存的新课题。\",\"coverImage\":\"$undefined\"},{\"slug\":\"cellular-crowding-biophysics\",\"href\":\"/whatsup/tldr/hn-2026-p3/cellular-crowding-biophysics\",\"category\":\"tldr\",\"title\":\"细胞内部拥挤的物理世界\",\"date\":\"2026-02-19\",\"excerpt\":\"细胞内部并非教科书中的空旷工厂，而是高度拥挤的动态环境。最新研究发现，细胞会主动调节其内部拥挤程度，通过控制核糖体等大分子浓度来优化生化反应效率，这种精密的物理调控机制对生命活动至关重要。\",\"coverImage\":\"$undefined\"},{\"slug\":\"coding-agent-evolution-amp-cli\",\"href\":\"/whatsup/tldr/hn-2026-p3/coding-agent-evolution-amp-cli\",\"category\":\"tldr\",\"title\":\"编码代理已死：AI编程工具的新时代\",\"date\":\"2026-02-19\",\"excerpt\":\"新一代AI模型能力大幅提升，传统的编码代理框架不再是瓶颈。Amp公司宣布淘汰VS Code和Cursor编辑器扩展，转向更灵活的CLI工具，标志AI编程工具进入新阶段。\",\"coverImage\":\"$undefined\"},{\"slug\":\"agent-native-architecture-lessons\",\"href\":\"/whatsup/tldr/hn-2026-p3/agent-native-architecture-lessons\",\"category\":\"tldr\",\"title\":\"Agent原生构建实践：从四个应用学到经验\",\"date\":\"2026-02-18\",\"excerpt\":\"从四个应用案例探讨agent-native架构的核心原则，说明如何通过简单工具让AI自主组合完成任务，以及实践中遇到的挑战和解决方案。\",\"coverImage\":\"$undefined\"},{\"slug\":\"build-agent-native-lessons-from-four-apps\",\"href\":\"/whatsup/tldr/hn-2026-p3/build-agent-native-lessons-from-four-apps\",\"category\":\"tldr\",\"title\":\"Agent原生架构实践：四款产品的构建经验\",\"date\":\"2026-02-18\",\"excerpt\":\"Every团队从Cora、Sparkle、Monologue四款产品出发，分享Agent原生架构的核心原则：用简单原子工具替代硬编码功能，让AI自主组合完成任务。\",\"coverImage\":\"$undefined\"},{\"slug\":\"claude-sonnet-4-6-upgrade\",\"href\":\"/whatsup/tldr/hn-2026-p3/claude-sonnet-4-6-upgrade\",\"category\":\"tldr\",\"title\":\"Claude Sonnet 4.6 发布：接近 Opus 级别的升级\",\"date\":\"2026-02-18\",\"excerpt\":\"Anthropic 发布 Claude Sonnet 4.6 作为对 4.5 的全面升级，带来 1M token 上下文窗口、增强的编程和计算机使用能力，基准测试表现接近 Opus 级别，但 token 消耗显著增加，部分用户反馈存在稳定性问题。\",\"coverImage\":\"$undefined\"},{\"slug\":\"jeff-dean-gemini-google-ai-deep-interview\",\"href\":\"/whatsup/tldr/hn-2026-p3/jeff-dean-gemini-google-ai-deep-interview\",\"category\":\"tldr\",\"title\":\"Jeff Dean 深度访谈：一页备忘录如何催生 Gemini 与 Google AI 的未来\",\"date\":\"2026-02-18\",\"excerpt\":\"Google 首席科学家 Jeff Dean 在 Latent Space 播客中深度披露：一份批评三路分兵的一页纸备忘录促成了 Google Brain 与 DeepMind 合并，催生了 Gemini 项目。访谈涵盖蒸馏技术的真实起源、长上下文的分层检索愿景、GPU 批处理的能量物理本质，以及 10,000 token/秒的推理未来图景。\",\"coverImage\":\"$undefined\"},{\"slug\":\"llm-personalization-sycophancy-risk\",\"href\":\"/whatsup/tldr/hn-2026-p3/llm-personalization-sycophancy-risk\",\"category\":\"tldr\",\"title\":\"LLM个性化功能加剧模型迎合行为\",\"date\":\"2026-02-18\",\"excerpt\":\"MIT与宾州州立研究发现，LLM的个性化记忆功能在长期对话中会导致模型过度迎合用户观点，形成信息回音室，削弱回答准确性。\",\"coverImage\":\"$undefined\"},{\"slug\":\"mit-members-elected-national-ac
