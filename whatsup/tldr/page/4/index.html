solow\",\"href\":\"/whatsup/tldr/hn-2026-p4/ceos-ai-productivity-paradox-solow\",\"category\":\"tldr\",\"title\":\"AI的索洛悖论重现：CEO们看不见生产力回报\",\"date\":\"2026-04-19\",\"excerpt\":\"上万名CEO调查显示AI对就业和生产力影响微乎其微，经济学家重提40年前的索洛悖论——AI无处不在，却未体现在宏观数据中。\",\"coverImage\":\"$undefined\"},{\"slug\":\"palantir-stasi-protocols-xord\",\"href\":\"/whatsup/tldr/hn-2026-p4/palantir-stasi-protocols-xord\",\"category\":\"tldr\",\"title\":\"Palantir的斯塔西协议：民主数据的弗兰肯斯坦式提取\",\"date\":\"2026-04-19\",\"excerpt\":\"批判帕兰提尔公司（Palantir）借助政府合同扩张监控权力的野心。文章围绕其出版物《技术共和国》中的主张展开分析，揭示其以打击犯罪为名推动大规模生物特征采集与预测性警务的本质，并以一项专利申请作为对抗性的先验艺术炸弹，试图在法律与舆论层面引发对监控资本主义的认知冲突。\",\"coverImage\":\"$undefined\"},{\"slug\":\"qwen36-max-preview-knowledge-coding-evolution\",\"href\":\"/whatsup/tldr/hn-2026-p4/qwen36-max-preview-knowledge-coding-evolution\",\"category\":\"tldr\",\"title\":\"Qwen3.6-Max-Preview：更强知识与编程能力的旗舰预览\",\"date\":\"2026-04-18\",\"excerpt\":\"Qwen3.6-Max-Preview 是阿里云 Qwen 团队于 2026 年 4 月发布的下一代旗舰大语言模型早期预览版。相较于前代 Qwen3.6-Plus，该版本在世界知识、指令遵循以及智能体编程三大核心维度上均有显著提升。模型目前可通过 Qwen Studio 进行对话体验，并将很快通过阿里云百炼 API 向开发者开放调用。\",\"coverImage\":\"$undefined\"},{\"slug\":\"sam-altman-world-eyeball-scanning-zoom-tinder-partnership\",\"href\":\"/whatsup/tldr/hn-2026-p4/sam-altman-world-eyeball-scanning-zoom-tinder-partnership\",\"category\":\"tldr\",\"title\":\"山姆·奥尔特曼的眼球扫描公司与Zoom、Tinder达成合作\",\"date\":\"2026-04-18\",\"excerpt\":\"山姆·奥尔特曼旗下的World公司正将其生物识别验证技术推向主流应用。该公司先后与约会软件Tinder和视频会议平台Zoom建立合作，用户需通过实体Orb设备扫描眼球以证明其为真人，而非人工智能机器人。Tinder将在全球范围内推出此项验证，用户完成扫描后可获得认证标识及功能奖励。Zoom则采用三重比对技术，将Orb采集的图像与实时视频进行交叉验证。World还推出Concert Kit软件，试图...\",\"coverImage\":\"$undefined\"},{\"slug\":\"creative-software-industry-war-on-adobe\",\"href\":\"/whatsup/tldr/hn-2026-p4/creative-software-industry-war-on-adobe\",\"category\":\"tldr\",\"title\":\"The creative software industry has declared war on Adobe\",\"date\":\"2026-04-17\",\"excerpt\":\"All empires eventually fall, and it seems the creative software industry has collectively decided that Adobes time has come.\",\"coverImage\":\"$undefined\"},{\"slug\":\"uber-ai-budget-crisis-anthropic-claude-code\",\"href\":\"/whatsup/tldr/hn-2026-p4/uber-ai-budget-crisis-anthropic-claude-code\",\"category\":\"tldr\",\"title\":\"Uber AI 预算危机：34 亿美元研发投入仍难支撑 Claude Code 激增成本\",\"date\":\"2026-04-17\",\"excerpt\":\"Uber 在大力推进人工智能编程工具的采用后，于 2026 年初便耗尽了全年 AI 预算。公司首席技术官 Praveen Neppalli Naga 表示，以 Anthropic 的 Claude Code 为代表的 AI 编程工具使用量远超预期，迫使公司重新制定预算方案。尽管 AI 已开始实质性参与后端代码更新，但其带来的成本压力也令企业意识到，规模化部署 AI 绝非仅仅是效率问题，更是一场财务管理的严峻考验。\",\"coverImage\":\"$undefined\"},{\"slug\":\"x400-vs-smtp-email-history\",\"href\":\"/whatsup/tldr/hn-2026-p4/x400-vs-smtp-email-history\",\"category\":\"tldr\",\"title\":\"X.400：功能完美却输给简洁的邮件标准\",\"date\":\"2026-04-17\",\"excerpt\":\"1984年诞生的X.400邮件标准功能远超当今的SMTP邮件，但因过于复杂、官僚化而失败，而更简单的SMTP凭借易用性赢得了市场，展现了技术标准中简洁胜过完美的真谛。\",\"coverImage\":\"$undefined\"},{\"slug\":\"quiet-colossus-ada-design\",\"href\":\"/whatsup/tldr/hn-2026-p4/quiet-colossus-ada-design\",\"category\":\"tldr\",\"title\":\"安静的巨兽：Ada 的设计遗产\",\"date\":\"2026-04-17\",\"excerpt\":\"本文追溯了 Ada 编程语言的诞生背景与设计哲学，论证了其在包系统、并发模型、类型安全等方面的超前性，以及它如何悄然影响了此后四十年几乎所有现代语言。\",\"coverImage\":\"$undefined\"},{\"slug\":\"tesla-autopilot-fatal-incidents-concealment\",\"href\":\"/whatsup/tldr/hn-2026-p4/tesla-autopilot-fatal-incidents-concealment\",\"category\":\"tldr\",\"title\":\"特斯拉如何掩盖自动驾驶致命事故，继续在公共道路上测试\",\"date\":\"2026-04-17\",\"excerpt\":\"一项基于特斯拉内部数据泄露的调查揭示，该公司长期隐瞒与自动驾驶系统相关的数千起严重事故，其中包含多起致命案例。特斯拉被指控为加快自动驾驶产品上市，将公共道路作为测试场，无视员工预警，持续压制关键安全数据。一家法院已就此作出历史性判决，裁定特斯拉须赔偿受害者逾2.43亿美元。目前，美国司法部和国家公路交通安全管理局均已介入调查。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ada-the-quiet-colossus\",\"href\":\"/whatsup/tldr/hn-2026-p4/ada-the-quiet-colossus\",\"category\":\"tldr\",\"title\":\"被忽视的巨人Ada语言启示\",\"date\":\"2026-04-17\",\"excerpt\":\"文章以历史与技术交织的方式回顾Ada语言在DoD危机背景下诞生的过程，系统梳理其在模块化、类型系统、泛型、并发模型与契约式设计上的超前设计，以及现代语言在数十年后如何不断趋同于这些思想，却在文化与产业叙事中长期忽视Ada的地位。\",\"coverImage\":\"$undefined\"},{\"slug\":\"artifacts-versioned-storage-git-agents\",\"href\":\"/whatsup/tldr/hn-2026-p4/artifacts-versioned-storage-git-agents\",\"category\":\"tldr\",\"title\":\"Artifacts：为 AI Agent 打造的 Git 原生版本化存储\",\"date\":\"2026-04-16\",\"excerpt\":\"Cloudflare 推出 Artifacts，一个为 AI Agent 构建的分布式版本化文件系统，原生支持 Git 协议，让 Agent 可以像操作普通仓库一样管理代码和状态。\",\"coverImage\":\"$undefined\"},{\"slug\":\"claude-code-session-management\",\"href\":\"/whatsup/tldr/hn-2026-p4/claude-code-session-management\",\"category\":\"tldr\",\"title\":\"Claude Code 会话管理与上下文窗口\",\"date\":\"2026-04-16\",\"excerpt\":\"Claude Code 的百万 token 上下文窗口既是利器也是负担，文章深入探讨了会话管理的关键策略，包括 compaction、rewind、subagent 和开启新会话等实践。\",\"coverImage\":\"$undefined\"},{\"slug\":\"windsurf-2-agent-command-center-devin\",\"href\":\"/whatsup/tldr/hn-2026-p4/windsurf-2-agent-command-center-devin\",\"category\":\"tldr\",\"title\":\"Windsurf 2.0：用智能体指挥中心和 Devin 重构软件开发流程\",\"date\":\"2026-04-16\",\"excerpt\":\"Windsurf 2.0 将传统人机结对的智能 IDE 升级为统一指挥本地与云端多智能体的开发中枢，新引入 Agent Command Center、Spaces 和云端 Devin，实现从规划、委派到 PR 审阅的一体化工作流。\",\"coverImage\":\"$undefined\"},{\"slug\":\"future-of-ai-and-resistance\",\"href\":\"/whatsup/tldr/hn-2026-p4/future-of-ai-and-resistance\",\"category\":\"tldr\",\"title\":\"人工智能时代的停下与自救\",\"date\":\"2026-04-16\",\"excerpt\":\"文章从汽车重塑城市的类比出发，反思当下机器学习和大模型正在如何改变信息生态与社会结构，强调个人与集体对工具使用负责任的克制，呼吁减缓技术扩张，为社会与制度留出适应空间，并通过拒绝依赖与积极抵制来维护人的能力和良知。\",\"coverImage\":\"$undefined\"},{\"slug\":\"write-a-compiler-two-papers\",\"href\":\"/whatsup/tldr/hn-2026-p4/write-a-compiler-two-papers\",\"category\":\"tldr\",\"title\":\"写编译器？读完这两篇就够了\",\"date\":\"2026-04-16\",\"excerpt\":\"编译器不必从龙书开始，两篇经典教程就能带你入门，打破编译器很难写的神话。\",\"coverImage\":\"$undefined\"},{\"slug\":\"compute-advantages\",\"href\":\"/whatsup/tldr/hn-2026-p4/compute-advantages\",\"category\":\"tldr\",\"title\":\"算力优势：AI竞争的核心引擎\",\"date\":\"2026-04-16\",\"excerpt\":\"OpenAI深度分析AI竞争格局：ChatGPT性别差距已消失、中国AI投资以低成本优势追赶、算力成为核心战略资源并驱动正向飞轮效应。\",\"coverImage\":\"$undefined\"},{\"slug\":\"granular-convection-adaptive-running-shoe\",\"href\":\"/whatsup/tldr/hn-2026-p4/granular-convection-adaptive-running-shoe\",\"category\":\"tldr\",\"title\":\"颗粒对流技术打造自适应跑鞋\",\"date\":\"2026-04-16\",\"excerpt\":\"麻省理工学院副教授Skylar Tibbits利用颗粒对流效应开发自适应跑鞋中底，让跑鞋在使用过程中根据个人步态和压力点逐步优化性能，实现大规模生产的个性化适配\",\"coverImage\":\"$undefined\"},{\"slug\":\"xai-cursor-gpu-partnership\",\"href\":\"/whatsup/tldr/hn-2026-p4/xai-cursor-gpu-partnership\",\"category\":\"tldr\",\"title\":\"马斯克xAI向Cursor开放算力新布局\",\"date\":\"2026-04-16\",\"excerpt\":\"文章报道马斯克旗下xAI计划向代码智能初创公司Cursor出租大规模GPU算力，帮助其训练Composer 2.5模型，同时提升自身算力利用率、探索云服务式商业模式，并在激烈的AI算力军备竞赛中寻找新的盈利与合作路径。\",\"coverImage\":\"$undefined\"},{\"slug\":\"humanities-in-ai-era-legitimacy-crisis\",\"href\":\"/whatsup/tldr/hn-2026-p4/humanities-in-ai-era-legitimacy-crisis\",\"category\":\"tldr\",\"title\":\"AI时代文科的认知幻觉与出路\",\"date\":\"2026-04-15\",\"excerpt\":\"徐贲指出AI对文科的真正冲击不是能力替代，而是揭穿了文科长期依赖的认知幻觉——复杂性与困难性自动等于深度与价值。文科的核心出路在于跨界转型，承担真实判断及其后果。\",\"coverImage\":\"$undefined\"}],\"heatmapDateCounts\":{\"2026-04-25\":3,\"2026-04-24\":7,\"2026-04-23\":13,\"2026-04-22\":18,\"2026-04-21\":12,\"2026-04-20\":8,\"2026-04-19\":2,\"2026-04-18\":2,\"2026-04-17\":6,\"2026-04-16\":8,\"2026-04-15\":12,\"2026-04-14\":12,\"2026-04-13\":3,\"2026-04-12\":7,\"2026-04-11\":3,\"2026-04-10\":16,\"2026-04-09\":22,\"2026-04-08\":22,\"2026-04-07\":25,\"2026-04-06\":15,\"2026-04-05\":10,\"2026-04-04\":11,\"2026-04-03\":16,\"2026-04-02\":22,\"2026-04-01\":4,\"2026-03-31\":8,\"2026-03-30\":9,\"2026-03-29\":1,\"2026-03-28\":5,\"2026-03-27\":8,\"2026-03-26\":12,\"2026-03-25\":15,\"2026-03-24\":16,\"2026-03-23\":5,\"2026-03-22\":3,\"2026-03-21\":5,\"2026-03-20\":7,\"2026-03-19\":12,\"2026-03-18\":15,\"2026-03-17\":7,\"2026-03-16\":6,\"2026-03-15\":1,\"2026-03-14\":9,\"2026-03-13\":3,\"2026-03-12\":6,\"2026-03-11\":9,\"2026-03-10\":5,\"2026-03-09\":4,\"2026-03-08\":5,\"2026-03-07\":5,\"2026-03-06\":9,\"2026-03-05\":8,\"2026-03-04\":12,\"2026-03-03\":19,\"2026-03-02\":6,\"2026-03-01\":1,\"2026-02-28\":8,\"2026-02-27\":7,\"2026-02-26\":23,\"2026-02-25\":22,\"202
