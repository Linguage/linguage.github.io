"/whatsup/tldr/hn-2026-p3/notion-design-team-uses-claude-code-to-prototype\",\"category\":\"tldr\",\"title\":\"Notion设计团队如何用Claude Code实现代码优先原型设计\",\"date\":\"2025-05-13\",\"excerpt\":\"Notion设计师Brian Lovin搭建AI驱动的共享原型实验场，让设计团队用Claude Code将Figma设计转为可运行代码，实现代码优先的原型设计流程。\",\"coverImage\":\"$undefined\"},{\"slug\":\"microsoft-ai-vp-automates-everything-with-warp\",\"href\":\"/whatsup/tldr/hn-2026-p3/microsoft-ai-vp-automates-everything-with-warp\",\"category\":\"tldr\",\"title\":\"微软AI副总裁的微型代理自动化实践\",\"date\":\"2025-05-13\",\"excerpt\":\"微软AI副总裁Marco Casalaina分享如何利用Warp、Copilot和ChatGPT构建即用即弃的微型代理，实现从扫描文档到Azure管理的全面自动化。\",\"coverImage\":\"$undefined\"},{\"slug\":\"have-digital-giants-taken-control\",\"href\":\"/whatsup/tldr/hn-2026-p4/have-digital-giants-taken-control\",\"category\":\"tldr\",\"title\":\"数字巨头是否已掌控一切？\",\"date\":\"2025-04-16\",\"excerpt\":\"文章通过两位学者视角，剖析谷歌、亚马逊、Meta等数字巨头如何通过平台经济和网络效应形成垄断，及其与政治权力和学术研究之间的深层互动关系。\",\"coverImage\":\"$undefined\"},{\"slug\":\"cyber-attackers-targeting-digital-supply-chains\",\"href\":\"/whatsup/tldr/hn-2026-p3/cyber-attackers-targeting-digital-supply-chains\",\"category\":\"tldr\",\"title\":\"网络攻击者为何瞄准数字供应链\",\"date\":\"2025-04-09\",\"excerpt\":\"本文剖析了网络攻击者为何将矛头对准数字供应链，揭示开源代码漏洞、合作伙伴薄弱环节等核心风险，并探讨应对策略。\",\"coverImage\":\"$undefined\"},{\"slug\":\"plastics-recycling-toxic-relationship\",\"href\":\"/whatsup/tldr/hn-2026-p3/plastics-recycling-toxic-relationship\",\"category\":\"tldr\",\"title\":\"塑料与回收：一场有毒的关系\",\"date\":\"2025-04-02\",\"excerpt\":\"文章揭示了塑料回收体系中化学毒物累积、技术瓶颈与环境泄漏等深层问题，呼吁从源头减少塑料生产并重构循环经济模式。\",\"coverImage\":\"$undefined\"},{\"slug\":\"claude-interpretability-microscope\",\"href\":\"/whatsup/tldr/hn-2026-p3/claude-interpretability-microscope\",\"category\":\"tldr\",\"title\":\"追踪大语言模型的思维：Anthropic AI显微镜\",\"date\":\"2025-03-27\",\"excerpt\":\"Anthropic发布两篇论文介绍AI显微镜方法，通过追踪Claude 3.5 Haiku内部计算过程，发现其使用跨语言共享概念空间进行思考、会提前规划押韵词汇、以及可能为了迎合用户而编造推理等关键行为机制。\",\"coverImage\":\"$undefined\"},{\"slug\":\"context-mode-reduce-context-window\",\"href\":\"/whatsup/tldr/hn-2026-p3/context-mode-reduce-context-window\",\"category\":\"tldr\",\"title\":\"停止燃烧上下文窗口：解析 Context Mode\",\"date\":\"2025-02-20\",\"excerpt\":\"Context Mode 是一个 MCP 服务器，通过沙箱进程只捕获 stdout 而非原始数据，将工具输出压缩 98%，使 315KB 原始数据降至 5.4KB，Claude Code 会话时间从 30 分钟延长至 3 小时。\",\"coverImage\":\"$undefined\"},{\"slug\":\"cryptography-protection-quantum-era\",\"href\":\"/whatsup/tldr/hn-2026-p4/cryptography-protection-quantum-era\",\"category\":\"tldr\",\"title\":\"量子时代密码学：如何守护关键系统\",\"date\":\"2025-02-19\",\"excerpt\":\"量子计算对现有加密体系构成颠覆性威胁，各国政府需提前布局后量子密码学转型，通过NIST标准化算法、混合加密策略和系统性风险评估来保障数字主权。\",\"coverImage\":\"$undefined\"},{\"slug\":\"cognition-scott-wu-devin-ai-coding-agent\",\"href\":\"/whatsup/tldr/hn-2026-p4/cognition-scott-wu-devin-ai-coding-agent\",\"category\":\"tldr\",\"title\":\"华裔天才Scott Wu与Devin：AI编程自主智能体的崛起与争议\",\"date\":\"2025-01-06\",\"excerpt\":\"Cognition CEO Scott Wu, 28, builds Devin - a fully autonomous AI coding agent. Backed by 176 million at 2 billion valuation, the tool independently completes programming tasks, sparking both excitement and anxiety across the software industry.\",\"coverImage\":\"$undefined\"},{\"slug\":\"quantum-computing-and-ai-compatibility\",\"href\":\"/whatsup/tldr/hn-2026-p4/quantum-computing-and-ai-compatibility\",\"category\":\"tldr\",\"title\":\"量子计算与AI：兼容性不及预期\",\"date\":\"2024-10-09\",\"excerpt\":\"量子计算与AI的兼容性远低于预期，I/O瓶颈和概率性输出使其难以赋能深度学习，但两者可在工具栈中互补共存。\",\"coverImage\":\"$undefined\"},{\"slug\":\"advice-to-young-people-lies-i-tell-myself\",\"href\":\"/whatsup/tldr/hn-2026-p4/advice-to-young-people-lies-i-tell-myself\",\"category\":\"tldr\",\"title\":\"给年轻人的建议：我告诉自己的人生谎言\",\"date\":\"2024-06-01\",\"excerpt\":\"作者分享了自己的人生经验，探讨了如何通过主动选择、拓宽认知边界来创造运气，以及在求职和技能精进中保持高能动性的实用建议。\",\"coverImage\":\"$undefined\"},{\"slug\":\"supporting-mixtral-in-gpt-fast\",\"href\":\"/whatsup/tldr/hn-2026-p4/supporting-mixtral-in-gpt-fast\",\"category\":\"tldr\",\"title\":\"利用torch.compile优化Mixtral解码\",\"date\":\"2024-02-27\",\"
