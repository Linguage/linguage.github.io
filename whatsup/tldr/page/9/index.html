n-2026-p4/youtube-90-second-unskippable-ads-tv-viewers\",\"category\":\"tldr\",\"title\":\"YouTube向电视端推90秒不可跳过广告\",\"date\":\"2026-04-08\",\"excerpt\":\"YouTube开始向电视端用户推送90秒不可跳过的广告，以吸引传统电视广告商，此举引发观众强烈不满。\",\"coverImage\":\"$undefined\"},{\"slug\":\"online-shopping-email-spam\",\"href\":\"/whatsup/tldr/hn-2026-p4/online-shopping-email-spam\",\"category\":\"tldr\",\"title\":\"买一件商品收到十封邮件的网购困扰\",\"date\":\"2026-04-08\",\"excerpt\":\"文章揭示了网购体验中商家过度发送订单确认与物流邮件的现象，指出这种过度优化的营销策略反而降低了用户体验，并引用古德哈特定律进行了深刻反思。\",\"coverImage\":\"$undefined\"},{\"slug\":\"amazon-stops-support-for-old-kindles\",\"href\":\"/whatsup/tldr/hn-2026-p4/amazon-stops-support-for-old-kindles\",\"category\":\"tldr\",\"title\":\"亚马逊停止支持老旧Kindle设备引争议\",\"date\":\"2026-04-08\",\"excerpt\":\"亚马逊宣布将于2026年5月停止对2012年及更早发布的Kindle设备提供支持，用户将无法下载新书或重新注册，此举引发老用户对计划性废弃和破坏品牌信任的强烈不满。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ive-sold-out-oss-commercialization\",\"href\":\"/whatsup/tldr/hn-2026-p4/ive-sold-out-oss-commercialization\",\"category\":\"tldr\",\"title\":\"从开源到商业化：我的坚守与妥协\",\"date\":\"2026-04-08\",\"excerpt\":\"作者回顾了过往开源项目被收购闭源的惨痛经历。面对新项目pi受到资本追捧，他为了兼顾家庭与开源精神，最终选择加入Earendil团队，探索可持续的商业化道路。\",\"coverImage\":\"$undefined\"},{\"slug\":\"optimizing-dev-environment-for-coding-agents\",\"href\":\"/whatsup/tldr/hn-2026-p4/optimizing-dev-environment-for-coding-agents\",\"category\":\"tldr\",\"title\":\"优化AI编程智能体开发环境的实战指南\",\"date\":\"2026-04-08\",\"excerpt\":\"本文探讨了如何为AI编程智能体优化开发环境，强调通过提供基元、护栏和赋能器，使智能体像人类开发者一样获取工具和上下文，从而实现更自主、高效的代码编写。\",\"coverImage\":\"$undefined\"},{\"slug\":\"sam-altman-technical-shortcomings-exposed\",\"href\":\"/whatsup/tldr/hn-2026-p4/sam-altman-technical-shortcomings-exposed\",\"category\":\"tldr\",\"title\":\"奥特曼被曝缺乏AI基础技术能力\",\"date\":\"2026-04-08\",\"excerpt\":\"《纽约客》调查揭露OpenAI CEO萨姆·奥特曼缺乏编程与机器学习经验，其实际技术能力与外界塑造的AI先知形象严重不符，被内部视为擅长操弄权术的包装者。\",\"coverImage\":\"$undefined\"},{\"slug\":\"porting-mac-os-x-to-nintendo-wii\",\"href\":\"/whatsup/tldr/hn-2026-p4/porting-mac-os-x-to-nintendo-wii\",\"category\":\"tldr\",\"title\":\"将Mac OS X移植到任天堂Wii\",\"date\":\"2026-04-08\",\"excerpt\":\"本文详细记录了作者将Mac OS X 10.0移植到任天堂Wii的过程，涵盖硬件可行性分析、定制引导加载程序开发、内核二进制补丁追踪以及驱动编写的完整技术探索。\",\"coverImage\":\"$undefined\"},{\"slug\":\"phone-blue-light-sleep-myth\",\"href\":\"/whatsup/tldr/hn-2026-p4/phone-blue-light-sleep-myth\",\"category\":\"tldr\",\"title\":\"手机蓝光破坏睡眠是个伪命题\",\"date\":\"2026-04-08\",\"excerpt\":\"手机蓝光并非破坏睡眠的罪魁祸首，真正影响睡眠的是全天光照总剂量，白天充足光照比夜间屏蔽蓝光更关键。\",\"coverImage\":\"$undefined\"},{\"slug\":\"extreme-harness-engineering-agent-era\",\"href\":\"/whatsup/tldr/hn-2026-p4/extreme-harness-engineering-agent-era\",\"category\":\"tldr\",\"title\":\"极致Agent工程：百万行代码零人工编写的实验\",\"date\":\"2026-04-08\",\"excerpt\":\"OpenAI工程师Ryan Lopopolo分享其团队五个月零人工编写代码的极端实验，揭示以Agent可读性为核心的工程范式如何重塑软件开发流程。\",\"coverImage\":\"$undefined\"},{\"slug\":\"us-iran-provisional-ceasefire-agreement\",\"href\":\"/whatsup/tldr/hn-2026-p4/us-iran-provisional-ceasefire-agreement\",\"category\":\"tldr\",\"title\":\"美伊达成两周临时停火协议\",\"date\":\"2026-04-08\",\"excerpt\":\"在巴基斯坦斡旋下，美伊达成为期两周的有条件停火协议，霍尔木兹海峡临时重开，全球金融市场迎来短暂反弹。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ice-spyware-graphite-privacy\",\"href\":\"/whatsup/tldr/hn-2026-p4/ice-spyware-graphite-privacy\",\"category\":\"tldr\",\"title\":\"美国ICE承认使用间谍软件监控加密通信\",\"date\":\"2026-04-08\",\"excerpt\":\"美国移民海关执法局承认使用强大的间谍软件监控加密信息，旨在打击芬太尼贩运，但引发了严重的隐私侵犯与法律监管争议。\",\"coverImage\":\"$undefined\"},{\"slug\":\"cities-rejecting-flock-surveillance-technology\",\"href\":\"/whatsup/tldr/hn-2026-p4/cities-rejecting-flock-surveillance-technology\",\"category\":\"tldr\",\"title\":\"美国城市为何抛弃Flock监控技术\",\"date\":\"2026-04-08\",\"excerpt\":\"美国多座城市因隐私担忧和数据共享争议，纷纷终止与Flock Safety的监控合同，揭示AI车牌识别技术的滥用风险。\",\"coverImage\":\"$undefined\"},{\"slug\":\"us-iran-strategic-failure-analysis\",\"href\":\"/whatsup/tldr/hn-2026-p4/us-iran-strategic-failure-analysis\",\"category\":\"tldr\",\"title\":\"评美国接受伊朗和平计划的战略失误\",\"date\":\"2026-04-08\",\"excerpt\":\"本文分析了特朗普政府接受伊朗十点和平计划的事件，指出这标志着美国中东战略的彻底失败，并对
