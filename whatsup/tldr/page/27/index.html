fined\"},{\"slug\":\"anthropic-distillation-swe-bench-dead\",\"href\":\"/whatsup/tldr/hn-2026-p3/anthropic-distillation-swe-bench-dead\",\"category\":\"tldr\",\"title\":\"蒸馏攻击与基准失效\",\"date\":\"2026-02-27\",\"excerpt\":\"本文记录了一场关于模型蒸馏、SWE-Bench基准测试失效以及AI模型如何在测试中作弊的深度讨论，参与者包括Nathan Lambert和Sebastian Raschka等AI领域专家。\",\"coverImage\":\"$undefined\"},{\"slug\":\"dexit-ai-capex-prediction-markets-adulthood\",\"href\":\"/whatsup/tldr/hn-2026-p3/dexit-ai-capex-prediction-markets-adulthood\",\"category\":\"tldr\",\"title\":\"特拉华企业外迁真相与AI杰文斯效应\",\"date\":\"2026-02-27\",\"excerpt\":\"a16z本周图表综述，探讨特拉华州企业外迁真相、AI成本下降与用量激增的杰文斯效应、天量AI资本开支、Kalshi预测市场优于专业预测者、以及30岁成年人生活里程碑延迟等五大议题。\",\"coverImage\":\"$undefined\"},{\"slug\":\"fracturing-sculpts-tissues-organs\",\"href\":\"/whatsup/tldr/hn-2026-p3/fracturing-sculpts-tissues-organs\",\"category\":\"tldr\",\"title\":\"破而后立：断裂如何塑造组织和器官\",\"date\":\"2026-02-27\",\"excerpt\":\"本文揭示了一个令人惊叹的生物学发现：胚胎和组织通过受控的断裂过程来塑造自身结构。从小鼠胚胎到斑马鱼心脏，断裂不是破坏，而是生命构建的重要机制。\",\"coverImage\":\"$undefined\"},{\"slug\":\"december-2025-ai-coding-turning-point\",\"href\":\"/whatsup/tldr/hn-2026-p3/december-2025-ai-coding-turning-point\",\"category\":\"tldr\",\"title\":\"2025年12月AI编程的转折点\",\"date\":\"2026-02-26\",\"excerpt\":\"2025年12月标志着AI编程领域的历史性转折点，Opus 4.5、Gemini 3和GPT 5.2相继发布，编码代理从脆弱演示走向可持续的长周期任务完成，行业普遍感受到编程范式正在发生根本性变化。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-agents-cloud-computing-future\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-agents-cloud-computing-future\",\"category\":\"tldr\",\"title\":\"AI代理与云端计算机的未来\",\"date\":\"2026-02-26\",\"excerpt\":\"探讨AI代理如何推动云端开发环境普及，分析历史挑战与当前技术突破，展望软件工程的未来形态。\",\"coverImage\":\"$undefined\"},{\"slug\":\"infinite-healthcare-ai-abundant-care\",\"href\":\"/whatsup/tldr/hn-2026-p3/infinite-healthcare-ai-abundant-care\",\"category\":\"tldr\",\"title\":\"AI如何让医疗消费从稀缺走向无限\",\"date\":\"2026-02-26\",\"excerpt\":\"a16z发文论证AI将打破医疗的人力瓶颈，释放无限护理供给，并呼吁重建定价模型以实现全民健康的系统性变革。\",\"coverImage\":\"$undefined\"},{\"slug\":\"parallel-spec-exploration-
