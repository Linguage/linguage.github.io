up/tldr/hn-2026-p3/ai-hiring-bias-algorithmic-fairness\",\"category\":\"tldr\",\"title\":\"AI招聘的偏见陷阱：算法如何复制历史不公\",\"date\":\"2025-12-15\",\"excerpt\":\"AI招聘工具未能消除偏见，反而放大了历史数据中的不公。文章通过案例揭示算法偏见的根源，并提出改进建议。\",\"coverImage\":\"$undefined\"},{\"slug\":\"death-of-the-scientist\",\"href\":\"/whatsup/tldr/hn-2026-p3/death-of-the-scientist\",\"category\":\"tldr\",\"title\":\"AI时代科学家的消亡：科学知识的本质之问\",\"date\":\"2025-12-11\",\"excerpt\":\"文章以AlphaFold预测蛋白质结构为切入点，追问AI是否能取代科学家乃至终结科学本身。作者认为科学并非可自动化的方法论步骤，而是依托主观体验与主体间共识的文化系统，AI缺乏真正的意识与理解，无法复制科学知识生产的深层机制。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-affecting-quality-of-factual-information\",\"href\":\"/whatsup/tldr/hn-2026-p4/ai-affecting-quality-of-factual-information\",\"category\":\"tldr\",\"title\":\"AI时代的事实信息危机\",\"date\":\"2025-12-09\",\"excerpt\":\"生成式AI大幅降低了信息操纵门槛，深度伪造攻击每五分钟发生一次，AI聊天机器人传播虚假信息的比率从18%升至35%，信息生态系统正经历深刻变革。\",\"coverImage\":\"$undefined\"},{\"slug\":\"mit-dream-hotel-communal-dreams\",\"href\":\"/whatsup/tldr/hn-2026-p3/mit-dream-hotel-communal-dreams\",\"category\":\"tldr\",\"title\":\"MIT梦境旅馆：当科学与艺术共筑集体梦境\",\"date\":\"2025-12-03\",\"excerpt\":\"MIT校友打造的梦境旅馆装置通过光、声、运动等感官刺激引导多位睡眠者进入共同梦境，探索艺术与梦境工程的交叉前沿。\",\"coverImage\":\"$undefined\"},{\"slug\":\"combating-deepfakes-regulation-and-awareness\",\"href\":\"/whatsup/tldr/hn-2026-p4/combating-deepfakes-regulation-and-awareness\",\"category\":\"tldr\",\"title\":\"深度伪造之殇：如何抵御数字时代的操纵\",\"date\":\"2025-12-02\",\"excerpt\":\"文章探讨深度伪造的定义、危害与法律应对，指出96%的深度伪造视频涉及性内容且主要针对女性，并分析欧盟AI法案及各国立法在打击数字伪造方面的进展与不足。\",\"coverImage\":\"$undefined\"},{\"slug\":\"space-critical-technologies-public-private-partnerships\",\"href\":\"/whatsup/tldr/hn-2026-p3/space-critical-technologies-public-private-partnerships\",\"category\":\"tldr\",\"title\":\"太空经济转型：公私合作驱动关键新兴技术\",\"date\":\"2025-11-19\",\"excerpt\":\"探讨太空经济转型背景下，公私合作如何推动关键与新兴技术发展，以及全球主要经济体的战略竞争态势。\",\"coverImage\":\"$undefined\"},{\"slug\":\"llm-arithmetic-and-machine-cognition\",\"href\":\"/whatsup/tldr/hn-2026-p4/llm-arithmetic-and-machine-cognition\",\"category\":\"tldr\",\"title\":\"LLM做加法背后的机器认知之谜\",\"date\":\"2025-10-29\",\"excerpt\":\"文章通过分析大语言模型计算2加2的过程，揭示其并非真正进行算术推理，而是通过高维向量空间中的模式匹配与语言连贯性来输出结果，探讨了机器与人类认知的相似性及反智现象。\",\"coverImage\":\"$undefined\"},{\"slug\":\"advances-in-space-photovoltaics\",\"href\":\"/whatsup/tldr/hn-2026-p3/advances-in-space-photovoltaics\",\"category\":\"tldr\",\"title\":\"太空光伏技术：从卫星驱动的超轻高效可折叠革命\",\"date\":\"2025-10-14\",\"excerpt\":\"文章回顾了光伏技术从太空到地面再回归太空的发展历程，探讨了超轻高效可折叠太阳能电池的未来应用前景。\",\"coverImage\":\"$undefined\"},{\"slug\":\"world-cup-balls-history-evolution\",\"href\":\"/whatsup/tldr/hn-2026-p3/world-cup-balls-history-evolution\",\"category\":\"tldr\",\"title\":\"世界杯足球百年进化史：从T-model到TRIONDA\",\"date\":\"2025-10-01\",\"excerpt\":\"本文追溯了从1930年第一届世界杯到2026年的所有官方比赛用球，详细介绍了每届世界杯用球的设计特点、技术创新和历史故事，特别强调了1970年adidas成为官方供应商后足球设计的重要变革。\",\"coverImage\":\"$undefined\"},{\"slug\":\"why-over-engineering-happens\",\"href\":\"/whatsup/tldr/hn-2026-p4/why-over-engineering-happens\",\"category\":\"tldr\",\"title\":\"软件工程中的过度设计陷阱\",\"date\":\"2025-10-01\",\"excerpt\":\"文章深入剖析了软件工程中过度设计现象的成因与代价，强调架构应匹配实际需求而非盲目追求复杂技术栈。\",\"coverImage\":\"$undefined\"},{\"slug\":\"8-hour-work-system-outdated\",\"href\":\"/whatsup/tldr/hn-2026-p3/8-hour-work-system-outdated\",\"category\":\"tldr\",\"title\":\"8小时工作制早该被淘汰了\",\"date\":\"2025-09-05\",\"excerpt\":\"本文通过数据和理论分析，揭示了现代打工人工作时间过长的问题。凯恩斯曾预测2030年人类每周只需工作15小时，但现实是中国工人平均每周工作49小时，成为全球工作时间最长的国家之一。文章从客观工作时间、主观时间失控感、资本主义劳动异化等角度，剖析了科技进步为何未能带来更多休闲时间。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-costco-succeeded-in-japan\",\"href\":\"/whatsup/tldr/hn-2026-p4/how-costco-succeeded-in-japan\",\"category\":\"tldr\",\"title\":\"Costco在日本市场的本土化成功策略\",\"date\":\"2025-08-29\",\"excerpt\":\"本文深入分析了好市多如何通过调整房地产策略、仓储设计和商品组合，成功打破外资零售困境，成为日本极具影响力的仓储式超市。\",\"coverImage\":\"$undefined\"},{\"slug\":\"china-iran-foreign-policy-strategy\",\"href\":\"/whatsup/tldr/hn-2026-p3/china-iran-foreign-policy-strategy\",\"category\":\"tldr\",\"title\":\"中国对伊朗政策透视其外交战略\",\"date\":
