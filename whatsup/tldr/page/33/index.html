26-p3/how-claude-code-was-built\",\"category\":\"tldr\",\"title\":\"Claude Code 创作者谈为未来模型构建产品\",\"date\":\"2026-02-17\",\"excerpt\":\"Anthropic工程师Boris Cherny分享Claude Code从意外原型到变革性AI编程工具的完整历程，阐述为未来模型构建的产品哲学、多智能体系统的涌现能力，以及终端界面的意外成功。\",\"coverImage\":\"$undefined\"},{\"slug\":\"inferencex-v2-nvidia-blackwell-amd-hopper-benchmark\",\"href\":\"/whatsup/tldr/hn-2026-p3/inferencex-v2-nvidia-blackwell-amd-hopper-benchmark\",\"category\":\"tldr\",\"title\":\"InferenceX v2: NVIDIA Blackwell与AMD推理基准全面对决\",\"date\":\"2026-02-17\",\"excerpt\":\"SemiAnalysis发布InferenceX v2基准测试，全面对比NVIDIA Blackwell与AMD MI355X等GPU在大规模MoE推理中的性能与经济性表现。\",\"coverImage\":\"$undefined\"},{\"slug\":\"regenerative-aquaculture-arkansas-mit-d-lab\",\"href\":\"/whatsup/tldr/hn-2026-p3/regenerative-aquaculture-arkansas-mit-d-lab\",\"category\":\"tldr\",\"title\":\"MIT学生探索再生水产养殖的阿肯色实践\",\"date\":\"2026-02-17\",\"excerpt\":\"MIT工科学生通过D-Lab计划与阿肯色州养鱼场合作，探索再生水产养殖模式的实践案例\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-model-cuts-protein-drug-costs\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-model-cuts-protein-drug-costs\",\"category\":\"tldr\",\"title\":\"MIT用大语言模型优化蛋白质药物生产\",\"date\":\"2026-02-17\",\"excerpt\":\"MIT研究人员开发了一种基于大语言模型的AI工具，通过优化工业酵母的密码子序列，显著提升蛋白质药物生产效率，可降低生物制药15-20%的开发成本。\",\"coverImage\":\"$undefined\"},{\"slug\":\"eco-design-solar-photovoltaic-sustainability\",\"href\":\"/whatsup/tldr/hn-2026-p3/eco-design-solar-photovoltaic-sustainability\",\"category\":\"tldr\",\"title\":\"光伏生态设计：环境效益与发电效率的协同路径\",\"date\":\"2026-02-17\",\"excerpt\":\"文章探讨光伏电站生态设计策略，指出简单设计调整即可在成本增幅低于0.1%的前提下降低1%-13%的环境影响，并提出基于影响力和可转移性的生态设计杠杆分类框架。\",\"coverImage\":\"$undefined\"},{\"slug\":\"factory-economics-primer-for-startups\",\"href\":\"/whatsup/tldr/hn-2026-p3/factory-economics-primer-for-startups\",\"category\":\"tldr\",\"title\":\"创业公司工厂经济学入门指南\",\"date\":\"2026-02-17\",\"excerpt\":\"a16z合伙人撰写的工厂经济学入门指南，面向从产品公司转型为制造型创业公司的创始人，系统讲解成本结构、良率管理和资本策略。\",\"coverImage\":\"$undefined\"},{\"slug\":\"wuthering-heights-fennell-roundtable\"
