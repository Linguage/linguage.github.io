6\",\"excerpt\":\"Nature报道2026年Sony女性技术奖三位获奖者：密歇根大学化学工程师Xiwen Gong研究钙钛矿太阳能电池稳定性，MIT生物医学工程师Ellen Roche开发可植入医疗设备辅助心脏衰竭患者，密歇根大学外科医生Zhen Xu发明无创超声手术技术组织消融术。文章强调女性科研成就离不开导师网络和跨学科合作的支持。\",\"coverImage\":\"$undefined\"},{\"slug\":\"copy-paste-errors-in-scientific-datasets\",\"href\":\"/whatsup/tldr/hn-2026-p4/copy-paste-errors-in-scientific-datasets\",\"category\":\"tldr\",\"title\":\"科学数据集中普遍存在的复制粘贴错误\",\"date\":\"2026-03-06\",\"excerpt\":\"本文作者 Markus Englund 开发了一款专用软件，用于扫描公开科学数据集中的复制粘贴错误。通过对 600 篇已发表论文的 Excel 数据文件进行系统检测，共发现 18 例存在严重疑虑的案例，错误率约为 3%。这些错误涵盖从无意的操作失误到疑似蓄意造假的数据篡改，其中包括一篇帕金森病领域被引超 3000 次的里程碑论文，揭示了当前科学数据审查机制的严重缺失。\",\"coverImage\":\"$undefined\"},{\"slug\":\"anthropic-department-war-current-stand\",\"href\":\"/whatsup/tldr/hn-2026-p3/anthropic-department-war-current-stand\",\"category\":\"tldr\",\"title\":\"Anthropic与美国国防部争议现状\",\"date\":\"2026-03-05\",\"excerpt\":\"Anthropic CEO Dario Amodei回应美国国防部将公司列为供应链风险，表示将在法庭上挑战这一决定，同时承诺继续为军方提供AI支持，强调双方在国家安全领域的共同立场。\",\"coverImage\":\"$undefined\"},{\"slug\":\"building-claude-code-with-boris-cherny\",\"href\":\"/whatsup/tldr/hn-2026-p3/building-claude-code-with-boris-cherny\",\"category\":\"tldr\",\"title\":\"Claude Code 之父谈 AI 编程工具的构建与工程师角色重塑\",\"date\":\"2026-03-05\",\"excerpt\":\"Anthropic Claude Code 创造者 Boris Cherny 分享 AI 编程工具的构建理念、并行 Agent 工作流以及软件工程师角色在 AI 时代的演变趋势。\",\"coverImage\":\"$undefined\"},{\"slug\":\"jared-isaacman-nasa-force-initiative\",\"href\":\"/whatsup/tldr/hn-2026-p3/jared-isaacman-nasa-force-initiative\",\"category\":\"tldr\",\"title\":\"NASA局长宣布NASA Force计划重建核心能力\",\"date\":\"2026-03-05\",\"excerpt\":\"NASA局长Jared Isaacman宣布NASA Force计划，旨在重建NASA核心人员能力，加速重返月球并建立永久基地。\",\"coverImage\":\"$undefined\"},{\"slug\":\"pro-worker-ai-design-principles\",\"href\":\"/whatsup/tldr/hn-2026-p3/pro-worker-ai-design-principles\",\"category\":\"tldr\",\"title\":\"亲工人AI不会自然发生，企业需要主动行动\",\"date\":\"2026-03-05\",\"excerpt\":\"MIT经济学家探讨如何构建增强而非替代工人的AI系统，分析当前自动化倾向的三大障碍，并提出五个设计原则来支持工人能力发展。\",\"coverImage\":\"$undefined\"},{
