能直接关联，逻辑清晰地推论出模型因思考被削弱而采取廉价策略的因果关系。\n\n最后，文章将这一事件置于Anthropic近期频发的公关危机背景下，包括此前截断解释争议、令牌用量异常飙升及源代码泄露等。Laurenzo提出的增加透明度和设立深度思考付费层的建议，也触及了AI商业化中定价与模型能力匹配的深层行业痛点。\n\n## 核心概念及解读\n**停止钩子违规**：模型在未完成任务时过早停止或逃避责任的违规行为，是衡量AI变懒的关键指标。\n\n**思考内容隐藏**：Claude Code默认隐藏API响应中的推理过程，导致用户无法监控模型实际思考深度。\n\n**廉价行动**：模型在思考不充分时倾向于采取的省力策略，如不读代码直接修改或选择最简单的修复方案。\n\n**深度思考定价**：按实际消耗的思考令牌数量分级收费的商业模型，以满足复杂工程工作流的需求。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Claude Code has become dumber, lazier: AMD director](https://www.theregister.com/2026/04/06/anthropic_claude_code_dumber_lazier_amd_ai_director/) |\n| 作者 | Brandon Vigliarolo |\n| 发表日期 | 2026-04-07 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"claude-code-performance-degradation-amd-director\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"claude-code-performance-degradation-amd-director\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"claude-code-performance-degradation-amd-director\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/claude-code-performance-degradation-amd-director\",\"href\":\"/whatsup/tldr/hn-2026-p4/claude-code-performance-degradation-amd-director\",\"category\":\"tldr\",\"title\":\"AMD总监称Claude Code变笨变懒\",\"date\":\"2026-04-07\",\"excerpt\":\"AMD AI总监通过海量数据分析指出，Claude Code自三月初以来出现严重的变笨变懒现象，可能与隐藏思考过程有关，其团队已转用其他AI工具。\",\"coverImage\":\"$undefined\",\"author\":\"Brandon Vigliarolo\",\"original\":\"Claude Code has become dumber, lazier AMD director 1.md\",\"originalUrl\":\"https://www.theregister.com/2026/04/06/anthropic_claude_code_dumber_lazier_amd_ai_director/\",\"score\":\"82\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"AMD总监称Claude Code变笨变懒\",\"excerpt\":\"AMD AI总监通过海量数据分析指出，Claude Code自三月初以来出现严重的变笨变懒现象，可能与隐藏思考过程有关，其团队已转用其他AI工具。\",\"date\":\"2026-04-07\",\"categor
