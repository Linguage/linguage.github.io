指向技术透明神话。他认为民主的基石不是透明，而是合法化的中介者——教师、医生、科学家、政治家等，这些角色承载着历史积淀的知识，为社会多样性提供共存框架。他批评了当代对权威的普遍蔑视，指出这将助长威权主义的回归。文章最后分析了细分（segmentation）现象，认为这是个人主义在缺乏宏大共同体目标时的异化，而资本主义将每个人视为独立市场的逻辑加剧了这一趋势，若社群不与更大社会对话，就会滑向社群主义。\n\n## 核心概念及解读\n**沟通即协商**：沟通不是自然发生的，而是与异质他者不断调整、妥协的艰难过程，误沟通是常态而非失败。\n\n**误沟通与沟通中断**：误沟通是决定性的转折点——要么走向协商共存，要么走向关系断裂乃至战争。\n\n**中介者的合法性**：教师、政治家等中介者是民主的基石，他们组织多元观点的共存，其合法性源于历史积淀的知识而非技术效率。\n\n**细分的陷阱**：极端个人主义在缺乏共同目标时固化为细分，资本主义将每个人变成独立市场，最终导致社会解体。\n\n**技术透明幻象**：更多信息不等于更多真相，更多渠道不等于更好理解；透明是手段而非目的，去除中介反而使权力斗争更难监督。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [In the era of hyper-connectivity and ultra-segmentation, how do you actually reach people?](https://www.polytechnique-insights.com/en/columns/society/in-the-era-of-hyper-connectivity-and-ultra-segmentation-how-can-we-best-communicate/?utm_source=brevo\u0026utm_campaign=newsletter201en\u0026utm_medium=email\u0026utm_id=160) |\n| 作者 | Dominique Wolton |\n| 发表日期 | 2026-04-07 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"e:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"hyper-connectivity-ultra-segmentation-communication-negotiation\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"hyper-connectivity-ultra-segmentation-communication-negotiation\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"hyper-connectivity-ultra-segmentation-communication-negotiation\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/hyper-connectivity-ultra-segmentation-communication-negotiation\",\"href\":\"/whatsup/tldr/hn-2026-p4/hyper-connectivity-ultra-segmentation-communication-negotiation\",\"category\":\"tldr\",\"title\":\"超连接时代的沟通困境：协商而非传递\",\"date\":\"2026-04-07\",\"excerpt\":\"法国社会学家多米尼克·沃尔顿指出，真正的沟通不是信息传递，而是充满冲突与妥协的协商过程；在过度连接与极端分化的时代，重建对中介者的信任比追求技术透明更为重要。\",\"coverImage\":\"$undefined\",\"author\":\"Dominique Wolton\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"
