从精英掌控中解放民众的工具。这种技术乐观主义与对科学建制的敌视并存，构成独特的意识形态组合。结尾指出此现象非美国独有，匈牙利和法国均有类似动向。\n\n## 核心概念及解读\n**科学信任极化**：美国两党对科学界的信任度在2000年前后发生逆转，2020年后进一步加剧。\n\n**技术民粹主义**：MAGA运动反对科学建制但狂热拥抱数字技术，视其为对抗精英的工具。\n\n**文化战争叙事**：福克斯新闻等媒体将大学描绘为进步派精英的庇护所，加剧反智情绪。\n\n**学术多元性缺失**：社科领域过度聚焦种族/性别议题，忽视经济不平等与产业空心化等基层关切。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Why have MAGA voters lost trust in the scientific community?](https://www.polytechnique-insights.com/en/columns/society/why-have-maga-voters-lost-trust-in-the-scientific-community/?utm_source=brevo\u0026utm_campaign=newsletter201en\u0026utm_medium=email\u0026utm_id=158) |\n| 作者 | Olivier Nay |\n| 发表日期 | 2026-03-31 |\n| 评分 | 84/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"maga-voters-trust-scientific-community\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"maga-voters-trust-scientific-community\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"maga-voters-trust-scientific-community\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/maga-voters-trust-scientific-community\",\"href\":\"/whatsup/tldr/hn-2026-p4/maga-voters-trust-scientific-community\",\"category\":\"tldr\",\"title\":\"MAGA选民为何不信科学界\",\"date\":\"2026-03-31\",\"excerpt\":\"剖析美国MAGA选民对科学界信任下降的三大根源：反监管的自由意志主义、极端保守福音派、以及视科学为精英主义的知识民粹主义，并指出其悖论性的技术乐观主义。\",\"coverImage\":\"$undefined\",\"author\":\"Olivier Nay\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"84\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"MAGA选民为何不信科学界\",\"author\":\"Olivier Nay\",\"date\":\"2026-03-31\",\"excerpt\":\"剖析美国MAGA选民对科学界信任下降的三大根源：反监管的自由意志主义、极端保守福音派、以及视科学为精英主义的知识民粹主义，并指出其悖论性的技术乐观主义。\",\"source_url\":\"https://www.polytechnique-insights.com/en/columns/society/why-have-maga-voters-lost-trust-in-the-scientific-community/?utm_source=brevo\u0026utm
