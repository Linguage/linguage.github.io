tatic/chunks/197-f7c33a0114fc3db3.js\",\"373\",\"static/chunks/373-816263e744b1a0a1.js\",\"738\",\"static/chunks/738-b97c8b45db2c8cb9.js\",\"48\",\"static/chunks/app/%5B...slug%5D/page-b39f4036a39e3cb5.js\"],\"default\"]\n19:T1607,"])</script><script>self.__next_f.push([1,"\n# DeepSeek 推出 V4 新模型，深度适配华为芯片，彰显中国 AI 自主化决心\n\n## 摘要\n\n中国 AI 初创公司 DeepSeek 于 2026 年 4 月 24 日发布了备受期待的新模型 V4 预览版，该模型针对华为昇腾芯片进行了深度优化。这一举措标志着 DeepSeek 从过去依赖英伟达芯片转向以国产硬件为核心，被业界视为中国 AI 产业走向技术自主的重要里程碑。V4 在开源模型的世界知识基准测试中表现领先，整体性能仅次于谷歌的闭源模型 Gemini-Pro-3.1，并以极低的算力成本支持超过百万个 token 的上下文处理能力。 [reuters](https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter)\n\n## 内容框架与概述\n\nDeepSeek V4 的发布标志着该公司与华为展开深度合作，实现了对英伟达芯片依赖的战略转移。华为昇腾芯片参与了 V4 部分训练过程，半导体研究机构 Omdia 的分析师 He Hui 指出，这证明了中国顶级 AI 模型已经能够在国产硬件上运行。V4 上线后迅速成为开发者平台 Hugging Face 上趋势榜第一，显示出强劲的市场吸引力。在美国出口管制持续升级的背景下，这一合作对英伟达的中国市场生态造成了潜在冲击，英伟达 CEO 黄仁勋本月早些时候明确表示，若 DeepSeek 优先选择华为，对美国而言将是极为不利的结局。 [reuters](https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter)\n\n从技术层面看，DeepSeek V4 具备多项显著优势，同时也存在一定局限。该模型尤其适合处理 AI 智能体任务，即能够执行比普通聊天机器人更复杂的指令，但需要更多算力支撑。V4 可处理超过 100 万个 token 的超长上下文，与 OpenAI GPT-5.4 及 Anthropic Claude Opus 4.6 处于同一量级，但所需算力仅为同类模型的一小部分。值得注意的是，V4 目前不支持图像、视频等多模态输入，部分独立工程师也提醒需等待更多真实场景测试才能对基准评分作出定论。 [reuters](https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter)\n\n在商业与地缘政治维度，DeepSeek V4 的发布恰逢中美科技博弈白热化之际。就在发布前一天，白宫正式指控中国大规模窃取美国 AI 实验室的知识产权，特朗普总统也计划于下月访问北京会见习近平。在国内市场，DeepSeek 一年前曾迅速崛起为国民级 AI 明星，但随后面临智谱 AI、MiniMax 等本土竞争者的激烈挑战。V4 发布当日，上述竞争对手股价均下跌约 9%，而 DeepSeek 母公司幻方量化正寻求以超过 200 亿美元的估值融资，阿里巴巴与腾讯据报均在洽谈入股事宜。 [reuters](https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter)\n\n## 核心概念及解读\n\n**昇腾芯片 (Ascend Chips)**：华为自主研发的 AI 加速芯片系列，是中国目前最具竞争力的英伟达国产替代方案。DeepSeek V4 与其深度适配，象征着国产算力生态的重要突破。 [reuters](https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter)\n\n**开源模型 (Open-source Model)**：指权重和代码对外公开、允许用户自行部署和修改的 AI 模型，与谷歌、OpenAI 等公司的闭源产品相对。DeepSeek 始终坚持开源策略，使其模型在全球开发者社区保持高度活跃。 [reuters](https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter)\n\n**AI 智能体 (AI Agent)**：能够自主规划、调用工具并执行多步骤复杂任务的 AI 系统，能力远超传统对话式聊天机器人，但对算力和上下文长度要求更高。DeepSeek 特别强调 V4 在该场景下的优势。 [reuters](https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter)\n\n**上下文窗口 (Context Window)**：模型在单次推理中能处理的最大文本长度，以 token 为单位。V4 支持超过 100 万 token 的超长上下文，与业界顶级闭源模型相当，但成本大幅降低。 [reuters](https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter)\n\n**出口管制 (Export Controls)**：美国政府限制向中国出售先进半导体芯片的系列政策措施。正是这一背景推动了中国加速 AI 硬件自主化，也使 DeepSeek 转向华为的战略选择具有深远的产业意义。 [reuters](https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter)\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [DeepSeek unveils new AI model tailored for Huawei chips as China pushes for tech autonomy](https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/) |\n| 作者 | Eduardo Baptista、Ethan Wang、Che Pan |\n| 发布日期 | 2026 年 4 月 24 日 |\n"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"deepseek-unveils-new-ai-model-tailored-for-huawei-chips-as-china-pushes-for-tech-autonomy\" \":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"中国 AI 初创公司 DeepSeek 于 2026 年 4 月 24 日发布了备受期待的新模型 V4 预览版，该模型针对华为昇腾芯片进行了深度优化。这一举措标志着 DeepSeek 从过去依赖英伟达芯片转向以国产硬件为核心，被业界视为中国 AI 产业走向技术自主的重要里程碑。V4 在开源模型的世界知识基准测试中表现领先，整体性能仅次于谷歌的闭源模型 Gemini-Pro-3.1，并以极低的算力成本支持超过百万个 token 的上下文处理能力。 \",[\"$\",\"a\",null,{\"href\":\"https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter\",\"children\":\"reuters\"}]]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"DeepSeek V4 的发布标志着该公司与华为展开深度合作，实现了对英伟达芯片依赖的战略转移。华为昇腾芯片参与了 V4 部分训练过程，半导体研究机构 Omdia 的分析师 He Hui 指出，这证明了中国顶级 AI 模型已经能够在国产硬件上运行。V4 上线后迅速成为开发者平台 Hugging Face 上趋势榜第一，显示出强劲的市场吸引力。在美国出口管制持续升级的背景下，这一合作对英伟达的中国市场生态造成了潜在冲击，英伟达 CEO 黄仁勋本月早些时候明确表示，若 DeepSeek 优先选择华为，对美国而言将是极为不利的结局。 \",[\"$\",\"a\",null,{\"href\":\"https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter\",\"children\":\"reuters\"}]]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"从技术层面看，DeepSeek V4 具备多项显著优势，同时也存在一定局限。该模型尤其适合处理 AI 智能体任务，即能够执行比普通聊天机器人更复杂的指令，但需要更多算力支撑。V4 可处理超过 100 万个 token 的超长上下文，与 OpenAI GPT-5.4 及 Anthropic Claude Opus 4.6 处于同一量级，但所需算力仅为同类模型的一小部分。值得注意的是，V4 目前不支持图像、视频等多模态输入，部分独立工程师也提醒需等待更多真实场景测试才能对基准评分作出定论。 \",[\"$\",\"a\",null,{\"href\":\"https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter\",\"children\":\"reuters\"}]]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"在商业与地缘政治维度，DeepSeek V4 的发布恰逢中美科技博弈白热化之际。就在发布前一天，白宫正式指控中国大规模窃取美国 AI 实验室的知识产权，特朗普总统也计划于下月访问北京会见习近平。在国内市场，DeepSeek 一年前曾迅速崛起为国民级 AI 明星，但随后面临智谱 AI、MiniMax 等本土竞争者的激烈挑战。V4 发布当日，上述竞争对手股价均下跌约 9%，而 DeepSeek 母公司幻方量化正寻求以超过 200 亿美元的估值融资，阿里巴巴与腾讯据报均在洽谈入股事宜。 \",[\"$\",\"a\",null,{\"href\":\"https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter\",\"children\":\"reuters\"}]]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"昇腾芯片 (Ascend Chips)\"}],\"：华为自主研发的 AI 加速芯片系列，是中国目前最具竞争力的英伟达国产替代方案。DeepSeek V4 与其深度适配，象征着国产算力生态的重要突破。 \",[\"$\",\"a\",null,{\"href\":\"https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter\",\"children\":\"reuters\"}]]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"开源模型 (Open-source Model)\"}],\"：指权重和代码对外公开、允许用户自行部署和修改的 AI 模型，与谷歌、OpenAI 等公司的闭源产品相对。DeepSeek 始终坚持开源策略，使其模型在全球开发者社区保持高度活跃。 \",[\"$\",\"a\",null,{\"href\":\"https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter\",\"children\":\"reuters\"}]]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"AI 智能体 (AI Agent)\"}],\"：能够自主规划、调用工具并执行多步骤复杂任务的 AI 系统，能力远超传统对话式聊天机器人，但对算力和上下文长度要求更高。DeepSeek 特别强调 V4 在该场景下的优势。 \",\"$L1b\"]}],\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\"]\n"])</script><script>self.__next_f.push([1,"1b:[\"$\",\"a\",null,{\"href\":\"https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter\",\"children\":\"reuters\"}]\n1c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"上下文窗口 (Context Window)\"}],\"：模型在单次推理中能处理的最大文本长度，以 token 为单位。V4 支持超过 100 万 token 的超长上下文，与业界顶级闭源模型相当，但成本大幅降低。 \",[\"$\",\"a\",null,{\"href\":\"https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter\",\"children\":\"reuters\"}]]}]\n1d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"出口管制 (Export Controls)\"}],\"：美国政府限制向中国出售先进半导体芯片的系列政策措施。正是这一背景推动了中国加速 AI 硬件自主化，也使 DeepSeek 转向华为的战略选择具有深远的产业意义。 \",[\"$\",\"a\",null,{\"href\":\"https://www.reuters.com/technology/chinas-deepseek-returns-with-new-model-year-after-viral-rise-2026-04-24/?utm_medium=Social\u0026utm_source=twitter\",\"children\":\"reuters\"}]]}]\n1e:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}]\n"])</script><script>self.__next_f.push([1,"1f:[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y
