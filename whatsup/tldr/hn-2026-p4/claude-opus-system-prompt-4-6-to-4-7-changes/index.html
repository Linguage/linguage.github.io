[1,"\n# Claude Opus 系统提示词从 4.6 到 4.7 版本的变化解析\n\n## 摘要\n\n本文由 Simon Willison 撰写，深入分析了 Anthropic 在 Claude Opus 4.7 发布时对官方系统提示词所做的更新。Anthropic 是目前唯一一家公开发布其用户端系统提示词的主流 AI 公司。文章通过构建 Git 版本历史的方式，对比了 4.6 与 4.7 版本之间的差异，涵盖安全策略强化、行为规范调整、新功能接入以及冗余内容删减等多个维度，为开发者和研究者提供了清晰的参考视角。\n\n## 内容框架与概述\n\nAnthropic 于 2026 年 4 月 16 日发布了 Claude Opus 4.7，同步更新了 claude.ai 的系统提示词。作者利用 Claude Code 工具将历史系统提示词整理为 Git 仓库，通过 git diff 的方式直观呈现了 4.6 版本（2026 年 2 月 5 日）与 4.7 版本之间的所有改动。此举有助于社区追踪 Anthropic 在模型行为引导方面的策略演变，具有较高的研究与参考价值。\n\n在安全与伦理层面，4.7 版本新增了大量重要约束。儿童安全相关条款被大幅扩展，并规定一旦 Claude 因儿童安全原因拒绝某请求，同一对话中后续所有请求都须以极度谨慎的态度对待。新增了针对饮食障碍的专项条款，禁止向表现出饮食紊乱迹象的用户提供具体的营养或运动数据。此外，还增设了防御截图攻击的机制，允许 Claude 拒绝对复杂问题给出简单的是否式回答。\n\n在交互行为与工具能力方面，4.7 版本也有显著调整。系统提示词新增了对 tool_search 工具的使用规范，要求 Claude 在声称自己不具备某项能力之前，必须先调用该工具确认是否存在对应工具。新增了 Claude in PowerPoint 幻灯片代理工具的说明，平台名称也从开发者平台统一更名为 Claude Platform。同时，提示词对 Claude 的简洁性和主动性提出了新要求，鼓励其在信息不完整时优先借助工具解决歧义，而非反复向用户追问。\n\n## 核心概念及解读\n\n**系统提示词 System Prompt**\n指 AI 服务商在用户对话开始前，预先注入模型的一段隐性指令文本，用于定义模型的角色、行为边界与交互风格。Anthropic 是业内极少数公开发布此类文本的公司，为外界研究模型行为提供了难得的透明度窗口。\n\n**tool_search 工具搜索机制**\n一种新引入的元工具，允许 Claude 在运行时动态查询当前对话环境中是否存在可用的特定功能工具，例如位置获取、日历访问或文件读取等。这一机制使 Claude 能够避免错误地声称自己不具备某项能力，从而提升响应的准确性与实用性。\n\n**git diff 差异对比方法**\n作者将 Anthropic 公开的历史系统提示词文档转换为带有伪造提交时间戳的 Git 仓库，从而能够使用标准代码审查工具直观展示不同版本之间的逐行变更，这是一种颇具创意的技术文档分析手段。\n\n**截图攻击 Screenshot Attack**\n一种针对 AI 模型的对抗性操作手法，通过在图片中嵌入带有误导性的强制指令，迫使模型对争议性话题给出非此即彼的简短回答，进而断章取义地传播。4.7 版本的系统提示词专门增加了应对此类攻击的防护条款。\n\n**知识截止日期 Knowledge Cut-off**\n模型训练数据的时间上限。4.6 版本需要在系统提示词中显式说明特朗普已于 2025 年 1 月 20 日就任美国总统，而 4.7 版本因知识截止日期已更新至 2026 年 1 月，模型已内化这一事实，相关补丁条款因此得以移除。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Changes in the system prompt between Claude Opus 4.6 and 4.7](https://simonwillison.net/2026/Apr/18/opus-system-prompt/) |\n| 作者 | Simon Willison |\n| 发布日期 | 2026 年 4 月 18 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":
