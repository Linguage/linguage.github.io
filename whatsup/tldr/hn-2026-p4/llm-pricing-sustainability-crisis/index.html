的快速进步，使个人设备运行高质量模型成为现实。这不仅提供了低成本替代方案，也从能源效率层面对数据中心商业模式构成根本性质疑。\n\n文章最终将问题归结到资本运作逻辑：AI 公司盈利前景不明，价格提升或广告植入都是饮鸩止渴。大量投资绑在一个内裤精灵式的商业模式上，而本地推理趋势可能进一步削弱对云端 API 的需求。\n\n## 核心概念及解读\n**AI 定价谜题**：LLM 定价从未基于成本或价值建立合理模型，而是资本驱动的试探性定价。\n\n**本地推理趋势**：在个人设备上运行开源 LLM 逐渐可行，从能效和成本上挑战云端 API 模式。\n\n**内裤精灵商业模式**：指筹集巨额资金却无清晰盈利路径，寄希望于中间环节产生利润的荒谬逻辑。\n\n**数据中心能源悖论**：数据中心需持续满负荷运行以摊薄成本，而本地推理只在需要时耗电，效率逻辑截然相反。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [LLM pricing has never made sense](https://anderegg.ca/2026/04/22/llm-pricing-has-never-made-sense) |\n| 作者 | Gavin Anderegg |\n| 发表日期 | 2026-04-23 |\n| 评分 | 83/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"llm-pricing-sustainability-crisis\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"llm-pricing-sustainability-crisis\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"llm-pricing-sustainability-crisis\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/llm-pricing-sustainability-crisis\",\"href\":\"/whatsup/tldr/hn-2026-p4/llm-pricing-sustainability-crisis\",\"category\":\"tldr\",\"title\":\"LLM定价从未合理过\",\"date\":\"2026-04-23\",\"excerpt\":\"Anthropic 和 GitHub 相继调整代码生成产品定价，OpenAI 巨额亏损且 Sam Altman 承认 AI 泡沫，文章揭示 LLM 定价模式的根本性不可持续，而本地开源模型的崛起正形成结构性挑战。\",\"coverImage\":\"$undefined\",\"author\":\"Gavin Anderegg\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"83\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"LLM定价从未合理过\",\"author\":\"Gavin Anderegg\",\"date\":\"2026-04-23\",\"excerpt\":\"Anthropic 和 GitHub 相继调整代码生成产品定价，OpenAI 巨额亏损且 Sam Altman 承认 AI 泡沫，文章揭示 LLM 定价模式的根本性不可持续，而本地开源模型的崛起正形成结构性挑战。\",\"source_url\":\"https://anderegg.ca/2026/04/22/llm-pricing-has-never-made-sense\",\"tags\":[\"summary\"],\"score\":\"83\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false,\"original_file
