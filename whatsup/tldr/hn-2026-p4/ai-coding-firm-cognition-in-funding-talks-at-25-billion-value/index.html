 摘要\n\nAI编程初创公司Cognition AI正进行新一轮融资谈判，估值将翻倍至250亿美元。该公司计划筹集数亿美元，此轮融资意向在竞争对手Cursor被SpaceX以600亿美元收购后显著升温。Cognition成立于2023年，旗舰产品Devin定位为全球首位AI软件工程师，客户包括Anduril Industries和微软等企业。\n\n## 内容框架与概述\n\nCognition AI本轮融资谈判处于早期阶段，目标估值250亿美元，较此前102亿美元估值大幅提升。公司计划筹集数亿美元资金，谈判正在进行中，具体条款仍可能调整。此次融资意向的升温与Elon Musk旗下SpaceX宣布收购竞争对手Cursor密切相关，尽管Cognition的融资谈判早于该消息启动，但Cursor被收购后投资者对该领域关注度显著上升。\n\nCognition总裁Russell Kaplan在社交平台表示，Cursor交易公布后公司收到更多客户和潜在员工的咨询。他认为行业内的并购整合反而增强了独立创业公司的竞争优势。Cognition专注于企业市场，其核心产品Devin被宣传为全球首位AI软件工程师，致力于简化代码编写和调试流程。\n\nCognition成立于2023年，去年6月年度经常性收入约7300万美元。同年7月收购AI编程公司Windsurf剩余资产后收入增长，并于9月完成4亿美元融资，估值达102亿美元。公司投资方包括Founders Fund、Khosla Ventures和Avenir等知名机构。当前AI编程领域竞争激烈，OpenAI和Anthropic等头部模型厂商也在积极争夺软件工程师客户群体。\n\n## 核心概念及解读\n\n- 年度经常性收入（ARR）：订阅制企业按年计算的稳定收入指标，用于衡量SaaS公司健康状况。Cognition去年6月ARR约7300万美元，反映其企业客户付费规模。\n- AI软件工程师：Cognition对Devin产品的定位，指能够自主完成代码编写、调试等任务的AI智能体，区别于传统代码补全工具，强调端到端的工程能力。\n- 估值倍数跳跃：Cognition在9个月内估值从102亿美元跃升至250亿美元，体现AI编程赛道在2025至2026年的资本热度及并购事件带来的定价锚定效应。\n- 战略并购整合：Google此前挖走Windsurf联合创始人，Cognition继而收购其剩余资产；SpaceX收购Cursor则触发行业格局重组，独立厂商与科技巨头附属工具形成分化。\n- 企业级AI编程：Cognition明确聚焦B端市场，与面向个体开发者的工具差异化，强调合规、安全部署和团队协作等企业需求。\n\n| 字段   | 内容                                                                                                                                                                                                                   |\n| ---- | -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| 原标题  | [AI Coding Firm Cognition in Funding Talks at $25 Billion Value](https://archive.ph/20260424113705/https://www.bloomberg.com/news/articles/2026-04-23/ai-coding-firm-cognition-in-funding-talks-at-25-billion-value) |\n| 作者   | Natasha Mascarenhas, Rebecca Torrence
