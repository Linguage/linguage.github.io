前技术条件下，试错和调整方向的成本正在趋近于零。\n\n这一转变发生在Block大规模裁员的背景下。公司于二月裁减了超过4000名员工，约占员工总数的40%。Dorsey此前曾表示AI带来的效率提升是裁员的原因之一，暗示新技术正在改变团队协作方式和人员需求。\n\n文章随后将视角扩展至整个科技行业。Perplexity CEO Aravind Srinivas分享了他的做法：自A轮融资后就不再制作融资演示文稿，而是使用备忘录和问答形式与投资者沟通。他甚至建议投资者直接向Perplexity提问，因为AI已经掌握了相关信息。\n\n文章最后追溯了科技界抵制幻灯片的历史脉络。亚马逊创始人贝佐斯在2004年就禁止了PowerPoint演示，要求员工撰写四页备忘录。苹果联合创始人乔布斯同样反感幻灯片演示，认为真正懂行的人不需要借助PowerPoint来表达观点。他批评人们用幻灯片代替真正的思考。\n\n## 核心概念及解读\n**原型演示**：用可交互的产品模型替代传统幻灯片进行汇报，基于真实或模拟数据构建，能更直观展示产品功能和价值。\n\n**试错成本趋零**：随着AI和开发工具的进步，快速构建和修改产品方案的成本大幅降低，使得尝试不同方向变得极为经济。\n\n**反幻灯片文化**：科技界领军人物普遍认为传统演示文稿阻碍深度思考，倾向于用备忘录或原型等更具实质内容的形式进行沟通。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Jack Dorsey says Block employees now bring prototypes — not slide decks — to meetings](https://www.businessinsider.com/block-ceo-jack-dorsey-bring-prototypes-not-slide-decks-meetings-2026-4) |\n| 作者 | Shubhangi Goel |\n| 发表日期 | 2026-04-03 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"jack-dorsey-block-prototypes-not-slide-decks\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"jack-dorsey-block-prototypes-not-slide-decks\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"jack-dorsey-block-prototypes-not-slide-decks\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/jack-dorsey-block-prototypes-not-slide-decks\",\"href\":\"/whatsup/tldr/hn-2026-p4/jack-dorsey-block-prototypes-not-slide-decks\",\"category\":\"tldr\",\"title\":\"Block CEO Jack Dorsey：开会带原型而不是幻灯片\",\"date\":\"2026-04-03\",\"excerpt\":\"Block CEO Jack Dorsey表示员工开会不再使用幻灯片，而是展示可实时修改的原型。此举反映了科技界对传统演示方式的反思，多位科技领袖均曾表达对幻灯片的不满。\",\"coverImage\":\"$undefined\",\"author\":\"Shubhangi Goel\",\"original\":\"Jack Dorsey says Block employees now bring prototypes — not slide decks — to meetings.md\",\"originalUrl\":\"https://www.businessinsider.com/block-ceo-jack-dorsey-bring-prototypes-not-slide-decks-meetings-2026-4\",\"score\":\"78\",\"content\":\"$17\",\"tags
