mage\":\"$undefined\",\"author\":\"Michael Casey\",\"original\":\"How a blind man made it possible for others with low vision to build Lego sets.md\",\"originalUrl\":\"https://apnews.com/article/lego-bricks-for-blind-audio-braille-instructions-5a2a27de4354a0b1443171c3f24f29e4\",\"score\":\"85\",\"content\":\"# 盲人推动乐高拼搭无障碍化\\n\\n## 摘要\\n文章讲述了盲人马修创立非营利组织Bricks for the Blind的故事。他从13岁获得盲文乐高说明书中获得独立拼搭的体验，后为纪念已故保姆，带领团队制作了500多套无障碍说明书供视障者免费使用。该举措不仅促成乐高官方推出盲文与音频指导，还帮助众多视障者摆脱依赖，重获独立拼搭的乐趣与家庭互动的自信。\\n\\n## 内容框架与概述\\n文章以马修的个人经历为切入点，讲述他幼年因视障无法独立拼搭乐高，直到13岁获赠盲文说明书才体验到掌控感。保姆去世后，他为了传承这份体验，创建了Bricks for the Blind项目。\\n\\n随后，文章介绍了该项目的运作模式与广泛影响。马修与三十人团队合作，将五百多套乐高转化为盲文或音频指导，覆盖全球数千名视障者。此举还直接推动了乐高集团在官方产品中引入无障碍功能与盲文积木。\\n\\n最后，文章通过多位视障者的真实反馈升华主题。失明者借此重获自由感，盲人父母得以与视障子女平等互动。这些故事印证了无障碍设计不仅是一项技术改造，更是打破隔阂、重塑视障者生活尊严的重要桥梁。\\n\\n## 核心概念及解读\\n**无障碍说明书**：将乐高视觉拼搭步骤转化为盲文或文本，供屏幕阅读器朗读，使视障者能独立完成拼搭。\\n\\n**盲文积木**：乐高官方推出的特殊积木，表面凸起对应字母和数字，帮助视障儿童在玩耍中学习盲文。\\n\\n**屏幕阅读器**：一种将文本转化为语音的软件应用，视障者借助它聆听无障碍说明书以完成乐高拼搭。\\n\\n**触觉技能**：通过触摸和拼搭乐高，视障儿童能锻炼手部精细动作，并以此感知和理解复杂的空间结构。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [How a blind man made it possible for others with low vision to build Lego sets](https://apnews.com/article/lego-bricks-for-blind-audio-braille-instructions-5a2a27de4354a0b1443171c3f24f29e4) |\\n| 作者 | Michael Casey |\\n| 发表日期 | 2026-04-06 |\\n| 评分 | 85/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"盲人推动乐高拼搭无障碍化\",\"excerpt\":\"盲人马修创办非营利组织，为视障者提供盲文和音频乐高说明书，帮助他们独立拼搭，重塑生活自信与家庭纽带。\",\"date\":\"2026-04-06\",\"category\":\"tldr\",\"author\":\"Michael Casey\",\"original\":\"How a blind man made it possible for others with low vision to build Lego sets.md\",\"originalUrl\":\"https://apnews.com/article/lego-bricks-for-blind-audio-braille-instructions-5a2a27de4354a0b1443171c3f24f29e4\",\"score\":\"85\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePat
