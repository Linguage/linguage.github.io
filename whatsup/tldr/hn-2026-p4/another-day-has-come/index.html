数字评判自己，曾公开表态不为盲人辅助功能计算 ROI。库克将苹果改造得更加可预测、按年度节奏运转、远离丑闻与戏剧化冲突，这种秩序感正是他个人风格的体现。\n\n最后，文章展望特纳斯时代的苹果。库克称赞特纳斯兼具工程师思维、创新灵魂与正直品格。作者担忧库克作为执行董事长可能 overshadow 新CEO，但基于库克性格与迪士尼前车之鉴，认为这种情况不会发生。交接时机也经过精心设计：6月WWDC仍由库克主持，9月新iPhone发布时特纳斯正式掌舵，一切显得 orderly 而 confidence-inspiring。\n\n## 核心概念及解读\n\n- **GOAT**：Greatest Of All Time 的缩写，体育与流行文化中的最高赞誉，此处指库克作为CEO的历史地位。作者用此词强调其商业成就，随即又指出库克本人更在意价值观层面的遗产。\n\n- **Executive Chairman（执行董事长）**：区别于荣誉性董事长职位，库克将保留实质性影响力，尤其在全球政策游说领域。作者此前准确预测了这一安排，认为库克将继续处理与特朗普等政治人物的关系。\n\n- **Product Person（产品人）**：硅谷对具有强烈产品直觉与创造欲的领导者的称谓。乔布斯是典型产品人，库克则坦诚自己不是。作者认为苹果在2010年代需要运营扩张，而2020年代需要产品创新，特纳斯正符合这一转向。\n\n- **Fractal Design（分形设计）**：作者2011年提出的概念，指苹果的简洁、优雅、谦逊等特质同时体现在产品、包装、广告、零售店及公司整体结构中。乔布斯最伟大的创造是苹果这家公司本身，而非任何单一产品。\n\n- **ROI（投资回报率）**：库克2014年股东会议上的名言，表明苹果在无障碍功能上的投入不计较财务回报。这句话成为理解库克领导哲学的关键文本，显示其将公司价值观置于短期财务指标之上。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Another Day Has Come](https://daringfireball.net/2026/04/another_day_has_come) |\n| 作者 | John Gruber |\n| 发布日期 | 2026年4月20日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"another-day-has-come\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"another-day-has-come\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"another-day-has-come\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/another-day-has-come\",\"href\":\"/whatsup/tldr/hn-2026-p4/another-day-has-come\",\"category\":\"tldr\",\"title\":\"苹果换帅：库克交棒，特纳斯接棒\",\"date\":\"2026-04-20\",\"excerpt\":\"苹果CEO蒂姆·库克宣布转任执行董事长，约翰·特纳斯接任CEO。与2011年乔布斯因病痛被迫交棒不同，此次交接在苹果业务鼎盛期主动进行。库克任职15年，将苹果从 grief 中带领至巅峰，如今选择功成身退。特纳斯作为工程师出身的内部人选，被期待能为苹果注入产品创新动力。\",\"coverImage\":\"$undefined\",\"author\":\"John Gruber\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight
