抓取与生成内容反噬，诈骗、虚假信息和恶性内容更易大规模生产。 同时，越来越多人把工作、饮食、旅行、艺术乃至情感交给聊天机器人，作者感到深度疏离，并担心自己的阅读、思考与写作能力正处在被替代的爆炸半径内。\n\n在诊断问题后，作者提出一种看似激进却很具体的处置方案：尽可能“停下”。他引用研究指出，机器学习辅助会削弱人的表现与坚持，夺走通过亲手实践获得的肌肉记忆与深层理解，因此自己刻意不用大模型写作或编程，并劝读者也这么做。 他进一步给出一系列实践路径，从拒绝用大模型生成稿件、工作中标记风险、抵制企业强推工具，到呼吁工会行动、要求立法严控碳排与数字外部性、反对数据中心税收优惠，甚至建议从相关公司辞职。\n\n结尾部分一方面承认技术的实际效用和个人使用它的诱惑，以“智能灯控制”这种边缘场景自我反思摇摆；另一方面强调减缓发展并非妄图终止进步，而是为社会、文化和制度留出消化既有技术的时间，让人们有机会再就业、修复系统，并在漫长未来里更能问心无愧。 文章尾声还简要描述了写作过程，强调这是在朋友帮助下、全程手工完成的作品，以此实践其主张的价值观。\n\n## 核心概念及解读\n\n**技术重塑结构**：通过汽车例子说明技术真正影响在于重塑城市、关系和制度，而非单次效率提升。\n\n**垃圾未来与信息污染**：指由大模型生成的低质内容、谎言和滥用所构成的日常环境，使真实信息与信任难以维系。\n\n**能力侵蚀与元技能丧失**：机器学习辅助减少人亲自解决问题的机会，削弱长期积累的读写思考能力与实践智慧。\n\n**放缓发展策略**：不是幻想彻底阻止技术，而是通过个人抵制、劳动组织和政策监管拖慢进度，为社会适应争取时间。\n\n**伦理退出与良心账本**：强调从有害体系及时抽身，在长期历史中能减轻个人的道德负担，让未来回望时更能自我认可。\n\n|字段|内容|\n|---|---|\n|原标题|[The Future of Everything is Lies I Guess Where Do We Go From Here](https://aphyr.com/posts/420-the-future-of-everything-is-lies-i-guess-where-do-we-go-from-here)|\n|作者|Kyle Kingsbury|\n|发布日期|2026年4月16日|\n|内容评分|92|\n\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"future-of-ai-and-resistance\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"future-of-ai-and-resistance\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"future-of-ai-and-resistance\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/future-of-ai-and-resistance\",\"href\":\"/whatsup/tldr/hn-2026-p4/future-of-ai-and-resistance\",\"category\":\"tldr\",\"title\":\"人工智能时代的停下与自救\",\"date\":\"2026-04-16\",\"excerpt\":\"文章从汽车重塑城市的类比出发，反思当下机器学习和大模型正在如何改变信息生态与社会结构，强调个人与集体对工具使用负责任的克制，呼吁减缓技术扩张，为社会与制度留出适应空间，并通过拒绝依赖与积极抵制来维护人的能力和良知。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"$undefined\",\"originalUrl\":\"https://aphyr.com/posts/420-the-future-of-everything-is-lies-i-guess-where-do-we-go-from-here\",\"score\":\"92\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\
