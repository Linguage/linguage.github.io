出其实际税率仍低于15%，且法国数字税的实际负担通过涨价转嫁给了用户。\n\n第三个议题评估现有改革是否足够。文章否定了两项认知：欧洲并不存在统一的GAFA税，各国单边行动反而造成税制碎片化；OECD/G20的全球最低税率（支柱二）虽设定15%门槛，但并非专门针对数字企业且有诸多例外，爱尔兰、荷兰等国的优惠税制依然在削弱改革效力。\n\n## 核心概念及解读\n**GAFAM**：Google、Apple、Facebook、Amazon、Microsoft的合称，代表主导数字经济的五大美国科技巨头。\n\n**有效税率**：企业实际缴纳的税款占利润的比例，数字企业仅9.5%，远低于传统企业的23.2%。\n\n**一致同意原则**：欧盟税收决策需所有成员国一致通过，单一国家即可否决，是统一数字税的最大制度障碍。\n\n**支柱二**：OECD/G20推行的全球最低税率协议，设定15%门槛，但非专门针对数字企业且存在诸多例外。\n\n**GAFA税**：法国等国对数字服务征收的单边税种，年收入3-5亿欧元，但成本多转嫁给用户，且加剧了欧洲税制碎片化。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Can Big Tech be taxed more? The true, the false and the uncertain](https://www.polytechnique-insights.com/en/columns/digital/can-gafams-be-taxed-more-the-true-the-false-and-the-uncertain/?utm_source=brevo\u0026utm_campaign=newsletter201en\u0026utm_medium=email\u0026utm_id=160) |\n| 作者 | Martin Collet |\n| 发表日期 | 2025-06-11 |\n| 评分 | 83/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"can-big-tech-be-taxed-more\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"can-big-tech-be-taxed-more\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"can-big-tech-be-taxed-more\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/can-big-tech-be-taxed-more\",\"href\":\"/whatsup/tldr/hn-2026-p4/can-big-tech-be-taxed-more\",\"category\":\"tldr\",\"title\":\"科技巨头加税难题：真相谬误与不确定性\",\"date\":\"2025-06-11\",\"excerpt\":\"文章基于巴黎-先贤祠-阿萨斯大学教授Martin Collet的分析，以真/假/不确定框架审视欧盟对GAFAM征税的困境、技术障碍与改革前景。\",\"coverImage\":\"$undefined\",\"author\":\"Martin Collet\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"83\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"科技巨头加税难题：真相谬误与不确定性\",\"author\":\"Martin Collet\",\"date\":\"2025-06-11\",\"excerpt\":\"文章基于巴黎-先贤祠-阿萨斯大学教授Martin Collet的分析，以真/假/不确定框架审视欧盟对GAFAM征税的困境、技术障碍与改革前景。\",\"source
