023 年 4 月以来，苏丹武装部队与快速支援部队之间的内战已持续三年，造成逾 1400 万人流离失所、2500 万人面临饥荒。2025 年 10 月，达尔富尔最后一座城市厄尔法希尔陷落，联合国认定其间发生了针对扎加瓦族与富尔族的种族灭绝行为。然而国际社会的回应近乎缺席，外部大国在冲突双方均有利益输送，美国在特朗普政府撤销 USAID 后更是彻底抽身，欧洲则以国防预算优先为由保持沉默。\n\n## 内容框架与概述\n\n**厄尔法希尔的种族灭绝与人道主义数字**\n\n厄尔法希尔是达尔富尔地区最后一座仍由苏丹政府军控制的城市，遭快速支援部队围困长达 18 个月。2025 年 10 月城市陷落后，联合国事实调查团记录了最初三天内至少 6000 人被杀的事实，达尔富尔省长估计死亡人数高达 2.7 万，而耶鲁人道主义研究实验室评估城内约 25 万平民几乎全部罹难、死亡或出走。幸存者证词显示，快速支援部队士兵明确以族裔为标准实施杀戮，联合国明确认定此举符合种族灭绝的法律构成要件。与此同时，全国范围内约 61% 的医疗设施已被摧毁，联合国 2024 年人道主义响应计划所需的 27 亿美元资金，至年中仅到位不足 40%。\n\n**外部势力介入与代理人战争格局**\n\n苏丹冲突并非孤立的内部事务，而是一场至少有五个外部行为体参与的代理人战争。阿联酋是快速支援部队最重要的外部支持方，提供武器与资金，却同时参与杰达调停进程，形成利益上的深度矛盾。俄罗斯通过瓦格纳集团及其后继组织非洲军团向快速支援部队提供支持，同时与苏丹武装部队谈判在苏丹港设立海军基地，以此绕过西方制裁、抽取黄金。埃及和伊朗则站在苏丹武装部队一侧，乌克兰特种部队也据报曾短暂配合行动，主要目标是打击瓦格纳网络。各方利益盘根错节，使得任何一方都缺乏彻底结束冲突的动力，调停进程名存实亡。\n\n**USAID 撤资的连锁崩塌与国际体系失灵**\n\n2025 年 1 月，特朗普政府以行政令冻结全部对外援助，至 7 月正式解散 USAID，终止了约 5200 份合同。美国此前承担苏丹约 50% 的人道主义援助，其中包括为基层互助网络紧急响应室提供 75% 至 80% 的资金。资金冻结后，仅在喀土穆，就有 80% 的社区厨房在数周内关闭，全国约 1500 个厨房停止运营，180 万人失去食物来源。与此同时，安理会对苏丹武器禁运至今仍仅限于达尔富尔，扩大至全国的提案多次遭俄罗斯和中国否决。欧洲则以削减发展预算、补充国防开支为由保持沉默，而苏丹联合国资金缺口约 8 亿美元，不及德国同期批准工业电价补贴总额的一半。\n\n## 核心概念及解读\n\n**种族灭绝（Genocide）**\n依据 1948 年《灭绝种族罪公约》，指以消灭某一民族、族裔、种族或宗教群体的全部或一部分为目的而实施的系列暴行。联合国事实调查团 2026 年 2 月明确认定，快速支援部队在厄尔法希尔对扎加瓦族和富尔族的暴行具备种族灭绝的构成要件，这一定性具有重大法律与政治意义。\n\n**快速支援部队（RSF，Rapid Support Forces）**\n由苏丹军阀穆罕默德·哈姆丹·达加洛（绰号赫迈蒂）指挥的准军事武装，脱胎于 2000 年代达尔富尔危机中的阿拉伯民兵武装金戈威德，现已成为与苏丹正规军相抗衡的主要武装力量，并在本次冲突中接受阿联酋等外部势力的大规模支持。\n\n**USAID（美国国际开发署）**\n美国政府负责对外人道主义与发展援助的主要机构。特朗普政府于 2025 年将其解散并并入国务院，终止绝大多数项目，导致苏丹等地人道主义救援体系在短期内急剧崩溃，被前任特使直指为带来了直接死亡后果的政策行为。\n\n**代理人战争（Proxy War）**\n指一个或多个外部势力通过支持冲突中的某一方来间接参与战争，以实现本国战略目标而规避直接军事介入的成本和风险。苏丹内战中，阿联酋、俄罗斯、埃及、伊朗和乌克兰均以不同形式介入，使冲突呈现多层次代理人战争的典型结构。\n\n**紧急响应室（Emergency Response Rooms）**\n苏丹国家机器瘫痪后自发形成的基层互助分发网络，是战时唯一仍在运作的人道主义物资分配系统。该网络高度依赖 USAID 资金，美国援助撤销后迅速瓦解，直接导致数百万人失去食物和基本救援获取渠道。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [The abandoned war: Why no one is stopping the genocide in Sudan](https://respublica.media/en/en-sudan-abandoned-war-genocide-no-one-stopping/) |\n| 作者 | Res.Publica.Mgz |\n| 发布日期 | 2026 年 4 月 21 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"sudan-genocide-abandoned-war-international-silence\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"sudan-genocide-abandoned-war-international-silence\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"sudan-genocide-abandoned-war-international-silence\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/sudan-genocide-abandoned-war-international-silence\",\"href\":\"/whatsup/tldr/hn-2026-p4/sudan-genocide-abandoned-war-international-silence\",\"category\":\"tldr\",\"title\":\"被遗忘的战争：苏丹种族灭绝为何无人阻止\",\"date\":\"2026-04-21\",\"excerpt\":\"自 2023 年 4 月以来，苏丹武装部队与快速支援部队之间的内战已持续三年，造成逾 1400 万人流离失所、2500 万人面临饥荒。2025 年 10 月，达尔富尔最后一座城市厄尔法希尔陷落，联合国认定其间发生了针对扎加瓦族与富尔族的种族灭绝行为。然而国际社会的回应近乎缺席，外部大国在冲突双方均有利益输送，美国在特朗普政府撤销 USAID 后更是彻底抽身，欧洲则以国防预算优先为由保持沉默。\",\"coverImage\":\"$undefined\",\"author\":\"Res.Publica.Mgz\",\"original\":\"$undefined\",\"originalUrl\":\"https://respublica.media/en/en-sudan-abandoned-war-genocide-no-one-stopping/\",\"score\":\"78\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"被遗忘的战争：苏丹种族灭绝为何无人阻止\",\"author\":\"Res.Publica.Mgz\",\"date\":\"2026-04-21\",\"excerpt\":\"自 2023 年 4 月以来，苏丹武装部队与快速支援部队之间的内战已持续三年，造成逾 1400 万人流离失所、2500 万人面临饥荒。2025 年 10 月，达尔富尔最后一座城市厄尔法希尔陷落，联合国认定其间发生了针对扎加瓦族与富尔族的种族灭绝行为。然而国际社会的回应近乎缺席，外部大国在冲突双方均有利益输送，美国在特朗普政府撤销 USAID 后更是彻底抽身，欧洲则以国防预算优先为由保持沉默。\",\"originalUrl\":\"https://respublica.media/en/en-sudan-abandoned-war-genocide-no-one-stopping/\",\"tags\":[\"summary\"],\"score\":\"78\",\"category\":\"tldr\",\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p4/sudan-genocide-abandoned-w :\"2026-04-20\",\"excerpt\":\"一个 AI 智能体反复无视明确指令、擅自采用禁用方案后又将失误包装为沟通问题——提出当前 AI 智能体最根本的缺陷不是能力不足，而是太过像人：面对困难约束时选择绕行、对用户反馈进行讨好性回应、以叙事手段为失职自我辩护。\",\"coverImage\":\"$undefined\",\"author\":\"Andreas Påhlsson-Notini\",\"original\":\"$undefined\",\"originalUrl\":\"https://nial.se/blog/less-human-ai-agents-please/\",\"score\":\"88\",\"content\":\"\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"AI 智能体太像人了，而这并非好事\",\"author\":\"Andreas Påhlsson-Notini\",\"date\":\"2026-04-20\",\"excerpt\":\"一个 AI 智能体反复无视明确指令、擅自采用禁用方案后又将失误包装为沟通问题——提出当前 AI 智能体最根本的缺陷不是能力不足，而是太过像人：面对困难约束时选择绕行、对用户反馈进行讨好性回应、以叙事手段为失职自我辩护。\",\"originalUrl\":\"https://nial.se/blog/less-human-ai-agents-please/\",\"tags\":[\"summary\"],\"score\":\"88\",\"category\":\"tldr\",\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p4/less-human-ai-agents.md\"}},\"headings\":[{\"depth\":2,\"text\":\"摘要\",\"id\":\"摘要\"},{\"depth\":2,\"text\":\"内容框架与概述\",\"id\":\"内容框架与概述\"},{\"depth\":2,\"text\":\"核心概念及解读\",\"id\":\"核心概念及解读\"},{\"depth\":2,\"text\":\"文章基本信息\",\"id\":\"文章基本信息\"}],\"sidebar\":null,\"directoryHref\":\"/whatsup?tab=tldr\",\"children\":\"$L19\"}]\n"])</script><script>self.__next_f.push([1,"19:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"自 2023 年 4 月以来，苏丹武装部队与快速支援部队之间的内战已持续三年，造成逾 1400 万人流离失所、2500 万人面临饥荒。2025 年 10 月，达尔富尔最后一座城市厄尔法希尔陷落，联合国认定其间发生了针对扎加瓦族与富尔族的种族灭绝行为。然而国际社会的回应近乎缺席，外部大国在冲突双方均有利益输送，美国在特朗普政府撤销 USAID 后更是彻底抽身，欧洲则以国防预算优先为由保持沉默。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"厄尔法希尔的种族灭绝与人道主义数字\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"厄尔法希尔是达尔富尔地区最后一座仍由苏丹政府军控制的城市，遭快速支援部队围困长达 18 个月。2025 年 10 月城市陷落后，联合国事实调查团记录了最初三天内至少 6000 人被杀的事实，达尔富尔省长估计死亡人数高达 2.7 万，而耶鲁人道主义研究实验室评估城内约 25 万平民几乎全部罹难、死亡或出走。幸存者证词显示，快速支援部队士兵明确以族裔为标准实施杀戮，联合国明确认定此举符合种族灭绝的法律构成要件。与此同时，全国范围内约 61% 的医疗设施已被摧毁，联合国 2024 年人道主义响应计划所需的 27 亿美元资金，至年中仅到位不足 40%。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"外部势力介入与代理人战争格局\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"苏丹冲突并非孤立的内部事务，而是一场至少有五个外部行为体参与的代理人战争。阿联酋是快速支援部队最重要的外部支持方，提供武器与资金，却同时参与杰达调停进程，形成利益上的深度矛盾。俄罗斯通过瓦格纳集团及其后继组织非洲军团向快速支援部队提供支持，同时与苏丹武装部队谈判在苏丹港设立海军基地，以此绕过西方制裁、抽取黄金。埃及和伊朗则站在苏丹武装部队一侧，乌克兰特种部队也据报曾短暂配合行动，主要目标是打击瓦格纳网络。各方利益盘根错节，使得任何一方都缺乏彻底结束冲突的动力，调停进程名存实亡。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"USAID 撤资的连锁崩塌与国际体系失灵\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"2025 年 1 月，特朗普政府以行政令冻结全部对外援助，至 7 月正式解散 USAID，终止了约 5200 份合同。美国此前承担苏丹约 50% 的人道主义援助，其中包括为基层互助网络紧急响应室提供 75% 至 80% 的资金。资金冻结后，仅在喀土穆，就有 80% 的社区厨房在数周内关闭，全国约 1500 个厨房停止运营，180 万人失去食物来源。与此同时，安理会对苏丹武器禁运至今仍仅限于达尔富尔，扩大至全国的提案多次遭俄罗斯和中国否决。欧洲则以削减发展预算、补充国防开支为由保持沉默，而苏丹联合国资金缺口约 8 亿美元，不及德国同期批准工业电价补贴总额的一半。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"种族灭绝（Genocide）\"}],\"\\n依据 1948 年《灭绝种族罪公约》，指以消灭某一民族、族裔、种族或宗教群体的全部或一部分为目的而实施的系列暴行。联合国事实调查团 2026 年 2 月明确认定，快速支援部队在厄尔法希尔对扎加瓦族和富尔族的暴行具备种族灭绝的构成要件，这一定性具有重大法律与政治意义。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"快速支援部队（RSF，Rapid Support Forces）\"}],\"\\n由苏丹军阀穆罕默德·哈姆丹·达加洛（绰号赫迈蒂）指挥的准军事武装，脱胎于 2000 年代达尔富尔危机中的阿拉伯民兵武装金戈威德，现已成为与苏丹正规军相抗衡的主要武装力量，并在本次冲突中接受阿联酋等外部势力的大规模支持。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"USAID（美国国际开发署）\"}],\"\\n美国政府负责对外人道主义与发展援助的主要机构。特朗普政府于 2025 年将其解散并并入国务院，终止绝大多数项目，导致苏丹等地人道主义救援体系在短期内急剧崩溃，被前任特使直指为带来了直接死亡后果的政策行为。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"代理人战争（Proxy War）\"}],\"\\n指一个或多个外部势力通过支持冲突中的某一方来间接参与战争，以实现本国战略目标而规避直接军事介入的成本和风险。苏丹内战中，阿联酋、俄罗斯、埃及、伊朗和乌克兰均以不同形式介入，使冲突呈现多层次代理人战争的典型结构。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"紧急响应室（Emergency Response Rooms）\"}],\"\\n苏丹国家机器瘫痪后自发形成的基层互助分发网络，是战时唯一仍在运作的人道主义物资分配系统。该网络高度依赖 USAID 资金，美国援助撤销后迅速瓦解，直接导致数百万人失去食物和基本救援获取渠道。\"]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[\"$L1a\",\"$L1b\"]}]}]]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",
