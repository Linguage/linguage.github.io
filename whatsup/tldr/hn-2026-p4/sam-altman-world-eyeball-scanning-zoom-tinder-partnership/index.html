\"]\n18:T1071,"])</script><script>self.__next_f.push([1,"\n# 山姆·奥尔特曼的眼球扫描公司与Zoom、Tinder达成合作\n\n## 摘要\n\n山姆·奥尔特曼旗下的World公司正将其生物识别验证技术推向主流应用。该公司先后与约会软件Tinder和视频会议平台Zoom建立合作，用户需通过实体Orb设备扫描眼球以证明其为真人，而非人工智能机器人。Tinder将在全球范围内推出此项验证，用户完成扫描后可获得认证标识及功能奖励。Zoom则采用三重比对技术，将Orb采集的图像与实时视频进行交叉验证。World还推出Concert Kit软件，试图解决票务黄牛问题。尽管公司声称此举旨在区分人类与AI，但其大规模收集生物特征数据的做法引发广泛隐私担忧。\n\n## 内容框架与概述\n\nWorld公司由OpenAI首席执行官山姆·奥尔特曼创立，其核心产品是一种名为Orb的球形设备，通过扫描用户虹膜来创建独特的数字身份标识。这一项目最初与加密货币Worldcoin绑定，在发展中国家以数字代币为激励吸引用户参与，曾被批评为剥削性和欺骗性。经过品牌重塑后，World逐渐淡化加密货币属性，转而强调其在人工智能时代验证人类身份的基础设施定位。目前该公司声称拥有约1800万验证用户，但多数来自早期代币激励阶段，且其实际部署规模远未达到此前宣称的美国7500台Orb目标。\n\nTinder与Zoom的相继入局标志着World正从边缘实验走向主流应用。Tinder计划在全球推广眼球扫描验证，用户需前往实体站点完成生物特征采集，成功后可在个人资料展示已验证人类标识，并获得五次免费Boost曝光奖励。Zoom的整合方案更为复杂，其World ID Deep Face技术同时比对Orb存档图像、用户设备实时面部扫描以及会议视频流三重视觉数据，通过交叉验证授予认证标识。此外，World还推出面向票务市场的Concert Kit，试图以相同技术路径遏制黄牛机器人抢票。\n\n这些合作引发的核心争议在于生物特征数据的安全性与必要性。批评者指出，将高度敏感的虹膜信息交由第三方私营公司保管存在巨大风险，近期年龄验证服务商泄露Discord用户身份照片的事件即为前车之鉴。更深层忧虑在于，随着Zoom等职场工具和Tinder等社交平台的加入，眼球扫描可能从可选项演变为事实上的强制要求，拒绝参与者将面临社交隔离或职业障碍。奥尔特曼本人对人类价值的公开怀疑态度，进一步加剧了公众对其掌控人类身份验证基础设施的不信任感。\n\n## 核心概念及解读\n\n**World / Worldcoin**：奥尔特曼创立的虹膜识别身份网络，最初以加密货币Worldcoin作为用户激励，后更名为World并弱化代币属性，转型为人工智能时代的人类身份证明基础设施\n\n**Orb**：World公司 proprietary 的球形硬件设备，部署于实体站点，通过近红外光扫描用户虹膜生成唯一标识符，是整套验证体系的物理入口和数据采集终端\n\n**Proof of Humanhood / 人类证明**：在生成式人工智能泛滥背景下兴起的身份验证需求，旨在区分真实人类与AI代理或机器人，World将其作为核心产品叙事，但实现路径依赖侵入式生物特征采集\n\n**World ID Deep Face**：Zoom整合的三重面部比对系统，交叉验证Orb存档图像、设备端实时扫描和会议视频流，技术上降低单次生物特征泄露风险，但扩大了数据采集的场景覆盖面\n\n**Concert Kit**：World针对票务市场推出的软件工具包，允许售票方集成虹膜验证以防止机器人抢票，代表该公司向更多垂直领域扩张的野心，同样延续生物特征强制收集模式\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Sam Altman's Creepy Eyeball-Scanning Company Gets in Bed With Zoom and Tinder](https://gizmodo.com/sam-altmans-creepy-eyeball-scanning-company-gets-in-bed-with-zoom-and-tinder-2000748013) |\n| 作者 | AJ Dellinger |\n| 发布日期 | 2026年4月17日 |\n"])</script><script>self.__ne 公司先后与约会软件Tinder和视频会议平台Zoom建立合作，用户需通过实体Orb设备扫描眼球以证明其为真人，而非人工智能机器人。Tinder将在全球范围内推出此项验证，用户完成扫描后可获得认证标识及功能奖励。Zoom则采用三重比对技术，将Orb采集的图像与实时视频进行交叉验证。World还推出Concert Kit软件，试图解决票务黄牛问题。尽管公司声称此举旨在区分人类与AI，但其大规模收集生物特征数据的做法引发广泛隐私担忧。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"World公司由OpenAI首席执行官山姆·奥尔特曼创立，其核心产品是一种名为Orb的球形设备，通过扫描用户虹膜来创建独特的数字身份标识。这一项目最初与加密货币Worldcoin绑定，在发展中国家以数字代币为激励吸引用户参与，曾被批评为剥削性和欺骗性。经过品牌重塑后，World逐渐淡化加密货币属性，转而强调其在人工智能时代验证人类身份的基础设施定位。目前该公司声称拥有约1800万验证用户，但多数来自早期代币激励阶段，且其实际部署规模远未达到此前宣称的美国7500台Orb目标。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Tinder与Zoom的相继入局标志着World正从边缘实验走向主流应用。Tinder计划在全球推广眼球扫描验证，用户需前往实体站点完成生物特征采集，成功后可在个人资料展示已验证人类标识，并获得五次免费Boost曝光奖励。Zoom的整合方案更为复杂，其World ID Deep Face技术同时比对Orb存档图像、用户设备实时面部扫描以及会议视频流三重视觉数据，通过交叉验证授予认证标识。此外，World还推出面向票务市场的Concert Kit，试图以相同技术路径遏制黄牛机器人抢票。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这些合作引发的核心争议在于生物特征数据的安全性与必要性。批评者指出，将高度敏感的虹膜信息交由第三方私营公司保管存在巨大风险，近期年龄验证服务商泄露Discord用户身份照片的事件即为前车之鉴。更深层忧虑在于，随着Zoom等职场工具和Tinder等社交平台的加入，眼球扫描可能从可选项演变为事实上的强制要求，拒绝参与者将面临社交隔离或职业障碍。奥尔特曼本人对人类价值的公开怀疑态度，进一步加剧了公众对其掌控人类身份验证基础设施的不信任感。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"World / Worldcoin\"}],\"：奥尔特曼创立的虹膜识别身份网络，最初以加密货币Worldcoin作为用户激励，后更名为World并弱化代币属性，转型为人工智能时代的人类身份证明基础设施\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Orb\"}],\"：World公司 proprietary 的球形硬件设备，部署于实体站点，通过近红外光扫描用户虹膜生成唯一标识符，是整套验证体系的物理入口和数据采集终端\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Proof of Humanhood / 人类证明\"}],\"：在生成式人工智能泛滥背景下兴起的身份验证需求，旨在区分真实人类与AI代理或机器人，World将其作为核心产品叙事，但实现路径依赖侵入式生物特征采集\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"World ID Deep Face\"}],\"：Zoom整合的三重面部比对系统，交叉验证Orb存档图像、设备端实时扫描和会议视频流，技术上降低单次生物特征泄露风险，但扩大了数据采集的场景覆盖面\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Concert Kit\"}],\"：World针对票务市场推出的软件工具包，允许售票方集成虹膜验证以防止机器人抢票，代表该公司向更多垂直领域扩张的野心，同样延续生物特征强制收集模式\"]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原标题\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 a
