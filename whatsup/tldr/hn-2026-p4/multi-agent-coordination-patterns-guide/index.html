最后分析共享状态模式，多个智能体在同一工件上协作构建，适合研究分析等需要叠加知识的场景，但需应对状态冲突和协调开销。\n\n## 核心概念及解读\n**生成器-验证器循环**：一个智能体生成输出，另一个按显式标准评估，不合格则退回修改的迭代流程。\n\n**编排器信息瓶颈**：层级结构中所有子智能体结果需经编排器中转，关键信息易在传递中丢失或稀释。\n\n**工作者持久性**：智能体团队中的工作者长期存活积累领域上下文，不同于编排器模式中一次性子任务智能体。\n\n**事件驱动解耦**：消息总线通过发布-订阅机制让智能体无需知道彼此存在，降低系统耦合度。\n\n**共享状态冲突**：多个智能体同时操作同一工件时，需解决编辑冲突和状态一致性问题。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Multi-agent coordination patterns: Five approaches and when to use them](https://claude.com/blog/multi-agent-coordination-patterns) |\n| 作者 | Anthropic |\n| 发表日期 | 2001-04-10 |\n| 评分 | 91/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"multi-agent-coordination-patterns-guide\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"multi-agent-coordination-patterns-guide\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"multi-agent-coordination-patterns-guide\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/multi-agent-coordination-patterns-guide\",\"href\":\"/whatsup/tldr/hn-2026-p4/multi-agent-coordination-patterns-guide\",\"category\":\"tldr\",\"title\":\"多智能体协调五大模式与选型指南\",\"date\":\"2001-04-10\",\"excerpt\":\"深入剖析五种多智能体协作模式的机制、适用场景与局限，为AI工程团队提供从简单到复杂的模式选择框架。\",\"coverImage\":\"$undefined\",\"author\":\"Anthropic\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"91\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"多智能体协调五大模式与选型指南\",\"author\":\"Anthropic\",\"date\":\"2001-04-10\",\"excerpt\":\"深入剖析五种多智能体协作模式的机制、适用场景与局限，为AI工程团队提供从简单到复杂的模式选择框架。\",\"source_url\":\"https://claude.com/blog/multi-agent-coordination-patterns\",\"tags\":[\"summary\"],\"score\":\"91\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false,\"original_file\":\"Multi-agent coordination patterns Five approaches and when to use them.md\"},\"sourcePath\":\"/home/runner/work/l
