。这种增长既推动了用户对多智能体管理的实验需求，也拉动了通过多智能体降低成本的探索。作者明确区分了演示级项目与真实软件开发的差异，前者有简单可验证的成功标准，后者需要扩展人类品味和决策能力。\n\n文章详细阐述两项核心实验。第一是代码审查循环，反直觉地发现审查智能体与编码智能体不共享上下文时效果最佳，原因是清洁上下文避免了注意力衰减现象，使审查者能从差异出发重新推理，平均每个PR发现2个bug，其中58%为严重问题。第二是\"聪明朋友\"架构，让较小的主模型在困难时调用较大的辅助模型，但发现主模型判断何时升级仍是训练难题，该模式在同等强模型间交叉使用时效果更优。\n\n最后展望未来更高层次的委派模式，认为非结构化蜂群是干扰项，实用的形态是\"映射-归约-管理\"结构。核心结论是：当前多智能体系统最佳实践是保持写操作单线程，让额外智能体贡献智能而非行动，所有开放问题本质都是通信问题，需要模型训练来逐步弥合差距。\n\n## 核心概念及解读\n\n上下文工程（Context Engineering）：区别于提示工程关注技巧性措辞，上下文工程强调为模型提供恰当信息源并假设模型能力持续提升。在多智能体场景中，这意味着最大化共享上下文、统一任务认知，同时警惕行动携带的隐性决策冲突。\n\n上下文衰减（Context Rot）：指模型在长上下文场景下决策质量下降的现象。源于注意力头数量有限，当需处理大量指令、代码和历史信息时，关键细节无法充分融入决策过程。清洁上下文策略通过让审查智能体仅查看差异而非完整历史来规避此问题。\n\n聪明朋友（Smart Friend）：一种非对称模型协作架构，较小较快的主模型将困难决策委托给较大较强的辅助模型。核心难点在于较弱模型如何识别自身能力边界，以及双向上下文传递如何保持信息完整性。该模式在同等强模型间演变为能力路由而非难度升级。\n\n单线程写作（Single-threaded Writes）：作者提出的多智能体设计原则，即多个智能体可贡献智能分析，但写操作由单一智能体执行。这避免了并行写作者之间的隐性决策冲突，是当前最稳健的多智能体实践模式。\n\n映射-归约-管理（Map-Reduce-and-Manage）：针对大规模任务的多智能体协作范式，管理者智能体拆分任务、派生子智能体执行、再整合结果报告。区别于非结构化蜂群，该模式强调层级协调而非对等协商，是作者认定的实用发展方向。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Multi-Agents: What is Actually Working](https://x.com/walden_yan/article/2047054401341370639) |\n| 作者 | Walden Yan |\n| 发布日期 | 2025年4月22日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"multi-agents-whats-actually-working\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"multi-agents-whats-actually-working\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"multi-agents-whats-actually-working\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/multi-agents-whats-actually-working\",\"href\":\"/whatsup/tldr/hn-2026-p4/multi-agents-whats-actually-working\",\"category\":\"tldr\",\"title\":\"多智能体系统实战：什么真正奏效\",\"date\":\"2026-04-22\",\"excerpt\":\"Cognition团队分享构建多智能体系统的实践经验。文章指出并行写作智能体仍存在脆弱性，但单线程写作配合多智能体贡献智能的模式已验证可行。核心发现包括清洁上下文能显著提升代码审查效果，以及强弱模型协作的\\\"聪明朋友\\\" \\"聪明朋友\\\"架构，让较小的主模型在困难时调用较大的辅助模型，但发现主模型判断何时升级仍是训练难题，该模式在同等强模型间交叉使用时效果更优。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后展望未来更高层次的委派模式，认为非结构化蜂群是干扰项，实用的形态是\\\"映射-归约-管理\\\"结构。核心结论是：当前多智能体系统最佳实践是保持写操作单线程，让额外智能体贡献智能而非行动，所有开放问题本质都是通信问题，需要模型训练来逐步弥合差距。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"上下文工程（Context Engineering）：区别于提示工程关注技巧性措辞，上下文工程强调为模型提供恰当信息源并假设模型能力持续提升。在多智能体场景中，这意味着最大化共享上下文、统一任务认知，同时警惕行动携带的隐性决策冲突。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"上下文衰减（Context Rot）：指模型在长上下文场景下决策质量下降的现象。源于注意力头数量有限，当需处理大量指令、代码和历史信息时，关键细节无法充分融入决策过程。清洁上下文策略通过让审查智能体仅查看差异而非完整历史来规避此问题。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"聪明朋友（Smart Friend）：一种非对称模型协作架构，较小较快的主模型将困难决策委托给较大较强的辅助模型。核心难点在于较弱模型如何识别自身能力边界，以及双向上下文传递如何保持信息完整性。该模式在同等强模型间演变为能力路由而非难度升级。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"单线程写作（Single-threaded Writes）：作者提出的多智能体设计原则，即多个智能体可贡献智能分析，但写操作由单一智能体执行。这避免了并行写作者之间的隐性决策冲突，是当前最稳健的多智能体实践模式。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"映射-归约-管理（Map-Reduce-and-Manage）：针对大规模任务的多智能体协作范式，管理者智能体拆分任务、派生子智能体执行、再整合结果报告。区别于非结构化蜂群，该模式强调层级协调而非对等协商，是作者认定的实用发展方向。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text
