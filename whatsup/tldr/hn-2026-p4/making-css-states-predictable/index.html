 `fill` 属性示例及其编译输出清晰展示了这一思路。\n\n文章后半部分讨论了方案的真实价值边界：在简单页面中没必要，但在需要经历多年迭代、多人维护的设计系统中，可预测性会产生复利。作者还坦诚分享了构建 Tasty 耗费数年的原因——不是写一个巧妙的选择器难，而是要让整套系统支持伪类、属性修饰符、媒体查询、容器查询、嵌套选择器、类型安全 API 等全部真实需求时仍保持内部一致。\n\n## 核心概念及解读\n**声明式状态映射**：用优先顺序定义组件各状态的样式值，而非手写选择器规则。\n\n**互斥选择器生成**：编译器自动添加 `:not()` 排除条件，确保同一时刻只有一个状态分支匹配。\n\n**状态交互面**：多个状态条件同时作用时产生的重叠区域，是 CSS 脆弱性的根本来源。\n\n**层叠歧义消除**：将原本由浏览器靠源码顺序裁决的不确定性，转移为编译期的确定性逻辑。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Why I spent years trying to make CSS states predictable](https://tenphi.me/blog/why-i-spent-years-trying-to-make-css-states-predictable/) |\n| 作者 | Andrey Yamanov |\n| 发表日期 | 2026-04-23 |\n| 评分 | 87/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"making-css-states-predictable\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"making-css-states-predictable\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"making-css-states-predictable\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/making-css-states-predictable\",\"href\":\"/whatsup/tldr/hn-2026-p4/making-css-states-predictable\",\"category\":\"tldr\",\"title\":\"用编译思想解决 CSS 状态预测性难题\",\"date\":\"2026-04-23\",\"excerpt\":\"CSS 组件状态因选择器优先级和源码顺序产生意外重叠，作者用多年时间打造 Tasty 编译方案，让开发者以声明式状态映射替代手写选择器，从根本上消除歧义。\",\"coverImage\":\"$undefined\",\"author\":\"Andrey Yamanov\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"87\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"用编译思想解决 CSS 状态预测性难题\",\"author\":\"Andrey Yamanov\",\"date\":\"2026-04-23\",\"excerpt\":\"CSS 组件状态因选择器优先级和源码顺序产生意外重叠，作者用多年时间打造 Tasty 编译方案，让开发者以声明式状态映射替代手写选择器，从根本上消除歧义。\",\"source_url\":\"https://tenphi.me/blog/why-i-spent-years-trying-to-make-css-states-predictable/\",\"tags\":[\"summary\"],\"score\":\"87\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false,\"or
