辑（Over-Editing）问题：模型在修复代码时超出必要范围进行重写，导致diff膨胀、审查困难。作者以GPT-5.4为例，展示其将单行range修正扩展为包含类型转换、空值检查、绘图逻辑替换等大规模改写的典型行为。这种现象在 brown-field 开发场景中尤为有害——现有代码承载着团队共识和历史决策，无差别重写会破坏这些隐性知识。\n\n为量化评估，作者基于BigCodeBench构建400个程序化腐败样本，确保ground truth为最小化修复。采用token级Levenshtein距离和认知复杂度增量作为核心指标，对比了9个推理模型和9个非推理模型的表现。结果显示Claude Opus 4.6在正确率和编辑最小化上均领先，而GPT-5.4过度编辑最严重。显式提示保留原代码可显著改善所有模型，推理模型因遵循指令能力更强而获益更多。\n\n训练实验以Qwen3-4B为基座，对比SFT、rSFT、DPO和RL四种方法。SFT在域内表现完美但域外完全崩溃，证实其仅记忆特定腐败模式；RL凭借组合奖励（正确性+编辑距离）实现最佳泛化，且通过LoRA即可达到接近全量微调的效果，14B模型验证表明该方案具备可扩展性。\n\n## 核心概念及解读\n\n**Over-Editing（过度编辑）**：模型输出功能正确但结构偏离最小修复需求的编辑行为。与正确性失败不同，过度编辑对测试套件不可见，却增加代码审查负担和隐性质量风险。\n\n**Token-level Levenshtein Distance（token级莱文斯坦距离）**：以Python词法单元而非字符为粒度的编辑距离度量。通过归一化处理，可比量不同长度函数的编辑幅度，有效区分重命名等表面变化与实质性结构改动。\n\n**Cognitive Complexity（认知复杂度）**：衡量代码理解难度的指标，对嵌套、递归、混合逻辑运算符等增加认知负荷的结构进行加权惩罚。本文中用于检测模型是否未经请求引入不必要的控制流复杂性。\n\n**Catastrophic Forgetting（灾难性遗忘）**：模型在学习新任务时丧失已有能力的现象。SFT因训练分布与原始分布差异过大导致43%性能衰减，而RL因偏向KL最小解而保持通用编码能力。\n\n**Context Distillation（上下文蒸馏）**：将特定提示下的模型行为蒸馏为模型内在能力的训练方法。本文用于生成自蒸馏数据集，使rSFT和DPO的分布更接近原始模型，从而减轻遗忘问题。\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Coding Models Are Doing Too Much](https://nrehiew.github.io/blog/minimal_editing/) |\n| 作者 | nrehiew |\n| 发布日期 | 2026年 4月 24日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"coding-models-are-doing-too-much\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"coding-models-are-doing-too-much\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"coding-models-are-doing-too-much\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/coding-models-are-doing-too-much\",\"href\":\"/whatsup/tldr/hn-2026-p4/coding-models-are-doing-too-much\",\"category\":\"tldr\",\"title\":\"代码模型过度编辑问题：当AI修复变成重写\",\"date\":\"2026-04-24\",\"excerpt\":\"本文研究了AI代码助手在修复简单bug时过度重写代码的现象。作者通过程序化构造最小化bug数据集，系统评估了GPT-5.4、Claude Opus 4.6等前沿模型的编辑忠实度，发现多数模型存在显著的过度编辑倾向
