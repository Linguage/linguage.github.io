ing-tools-worked-but-felt-miserable\",\"category\":\"tldr\",\"title\":\"我用了AI写代码，成功了但很痛苦\",\"date\":\"2026-03-30\",\"excerpt\":\"一位反AI的开发者因工作需要使用Claude Code构建了证书生成器，虽成功交付但深感开发过程令人痛苦，揭示了效率与人文体验的矛盾。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"I used AI. It worked. I hated it..md\",\"originalUrl\":\"https://taggart-tech.com/reckoning/\",\"score\":\"82\",\"content\":\"# 我用了AI写代码，成功了但很痛苦\\n\\n## 摘要\\n文章讲述了一位坚定的反生成式AI开发者，因工作职责与项目需求，被迫使用Claude Code构建证书生成系统的经历。项目最终成功上线且代码质量不错，但作者对这种开发方式感到极度厌恶。文章深刻反思了AI编码工具在提升效率的同时，剥夺了编程乐趣与人类主体性，并重申其对社会和环境的危害立场。\\n\\n## 内容框架与概述\\n作者开篇即表明强烈的反AI立场，但解释其日常工作已转变为AI安全专家，为了能有效测试和阻击危险的AI应用，必须亲自深入使用这些工具，以此作为自我辩白。\\n\\n随后作者介绍了使用AI工具的具体项目：为教育平台迁移开发一个公开可验证的课程证书生成器。因时间紧迫且需兼顾家庭，他决定用Claude Code进行开发，借此测试技术在实战中的表现。\\n\\n在技术实现上，作者采用了极其审慎的策略。他使用Rust和Svelte以利用其类型安全特性约束模型，严格执行计划模式与测试驱动开发，并通过Markdown文件维持上下文。完成后更让模型扮演安全审计员自查漏洞。\\n\\n最终项目成功运行，但作者明确表示不 endorse 这种技术。他认为快速产出代码不值得以牺牲世界为代价，并尖锐指出这种开发模式剥夺了开发者作为创造者的核心体验，本质上是将人降级为机器的审核员。\\n\\n## 核心概念及解读\\n**Plan Mode**：Claude Code的规划模式，要求模型先输出计划而非直接写代码，以保持长期上下文和对齐目标。\\n\\n**测试驱动开发**：通过先写测试再写实现的方式，为AI输出提供确定性的成功标准，防止模型发散。\\n\\n**Vibe Coding**：指缺乏严谨规划、仅凭感觉让AI写代码的开发方式，作者刻意避免这种做法。\\n\\n**认知危害**：作者指出使用生成式AI不仅造成社会环境破坏，还会对使用者自身的思维模式产生负面影响。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [I used AI. It worked. I hated it.](https://taggart-tech.com/reckoning/) |\\n| 作者 |  |\\n| 发表日期 | 2026-03-30 |\\n| 评分 | 82/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"我用了AI写代码，成功了但很痛苦\",\"excerpt\":\"一位反AI的开发者因工作需要使用Claude Code构建了证书生成器，虽成功交付但深感开发过程令人痛苦，揭示了效率与人文体验的矛盾。\",\"date\":\"2026-03-30\",\"category\":\"tldr\",\"original\":\"I used AI. It worked. I hated it..md\",\"originalUrl\":\"https://taggart-tech.com/reckoning/\",\"score\":\"82\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p4/using-ai-coding-tools-worked-but-felt-miserable.md\"},\"neighbors\":{\"previous\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"10-ways-to-stop-hitting-claude-usage-limits\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"10-ways-to-stop-hitting-claude-usage-limits\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"10-ways-to-stop-hitting-claude-usage-limits\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/10-ways-to-stop-hitting-claude-usage-limits\",\"href\":\"/whatsup/tldr/hn-2026-p4/10-ways-to-stop-hitting-claude-usage-limits\",\"category\":\"tldr\",\"title\":\"告别Claude额度焦虑的十个习惯\",\"date\":\"2026-03-30\",\"excerpt\":\"揭示Claude限制基于Token而非消息数，提出编辑替代追问、合并提问、善用项目缓存等十项核心策略，助用户大幅节省Token消耗。\",\"coverImage\":\"$undefined\",\"author\":\"0x_kaize\",\"original\":\"I stopped hitting Claudes usage limits - 10 things I changed.md\",\"originalUrl\":\"https://x.com/0x_kaize/status/2038286026284667239\",\"score\":\"85\",\"content\":\"\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"告别Claude额度焦虑的十个习惯\",\"excerpt\":\"揭示Claude限制基于Token而非消息数，提出编辑替代追问、合并提问、善用项目缓存等十项核心策略，助用户大幅节省Token消耗。\",\"date\":\"2026-03-30\",\"category\":\"tldr\",\"author\":\"0x_kaize\",\"original\":\"I stopped hitting Claudes usage limits - 10 things I changed.md\",\"originalUrl\":\"https://x.com/0x_kaize/status/2038286026284667239\",\"score\":\"85\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p4/10-ways-to-stop-hitting-claude-usage-limits.md\"},\"next\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"machines-are-fine-worried-about-us\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"machines-are-fine-worried-about-us\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"machines-are-fine-worried-about-us\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/machines-are-fine-worried
