n结尾部分呈现了系统性困境：那些曾经被建议用来替代低级任务的反思性、评价性高级作业，现在同样能被LLM轻易完成。作者不得不砍掉最受学生欢迎的创作型写作作业，因为处理每例作弊需4到8小时。无论教师如何适应，AI带来的问题似乎永远领先一步，而最大的输家是被剥夺了真实学习机会的学生。\n\n## 核心概念及解读\n**LLM（大语言模型）**：驱动ChatGPT等AI助手的核心技术，能瞬间生成符合人类语言习惯的文本，彻底改变了作弊的形态与难度。\n\n**形成性评估（Formative Assessment）**：旨在检验学生理解程度、允许安全失败的低风险测试，但交给LLM代劳后便完全失去教学意义。\n\n**学习摩擦（Friction in Learning）**：学习过程中必要的认知努力与不適感，如同健身时的肌肉撕裂，没有摩擦就没有真正的成长。\n\n**异步在线课程（Asynchronous Online Courses）**：学生无需定时出现在课堂的远程教学模式，在AI时代几乎对作弊毫无防御能力。\n\n**教学退让（Pedagogical Concession）**：教师为防止AI作弊而被迫采用质量较低但相对可信的考核方式，如口试或手写考试，牺牲了教学设计的多样性。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [To teach in the time of ChatGPT is to know pain](https://arstechnica.com/science/2026/04/to-teach-in-the-time-of-chatgpt-is-to-know-pain/) |\n| 作者 | Scott K. Johnson |\n| 发表日期 | 2026-04-13 |\n| 评分 | 90/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"teaching-in-the-time-of-chatgpt-pain\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"teaching-in-the-time-of-chatgpt-pain\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"teaching-in-the-time-of-chatgpt-pain\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/teaching-in-the-time-of-chatgpt-pain\",\"href\":\"/whatsup/tldr/hn-2026-p4/teaching-in-the-time-of-chatgpt-pain\",\"category\":\"tldr\",\"title\":\"ChatGPT时代的教学之痛\",\"date\":\"2026-04-13\",\"excerpt\":\"一位大学兼职教师以亲身经历讲述生成式AI如何让教学变得令人沮丧——LLM不仅助长了学术不端，更在根本上侵蚀了学习的意义与教育的价值。\",\"coverImage\":\"$undefined\",\"author\":\"Scott K. Johnson\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"90\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"ChatGPT时代的教学之痛\",\"author\":\"Scott K. Johnson\",\"date\":\"2026-04-13\",\"excerpt\":\"一位大学兼职教师以亲身经历讲述生成式AI如何让教学变得令人沮丧——LLM不仅助长了学术不端，更在根本上侵蚀了学习的意义与教育的价值。\",\"source_url\":\"https://arstechnica.com/sci
