PT-5 的 40% 骤降至 10%，实现了跨代际的跃升。更引人注目的是黑盒与白盒对比：GPT-5.5 的黑盒表现已超越 GPT-5 带源码的白盒表现，彻底颠覆了传统认知——黑盒不再意味着信息受限下的低效摸索。而加入源码后，白盒性能更是飞跃到几乎让基准测试失去区分度的程度。\n\n文章后半段聚焦实际操作层面的改进。从 GPT-5.4 到 5.5 的演进被概括为学得更快和走得更远两个阶段。在计算机使用基准上，GPT-5.5 的视觉准确率达 97.5%，登录操作所需迭代次数减半，失败识别速度同样提升一倍。在何时坚持与何时放弃这一关键决策上，GPT-5.5 不必要坚持的频率仅为前代的一半，使其在实际应用中更加务实可靠。\n\n## 核心概念及解读\n**Miss Rate（漏检率）**：模型未能发现已知漏洞的比例，是衡量安全模型实用性的核心指标，从 40% 降至 10% 代表覆盖能力的质变。\n\n**黑盒 vs 白盒测试**：黑盒指无源码的攻击者视角，白盒指有源码的深入测试。GPT-5.5 的黑盒超越前代白盒，颠覆了传统测试效能层级。\n\n**Persist or Pivot（坚持或转向）**：模型在失败路径上的决策能力——何时继续推进、何时放弃转向。RLHF 优化倾向于取悦用户，使模型学会放弃反而成为关键训练难点。\n\n**Computer Use（计算机使用）**：模型与真实应用交互的能力，包括登录、导航、视觉识别等，直接影响自动化安全测试的实操效率。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [XBOW - GPT-5.5: Mythos-Like Hacking, Open To All](https://xbow.com/blog/mythos-like-hacking-open-to-all) |\n| 作者 | XBOW |\n| 发表日期 | 2026-04-23 |\n| 评分 | 86/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"xbow-gpt-5-5-offensive-security-review\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"xbow-gpt-5-5-offensive-security-review\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"xbow-gpt-5-5-offensive-security-review\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/xbow-gpt-5-5-offensive-security-review\",\"href\":\"/whatsup/tldr/hn-2026-p4/xbow-gpt-5-5-offensive-security-review\",\"category\":\"tldr\",\"title\":\"GPT-5.5 渗透测试：黑盒超越白盒\",\"date\":\"2026-04-23\",\"excerpt\":\"XBOW 对 OpenAI GPT-5.5 的实战评测显示，漏洞检测 miss rate 降至 10%，黑盒测试已超越 GPT-5 白盒表现，白盒性能更直接击穿既有基准。\",\"coverImage\":\"$undefined\",\"author\":\"XBOW\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"86\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"GPT-5.5 渗透测试：黑盒超越白盒\",\"author\":\"XBOW\",\"date\":\"2026-04-23\",\"excerpt\":\"XBOW 对 OpenAI GPT-5.5 的实战评测显示，漏洞检测 miss rate 降至 1
