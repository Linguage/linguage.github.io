形成功能性突触连接，且感觉神经因轴突直径均匀，能使电信号在肌纤维间均匀分布，将抗疲劳能力提升至原来的 2.6 倍。这一发现彻底改变了运动控制必须依赖大脑通路的传统认知，让计算机成为肌肉的新指令中心。\n\n应用验证层面，研究展示了 MNA 在瘫痪肠道中恢复蠕动、在截肢模型中控制残余肌肉两项关键实验。更为重要的是，该系统成功将感觉信号传回大脑，意味着它可以成为大脑与静默器官之间的双向桥梁。文章还勾勒了更广阔的应用图景：包裹于皮肤移植物中传递触觉、为虚拟现实使用者提供真实的触感反馈，将科幻般的身体增强变为现实。\n\n## 核心概念及解读\n**肌神经驱动器**：将改造后的活体肌肉与感觉神经融合，通过计算机控制的植入式生物马达。\n\n**感觉神经重支配**：用感觉神经纤维替代运动神经与肌肉形成功能性突触，使计算机而非大脑成为控制中枢。\n\n**抗疲劳机制**：感觉神经轴突直径均匀，电信号均匀分布至肌纤维，避免运动神经大轴突优先放电导致的快速疲劳。\n\n**生物混合系统**：将活的生物组织与工程控制界面融合，创造出自体组织的天然植入装置。\n\n**双向神经接口**：MMNA 既可向器官发送运动指令，也能将感觉信号传回大脑，重建脑-器官双向通信。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Turning muscles into motors gives static organs new life](https://news.mit.edu/2026/turning-muscles-into-motors-gives-static-organs-new-life-0331) |\n| 作者 | Rubina Veerakone ｜ McGovern Institute for Brain Research |\n| 发表日期 | 2026-04-01 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"turning-muscles-into-motors-gives-static-organs-new-life\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"turning-muscles-into-motors-gives-static-organs-new-life\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"turning-muscles-into-motors-gives-static-organs-new-life\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/turning-muscles-into-motors-gives-static-organs-new-life\",\"href\":\"/whatsup/tldr/hn-2026-p4/turning-muscles-into-motors-gives-static-organs-new-life\",\"category\":\"tldr\",\"title\":\"将肌肉改造成生物马达，让静默器官重获生机\",\"date\":\"2026-04-01\",\"excerpt\":\"MIT 团队开发出全球首个活体植入式肌神经驱动器，通过改造体内肌肉并接入感觉神经，用计算机替代大脑控制瘫痪器官运动。\",\"coverImage\":\"$undefined\",\"author\":\"Rubina Veerakone ｜ McGovern Institute for Brain Research\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"将肌肉改造成生物马达，让静默器官重获生机\",\"a
