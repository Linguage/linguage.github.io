unker等，现已消亡。\n\n**语言简化趋势**：语言演变倾向于消除冗余分类，当复数形式能兼容双人语境时，双数形式便失去保留动力。\n\n**诺曼征服的语言影响**：1066年诺曼入侵带来法语礼仪，将复数代词作为尊称用于单数交际，最终淘汰了单数代词thou。\n\n**古诺斯语借词**：维京人带来的they系列代词因表意清晰，取代了古英语中容易引起歧义的同音代词hie。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Wit, unker, git: The lost medieval pronouns of English intimacy](https://www.bbc.com/future/article/20260408-the-extinct-english-words-for-just-the-two-of-us) |\n| 作者 | Sophie Hardach |\n| 发表日期 | 2026-04-09 |\n| 评分 | 85/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"lost-medieval-english-dual-pronouns\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"lost-medieval-english-dual-pronouns\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"lost-medieval-english-dual-pronouns\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/lost-medieval-english-dual-pronouns\",\"href\":\"/whatsup/tldr/hn-2026-p4/lost-medieval-english-dual-pronouns\",\"category\":\"tldr\",\"title\":\"消失的古英语双数代词\",\"date\":\"2026-04-09\",\"excerpt\":\"古英语中曾存在专门表示两人的双数代词，如wit和git，它们在历史变迁中因语言简化及社会政治影响而消亡。\",\"coverImage\":\"$undefined\",\"author\":\"Sophie Hardach\",\"original\":\"Wit, unker, git The lost medieval pronouns of English intimacy.md\",\"originalUrl\":\"https://www.bbc.com/future/article/20260408-the-extinct-english-words-for-just-the-two-of-us\",\"score\":\"85\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"消失的古英语双数代词\",\"excerpt\":\"古英语中曾存在专门表示两人的双数代词，如wit和git，它们在历史变迁中因语言简化及社会政治影响而消亡。\",\"date\":\"2026-04-09\",\"category\":\"tldr\",\"author\":\"Sophie Hardach\",\"original\":\"Wit, unker, git The lost medieval pronouns of English intimacy.md\",\"originalUrl\":\"https://www.bbc.com/future/article/20260408-the-extinct-english-words-for-just-the-two-of-us\",\"score\":\"85\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"
