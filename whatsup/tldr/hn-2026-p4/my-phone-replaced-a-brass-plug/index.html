靶面几何结构——靶心定位、环形区域识别、透视变换矫正；YOLOv8专门负责弹孔检测，再用CoreML导出到手机上运行。\n\n从坐标系的转换（Vision用左下原点、UIKit用左上原点）到弹孔半径的经验调参（从理论值10.87%调整到实测值14.13%），文章详细记录了工程落地中的各种坑。最终系统不仅能自动计分，还能通过弹孔散布模式反推射手的问题——扣扳机动作、呼吸节奏、甚至枪械本身的问题。他将这个成果打包成了GroupBuilder应用。\n\n## 核心概念及解读\n**弹孔即负空间**：物体检测器擅长识别存在的事物，但弹孔的本质是纸面上被移除的部分——用正空间思维去解负空间问题，注定会失败。\n\n**两阶段融合推理**：先用OpenCV做几何结构感知（靶面环形区域），再用YOLOv8做局部弹孔检测，实质上就是今天多模态大模型中视觉编码器+检测头的早期实践。\n\n**坐标空间战争**：Vision框架使用左下角原点的归一化坐标，UIKit使用左上角原点，毫厘之差就会导致整环误判——看似简单的坐标映射是系统中最隐蔽的bug来源。\n\n**弹性边界与经验调参**：子弹击穿纸张后撕裂口小于子弹直径，理论计算无法准确描述这种非线性变形，最终通过30%的经验系数来完成计分补偿。\n\n**从计分到诊断**：弹孔散布模式本身就是指向性反馈——密集一团偏右下提示扣扳机问题，垂直长条贯穿中心提示呼吸节奏问题，系统因此超越了工具属性成为教练。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [My Phone Replaced a Brass Plug](https://drobinin.com/posts/my-phone-replaced-a-brass-plug/) |\n| 作者 | Vadim Drobinin |\n| 发表日期 | 2026-04-23 |\n| 评分 | 94/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"my-phone-replaced-a-brass-plug\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"my-phone-replaced-a-brass-plug\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"my-phone-replaced-a-brass-plug\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/my-phone-replaced-a-brass-plug\",\"href\":\"/whatsup/tldr/hn-2026-p4/my-phone-replaced-a-brass-plug\",\"category\":\"tldr\",\"title\":\"当iPhone取代黄铜计分塞：一位厨子猎人的计算机视觉之旅\",\"date\":\"2026-04-23\",\"excerpt\":\"一位iOS工程师为了追求料理伦理而学习狩猎，因厌倦手动计分，用OpenCV、YOLOv8和CoreML构建了自动射击靶心评分系统，最终将iPhone变成了一个智能射击教练。\",\"coverImage\":\"$undefined\",\"author\":\"Vadim Drobinin\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"94\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"当iPhone取代黄铜计分塞：一位厨子猎人的计算机视觉之旅\",\"author\":\"Vadim Drobinin\",\"date\":\"2026-04-23\",\"excerpt\":\"一位iOS工程师为了追求料理伦理而学习狩猎，因厌倦手动计分，用OpenCV、YOLOv8和CoreML构建了自动射击靶心评
