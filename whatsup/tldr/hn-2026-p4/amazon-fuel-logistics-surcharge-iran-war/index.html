\"category\":\"tldr\",\"title\":\"伊朗战争推高油价亚马逊向卖家征收附加费\",\"date\":\"2026-04-03\",\"excerpt\":\"受伊朗战争持续推高能源价格影响，亚马逊宣布将对使用其物流服务的北美第三方卖家加收百分之三点五的燃油与物流附加费，以应对不断上涨的运营成本。\",\"coverImage\":\"$undefined\",\"author\":\"Annie Palmer\",\"original\":\"Amazon to add 3.5% fuel and logistics surcharge for sellers as Iran war drives up energy prices.md\",\"originalUrl\":\"https://www.cnbc.com/2026/04/02/amazon-add-3point5percent-fuel-and-logistics-surcharge-for-sellers-amid-iran-war.html\",\"score\":\"75\",\"content\":\"# 伊朗战争推高油价亚马逊向卖家征收附加费\\n\\n## 摘要\\n因伊朗战争推高全球油价及物流成本，亚马逊宣布自四月十七日起，对美国和加拿大的第三方卖家加收百分之三点五的燃油与物流附加费。该费用基于物流履约费计算，平均每件商品增加约十七美分，亚马逊称此费率低于其他主要快递公司。\\n\\n## 内容框架与概述\\n受中东局势及伊朗战争进入第五周的影响，全球原油价格大幅飙升。面对燃油和物流成本的急剧上升，亚马逊决定将这部分运营压力部分转移给平台商家。\\n\\n亚马逊向卖家发布通知，将从四月中旬起在美国和加拿大市场实施附加费政策。公司强调此前一直在内部吸收成本，此次调整是与其他物流承运商类似的临时应对措施。\\n\\n此次收费标准基于履约费用而非商品售价，平均每件商品增加约十七美分。亚马逊指出其费率显著低于美国邮政和联合包裹等竞争对手，并承诺继续维护卖家的业务发展与消费者的低价体验。\\n\\n## 核心概念及解读\\n**燃油与物流附加费**: 亚马逊因能源价格飙升而向第三方卖家收取的临时性额外费用，用于弥补运输成本的上涨。\\n\\n**FBA (Fulfillment by Amazon)**: 亚马逊提供的代发货服务，涵盖拣货、包装和配送环节，大多数第三方卖家依赖此项服务。\\n\\n**第三方卖家**: 在亚马逊平台上销售商品并使用其仓储物流服务的独立商户，是平台商品供给和生态的重要组成部分。\\n\\n**地缘政治溢价**: 因伊朗战争等地区冲突导致原油供应受阻，进而引发全球能源和供应链成本急剧增加的市场现象。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Amazon to add 3.5% fuel and logistics surcharge for sellers as Iran war drives up energy prices](https://www.cnbc.com/2026/04/02/amazon-add-3point5percent-fuel-and-logistics-surcharge-for-sellers-amid-iran-war.html) |\\n| 作者 | Annie Palmer |\\n| 发表日期 | 2026-04-03 |\\n| 评分 | 75/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"伊朗战争推高油价亚马逊向卖家征收附加费\",\"excerpt\":\"受伊朗战争持续推高能源价格影响，亚马逊宣布将对使用其物流服务的北美第三方卖家加收百分之三点五的燃油与物流附加费，以应对不断上涨的运营成本。\",\"date\":\"2026-04-03\",\"category\":\"tldr\",\"author\":\"Annie Palmer\",\"original\":\"Amazon to add 3.5% fuel and logistics surcharge for sellers as Iran war drives u
