代的广泛担忧与争议。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"Oracle Files Thousands of H-1B Visa Petitions Amid Mass Layoffs - Austin Today.md\",\"originalUrl\":\"https://nationaltoday.com/us/tx/austin/news/2026/04/03/oracle-files-thousands-of-h-1b-visa-petitions-amid-mass-layoffs/\",\"score\":\"75\",\"content\":\"# 甲骨文大规模裁员同时提交数千签证申请\\n\\n## 摘要\\n甲骨文在经历重大组织变革并解雇数千名本土员工之际，提交了超过三千份H-1B外籍员工签证申请。此举措引发广泛质疑，激起了关于签证项目是否被企业滥用以廉价外籍劳动力取代美国本土员工的激烈争议。\\n\\n## 内容框架与概述\\n介绍甲骨文看似矛盾的人事举措与核心冲突。作为总部位于奥斯汀的科技巨头，甲骨文在近期进行大规模裁员并向本土员工发送解雇通知的同时，却向联邦政府提交了数千份旨在引进外籍专业人才的签证申请。\\n\\n深入探讨引发争议的核心焦点与数据支撑。联邦数据显示，该公司在两个财年内共申请了超过三千一百份此类签证。这种一边削减本土岗位一边引进外籍员工的做法，使得公司被质疑利用相关政策获取更廉价劳动力。\\n\\n总结事件的社会影响与未来走向。该事件不仅暴露了企业在全球化人才配置中的利益考量，也将签证项目再次推上风口浪尖。由于公司对此保持沉默，其人力资源调整的长期影响及规划仍有待外界进一步观察。\\n\\n## 核心概念及解读\\n**H-1B签证项目**：美国允许企业临时雇佣具有专业技能的外籍员工的签证类别，常用于科技行业填补特定人才缺口。\\n\\n**组织变革**：甲骨文近期正在进行重大的公司战略与架构调整，涉及大规模的人力资源重新配置与裁员计划。\\n\\n**廉价劳动力争议**：批评者认为企业利用签证项目以更低薪资的外籍员工替代本土人才，从而降低整体人力成本。\\n\\n**人才缺口论**：支持引进外籍员工的观点，认为某些专业领域难以在当地市场招募到足够数量的合格专业人才。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Oracle Files Thousands of H-1B Visa Petitions Amid Mass Layoffs - Austin Today](https://nationaltoday.com/us/tx/austin/news/2026/04/03/oracle-files-thousands-of-h-1b-visa-petitions-amid-mass-layoffs/) |\\n| 作者 |  |\\n| 发表日期 | 2026-04-04 |\\n| 评分 | 75/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"甲骨文大规模裁员同时提交数千签证申请\",\"excerpt\":\"甲骨文在进行大规模裁员重组的同时，提交了三千多份H-1B签证申请，此举引发了公众对美国本土员工被廉价外籍劳动力取代的广泛担忧与争议。\",\"date\":\"2026-04-04\",\"category\":\"tldr\",\"original\":\"Oracle Files Thousands of H-1B Visa Petitions Amid Mass Layoffs - Austin Today.md\",\"originalUrl\":\"https://nationaltoday.com/us/tx/austin/news/2026/04/03/oracle-files-thousands-of-h-1b-visa-petitions-amid-mass-layoffs/\",\"score\":\"75\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"
