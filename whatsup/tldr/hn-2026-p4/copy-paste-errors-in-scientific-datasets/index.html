现 18 例存在严重疑虑的案例，错误率约为 3%。这些错误涵盖从无意的操作失误到疑似蓄意造假的数据篡改，其中包括一篇帕金森病领域被引超 3000 次的里程碑论文，揭示了当前科学数据审查机制的严重缺失。 \n\n## 内容框架与概述\n\n**科学数据核查的背景与动机**\n\n作者受到诺贝尔奖得主 Thomas Südhof 实验室以及蜘蛛生态学家 Jonathan Pruitt 两起数据造假丑闻的启发，开始构建一套可自动检测 Excel 文件中重复数据块的软件工具。这款工具随后被应用于 Dryad 等开放数据仓库中的公开科学数据集。经过对 600 份数据集的系统扫描，团队共发现 18 例足以引发担忧的异常案例，并向 PubPeer 公开提交了其中 15 例的详细报告。 \n\n**三大典型案例的具体问题**\n\n第一案例来自 2016 年 Cell 期刊上一篇关于帕金森病肠道微生物研究的重磅论文，数据中存在多组连续重复数值，且重复数据占部分实验组样本量的 42% 至 50%，严重影响论文核心结论的可信度。第二案例来自一篇研究动物对心苷毒素抗性演化的论文，鸵鸟与蛇类的实验数据高度雷同，存在精确重复与末位数字固定等可疑模式，作者承认可能存在复制粘贴错误但给出了替代解释。第三案例来自 2017 年 Nature Communications 的一篇克隆鱼行为研究，由于合并两个独立数据文件时 ID 错位，导致所有鱼体长数值被错误分配，作者坦诚承认了这一操作失误并更新了数据集。 \n\n**更深层的系统性问题**\n\n作者指出，3% 的错误率很可能远低于真实水平，因为该软件仅能检测直接复制粘贴这一种特定形式的错误，无法覆盖其他数据操作手段。更根本的问题在于，当前学术体系中没有任何机构或个人有责任主动核查数据准确性——期刊、大学和资助机构更关注排名与指标，举报错误反而会带来不便。唯一值得肯定的是 Dryad 数据仓库，它积极配合了该项目的推进工作。凭借 Astral Codex Ten 博客提供的 5 万美元资助，作者计划继续扫描 Dryad 上剩余约 2.4 万份含 Excel 文件的数据集。 \n\n## 核心概念及解读\n\n**复制粘贴错误（Copy-Paste Error）**\n指研究人员在整理 Excel 数据文件时，将某一数据列或数据块错误地复制到另一位置，导致本应属于不同实验对象或实验组的数值完全相同。这类错误既可能源于操作疏忽，也可能出于蓄意造假。 \n\n**开放数据仓库（Open-Access Data Repository）**\n如 Dryad 这类平台，要求科研人员将论文的原始数据集公开上传，以支持科学研究的可重复性验证。开放数据原则上为独立核查提供了可能，但本文揭示该机制在实践中长期未被充分利用。 \n\n**PubPeer**\n一个科学论文同行评审后评论平台，研究人员可在此公开发布对已发表论文的质疑与讨论。本项目将检测到的异常案例提交至 PubPeer，以推动学术界对相关论文展开审查。 \n\n**样本量与数据错误的影响（Sample Size Impact）**\n在小样本实验中，即便少量数据出现重复错误，也会对统计结论产生决定性影响。例如帕金森案例中，重复数据占实验组样本的 42% 至 50%，使得论文支撑肠道细菌与帕金森症状因果关系的核心证据失去可信度。 \n\n**数据完整性审查缺失（Lack of Data Integrity Review）**\n当前学术发表流程中，期刊同行评审通常不涉及对原始数据文件的逐行核查，评审人无义务也无工具去检测数据层面的操作问题，这使得数据错误可在发表后数年甚至数十年内无人察觉。 \n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Scientific datasets are riddled with copy-paste errors](https://www.sciencedetective.org/scientific-datasets-are-riddled-with-copy-paste-errors/) |\n| 作者 | Markus Englund |\n| 发布日期 | 2026 年 3 月 5 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\", b-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"PubPeer\"}],\"\\n一个科学论文同行评审后评论平台，研究人员可在此公开发布对已发表论文的质疑与讨论。本项目将检测到的异常案例提交至 PubPeer，以推动学术界对相关论文展开审查。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"样本量与数据错误的影响（Sample Size Impact）\"}],\"\\n在小样本实验中，即便少量数据出现重复错误，也会对统计结论产生决定性影响。例如帕金森案例中，重复数据占实验组样本的 42% 至 50%，使得论文支撑肠道细菌与帕金森症状因果关系的核心证据失去可信度。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"数据完整性审查缺失（Lack of Data Integrity Review）\"}],\"\\n当前学术发表流程中，期刊同行评审通常不涉及对原始数据文件的逐行核查，评审人无义务也无工具去检测数据层面的操作问题，这使得数据错误可在发表后数年甚至数十年内无人察觉。\"]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],\"$L1b\"]}]}],\"$L1c\"]}]}]]\n"])</script><script>self.__next_f.push([1,"1b:[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]\n"])</script><script>self.__next_f.push([1,"1c:[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原标题\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-
