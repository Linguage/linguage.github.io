量子算法与经过验证的传统非对称加密相结合，提供双重保护。\n\n文章围绕EBIOS风险评估方法论，强调必须对信息系统进行全面量化分析，区分关键数据与可妥协数据，识别系统间依赖关系，形成全局安全战略。文章还讨论了回归物理手段（如纸质文档）和一次性验证码等补充性保护措施，并指出后量子密码学转型需要数年时间，必须立即投入人力和财务资源进行密码学技能培养，拖延将导致在极度受限的时间窗口内面临高额适配成本。\n\n## 核心概念及解读\n**Shor算法**：1994年提出的量子算法，能以指数级速度分解大整数，直接威胁RSA等非对称加密体系。\n\n**Grover算法**：量子搜索算法，可将对称加密（AES）和哈希函数（SHA）的有效密钥强度减半。\n\n**后量子密码学**：开发能抵抗量子计算机攻击的新一代加密算法，不依赖离散因式分解或对数问题。\n\n**ML-KEM/ML-DSA/SLH-DSA**：NIST选定的三种后量子密码标准化算法，分别用于安全访问和数字签名。\n\n**混合加密**：将后量子算法与传统加密结合使用，在新技术成熟前提供双重安全保障。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Cryptography: how to protect critical systems in the quantum era](https://www.polytechnique-insights.com/en/columns/geopolitics/cryptography-how-to-protect-yourself-in-the-post-quantum-era/?utm_source=brevo\u0026utm_campaign=newsletter201en\u0026utm_medium=email\u0026utm_id=158) |\n| 作者 | Christophe Gaie |\n| 发表日期 | 2025-02-19 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"cryptography-protection-quantum-era\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"cryptography-protection-quantum-era\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"cryptography-protection-quantum-era\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/cryptography-protection-quantum-era\",\"href\":\"/whatsup/tldr/hn-2026-p4/cryptography-protection-quantum-era\",\"category\":\"tldr\",\"title\":\"量子时代密码学：如何守护关键系统\",\"date\":\"2025-02-19\",\"excerpt\":\"量子计算对现有加密体系构成颠覆性威胁，各国政府需提前布局后量子密码学转型，通过NIST标准化算法、混合加密策略和系统性风险评估来保障数字主权。\",\"coverImage\":\"$undefined\",\"author\":\"Christophe Gaie\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"量子时代密码学：如何守护关键系统\",\"author\":\"Christophe Gaie\",\"date\":\"2025-02-19\",\"excerpt\":\"量子计算对现有加密体系构成颠覆性威胁，各国政府需提前布局后量
