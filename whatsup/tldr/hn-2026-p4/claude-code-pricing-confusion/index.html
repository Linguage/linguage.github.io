案馆存档了修改前后的两个版本，证实这一变化确实发生。消息传出后，Reddit、Hacker News 和 Twitter 社区迅速炸锅，大量用户表示恐慌或愤怒，担忧自己依赖的工具被突然大幅涨价。\n\n**Anthropic 的回应与后续撤回**\n\n面对舆论压力，Anthropic 增长主管 Amol Avasare 在 Twitter 上发文解释，称此次改动仅是针对约 2% 新用户的小规模测试，现有 Pro 和 Max 订阅用户不受影响。然而作者 Simon Willison 对此解释持怀疑态度，指出所有人都能看到新版定价页面，且互联网档案馆已快速存档。几小时后，Anthropic 在依然没有任何正式声明的情况下，悄悄将定价页面恢复原状，Claude Code 的 Pro 计划勾选框重新出现。整个过程缺乏透明度，令作者深感信任受损。\n\n**更深层的战略隐患与竞争影响**\n\n作者从个人使用与教学两个角度，分析了此次事件的潜在长期危害。Claude Code 是编程智能体领域的开创性产品，已为 Anthropic 贡献数十亿美元年收入，而将其门槛骤然提升至每月 100 美元，会直接切断大量普通用户和教育场景。与此同时，OpenAI 的 Codex 产品趁势宣布将继续在免费和 Plus（每月 20 美元）套餐中提供，其工程负责人公开强调透明度和信任原则。作者表示，若 Claude Code 持续涨价，他将在教学材料中转向 Codex，并呼吁 Anthropic 作出明确承诺，保证 Claude Code 在 Pro 套餐中的长期可用性。\n\n## 核心概念及解读\n\n**Claude Code（编程智能体）**  \nAnthropic 旗下的 AI 编程助手产品，能够自主完成代码编写、调试和项目分析等任务，被认为是开创了编程智能体这一产品类别，目前是 Anthropic 的核心收入来源之一。\n\n**Claude Max 套餐**  \nAnthropic 提供的高阶订阅计划，分为每月 100 美元（5 倍用量）和每月 200 美元（20 倍用量）两档，主要面向重度专业用户，此次风波核心正是 Claude Code 是否应被锁定在此套餐内。\n\n**A/B 测试（小范围测试）**  \n互联网产品常见的迭代手段，指将新版本仅推送给一小部分用户，观察数据表现再决定是否全面推广。Anthropic 此次被批评的正是将价格调整包装为测试，却未提前告知用户，导致大规模误解。\n\n**Claude Cowork**  \nAnthropic 推出的另一款产品，文章作者指出其本质是 Claude Code 的改版，只是换了一个听起来更温和的品牌名称，且仍保留在 Pro 套餐中，与本次调整形成矛盾。\n\n**定价透明度与用户信任**  \n文章核心议题之一。作者认为，对于订阅制 AI 工具而言，稳定且透明的定价是用户长期投入学习和使用的前提。无通知的价格变动，即便最终撤回，也已对品牌信誉造成实质性损害。\n\n## 文章基本信息\n\n|字段|内容|\n|---|---|\n|原标题|[Is Claude Code going to cost $100/month? Probably not—it's all very confusing](https://simonwillison.net/2026/Apr/22/claude-code-confusion/)|\n|作者|Simon Willison|\n|发布日期|2026 年 4 月 22 日|\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"claude-code-pricing-confusion\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"claude-code-pricing-confusion\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"claude-code-pricing-confusion\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/claude-code-pricing-confusion\",\"href\":\"/whatsup/tldr/hn-2026-p4/claude-code-pricing-confusion\",\"category\":\"tldr\",\"title\":\"C
