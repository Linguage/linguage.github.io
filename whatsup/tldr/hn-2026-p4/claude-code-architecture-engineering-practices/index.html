、HANDOFF.md接力方案和Plan Mode工程价值的实践建议。Skill设计部分强调了渐进式披露和按需加载的核心思想，提供了三种典型Skill类型和反模式对照。工具设计部分则从Claude Code内部工具的演进历史中提炼出独立工具优于参数标记的设计原则。\n\n文章最后探讨了Agent治理的核心矛盾——赋予能力与控制风险之间的张力，介绍了合作模式、边界模式、治理模式三种协同范式，并给出了分阶段采纳的务实建议，是一份理论与实践兼具的AI代理工程指南。\n\n## 核心概念及解读\n**六层架构模型**：将Claude Code拆为CLAUDE.md、Tools/MCP、Skills、Hooks、Subagents、Verifiers六层，每层职责独立且相互约束。\n\n**渐进式披露**：不让模型一次性看到所有信息，而是先获得索引导航，再按需拉取细节，Skill的描述符常驻而正文按需加载。\n\n**上下文成本会计**：200K上下文中有15-20K是固定开销，MCP工具定义是最大隐形杀手，5个Server可达25000 tokens的隐性消耗。\n\n**Compact Instructions**：在CLAUDE.md中写明压缩优先级，让模型知道压缩时必须保留架构决策和修改记录，而非让算法随意裁剪。\n\n**Agent治理三角**：合作模式（单目标自治）、边界模式（约束框架内执行）、治理模式（多Agent制衡审计），三者各有适用场景。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [你不知道的 Claude Code：架构、治理与工程实践](https://tw93.fun/2026-03-12/claude.html) |\n| 作者 | Tw93 |\n| 发表日期 | 2026-03-13 |\n| 评分 | 93/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"claude-code-architecture-engineering-practices\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"claude-code-architecture-engineering-practices\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"claude-code-architecture-engineering-practices\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/claude-code-architecture-engineering-practices\",\"href\":\"/whatsup/tldr/hn-2026-p4/claude-code-architecture-engineering-practices\",\"category\":\"tldr\",\"title\":\"Claude Code架构治理与工程实践深度解析\",\"date\":\"2026-03-13\",\"excerpt\":\"一位资深开发者基于半年深度实践的踩坑总结，解析Claude Code六层架构、上下文工程实践、Skill和工具设计原则，以及Agent协同治理模式。\",\"coverImage\":\"$undefined\",\"author\":\"Tw93\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"93\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Claude Code架构治理与工程实践深度解析\",\"author\":\"Tw93\",\"date\":\"2026-03-13\",\"excerpt\":\"一位资深开发者基于半年深度实践的踩坑总结，解析Claude Code六层架构、上下文工程实践、S
