\n\n随后文章沿着Prompt Engineering → Context Engineering → Spec-driven Development → Harness Engineering的递进线索，梳理了大模型应用范式的四次演进。作者重点阐述了Harness Engineering的四个落地层面——约束层、文档层、反馈层、清理层——强调用机械化规则替代口头约定，让每一次Agent错误都沉淀为基础设施改进。\n\n第二部分转向务虚的思辨。作者反思了这篇文章本身不够AI Native的悖论，讨论了Karpathy提出的Jagged Intelligence概念，以及在一个知识高速更迭的时代，与其追求深入理解每个东西，不如追求快速沉淀和验证每个有价值的东西。全文充满了在反复摧毁与重建中沉淀的真切体感。\n\n## 核心概念及解读\n**Harness Engineering**：给Agent搭建约束体系，包括机械化规则、精简文档、错误反馈闭环和自动化熵清理，核心是让马配好缰绳而非靠蛮力。\n\n**Context Engineering**：在Agent每次推理时管理其信息环境，确保看到最精准、最少冗余的上下文，解决Prompt Engineering无法应对的动态信息膨胀。\n\n**Spec-driven Development**：先写清晰契约定义需求边界和验收标准，再让Agent动手实现，看似变慢实则大幅减少返工。\n\n**Jagged Intelligence**：Karpathy提出的概念，指LLM能力分布与人类完全不同，强项极强而弱项出人意料，理解这种分布是有效协作的前提。\n\n**Agent + Skill/Tool 新范式**：从LangChain等编排框架转向弱化框架，以Agent配合可复用的Skill/Tool库来完成复杂任务的模式。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [自掏腰包一万元，拥抱AI这一年，我的工具、实践和思考](https://mp.weixin.qq.com/s?__biz=MzI2NDU4OTExOQ==\u0026mid=2247695194\u0026idx=1\u0026sn=030591ea76020210c5f06692fb30243f\u0026poc_token=HJCn6Gmjag1CUoEIAtIGj_9CRTGpMyEXBMNWaENx) |\n| 作者 | 李是希 |\n| 发表日期 | 2026-04-10 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"embracing-ai-for-a-year-tools-practices-and-thoughts\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"embracing-ai-for-a-year-tools-practices-and-thoughts\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"embracing-ai-for-a-year-tools-practices-and-thoughts\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/embracing-ai-for-a-year-tools-practices-and-thoughts\",\"href\":\"/whatsup/tldr/hn-2026-p4/embracing-ai-for-a-year-tools-practices-and-thoughts\",\"category\":\"tldr\",\"title\":\"自掏腰包一万元，拥抱AI这一年\",\"date\":\"2026-04-10\",\"excerpt\":\"一位技术人自述花费超万元拥抱AI一年，分享从Mac工具链到Agent实践，从Prompt Engineering到Harness Engineering的进化之路，以及面对AI快速迭代的思考与暴论。\",\"coverImage\":\"$undefined\",\"author\":\"李是希\",\"original\":\"$undefined\",\"originalUrl\":
