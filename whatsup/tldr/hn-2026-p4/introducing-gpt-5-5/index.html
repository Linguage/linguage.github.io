I 迄今最强的安全防护措施，正逐步向 ChatGPT 和 Codex 的付费用户推出。\n\n## 内容框架与概述\n\nGPT-5.5 代表了人工智能从对话助手向自主工作伙伴的关键演进。该模型不仅能更快理解用户意图，还能主动承担多步骤任务的规划与执行，包括代码编写与调试、在线研究、数据分析、文档创建、软件操作以及跨工具协作。与前几代模型相比，GPT-5.5 在处理模糊指令和复杂工作流时展现出更强的自主性，用户无需精细管理每一步操作，只需给出大致目标即可信任模型完成全程。这种能力跃升特别体现在代理式编码、计算机使用和知识工作领域，模型能够在更长的上下文中进行推理并持续采取行动。\n\n在效率方面，GPT-5.5 实现了重大突破。通常更大更强的模型服务速度更慢，但 GPT-5.5 通过与 NVIDIA GB200 和 GB300 NVL72 系统的协同设计，在真实服务环境中达到了与 GPT-5.4 相当的每令牌延迟，同时完成相同 Codex 任务所使用的令牌数量大幅减少。OpenAI 内部团队已广泛采用该模型，超过 85% 的员工每周使用 Codex 进行工作，涵盖软件工程、财务、通信、营销、数据科学和产品管理等多个职能。实际应用案例包括财务团队处理 71,637 页税务表格、通信团队构建自动化请求处理系统等。\n\n安全与可及性是 GPT-5.5 发布的另一核心维度。OpenAI 将该模型的生物化学和网络安全能力评定为 Preparedness Framework 下的 High 级别，部署了更严格的网络风险分类器，并通过 Trusted Access for Cyber 计划为经过验证的防御性用户提供扩展访问权限。模型在发布前经历了全面的安全评估、红队测试以及近 200 家早期合作伙伴的反馈收集。API 定价方面，GPT-5.5 标准版为每百万输入令牌 5 美元、输出令牌 30 美元，Pro 版则为 30 美元和 180 美元，虽然价格高于前代，但更高的令牌效率使实际成本更具竞争力。\n\n## 核心概念及解读\n\n**Agentic AI（代理式人工智能）**\n指能够自主设定目标、制定计划并执行多步骤操作的人工智能系统，而非仅响应单一指令。GPT-5.5 在此领域的进步体现在能够处理混乱的多部分任务，在编码、研究和计算机操作中主动导航模糊性并持续迭代，标志着 AI 从工具向协作者的范式转变。\n\n**Inference Efficiency（推理效率）**\n衡量模型在单位计算资源下完成任务的能力，包括速度和令牌消耗两个维度。GPT-5.5 通过模型与硬件的协同设计，在保持 GPT-5.4 同等延迟的同时实现更高智能水平，且完成相同任务所需令牌更少，这对大规模商业部署具有关键经济意义。\n\n**CyberGym / Terminal-Bench 2.0（专业基准测试）**\n分别为网络安全和命令行工作流的评估标准。GPT-5.5 在 CyberGym 达到 81.8%、Terminal-Bench 2.0 达到 82.7% 的成绩，这些测试模拟真实世界的复杂场景，超越单纯知识问答，检验模型在实际操作环境中的规划、工具协调和错误修复能力。\n\n**Trusted Access for Cyber（网络可信访问）**\nOpenAI 针对高级网络安全能力推出的分级访问机制，通过验证用户身份和信任信号，为负责关键基础设施防御的专业人员提供限制更少的模型使用权限，同时保持对潜在滥用的监控，体现了能力开放与安全管控的平衡策略。\n\n**Codex（AI 编程与工作环境）**\nOpenAI 的 AI 驱动开发平台，GPT-5.5 在此环境中不仅生成代码，还能执行调试、测试、重构和验证等完整工程流程。平台支持 400K 上下文窗口和计算机使用功能，使模型能够查看屏幕、点击、输入并在不同软件间精确导航。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Introducing GPT-5.5](https://openai.com/index/introducing-gpt-5-5/) |\n| 作者 | OpenAI |\n| 发布日期 | 2025 年 4 月 23 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L15\",null,{\"post\":{\"kind\":\"entry\",\"secti 6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"CyberGym / Terminal-Bench 2.0（专业基准测试）\"}],\"\\n分别为网络安全和命令行工作流的评估标准。GPT-5.5 在 CyberGym 达到 81.8%、Terminal-Bench 2.0 达到 82.7% 的成绩，这些测试模拟真实世界的复杂场景，超越单纯知识问答，检验模型在实际操作环境中的规划、工具协调和错误修复能力。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Trusted Access for Cyber（网络可信访问）\"}],\"\\nOpenAI 针对高级网络安全能力推出的分级访问机制，通过验证用户身份和信任信号，为负责关键基础设施防御的专业人员提供限制更少的模型使用权限，同时保持对潜在滥用的监控，体现了能力开放与安全管控的平衡策略。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Codex（AI 编程与工作环境）\"}],\"\\nOpenAI 的 AI 驱动开发平台，GPT-5.5 在此环境中不仅生成代码，还能执行调试、测试、重构和验证等完整工程流程。平台支持 400K 上下文窗口和计算机使用功能，使模型能够查看屏幕、点击、输入并在不同软件间精确导航。\"]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[\"$L18\",\"$L19\"]}]}],\"$L1a\"]}]}]]\n"])</script><script>self.__next_f.push([1,"18:[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}]\n19:[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-t
