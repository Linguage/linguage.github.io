**用户画像（Profiling）**：GDPR定义下对个人数据的自动化处理，用于评估、预测或影响个人行为。\n\n**重定向（Retargeting）**：向曾访问某网站的用户在其他网站上展示广告，追踪用户跨站行为。\n\n**情境定向（Contextual Targeting）**：根据内容环境而非用户画像投放广告，成为规避儿童保护规则的灰色地带。\n\n**认知偏见利用**：MOMENTOUS项目研究算法如何利用人类认知偏见操纵用户偏好和行为。\n\n**信息茧房**：算法推荐可能限制用户接触多元观点，强化同类群体中的特定叙事，加剧社会分化。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How profiling influences our behaviour](https://www.polytechnique-insights.com/en/columns/digital/algorithms-and-profiling-predicting-and-influencing-our-needs-in-the-digital-age/?utm_source=brevo\u0026utm_campaign=newsletter201en\u0026utm_medium=email\u0026utm_id=160) |\n| 作者 | Philippe Huneman |\n| 发表日期 | 2025-05-28 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"profiling-influences-behaviour\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"profiling-influences-behaviour\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"profiling-influences-behaviour\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/profiling-influences-behaviour\",\"href\":\"/whatsup/tldr/hn-2026-p4/profiling-influences-behaviour\",\"category\":\"tldr\",\"title\":\"算法画像：预测与影响行为的数字之眼\",\"date\":\"2025-05-28\",\"excerpt\":\"本文探讨数字时代的用户画像如何通过算法预测和影响我们的行为，以及由此引发的隐私、伦理和监管挑战。\",\"coverImage\":\"$undefined\",\"author\":\"Philippe Huneman\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"算法画像：预测与影响行为的数字之眼\",\"author\":\"Philippe Huneman\",\"date\":\"2025-05-28\",\"excerpt\":\"本文探讨数字时代的用户画像如何通过算法预测和影响我们的行为，以及由此引发的隐私、伦理和监管挑战。\",\"source_url\":\"https://www.polytechnique-insights.com/en/columns/digital/algorithms-and-profiling-predicting-and-influencing-our-needs-in-the-digital-age/?utm_source=brevo\u0026utm_campaign=newsletter201en\u0026utm_medium=email\u0026utm_
