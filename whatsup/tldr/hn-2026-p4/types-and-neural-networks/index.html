方式粒度高，但只传递一位接受或拒绝的信号，无法告知模型应该说什么。两种方式的共同缺陷是均不更新模型权重，模型无法从错误中真正学习。\n\n**二、从训练期融入类型结构的理论基础**\n\n作者以国际象棋为类比：AlphaZero 将棋盘规则融入训练，以不足 GPT-4 万分之三的参数量达到超人水平，且从不走非法棋步；而 GPT-4 仅凭通用训练大约有 30% 的概率走出非法步骤。这一对比揭示了将领域结构编码进训练的巨大潜力。在类型化编程语言领域，现有自动微分研究（如 CHAD）虽已探索如何对余积类型求导，但这些方法要求程序员提前固定输入空间的划分，模型在训练中无法自主学习哪个分支才是正确选择，本质上仍是对已知结构的梯度传播，而非对结构本身的学习。\n\n**三、对结构求导：让模型学习类型选择**\n\n作者提出一种新思路：不对离散选择求导，而是让模型学习离散选择本身。对于输出类型为 A+B 的网络，可将其分解为三个可微映射：一个用于预测选择哪个分支的分布，另外两个分别针对 A 和 B 生成具体值。训练时仅对实际采样的分支反向传播，并以交叉熵损失监督分支选择。这种方式天然产生类型正确的输出，且模型能够真正学习何时选择哪种类型。作者进一步指出，这一余积结构是有限集索引的依赖对的特例，可推广至归纳类型和依赖类型，而支撑这一框架的数学工具正是容器理论与依赖镜头。\n\n## 核心概念及解读\n\n**约束解码（Constrained Decoding）**\n在每次采样词元之前，将所有可能导致类型不合法的词元概率设为负无穷，确保模型只能采样出合法词元。优点是输出必然通过类型检查，缺点是只能阻止模型说某些内容，无法改变模型内在的概率倾向，可能导致生成走入低概率的无意义分支。\n\n**余积类型（Coproduct / Either Type）**\n类型论中表示两个类型之一的联合类型，在 Haskell 中写作 Either a b，对应 Left a 或 Right b。生成余积类型的函数必须通过某种谓词将输入空间划分为两部分，这一性质源自集合范畴的广延性（extensivity），也是对类型化输出求导的核心障碍。\n\n**对结构求导 vs. 穿越结构求导（Differentiating with respect to structure vs. through structure）**\n穿越结构求导指提前固定类型分支，梯度仅在已选定的分支内流动，模型无法学习换到另一分支；对结构求导则用可微的分布来表示对分支的选择，通过交叉熵损失同时训练分支选择和各分支的内容生成，使模型能真正学习类型级别的决策。\n\n**容器理论与依赖镜头（Containers and Dependent Lenses）**\n容器是范畴论中用于描述参数化形状及其内容的数学结构，可统一表示列表、树、归纳类型等多种数据结构。依赖镜头则提供双向信息流（前向传播与反向梯度）的形式化语言。作者认为这两种工具构成了类型化神经网络统一理论的数学基础。\n\n**Abstract Syntax Networks（ASN，抽象语法网络）**\n2017 年提出的一类神经网络架构，其输出空间直接对应抽象语法树的节点类型，而非扁平的词元序列。这与作者所倡导的方向高度一致，但当时缺乏依赖类型语言的应用场景，也未能在 LLM 时代得到进一步扩展。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Types and Neural Networks](https://www.brunogavranovic.com/posts/2026-04-20-types-and-neural-networks.html) |\n| 作者 | Bruno Gavranović |\n| 发布日期 | 2026 年 4 月 20 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"types-and-neural-networks\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"types-and-neural-networks\"],\"pathSegments\":[\"tldr\",\"hn-2 或拒绝的信号，无法告知模型应该说什么。两种方式的共同缺陷是均不更新模型权重，模型无法从错误中真正学习。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"二、从训练期融入类型结构的理论基础\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"作者以国际象棋为类比：AlphaZero 将棋盘规则融入训练，以不足 GPT-4 万分之三的参数量达到超人水平，且从不走非法棋步；而 GPT-4 仅凭通用训练大约有 30% 的概率走出非法步骤。这一对比揭示了将领域结构编码进训练的巨大潜力。在类型化编程语言领域，现有自动微分研究（如 CHAD）虽已探索如何对余积类型求导，但这些方法要求程序员提前固定输入空间的划分，模型在训练中无法自主学习哪个分支才是正确选择，本质上仍是对已知结构的梯度传播，而非对结构本身的学习。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"三、对结构求导：让模型学习类型选择\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"作者提出一种新思路：不对离散选择求导，而是让模型学习离散选择本身。对于输出类型为 A+B 的网络，可将其分解为三个可微映射：一个用于预测选择哪个分支的分布，另外两个分别针对 A 和 B 生成具体值。训练时仅对实际采样的分支反向传播，并以交叉熵损失监督分支选择。这种方式天然产生类型正确的输出，且模型能够真正学习何时选择哪种类型。作者进一步指出，这一余积结构是有限集索引的依赖对的特例，可推广至归纳类型和依赖类型，而支撑这一框架的数学工具正是容器理论与依赖镜头。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"约束解码（Constrained Decoding）\"}],\"\\n在每次采样词元之前，将所有可能导致类型不合法的词元概率设为负无穷，确保模型只能采样出合法词元。优点是输出必然通过类型检查，缺点是只能阻止模型说某些内容，无法改变模型内在的概率倾向，可能导致生成走入低概率的无意义分支。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"余积类型（Coproduct / Either Type）\"}],\"\\n类型论中表示两个类型之一的联合类型，在 Haskell 中写作 Either a b，对应 Left a 或 Right b。生成余积类型的函数必须通过某种谓词将输入空间划分为两部分，这一性质源自集合范畴的广延性（extensivity），也是对类型化输出求导的核心障碍。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"对结构求导 vs. 穿越结构求导（Differentiating with respect to structure vs. through structure）\"}],\"\\n穿越结构求导指提前固定类型分支，梯度仅在已选定的分支内流动，模型无法学习换到另一分支；对结构求导则用可微的分布来表示对分支的选择，通过交叉熵损失同时训练分支选择和各分支的内容生成，使模型能真正学习类型级别的决策。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"容器理论与依赖镜头（Containers and Dependent Lenses）\"}],\"\\n容器是范畴论中用于描述参数化形状及其内容的数学结构，可统一表示列表、树、归纳类型等多种数据结构。依赖镜头则提供双向信息流（前向传播与反向梯度）的形式化语言。作者认为这两种工具构成了类型化神经网络统一理论的数学基础。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Abstract Syntax Networks（ASN，抽象语法网络）\"}],\"\\n2017 年提出的一类神经网络架构，其输出空间直接对应抽象语法树的节点类型，而非扁平的词元序列。这与作者所倡导的方向高度一致，但当时缺乏依赖类型语言的应用场景，也未能在 LLM 时代得到进一步扩展。\"]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":\"$L19\"}],\"$L1a\"]}]}]]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原标题\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://www.brunoga
