系动力学假说，揭示集体暴力的根源可能深植于社会结构的动态演变中，而非依赖文化符号的建构。\n\n## 核心概念及解读\n**文化标记假说**：认为族群、宗教等文化特征是界定群体身份并引发内部或外部敌意的主要驱动力。\n\n**关系动力学假说**：认为人际纽带和局部竞争的变动足以导致群体分裂并催生集体暴力，无需文化标记介入。\n\n**群体极化**：原本存在交叉联系的社交网络突然断裂，成员互动急剧减少并重组为两个互不交往的凝聚子群。\n\n**永久分裂**：一个群体不可逆地解体为两个在空间和社交上完全隔离的独立繁殖单元。\n\n**致命突袭**：群体成员有组织地对其他群体成员发动的旨在造成伤亡的协同攻击行为。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Lethal conflict after group fission in wild chimpanzees](https://www.science.org/doi/10.1126/science.adz4944) |\n| 作者 | Aaron A. Sandel |\n| 发表日期 | 2026-04-10 |\n| 评分 | 92/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"lethal-conflict-after-chimpanzee-group-fission\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"lethal-conflict-after-chimpanzee-group-fission\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"lethal-conflict-after-chimpanzee-group-fission\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/lethal-conflict-after-chimpanzee-group-fission\",\"href\":\"/whatsup/tldr/hn-2026-p4/lethal-conflict-after-chimpanzee-group-fission\",\"category\":\"tldr\",\"title\":\"野生黑猩猩群体分裂后的致命冲突\",\"date\":\"2026-04-10\",\"excerpt\":\"研究首次在非人类动物中记录到群体分裂后的致命冲突，表明无需文化标记，仅靠社会关系变动即可引发类似人类内战的集体暴力。\",\"coverImage\":\"$undefined\",\"author\":\"Aaron A. Sandel\",\"original\":\"Lethal conflict after group fission in wild chimpanzees.md\",\"originalUrl\":\"https://www.science.org/doi/10.1126/science.adz4944\",\"score\":\"92\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"野生黑猩猩群体分裂后的致命冲突\",\"excerpt\":\"研究首次在非人类动物中记录到群体分裂后的致命冲突，表明无需文化标记，仅靠社会关系变动即可引发类似人类内战的集体暴力。\",\"date\":\"2026-04-10\",\"category\":\"tldr\",\"author\":\"Aaron A. Sandel\",\"original\":\"Lethal conflict after group fission in wild chimpanzees.md\",\"originalUrl\":\"https://www.science.org/doi/10.1126/science.adz4944\",\"score\":\"92\", \"className\":\"mb-6\",\"children\":\"本文基于对乌干达Ngogo黑猩猩长达30年的观察，记录了其群体从团结走向分裂并最终爆发致命冲突的过程。研究发现，关键个体的死亡导致社会网络极化，至2018年彻底分裂为两群。随后其中一群对另一群发动24次袭击，致死24只黑猩猩。这证明在没有文化标记的情况下，社会关系的变动足以引发类似人类内战的集体暴力。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章以人类内战的文化标记假说与关系动力学假说的争论为切入点，提出通过非人类动物研究来检验后者。黑猩猩作为人类近亲且无复杂文化体系，是理想的对照模型。研究团队选取已知最大的野生黑猩猩群体进行长期追踪。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"研究详细梳理了群体演变的三个阶段。在1998至2014年的团结期，群体内部虽有松散的派系，但成员互动频繁且跨派系联系紧密。到了2015年，由于部分关键枢纽个体的自然死亡，群体网络突然极化，成员开始回避彼此，至2018年彻底分裂为空间上隔离的两个独立群体。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"分裂并未以和平告终，而是演变为持续七年的单方面屠杀。其中一个群体对昔日的同伴发动了24次致命袭击，造成至少24名成年雄性和幼崽死亡。这一发现有力支持了关系动力学假说，揭示集体暴力的根源可能深植于社会结构的动态演变中，而非依赖文化符号的建构。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"文化标记假说\"}],\"：认为族群、宗教等文化特征是界定群体身份并引发内部或外部敌意的主要驱动力。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"关系动力学假说\"}],\"：认为人际纽带和局部竞争的变动足以导致群体分裂并催生集体暴力，无需文化标记介入。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"群体极化\"}],\"：原本存在交叉联系的社交网络突然断裂，成员互动急剧减少并重组为两个互不交往的凝聚子群。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"永久分裂\"}],\"：一个群体不可逆地解体为两个在空间和社交上完全隔离的独立繁殖单元。\"]}
