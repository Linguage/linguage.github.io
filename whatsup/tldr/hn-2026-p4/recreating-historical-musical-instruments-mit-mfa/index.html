进工作的同时为新兴的音乐技术领域培养下一代研究者。策展人强调，可演奏的复刻品既能保护原件，又能让公众以原本的方式体验这些乐器。\n\n## 核心概念及解读\n\n**CT扫描与数字重建**：利用工业CT扫描获取乐器内外精确三维结构，为后续物理复刻和声学模拟提供数据基础。\n\n**非破坏性声学测试**：使用冲击锤和激光测振仪测量乐器振动响应，在不损伤原件的前提下分析其声学特性。\n\n**有限元建模**：通过数值模拟方法对乐器进行声学分析，可预测不同材料和结构变化对声音的影响。\n\n**泥浆浇铸工艺**：先3D打印复制品制作石膏阴模，再用陶瓷泥浆浇铸成型，适用于复刻陶制古代乐器。\n\n**音乐考古学**：通过重建古代乐器的声音，从听觉维度探索和理解创造这些乐器的文化及其工艺传统。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Recreating the forms and sounds of historical musical instruments](https://news.mit.edu/2026/recreating-forms-sounds-historic-musical-instruments-0305) |\n| 作者 | Michael Brindley ｜ School of Humanities |\n| 发表日期 | 2026-03-06 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"recreating-historical-musical-instruments-mit-mfa\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"recreating-historical-musical-instruments-mit-mfa\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"recreating-historical-musical-instruments-mit-mfa\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/recreating-historical-musical-instruments-mit-mfa\",\"href\":\"/whatsup/tldr/hn-2026-p4/recreating-historical-musical-instruments-mit-mfa\",\"category\":\"tldr\",\"title\":\"MIT与MFA用科技复刻古乐器之声\",\"date\":\"2026-03-06\",\"excerpt\":\"MIT与波士顿美术博物馆合作，利用CT扫描、3D打印和声学模拟技术复刻馆藏古乐器，让沉睡千年的乐器通过物理复制与数字合成重新发声\",\"coverImage\":\"$undefined\",\"author\":\"Michael Brindley ｜ School of Humanities\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"MIT与MFA用科技复刻古乐器之声\",\"author\":\"Michael Brindley ｜ School of Humanities\",\"date\":\"2026-03-06\",\"excerpt\":\"MIT与波士顿美术博物馆合作，利用CT扫描、3D打印和声学模拟技术复刻馆藏古乐器，让沉睡千年的乐器通过物理复制与数字合成重新发声\",\"source_url\":\"https://news.mit.edu/2026/recreating-forms-sounds-historic-musical-instrume
