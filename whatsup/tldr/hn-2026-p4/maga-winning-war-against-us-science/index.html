科学竞争力的长期衰退**\n\n即便在特朗普第二任期打击科学之前，美国在全球科学领域的主导地位就已大幅滑落。  根据美国国家经济研究局（NBER）的数据，以顶级期刊论文发表量衡量，美国在 1990 年代曾独占全球半壁江山，如今已跌至第三位，落后于中国，也略逊于欧盟。  克鲁格曼指出，部分差距源于中国经济的崛起，但美国也落后于同样被认为经济停滞的欧洲，这一现象格外值得警惕。\n\n**第三段：反科学的政治根源与深远影响**\n\n共和党对科学的敌意由来已久，MAGA 运动的崛起则将其推向极端。  科学家群体的政治捐款数据显示，20 年前仍有一定比例的自然科学家支持共和党，而如今这一比例已接近于零。  这种相互对立的局面，加上 MAGA 对循证决策的排斥和对任何批评的过敏，使反科学政策愈演愈烈。克鲁格曼警告，一个放弃科学领导地位的国家，终将无法维持大国地位。\n\n## 核心概念及解读\n\n**MAGA（让美国再次伟大）**\n指特朗普领导的政治运动及其意识形态，强调民族主义、反建制和反精英主义。该运动在文化上表现出强烈的反智主义倾向，将科学家视为政治对立面，助推了一系列反科学政策的出台。\n\n**循证决策（Evidence-Based Policymaking）**\n指以科学研究和实证数据为基础制定公共政策的方法论。文章认为，共和党右翼长期以来抗拒这一原则，尤其在气候变化、疫苗安全和进化论等议题上，政治利益凌驾于科学共识之上。\n\n**NSF 与 NIH 拨款冻结**\n国家科学基金会和国立卫生研究院是美国基础科学研究的核心资助机构。2025 年两者新增拨款均创十年新低，直接影响大量研究项目的正常推进，尤其重创传染病、公共卫生等领域。\n\n**科学人才流失（Brain Drain）**\n外国留学生签证受限使美国高校丧失重要的科研力量来源。这些留学生不仅直接参与研究，也支撑着相关学科的运转，签证政策的收紧将加速科研人才向其他国家流动。\n\n**全球科学竞争力**\n以高质量期刊论文发表比例衡量，中国已超越美国成为全球第一科研大国，欧盟亦小幅领先美国。克鲁格曼认为，科研实力与大国地位密切相关，美国科学的衰退将从根本上削弱其国际影响力。\n\n## 文章基本信息\n\n字段内容\n原标题[MAGA Is Winning Its War Against U.S. Science](https://paulkrugman.substack.com/p/maga-is-winning-its-war-against-us)\n作者Paul Krugman\n发布日期2026 年 4 月 7 日\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"maga-winning-war-against-us-science\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"maga-winning-war-against-us-science\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"maga-winning-war-against-us-science\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/maga-winning-war-against-us-science\",\"href\":\"/whatsup/tldr/hn-2026-p4/maga-winning-war-against-us-science\",\"category\":\"tldr\",\"title\":\"MAGA Is Winning Its War Against U.S. Science\",\"date\":\"2026-04-07\",\"excerpt\":\"When a political movement believes that ignorance is strength\",\"coverImage\":\"$undefined\",\"author\":\"Paul Krugman\",\"original\":\"$undefined\",\"originalUrl\":\"https://paulkrugman.substack.com/p/maga-is-winning-its-war-against-us\",\"score\":\"72\",\"content\":\"$18\",
