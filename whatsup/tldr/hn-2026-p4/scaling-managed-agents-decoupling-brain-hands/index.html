s 的核心设计哲学：提供能超越具体实现而长期稳定的抽象接口。作者用操作系统虚拟化硬件的历史类比——read() 命令无需关心底层是 1970 年代的磁盘还是现代 SSD——来说明接口与实现分离的力量。\n\n在具体实践层面，文章依次讨论了三个关键解耦决策：harness 离开容器使容器变成 cattle、会话日志外置使 harness 本身也可 cattle 化、以及凭据与沙箱的彻底隔离以防止提示注入攻击。每个决策都来自真实运维教训——从无法调试的\"宠物式\"容器到客户 VPC 连接困境。\n\n后半部分深入探讨了会话与 Claude 上下文窗口的本质区别：会话是不变的追加日志，存于大脑之外，提供 getEvents() 接口供灵活查询；而上下文管理则交给 harness 做按需变换。最后展望了多大脑多双手的扩展场景和性能收益。\n\n## 核心概念及解读\n**Pets vs Cattle**：将服务器分为不可替代的宠物与可替换的家畜，避免单个故障点导致整个会话丢失\n\n**大脑与双手解耦**：将 Claude+harness 与执行环境分离，使容器失败仅表现为工具调用错误，可自动重试\n\n**会话即持久日志**：会话是独立于 Claude 上下文窗口的追加式事件日志，支持任意回溯和查询\n\n**操作系统类比**：像 read() 抽象磁盘一样，用稳定接口封装可替换的实现，让抽象比底层更长寿\n\n**凭据保险库模式**：通过资源绑定令牌或安全保险库，确保沙箱中执行的不信任代码无法触及凭据\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Scaling Managed Agents: Decoupling the brain from the hands](https://www.anthropic.com/engineering/managed-agents) |\n| 作者 | Anthropic |\n| 发表日期 | 2026-04-09 |\n| 评分 | 92/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"scaling-managed-agents-decoupling-brain-hands\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"scaling-managed-agents-decoupling-brain-hands\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"scaling-managed-agents-decoupling-brain-hands\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/scaling-managed-agents-decoupling-brain-hands\",\"href\":\"/whatsup/tldr/hn-2026-p4/scaling-managed-agents-decoupling-brain-hands\",\"category\":\"tldr\",\"title\":\"托管 Agent 的规模化之道：解耦大脑与双手\",\"date\":\"2026-04-09\",\"excerpt\":\"Anthropic 工程团队借鉴操作系统虚拟化思路，将 Agent 解耦为大脑（Claude+harness）、双手（沙箱/工具）和会话日志三个独立抽象，解决单容器耦合带来的调试难、恢复慢和安全风险问题。\",\"coverImage\":\"$undefined\",\"author\":\"Anthropic\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"92\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"托管 Agent 的规模化之道：解耦大脑与双手\",\"aut
