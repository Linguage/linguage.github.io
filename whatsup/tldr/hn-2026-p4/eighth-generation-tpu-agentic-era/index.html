备2PB共享高带宽内存，算力达121 ExaFlops，较前代提升近3倍；通过Virgo网络与Pathways软件支持百万芯片近线性扩展，并集成光学电路交换等可靠性技术实现超97%有效算力利用率。TPU 8i则针对低延迟推理场景，配备288GB高带宽内存与384MB片上SRAM，采用Boardfly拓扑结构将网络直径缩短50%以上，通过片上集合加速引擎将延迟降低5倍，实现80%的性价比提升。\n\n两款芯片延续谷歌全栈协同设计理念，从Axion ARM主机、液冷散热到数据中心架构进行系统级优化，性能功耗比较前代提升2倍。它们将原生支持JAX、PyTorch等主流框架，并作为AI Hypercomputer统一堆栈的一部分于今年晚些时候正式商用，为智能体应用提供从模型训练到大规模部署的完整基础设施支撑。\n\n## 核心概念及解读\n\n**TPU（Tensor Processing Unit）**\n张量处理单元，谷歌自研的专用AI加速器，针对神经网络计算中的矩阵运算进行硬件优化，较通用GPU在特定负载下可实现更高能效比。\n\n**智能体时代（Agentic Era）**\nAI发展进入以自主智能体为特征的新阶段，模型需具备多步推理、工具调用、协作执行和持续学习的能力，对基础设施提出低延迟、高吞吐的新要求。\n\n**混合专家模型（MoE, Mixture of Experts）**\n当前主流大模型架构，每次前向传播仅激活部分参数子集，TPU 8i通过提升互连带宽和优化拓扑结构，显著改善专家并行时的通信效率。\n\n**有效算力（Goodput）**\n衡量集群实际产出有用计算时间的指标，区别于理论峰值算力。TPU 8t通过实时遥测、自动故障绕行等技术将有效算力提升至97%以上，直接缩短前沿模型训练周期。\n\n**光学电路交换（OCS, Optical Circuit Switching）**\nTPU 8t采用的可重构网络技术，可在硬件故障时自动重连光路，无需人工干预即可维持训练任务持续运行，保障超大规模集群的可用性。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Our eighth generation TPUs: two chips for the agentic era](https://blog.google/innovation-and-ai/infrastructure-and-cloud/google-cloud/eighth-generation-tpu-agentic-era/) |\n| 作者 | Amin Vahdat |\n| 发布日期 | 2026年4月22日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"eighth-generation-tpu-agentic-era\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"eighth-generation-tpu-agentic-era\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"eighth-generation-tpu-agentic-era\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/eighth-generation-tpu-agentic-era\",\"href\":\"/whatsup/tldr/hn-2026-p4/eighth-generation-tpu-agentic-era\",\"category\":\"tldr\",\"title\":\"谷歌第八代TPU：专为智能体时代打造的双芯架构\",\"date\":\"2026-04-22\",\"excerpt\":\"谷歌在Cloud Next大会上发布第八代张量处理单元，推出TPU 8t训练芯片与TPU 8i推理芯片两款专用架构。这一历时十余年的技术结晶，通过与Google DeepMind联合设计，针对智能体时代的多步推理、持续学习和协作执行等需求进行优化，在算力规模、能效比和系统可靠性方面实现重大突破。\",\"coverImage\":\"$undefined\"
