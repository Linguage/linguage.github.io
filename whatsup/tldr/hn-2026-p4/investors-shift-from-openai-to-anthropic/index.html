业级客户，展现出更健康的增长轨迹。巨大的估值差距使得Anthropic在投资者眼中具备了更大的增值空间。\n\n虽然OpenAI依然在一级市场完成了巨额融资，但这掩盖不了二级市场信心的动摇。即使有大型投行试图通过免除手续费来促进OpenAI股份交易，依然无法阻挡资本向Anthropic倾斜的趋势。这一现象预示着AI行业的竞争不仅是技术的较量，更是商业化和盈利能力的比拼。\n\n## 核心概念及解读\n**二级市场交易**：指投资者之间买卖未上市公司股份的平台，反映了市场对公司当前价值的即时评估和流动性，而非公司本身发行新股融资。\n\n**估值溢价与折价**：当竞价高于上轮融资估值时为溢价，反之为折价。Anthropic目前享受溢价显示需求旺盛，而OpenAI遭遇折价表明持有者急于脱手。\n\n**风险回报比**：投资者评估投入资金所承担风险与预期收益的比率。由于OpenAI估值已极高且成本高昂，其回报比被认为低于估值尚有增长空间的Anthropic。\n\n**企业级客户**：指商业企业客户，通常通过订阅或定制服务付费。相比个人消费者，这类客户能提供更稳定、利润率更高的收入流。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [OpenAIs shocking fall from grace as investors race to Anthropic](https://www.latimes.com/business/story/2026-04-01/openais-shocking-fall-from-grace-as-investors-race-to-anthropic) |\n| 作者 | Hema Parmar |\n| 发表日期 | 2026-04-02 |\n| 评分 | 85/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"investors-shift-from-openai-to-anthropic\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"investors-shift-from-openai-to-anthropic\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"investors-shift-from-openai-to-anthropic\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/investors-shift-from-openai-to-anthropic\",\"href\":\"/whatsup/tldr/hn-2026-p4/investors-shift-from-openai-to-anthropic\",\"category\":\"tldr\",\"title\":\"OpenAI二级市场遇冷，资本加速涌入Anthropic\",\"date\":\"2026-04-02\",\"excerpt\":\"随着 OpenAI 在二级市场遭遇抛售潮且股价遇冷，机构投资者正迅速转向估值相对较低且专注高利润企业服务的 Anthropic，寻求更优的风险回报比。\",\"coverImage\":\"$undefined\",\"author\":\"Hema Parmar\",\"original\":\"OpenAIs shocking fall from grace as investors race to Anthropic.md\",\"originalUrl\":\"https://www.latimes.com/business/story/2026-04-01/openais-shocking-fall-from-grace-as-investors-race-to-anthropic\",\"score\":\"85\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"OpenAI二级市场遇冷，
