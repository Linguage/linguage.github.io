受本身当作真理标准的叙事潮流。两者的结合催生了「欲望要求现实服从」的危险逻辑——从取消文化对历史的道德审判，到「现实转换」（reality shifting）这种通过冥想投射进入想象世界的实践，再到日本起源的蛰居族（hikikomori）彻底退守卧室，其共同本质都是对「他者」的排斥和对不确定性的消除。Bronner强调，这些现象虽有激进边缘案例作为警示，但其更温和的形式已广泛渗透日常，体现为欲望的消退或膨胀——两者都指向对真实世界的逃避。\n\n## 核心概念及解读\n**现在乡愁（Nowstalgia）**：对当下的怀旧，人们不愿设想未来，也不愿正视过去，只留恋近前时刻。\n\n**认知市场**：技术革命颠覆了信息与认知对象的供需秩序，导致个体难以在知识洪流中锚定现实。\n\n**民主忧郁**：托克维尔提出的概念，指民主制度天然催生个体挫败感；技术加速与信息泛滥使其愈演愈烈。\n\n**现实转型（Reality Shifting）**：通过类似清醒梦的心理投射，声称能进入想象替代宇宙的实践，反映逃避现实的集体冲动。\n\n**欲望的消退与膨胀**：欲望既可能膨胀到要求世界服从自我，也可能退缩至完全放弃与真实接触，两者殊途同归。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Are modern uncertainties fragmenting our shared sense of reality?](https://www.polytechnique-insights.com/en/columns/society/between-perceptions-of-the-present-and-collective-uncertainties-how-does-our-era-tackle-reality/?utm_source=brevo\u0026utm_campaign=newsletter203en\u0026utm_medium=email\u0026utm_id=162) |\n| 作者 | Gérald Bronner |\n| 发表日期 | 2026-01-14 |\n| 评分 | 87/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"modern-uncertainties-fragmenting-reality\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"modern-uncertainties-fragmenting-reality\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"modern-uncertainties-fragmenting-reality\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/modern-uncertainties-fragmenting-reality\",\"href\":\"/whatsup/tldr/hn-2026-p4/modern-uncertainties-fragmenting-reality\",\"category\":\"tldr\",\"title\":\"当下如何吞噬了我们的现实感\",\"date\":\"2026-01-14\",\"excerpt\":\"社会学家Gérald Bronner探讨当代社会如何从未来导向转向自我关注，导致现实被当下吞噬的现象，以及人们要求现实服从个人感受的危险趋势。\",\"coverImage\":\"$undefined\",\"author\":\"Gérald Bronner\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"87\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"当下如何吞噬了我们的现实感\",\"author\":\
