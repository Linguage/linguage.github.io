"children\":\"\\n            window.dataLayer = window.dataLayer || [];\\n            function gtag(){dataLayer.push(arguments);}\\n            gtag('js', new Date());\\n            gtag('config', 'G-99PGBGJH4S', {\\n              anonymize_ip: true,\\n              send_page_view: true,\\n            });\\n          \"}]]}]}]]}],{\"children\":[[\"slug\",\"whatsup/tldr/hn-2026-p4/meta-employee-surveillance-ai-training-data\",\"c\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L8\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",[\"$\",\"$1\",\"c\",{\"children\":[\"$Lb\",null,[\"$\",\"$Lc\",null,{\"children\":[\"$Ld\",[\"$\",\"$Le\",null,{\"promise\":\"$@f\"}]]}]]}],{},null,false]},null,false]},null,false],\"$L10\",false]],\"m\":\"$undefined\",\"G\":[\"$11\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"12:I[433,[],\"ViewportBoundary\"]\n14:I[433,[],\"MetadataBoundary\"]\n10:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L12\",null,{\"children\":\"$L13\"}],null],[\"$\",\"$L14\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$3\",null,{\"fallback\":null,\"children\":\"$L15\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"16:I[1203,[\"197\",\"static/chunks/197-f7c33a0114fc3db3.js\",\"373\",\"static/chunks/373-816263e744b1a0a1.js\",\"738\",\"static/chunks/738-b97c8b45db2c8cb9.js\",\"48\",\"static/chunks/app/%5B...slug%5D/page-b39f4036a39e3cb5.js\"],\"default\"]\n17:T107a,"])</script><script>self.__next_f.push([1,"\n# Meta 监控员工键盘与鼠标行为，用于训练 AI 模型\n\n## 摘要\n\nMeta 正在美国员工的工作电脑上安装追踪软件，记录鼠标移动、点击行为与键盘输入，并定期截取屏幕内容，用于训练其 AI 模型。该项目名为模型能力计划（MCI），是 Meta 大规模 AI 转型战略的组成部分。公司表示，这些数据仅用于模型训练，不会用于绩效考核，但此举仍引发了隐私专家和劳工法学者的广泛关切。\n\n## 内容框架与概述\n\nMeta 宣布将在美国本土员工的工作设备上部署名为模型能力计划（MCI）的追踪工具，范围覆盖工作相关的应用程序与网站。该工具将捕获员工的鼠标移动轨迹、点击操作、键盘输入，并不定期截取屏幕内容。目的在于弥补 AI 模型在模拟人机交互细节方面的不足，例如下拉菜单操作与键盘快捷键的使用习惯。Meta 首席技术官 Andrew Bosworth 在另一份内部备忘录中将此举纳入更宏观的 AI 转型框架，并将该计划重新命名为 Agent Transformation Accelerator（ATA）。\n\n该举措是 Meta 推进 AI 工作流重构的重要一环。公司内部正积极鼓励员工将 AI 智能体用于日常工作，包括编程任务，即便短期内会降低效率。Meta 还在模糊不同职能的岗位边界，推行通用职位名称 AI builder。与此同时，公司宣布将于 5 月 20 日启动全球裁员，规模达员工总数的 10%，并计划在年内进行更大范围的削减。在行业层面，亚马逊近期裁减约 3 万名企业员工，金融科技公司 Block 也削减了近半数人力，显示出科技行业整体向 AI 驱动运营转型的趋势。\n\n监控行为引发了隐私与劳工权益方面的担忧。耶鲁大学法学教授 Ifeoma Ajunwa 指出，此次键盘记录将白领员工置于此前仅适用于快递司机和零工工人的实时监控之下，是监控力度的显著升级。在美国联邦层面，目前没有针对雇主监控员工的明确限制，各州法规也仅要求对员工进行宽泛告知。欧洲的情况则截然不同：欧盟的通用数据保护条例（GDPR）可能将此类行为认定为违规，意大利明确禁止通过电子手段追踪员工生产力，德国法院也仅允许在严重犯罪嫌疑等例外情形下才可部署键盘记录工具。\n\n## 核心概念及解读\n\n- 模型能力计划（Model Capability Initiative，MCI）：Meta 内部新部署的员工行为采集工具，用于捕获鼠标轨迹、键盘输入与屏幕截图。其核心目标是为 AI 模型提供真实的人机交互训练数据，以改善模型在操作界面层面的拟人能力。\n\n- Agent Transformation Accelerator（ATA）：Meta 对其 AI 工作流改造计划的最新命名，前身为 AI for Work 项目，目标是让 AI 智能体承担大部分日常工作任务，人类员工转向指导、审查与反馈角色。\n\n- AI 智能体（AI Agent）：能够自主执行特定工作任务的 AI 系统，是 Meta 当前战略布局的核心。与被动响应的聊天机器人不同，AI 智能体可主动完成编程、测试、产品部署等复杂操作流程。\n\n- 通用数据保护条例（GDPR）：欧盟于 2018 年正式实施的数据隐私法规，对个人数据的采集、处理与存储设有严格限制。本文中，法学专家认为 Meta 的员工监控行为极可能违反 GDPR 的相关规定。\n\n- 白领监控（White-collar Surveillance）：指对办公室知识型员工实施的数字化行为追踪，历史上主要针对体力劳动者与零工平台工人。Meta 此次举措被研究者视为这一监控范式向白领群体大规模扩张的标志性事件。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Exclusive: Meta to start capturing employee mouse movements, keystrokes for AI training data](https://www.reuters.com/sustainability/boards-policy-regulation/meta-start-capturing-employee-mouse-movements-keystrokes-ai-training-data-2026-04-21/) |\n| 作者 | Katie Paul、Jeff Horwitz |\n| 发布日期 | 2026 年 4 月 22 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"meta-employee-surveillance-ai-training-data\",\"slugSegments\": \",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI 智能体（AI Agent）：能够自主执行特定工作任务的 AI 系统，是 Meta 当前战略布局的核心。与被动响应的聊天机器人不同，AI 智能体可主动完成编程、测试、产品部署等复杂操作流程。\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"通用数据保护条例（GDPR）：欧盟于 2018 年正式实施的数据隐私法规，对个人数据的采集、处理与存储设有严格限制。本文中，法学专家认为 Meta 的员工监控行为极可能违反 GDPR 的相关规定。\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"白领监控（White-collar Surveillance）：指对办公室知识型员工实施的数字化行为追踪，历史上主要针对体力劳动者与零工平台工人。Meta 此次举措被研究者视为这一监控范式向白领群体大规模扩张的标志性事件。\"}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原标题\"}],\"$L19\"]}],\"$L1a\",\"$L1b\"]}]]}]}]]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children
