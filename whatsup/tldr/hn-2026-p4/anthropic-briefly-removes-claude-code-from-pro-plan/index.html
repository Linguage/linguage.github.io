3,"])</script><script>self.__next_f.push([1,"\n# Anthropic 短暂将 Claude Code 从 20 美元 Pro 订阅计划中移除\n\n## 摘要\n\n2026 年 4 月 21 日，Anthropic 悄然将旗下 AI 编程工具 Claude Code 从每月 20 美元的 Pro 订阅计划中移除，相关定价页面和支持文档均随之更新。事件曝光后，Anthropic 增长负责人将此解释为针对约 2% 新用户的小规模测试，但未能就支持文档的同步修改给出合理说明。随后 Anthropic 撤销了全部改动，恢复了原有的订阅权益说明。\n\n## 内容框架与概述\n\n**事件经过**\n\n2026 年 4 月 21 日下午，Anthropic 在其定价页面和支持文档中悄然移除了 Pro 计划对 Claude Code 的访问权限。支持文档原本写明用户可通过 Pro 或 Max 计划使用 Claude Code，但在事件发生期间，文档被修改为仅提及 Max 计划。部分现有 Pro 用户反映仍可通过网页端和命令行界面访问 Claude Code，但新用户的订阅权益描述已发生明显变化。\n\n**官方回应与争议**\n\n事件在 Twitter 上引发关注后，Anthropic 增长负责人 Amol Avasare 出面解释，称此次变更是针对约 2% 新用户的小规模测试，现有 Pro 和 Max 订阅用户不受影响。然而，这一解释难以自圆其说，因为网站定价页面和支持文档均显示 Pro 用户无法访问 Claude Code，并非仅针对极少数测试用户。当有人追问支持文档为何同步修改时，Avasare 未予回应。在舆论压力下，Anthropic 于事后某个时间点撤销了全部改动。\n\n**潜在走向**\n\n作者 Ed Zitron 认为，此次事件并非偶然，而是 Anthropic 在成本压力下调整订阅策略的前兆。Avasare 本人也坦言，Anthropic 一直在对订阅计划进行小幅调整，例如设置每周使用上限和在高峰期收紧限制，并指出现有套餐并非为当前的使用规模而设计。这与此前企业用户从固定费率被迫转向按 token 计费的举措一脉相承，预示着 Anthropic 未来可能对所有订阅层级进行更大幅度的调整。\n\n## 核心概念及解读\n\n**Claude Code**\nAnthropic 开发的 AI 编程辅助工具，支持通过命令行界面、网页端及桌面客户端使用，此前包含在 Pro 和 Max 订阅计划中，无需额外按量付费。\n\n**Pro 计划 vs Max 计划**\nPro 计划为每月 20 美元的基础订阅，Max 计划为面向重度用户的更高档位订阅。Avasare 指出，Max 计划最初仅面向高频对话场景设计，并非专为 Claude Code 或 Claude Cowork 等工具打造。\n\n**按 token 计费（Token-Based Billing）**\n一种按实际消耗的文本处理单位（token）收费的计费模式，与固定月费的订阅制相对。Anthropic 近期已要求企业用户从订阅制转向此模式，此次对 Pro 用户的调整被认为是同一成本控制逻辑的延伸。\n\n**Prosumer（专业消费者）**\n介于普通消费者与企业用户之间的群体，通常指对工具有较高使用需求的个人开发者或创作者。Avasare 在解释此次测试时，将目标对象描述为新注册的 prosumer 用户。\n\n**成本压缩压力（Compute Crunch）**\n指 AI 公司因大模型推理所需的算力成本持续高企，而不得不压缩用户侧资源开销的现象。本次事件被认为是 Anthropic 应对算力成本压力、调整订阅权益的直接体现。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [\\[UPDATED\\] News: Anthropic (Briefly) Removes Claude Code From $20-A-Month Pro Subscription Plan For New Users](https://www.wheresyoured.at/news-anthropic-removes-pro-cc/) |\n| 作者 | Ed Zitron |\n| 发布日期 | 2026 年 4 月 21 日 |\n"])</script><script>s
