-甲醛及神经递质GABA水平下降。行为层面，咖啡饮用者表现出更高的冲动性和情绪反应性，而非饮用者记忆表现更好。部分代谢物变化在停饮后可逆，重新摄入则引发急性菌群改变，且这些效应不依赖于咖啡因。\n\n研究还构建了整合模型，识别出9种关键代谢物（包括茶碱、咖啡因及特定酚酸）与微生物物种和认知指标紧密相关。这些发现揭示了咖啡对肠脑轴的先前未被充分认识的影响，表明肠道微生物组轮廓或可用于预测咖啡消费模式，并强调了咖啡摄入与肠道菌群组成之间的密切关联。\n\n## 核心概念及解读\n\n**微生物组-肠-脑轴**：肠道微生物与大脑之间的双向通讯通路，咖啡通过影响菌群组成间接调节认知和情绪。\n\n**Cryptobacterium / Eggerthella**：咖啡饮用者肠道中显著富集的菌属，其功能意义有待进一步探索。\n\n**吲哚-3-丙酸与GABA**：咖啡饮用者体内水平下降的代谢物和神经递质，可能与认知行为变化相关。\n\n**咖啡因非依赖性效应**：无咖啡因咖啡同样引发菌群急性变化，提示咖啡中多酚等其他成分也发挥重要作用。\n\n**酚酸代谢个体差异**：肠道菌群影响咖啡酚酸的生物利用度和代谢，导致个体间效应差异显著。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Habitual coffee intake shapes the gut microbiome and modifies host physiology and cognition](https://www.nature.com/articles/s41467-026-71264-8) |\n| 作者 | Serena Boscaini |\n| 发表日期 | 2026-04-21 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"e:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"coffee-gut-microbiome-cognition-microbiota-gut-brain-axis\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"coffee-gut-microbiome-cognition-microbiota-gut-brain-axis\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"coffee-gut-microbiome-cognition-microbiota-gut-brain-axis\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/coffee-gut-microbiome-cognition-microbiota-gut-brain-axis\",\"href\":\"/whatsup/tldr/hn-2026-p4/coffee-gut-microbiome-cognition-microbiota-gut-brain-axis\",\"category\":\"tldr\",\"title\":\"咖啡重塑肠道菌群并影响认知功能\",\"date\":\"2026-04-21\",\"excerpt\":\"研究发现，习惯性咖啡摄入能够重塑肠道微生物组，提升特定菌属丰度，同时降低GABA等代谢物水平；咖啡饮用者冲动性和情绪反应性更高，非咖啡饮用者记忆表现更优，部分效应与咖啡因无关。\",\"coverImage\":\"$undefined\",\"author\":\"Serena Boscaini\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"咖啡重塑肠道菌群并影响认知功能\",\"author\":\"Serena Boscaini\",\"date\":\"2026-04-21\",\"excerpt\":\"研究发现，
