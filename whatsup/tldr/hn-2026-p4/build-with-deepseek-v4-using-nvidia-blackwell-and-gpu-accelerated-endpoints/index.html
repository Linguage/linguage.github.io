nks/373-816263e744b1a0a1.js\",\"738\",\"static/chunks/738-b97c8b45db2c8cb9.js\",\"48\",\"static/chunks/app/%5B...slug%5D/page-b39f4036a39e3cb5.js\"],\"default\"]\n18:T10eb,"])</script><script>self.__next_f.push([1,"\n# 基于 NVIDIA Blackwell 与 GPU 加速端点构建 DeepSeek V4 应用\n\n## 摘要\n\nNVIDIA 技术博客介绍了 DeepSeek 第四代旗舰模型 DeepSeek-V4-Pro 与 DeepSeek-V4-Flash 的部署方案。两款模型均支持百万 token 长上下文窗口，分别面向高级推理与高速效率场景。文章重点阐述了混合注意力架构创新、NVIDIA Blackwell 平台的即开即用性能表现，以及通过 SGLang、vLLM 等框架的部署实践，并展示了在 NeMoClaw、AI-Q Blueprint 等智能体工作流中的应用集成路径。\n\n## 内容框架与概述\n\nDeepSeek V4 系列标志着开源大模型向长上下文智能体时代的跃迁。Pro 版拥有 1.6T 总参数量和 49B 激活参数，Flash 版则为 284B 总参数与 13B 激活参数的轻量配置，两者均将上下文窗口扩展至 100 万 token。这一突破使模型能够承载系统指令、工具输出、检索上下文、代码日志及多步推理痕迹等复杂智能体状态，从根本上改变了推理经济的成本结构。企业竞争焦点正从模型选型转向基础设施策略，即如何以最低 token 成本实现高性能模型的规模化部署。\n\n架构层面的核心创新在于混合注意力机制，通过压缩稀疏注意力与深度压缩注意力的组合，实现相比前代 V3.2 模型 73% 的每 token 推理浮点运算量削减和 90% 的键值缓存内存负担降低。NVIDIA Blackwell 平台针对此类工作负载进行了深度优化，GB200 NVL72 系统上 V4-Pro 的即开即用测试达到每秒每用户 150 token 以上的生成速度，且基于 vLLM 的 B300 配方在 1K/1K 输入输出长度配置下展现出优异的帕累托前沿性能。后续通过 Dynamo 推理引擎、NVFP4 数值格式、优化 CUDA 内核及先进并行技术的全栈协同设计，性能有望进一步提升。\n\n开发者可通过 build.nvidia.com 的 GPU 加速端点快速原型验证，或借助 NVIDIA NIM 微服务实现私有化部署。SGLang 提供低延迟、均衡与最大吞吐量三种服务配方及长上下文专用方案，vLLM 则支持单节点至多节点扩展及预填充/解码分离架构。在智能体生态方面，DeepSeek V4 已集成至 NeMoClaw 个人助理、AI-Q Blueprint 深度研究助手及 Data Explorer Agent 数据分析智能体等框架，开发者可灵活替换底层模型以获取前沿能力。\n\n## 核心概念及解读\n\nMoE 架构（Mixture of Experts，混合专家模型）：一种稀疏激活的神经网络架构，将总参数划分为多个专家子网络，每轮前向传播仅激活部分专家。DeepSeek V4 采用此架构实现 1.6T 总参数与 49B 激活参数的巨大差距，在保持模型容量的同时控制计算成本。\n\nKV 缓存（Key-Value Cache，键值缓存）：Transformer 推理过程中存储历史 token 注意力键值对的内存结构，是长上下文场景的主要内存瓶颈。V4 通过混合压缩技术将其内存占用降低 90%，直接支撑百万 token 上下文的可行性。\n\n预填充/解码分离（Prefill/Decode Disaggregation）：将推理过程分为输入理解的预填充阶段与逐 token 生成的解码阶段，并分配独立计算资源。该技术可优化首 token 时延与整体吞吐量的权衡，vLLM 支持在百卡规模集群上实施此架构。\n\nMXFP4/NVFP4（Microscaling Floating Point 4-bit）：NVIDIA 推出的 4 位浮点数值格式，在保持模型精度的同时显著降低显存带宽需求。V4-Pro 的原生 MXFP4 格式与 Blackwell 硬件协同，是实现高效推理的关键数值基础。\n\n智能体工作流（Agentic Workflow）：超越单轮对话的多步骤自主任务执行范式，涉及工具调用、记忆维护、规划推理等复杂交互。百万 token 上下文使智能体能够维护完整的任务状态历史，成为 V4 架构优化的核心应用场景。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Build with DeepSeek V4 Using NVIDIA Blackwell and GPU-Accelerated Endpoints](https://developer.nvidia.com/blog/build-with-deepseek-v4-using-nvidia-blackwell-and-gpu-accelerated-endpoints/?linkId=100000419246528) |\n| 作者 | Anu Srivastava、Eduardo Alvarez |\n| 发布日期 | 2026 年 4 月 24 日 |\n"])</script><script>self.__next_f.push([1,"e:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"build-with-deepseek-v4-using-nvidia-blackwell-and-gpu-accelerated-endpoints\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"build-with-deepseek-v4-using-nvidia-blackwell-and-gpu-accelerated-endpoints\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"build-with-deepseek-v4-using-nvidia-blackwell-and-gpu-accelerated-endpoints\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/build-with-deepseek-v4-using-nvidia-blackwell-and-gpu-accelerated-endpoints\",\"href\":\"/whatsup/tldr/hn-2026-p4/build-with-deepseek-v4-using-nvidia-blackwell-and-gpu-accelerated-endpoints\",\"category\":\"tldr\",\"title\":\"基于 NVIDIA Blackwell 与 GPU 加速端点构建 DeepSeek V4 应用\",\"date\":\"2026-04-25\",\"excerpt\":\"NVIDIA 技术博客介绍了 DeepSeek 第四代旗舰模型 DeepSeek-V4-Pro 与 DeepSeek-V4-Flash 的部署方案。两款模型均支持百万 token 长上下文窗口，分别面向高级推理与高速效率场景。文章重点阐述了混合注意力架构创新、NVIDIA Blackwell 平台的即开即用性能表现，以及通过 SGLang、vLLM 等框架的部署实践，并展示了在 NeMoClaw、...\",\"coverImage\":\"$undefined\",\"author\":\"Anu Srivastava, Eduardo Alvarez\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"基于 NVIDIA Blackwell 与 GPU 加速端点构建 DeepSeek V4 应用\",\"author\":\"Anu Srivastava, Eduardo Alvarez\",\"date\":\"2026-04-25\",\"excerpt\":\"NVIDIA 技术博客介绍了 DeepSeek 第四代旗舰模型 DeepSeek-V4-Pro 与 DeepSeek-V4-Flash 的部署方案。两款模型均支持百万 to ll,{\"className\":\"mb-6\",\"children\":\"开发者可通过 build.nvidia.com 的 GPU 加速端点快速原型验证，或借助 NVIDIA NIM 微服务实现私有化部署。SGLang 提供低延迟、均衡与最大吞吐量三种服务配方及长上下文专用方案，vLLM 则支持单节点至多节点扩展及预填充/解码分离架构。在智能体生态方面，DeepSeek V4 已集成至 NeMoClaw 个人助理、AI-Q Blueprint 深度研究助手及 Data Explorer Agent 数据分析智能体等框架，开发者可灵活替换底层模型以获取前沿能力。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"MoE 架构（Mixture of Experts，混合专家模型）：一种稀疏激活的神经网络架构，将总参数划分为多个专家子网络，每轮前向传播仅激活部分专家。DeepSeek V4 采用此架构实现 1.6T 总参数与 49B 激活参数的巨大差距，在保持模型容量的同时控制计算成本。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"KV 缓存（Key-Value Cache，键值缓存）：Transformer 推理过程中存储历史 token 注意力键值对的内存结构，是长上下文场景的主要内存瓶颈。V4 通过混合压缩技术将其内存占用降低 90%，直接支撑百万 token 上下文的可行性。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"预填充/解码分离（Prefill/Decode Disaggregation）：将推理过程分为输入理解的预填充阶段与逐 token 生成的解码阶段，并分配独立计算资源。该技术可优化首 token 时延与整体吞吐量的权衡，vLLM 支持在百卡规模集群上实施此架构。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"MXFP4/NVFP4（Microscaling Floating Point 4-bit）：NVIDIA 推出的 4 位浮点数值格式，在保持模型精度的同时显著降低显存带宽需求。V4-Pro 的原生 MXFP4 格式与 Blackwell 硬件协同，是实现高效推理的关键数值基础。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"智能体工作流（Agentic Workflow）：超越单轮对话的多步骤自主任务执行范式，涉及工具调用、记忆维护、规划推理等复杂交互。百万 token 上下文使智能体能够维护完整的任务状态历史，成为 V4 架构优化的核心应用场景。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[\"$L1a\",\"$L1b\",\"$L1c\"]}]]}]}]]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原标题\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://developer.nvidia.com/blog/build-with-deepseek-v4-using-nvidia-blackwell-and-gpu-accelerated-endpoints/?linkId=100000419246528\",\"children\":\"Build with DeepSeek V4 Using NVIDIA Blackwell and GPU-Accelerated Endpoints\"}]}]]}]\n1b:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"作者\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"Anu Srivastava、Eduardo Alvarez\"}]]}]\n1c:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"发布日期\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"2026 年 4 月 24 日\"}]]}]\n"])</script><script>self.__next_f.push([1,"14:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]
