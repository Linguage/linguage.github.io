这场维权战已超越农业领域。在制造商日益强化售后控制权的当下，此案为汽车和家电等行业的维修权运动提供了极具参考价值的法律与商业范本。\n\n## 核心概念及解读\n**维修权**：指消费者独立或通过第三方维修所购产品的权利，本案中体现为农民获取农机数字诊断工具的诉求。\n\n**集体诉讼**：多名农民因同一事实联合提起的诉讼，本案据此设立基金向2018年后支付高额维修费的用户提供赔偿。\n\n**技术壁垒**：制造商通过软件加密等方式限制他人维修设备，迫使消费者依赖官方授权服务的商业策略。\n\n**超额收费返还**：法院文件显示原告将收回26%至53%的维修溢价，远超一般集体诉讼5%至15%的返还水平。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [John Deere to Pay $99 Million in Monumental Right-to-Repair Settlement](https://www.thedrive.com/news/john-deere-to-pay-99-million-in-monumental-right-to-repair-settlement) |\n| 作者 | Caleb Jacobs |\n| 发表日期 | 2026-04-09 |\n| 评分 | 85/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"john-deere-right-to-repair-settlement\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"john-deere-right-to-repair-settlement\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"john-deere-right-to-repair-settlement\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/john-deere-right-to-repair-settlement\",\"href\":\"/whatsup/tldr/hn-2026-p4/john-deere-right-to-repair-settlement\",\"category\":\"tldr\",\"title\":\"约翰迪尔9900万美元达成维修权和解\",\"date\":\"2026-04-09\",\"excerpt\":\"约翰迪尔同意支付9900万美元达成维修权诉讼和解，并承诺未来10年提供设备维修数字工具，此举对农业及更广泛的制造业具有标志性意义。\",\"coverImage\":\"$undefined\",\"author\":\"Caleb Jacobs\",\"original\":\"John Deere to Pay $99 Million in Monumental Right-to-Repair Settlement.md\",\"originalUrl\":\"https://www.thedrive.com/news/john-deere-to-pay-99-million-in-monumental-right-to-repair-settlement\",\"score\":\"85\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"约翰迪尔9900万美元达成维修权和解\",\"excerpt\":\"约翰迪尔同意支付9900万美元达成维修权诉讼和解，并承诺未来10年提供设备维修数字工具，此举对农业及更广泛的制造业具有标志性意义。\",\"date\":\"2026-04-09\",\"category\":\"tldr\",\"author\":\"Caleb Jacobs\",\"original\":\"John Deere to Pay $99 Million in Monumental Right-to-Repair
