n\nStripe 最初以极简的 Charge 和 Token 两个 API 概念起家，凭借几行 curl 命令即可完成一笔信用卡支付，这种魔法般的体验奠定了品牌基调。随着业务扩展，Stripe 陆续引入了 ACH 借记、比特币等支付方式，并在 2015 至 2017 年间推出 Sources API 试图统一各类支付方法。然而，Sources 与 Charges 的双状态机模型带来了大量边界情况，开发者需要在客户端与服务端之间管理两个相互独立的状态对象，集成复杂度远超预期，且容易出现因网络断连导致收款失败的严重漏洞。\n\n**第二阶段：从零设计统一支付 API（2017–2018）**\n\n面对积累已久的产品债务，Stripe 的五人团队将自己关在一间会议室里历时三个月，彻底抛弃已有抽象，从第一性原理出发重新设计。团队遍历了所有已支持及可预见的支付方式，提炼出两个核心概念：PaymentMethod（支付凭证，代表静态的支付方式信息）与 PaymentIntent（支付意图，追踪交易状态的有状态对象）。这两个概念相结合，使得任意支付方式都能共享一套集成路径，彻底解决了此前状态机分裂的问题。\n\n**第三阶段：推广落地与简洁性的重新诠释（2018–2020）**\n\n新 API 在技术上完成后，真正的挑战在于推动开发者迁移。为兼顾旧有集成，Stripe 选择在 PaymentIntents 之上保留 Charge 对象的生成，确保已有的分析和报表系统无需改动。针对只需处理美国和加拿大信用卡支付的开发者，Stripe 引入了 error_on_requires_action 参数，让 PaymentIntents 恢复到七行代码的简洁体验，同时保留了未来平滑升级至全球支付集成的路径。这一迁移历程揭示了一个深刻洞见：简洁并不意味着减少参数或资源数量，而是确保 API 的一致性与可预期性，并通过合理的功能分层逐步释放能力。\n\n## 核心概念及解读\n\n**1. 产品债务（Product Debt）**\n类比技术债务，指产品功能随时间堆叠后，导致用户理解成本升高、团队迭代变难的累积问题。Stripe 在 Charges API 上不断叠加新支付方式，正是典型的产品债务案例。\n\n**2. PaymentIntent（支付意图）**\n追踪一次支付全生命周期的有状态对象，包含金额、货币、当前支付状态等信息。它将复杂的多步骤支付流程收敛为一个可预期的单一状态机，是 Stripe 新一代支付 API 的核心抽象。\n\n**3. PaymentMethod（支付方式）**\n代表客户选择的支付凭证的静态信息对象，如卡号、银行账户等。与 PaymentIntent 搭配使用，前者定义如何付款，后者定义付什么。\n\n**4. error_on_requires_action 参数**\n一个特殊的 API 参数，用于告知 PaymentIntent 在需要额外用户操作时直接报错而非等待。它为简单场景提供了一个渐进式的集成入口，同时保留了未来升级的可能性，是 API 功能分层设计的典型体现。\n\n**5. 第一性原理设计（First Principles Design）**\n一种忽略现有系统约束、回归问题本质进行重新设计的方法论。Stripe 团队在设计 PaymentIntents 时，明确要求质疑所有既有 API 假设，避免在旧抽象上修修补补，从而实现了真正统一的支付架构。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ---- |\n| 原标题 | [Stripe's payments APIs: The first 10 years](https://stripe.dev/blog/payment-api-design) |\n| 作者 | Michelle Bu |\n| 发布日期 | 2020 年 12 月 15 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"stripe-payments-api-ten-years\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"stripe-payments-api-ten-years\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"stripe-payments-api-ten-years\"],\"urlPath\":\"/wha
