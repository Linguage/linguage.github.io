底层原理不过十到二十条，技术栈只是实现这些原理的工具。他特别强调 SQL 是初学者最值得掌握的技能，掌握 SQL 可以在薪资上产生数倍差距。与此同时，他认为代码最高境界是不写代码，好的代码应该让新手也能读懂，而文档能力和变更提案能力则是被严重低估的工程素养。\n\n**团队合作与工作方式**\n\n作者对管理层有务实的判断：好的管理者与好的工程师具备相似品质，但管理者的权力远比大多数人以为的要小。他推崇向下学习的心态，认为从实习生和初级工程师身上同样能获益良多。关于远程办公，他认为其最大劣势不是缺少白板，而是难以向同事学习，尤其对职业早期的工程师影响更深。他还指出，若公司的重要决策仍在茶水间完成，远程员工便会沦为二等公民。\n\n**人生观与行业反思**\n\n文章末尾作者跳出了技术本身，谈及代码不应与自我价值绑定，技术行业整体历史不过八十年，大家其实都在摸索前行。他对行业多样性问题直言不讳，也对过度依赖算法面试的招聘流程表示质疑。他认为，做一件不令自己厌恶的事，比强迫自己热爱某件事更为重要，而善待他人本身就是一种回报，无关职场利弊。\n\n## 核心概念及解读\n\n**TDD（测试驱动开发）**\nTest-Driven Development，一种先写测试、再写实现代码的开发方法论。作者认为其已演变为一种近乎教条的崇拜，脱离了实际工程的灵活性需求。\n\n**FAANG**\nFacebook、Apple、Amazon、Netflix、Google 等顶级科技公司的缩写，代表行业最高薪资和声望。作者指出，来自这些公司的工程师并不必然更出色，祛魅是成熟工程师的必经之路。\n\n**动态语言 vs 静态语言**\nDynamic Languages vs Static Languages，指运行时确定类型的语言（如 Python）与编译时确定类型的语言（如 Java、C++）之间的区别。作者承认自己越来越欣赏动态语言的灵活性，尽管这在工程圈是一个有争议的立场。\n\n**Airflow**\nApache Airflow，一款广泛使用的数据管道调度与编排工具。作者对其设计多有批评，但承认它在数据工程领域的市场占有率仍然难以撼动。\n\n**401k**\n美国一种雇主赞助的退休储蓄账号，员工可税前存入一定比例薪资。作者多次强调要尽量缴满上限，将其视为工程师财务规划的重要一环。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Drunk Post: Things I've Learned as a Senior Engineer](https://luminousmen.substack.com/p/drunk-post-things-ive-learned-as) |\n| 作者 | LUMINOUSMEN |\n| 发布日期 | 2026 年 4 月 21 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"senior-engineer-lessons-learned\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"senior-engineer-lessons-learned\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"senior-engineer-lessons-learned\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/senior-engineer-lessons-learned\",\"href\":\"/whatsup/tldr/hn-2026-p4/senior-engineer-lessons-learned\",\"category\":\"tldr\",\"title\":\"一个数据工程师微醺后写下的十年工程师经验\",\"date\":\"2026-04-21\",\"excerpt\":\"本文保存自 Reddit 上一篇由资深数据工程师在微醺状态下所写的帖子，以轻松直白的口吻总结了其十年软件工程生涯中最真实的感悟。内容涵盖职业发展、技术选型、团队协作、远程办公以及人生态度等多个维度，语言坦诚甚至略带粗
