n\n后半部分聚焦制度性矛盾：NYPD 的消极回应、警局门口公然标示警察可违反交规、以及主角拒绝回应碰撞历史等细节，共同勾勒出一个缺乏问责的执法体系。文章最终将矛头指向州级立法僵局，呼吁通过限速器法案来约束超级超速者，完成从个案到制度批判的叙事闭环。\n\n## 核心概念及解读\n**Stop Super Speeders Act**：纽约州待通过法案，要求屡次严重超速者安装车辆限速器，从技术上阻止超速行为。\n\n**Regional Slow Zone**：纽约市交通局在特定区域降低车速限制的政策，但 Richmond Terrace 等主干道被豁免，形成执法盲区。\n\n**摄像头执法与警察豁免**：纽约自动测速摄像头对超速11英里以上才开罚，且 NYPD 以罚单非职务相关为由拒绝内部处分，暴露出双重标准。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [To Protect And Swerve: NYPD Cop Has 547 Speeding Tickets Yet Remains On The Force](https://nyc.streetsblog.org/2026/04/23/to-protect-and-swerve-nypd-cop-has-527-speeding-tickets-yet-remains-on-the-force) |\n| 作者 | J.K. Trotter |\n| 发表日期 | 2026-04-23 |\n| 评分 | 90/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"nypd-officer-speeding-tickets-staten-island\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"nypd-officer-speeding-tickets-staten-island\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"nypd-officer-speeding-tickets-staten-island\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/nypd-officer-speeding-tickets-staten-island\",\"href\":\"/whatsup/tldr/hn-2026-p4/nypd-officer-speeding-tickets-staten-island\",\"category\":\"tldr\",\"title\":\"547张超速罚单的警察为何仍在执法\",\"date\":\"2026-04-23\",\"excerpt\":\"纽约市警局一名警察自2022年以来累计收到547张超速罚单，却因与职务无关而免于任何处分，引发对执法双重标准的严重质疑。\",\"coverImage\":\"$undefined\",\"author\":\"J.K. Trotter\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"90\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"547张超速罚单的警察为何仍在执法\",\"author\":\"J.K. Trotter\",\"date\":\"2026-04-23\",\"excerpt\":\"纽约市警局一名警察自2022年以来累计收到547张超速罚单，却因与职务无关而免于任何处分，引发对执法双重标准的严重质疑。\",\"source_url\":\"https://nyc.streetsblog.org/2026/04/23/to-protect-and-swerve-nypd-cop-has-527-speeding-tickets-yet-remains-on-the-force\",\"tag
