s模型从Pro计划中下线。 这些调整旨在应对代理工作流带来的高算力消耗，保障现有用户的稳定体验，同时通过界面展示用量、提供升级与退款选项来提升透明度与用户控制感。\n\n## 内容框架与概述\n文章开头概述了此次调整的背景和动机，指出随着具备代理能力的长时并行任务普及，Copilot的计算资源压力显著上升，原有定价与配额设计难以兼顾成本和服务质量，因此必须优先保护现有订阅用户的体验。 在这一前提下，GitHub明确表示将暂停部分个人计划的新注册，同时对使用上限和模型可用性做出收紧调整，并承认这些改变会对用户产生扰动。\n\n中段详细说明了具体计划变更和用量限制机制，包括暂停Copilot Pro、Pro Plus以及学生计划的新用户注册，将Pro Plus的使用上限提升到Pro的五倍以上，并将Opus模型从Pro计划中移除，仅在Pro Plus中保留最新版本，同时逐步下架旧版Opus。 接着介绍两类用量限制的运作方式，即基于token的会话与周度上限，以及它们与按请求计数的高级请求额度之间的区别，强调多数用户在正常使用下不应受到明显影响。\n\n随后文章聚焦于提升透明度与避免意外封顶，说明VS Code和Copilot CLI中将实时显示用户接近上限的用量提示，帮助开发者提前调整行为。 文中给出减少触顶风险的建议，如为简单任务选择乘数较小的模型、必要时升级至Pro Plus、利用计划模式提升任务效率，以及降低并行工作流程度，减少如使用fleet等高并发工具的频率。\n\n结尾部分回到策略层面的解释，指出代理和子代理在解决复杂编码问题上带来了巨大价值，也导致少量长程请求可能产生超过订阅价格的成本，这对基础设施与商业模式提出挑战。 GitHub强调这些问题应由平台方承担，因此通过暂时性限制和结构性调整为现有用户提供尽可能稳定的体验，同时承诺在这一过渡阶段内为在特定时间窗口内受影响且不满意的订阅用户提供免除四月费用的退款通道。\n\n## 核心概念及解读\n**代理工作流**：指Copilot中由智能代理和子代理执行的长时、多步骤、并行化任务，能解决复杂问题，但会显著增加算力和token消耗。\n\n**会话与周度用量上限**：以token为单位设置的两级限制，会话上限控制短时间峰值负载，周度上限约束持续高强度使用，以防少量请求产生过高成本。\n\n**模型乘数**：衡量不同模型相对资源消耗的系数，乘数越大，同等请求会消耗更多可用额度，更易触发使用上限。\n\n**高级请求额度**：按请求次数计的高级模型调用配额，决定可以用哪些模型以及调用次数，与基于token的用量上限相互独立，仍可能在额度剩余时触及用量限制。\n\n**Pro与Pro Plus计划**：两档Copilot个人订阅，Pro Plus在周度用量上限上是Pro的五倍以上，并保留最新Opus模型访问权限，为重度使用者提供更宽裕的资源空间。"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"github-copilot-plan-changes\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"github-copilot-plan-changes\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"github-copilot-plan-changes\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/github-copilot-plan-changes\",\"href\":\"/whatsup/tldr/hn-2026-p4/github-copilot-plan-changes\",\"category\":\"tldr\",\"title\":\"GitHub调整Copilot个人订阅策略\",\"date\":\"2026-04-21\",\"excerpt\":\"文章介绍GitHub Copilot个人版近期重大调整，包括暂停部分新订阅、收紧使用额度、调整模型可用性，并解释高算力代理工作流带来的成本与稳定性压力，以及GitHub提高透明度和提供退款支持的具体举措。\",\"coverImage\":\"$undefined\",\"author\":\"Joe Binder\",\"original\":\"$undefined\",\"originalUrl\":\"https://github.blog/news-insight
