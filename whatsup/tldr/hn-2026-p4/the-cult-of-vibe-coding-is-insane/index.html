法，指出完全不查看底层代码会导致软件质量低劣，强调使用AI辅助编程不等于放弃人工审查与质量把控。\",\"coverImage\":\"$undefined\",\"author\":\"Bram Cohen\",\"original\":\"The Cult Of Vibe Coding Is Insane.md\",\"originalUrl\":\"https://bramcohen.com/p/the-cult-of-vibe-coding-is-insane\",\"score\":\"78\",\"content\":\"# 盲目追捧氛围编程是荒谬的\\n\\n## 摘要\\n文章以Claude源代码泄露事件为例，批判了盲目追求纯氛围编程的极端风气。作者指出，完全不查看底层代码不仅无法实现真正的零人工干预，还会导致代码冗余和质量低下。AI擅长在人类指导下清理技术债务，而非自发发现问题。低质量软件是开发者的选择，使用AI不应成为烂代码的借口。\\n\\n## 内容框架与概述\\n文章以Claude源代码泄露引发的嘲讽开篇，引出罪魁祸首是走向极端的内部测试风气。这种氛围编程理念要求开发者完全不查看底层代码，但作者指出这纯属神话，因为人类仍在构建规则框架和待办清单，AI也依赖这些指令运作。\\n\\n作者进一步剖析了这种极端做法的荒谬性。面对代码中显而易见的冗余，开发者因不愿违背氛围编程的信条而拒绝查看。这导致本可利用AI高效清理的技术债务被长期搁置，错失了提升软件质量的良机。\\n\\n随后，作者分享了自己与AI协作的正确范式。通过先与AI进行深入对话，梳理边缘情况和修改思路，再让其执行，AI能高效完成清理任务。这种模式保留了AI的编码优势，同时发挥了人类的审查与指导作用。\\n\\n最后，文章总结强调低质量软件是团队主动选择的结果。无论是否使用AI辅助，开发者都应对代码质量负责，不应将烂代码归咎于工具，而应善用AI去追求更高质量的产出。\\n\\n## 核心概念及解读\\n**氛围编程**：一种极端编程理念，要求开发者完全不查看底层代码，仅通过模糊对话让机器完成开发。\\n\\n**吃自己的狗粮**：指企业使用自家产品，本文指该理念被推向极端，变成排斥人工干预的盲目崇拜。\\n\\n**技术债务**：软件开发中因妥协产生的低质量代码，现可利用AI在数周内高效清理偿还。\\n\\n**单向执行**：表面看AI一次性完成任务，实则依赖前期人类大量的对话引导和错误纠正。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [The Cult Of Vibe Coding Is Insane](https://bramcohen.com/p/the-cult-of-vibe-coding-is-insane) |\\n| 作者 | Bram Cohen |\\n| 发表日期 | 2026-04-05 |\\n| 评分 | 78/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"盲目追捧氛围编程是荒谬的\",\"excerpt\":\"文章批判了盲目追求纯Vibe Coding的极端做法，指出完全不查看底层代码会导致软件质量低劣，强调使用AI辅助编程不等于放弃人工审查与质量把控。\",\"date\":\"2026-04-05\",\"category\":\"tldr\",\"author\":\"Bram Cohen\",\"original\":\"The Cult Of Vibe Coding Is Insane.md\",\"originalUrl\":\"https://bramcohen.com/p/the-cult-of-vibe-coding-is-insane\",\"score\":\"78\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p4/the-cult-of-vibe-coding-is-insane.md\"},\"neigh
