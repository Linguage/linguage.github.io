决，裁定特斯拉须赔偿受害者逾2.43亿美元。目前，美国司法部和国家公路交通安全管理局均已介入调查。\n\n## 内容框架与概述\n\n特斯拉内部发生大规模数据泄露，相关文件显示公司多年来知悉自动驾驶系统存在严重缺陷，却主动选择隐瞒。泄露数据包含逾2400起客户投诉，涉及车辆自发加速问题，以及超过1000起事故记录，其中大量案例被标注为未解决状态。这一调查由瑞士广播电视台旗下节目《现在时刻》（Temps Présent）播出，将该公司的内部运营逻辑公之于众。\n\n调查详细记录了自动驾驶系统的技术失效模式，即所谓人工智能的幻觉现象，表现为车辆在行驶中无故急加速或急制动，导致系统误判周围环境。22岁的行人 Naibel Benavides 在一辆处于 Autopilot 模式的特斯拉车辆撞击中身亡，其伴侣 Dillon Angulo 身受重伤。更令人震惊的是，涉事车辆黑匣子中的数据起初被特斯拉声称已损坏，而受害方聘请的专家最终成功恢复数据，证明特斯拉早在事故当晚即已知晓系统故障。\n\n案件进入司法程序后，陪审团作出历史性裁决，判定特斯拉和司机共同承担责任，赔偿金额超过2.43亿美元。特斯拉提出撤销裁决的申请遭到联邦法官驳回，该公司仍可继续上诉。与此同时，美国司法部正在调查特斯拉是否存在欺骗消费者的行为，多名内部举报人也已向监管机构提供证词，指控公司以牺牲安全为代价换取市场速度。\n\n## 核心概念及解读\n\n**Autopilot（自动驾驶辅助系统）**：特斯拉开发的驾驶辅助功能，依赖摄像头和人工智能实时感知路况并辅助控制车辆。尽管名称暗示高度自动化，该系统在法律层面仍属辅助驾驶而非完全自动驾驶，驾驶员须随时保持注意力。\n\n**AI 幻觉（Hallucination）**：人工智能模型在处理数据时产生错误判断并给出与现实不符的输出。文中特指自动驾驶系统在路况感知中出现误判，导致车辆在无外部触发的情况下急加速或急制动，后果极为危险。\n\n**数据黑匣子（Event Data Recorder）**：车辆碰撞记录装置，用于保存事故前后的关键行驶数据。本案中特斯拉声称数据已损坏，但受害方专家团队通过技术手段成功恢复，揭露了特斯拉掌握故障信息却未披露的事实。\n\n**内部数据泄露（Tesla Files）**：指特斯拉公司内部大规模机密文件的外泄，包含事故报告、客户投诉及内部沟通记录，是本次调查的核心证据来源，揭示了公司系统性隐瞒安全缺陷的行为模式。\n\n**举报人保护与企业责任**：多名特斯拉前员工向监管机构提供了内部证词，指出公司高层早知系统存在危险却优先追求商业速度。此案引发广泛讨论，即在科技公司大规模部署尚不成熟的自动化系统时，监管框架和企业问责机制应如何配套跟进。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ---- |\n| 原标题 | [Comment Tesla a caché des accidents fatals pour continuer à tester la conduite autonome sur les routes](https://www.rts.ch/info/monde/2026/article/tesla-dissimule-des-milliers-d-incidents-de-conduite-autonome-mortels-29214161.html) |\n| 作者 | François Roulet |\n| 发布日期 | 2026 年 4 月 18 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"tesla-autopilot-fatal-incidents-concealment\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"tesla-autopilot-fatal-incidents-concealment\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"tesla-autopilot-fatal-incidents-concealment\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/tesla-autopilot-fatal-incidents-concealment\",\"href\":\"/whatsup/tldr/hn-2026-p4/tesla-autopilot-
