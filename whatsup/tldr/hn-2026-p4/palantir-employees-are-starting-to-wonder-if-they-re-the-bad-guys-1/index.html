自由自居的企业文化，如今在现实面前显得支离破碎。\n\n## 内容框架与概述\n在特朗普第二任期的最初几个月里，帕兰提尔迅速成为政府移民执法机器的技术支柱。其软件被用于识别、追踪和驱逐移民，这让许多现任和前员工感到不安。他们私下交流时，甚至用滑向法西斯主义来形容公司的转变。曾经，员工们还能接受外界对公司的尖锐批评，但现在，当威胁看似来自国内，且自己似乎在助长这些滥用权力的行为时，公司内部长久以来的自我叙事出现了严重的认同危机。\n\n内部紧张局势在一系列事件中达到顶点。一名护士在反对移民与海关执法局的抗议中被联邦探员射杀后，员工们在内部频道要求公司澄清与移民与海关执法局的关系。随后，管理层开始清理内部辩论频道的聊天记录，理由是为了防止泄密。面对员工的尖锐提问，负责隐私与公民自由的团队坦诚，目前在技术上几乎无法阻止怀有恶意的客户实施不当行为，只能依赖事后审计和法律追诉。\n\n压垮骆驼的最后一根稻草接连出现。美国导弹袭击伊朗一所小学，造成逾百名儿童死亡，而帕兰提尔的技术系统可能与当天的打击行动有关，这成了许多员工的崩溃点。随后，首席执行官卡普又发表了关于人工智能将削弱人文学科选民力量的争议言论，以及公司官方账号发布了浓缩其新书观点的激进宣言，建议美国考虑重启征兵。这些言论让员工在内部通讯中充满了羞耻感与困惑，他们感到公司的公开形象正让他们个人也承受着来自亲友的质问。\n\n## 核心概念及解读\n\n- **Palantir**：帕兰提尔。公司名称源自托尔金笔下那颗能洞悉万物的真知晶石，这里被解读为一种带有腐蚀性的全视之眼，恰如其技术所代表的强大数据聚合与分析能力，也暗喻其引发的监控与伦理争议。\n\n- **Non-disparagement Agreement**：不贬损协议。一种法律合同，要求签署方（如离职员工）不得发表有损公司声誉的言论。在文中，它被视为公司维持隐秘文化、限制员工公开讨论内部问题的手段。\n\n- **#palantir-in-the-news**：新闻中的帕兰提尔频道。公司内部的一个通讯频道，曾是员工就公司相关新闻进行公开辩论的主要场所。管理层后来对其设置七天消息清除策略，象征了内部透明讨论空间的收紧。\n\n- **PCL (Privacy and Civil Liberties)**：隐私与公民自由团队。帕兰提尔内部负责确保技术产品符合隐私保护及公民自由标准的核心团队。文章揭示，即便在该团队内部，也对如何约束政府客户的潜在恶意行为感到无力。\n\n- **The Technological Republic**：科技共和国。首席执行官亚历克斯·卡普所著书籍，核心论点是硅谷应如何更好地服务于美国国家利益。公司发布的该书22条激进宣言引发了内外巨大的争议，被认为是公司意识形态转向的公开宣告。\n\n## 文章基本信息\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Interviews with current and former Palantir employees, along with internal Slack messages obtained by WIRED, suggest a workforce in turmoil.](https://www.wired.com/story/palantir-employees-protest-trump-administration-work-ice/) |\n| 作者 | Makena Kelly |\n| 发布日期 | 2026年4月 23日 |\n"])</script><script>self.__next_f.push([1,"e:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"palantir-employees-are-starting-to-wonder-if-they-re-the-bad-guys-1\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"palantir-employees-are-starting-to-wonder-if-they-re-the-bad-guys-1\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"palantir-employees-are-starting-to-w \",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原标题\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://www.wired.com/story/palantir-employees-protest-trump-administration-work-ice/\",\"children\":\"Interviews with current and former Palantir employees, along with internal Slack messages obtained by WIRED, suggest a workforce in turmoil.\"}]}]]}],\"$L1a\",\"$L1b\"]}]]}]}]]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"作者\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"Makena Kelly\"}]]}]\n1b:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\"
