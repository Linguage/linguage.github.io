（2026年MIT优秀研究生、MLK领导力奖）以及校园服务角色，包括组织知识产权主题会议、教授普拉提、担任宿舍助理，塑造了一个既深耕专业又积极服务社群的立体形象。\n\n## 核心概念及解读\n**引力微透镜法**：利用前景恒星的引力场放大背景恒星光芒，从而探测绕转系外行星的技术手段。\n\n**PyLIMASS软件**：McGee主导开发的数值工具，用于提高微引力透镜事件中系外行星质量和距离的估算精度。\n\n**知识产权框架**：针对太空国际合作中专利归属、技术转让和知识共享等治理问题的规则体系。\n\n**Karsh STEM Scholars Program**：Howard大学面向承诺攻读博士学位的STEM学生提供的全额奖学金项目，培养科研领军人才。\n\n**双学位路径**：MIT航空宇航与科技政策双硕士项目，允许学生以跨学科论文融合技术研究与政策分析。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Bridging space research and policy](https://news.mit.edu/2026/bridging-space-research-policy-carissma-mcgee-0409) |\n| 作者 | School of Engineering |\n| 发表日期 | 2026-04-09 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"bridging-space-research-policy-carissma-mcgee\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"bridging-space-research-policy-carissma-mcgee\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"bridging-space-research-policy-carissma-mcgee\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/bridging-space-research-policy-carissma-mcgee\",\"href\":\"/whatsup/tldr/hn-2026-p4/bridging-space-research-policy-carissma-mcgee\",\"category\":\"tldr\",\"title\":\"跨越太空研究与政策的架桥者\",\"date\":\"2026-04-09\",\"excerpt\":\"MIT博士生Carissma McGee融合航空宇航与公共政策双硕士背景，在系外行星研究及太空知识产权框架领域架起科学与政策的桥梁。\",\"coverImage\":\"$undefined\",\"author\":\"School of Engineering\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"跨越太空研究与政策的架桥者\",\"author\":\"School of Engineering\",\"date\":\"2026-04-09\",\"excerpt\":\"MIT博士生Carissma McGee融合航空宇航与公共政策双硕士背景，在系外行星研究及太空知识产权框架领域架起科学与政策的桥梁。\",\"source_url\":\"https://news.mit.edu/2026/bridging-space-research-policy-carissma-mcgee-0409\",\"tags\":[\"summary\"],\"score\":\"82\",\"category\":\"tldr\",\"toc\":
