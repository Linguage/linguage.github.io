利益或行为习惯，这应被理解为一种有动机的怀疑而非单纯的无知。\n\n## 核心概念及解读\n**信任赤字模型**：认为科学影响力受阻源于公众对科学和科学家的负面评价，替代了早期的知识赤字模型。\n\n**理性印象模型**：公众因对科学的具体成就印象深刻而产生信任，科普传播因此能有效提升信任度。\n\n**有动机的怀疑**：拒绝科学共识往往源于共识内容威胁个人经济利益或行为习惯，而非缺乏理性认知能力。\n\n**极化例外论**：多数国家的科学信任与政治倾向无关，但美国出现了显著且持续的党派极化现象。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Science under suspicion: how real is the trust crisis?](https://www.polytechnique-insights.com/en/columns/society/science-under-suspicion-how-real-is-the-trust-crisis/?utm_source=brevo\u0026utm_campaign=newsletter201en\u0026utm_medium=email\u0026utm_id=158) |\n| 作者 | Hugo Mercier |\n| 发表日期 | 2026-03-24 |\n| 评分 | 87/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"science-trust-crisis-reality\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"science-trust-crisis-reality\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"science-trust-crisis-reality\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/science-trust-crisis-reality\",\"href\":\"/whatsup/tldr/hn-2026-p4/science-trust-crisis-reality\",\"category\":\"tldr\",\"title\":\"科学信任危机：感知与现实的鸿沟\",\"date\":\"2026-03-24\",\"excerpt\":\"文章以跨国调查数据驳斥科学信任危机的流行叙事，指出全球科学信任度依然高企且长期稳定，真正不信任科学的人群规模极小。\",\"coverImage\":\"$undefined\",\"author\":\"Hugo Mercier\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"87\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"科学信任危机：感知与现实的鸿沟\",\"author\":\"Hugo Mercier\",\"date\":\"2026-03-24\",\"excerpt\":\"文章以跨国调查数据驳斥科学信任危机的流行叙事，指出全球科学信任度依然高企且长期稳定，真正不信任科学的人群规模极小。\",\"source_url\":\"https://www.polytechnique-insights.com/en/columns/society/science-under-suspicion-how-real-is-the-trust-crisis/?utm_source=brevo\u0026utm_campaign=newsletter201en\u0026utm_medium=email\u0026utm_id=158\",\"tags\":[\"summary\"],\"score\":\"87\",\"category\":\"tldr\",\"t ildren\":\"本文系统考察了科学信任危机的真实状况。通过分析多项跨国长期调查数据，作者指出所谓信任危机更多是媒体和政策话语中的感知放大，而非客观现实。文章围绕信任水平、历史趋势、政治极化、反疫苗与气候变化怀疑论等议题展开论证，揭示出公众对科学的信任总体稳定在高位，真正极端不信任者为数极少。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章开篇提出当前关于科学信任危机的普遍担忧，随即以定量数据系统反驳危机论。它首先引用法国及全球调查数据，显示约80%的法国人信任科学，全球68国平均信任度达3.62/5，且信任水平长期保持稳定而非下滑。作者进一步指出，科学信任与政治倾向在多数国家并无关联，但美国是显著的例外——自2000年代以来共和党人对科学的信任明显低于民主党人。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章随后逐一剖析了反疫苗运动、气候变化怀疑论和阴谋论等引人注目的争议话题。数据显示，强烈反对所有疫苗者仅占人口2%-5%，气候变化怀疑论并未呈现上升趋势，而美国人对阴谋论的信念在过去近半个世纪中也无显著增长。一个反直觉的发现是：即使自称不信任科学或相信某些阴谋论的人，对基础科学知识的接受度仍超过87%。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后，文章讨论了科学普及对信任的正面作用，提出理性印象模型——公众因对科学成就印象深刻而信任科学家。作者指出，拒绝科学共识往往不是因为非理性，而是因为共识内容威胁到个人的经济利益或行为习惯，这应被理解为一种有动机的怀疑而非单纯的无知。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"信任赤字模型\"}],\"：认为科学影响力受阻源于公众对科学和科学家的负面评价，替代了早期的知识赤字模型。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"理性印象模型\"}],\"：公众因对科学的具体成就印象深刻而产生信任，科普传播因此能有效提升信任度。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"有动机的怀疑\"}],\"：拒绝科学共识往往源于共识内容威胁个人经济利益或行为习惯，而非缺乏理性认知能力。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"
