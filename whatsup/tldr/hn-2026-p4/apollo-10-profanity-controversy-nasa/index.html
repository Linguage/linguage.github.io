塞尔南在登月舱发生异常翻滚时脱口说出了不雅之词，被数百万电视观众听见。根据NASA任务记录，阿波罗10号机组在整个任务期间至少使用了230次粗俗语言。\n\n此事在地球上引发了强烈反响。迈阿密圣经学院院长拉里·波兰德博士随即联系NASA及时任总统尼克松，要求宇航员就其不当言行公开道歉。波兰德称，许多公众对此深感震惊，认为此类语言有失体统，在面向全国直播的场合尤为不妥。这一事件折射出彼时美国社会在公众形象、道德规范与航天英雄期待之间的深层张力。\n\n然而，也有反对之声。佛罗里达理工学院的一位太空技术教授联合300余名学生发起请愿，为宇航员辩护，并将抗议者的批评斥为无知之举，并将联署请愿书寄送给尼克松总统。面对舆论压力，NASA随后对阿波罗11号机组提出了更严格的言行要求。任务结果显示，尼尔·阿姆斯特朗全程未曾使用粗俗语言，巴兹·奥尔德林仅使用一次，全体机组的不雅用词总计不足15次，与阿波罗10号形成了鲜明对比。\n\n## 核心概念及解读\n\n- **阿波罗10号（Apollo 10）**：1969年5月执行的载人绕月任务，是阿波罗11号登月的最终彩排。机组完成了登月舱的实地测试，但未实施着陆。\n\n- **登月舱（Lunar Module）**：阿波罗计划中用于从指令舱分离并下降至月面的飞船单元。阿波罗10号中，塞尔南和斯塔福德驾驶登月舱飞至距月面约4.9万英尺处，随后重新对接。\n\n- **任务转播（Mission Broadcast）**：阿波罗任务的通话内容通过NASA向全国电视网络实时播出，宇航员的一言一行均置于公众视野之下，这也是此次粗话事件引发广泛关注的直接原因。\n\n- **公众形象与道德规范（Public Image \u0026 Moral Standards）**：冷战背景下，美国宇航员被视为国家形象的代表，其言行被寄予高度道德期望，这与他们在极端压力下的真实心理状态之间存在张力。\n\n- **言论自由与公众反弹（Free Speech vs. Public Backlash）**：此次事件触发了两种截然对立的社会反应，一方要求道歉，另一方捍卫宇航员的真实性，体现了1960年代美国社会文化价值观的内在分歧。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Bad words led some to swear off Apollo program](https://www.columbian.com/news/2019/may/31/bad-words-led-some-to-swear-off-apollo-program/) |\n| 作者 | Roger Simmons，Orlando Sentinel |\n| 发布日期 | 2019 年 5 月 31 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"apollo-10-profanity-controversy-nasa\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"apollo-10-profanity-controversy-nasa\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"apollo-10-profanity-controversy-nasa\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/apollo-10-profanity-controversy-nasa\",\"href\":\"/whatsup/tldr/hn-2026-p4/apollo-10-profanity-controversy-nasa\",\"category\":\"tldr\",\"title\":\"阿波罗10号的禁忌之词：太空中的粗话风波\",\"date\":\"2019-05-31\",\"excerpt\":\"1969年5月，阿波罗10号执行登月预演任务期间，三位宇航员托马斯·斯塔福德、约翰·杨和吉恩·塞尔南在飞行通话中频繁使用粗俗语言，引发社会广泛争议。此事促使NASA对后续的阿波罗11号机组进行言行规范，也在美国社会引发了一场关于宇航员公
