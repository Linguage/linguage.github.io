语言模型早期预览版。相较于前代 Qwen3.6-Plus，该版本在世界知识、指令遵循以及智能体编程三大核心维度上均有显著提升。模型目前可通过 Qwen Studio 进行对话体验，并将很快通过阿里云百炼 API 向开发者开放调用。\n\n## 内容框架与概述\n\nQwen3.6-Max-Preview 的发布是在 Qwen3.6-Plus 成功上线后的快速迭代成果。作为预览版本，它代表了 Qwen 团队在旗舰模型方向上的最新探索。官方强调，该预览版仍处于积极迭代阶段，后续版本将持续优化。其核心目标是在保持前代优势的基础上，大幅增强模型在复杂任务场景中的综合能力，尤其是面向开发者与研究者的实际使用需求。\n\n在评测表现方面，Qwen3.6-Max-Preview 在多项主流基准测试中超越前代并领先同类前沿模型。智能体编程方向的提升尤为突出：SkillsBench 提升 9.9 分、SciCode 提升 6.3 分、NL2Repo 提升 5.0 分、Terminal-Bench 2.0 提升 3.8 分。此外在知识类测试中，SuperGPQA 提升 2.3 分，QwenChineseBench 提升 5.3 分，指令遵循基准 ToolcallFormatIFBench 也提升了 2.8 分。该模型在 SWE-bench Pro、Terminal-Bench 2.0、SkillsBench、QwenClawBench、QwenWebBench 和 SciCode 六项编程基准上均取得最高分。\n\n在使用方式上，开发者可通过兼容 OpenAI 规范的聊天补全 API 或响应 API，以及兼容 Anthropic 的接口进行调用，模型名称为 qwen3.6-max-preview。值得注意的是，本次发布新增支持 preserve\\_thinking 功能，该功能可在多轮对话中保留前序轮次的完整思维内容，官方特别推荐将其用于智能体任务场景，以提升推理连贯性与任务完成质量。\n\n## 核心概念及解读\n\n**智能体编程（Agentic Coding）**：指模型能够自主分析需求、规划步骤并生成可执行代码的能力，超越简单的代码补全，适用于复杂工程任务，如仓库级代码操作和终端命令执行。\n\n**阿里云百炼（Alibaba Cloud Bailian）**：阿里云旗下的大模型服务平台，提供模型 API 调用、应用搭建等一站式服务，支持行业标准协议，是 Qwen 系列模型的主要商业化通道。\n\n**preserve\\_thinking**：本次新增的 API 参数功能，作用是在多轮对话中完整保留每一轮的模型思维链内容，从而让模型在执行长链条智能体任务时保持推理上下文的一致性。\n\n**基准测试（Benchmark）**：用于客观衡量模型在特定能力维度上表现的标准化测试集，文中涉及 SWE-bench Pro、SkillsBench、SciCode、SuperGPQA 等，分别覆盖软件工程、技能编程、科学代码生成及通用知识等方向。\n\n**指令遵循（Instruction Following）**：衡量模型准确理解并执行用户给定格式、约束或操作要求的能力，是实际应用场景中影响模型可用性的关键指标之一。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ---- |\n| 原标题 | [Qwen3.6-Max-Preview：更强知识，更强编程，持续进化](https://qwen.ai/blog?id=qwen3.6-max-preview) |\n| 作者 | Qwen Team |\n| 发布日期 | 2026 年 04 月 18 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"qwen36-max-preview-knowledge-coding-evolution\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"qwen36-max-preview-knowledge-coding-evolution\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"qwen36-max-preview-knowledge-coding-evolution\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/qwen36-max-preview-knowledge-codi
