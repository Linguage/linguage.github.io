026-04-05\",\"excerpt\":\"首位美国籍教皇利奥十四世公开反对以神之名美化美以对伊战争，呼吁停火谈判，展现出温和而坚定的和平立场。\",\"coverImage\":\"$undefined\",\"author\":\"Christopher Lamb\",\"original\":\"Not in Gods name How Pope Leo is pushing back on divine justification of war.md\",\"originalUrl\":\"https://www.cnn.com/2026/04/04/middleeast/pope-leo-iran-war-analysis-latam-intl\",\"score\":\"75\",\"content\":\"# 教皇利奥反对以神之名发动战争\\n\\n## 摘要\\n文章探讨了首位美国籍教皇利奥十四世在美以对伊战争背景下，公开反对美国防部长黑格塞斯以宗教名义为战争辩护的行径。利奥通过引用经文呼吁和平，要求政治领袖寻找停火出路，其立场被神学界视为与若望保禄二世反伊战相呼应，展现出温和外表下的坚定反战意志。\\n\\n## 内容框架与概述\\n文章以美伊战争升级为背景，切入教皇利奥十四世对特朗普的罕见点名呼吁。通过对比低调温和的教皇与高调张扬的美国总统，凸显两者在国际舞台上的鲜明反差，引出教皇对当前战争态势的深切担忧。\\n\\n随后文章深入剖析教皇反战的核心逻辑，即直接反驳黑格塞斯用圣经为战争背书的言论。利奥在圣周期间引用经文强调耶稣是和平之王，拒绝被用作战争借口。华盛顿枢机主教等神职人员也发声，指出这场战争不符合天主教正义战争理论。\\n\\n最后，文章将利奥的处境与若望保禄二世反对伊拉克战争作类比，指出其警告同样遭到部分特朗普支持者的忽视。作为具有国际视野的首位美国教皇，利奥在动荡时代正逐渐确立其作为坚定和平倡导者的角色，且其任期极可能超越当前美国政府。\\n\\n## 核心概念及解读\\n**神圣辩护**：指利用宗教经文或信仰为战争暴力行为寻找合法性，文章中指美国防部长为战争背书的行为。\\n\\n**正义战争理论**：天主教界定武装冲突是否具备道德正当性的标准体系，神职人员据此判定对伊战争不合规。\\n\\n**复活节休战**：教皇利奥在圣周期间提出的政治倡议，呼吁冲突各方在宗教节日期间停止暴力并展开谈判。\\n\\n**圣周和平倡议**：教皇在基督教最重要节日期间密集发声，通过讲道与外交通话双轨并行推动停火的外交策略。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Not in Gods name: How Pope Leo is pushing back on divine justification of war](https://www.cnn.com/2026/04/04/middleeast/pope-leo-iran-war-analysis-latam-intl) |\\n| 作者 | Christopher Lamb |\\n| 发表日期 | 2026-04-05 |\\n| 评分 | 75/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"教皇利奥反对以神之名发动战争\",\"excerpt\":\"首位美国籍教皇利奥十四世公开反对以神之名美化美以对伊战争，呼吁停火谈判，展现出温和而坚定的和平立场。\",\"date\":\"2026-04-05\",\"category\":\"tldr\",\"author\":\"Christopher Lamb\",\"original\":\"Not in Gods name How Pope Leo is pushing back on divine justification of war.md\",\"originalUrl\":\"https://www.cnn.com/2026/04/04/middleeast/pope-leo-iran-war-analysis-latam-intl\",\"score\":\"75\",\"tags\":[\"summary\"],\"toc\":true},\"sour
