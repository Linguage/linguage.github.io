 transients 提升性能；sequence 则以惰性方式逐步生成变换后的序列，与普通惰性序列相比会完整实现中间操作。这四种方式覆盖了从即时计算到惰性求值的不同场景需求。\n\n在创建自定义 Transducers 方面，文章详细介绍了其三元参数结构——Init（元数 0）、Step（元数 2）和 Completion（元数 1）——分别对应初始化、逐步处理和完成刷新三个阶段。文章还涵盖了早终止（early termination）机制，通过 reduced 值通知处理流程停止；以及带状态的 Transducers，如 dedupe 使用 volatile 存储前一个值以实现去重逻辑。在构建可转换化进程时，开发者需要遵守若干规范，确保线程安全与状态封装的正确性。\n\n## 核心概念及解读\n\n**Transducer（转换器）**\n一种将归约函数映射为另一归约函数的高阶变换。它不依赖具体的数据来源或目标，使得同一段变换逻辑可以跨集合、流、通道等多种上下文复用，避免了为每种数据源重新编写处理逻辑的冗余。\n\n**Reducing Function（归约函数）**\n签名为 (accumulated, input) -\u003e accumulated 的函数，是 reduce 操作的核心抽象。Transducer 正是通过包装和转换这类函数来实现其可组合性，整个 Transducer 体系的运行机制都建立在此基础之上。\n\n**comp（函数组合）**\nClojure 的标准 comp 函数被用来组合多个 Transducer，形成变换栈。组合顺序与 -\u003e\u003e 宏中的序列变换顺序一致，即 comp 中从左至右的函数将按照左至右的顺序依次处理输入数据，这与普通函数组合的右至左执行方向相反。\n\n**Reduced（提前终止值）**\n一种特殊的包装值，用于通知可转换化进程立即停止输入供给。任何实现了可转换化进程的代码都必须检测 step 函数的返回值是否为 reduced，并在完成阶段用 deref 解包后再调用 completion 操作。\n\n**Eduction（惰性转换捕获）**\n通过 eduction 函数将转换器与集合绑定，返回一个可被多次归约或迭代的对象。每次对其调用 reduce 或遍历时，都会重新执行整个变换过程，适合需要延迟计算或多次遍历同一变换逻辑的场景。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Clojure - Transducers](https://clojure.org/reference/transducers) |\n| 作者 | Rich Hickey 及 Clojure 核心团队 |\n| 发布日期 | 2026 年 04 月 22 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L15\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"clojure-transducers\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"clojure-transducers\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"clojure-transducers\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/clojure-transducers\",\"href\":\"/whatsup/tldr/hn-2026-p4/clojure-transducers\",\"category\":\"tldr\",\"title\":\"Clojure - Transducers\",\"date\":\"2026-04-22\",\"excerpt\":\"Transducers 是 Clojure 中一种可组合的算法变换机制，与输入和输出源完全解耦，仅描述对单个元素的变换逻辑，可应用于集合、流、通道等多种处理上下文。\",\"coverImage\":\"$undefined\",\"author\":\"Rich Hickey\",\"original\":\"$undefined\",\"originalUrl\":\"
