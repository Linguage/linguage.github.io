人动机。作为 Tailscale 的联合创始人，他已经拥有一家成功运营的企业，但仍然选择再次投身创业。他坦承这并非出于宏大的社会使命，而是源于对计算机本身的热爱——从微控制器到服务器，各种计算设备都令他着迷。然而，当前的主流云计算服务却让他感到挫败，这种挫败感驱使他决心从头建造一朵真正好用的云。\n\n文章深入剖析了现有云计算的三大结构性问题。在计算层面，虚拟机被绑定到固定的 CPU 和内存配置，用户无法像在物理机上那样灵活运行多个虚拟机实例；在存储层面，远程块存储的设计源于机械硬盘时代，面对 SSD 时性能开销从 10% 暴涨至 10 倍以上；在网络层面，云厂商收取的出口费用是普通数据中心的十倍之多，形成事实上的锁定效应。Kubernetes 等工具试图缓解这些问题，但 Crawshaw 认为这是在错误抽象之上叠加新抽象，本质上无法解决矛盾。\n\n文章最后指出，AI 智能体的出现使修复云计算成为紧迫任务。Jevons 悖论意味着智能体将催生更多软件，而糟糕的云基础设施会消耗智能体宝贵的上下文窗口。exe.dev 已推出解决虚拟机资源隔离问题的基础产品，采用 CPU 和内存按需分配、本地 NVMe 异步复制、全球 anycast 网络等设计，团队正从数据中心硬件上架开始，逐层重构整个软件栈。\n\n## 核心概念及解读\n\n**Jevons 悖论（Jevons paradox）**\n经济学概念，指技术进步提高资源使用效率后，反而导致该资源总消耗量增加的现象。文中指 AI 智能体降低编程门槛后，软件总量将激增，从而对云计算资源的需求大幅上升。\n\n**PaaS（Platform as a Service）**\n平台即服务，云厂商提供的应用托管抽象层。作者批评其为削弱计算机能力的专有抽象，每个厂商要求独特的开发方式，且常隐藏深层限制，导致开发者在项目深入后陷入困境。\n\n**gVisor / 嵌套虚拟化（Nested Virtualization）**\n解决云虚拟机灵活性不足的变通方案。gVisor 是 Google 开发的用户空间内核，提供额外隔离层；嵌套虚拟化指在云 VM 内再运行虚拟化层。两者均带来显著性能损耗，且增加运维复杂度。\n\n**Anycast 网络**\n一种网络路由技术，相同 IP 地址部署在多个地理位置，用户请求自动路由至最近节点。exe.dev 采用此技术为全球用户提供低延迟入口，并为后续功能扩展奠定基础。\n\n**远程块设备（Remote Block Device）**\n云存储的核心抽象，将存储通过网络以块设备形式暴露给虚拟机。作者指出其设计适配机械硬盘的毫秒级寻道时间，但面对 SSD 微秒级延迟时，网络往返开销成为严重瓶颈。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [I am building a cloud](https://crawshaw.io/blog/building-a-cloud) |\n| 作者 | David Crawshaw |\n| 发布日期 | 2026 年 04 月 22 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L15\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"crawshaw-2026-04-22\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"crawshaw-2026-04-22\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"crawshaw-2026-04-22\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/crawshaw-2026-04-22\",\"href\":\"/whatsup/tldr/hn-2026-p4/crawshaw-2026-04-22\",\"category\":\"tldr\",\"title\":\"我在建造一朵云\",\"date\":\"2026-04-22\",\"excerpt\":\"David Crawshaw 宣布其新创公司 exe.dev 完成 A 轮融资，并阐述了他再次创业的动机：他喜欢计算机，但对现有云计算感到不满。他认为当前云服务的核心抽象存 文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原标题\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://crawshaw.io/blog/building-a-cloud\",\"children\":\"I am building a cloud\"}]}]]}],\"$L18\",\"$L19\"]}]]}]}]]\n"])</script><script>self.__next_f.push([1,"18:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"作者\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"David Crawshaw\"}]]}]\n19:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"发布日期\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"2026 年 04 月 22 日\"}]]}]\n"])</script><script>self.__next_f.push([1,"11:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\"
