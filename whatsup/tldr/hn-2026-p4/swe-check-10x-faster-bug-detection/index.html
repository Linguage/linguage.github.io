rf IDE，核心创新在于生产对齐训练、奖励线性化与两阶段后训练。\n\n## 内容框架与概述\n\n文章首先阐明研究动机：现有前沿通用模型虽然检测质量达标，但速度太慢、成本太高，无法在 IDE 中实现即时漏洞检测体验，这促使团队转向对开源模型进行专项强化学习训练，目标是在速度、成本、质量三轴上同时达到最优。\n\n训练方案的核心是将生产环境完整复刻到训练沙箱中，包括 Windsurf 工具链、多语言多漏洞类型数据集，以及来自真实用户 dogfooding 反馈的持续迭代。一个具体案例是：早期模型因缺乏定义跳转工具而频繁误报，团队据此在训练和产品中同步新增了该工具并重新训练，这体现了生产反馈直接驱动训练迭代的核心理念。\n\n奖励设计是技术核心：团队提出奖励线性化方法，将全局 F-beta 指标通过一阶线性近似转化为样本级奖励，从而使模型能够逐样本优化却收敛到全局指标。在此基础上，两阶段后训练进一步分离了能力最大化与产品对齐两个目标——先让模型充分学习漏洞检测能力，再引入基于用户行为分布的延迟惩罚来压缩冗余输出，两阶段分离的效果显著优于同时优化单一复合奖励。\n\n## 核心概念及解读\n\n奖励线性化（Reward Linearization）：将全局 F-beta 指标对精确率和召回率做一阶线性近似，转化为可逐样本赋值的奖励函数，使样本平均奖励与全局指标方向一致。\n\n两阶段后训练（Two-Phase Post-Training）：先用基础奖励最大化漏洞检测能力，再加入延迟惩罚项对齐产品使用模式，分阶段优化避免模型陷入速度与质量的局部最优。\n\n半异步体验死亡谷（Semi-Async Valley of Death）：指模型响应既不够快到让用户感知为实时，又不够慢到用户有心理预期等待，处于两者之间最影响使用流畅度的糟糕区间。\n\nF-beta 评分（F-beta Score）：综合精确率与召回率的评估指标，beta 值决定两者权重。团队最终选用 beta=0.5 以强调精确率，避免误报过多影响用户体验。\n\n分发外评估（Out-of-Distribution Eval）：使用 Cognition 内部代码库中收集的漏洞样本进行测试，完全未参与训练，用于衡量模型的泛化能力。\n\n## 文章基本信息\n\n| 字段   | 内容                                                                                                |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题  | [Introducing SWE-Check: 10x Faster Bug Detection](https://cognition.ai/blog/swe-check-10x-faster) |\n| 作者   | Raymond Feng, Jeffrey Ling, Rhythm Garg, Moritz Stephan                                           |\n| 发布日期 | 2026 年 4 月 14 日                                                                                   |\n| 内容评分 | 88                                                                                                |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"swe-check-10x-faster-bug-detection\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"swe-check-10x-faster-bug-detection\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"swe-check-10x-faster-bug-detection\"],\"urlPath\":\"/whatsup/tldr/hn-20
