的人来说，是高度理性的利益选择。AI打破了这种制度均衡的关键前提——学科资本的稀缺性。当文献综述、概念梳理等能力被快速商品化，竞争的性质从边界内的深度积累转向跨域整合与真实判断。\n\n最后，文章提出两条转型路径。一是语境嵌入：文科判断力必须嵌入医疗、法律、技术等真实系统，以承担后果为检验标准。二是概念层面的跨学科重组：借助AI降低不同知识体系的进入门槛，在不同概念框架之间进行有意义的连接与迁移。两条路径共享同一个核心——判断不能被外包。AI使低成本跨界变得极其容易，也将真正需要判断力的思想工作与表层知识拼贴推向两极分化。\n\n## 核心概念及解读\n**知识苦修主义**：将时间投入与认知深度等同的隐含信条，AI第一次将困难与价值彻底剥离。\n\n**学科边界的政治经济学**：学科边界作为资源配置与权威生产的制度装置，维护既有利益结构的稳定。\n\n**语境嵌入**：文科判断力必须嵌入真实系统运作之中，以承担后果而非发表成果为检验标准。\n\n**认知幻觉**：文科长期依赖的系统性错觉——复杂操作等于思维深度，被AI的历史性证伪所揭穿。\n\n**资本贬值机制**：当学科核心能力可以被AI规模化复制，原有的稀缺性和分配结构便随之瓦解。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [AI时代，文科还有出路吗？](https://mp.weixin.qq.com/s?__biz=MjM5NTUxOTc4Mw==\u0026mid=2650648996\u0026idx=1\u0026sn=e24c9e625415701f1e4f30fc5c16ceef\u0026chksm=befe5dec8989d4fad9c41dafef2f181b438580c8b4d5b5919647355d9ac5d7d7bf954dedf291) |\n| 作者 | 徐贲 |\n| 发表日期 | 2026-04-15 |\n| 评分 | 92/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"humanities-in-ai-era-legitimacy-crisis\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"humanities-in-ai-era-legitimacy-crisis\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"humanities-in-ai-era-legitimacy-crisis\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/humanities-in-ai-era-legitimacy-crisis\",\"href\":\"/whatsup/tldr/hn-2026-p4/humanities-in-ai-era-legitimacy-crisis\",\"category\":\"tldr\",\"title\":\"AI时代文科的认知幻觉与出路\",\"date\":\"2026-04-15\",\"excerpt\":\"徐贲指出AI对文科的真正冲击不是能力替代，而是揭穿了文科长期依赖的认知幻觉——复杂性与困难性自动等于深度与价值。文科的核心出路在于跨界转型，承担真实判断及其后果。\",\"coverImage\":\"$undefined\",\"author\":\"徐贲\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"92\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"AI时代文科的认知幻觉与出路\",\"author\":\"徐贲\",\"date\":\"2026-04-15\",\"excerpt\":\"徐贲指出AI对文科的真正冲击不是能力替代，而是揭穿了文科长期依赖的认知幻觉——复杂性与困难性自动等于深度与价值。文科的核
