了全球AI研究方向和人才流向。\n\n## 核心概念及解读\n**平台经济**：固定成本高但边际成本极低，依赖网络效应自我强化的数字商业模式。\n\n**网络效应**：每新增一个用户都提升服务价值，形成正向循环，最终导致赢家通吃。\n\n**本土化策略**：跨国公司通过招募当地政商精英、建立本土联盟来获取合法性和政治资源的战略。\n\n**注意力经济**：数字巨头围绕用户有限的注意力和\"脑时\"构建商业模式，本质是争夺广告收入。\n\n**赢家通吃**：数字市场中，先发优势和网络效应导致一家独大，后来者几乎无法挑战。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Have digital giants taken control?](https://www.polytechnique-insights.com/en/columns/digital/have-the-digital-giants-taken-control/?utm_source=brevo\u0026utm_campaign=newsletter201en\u0026utm_medium=email\u0026utm_id=160) |\n| 作者 | Joëlle Toledano |\n| 发表日期 | 2025-04-16 |\n| 评分 | 86/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"have-digital-giants-taken-control\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"have-digital-giants-taken-control\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"have-digital-giants-taken-control\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/have-digital-giants-taken-control\",\"href\":\"/whatsup/tldr/hn-2026-p4/have-digital-giants-taken-control\",\"category\":\"tldr\",\"title\":\"数字巨头是否已掌控一切？\",\"date\":\"2025-04-16\",\"excerpt\":\"文章通过两位学者视角，剖析谷歌、亚马逊、Meta等数字巨头如何通过平台经济和网络效应形成垄断，及其与政治权力和学术研究之间的深层互动关系。\",\"coverImage\":\"$undefined\",\"author\":\"Joëlle Toledano\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"86\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"数字巨头是否已掌控一切？\",\"author\":\"Joëlle Toledano\",\"date\":\"2025-04-16\",\"excerpt\":\"文章通过两位学者视角，剖析谷歌、亚马逊、Meta等数字巨头如何通过平台经济和网络效应形成垄断，及其与政治权力和学术研究之间的深层互动关系。\",\"source_url\":\"https://www.polytechnique-insights.com/en/columns/digital/have-the-digital-giants-taken-control/?utm_source=brevo\u0026utm_campaign=newsletter201en\u0026utm_medium=email\u0026utm_id=160\",\"tags\":[\"summary\"],\"score\":\"86\",\"category\"
