利亚设有地面站，每月进行模拟演练确保任务顺利。文章最后展望这项技术对未来Artemis月球基地和火星载人任务的深远意义，强调林肯实验室在激光通信领域二十余年的技术积累。\n\n## 核心概念及解读\n**O2O**：Orion Artemis II Optical Communications System，安装在猎户座飞船上的激光通信终端，用于向地球高速传输数据。\n\n**MAScOT**：Modular, Agile, Scalable Optical Terminal，猫般大小的模块化光学终端，内置4英寸望远镜和精密跟踪系统，是O2O的核心组件。\n\n**Lasercom**：激光通信技术，使用激光束代替传统无线电波进行空间数据传输，带宽更高且可扩展性更强。\n\n**ILLUMA-T**：林肯实验室此前部署在国际空间站的激光通信终端，成功验证了1.2 Gbps下行速率，为Artemis II任务铺平了道路。\n\n**SCaN**：NASA空间通信与导航项目，为O2O系统提供资金支持，统筹NASA深空通信基础设施的发展。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Lincoln Laboratory laser communications terminal launches on historic Artemis II moon mission](https://news.mit.edu/2026/lincoln-laboratory-laser-communications-terminal-launches-artemis-ii-0402) |\n| 作者 | Ariana Gaines ｜ Nathan Parde ｜ MIT Lincoln Laboratory |\n| 发表日期 | 2026-04-02 |\n| 评分 | 92/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"lincoln-lab-lasercom-artemis-ii\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"lincoln-lab-lasercom-artemis-ii\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"lincoln-lab-lasercom-artemis-ii\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/lincoln-lab-lasercom-artemis-ii\",\"href\":\"/whatsup/tldr/hn-2026-p4/lincoln-lab-lasercom-artemis-ii\",\"category\":\"tldr\",\"title\":\"MIT林肯实验室激光通信终端随Artemis II登月\",\"date\":\"2026-04-02\",\"excerpt\":\"MIT Lincoln Laboratory开发的光学通信终端O2O随Artemis II升空，首次在载人任务中利用激光通信技术将月球高清视频和数据传回地球。\",\"coverImage\":\"$undefined\",\"author\":\"Ariana Gaines ｜ Nathan Parde ｜ MIT Lincoln Laboratory\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"92\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"MIT林肯实验室激光通信终端随Artemis II登月\",\"author\":\"Ariana Gaines ｜ Nathan Parde ｜ MIT Lincoln Laboratory\",\"date\":\"2026-04-02\",\"excerpt\":\"M
