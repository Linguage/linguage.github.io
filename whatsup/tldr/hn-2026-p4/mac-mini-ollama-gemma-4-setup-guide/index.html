求，并优化了针对智能体任务的缓存机制。同时提供了常用的管理命令与卸载指南，方便日常维护。\n\n## 核心概念及解读\n**统一内存**: 苹果芯片将内存与显存合并的架构，使设备能直接将大模型加载至内存供GPU高效调用。\n\n**LaunchAgent**: macOS下的守护进程机制，用于在用户登录时自动执行脚本，这里被用来实现模型预热。\n\n**Keep Alive**: Ollama的环境变量，控制模型在内存中的保留时间，设为负一可使其永久驻留不被卸载。\n\n**MLX框架**: 苹果专为自家芯片打造的机器学习框架，能显著提升大语言模型在Mac设备上的推理性能。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [April 2026 TLDR setup for Ollama + Gemma 4 12B on a Mac mini (Apple Silicon) — auto-start, preload, and keep-alive](https://gist.github.com/greenstevester/fc49b4e60a4fef9effc79066c1033ae5) |\n| 作者 |  |\n| 发表日期 | 2026-04-13 |\n| 评分 | 85/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"mac-mini-ollama-gemma-4-setup-guide\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"mac-mini-ollama-gemma-4-setup-guide\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"mac-mini-ollama-gemma-4-setup-guide\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/mac-mini-ollama-gemma-4-setup-guide\",\"href\":\"/whatsup/tldr/hn-2026-p4/mac-mini-ollama-gemma-4-setup-guide\",\"category\":\"tldr\",\"title\":\"在Mac mini上配置Ollama与Gemma 4指南\",\"date\":\"2026-04-07\",\"excerpt\":\"指导在Apple Silicon Mac mini上配置Ollama与Gemma 4模型，实现开机自启、内存常驻，并解析相关性能优化技巧。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"April 2026 TLDR setup for Ollama + Gemma 4 12B on a Mac mini (Apple Silicon) — auto-start, preload, and keep-alive.md\",\"originalUrl\":\"https://gist.github.com/greenstevester/fc49b4e60a4fef9effc79066c1033ae5\",\"score\":\"85\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"在Mac mini上配置Ollama与Gemma 4指南\",\"excerpt\":\"指导在Apple Silicon Mac mini上配置Ollama与Gemma 4模型，实现开机自启、内存常驻，并解析相关性能优化技巧。\",\"date\":\"2026-04-07\",\"category\":\"tldr\",\"original\":\"April 2026 TLDR setup for Ollama + Gemma 4 12B on a Mac mini (Apple
