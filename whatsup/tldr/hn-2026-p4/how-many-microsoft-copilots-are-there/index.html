6-03-31\",\"excerpt\":\"作者通过梳理微软官方资料，绘制了一张包含至少80个名为Copilot的产品交互图表，揭示了微软品牌命名极度泛滥的现象。\",\"coverImage\":\"$undefined\",\"author\":\"Tey Bannerman\",\"original\":\"How many products does Microsoft have named Copilot? I mapped every one.md\",\"originalUrl\":\"https://teybannerman.com/strategy/2026/03/31/how-many-microsoft-copilot-are-there.html\",\"score\":\"65\",\"content\":\"# 微软到底有多少个Copilot产品\\n\\n## 摘要\\n作者发现微软Copilot名称已泛滥至至少80个不同产品、功能甚至硬件按键。由于连微软官方都没有完整列表，作者手动搜集资料并绘制了交互式可视化图表，直观展现了这种品牌命名混乱的荒诞现状。\\n\\n## 内容框架与概述\\n文章从一次日常交流切入，指出微软Copilot这个词汇已经失去了明确的指代意义。它涵盖了应用程序、内置功能、平台、物理键盘按键、笔记本电脑类别，甚至是用于构建更多Copilot的工具，导致沟通时完全无法解释其具体含义。\\n\\n为了厘清这一混乱局面，作者试图寻找完整的产品名单，却发现微软自身的文档和官网中均不存在完整记录。这进一步暴露了微软在品牌管理上的失控与碎片化，侧面反映了大型科技公司在AI浪潮中急于贴标签的营销策略。\\n\\n最终，作者通过拼凑产品页面和发布公告，独立梳理出至少80个Copilot实例，并利用Flourish工具制作了交互式关系图。作者直言自己在图表中找不到任何逻辑规律，以幽默无奈的态度完成了对这场品牌命名狂欢的记录。\\n\\n## 核心概念及解读\\n**Copilot品牌泛滥**：微软将AI助手功能统一命名为Copilot，导致该词失去特定指向，涵盖软件、硬件等多达80种实体。\\n\\n**交互式可视化图表**：作者使用Flourish工具将所有Copilot产品按类别分组并连线，直观呈现品牌体系的复杂与无序。\\n\\n**品牌管理失控**：连微软官方都无法提供完整的Copilot清单，反映出企业在急速扩张AI产品线时的命名策略失当。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [How many products does Microsoft have named Copilot? I mapped every one](https://teybannerman.com/strategy/2026/03/31/how-many-microsoft-copilot-are-there.html) |\\n| 作者 | Tey Bannerman |\\n| 发表日期 | 2026-03-31 |\\n| 评分 | 65/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"微软到底有多少个Copilot产品\",\"excerpt\":\"作者通过梳理微软官方资料，绘制了一张包含至少80个名为Copilot的产品交互图表，揭示了微软品牌命名极度泛滥的现象。\",\"date\":\"2026-03-31\",\"category\":\"tldr\",\"author\":\"Tey Bannerman\",\"original\":\"How many products does Microsoft have named Copilot? I mapped every one.md\",\"originalUrl\":\"https://teybannerman.com/strategy/2026/03/31/how-many-microsoft-copilot-are-there.html\",\"score\":\"65\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/run
