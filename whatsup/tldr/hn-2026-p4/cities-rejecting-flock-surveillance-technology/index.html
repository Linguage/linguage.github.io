控工具，公众的隐私权利与执法需求之间的矛盾日益激化，这促使社区行动和科技公司重新审视此类技术的边界。\n\n## 核心概念及解读\n**ALPR摄像头**：自动车牌读取摄像头，用于抓拍并识别街道车辆牌照，是Flock的基础监控设备。\n\n**无人机先期响应**：Flock推出的自动化无人机系统，可在接到报警后自动起飞，高速追踪车辆或人员。\n\n**热名单与安全名单**：用于过滤车辆的机制，热名单针对可疑车辆自动报警，安全名单则排除居民车辆。\n\n**Freeform搜索**：Flock的自然语言调查工具，允许警方通过描述衣物或车辆特征来检索监控线索。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [When Flock Comes to Town: Why Cities Are Axing the Controversial Surveillance Technology](https://www.cnet.com/home/security/when-flock-comes-to-town-why-cities-are-axing-the-controversial-surveillance-technology/) |\n| 作者 | Tyler Lacoma |\n| 发表日期 | 2026-04-08 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"cities-rejecting-flock-surveillance-technology\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"cities-rejecting-flock-surveillance-technology\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"cities-rejecting-flock-surveillance-technology\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/cities-rejecting-flock-surveillance-technology\",\"href\":\"/whatsup/tldr/hn-2026-p4/cities-rejecting-flock-surveillance-technology\",\"category\":\"tldr\",\"title\":\"美国城市为何抛弃Flock监控技术\",\"date\":\"2026-04-08\",\"excerpt\":\"美国多座城市因隐私担忧和数据共享争议，纷纷终止与Flock Safety的监控合同，揭示AI车牌识别技术的滥用风险。\",\"coverImage\":\"$undefined\",\"author\":\"Tyler Lacoma\",\"original\":\"When Flock Comes to Town Why Cities Are Axing the Controversial Surveillance Technology.md\",\"originalUrl\":\"https://www.cnet.com/home/security/when-flock-comes-to-town-why-cities-are-axing-the-controversial-surveillance-technology/\",\"score\":\"78\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"美国城市为何抛弃Flock监控技术\",\"excerpt\":\"美国多座城市因隐私担忧和数据共享争议，纷纷终止与Flock Safety的监控合同，揭示AI车牌识别技术的滥用风险。\",\"date\":\"2026-04-08\",\"category\":\"tldr\",\"author\":\"Ty
