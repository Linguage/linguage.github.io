与冲击力驱动颗粒对流。通过设计颗粒配比和容器结构，将自适应周期精确控制在约一个马拉松的步数范围内，且可加速或减缓这一过程。第三部分展望了技术迁移前景：定制包装材料、轮椅坐垫、可重置颗粒的环保鞋类等，提出了升级而非丢弃的可持续设计理念。\n\n## 核心概念及解读\n**颗粒对流**：又称巴西果效应，固体颗粒受振动时较大颗粒上浮、较小颗粒下沉的物理现象，是该自适应技术的核心机制\n\n**自适应中底**：跑鞋中间层通过颗粒对流逐步调整内部颗粒分布，从而根据个人跑步习惯优化缓冲和支撑性能\n\n**巴西果效应**：学术上对颗粒对流的通俗称呼，指摇晃容器时较大颗粒会升至顶部的现象\n\n**可规模化定制**：相同生产线制造同一产品，通过使用中自然演化实现个性化，解决了传统定制无法大规模生产的矛盾\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [3 Questions: A running shoe that adapts to the runner](https://news.mit.edu/2026/3-questions-running-shoe-that-adapts-to-runner-0416) |\n| 作者 | Maria Iacobo ｜ School of Architecture and Planning |\n| 发表日期 | 2026-04-16 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"granular-convection-adaptive-running-shoe\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"granular-convection-adaptive-running-shoe\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"granular-convection-adaptive-running-shoe\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/granular-convection-adaptive-running-shoe\",\"href\":\"/whatsup/tldr/hn-2026-p4/granular-convection-adaptive-running-shoe\",\"category\":\"tldr\",\"title\":\"颗粒对流技术打造自适应跑鞋\",\"date\":\"2026-04-16\",\"excerpt\":\"麻省理工学院副教授Skylar Tibbits利用颗粒对流效应开发自适应跑鞋中底，让跑鞋在使用过程中根据个人步态和压力点逐步优化性能，实现大规模生产的个性化适配\",\"coverImage\":\"$undefined\",\"author\":\"Maria Iacobo ｜ School of Architecture and Planning\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"颗粒对流技术打造自适应跑鞋\",\"author\":\"Maria Iacobo ｜ School of Architecture and Planning\",\"date\":\"2026-04-16\",\"excerpt\":\"麻省理工学院副教授Skylar Tibbits利用颗粒对流效应开发自适应跑鞋中底，让跑鞋在使用过程中根据个人步态和压力点逐步优化性能，实现大规模生产的个性化适配\",\"source_url\":\"https://news.mit.edu/2026/3-questions-running-shoe-that-adapts-to-runner-
