缩一伸），同时省去了外部储液器；其二是预加压机制，通过施加偏置压力防止泵入口发生空化，确保系统稳定运行，且偏压大小可根据响应速度与收缩幅度的需求调节。\n\n文章最后讨论了这项技术的应用前景——特别适合可穿戴外骨骼、假肢和辅助设备，因为纤维形态可密集分布于结构内部而非集中于关节。评审专家评价该工作弥合了流体动力学与实用机器人之间的鸿沟，提供了从组件表征到物理模型再到实物验证的完整系统级方案。\n\n## 核心概念及解读\n**电液动力泵**：利用电场向介电流体中注入电荷，产生离子拖曳流体流动的微型固态泵，无运动部件，重量仅数克。\n\n**McKibben 致动器**：一种气动/液压人工肌肉，充压时编织网套径向膨胀、轴向收缩，模拟生物肌肉的线性运动。\n\n**拮抗配置**：两根肌肉纤维成对工作，一根收缩时另一根拉伸，形成闭环流体回路，无需外部储液器。\n\n**空化效应**：泵入口压力低于液体蒸气压时形成气泡，可能导致介电击穿；通过预加压偏置可抑制该现象。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [A new type of electrically driven artificial muscle fiber](https://news.mit.edu/2026/new-type-electrically-driven-artificial-muscle-fiber-0409) |\n| 作者 | David L. Chandler ｜ Media Lab |\n| 发表日期 | 2026-04-09 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"electrofluidic-fiber-artificial-muscles\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"electrofluidic-fiber-artificial-muscles\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"electrofluidic-fiber-artificial-muscles\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/electrofluidic-fiber-artificial-muscles\",\"href\":\"/whatsup/tldr/hn-2026-p4/electrofluidic-fiber-artificial-muscles\",\"category\":\"tldr\",\"title\":\"电驱动人造肌肉纤维：像生物肌肉一样收缩\",\"date\":\"2026-04-09\",\"excerpt\":\"MIT 和意大利理工团队研发出一种电驱动人造肌肉纤维，将微型电液动力泵与 McKibben 致动器集成于纤维中，无需外部泵源，安静、柔顺、可规模化制造，有望用于机器人和假肢。\",\"coverImage\":\"$undefined\",\"author\":\"David L. Chandler ｜ Media Lab\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"电驱动人造肌肉纤维：像生物肌肉一样收缩\",\"author\":\"David L. Chandler ｜ Media Lab\",\"date\":\"2026-04-09\",\"excerpt\":\"MIT 和意大利理工团队研发出一种电驱动人造肌肉纤维，将微型电液动力泵与 McKibben 致动器集成于纤维中，无需外部泵源，安静、柔顺、可规模化制造，有望用于机器人和假肢。\",\"source_url\":\"https://news.mit.edu/202
