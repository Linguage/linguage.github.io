准测试中表现优异。作者指出，这对美国 AI 产业构成双重威胁：经济上可能分流企业需求，地缘政治上将导致美国依赖中国开源技术，同时引发关于出口管制有效性和模型蒸馏争议的新讨论。\n\n## 内容框架与概述\n\nDeepSeek V4 系列包含 Pro 和 Flash 两个版本。Pro 版总参数量达 1.6 万亿，激活参数 490 亿，支持百万 token 上下文；Flash 版总参数 2840 亿，激活参数 130 亿。两者均基于约 33 万亿 token 训练，在 MMLU Pro、GPQA Diamond、SWE-bench Verified 等代理编码基准测试中接近美国最前沿闭源模型。更关键的是其定价优势——输出 token 成本仅为 GPT-5.5 和 Opus 4.7 的几分之一，这对企业决策具有决定性影响。\n\n作者从商业逻辑角度分析，大多数企业应用并不需要绝对前沿的智能水平，而是追求性价比和可控性。DeepSeek 的开源特性允许企业自主微调、本地部署和精确控制，这与闭源模型的黑箱模式形成鲜明对比。当 CEO 面对功能足够且成本悬殊的选择时，经济理性将驱动大量美国企业采用中国开源方案。这种需求迁移直接威胁到美国数万亿美元 AI 投资的回报预期，因为基础设施建设的商业闭环依赖于模型层面的持续收费。\n\n文章进一步探讨深层风险。地缘政治层面，若美国企业 AI 架构依赖中国开源模型，一旦中方调整架构或切断支持，美方将陷入被动。文化层面，模型内嵌的中国文化细微差异可能影响信息叙事。关于出口管制，作者指出其矛盾效果：确实限制了 DeepSeek 的算力扩张，使其 Pro 服务产能紧张；但恰恰因算力受限，反而催生了算法层面的创新突破，使其能在阉割版 GPU 上高效运行。针对蒸馏窃取指控，作者援引数据质疑——DeepSeek 仅 15 万次查询，远低于 Moonshot 的 340 万和 Minimax 的 1300 万次，且其完整开源和白皮书透明度与窃取指控难以吻合。\n\n## 核心概念及解读\n\n- **混合专家（MoE）**：一种神经网络架构，将模型划分为多个专家子网络，每轮推理仅激活部分专家。DeepSeek V4 Pro 以 1.6 万亿总参数实现 490 亿激活参数，大幅降低推理成本，是解决大模型计算效率问题的关键路径。\n\n- **蒸馏（Distillation）**：将大模型知识迁移到小模型的技术，也被指认为通过 API 查询窃取闭源模型能力的行为。当前成为中美 AI 竞争中的争议焦点，但作者认为数据规模差异使 DeepSeek 的指控难以成立。\n\n- **出口管制（Export Controls）**：美国限制高端 GPU 对华出口的政策。文章揭示其 unintended consequence——受限方被迫进行算法创新，反而可能加速非对称突破，形成管制悖论。\n\n- **开源 vs 闭源**：两种 AI 发展路线的战略博弈。开源降低使用门槛、促进生态扩散但削弱单一国家控制力；闭源保障商业回报和地缘政治影响力但面临价格竞争。美国前沿实验室除 Google 外普遍排斥开源，形成结构性劣势。\n\n- **算力约束下的算法创新（Algorithmic Unlock）**：在硬件受限条件下通过工程优化释放效率空间。DeepSeek 的案例表明，计算资源瓶颈可能转化为算法突破的催化剂，挑战了算力至上的行业共识。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [DeepSeek V4 is a Serious Threat](https://x.com/MatthewBerman/article/2047843625510609373) |\n| 作者 | Matthew Berman |\n| 发布日期 | 2026 年 04 月 25 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"deepseek-v4-is-a-serious-threat\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"deepseek-v4-is-a-serious-threat\"],\"pathSegments\"
