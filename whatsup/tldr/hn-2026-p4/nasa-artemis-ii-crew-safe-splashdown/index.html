火星的长远目标。\n\n## 核心概念及解读\n**阿尔忒弥斯二号任务**：NASA时隔半个多世纪的首批载人绕月测试飞行，旨在全面验证猎户座飞船与SLS火箭的载人性能。\n\n**猎户座飞船**：执行深空载人飞行的核心航天器，此次任务中完成了生命支持系统及手动操控能力的在轨全面评估。\n\n**最远距离纪录**：机组在绕月期间距地球超25万英里，成功打破了1970年由阿波罗13号创造的人类最远航天距离记录。\n\n**日食与月表成像**：宇航员在绕月时捕捉到日食奇观及超七千张月表图像，为未来月球南极着陆选址提供了高价值地形参考。\n\n**阿尔忒弥斯三号任务**：NASA计划的下一步载人登月行动，将重点测试与商业月球着陆器的低轨对接与集成操作能力。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [NASA Welcomes Record-Setting Artemis II Moonfarers Back to Earth](https://www.nasa.gov/news-release/nasa-welcomes-record-setting-artemis-ii-moonfarers-back-to-earth/?utm_source=TWITTER\u0026utm_medium=NASA\u0026utm_campaign=NASASocial\u0026linkId=928506549) |\n| 作者 |  |\n| 发表日期 | 2026-04-13 |\n| 评分 | 85/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"nasa-artemis-ii-crew-safe-splashdown\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"nasa-artemis-ii-crew-safe-splashdown\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"nasa-artemis-ii-crew-safe-splashdown\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/nasa-artemis-ii-crew-safe-splashdown\",\"href\":\"/whatsup/tldr/hn-2026-p4/nasa-artemis-ii-crew-safe-splashdown\",\"category\":\"tldr\",\"title\":\"阿尔忒弥斯二号宇航员绕月归来\",\"date\":\"2026-04-11\",\"excerpt\":\"NASA阿尔忒弥斯二号任务圆满完成，四名宇航员历时十天绕月飞行并安全返回地球，打破了人类最远航行距离纪录。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"NASA Welcomes Record-Setting Artemis II Moonfarers Back to Earth.md\",\"originalUrl\":\"https://www.nasa.gov/news-release/nasa-welcomes-record-setting-artemis-ii-moonfarers-back-to-earth/?utm_source=TWITTER\u0026utm_medium=NASA\u0026utm_campaign=NASASocial\u0026linkId=928506549\",\"score\":\"85\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"阿尔忒弥斯二号宇航员绕月归来\",\"excerpt\":\"NASA阿尔忒弥斯二号任务圆满完成，四名宇航员历时十天绕月飞行并安全返回地球，打破了人类最远航行距离纪录。\",\"date\
