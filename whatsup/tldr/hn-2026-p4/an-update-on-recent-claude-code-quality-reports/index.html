统提示词调整。公司详细说明了每项问题的技术根因与修复时间线，并宣布重置所有订阅用户的使用额度，同时承诺改进内部测试流程以防止类似事件重演。\n\n## 内容框架与概述\n\nAnthropic 在文中首先承认了过去一个月部分用户感知到的 Claude Code 质量退化现象，并澄清 API 与推理层未受影响。调查锁定三个独立问题：3 月 4 日将默认推理强度从 high 降至 medium 以降低延迟，但牺牲了智能表现；3 月 26 日实施的缓存清理优化存在 bug，导致会话闲置超一小时后持续清除历史推理记录，造成模型失忆与重复；4 月 16 日为降低 Opus 4.7 冗长性而添加的系统提示词限制了输出长度，意外损害编码质量。三项变更分别于 4 月 7 日、4 月 10 日与 4 月 20 日修复。\n\n针对推理强度调整，Anthropic 解释称 high 模式下 Opus 4.6 偶有超长思考导致界面冻结，内部评估认为 medium 能在显著降低延迟的同时保持相近智能水平，但用户反馈表明多数人愿以更高延迟换取更高智能。公司最终恢复 high 为默认，并为 Opus 4.7 引入 xhigh 选项。缓存 bug 则源于 clear_thinking_20251015 API 头部的错误实现，本意为闲置会话一次性清理旧推理，实际却在每轮持续丢弃历史，且因内部实验干扰而难以复现，最终由 Opus 4.7 在代码审查中定位。\n\n关于系统提示词变更，25 词工具间文本与 100 词最终回复的长度限制在广泛消融测试中被发现导致 3% 的性能下降。Anthropic 宣布将加强内部人员使用公共版本的比例、改进 Code Review 工具、为每次系统提示词变更运行模型专属评估套件、增加浸泡测试与渐进式发布，并创建 @ClaudeDevs 账号以深化产品决策沟通。\n\n## 核心概念及解读\n\n- **推理强度（reasoning effort）**：Claude Code 中控制模型思考深度与耗时的参数，分为 medium、high、xhigh 等级别，用户可通过 /effort 命令调整，更高强度通常带来更优输出但增加延迟与 token 消耗。\n\n- **提示词缓存（prompt caching）**：Anthropic API 提供的成本优化机制，将近期请求中的 token 暂存于缓存以实现复用，降低重复调用成本并加速响应，但缓存会因闲置超时而失效。\n\n- **消融测试（ablation）**：模型评估方法，通过系统性地移除系统提示词中的单条指令来隔离各组件对整体性能的贡献，用于识别意外负面影响的来源。\n\n- **测试时计算（test-time compute）**：指模型在推理阶段而非训练阶段投入的计算资源，推理强度参数即沿此曲线选取不同平衡点，以在延迟与质量之间取得权衡。\n\n- **代码审查（Code Review）**：Anthropic 内部使用的自动化代码分析工具，文中提及已扩展其上下文范围以支持多仓库分析，未来将向客户开放改进版本。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [An update on recent Claude Code quality reports](https://www.anthropic.com/engineering/april-23-postmortem) |\n| 作者 | Anthropic Engineering |\n| 发布日期 | 2026 年 4 月 23 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"an-update-on-recent-claude-code-quality-reports\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"an-update-on-recent-claude-code-quality-reports\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"an-update-on-recent-claude-code-quality-reports\"],\"u
