ush([1,"\n# Vercel 遭黑客入侵：员工账户被攻破，数据疑遭泄露并出售\n\n## 摘要\n\n云开发平台 Vercel 于 2026 年 4 月 19 日正式确认发生安全事件。事件起因是一名员工的 Google Workspace 账户通过第三方 AI 平台 Context.ai 被攻击者入侵，攻击者随即以此为跳板渗透至 Vercel 内部系统，访问并枚举了未加密的环境变量，最终获取到更深层的系统权限。与此同时，自称 ShinyHunters 的黑客在地下论坛声称掌握了源代码、API 密钥及员工信息等数据，并索要 200 万美元赎金。\n\n## 内容框架与概述\n\n**事件起因与入侵路径**\n\n本次安全事件的根源在于第三方 AI 工具 Context.ai 遭到入侵。攻击者通过 Context.ai 的 Google Workspace OAuth 应用程序，成功获取了 Vercel 某名员工的 Google Workspace 账户访问权限。随后，攻击者以该账户为跳板，逐步向 Vercel 内部系统横向渗透，并重点针对那些未被标记为敏感级别、因而未经加密存储的环境变量进行枚举操作，从而获得了进一步的访问权限。Vercel CEO Guillermo Rauch 强调，所有被标记为敏感的环境变量均处于完整加密状态，此次泄露的核心问题在于非敏感变量的分类管理机制存在疏漏。\n\n**黑客声索与数据兜售**\n\n一名自称属于 ShinyHunters 黑客组织的攻击者在黑客论坛发帖，声称掌握多名 Vercel 员工账户的访问权限，涵盖内部部署入口、API 密钥（包含 NPM 令牌与 GitHub 令牌），以及从 Linear 项目管理系统中获取的数据。该攻击者还公开了一份含有 580 条记录的员工信息文件，内容包括姓名、企业邮箱、账户状态及活动时间戳，并截图展示了疑似 Vercel 内部企业级管理后台的界面。值得注意的是，被外界认定与近期 ShinyHunters 系列攻击相关的黑客已向 BleepingComputer 明确否认参与此次事件，真实归因尚存疑问。\n\n**Vercel 的应对措施与后续影响**\n\nVercel 在事件披露后迅速采取了一系列补救措施：更新了面板界面，新增环境变量概览页面及敏感变量管理功能，并向所有客户发出建议，要求审查现有环境变量配置、启用敏感变量加密功能，并在必要时轮换相关密钥。调查已确认 Next.js、Turbopack 及其他开源项目未受波及。此外，Vercel 已通知执法机关，并持续与外部事件响应专家协作推进调查。外界亦关注到，若其他使用 Context.ai 的企业员工同样受到波及，此次事件的实际影响范围或将远不止于 Vercel 一家。\n\n## 核心概念及解读\n\n**OAuth 应用程序劫持（OAuth App Hijacking）**\nOAuth 是一种授权协议，允许第三方应用以受控方式访问用户账户资源。本次攻击中，黑客通过入侵 Context.ai 的 Google Workspace OAuth 应用，获得了对关联员工账户的访问令牌，实现了身份冒充，是供应链攻击的典型手法。\n\n**环境变量（Environment Variables）**\n环境变量是软件部署中用于存储配置信息（如数据库地址、API 密钥等）的键值对，通常在运行时注入程序。本次事件中，未被标记为敏感的环境变量以明文存储，成为攻击者进一步渗透的突破口。\n\n**横向移动（Lateral Movement）**\n横向移动指攻击者在成功入侵初始目标后，利用已获权限在内部网络中扩展访问范围的行为。本次事件中，攻击者从一个员工账户出发，逐步渗透至多个内部部署环境及系统，体现了这一经典攻击策略。\n\n**ShinyHunters**\nShinyHunters 是一个知名的黑客及数据勒索组织，历史上曾对多家知名企业发动攻击并兜售窃取数据。此次事件中，声称为 ShinyHunters 成员的攻击者索要 200 万美元赎金，但该组织其他成员否认参与，归因存在争议。\n\n**供应链攻击（Supply Chain Attack）**\n供应链攻击指攻击者不直接针对目标企业，而是通过攻击其所依赖的第三方工具或服务商来间接实现入侵。本次事件中，Context.ai 作为 Vercel 员工所使用的 AI 工具，成为攻击链条上的薄弱环节。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Vercel confirms breach as hackers claim to be selling stolen data](https://www.bleepingcomputer.com/news/security/vercel-confirms-breach-as-hackers-claim-to-be-selling-stolen-data/) |\n| 作者 | Lawrence Abrams |\n| 发布日期 | 2026 年 4 月 19 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"vercel-security-breach-ai-tool-oauth-compromise\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"vercel-security-breach-ai-tool-oauth-compromise\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"vercel-security-breach-ai-tool-oauth-compromise\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/vercel-security-breach-ai-tool-oauth-compromise\",\"href\":\"/whatsup/tldr/hn-2026-p4/vercel-security-breach-ai-tool-oauth-compromise\",\"category\":\"tldr\",\"title\":\"Vercel 遭黑客入侵：员工账户被攻破，数据疑遭泄露并出售\",\"date\":\"2026-04-20\",\"excerpt\":\"云开发平台 Vercel 于 2026 年 4 月 19 日正式确认发生安全事件。事件起因是一名员工的 Google Workspace 账户通过第三方 AI 平台 Context.ai 被攻击者入侵，攻击者随即以此为跳板渗透至 Vercel 内部系统，访问并枚举了未加密的环境变量，最终获取到更深层的系统权限。与此同时，自称 ShinyHunters 的黑客在地下论坛声称掌握了源代码、API 密钥...\",\"coverImage\":\"$undefined\",\"author\":\"Lawrence Abrams\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Vercel 遭黑客入侵：员工账户被攻破，数据疑遭泄露并出售\",\"author\":\"Lawrence Abrams\",\"date\":\"2026-04-20\",\"excerpt\":\"云开发平台 Vercel 于 2026 年 4 月 19 日正式确认发生安全事件。事件起因是一名员工的 Google Workspace 账户通过第三方 AI 平台 Context.ai 被攻击者入侵，攻击者随即以此为跳板渗透至 Vercel 内部系统，访问并枚举了未加密的环境变量，最终获取到更深层的系统权限。与此同时，自称 ShinyHunters 的黑客在地下论坛声称掌握了源代码、API 密钥...\",\"source_url\":\"https://www.bleepingcomputer.com/news/security/vercel-confirms-breach-as-hackers-claim-to-be-selling-stolen-data/\",\"tags\":[\"summary\"],\"score\":\"88\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false},\"sourcePath\":\"/home/runner/w \",\"hn-2026-p4\",\"vercel-breach-oauth-supply-chain-attack-platform-environment-variables\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"vercel-breach-oauth-supply-chain-attack-platform-environment-variables\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/vercel-breach-oauth-supply-chain-attack-platform-environment-variables\",\"href\":\"/whatsup/tldr/hn-2026-p4/vercel-breach-oauth-supply-chain-attack-platform-environment-variables\",\"category\":\"tldr\",\"title\":\"Vercel供应链攻击事件：OAuth漏洞暴露平台环境变量的隐性风险\",\"date\":\"2026-04-20\",\"excerpt\":\"2026年4月披露的Vercel安全事件揭示了现代云平台中OAuth信任关系与环境变量管理的结构性风险。攻击者通过第三方OAuth应用Context.ai的入侵，利用Lumma Stealer恶意软件窃取的令牌，横向渗透至Vercel内部系统，枚举了部分客户项目中未标记为敏感的环境变量。该事件凸显了OAuth供应链攻击的隐蔽性、平台默认安全配置缺陷的危害，以及开发者凭证在软件供应链中的普遍脆弱性。\",\"coverImage\":\"$undefined\",\"author\":\"Peter Girnus\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Vercel供应链攻击事件：OAuth漏洞暴露平台环境变量的隐性风险\",\"author\":\"Peter Girnus\",\"date\":\"2026-04-20\",\"excerpt\":\"2026年4月披露的Vercel安全事件揭示了现代云平台中OAuth信任关系与环境变量管理的结构性风险。攻击者通过第三方OAuth应用Context.ai的入侵，利用Lumma Stealer恶意软件窃取的令牌，横向渗透至Vercel内部系统，枚举了部分客户项目中未标记为敏感的环境变量。该事件凸显了OAuth供应链攻击的隐蔽性、平台默认安全配置缺陷的危害，以及开发者凭证在软件供应链中的普遍脆弱性。\",\"source_url\":\"https://www.trendmicro.com/en_us/research/26/d/vercel-breach-oauth-supply-chain.html\",\"tags\":[\"summary\"],\"score\":\"88\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p4/vercel-breach-oauth-supply-chain-attack-platform-environment-variables.md\"}},\"headings\":[{\"depth\":2,\"text\":\"摘要\",\"id\":\"摘要\"},{\"depth\":2,\"text\":\"内容框架与概述\",\"id\":\"内容框架与概述\"},{\"depth\":2,\"text\":\"核心概念及解读\",\"id\":\"核心概念及解读\"},{\"depth\":2,\"text\":\"文章基本信息\",\"id\":\"文章基本信息\"}],\"sidebar\":null,\"directoryHref\":\"/whatsup?tab=tldr\",\"children\":\"$L19\"}]\n"])</script><script>self.__next_f.push([1,"19:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"云开发平台 Vercel 于 2026 年 4 月 19 日正式确认发生安全事件。事件起因是一名员工的 Google Workspace 账户通过第三方 AI 平台 Context.ai 被攻击者入侵，攻击者随即以此为跳板渗透至 Vercel 内部系统，访问并枚举了未加密的环境变量，最终获取到更深层的系统权限。与此同时，自称 ShinyHunters 的黑客在地下论坛声称掌握了源代码、API 密钥及员工信息等数据，并索要 200 万美元赎金。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"事件起因与入侵路径\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本次安全事件的根源在于第三方 AI 工具 Context.ai 遭到入侵。攻击者通过 Context.ai 的 Google Workspace OAuth 应用程序，成功获取了 Vercel 某名员工的 Google Workspace 账户访问权限。随后，攻击者以该账户为跳板，逐步向 Vercel 内部系统横向渗透，并重点针对那些未被标记为敏感级别、因而未经加密存储的环境变量进行枚举操作，从而获得了进一步的访问权限。Vercel CEO Guillermo Rauch 强调，所有被标记为敏感的环境变量均处于完整加密状态，此次泄露的核心问题在于非敏感变量的分类管理机制存在疏漏。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"黑客声索与数据兜售\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"一名自称属于 ShinyHunters 黑客组织的攻击者在黑客论坛发帖，声称掌握多名 Vercel 员工账户的访问权限，涵盖内部部署入口、API 密钥（包含 NPM 令牌与 GitHub 令牌），以及从 Linear 项目管理系统中获取的数据。该攻击者还公开了一份含有 580 条记录的员工信息文件，内容包括姓名、企业邮箱、账户状态及活动时间戳，并截图展示了疑似 Vercel 内部企业级管理后台的界面。值得注意的是，被外界认定与近期 ShinyHunters 系列攻击相关的黑客已向 BleepingComputer 明确否认参与此次事件，真实归因尚存疑问。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"Vercel 的应对措施与后续影响\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Vercel 在事件披露后迅速采取了一系列补救措施：更新了面板界面，新增环境变量概览页面及敏感变量管理功能，并向所有客户发出建议，要求审查现有环境变量配置、启用敏感变量加密功能，并在必要时轮换相关密钥。调查已确认 Next.js、Turbopack 及其他开源项目未受波及。此外，Vercel 已通知执法机关，并持续与外部事件响应专家协作推进调查。外界亦关注到，若其他使用 Context.ai 的企业员工同样受到波及，此次事件的实际影响范围或将远不止于 Vercel 一家。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"OAuth 应用程序劫持（OAuth App Hijacking）\"}],\"\\nOAuth 是一种授权协议，允许第三方应用以受控方式访问用户账户资源。本次攻击中，黑客通过入侵 Context.ai 的 Google Workspace OAuth 应用，获得了对关联员工账户的访问令牌，实现了身份冒充，是供应链攻击的典型手法。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"环境变量（Environment Variables）\"}],\"\\n环境变量是软件部署中用于存储配置信息（如数据库地址、API 密钥等）的键值对，通常在运行时注入程序。本次事件中，未被标记为敏感的环境变量以明文存储，成为攻击者进一步渗透的突破口。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"横向移动（Lateral Movement）\"}],\"\\n横向移动指攻击者在成功入侵初始目标后，利用已获权限在内部网络中扩展访问范围的行为。本次事件中，攻击者从一个员工账户出发，逐步渗透至多个内部部署环境及系统，体现了这一经典攻击策略。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"ShinyHunters\"}],\"\\nShinyHunters 是一个知名的黑客及数据勒索组织，历史上曾对多家知名企业发动攻击并兜售窃取数据。此次事件中，声称为 ShinyHunters 成员的攻击者索要 200 万美元赎金，但该组织其他成员否认参与，归因存在争议。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"供应链攻击（Supply Chain Attack）\"}],\"\\n供应链攻击指攻击者不直接针对目标企业，而是通过攻击其所依赖的第三方工具或服务商来间接实现入侵。本次事件中，Context.ai 作为 Vercel 员工所使用的 AI 工具，成为攻击链条上的薄弱环节。\"]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[\"$L1a\",\"$L1b\"]}]}]]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}]\n"])</script><script>self.__next_f.push([1,"1b:[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原标题\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://www.bleepingcomputer.com/news/security/vercel-confirms-breach-as-hackers-claim-to-be-selling-stolen-data/\",\"children\":\"Vercel confirms breach as hackers claim to be selling stolen data\"}]}]]}],[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"作者\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"Lawrence Abrams\"}]]}],[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"发布日期\"}],[\"$\",\"td\",nu
