35 的实战表现与其局限性**\n\nF-35 在针对伊朗的军事行动中展示了出色的作战能力，包括穿透防空网络、压制与摧毁防空系统、实施精确打击以及为后续行动提供战场态势感知。然而，文章指出，此次作战具有高度特殊性：行动时间由美方和以色列方选定，目标为固定设施且防御已被系统性削弱，基地位于相对安全的区域。这与面对中国的持久战争场景有着本质区别。将伊朗战役作为 F-35 主导力量的验证，是一种危险的误读。 \n\n**二、太平洋战场的物理困境**\n\n在太平洋方向，F-35 的核心弱点在于其对前沿基地的高度依赖。多项兵棋推演表明，飞机损失大多发生在地面而非空中，而西太平洋各前沿基地均处于解放军导弹射程之内。分散部署虽是应对方案之一，却会拉长已经薄弱的补给线，分散维护能力并使战机远离目标区域。与此同时，F-35 依赖加油机延伸作战半径，而这些大型、低隐身加油机在中国密集防空体系面前将成为优先打击目标，一旦被摧毁，整个作战架构随之瓦解。 \n\n**三、持续作战的可持续性问题与混合力量的出路**\n\nF-35 每架超过 8000 万美元，洛克希德·马丁年产量不足 200 架，且机队全状态可用率长期徘徊在 55% 左右，这意味着在旷日持久的对华冲突中，损失无法得到及时补充，作战输出也将快速衰减。文章建议将部分采购预算转向无人系统，如协同作战飞机（CCA）和 XQ-58A 女武神，这类平台造价低、可消耗、基础设施需求小，能够从更简易的前沿阵地运作，更符合持久战的规模化需求。理想的力量结构，是以小规模 F-35 执行高价值任务，以大量无人机提供规模支撑。 \n\n## 核心概念及解读\n\n**1. 精工平台（Exquisite Platform）**\n指性能卓越但造价高昂、产能有限、难以大规模替换的武器系统。F-35 是典型代表，其精密程度是战略优势，也是战略脆弱性的来源。 \n\n**2. 任务可用率（Mission Capable Rate）**\n衡量飞机随时可执行作战任务的比例。F-35A 机队该指标长期在 55% 左右，意味着近半数飞机在任意时刻处于维护或故障状态，这直接制约了持续作战能力。 \n\n**3. 可消耗无人系统（Attritable Unmanned Systems）**\n指设计上允许在战斗中被损毁和消耗的低成本无人机系统。与 F-35 不同，此类平台损失可以承受，并能通过工业化生产快速补充，更适合高消耗冲突。 \n\n**4. 协同作战飞机（Collaborative Combat Aircraft，CCA）**\n美国空军正在开发的有人-无人协同作战概念下的无人僚机平台，旨在与 F-35 等有人战机配合作战，以较低成本扩展力量规模和覆盖范围。 \n\n**5. 综合防空系统（Integrated Air Defense System，IADS）**\n由雷达、导弹、战斗机和指挥控制系统组成的多层防空网络。中国的 IADS 被认为比伊朗更密集、更具弹性，是 F-35 太平洋作战面临的核心威胁环境。 \n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [The F-35 Is a Masterpiece Built for the Wrong War](https://warontherocks.com/cogs-of-war/the-f-35-is-a-masterpiece-built-for-the-wrong-war/) |\n| 作者 | John G. Ferrari、Dillon Prochnicki |\n| 发布日期 | 2026 年 4 月 20 日 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"f-35-masterpiece-wrong-war\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"f-35-masterpiece-wrong-war\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"f-35-masterpiece-wrong-war\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/f-35- -04-20\",\"excerpt\":\"云开发平台 Vercel 于 2026 年 4 月 19 日正式确认发生安全事件。事件起因是一名员工的 Google Workspace 账户通过第三方 AI 平台 Context.ai 被攻击者入侵，攻击者随即以此为跳板渗透至 Vercel 内部系统，访问并枚举了未加密的环境变量，最终获取到更深层的系统权限。与此同时，自称 ShinyHunters 的黑客在地下论坛声称掌握了源代码、API 密钥...\",\"source_url\":\"https://www.bleepingcomputer.com/news/security/vercel-confirms-breach-as-hackers-claim-to-be-selling-stolen-data/\",\"tags\":[\"summary\"],\"score\":\"88\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p4/vercel-security-breach-ai-tool-oauth-compromise.md\"}},\"headings\":[{\"depth\":2,\"text\":\"摘要\",\"id\":\"摘要\"},{\"depth\":2,\"text\":\"内容框架与概述\",\"id\":\"内容框架与概述\"},{\"depth\":2,\"text\":\"核心概念及解读\",\"id\":\"核心概念及解读\"},{\"depth\":2,\"text\":\"文章基本信息\",\"id\":\"文章基本信息\"}],\"sidebar\":null,\"directoryHref\":\"/whatsup?tab=tldr\",\"children\":\"$L18\"}]\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本文由美国企业研究所（AEI）的两位研究人员撰写，聚焦于 F-35 战斗机项目的战略适用性问题。文章认为，F-35 虽在近期对伊朗的作战行动中表现出色，却并非为与中国的长期高强度冲突所设计。其高昂造价、有限产能与复杂后勤体系，使其在太平洋战场上极为脆弱且难以持续。作者主张构建一支将少量 F-35 与大规模无人系统相结合的混合力量，以兼顾尖端能力与规模优势。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"一、F-35 的实战表现与其局限性\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"F-35 在针对伊朗的军事行动中展示了出色的作战能力，包括穿透防空网络、压制与摧毁防空系统、实施精确打击以及为后续行动提供战场态势感知。然而，文章指出，此次作战具有高度特殊性：行动时间由美方和以色列方选定，目标为固定设施且防御已被系统性削弱，基地位于相对安全的区域。这与面对中国的持久战争场景有着本质区别。将伊朗战役作为 F-35 主导力量的验证，是一种危险的误读。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"二、太平洋战场的物理困境\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在太平洋方向，F-35 的核心弱点在于其对前沿基地的高度依赖。多项兵棋推演表明，飞机损失大多发生在地面而非空中，而西太平洋各前沿基地均处于解放军导弹射程之内。分散部署虽是应对方案之一，却会拉长已经薄弱的补给线，分散维护能力并使战机远离目标区域。与此同时，F-35 依赖加油机延伸作战半径，而这些大型、低隐身加油机在中国密集防空体系面前将成为优先打击目标，一旦被摧毁，整个作战架构随之瓦解。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"三、持续作战的可持续性问题与混合力量的出路\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"F-35 每架超过 8000 万美元，洛克希德·马丁年产量不足 200 架，且机队全状态可用率长期徘徊在 55% 左右，这意味着在旷日持久的对华冲突中，损失无法得到及时补充，作战输出也将快速衰减。文章建议将部分采购预算转向无人系统，如协同作战飞机（CCA）和 XQ-58A 女武神，这类平台造价低、可消耗、基础设施需求小，能够从更简易的前沿阵地运作，更符合持久战的规模化需求。理想的力量结构，是以小规模 F-35 执行高价值任务，以大量无人机提供规模支撑。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"1. 精工平台（Exquisite Platform）\"}],\"\\n指性能卓越但造价高昂、产能有限、难以大规模替换的武器系统。F-35 是典型代表，其精密程度是战略优势，也是战略脆弱性的来源。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"2. 任务可用率（Mission Capable Rate）\"}],\"\\n衡量飞机随时可执行作战任务的比例。F-35A 机队该指标长期在 55% 左右，意味着近半数飞机在任意时刻处于维护或故障状态，这直接制约了持续作战能力。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"3. 可消耗无人系统（Attritable Unmanned Systems）\"}],\"\\n指设计上允许在战斗中被损毁和消耗的低成本无人机系统。与 F-35 不同，此类平台损失可以承受，并能通过工业化生产快速补充，更适合高消耗冲突。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"4. 协同作战飞机（Collaborative Combat Aircraft，CCA）\"}],\"\\n美国空军正在开发的有人-无人协同作战概念下的无人僚机平台，旨在与 F-35 等有人战机配合作战，以较低成本扩展力量规模和覆盖范围。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"5. 综合防空系统（Integrated Air Defense System，IADS）\"}],\"\\n由雷达、导弹、战斗机和指挥控制系统组成的多层防空网络。中国的 IADS 被认为比伊朗更密集、更具弹性，是 F-35 太平洋作战面临的核心威胁环境。\"]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"文章基本信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#文章基本信息\",\"children\":\"文章基本信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[\"$L19\",\"$L1a\"]}],\"$L1b\",\"$L1c\"]}]]}]}]]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原标题\"}]\n1a:[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://warontherocks.com/cogs-of-war/the-f-35-is-a-masterpiece-built-for-the-wrong-war/\",\"children\":\"The F-35 Is a Masterpiece Built for the Wrong War\"}]}]\n1b:[\"$\",\"tr
