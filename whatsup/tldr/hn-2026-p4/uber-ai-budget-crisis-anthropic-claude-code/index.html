79,"])</script><script>self.__next_f.push([1,"\n# Uber AI 预算危机：34 亿美元研发投入仍难支撑 Claude Code 激增成本\n\n## 摘要\n\nUber 在大力推进人工智能编程工具的采用后，于 2026 年初便耗尽了全年 AI 预算。公司首席技术官 Praveen Neppalli Naga 表示，以 Anthropic 的 Claude Code 为代表的 AI 编程工具使用量远超预期，迫使公司重新制定预算方案。尽管 AI 已开始实质性参与后端代码更新，但其带来的成本压力也令企业意识到，规模化部署 AI 绝非仅仅是效率问题，更是一场财务管理的严峻考验。 \n\n## 内容框架与概述\n\n### AI 工具的激进推广与预算失控\n\nUber 在内部积极鼓励工程师使用 AI 编程工具，甚至建立了基于使用频率的内部排行榜，以推动工具普及。Claude Code 和 Cursor 是主要采用的工具，其中 Claude Code 自 2025 年下半年起用量急剧攀升，而 Cursor 的增长趋势则趋于平稳。这种激进的推广策略带来了意想不到的后果：公司 2025 年研发支出已同比增长 9% 至 34 亿美元，而 2026 年刚刚开始，全年的 AI 预算便已告罄，首席技术官不得不公开承认公司正在从零开始重新规划预算方案。 \n\n### AI 对生产环境的实质渗透\n\n尽管财务压力巨大，AI 在 Uber 工程体系中的渗透已达到相当深度。目前约有 11% 的线上后端代码更新由 AI 智能体直接完成，覆盖范围涵盖打车匹配算法、动态定价逻辑以及系统缺陷修复等核心业务场景。这一比例在短短几个月内实现了显著跃升，表明 AI 已从辅助工具演变为实质性的生产力参与者。与此同时，Uber 也开始测试 OpenAI 的 Codex，进一步扩展其 AI 技术栈的广度与冗余度。 \n\n### 智能体工程师愿景与人力结构隐忧\n\nUber 首席技术官描绘了一个更为激进的未来图景：所谓智能体工程师，即不只是辅助人类编程，而是能够独立完成编码、测试和部署全流程的 AI 系统，并由其他 AI 工具担任监督角色。这一愿景若实现，将深刻改变软件工程师的工作形态乃至就业结构。目前公司招聘尚未收缩，但随着 AI 承担工作量的比例持续上升，外界开始关注一个核心问题：工程师在多大程度上仍是不可替代的存在。 \n\n## 核心概念及解读\n\n- **Claude Code**：Anthropic 推出的面向专业开发者的 AI 编程工具，支持在终端环境中执行复杂的代码生成、调试与重构任务。Uber 的案例表明，其使用成本在规模化部署后会产生显著的财务冲击。\n\n- **Cursor**：一款基于大语言模型的 AI 代码编辑器，支持上下文感知的代码补全与重写功能。在 Uber 内部，其增长势头已被 Claude Code 超越并趋于停滞。\n\n- **Codex（OpenAI）**：OpenAI 旗下的代码生成模型与智能体平台，Uber 正将其纳入测试，作为对现有 AI 编程工具栈的补充与备选方案。\n\n- **智能体工程师（Agent Engineer）**：Uber CTO 提出的前瞻性概念，指能够自主完成软件开发完整生命周期（编码、测试、部署）的 AI 系统，代表着人机协作模式向全自动化工程的演进方向。\n\n- **研发支出（R\u0026D Expense）**：企业在技术研究与产品开发上的总投入，是衡量科技公司创新力度的核心财务指标。Uber 2025 年研发支出为 34 亿美元，同比增长 9%，而 AI 工具成本已成为其中增长最快的单项支出之一。\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ------------------------------------------------------------------------------------------------- |\n| 原标题 | [Uber's Anthropic AI Push Hits A Wall—CTO Says Budget Struggles Despite $3.4B Spend](https://finance.yahoo.com/sectors/technology/articles/ubers-anthropic-ai-push-hits-223109852.html) |\n| 作者 | Surbhi Jain（发布于 Benzinga） |\n| 发布日期 | 2026 年 4 月 16 日 |\n"])</script><script>self.__n
