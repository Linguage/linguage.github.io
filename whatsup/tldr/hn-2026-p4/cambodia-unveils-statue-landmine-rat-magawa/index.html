gory\":\"tldr\",\"title\":\"柬埔寨为英雄探雷鼠Magawa揭幕纪念雕像\",\"date\":\"2026-04-05\",\"excerpt\":\"柬埔寨为获金章的探雷鼠Magawa揭幕全球首座探雷鼠雕像，纪念其发现百余枚地雷的卓越贡献，并借此呼吁国际社会继续支持排雷事业。\",\"coverImage\":\"$undefined\",\"author\":\"Claire Keenan\",\"original\":\"Cambodia unveils a statue of famous landmine-sniffing rat Magawa.md\",\"originalUrl\":\"https://www.bbc.com/news/articles/c0rx7xzd10xo\",\"score\":\"85\",\"content\":\"# 柬埔寨为英雄探雷鼠Magawa揭幕纪念雕像\\n\\n## 摘要\\n柬埔寨为著名探雷鼠Magawa揭幕了全球首座探雷鼠纪念雕像，以迎接国际地雷意识日。Magawa在五年职业生涯中发现百余枚地雷，清理超过十四万平方米土地，曾获动物界最高荣誉PDSA金质奖章。此举旨在提醒国际社会柬埔寨仍需排雷支持，该国目标于2030年实现无雷化。\\n\\n## 内容框架与概述\\n文章首段聚焦事件核心，介绍柬埔寨在暹粒为英雄探雷鼠Magawa揭幕雕像，时间选在国际地雷 awareness 日前夕，凸显其深远的象征意义与社会价值。\\n\\n随后内容回顾了Magawa的非凡生涯。这只由比利时慈善机构Apopo训练的非洲巨鼠，凭借敏锐嗅觉发现上百枚地雷，极大保障了当地居民安全，并于2020年成为首只获得PDSA金质奖章的老鼠。\\n\\n文章进一步扩展至探雷鼠项目的整体应用。自上世纪九十年代起，Apopo训练的HeroRATS凭借体重轻不引爆地雷的优势，不仅高效排雷，还被应用于结核病检测和打击野生动物走私等多元领域。\\n\\n最后，文章指出了柬埔寨严峻的排雷现状与未来愿景，并提到另一只探雷鼠Ronin已打破Magawa的记录，表明这项人道主义工作仍在持续推进。\\n\\n## 核心概念及解读\\n**HeroRATS**：Apopo机构训练的非洲巨鼠统称，利用其嗅觉灵敏且体重轻不易引爆地雷的特性，执行排雷与疾病检测等任务。\\n\\n**PDSA金质奖章**：英国兽医慈善机构颁发的奖项，被誉为动物界的乔治十字勋章，表彰展现非凡勇气与奉献精神的动物。\\n\\n**Apopo**：比利时非政府组织，自上世纪九十年代起专门训练非洲巨鼠，将其应用于地雷清除、结核病检测等全球人道主义危机的解决中。\\n\\n**地雷污染区**：指遗留有未爆炸物和地雷的危险区域，严重威胁平民生命安全，目前柬埔寨仍有超百万人生活在此类区域。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Cambodia unveils a statue of famous landmine-sniffing rat Magawa](https://www.bbc.com/news/articles/c0rx7xzd10xo) |\\n| 作者 | Claire Keenan |\\n| 发表日期 | 2026-04-05 |\\n| 评分 | 85/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"柬埔寨为英雄探雷鼠Magawa揭幕纪念雕像\",\"excerpt\":\"柬埔寨为获金章的探雷鼠Magawa揭幕全球首座探雷鼠雕像，纪念其发现百余枚地雷的卓越贡献，并借此呼吁国际社会继续支持排雷事业。\",\"date\":\"2026-04-05\",\"category\":\"tldr\",\"author\":\"Claire Keenan\",\"original\":\"Cambodia unveils a statue of famous landmine-sniffing rat Magawa.md\",\"originalUrl\":\"https://www.bbc.com/news/articles/c0rx7xzd10xo\",\"score\":\"85\",\
