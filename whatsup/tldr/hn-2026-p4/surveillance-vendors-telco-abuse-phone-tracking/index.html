 指令将手机变为定位设备。文章还指出三家特定运营商（019Mobile、Tango Networks UK、Airtel Jersey）反复成为监控入口和传输节点，并给出了涉事运营商的回应。最后研究人员指出大量证据表明这是一项资金充裕、深度融入移动信令生态的运营，且针对的是全球范围内的高知名度目标。\n\n## 核心概念及解读\n**SS7 协议**：2G/3G 网络核心信令协议，因缺乏认证和加密设计，长期被监控供应商利用来追踪手机位置。\n\n**Diameter 协议**：4G/5G 网络的新信令协议，虽包含安全设计，但因运营商未正确实施保护措施，仍可被绕过利用。\n\n**SIMjacker 攻击**：向目标 SIM 卡发送隐形 SMS 指令，在用户毫无察觉的情况下将手机变为位置追踪设备。\n\n**Ghost 公司**：监控供应商伪装成合法移动网络运营商来获取网络接入权限，从而隐蔽地实施位置追踪。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Surveillance vendors caught abusing access to telcos to track peoples phone locations, researchers say](https://techcrunch.com/2026/04/23/surveillance-vendors-caught-abusing-access-to-telcos-to-track-peoples-phone-locations-researchers-say/) |\n| 作者 | Lorenzo Franceschi-Bicchierai |\n| 发表日期 | 2026-04-23 |\n| 评分 | 85/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"surveillance-vendors-telco-abuse-phone-tracking\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"surveillance-vendors-telco-abuse-phone-tracking\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"surveillance-vendors-telco-abuse-phone-tracking\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/surveillance-vendors-telco-abuse-phone-tracking\",\"href\":\"/whatsup/tldr/hn-2026-p4/surveillance-vendors-telco-abuse-phone-tracking\",\"category\":\"tldr\",\"title\":\"监控供应商滥用电信网络追踪手机位置\",\"date\":\"2026-04-23\",\"excerpt\":\"Citizen Lab 揭露两家监控供应商利用 SS7 和 Diameter 协议漏洞，通过三家电信运营商非法追踪手机位置，研究人员称这只是全球大规模监控行动的冰山一角。\",\"coverImage\":\"$undefined\",\"author\":\"Lorenzo Franceschi-Bicchierai\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"85\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"监控供应商滥用电信网络追踪手机位置\",\"author\":\"Lorenzo Franceschi-Bicchierai\",\"date\":\"2026-04-23\",\"excerpt\":\"Citizen Lab 揭露两家监控供应商利用 SS
