ng\",\"category\":\"tldr\",\"title\":\"苹果扩大美国组件制造但拒产整机\",\"date\":\"2026-03-27\",\"excerpt\":\"苹果扩大美国制造计划，新增多家供应商在美国生产iPhone组件，但最终组装仍依赖海外以规避成本与供应链问题。\",\"coverImage\":\"$undefined\",\"author\":\"Brandon Vigliarolo\",\"original\":\"Apples making more iPhone bits in US, but not the iPhone.md\",\"originalUrl\":\"https://www.theregister.com/2026/03/26/apple_expands_list_of_bits/\",\"score\":\"75\",\"content\":\"# 苹果扩大美国组件制造但拒产整机\\n\\n## 摘要\\n苹果宣布扩展美国制造计划，新增多家供应商在美国本土生产传感器和芯片等关键组件。尽管承诺投入巨资以迎合政治诉求并规避关税，但这些组件仍将运往海外进行最终组装。苹果依然以成本和供应链复杂性为由，拒绝在美国本土进行整机组装，这导致其高管未能入选相关科技顾问委员会。\\n\\n## 内容框架与概述\\n苹果近期宣布扩展其美国制造计划，引入博世和TDK等新合作伙伴。这些企业将在美国本土设施内生产iPhone的摄像头传感器和集成电路等关键组件，相关资金来源于苹果设立的专项投资池。\\n\\n该计划的背景是苹果试图通过巨额投资承诺来应对关税压力。尽管苹果已经开始在美国生产服务器和部分电脑设备，但此举更多是一种商业妥协与地缘政治平衡策略，而非彻底的产业链回迁。\\n\\n核心的iPhone整机组装环节依然被排除在美国制造计划之外。苹果长期坚持认为，由于高昂的成本、复杂的供应链网络以及劳动力技能要求的限制，在美国本土完成最终组装是不切实际的。\\n\\n新生产的美国组件最终仍将发往中国和印度的工厂进行组装。这种部分本土化的策略似乎未能完全满足政治预期，近期苹果高管未能进入重要科技顾问委员会的名单或许也印证了这一点。\\n\\n## 核心概念及解读\\n**美国制造计划**：苹果设立的专项投资机制，旨在通过资金支持本土供应商，扩大其产品组件在美国的生产规模。\\n\\n**关税规避策略**：企业通过巨额本土投资承诺，迎合政策导向，以避免其海外生产的设备被征收高额进口关税。\\n\\n**供应链复杂性**：指电子设备制造中高度分散且相互依赖的全球网络，这是阻碍科技公司将整机组装转移回美国的核心原因。\\n\\n**本土组件生产**：指在美国国内制造如传感器和集成电路等零部件，随后再运往亚洲进行最终设备组装的业务模式。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Apples making more iPhone bits in US, but not the iPhone](https://www.theregister.com/2026/03/26/apple_expands_list_of_bits/) |\\n| 作者 | Brandon Vigliarolo |\\n| 发表日期 | 2026-03-27 |\\n| 评分 | 75/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"苹果扩大美国组件制造但拒产整机\",\"excerpt\":\"苹果扩大美国制造计划，新增多家供应商在美国生产iPhone组件，但最终组装仍依赖海外以规避成本与供应链问题。\",\"date\":\"2026-03-27\",\"category\":\"tldr\",\"author\":\"Brandon Vigliarolo\",\"original\":\"Apples making more iPhone bits in US, but not the iPhone.md\",\"originalUrl\":\"https://www.theregister.com/2026/03/26/apple_expands_list_of_bits/\",\"score\
