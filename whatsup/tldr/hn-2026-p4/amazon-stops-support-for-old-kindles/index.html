\",\"category\":\"tldr\",\"title\":\"亚马逊停止支持老旧Kindle设备引争议\",\"date\":\"2026-04-08\",\"excerpt\":\"亚马逊宣布将于2026年5月停止对2012年及更早发布的Kindle设备提供支持，用户将无法下载新书或重新注册，此举引发老用户对计划性废弃和破坏品牌信任的强烈不满。\",\"coverImage\":\"$undefined\",\"author\":\"Paul Kunert\",\"original\":\"Amazon thanks loyal Kindle devotees by bricking their kit.md\",\"originalUrl\":\"https://www.theregister.com/2026/04/08/amazon_kindle_support_discontinued/\",\"score\":\"75\",\"content\":\"# 亚马逊停止支持老旧Kindle设备引争议\\n\\n## 摘要\\n亚马逊宣布自2026年5月起停止支持2012年及更早版本的Kindle设备。受影响设备将无法下载新书，重置后甚至无法重新注册。虽然官方提供新机折扣和电子书额度作为补偿，但老用户批评此举是蓄意制造计划性废弃，严重损害了品牌信任。\\n\\n## 内容框架与概述\\n亚马逊近日宣布将于2026年5月20日起正式停止对2012年及更早发布的Kindle设备的技术支持。这些受影响的旧设备在过期后只能阅读已下载内容，不仅无法连接商店购买新书，一旦注销或重置将彻底变砖。\\n\\n为了缓解设备淘汰带来的冲击，亚马逊提出了相应的补偿方案。官方将为受影响的用户提供新设备的打折促销代码以及电子书额度，试图引导老用户过渡到拥有更佳屏幕和性能的新款阅读器，并承诺云端书库依然可用。\\n\\n这一决定在老用户群体中引发了广泛争议。用户指出强制让功能完好的设备报废是对资源的极大浪费。将停止支持包装成技术原因并用小幅折扣诱导消费，被认为是单方面破坏契约，严重损害了长期支持该品牌的忠实消费者的权益。\\n\\n## 核心概念及解读\\n**计划性废弃**：企业为增加销量而故意限制产品使用寿命的商业策略，导致旧硬件过早被淘汰。\\n\\n**停止支持**：厂商不再为旧设备提供软件更新或服务连接，导致设备失去部分或全部核心功能。\\n\\n**品牌信任**：消费者对品牌履行长期承诺的信心，单方面中断服务会严重透支这种无形资产。\\n\\n**数字所有权**：用户购买数字内容后的实际支配权，在设备变砖或平台限制时往往显得极其脆弱。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Amazon thanks loyal Kindle devotees by bricking their kit](https://www.theregister.com/2026/04/08/amazon_kindle_support_discontinued/) |\\n| 作者 | Paul Kunert |\\n| 发表日期 | 2026-04-08 |\\n| 评分 | 75/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"亚马逊停止支持老旧Kindle设备引争议\",\"excerpt\":\"亚马逊宣布将于2026年5月停止对2012年及更早发布的Kindle设备提供支持，用户将无法下载新书或重新注册，此举引发老用户对计划性废弃和破坏品牌信任的强烈不满。\",\"date\":\"2026-04-08\",\"category\":\"tldr\",\"author\":\"Paul Kunert\",\"original\":\"Amazon thanks loyal Kindle devotees by bricking their kit.md\",\"originalUrl\":\"https://www.theregister.com/2026/04/08/amazon_kindle_support_discontinued/\",\"score\":\"75\",\"tags\":[\"summar
