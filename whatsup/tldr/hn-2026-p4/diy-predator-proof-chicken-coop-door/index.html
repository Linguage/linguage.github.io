"2020-07-26\",\"excerpt\":\"本文详细介绍了如何利用低成本常见材料，自制一款具备垂直滑动、内部自动上锁且完全防捕食者破坏的鸡舍门，轻松实现鸡群的安全管理。\",\"coverImage\":\"$undefined\",\"author\":\"mapurcel\",\"original\":\"How To Make a Sliding, Self-Locking, and Predator-Proof Chicken Coop Door.md\",\"originalUrl\":\"https://www.backyardchickens.com/articles/how-to-make-a-sliding-self-locking-and-predator-proof-chicken-coop-door.75906/\",\"score\":\"72\",\"content\":\"# DIY防捕食者自动上锁鸡舍门制作指南\\n\\n## 摘要\\n文章分享了一款低成本自制垂直滑动鸡舍门的完整制作流程。该设计的核心优势在于通过巧妙的内部重力锁和离地间隙，实现门体下落时自动上锁，并彻底杜绝外部撬动，仅需外部拉绳即可轻松操控，为鸡群提供极高安全级别。\\n\\n## 内容框架与概述\\n文章开篇直击养鸡户夜间手动上锁的痛点，引出这款免钥匙、防破坏的垂直滑动门设计，并强调其内部自锁与防底部抬升两大安全特性，激发读者的动手兴趣。\\n\\n主体部分按步骤拆解了制作流程。从列出详细且低成本的建材清单开始，到定位开孔、安装轨道，再到门板裁切与核心锁定机制的组装。重点阐述了利用门栓、配重块和挡木实现下落自动锁定的物理原理，以及拉绳系统的布线技巧。\\n\\n最后通过替代方案提示完善了设计的灵活性，例如使用弹簧铰链即可免除配重需求，文末附上的用户好评也证实了该方案在实际应用中的可行性与受欢迎程度。\\n\\n## 核心概念及解读\\n**垂直滑动门**：利用轨道上下移动的门体设计，节省空间且便于通过拉绳远程控制。\\n\\n**内部自锁机制**：门体下降时利用配重拉动铰链门栓卡入挡木，从内部锁定，外部无法触碰锁具。\\n\\n**防底部抬升设计**：门底端预留离地间隙，使捕食者无法从外部将门向上抬起，增强物理防护。\\n\\n**配重系统**：利用金属垫圈和金属线提供下拉力，确保门栓在门体滑落时准确进入锁定位置。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [How To Make a Sliding, Self-Locking, and Predator-Proof Chicken Coop Door](https://www.backyardchickens.com/articles/how-to-make-a-sliding-self-locking-and-predator-proof-chicken-coop-door.75906/) |\\n| 作者 | mapurcel |\\n| 发表日期 | 2020-07-26 |\\n| 评分 | 72/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"DIY防捕食者自动上锁鸡舍门制作指南\",\"excerpt\":\"本文详细介绍了如何利用低成本常见材料，自制一款具备垂直滑动、内部自动上锁且完全防捕食者破坏的鸡舍门，轻松实现鸡群的安全管理。\",\"date\":\"2020-07-26\",\"category\":\"tldr\",\"author\":\"mapurcel\",\"original\":\"How To Make a Sliding, Self-Locking, and Predator-Proof Chicken Coop Door.md\",\"originalUrl\":\"https://www.backyardchickens.com/articles/how-to-make-a-sliding-self-locking-and-predator-proof-chicken-coop-door.75906/\",\"score\":\"72\",\"tags\":[\"summary\"],\"toc
