，美伊达成为期两周的有条件停火协议，霍尔木兹海峡临时重开，全球金融市场迎来短暂反弹。\",\"coverImage\":\"$undefined\",\"author\":\"Andrew Roth\",\"original\":\"US and Iran agree to provisional ceasefire as Tehran says it will reopen strait of Hormuz.md\",\"originalUrl\":\"https://www.theguardian.com/us-news/2026/apr/07/trump-iran-war-ceasefire\",\"score\":\"45\",\"content\":\"# 美伊达成两周临时停火协议\\n\\n## 摘要\\n在巴基斯坦的最终外交斡旋下，美国与伊朗在空袭最后期限前两小时达成为期两周的有条件停火协议。协议要求伊朗完全且安全地重开霍尔木兹海峡。尽管停火带来全球市场短暂反弹，但地区局势依然复杂，以方表示协议不涵盖黎巴嫩真主党，且停火前后的袭击仍在持续，各方对和平前景保持谨慎。\\n\\n## 内容框架与概述\\n文章开篇交代了停火协议达成的戏剧性背景。在美国总统设定的最后期限前两小时，巴基斯坦出面干预，促使美伊达成临时停火。此前美国曾派轰炸机前往伊朗，局势极度紧张，停火协议避免了可能引发严重后果的大规模破坏行动。\\n\\n随后文章阐述了协议的具体条件与各方的不同解读。美方强调伊朗必须完全重开霍尔木兹海峡，而伊朗公布的十点计划在不同语言版本中存在细微差异，为后续谈判埋下隐患。以色列表态支持停火，但明确指出这不影响其在黎巴嫩针对真主党的军事行动。\\n\\n最后文章梳理了国际社会的反应与市场影响。停火消息促使国际油价下跌、股市上涨，缓解了全球能源焦虑。然而，日澳等国政府对此保持审慎，强调海峡实质性畅通尚未实现，呼吁通过对话达成持久和平。\\n\\n## 核心概念及解读\\n**霍尔木兹海峡**：全球五分之一能源运输的咽喉要道，本次停火协议的核心焦点与地缘博弈中心。\\n\\n**十点计划**：伊朗提出的谈判基础方案，其波斯语与英语版本存在表述差异，增加了外交不确定性。\\n\\n**有条件停火**：为期两周的临时性武装冲突暂停，旨在为后续外交谈判争取时间，极易因突发状况破裂。\\n\\n**最后期限外交**：通过设定明确的打击时间点向对手施压的极限博弈策略，本次在期限临近时被第三方斡旋化解。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [US and Iran agree to provisional ceasefire as Tehran says it will reopen strait of Hormuz](https://www.theguardian.com/us-news/2026/apr/07/trump-iran-war-ceasefire) |\\n| 作者 | Andrew Roth |\\n| 发表日期 | 2026-04-08 |\\n| 评分 | 45/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"美伊达成两周临时停火协议\",\"excerpt\":\"在巴基斯坦斡旋下，美伊达成为期两周的有条件停火协议，霍尔木兹海峡临时重开，全球金融市场迎来短暂反弹。\",\"date\":\"2026-04-08\",\"category\":\"tldr\",\"author\":\"Andrew Roth\",\"original\":\"US and Iran agree to provisional ceasefire as Tehran says it will reopen strait of Hormuz.md\",\"originalUrl\":\"https://www.theguardian.com/us-news/2026/apr/07/trump-iran-war-ceasefire\",\"score\":\"45\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/
