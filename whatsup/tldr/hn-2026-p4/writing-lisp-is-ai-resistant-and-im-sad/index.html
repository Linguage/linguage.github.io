音，而开发者必须为这些无用的噪音买单。\n\n文章结尾用木板路的隐喻收尾，将Lisp比作体验极佳但被铁路淘汰的木板路。尽管Lisp能带来纯粹的编程乐趣，但在AI将代码变得廉价且与成本直接挂钩的今天，语言流行度变成了实打实的经济优势，这无疑是Worse is Better法则在AI时代的又一次重演。\n\n## 核心概念及解读\n**AI Resistant**：指某些编程语言因训练数据匮乏或开发模式特殊，导致AI难以高效生成可用代码的特性。\n\n**REPL开发**：一种通过交互式命令行逐行执行代码的低延迟开发模式，与AI高延迟的API调用机制存在天然冲突。\n\n**路径依赖**：AI在生成代码时会倾向于选择训练数据中最常见的方案，如在Lisp中强行使用QuickLisp，而非最优解。\n\n**Worse is Better**：指在技术演进中，设计较差但更实用、更易普及的技术最终战胜优雅但小众技术的现象。\n\n**Token成本**：AI按输入输出文本量计费的机制，使得在低效语言上开发产生的无用代码噪音直接转化为高昂的经济成本。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Writing Lisp is AI Resistant and Im Sad — Dans Musings](https://blog.djhaskin.com/blog/writing-lisp-is-ai-resistant-and-im-sad/) |\n| 作者 |  |\n| 发表日期 | 2026-04-05 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"writing-lisp-is-ai-resistant-and-im-sad\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"writing-lisp-is-ai-resistant-and-im-sad\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"writing-lisp-is-ai-resistant-and-im-sad\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/writing-lisp-is-ai-resistant-and-im-sad\",\"href\":\"/whatsup/tldr/hn-2026-p4/writing-lisp-is-ai-resistant-and-im-sad\",\"category\":\"tldr\",\"title\":\"AI时代下Lisp的无奈妥协\",\"date\":\"2026-04-05\",\"excerpt\":\"作者通过实践发现，由于训练数据少和REPL交互模式不匹配，AI编写Lisp代码效率极低且成本高昂，迫使他考虑转向Python或Go，揭示了AI时代语言选择背后的经济现实。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"Writing Lisp is AI Resistant and Im Sad — Dans Musings.md\",\"originalUrl\":\"https://blog.djhaskin.com/blog/writing-lisp-is-ai-resistant-and-im-sad/\",\"score\":\"78\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"AI时代下Lisp的无奈妥协\",\"excerpt\":\"作者通过实践发现，由于训练数据少和REPL交互模式不匹配，AI编写Lisp代码效率极低且成本高昂，迫使他考虑转向Python或Go，揭示了AI时代语言选择背后的经济现实。\",\"date\":\"2026-04-05\",\"category\":\
