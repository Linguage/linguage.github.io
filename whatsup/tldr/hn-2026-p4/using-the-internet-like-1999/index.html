：Publish (on your) Own Site, Syndicate Elsewhere 的缩写，内容首发自有平台再分发到社交网络，确保所有权在自己手中。\n\n**协议层回归**：直接使用 HTTP、SMTP、IRC 等底层协议而非浏览器中的商业前端，从数据源头与之交互。\n\n**SmolWeb**：倡导极简、轻量、以文本为媒介的互联网理念，Gopher 和 Gemini 协议是其代表，是对现代臃肿网页的反拨。\n\n**Link Rot**：链接失效现象，因网站关闭或内容移除导致书签无法访问，需主动归档解决。\n\n**数字公民意识**：从被动的数据库用户转变为主动参与、拥有自主选择权的网络个体，核心是重新掌控注意力。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Using the internet like its 1999 - The Universe of Joshua Blais](https://joshblais.com/blog/using-the-internet-like-its-1999/) |\n| 作者 | Joshua Blais |\n| 发表日期 | 2026-04-23 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"using-the-internet-like-1999\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"using-the-internet-like-1999\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"using-the-internet-like-1999\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/using-the-internet-like-1999\",\"href\":\"/whatsup/tldr/hn-2026-p4/using-the-internet-like-1999\",\"category\":\"tldr\",\"title\":\"像 1999 年一样上网\",\"date\":\"2026-04-23\",\"excerpt\":\"Joshua Blais 呼吁回归 RSS、IRC、Email 等底层协议，摆脱算法投喂与 LLM 垃圾内容，重新掌控个人注意力与数据主权。\",\"coverImage\":\"$undefined\",\"author\":\"Joshua Blais\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"像 1999 年一样上网\",\"author\":\"Joshua Blais\",\"date\":\"2026-04-23\",\"excerpt\":\"Joshua Blais 呼吁回归 RSS、IRC、Email 等底层协议，摆脱算法投喂与 LLM 垃圾内容，重新掌控个人注意力与数据主权。\",\"source_url\":\"https://joshblais.com/blog/using-the-internet-like-its-1999/\",\"tags\":[\"summary\"],\"score\":\"88\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false,\"original_file\":\"Using the internet like its 1999 - The Universe of Joshua Blais.md\"},\"sourcePath\":\"/home/runner/work/linguista-main-private/lin
