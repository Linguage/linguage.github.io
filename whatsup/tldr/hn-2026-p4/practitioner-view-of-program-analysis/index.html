何确保程序真正符合人们的期望。文章引入语义鸿沟这一核心概念，指出代码作为沟通媒介的局限性，并阐明静态分析在弥补这一鸿沟中的独特价值。作者认为，程序的正确性不仅是技术问题，更是多方认知一致的社会性问题。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\n\n## 内容框架与概述\n\n**第一段：软件正确性的本质困境**\n\n作者从十年前的思考出发，指出软件正确性的核心难题并非单纯的技术验证，而是一个认知对齐问题。程序正确，意味着所有参与者都认同现实中运行的程序是他们脑海中那个概念性程序的充分表达，且该程序仅执行它应当执行的操作。作者将这个存在于人们脑海中的抽象概念称为大写的 Program，与实际运行的代码加以区分，揭示了软件开发中普遍存在的认知与现实之间的落差。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\n\n**第二段：语义鸿沟与代码沟通的局限**\n\n文章引入语义鸿沟概念，用以描述将想法形式化为代码过程中不可避免的信息损失。代码审查中常见的 lgtm 现象，正是这种鸿沟的体现——有人能读懂代码背后的意图，有人却完全无法建立代码与脑海中程序概念的联系。作者指出，代码不能成为传达程序意图的唯一手段，但同时也认为可执行代码具有成为真实来源的充分理由。如何在这两者之间找到平衡，是程序分析需要回答的核心问题。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\n\n**第三段：静态分析的价值与必要性**\n\n作者重点介绍了静态分析这一程序分析分支。与直接运行代码不同，静态分析允许在不消耗实际运行资源的前提下，对系统的行为能力提出有意义的问题，例如：程序是否会访问特定数据？是否存在绕过登录的路径？作者以盲人摸象作比，强调即使是程序的作者也只能看到系统的局部，正确的软件需要多方的审视与理解，而静态分析正是实现这一目标的重要工具。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\n\n## 核心概念及解读\n\n**语义鸿沟 Semantic Gap**\n指将抽象想法转化为具体代码时产生的信息与意义的损失。代码是精确的，但人类的意图是模糊且多维的，两者之间存在天然的表达落差，导致读者对同一段代码的理解可能大相径庭。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\n\n**程序正确性 Program Correctness**\n不仅指程序在技术层面按规范执行，更指所有相关方（开发者、产品经理、用户等）对程序行为达成共识。作者认为这是一个多方认知对齐的问题，而非单纯的逻辑验证问题。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\n\n**静态分析 Static Analysis**\n一种无需实际运行代码便可分析程序行为的技术手段。通过对代码结构和逻辑的检查，可以回答程序在各种条件下的行为问题，有助于在部署前发现潜在风险。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\n\n**形式化方法 Formal Methods**\n一类基于数学逻辑的软件验证技术，旨在严格证明程序满足特定规范。作者早期研究中曾探索此方向，认为其有助于建立程序正确性的理论基础，但在实践中存在一定局限。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\n\n**类型系统 Type System**\n编程语言中用于约束变量和函数行为的规则体系，是一种静态验证手段。通过类型检查，编译器或解析器可以在运行前捕获一类错误，是缩小语义鸿沟的实用工具之一。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\n\n## 文章基本信息\n\n| 字段 | 内容 |\n| ---- | ---- |\n| 原标题 | [My practitioner view of program analysis](https://sawyer.dev/posts/practitioner-program-analysis/) |\n| 作者 | Rory Sawyer |\n| 发布日期 | 不详 |\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"practitioner-view-of-program-analysis\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"practitioner-view-of-program-analysis\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"practitioner-view-of-program-analysis\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/practitioner-view-of-program-analysis\",\"href\":\"/whatsup/tldr/hn-2026-p4/practitioner-view-of-program-analysis\",\"category\":\"tldr\",\"title\":\"从实践者视角看程序分析：如何确保软件真正正确\",\"date\":\"2026-04-22\",\"excerpt\":\"本文作者 Rory Sawyer 以一名软件从业者的视角，探讨了如何确保程序真正符合人们的期望。文章引入语义鸿沟这一核心概念，指出代码作为沟通媒介的局限性，并阐明静态分析在弥补这一鸿沟中的独特价值。作者认为，程序的正确性不仅是技术问题，更是多方认知一致的社会性问题。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\",\"coverImage\":\"$undefined\",\"author\":\"Rory Sawyer\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"从实践者视角看程序分析：如何确保软件真正正确\",\"author\":\"Rory Sawyer\",\"date\":\"2026-04-22\",\"excerpt\":\"本文作者 Rory Sawyer 以一名软件从业者的视角，探讨了如何确保程序真正符合人们的期望。文章引入语义鸿沟这一核心概念，指出代码作为沟通媒介的局限性，并阐明静态分析在弥补这一鸿沟中的独特价值。作者认为，程序的正确性不仅是技术问题，更是多方认知一致的社会性问题。 [sawyer](https://sawyer.dev/posts/practitioner-program-analysis/)\",\"source_url\":\"https://sawyer.dev/posts/practitioner-program-analysis/\",\"tags\":[\"summary\"],\"score\":\"88\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p4/practitioner-view-of-program-analysis.md\"},\"neighbors\":{\"previous\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"chatgpt-for-clinicians-launch\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"chatgpt-for-clinicians-launch\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\
