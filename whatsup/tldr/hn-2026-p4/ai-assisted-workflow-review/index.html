代价——设置缓慢、需要抵制直接编码的诱惑，并强调它不能替代工程判断力。AI在每个步骤都会提出在具体情境下可能不合理的建议，人类必须在拥有完整上下文时进行审查。这也是全文最核心的原则：AI加速生产，审查永远属于你。工作流设计的每一处细节——文件格式而非特定工具依赖、AFK与HITL的分类、引入系统化排序审查——都是为了让人类审查尽可能有效。\n\n## 核心概念及解读\n**垂直切片**：每个Issue必须贯穿所有集成层，而非只触及单一层，确保每次交付的都是可端到端验证的完整功能路径。\n\n**AFK与HITL**：任务分类标记，AFK表示AI可独立完成并合并；HITL表示需人类在实施过程中做出关键决策，是工作流中故意设置的检查点。\n\n**操作顺序审查**：专门检查AI代码中常见的操作时序错误——通知先于事务提交、审计日志记录在动作之后、验证前就变更状态——这类错误肉眼扫过看似正确。\n\n**跨切面审计**：功能完成后的全局审查，关注模块间不一致、被错误复制的模式、以及单独看安全但组合起来有漏洞的假设，需人类明确批准后才可改动。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [My AI-Assisted workflow](https://www.maiobarbero.dev/articles/ai-assisted-workflow/) |\n| 作者 | Matteo Barbero |\n| 发表日期 | 2026-04-14 |\n| 评分 | 85/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"ai-assisted-workflow-review\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"ai-assisted-workflow-review\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"ai-assisted-workflow-review\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/ai-assisted-workflow-review\",\"href\":\"/whatsup/tldr/hn-2026-p4/ai-assisted-workflow-review\",\"category\":\"tldr\",\"title\":\"AI辅助工作流的系统性思辨\",\"date\":\"2026-04-14\",\"excerpt\":\"介绍一种结构化AI辅助开发工作流，强调在编码前通过深思熟虑的规划、PRD编写、垂直切片拆解和多轮审查来保持软件的可维护性，而非让AI跳过思考直接生成代码。\",\"coverImage\":\"$undefined\",\"author\":\"Matteo Barbero\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"85\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"AI辅助工作流的系统性思辨\",\"author\":\"Matteo Barbero\",\"date\":\"2026-04-14\",\"excerpt\":\"介绍一种结构化AI辅助开发工作流，强调在编码前通过深思熟虑的规划、PRD编写、垂直切片拆解和多轮审查来保持软件的可维护性，而非让AI跳过思考直接生成代码。\",\"source_url\":\"https://www.maiobarbero.dev/articles/ai-assisted-workflow/\",\"tags\":[\"summary\"],\"score\":\"85\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false,\"original_file\":\"My A
