re\",\"category\":\"tldr\",\"title\":\"预测市场伊朗停火合约大额获利引发内幕交易争议\",\"date\":\"2026-04-09\",\"excerpt\":\"多个新创建的Polymarket账户在美伊停火宣布前精准押注并获利数十万美元。这种可疑交易模式引发了对预测市场存在内幕交易的广泛担忧与监管呼吁。\",\"coverImage\":\"$undefined\",\"author\":\"Guardian staff reporter\",\"original\":\"Newly created Polymarket accounts win big on well-timed Iran ceasefire bets.md\",\"originalUrl\":\"https://www.theguardian.com/business/2026/apr/08/polymarket-trump-us-iran-ceasefire\",\"score\":\"82\",\"content\":\"# 预测市场伊朗停火合约大额获利引发内幕交易争议\\n\\n## 摘要\\n多个新创建的Polymarket账户在美伊停火宣布前精准押注并获利数十万美元。区块链数据显示至少五十个新钱包参与其中。这种可疑模式与过往类似事件如出一辙，再次引发公众与国会对预测平台涉嫌内幕交易的强烈质疑，促使立法者呼吁扩大监管范围。\\n\\n## 内容框架与概述\\n近日美伊停火协议宣布前夕，尽管地缘政治局势紧张且特朗普态度强硬，预测市场Polymarket上却涌现大量精准下注。区块链数据显示，至少五十个新创建的数字钱包在官方公告前大量买入看涨合约，部分账户甚至在公告前十几分钟内创建，获利高达数十万美元。\\n\\n由于平台采用代理智能合约钱包，公开数据无法核实这些账户背后的真实身份，难以判断究竟是运气极佳的新用户，还是掌握内部消息的内部人士在利用多个小号规避审查。目前由于地区冲突并未完全平息，该预测合约已被平台标记为争议状态。\\n\\n这种异常获利模式并非首次出现，此前在其他地缘政治事件中亦有类似情况。频繁发生的精准押注事件引起了公众对预测市场缺乏监管的担忧，促使跨党派议员提出立法，意图将预测市场纳入内幕交易的监管范畴，行业头部平台也承认需要更明确的规则。\\n\\n## 核心概念及解读\\n**预测市场**：允许用户对未来事件结果进行金融押注的交易平台，常被用作反映事件发生概率的指标。\\n\\n**智能合约钱包**：基于区块链技术的数字账户，平台使用的代理机制导致单个用户可轻易创建多个匿名账户。\\n\\n**内幕交易**：利用未公开的重大信息进行交易以获取暴利，立法者正试图将预测市场中的此类行为纳入现行金融监管框架。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Newly created Polymarket accounts win big on well-timed Iran ceasefire bets](https://www.theguardian.com/business/2026/apr/08/polymarket-trump-us-iran-ceasefire) |\\n| 作者 | Guardian staff reporter |\\n| 发表日期 | 2026-04-09 |\\n| 评分 | 82/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"预测市场伊朗停火合约大额获利引发内幕交易争议\",\"excerpt\":\"多个新创建的Polymarket账户在美伊停火宣布前精准押注并获利数十万美元。这种可疑交易模式引发了对预测市场存在内幕交易的广泛担忧与监管呼吁。\",\"date\":\"2026-04-09\",\"category\":\"tldr\",\"author\":\"Guardian staff reporter\",\"original\":\"Newly created Polymarket accounts win big on well-timed Iran ceasefire bets.md\",\"originalUrl\":
