高达-49%到+25%，凸显高时空分辨率建模的必要性。\n\n## 核心概念及解读\n**超本地测量**：利用城市既有基础设施（路口摄像头等）实现对极小地理单元（单个街区）的实时环境监测，取代传统稀疏采样法。\n\n**计算机视觉分类**：通过图像识别将车辆归入12个大类，无需读取车牌即可完成统计，兼顾精度与隐私保护。\n\n**拥堵收费效应量化**：以纽约市2025年1月起实施的政策为自然实验，模型精确测出10%车流量降幅对应16%-22%排放降幅的非线性关系。\n\n**多源数据融合框架**：将交通影像、手机定位、排放因子三大异构数据源整合为统一估算模型，使方法可迁移至其他城市。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [MIT researchers measure traffic emissions, to the block, in real-time](https://news.mit.edu/2026/mit-researchers-measure-traffic-emissions-block-real-time-0402) |\n| 作者 | Peter Dizikes ｜ MIT News |\n| 发表日期 | 2026-04-02 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"mit-real-time-traffic-emissions-block-level\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"mit-real-time-traffic-emissions-block-level\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"mit-real-time-traffic-emissions-block-level\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/mit-real-time-traffic-emissions-block-level\",\"href\":\"/whatsup/tldr/hn-2026-p4/mit-real-time-traffic-emissions-block-level\",\"category\":\"tldr\",\"title\":\"MIT研发街区级实时交通排放监测模型\",\"date\":\"2026-04-02\",\"excerpt\":\"MIT团队利用现有交通摄像头和手机数据，构建近实时、街块级精度的机动车排放监测模型，为交通减排政策提供量化评估工具。\",\"coverImage\":\"$undefined\",\"author\":\"Peter Dizikes ｜ MIT News\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"MIT研发街区级实时交通排放监测模型\",\"author\":\"Peter Dizikes ｜ MIT News\",\"date\":\"2026-04-02\",\"excerpt\":\"MIT团队利用现有交通摄像头和手机数据，构建近实时、街块级精度的机动车排放监测模型，为交通减排政策提供量化评估工具。\",\"source_url\":\"https://news.mit.edu/2026/mit-researchers-measure-traffic-emissions-block-real-time-0402\",\"tags\":[\"summary\"],\"score\":\"88\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false,\"original_file
