想法」这个编程本质。\n\n## 核心概念及解读\n**单遍编译**：解析和代码生成同时进行，不构建中间表示，适合简单语言但缺乏灵活性。\n\n**Nanopass 架构**：将编译器拆解为大量极简变换，每个 pass 只完成一个微小的工作。\n\n**抽象语法树 AST**：程序的树状内部表示，是构建灵活编译器的核心数据结构。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Want to Write a Compiler? Just Read These Two Papers.](https://prog21.dadgum.com/30.html) |\n| 作者 | prog21 |\n| 发表日期 | 2026-04-16 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"write-a-compiler-two-papers\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"write-a-compiler-two-papers\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4\",\"write-a-compiler-two-papers\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p4/write-a-compiler-two-papers\",\"href\":\"/whatsup/tldr/hn-2026-p4/write-a-compiler-two-papers\",\"category\":\"tldr\",\"title\":\"写编译器？读完这两篇就够了\",\"date\":\"2026-04-16\",\"excerpt\":\"编译器不必从龙书开始，两篇经典教程就能带你入门，打破编译器很难写的神话。\",\"coverImage\":\"$undefined\",\"author\":\"prog21\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"88\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"写编译器？读完这两篇就够了\",\"author\":\"prog21\",\"date\":\"2026-04-16\",\"excerpt\":\"编译器不必从龙书开始，两篇经典教程就能带你入门，打破编译器很难写的神话。\",\"source_url\":\"https://prog21.dadgum.com/30.html\",\"tags\":[\"summary\"],\"score\":\"88\",\"category\":\"tldr\",\"toc\":true,\"show_title\":false,\"original_file\":\"Want to Write a Compiler? Just Read These Two Papers..md\"},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p4/write-a-compiler-two-papers.md\"},\"neighbors\":{\"previous\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"future-of-ai-and-resistance\",\"slugSegments\":[\"tldr\",\"hn-2026-p4\",\"future-of-ai-and-resistance\"],\"pathSegments\":[\"tldr\",\"hn-2026-p4
