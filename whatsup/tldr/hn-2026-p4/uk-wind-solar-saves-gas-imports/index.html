英镑的昂贵液化天然气。\",\"coverImage\":\"$undefined\",\"author\":\"Carbon Brief Staff\",\"original\":\"Analysis Record wind and solar saved UK from gas imports worth £1bn in March 2026.md\",\"originalUrl\":\"https://www.carbonbrief.org/analysis-record-wind-and-solar-saved-uk-from-gas-imports-worth-1bn-in-march-2026/\",\"score\":\"85\",\"content\":\"# 创纪录风光发电为英国节省十亿英镑天然气\\n\\n## 摘要\\n2026年3月英国风电与太阳能发电量创下新高。这一清洁能源产出不仅将天然气发电量压至历史最低，还直接避免了因国际局势导致的高价天然气进口，节省约十亿英镑，有效削弱了化石燃料价格波动对电力的冲击。\\n\\n## 内容框架与概述\\n2026年3月，英国迎来历史性的可再生能源发电高峰。风力发电量同比大幅增长，太阳能发电表现强劲，两者合计贡献十一太瓦时电力，刷新了同期的历史记录。\\n\\n在国际天然气价格因地缘政治冲突居高不下的背景下，极高的清洁能源产出直接填补了国内能源需求。这使英国免于进口大量昂贵的液化天然气，折合节省开支达十亿英镑。\\n\\n能源结构的转变深刻影响了电力市场的运行机制。国内天然气发电量因此降至历史低点，化石燃料作为边际定价基准的频率显著降低，大幅缓解了高昂气价对整体电价的拉动作用。\\n\\n## 核心概念及解读\\n**清洁能源替代效应**：风能与光伏等可再生能源规模扩大，直接减少国家对传统化石燃料的依赖与外部采购需求。\\n\\n**液化天然气溢价**：通过海运进口的天然气形式。在国际局势动荡导致能源紧张时，极易产生高昂成本并威胁经济安全。\\n\\n**电力边际定价机制**：电力价格通常由满足需求的最后一种能源决定。风光发电增加可降低天然气决定电价的频率，从而平抑用电成本。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Analysis: Record wind and solar saved UK from gas imports worth £1bn in March 2026](https://www.carbonbrief.org/analysis-record-wind-and-solar-saved-uk-from-gas-imports-worth-1bn-in-march-2026/) |\\n| 作者 | Carbon Brief Staff |\\n| 发表日期 | 2026-04-02 |\\n| 评分 | 85/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"创纪录风光发电为英国节省十亿英镑天然气\",\"excerpt\":\"2026年3月英国创纪录的风电与光伏发电量不仅大幅降低了国内天然气发电占比，更使其免于进口价值十亿英镑的昂贵液化天然气。\",\"date\":\"2026-04-02\",\"category\":\"tldr\",\"author\":\"Carbon Brief Staff\",\"original\":\"Analysis Record wind and solar saved UK from gas imports worth £1bn in March 2026.md\",\"originalUrl\":\"https://www.carbonbrief.org/analysis-record-wind-and-solar-saved-uk-from-gas-imports-worth-1bn-in-march-2026/\",\"score\":\"85\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-p
