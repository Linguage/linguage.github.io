\"$undefined\"},{\"slug\":\"abundance-building-an-ai-capital-allocator\",\"href\":\"/whatsup/tldr/hn-2026-p4/abundance-building-an-ai-capital-allocator\",\"category\":\"tldr\",\"title\":\"人工智能资本配置器：从人类判断到系统化优化\",\"date\":\"2026-04-25\",\"excerpt\":\"Instacart 创始人 Apoorva Mehta 创立新公司 Abundance，旨在构建 AI 驱动的资本配置系统。该公司已从硅谷顶级投资者处获得 1 亿美元种子轮融资，过去九个月以自有资金运行系统，取得显著超额收益。Abundance 计划从公开市场起步，逐步扩展至其他资产类别，不对外销售技术而是自主使用。\",\"coverImage\":\"$undefined\"},{\"slug\":\"build-with-deepseek-v4-using-nvidia-blackwell-and-gpu-accelerated-endpoints\",\"href\":\"/whatsup/tldr/hn-2026-p4/build-with-deepseek-v4-using-nvidia-blackwell-and-gpu-accelerated-endpoints\",\"category\":\"tldr\",\"title\":\"基于 NVIDIA Blackwell 与 GPU 加速端点构建 DeepSeek V4 应用\",\"date\":\"2026-04-25\",\"excerpt\":\"NVIDIA 技术博客介绍了 DeepSeek 第四代旗舰模型 DeepSeek-V4-Pro 与 DeepSeek-V4-Flash 的部署方案。两款模型均支持百万 token 长上下文窗口，分别面向高级推理与高速效率场景。文章重点阐述了混合注意力架构创新、NVIDIA Blackwell 平台的即开即用性能表现，以及通过 SGLang、vLLM 等框架的部署实践，并展示了在 NeMoClaw、...\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-coding-firm-cognition-in-funding-talks-at-25-billion-value\",\"href\":\"/whatsup/tldr/hn-2026-p4/ai-coding-firm-cognition-in-funding-talks-at-25-billion-value\",\"category\":\"tldr\",\"title\":\"AI编程公司Cognition洽谈融资，估值达250亿美元\",\"date\":\"2026-04-24\",\"excerpt\":\"AI编程初创公司Cognition AI正进行新一轮融资谈判，估值将翻倍至250亿美元。该公司计划筹集数亿美元，此轮融资意向在竞争对手Cursor被SpaceX以600亿美元收购后显著升温。Cognition成立于2023年，旗舰产品Devin定位为全球首位AI软件工程师，客户包括Anduril Industries和微软等企业。\",\"coverImage\":\"$undefined\"},{\"slug\":\"deepseek-unveils-new-ai-model-tailored-for-huawei-chips-as-china-pushes-for-tech-autonomy\",\"href\":\"/whatsup/tldr/hn-2026-p4/deepseek-unveils-new-ai-model-tailored-for-huawei-chips-as-china-pushes-for-tech-autonomy\",\"category\":\"tldr\",\"title\":\"DeepSeek 推出 V4 新模型，深度适配华为芯片，彰显中国 AI 自主化决心\",\"date\":\"2026-04-24\",\"excerpt\":\"中国 AI 初创公司 DeepSeek 于 2026 年 4 月 24 日发布了备受期待的新模型 V4 预览版，该模型针对华为昇腾芯片进行了深度优化。这一举措标志着 DeepSeek 从过去依赖英伟达芯片转向以国产硬件为核心，被业界视为中国 AI 产业走向技术自主的重要里程碑。V4 在开源模型的世界知识基准测试中表现领先，整体性能仅次于谷歌的闭源模型 Gemini-Pro-3.1，并以极低的算力成...\",\"coverImage\":\"$undefined\"},{\"slug\":\"palantir-employees-ethical-crisis\",\"href\":\"/whatsup/tldr/hn-2026-p4/palantir-employees-ethical-crisis\",\"category\":\"tldr\",\"title\":\"Palantir员工开始反思自己是否成了反派\",\"date\":\"2026-04-24\",\"excerpt\":\"通过内部Slack消息和员工访谈，揭示Palantir员工对公司深度参与特朗普移民执法及伊朗军事行动的道德焦虑，以及管理层压制内部讨论的手段。\",\"coverImage\":\"$undefined\"},{\"slug\":\"coding-models-are-doing-too-much\",\"href\":\"/whatsup/tldr/hn-2026-p4/coding-models-are-doing-too-much\",\"category\":\"tldr\",\"title\":\"代码模型过度编辑问题：当AI修复变成重写\",\"date\":\"2026-04-24\",\"excerpt\":\"本文研究了AI代码助手在修复简单bug时过度重写代码的现象。作者通过程序化构造最小化bug数据集，系统评估了GPT-5.4、Claude Opus 4.6等前沿模型的编辑忠实度，发现多数模型存在显著的过度编辑倾向。研究表明，显式提示和强化学习训练可有效改善这一问题，其中RL方法在保持通用编码能力的同时实现了最小编辑行为的最佳泛化。\",\"coverImage\":\"$undefined\"},{\"slug\":\"a-practical-guide-to-paying-down-tech-debt-with-agents\",\"href\":\"/whatsup/tldr/hn-2026-p4/a-practical-guide-to-paying-down-tech-debt-with-agents\",\"category\":\"tldr\",\"title\":\"利用智能体偿还技术债务的实用指南\",\"date\":\"2026-04-24\",\"excerpt\":\"本文探讨了工程团队如何借助云端智能体在不占用工程师工时的情况下处理技术债务，列举了依赖更新、特性标志清理、测试覆盖提升等九种实践模式。\",\"coverImage\":\"$undefined\"},{\"slug\":\"palantir-employees-are-starting-to-wonder-if-they-re-the-bad-guys-1\",\"href\":\"/whatsup/tldr/hn-2026-p4/palantir-employees-are-starting-to-wonder-if-they-re-the-bad-guys-1\",\"category\":\"tldr\",\"title\":\"帕兰提尔内部动荡：员工质疑公司与特朗普政府的深度绑定\",\"date\":\"2026-04-24\",\"excerpt\":\"帕兰提尔公司内部正经历一场严重的价值观危机。随着公司深度参与特朗普政府的移民执法与对外军事行动，不少员工开始公开质疑其技术与权力结合带来的伦理后果。从内部通讯平台的争论到管理层的哲学式回应，往日以捍卫公民自由自居的企业文化，如今在现实面前显得支离破碎。\",\"coverImage\":\"$undefined\"},{\"slug\":\"experience-is-now-a-tax\",\"href\":\"/whatsup/tldr/hn-2026-p4/experience-is-now-a-tax\",\"category\":\"tldr\",\"title\":\"经验正成为一种税负\",\"date\":\"2026-04-24\",\"excerpt\":\"本文探讨了人工智能如何重构职场中的决策模式与权力结构。作者指出，资深管理者赖以立足的\\\"判断力\\\"与\\\"品味\\\"正被AI削弱，而年轻人借助AI工具获得的快速迭代能力形成鲜明对比。经验积累曾是不可逾越的护城河，如今却因组织惯性、声誉顾虑和沉没成本而转化为决策负担。\",\"coverImage\":\"$undefined\"},{\"slug\":\"nypd-officer-speeding-tickets-staten-island\",\"href\":\"/whatsup/tldr/hn-2026-p4/nypd-officer-speeding-tickets-staten-island\",\"category\":\"tldr\",\"title\":\"547张超速罚单的警察为何仍在执法\",\"date\":\"2026-04-23\",\"excerpt\":\"纽约市警局一名警察自2022年以来累计收到547张超速罚单，却因与职务无关而免于任何处分，引发对执法双重标准的严重质疑。\",\"coverImage\":\"$undefined\"},{\"slug\":\"future-of-ai-startups-independence\",\"href\":\"/whatsup/tldr/hn-2026-p4/future-of-ai-startups-independence\",\"category\":\"tldr\",\"title\":\"AI初创企业的独立发展之路\",\"date\":\"2026-04-23\",\"excerpt\":\"Cognition总裁Russell Kaplan针对SpaceXAI收购Cursor引发的业界担忧，提出独立AI初创企业并非必然被前沿实验室吞并。他以Cognition收购Windsurf后的爆发式增长为例，论证竞争减少反而使剩余企业更强，并总结出差异化、专注与速度三大生存法则。\",\"coverImage\":\"$undefined\"},{\"slug\":\"an-update-on-recent-claude-code-quality-reports\",\"href\":\"/whatsup/tldr/hn-2026-p4/an-update-on-recent-claude-code-quality-reports\",\"category\":\"tldr\",\"title\":\"Anthropic 就 Claude Code 质量下滑问题发布事后分析报告\",\"date\":\"2026-04-23\",\"excerpt\":\"Anthropic 近期回应了用户关于 Claude Code 回答质量下降的反馈，经调查确认问题源于三项独立变更，涉及推理强度默认设置、缓存优化缺陷及系统提示词调整。公司详细说明了每项问题的技术根因与修复时间线，并宣布重置所有订阅用户的使用额度，同时承诺改进内部测试流程以防止类似事件重演。\",\"coverImage\":\"$undefined\"},{\"slug\":\"xbow-gpt-5-5-offensive-security-review\",\"href\":\"/whatsup/tldr/hn-2026-p4/xbow-gpt-5-5-offensive-security-review\",\"category\":\"tldr\",\"title\":\"GPT-5.5 渗透测试：黑盒超越白盒\",\"date\":\"2026-04-23\",\"excerpt\":\"XBOW 对 OpenAI GPT-5.5 的实战评测显示，漏洞检测 miss rate 降至 10%，黑盒测试已超越 GPT-5 白盒表现，白盒性能更直接击穿既有基准。\",\"coverImage\":\"$undefined\"},{\"slug\":\"llm-pricing-sustainability-crisis\",\"href\":\"/whatsup/tldr/hn-2026-p4/llm-pricing-sustainability-crisis\",\"category\":\"tldr\",\"title\":\"LLM定价从未合理过\",\"date\":\"2026-04-23\",\"excerpt\":\"Anthropic 和 GitHub 相继调整代码生成产品定价，OpenAI 巨额亏损且 Sam Altman 承认 AI 泡沫，文章揭示 LLM 定价模式的根本性不可持续，而本地开源模型的崛起正形成结构性挑战。\",\"coverImage\":\"$undefined\"},{\"slug\":\"do-you-really-want-the-us-to-win-ai\",\"href\":\"/whatsup/tldr/hn-2026-p4/do-you-really-want-the-us-to-win-ai\",\"category\":\"tldr\",\"title\":\"你真的希望美国在AI竞争中获胜吗？\",\"date\":\"2026-04-23\",\"excerpt\":\"本文是著名黑客geohot对美国AI发展现状的尖锐批判。作者反思了自己作为技术理想主义者与当下科技寡头统治之间的矛盾，对比了马斯克与奥特曼的AI理念，批评了有效利他主义者的恐惧营销，并呼吁AI应以实体 possession 而非API特权的形式普惠大众。\",\"coverImage\":\"$undefined\"},{\"slug\":\"using-the-internet-like-1999\",\"href\":\"/whatsup/tldr/hn-2026-p4/using-the-internet-like-1999\",\"category\":\"tldr\",\"title\":\"像 1999 年一样上网\",\"date\":\"2026-04-23\",\"excerpt\":\"Joshua Blais 呼吁回归 RSS、IRC、Email 等底层协议，摆脱算法投喂与 LLM 垃圾内容，重新掌控个人注意力与数据主权。\",\"coverImage\":\"$undefined\"},{\"slug\":\"if-americas-so-rich-howd-it-get-so-sad\",\"href\":\"/whatsup/tldr/hn-2026-p4/if-americas-so-rich-howd-it-get-so-sad\",\"category\":\"tldr\",\"title\":\"富国何以陷入悲伤：美国幸福感的悖论\",\"date\":\"2026-04-23\",\"excerpt\":\"尽管美国经济指标强劲，多项调查显示自2020年以来美国人幸福感出现历史性暴跌，经济学家试图从通胀积累效应和永久性疫情心态解释这一悖论。\",\"coverImage\":\"$undefined\"},{\"slug\":\"my-phone-replaced-a-brass-plug\",\"href\":\"/whatsup/tldr/hn-2026-p4/my-phone-replaced-a-brass-plug\",\"category\":\"tldr\",\"title\":\"当iPhone取代黄铜计分塞：一位厨子猎人的计算机视觉之旅\",\"date\":\"2026-04-23\",\"excerpt\":\"一位iOS工程师为了追求料理伦理而学习狩猎，因厌倦手动计分，用OpenCV、YOLOv8和CoreML构建了自动射击靶心评分系统，最终将iPhone变成了一个智能射击教练。\",\"coverImage\":\"$undefined\"},{\"slug\":\"making-css-states-predictable\",\"href\":\"/whatsup/tldr/hn-2026-p4/making-css-states-predictable\",\"category\":\"tldr\",\"title\":\"用编译思想解决 CSS 状态预测性难题\",\"date\":\"2026-04-23\",\"excerpt\":\"CSS 组件状态因选择器优先级和源码顺序产生意外重叠，作者用多年时间打造 Tasty 编译方案，让开发者以声明式状态映射替代手写选择器，从根本上消除歧义。\",\"coverImage\":\"$undefined\"}],\"heatmapDateCounts\":{\"2026-04-25\":3,\"2026-04-24\":7,\"2026-04-23\":13,\"2026-04-22\":18,\"2026-04-21\":12,\"2026-04-20\":8,\"2026-04-19\":2,\"2026-04-18\":2,\"2026-04-17\":6,\"2026-04-16\":8,\"2026-04-15\":12,\"2026-04-14\":12,\"2026-04-13\":3,\"2026-04-12\":7,\"2026-04-11\":3,\"2026-04-10\":16,\"2026-04-09\":22,\"2026-04-08\":22,\"2026-04-07\":25,\"2026-04-06\":15,\"2026-04-05\":10,\"2026-04-04\":11,\"2026-04-03\":16,\"2026-04-02\":22,\"2026-04-01\":4,\"2026-03-31\":8,\"2026-03-30\":9,\"2026-03-29\":1,\"2026-03-28\":5,\"2026-
