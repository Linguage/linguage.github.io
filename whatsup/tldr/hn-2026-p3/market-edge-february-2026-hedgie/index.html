%。核心通胀环比上涨0.3%，同比2.5%。住房通胀开始缓和，前期租金和房价上涨放缓正逐步反映在官方数据中。然而，关税和美元贬值对核心商品价格构成上行压力，通胀回归2%的道路将充满波折。\n\n市场层面，分析师预期标普所有行业今年都将实现盈利增长。但波动性显著上升，科技七巨头年初至今下跌近7%。投资者开始对AI颠覆风险进行定价，金融、保险、房地产和物流板块均受到影响。资金从美国科技股轮动至国际发达市场、新兴市场和小盘股，呈现典型的避险行为。\n\n作者维持此前判断，尽管表面数据改善，但市场存在深层隐忧。基金经理人情绪乐观但行动保守，现金持仓增加、增持黄金、减持美国科技股。创纪录比例的人认为企业资本开支过度，四分之一受访者将AI泡沫视为最大尾部风险。消费者信心仍处于十二年低位，宏观数据与实际感受之间的差距尚未弥合。\n\n## 核心概念及解读\n**零售销售控制组**（Retail Sales Control Group）：剔除汽车、建筑材料和加油站等波动性较大项目后的零售销售指标，更能反映消费者实际消费趋势。\n\n**核心通胀**（Core Inflation）：剔除食品和能源价格后的通胀指标，用于衡量通胀的潜在趋势，因食品和能源价格波动较大。\n\n**避险轮动**（Risk-off Rotation）：市场不确定性增加时，投资者将资金从高风险资产转向低风险资产的行为，如从科技股转向债券和防御性板块。\n\n**资本开支繁荣**（Capex Boom）：企业在固定资产上的投资激增。当前繁荣主要由AI相关投资驱动，但市场需求规模尚未达到支撑这些投资的水平。\n\n**重新定价**（Repricing）：市场根据新信息或预期变化调整资产价格的过程。当前AI板块面临重新定价，投资者开始考虑AI技术对各行业盈利能力的实际影响。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Hedgies Market Edge — February 16, 2026](https://www.hedgie.markets/p/hedgie-s-market-edge-february-16-2026?utm_source=hedgie.markets\u0026utm_medium=newsletter\u0026utm_campaign=hedgie-s-market-edge-february-16-2026\u0026_bhlid=8ab7eebf72a77d6a25df495f7e3aadedf5c47c95) |\n| 作者 | Hedgies Market Edge |\n| 发表日期 | 2026-02-18 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"market-edge-february-2026-hedgie\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"market-edge-february-2026-hedgie\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"market-edge-february-2026-hedgie\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/market-edge-february-2026-hedgie\",\"href\":\"/whatsup/tldr/hn-2026-p3/market-edge-february-2026-hedgie\",\"category\":\"tldr\",\"title\":\"市场数据改善但隐忧犹存\",\"date\":\"2026-02-18\",\"excerpt\":\"美国消费支出放缓，就业市场略有改善但仍疲软，通胀缓慢下行。市场出现轮动，AI板块调整，资金流向国际市场和小盘股。作者维持谨慎观点，指出投资者言行分歧，资本开支繁荣建立在未兑现的AI需求之上。\",\"coverImage\":\"$undefined\",\"author\":\"Hedgies Market Edge\",\"original\":\"Hedgies Market Edge — February 16, 2026.md\",\"originalUrl\":\"https://www.hedg
