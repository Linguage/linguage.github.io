n\n第二部分探讨AI行业的杰文斯效应。付费token单价从年初每百万90美分降至50美分，同期处理量从约6000翻倍至12000，呈现价格越低消费越多的经典关系。值得注意的是，Nvidia旧款H100和A100的租赁价格也在上涨，表明市场对算力的需求远未被满足。作者引用电力革命历经约百年才释放生产力的历史，提醒人们对AI平台转型保持耐心。\n\n第三部分用三组对比呈现AI资本开支的庞大规模：2026年AI资本开支接近2025年全美新增银行贷款总额，比美国企业所得税总收入高约33%，是非美G7国家军费预算的约6倍。第四部分介绍美联储研究人员发现Kalshi预测市场在联邦基金利率预测中表现优于专业预测者和期货市场，其持续更新的全分布预测在FOMC会议前一天达到完美预测记录。\n\n## 核心概念及解读\n**DExit**：指企业迁出特拉华州注册的趋势，类似于英国脱欧的造词方式，实际数据比流行叙事更复杂。\n\n**杰文斯效应（Jevons Paradox）**：资源利用效率提高反而导致该资源总消费量增加，本文中表现为AI token降价后用量翻倍。\n\n**牛仔鸡尾酒（Cowboy Cocktail）**：怀俄明州以其资产保护和隐私法律优势打造的特殊LLC结构，2015年后推动该州LLC注册激增。\n\n**Kalshi预测市场**：获监管批准的预测市场平台，在宏观经济指标预测中表现出优于传统调查和期货市场的准确性。\n\n**延迟成年（Delayed Onset of Adulthood）**：30岁人群在独立居住、婚姻、生育、购房等里程碑上的达成率自1980年代持续下降，唯独大学学历比例上升。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Charts of the Week: DExit . . . real or feigned?](https://www.a16z.news/p/charts-of-the-week-dexit-real-or?utm_source=post-email-title\u0026publication_id=13145\u0026post_id=189285066\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | a16z New Media |\n| 发表日期 | 2026-02-27 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"dexit-ai-capex-prediction-markets-adulthood\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"dexit-ai-capex-prediction-markets-adulthood\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"dexit-ai-capex-prediction-markets-adulthood\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/dexit-ai-capex-prediction-markets-adulthood\",\"href\":\"/whatsup/tldr/hn-2026-p3/dexit-ai-capex-prediction-markets-adulthood\",\"category\":\"tldr\",\"title\":\"特拉华企业外迁真相与AI杰文斯效应\",\"date\":\"2026-02-27\",\"excerpt\":\"a16z本周图表综述，探讨特拉华州企业外迁真相、AI成本下降与用量激增的杰文斯效应、天量AI资本开支、Kalshi预测市场优于专业预测者、以及30岁成年人生活里程碑延迟等五大议题。\",\"coverImage\":\"$undefined\",\"author\":\"a16z New Media\",\"original\":\"Charts of the Week DExit . . . real or feigned?.md\",\"originalUrl\":\"
