MB片上SRAM和1.2 PFLOPs FP8算力，基于三星SF4工艺，不占用TSMC产能配额。\n\n文章核心论述注意力与FFN解耦（AFD）机制。在MoE模型中，注意力需动态KV Cache而FFN无状态，因此将注意力映射到HBM容量充足的GPU，FFN映射到低延迟LPU，通过ping-pong流水线隐藏通信延迟。LPX机架含32个计算托盘共256个LPU，经FPGA实现C2C到以太网的协议转换。\n\n后半部分转向网络与系统架构。Nvidia的CPO策略为能用铜缆就不用光互联，Rubin Ultra NVL576首次在机架间引入CPO，Feynman NVL1152将扩展CPO规模。Kyber机架从72 GPU密度提升至144 GPU，配合NVLink 7交换芯片实现全互联。文章还介绍了Vera ETL256（单机架256颗CPU）及CMX/STX存储平台，体现Nvidia向存储和基础设施层的延伸。\n\n## 核心概念及解读\n\n**Attention FFN Disaggregation (AFD)**：将LLM推理中的注意力运算与FFN运算分别映射到GPU和LPU，利用两者不同的计算与内存特性优化延迟和吞吐。\n\n**Groq LPU（Language Processing Unit）**：采用SRAM密集型确定性架构的专用推理芯片，擅长低延迟token生成但不适合大规模吞吐服务。\n\n**CPO（Co-Packaged Optics）**：将光学引擎与交换芯片封装在一起的技术，Nvidia计划从Rubin Ultra开始在机架间规模互联中逐步引入。\n\n**Kyber Rack**：Nvidia新一代高密度机架架构，单机架容纳144颗GPU，通过铜缆中板和飞越线缆实现全互联网络。\n\n**CMX/STX**：Nvidia的KV Cache存储平台及参考机架架构，通过BlueField DPU和NVMe分层存储解决长上下文推理中的内存瓶颈。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [GTC 2026 – The Inference Kingdom Expands](https://newsletter.semianalysis.com/p/nvidia-the-inference-kingdom-expands?utm_source=post-email-title\u0026publication_id=6349492\u0026post_id=191561008\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=53wl0h\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Dylan Patel |\n| 发表日期 | 2026-03-24 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"nvidia-gtc-2026-inference-kingdom-expands\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"nvidia-gtc-2026-inference-kingdom-expands\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"nvidia-gtc-2026-inference-kingdom-expands\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/nvidia-gtc-2026-inference-kingdom-expands\",\"href\":\"/whatsup/tldr/hn-2026-p3/nvidia-gtc-2026-inference-kingdom-expands\",\"category\":\"tldr\",\"title\":\"GTC 2026深度解析：Nvidia推理帝国全面扩张\",\"date\":\"2026-03-24\",\"excerpt\":\"SemiAnalysis深度解析GTC 2026，涵盖Groq收购后的LP30芯片、注意力与FFN解耦架构、CPO路线图、Kyber机架及存储平台等
