。\n\n**经济支持替代军事援助**：中国通过购买伊朗石油等方式提供经济支持，但避免直接武器销售，保持表面上的中立姿态。\n\n**霍尔木兹海峡议题**：中国在该问题上态度微妙，既担忧全球经济影响，又不愿公开施压伊朗，反映其在中美伊三角关系中的尴尬处境。\n\n**调解者角色定位**：中国通过建立国际调解组织、促成沙伊复交等行动，积极塑造自身为和平调解者的国际形象。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [What China’s Approach to Iran Tells Us About Its Foreign Policy](https://blog.ucs.org/robert-rust/what-chinas-approach-to-iran-tells-us-about-its-foreign-policy/) |\n| 作者 | Robert Rust\t\t\t\tChina Analyst |\n| 发表日期 | 2025-07-08 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"china-iran-foreign-policy-strategy\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"china-iran-foreign-policy-strategy\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"china-iran-foreign-policy-strategy\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/china-iran-foreign-policy-strategy\",\"href\":\"/whatsup/tldr/hn-2026-p3/china-iran-foreign-policy-strategy\",\"category\":\"tldr\",\"title\":\"中国对伊朗政策透视其外交战略\",\"date\":\"2025-07-08\",\"excerpt\":\"本文通过分析中国在伊朗与以色列冲突中的应对方式，揭示其在中美竞争和地区冲突中保持平衡、寻求调解角色的外交战略。\",\"coverImage\":\"$undefined\",\"author\":\"Robert Rust\\t\\t\\t\\tChina Analyst\",\"original\":\"What China’s Approach to Iran Tells Us About Its Foreign Policy.md\",\"originalUrl\":\"https://blog.ucs.org/robert-rust/what-chinas-approach-to-iran-tells-us-about-its-foreign-policy/\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"中国对伊朗政策透视其外交战略\",\"excerpt\":\"本文通过分析中国在伊朗与以色列冲突中的应对方式，揭示其在中美竞争和地区冲突中保持平衡、寻求调解角色的外交战略。\",\"date\":\"2025-07-08\",\"category\":\"tldr\",\"author\":\"Robert Rust\\t\\t\\t\\tChina Analyst\",\"original\":\"What China’s Approach to Iran Tells Us About Its Foreign Policy.md\",\"originalUrl\":\"https://blog.ucs.org/robert-rust/what-chinas-approach-to-iran-tells-us-about-its-foreign-policy/\
