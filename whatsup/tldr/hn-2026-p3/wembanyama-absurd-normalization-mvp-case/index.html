论证是文班亚马的MVP竞争力。数据显示，当他在场时马刺队的净评级高达+15.5，而他坐在板凳上时这一数据滑落至-0.3。防守端，对手面对他时投篮命中率仅为42%，他离场后则升至48%。这种攻防两端的影响力使他与Shai Gilgeous-Alexander、Nikola Jokić等MVP热门不相上下。\n\n最后文章回溯了文班亚马本赛季的辉煌时刻：赛季首场砍下40分15篮板，成为近35年第二人；12月场均21.9分10.1篮板；新年以来以+316的累计正负值领跑全联盟。马刺队已锁定季后赛席位，结束了长达六年的荒旱期，而这一切都离不开这位22岁天才的持续进化。\n\n## 核心概念及解读\n**净评级**：衡量球队在特定球员在场与不在场时每百回合得分差的指标，文班亚马在场时马刺队净胜15.5分，离场时则为负值。\n\n**年度最佳防守球员**：文班亚马是该奖项的热门候选人，对手在他防守下篮下命中率显著降低，场均盖帽领跑全联盟。\n\n**MVP门槛**：联盟规定球员必须出战65场才有资格竞逐年度奖项，这一规则可能影响文班亚马的MVP竞选，因为他已缺席15场比赛。\n\n**正负值**：衡量球员在场时球队净胜分数的统计，文班亚马自1月1日以来累计+316领跑全联盟。\n\n**双向影响力**：指球员在攻防两端都能改变比赛走势的能力，文班亚马是当代NBA最典型的双向球员代表之一。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How Victor Wembanyama normalizes the absurd：‘He’s 7-5 with like an 8-foot wingspan’](https://www.nytimes.com/athletic/7100314/2026/03/09/victor-wembanyama-stats-spurs-rockets-mvp-candidate/?unlocked_article_code=1.SFA.CVi2.sXjor2HYFpWt\u0026source=athletic_user_shared_gift_article_copylink\u0026smid=url-share-ta) |\n| 作者 | James Jackson |\n| 发表日期 | 2026-03-09 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"wembanyama-absurd-normalization-mvp-case\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"wembanyama-absurd-normalization-mvp-case\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"wembanyama-absurd-normalization-mvp-case\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/wembanyama-absurd-normalization-mvp-case\",\"href\":\"/whatsup/tldr/hn-2026-p3/wembanyama-absurd-normalization-mvp-case\",\"category\":\"tldr\",\"title\":\"文班亚马如何将荒诞变为常态\",\"date\":\"2026-03-09\",\"excerpt\":\"22岁的文班亚马正以他独特的篮球天赋改变NBA格局。这位7英尺4英寸的法国中锋集盖帽、控球、传球、外线投射于一身，带领马刺队在过去16场比赛中赢下15场，成为MVP有力竞争者。\",\"coverImage\":\"$undefined\",\"author\":\"James Jackson\",\"original\":\"How Victor Wembanyama normalizes the absurd ‘He’s 7-5 with like an 8-foot wingspan’.md\",\"originalUrl\":\"https://www.nytimes.com/athletic/7100314/2026/03/09/victor-wembanyama-stats-spurs-
