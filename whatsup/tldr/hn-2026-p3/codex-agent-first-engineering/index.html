束并非噱头，而是倒逼团队思考如何以数量级的方式提升工程产出速度。人类工程师的角色因此发生了根本性转变：从执行者变为系统设计者，核心工作是拆解目标、搭建脚手架、审查PR并修复代理能力盲区。\n\n在应用可读性方面，团队让Codex能够直接感知应用状态。他们将应用配置为可按git工作树启动独立实例，并接入Chrome DevTools协议，使代理能直接操作截图、DOM快照和页面导航。同时为每个任务构建了隔离的可观测性环境，允许Codex通过LogQL和PromQL查询日志与指标，从而自主复现bug、验证修复效果，有时单次运行可连续工作6小时以上。\n\n在知识管理上，团队放弃了单一庞大AGENTS.md文件的方式，转而构建结构化的docs/目录作为系统记录的唯一来源。AGENTS.md仅作目录索引，具体设计文档、架构说明、执行计划、技术债务等分门别类存储，并通过CI检查和专职文档维护代理保持知识库的新鲜与准确。这种渐进式披露策略显著降低了上下文噪声，让代理每次任务都能以最小但最精准的信息集启动工作。\n\n## 核心概念及解读\n\n**代理优先工程**（Agent-First Engineering）：以AI代理为主要执行者、人类仅负责方向与审查的软件开发模式，彻底改变了工程师的日常工作内容与团队分工方式。\n\n**应用可读性**（Application Legibility）：将应用的UI状态、日志、指标等信息结构化地暴露给代理，使其能自主感知和推理系统行为，而无需人工介入信息传递。\n\n**仓库即系统记录**（Repository as System of Record）：将所有设计文档、架构说明、执行计划等知识以版本化方式存入代码仓库，确保代理在运行时能完整获取所需上下文，消除对外部平台的依赖。\n\n**渐进式披露**（Progressive Disclosure）：代理从简短的入口索引出发，按需深入读取具体文档，避免一次性加载海量指令导致注意力稀释和关键约束被忽略。\n\n**代理间审查循环**（Agent-to-Agent Review Loop）：由代理自动在本地和云端触发代码审查、响应反馈并迭代修改，直至所有审查者满意后再提交，将人工审查的需求降至最低。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Harness engineering：leveraging Codex in an agent-first world](https://openai.com/index/harness-engineering/) |\n| 作者 | Ryan Lopopolo |\n| 发表日期 | 2026-02-13 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"codex-agent-first-engineering\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"codex-agent-first-engineering\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"codex-agent-first-engineering\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/codex-agent-first-engineering\",\"href\":\"/whatsup/tldr/hn-2026-p3/codex-agent-first-engineering\",\"category\":\"tldr\",\"title\":\"零人工编码：OpenAI用Codex构建百万行代码产品的工程实践\",\"date\":\"2026-02-13\",\"excerpt\":\"OpenAI工程团队历时5个月，以零人工编码方式用Codex构建了一个拥有百万行代码的内部软件产品，效率约为传统方式的10倍。工程师角色从写代码转向设计环境与指定意图，文章系统分享了代理优先工程中的知识管理、仓库可读性设计与人机协作等核心实践经验。\",\"coverImage\":\"$undefined\",\"author\":\"Ryan Lopopolo\",\"original\":\"Harness engineering leveraging Codex in
