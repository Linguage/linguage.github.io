:\"$undefined\",\"author\":\"宝玉 (@dotey)\",\"original\":\"构建 Claude Code 的经验：我们如何使用 Skills【译】.md\",\"originalUrl\":\"https://x.com/dotey/article/2034002188994060691\",\"score\":\"88\",\"content\":\"# 构建Claude Code Skills的经验总结\\n\\n## 摘要\\n本文来自Anthropic内部团队的Skills实战总结，介绍了他们在Claude Code中使用的几百个Skills的经验。文章将Skills分为9大类（库参考、产品验证、数据获取、业务流程、脚手架、代码审查、CI/CD、运维手册、基础设施运维），并分享了编写优秀Skill的技巧，包括避免显而易见的事、建立踩坑点章节、利用文件系统渐进式披露、合理设置description字段等。\\n\\n## 内容框架与概述\\n文章首先介绍Skills的定义和灵活性，强调它们不只是markdown文件而是可包含脚本和资源的文件夹。随后将Anthropic内部使用的几百个Skills归纳为九大类型，每类都有具体示例。接着分享编写Skills的最佳实践，包括如何提供有效信息、利用文件结构、实现记忆功能等。最后讨论Skills的分享方式（仓库或插件市场）以及效果衡量方法。\\n\\n## 核心概念及解读\\n**技能扩展点**（Extension Points）：Claude Code中可供扩展功能的接口，Skills是其中使用最广泛的形式。\\n**踩坑点章节**（Gotchas Section）：记录Claude使用Skill时常见失败点的章节，是Skill中信息量最大的部分。\\n**渐进式披露**（Progressive Disclosure）：不一次性提供所有信息，而是让Claude在需要时读取相关文件，节省上下文窗口。\\n**按需钩子**（On-Demand Hooks）：只在Skill被调用时才激活的钩子，适合主观性强但不需常驻的功能。\\n**子智能体**（Subagent）：Claude Code执行任务时启动的独立实例，可用于代码审查等场景。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [构建 Claude Code 的经验：我们如何使用 Skills【译】](https://x.com/dotey/article/2034002188994060691) |\\n| 作者 | 宝玉 (@dotey) |\\n| 发表日期 | 2026-03-18 |\\n| 评分 | 88/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"构建Claude Code Skills的经验总结\",\"excerpt\":\"Anthropic工程师分享构建Claude Code Skills的实战经验，涵盖9种Skill分类和编写最佳实践\",\"date\":\"2026-03-18\",\"category\":\"tldr\",\"author\":\"宝玉 (@dotey)\",\"original\":\"构建 Claude Code 的经验：我们如何使用 Skills【译】.md\",\"originalUrl\":\"https://x.com/dotey/article/2034002188994060691\",\"score\":\"88\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/claude-code-skills-lessons.md\"},\"neighbors\":{\"previous\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"ai-could-save-customer-serv
