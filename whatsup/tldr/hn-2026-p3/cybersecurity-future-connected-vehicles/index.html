用户对车载数据的访问与迁移权，要求制造商向第三方开放数据以培育竞争性服务生态。然而数据开放与安全加密、商业秘密保护之间构成根本性矛盾，研究团队正通过两项博士课题分别从法规协调与技术手段两个路径寻求解决方案。\n\n最后，文章将视角提升至数字主权层面。欧洲企业超过七成的数据存储于美系或中系云平台，而美国Cloud Act和FISA等域外法律使数据面临被外国政府获取的风险。尽管《数据法案》要求数据可迁移以降低供应商锁定，但完全规避域外司法风险在现实中几乎不可能，只能采取风险最小化策略。\n\n## 核心概念及解读\n**欧盟《数据法案》**：2025年9月生效的法规，要求联网设备产生的数据须向用户开放并可迁移至用户选择的第三方服务提供商，旨在打破数据垄断、促进欧洲数字经济的竞争与创新。\n\n**数字主权**：指一个国家或地区对自身数据资产的控制能力，核心关切在于降低对美国和中国云服务的战略依赖，防止域外法律（如美国FISA）导致数据被未经授权地获取。\n\n**联网汽车数据双重性**：车载数据同时包含车辆技术信息（如引擎温度）和用户个人信息（如驾驶习惯、地理位置），这种双重属性使其同时涉及工业安全与隐私保护两个维度的监管要求。\n\n**域外法律管辖风险**：指美国Cloud Act、FISA等法律允许其政府访问本国企业在海外存储的数据，即使数据物理存放于欧洲境内，这使得所谓完全的数据本地化保护难以真正实现。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [What the future holds for cybersecurity in connected vehicles](https://www.polytechnique-insights.com/en/columns/digital/the-challenge-of-cybersecurity-for-connected-vehicles/?utm_source=brevo\u0026utm_campaign=newsletter196en\u0026utm_medium=email\u0026utm_id=135) |\n| 作者 | Thomas Le Goff |\n| 发表日期 | 2026-02-24 |\n| 评分 | 83/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"cybersecurity-future-connected-vehicles\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"cybersecurity-future-connected-vehicles\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"cybersecurity-future-connected-vehicles\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/cybersecurity-future-connected-vehicles\",\"href\":\"/whatsup/tldr/hn-2026-p3/cybersecurity-future-connected-vehicles\",\"category\":\"tldr\",\"title\":\"联网汽车网络安全的未来挑战与数据治理\",\"date\":\"2026-02-24\",\"excerpt\":\"欧盟新数据法规推动车联网数据开放，在数据主权、隐私保护与产业竞争力之间形成复杂博弈，重塑智能汽车网络安全格局。\",\"coverImage\":\"$undefined\",\"author\":\"Thomas Le Goff\",\"original\":\"What the future holds for cybersecurity in connected vehicles.md\",\"originalUrl\":\"https://www.polytechnique-insights.com/en/columns/digital/the-challenge-of-cybersecurity-for-connected-vehicles/?utm_source=brevo\u0026utm_campaign=new
