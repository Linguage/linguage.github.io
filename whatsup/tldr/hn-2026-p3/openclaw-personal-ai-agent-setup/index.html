应用场景。\",\"coverImage\":\"$undefined\",\"author\":\"Katie Parrott\",\"original\":\"OpenClaw Setting Up Your First Personal AI Agent.md\",\"originalUrl\":\"https://every.to/source-code/openclaw-setting-up-your-first-personal-ai-agent\",\"score\":\"$undefined\",\"content\":\"# OpenClaw：个人AI代理设置指南\\n\\n## 摘要\\nOpenClaw是一个开源个人AI代理工具，可在电脑上运行并通过Telegram、iMessage等渠道交互。文章介绍其五个核心设计原则：多通道入口、自安装工具、心跳机制、预定任务和持久记忆。通过Nat Eliason的Felix和Brandon Gell的Zosia两个案例，展示代理如何完成编码任务、知识管理甚至运营加密货币账户，同时提供安全建议，强调从简单场景开始逐步增加复杂度。\\n\\n## 内容框架与概述\\n文章首先介绍OpenClaw的基本概念和五个核心设计原则，这些原则使AI代理具有自主性和持续运行能力。然后通过Nat Eliason的Felix案例展示技术用户如何利用代理进行远程编码、知识管理和加密货币交易，体现代理作为数字员工的可能性。接着通过Brandon Gell的Zosia案例，展示非技术用户如何构建家庭助手，处理保姆工时、杂货订购等日常事务，强调个人用例的价值。最后总结安全考量，建议从简单场景开始，逐步增加代理的访问权限。\\n\\n## 核心概念及解读\\n**OpenClaw**：开源个人AI代理工具，运行于本地计算机，支持多渠道交互。\\n\\n**多通道入口**：允许代理通过Telegram、iMessage等多渠道接收指令，实现跨设备对话同步。\\n\\n**心跳机制**：代理每30分钟主动检查是否有待处理任务，无需用户持续互动。\\n\\n**持久记忆**：代理每日记录操作日记，维护身份文件和待办清单，积累长期上下文。\\n\\n**提示注入**：外部文本试图劫持代理行为的攻击方式，Opus 4.5等更强模型可有效防御。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [OpenClaw：Setting Up Your First Personal AI Agent](https://every.to/source-code/openclaw-setting-up-your-first-personal-ai-agent) |\\n| 作者 | Katie Parrott |\\n| 发表日期 | 2026-03-02 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"OpenClaw：个人AI代理设置指南\",\"excerpt\":\"教程介绍开源工具OpenClaw设置个人AI代理的方法，通过四个真实用户案例展示从远程编码到家庭助手的应用场景。\",\"date\":\"2026-03-02\",\"category\":\"tldr\",\"author\":\"Katie Parrott\",\"original\":\"OpenClaw Setting Up Your First Personal AI Agent.md\",\"originalUrl\":\"https://every.to/source-code/openclaw-setting-up-your-first-personal-ai-agent\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/openclaw-personal-ai-agent-setup.md\"},\"neighbors\":{\"previous\":{\"ki \"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"OpenClaw是一个开源个人AI代理工具，可在电脑上运行并通过Telegram、iMessage等渠道交互。文章介绍其五个核心设计原则：多通道入口、自安装工具、心跳机制、预定任务和持久记忆。通过Nat Eliason的Felix和Brandon Gell的Zosia两个案例，展示代理如何完成编码任务、知识管理甚至运营加密货币账户，同时提供安全建议，强调从简单场景开始逐步增加复杂度。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章首先介绍OpenClaw的基本概念和五个核心设计原则，这些原则使AI代理具有自主性和持续运行能力。然后通过Nat Eliason的Felix案例展示技术用户如何利用代理进行远程编码、知识管理和加密货币交易，体现代理作为数字员工的可能性。接着通过Brandon Gell的Zosia案例，展示非技术用户如何构建家庭助手，处理保姆工时、杂货订购等日常事务，强调个人用例的价值。最后总结安全考量，建议从简单场景开始，逐步增加代理的访问权限。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"OpenClaw\"}],\"：开源个人AI代理工具，运行于本地计算机，支持多渠道交互。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"多通道入口\"}],\"：允许代理通过Telegram、iMessage等多渠道接收指令，实现跨设备对话同步。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"心跳机制\"}],\"：代理每30分钟主动检查是否有待处理任务，无需用户持续互动。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"持久记忆\"}],\"：代理每日记录操作日记，维护身份文件和待办清单，积累长期上下文。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"提示注入\"}],\"：外部文本试图劫持代理行为的攻击方式，Opus 4.5等更强模型可有效防御。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null
