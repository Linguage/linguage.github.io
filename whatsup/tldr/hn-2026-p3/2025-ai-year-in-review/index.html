调整，千问APP试图整合生态。腾讯则通过年轻科学家团队推动组织变革。中国AI创业公司迎来上市热潮，但融资环境趋严，资源向头部集中。\n\n具身智能和AI硬件成为新热点，深圳凭借供应链优势成为消费级硬件创新高地。人形机器人在多场景探索落地，AI眼镜、陪伴硬件等形态不断涌现。然而，行业也面临数据获取瓶颈、技术挑战和商业化难题。文章最后回归人文视角，AI带来天价薪酬的同时也引发大规模裁员，人类在效率提升与意义空虚之间寻找平衡，职业多样性和兴趣驱动的未来成为新的思考方向。\n\n## 核心概念及解读\n**Agentic Model**（Agent模型）：具备推理、编程、多模态理解、工具使用和记忆能力的融合型AI模型，是实现更高主动性Agent应用的基础。\n\n**垂直整合**（Vertical Integration）：大模型公司通过自建infrastructure团队、打通算法与硬件协同优化，加快迭代速度、减少内耗，形成竞争优势。\n\n**Agent元年**（Agent Year 1）：2025年因编程和多模态能力突破，使得AI应用能够实现更高主动性，标志Agent应用进入爆发式增长阶段。\n\n**具身智能**（Embodied AI）：将AI与物理实体结合的智能形态，包括人形机器人、AI眼镜等硬件，面临数据获取、模型技术和本体工程三重挑战。\n\n**密度法则**：清华大学与面壁智能提出的提升大模型能效的理论，强调通过架构创新、数据治理和软硬件协同优化实现小而强的模型。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [150：年末 AI 回顾：从模型到应用、从技术到商战，拽住洪流中的意义之线 ｜ BestBlogs.dev](https://www.bestblogs.dev/podcast/eec4183) |\n| 作者 | 晚点聊 LateTalk |\n| 发表日期 | 2026-02-09 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"2025-ai-year-in-review\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"2025-ai-year-in-review\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"2025-ai-year-in-review\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/2025-ai-year-in-review\",\"href\":\"/whatsup/tldr/hn-2026-p3/2025-ai-year-in-review\",\"category\":\"tldr\",\"title\":\"2025年AI年终回顾：从模型革命到商战格局\",\"date\":\"2026-02-09\",\"excerpt\":\"2025年AI领域年终回顾，涵盖推理模型革命、Agent应用元年、科技巨头商战、具身智能热潮、人才薪酬变迁等七大主题，为技术从业者绘制清晰的AI演进地图。\",\"coverImage\":\"$undefined\",\"author\":\"晚点聊 LateTalk\",\"original\":\"150 年末 AI 回顾：从模型到应用、从技术到商战，拽住洪流中的意义之线  BestBlogs.dev.md\",\"originalUrl\":\"https://www.bestblogs.dev/podcast/eec4183\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"2025年AI年终回顾：从模型革命到商战格局\",\"excerpt\":\"2025年AI领域年终回顾，涵盖推理模型革命、Agent应用元年、科技巨头商战、具身智能热潮、人才薪酬变迁等七大主题，为技术从业者绘制清晰的AI演进地图。\",\"date\":\
