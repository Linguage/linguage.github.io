上知名调酒师的视频中92%含有酒精内容，73%展示品牌，近20%将酒精与糖果关联，严重影响未成年人。WHO已于2023年推出AI工具来识别和打击在线有害产品推广。\n\n## 核心概念及解读\n**商业健康决定因素**：指销售高风险产品的企业活动对公众健康和环境产生的直接或间接影响，是理解现代公共卫生挑战的关键框架。\n\n**Évin法**：法国1991年颁布的法律，严格限制烟草和酒精广告，是法国公共卫生监管的基石，但长期面临酒精行业的游说侵蚀。\n\n**代理游说**：烟酒行业不直接出面，而是通过烟草零售商、葡萄酒农组织等代理人进行游说，以规避公众对行业本身的负面印象。\n\n**伪科学研究**：行业资助的看似科学的研究，旨在扭曲科学事实、最小化产品危害或夸大监管负面效果，如KPMG关于黑市规模的报告。\n\n**企业社会责任洗白**：烟草和酒精行业通过CSR活动和伪预防宣传改善公众形象，制造其关注健康和环境后果的假象。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The power of the tobacco and alcohol industries over our health](https://www.polytechnique-insights.com/en/columns/society/the-power-of-the-tobacco-and-alcohol-industries-over-our-health/?utm_source=brevo\u0026utm_campaign=newsletter197en\u0026utm_medium=email\u0026utm_id=138) |\n| 作者 | Karine Gallopel-Morvan |\n| 发表日期 | 2026-03-04 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"tobacco-alcohol-industry-lobbying-health\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"tobacco-alcohol-industry-lobbying-health\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"tobacco-alcohol-industry-lobbying-health\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/tobacco-alcohol-industry-lobbying-health\",\"href\":\"/whatsup/tldr/hn-2026-p3/tobacco-alcohol-industry-lobbying-health\",\"category\":\"tldr\",\"title\":\"烟酒行业如何操控公共卫生政策\",\"date\":\"2026-03-04\",\"excerpt\":\"法国学者揭示烟草和酒精行业通过游说、社交媒体营销及虚假研究等手段削弱公共卫生政策，呼吁加强监管与AI技术干预。\",\"coverImage\":\"$undefined\",\"author\":\"Karine Gallopel-Morvan\",\"original\":\"The power of the tobacco and alcohol industries over our health.md\",\"originalUrl\":\"https://www.polytechnique-insights.com/en/columns/society/the-power-of-the-tobacco-and-alcohol-industries-over-our-health/?utm_source=brevo\u0026utm_campaign=newsletter197en\u0026utm_medium=email\u0026utm_id=138\",\"score\":\"78\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":fal
