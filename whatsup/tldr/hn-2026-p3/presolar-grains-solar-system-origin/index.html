以极高速度喷射物质，形成致密外壳，富含铝-26而几乎不含铁-60，完美匹配观测数据。刘楠正在利用纳米探针从陨石中寻找源自沃尔夫-拉叶星的颗粒，试图为这场持续数十年的学术争论提供关键证据。\n\n## 核心概念及解读\n**前太阳颗粒（Presolar grains）**：陨石中保存的比太阳更古老的微观晶体，直径小于细菌细胞，携带太阳系形成前的化学信息，是地球上可获取的最古老物质。\n\n**铝-26/铁-60同位素矛盾**：早期太阳系富含铝-26但缺乏铁-60，这一组合与超新星爆发预期不符，成为挑战经典理论的核心证据。\n\n**沃尔夫-拉叶星（Wolf-Rayet star）**：比太阳大数十倍、亮数千倍的大质量恒星，其高速恒星风可形成致密外壳并富集铝-26，被认为是太阳系起源的替代触发源。\n\n**同位素示踪法**：通过测量陨石中放射性同位素的衰变产物（如铝-26衰变为镁-26，铁-60衰变为镍-60），反推早期太阳系的化学环境与形成条件。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [What Crystals Older Than the Sun Reveal About the Start of the Solar System](https://www.quantamagazine.org/what-crystals-older-than-the-sun-reveal-about-the-start-of-the-solar-system-20260302/?mc_cid=2f6471fac1\u0026mc_eid=9ed96560c1) |\n| 作者 | James Dinneen |\n| 发表日期 | 2026-03-02 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"presolar-grains-solar-system-origin\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"presolar-grains-solar-system-origin\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"presolar-grains-solar-system-origin\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/presolar-grains-solar-system-origin\",\"href\":\"/whatsup/tldr/hn-2026-p3/presolar-grains-solar-system-origin\",\"category\":\"tldr\",\"title\":\"比太阳更古老的晶体揭示太阳系起源之谜\",\"date\":\"2026-03-02\",\"excerpt\":\"通过分析陨石中比太阳更古老的微晶体，科学家正在重新审视太阳系起源理论——可能并非超新星触发，而是沃尔夫-拉叶星的恒星风塑造了我们的家园。\",\"coverImage\":\"$undefined\",\"author\":\"James Dinneen\",\"original\":\"What Crystals Older Than the Sun Reveal About the Start of the Solar System.md\",\"originalUrl\":\"https://www.quantamagazine.org/what-crystals-older-than-the-sun-reveal-about-the-start-of-the-solar-system-20260302/?mc_cid=2f6471fac1\u0026mc_eid=9ed96560c1\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"比太阳更古老的
