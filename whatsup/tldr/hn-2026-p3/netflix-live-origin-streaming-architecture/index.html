en Connect做了大量适配，包括基于模板的请求范围过滤、404缓存策略、边缘请求挂起等。为支持2秒段粒度的实时性，他们还引入了毫秒级nginx缓存能力，并通过HTTP头部实现流式元数据广播，高效传递广告插入、内容警告等事件通知。\n\n最后文章讲述了存储架构的演进。Netflix最初使用S3，但因直播写入的极端时效要求而转向自建存储系统，提出了单区域高可用写入、毫秒级延迟复制等五大核心需求。\n\n## 核心概念及解读\n\n**Live Origin**：Netflix自研的直播源站服务器，连接编码管道与CDN，负责视频段的存储、质量筛选和分发控制。\n\n**双管道冗余**：在两个不同云区域运行独立编码管道，当一个管道产生缺陷段时，另一个通常正常，大幅降低故障影响。\n\n**段模板清单**：采用固定2秒段时长的可预测模板替代动态清单，使系统能精确预判段发布时间。\n\n**边缘请求挂起**：当段尚未就绪时Origin保持请求连接开放，段发布后立即响应，避免客户端反复重试。\n\n**毫秒级缓存控制**：标准HTTP缓存精度为秒级，Netflix扩展nginx实现毫秒粒度缓存，满足2秒段生成的实时需求。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How Netflix Live Streams to 100 Million Devices in 60 Seconds](https://blog.bytebytego.com/p/how-netflix-live-streams-to-100-million?utm_source=post-email-title\u0026publication_id=817132\u0026post_id=190438250\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=53wl0h\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | ByteByteGo |\n| 发表日期 | 2026-03-24 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"netflix-live-origin-streaming-architecture\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"netflix-live-origin-streaming-architecture\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"netflix-live-origin-streaming-architecture\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/netflix-live-origin-streaming-architecture\",\"href\":\"/whatsup/tldr/hn-2026-p3/netflix-live-origin-streaming-architecture\",\"category\":\"tldr\",\"title\":\"Netflix如何实现亿级设备实时直播流分发\",\"date\":\"2026-03-24\",\"excerpt\":\"Netflix构建Live Origin服务器系统，通过多管道冗余、智能选择和CDN优化，实现向1亿设备实时直播视频流分发。\",\"coverImage\":\"$undefined\",\"author\":\"ByteByteGo\",\"original\":\"How Netflix Live Streams to 100 Million Devices in 60 Seconds.md\",\"originalUrl\":\"https://blog.bytebytego.com/p/how-netflix-live-streams-to-100-million?utm_source=post-email-title\u0026publication_id=817132\u0026post_id=190438250\u0026utm_campaign=emai ":{\"title\":\"Revolut的复利增长算法：从新锐银行到全球巨头\",\"excerpt\":\"a16z深度拆解Revolut 2025年报，揭示其如何通过多引擎收入、极致效率和AI驱动，成为全球增长最快的金融机构之一。\",\"date\":\"2026-03-24\",\"category\":\"tldr\",\"author\":\"Alex Immerman\",\"original\":\"The Algorithm That Keeps Compounding.md\",\"originalUrl\":\"https://www.a16z.news/p/the-algorithm-that-keeps-compounding?utm_source=post-email-title\u0026publication_id=13145\u0026post_id=191903711\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\u0026utm_medium=email\",\"score\":\"88\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/revolut-compounding-growth-algorithm.md\"}},\"headings\":[{\"depth\":2,\"text\":\"摘要\",\"id\":\"摘要\"},{\"depth\":2,\"text\":\"内容框架与概述\",\"id\":\"内容框架与概述\"},{\"depth\":2,\"text\":\"核心概念及解读\",\"id\":\"核心概念及解读\"},{\"depth\":2,\"text\":\"原文信息\",\"id\":\"原文信息\"}],\"sidebar\":null,\"directoryHref\":\"/whatsup?tab=tldr\",\"children\":\"$L18\"}]\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章深入解析了Netflix Live Origin的系统架构。该服务器连接云端直播管道与Open Connect CDN，通过双管道冗余、智能段选择、毫秒级缓存控制等核心技术，应对实时视频分发的严苛时效挑战，实现向全球上亿设备的高质量低延迟直播。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章首先介绍Live Origin的定位：它运行在EC2实例上，作为多租户微服务，接收Packager通过HTTP PUT发送的视频段，并由Open Connect节点通过HTTP GET拉取。Netflix采用双区域独立管道设计，结合固定2秒段时长的模板化清单，实现了高可靠且可预测的段发布机制。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"随后文章阐述多管道感知与智能选择策略。两个管道在不同云区域独立运行，当Open Connect请求段时，Origin按优先顺序检查两个管道的候选段并选择首个有效段。Packager还会对媒体做轻量检测，将缺陷信息作为元数据传递，使系统能在管道级别过滤问题内容。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在CDN优化方面，Netflix为Open Connect做了大量适配，包括基于模板的请求范围过滤、404缓存策略、边缘请求挂起等。为支持2秒段粒度的实时性，他们还引入了毫秒级nginx缓存能力，并通过HTTP头部实现流式元数据广播，高效传递广告插入、内容警告等事件通知。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后文章讲述了存储架构的演进。Netflix最初使用S3，但因直播写入的极端时效要求而转向自建存储系统，提出了单区域高可用写入、毫秒级延迟复制等五大核心需求。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Live Origin\"}],\"：Netflix自研的直播源站服务器，连接编码管道与CDN，负责视频段的存储、质量筛选和分发控制。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"双管道冗余\"}],\"：在两个不同云区域运行独立编码管道，当一个管道产生缺陷段时，另一个通常正常，大幅降低故障影响。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"段模板清单\"}],\"：采用固定2秒段时长的可预测模板替代动态清单，使系统能精确预判段发布时间。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"边缘请求挂起\"}],\"：当段尚未就绪时Origin保持请求连接开放，段发布后立即响应，避免客户端反复重试。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"毫秒级缓存控制\"}],\"：标准HTTP缓存精度为秒级，Netflix扩展nginx实现毫秒粒度缓存，满足2秒段生成的实时需求。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"i
