上帝才是真正的无穷大。数学家高斯在1831年称无穷大只是一种修辞手法。然而到了十九世纪七十年代，数学家开始重新审视最基本的概念。\n\n1872年，Cantor和Dedekind独立发表了对实数的严格定义，重新定义了数轴。在此之前，数学家认为数轴放大后会出现空隙。而他们证明数轴是连续的实数集合，无穷大隐藏在其每一处裂隙中。1872年夏天，两人在瑞士度假胜地相遇，成为朋友。\n\n## 核心概念及解读\n**无穷大**：长期以来被数学界视为禁忌的概念，在Cantor和Dedekind的工作后成为数学的核心研究对象，改变了整个数学的基础。\n\n**实数连续统**：Cantor和Dedekind证明数轴是连续的实数集合，无论放大多少倍都不会出现空隙，这与之前的认知截然不同。\n\n**剽窃指控**：Goos发现的1873年11月30日信件可能证明Cantor关于无穷大的关键思想来自Dedekind，而非他自己的原创。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The Man Who Stole Infinity](https://www.quantamagazine.org/the-man-who-stole-infinity-20260225/) |\n| 作者 | Joseph Howlett |\n| 发表日期 | 2026-02-26 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"cantor-infinity-plagiarism-controversy\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"cantor-infinity-plagiarism-controversy\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"cantor-infinity-plagiarism-controversy\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/cantor-infinity-plagiarism-controversy\",\"href\":\"/whatsup/tldr/hn-2026-p3/cantor-infinity-plagiarism-controversy\",\"category\":\"tldr\",\"title\":\"偷走无穷的人：Cantor剽窃风波\",\"date\":\"2026-02-26\",\"excerpt\":\"数学家Goos发现一封失传的信件，揭露Cantor关于无穷大的革命性论文可能剽窃自Dedekind，重写了这位数学巨匠的遗产。\",\"coverImage\":\"$undefined\",\"author\":\"Joseph Howlett\",\"original\":\"The Man Who Stole Infinity.md\",\"originalUrl\":\"https://www.quantamagazine.org/the-man-who-stole-infinity-20260225/\",\"score\":\"$undefined\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"偷走无穷的人：Cantor剽窃风波\",\"excerpt\":\"数学家Goos发现一封失传的信件，揭露Cantor关于无穷大的革命性论文可能剽窃自Dedekind，重写了这位数学巨匠的遗产。\",\"date\":\"2026-02-26\",\"category\":\"tldr\",\"author\":\"Joseph Howlett\",\"original\":\"The Man Who Stole Infinity.md\",\"originalUrl\":\"https://www.quantamagazine.org/the-man-who-stole-infinity-2
