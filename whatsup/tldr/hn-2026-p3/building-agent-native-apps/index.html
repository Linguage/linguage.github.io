具原子化，composability使工具能自由组合产生无人设计的新能力。代价是更慢、更贵且更不可预测。\n\n文章通过三个具体案例展示了不同场景下的实践。Naveen的稍后阅读应用将架构推向极简：整个后端就是文件夹系统，AI只获得读取、写入和列出文件三个工具，就能完成查找主题、生成摘要等复杂任务。Yash的Mac桌面整理应用Sparkle则提供了重要教训：当agent开始自主删除文件进入上帝模式时，在提示词中要求确认并不可靠，必须将安全防护内置到工具本身。\n\n最后文章总结了构建agent-native应用的关键要点：AI即应用，工具越简单结果越智能，规则应放在工具而非指令中，开发者可以在现有应用中给AI提供安全实验空间但要做好频繁重构的准备。随着推理成本下降，这种架构将变得越来越经济可行。\n\n## 核心概念及解读\n**Agent原生架构**（Agent-native Architecture）：一种软件设计范式，应用不通过预编程代码执行功能，而是给AI提供基础工具让其自主决定如何组合使用来完成任务。\n\n**工具**（Tools）：agent-native应用中的基础操作单元，应该是原子化、单一目的的小动作，如读取文件、写入文件、搜索网络等。\n\n**技能**（Skills）：用自然语言编写的指令，描述如何组合工具来完成特定任务，使应用具备个性化的功能。\n\n**对等性**（Parity）：用户和AI能够做的事情完全一致，每个点击、表单提交和交互对两者都可用。\n\n**原子化**（Granularity）：工具应该足够小且单一目的，复杂功能应通过技能层实现而非硬编码，使AI能更创造性地组合它们。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How to Build Agent-native：Lessons From Four Apps](https://every.to/source-code/how-to-build-agent-native-lessons-from-four-apps) |\n| 作者 | Katie Parrott |\n| 发表日期 | 2026-02-18 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"building-agent-native-apps\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"building-agent-native-apps\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"building-agent-native-apps\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/building-agent-native-apps\",\"href\":\"/whatsup/tldr/hn-2026-p3/building-agent-native-apps\",\"category\":\"tldr\",\"title\":\"如何构建Agent原生应用：四个应用的经验教训\",\"date\":\"2026-02-18\",\"excerpt\":\"文章介绍了一种名为agent-native的软件架构新范式，通过给AI提供基础工具让其自主组合完成任务，替代传统预编程方式，探讨了这种架构的原理、实践案例和挑战。\",\"coverImage\":\"$undefined\",\"author\":\"Katie Parrott\",\"original\":\"How to Build Agent-native Lessons From Four Apps.md\",\"originalUrl\":\"https://every.to/source-code/how-to-build-agent-native-lessons-from-four-apps\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$u
