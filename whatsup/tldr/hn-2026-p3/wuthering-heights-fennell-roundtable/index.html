影中。\n\n第三轮聚焦选角问题。Robbie和Elordi被认为过于精致成熟，与原著中野蛮、偏执、充满破坏力的Cathy和Heathcliff相去甚远。评论者指出Fennell将Heathcliff的虐待行为转化为BDSM情节，将其残暴本质彻底浪漫化，使角色失去了原著中的道德复杂性。\n\n## 核心概念及解读\n**哥特文学中的性与死亡**：原著中情欲和死亡紧密交织的暗线，在影片中被处理为表层的视觉挑衅，未能深入挖掘其文学内核。\n\n**时代错置美学**：Fennell在维多利亚时代背景中植入现代材质与流行音乐，营造华丽视觉但缺乏叙事目的，沦为纯美学装饰。\n\n**角色浪漫化**：将原著中真正残暴的Heathcliff改造为忠诚深情的理想恋人，同时弱化Cathy的自私本性，使故事失去了悲剧性的道德张力。\n\n**基调撕裂**：影片在严肃悲剧与戏谑喜剧之间反复摇摆，既未达成颠覆性的解构，也未能完成经典叙事，令观众产生持续的类型混乱感。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [If youre going to show us two freaks in love, show us two freaks in love](https://post.substack.com/p/if-youre-going-to-show-us-two-freaks?utm_source=post-email-title\u0026publication_id=737237\u0026post_id=188076895\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Mina Le |\n| 发表日期 | 2026-02-17 |\n| 评分 | 68/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"wuthering-heights-fennell-roundtable\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"wuthering-heights-fennell-roundtable\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"wuthering-heights-fennell-roundtable\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/wuthering-heights-fennell-roundtable\",\"href\":\"/whatsup/tldr/hn-2026-p3/wuthering-heights-fennell-roundtable\",\"category\":\"tldr\",\"title\":\"呼啸山庄改编：美学狂欢还是原著背叛？\",\"date\":\"2026-02-17\",\"excerpt\":\"多位影评人圆桌讨论Emerald Fennell执导的《呼啸山庄》改编电影，从开场挑衅、美学风格到选角争议，全面审视其与原著精神的偏离与得失。\",\"coverImage\":\"$undefined\",\"author\":\"Mina Le\",\"original\":\"If youre going to show us two freaks in love, show us two freaks in love.md\",\"originalUrl\":\"https://post.substack.com/p/if-youre-going-to-show-us-two-freaks?utm_source=post-email-title\u0026publication_id=737237\u0026post_id=188076895\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\",\"score\":\"68\",\"content\":\"$19\",\"tags\":[\"summa
