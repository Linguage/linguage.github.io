增长，三年间增速达30%，远超线下零售的5%；三是软件和计算投资对美国GDP增长的贡献在2025年出现爆发式跃升，接近总增长的一半。\n\n最后转向Stripe Capital业务，指出后金融危机时代小企业贷款持续收紧的背景下，Stripe利用实时营收数据为中小企业提供融资服务，获贷企业平均增速比同类企业快27个百分点，体现了平台化金融服务的独特优势。\n\n## 核心概念及解读\n**互联网GDP**：Stripe定义的愿景指标，指通过线上交易和数字服务创造的经济总量，Stripe自身支付体量已达全球GDP的1.6%。\n\n**Stripe Capital**：基于商户实时支付数据的中小企业贷款服务，填补了传统银行退出小企业贷款市场后的空白，2025年放款量同比增长45%。\n\n**Stripe Atlas**：帮助创业者在特拉华州快速注册公司的服务，目前全美25%的新注册特拉华公司通过该平台创立，初创企业变现速度显著加快。\n\n**科技GDP贡献**：软件和计算领域对美国GDP增长的贡献在2025年出现结构性跃升，从长期约20%的水平飙升至接近50%，反映AI浪潮对实体经济的深层渗透。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Still increasing the GDP of the internet](https://www.a16z.news/p/still-increasing-the-gdp-of-the-internet?utm_source=post-email-title\u0026publication_id=13145\u0026post_id=189019494\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Alex Immerman |\n| 发表日期 | 2026-02-24 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"stripe-2025-annual-letter-gdp-internet\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"stripe-2025-annual-letter-gdp-internet\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"stripe-2025-annual-letter-gdp-internet\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/stripe-2025-annual-letter-gdp-internet\",\"href\":\"/whatsup/tldr/hn-2026-p3/stripe-2025-annual-letter-gdp-internet\",\"category\":\"tldr\",\"title\":\"Stripe 2025年报：互联网GDP的持续扩张\",\"date\":\"2026-02-24\",\"excerpt\":\"a16z解读Stripe 2025年度公开信，展示Stripe以1.9万亿美元支付体量驱动互联网经济增长，覆盖全球超500万企业的金融基础设施版图。\",\"coverImage\":\"$undefined\",\"author\":\"Alex Immerman\",\"original\":\"Still increasing the GDP of the internet.md\",\"originalUrl\":\"https://www.a16z.news/p/still-increasing-the-gdp-of-the-internet?utm_source=post-email-title\u0026publication_id=13145\u0026post_id=189019494\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\",\"score\":
