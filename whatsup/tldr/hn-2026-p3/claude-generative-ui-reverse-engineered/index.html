et工具的存在和四个参数结构；其次解释了HTML是直接注入DOM而非iframe的证据，包括CSS变量解析、sendPrompt()函数访问等；最后总结了与Artifacts的五大差异和流式渲染的八个步骤。\n\n第二部分讲述为终端编码助手Pi构建该功能的过程。作者面临终端无法渲染交互式HTML的困境，通过发现Glimpse——一个基于WKWebView的原生macOS微UI库——解决了问题。该库支持双向JSON通信和毫秒级启动，最终实现了在终端环境中调用show_widget工具并渲染交互式可视化组件的功能。\n\n## 核心概念及解读\n**生成式UI**（Generative UI）：AI模型动态生成HTML/CSS/JS组件的技术，使对话界面具备交互性。\n\n**懒加载设计文档**（Lazy Documentation）：按需加载相关模块的设计指南，避免每次都输入冗长的系统提示词。\n\n**直接DOM注入**（Direct DOM Injection）：将HTML片段直接插入父文档，而非通过iframe隔离渲染，实现流式增量显示。\n\n**内容安全策略**（Content Security Policy）：通过白名单机制限制可加载的CDN域名，在允许动态加载库的同时保障安全。\n\n**Glimpse**：基于WKWebView的原生macOS微UI库，提供毫秒级启动的WebView窗口和双向通信能力。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Reverse-engineering Claudes generative UI - then building it for the terminal](https://michaellivs.com/blog/reverse-engineering-claude-generative-ui/) |\n| 作者 | Michael Livshits |\n| 发表日期 | 2026-03-13 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"claude-generative-ui-reverse-engineered\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"claude-generative-ui-reverse-engineered\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"claude-generative-ui-reverse-engineered\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/claude-generative-ui-reverse-engineered\",\"href\":\"/whatsup/tldr/hn-2026-p3/claude-generative-ui-reverse-engineered\",\"category\":\"tldr\",\"title\":\"逆向分析Claude生成式UI并为终端实现\",\"date\":\"2026-03-13\",\"excerpt\":\"作者逆向分析了Claude的生成式UI实现机制，发现其通过show_widget工具将HTML直接注入DOM，而非使用iframe。文章详细解析了其工作原理，包括懒加载设计文档、CSP白名单机制、流式渲染架构，并展示了如何为终端编码助手Pi构建类似功能。\",\"coverImage\":\"$undefined\",\"author\":\"Michael Livshits\",\"original\":\"Reverse-engineering Claudes generative UI - then building it for the terminal.md\",\"originalUrl\":\"https://michaellivs.com/blog/reverse-engineering-claude-generative-ui/\",\"score\":\"88\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"ma
