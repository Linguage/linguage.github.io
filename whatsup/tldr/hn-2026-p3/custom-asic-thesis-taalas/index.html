需要牺牲一定的模型质量以换取速度和成本优势。但作者认为这种权衡是暂时的，随着大语言模型架构日趋标准化，以及OpenAI等公司开始进行完全集成的模型-芯片协同设计，这一差距将在两年内显著缩小。\n\n后半部分整理了AI社区的最新动态，包括Gemini 3.1 Pro在评测中的表现、Claude Opus 4.6的时间跨度评估结果、以及新兴的agent技能优化框架GEPA/gskill。这些讨论反映了AI领域在基准测试、工程实践和工具链建设方面的持续演进。\n\n## 核心概念及解读\n\n**定制ASIC**（Custom ASIC）：为特定AI模型设计的专用芯片，可大幅提升推理速度并降低成本，但设计周期长且缺乏通用性。\n\n**每模型一芯片**（ASIC Per Model）：Martin Casado提出的理念，认为为每个重要模型定制专用芯片在经济上是可行的，因为推理成本远超芯片设计成本。\n\n**模型-芯片协同设计**（Model-Chip Codesign）：OpenAI等公司正在推进的完全集成设计方法，让模型架构与芯片硬件同步优化，以突破当前性能瓶颈。\n\n**时间跨度评估**（Time Horizon Eval）：METR提出的评估方法，测量AI模型在软件任务上能够有效工作的持续时间，Opus 4.6达到约14.5小时。\n\n**技能作为新软件产物**（Skills as New Software Artifact）：指agent能力描述正在成为一种新的工程资产，但引发了人工编写还是模型生成的争论。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [[AINews] The Custom ASIC Thesis](https://www.latent.space/p/ainews-the-custom-asic-thesis?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=188678452\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Latent.Space |\n| 发表日期 | 2026-02-21 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"custom-asic-thesis-taalas\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"custom-asic-thesis-taalas\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"custom-asic-thesis-taalas\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/custom-asic-thesis-taalas\",\"href\":\"/whatsup/tldr/hn-2026-p3/custom-asic-thesis-taalas\",\"category\":\"tldr\",\"title\":\"定制芯片时代的到来：每秒1.7万token与模型芯片协同设计\",\"date\":\"2026-02-21\",\"excerpt\":\"Taalas推出每秒16,960 token的超快推理芯片，ASIC专用芯片的经济可行性得到验证，模型-芯片协同设计将成为未来趋势。\",\"coverImage\":\"$undefined\",\"author\":\"Latent.Space\",\"original\":\"AINews The Custom ASIC Thesis.md\",\"originalUrl\":\"https://www.latent.space/p/ainews-the-custom-asic-thesis?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=188678452\u0026utm_campaign=email-post-title\u00
