平台不同，Dreamer允许开发者推送任意代码到其虚拟机，大幅降低了开发门槛。平台的核心理念是Agent构建Agent，Sidekick本身就是这一理念的体现。\n\n在生态与商业模式方面，凭借Stripe和Android的背景，团队深知四边网络效应的价值，正在构建包含消费者、开发者、Agent和应用商店的完整生态。他们还设立了创作者基金来激励开发者。访谈最后提及团队已加入Meta超级智能实验室，这篇对话成为公开消息前的最后一次深度采访。\n\n## 核心概念及解读\n\n**Sidekick**：Dreamer平台的核心个人智能体，能根据用户自然语言指令发现、使用和创建其他Agent，是Agent构建Agent理念的直接体现。\n\n**Agentic Apps**：基于Agent能力构建的应用程序，区别于传统静态应用，具备自主执行后台任务、生成内容并与用户主动交互的能力。\n\n**全栈Agent平台**：Dreamer提供从开发工具到运行时环境的完整技术栈，包括SDK、数据库和无服务器函数，开发者可推送任意代码到平台虚拟机。\n\n**四边网络效应**：平台同时连接消费者、开发者、Agent和应用，形成相互促进的生态飞轮，这是Dreamer商业策略的核心逻辑。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Dreamer: the Personal Agent OS — David Singleton](https://www.latent.space/p/dreamer?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=191603783\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Latent.Space |\n| 发表日期 | 2026-03-21 |\n| 评分 | 85/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"dreamer-personal-agent-os-david-singleton\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"dreamer-personal-agent-os-david-singleton\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"dreamer-personal-agent-os-david-singleton\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/dreamer-personal-agent-os-david-singleton\",\"href\":\"/whatsup/tldr/hn-2026-p3/dreamer-personal-agent-os-david-singleton\",\"category\":\"tldr\",\"title\":\"Dreamer：面向所有人的个人智能体操作系统\",\"date\":\"2026-03-21\",\"excerpt\":\"前Stripe CTO和Android核心成员打造的AI Agent平台Dreamer，以Sidekick为核心构建消费者优先的智能体生态。\",\"coverImage\":\"$undefined\",\"author\":\"Latent.Space\",\"original\":\"Dreamer the Personal Agent OS — David Singleton.md\",\"originalUrl\":\"https://www.latent.space/p/dreamer?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=191603783\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026tried athy 分享他从 2024 年 12 月起不再手写代码，转为指挥 AI Agent 工作，探讨 Agent 如何改变编程、教育和科研的范式。\",\"date\":\"2026-03-21\",\"category\":\"tldr\",\"author\":\"宝玉 (@dotey)\",\"original\":\"Karpathy：写代码已经不是对的动词了.md\",\"originalUrl\":\"https://x.com/dotey/article/2035141635713941927\",\"score\":\"88\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/karpathy-agent-coding-revolution.md\"}},\"headings\":[{\"depth\":2,\"text\":\"摘要\",\"id\":\"摘要\"},{\"depth\":2,\"text\":\"内容框架与概述\",\"id\":\"内容框架与概述\"},{\"depth\":2,\"text\":\"核心概念及解读\",\"id\":\"核心概念及解读\"},{\"depth\":2,\"text\":\"原文信息\",\"id\":\"原文信息\"}],\"sidebar\":null,\"directoryHref\":\"/whatsup?tab=tldr\",\"children\":\"$L18\"}]\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"David Singleton离开Stripe后与Android早期成员共同创立Dreamer，一个面向普通消费者的AI Agent平台。核心产品Sidekick是一个能帮助用户发现、使用甚至构建智能体的个人助手。平台提供完整的全栈开发工具链，包括SDK、数据库、无服务器函数等，并构建了包含用户、开发者、Agent和应用的四边网络效应生态。该团队后来加入了Meta超级智能实验室。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章从Dreamer的产品定位出发，阐述其面向普通消费者而非技术人群的设计理念。通过Sidekick这一个人智能体，用户可以用自然语言定制和创建Agent，解决日常生活中的实际问题。平台内置仪表盘、Feed流和Widget等交互组件，让Agent的运行结果以用户熟悉的方式呈现。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在技术架构层面，Dreamer构建了一套完整的全栈开发体系，涵盖SDK、日志系统、数据库、Prompt管理和无服务器函数等。与大多数限制技术栈的平台不同，Dreamer允许开发者推送任意代码到其虚拟机，大幅降低了开发门槛。平台的核心理念是Agent构建Agent，Sidekick本身就是这一理念的体现。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在生态与商业模式方面，凭借Stripe和Android的背景，团队深知四边网络效应的价值，正在构建包含消费者、开发者、Agent和应用商店的完整生态。他们还设立了创作者基金来激励开发者。访谈最后提及团队已加入Meta超级智能实验室，这篇对话成为公开消息前的最后一次深度采访。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Sidekick\"}],\"：Dreamer平台的核心个人智能体，能根据用户自然语言指令发现、使用和创建其他Agent，是Agent构建Agent理念的直接体现。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Agentic Apps\"}],\"：基于Agent能力构建的应用程序，区别于传统静态应用，具备自主执行后台任务、生成内容并与用户主动交互的能力。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"全栈Agent平台\"}],\"：Dreamer提供从开发工具到运行时环境的完整技术栈，包括SDK、数据库和无服务器函数，开发者可推送任意代码到平台虚拟机。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"四边网络效应\"}],\"：平台同时连接消费者、开发者、Agent和应用，形成相互促进的生态飞轮，这是Dreamer商业策略的核心逻辑。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"原文信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#原文信息\",\"children\":\"原文信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"
