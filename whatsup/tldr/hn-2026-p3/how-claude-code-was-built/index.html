给LLM创业者的建议是思考模型目前还不擅长的前沿领域，因为它迟早会变得擅长。他提到整个Claude Code都在不断被重写，现在没有任何一部分是六个月前就存在的。\n\n文章深入探讨了多智能体系统的涌现能力。Anthropic刚刚推出的Claude Teams就是一种尝试，插件功能完全由智能体集群在一个周末建成。多个智能体拥有独立的上下文窗口，通过正确的拓扑结构沟通，能够构建更大的项目。Mama Claude递归调用子智能体并行工作的模式已成为解决复杂问题的标准做法。\n\n关于AI时代的工程师技能，Cherry指出科学思维和第一性原理思考比过去的经验更重要。他甚至会问候选人举一个犯错的例子，以观察其承担责任和从中学习的能力。最高效的工程师呈现两极分化：极端专家或超级通才。会做一些奇怪事情的人、打破常规思维的人才在新时代更有价值。\n\n## 核心概念及解读\n**潜在需求**（Latent Demand）：产品的每个部分都应基于终端最初的潜在需求构建，即观察用户如何实际使用工具，而非预设功能。\n\n**ClaudeMD**：项目根目录下的Markdown配置文件，用于指导模型行为。Cherry建议文件保持简洁，当文件过大时应删除重建而非过度设计。\n\n**Mama Claude**：主Claude递归调用子智能体的协作模式。多个子智能体拥有独立上下文窗口，并行处理不同任务，通过正确的拓扑结构沟通。\n\n**计划模式**（Plan Mode）：让Claude先构思方案但暂不写代码的工作流。随着模型能力提升，该模式寿命可能有限，未来可能只需一个提示词即可自动完成。\n\n**苦涩的教训**（Bitter Lessons）：为模型构建脚手架可能短期内提升10%到20%性能，但下一个模型发布后收益会被抹平，因此应直接等待模型进步而非持续维护脚手架。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Boris Cherny：我们如何打造 Claude Code ｜ BestBlogs.dev](https://www.bestblogs.dev/video/f884575) |\n| 作者 | Y Combinator |\n| 发表日期 | 2026-02-17 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"how-claude-code-was-built\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"how-claude-code-was-built\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"how-claude-code-was-built\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/how-claude-code-was-built\",\"href\":\"/whatsup/tldr/hn-2026-p3/how-claude-code-was-built\",\"category\":\"tldr\",\"title\":\"Claude Code 创作者谈为未来模型构建产品\",\"date\":\"2026-02-17\",\"excerpt\":\"Anthropic工程师Boris Cherny分享Claude Code从意外原型到变革性AI编程工具的完整历程，阐述为未来模型构建的产品哲学、多智能体系统的涌现能力，以及终端界面的意外成功。\",\"coverImage\":\"$undefined\",\"author\":\"Y Combinator\",\"original\":\"Boris Cherny：我们如何打造 Claude Code  BestBlogs.dev.md\",\"originalUrl\":\"https://www.bestblogs.dev/video/f884575\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$u
