as 因要求客户采纳全栈而失败，后转向单品销售才找到盈利路径。\n\n中段聚焦于云厂商博弈与关键决策。VMware 曾差点以两千万美元收购仅三人的 HashiCorp，若成交则 Terraform 可能永远不会诞生。Mitchell 坦率评价了与 AWS、Azure、GCP 合作的体验差异，以及 HashiCorp 最终上市和被 IBM 收购的历程。\n\n后半部分转向 AI 对工程的深远影响。Mitchell 分享了他的核心原则——始终让一个智能体在后台工作，形成人与智能体的流水线协作。他认为 AI 使开源贡献泛滥，信任模型必须重构，Git 的分支和合并机制也将在高频率智能体操作下不堪重负，需要类似 Gmail 颠覆邮件那样的范式转换。\n\n## 核心概念及解读\n\n**智能体流水线协作**：Mitchell 的核心工作原则是人机交替推进，自己编码时让智能体规划，智能体编码时自己审查，最大化并行效率。\n\n**开源默认拒绝模型**：AI 降低了制造看似合理的低质量贡献的门槛，开源社区应从默认信任转向默认拒绝，重新建立质量门控。\n\n**Git 的 Gmail 时刻**：智能体产生的大量分支和提交使现有 Git 工作流不堪重负，版本控制需要像 Gmail 颠覆邮件一样的根本性范式革新。\n\n**研究先行 AI 采纳策略**：对 AI 持怀疑态度的工程师不应从代码生成入手，而应先委派研究类任务如库对比和边界分析，逐步建立信任。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Mitchell Hashimotos new way of writing code](https://newsletter.pragmaticengineer.com/p/mitchell-hashimoto?utm_source=post-email-title\u0026publication_id=458709\u0026post_id=188952833\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Gergely Orosz |\n| 发表日期 | 2026-02-26 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"mitchell-hashimoto-ai-coding-workflow\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"mitchell-hashimoto-ai-coding-workflow\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"mitchell-hashimoto-ai-coding-workflow\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/mitchell-hashimoto-ai-coding-workflow\",\"href\":\"/whatsup/tldr/hn-2026-p3/mitchell-hashimoto-ai-coding-workflow\",\"category\":\"tldr\",\"title\":\"Mitchell Hashimoto 的 AI 驱动编程新范式\",\"date\":\"2026-02-26\",\"excerpt\":\"HashiCorp 联合创始人 Mitchell Hashimoto 分享 AI 智能体如何彻底改变他的工程工作流，以及对开源、版本控制和招聘的深刻洞见。\",\"coverImage\":\"$undefined\",\"author\":\"Gergely Orosz\",\"original\":\"Mitchell Hashimotos new way of writing code.md\",\"originalUrl\":\"https://newsletter.pragmaticengineer.com/p/mitchell-hashimoto?utm_source=post-email-title\u0026publication_id=458709\u
