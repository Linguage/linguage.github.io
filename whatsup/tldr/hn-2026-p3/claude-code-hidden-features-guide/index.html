模变更集分发到数十甚至数百个工作树代理中执行，以及 --agent 自定义系统提示与工具的能力，为大规模代码迁移和团队协作提供了强大基础设施。\n\n最后作者分享了若干提升日常体验的技巧，包括 Chrome 扩展用于前端调试验证、Desktop 内置浏览器自动启动测试服务器、/btw 侧查询、/voice 语音输入、--bare 加速 SDK 启动、--add-dir 跨仓库访问，以及会话分支与复用方法。\n\n## 核心概念及解读\n\n**/loop 与 /schedule**：定时调度命令，可让 Claude 以设定间隔自动执行任务，最长持续一周，适用于自动处理代码审查和持续集成等场景。\n\n**Hooks 生命周期钩子**：在 SessionStart、PreToolUse 等代理生命周期节点注入确定性逻辑，实现自动加载上下文或拦截命令等定制行为。\n\n**Git Worktrees 并行开发**：利用 Git 工作树在同一个仓库中运行多个独立的 Claude 会话，实现大规模并行编码而不互相干扰。\n\n**/batch 批量分发**：通过交互式访谈后将大规模变更任务分发到多个工作树代理并行执行，适合代码迁移等可并行化工作。\n\n**Dispatch 远程控制**：Claude Desktop 的安全远程控制功能，可在离开电脑时通过手机让 Claude 处理 Slack、邮件和文件管理等知识工作。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Twitter Thread Reader - Read, Save \u0026 Print Threads](https://twittershots.com/thread-reader?url=https%3A%2F%2Fx.com%2Fbcherny%2Fstatus%2F2038454336355999749) |\n| 作者 | TwitterShots |\n| 发表日期 | 2026-03-30 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"claude-code-hidden-features-guide\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"claude-code-hidden-features-guide\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"claude-code-hidden-features-guide\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/claude-code-hidden-features-guide\",\"href\":\"/whatsup/tldr/hn-2026-p3/claude-code-hidden-features-guide\",\"category\":\"tldr\",\"title\":\"Claude Code 十五大隐藏实用技巧全解析\",\"date\":\"2026-03-30\",\"excerpt\":\"Boris Cherny 分享了 15 个 Claude Code 中隐藏且实用的功能技巧，涵盖移动开发、自动化调度、并行任务等高级用法。\",\"coverImage\":\"$undefined\",\"author\":\"TwitterShots\",\"original\":\"Twitter Thread Reader - Read, Save \u0026 Print Threads.md\",\"originalUrl\":\"https://twittershots.com/thread-reader?url=https%3A%2F%2Fx.com%2Fbcherny%2Fstatus%2F2038454336355999749\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefin
