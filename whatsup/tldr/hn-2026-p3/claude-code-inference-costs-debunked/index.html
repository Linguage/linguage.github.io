计价确实可能达到5000美元月费，但这不代表实际成本。\n\n接着作者引入OpenRouter上类似规模开源模型的定价作为参考基准。Qwen 3.5 397B和Kimi K2.5等模型的输入 tokens价格仅为0.39-0.45美元，输出tokens约2.25-2.34美元，较Opus 4.6的API定价便宜约十倍。这些供应商需覆盖硬件成本并盈利，因此其定价更接近真实计算成本。\n\n基于此对比，作者估算Claude Code重度用户的实际计算成本约500美元，Anthropic每月亏损约300美元而非4800美元。而大多数用户使用量远低于限额，个人平均API等效消费约180美元，实际成本仅18美元，使Anthropic在大多数用户身上可盈利或至少持平。\n\n最后作者澄清，五千美元数字很可能源自Cursor的内部分析。Cursor需支付Anthropic的API费用，因此其成本确实接近该数字，但这与Anthropic自身的推理成本无关。文章指出Anthropic整体亏损源于模型训练、人力成本等巨额投入，而非推理服务本身，AI推理昂贵论调实际上有利于前沿实验室维持高溢价。\n\n## 核心概念及解读\n**API零售价格与计算成本差异**（Retail API vs Compute Cost）：API定价包含利润溢价，通常为实际计算成本的十倍左右，前者面向外部客户，后者为模型运行的真实开销。\n\n**OpenRouter定价基准**（OpenRouter Pricing Benchmark）：通过多家供应商竞争的开源模型托管平台，其定价更接近真实推理成本，可作为估算前沿模型实际成本的参考指标。\n\n**缓存命中率**（Cache Hit Rate）：指请求中从缓存读取而非重新计算的比例，高缓存率可大幅降低实际推理成本和token消耗量。\n\n**推理盈利性**（Inference Profitability）：在token级别的服务上，Anthropic很可能已实现盈利，其整体亏损主要来自模型训练、人员薪资等固定成本。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [No, it doesnt cost Anthropic $5k per Claude Code user](https://martinalderson.com/posts/no-it-doesnt-cost-anthropic-5k-per-claude-code-user/) |\n| 作者 | Martin Alderson |\n| 发表日期 | 2026-03-09 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"claude-code-inference-costs-debunked\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"claude-code-inference-costs-debunked\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"claude-code-inference-costs-debunked\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/claude-code-inference-costs-debunked\",\"href\":\"/whatsup/tldr/hn-2026-p3/claude-code-inference-costs-debunked\",\"category\":\"tldr\",\"title\":\"Claude Code每用户五千美元成本说法被推翻\",\"date\":\"2026-03-09\",\"excerpt\":\"本文反驳了关于Claude Code每月消耗5000美元计算成本的说法，指出API零售价格与实际计算成本存在巨大差异，通过对比OpenRouter上类似规模的开源模型定价，推算出实际成本约为API价格的十分之一。\",\"coverImage\":\"$undefined\",\"author\":\"Martin Alderson\",\"original\":\"No, it doesnt cost Anthropic $5k per Claude Code user.md\",\"origin
