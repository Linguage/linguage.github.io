能减缓气候变化，也能在多维度改善人们的生活质量。\n\n最后，她谈到MIT作为气候传播平台的独特优势。这里的研究者慷慨分享时间与知识，同时MIT拥有气候项目、气候政策中心、可持续性科学中心等多个跨学科机构，使不同专业背景的人能够协同应对这一代际挑战。\n\n## 核心概念及解读\n**科学传播**：将复杂的科学知识转化为公众可理解的信息，Goldberg通过音频播客这一媒介实现知识的有效传递。\n\n**气候变化的交织性**：气候变化不是孤立议题，它与经济、健康、居住和饮食等生活的方方面面深度交织，需要整体性传播框架。\n\n**跨学科协作**：应对气候变化需要汇聚不同学科和视角的人才，MIT通过多个气候相关机构为这种协作提供了平台。\n\n**音频叙事**：播客作为一种亲切且易于接触的媒介形式，能在15分钟内为听众提供清晰、可及的气候变化信息。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [3 Questions: Communicating about climate, in audio and beyond](https://news.mit.edu/2026/3-questions-madison-goldberg-communicating-about-climate-0323) |\n| 作者 | Office of the Vice President for Energy and Climate |\n| 发表日期 | 2026-03-24 |\n| 评分 | 72/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"mit-climate-podcast-host-madison-goldberg-interview\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"mit-climate-podcast-host-madison-goldberg-interview\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"mit-climate-podcast-host-madison-goldberg-interview\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/mit-climate-podcast-host-madison-goldberg-interview\",\"href\":\"/whatsup/tldr/hn-2026-p3/mit-climate-podcast-host-madison-goldberg-interview\",\"category\":\"tldr\",\"title\":\"MIT气候播客新主持人谈科学传播与气候叙事\",\"date\":\"2026-03-24\",\"excerpt\":\"MIT气候播客新主持人Madison Goldberg分享她的科学传播之路、气候传播理念以及MIT在跨学科气候交流中的独特优势。\",\"coverImage\":\"$undefined\",\"author\":\"Office of the Vice President for Energy and Climate\",\"original\":\"3 Questions Communicating about climate, in audio and beyond.md\",\"originalUrl\":\"https://news.mit.edu/2026/3-questions-madison-goldberg-communicating-about-climate-0323\",\"score\":\"72\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"MIT气候播客新主持人谈科学传播与气候叙事\",\"excerpt\":\"MIT气候播客新主持人Madison Goldberg分享她的科学传
