的原始大气也为回溯太阳系行星早期状态提供了难得的观测机会。\n\n展望部分指出，JWST虽已接近其质量探测极限，但下一代工具已在筹备之中。欧洲的极大望远镜预计2030年投入运行，美国的宜居世界天文台计划2040年前后发射，将有望直接观测到类地行星。\n\n## 核心概念及解读\n**日冕仪（Coronography）**：通过制造人工日食遮挡恒星光线的成像技术，从早期的遮光板发展到如今的干涉消光，是直接观测系外行星的核心手段。\n\n**碎片盘（Debris Disk）**：围绕恒星运行的尘埃与碎屑环状结构，其内部的间隙和不对称性被视为行星存在的间接证据，至今已编目约百余个。\n\n**MIRI中红外仪器**：JWST搭载的关键载荷之一，集成了高灵敏度日冕仪，在中红外波段显著提升恒星与行星之间的对比度，由法国CNRS和CEA团队参与开发。\n\n**超木星（Super-Jupiter）**：质量超过木星的系外行星，在JWST此次发现之前，日冕仪直接成像仅能观测到此类大质量天体，TWA 7 b首次打破了这一质量下限。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How did the James Webb Space Telescope discover its first exoplanet?](https://www.polytechnique-insights.com/en/columns/space/how-did-the-james-webb-space-telescope-discover-its-first-exoplanet/?utm_source=brevo\u0026utm_campaign=newsletter195en\u0026utm_medium=email\u0026utm_id=128) |\n| 作者 | Anne-Marie Lagrange |\n| 发表日期 | 2026-02-17 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"jwst-discovers-first-exoplanet-twa-7b\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"jwst-discovers-first-exoplanet-twa-7b\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"jwst-discovers-first-exoplanet-twa-7b\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/jwst-discovers-first-exoplanet-twa-7b\",\"href\":\"/whatsup/tldr/hn-2026-p3/jwst-discovers-first-exoplanet-twa-7b\",\"category\":\"tldr\",\"title\":\"韦伯望远镜如何发现其首颗系外行星\",\"date\":\"2026-02-17\",\"excerpt\":\"韦伯太空望远镜通过日冕仪技术首次直接成像发现系外行星TWA 7 b，刷新直接观测最轻系外行星纪录，为行星形成理论提供关键证据。\",\"coverImage\":\"$undefined\",\"author\":\"Anne-Marie Lagrange\",\"original\":\"How did the James Webb Space Telescope discover its first exoplanet?.md\",\"originalUrl\":\"https://www.polytechnique-insights.com/en/columns/space/how-did-the-james-webb-space-telescope-discover-its-first-exoplanet/?utm_source=brevo\u0026utm_campaign=newsletter195en\u0026utm_medium=email\u0026utm_id=128\",\"score\":\"88\",\"content\":\"$19\",\"tags\":[\"sum
