\n\n最后，文章呈现了最关键的实验：日本研究者将静态的旋转蛇错觉图像输入训练好的PredNet，网络在第21帧预测中输出了运动信号。这与人类观看同一静态图像时产生运动错觉的现象高度一致，强有力地证明模仿预测处理机制的机器确实会产生视错觉。\n\n## 核心概念及解读\n**预测处理（Predictive Processing）**：大脑通过分层结构自上而下预测感官输入，预测误差自下而上传播修正感知，是解释人类视错觉的核心理论框架。\n\n**PredNet**：哈佛团队2016年提出的预测神经网络，模仿大脑预测处理机制，通过循环单元和误差传播学习预测视频下一帧，能自发习得世界的高层抽象表征。\n\n**自上而下感知**：最高层用抽象假设逐层向下预测低层活动，与自下而上从原始感觉数据重建感知的方式相对，能更好解释错觉现象。\n\n**旋转蛇错觉**：Akiyoshi Kitaoka设计的经典静态图像错觉，观看者会感知到不存在的旋转运动，PredNet对该图像同样输出了运动预测，表明机器产生了类人错觉。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The Case for World Models, Part II: Can Machines Have Illusions?](https://wheremachinesthink.substack.com/p/the-case-for-world-models-part-ii?utm_source=post-email-title\u0026publication_id=5277805\u0026post_id=187938218\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Anil Ananthaswamy |\n| 发表日期 | 2026-02-16 |\n| 评分 | 83/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"world-models-machine-illusions\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"world-models-machine-illusions\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"world-models-machine-illusions\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/world-models-machine-illusions\",\"href\":\"/whatsup/tldr/hn-2026-p3/world-models-machine-illusions\",\"category\":\"tldr\",\"title\":\"机器会有错觉吗：世界模型与视错觉\",\"date\":\"2026-02-16\",\"excerpt\":\"探讨人类视错觉源于大脑内部世界模型的预测失误，并论证模拟预测处理机制的深度神经网络PredNet同样会对静态图像产生运动错觉，揭示机器与人类感知的深层相似性。\",\"coverImage\":\"$undefined\",\"author\":\"Anil Ananthaswamy\",\"original\":\"The Case for World Models, Part II Can Machines Have Illusions?.md\",\"originalUrl\":\"https://wheremachinesthink.substack.com/p/the-case-for-world-models-part-ii?utm_source=post-email-title\u0026publication_id=5277805\u0026post_id=187938218\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\",\"score\":\"83\",\"co
