源的可及性、交通方式的脆弱性等现实问题。MIT AgeLab的指数显示，美国人在财务规划上尚可，在物理基础设施准备上仅得60分。\n\n## 核心概念及解读\n\n**冲击叠加效应**：全球危机不再是孤立事件，而是密集连续发生，每次冲击尚未消化，下一次已至，对退休者的累积影响远超单次事件。\n\n**临时性叙事陷阱**：政策制定者和市场分析师习惯用临时来描述涨价和扰动，但所谓的短期在退休者的时间框架内可能占据余生很大比例，根本不短暂。\n\n**结构性韧性**：超越财务规划的范畴，审视退休生活中的物理基础设施——住房能效、医疗距离、交通方式——这些因素决定了一个退休方案能否经受系统性冲击。\n\n**滑行路径假设失效**：传统退休规划基于成本温和上升、市场周期性恢复的滑行路径假设，但这一假设在冲击频发的新现实中已难以成立。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Why Temporary Is The Most Expensive Word In Retirement Planning](https://www.forbes.com/sites/josephcoughlin/2026/03/24/why-temporary-is-the-most-expensive-word-in-retirement-planning/) |\n| 作者 | Joseph Coughlin |\n| 发表日期 | 2026-03-24 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"temporary-most-expensive-word-retirement-planning\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"temporary-most-expensive-word-retirement-planning\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"temporary-most-expensive-word-retirement-planning\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/temporary-most-expensive-word-retirement-planning\",\"href\":\"/whatsup/tldr/hn-2026-p3/temporary-most-expensive-word-retirement-planning\",\"category\":\"tldr\",\"title\":\"退休规划中最昂贵的词：临时\",\"date\":\"2026-03-24\",\"excerpt\":\"退休规划中最危险的词是临时，因为全球冲击不断叠加且不再短暂，传统财务模型已无法应对，需要从结构韧性角度重新审视退休准备。\",\"coverImage\":\"$undefined\",\"author\":\"Joseph Coughlin\",\"original\":\"Why Temporary Is The Most Expensive Word In Retirement Planning.md\",\"originalUrl\":\"https://www.forbes.com/sites/josephcoughlin/2026/03/24/why-temporary-is-the-most-expensive-word-in-retirement-planning/\",\"score\":\"78\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"退休规划中最昂贵的词：临时\",\"excerpt\":\"退休规划中最危险的词是临时，因为全球冲击不断叠加且不再短暂，传统财务模型已无法应对，需要从结构韧性角度重新审视退休准备。\",\"date\":\"2026-
