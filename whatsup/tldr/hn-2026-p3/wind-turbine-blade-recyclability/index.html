增强体构成的难以分离的混合材料，是风电回收的核心难题。\n\n**溶剂解法回收**：通过化学溶剂溶解树脂基体从而无损回收玻璃纤维的技术，能同时回收纤维和树脂，但资源消耗大尚未规模化。\n\n**热塑性树脂叶片**：ZEBRA项目开发的新型叶片方案，采用可化学回收的热塑性树脂替代传统热固性树脂，实现材料闭环循环。\n\n**热解法**：通过高温热分解离复合材料，已工业化但会严重降低玻璃纤维物理性能，回收纤维品质和成本均不如原生纤维。\n\n**水泥窑共处理**：目前最成熟的叶片处理方式，将复合材料作为燃料焚烧，残渣并入水泥熟料，但水泥行业产能有限无法独力消化全部废料。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Wind turbines: can we make blades recyclable?](https://www.polytechnique-insights.com/en/columns/energy/wind-turbines-can-we-make-blades-recyclable/?utm_source=brevo\u0026utm_campaign=newsletter195en\u0026utm_medium=email\u0026utm_id=128) |\n| 作者 | Amandine Volard |\n| 发表日期 | 2023-01-11 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"wind-turbine-blade-recyclability\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"wind-turbine-blade-recyclability\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"wind-turbine-blade-recyclability\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/wind-turbine-blade-recyclability\",\"href\":\"/whatsup/tldr/hn-2026-p3/wind-turbine-blade-recyclability\",\"category\":\"tldr\",\"title\":\"风力发电机叶片能否实现可回收\",\"date\":\"2023-01-11\",\"excerpt\":\"风力发电机叶片由复合材料制成难以回收，行业正通过化学回收工艺和可回收叶片设计寻求解决方案。\",\"coverImage\":\"$undefined\",\"author\":\"Amandine Volard\",\"original\":\"Wind turbines can we make blades recyclable?.md\",\"originalUrl\":\"https://www.polytechnique-insights.com/en/columns/energy/wind-turbines-can-we-make-blades-recyclable/?utm_source=brevo\u0026utm_campaign=newsletter195en\u0026utm_medium=email\u0026utm_id=128\",\"score\":\"78\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"风力发电机叶片能否实现可回收\",\"excerpt\":\"风力发电机叶片由复合材料制成难以回收，行业正通过化学回收工艺和可回收叶片设计寻求解决方案。\",\"date\":\"2023-01-11\",\"category\":\"tldr\",\"author\":\"Amandine Volard\",\"original\":\"Wind turbine
