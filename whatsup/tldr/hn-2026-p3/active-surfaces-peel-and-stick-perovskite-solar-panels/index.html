紫外灯固化环氧树脂封装，制成仅15微米厚的柔性太阳能薄膜。该薄膜发电效率与硅电池相当，耐久性超十年，且安装方式类似铺设屋顶卷材，极大降低了占总成本一半的安装费用。\n\n商业模式上，公司采用卷对卷连续印刷工艺，设备投资低、生产速度快，使分布式区域化制造成为可能。这打破了硅基太阳能几乎由中国垄断制造的局面，让各国能够建立本土化的能源供应链。\n\n## 核心概念及解读\n**钙钛矿太阳能电池**：一类低成本、轻质、柔性的光电材料，光电转换效率高，被视为硅基太阳能的下一代替代技术。\n\n**卷对卷制造**：一种高速连续印刷工艺，将材料从卷轴展开、加工后重新卷绕，适合低成本大规模生产柔性电子器件。\n\n**分布式制造模式**：区别于集中式大工厂生产，该模式允许在各地建立小型产线，减少供应链依赖，类似汽车产业的区域化布局。\n\n**硅基太阳能的安装成本瓶颈**：传统硅面板笨重易碎，需专业支架和人工安装，安装费用常占总成本一半，是光伏普及的重要障碍。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Active Surfaces aims to install peel-and-stick solar panels everywhere](https://news.mit.edu/2026/active-surfaces-aims-to-install-peel-and-stick-solar-panels-everywhere-0324) |\n| 作者 | Nancy W. Stauffer ｜ MIT Energy Initiative |\n| 发表日期 | 2026-03-25 |\n| 评分 | 83/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"active-surfaces-peel-and-stick-perovskite-solar-panels\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"active-surfaces-peel-and-stick-perovskite-solar-panels\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"active-surfaces-peel-and-stick-perovskite-solar-panels\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/active-surfaces-peel-and-stick-perovskite-solar-panels\",\"href\":\"/whatsup/tldr/hn-2026-p3/active-surfaces-peel-and-stick-perovskite-solar-panels\",\"category\":\"tldr\",\"title\":\"MIT初创公司研发可粘贴钙钛矿太阳能薄膜\",\"date\":\"2026-03-25\",\"excerpt\":\"MIT衍生初创公司Active Surfaces开发基于钙钛矿的超薄柔性太阳能薄膜，可像贴纸一样粘贴于任意表面，以低成本卷对卷工艺颠覆传统硅基光伏。\",\"coverImage\":\"$undefined\",\"author\":\"Nancy W. Stauffer ｜ MIT Energy Initiative\",\"original\":\"Active Surfaces aims to install peel-and-stick solar panels everywhere.md\",\"originalUrl\":\"https://news.mit.edu/2026/active-surfaces-aims-to-install-peel-and-stick-solar-panels-everywhere-0324\",\"score\":\"83\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$unde
