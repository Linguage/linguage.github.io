问博士生合作。团队还探索机器视觉和大语言模型在视频处理中的应用，体现了MIT技术创新与艺术实践结合的特色。\n\n文章指出，西方主流戏剧长期以白人男性为主导，Scheib希望通过引入赖声川等非西方剧作家的作品，拓宽戏剧经典的边界。《如梦之梦》讲述一个临终之人通过讲述自己故事寻求慰藉的旅程，无论上演莎士比亚还是赖声川，都应该像今天刚写就一样引起共鸣。\n\n## 核心概念及解读\n**21T.100课程**（21T.100 Theater Arts Production）：MIT戏剧艺术课程体系中的实践巅峰，让学生参与从排练到公演的完整制作流程。\n\n**360度现场电影**（Live 360-degree Film）：通过精心编排的摄像机和舞台上方投影，让观众同时体验电影与舞台表演的双重艺术形式。\n\n**圆形舞台设计**（Circular Stage Design）：中央设置可旋转观众席，打破传统观演关系，让观众成为故事不可或缺的组成部分。\n\n**戏剧经典拓展**（Expanding Theater Canon）：引入赖声川等非西方剧作家的作品，挑战以白人男性为主导的西方戏剧传统。\n\n**机器视觉在戏剧中的应用**（Machine Vision in Theater）：探索计算机视觉技术、大语言模型等工具在实时视频处理和舞台效果中的创新运用。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Bringing the stage to the classroom](https://news.mit.edu/2026/bringing-the-stage-to-the-classroom-0212) |\n| 作者 | Benjamin Daniel  |  School of Humanities |\n| 发表日期 | 2026-02-13 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"mit-theater-arts-production-classroom\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"mit-theater-arts-production-classroom\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"mit-theater-arts-production-classroom\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/mit-theater-arts-production-classroom\",\"href\":\"/whatsup/tldr/hn-2026-p3/mit-theater-arts-production-classroom\",\"category\":\"tldr\",\"title\":\"MIT如何将舞台带入课堂\",\"date\":\"2026-02-13\",\"excerpt\":\"MIT通过21T.100戏剧制作课程让学生参与完整舞台制作，2025年秋季推出赖声川《如梦之梦》，采用圆形舞台和360度实时电影技术，融合技术创新与文化对话。\",\"coverImage\":\"$undefined\",\"author\":\"Benjamin Daniel  |  School of Humanities\",\"original\":\"Bringing the stage to the classroom.md\",\"originalUrl\":\"https://news.mit.edu/2026/bringing-the-stage-to-the-classroom-0212\",\"score\":\"$undefined\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"MIT如何将舞台带入课堂\",\"excerpt\":\"MIT通过21T.100戏剧制作课程让学生参
