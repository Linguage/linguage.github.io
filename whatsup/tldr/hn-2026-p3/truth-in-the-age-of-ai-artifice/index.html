友取代大众明星，再到专业网红取代真实朋友，随后是推荐系统长尾内容取代专业网红，最终走向AI内容取代人类内容。作者警告这一进程正在瓦解共识现实和公民社会，因为人们不再关心真相，只需更大声地宣示自己的真理。\n\n技术更新部分涵盖两大主题：一是阿里巴巴Qwen 3.5小模型系列（0.8B到9B参数）的发布，主打端侧部署、长上下文支持和多模态能力；二是代码代理领域的新进展，包括Codex 5.3的基准测试表现、可用性成为新前沿、以及AGENTS.md等工具在提升代理可靠性方面的实证效果。\n\n核心概念及解读:\n**过滤气泡**：算法根据用户偏好推送信息，使人们处于信息茧房中，难以获取客观真相。\n\n**死互联网理论**：指互联网大部分内容和互动由AI生成，真实人类活动逐渐被取代的现象。\n\n**AGENTS.md**：一种为AI代理提供项目上下文和指导的文档规范，经实测可减少约28.6%的运行时间和16.6%的token消耗。\n\n**可用性即新前沿**：在AI时代，系统稳定性和正常运行时间成为比模型质量更重要的竞争要素。\n\n**九个九的可用性**：指99.9999999%的系统正常运行时间，成为AI代理产品追求的新目标。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [[AINews] Truth in the time of Artifice](https://www.latent.space/p/ainews-truth-in-the-time-of-artifice?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=189736802\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Latent.Space |\n| 发表日期 | 2026-03-03 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"truth-in-the-age-of-ai-artifice\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"truth-in-the-age-of-ai-artifice\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"truth-in-the-age-of-ai-artifice\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/truth-in-the-age-of-ai-artifice\",\"href\":\"/whatsup/tldr/hn-2026-p3/truth-in-the-age-of-ai-artifice\",\"category\":\"tldr\",\"title\":\"AI时代的真相危机\",\"date\":\"2026-03-03\",\"excerpt\":\"本文通过Cursor ARR传闻、Ars Technica记者造假丑闻等案例，揭示了AI时代虚假信息泛滥导致的信任危机，分析了社交媒体从真实社交向AI内容演进的历程，并分享了Qwen 3.5小模型和代码代理可靠性提升的技术动态。\",\"coverImage\":\"$undefined\",\"author\":\"Latent.Space\",\"original\":\"AINews Truth in the time of Artifice.md\",\"originalUrl\":\"https://www.latent.space/p/ainews-truth-in-the-time-of-artifice?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=189736802\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u002
