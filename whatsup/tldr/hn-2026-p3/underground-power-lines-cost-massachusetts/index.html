州能源成本已引发担忧的背景下，此举更难获得支持。\n\n文章进一步指出地下线路的隐性缺陷。除挖掘施工、管道维修等人为破坏风险外，洪水和啮齿动物也可能损坏地下线缆。故障定位耗时漫长，修复需重新开挖路面，对交通和社会运行的干扰不亚于架空线路故障。专家最终建议采取针对性策略，优先对电网中最关键的线路进行成本效益评估后再决定是否地下化。\n\n## 核心概念及解读\n**地下化配电线路**：将沿街连接用户的低压电线埋入地下，成本为架空线路的2至10倍，城市密集区已普遍采用，郊区因距离远而经济性差。\n\n**高压输电线路地下化**：长距离输送电力的超高压线路埋地施工，造价可达架空线路的10至15倍，是地下化方案中最昂贵的部分。\n\n**针对性地下化策略**：不对全部线路进行地下化，而是识别电网中最关键的脆弱节点，逐一进行成本效益分析后优先处理，兼顾韧性与经济可行性。\n\n**地下线路维护困境**：地下线缆虽免受风暴树枝威胁，却面临挖掘施工损坏、洪水侵蚀等风险，且故障定位困难、修复需重新开挖，维护成本和时间成本均显著高于架空线路。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [With so many storm outages, why dont we put more power lines underground in Mass.?](https://www.wbur.org/news/2026/02/26/underground-power-lines-outages-electricity-utility-blizzard-hurricane) |\n| 作者 | Miriam Wasser |\n| 发表日期 | 2026-02-26 |\n| 评分 | 72/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"underground-power-lines-cost-massachusetts\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"underground-power-lines-cost-massachusetts\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"underground-power-lines-cost-massachusetts\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/underground-power-lines-cost-massachusetts\",\"href\":\"/whatsup/tldr/hn-2026-p3/underground-power-lines-cost-massachusetts\",\"category\":\"tldr\",\"title\":\"马萨诸塞州为何不大规模将电力线路埋入地下\",\"date\":\"2026-02-26\",\"excerpt\":\"文章探讨马萨诸塞州为何不大规模将电线埋入地下，核心原因是成本高昂、维修困难，专家建议采取针对性策略而非全面地下化。\",\"coverImage\":\"$undefined\",\"author\":\"Miriam Wasser\",\"original\":\"With so many storm outages, why dont we put more power lines underground in Mass.?.md\",\"originalUrl\":\"https://www.wbur.org/news/2026/02/26/underground-power-lines-outages-electricity-utility-blizzard-hurricane\",\"score\":\"72\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"马萨诸塞州为何不大规模将电力线路埋入地下\",\"ex
