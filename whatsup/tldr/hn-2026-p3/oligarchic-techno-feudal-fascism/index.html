金。  \n**威权主义国际**（Authoritarian International）：跨国寡头、政客、安全官员和犯罪分子的松散联盟，跨国家跨意识形态合作以牟利并规避问责。  \n**二十一世纪 fascism**（Twenty-First-Century Fascism）：罗宾逊描述的现代 fascism 形式，依靠全球警察国家、边境军事化和数字监控来管理\"剩余\"人口。  \n**寡头捕获**（Oligarchic Capture）：公共政策日益反映富豪捐赠者偏好而非多数选民意愿的权力集中模式。  \n**工业文明危机**（Crisis of Industrial Civilization）：生态超调、气候混乱和资源约束削弱了曾支撑自由民主的无限增长承诺。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [America’s Oligarchic Techno‑Feudal Elite Are Attempting to Build a Twenty‑First‑Century Fascist State](https://collapseofindustrialcivilization.com/2026/02/16/americas-oligarchic-techno-feudal-elite-are-attempting-to-build-a-twenty-first-century-fascist-state/) |\n| 作者 | xraymike79 |\n| 发表日期 | 2026-02-17 |\n| 评分 | 75/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"oligarchic-techno-feudal-fascism\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"oligarchic-techno-feudal-fascism\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"oligarchic-techno-feudal-fascism\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/oligarchic-techno-feudal-fascism\",\"href\":\"/whatsup/tldr/hn-2026-p3/oligarchic-techno-feudal-fascism\",\"category\":\"tldr\",\"title\":\"技术封建主义与二十一世纪法西斯威胁\",\"date\":\"2026-02-17\",\"excerpt\":\"本文揭示美国正被一个跨国寡头技术封建精英阶层引向二十一世纪法西斯主义，他们通过掏空民主制度、建立数字监控平台和打造威权主义国际网络来集中权力。\",\"coverImage\":\"$undefined\",\"author\":\"xraymike79\",\"original\":\"Americas Oligarchic Techno‑Feudal Elite Are Attempting to Build a Twenty‑First‑Century Fascist State.md\",\"originalUrl\":\"https://collapseofindustrialcivilization.com/2026/02/16/americas-oligarchic-techno-feudal-elite-are-attempting-to-build-a-twenty-first-century-fascist-state/\",\"score\":\"75\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"技术封建主义与二十一世纪法西斯威胁\",\"excerpt\":\"本文揭示美国正被一个跨国寡头技术封建精英阶层引向二十一世纪法西斯主
