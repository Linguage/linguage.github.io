值得行业关注，并提及Anthropic内部的增长策略团队。\n\n第二部分转向AI Twitter生态中关于ARC-AGI-3基准测试的深度讨论。该基准由Francois Chollet团队推出，采用交互式谜题环境设计，人类可达满分而前沿模型得分不足1%。争议焦点集中在效率评分机制是否过于严苛，以及与先前ARC版本的可比性问题。\n\n第三部分梳理了代理基础设施赛道的集中爆发：LangChain推出可共享技能注册表，Anthropic披露Claude Code自动模式的技术细节，Cursor发布自托管云代理，Sierra推出面向客服场景的Ghostwriter。这些产品共同指向一个趋势——代理正在从提示词封装演变为可训练、可部署的应用系统。\n\n最后一部分简要汇总了模型与研究的最新动态，包括Google Lyria 3音乐生成平台的扩展、美团LongCat-Next多模态模型，以及世界模型和自我改进代理等前沿研究主题。\n\n## 核心概念及解读\n**Claude Cowork Dispatch**：Anthropic推出的协作调度产品，集成Computer Use能力，一周内连发多个功能模块，市场反响远超以往任何发布。\n\n**ARC-AGI-3**：由Chollet团队推出的交互式基准测试，在谜题游戏环境中衡量系统的零准备泛化能力，当前前沿模型得分不足1%，评分机制围绕效率而非单纯完成率设计。\n\n**代理技能与编排**：以LangChain Fleet、Cursor自托管代理、Sierra Ghostwriter为代表，将可复用技能、沙箱执行和可训练代理打包为标准化产品原语，推动代理从助手向应用入口演进。\n\n**Claude Code Auto Mode**：采用分类器介导的审批机制，在完全手动确认与无约束自主之间取得平衡，已在Anthropic内部广泛使用并面向Team用户开放。\n\n---\n\n## 原文信息\n\n| 字段   | 内容                                                                                                                                                                                 |\n| ---- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| 原文   | [[AINews] The Biggest Claude Launch of All Time](https://www.latent.space/p/ainews-the-biggest-claude-launch?utm_campaign=email-post\u0026r=7am0bi\u0026utm_source=substack\u0026utm_medium=email) |\n| 作者   | Latent.Space                                                                                                                                                                       |\n| 发表日期 | 2026-03-26                                                                                                                                                                         |\n| 评分   | 78/100                                                                                                                                                                             |\n\n- \":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"ARC-AGI-3\"}],\"：由Chollet团队推出的交互式基准测试，在谜题游戏环境中衡量系统的零准备泛化能力，当前前沿模型得分不足1%，评分机制围绕效率而非单纯完成率设计。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"代理技能与编排\"}],\"：以LangChain Fleet、Cursor自托管代理、Sierra Ghostwriter为代表，将可复用技能、沙箱执行和可训练代理打包为标准化产品原语，推动代理从助手向应用入口演进。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Claude Code Auto Mode\"}],\"：采用分类器介导的审批机制，在完全手动确认与无约束自主之间取得平衡，已在Anthropic内部广泛使用并面向Team用户开放。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"原文信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#原文信息\",\"children\":\"原文信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原文\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://www.latent.space/p/ainews-the-biggest-claude-launch?utm_campaign=email-post\u0026r=7am0bi\u0026utm_source=sub
