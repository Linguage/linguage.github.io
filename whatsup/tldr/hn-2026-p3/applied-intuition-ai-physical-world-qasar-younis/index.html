关于公司文化，Qasar提出了四条核心原则：速度高于一切、保持幽默感、跟进是工作的另一半、永远不让客户失望。这些价值观构成了Applied Intuition在B2B领域持续增长的基石。同时他坦诚分享了自己近十年保持低调的原因，但也明确表示大多数创业者不应效仿这一策略。\n\n在对全球AI格局的分析中，Qasar对中国AI能力提出了独到见解，认为简单将中美公司进行对比存在根本性偏差。他还分享了在YC期间的关键洞察——最成功的公司往往很早就展现出增长势头，以及通过阅读经典著作来培养判断力的方法论。\n\n## 核心概念及解读\n**物理世界AI革命**：未来AI最大的影响不在软件层面，而在于采矿、农业、建筑等实体产业的深度改造，这些领域体量巨大且技术渗透率仍然很低。\n\n**低调创业策略**：Applied Intuition近十年几乎不在公众视野中出现，专注于产品和客户交付，但这并不适合大多数创业者，需要根据行业特性判断。\n\n**速度高于一切**：公司核心价值观之一，强调在执行层面将速度视为最高优先级，快速迭代和交付比完美主义更重要。\n\n**经典阅读培养品味**：通过阅读经过时间检验的旧书来构建判断力和审美，而非追逐当下流行的商业书籍，这与Charlie Munger的理念一致。\n\n**早期增长势头**：在Y Combinator观察到最成功的企业在极早期就呈现出明显的增长信号，创业早期的验证至关重要。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The most successful AI company youve never heard of ｜ Qasar Younis](https://www.lennysnewsletter.com/p/the-most-successful-ai-company-youve-never-heard-of?utm_source=post-email-title\u0026publication_id=10845\u0026post_id=189615019\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Lenny Rachitsky |\n| 发表日期 | 2026-03-08 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"applied-intuition-ai-physical-world-qasar-younis\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"applied-intuition-ai-physical-world-qasar-younis\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"applied-intuition-ai-physical-world-qasar-younis\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/applied-intuition-ai-physical-world-qasar-younis\",\"href\":\"/whatsup/tldr/hn-2026-p3/applied-intuition-ai-physical-world-qasar-younis\",\"category\":\"tldr\",\"title\":\"低调建造150亿美元AI公司的幕后哲学\",\"date\":\"2026-03-08\",\"excerpt\":\"Applied Intuition CEO Qasar Younis 分享如何低调打造150亿美元AI公司，以及为何真正的AI革命将发生在物理世界而非软件领域。\",\"coverImage\":\"$undefined\",\"author\":\"Lenny Rachitsky\",\"original\":\"The most successful AI company youve never heard of Qasar Younis.md\",\"originalUrl\":\"https://w
