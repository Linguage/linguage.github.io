指出问题不仅仅是模型从文本生成SQL的能力不足。通过收入增长查询案例，说明了代理面临的双重挑战：一是如何理解收入、季度等业务定义，二是如何确定正确的数据源和真相来源。现有语义层往往过时、不完整，无法提供代理所需的上下文。\n\n最后文章提出上下文层解决方案，它是对传统语义层的扩展。上下文层不仅包含指标定义，还包括规范实体、身份解析、部落知识解析和治理指导等。它将企业所有分散数据整合起来，添加业务逻辑上下文层，打包供给代理使用，使代理能够真正实现自主工作。\n\n## 核心概念及解读\n**上下文层**（Context Layer）：整合企业所有分散数据和业务逻辑的中间层，为AI代理提供业务定义、数据源位置和部落知识等完整上下文。\n\n**语义层**（Semantic Layer）：传统BI中定义指标如收入、流失率等的层，通常由数据团队手工构建，语法特定且直接连接BI工具，无法满足代理自主性需求。\n\n**现代数据堆栈**（Modern Data Stack）：过去十年数据架构的演进，通过数据摄取、转换、仓库和存储的集中化，使数据快速可访问，团队可以通过SQL进行数据分析。\n\n**代理自主性**（Agent Autonomy）：AI代理在没有人工干预情况下独立理解和执行任务的能力，需要完整的业务上下文而不仅仅是指标定义。\n\n**部落知识**（Tribal Knowledge）：存在于组织内部、非文档化的隐含知识，如业务逻辑、决策流程和工作惯例，对于代理理解企业运作至关重要。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Your Data Agents Need Context](https://www.a16z.news/p/your-data-agents-need-context) |\n| 作者 | Jason Cui |\n| 发表日期 | 2026-03-10 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"data-agents-need-context\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"data-agents-need-context\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"data-agents-need-context\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/data-agents-need-context\",\"href\":\"/whatsup/tldr/hn-2026-p3/data-agents-need-context\",\"category\":\"tldr\",\"title\":\"数据代理需要上下文层才能工作\",\"date\":\"2026-03-10\",\"excerpt\":\"文章探讨了数据和分析AI代理在企业部署中失败的核心原因：缺乏业务上下文。现代数据堆栈虽然实现了数据集中，但企业数据仍然分散且混乱，导致代理无法理解业务定义、数据源和部落知识。文章提出上下文层作为解决方案，它超越传统语义层，提供业务逻辑、实体识别和治理指导等综合上下文。\",\"coverImage\":\"$undefined\",\"author\":\"Jason Cui\",\"original\":\"Your Data Agents Need Context.md\",\"originalUrl\":\"https://www.a16z.news/p/your-data-agents-need-context\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"数据代理需要上下文层才能工作\",\"excerpt\":\"文章探讨了数据和分析AI代理在企业部署中失败的核心原因：缺乏业务上下文。现代数据堆栈虽然实现了数据集中，但企业数据仍然分散且混
