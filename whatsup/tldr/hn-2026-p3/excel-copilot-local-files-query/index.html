lot会检测到变更并提示更新。\n\n文章还列出了版本要求，Windows用户需2511版本以上，Mac用户需16.104版本以上，并需具备Copilot Chat eligible的Microsoft 365订阅。作者在评论区补充说明网络共享路径同样视为本地存储，并指引用户查询订阅资格列表。\n\n## 核心概念及解读\n**Copilot Chat**：微软365中的AI聊天功能，可分析Excel数据并回答用户问题，支持本地和云端文件。\n\n**本地文件（Local Files）**：存储在本地磁盘或网络共享路径的Excel文件，包括.xlsx、.xlsb、.xlsm、.ods等现代格式。\n\n**离线生产力**：即使没有网络连接，用户仍可使用Copilot分析本地文件，突破网络限制。\n\n**版本要求**：功能仅在特定版本以上可用，Windows为2511(Build 19530.20108)，Mac为16.104(Build 25121423)。\n\n**数据同步机制**：用户修改数据后需保存，Copilot会检测变更并提示刷新，确保分析基于最新版本。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Query your local Excel files with Copilot Chat](https://techcommunity.microsoft.com/blog/Microsoft365InsiderBlog/query-your-local-excel-files-with-copilot-chat/4496458) |\n| 作者 | Prash_MSFT |\n| 发表日期 | 2026-02-25 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"excel-copilot-local-files-query\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"excel-copilot-local-files-query\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"excel-copilot-local-files-query\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/excel-copilot-local-files-query\",\"href\":\"/whatsup/tldr/hn-2026-p3/excel-copilot-local-files-query\",\"category\":\"tldr\",\"title\":\"Copilot Chat支持查询本地Excel文件\",\"date\":\"2026-02-25\",\"excerpt\":\"微软宣布Copilot Chat现在支持查询本地存储的Excel文件，用户可在离线状态下分析.xlsx、.xlsb、.xlsm、.ods格式的工作簿，突破了此前仅支持云端文件的限制。\",\"coverImage\":\"$undefined\",\"author\":\"Prash_MSFT\",\"original\":\"Query your local Excel files with Copilot Chat.md\",\"originalUrl\":\"https://techcommunity.microsoft.com/blog/Microsoft365InsiderBlog/query-your-local-excel-files-with-copilot-chat/4496458\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Copilot Chat支持查询本地Excel文件\",\"excerpt\":\"微软宣布Copilot Chat现在支持查询本地存储的Excel文件，用户可在离线状
