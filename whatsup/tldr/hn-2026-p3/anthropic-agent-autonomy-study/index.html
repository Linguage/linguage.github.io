aude主动请求澄清的情况及其频率分布。\n\n文章最后回顾了AI Twitter上的相关讨论，涵盖Claude 4.6、Qwen 3.5、GLM-5、Gemini 3.1 Pro等模型的更新，以及Agentic编码工具如Cursor和LangChain的进展。强调了工程架构对Agent性能的影响，相同模型在不同编排框架下可产生1.7倍的性能差异。\n\n## 核心概念及解读\n\n**自主性**（Autonomy）：指AI Agent在无需人工干预情况下独立完成任务的能力，Anthropic数据显示这由模型、用户和产品共同塑造。\n\n**人机协同**（Human-in-the-loop）：约73%的工具调用涉及人工监督，只有0.8%的操作被视为不可逆转，体现了实际使用中的人工参与度。\n\n**METR评估**：与Anthropic实测不同，METR测量的是任务难度即人类等效工作时间，而非模型实际运行时长，两者呈现不同趋势。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [[AINews] Anthropics Agent Autonomy study](https://www.latent.space/p/ainews-anthropics-agent-autonomy?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=188466009\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Latent.Space |\n| 发表日期 | 2026-02-19 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"anthropic-agent-autonomy-study\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"anthropic-agent-autonomy-study\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"anthropic-agent-autonomy-study\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/anthropic-agent-autonomy-study\",\"href\":\"/whatsup/tldr/hn-2026-p3/anthropic-agent-autonomy-study\",\"category\":\"tldr\",\"title\":\"Anthropic发布Agent自主性实测数据\",\"date\":\"2026-02-19\",\"excerpt\":\"Anthropic发布Claude Code使用数据研究，揭示AI Agent自主性在实践中如何演变，涵盖编码时间、用户信任度和人机协作模式等关键指标。\",\"coverImage\":\"$undefined\",\"author\":\"Latent.Space\",\"original\":\"AINews Anthropics Agent Autonomy study.md\",\"originalUrl\":\"https://www.latent.space/p/ainews-anthropics-agent-autonomy?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=188466009\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"la king-aware navigation system could prevent frustration and emissions.md\",\"originalUrl\":\"https://news.mit.edu/2026/parking-aware-navigation-could-prevent-frustration-and-emissions-0219\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/parking-aware-navigation-system.md\"}},\"headings\":[{\"depth\":2,\"text\":\"摘要\",\"id\":\"摘要\"},{\"depth\":2,\"text\":\"内容框架与概述\",\"id\":\"内容框架与概述\"},{\"depth\":2,\"text\":\"核心概念及解读\",\"id\":\"核心概念及解读\"},{\"depth\":2,\"text\":\"原文信息\",\"id\":\"原文信息\"}],\"sidebar\":null,\"directoryHref\":\"/whatsup?tab=tldr\",\"children\":\"$L18\"}]\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Anthropic发布Measuring AI agent autonomy in practice研究报告，基于数百万次工具调用分析Claude Code使用模式。数据显示软件工程占工具调用的约50%，用户自主批准率随经验从20%提升至50%以上，中位交互时长稳定在45秒左右。研究强调自主性由模型、用户和产品共同构建，而非单一技术指标决定。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章首先介绍Anthropic对其API使用模式的研究，重点分析Claude Code的自主性演变趋势。数据显示从9月到1月，平均自主编码时间从25分钟增长至45分钟以上，尽管在2月用户量激增时有所回落。研究对比了Anthropic实测数据与METR评估方法的差异，指出METR测量的是人类等效工作时间，而非模型实际运行时长。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"研究发现Claude Code的中位交互时长约为45秒，且这一数字在过去几个月保持相对稳定。新用户最初只有20%的自动批准率，但随着经验积累会提升至50%以上，同时也会更频繁地中断Agent执行。研究还详细记录了Claude主动请求澄清的情况及其频率分布。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章最后回顾了AI Twitter上的相关讨论，涵盖Claude 4.6、Qwen 3.5、GLM-5、Gemini 3.1 Pro等模型的更新，以及Agentic编码工具如Cursor和LangChain的进展。强调了工程架构对Agent性能的影响，相同模型在不同编排框架下可产生1.7倍的性能差异。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"自主性\"}],\"（Autonomy）：指AI Agent在无需人工干预情况下独立完成任务的能力，Anthropic数据显示这由模型、用户和产品共同塑造。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"人机协同\"}],\"（Human-in-the-loop）：约73%的工具调用涉及人工监督，只有0.8%的操作被视为不可逆转，体现了实际使用中的人工参与度。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"METR评估\"}],\"：与Anthropic实测不同，METR测量的是任务难度即人类等效工作时间，而非模型实际运行时长，两者呈现不同趋势。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"原文信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#原文信息\",\"children\":\"原文信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]
