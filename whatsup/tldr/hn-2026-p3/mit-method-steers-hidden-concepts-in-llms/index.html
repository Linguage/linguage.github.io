问题。团队强调该方法既可用于发现和修补漏洞，也能用于强化特定能力。\n\n## 核心概念及解读\n**递归特征机器（RFM）**：一种预测建模算法，能直接识别数据中的特征模式，利用神经网络隐式学习机制的数学原理实现高效特征提取。\n\n**概念操控（Steering）**：通过数学扰动调整模型中特定概念的激活强度，从而增强或削弱该概念在生成内容中的表现。\n\n**抽象概念表征**：LLM在处理语言过程中，以数值矩阵形式编码的偏见、情绪、人格等隐性知识，不通过提示词即可被提取和调控。\n\n**反拒绝（Anti-refusal）**：一种可被识别的概念模式，激活后可使模型绕过安全限制，回答本应拒绝的危险提问，揭示了模型安全的脆弱面。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Exposing biases, moods, personalities, and abstract concepts hidden in large language models](https://news.mit.edu/2026/exposing-biases-moods-personalities-hidden-large-language-models-0219) |\n| 作者 | Jennifer Chu ｜ MIT News |\n| 发表日期 | 2026-02-20 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"mit-method-steers-hidden-concepts-in-llms\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"mit-method-steers-hidden-concepts-in-llms\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"mit-method-steers-hidden-concepts-in-llms\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/mit-method-steers-hidden-concepts-in-llms\",\"href\":\"/whatsup/tldr/hn-2026-p3/mit-method-steers-hidden-concepts-in-llms\",\"category\":\"tldr\",\"title\":\"MIT新方法揭示并操纵大模型中的隐藏概念\",\"date\":\"2026-02-20\",\"excerpt\":\"MIT团队开发出基于递归特征机器的方法，能精准识别并操纵大型语言模型中隐藏的偏见、情绪、人格等抽象概念，以提升模型安全性与可控性。\",\"coverImage\":\"$undefined\",\"author\":\"Jennifer Chu ｜ MIT News\",\"original\":\"Exposing biases, moods, personalities, and abstract concepts hidden in large language models.md\",\"originalUrl\":\"https://news.mit.edu/2026/exposing-biases-moods-personalities-hidden-large-language-models-0219\",\"score\":\"88\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"MIT新方法揭示并操纵大模型中的隐藏概念\",\"excerpt\":\"MIT团队开发出基于递归特征机器的方法，能精准识别并操纵大型语言模型中隐藏的偏见、情绪、人格等抽象概念，以提升模型安全性与可控性。\",\"date\":\"2026-02-20\",\"category\":\"tldr\",\"auth
