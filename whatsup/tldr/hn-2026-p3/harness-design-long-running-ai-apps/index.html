迭代持续推动生成器产出更独特的视觉方案。\n\n随后文章将生成器-评估器循环扩展到全栈应用开发。规划器将简短需求扩展为完整产品规格，生成器按功能逐步实现，评估器通过自动化测试验证每个功能点。以复古游戏编辑器为例，该架构产出功能完整、核心可用的应用，而同等提示下单代理模式的核心功能完全无法工作。\n\n最后文章讨论了随模型能力升级而简化框架的思路。在更新模型上移除了分块机制后，构建器仍能连续工作超过两小时而不失连贯性。作者强调，随着模型进步，框架不会变得无足轻重，而是需要持续演进以探索新的能力边界。\n\n## 核心概念及解读\n\n**上下文焦虑**：模型接近上下文窗口限制时过早收尾工作的倾向，即使实际仍有充足空间，这一行为严重阻碍长时任务的连贯执行。\n\n**生成器-评估器循环**：受 GAN 启发的多智能体架构，将工作执行与质量评判分离为独立代理，评估器通过具体评分标准驱动生成器迭代改进，有效克服 AI 对自身产出的过度宽容。\n\n**Sprint 合约**：生成器与评估器在每轮开发前就交付物和验收标准达成一致，弥合高层需求规格与可测试实现之间的鸿沟，确保开发方向与产品意图对齐。\n\n**评分标准工程**：将主观判断转化为具体可量化的评分维度，如将设计美感分解为设计质量、原创性、工艺和功能性四项指标，使 AI 能够对模糊领域进行有意义的评估和迭代。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Harness design for long-running application development](https://www.anthropic.com/engineering/harness-design-long-running-apps) |\n| 作者 |  |\n| 发表日期 | 2026-03-24 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"harness-design-long-running-ai-apps\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"harness-design-long-running-ai-apps\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"harness-design-long-running-ai-apps\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/harness-design-long-running-ai-apps\",\"href\":\"/whatsup/tldr/hn-2026-p3/harness-design-long-running-ai-apps\",\"category\":\"tldr\",\"title\":\"受 GAN 启发的多智能体架构：长时间自主应用开发实践\",\"date\":\"2026-03-24\",\"excerpt\":\"Anthropic Labs 提出 GAN 启发的多智能体架构，通过生成器与评估器循环实现 AI 代理长时间自主完成高质量全栈应用开发，显著提升自主编码能力。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"Harness design for long-running application development.md\",\"originalUrl\":\"https://www.anthropic.com/engineering/harness-design-long-running-apps\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"受 GAN 启发的多智能体架构：长时间自主应用开发实践\",\"excerpt\":\"Anthropic Labs
