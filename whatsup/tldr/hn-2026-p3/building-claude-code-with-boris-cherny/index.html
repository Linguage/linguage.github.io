移的实践，以及通过因果分析量化代码质量对工程生产力影响的研究成果。这些经验深刻影响了 Claude Code 的设计哲学。随后转入 Claude Code 的诞生历程，从一个内部副项目逐步演变为 Anthropic 的核心工具。Boris 详细披露了他的日常工作流——在五个终端标签页中并行运行 Claude 实例，先在规划模式下迭代方案，再让模型一次性完成实现。\n\n技术架构部分揭示了几个反直觉的设计决策：Claude Code 的代码搜索并非依赖 RAG 或向量数据库，而是由模型驱动的 glob 和 grep 组合，这一方案击败了所有更复杂的替代方案。团队还围绕安全性投入了大量工程精力，包括构建沙盒虚拟机和针对非技术用户的全新权限模型，支撑了 Claude Cowork 在约十天内快速交付。\n\n文章最后将视角拉远至行业层面。Boris 提出中世纪抄写员与印刷术发明的类比，认为软件工程师正经历类似转变——编码门槛降低并不意味着岗位消亡，而是角色重塑。工程师的核心价值正从编写代码转向管理多个并行 Agent、快速切换上下文以及跨产品、设计和基础设施的全栈思考。\n\n## 核心概念及解读\n**并行 Agent 工作流**：Boris 同时运行五个独立的 Claude Code 实例，每个处理不同任务，先规划后一次性实现，日均产出 20-30 个 PR。\n\n**Agentic Search**：Claude Code 的代码检索不依赖 RAG 或向量索引，而是由模型自主调用 glob 和 grep，简单方案反而胜出，灵感来源于工程师在工具失效时的自然搜索行为。\n\n**原型驱动开发**：Claude Code 团队用大量可运行原型替代传统 PRD 和静态设计稿，在快速迭代中验证产品方向，而非依赖文档规范。\n\n**抄写员类比**：中世纪抄写员在印刷术发明后并未消失，而是转型为作家和作者。Boris 认为软件工程师可能面临相似路径——编码民主化将扩大而非缩小创造性工作的市场。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Building Claude Code with Boris Cherny](https://newsletter.pragmaticengineer.com/p/building-claude-code-with-boris-cherny?utm_source=post-email-title\u0026publication_id=458709\u0026post_id=189707865\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Gergely Orosz |\n| 发表日期 | 2026-03-05 |\n| 评分 | 84/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"building-claude-code-with-boris-cherny\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"building-claude-code-with-boris-cherny\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"building-claude-code-with-boris-cherny\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/building-claude-code-with-boris-cherny\",\"href\":\"/whatsup/tldr/hn-2026-p3/building-claude-code-with-boris-cherny\",\"category\":\"tldr\",\"title\":\"Claude Code 之父谈 AI 编程工具的构建与工程师角色重塑\",\"date\":\"2026-03-05\",\"excerpt\":\"Anthropic Claude Code 创造者 Boris Cherny 分享 AI 编程工具的构建理念、并行 Agent
