库的最佳实践；Generator利用assets/和references/目录分离模板与规则，强制标准化输出；Reviewer将审查标准外置到checklist文件，实现检查逻辑的复用；Inversion通过强制分阶段提问避免Agent过早猜测需求；Pipeline引入硬性门控条件确保多步骤流程不被跳过。每种模式都配有具体的SKILL.md代码示例。\n\n## 核心概念及解读\n**工具包装器**（Tool Wrapper）：将特定库的文档封装为Skill，Agent仅在实际使用时加载相关上下文，避免系统提示过于臃肿。\n\n**生成器模式**（Generator）：分离模板资产与风格指南，由Skill充当协调者执行填空式文档生成，确保输出结构一致性。\n\n**审查器模式**（Reviewer）：将审查标准外置到模块化checklist文件，通过严重程度分组输出发现，支持检查规则的热插拔切换。\n\n**反转模式**（Inversion）：Agent从被动执行转变为主动提问，通过强制分阶段 gating 机制要求用户完整回答后才进入最终合成阶段。\n\n**管道模式**（Pipeline）：在多步骤工作流中嵌入硬性检查点（如用户审批门控），利用不同目录按需加载资源，保持上下文窗口精简。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [5 Agent Skill design patterns every ADK developer should know](https://x.com/GoogleCloudTech/article/2033953579824758855) |\n| 作者 | Google Cloud Tech (@GoogleCloudTech) |\n| 发表日期 | 2026-03-18 |\n| 评分 | 85/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"agent-skill-design-patterns\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"agent-skill-design-patterns\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"agent-skill-design-patterns\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/agent-skill-design-patterns\",\"href\":\"/whatsup/tldr/hn-2026-p3/agent-skill-design-patterns\",\"category\":\"tldr\",\"title\":\"Agent Skill设计的五种核心模式\",\"date\":\"2026-03-18\",\"excerpt\":\"本文总结了构建Agent Skill的五个核心设计模式：Tool Wrapper、Generator、Reviewer、Inversion和Pipeline，帮助开发者从格式规范转向内容设计，提升Agent的实际效用。\",\"coverImage\":\"$undefined\",\"author\":\"Google Cloud Tech (@GoogleCloudTech)\",\"original\":\"5 Agent Skill design patterns every ADK developer should know.md\",\"originalUrl\":\"https://x.com/GoogleCloudTech/article/2033953579824758855\",\"score\":\"85\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Agent Skill设计的五种核心模式\",\"excerpt\":\"本文总结了构建Agent Skill的五个核心设计 6-03-18\",\"category\":\"tldr\",\"author\":\"Gergely Orosz\",\"original\":\"Are AI agents actually slowing us down?.md\",\"originalUrl\":\"https://newsletter.pragmaticengineer.com/p/are-ai-agents-actually-slowing-us?utm_source=post-email-title\u0026publication_id=458709\u0026post_id=191273452\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\u0026utm_medium=email\",\"score\":\"85\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/ai-agents-slowing-us-down.md\"}},\"headings\":[{\"depth\":2,\"text\":\"摘要\",\"id\":\"摘要\"},{\"depth\":2,\"text\":\"内容框架与概述\",\"id\":\"内容框架与概述\"},{\"depth\":2,\"text\":\"核心概念及解读\",\"id\":\"核心概念及解读\"},{\"depth\":2,\"text\":\"原文信息\",\"id\":\"原文信息\"}],\"sidebar\":null,\"directoryHref\":\"/whatsup?tab=tldr\",\"children\":\"$L18\"}]\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章指出随着SKILL.md格式标准化，Agent开发的核心挑战已从格式转向内容设计。作者通过研究Anthropic、Vercel和Google的实践，提炼出五种可复用的Skill设计模式：Tool Wrapper让Agent成为特定库的专家；Generator通过模板强制一致输出；Reviewer将检查逻辑模块化；Inversion反转交互流程让Agent先提问；Pipeline通过硬性检查点强制执行多步骤工作流。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章开篇指出开发者过度关注SKILL.md的格式规范，但30多个Agent工具已实现格式标准化，真正的挑战在于Skill内部逻辑的结构设计。作者强调即使外部包装相同，不同用途的Skill内部运作机制可能完全不同。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"主体部分依次展开五种模式：Tool Wrapper通过动态加载references/目录中的文档让Agent掌握特定库的最佳实践；Generator利用assets/和references/目录分离模板与规则，强制标准化输出；Reviewer将审查标准外置到checklist文件，实现检查逻辑的复用；Inversion通过强制分阶段提问避免Agent过早猜测需求；Pipeline引入硬性门控条件确保多步骤流程不被跳过。每种模式都配有具体的SKILL.md代码示例。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"工具包装器\"}],\"（Tool Wrapper）：将特定库的文档封装为Skill，Agent仅在实际使用时加载相关上下文，避免系统提示过于臃肿。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"生成器模式\"}],\"（Generator）：分离模板资产与风格指南，由Skill充当协调者执行填空式文档生成，确保输出结构一致性。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"审查器模式\"}],\"（Reviewer）：将审查标准外置到模块化checklist文件，通过严重程度分组输出发现，支持检查规则的热插拔切换。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"反转模式\"}],\"（Inversion）：Agent从被动执行转变为主动提问，通过强制分阶段 gating 机制要求用户完整回答后才进入最终合成阶段。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"管道模式\"}],\"（Pipeline）：在多步骤工作流中嵌入硬性检查点（如用户审批门控），利用不同目录按需加载资源，保持上下文窗口精简。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"原文信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#原文信息\",\"children\":\"原文信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\
