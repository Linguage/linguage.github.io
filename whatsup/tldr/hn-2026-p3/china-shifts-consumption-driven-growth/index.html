领导层将消费视为工业化和发展的结果，而非驱动力。\n\n文章接着分析当前转折点。传统增长模式正面临三重冲击：贸易保护主义抬头、产能过剩问题凸显、房地产危机持续。在此背景下，北京展现出转向消费驱动的真实意图。即将公布的十五五规划将包含到2030年实现消费显著增长的目标，相比以往呼吁更加迫切。Bloomberg Economics预测消费占比将从41%升至46%。\n\n文章深入剖析实现路径。中国家庭商品消费实际上已接近发达国家水平，只是消费的商品价格较低。因此再平衡的关键在于推动服务消费增长。建议的结构性措施包括托育和养老补贴、生育支持政策以及反内卷政策，旨在刺激需求并应对通缩压力。这些措施旨在释放中国下一阶段增长潜力，帮助全球充分利用中国庞大市场。\n\n最后文章指出，尽管消费受到重视，但中国不会放弃工业野心。领导人计划将制造业在经济中的份额保持在合理水平。摩根士丹利首席中国经济学家指出，我们正处于全球深刻变革时期，多极化世界伴随持续地缘政治紧张，安全日益优先于增长，这自然强化了制造业是国家实力基础、产业链必须更具竞争力和自给自足的观念。\n\n## 核心概念及解读\n\n**消费驱动增长**：经济增长模式从投资和出口导向转向以内需消费为主要动力，中国十五五规划的核心战略方向。\n\n**经济再平衡**：中国降低对投资和出口依赖，提升消费在经济中占比的结构性转型，目标消费占GDP比重从41%增至46%。\n\n**服务消费**：消费升级的重点领域，中国家庭商品消费已接近发达国家水平，但服务消费仍有巨大提升空间，是再平衡的关键。\n\n**结构性改革**：包括托育和养老补贴、生育支持、反内卷政策等制度性措施，旨在降低家庭负担、释放消费潜力并应对通缩。\n\n**制造业基础论**：在地缘政治紧张背景下，制造能力被重新定义为国家安全的基石，产业链竞争力和自给自足成为战略优先事项。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [China Looks to Consumers to Power Next Era of Growth](https://www.bloomberg.com/news/newsletters/2026-03-04/china-looks-to-consumers-to-power-next-era-of-growth-as-old-model-loses-steam?taid=69a81f737526970001b5e612\u0026utm_campaign=trueanthem\u0026utm_content=business\u0026utm_medium=social\u0026utm_source=twitter) |\n| 作者 | Malcolm Scott |\n| 发表日期 | 2026-03-04 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"china-shifts-consumption-driven-growth\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"china-shifts-consumption-driven-growth\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"china-shifts-consumption-driven-growth\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/china-shifts-consumption-driven-growth\",\"href\":\"/whatsup/tldr/hn-2026-p3/china-shifts-consumption-driven-growth\",\"category\":\"tldr\",\"title\":\"中国转向消费驱动的历史性增长转型\",\"date\":\"2026-03-04\",\"excerpt\":\"面对传统投资与出口模式受保护主义、产能过剩和房地产危机冲击，中国将在十五五规划中历史性转向消费驱动增长，目标到2030年将消费占GDP比重从41%提升至46%，重点通过发展服务消费实现经济再平衡。\",\"coverImage\":\"$undefined\",\"author\":\"Malcolm Sc
