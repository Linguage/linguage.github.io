,\"date\":\"2026-03-16\",\"excerpt\":\"高技能员工的工作数据被用于训练AI模型，可能导致自身被低技能劳动者取代，作者呼吁劳动者重新审视生产力、竞争与合作方式。\",\"coverImage\":\"$undefined\",\"author\":\"Danielle Li\",\"original\":\"Highly skilled workers have been training AI — that comes at a cost.md\",\"originalUrl\":\"https://www.ft.com/content/23c70905-147d-4213-8c30-c43e3bde7fec?syn-25a6b1a6=1\",\"score\":\"82\",\"content\":\"# 高技能劳动者正在训练AI，代价由谁来承担\\n\\n## 摘要\\nMIT学者Danielle Li撰文指出，AI系统的能力来源于高技能员工的工作数据。当企业将这些员工的专长编码进软件后，知识稀缺性被削弱，高技能劳动者可能被借助AI的低技能劳动者替代。作者建议劳动者重新思考生产力、竞争与合作策略，争取对工作数据的权益和补偿。\\n\\n## 内容框架与概述\\n文章开篇以呼叫中心和编程工具的研究为切入点，展示AI如何帮助新手员工提升表现。表面上看这是技术进步的正面故事，但作者随即揭示其背后隐藏的代价：AI模型的训练依赖于顶尖员工的对话记录和工作痕迹，这些专长一旦被数字化就不再属于员工本人。\\n\\n接着文章将视角拓展到各行各业。咨询、软件开发、销售乃至创意产业都在利用工作副产品训练AI模型。当人类专长变成训练数据，传统上依靠技能稀缺性获得经济保障的逻辑被根本性地改变了。知识的扩散虽然可以拉平机会，但也会侵蚀知识本身的价值。\\n\\n最后，作者为进入新劳动力市场的学生和劳动者提出三条建议：重新思考生产力，关注工作数据的价值并争取补偿；重新思考竞争，认识到数据使专长市场全球化；重新思考合作，通过集体行动避免个体在无意中削弱整体议价能力。\\n\\n## 核心概念及解读\\n**专长数据化**：企业将高技能员工的工作记录转化为AI训练数据，使其专长可被规模化复制和分发。\\n\\n**知识稀缺性侵蚀**：AI能从大量交互中提取模式并泛化，使得原本稀缺的专业判断变得廉价和可复制。\\n\\n**数据供给博弈**：员工在向雇主贡献工作数据时面临两难，分享可能削弱自身议价力，不分享则可能被边缘化。\\n\\n**集体议价困境**：个体廉价供给数据会削弱整个职业群体的谈判地位，需要协调行动才能确保劳动者共享AI红利。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Highly skilled workers have been training AI — that comes at a cost](https://www.ft.com/content/23c70905-147d-4213-8c30-c43e3bde7fec?syn-25a6b1a6=1) |\\n| 作者 | Danielle Li |\\n| 发表日期 | 2026-03-16 |\\n| 评分 | 82/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"高技能劳动者正在训练AI，代价由谁来承担\",\"excerpt\":\"高技能员工的工作数据被用于训练AI模型，可能导致自身被低技能劳动者取代，作者呼吁劳动者重新审视生产力、竞争与合作方式。\",\"date\":\"2026-03-16\",\"category\":\"tldr\",\"author\":\"Danielle Li\",\"original\":\"Highly skilled workers have been training AI — that comes at a cost.md\",\"originalUrl\":\"https://www.ft.com/content/23c70905-147d-4213-8c30-c43e3bde7fec?syn-25a6b1a6=1\",\"score\":\"82\",\"tags\
