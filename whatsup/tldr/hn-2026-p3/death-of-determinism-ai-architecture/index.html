身大小，导致生产集群崩溃。\n\n后半部分作者介绍了其新书内容，涵盖缩放定律、H100硬件架构、PagedAttention、连续批处理和推测解码等主题，定位为面向系统架构师的实战工程指南。\n\n## 核心概念及解读\n\n**冯诺依曼瓶颈**：GPU推理中计算核心常处于空闲状态，性能受限于将模型权重从显存搬运到计算单元的速度，而非浮点运算能力。\n\n**KV Cache**：LLM生成过程中存储注意力键值对的缓存结构，随对话上下文增长线性膨胀，可超过模型本身大小，是生产部署的核心难题。\n\n**PagedAttention**：vLLM提出的注意力机制优化方案，通过分页管理KV Cache解决内存碎片化问题，显著提升推理吞吐量。\n\n**Type A与Type B系统**：Type A指传统确定性软件，相同输入必然产生相同输出；Type B指以LLM为代表的概率性系统，输出本质上是基于上下文的概率采样。\n\n**连续批处理**：在迭代级别而非请求级别进行调度，使新请求可在生成过程中动态加入批次，大幅提升GPU利用率。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The Death of Determinism: Why Senior Engineers Fail at AI Architecture](https://thearchitectsnotebook.substack.com/p/the-death-of-determinism-why-senior?utm_source=post-email-title\u0026publication_id=2489243\u0026post_id=189880068\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | The Architects Notebook |\n| 发表日期 | 2026-03-05 |\n| 评分 | 73/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"death-of-determinism-ai-architecture\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"death-of-determinism-ai-architecture\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"death-of-determinism-ai-architecture\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/death-of-determinism-ai-architecture\",\"href\":\"/whatsup/tldr/hn-2026-p3/death-of-determinism-ai-architecture\",\"category\":\"tldr\",\"title\":\"确定性思维的终结：资深工程师为何搞不定AI架构\",\"date\":\"2026-03-05\",\"excerpt\":\"资深后端工程师在AI系统设计中失败的根本原因：用确定性思维解决概率性问题，以及AI推理引擎面临的内存带宽与KV Cache等全新架构挑战。\",\"coverImage\":\"$undefined\",\"author\":\"The Architects Notebook\",\"original\":\"The Death of Determinism Why Senior Engineers Fail at AI Architecture.md\",\"originalUrl\":\"https://thearchitectsnotebook.substack.com/p/the-death-of-determinism-why-senior?utm_source=post-email-title\u0026publication_id=2489243\u0026post_id=189880068\u0026utm_campaign=em
