，Beckwith于2022年创立Foray Bioscience，并开发Pando AI平台。该平台如同植物生长的导航系统，帮助科学家在复杂的变量空间中高效定位最优培育方案，将研发周期从数十年压缩至数月。公司已与苗圃、保护组织和科研机构等展开合作。\n\nForay目前的重点方向包括人造种子技术，可快速规模化供应用于生态修复和抗性作物推广。公司的五年愿景是成为植物科学的操作系统，让任何植物产品都能从单个细胞培育而来，从而帮助植物科学应对地球最紧迫的挑战。\n\n## 核心概念及解读\n**Pando AI平台**：Foray开发的AI驱动平台，如同植物生长的导航地图，帮助科学家在数十种变量中高效探索最优方案，大幅加速植物产品研发。\n\n**植物细胞生物制造**：利用单个植物细胞在实验室条件下定向培育分子、材料和种子等产品，无需种植整株植物，从根本上改变传统植物生产方式。\n\n**人造种子（Fabricated seeds）**：从细胞直接培育的种子，可快速规模化供应，缩短抗性新品种推向市场的时间，应用于生态修复和作物改良。\n\n**自下而上构建理念**：借鉴人体组织工程思路，从细胞层面出发定向构建植物产品，替代传统的自上而下从整株植物中提取的方式。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Designing a more resilient future for plants, from the cell up](https://news.mit.edu/2026/designing-more-resilient-future-plants-foray-0227) |\n| 作者 | Zach Winn ｜ MIT News |\n| 发表日期 | 2026-02-27 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"foray-bioscience-ai-plant-cell-biomanufacturing\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"foray-bioscience-ai-plant-cell-biomanufacturing\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"foray-bioscience-ai-plant-cell-biomanufacturing\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/foray-bioscience-ai-plant-cell-biomanufacturing\",\"href\":\"/whatsup/tldr/hn-2026-p3/foray-bioscience-ai-plant-cell-biomanufacturing\",\"category\":\"tldr\",\"title\":\"从细胞出发：AI驱动的植物生物制造新未来\",\"date\":\"2026-02-27\",\"excerpt\":\"MIT衍生公司Foray Bioscience利用AI驱动的生物制造技术从单个植物细胞培育分子、材料和种子，应对全球植物物种濒危与需求增长的双重挑战。\",\"coverImage\":\"$undefined\",\"author\":\"Zach Winn ｜ MIT News\",\"original\":\"Designing a more resilient future for plants, from the cell up.md\",\"originalUrl\":\"https://news.mit.edu/2026/designing-more-resilient-future-plants-foray-0227\",\"score\":\"82\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"从细胞出发：A
