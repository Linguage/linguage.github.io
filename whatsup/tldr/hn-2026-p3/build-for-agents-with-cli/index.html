For Agents作为行动号召，强调2026年的开发应该以AI代理为中心。这不仅是技术实现的建议，更是产品设计思维的转变。当产品为AI代理优化时，它们将获得更强大的可组合性和自动化潜力，成为AI生态系统中有价值的模块。\n\n## 核心概念及解读\n**CLI工具**（CLI Tools）：命令行界面作为遗留技术，因其可编程性和标准化输出，成为AI代理易于使用和组合的理想接口。\n\n\n**为AI代理而建**（Build For Agents）：产品设计理念的转变，要求开发者考虑AI代理如何访问和使用服务，包括提供CLI、MCP或Skills等接口。\n\n\n**MCP协议**（Model Context Protocol）：一种标准化的通信协议，使AI模型能够与外部工具和服务进行结构化交互。\n\n\n**可组合性**（Composability）：指AI代理能够将不同的CLI工具和服务灵活组合，构建复杂的应用程序和工作流程。\n\n\n**Skills**：为特定产品或服务定制的AI技能包，使代理能够理解和使用该产品的特定功能。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Thread by @karpathy](https://x.com/karpathy/status/2026360908398862478) |\n| 作者 | @karpathy |\n| 发表日期 | 2026-02-24 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"build-for-agents-with-cli\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"build-for-agents-with-cli\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"build-for-agents-with-cli\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/build-for-agents-with-cli\",\"href\":\"/whatsup/tldr/hn-2026-p3/build-for-agents-with-cli\",\"category\":\"tldr\",\"title\":\"Karpathy：为AI代理而建\",\"date\":\"2026-02-24\",\"excerpt\":\"Andrej Karpathy探讨了CLI作为遗留技术对AI代理的价值，强调产品和服务应该为AI代理设计，使其能够通过CLI、MCP等方式访问和使用。\",\"coverImage\":\"$undefined\",\"author\":\"karpathy\",\"original\":\"Thread by @karpathy 2026-02-24.md\",\"originalUrl\":\"https://x.com/karpathy/status/2026360908398862478\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Karpathy：为AI代理而建\",\"excerpt\":\"Andrej Karpathy探讨了CLI作为遗留技术对AI代理的价值，强调产品和服务应该为AI代理设计，使其能够通过CLI、MCP等方式访问和使用。\",\"date\":\"2026-02-24\",\"category\":\"tldr\",\"author\":\"karpathy\",\"original\":\"Thread by @karpathy 2026-02-24.md\",\"originalUrl\":\"https://x.com/karpathy/status/2026360908398862478\",\"tags\":[\"summary\"],\"toc\":true},\
