\n\n**持久化执行**（Durable Execution）：将每个LLM调用和工具执行作为独立步骤，即使进程失败也能保留已完成步骤的状态，实现细粒度的重试和恢复。\n\n\n**事件驱动架构**（Event-driven Architecture）：通过事件在函数之间传递消息和触发动作，实现编排与执行的解耦，支持多渠道触发和分布式代理协作。\n\n\n**步骤索引**（Step Indexing）：Inngest自动为循环中的重复步骤ID添加索引标记，如think:0、think:1，无需手动管理唯一标识符。\n\n\n**子代理委托**（Sub-agent Delegation）：当任务超出上下文窗口时，通过step.invoke()启动独立的代理函数运行，使用分离的会话上下文完成任务后返回结果摘要。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Your Agent Needs a Harness, Not a Framework](https://x.com/djfarrelly/article/2028556984396452250) |\n| 作者 | Dan Farrelly | Inngest.com (@djfarrelly) |\n| 发表日期 | 2026-03-03 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"agent-harness-not-framework\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"agent-harness-not-framework\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"agent-harness-not-framework\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/agent-harness-not-framework\",\"href\":\"/whatsup/tldr/hn-2026-p3/agent-harness-not-framework\",\"category\":\"tldr\",\"title\":\"AI代理需要的是挽具而非框架\",\"date\":\"2026-03-03\",\"excerpt\":\"文章提出AI代理应当使用连接组件的基础设施而非专用框架，并介绍了基于Inngest事件驱动架构的Utah项目。\",\"coverImage\":\"$undefined\",\"author\":\"Dan Farrelly | Inngest.com (@djfarrelly)\",\"original\":\"Your Agent Needs a Harness, Not a Framework.md\",\"originalUrl\":\"https://x.com/djfarrelly/article/2028556984396452250\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"AI代理需要的是挽具而非框架\",\"excerpt\":\"文章提出AI代理应当使用连接组件的基础设施而非专用框架，并介绍了基于Inngest事件驱动架构的Utah项目。\",\"date\":\"2026-03-03\",\"category\":\"tldr\",\"author\":\"Dan Farrelly | Inngest.com (@djfarrelly)\",\"original\":\"Your Agent Needs a Harness, Not a Framework.md\",\"originalUrl\":\"https://x.com/djfarrelly/article/2028556984396452250\",\"tags\":[\"summary\"],\"toc\":true
