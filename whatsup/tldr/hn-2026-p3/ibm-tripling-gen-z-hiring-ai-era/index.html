\n\n其他科技公司也开始重视Gen Z人才的AI优势。Dropbox首席人力官称年轻一代在AI熟练度上远超年长员工，公司将实习和毕业生项目扩大25%。Cognizant CEO则表示AI是放大人类潜力的工具，而非替代策略，公司今年将招聘更多应届毕业生。\n\n## 核心概念及解读\n\n**AI熟练度**（AI Fluency）：指熟练运用AI工具完成工作的能力，已成为美国增长最快的职业技能，Gen Z在此方面表现突出。\n\n**初级岗位重塑**（Entry-Level Job Rewriting）：企业重新设计初级职位职责，将重复性任务交给AI自动化处理，让员工专注于更高价值的创造性工作。\n\n**人才管道断裂**（Talent Pipeline Break）：削减初级招聘会导致未来中层管理者短缺，从外部挖角成本更高且适应期更长，是企业的长期风险。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [IBM is tripling the number of Gen Z entry-level jobs after finding the limits of AI adoption](https://fortune.com/2026/02/13/tech-giant-ibm-tripling-gen-z-entry-level-hiring-according-to-chro-rewriting-jobs-ai-era/) |\n| 作者 | Preston Fore |\n| 发表日期 | 2026-02-14 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"ibm-tripling-gen-z-hiring-ai-era\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"ibm-tripling-gen-z-hiring-ai-era\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"ibm-tripling-gen-z-hiring-ai-era\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/ibm-tripling-gen-z-hiring-ai-era\",\"href\":\"/whatsup/tldr/hn-2026-p3/ibm-tripling-gen-z-hiring-ai-era\",\"category\":\"tldr\",\"title\":\"IBM逆势扩招：AI时代为何三倍招聘Z世代人才\",\"date\":\"2026-02-14\",\"excerpt\":\"IBM宣布将初级岗位招聘数量增加两倍，重新定义职位以适应AI时代，认为削减初级人才将损害企业长期发展。\",\"coverImage\":\"$undefined\",\"author\":\"Preston Fore\",\"original\":\"IBM is tripling the number of Gen Z entry-level jobs after finding the limits of AI adoption 2026-02-13.md\",\"originalUrl\":\"https://fortune.com/2026/02/13/tech-giant-ibm-tripling-gen-z-entry-level-hiring-according-to-chro-rewriting-jobs-ai-era/\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"IBM逆势扩招：AI时代为何三倍招聘Z世代人才\",\"excerpt\":\"IBM宣布将初级岗位招聘数量增加两倍，重新定义职位以适应AI时代，认为削减初级人才将损害企业长期发展。\",\"date\":\"2026-02-14\",\"
