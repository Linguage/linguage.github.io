为 Claude Code 提供所需的具体上下文。\n\n接着文章讨论了内容地图的作用。作者维护了少量内容地图作为主题集群的入口点，这些页面链接到相关笔记，涵盖创作工作、思考工具、软件哲学、专注力、耐用性和自我实验等主题。内容地图帮助作者和 AI 导航，当探索某个主题时，可以指向相关的内容地图，而不是仅仅依赖搜索。\n\n文章重点阐述了 Claude Code 在工作流中的定位。作者强调不是让 AI 代笔，而是与能够容纳更多上下文的伙伴一起思考。终端界面至关重要，不需要将笔记粘贴到聊天窗口中，Claude 可以使用工具读取文件、搜索整个笔记库、直接在合适的位置起草内容。它是在系统内部运作，而不是在系统旁边。常见模式包括填补空白、发现关联、深化思考、基于自有材料起草。\n\n最后文章介绍了日常实践和设计哲学。作者在有需要时写日记，这些日记存放在日记区域而非园地，它们是混乱的、个人的、更多是问题而非答案。定期回顾日记并将值得保留的想法提升为适当的常青笔记，Claude 可以帮助识别反复出现的主题。作者强调系统要足够简单才能真正使用，五个文件夹、几个内容地图、相互链接的笔记、一个能就地读写的 AI，这就是全部。没有复杂的标签分类，没有复杂的自动化，没有完美的模板，因为那些方法会创建维护负担，最终导致系统崩溃。\n\n## 核心概念及解读\n**内容地图**：作为主题集群入口点的页面，链接到相关笔记，帮助作者和 AI 在笔记库中导航，而不需要依赖单独的搜索功能。\n\n**常青笔记**：永久性笔记，遵循原子化、有观点、相互链接的原则，想法在园地中缓慢积累和成熟。\n\n**原子笔记**：每个笔记只包含一个想法，是常青笔记的基本构建单位，有助于保持笔记的聚焦和可链接性。\n\n**终端界面**：Claude Code 通过终端与 Obsidian 交互，能够直接在笔记库内部读写文件，而不是在旁边的聊天窗口中工作。\n\n**Zettelkasten 方法**：一种网络化笔记方法，强调写作即思考，好的笔记系统让思考能够积累，影响了现代网络化笔记实践。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How I use Obsidian with Claude Code](https://x.com/kentdebruin/article/2013647022767661215) |\n| 作者 | Kent (@kentdebruin) |\n| 发表日期 | 2026-01-21 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"using-obsidian-with-claude-code\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"using-obsidian-with-claude-code\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"using-obsidian-with-claude-code\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/using-obsidian-with-claude-code\",\"href\":\"/whatsup/tldr/hn-2026-p3/using-obsidian-with-claude-code\",\"category\":\"tldr\",\"title\":\"如何在 Obsidian 中使用 Claude Code\",\"date\":\"2026-01-21\",\"excerpt\":\"作者介绍了如何在 Obsidian 笔记库中使用 Claude Code 作为协作伙伴，通过终端扩展让 AI 直接读写和遍历笔记，采用简洁的文件夹结构和内容地图组织知识，实现思考深化的工作流程。\",\"coverImage\":\"$undefined\",\"author\":\"Kent (@kentdebruin)\",\"original\":\"How I use Obsidian with Claude Code.md\",\"originalUrl\":\"https://x.com/kentdebruin/article/2013647022767661215\",\"score\":\"$undefi
