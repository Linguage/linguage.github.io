了\"播cast\"一词的诞生背景——2004年由iPod和broadcast合成而来，但这一命名假设iPod会长期存在，却未料及iPhone三年后即出现并最终导致iPod于2022年停产。随后篇幅分析了视频播客的崛起对行业格局的影响：YouTube已成为美国最大播客平台，苹果音频应用市场份额持续下滑，而Netflix等流媒体平台也开始进军播客领域。亚马逊和苹果等公司正大力投入视频播客体验。文章通过引用多位行业人士观点，探讨了播客是否需要重新命名的问题，并类比电视出现时\"radiovision\"被\"television\"取代的历史。最后部分讨论了新名称的可能性，如\"社交媒体电视\"，以及播客行业的商业前景和广告商衡量问题。\n\n## 核心概念及解读\n**视频播客（Video Podcast）**：指在传统音频播客基础上加入视频画面的节目形式，已成为行业新趋势。\n\n\n**iPod词源**：podcast由iPod和broadcast合成，源于2004年数字媒体萌芽时期，现已过时。\n\n\n**YouTube主导地位**：YouTube月活超10亿，成为美国最大播客平台，改变了传统播客分发格局。\n\n\n**80/7/13法则**：7%观众纯视频观看，13%纯音频，80%两者混合，说明播客仍处于过渡阶段。\n\n\n**社交媒体电视（Social Media TV）**：行业专家建议的播客新名称，旨在反映视频化和社交化趋势。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The surge of video podcasts raises an awkward question for the industry：Why do we still call them podcasts?](https://www.fastcompany.com/91498688/why-still-called-podcasts-video-pods-new-medium?partner=rss\u0026utm_source=twitter\u0026utm_medium=social\u0026utm_campaign=rss+fastcompany\u0026utm_content=rss) |\n| 作者 | Joe Berkowitz |\n| 发表日期 | 2026-02-26 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"video-podcast-rebrand-awkward-question\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"video-podcast-rebrand-awkward-question\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"video-podcast-rebrand-awkward-question\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/video-podcast-rebrand-awkward-question\",\"href\":\"/whatsup/tldr/hn-2026-p3/video-podcast-rebrand-awkward-question\",\"category\":\"tldr\",\"title\":\"视频播客时代：我们为何还叫它播客？\",\"date\":\"2026-02-26\",\"excerpt\":\"随着视频播客的兴起，播客这一术语的准确性受到质疑。该词源于iPod+广播的组合，而iPod已于2022年停产。YouTube已成为美国最大播客平台，苹果音频应用市场份额持续下滑，行业正讨论是否需要重新命名。\",\"coverImage\":\"$undefined\",\"author\":\"Joe Berkowitz\",\"original\":\"The surge of video podcasts raises an awkward question for the industry Why do we still call them podcasts?.md\",\"originalUrl\":\"https://www.fastcomp
