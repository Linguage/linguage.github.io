势，但即使在这一领域，中国也更倾向于内部安全和警务合作，而非对自己没有核心利益的国家承担外部防御义务。\n\n作者分析了中国战略的核心原则。中国的核心安全利益位于东亚，而非远洋地区。中国专注于东亚沿海的一级安全优先事项、军事能力建设，以及减少在周边地理区域的脆弱性。中国是一百二十多个国家的最大贸易伙伴，在全球市场上购买石油，不会将任何地区的政策仅依赖于一个国家。这种姿态更像市场投资组合的多样化而非地缘政治思维。\n\n文章最后强调，将中国政策框定为美国式的同盟关系根本偏离了重点。中国与华盛顿的战略竞争重点一直在于经济、技术、建设和培训领域，而非具有固有且昂贵义务的安全伙伴关系。从缅甸到伊朗再到委内瑞拉，中国的做法都是务实的多方接触而非强制性义务。美国不应将中国不按华盛顿规则行事视为软弱或失败。\n\n## 核心概念及解读\n**战略自恋**（Strategic Narcissism）：指美国和中国都倾向于从自身战略竞争的角度看待世界，将所有行为都理解为对对手的回应，而非基于自身利益。\n\n**多样化投资组合模式**：中国外交采取的市场隐喻，通过增加伙伴关系和关注领域来分散风险，而非依赖单一盟友或地区，与美国式的同盟体系形成对比。\n\n**约束性安全承诺**（Binding Security Commitments）：美国同盟体系的核心特征，包含对盟友的防御义务。中国避免对第三国承担此类义务，只提供硬件、生命线和外交支持。\n\n**一级安全优先事项**（First-tier Security Priorities）：指中国在东亚沿海的核心安全利益，包括军事能力建设和减少周边脆弱性，这是中国战略的重心所在。\n\n**多方接触**（Ecumenical Engagement）：中国在缅甸等地的做法，与各方保持关系而非承担强制性义务，体现务实灵活的外交策略。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Beijing Doesn’t Think Like Washington—and the Iran Conflict Shows Why](https://carnegieendowment.org/emissary/2026/03/iran-china-us-intervention-strategy) |\n| 作者 | Evan A. Feigenbaum |\n| 发表日期 | 2001-03-02 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"china-not-like-us-foreign-policy\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"china-not-like-us-foreign-policy\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"china-not-like-us-foreign-policy\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/china-not-like-us-foreign-policy\",\"href\":\"/whatsup/tldr/hn-2026-p3/china-not-like-us-foreign-policy\",\"category\":\"tldr\",\"title\":\"中国为何不像美国那样行事\",\"date\":\"2001-03-02\",\"excerpt\":\"美国战略界惊讶于中国不救助伊朗和委内瑞拉等盟友，认为这是软弱的表现。作者指出这恰恰是中国的战略设计，中国避免对第三国承担约束性安全承诺，其核心安全利益在东亚而非远洋，中国采取的是多样化投资组合模式而非美国式的同盟体系。\",\"coverImage\":\"$undefined\",\"author\":\"Evan A. Feigenbaum\",\"original\":\"Beijing Doesn’t Think Like Washington—and the Iran Conflict Shows Why.md\",\"originalUrl\":\"https://carnegieendowment.org/emissary/2026/03/iran-china-us-interventi
