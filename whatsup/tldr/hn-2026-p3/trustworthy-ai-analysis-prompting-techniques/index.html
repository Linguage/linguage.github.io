构证据问题，提出定义引用规则和验证引文两步法；针对泛化洞察问题，强调需要加载项目背景、业务目标、产品上下文和参与者概况四层结构化上下文，让AI理解具体决策场景而非输出通用结论。\n\n## 核心概念及解读\n\n**引用规则定义**：在提示词中明确引用的起止标准、是否保留犹豫语气、禁止跨段落拼接等规则，消除AI对逐字引用的模糊理解。\n\n**引文验证**：分析完成后让AI逐一核实每条引用是逐字匹配、近似转述还是无法找到，防止虚构内容进入决策报告。\n\n**结构化上下文加载**：将项目范围、业务目标、产品领域知识、参与者画像四层信息注入提示词，引导AI针对具体决策场景进行分析。\n\n**共识偏差**：LLM默认倾向发现多数人提及的表层模式，导致只输出泛化结论而遗漏少数人提出但具有重大商业价值的边缘洞察。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How to do AI analysis you can actually trust](https://www.lennysnewsletter.com/p/how-to-do-ai-analysis-you-can-actually?utm_source=post-email-title\u0026publication_id=10845\u0026post_id=187779404\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Caitlin Sullivan |\n| 发表日期 | 2026-02-17 |\n| 评分 | 83/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"trustworthy-ai-analysis-prompting-techniques\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"trustworthy-ai-analysis-prompting-techniques\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"trustworthy-ai-analysis-prompting-techniques\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/trustworthy-ai-analysis-prompting-techniques\",\"href\":\"/whatsup/tldr/hn-2026-p3/trustworthy-ai-analysis-prompting-techniques\",\"category\":\"tldr\",\"title\":\"如何让AI分析结果真正值得信赖\",\"date\":\"2026-02-17\",\"excerpt\":\"用户研究专家Caitlin Sullivan分享四种AI分析常见失败模式及其提示词修复技巧，帮助产品团队从AI中获得可信赖、可操作的用户洞察。\",\"coverImage\":\"$undefined\",\"author\":\"Caitlin Sullivan\",\"original\":\"How to do AI analysis you can actually trust.md\",\"originalUrl\":\"https://www.lennysnewsletter.com/p/how-to-do-ai-analysis-you-can-actually?utm_source=post-email-title\u0026publication_id=10845\u0026post_id=187779404\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\",\"score\":\"83\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"la
