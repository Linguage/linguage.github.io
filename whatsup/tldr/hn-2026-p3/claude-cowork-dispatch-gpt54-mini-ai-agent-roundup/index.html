o小模型，主打编码与子代理场景。Agent基础设施层面，LangChain推出沙箱服务并开源Open SWE编码代理框架，Hermes Agent发布v0.3.0。架构研究方面，Moonshot提出跨层注意力残差，Mamba-3强化线性模型推理效率。NVIDIA GTC则延续推理优先与Agent生态叙事。\n\n## 内容框架与概述\n\n文章以Anthropic发布Claude Cowork Dispatch为头条，多位业界知名人士将其与OpenClaw进行对比并给予积极评价，标志着Anthropic在被认为错失Clawdbot合作之后正式入局桌面代理领域。配合同期播客节目，文章提供了产品起源故事与设计思路的线索。\n\n随后文章系统梳理了AI领域多项重要进展。OpenAI发布GPT-5.4 mini和nano，定位为编码与子代理场景的高效小模型，但定价与真实性评估引发社区讨论。Agent基础设施成为本周关键词，LangChain推出沙箱服务与Open SWE开源框架，Hermes Agent更新插件架构，多厂商共识指向安全执行环境与可组合技能的重要性。\n\n在基础研究层面，Moonshot的注意力残差论文探索跨层注意力机制，Mamba-3则在推理效率上推进线性状态空间模型。NVIDIA GTC围绕推理优先与Agent生态展开，多家公司发布开放模型与企业级工具。\n\n## 核心概念及解读\n\n**Claude Cowork Dispatch**：Anthropic推出的桌面远程控制方案，被视为其对OpenClaw的直接回应，补上了Anthropic在计算机使用代理领域的关键拼图。\n\n**Subagents（子代理）**：在主代理下编排多个轻量代理并行执行任务的架构模式，GPT-5.4 mini明确为此场景优化，Codex已原生支持。\n\n**Open SWE**：LangChain开源的后台编码代理框架，集成Slack、Linear、GitHub等工作流，灵感来源于Stripe、Ramp等公司的内部系统。\n\n**Attention Residuals（注意力残差）**：Moonshot提出的跨层注意力机制，使每层可查询前层状态，将注意力从序列维度扩展到深度维度，额外计算开销极小。\n\n**Mamba-3**：Albert Gu和Tri Dao发布的最新线性状态空间模型，强调推理效率而非替代Transformer，在长推理和RL rollout场景中优势显著。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [[AINews] Claude Cowork Dispatch: Anthropics Answer to OpenClaw](https://www.latent.space/p/ainews-claude-cowork-dispatch-anthropics?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=191334680\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Latent.Space |\n| 发表日期 | 2026-03-18 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"claude-cowork-dispatch-gpt54-mini-ai-agent-roundup\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"claude-cowork-dispatch-gpt54-mini-ai-agent-roundup\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"claude-cowork-dispatch-gpt54-mini-ai-agent-roundup\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/claude-cowork-dispatch-gpt54-mini-ai-agent-r ic在计算机使用代理领域的关键拼图。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Subagents（子代理）\"}],\"：在主代理下编排多个轻量代理并行执行任务的架构模式，GPT-5.4 mini明确为此场景优化，Codex已原生支持。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Open SWE\"}],\"：LangChain开源的后台编码代理框架，集成Slack、Linear、GitHub等工作流，灵感来源于Stripe、Ramp等公司的内部系统。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Attention Residuals（注意力残差）\"}],\"：Moonshot提出的跨层注意力机制，使每层可查询前层状态，将注意力从序列维度扩展到深度维度，额外计算开销极小。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Mamba-3\"}],\"：Albert Gu和Tri Dao发布的最新线性状态空间模型，强调推理效率而非替代Transformer，在长推理和RL rollout场景中优势显著。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"原文信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#原文信息\",\"children\":\"原文信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原文\"}],[\
