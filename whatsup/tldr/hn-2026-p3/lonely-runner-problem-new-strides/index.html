rakulthongchai在此基础上优化了素因子筛选的计算效率，一举证明了九人和十人的情形。\n\n## 核心概念及解读\n\n**孤独跑者猜想**：N名跑者以不同恒速绕单位长度环形跑道跑步，猜想每位跑者最终都会在某刻与最近者的距离至少为1/N。\n\n**速度阈值理论**：陶哲轩于2015年证明，只需验证低速情形即可推广到所有速度，将无限问题转化为有限计算。\n\n**计算机辅助证明**：利用程序系统枚举和排除反例，结合数论分析确定反例必须满足的约束条件，从而证明猜想成立。\n\n**有理逼近**：用分数近似表示无理数的数学方法，是孤独跑者猜想的原始来源，在科学计算中有广泛应用。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [New Strides Made on Deceptively Simple Lonely Runner Problem](https://www.quantamagazine.org/new-strides-made-on-deceptively-simple-lonely-runner-problem-20260306/?mc_cid=2f6471fac1\u0026mc_eid=9ed96560c1) |\n| 作者 | Paulina Rowińska |\n| 发表日期 | 2026-03-06 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"lonely-runner-problem-new-strides\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"lonely-runner-problem-new-strides\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"lonely-runner-problem-new-strides\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/lonely-runner-problem-new-strides\",\"href\":\"/whatsup/tldr/hn-2026-p3/lonely-runner-problem-new-strides\",\"category\":\"tldr\",\"title\":\"孤独跑者猜想：二十年僵局后的惊人突破\",\"date\":\"2026-03-06\",\"excerpt\":\"数学界沉寂二十年的孤独跑者猜想近期取得重大突破，从七人推进至十人，计算机辅助证明功不可没。\",\"coverImage\":\"$undefined\",\"author\":\"Paulina Rowińska\",\"original\":\"New Strides Made on Deceptively Simple Lonely Runner Problem.md\",\"originalUrl\":\"https://www.quantamagazine.org/new-strides-made-on-deceptively-simple-lonely-runner-problem-20260306/?mc_cid=2f6471fac1\u0026mc_eid=9ed96560c1\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"孤独跑者猜想：二十年僵局后的惊人突破\",\"excerpt\":\"数学界沉寂二十年的孤独跑者猜想近期取得重大突破，从七人推进至十人，计算机辅助证明功不可没。\",\"date\":\"2026-03-06\",\"category\":\"tldr\",\"author\":\"Paulina Rowińska\",\"original\":\"New Strides Made on Deceptively Simple Lonely Runner
