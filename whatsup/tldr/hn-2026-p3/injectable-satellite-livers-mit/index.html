减少排异反应。\n\n## 核心概念及解读\n**卫星肝脏**：保留病肝不动，在体内其他部位植入辅助性肝组织以补充肝脏功能，类似卫星辅助主系统运行。\n\n**水凝胶微球**：通过微流控装置制备的均一球体，密集时呈液态可通过注射器输送，进入体内后恢复固态结构，为细胞提供支架。\n\n**肝细胞**：肝脏中执行绝大多数功能的细胞类型，负责代谢药物、调节凝血和清除细菌等约五百项关键功能。\n\n**工程化微环境**：为移植细胞人工构建的生存空间，包含支架材料和支持性细胞，帮助移植细胞定植并与宿主循环系统整合。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Injectable satellite livers could offer an alternative to liver transplantation](https://news.mit.edu/2026/injectable-satellite-livers-could-offer-alternative-liver-transplantation-0303) |\n| 作者 | Anne Trafton ｜ MIT News |\n| 发表日期 | 2026-03-04 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"injectable-satellite-livers-mit\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"injectable-satellite-livers-mit\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"injectable-satellite-livers-mit\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/injectable-satellite-livers-mit\",\"href\":\"/whatsup/tldr/hn-2026-p3/injectable-satellite-livers-mit\",\"category\":\"tldr\",\"title\":\"MIT可注射迷你肝脏有望替代肝移植\",\"date\":\"2026-03-04\",\"excerpt\":\"MIT工程师开发出可注射的水凝胶微球包裹肝细胞技术，在小鼠体内构建功能性迷你肝脏并存活八周，为肝移植提供了无需手术的替代方案。\",\"coverImage\":\"$undefined\",\"author\":\"Anne Trafton ｜ MIT News\",\"original\":\"Injectable satellite livers could offer an alternative to liver transplantation.md\",\"originalUrl\":\"https://news.mit.edu/2026/injectable-satellite-livers-could-offer-alternative-liver-transplantation-0303\",\"score\":\"88\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"MIT可注射迷你肝脏有望替代肝移植\",\"excerpt\":\"MIT工程师开发出可注射的水凝胶微球包裹肝细胞技术，在小鼠体内构建功能性迷你肝脏并存活八周，为肝移植提供了无需手术的替代方案。\",\"date\":\"2026-03-04\",\"category\":\"tldr\",\"author\":\"Anne Trafton ｜ MIT News\",\"original\":\"Injectable satellite livers could offer an alternative to liver transplantation.md\",
