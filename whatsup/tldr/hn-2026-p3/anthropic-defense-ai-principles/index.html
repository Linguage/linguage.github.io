望继续在保留两项底线前提下服务国防需求。\n\n## 核心概念及解读\n**大规模国内监控**（Mass Domestic Surveillance）：利用AI对本国公民进行大规模监控采集活动，作者认为这严重威胁公民基本自由权利，与民主价值观不相容。\n\n**完全自主武器**（Fully Autonomous Weapons）：指将人类完全排除决策循环的武器系统，可自动选择和攻击目标，作者认为当前前沿AI系统可靠性不足以支持此类应用。\n\n**中国军工企业**（Chinese Military Companies）：指被美国国防部认定与中国军队有关联的实体企业，Anthropic主动切断与这类企业的合作以维护国家安全。\n\n**防御性AI部署**（Defensive AI Deployment）：作者明确支持将AI用于合法的外国情报任务、反情报行动及保卫民主国家的防御性作战。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Statement from Dario Amodei on our discussions with the Department of War](https://www.anthropic.com/news/statement-department-of-war) |\n| 作者 |  |\n| 发表日期 | 2026-02-26 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"anthropic-defense-ai-principles\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"anthropic-defense-ai-principles\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"anthropic-defense-ai-principles\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/anthropic-defense-ai-principles\",\"href\":\"/whatsup/tldr/hn-2026-p3/anthropic-defense-ai-principles\",\"category\":\"tldr\",\"title\":\"Anthropic创始人谈AI国防合作原则与底线\",\"date\":\"2026-02-26\",\"excerpt\":\"Dario Amodei阐述Anthropic与美国国防部合作立场，明确拒绝将AI用于大规模国内监控和完全自主武器，同时表达继续支持美国国家安全工作的意愿。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"Statement from Dario Amodei on our discussions with the Department of War.md\",\"originalUrl\":\"https://www.anthropic.com/news/statement-department-of-war\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Anthropic创始人谈AI国防合作原则与底线\",\"excerpt\":\"Dario Amodei阐述Anthropic与美国国防部合作立场，明确拒绝将AI用于大规模国内监控和完全自主武器，同时表达继续支持美国国家安全工作的意愿。\",\"date\":\"2026-02-26\",\"category\":\"tldr\",\"original\":\"Statement from Dario Amodei on our discussions with the Department of War.md\",
