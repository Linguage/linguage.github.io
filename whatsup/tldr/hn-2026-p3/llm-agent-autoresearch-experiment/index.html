后发现，最大收益并非来自架构创新。智能体首先发现并修复了一个温度参数的bug，单独贡献了113点的排名降低。随后的超参数调优贡献了约30点的改进。而到了架构改动和激进想法阶段，成功率大幅下降，智能体基本在盲目尝试。\n\n作者总结认为，LLM在定义清晰的搜索空间中表现优异，commit-or-revert循环是高效的搜索策略。但面对未知的探索时，优化循环容易失效。限制每次实验只做一处改动可能过于严格，未来可引入规划阶段或子智能体机制来改善。\n\n## 核心概念及解读\n**Autoresearch框架**：由Karpathy提出的自动化研究范式，LLM智能体在约束优化循环中反复修改单一文件以改进评估指标。\n\n**Commit-or-revert循环**：每次实验后根据评估结果决定保留或回滚代码变更，形成高效的试错搜索策略。\n\n**约束优化搜索**：在明确边界条件（如5分钟运行时限）下进行迭代优化，鼓励快速迭代并防止过拟合噪声。\n\n**沙盒化执行**：将训练环境容器化并移除网络访问，严格限制智能体权限以防止执行任意危险代码。\n\n**均值排名指标**：用于衡量检索嵌入质量的评估标准，值越低代表模型在图像-文本检索任务中表现越好。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Autoresearch on an old research idea ｜ Blog](https://ykumar.me/blog/eclip-autoresearch/) |\n| 作者 | Yogesh Kumar |\n| 发表日期 | 2026-03-22 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"llm-agent-autoresearch-experiment\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"llm-agent-autoresearch-experiment\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"llm-agent-autoresearch-experiment\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/llm-agent-autoresearch-experiment\",\"href\":\"/whatsup/tldr/hn-2026-p3/llm-agent-autoresearch-experiment\",\"category\":\"tldr\",\"title\":\"LLM智能体自主驱动机器学习研究的实战探索\",\"date\":\"2026-03-22\",\"excerpt\":\"作者利用Karpathy的Autoresearch框架，让Claude Code自主驱动ML实验循环，在一天内完成42轮实验，将模型评估指标提升54%。\",\"coverImage\":\"$undefined\",\"author\":\"Yogesh Kumar\",\"original\":\"Autoresearch on an old research idea Blog.md\",\"originalUrl\":\"https://ykumar.me/blog/eclip-autoresearch/\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"LLM智能体自主驱动机器学习研究的实战探索\",\"excerpt\":\"作者利用Karpathy的Autoresearch框架，让Claude Code自主驱动ML实验循环，在一天内完成42轮实验，将模型评估指标提升54%。\",\"date\":\"2026-03-22\",\"category\":\"tldr\",\"author\":\"Yogesh Kumar\",\"original\":
