管理AI的上下文。\n\n## 核心概念及解读\n**上下文腐化（Context Rot）**：记忆中长期积累的过时偏好、错误信息和矛盾指令，像代码腐化一样悄然降低AI输出质量。\n\n**上下文投毒（Context Poisoning）**：AI将幻觉或错误写入记忆后反复引用，使虚假信息在后续对话中被当作事实传播。\n\n**上下文注意力分散（Context Distraction）**：上下文膨胀到一定程度后，模型停止生成新策略，转而重复历史行为，陷入循环。\n\n**上下文混淆（Context Confusion）**：模型无法区分指令的轻重缓急，将随意的背景信息当作刚性约束来执行。\n\n**上下文冲突（Context Clash）**：记忆中不同来源的信息互相矛盾，导致模型输出不稳定或自相矛盾。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Why I Turned Off ChatGPTs Memory](https://every.to/also-true-for-humans/why-i-turned-off-chatgpt-s-memory) |\n| 作者 | Mike Taylor |\n| 发表日期 | 2026-02-23 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"why-i-turned-off-chatgpt-memory\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"why-i-turned-off-chatgpt-memory\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"why-i-turned-off-chatgpt-memory\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/why-i-turned-off-chatgpt-memory\",\"href\":\"/whatsup/tldr/hn-2026-p3/why-i-turned-off-chatgpt-memory\",\"category\":\"tldr\",\"title\":\"为什么我关掉了ChatGPT的记忆功能\",\"date\":\"2026-02-23\",\"excerpt\":\"作者从自身经历出发，揭示ChatGPT记忆功能的隐患，提出上下文腐化概念，论证主动管理上下文比被动积累记忆更重要。\",\"coverImage\":\"$undefined\",\"author\":\"Mike Taylor\",\"original\":\"Why I Turned Off ChatGPTs Memory.md\",\"originalUrl\":\"https://every.to/also-true-for-humans/why-i-turned-off-chatgpt-s-memory\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"为什么我关掉了ChatGPT的记忆功能\",\"excerpt\":\"作者从自身经历出发，揭示ChatGPT记忆功能的隐患，提出上下文腐化概念，论证主动管理上下文比被动积累记忆更重要。\",\"date\":\"2026-02-23\",\"category\":\"tldr\",\"author\":\"Mike Taylor\",\"original\":\"Why I Turned Off ChatGPTs Memory.md\",\"originalUrl\":\"https://every.to/also-true-for-humans/why-i-turned-off-chatgpt-s-memory\",\"score\":\"82\",\"tags\":[\"summary\"],\"toc\":true},\"s
