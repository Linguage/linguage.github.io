能是阿尔茨海默病早期干预的潜在靶点，为预防性干预提供了新的思路方向。\n\n## 核心概念及解读\n**反复消极思维**（Repetitive Negative Thinking）：指个体反复陷入担忧、反刍等负面思维模式，与抑郁和焦虑相关。\n\n**淀粉样蛋白**（Amyloid）：阿尔茨海默病核心病理标志物之一，异常沉积形成老年斑，是该疾病诊断的重要生物标志物。\n\n**tau蛋白**（Tau Protein）：神经纤维缠结的主要成分，其异常磷酸化与神经细胞损伤密切相关，可预测认知衰退进程。\n\n**认知功能下降**（Cognitive Decline）：记忆力、注意力等认知能力的进行性减退，是阿尔茨海默病的主要临床表现。\n\n**神经退行性疾病**（Neurodegenerative Disease）：以神经元进行性损伤和功能丧失为特征的疾病，阿尔茨海默病是其中最常见的类型。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Repetitive negative thinking is associated with amyloid, tau, and cognitive decline](https://alz-journals.onlinelibrary.wiley.com/doi/10.1002/alz.12116) |\n| 作者 | Natalie L. Marchant |\n| 发表日期 | 2026-03-12 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"repetitive-negative-thinking-alzheimer-biomarkers\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"repetitive-negative-thinking-alzheimer-biomarkers\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"repetitive-negative-thinking-alzheimer-biomarkers\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/repetitive-negative-thinking-alzheimer-biomarkers\",\"href\":\"/whatsup/tldr/hn-2026-p3/repetitive-negative-thinking-alzheimer-biomarkers\",\"category\":\"tldr\",\"title\":\"反复消极思维与阿尔茨海默病生物标志物研究\",\"date\":\"2026-03-12\",\"excerpt\":\"研究发现反复消极思维与阿尔茨海默病关键生物标志物淀粉样蛋白和tau蛋白沉积相关，并可预测认知功能下降，为心理因素在神经退行性疾病中的作用提供证据。\",\"coverImage\":\"$undefined\",\"author\":\"Natalie L. Marchant\",\"original\":\"Repetitive negative thinking is associated with amyloid, tau, and cognitive decline.md\",\"originalUrl\":\"https://alz-journals.onlinelibrary.wiley.com/doi/10.1002/alz.12116\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"反复消极思维与阿尔茨海默病生物标志物研究\",\"excerpt\":\"研究发现反复消极思维与阿尔茨海默病关键生物标志物淀粉样蛋白和tau蛋白沉积相关，并可预测认知功能下降，为心理因素在神经退行性疾病中的作用提供证据。\",\
