色列的打击下已经变得虚弱。对于一个痴迷于历史地位的领导人来说，推翻一个自1979年以来困扰美国总统的政权可能具有难以抗拒的吸引力。\n\n## 核心概念及解读\n**政权更迭**：指通过外部军事或政治手段推翻一个国家的现有政府并建立新政权，特朗普政府对伊朗战争的目标在此问题上表述前后不一。\n\n**中国菜单式目标**：指特朗普故意提出从全面政权更迭到消除核项目等各种可能目标，以便无论发生什么情况都可以声称取得胜利的策略。\n\n**先发制人行动**：指在感知到威胁尚未成为现实之前采取军事行动，特朗普政府以此作为对伊朗发动战争的几个理由之一。\n\n**史诗愤怒行动**：五角大楼为对伊朗战争指定的代号，国防部长声称其目标是摧毁伊朗的海军、导弹和核野心。\n\n**将国防部更名为战争部**：特朗普在其第二任期初期坚持将国防部更名为战争部，作者认为这一举措使得这场战争在一定程度上变得不可避免。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Can Donald Trump Win a War with Iran If He Can’t Explain Why He Started It?](https://www.newyorker.com/news/letter-from-trumps-washington/can-donald-trump-win-a-war-with-iran-if-he-cant-explain-why-he-started-it?utm_source=twitter\u0026utm_medium=social\u0026utm_campaign=dhtwitter\u0026utm_content=null) |\n| 作者 | Susan B. Glasser |\n| 发表日期 | 2026-03-02 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"trump-iran-war-inconsistent-rationale\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"trump-iran-war-inconsistent-rationale\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"trump-iran-war-inconsistent-rationale\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/trump-iran-war-inconsistent-rationale\",\"href\":\"/whatsup/tldr/hn-2026-p3/trump-iran-war-inconsistent-rationale\",\"category\":\"tldr\",\"title\":\"特朗普对伊朗发动战争却无法解释原因\",\"date\":\"2026-03-02\",\"excerpt\":\"特朗普发动对伊朗战争，但其政府给出的理由前后矛盾且混乱，从政权更迭到消除核威胁说法不一，引发外界对美国能否在不明确战争目标的情况下获胜的质疑。\",\"coverImage\":\"$undefined\",\"author\":\"Susan B. Glasser\",\"original\":\"Can Donald Trump Win a War with Iran If He Can’t Explain Why He Started It?.md\",\"originalUrl\":\"https://www.newyorker.com/news/letter-from-trumps-washington/can-donald-trump-win-a-war-with-iran-if-he-cant-explain-why-he-started-it?utm_source=twitter\u0026utm_medium=social\u0026utm_campaign=dhtwitter\u0026utm_content=null\",\"score\":\"$undefined\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\
