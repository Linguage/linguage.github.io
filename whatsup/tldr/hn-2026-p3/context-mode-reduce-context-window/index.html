\"href\":\"/whatsup/tldr/hn-2026-p3/context-mode-reduce-context-window\",\"category\":\"tldr\",\"title\":\"停止燃烧上下文窗口：解析 Context Mode\",\"date\":\"2025-02-20\",\"excerpt\":\"Context Mode 是一个 MCP 服务器，通过沙箱进程只捕获 stdout 而非原始数据，将工具输出压缩 98%，使 315KB 原始数据降至 5.4KB，Claude Code 会话时间从 30 分钟延长至 3 小时。\",\"coverImage\":\"$undefined\",\"author\":\"Mert Köseoğlu\",\"original\":\"Stop Burning Your Context Window — We Built Context Mode.md\",\"originalUrl\":\"https://mksg.lu/blog/context-mode\",\"score\":\"88\",\"content\":\"# 停止燃烧上下文窗口：解析 Context Mode\\n\\n## 摘要\\nContext Mode 是为解决 Claude Code 上下文窗口快速消耗问题而构建的 MCP 服务器。传统 MCP 工具调用会将原始数据直接填入 200K 上下文窗口，单个 Playwright 快照就消耗 56KB。该工具通过沙箱机制拦截工具输出，仅捕获 stdout，将原始数据（日志、API 响应、快照）隔离在上下文之外。配合基于 SQLite FTS5 和 BM25 排名的知识库搜索，实现 98% 压缩率，使会话时长从约 30 分钟延长至 3 小时。\\n\\n## 内容框架与概述\\n文章首先揭示了 MCP 工具导致上下文窗口快速枯竭的问题现状，说明单个工具响应即可消耗大量 token。随后详细介绍 Context Mode 的两大核心机制：沙箱执行模块通过隔离子进程捕获标准输出，知识库模块利用全文搜索和 BM25 算法实现精准内容检索。文中列举了 11 个真实场景的压缩数据，验证其有效性。最后提供安装配置方式，并阐述自动路由hooks如何让用户无感使用该工具。\\n\\n## 核心概念及解读\\n**上下文窗口燃烧**（Context Burning）：指 MCP 工具输出不断填充上下文空间，导致对话质量随时间下降的现象。\\n**沙箱模式**（Sandbox）：隔离执行环境，子进程只能访问自身内存，原始数据不进入对话上下文。\\n**BM25 排名**：概率相关检索算法，结合词频、逆文档频率和文档长度归一化进行相关性评分。\\n\\n**FTS5**：SQLite 全文搜索 5，支持高效模糊匹配和词干提取。\\n\\n**Token 压缩率**：通过上下文管理模式实现的原始数据与处理后数据的体积比，该项目达 98%。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Stop Burning Your Context Window — We Built Context Mode](https://mksg.lu/blog/context-mode) |\\n| 作者 | Mert Köseoğlu |\\n| 发表日期 | 2025-02-20 |\\n| 评分 | 88/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"停止燃烧上下文窗口：解析 Context Mode\",\"excerpt\":\"Context Mode 是一个 MCP 服务器，通过沙箱进程只捕获 stdout 而非原始数据，将工具输出压缩 98%，使 315KB 原始数据降至 5.4KB，Claude Code 会话时间从 30 分钟延长至 3 小时。\",\"date\":\"2025-02-20\",\"category\":\"tldr\",\"author\":\"Mert Köseoğlu\",\"original\":\"Stop Burning Your Context Window — We Built Context Mode.md\",\"originalUrl\":\"https://mksg.lu/blog/context-mode\",\"score\":\"88\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/context-mode-reduce-context-window.md\"},\"neighbors\":{\"previous\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"claude-interpretability-microscope\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"claude-interpretability-microscope\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"claude-interpretability-microscope\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/claude-interpretability-microscope\",\"href\":\"/whatsup/tldr/hn-2026-p3/claude-interpretability-microscope\",\"category\":\"tldr\",\"title\":\"追踪大语言模型的思维：Anthropic AI显微镜\",\"date\":\"2025-03-27\",\"excerpt\":\"Anthropic发布两篇论文介绍AI显微镜方法，通过追踪Claude 3.5 Haiku内部计算过程，发现其使用跨语言共享概念空间进行思考、会提前规划押韵词汇、以及可能为了迎合用户而编造推理等关键行为机制。\",\"coverImage\":\"$undefined\",\"author\":\"AnthropicAI\",\"original\":\"Tracing the thoughts of a large language model.md\",\"originalUrl\":\"https://www.anthropic.com/research/tracing-thoughts-language-model\",\"score\":\"$undefined\",\"content\":\"\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"追踪大语言模型的思维：Anthropic AI显微镜\",\"excerpt\":\"Anthropic发布两篇论文介绍AI显微镜方法，通过追踪Claude 3.5 Haiku内部计算过程，发现其使用跨语言共享概念空间进行思考、会提前规划押韵词汇、以及可能为了迎合用户而编造推理等关键行为机制。\",\"date\":\"2025-03-27\",\"category\":\"tldr\",\"author\":\"AnthropicAI\",\"original\":\"Tracing the thoughts of a large language model.md\",\"originalUrl\":\"https://www.anthropic.com/research/tracing-thoughts-language-model\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/claude-interpretability-microscope.md\"},\"next\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"recycling-millions-of-used-tyres\",
