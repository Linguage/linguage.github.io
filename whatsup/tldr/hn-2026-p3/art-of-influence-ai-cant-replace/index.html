范围内优化自己的提案，而高管则需要在全公司范围内寻找全局最优解。理解这一差异是建立影响力的前提。Fain 建议，与其试图说服高管接受自己的方案，不如抱着学习的态度去理解他们的决策框架。\n\n在具体实操层面，Fain 提供了多个可落地的技巧。其中最具启发性的是当领导说出看似错误的观点时，不要直接反驳，而是用好奇心追问其背后的推理过程。此外，只展示一个选项是常见错误，应该至少提供三个方案并附带各自的利弊分析，让高管做选择题而非判断题。\n\n最后，文章将影响力放在 AI 时代的背景下讨论。Fain 认为 AI 会接管大量信息处理和方案生成工作，但理解人心、建立信任、在复杂人际网络中推动决策的能力将变得更加稀缺和珍贵。\n\n## 核心概念及解读\n\n**频闪灯效应**：高管的日程安排高度碎片化，注意力在不同议题间快速切换，因此沟通必须在前 30 秒内抓住核心。\n\n**全局最优与局部最优**：高管关注公司层面的全局最优解，而员工倾向于在自己负责的领域内追求局部最优，这一认知错位是沟通失败的根本原因。\n\n**学习心态而非说服心态**：进入高管会议的目标应是理解对方的决策逻辑，而非单向推销自己的方案，这种姿态转换能显著提升影响力。\n\n**三选项法则**：向上沟通时只呈现一个方案是错误做法，应至少提供三个选项并附带利弊分析，让决策者做选择而非做判断。\n\n**好奇心追问**：当领导观点看似有误时，最佳回应方式是以真诚好奇的态度追问其推理过程，而非直接反驳，这既能获取关键信息又能维护关系。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The art of influence: The single most important skill that AI cant replace ｜ Jessica Fain (Webflow, ex-Slack)](https://www.lennysnewsletter.com/p/the-art-of-influence-jessica-fain?utm_source=post-email-title\u0026publication_id=10845\u0026post_id=189787031\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Lenny Rachitsky |\n| 发表日期 | 2026-03-22 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"art-of-influence-ai-cant-replace\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"art-of-influence-ai-cant-replace\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"art-of-influence-ai-cant-replace\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/art-of-influence-ai-cant-replace\",\"href\":\"/whatsup/tldr/hn-2026-p3/art-of-influence-ai-cant-replace\",\"category\":\"tldr\",\"title\":\"影响力艺术：AI 无法替代的核心职场技能\",\"date\":\"2026-03-22\",\"excerpt\":\"Jessica Fain 结合在 Slack 和 Webflow 的高管协作经验，系统阐述影响力这一 AI 无法替代的核心技能，揭示高管决策的真实逻辑与向上影响的方法论。\",\"coverImage\":\"$undefined\",\"author\":\"Lenny Rachitsky\",\"original\":\"The art of influence The single most important skill that AI cant replace Jessica Fain (Webflow, ex-Slack).
