和资源链接合集。\n\n## 核心概念及解读\n**代理访谈模式（Agent Interview Pattern）**：让AI代理以采访者身份向用户逐一提问，主动收集完成任务所需的个性化上下文，而非依赖用户被动编写指令。\n\n**空白页综合症（Blank Page Syndrome）**：面对空白文档无从下手的心理障碍，作者认为即使是粗略的AI生成内容也能作为有效的起点来突破这一困境。\n\n**OpenClaw**：社区对开放、可自由组合的个人AI代理生态的称呼，区别于封闭平台，强调用户对代理行为的完全掌控和定制能力。\n\n**Factory Missions**：Factory推出的长周期自动化代理功能，可端到端完成从规划到执行的大型软件构建任务，被作者描述为最接近AGI体验的产品之一。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Agents should interview you](https://www.bensbites.com/p/agents-should-interview-you?utm_source=post-email-title\u0026publication_id=4379299\u0026post_id=191959173\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=53wl0h\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Ben Tossell |\n| 发表日期 | 2026-03-24 |\n| 评分 | 72/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"agents-should-interview-you\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"agents-should-interview-you\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"agents-should-interview-you\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/agents-should-interview-you\",\"href\":\"/whatsup/tldr/hn-2026-p3/agents-should-interview-you\",\"category\":\"tldr\",\"title\":\"让AI代理主动采访你：高效传递上下文的实用模式\",\"date\":\"2026-03-24\",\"excerpt\":\"作者提出让AI代理通过访谈用户来获取个性化上下文的实用模式，并分享了用该方法构建课程大纲的真实体验。\",\"coverImage\":\"$undefined\",\"author\":\"Ben Tossell\",\"original\":\"Agents should interview you.md\",\"originalUrl\":\"https://www.bensbites.com/p/agents-should-interview-you?utm_source=post-email-title\u0026publication_id=4379299\u0026post_id=191959173\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=53wl0h\u0026triedRedirect=true\u0026utm_medium=email\",\"score\":\"72\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"让AI代理主动采访你：高效传递上下文的实用模式\",\"excerpt\":\"作者提出让AI代理通过
