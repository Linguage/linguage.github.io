威越野滑雪选手克勒博的惊人表现，以及挪威冬季两项选手斯特鲁拉·霍姆·拉格雷德的情感崩溃。这些旁支内容丰富了奥运的多维度叙事，但核心仍聚焦于美国运动员的政治表达与赛场表现。\n\n## 核心概念及解读\n**四转之神**：指美国花滑选手伊利亚·马利宁，因精通四周跳动作且在奥运前保持不败战绩而获此绰号，奥运自由滑中意外失误最终排名第八。\n\n**四周半跳（Quad Axel）**：花样滑冰中至今最具挑战性的跳跃动作之一，被视为超越人类极限的极限技术，马利宁在奥运赛中尝试该动作时失误。\n\n**奥运政治表达**：指运动员在奥运期间就政治议题发表看法，尽管奥组委严格限制政治标语，但多位美国运动员仍选择公开批评国内政策。\n\n**美国宪法与言论自由**：冰壶选手鲁奥霍宁在奥运新闻发布会上援引美国宪法，批评ICE执法侵犯公民权利，体现运动员对国内政治议题的关注。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The Quad God and American Reckoning at the Olympics](https://www.newyorker.com/magazine/2026/03/02/the-quad-god-and-the-american-reckoning-at-the-olympics?utm_source=twitter\u0026utm_medium=social\u0026utm_campaign=dhtwitter\u0026utm_content=null) |\n| 作者 | Vinson Cunningham |\n| 发表日期 | 2026-02-21 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"quad-god-american-reckoning-olympics\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"quad-god-american-reckoning-olympics\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"quad-god-american-reckoning-olympics\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/quad-god-american-reckoning-olympics\",\"href\":\"/whatsup/tldr/hn-2026-p3/quad-god-american-reckoning-olympics\",\"category\":\"tldr\",\"title\":\"四转之神的陨落与美国的奥运反思\",\"date\":\"2026-02-21\",\"excerpt\":\"讲述美国花滑新星“四转之神”伊利亚·马利宁奥运失误跌至第八名，以及美国运动员对国内政治问题的公开表态。\",\"coverImage\":\"$undefined\",\"author\":\"Vinson Cunningham\",\"original\":\"The Quad God and American Reckoning at the Olympics.md\",\"originalUrl\":\"https://www.newyorker.com/magazine/2026/03/02/the-quad-god-and-the-american-reckoning-at-the-olympics?utm_source=twitter\u0026utm_medium=social\u0026utm_campaign=dhtwitter\u0026utm_content=null\",\"score\":\"$undefined\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"四转之神的陨落与美国的奥运反思\",\"excerpt\":\"讲述美国花滑新星“四转之神
