有素养框架。当个人无法完成信息筛选时，便会依赖信任中介，这使得人工编辑判断的价值不降反升。\n\n最后，文章将讨论延伸至Anthropic发布的Claude宪法、联合国AI科学独立小组的治理构想，以及AI政策对劳动结果的影响，强调所有议题共同指向一个核心问题：AI日益成为信息中介，谁拥有编辑权威、如何设计和治理这种权威，已关乎每个领域。\n\n## 核心概念及解读\n**批判性忽视**：由Koziyeva等人提出的数字公民核心能力，指有意识地选择忽略哪些信息、将有限注意力投向何处的认知纪律。\n\n**AI Slop**：指低质量、大规模生产的AI生成内容，2025年被Merriam-Webster评为年度词汇，反映了合成媒体泛滥的全球现象。\n\n**注意力货币化**：在算法驱动的平台中，用户注意力被视为可提取的资源，参与行为无论是否促进理解都会被放大和变现。\n\n**信任中介**：当个人无法独立完成信息筛选时，依赖具有声誉的机构或品牌作为认知捷径来判断信息可信度的现象。\n\n**编辑权威**：在AI嵌入信息传递流程后，谁有权决定内容的筛选、排序与呈现方式，这一问题正从媒体延伸至所有领域。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The AI Ethics Brief : What Deserves Your Attention](https://brief.montrealethics.ai/p/the-ai-ethics-brief-184-what-deserves?utm_source=post-email-title\u0026publication_id=29999\u0026post_id=188161906\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=50w2ld\u0026triedRedirect=true) |\n| 作者 | Montreal AI Ethics Institute |\n| 发表日期 | 2026-02-17 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"ai-ethics-brief-attention-critical-ignoring\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"ai-ethics-brief-attention-critical-ignoring\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"ai-ethics-brief-attention-critical-ignoring\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/ai-ethics-brief-attention-critical-ignoring\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-ethics-brief-attention-critical-ignoring\",\"category\":\"tldr\",\"title\":\"AI伦理简报：注意力是最稀缺的资源\",\"date\":\"2026-02-17\",\"excerpt\":\"本文探讨在AI生成内容泛滥的数字环境中，注意力如何成为最稀缺的资源，并系统阐述了批判性忽视作为AI素养核心能力的必要性。\",\"coverImage\":\"$undefined\",\"author\":\"Montreal AI Ethics Institute\",\"original\":\"The AI Ethics Brief 184 What Deserves Your Attention.md\",\"originalUrl\":\"https://brief.montrealethics.ai/p/the-ai-ethics-brief-184-what-deserves?utm_source=post-email-title\u0026publication_id=29999\u0026post_id=188161906\u0026utm_campaign=email-post-title\u0
