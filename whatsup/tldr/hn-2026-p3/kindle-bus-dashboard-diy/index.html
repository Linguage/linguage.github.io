":\"kindle-bus-dashboard-diy\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"kindle-bus-dashboard-diy\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"kindle-bus-dashboard-diy\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/kindle-bus-dashboard-diy\",\"href\":\"/whatsup/tldr/hn-2026-p3/kindle-bus-dashboard-diy\",\"category\":\"tldr\",\"title\":\"将旧Kindle改造成实时公交站牌\",\"date\":\"2026-03-14\",\"excerpt\":\"A comprehensive tutorial on transforming an old Kindle into a live bus arrival display by jailbreaking the device, setting up SSH, creating a server to generate bus schedule images, and building a custom KUAL app for dashboard control.\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"Repurpose your old Kindle.md\",\"originalUrl\":\"https://www.mariannefeng.com/portfolio/kindle/\",\"score\":\"85\",\"content\":\"# 将旧Kindle改造成实时公交站牌\\n\\n## 摘要\\n本文详细记录了作者如何将闲置的Kindle电子书阅读器改造为实时公交到站信息显示屏。项目通过五个主要步骤实现：越狱 Kindle、安装 KUAL 和 MRPI、配置 SSH 连接、搭建生成公交信息图片的服务器、创建自定义 KUAL 应用程序。作者使用 NJTransit 的 GraphQL API 获取公交数据，利用 wkhtmltoimage 每分钟生成新图片，最终实现了类似 TRMNL 设备的效果，但成本远低于 140 美元。\\n\\n## 内容框架与概述\\n文章采用分步指南的形式展开，首先介绍项目背景和目标——以低成本方式实现公交实时显示功能。随后按照技术实现顺序详细讲解每个步骤，包括越狱固件选择、KUAL 和 MRPI 安装、SSH 配置等关键环节。在服务器构建部分，作者对比了 Puppeteer 和 wkhtmltoimage 两种方案，最终因服务器资源限制选择了更轻量的后者。最后详细说明了自定义 KUAL 应用的创建过程，包括 shell 脚本中的信号处理机制和屏幕刷新逻辑。\\n\\n## 核心概念及解读\\n**越狱**（Jailbreak）：获取 Kindle 系统 root 权限以安装第三方应用和自定义代码的过程。\\n**KUAL**：Kindle 专用应用启动器，提供菜单界面来启动自定义脚本和工具。\\n\\n**MRPI**：用于在 Kindle 上安装和管理自定义应用程序的工具框架。\\n\\n**SSH**：安全远程访问协议，作者通过 USBNetwork 扩展实现与 Kindle 的命令行交互。\\n\\n**wkhtmltoimage**：命令行工具，可将 HTML 页面转换为图像格式，用于生成 Kindle 屏幕图片。\\n\\n**eips**：Kindle 系统的图像显示命令，用于将服务器获取的图片渲染到电子墨水屏上。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Repurpose your old Kindle](https://www.mariannefeng.com/portfolio/kindle/) |\\n| 作者 |  |\\n| 发表日期 | 2026-03-14 |\\n| 评分 | 85/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[]
