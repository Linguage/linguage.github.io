 Karpathy从氛围编程到智能体工程的演进思考，Greg Brockman关于GitHub提交比例变化的观察，以及SemiAnalysis指出的Claude Code已占GitHub提交量5%的数据。作者推出了wtfhappened2025.com网站来持续追踪这些拐点。\n\n核心内容部分详细梳理了当月的重大产品发布。Perplexity Computer以编排优先的设计理念，通过多模型路由、异步子智能体协作和用量计费，展示了系统级智能体用户体验的新方向。编码代理方面，Karpathy详细描述了委托端到端本地部署的成功案例，OpenAI发布GPT-5.3-Codex并宣称速度提升25%，Claude Code迎来一周年并增加了Slack插件和LangSmith追踪，GitHub Copilot CLI正式发布并增加了仓库级深度研究功能。\n\n开放模型和本地推理领域同样进展迅速。阿里Qwen3.5 Medium系列实现了跨vLLM、GGUF、LM Studio、Ollama和Jan的快速部署，宣称在4-bit量化下保持近无损精度，27B版本支持80万上下文，35B版本在32GB显存上可支持超过100万上下文。从业者反馈显示，Qwen3.5-35B-A3B在本地智能体循环中显著提升了可靠性和稳定性，使得本地方案在许多工作流中已可媲美云端产品。\n\n## 核心概念及解读\n**Vibe Coding**：一种新的编程范式，开发者通过自然语言与AI协作，让模型承担大部分实现工作，人类更多扮演产品经理和架构师的角色，Karpathy认为这正在成为主流。\n\n**编排优先的智能体**：Perplexity Computer采用的架构理念，通过协调器模型将任务分配给专门模型，而非单一智能体循环，将智能体工作视为分布式工作流而非单次会话。\n\n**量化鲁棒性**：Qwen3.5声称在4-bit权重和KV-cache量化下仍能保持近无损精度，这标志着大模型在资源受限环境下的部署能力取得重要突破。\n\n**Benchmaxxing**：社区对过度关注排行榜分数而忽略实际能力的批评，提醒从业者不要被表面数据误导而忽视模型的本质价值。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [[AINews] wtfhappened2025.com：WTF Happened in December 2025?](https://www.latent.space/p/wtf2025?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=189197011\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Latent.Space |\n| 发表日期 | 2026-02-26 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"december-2025-ai-coding-turning-point\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"december-2025-ai-coding-turning-point\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"december-2025-ai-coding-turning-point\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/december-2025-ai-coding-turning-point\",\"href\":\"/whatsup/tldr/hn-2026-p3/december-2025-ai-coding-turning-point\",\"category\":\"tldr\",\"title\":\"2025年12月AI编程的转折点\",\"date\":\"2026-02-26\",\"excerpt\":\"2025年12月标志着AI编程领域的历史性转折点，Opus 4.5、Gemini 3和GPT 5.2相继发布，编码
