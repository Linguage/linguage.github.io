用词偏好和节奏习惯，并辅以正反对比的配对示例。\n\n标志性手法和反模式是文章特别强调的高价值模块。前者命名作者最擅长的思维跃迁或叙事套路，后者直接列出需要删除或改写的具体语言模式和句式陷阱。两者配合正面与负面段落示例，共同构成一套可验证、可迭代的质量标准体系，使模型在辅助写作时具备可量化的调优目标。\n\n## 核心概念及解读\n\n**AI风格指南**：将作者的写作直觉显性化为机器可执行的规范系统，区别于一次性提示词，强调可复用性和可操作性。\n\n**反模式（Anti-patterns）**：明确列出模型应避免的具体语言模式和结构缺陷，如过度使用 hedge 词、修辞问句、冗长开头等，是指南中最高价值的模块之一。\n\n**标志性手法（Signature Moves）**：命名并描述作者独特的叙事套路，如从个人摩擦点拉远到文化框架再回落到可操作建议的三段式推进。\n\n**语域光谱**：对于多作者场景，定义一个可接受的语调区间而非单一固定语调，涵盖从技术权威到自白式实践者等多种发声姿态。\n\n**一个核心观点法则**：每篇文章必须提出、命名或凝练一个令人难忘的核心概念，作为整篇文章的思想锚点。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [AI Style Guides: How to Help AI Write Like You](https://every.to/guides/ai-style-guide?source=post_button) |\n| 作者 | Katie Parrott |\n| 发表日期 | 2026-03-17 |\n| 评分 | 86/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"ai-style-guide-personalized-writing\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"ai-style-guide-personalized-writing\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"ai-style-guide-personalized-writing\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/ai-style-guide-personalized-writing\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-style-guide-personalized-writing\",\"category\":\"tldr\",\"title\":\"AI风格指南：让机器写出属于你的文字\",\"date\":\"2026-03-17\",\"excerpt\":\"系统阐述如何为AI构建个人化风格指南，涵盖语调、结构、句式、标志性手法、反模式与示例等核心要素，帮助AI摆脱千篇一律的输出，复刻真实作者的判断力与声音。\",\"coverImage\":\"$undefined\",\"author\":\"Katie Parrott\",\"original\":\"AI Style Guides How to Help AI Write Like You.md\",\"originalUrl\":\"https://every.to/guides/ai-style-guide?source=post_button\",\"score\":\"86\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"AI风格指南：让机器写出属于你的文字\",\"excerpt\":\"系统阐述如何为AI构建个人化风格指南，涵盖语调、结构、句式、标志性手法、反模式与示例等核心要素，帮助AI摆脱千篇一律的输出，复刻真实作者的判断力与声音。\",\"date\":\"2026-03-17\",\"category\":\"tldr\",\"author\":\"Katie
