项优化上表现竞争力尚可，但多项优化组合的可组合性存在明显短板。\n\n## 内容框架与概述\n文章首先介绍InferenceX v2基准的背景与规模，该测试由InferenceMAX v1升级而来，获得NVIDIA和AMD双方高层支持，覆盖过去三到四年内所有主流西方GPU SKU，采用近千块芯片进行全量基准测试。这是首个对Blackwell Ultra和AMD MI355X进行disagg加wideEP多节点测试的第三方基准。\n\n随后文章列出核心观察结论。NVIDIA在结合disagg prefill、wideEP与FP4等前沿推理技术的综合场景中表现绝对领先，GB300 NVL72对比H100可达成最高100倍性能差距，远超Jensen Huang在GTC 2024宣称的30倍目标。AMD在单项优化上与NVIDIA SGLang性能持平，但多项优化叠加后的可组合性是其最大短板。\n\n文章还包含技术概念入门部分，解释了交互性与吞吐量权衡、Disaggregated Serving、Wide Expert Parallelism、FP4/FP8量化等关键技术，帮助读者理解后续的性能数据分析与架构经济学讨论。\n\n## 核心概念及解读\n**Disaggregated Serving（分离式推理）**：将LLM推理的prefill阶段与decode阶段分别部署在不同GPU上，使各阶段可独立扩缩容，显著提升资源利用率和吞吐量。\n\n**Wide Expert Parallelism（宽专家并行）**：在MoE模型中将专家分散到多个节点上并行执行，降低单节点内存压力，是DeepSeek等大型MoE模型推理的关键优化手段。\n\n**Pareto前沿曲线**：描述交互性（tok/s/user）与系统吞吐量之间的最优权衡边界，同一条曲线上无法在不牺牲一方的情况下提升另一方。\n\n**可组合性（Composability）**：指多个独立优化技术叠加使用时的协同效果，AMD当前各优化单独运行良好但组合后性能提升不达预期，是其核心软件挑战。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [InferenceX v2: NVIDIA Blackwell Vs AMD vs Hopper - Formerly InferenceMAX](https://newsletter.semianalysis.com/p/inferencex-v2-nvidia-blackwell-vs?utm_source=post-email-title\u0026publication_id=6349492\u0026post_id=188090866\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=53wl0h\u0026triedRedirect=true) |\n| 作者 | Dylan Patel |\n| 发表日期 | 2026-02-17 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"inferencex-v2-nvidia-blackwell-amd-hopper-benchmark\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"inferencex-v2-nvidia-blackwell-amd-hopper-benchmark\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"inferencex-v2-nvidia-blackwell-amd-hopper-benchmark\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/inferencex-v2-nvidia-blackwell-amd-hopper-benchmark\",\"href\":\"/whatsup/tldr/hn-2026-p3/inferencex-v2-nvidia-blackwell-amd-hopper-benchmark\",\"category\":\"tldr\",\"title\":\"InferenceX v2: NVIDIA Blackwell与AMD推理基准全面对决\",\ ame\":\"mb-6\",\"children\":\"文章首先介绍InferenceX v2基准的背景与规模，该测试由InferenceMAX v1升级而来，获得NVIDIA和AMD双方高层支持，覆盖过去三到四年内所有主流西方GPU SKU，采用近千块芯片进行全量基准测试。这是首个对Blackwell Ultra和AMD MI355X进行disagg加wideEP多节点测试的第三方基准。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"随后文章列出核心观察结论。NVIDIA在结合disagg prefill、wideEP与FP4等前沿推理技术的综合场景中表现绝对领先，GB300 NVL72对比H100可达成最高100倍性能差距，远超Jensen Huang在GTC 2024宣称的30倍目标。AMD在单项优化上与NVIDIA SGLang性能持平，但多项优化叠加后的可组合性是其最大短板。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章还包含技术概念入门部分，解释了交互性与吞吐量权衡、Disaggregated Serving、Wide Expert Parallelism、FP4/FP8量化等关键技术，帮助读者理解后续的性能数据分析与架构经济学讨论。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Disaggregated Serving（分离式推理）\"}],\"：将LLM推理的prefill阶段与decode阶段分别部署在不同GPU上，使各阶段可独立扩缩容，显著提升资源利用率和吞吐量。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Wide Expert Parallelism（宽专家并行）\"}],\"：在MoE模型中将专家分散到多个节点上并行执行，降低单节点内存压力，是DeepSeek等大型MoE模型推理的关键优化手段。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Pareto前沿曲线\"}],\"：描述交互性（tok/s/user）与系统吞吐量之间的最优权衡边界，同一条曲线上无法在不牺牲一方的情况下提升另一方。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"可组合性（Composability）\"}],\"：指多个独立优化技术叠加使用时的协同效果，AMD当前各优化单独运行良好但组合后性能提升不达预期，是其核心软件挑战。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"原文信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"hea
