线作战人员提供情报分析、建模仿真、作战规划等AI支持。公司反对参与作战决策，这是军方职责。公司的两条底线是反对完全自主武器和大规模国内监控，这些涉及高层使用领域而非作战决策。\n\nAmodei为昨日泄露的内部帖子道歉，该帖子在特朗普宣布将Anthropic移出所有联邦系统、国防部宣布供应链风险指定、以及国防部与OpenAI达成交易的同一天写成，语气不当，不代表其审慎观点。\n\nAnthropic当前首要任务是确保作战人员和安全专家不被剥夺重要工具。公司将以名义价格继续为国防部提供模型和工程支持。Amodei强调，公司与国防部在推进美国国家安全和AI政府应用方面共识大于分歧，未来决策将基于这一共同前提。\n\n## 核心概念及解读\n\n**供应链风险指定**（Supply Chain Risk Designation）：美国国防部根据10 USC 3252法规对供应商做出的风险认定，旨在保护政府供应链安全，而非惩罚供应商。\n\n**最小限制手段原则**（Least Restrictive Means Necessary）：相关法律要求国防部在实现供应链保护目标时，必须采用限制性最小的措施。\n\n**完全自主武器禁令**（Fully Autonomous Weapons Ban）：Anthropic明确反对的两条红线之一，拒绝参与开发完全自主的武器系统。\n\n**大规模国内监控禁令**（Mass Domestic Surveillance Ban）：Anthropic的另一条底线，拒绝参与大规模国内监控项目。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Where things stand with the Department of War](https://www.anthropic.com/news/where-stand-department-war) |\n| 作者 | @AnthropicAI |\n| 发表日期 | 2026-03-05 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"anthropic-department-war-current-stand\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"anthropic-department-war-current-stand\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"anthropic-department-war-current-stand\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/anthropic-department-war-current-stand\",\"href\":\"/whatsup/tldr/hn-2026-p3/anthropic-department-war-current-stand\",\"category\":\"tldr\",\"title\":\"Anthropic与美国国防部争议现状\",\"date\":\"2026-03-05\",\"excerpt\":\"Anthropic CEO Dario Amodei回应美国国防部将公司列为供应链风险，表示将在法庭上挑战这一决定，同时承诺继续为军方提供AI支持，强调双方在国家安全领域的共同立场。\",\"coverImage\":\"$undefined\",\"author\":\"AnthropicAI\",\"original\":\"Where things stand with the Department of War.md\",\"originalUrl\":\"https://www.anthropic.com/news/where-stand-department-war\",\"score\":\"$undefined\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"
