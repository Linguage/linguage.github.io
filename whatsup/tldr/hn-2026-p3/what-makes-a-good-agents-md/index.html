设计工具、Claude Dispatch移动协作功能、GPT-5.4 mini发布、Midjourney v8测试等动态，以及若干实用工具和资源推荐。\n\n## 核心概念及解读\n**AGENTS.md**：跨平台AI代理指令文件，在对话开始前预加载到模型上下文中，用于传达用户偏好和行为规范。\n\n**条件块（Conditional Blocks）**：用XML标签包裹指令片段，使其仅在满足特定条件时生效，避免一刀切的规则在不同场景下互相干扰。\n\n**分层动态加载**：代理在不同子目录工作时自动加载对应层级的指令文件，实现精细化的上下文管理。\n\n**符号链接（Symlink）**：将AGENTS.md和CLAUDE.md链接为同一份文件，确保只需维护一套指令即可兼容多种AI工具。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [What makes a good AGENTS.md?](https://www.bensbites.com/p/what-makes-a-good-agentsmd?utm_source=post-email-title\u0026publication_id=4379299\u0026post_id=191347501\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=53wl0h\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Ben Tossell |\n| 发表日期 | 2026-03-19 |\n| 评分 | 72/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"what-makes-a-good-agents-md\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"what-makes-a-good-agents-md\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"what-makes-a-good-agents-md\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/what-makes-a-good-agents-md\",\"href\":\"/whatsup/tldr/hn-2026-p3/what-makes-a-good-agents-md\",\"category\":\"tldr\",\"title\":\"如何编写高效的AGENTS.md指令文件\",\"date\":\"2026-03-19\",\"excerpt\":\"探讨如何编写高效的AGENTS.md指令文件，强调应聚焦个人偏好与行为纠正而非技术栈细节，并介绍条件块等实用技巧。\",\"coverImage\":\"$undefined\",\"author\":\"Ben Tossell\",\"original\":\"What makes a good AGENTS.md?.md\",\"originalUrl\":\"https://www.bensbites.com/p/what-makes-a-good-agentsmd?utm_source=post-email-title\u0026publication_id=4379299\u0026post_id=191347501\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=53wl0h\u0026triedRedirect=true\u0026utm_medium=email\",\"score\":\"72\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"如何编写高效的AGENTS.md指令文件\",\"excerpt\":\"探讨如何编写高效的AGE
