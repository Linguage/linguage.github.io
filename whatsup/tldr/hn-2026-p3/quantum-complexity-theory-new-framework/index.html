性。该理论始终假设输入和输出是经典的0和1字符串，中间的处理过程可以是量子或经典的。但现实世界中存在许多问题的输入和输出本身就是量子的，例如量子位承诺方案。在这种方案中，即使拥有无限强大的经典计算能力，也无法破解量子信封，这表明量子计算任务可能与经典任务存在根本性差异。\n\nYuen团队的研究进展集中在Uhlmann定理上。这个量子信息理论的基础结果量化了在只能操作纠缠粒子对中的一个粒子时，将一个量子态转换为另一个量子态的最佳可能结果。研究团队发现这个Uhlmann变换问题在多个领域反复出现，是连接量子通信、量子复杂度、量子密码学乃至黑洞霍金辐射解码的核心枢纽。\n\n文章还讲述了Yuen的个人背景。作为柬埔寨难民的后代，他最初学习计算机科学是为了设计电子游戏，后来通过Scott Aaronson的博客接触到量子计算理论，从而走上学术道路。他于2020年合作完成了量子纠缠计算能力的里程碑式证明，现在正领导构建这个全新的理论框架。\n\n## 核心概念及解读\n**完全量子复杂度理论**（Fully Quantum Complexity Theory）：研究输入和输出本身都是量子态的计算问题的理论框架，不同于传统只处理经典输入输出的复杂度理论。\n\n**Uhlmann变换问题**（Uhlmann Transformation Problem）：在只能局部操作纠缠粒子对中的一个粒子时，将一个量子态转换为另一个量子态的最佳方法，是多个量子领域的核心问题。\n\n**量子位承诺**（Quantum Bit Commitment）：将消息放入量子密封信封的密码学技术，即使拥有强大计算能力也无法破解，突破了经典密码学的假设。\n\n**幺正综合问题**（Unitary Synthesis Problem）：如果拥有无限强大的经典预言机，能否高效执行任意量子态转换？这是理解经典与量子世界逻辑关系的关键问题。\n\n**黑洞霍金辐射解码**（Black Hole Hawking Radiation Decoding）：分析和收集黑洞辐射出的纠缠粒子的问题，本质上等同于Uhlmann变换问题。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [A New Complexity Theory for the Quantum Age](https://www.quantamagazine.org/a-new-complexity-theory-for-the-quantum-age-20260217/?mc_cid=470344cd72\u0026mc_eid=9ed96560c1) |\n| 作者 | Ben Brubaker |\n| 发表日期 | 2026-02-17 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"quantum-complexity-theory-new-framework\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"quantum-complexity-theory-new-framework\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"quantum-complexity-theory-new-framework\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/quantum-complexity-theory-new-framework\",\"href\":\"/whatsup/tldr/hn-2026-p3/quantum-complexity-theory-new-framework\",\"category\":\"tldr\",\"title\":\"量子时代的全新复杂度理论\",\"date\":\"2026-02-17\",\"excerpt\":\"哥伦比亚大学教授Henry Yuen正在构建一个全新的量子复杂度理论，以处理那些输入和输出本身就是量子的计算问题。传统复杂度理论只能处理经典的0和1字符串，但对于量子态的输入和输出无能为力。Yuen团队发现Uhlmann变换问题是连接量子密码学、黑洞霍金辐射解码等多个领域的核心问题，这可能标志着量子计算问题与经典问题存在本质差异。\",\"coverImage\":\"$undefined
