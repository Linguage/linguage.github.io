让AI代理能够自动处理代码审查、部署验证等原本需要人工介入的云端工作流程。\n\n**扩散语言模型**：采用扩散模型架构的语言生成方法，可实现极高的输出速度，如Mercury 2声称达到每秒1000个token。\n\n**能力与可靠性差距**：指AI代理的能力快速提升，但可靠性增长缓慢的现象，存在12个维度的可靠性问题。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [[AINews] The Unreasonable Effectiveness of Closing the Loop](https://www.latent.space/p/ainews-the-unreasonable-effectiveness?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=189088242\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Latent.Space |\n| 发表日期 | 2026-02-25 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"closing-the-loop-ai-devtools\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"closing-the-loop-ai-devtools\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"closing-the-loop-ai-devtools\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/closing-the-loop-ai-devtools\",\"href\":\"/whatsup/tldr/hn-2026-p3/closing-the-loop-ai-devtools\",\"category\":\"tldr\",\"title\":\"AI开发工具闭环时代到来\",\"date\":\"2026-02-25\",\"excerpt\":\"AI开发工具从内循环向外循环延伸，Devin、Cursor、Claude Code等推出新功能\",\"coverImage\":\"$undefined\",\"author\":\"Latent.Space\",\"original\":\"AINews The Unreasonable Effectiveness of Closing the Loop.md\",\"originalUrl\":\"https://www.latent.space/p/ainews-the-unreasonable-effectiveness?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=189088242\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"AI开发工具闭环时代到来\",\"excerpt\":\"AI开发工具从内循环向外循环延伸，Devin、Cursor、Claude Code等推出新功能\",\"date\":\"2026-02-25\",\"category\":\"tldr\",\"author\":\"Latent.Space\",\"original\":\"AINews id=458709\u0026post_id=189035949\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\",\"score\":\"88\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/future-of-software-engineering-with-ai-six-predictions.md\"}},\"headings\":[{\"depth\":2,\"text\":\"摘要\",\"id\":\"摘要\"},{\"depth\":2,\"text\":\"内容框架与概述\",\"id\":\"内容框架与概述\"},{\"depth\":2,\"text\":\"核心概念及解读\",\"id\":\"核心概念及解读\"},{\"depth\":2,\"text\":\"原文信息\",\"id\":\"原文信息\"}],\"sidebar\":null,\"directoryHref\":\"/whatsup?tab=tldr\",\"children\":\"$L18\"}]\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本文探讨了AI开发工具领域正在发生的范式转变，即从关注内循环转向闭合外循环。作者指出，2010年代开发工具的创新主要集中在外循环，而AI时代初期则聚焦于内循环，现在主流AI编码公司开始向外循环扩展。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章首先阐述了开发工具行业中内循环与外循环的概念区分。内循环指在IDE中进行的开发工作，外循环则涉及云端部署和CI/CD流程。在2010年代，外循环工具如GitLab、Vercel等获得了大量投资和创新，而内循环工具多为免费开源。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI浪潮彻底改变了这一格局。Copilot开启了内循环AI编码应用的浪潮，Cursor成为这一领域的先锋，而外循环工具虽有AI加持但变化相对有限。然而最近的趋势显示，领先AI编码公司开始向闭合外循环方向发展。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"作者列举了多个典型案例：Devin Autofix能够自动处理代码审查评论，Cursor结合了全计算机控制和视频输出功能，Claude Code推出了远程控制功能。这些创新可以被看作是对社交媒体上月流行的Ralph Loops概念的泛化，随着技术发展，人类在循环中的参与度正在逐渐降低。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"内循环\"}],\"：指开发者在IDE中进行的工作，包括代码编写、调试等操作，通常压缩在单个git提交内。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"外循环\"}],\"：指在云端进行的开发工作，发生在git提交之间，如CI/CD流程、部署测试等。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"闭合外循环\"}],\"：让AI代理能够自动处理代码审查、部署验证等原本需要人工介入的云端工作流程。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"扩散语言模型\"}],\"：采用扩散模型架构的语言生成方法，可实现极高的输出速度，如Mercury 2声称达到每秒1000个token。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"能力与可靠性差距\"}],\"：指AI代理的能力快速提升，但可靠性增长缓慢的现象，存在12个维度的可靠性问题。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"原文信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#原文信息\",\"children\":\"原文信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$
