验已将该距离扩展到超过1000公里。1993年他们又与合作者共同发表了量子隐形传态的里程碑论文，进一步拓展了量子信息科学的边界。\n\n最后，文章将两人置于更大的学术图景中加以评价。在量子信息被主流学界边缘化的年代，Bennett和Brassard是最坚定的倡导者，他们不仅贡献了关键技术成果，更塑造了整个领域的文化气质。同行评价其影响巨大，为今天蓬勃发展的量子计算与量子通信产业奠定了根基。\n\n## 核心概念及解读\n**量子货币**：Wiesner提出的一种利用量子测量不可克隆性防伪的货币方案，是量子密码学的思想源头，但因实用性问题未能实现。\n\n**BB84协议**：Bennett与Brassard于1984年提出的量子密钥分发方案，通信双方通过交换光子建立共享密钥，任何窃听都会扰动信号从而被检测，安全性不依赖数学难题假设。\n\n**量子测量干扰**：对量子粒子进行测量会不可预测地改变其状态，这一通常被视为麻烦的特性被转化为保护信息安全的核心机制。\n\n**量子隐形传态**：1993年由Bennett等人提出的方案，利用量子纠缠将一个量子态从一个位置传输到另一个位置，是量子信息科学的里程碑成果。\n\n**量子密钥分发**：利用量子物理原理实现的安全密钥交换技术，与经典密码学不同，其安全性基于物理定律而非计算复杂度假设。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Quantum Cryptography Pioneers Win Turing Award](https://www.quantamagazine.org/quantum-cryptography-pioneers-win-turing-award-20260318/?mc_cid=1c8c4b0b7d\u0026mc_eid=9ed96560c1) |\n| 作者 | Ben Brubaker |\n| 发表日期 | 2026-03-18 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"quantum-cryptography-turing-award\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"quantum-cryptography-turing-award\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"quantum-cryptography-turing-award\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/quantum-cryptography-turing-award\",\"href\":\"/whatsup/tldr/hn-2026-p3/quantum-cryptography-turing-award\",\"category\":\"tldr\",\"title\":\"量子密码学先驱荣获图灵奖\",\"date\":\"2026-03-18\",\"excerpt\":\"量子密码学先驱Bennett与Brassard因奠基量子信息科学获图灵奖，其BB84协议开创了无条件安全通信的新纪元。\",\"coverImage\":\"$undefined\",\"author\":\"Ben Brubaker\",\"original\":\"Quantum Cryptography Pioneers Win Turing Award.md\",\"originalUrl\":\"https://www.quantamagazine.org/quantum-cryptography-pioneers-win-turing-award-20260318/?mc_cid=1c8c4b0b7d\u0026mc_eid=9ed96560c1\",\"score\":\"88\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"量子密码
