系列。然而随着阿里 AI 战略的推进，集团期望 Qwen 承担更多角色：支持云业务商业化、配合千问 App 等。但 Qwen 团队更希望持续训练更强模型，甚至开始自建 Infra 能力，这与其他团队产生职能重叠。2025 年以来，Qwen 系列模型训练也遭遇技术波折，旗舰版迟迟无法发布。\n\n文章还深入刻画了林俊旸的个人背景：本科英语文学，硕士转向计算语言学，2019 年加入阿里。他并非传统的技术科班出身，却带领 Qwen 取得巨大成功，成为阿里面向技术社区的重要代言人。他的管理风格强调明确目标和抓大放小，与典型的大公司管理者形成鲜明对比。正是这种独特的个人特质，让他在技术社区建立了强大的影响力，但也埋下了与组织制度冲突的种子。\n\n最后文章上升到行业层面，指出这是所有 AI 大公司共同面临的治理难题。技术带头人往往是最聪明、自驱、有野心的个体，而公司需要平衡多重目标：用户增长、GPU 成本、模型领先、商业化落地。如何在保持技术团队创造力的同时确保组织协同，如何在开源精神与商业回报之间找到平衡，这些问题没有标准答案。林俊旸的离职风波，恰恰是这些深层矛盾在特定时刻的集中爆发。\n\n## 核心概念及解读\n\n**超级个体**（Super Individual）：指在 AI 时代具有超强技术能力、自驱力和个人影响力的技术负责人，他们能够以小团队创造巨大价值，但也可能挑战组织的制度边界。\n\n**垂直整合与水平分工**（Vertical Integration vs Horizontal Specialization）：Qwen 原本是涵盖不同训练流程和模态的垂直整合团队，阿里计划将其重组为按预训练、后训练、文本、图像等职能划分的水平团队，这代表了从技术导向向组织协同的转变。\n\n**开源影响力**（Open Source Influence）：Qwen 通过开源策略在全球建立了强大的开发者生态，衍生模型数量超过 8 万个，这既是阿里的技术战略资产，也增强了团队的话语权和独立性。\n\n**既要又要还要**（Multiple Conflicting Mandates）：指 AI 大公司面临的困境，需要同时驱动用户增长、承担昂贵 GPU 成本、保持模型领先、实现商业化，这些目标之间存在内在冲突。\n\n**组织制度红线**（Organizational Red Line）：阿里明确的原则是个人意志要服从组织需求，升降由公司决定，不满可以内部沟通，但不能在社交媒体公开发声挑战制度。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [林俊旸离职风波始末：AI 技术负责人与大公司的成长与分歧](https://mp.weixin.qq.com/s/uE2cqN1AaCruyJrdbEpbzA) |\n| 作者 | 晚点团队 |\n| 发表日期 | 2026-03-07 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"lin-junyang-alibaba-qwen-departure\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"lin-junyang-alibaba-qwen-departure\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"lin-junyang-alibaba-qwen-departure\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/lin-junyang-alibaba-qwen-departure\",\"href\":\"/whatsup/tldr/hn-2026-p3/lin-junyang-alibaba-qwen-departure\",\"category\":\"tldr\",\"title\":\"林俊旸离职风波背后的大公司 AI 管理难题\",\"date\":\"2026-03-07\",\"excerpt\":\"阿里 Qwen 团队负责人林俊旸突然离职事件全过程，揭示 AI 时代大公司面临的技术理想与组织管理之间的深层矛盾。\",\"coverImage\":\"$undefined\",\"author\":\"晚点团队\",\"original\":\"林俊旸离职风波始末：AI 技术负责人与大公司的成长与分歧.md\ a 的 Llama 系列。然而随着阿里 AI 战略的推进，集团期望 Qwen 承担更多角色：支持云业务商业化、配合千问 App 等。但 Qwen 团队更希望持续训练更强模型，甚至开始自建 Infra 能力，这与其他团队产生职能重叠。2025 年以来，Qwen 系列模型训练也遭遇技术波折，旗舰版迟迟无法发布。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章还深入刻画了林俊旸的个人背景：本科英语文学，硕士转向计算语言学，2019 年加入阿里。他并非传统的技术科班出身，却带领 Qwen 取得巨大成功，成为阿里面向技术社区的重要代言人。他的管理风格强调明确目标和抓大放小，与典型的大公司管理者形成鲜明对比。正是这种独特的个人特质，让他在技术社区建立了强大的影响力，但也埋下了与组织制度冲突的种子。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后文章上升到行业层面，指出这是所有 AI 大公司共同面临的治理难题。技术带头人往往是最聪明、自驱、有野心的个体，而公司需要平衡多重目标：用户增长、GPU 成本、模型领先、商业化落地。如何在保持技术团队创造力的同时确保组织协同，如何在开源精神与商业回报之间找到平衡，这些问题没有标准答案。林俊旸的离职风波，恰恰是这些深层矛盾在特定时刻的集中爆发。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"超级个体\"}],\"（Super Individual）：指在 AI 时代具有超强技术能力、自驱力和个人影响力的技术负责人，他们能够以小团队创造巨大价值，但也可能挑战组织的制度边界。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"垂直整合与水平分工\"}],\"（Vertical Integration vs Horizontal Specialization）：Qwen 原本是涵盖不同训练流程和模态的垂直整合团队，阿里计划将其重组为按预训练、后训练、文本、图像等职能划分的水平团队，这代表了从技术导向向组织协同的转变。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"开源影响力\"}],\"（Open Source Influence）：Qwen 通过开源策略在全球建立了强大的开发者生态，衍生模型数量超过 8 万个，这既是阿里的技术战略资产，也增强了团队的话语权和独立性。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"既要又要还要\"}],\"（Multiple Conflicting Mandates）：指 AI 大公司面临的困境，需要同时驱动用户增长、承担昂贵 GPU 成本、保持模型领先、实现商业化，这些目标之间存在内在冲突。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"组织制度红线\"}],\"（Organizational Red Line）：阿里明确的原则是个人意志要服从组织需求，升降由公司决定，不满可以内部沟通，但不能在社交媒体公开发声挑战制度。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"原文信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#原文信息\",\"children\":\"原文信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"字段\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"内容\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[\"$L19\",\"$L1a\"]}],\"$L1b\",\"$L1c\"]}]]}]}],\"\\n\",\"$L1d\",\"\\n\",\"$L1e\"]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"原文\"}]\n1a:[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://mp.weixin.qq.com/s/uE2cqN1AaCruyJrdbEpbzA\",\"children\":\"林俊旸离职风波始末：AI 技术负责人与大公司的成长与分歧\"}]}]\n1b:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"作者\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"晚点团队\"}]]}]\n1c:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 t
