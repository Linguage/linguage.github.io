的各个环节。在系统设计面试中，候选人被鼓励添加更多服务、队列和分片来展示思考深度；在设计评审中，工程师被问及是否应该面向未来，结果添加了不必要的抽象层。\n\n文章澄清了作者的立场：复杂度本身并非坏事，真正的问题是未赢得的复杂度。当问题本身需要复杂方案时，复杂是合理的；但为了避免假设的未来需求而预先添加复杂度，则是值得警惕的。作者指出，通向高级工程师的道路不是学习更多工具和模式，而是学会何时不使用它们。任何人都可以增加复杂度，但需要经验和自信才能克制住不添加不必要的复杂度。\n\n## 核心概念及解读\n**未赢得的复杂度**（Unearned Complexity）：指为了应对假设的未来需求而预先添加的复杂度，而非解决当前实际问题所必需的复杂度。\n\n**简约需要可见性**：简单的工作不会自动说话，工程师需要学会用不同的方式描述自己的决策过程，突出评估多种方案后选择最简单方案的专业判断。\n\n**复杂度税**：添加不必要的抽象层和配置框架会增加系统理解和维护的成本，即使它们看起来更专业、更工程化。\n\n**克制即智慧**：真正的高级工程师不是掌握更多工具和模式，而是学会何时不使用它们。增加复杂度很容易，但需要经验和自信才能克制住不添加不必要的复杂度。\n\n**将简约设为默认**：领导者应该改变提问方式，从是否考虑了规模转向什么是最简单的版本，以及什么具体信号表明我们需要更复杂的方案。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Nobody Gets Promoted for Simplicity](https://terriblesoftware.org/2026/03/03/nobody-gets-promoted-for-simplicity/) |\n| 作者 | Terrible Software |\n| 发表日期 | 2026-03-03 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"nobody-gets-promoted-for-simplicity\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"nobody-gets-promoted-for-simplicity\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"nobody-gets-promoted-for-simplicity\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/nobody-gets-promoted-for-simplicity\",\"href\":\"/whatsup/tldr/hn-2026-p3/nobody-gets-promoted-for-simplicity\",\"category\":\"tldr\",\"title\":\"为什么没有人因为简约而获得晋升\",\"date\":\"2026-03-03\",\"excerpt\":\"本文探讨了软件工程领域中的一个系统性问题：过度构建的工程师容易获得晋升，而用最简单方案解决问题的工程师却被忽视。文章分析了这种现象在面试、设计评审和晋升决策中的表现，并提出了对工程师和领导者的具体建议。\",\"coverImage\":\"$undefined\",\"author\":\"Terrible Software\",\"original\":\"Nobody Gets Promoted for Simplicity.md\",\"originalUrl\":\"https://terriblesoftware.org/2026/03/03/nobody-gets-promoted-for-simplicity/\",\"score\":\"$undefined\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"为什么没有人因为简约而获得晋升\",\"excerpt\":\"本文探讨了软件工程领域
