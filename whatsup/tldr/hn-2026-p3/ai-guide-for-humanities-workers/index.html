而 AI 直接生成又会产生幻觉和偷懒。解决方案是把创作变成产线，把产线变成可迭代的系统。文章最后回归到作品质量的本质：材料乘以品味决定上限，AI 改变的只是与材料交互的效率，而非创作的本质。\n\n## 核心概念及解读\n\n**工作台式思维**：不向 AI 索要结果，而是调动其工具完成过程。将任务拆解为清晰的目标受众、讲解方式、结构要求和语气标准。\n\n**工业化先行**：先将工作变成可拆分、可复用、可质检的产线，再把子步骤交给 AI。流程清晰度比模型选择更决定质量上限。\n\n**预期管理**：AI 的常识水平约等于优秀本科生。任何超过常识的内容都需要你提供范例、标准和语料，不能默认它知道。\n\n**白盒分步骤**：让 AI 一步一步逼近目标，比黑箱一次性完成更可靠。把显而易见的正确做法写进流程，避免 AI 在最省力的路径上犯错。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [给人文工作者的 AI 使用指南](https://x.com/HanyangWang/article/2029362155607474359) |\n| 作者 | MasterPa (@HanyangWang) |\n| 发表日期 | 2026-03-05 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"ai-guide-for-humanities-workers\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"ai-guide-for-humanities-workers\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"ai-guide-for-humanities-workers\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/ai-guide-for-humanities-workers\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-guide-for-humanities-workers\",\"category\":\"tldr\",\"title\":\"人文工作者的 AI 使用指南\",\"date\":\"2026-03-05\",\"excerpt\":\"本文是一套面向人文工作者的 AI 使用方法论，强调 AI 不是魔法而是工作台，提出了可追溯、可操纵、可署名三条底线，以及从许愿式转向工作台式、多模型对比、预期管理等11条实用原则。\",\"coverImage\":\"$undefined\",\"author\":\"MasterPa (@HanyangWang)\",\"original\":\"给人文工作者的 AI 使用指南.md\",\"originalUrl\":\"https://x.com/HanyangWang/article/2029362155607474359\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"人文工作者的 AI 使用指南\",\"excerpt\":\"本文是一套面向人文工作者的 AI 使用方法论，强调 AI 不是魔法而是工作台，提出了可追溯、可操纵、可署名三条底线，以及从许愿式转向工作台式、多模型对比、预期管理等11条实用原则。\",\"date\":\"2026-03-05\",\"category\":\"tldr\",\"author\":\"MasterPa (@HanyangWang)\",\"original\":\"给人文工作者的 AI 使用指南.md\",\"originalUrl\":\"https://x.com/HanyangWang/article/2029362155607474359\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/ru
