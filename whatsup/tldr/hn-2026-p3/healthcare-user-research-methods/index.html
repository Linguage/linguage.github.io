（Contextual Inquiry）**：在真实工作场景中观察并即时提问，而非在会议室中进行抽象访谈，能揭示理想化描述与实际行为之间的差距。\n\n**最近一次技巧（Last Time Technique）**：将问题从一般性假设转化为对最近一次具体事件的回忆重建，迫使受访者还原真实行为序列而非概括性描述。\n\n**变通挖掘（Workaround Excavation）**：通过引导性问题让临床工作者说出他们不得不做的非标准操作，每一个变通都是一个未被满足的产品需求信号。\n\n**警报疲劳（Alert Fatigue）**：临床环境中通知过载导致医生系统性忽略警报，AI产品的关键挑战不是准确性而是如何获得足够信任以改变行为。\n\n**工作流适配（Workflow Fit）**：功能在工作流程中的嵌入位置比功能本身的质量更决定采用率，多一次点击就可能扼杀一个优秀模型的实际价值。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [What Doctors Wont Tell You in User Research (And How to Actually Find Out)](https://chadyou.substack.com/p/what-doctors-wont-tell-you-in-user?utm_source=post-email-title\u0026publication_id=5403011\u0026post_id=190036540\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Chad You |\n| 发表日期 | 2026-03-06 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"healthcare-user-research-methods\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"healthcare-user-research-methods\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"healthcare-user-research-methods\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/healthcare-user-research-methods\",\"href\":\"/whatsup/tldr/hn-2026-p3/healthcare-user-research-methods\",\"category\":\"tldr\",\"title\":\"医疗用户研究中医生不会告诉你的真相\",\"date\":\"2026-03-06\",\"excerpt\":\"文章揭示了医疗领域用户研究的特殊性，提出五种替代传统访谈的实战方法，帮助产品团队挖掘临床工作中的真实需求。\",\"coverImage\":\"$undefined\",\"author\":\"Chad You\",\"original\":\"What Doctors Wont Tell You in User Research (And How to Actually Find Out).md\",\"originalUrl\":\"https://chadyou.substack.com/p/what-doctors-wont-tell-you-in-user?utm_source=post-email-title\u0026publication_id=5403011\u0026post_id=190036540\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\u0026utm_medium=email\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\
