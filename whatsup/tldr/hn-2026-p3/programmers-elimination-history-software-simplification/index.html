描述1970年代AI热潮与随后的第一次AI寒冬，专家系统的宏伟承诺因技术局限性而破灭。然后审视1980年代的第四代语言和CASE工具，这些同样宣称能自动生成代码的工具，最终暴露了从需求规格到可工作软件之间存在不可逾越的认知鸿沟。最后将历史与当前AI代码生成热潮类比，强调理解这一历史循环对判断当下技术趋势的重要性。\n\n## 核心概念及解读\n**COBOL语言**（COBOL）：1959年创建的商务编程语言，语法接近英语，目标是让业务人员能读写代码，但最终成为程序员需求量最大的语言之一。\n\n**第一次AI寒冬**（First AI Winter）：1970年代AI研究因过度承诺无法兑现而失去资金支持，导致整个领域陷入长期低潮。\n\n**第四代语言**（4GL）：1980年代的声明式编程语言，承诺通过图形界面和业务规则配置替代手工编码，但复杂应用仍需专业开发者。\n\n**CASE工具**（Computer-Aided Software Engineering）：1980-90年代的自动化建模与代码生成工具，最终因规格与实现之间的根本性差距而衰落。\n\n**编程民主化**（Democratization of Programming）：指让非技术人员无需编写代码即可创建软件系统的理念，文章认为这在60年间反复被证明为不切实际的承诺。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The Eternal Promise：A History of Attempts to Eliminate Programmers](https://www.ivanturkovic.com/2026/01/22/history-software-simplification-cobol-ai-hype/) |\n| 作者 | ivan.turkovic |\n| 发表日期 | 2026-01-22 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"programmers-elimination-history-software-simplification\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"programmers-elimination-history-software-simplification\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"programmers-elimination-history-software-simplification\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/programmers-elimination-history-software-simplification\",\"href\":\"/whatsup/tldr/hn-2026-p3/programmers-elimination-history-software-simplification\",\"category\":\"tldr\",\"title\":\"消除程序员的历史：六十年的徒劳承诺\",\"date\":\"2026-01-22\",\"excerpt\":\"本文回顾了软件行业60多年来反复出现的消除程序员承诺，从1959年COBOL到当今AI代码生成，每次技术浪潮都宣称将让编程民主化，但最终都创造了新的专业编程岗位而非消除程序员。\",\"coverImage\":\"$undefined\",\"author\":\"ivan.turkovic\",\"original\":\"The Eternal Promise A History of Attempts to Eliminate Programmers.md\",\"originalUrl\":\"https://www.ivanturkovic.com/2026/01/22/history-software-simplification-cobol-ai-hype/\",\"score\":\"88\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\" 视1980年代的第四代语言和CASE工具，这些同样宣称能自动生成代码的工具，最终暴露了从需求规格到可工作软件之间存在不可逾越的认知鸿沟。最后将历史与当前AI代码生成热潮类比，强调理解这一历史循环对判断当下技术趋势的重要性。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"COBOL语言\"}],\"（COBOL）：1959年创建的商务编程语言，语法接近英语，目标是让业务人员能读写代码，但最终成为程序员需求量最大的语言之一。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"第一次AI寒冬\"}],\"（First AI Winter）：1970年代AI研究因过度承诺无法兑现而失去资金支持，导致整个领域陷入长期低潮。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"第四代语言\"}],\"（4GL）：1980年代的声明式编程语言，承诺通过图形界面和业务规则配置替代手工编码，但复杂应用仍需专业开发者。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"CASE工具\"}],\"（Computer-Aided Software Engineering）：1980-90年代的自动化建模与代码生成工具，最终因规格与实现之间的根本性差距而衰落。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"编程民主化\"}],\"（Democratization of Programming）：指让非技术人员无需编写代码即可创建软件系统的理念，文章认为这在60年间反复被证明为不切实际的承诺。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"原文信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#原文信息\",\"children\":\"原文信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-acc
