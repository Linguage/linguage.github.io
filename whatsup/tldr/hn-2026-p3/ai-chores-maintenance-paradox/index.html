契机。\n\n## 核心概念及解读\n**嵌套维护**：Stewart Brand 提出的概念，值得维护的事物总是嵌套在更大的、更值得维护的系统中，形成层级结构。\n\n**COBOL Cowboys**：一群平均年龄极高的资深工程师团队，专门为全球遗留 COBOL 系统提供紧急维护，是维护危机的缩影。\n\n**数字修补圈**：作者发起的小型线上聚会，参与者集中处理各自的数字生活维护任务，将孤独的行政劳动变为集体活动。\n\n**摩擦的双面性**：繁琐的行政摩擦令人痛苦，但亲历摩擦是理解系统缺陷的前提；AI若过早抹平摩擦，可能掩盖深层问题。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [I Hired an AI to Do My Chores. Now I Maintain the AI.](https://every.to/p/i-hired-an-ai-to-do-my-chores-now-i-maintain-the-ai?metered_paywall=4) |\n| 作者 | Jack Cheng |\n| 发表日期 | 2026-03-17 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"ai-chores-maintenance-paradox\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"ai-chores-maintenance-paradox\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"ai-chores-maintenance-paradox\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/ai-chores-maintenance-paradox\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-chores-maintenance-paradox\",\"category\":\"tldr\",\"title\":\"雇了AI做杂务，结果我在维护AI\",\"date\":\"2026-03-17\",\"excerpt\":\"作者尝试用AI代理自动化日常数字杂务，却发现维护AI本身成了新的负担，由此展开对维护哲学的深层思考。\",\"coverImage\":\"$undefined\",\"author\":\"Jack Cheng\",\"original\":\"I Hired an AI to Do My Chores. Now I Maintain the AI..md\",\"originalUrl\":\"https://every.to/p/i-hired-an-ai-to-do-my-chores-now-i-maintain-the-ai?metered_paywall=4\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"雇了AI做杂务，结果我在维护AI\",\"excerpt\":\"作者尝试用AI代理自动化日常数字杂务，却发现维护AI本身成了新的负担，由此展开对维护哲学的深层思考。\",\"date\":\"2026-03-17\",\"category\":\"tldr\",\"author\":\"Jack Cheng\",\"original\":\"I Hired an AI to Do My Chores. Now I Maintain the AI..md\",\"originalUrl\":\"https://every.to/p/i-hired-an-ai-to-do-my-chores-now-i-maintain-the-ai?metered_paywall=4\",\"score\":\"82\",\"tags\":[\"summary\"],\"toc\":true},\"sou
