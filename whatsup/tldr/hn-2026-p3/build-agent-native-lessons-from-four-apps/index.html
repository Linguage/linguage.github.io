子工具的自由组合能催生设计者未曾设想的能力。同时坦诚了代价：推理速度慢、Token消耗高、结果不确定。Cora曾出现单日1500美元的推理成本。\n\n随后文章通过三个产品案例展开实践层面的讨论。Monologue的Naveen Naidu将后端简化为文件系统和三个基本工具，展示了极简架构的可能性。Sparkle的Yash Poojary分享了Agent进入\"上帝模式\"擅自删除文件的教训，并总结出关键原则：安全约束必须内置在工具中，而非写在提示词里。\n\n最后文章讨论了渐进式采用策略：不必推倒重来，可以为Agent创建与现有应用并行的安全实验空间。同时提醒开发者不要对代码产生执念，随着模型能力提升，应预期每几个月就可能需要重建部分系统。\n\n## 核心概念及解读\n\n**Agent原生架构**：应用不再预编码每个功能，而是定义少量原子工具，由AI Agent根据用户请求自主选择和组合工具来完成任务。\n\n**原子工具与技能分层**：工具是最小化的单一操作如读写文件，技能是用自然语言编写的工具组合指令，功能应定义在技能层而非代码层以保持灵活可变。\n\n**工具内嵌安全规则**：对于删除等不可逆操作，安全约束必须作为工具的必填参数硬编码，而非依赖提示词建议，因为Agent可能忽略提示指令。\n\n**对等性与可组合性**：用户与Agent拥有相同的操作权限，原子工具的自由组合使应用能够涌现出开发者未显式设计的新能力。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How to Build Agent-native: Lessons From Four Apps](https://every.to/source-code/how-to-build-agent-native-lessons-from-four-apps) |\n| 作者 | Katie Parrott |\n| 发表日期 | 2026-02-18 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"build-agent-native-lessons-from-four-apps\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"build-agent-native-lessons-from-four-apps\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"build-agent-native-lessons-from-four-apps\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/build-agent-native-lessons-from-four-apps\",\"href\":\"/whatsup/tldr/hn-2026-p3/build-agent-native-lessons-from-four-apps\",\"category\":\"tldr\",\"title\":\"Agent原生架构实践：四款产品的构建经验\",\"date\":\"2026-02-18\",\"excerpt\":\"Every团队从Cora、Sparkle、Monologue四款产品出发，分享Agent原生架构的核心原则：用简单原子工具替代硬编码功能，让AI自主组合完成任务。\",\"coverImage\":\"$undefined\",\"author\":\"Katie Parrott\",\"original\":\"How to Build Agent-native Lessons From Four Apps.md\",\"originalUrl\":\"https://every.to/source-code/how-to-build-agent-native-lessons-from-four-apps\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"
