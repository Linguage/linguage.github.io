状态时容易崩溃；人类则擅长有意做出局部次优的落子，灵活放弃既有计划。顶尖人类玩家仍能稳定击败部分前沿模型，差距不在于反应速度，而在于应对非分布局面的韧性。作者据此提出，游戏类基准测试能更深层地揭示模型的推理特质。\n\n## 核心概念及解读\n**问题重构**：将直接让LLM选择落子转为让其编写评分函数，利用模型擅长写代码的优势弥补其在逐步规划上的短板。\n\n**优化视野**：不同模型展现出隐含的时间偏好，有的关注短期消行得分，有的偏向长期存活，这种差异未经显式提示便自然浮现。\n\n**策略干预频率**：模型在游戏中更新自身评估逻辑的次数。高频干预不一定带来更好结果，部分模型在频繁修改中无法收敛到稳定策略。\n\n**非分布局面应对**：当棋盘进入模型评分函数未覆盖的异常状态时，模型表现急剧下降，而人类凭借直觉和灵活性能更好应对。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [I Built TetrisBench, Where LLMs Compete at Playing Tetris](https://www.a16z.news/p/i-built-tetrisbench-where-llms-compete?utm_source=post-email-title\u0026publication_id=13145\u0026post_id=188660008\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Yoko Li |\n| 发表日期 | 2026-02-23 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"llms-compete-at-tetris-bench\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"llms-compete-at-tetris-bench\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"llms-compete-at-tetris-bench\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/llms-compete-at-tetris-bench\",\"href\":\"/whatsup/tldr/hn-2026-p3/llms-compete-at-tetris-bench\",\"category\":\"tldr\",\"title\":\"用俄罗斯方块测试大模型：TetrisBench揭示了什么\",\"date\":\"2026-02-23\",\"excerpt\":\"Yoko Li构建了TetrisBench，让LLM以编写评分函数的方式玩俄罗斯方块，揭示不同模型在长期策略优化上的风格差异与能力边界。\",\"coverImage\":\"$undefined\",\"author\":\"Yoko Li\",\"original\":\"I Built TetrisBench, Where LLMs Compete at Playing Tetris.md\",\"originalUrl\":\"https://www.a16z.news/p/i-built-tetrisbench-where-llms-compete?utm_source=post-email-title\u0026publication_id=13145\u0026post_id=188660008\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\
