。这一机制仅通过对已有激素通路的微小调整便实现了全新的计时功能。\n\n文章最后指出，由于研究者通常只关注已知生物钟基因，类似的非经典计时系统可能在生命树中被广泛忽视。这一发现提醒科学界拓宽搜索视野，重新审视生物节律的多样性。\n\n## 核心概念及解读\n**昼夜节律（Circadian Rhythm）**：由光照驱动的约24小时生物周期，调控激素、代谢、DNA修复等生理过程，几乎存在于所有生命形式中。\n\n**水螅类（Hydrozoa）**：包含水母、水螅和管水母等的一类刺胞动物，在演化中丢失了CLOCK、BMAL1、CRY等经典生物钟基因。\n\n**20小时自主持律**：新种水母在持续光照下展现的内在周期，无需外部信号即可驱动节律性产卵行为，但周期长度偏离24小时且受温度影响。\n\n**分子倒计时产卵机制**：日出时光敏蛋白触发激素缓慢积累，约14小时后配子成熟并同步释放，是对现有激素通路的时间尺度微调。\n\n**非经典生物钟的普遍性假说**：研究者推测自然界可能存在大量未被发现的替代性计时系统，只是因为检测手段局限于已知基因组件而被忽略。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The Jellies That Evolved a Different Way To Keep Time](https://www.quantamagazine.org/the-jellies-that-evolved-a-different-way-to-keep-time-20260320/?mc_cid=1c8c4b0b7d\u0026mc_eid=9ed96560c1) |\n| 作者 | Marlowe Starling |\n| 发表日期 | 2026-03-20 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"jellyfish-evolved-novel-circadian-clock\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"jellyfish-evolved-novel-circadian-clock\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"jellyfish-evolved-novel-circadian-clock\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/jellyfish-evolved-novel-circadian-clock\",\"href\":\"/whatsup/tldr/hn-2026-p3/jellyfish-evolved-novel-circadian-clock\",\"category\":\"tldr\",\"title\":\"水母演化出全新生物钟机制\",\"date\":\"2026-03-20\",\"excerpt\":\"日本海岸发现的水螅水母新种丢失了常规生物钟基因，却独立演化出20小时周期的节律机制，挑战了传统昼夜节律的定义。\",\"coverImage\":\"$undefined\",\"author\":\"Marlowe Starling\",\"original\":\"The Jellies That Evolved a Different Way To Keep Time.md\",\"originalUrl\":\"https://www.quantamagazine.org/the-jellies-that-evolved-a-different-way-to-keep-time-20260320/?mc_cid=1c8c4b0b7d\u0026mc_eid=9ed96560c1\",\"score\":\"88\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"水母演化出全新生物钟机制\",\"excerpt\":\"日本海岸
