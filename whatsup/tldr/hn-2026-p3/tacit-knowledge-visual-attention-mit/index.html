种隐性知识。更关键的是，当研究者将注意力地图展示给志愿者，使其意识到自身的隐性策略后，他们的分类准确率进一步提升。\n\n## 核心概念及解读\n**隐性知识**：由哲学家波兰尼提出，指人类内化但无法用语言清晰表达的知识，常在技能实践中自然习得。\n\n**眼动追踪**：通过摄像头记录眼球运动方向，作为衡量视觉焦点位置的技术手段，用于捕捉无意识的注意力分配。\n\n**EEG稳态视觉诱发电位**：利用图像中不同形状以不同频率闪烁，通过脑电波与闪烁频率的同步来定位参与者的认知注意力落点。\n\n**认知强化**：将捕捉到的隐性注意力模式以可视化方式反馈给学习者，使其意识到自身无意识策略，从而进一步提升表现。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How some skills become second nature](https://news.mit.edu/2026/how-some-skills-become-second-nature-0304) |\n| 作者 | Jennifer Chu ｜ MIT News |\n| 发表日期 | 2026-03-04 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"tacit-knowledge-visual-attention-mit\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"tacit-knowledge-visual-attention-mit\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"tacit-knowledge-visual-attention-mit\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/tacit-knowledge-visual-attention-mit\",\"href\":\"/whatsup/tldr/hn-2026-p3/tacit-knowledge-visual-attention-mit\",\"category\":\"tldr\",\"title\":\"眼神轨迹揭示隐性知识如何助人精通技能\",\"date\":\"2026-03-04\",\"excerpt\":\"MIT工程师通过追踪眼球运动和脑电波，发现人类在视觉分类任务中存在无意识的注意力转移，揭示了一种可被提取和传授的隐性知识。\",\"coverImage\":\"$undefined\",\"author\":\"Jennifer Chu ｜ MIT News\",\"original\":\"How some skills become second nature.md\",\"originalUrl\":\"https://news.mit.edu/2026/how-some-skills-become-second-nature-0304\",\"score\":\"82\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"眼神轨迹揭示隐性知识如何助人精通技能\",\"excerpt\":\"MIT工程师通过追踪眼球运动和脑电波，发现人类在视觉分类任务中存在无意识的注意力转移，揭示了一种可被提取和传授的隐性知识。\",\"date\":\"2026-03-04\",\"category\":\"tldr\",\"author\":\"Jennifer Chu ｜ MIT News\",\"original\":\"How some skills become second nature.md\",\"originalUrl\":\"https://news.mit.edu/2026/how-some-skills-become-second-nature-0304\",\"score\":\"82\",\"tags\":[\"summary\"],\
