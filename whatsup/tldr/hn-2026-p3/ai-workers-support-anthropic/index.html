名者在简报中指出，五角大楼的决定为AI行业引入了不可预测性，削弱了美国的创新和竞争力。他们认为，如果政府不再希望受合同约束，完全可以直接终止合同，而非将公司列入黑名单。简报还强调，在缺乏相关公共法律的情况下，AI开发者对其系统使用施加的合同和技术要求是防止灾难性滥用的重要保障。\n\n联名者支持Anthropic提出的AI使用红线，包括不用于大规模国内监控和开发自主致死性武器等。他们认为这些是合理且必要的担忧，需要足够的防护措施。包括OpenAI CEO Sam Altman在内的多位AI行业领袖也公开质疑五角大楼的这一决定，认为这对美国AI产业和国家竞争力都非常不利。\n\n## 核心概念及解读\n**法庭之友简报**（Amicus Brief）：非案件直接当事方但具有相关专业知识的人士向法院提交的法律意见书，旨在提供专业见解。\n\n**供应链风险**（Supply-Chain Risk）：五角大楼对Anthropic的制裁性指定，严重限制了其与军事承包商的合作能力，实质上是一种黑名单措施。\n\n**前沿AI系统**（Frontier AI Systems）：指当前最先进的人工智能技术，其使用需要适当的防护措施以防止灾难性滥用。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [OpenAI and Google Workers File Amicus Brief in Support of Anthropic Against the US Government](https://www.wired.com/story/openai-deepmind-employees-file-amicus-brief-anthropic-dod-lawsuit/) |\n| 作者 | Maxwell Zeff |\n| 发表日期 | 2026-03-09 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"ai-workers-support-anthropic\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"ai-workers-support-anthropic\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"ai-workers-support-anthropic\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/ai-workers-support-anthropic\",\"href\":\"/whatsup/tldr/hn-2026-p3/ai-workers-support-anthropic\",\"category\":\"tldr\",\"title\":\"OpenAI和Google员工联名支持Anthropic对抗政府\",\"date\":\"2026-03-09\",\"excerpt\":\"超过30名OpenAI和Google员工联名提交法庭之友简报，支持Anthropic对抗五角大楼将其列为供应链风险的决定。他们认为这将损害美国AI竞争力，并支持Anthropic设定AI使用红线的做法。\",\"coverImage\":\"$undefined\",\"author\":\"Maxwell Zeff\",\"original\":\"OpenAI and Google Workers File Amicus Brief in Support of Anthropic Against the US Government.md\",\"originalUrl\":\"https://www.wired.com/story/openai-deepmind-employees-file-amicus-brief-anthropic-dod-lawsuit/\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"
