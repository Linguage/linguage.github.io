年高龄站出来发声，认为Dario对软件工程存在根本性误解。他通过回顾技术发展史，指出软件领域每隔几十年就会被宣称已死，但每次危机反而催生了新的黄金时代。\n\nGrady将计算机领域的发展划分为三个黄金时代：四十至七十年代的社区驱动开源时代、八十至千禧年的平台崛起时代，以及千禧年至今的第三个黄金时代。他强调每个时代都是在特定制约下兴起的，而快速变革期既带来进步也伴随过高期望。第三个黄金时代的核心问题已从如何创造软件转向如何管理、安全性和伦理挑战。\n\n对于AI能否自动化软件工程，Grady提出三个反驳理由。首先，Dario误解了软件工程本质，代码只是工具之一而非唯一驱动力。其次，现有AI工具只能处理已被反复解决的模式化问题，计算世界远比以Web为中心的系统广阔。第三，AI Agent本质是对已验证模式的高层抽象，对新问题处理存在局限。他建议开发者从写应用转向处理系统，培养管理复杂性的能力。\n\n## 核心概念及解读\n**软件工程三个黄金时代**（Three Golden Ages of Software Engineering）：四十至七十年代的社区驱动开源时期、八十至千禧年的平台崛起时期，以及千禧年至今以管理复杂性和安全为核心的时期。\n\n**抽象层次上移**（Rising Abstraction Levels）：技术发展从机器语言到汇编、高级语言、库和平台的持续演进过程，AI工具是这一趋势的最新延续。\n\n**两类代码**（Two Types of Code）：一次性使用、可自动化的业余代码与长期存在、需系统思维的专业软件，后者仍需人类工程师的核心能力。\n\n**系统思维**（Systems Thinking）：在规模化条件下管理复杂性、处理技术因素和人类因素的能力，是软件工程师不可替代的核心竞争力。\n\n**存在主义危机**（Existential Crisis）：开发者因AI快速进步产生的职业焦虑，历史上每次抽象层次提升都曾引发类似担忧，但最终都扩展了行业边界。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [UML 之父：Dario 大错特错，根本不懂软件工程！软件工程不会死亡！软件已经迎来第三次黄金时代！业界回应：有了...](https://www.bestblogs.dev/article/ea193e97) |\n| 作者 | 51CTO技术栈 |\n| 发表日期 | 2026-02-10 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"uml-founder-software-engineering-third-golden-age\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"uml-founder-software-engineering-third-golden-age\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"uml-founder-software-engineering-third-golden-age\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/uml-founder-software-engineering-third-golden-age\",\"href\":\"/whatsup/tldr/hn-2026-p3/uml-founder-software-engineering-third-golden-age\",\"category\":\"tldr\",\"title\":\"UML之父驳斥Dario：软件工程不会死亡\",\"date\":\"2026-02-10\",\"excerpt\":\"UML之父Grady Booch驳斥Anthropic CEO Dario关于软件工程将被AI淘汰的观点，回顾软件发展史上的三个黄金时代，指出AI只能自动化重复性编码，而真正的软件工程涉及系统思维、人类判断和责任感。\",\"coverImage\":\"$undefined\",\"author\":\"51CTO技术栈\",\"original\":\"UML 之父：Dario 大错特错，根本不懂软件工程！软件工程不会死亡！软件已经迎来第三次黄金时代！业界回应：有了....md\",\"original
