026-03-19\",\"excerpt\":\"Manus发布首封年度信，总结产品发布第一年的里程碑。Manus定位为AI智能体，不仅能思考还能执行任务，通过无代码方式赋能非技术用户构建应用。文章展示了多位用户案例，并表达继续深化AI能力、让每个人都能使用AI的愿景。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"Manus第一年：我们的第一封年度信.md\",\"originalUrl\":\"https://manus.im/zh-cn/community/year-one\",\"score\":\"88\",\"content\":\"# Manus第一年：AI行动主义的年度回顾\\n\\n## 摘要\\nManus发布首封年度信，回顾产品发布第一年的发展历程。Manus的核心理念是AI不应只思考，还应行动。产品通过无代码方式让非技术人员也能构建AI应用，服务了包括全职妈妈、老年语言学者、小商家等各类用户。创始人强调虽然已取得进展，但AI普及之路仍任重道远，未来目标是让每个人都能使用AI，且AI能全天候工作。文章最后感谢社区、同行和团队的支持。\\n\\n## 内容框架与概述\\n文章开篇提出Manus的核心使命——AI应同时具备思考和行动能力，并通过一个令人震惊的内部案例（AI一小时复制了一月工作量）作为产品能力的佐证。随后通过三个具体用户案例（第1天的全职母亲、第5个月的86岁语言学家、第8个月的花商）展示产品如何赋能不同群体。继而反思当前成就，强调\\\"仍然不够\\\"，提出未来目标：赋能每一个人、让AI全天候工作。最后以感恩收尾，感谢社区、同行和团队，并预告\\\"第二集\\\"。\\n\\n## 核心概念及解读\\n**AI智能体**（AI Agent）：能自主调用API、执行任务的AI系统，不仅回答问题还能完成实际工作。\\n\\n**无代码构建**（No-Code Building）：无需编程基础，用户通过自然语言描述即可生成完整应用。\\n\\n**全天候AI**（24/7 AI）：愿景是让AI代理持续运行，随时响应用户需求。\\n\\n**AI普惠**：让AI技术覆盖非技术人群，缩小能力差距。\\n\\n---\\n\\n## 原文信息\\n\\n| 字段 | 内容 |\\n|------|------|\\n| 原文 | [Manus第一年：我们的第一封年度信](https://manus.im/zh-cn/community/year-one) |\\n| 作者 |  |\\n| 发表日期 | 2026-03-19 |\\n| 评分 | 88/100 |\\n\\n---\\n*此摘要卡片由 AI 自动生成*\\n\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Manus第一年：AI行动主义的年度回顾\",\"excerpt\":\"Manus发布首封年度信，总结产品发布第一年的里程碑。Manus定位为AI智能体，不仅能思考还能执行任务，通过无代码方式赋能非技术用户构建应用。文章展示了多位用户案例，并表达继续深化AI能力、让每个人都能使用AI的愿景。\",\"date\":\"2026-03-19\",\"category\":\"tldr\",\"original\":\"Manus第一年：我们的第一封年度信.md\",\"originalUrl\":\"https://manus.im/zh-cn/community/year-one\",\"score\":\"88\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/manus-first-year-letter.md\"},\"neighbors\":{\"previous\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"the-end-of-fragmentation\",\"slugSegments\":[\"tldr\",\"hn-2026-
