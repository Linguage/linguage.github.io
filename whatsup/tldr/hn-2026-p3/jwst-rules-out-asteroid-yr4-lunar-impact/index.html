的暗弱目标，最终确认小行星将以约22900公里距离掠过月球，误差范围约800公里。\n\n此次成果不仅排除了撞击风险，还证明了韦伯望远镜在行星防御中的实用价值。研究人员表示，相关技术和经验将为未来应对类似威胁提供重要参考。\n\n## 核心概念及解读\n**小行星2024 YR4**：直径约60米的小行星，曾因较高的撞击概率被称为史上最危险的小行星之一，现已确认不会撞击地球或月球。\n\n**詹姆斯·韦伯太空望远镜（JWST）**：目前最强大的太空望远镜，主要观测红外波段，本次被创新性地用于追踪极暗弱的近地小行星。\n\n**行星防御**：通过监测和追踪近地天体来评估和减轻其撞击地球或月球威胁的系统性科学工作。\n\n**近红外相机（NIRCam）**：韦伯望远镜的核心仪器之一，通常用于观测遥远星系和系外行星，此次被改造用于追踪快速移动目标。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [New data shows asteroid 2024 YR4 will narrowly miss the moon](https://www.cnn.com/2026/03/10/science/2024-yr4-moon-webb) |\n| 作者 | Ashley Strickland |\n| 发表日期 | 2026-03-11 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"jwst-rules-out-asteroid-yr4-lunar-impact\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"jwst-rules-out-asteroid-yr4-lunar-impact\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"jwst-rules-out-asteroid-yr4-lunar-impact\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/jwst-rules-out-asteroid-yr4-lunar-impact\",\"href\":\"/whatsup/tldr/hn-2026-p3/jwst-rules-out-asteroid-yr4-lunar-impact\",\"category\":\"tldr\",\"title\":\"韦伯望远镜排除小行星撞击月球风险\",\"date\":\"2026-03-11\",\"excerpt\":\"借助詹姆斯·韦伯太空望远镜的全新观测技术，科学家确认小行星2024 YR4将于2032年安全掠过月球，不会撞击，展现了天文观测在行星防御中的关键角色。\",\"coverImage\":\"$undefined\",\"author\":\"Ashley Strickland\",\"original\":\"New data shows asteroid 2024 YR4 will narrowly miss the moon.md\",\"originalUrl\":\"https://www.cnn.com/2026/03/10/science/2024-yr4-moon-webb\",\"score\":\"82\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"韦伯望远镜排除小行星撞击月球风险\",\"excerpt\":\"借助詹姆斯·韦伯太空望远镜的全新观测技术，科学家确认小行星2024 YR4将于2032年安全掠过月球，不会撞击，展现了天文观测在行星防御中的关键角色。\",\"date\":\"2026-03-11\",\"category\":\"tldr\",\"author\":\"Ashley Strickland\",\"original\":\"New data shows asteroid 2024 YR4 will narrowly
