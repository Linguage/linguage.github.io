热（超临界水）三种技术路线的原理差异。\n\n最后深入分析了下一代地热能的商业化挑战，包括深层结晶岩钻探的技术与经济壁垒、高温环境下材料腐蚀与矿物沉淀问题，以及超临界二氧化碳替代水等前沿探索方向。\n\n## 核心概念及解读\n**增强型地热系统（EGS）**：通过在低渗透率的深层干燥岩石中人工制造裂缝网络，循环流体提取热能，突破天然地热资源的地理限制。\n\n**超热型地热**：利用接近400度高温条件下的超临界水提取热能，能量密度远高于常规地热，但腐蚀与结垢问题极具挑战。\n\n**毫米波钻井技术**：由MIT等离子体科学中心发明，利用高功率电磁波熔融岩石实现超深钻孔，特别适用于超热岩层钻探，现由Quaise Energy公司商业化。\n\n**闭合回路地热**：将工作流体封闭在管道中循环加热，避免与地下岩层直接接触，减少流体损失和环境污染风险。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Next-generation geothermal energy: Promise, progress, and challenges](https://news.mit.edu/2026/next-gen-geothermal-energy-promise-progress-challenges-0313) |\n| 作者 | MIT Energy Initiative |\n| 发表日期 | 2026-03-14 |\n| 评分 | 84/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"next-gen-geothermal-energy-promise-and-challenges\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"next-gen-geothermal-energy-promise-and-challenges\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"next-gen-geothermal-energy-promise-and-challenges\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/next-gen-geothermal-energy-promise-and-challenges\",\"href\":\"/whatsup/tldr/hn-2026-p3/next-gen-geothermal-energy-promise-and-challenges\",\"category\":\"tldr\",\"title\":\"下一代地热能：前景、进展与挑战\",\"date\":\"2026-03-14\",\"excerpt\":\"MIT等机构正推进下一代地热能技术，通过钻探更深更热的岩层来实现大规模清洁电力生产，有望满足全球15%的电力需求增长。\",\"coverImage\":\"$undefined\",\"author\":\"MIT Energy Initiative\",\"original\":\"Next-generation geothermal energy Promise, progress, and challenges.md\",\"originalUrl\":\"https://news.mit.edu/2026/next-gen-geothermal-energy-promise-progress-challenges-0313\",\"score\":\"84\",\"content\":\"$18\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"下一代地热能：前景、进展与挑战\",\"excerpt\":\"MIT等机构正推进下一代地热能技术，通过钻探更深更热的岩层来实现大规模清洁电力生产，有望满足全球15%的电力需求增长。\",\"date\":\"2026-03-14\",\"category\":\"tldr\",\
