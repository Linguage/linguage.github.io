de 会话。用户可在不同设备间无缝切换工作，文件系统、MCP 服务器、工具和项目配置均保持本地可用。该功能仅发送出站 HTTPS 请求，通过 TLS 加密和短期凭证保障安全，但终端必须保持打开状态，且仅支持单一远程会话。\n\n## 内容框架与概述\n文章首先介绍 Remote Control 的核心价值——让用户从任何设备访问本地 Claude Code 环境，并强调所有计算仍在本地执行，云端仅作为显示界面。随后详细说明使用前提：需要 Pro 及以上订阅、已完成身份验证、且在项目目录中接受过工作区信任。主体部分分为两大部分：一是启动会话的具体命令和参数，二是从其他设备连接的三种方式（URL、QR 码、会话列表）。最后对比了 Remote Control 与网页版 Claude Code 的差异，并列出使用限制，包括终端需保持打开、网络中断约 10 分钟后会话超时等。\n\n## 核心概念及解读\n**远程控制**（Remote Control）：将本地 Claude Code 会话连接到网页端或移动应用的功能，实现跨设备继续工作。\n\n**工作区信任**（Workspace Trust）：Claude Code 的安全机制，用户需在项目目录中运行一次 claude 命令以确认信任。\n\n**MCP 服务器**：Model Context Protocol 服务器，提供工具和资源扩展，Remote Control 下可完整保留本地配置。\n\n**会话 URL**：启动 Remote Control 后生成的唯一链接，用于从其他设备直接访问该本地会话。\n\n**沙盒模式**（Sandboxing）：可选的文件系统和网络隔离功能，通过 `--sandbox` 或 `--no-sandbox` 标志控制。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Continue local sessions from any device with Remote Control](https://code.claude.com/docs/en/remote-control) |\n| 作者 | Claude Code Docs |\n| 发表日期 | 2026-03-14 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"remote-control-sessions-any-device\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"remote-control-sessions-any-device\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"remote-control-sessions-any-device\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/remote-control-sessions-any-device\",\"href\":\"/whatsup/tldr/hn-2026-p3/remote-control-sessions-any-device\",\"category\":\"tldr\",\"title\":\"远程控制：随时随地继续本地 Claude Code 会话\",\"date\":\"2026-03-14\",\"excerpt\":\"Remote Control enables users to connect to their local Claude Code session from any device via web or mobile apps, keeping all work local while allowing seamless switching between devices.\",\"coverImage\":\"$undefined\",\"author\":\"Claude Code Docs\",\"original\":\"Continue local sessions from any device with Remote Control.md\",\"originalUrl\":\"https://code.claude.com/docs/en/rem
