模相当于118个国家的GDP总和，通过多个图表展示了创业融资史上的里程碑事件。此外，文章还涵盖了AI Twitter社区的讨论热点，包括Sakana AI提出的超网络用于即时LoRA编译技术，以及OpenAI与国防部合作争议引发的行业反思。\n\n## 核心概念及解读\n**投后估值**（Post-Money Valuation）：指公司融资后的总价值，等于融资前估值加上新融资金额。OpenAI本轮融资后估值达8400亿美元。\n\n**Trainium**：亚马逊自研的AI训练芯片，OpenAI将获得2GW的Trainium算力支持，价值约1000亿美元，涵盖Trainium3和下一代Trainium4芯片。\n\n**LoRA适配器**（LoRA Adapter）：一种轻量级的模型微调方法，通过在预训练模型上添加少量可训练参数来实现特定任务的定制化。\n\n**超网络**（Hypernetwork）：用于生成其他神经网络权重的网络，Sakana AI提出的技术可将任务描述或文档即时编译为LoRA权重，实现亚秒级的模型适配。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [[AINews] OpenAI closes $110B raise from Amazon, NVIDIA, SoftBank in largest startup fundraise in history @ $840B post-money](https://www.latent.space/p/ainews-openai-closes-110b-raise-from?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=189427137\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Latent.Space |\n| 发表日期 | 2026-02-28 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"openai-110b-funding-history-largest-raise\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"openai-110b-funding-history-largest-raise\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"openai-110b-funding-history-largest-raise\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/openai-110b-funding-history-largest-raise\",\"href\":\"/whatsup/tldr/hn-2026-p3/openai-110b-funding-history-largest-raise\",\"category\":\"tldr\",\"title\":\"OpenAI完成史上最大110亿美元融资\",\"date\":\"2026-02-28\",\"excerpt\":\"OpenAI完成史上最大规模110亿美元融资，估值达8400亿美元，亚马逊、英伟达、软银领投，用户数据激增。\",\"coverImage\":\"$undefined\",\"author\":\"Latent.Space\",\"original\":\"AINews OpenAI closes $110B raise from Amazon, NVIDIA, SoftBank in largest startup fundraise in history @ $840B post-money.md\",\"originalUrl\":\"https://www.latent.space/p/ainews-openai-closes-110b-raise-from?utm_source=post-email-title\u0026publication_id=1084089\u002
