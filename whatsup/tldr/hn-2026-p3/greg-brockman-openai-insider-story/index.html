略，目标是在2026年3月31日前让所有人默认使用AI智能体而非文本编辑器工作。\n\n## 内容框架与概述\n本文以Greg Brockman在Tetragrammaton播客的超长访谈为主线，分为几个核心部分。首先详细讲述2023年11月17日Sam Altman被解雇当天的经过，Brockman如何在接到通知后立即辞职，他的妻子在假设股权归零的情况下仍支持他离开，72小时内核心团队集体辞职，95%员工签署请愿书最终夺回公司。其次回顾2018年与马斯克的控制权之争，马斯克要求获得多数股权、绝对控制权和CEO职位，谈判失败后提出Tesla合并方案，最终马斯克在2018年12月发邮件称OpenAI成功概率是\"0%，不是1%\"。最后部分聚焦当前发展，包括Scaling Laws仍然有效、GPT-5.1到5.2的天壤之别、Agent-first战略目标，以及Brockman对算力成为基本人权的预测。\n\n## 核心概念及解读\n**72小时危机**：2023年11月Sam Altman被董事会突然解雇后，95%员工在72小时内签署请愿书要求召回Altman，Google Docs因签名人数过多而崩溃，最终员工成功夺回公司。\n\n\n**控制权之争**：马斯克在2018年谈判中要求获得OpenAI的多数股权、绝对控制权和CEO职位，遭Brockman和Ilya拒绝后提出将OpenAI并入Tesla\"秘密开发AGI\"的方案，最终谈判破裂。\n\n\n**Scaling Laws**：Brockman断言Scaling Laws仍然有效，GPT-5.1到5.2之间发生了质的飞跃，让很多专家级工程师第一次觉得模型\"真的能干极难的活了\"。\n\n\n**Agent-first**：OpenAI内部推行的战略方针，目标是2026年3月31日前让所有人默认使用AI智能体而非文本编辑器工作，口号是\"Say no to slop\"。\n\n\n**Say no to slop**：OpenAI内部防止AI生成代码质量问题的口号，要求提交代码的人必须负责，代码审查者对AI生成代码的审查标准比对人写的代码更严格。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Greg Brockman（OpenAI 联合创始人）把“那场宫斗”讲完整了：董事会、请愿书、马斯克与控制权](https://x.com/dotey/article/2028677546485641336) |\n| 作者 | 宝玉 (@dotey) |\n| 发表日期 | 2026-03-03 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"greg-brockman-openai-insider-story\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"greg-brockman-openai-insider-story\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"greg-brockman-openai-insider-story\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/greg-brockman-openai-insider-story\",\"href\":\"/whatsup/tldr/hn-2026-p3/greg-brockman-openai-insider-story\",\"category\":\"tldr\",\"title\":\"Greg Brockman首次披露OpenAI宫斗与马斯克谈判内幕\",\"date\":\"2026-03-03\",\"excerpt\":\"OpenAI联合创始人Greg Brockman在3小时播客访谈中首次完整披露2023年宫斗事件全貌、与马斯克的控制权谈判破裂内幕，以及公司当前战略方向，揭示了95%员工请愿、Ilya Sutskever后悔发帖等关键细节。\",\"coverImage\":\"$undefined\",\"author\":\"宝玉 (@dotey)\",\"original\":\"Greg Brockman（OpenAI 联合创始人）把“那场宫斗”讲完整了：董事会、请愿书、马斯克与控制权.md\",\"origi
