化变革，将MIT的创新基因充分释放到气候与能源领域。\n\n## 核心概念及解读\n\n**ARPA-E**：美国能源部高级能源研究计划署，资助高风险高回报的能源前沿技术，Wang曾担任该机构负责人两年。\n\n**Climate Project**：MIT于2024年启动的校级气候行动，涵盖脱碳、大气保护、社区赋能、城市韧性、政策创新和非常规方案六大任务方向。\n\n**能源-气候耦合**：Wang的核心战略思路，认为能源生产方式与碳排放治理是气候问题的根源，两者必须协同解决。\n\n**AI双刃剑效应**：AI数据中心推高电力需求，但AI本身可用于电网管理、催化剂研发、聚变等离子体控制和气候建模优化。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Powering up (and saving) the planet](https://www.technologyreview.com/2026/01/06/1128655/powering-up-and-saving-the-planet/) |\n| 作者 | Ken Shulman |\n| 发表日期 | 2026-01-07 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"mit-evelyn-wang-energy-climate-leadership\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"mit-evelyn-wang-energy-climate-leadership\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"mit-evelyn-wang-energy-climate-leadership\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/mit-evelyn-wang-energy-climate-leadership\",\"href\":\"/whatsup/tldr/hn-2026-p3/mit-evelyn-wang-energy-climate-leadership\",\"category\":\"tldr\",\"title\":\"MIT新任能源与气候副总裁的变革之路\",\"date\":\"2026-01-07\",\"excerpt\":\"MIT首位能源与气候副总裁Evelyn Wang领导全校力量应对气候变化与能源需求的双重挑战，推动跨学科协作与变革性创新。\",\"coverImage\":\"$undefined\",\"author\":\"Ken Shulman\",\"original\":\"Powering up (and saving) the planet.md\",\"originalUrl\":\"https://www.technologyreview.com/2026/01/06/1128655/powering-up-and-saving-the-planet/\",\"score\":\"82\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"MIT新任能源与气候副总裁的变革之路\",\"excerpt\":\"MIT首位能源与气候副总裁Evelyn Wang领导全校力量应对气候变化与能源需求的双重挑战，推动跨学科协作与变革性创新。\",\"date\":\"2026-01-07\",\"category\":\"tldr\",\"author\":\"Ken Shulman\",\"original\":\"Powering up (and saving) the planet.md\",\"originalUrl\":\"https://www.technologyreview.com/2026/01/06/1128655/powering-up-and-saving-the-planet/\
