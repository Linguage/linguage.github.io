主权的关键路径。目标到2030年本土开采10%、精炼40%、使用25%回收材料。然而预算有限、环保标准与开采需求的矛盾、成员国审批权分散等问题令前景充满不确定性。\n\n## 核心概念及解读\n**稀土**：一组具有独特磁性和光学性质的金属元素，广泛用于屏幕、电动汽车、风力发电机和战斗机制造，是尖端科技不可或缺的原材料。\n\n**RESourceEU计划**：欧盟2025年12月通过的战略方案，旨在通过发展本土精炼与回收能力降低关键金属对外依赖，并推动公共采购优先考虑供应安全而非最低价格。\n\n**供应武器化**：中国将稀土出口控制作为外交施压手段，对特定国家实施出口限制以达成政治目的，日本即因涉台言论遭此待遇。\n\n**关键原材料**：欧盟定义的对经济和安全至关重要的24种原材料，涵盖稀土、锂、镓等，其供应链安全直接关系能源转型与国防工业。\n\n**精炼与回收主权**：欧盟战略重心从地质开采转向技术能力建设，试图将金属废料留在欧洲本土进行回收，并在欧洲为海外开采的矿石进行精炼加工。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Electric dependency: what strategies for the EU?](https://www.polytechnique-insights.com/en/columns/digital/electric-dependency-what-strategies-for-the-eu/?utm_source=brevo\u0026utm_campaign=newsletter199en\u0026utm_medium=email\u0026utm_id=148) |\n| 作者 | Gilles Lepesant |\n| 发表日期 | 2026-03-18 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"eu-rare-earth-dependency-strategy\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"eu-rare-earth-dependency-strategy\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"eu-rare-earth-dependency-strategy\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/eu-rare-earth-dependency-strategy\",\"href\":\"/whatsup/tldr/hn-2026-p3/eu-rare-earth-dependency-strategy\",\"category\":\"tldr\",\"title\":\"欧盟稀土依赖困局：战略博弈与出路\",\"date\":\"2026-03-18\",\"excerpt\":\"分析中国稀土垄断对欧盟的战略威胁，探讨格陵兰矿产潜力、欧盟RESourceEU计划及精炼回收路径，评估欧洲减少对华依赖的挑战与前景。\",\"coverImage\":\"$undefined\",\"author\":\"Gilles Lepesant\",\"original\":\"Electric dependency what strategies for the EU?.md\",\"originalUrl\":\"https://www.polytechnique-insights.com/en/columns/digital/electric-dependency-what-strategies-for-the-eu/?utm_source=brevo\u0026utm_campaign=newsletter199en\u0026utm_medium=email\u0026utm_id=148\",\"score\":\"78\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined
