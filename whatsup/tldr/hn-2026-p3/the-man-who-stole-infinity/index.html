的抽象概念，数千年来被视为禁忌，直到康托尔将其纳入严格数学框架。\n\n**实数构造**：康托尔与戴德金于1872年各自独立完成的工作，证明数轴是连续无间隙的无穷实数集合，颠覆了传统认知。\n\n**康托尔1874年论文**：被视为数学史上最重要论文之一，将无穷从修辞手段提升为可操作的数学对象，深刻重塑了整个学科的基础。\n\n**戴德金信件（1873年11月30日）**：一封此前被认为已损毁的通信，Goos的发现暗示康托尔论文核心思想可能源自与戴德金的书信讨论。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [The Man Who Stole Infinity](https://www.quantamagazine.org/the-man-who-stole-infinity-20260225/?mc_cid=2f6471fac1\u0026mc_eid=9ed96560c1) |\n| 作者 | Joseph Howlett |\n| 发表日期 | 2026-02-26 |\n| 评分 | 84/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"the-man-who-stole-infinity\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"the-man-who-stole-infinity\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"the-man-who-stole-infinity\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/the-man-who-stole-infinity\",\"href\":\"/whatsup/tldr/hn-2026-p3/the-man-who-stole-infinity\",\"category\":\"tldr\",\"title\":\"偷走无穷的人：一封遗失信件与数学史的抄袭疑云\",\"date\":\"2026-02-26\",\"excerpt\":\"一封失落百年的信件揭开了数学史上最大抄袭嫌疑：康托尔那篇重塑数学的1874年论文，其核心思想是否剽窃自好友戴德金？\",\"coverImage\":\"$undefined\",\"author\":\"Joseph Howlett\",\"original\":\"The Man Who Stole Infinity.md\",\"originalUrl\":\"https://www.quantamagazine.org/the-man-who-stole-infinity-20260225/?mc_cid=2f6471fac1\u0026mc_eid=9ed96560c1\",\"score\":\"84\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"偷走无穷的人：一封遗失信件与数学史的抄袭疑云\",\"excerpt\":\"一封失落百年的信件揭开了数学史上最大抄袭嫌疑：康托尔那篇重塑数学的1874年论文，其核心思想是否剽窃自好友戴德金？\",\"date\":\"2026-02-26\",\"category\":\"tldr\",\"author\":\"Joseph Howlett\",\"original\":\"The Man Who Stole Infinity.md\",\"originalUrl\":\"https://www.quantamagazine.org/the-man-who-stole-infinity-20260225/?mc_cid=2f6471fac1\u0026mc_eid=9ed96560c1\",\"score\":\"84\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguist
