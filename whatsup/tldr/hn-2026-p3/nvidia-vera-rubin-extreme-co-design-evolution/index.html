PU作为首款完全自研设计的芯片，核心数从Grace的72核跃升至150核以上，NVLink-C2C带宽翻倍至1.8TB/s。\n\n随后文章聚焦VR NVL72机架系统的物理架构革新。计算托盘采用无电缆设计，通过Paladin HD2连接器实现板对板直连，大幅减少信号衰减与组装复杂度。液冷、电源分配、机械结构均围绕模块化理念重新设计，体现极端协同设计哲学——将整个机架视为单一计算单元进行优化。\n\n文章还讨论了NVLink 6纵向扩展网络与后端横向扩展网络的拓扑设计，以及OEM/ODM组装供应商格局的变化。最后提供了VR NVL72系统的TCO分析和物料清单估算，指出约5000亿美元的Rubin部署规模将深刻影响产业链上下游的赢家与输家分配。\n\n## 核心概念及解读\n**极端协同设计（Extreme Co-design）**：Nvidia将机架视为单一分布式加速器，从芯片到机械结构全栈自主设计，最大化系统级性能与集成效率。\n\n**自适应压缩引擎（Adaptive Compression Engine）**：Rubin第三代Transformer Engine的核心特性，动态识别并跳过零值计算，在不损失精度的前提下自动加速稀疏推理负载。\n\n**VR NVL72**：Nvidia第二代Oberon机架架构，包含72颗Rubin GPU和36颗Vera CPU，通过NVLink 6实现全互联，是Nvidia对抗AMD和Google机架级方案的核心产品。\n\n**NVLink 6**：新一代纵向扩展互连协议，SerDes速率提升至400G，总带宽较上代翻倍，支撑72颗GPU间的全对全高速通信。\n\n**SOCAMM内存**：Vera CPU采用的新型内存模块，容量和带宽均远超传统LPDDR5X，为CPU侧提供更强的内存子系统支撑。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Vera Rubin – Extreme Co-Design: An Evolution from Grace Blackwell Oberon](https://newsletter.semianalysis.com/p/vera-rubin-extreme-co-design-an-evolution?utm_source=post-email-title\u0026publication_id=6349492\u0026post_id=188150420\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=53wl0h\u0026triedRedirect=true) |\n| 作者 | Wega Chu |\n| 发表日期 | 2026-02-26 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"nvidia-vera-rubin-extreme-co-design-evolution\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"nvidia-vera-rubin-extreme-co-design-evolution\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"nvidia-vera-rubin-extreme-co-design-evolution\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/nvidia-vera-rubin-extreme-co-design-evolution\",\"href\":\"/whatsup/tldr/hn-2026-p3/nvidia-vera-rubin-extreme-co-design-evolution\",\"category\":\"tldr\",\"title\":\"Nvidia Vera Rubin平台：极端协同设计的机架级架构革命\",\"date\":\"2026-02-26\",\"excerpt\":\"深度解析Nvidia Vera Rubin平台的六款芯片产品、机架级架构演进及极端协同设计策略，评估其对AI基础设施竞争格局的影响。\",\"coverImage\":\"$undefined
