成并优化社交媒体文案。\n\n## 核心概念及解读\n**Claw**：基于OpenClaw平台的个人AI代理，可嵌入Slack等协作工具，执行文档编辑、内容生成等任务。\n\n**四种交互模式**：人与代理一对一、代理之间协作、一人对多代理广播、代理对多人输出，构成组织级AI协作的基本框架。\n\n**AI耐久型公司**：核心商业模式不因AI而改变，但利用AI显著提升运营效率的企业，如医疗美容、殡葬等传统行业。\n\n**代理间协作**：多个AI代理在共享频道中互相沟通解决问题，例如一个代理向另一个解释技术限制并共同寻找方案。\n\n**Thoreau代理**：Every团队基于OpenClaw构建的社交媒体写作代理，内置品牌风格指南，可自动生成并审核社交文案。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How Claws Took Over Every](https://every.to/context-window/how-claws-took-over-every) |\n| 作者 | Every Staff |\n| 发表日期 | 2026-03-04 |\n| 评分 | 72/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"how-claws-took-over-every\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"how-claws-took-over-every\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"how-claws-took-over-every\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/how-claws-took-over-every\",\"href\":\"/whatsup/tldr/hn-2026-p3/how-claws-took-over-every\",\"category\":\"tldr\",\"title\":\"Every团队如何让AI代理渗透工作日常\",\"date\":\"2026-03-04\",\"excerpt\":\"Every团队分享OpenClaw个人AI代理在组织中的四种交互模式，以及AI原生与AI耐久型公司的创业思考。\",\"coverImage\":\"$undefined\",\"author\":\"Every Staff\",\"original\":\"How Claws Took Over Every.md\",\"originalUrl\":\"https://every.to/context-window/how-claws-took-over-every\",\"score\":\"72\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Every团队如何让AI代理渗透工作日常\",\"excerpt\":\"Every团队分享OpenClaw个人AI代理在组织中的四种交互模式，以及AI原生与AI耐久型公司的创业思考。\",\"date\":\"2026-03-04\",\"category\":\"tldr\",\"author\":\"Every Staff\",\"original\":\"How Claws Took Over Every.md\",\"originalUrl\":\"https://every.to/context-window/how-claws-took-over-every\",\"score\":\"72\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/h
