时的连续自主工作。\n\n文章强调了将代码仓库作为记录系统的重要性。作者发现，与其使用一个庞大的AGENTS.md文件作为百科全书，不如将其视为目录，而将真正的知识存储在结构化的docs目录中。这种渐进式披露的方式让智能体能够从一个小的稳定切入点开始，逐步发现更深层次的信息。文档的新鲜度、交叉链接和结构正确性都通过linter和CI作业进行严格验证。\n\n文章最后讨论了规范架构与品味的重要性。通过强制执行不变量而非微观管理实施过程，智能体能够快速交付而不削弱基础。作者采用了分层领域架构，每个业务域划分为一组固定的层，依赖方向经过严格验证。随着自主水平的不断提高，Codex现在可以端到端地驱动新功能，从验证当前状态到合并更改，整个过程几乎无需人工干预。\n\n## 核心概念及解读\n**智能体可读性**：指系统对AI智能体的可理解程度，包括UI、日志、指标等都应设计为让智能体能够直接读取和推理，从而实现更高级的自主操作。\n\n**渐进式披露**：一种信息组织策略，让智能体从小的稳定切入点开始，逐步引导其发现更深层次的信息，而不是一次性提供大量情境。\n\n**分层领域架构**：一种严格的架构模型，将每个业务域划分为固定的层，依赖方向经过严格验证，横切关注点通过单一显式接口进入。\n\n**端到端自主**：指智能体能够独立完成从验证当前状态到实施修复、打开Pull Request、响应反馈并最终合并更改的整个功能开发流程。\n\n**熵与垃圾收集**：指智能体会复现代码仓库中已存在的模式，包括不理想的模式，导致代码质量随时间漂移，需要建立循环清理流程来定期处理。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [工程技术：在智能体优先的世界中利用 Codex](https://openai.com/zh-Hans-CN/index/harness-engineering/) |\n| 作者 | Ryan Lopopolo |\n| 发表日期 | 2026-02-13 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"agent-first-engineering\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"agent-first-engineering\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"agent-first-engineering\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/agent-first-engineering\",\"href\":\"/whatsup/tldr/hn-2026-p3/agent-first-engineering\",\"category\":\"tldr\",\"title\":\"智能体优先时代的工程实践\",\"date\":\"2026-02-13\",\"excerpt\":\"OpenAI团队分享了5个月来完全由Codex智能体编写代码的实践经验，探索人类掌舵、智能体执行的新型工程模式，实现了工程速度的数量级提升。\",\"coverImage\":\"$undefined\",\"author\":\"Ryan Lopopolo\",\"original\":\"工程技术：在智能体优先的世界中利用 Codex.md\",\"originalUrl\":\"https://openai.com/zh-Hans-CN/index/harness-engineering/\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"智能体优先时代的工程实践\",\"excerpt\":\"OpenAI团队分享了5个月来完全由Codex智能体编写代码的实践经验，探索人类掌舵、智能体执行的新型工程模式，实现了工程速度的数量级提升。\",\"date\":\"2026-02-13
