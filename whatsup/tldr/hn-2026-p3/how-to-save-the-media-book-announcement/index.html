作品完整所有权并获得大部分销售收入，这一安排本身就是全书主张的身体力行。最后，作者呼吁读者预购以帮助新书获得突破性影响力。\n\n## 核心概念及解读\n**注意力经济**：以争夺用户注意力为核心的信息传播模式，导致内容趋向煽情与极端化，侵蚀新闻质量。\n\n**直接关系生态**：创作者与受众之间绕过平台中介直接建立的经济和信任关系，是替代传统守门人模式的核心路径。\n\n**创作者所有权**：内容生产者对其作品保留完整所有权和控制权的原则，区别于传统媒体中的雇佣或转让模式。\n\n**守门人模式瓦解**：传统媒体机构作为信息把关者的角色正在消解，取而代之的是去中心化的内容分发机制。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How to Save the Media](https://post.substack.com/p/how-to-save-the-media?utm_source=post-email-title\u0026publication_id=737237\u0026post_id=188971182\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Hamish McKenzie |\n| 发表日期 | 2026-02-25 |\n| 评分 | 55/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"how-to-save-the-media-book-announcement\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"how-to-save-the-media-book-announcement\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"how-to-save-the-media-book-announcement\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/how-to-save-the-media-book-announcement\",\"href\":\"/whatsup/tldr/hn-2026-p3/how-to-save-the-media-book-announcement\",\"category\":\"tldr\",\"title\":\"拯救媒体：创作者至上取代平台霸权的宣言\",\"date\":\"2026-02-25\",\"excerpt\":\"Substack联合创始人宣布新书《如何拯救媒体》，探讨传统媒体崩溃后的创作者经济新模式，主张以直接关系取代平台中介，重塑媒体生态。\",\"coverImage\":\"$undefined\",\"author\":\"Hamish McKenzie\",\"original\":\"How to Save the Media.md\",\"originalUrl\":\"https://post.substack.com/p/how-to-save-the-media?utm_source=post-email-title\u0026publication_id=737237\u0026post_id=188971182\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\",\"score\":\"55\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"拯救媒体：创作者至上取代平台霸权的宣言\",\"excerpt\":\"Substack联合创始人宣布新书《如何拯救媒体》，探讨传统媒体崩溃后的创作者经济新模式，主张以直接关系取代平台中介，重塑媒
