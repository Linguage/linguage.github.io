力的消费级智能体实验室之一。\n\n随后文章转入AI Twitter recap板块，梳理了本周技术热点。Claude推出macOS桌面端计算机操控能力，标志着智能体从API和浏览器沙箱扩展到完整的桌面操作系统层面。与此同时，智能体技术栈正朝着长时间运行、并行化、工具丰富的方向收敛，Hermes Agent、T3 Code、Command Center等框架各展所长，但运营瓶颈和过度代理的问题也日益凸显。\n\n研究层面，Meta提出了Hyperagents自我改进框架和RLLM统一后训练方案，WebArena-Infinity将浏览器环境构建成本从数月压缩至十小时以内。世界模型方面，LeWorldModel展示了无需复杂技巧的端到端JEPA训练，机械可解释性也在从定性观察向工程化逆向分析转变。\n\n## 核心概念及解读\n**Execuhire**：Meta采用的一种介于收购与招聘之间的交易模式，通过技术授权加团队引入而非完全收购来整合外部团队。\n\n**个人超级智能**：Zuck提出的愿景，即每个人拥有一个深度理解自身目标和需求的智能代理，帮助实现个人成长与创造。\n\n**Hyperagents/DGM-H**：Meta提出的自我改进框架，允许智能体不仅改进任务行为，还能改进生成未来改进的元程序本身，跨领域迁移能力是其核心突破。\n\n**RLLM**：将强化学习与语言模型作为奖励模型相结合的统一后训练方案，用生成式语言模型替代脆弱的定制奖励函数，覆盖易验证、难验证和不可验证任务。\n\n**WebArena-Infinity**：自动化浏览器环境生成方案，将原本需要数月人工构建的测试环境压缩至十小时内自动生成，为智能体强化学习提供规模化训练基础。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [[AINews] Dreamer joins Meta Superintelligence Labs — 9 month retro of Personal Superintelligence](https://www.latent.space/p/ainews-dreamer-joins-meta-superintelligence?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=191952315\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Latent.Space |\n| 发表日期 | 2026-03-24 |\n| 评分 | 78/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"dreamer-joins-meta-superintelligence-labs-retro\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"dreamer-joins-meta-superintelligence-labs-retro\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"dreamer-joins-meta-superintelligence-labs-retro\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/dreamer-joins-meta-superintelligence-labs-retro\",\"href\":\"/whatsup/tldr/hn-2026-p3/dreamer-joins-meta-superintelligence-labs-retro\",\"category\":\"tldr\",\"title\":\"Dreamer加入Meta超级智能实验室与个人超级智能回顾\",\"date\":\"2026-03-24\",\"excerpt\":\"Dreamer团队被Meta超级智能实验室招揽，结合Manus收购，Meta正构建最强消费级智能体实验室，文章同时回顾了AI领域多项技术进展。\",\"coverImage\":\"$
