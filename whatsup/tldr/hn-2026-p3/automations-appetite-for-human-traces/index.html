概念及解读\n**程序性数据（Procedural Data）**：记录专家如何完成工作的过程数据，区别于仅记录工作产出的传统数据，是训练专家级AI智能体的关键。\n\n**数据护城河（Data Moats）**：企业通过捕获用户交互习惯形成的竞争壁垒，用户个性化上下文不可移植，导致平台锁定。\n\n**隐性知识外化**：将专家内化的、难以言传的操作经验转化为可被机器学习系统理解的形式化数据，是AI自动化面临的核心难题。\n\n**上下文收割（Context Harvest）**：借鉴注意力经济的模式，平台通过工具捕获用户行为上下文并转化为模型训练资源的双边市场机制。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [Automations appetite for human traces](https://joinreboot.org/p/automations-appetite-for-human-traces?utm_source=post-email-title\u0026publication_id=37465\u0026post_id=191335908\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=50w2ld\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Hamidah Oderinwale |\n| 发表日期 | 2026-03-19 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"automations-appetite-for-human-traces\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"automations-appetite-for-human-traces\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"automations-appetite-for-human-traces\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/automations-appetite-for-human-traces\",\"href\":\"/whatsup/tldr/hn-2026-p3/automations-appetite-for-human-traces\",\"category\":\"tldr\",\"title\":\"自动化对人类行为痕迹的渴求\",\"date\":\"2026-03-19\",\"excerpt\":\"探讨AI自动化如何依赖捕捉专家隐性知识，以及由此引发的数据垄断、隐私伦理和劳动价值问题。\",\"coverImage\":\"$undefined\",\"author\":\"Hamidah Oderinwale\",\"original\":\"Automations appetite for human traces.md\",\"originalUrl\":\"https://joinreboot.org/p/automations-appetite-for-human-traces?utm_source=post-email-title\u0026publication_id=37465\u0026post_id=191335908\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=50w2ld\u0026triedRedirect=true\u0026utm_medium=email\",\"score\":\"82\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"自动化对人类行为痕迹的渴求\",\"excerpt\":\"探讨AI自动化如 19\",\"category\":\"tldr\",\"author\":\"The Architects Notebook\",\"original\":\"Ep 92 Why Your 1Gbps API Feels Like 3G (Part 2) Optimizing code for TCP Performance.md\",\"originalUrl\":\"https://thearchitectsnotebook.substack.com/p/ep-92-why-your-1gbps-api-feels-like?utm_source=post-email-title\u0026publication_id=2489243\u0026post_id=181977749\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\u0026utm_medium=email\",\"score\":\"72\",\"tags\":[\"summary\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/whatsup/tldr/hn-2026-p3/optimizing-code-for-tcp-performance-async-io-connection-pooling.md\"}},\"headings\":[{\"depth\":2,\"text\":\"摘要\",\"id\":\"摘要\"},{\"depth\":2,\"text\":\"内容框架与概述\",\"id\":\"内容框架与概述\"},{\"depth\":2,\"text\":\"核心概念及解读\",\"id\":\"核心概念及解读\"},{\"depth\":2,\"text\":\"原文信息\",\"id\":\"原文信息\"}],\"sidebar\":null,\"directoryHref\":\"/whatsup?tab=tldr\",\"children\":\"$L1a\"}]\n"])</script><script>self.__next_f.push([1,"1a:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章指出AI发展的下一阶段需要捕捉专家的隐性程序性知识——即他们如何工作，而非仅仅工作成果。这种知识无法从互联网大规模抓取，必须通过工具直接捕获专家的实际操作过程。文章分析了企业围绕此类数据构建护城河的趋势，以及由此带来的隐私风险、劳动者权益和垄断问题，呼吁建立开放数据基础设施以平衡各方利益。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"内容框架与概述\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容框架与概述\",\"children\":\"内容框架与概述\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章从Tim Wu的注意力经济理论切入，指出我们正从消费数据提取时代迈入交互数据提取时代。当前模型是通才，构建专家级智能体需要捕捉程序性数据——不仅是专家产出了什么，更关键是他们如何工作。这种隐性知识难以被专家自身清晰表达，也无法从网上大规模获取。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章以Mechanize为例说明了企业如何通过构建沙箱环境来捕捉专家工作轨迹，并指出YC 2025春季批次超过一半的初创公司都在做智能体。随后分析了数据护城河的形成机制：工具一旦学习用户习惯就形成锁定效应，个性化程度越高，用户迁移成本越大。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文章最后转向伦理维度，讨论法律、医疗、金融等受监管行业中AI公司如何获取特权数据访问权，以及数据隐私承诺在法律传票面前的脆弱性。作者提出需要开放人类反馈基础设施和新的数据治理框架，将劳动者的隐性知识视为应受保护的经济资产，而非可随意提取的免费资源。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"程序性数据（Procedural Data）\"}],\"：记录专家如何完成工作的过程数据，区别于仅记录工作产出的传统数据，是训练专家级AI智能体的关键。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"数据护城河（Data Moats）\"}],\"：企业通过捕获用户交互习惯形成的竞争壁垒，用户个性化上下文不可移植，导致平台锁定。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"隐性知识外化\"}],\"：将专家内化的、难以言传的操作经验转化为可被机器学习系统理解的形式化数据，是AI自动化面临的核心难题。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"上下文收割（Context Harvest）\"}],\"：借鉴注意力经济的模式，平台通过工具捕获用户行为上下文并转化为模型训练资源的双边市场机制。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"原文信息\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#原文信息\",\"children\":\"原文信息\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\
