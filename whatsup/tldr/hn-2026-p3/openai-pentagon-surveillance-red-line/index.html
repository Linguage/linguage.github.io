OpenAI迅速填补空缺，但最初合同引用FISA法案和12333行政令，这些法律因允许广泛监控美国公民而备受争议。\n\n公众反应迅速而激烈。AI政策和法律专家指出，OpenAI实际上采用了情报社区的词典，其中普通英语词汇被重新定义为允许它们表面上禁止的行为。SensorTower数据显示，周六ChatGPT移动应用卸载量猛增295%，而Anthropic则跃居AI应用排行榜榜首。面对舆论海啸，Altman周一晚在推特发布内部消息，承诺修改合同，增加明确规定禁止将AI故意用于对美国个人和公民的国内监控，并限制战争部情报机构如NSA使用OpenAI工具。\n\n文章深入分析了AI与商业数据结合带来的隐私威胁。战争部从Babel Street、LexisNexis等公司购买大量美国人的个人信息，包括社交媒体数据、手机定位记录、互联网活动足迹等。当强大的AI系统在这些数据上运行时，可以在几秒钟内梳理出个人居住地、工作地、访问地点、是否参加特定政治集会、宗教场所或堕胎诊所，以及移民身份等信息。这种规模的大规模监控在人类分析员需要手工操作的时代几乎不可能实现，但AI带来了全新的监控范式。\n\n尽管五角大楼和OpenAI承诺在法律范围内使用AI，但美国法规是在AI时代之前制定的，当时没有人对今天前沿模型的侵入性潜力有任何概念。Amodei指出，这种监控目前合法只是因为法律还没有跟上AI快速增长的能力。专家警告，美国政府购买个人数据并在没有任何监督的情况下用于无搜查令的监控已经极其危险，而将这些数据输入不透明且经常有缺陷的AI系统，错误、偏见和缺乏问责制会放大伤害。\n\n## 核心概念及解读\n**大规模监控**（Mass Surveillance）：指政府通过连接多个大型数据集，使用AI技术创建公民私人生活的详细画像，无需搜查令即可推断个人敏感信息，构成前所未有的隐私威胁。\n\n**FISA法案**（Foreign Intelligence Surveillance Act）：允许五角大楼内有争议的国家安全局收集美国公民与外国个人和实体通信的广泛授权法律，因允许广泛监控美国公民而备受批评。\n\n**12333行政令**（Executive Order 12333）：允许从外国目标进行批量数据收集的行政命令，无论他们是否与美国人交谈，为情报机构提供广泛的数据收集权限。\n\n**附带收集**（Incidental Collection）：指政府可以合法使用的非故意或偶然收集的数据。专家担忧美国人会被卷入这些数据，但政府可以声称任何附带收集都是合法的，实际上形成AI大范围监控。\n\n**商业数据源**（Commercially-Acquired Data）：指五角大楼从Babel Street、LexisNexis、Accurint等数据经纪人购买的大量个人数据，包括社交媒体信息、手机定位历史、互联网足迹等，AI可以连接这些数据源进行大规模推断。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [OpenAI Blurs Its Mass Surveillance Red Line With New Pentagon Contract](https://www.forbes.com/sites/thomasbrewster/2026/03/03/openai-anthropic-ai-mass-surveillance-pentagon-red-lines/?utm_campaign=ForbesMainTwitter\u0026utm_source=ForbesMainTwitter\u0026utm_medium=social) |\n| 作者 | Thomas Brewster |\n| 发表日期 | 2026-03-04 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"openai-pentagon-surveillance-red-line\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"openai-pentagon-surveillance-red-line\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"openai-pentagon-surveillance-red-line\"],\"urlP
