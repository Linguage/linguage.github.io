规范的产物，人类审查规范而非代码实现。\n\n**瑞士奶酪模型**（Swiss Cheese Model）：一种安全理念，通过堆叠多层不完美的过滤器，使漏洞无法对齐，从而建立系统信任。\n\n**行为驱动开发**（BDD）：编写自然语言规范描述预期行为并自动化为测试，在AI代理时代重新焕发活力，成为主要的验证层。\n\n**对抗性验证**（Adversarial Verification）：分离编码代理和验证代理的职责，让它们互不信任，甚至引入第三个代理专门尝试破坏第一个代理的构建，实现自动化红蓝对抗。\n\n**确定性护栏**（Deterministic Guardrails）：通过测试、类型检查、契约验证等无可争议的方式验证工作，定义不通过就无法协商的硬性规则。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How to Kill the Code Review](https://www.latent.space/p/reviews-dead?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=189703430\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Ankit Jain |\n| 发表日期 | 2026-03-03 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L15\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"killing-code-review\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"killing-code-review\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"killing-code-review\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/killing-code-review\",\"href\":\"/whatsup/tldr/hn-2026-p3/killing-code-review\",\"category\":\"tldr\",\"title\":\"如何终结代码审查：AI时代的新范式\",\"date\":\"2026-03-03\",\"excerpt\":\"文章探讨AI时代代码审查的终结，提出从人工逐行审查转向规范驱动开发，通过多层验证机制（多选项竞争、确定性护栏、BDD框架、权限系统、对抗性验证）来建立对AI生成代码的信任。\",\"coverImage\":\"$undefined\",\"author\":\"Ankit Jain\",\"original\":\"How to Kill the Code Review.md\",\"originalUrl\":\"https://www.latent.space/p/reviews-dead?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=189703430\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email\",\"score\":\"$undefined\",\"content\":\"$16\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"如何终结代码审查：AI时代的新范式\",\"excerpt\":\"文章探讨AI时代代码审查的终结，提出从人工逐行审查转向规范驱动开发，通过多层验证机制（多选项竞争、确定性护栏、BDD框架、权限系统、对抗性验证）来建立对AI生成代码的
