本与运营资本的不同属性，这对创业公司的资本结构设计有重要意义。\n\n## 核心概念及解读\n**工厂即产品（Factory is the Product）**：公司核心竞争优势不在于生产什么，而在于如何生产，制造工艺本身构成最重要的护城河和知识产权。\n\n**运营杠杆（Operating Leverage）**：固定成本与可变成本的比值，高固定成本结构下产能利用率对盈利影响巨大，半负荷运转很可能亏损。\n\n**直通良率（RTY）**：一个产品无缺陷通过全部工序的概率，等于各工序首次通过率的乘积，比最终良率更能反映过程健康度。\n\n**质量成本（COQ）**：包括预防成本、鉴定成本、内部失败成本和外部失败成本四类，量化质量问题的全部经济影响。\n\n**产能台阶（Capacity Step）**：制造产能通常以离散台阶式扩展而非线性增长，每次扩产都意味着固定成本的大幅跃升，需要与需求增长精准匹配。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [A Primer on Factory Economics for Startups](https://www.a16z.news/p/a-primer-on-factory-economics-for?utm_source=post-email-title\u0026publication_id=13145\u0026post_id=188047369\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Oliver Hsu |\n| 发表日期 | 2026-02-17 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"factory-economics-primer-for-startups\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"factory-economics-primer-for-startups\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"factory-economics-primer-for-startups\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/factory-economics-primer-for-startups\",\"href\":\"/whatsup/tldr/hn-2026-p3/factory-economics-primer-for-startups\",\"category\":\"tldr\",\"title\":\"创业公司工厂经济学入门指南\",\"date\":\"2026-02-17\",\"excerpt\":\"a16z合伙人撰写的工厂经济学入门指南，面向从产品公司转型为制造型创业公司的创始人，系统讲解成本结构、良率管理和资本策略。\",\"coverImage\":\"$undefined\",\"author\":\"Oliver Hsu\",\"original\":\"A Primer on Factory Economics for Startups.md\",\"originalUrl\":\"https://www.a16z.news/p/a-primer-on-factory-economics-for?utm_source=post-email-title\u0026publication_id=13145\u0026post_id=188047369\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\",\"score\":\"82\",\"content\":\"$19\",\"tags\":[\"summary\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\
