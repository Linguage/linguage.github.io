失、未解决的冲突或风格冲突。第四层是个人层面，涉及个人能力差距、压力和价值观等。作者反复强调，深层问题往往被表层问题放大或引发，因此在确认上层没有问题之前不应急于处理下层问题。文章还给出了每层的具体排查方法和常见信号，帮助领导者在实际工作中快速定位和修复正确的问题。\n\n## 核心概念及解读\n**Waterline Model（水线模型）**：将团队问题分为结构、动态、人际、个人四个递进层次，要求按从上到下的顺序诊断，避免误判问题根源。\n\n**Snorkel before you scuba（先浮潜后深潜）**：核心行动原则，指先检查影响全员的共享系统和流程，再深入到个人层面的诊断。\n\n**结构层（Structure）**：团队的目标、角色、职责定义和组织设计，是最高频的问题来源，修复结构常能解决大部分团队绩效问题。\n\n**动态层（Dynamics）**：团队日常协作的文化规范，包括决策流程、冲突处理机制和信息传递方式，是连接结构与个体的桥梁。\n\n**合理行为假说**：在糟糕的系统中，人们的行为看起来不合理但实际上是理性的反应，领导者应先修复系统再评判个人。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [How to debug a team that isnt working: the Waterline Model](https://www.lennysnewsletter.com/p/how-to-debug-a-team-that-isnt-working?utm_source=post-email-title\u0026publication_id=10845\u0026post_id=187984548\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Molly Graham |\n| 发表日期 | 2026-03-03 |\n| 评分 | 88/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"waterline-model-team-debugging\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"waterline-model-team-debugging\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"waterline-model-team-debugging\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/waterline-model-team-debugging\",\"href\":\"/whatsup/tldr/hn-2026-p3/waterline-model-team-debugging\",\"category\":\"tldr\",\"title\":\"用水线模型诊断团队问题的四层框架\",\"date\":\"2026-03-03\",\"excerpt\":\"Molly Graham提出Waterline Model，通过结构、动态、人际、个人四个层次逐层诊断团队问题，强调先修复系统再评判个人。\",\"coverImage\":\"$undefined\",\"author\":\"Molly Graham\",\"original\":\"How to debug a team that isnt working the Waterline Model.md\",\"originalUrl\":\"https://www.lennysnewsletter.com/p/how-to-debug-a-team-that-isnt-working?utm_source=post-email-title\u0026publication_id=10845\u0026post_id=187984548\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true\",\"score\":\"88\",\"conte
