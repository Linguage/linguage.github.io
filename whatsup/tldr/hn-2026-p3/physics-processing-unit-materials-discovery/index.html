性。Welling用瓶子旋转的例子生动解释了等变性概念，并讨论了归纳偏置与数据规模之间的权衡。最后，他分享了对扩散模型与随机热力学之间深层数学联系的研究。\n\n## 核心概念及解读\n**物理处理单元**（Physics Processing Unit）：将自然实验视为一种计算形式，数字模型与物理实验协同工作，自然本身充当处理器。\n\n**等变性**（Equivariance）：神经网络对对称变换的响应特性，确保输入的对称变换会相应反映在输出中，是物理感知机器学习的核心。\n\n**AI for Science：利用人工智能加速科学发现的新兴领域，正在经历工业革命般的爆发式增长，涵盖蛋白质折叠、材料发现等多个方向。\n\n**归纳偏置与规模**（Inductive Bias vs Scale）：深度学习中的核心权衡，等变性提供强归纳偏置可减少数据需求，但大规模数据可能使这种偏置变得不再必要。\n\n**扩散模型与热力学**（Diffusion and Thermodynamics）：生成式扩散模型与随机热力学之间存在深层数学联系，这是Welling即将出版的新书主题。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [🔬Searching the Space of All Possible Materials — Prof. Max Welling, CuspAI](https://www.latent.space/p/cuspai?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=189149291\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=true\u0026utm_medium=email) |\n| 作者 | Latent.Space |\n| 发表日期 | 2026-02-26 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"physics-processing-unit-materials-discovery\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"physics-processing-unit-materials-discovery\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"physics-processing-unit-materials-discovery\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/physics-processing-unit-materials-discovery\",\"href\":\"/whatsup/tldr/hn-2026-p3/physics-processing-unit-materials-discovery\",\"category\":\"tldr\",\"title\":\"用AI搜索所有可能的材料空间\",\"date\":\"2026-02-26\",\"excerpt\":\"Max Welling从量子引力到材料科学的跨界之旅，探讨物理处理单元概念、AI驱动的材料发现平台CuspAI，以及对称性在深度学习中的重要性。\",\"coverImage\":\"$undefined\",\"author\":\"Latent.Space\",\"original\":\"🔬Searching the Space of All Possible Materials — Prof. Max Welling, CuspAI.md\",\"originalUrl\":\"https://www.latent.space/p/cuspai?utm_source=post-email-title\u0026publication_id=1084089\u0026post_id=189149291\u0026utm_campaign=email-post-title\u0026isFreemail=false\u0026r=7am0bi\u0026triedRedirect=tr
