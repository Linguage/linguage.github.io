随后文章深入探讨了设计工具的局限性。Brian指出Figma无法模拟AI交互的真实体验，如加载状态、错误处理和边界情况，只有将设计放入浏览器并与真实模型对接，才能发现真正的问题。他个人已有三个月未手写前端代码，全部由Claude Code完成。\n\n文章还分享了多项实用技巧，包括利用Claude的plan mode、自定义slash命令和Skills来解决重复性问题。例如他创建了/figma命令来自动化从设计提取到代码实现的完整流程，以及针对图标名称幻觉问题的专项技能。\n\n最后文章提炼了七条核心要点，强调设计师需要理解AI能力的边界，核心原则是当AI要求你做某事时，应教会AI自行完成，从而持续减少人工干预。\n\n## 核心概念及解读\n**代码优先原型设计**：设计师从Figma静态稿直接跳转到可运行代码环境，用真实浏览器交互验证设计可行性，而非依赖高保真原型工具。\n\n**原型实验场Prototype Playground**：基于Next.js构建的共享代码仓库，按设计师姓名组织项目，提供统一的Notion风格组件库，方便团队发现和复用彼此的工作。\n\n**教AI自己做**：Brian的核心工作原则——当AI请求人工干预时，不是手动执行，而是把操作流程教给AI使其自动完成，持续提升自动化水平。\n\n**Claude Skills自定义技能**：针对AI反复出错的特定问题创建可复用的自动化解决方案，例如通过编程搜索图标及同义词来纠正AI的图标命名幻觉。\n\n**Slash命令工作流**：将多步骤复杂流程封装为单条斜杠命令，如/figma命令自动完成从MCP检查、设计提取、代码实现到结果验证的全流程。\n\n---\n\n## 原文信息\n\n| 字段 | 内容 |\n|------|------|\n| 原文 | [🎙️ This week on How I AI: How Notions design team uses Claude Code to prototype](https://www.lennysnewsletter.com/p/this-week-on-how-i-ai-how-notions?utm_source=post-email-title\u0026publication_id=10845\u0026post_id=188306621\u0026utm_campaign=email-post-title\u0026isFreemail=true\u0026r=5dvur6\u0026triedRedirect=true) |\n| 作者 | Lenny Rachitsky |\n| 发表日期 | 2025-05-13 |\n| 评分 | 82/100 |\n\n---\n*此摘要卡片由 AI 自动生成*\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"whatsup\",\"slug\":\"notion-design-team-uses-claude-code-to-prototype\",\"slugSegments\":[\"tldr\",\"hn-2026-p3\",\"notion-design-team-uses-claude-code-to-prototype\"],\"pathSegments\":[\"tldr\",\"hn-2026-p3\",\"notion-design-team-uses-claude-code-to-prototype\"],\"urlPath\":\"/whatsup/tldr/hn-2026-p3/notion-design-team-uses-claude-code-to-prototype\",\"href\":\"/whatsup/tldr/hn-2026-p3/notion-design-team-uses-claude-code-to-prototype\",\"category\":\"tldr\",\"title\":\"Notion设计团队如何用Claude Code实现代码优先原型设计\",\"date\":\"2025-05-13\",\"excerpt\":\"Notion设计师Brian Lovin搭建AI驱动的共享原型实验场，让设计团队用Claude Code将Figma设计转为可运行代码，实现代码优先的原型设计流程。\",\"coverImage\":\"$undefined\",\"author\":\"Lenny Rachitsky\
