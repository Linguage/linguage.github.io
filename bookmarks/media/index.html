//x.com/karpathy)、[Paul Graham](https://x.com/paulg), [Naval](https://x.com/naval)、[Dan Koe](https://x.com/thedankoe)、[Huberman Lab](https://x.com/hubermanlab) 这些作者。\n\n\u003cdiv className=\"flex flex-wrap gap-4\"\u003e\n  \u003cIconCardMini icon=\"link\" title=\"Kevin Kelly\" href=\"https://x.com/kevin2kelly/\" /\u003e\n  \u003cIconCardMini icon=\"link\" title=\"Andrej Karpathy\" href=\"https://x.com/karpathy\" /\u003e\n  \u003cIconCardMini icon=\"link\" title=\"Paul Graham\" href=\"https://x.com/paulg\" /\u003e\n  \u003cIconCardMini icon=\"link\" title=\"Naval\" href=\"https://x.com/naval\" /\u003e\n  \u003cIconCardMini icon=\"link\" title=\"Dan Koe\" href=\"https://x.com/thedankoe\" /\u003e\n  \u003cIconCardMini icon=\"link\" title=\"Huberman Lab\" href=\"https://x.com/hubermanlab\" /\u003e\n\u003c/div\u003e\n\n\n## YouTube科技频道推荐\n\n\u003cCardGrid\u003e\n  \u003cLinkCard href=\"https://youtube.com/@OpenAI\" title=\"OpenAI\" site=\"官方频道\" description=\"获取最新的模型发布与产品更新\" /\u003e\n  \u003cLinkCard href=\"https://youtube.com/@anthropic-ai\" title=\"Anthropic\" site=\"官方频道\" description=\"Claude 团队的安全研究与产品更新\" /\u003e\n  \u003cLinkCard href=\"https://youtube.com/@LennysPodcast\" title=\"Lenny's Podcast\" site=\"创投与产品\" description=\"产品管理顶级播客，聚焦增长与 AI\" /\u003e\n  \u003cLinkCard href=\"https://youtube.com/@PeterYangYT\" title=\"Peter Yang\" site=\"创投与产品\" description=\"前 Instagram 产品经理分享社区与 AI 实践\" /\u003e\n  \u003cLinkCard href=\"https://youtube.com/@EveryInc\" title=\"AI and I\" site=\"Every · 创投\" description=\"探讨 AI 如何改变创业与商业模式\" /\u003e\n  \u003cLinkCard href=\"https://youtube.com/@RedpointAI\" title=\"Unsupervised Learning\" site=\"Redpoint Capital\" description=\"红点资本视角的 AI 创业与投资动态\" /\u003e\n  \u003cLinkCard href=\"https://youtube.com/@LatentSpacePod\" title=\"Latent Space\" site=\"技术深度\" description=\"面向 AI 工程师的深度访谈节目\" /\u003e\n  \u003cLinkCard href=\"https://youtube.com/@lexfridman\" title=\"Lex Fridman Podcast\" site=\"技术深度\" description=\"MIT 研究员主持的长篇对话\" /
