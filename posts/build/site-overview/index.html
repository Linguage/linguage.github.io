verview\",\"c\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L8\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",[\"$\",\"$1\",\"c\",{\"children\":[\"$Lb\",null,[\"$\",\"$Lc\",null,{\"children\":[\"$Ld\",[\"$\",\"$Le\",null,{\"promise\":\"$@f\"}]]}]]}],{},null,false]},null,false]},null,false],[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L10\",null,{\"children\":\"$L11\"}],null],[\"$\",\"$L12\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$3\",null,{\"fallback\":null,\"children\":\"$L13\"}]}]}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$14\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"15:I[1203,[\"197\",\"static/chunks/197-f7c33a0114fc3db3.js\",\"373\",\"static/chunks/373-816263e744b1a0a1.js\",\"738\",\"static/chunks/738-b97c8b45db2c8cb9.js\",\"48\",\"static/chunks/app/%5B...slug%5D/page-b39f4036a39e3cb5.js\"],\"default\"]\n16:T1299,"])</script><script>self.__next_f.push([1,"## 不是博客，是知识门户\n\nLinguista（linguista.cn）从外表看是一个 Next.js 静态站点，但它和大多数个人博客不太一样。它不是按时间倒序排列文章的日记本，而是一个围绕几个核心主题持续生长的内容系统。这些主题包括 AI 与智能体工作流、技术工具与软件工程、数学与科学方法、优秀文章和思想，以及每日精选内容的整理。\n\n这个站点的起点是个人阅读。我是一个兴趣广泛的阅读者，涉猎科技、历史、哲学、文学等领域，最近几年对大语言模型和基于 AI 的开发方式尤其着迷。阅读过程中积累了大量值得反复回看的内容，于是自然地想把它们系统化地整理出来、分享出去。Linguista 就是这个想法的产物。\n\n站点的首页不展示最新文章，而是扮演导航门户的角色，把读者引导到不同的内容入口。这个设计选择反映了一个基本判断：对于一个内容类型丰富的站点，\"最新发布\"不一定是读者最需要看到的东西，\"找到自己感兴趣的板块\"才是。\n\n\n## 五个内容板块\n\n站点目前有四个主要板块，各自承担不同的功能：\n\n**What's UP（信息简报）** 是更新最频繁、内容量最大的板块。它包含每日文摘（digest）和 TL;DR 摘要卡片。这个板块的核心功能是快速吸收优质信息，并把它们沉淀为可检索的知识卡片。如果你想在短时间内获取经过筛选的高质量内容，这是最合适的入口。\n\n**实验室（Lab）** 是最偏原创实践的板块，分为 workshop（工程实践与项目复盘）和 notes-dr（专题研究笔记）两部分。这里记录实验过程、项目开发经历和方法探索。\n\n**Rosetta（知识摘编）** 是一个跨学科的内容区，主要收录笔记与摘录。这里汇集了经典文章、研究摘编与跨学科的知识整理。这个板块的位置介于 What's UP 和实验室之间：比前者更深更长，后者更偏原创实践。\n\n**post（站点更新）** 是你现在正在阅读的这个板块。它承担站点内容更新说明、技术架构调整记录和建站过程复盘等功能。随着站点的持续演进，这个板块会逐步成为连接读者与站点发展过程的重要窗口。\n\n\n## 四种阅读路径\n\n从读者使用场景来看，站点大致提供四种进入方式：\n\n想快速获取高质量信息的读者，适合从 What's UP 开始。想做深度阅读、接触知识摘编的读者，适合去 Rosetta。想了解站点本身的技术实现和演进过程，可以来实验室和站点更新板块。\n\n这四条路径并不互斥，很多读者会在不同时候走不同的路线。但它们反映了站点内容组织的基本逻辑：按读者意图分流，而不是把所有内容混在一条时间线里。\n\n\n## 内容策展而非随意发布\n\n这个站点有一个贯穿始终的特点：它不是随手记录的地方，而是经过筛选和整理的内容集合。\n\n我对自己发布的内容有一个基本要求——至少是自己愿意多读几遍的东西。无论是原创文章、翻译作品还是搬运分享的内容，都会经过一轮筛选和加工。大量内容从原始素材开始，经过中译、摘要、主题整理和专题归类，最终变成结构化的页面。\n\n这种做法的代价是更新速度不会太快，但好处是每一篇内容都有相对稳定的长期价值。站点追求的是\"可检索的知识沉淀\"，而不是\"持续的信息流\"。\n\n\n## 前台体验上的一些设计\n\n在呈现方式上，站点也做了一些超出普通静态博客的设计。首页承担门户导航功能，多个板块使用 tab 结构组织子栏目，列表页普遍采用卡片化展示，部分内容区使用了热力图和分页机制，还支持搜索、目录树和可折叠导航等功能。\n\n这些设计的出发点是同一个：当内容类型足够丰富、数量足够多的时候，简单的文章列表已经不够用了，需要更接近\"内容产品\"的交互方式来帮助读者找到自己想看的东西。\n\n\n## 一个持续生长的项目\n\nLinguista 不是一个写完就放在那里的站点。它的内容在持续更新，结构也在随着内容的增长而调整。从最初的个人博客雏形，到现在的多板块知识门户，这个过程本身也是一种学习和实践。\n\n如果用一句话来概括：这是一个以 AI、技术、学习与人物思想为核心主题的中文内容站点，兼具信息精选、专题文集、课程资料、实验记录和知识归档功能。它更接近一个持续生长的个人知识门户，而不是传统意义上的博客。\n\n欢迎探索，也欢迎通过评论区或社交媒体与我交流。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L15\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"posts\",\"slug\":\"site-overview\",\"slugSegments\":[\"build\",\"site-overview\"],\"pathSegments\":[\"build\",\"site-overview\"],\"urlPath\":\"/posts/build/site-overview\",\"href\":\"/posts/build/site-overview\",\"category\":\"build\",\"title\":\"Linguista 是一个什么样的网站\",\"date\":\"2026-03-14T08:00:00.000Z\",\"excerpt\":\"Linguista 不是一个传统博客，而是一个融合了信息精选、实验记录与知识归档的中文内容站点。这篇文章介绍它的整体定位与内容结构。\",\"coverImage\":\"$undefined\",\"author\":\"amp-smart\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$16\",\"tags\":[\"站点介绍\",\"知识管理\",\"Next.js\",\"内容架构\",\"AI\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Linguista 是一个什么样的网站\",\"excerpt\":\"Linguista 不是一个传统博客，而是一个融合了信
