\n\\n---\\n\\n## 笔记与摘录\\n\\n### 笔记集合\\n\\n收录篇幅较短或偏摘录性质的笔记与知识摘编；部分子目录用于编辑流程与元数据核对，面向读者时可忽略路径细节。\\n\\n---\\n\\n## 一些说明\\n\\n**这不是一个翻译项目。** 收录的文章会有较为完整的中译，但重点不在于逐字还原，而在于内容是否值得保留和传阅。有些地方会压缩，有些地方会加注。\\n\\n**选材没有完整的体系。** 整个分区更像一个持续生长的收藏库，而不是按主题编排的知识地图。\\n\\n**会持续迭代。** 板块的划分、收录的方向、每篇内容的整理深度，都可能随时间变化。目前呈现的状态是某个阶段的快照，而不是最终形态。\\n\",\"tags\":[\"Rosetta\",\"翻译\",\"知识管理\",\"站点介绍\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Rosetta 分区：一份导览\",\"excerpt\":\"Rosetta 是站点的知识整理分区，收录笔记与摘录。这篇文章介绍该分区的定位与内容结构。\",\"date\":\"2026-03-31T02:00:00.000Z\",\"category\":\"build\",\"author\":\"amp-smart\",\"tags\":[\"Rosetta\",\"翻译\",\"知识管理\",\"站点介绍\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/posts/build/rosetta-overview.md\"},\"neighbors\":{\"previous\":null,\"next\":{\"kind\":\"entry\",\"section\":\"posts\",\"slug\":\"site-overview\",\"slugSegments\":[\"build\",\"site-overview\"],\"pathSegments\":[\"build\",\"site-overview\"],\"urlPath\":\"/posts/build/site-overview\",\"href\":\"/posts/build/site-overview\",\"category\":\"build\",\"title\":\"Linguista 是一个什么样的网站\",\"date\":\"2026-03-14T08:00:00.000Z\",\"excerpt\":\"Linguista 不是一个传统博客，而是一个融合了信息精选、实验记录与知识归档的中文内容站点。这篇文章介绍它的整体定位与内容结构。\",\"coverImage\":\"$undefined\",\"author\":\"amp-smart\",\"original\":\"$undefined\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"\",\"tags\":[\"站点介绍\",\"知识管理\",\"Next.js\",\"内容架构\",\"AI\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Linguista 是一个什么样的网站\",\"excerpt\":\"Linguista 不是一个传统博客，而是一个融合了信息精选、实验记录与知识归档的中文内容站点。这篇文章介绍它的整体定位与内容结构。\",\"date\":\"2026-03-14T08:00:00.000Z\",\"category\":\"build\",\"author\":\"amp-smart\",\"tags\":[\"站点介绍\",\"知识管理\",\"Next.js\",\"内容架构\",\"AI\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/lingui
