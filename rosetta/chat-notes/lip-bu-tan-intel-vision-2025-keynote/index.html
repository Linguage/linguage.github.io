事项。\n\n## 核心概念及解读\n\n**少承诺多兑现（Under-promise and Over-deliver）——陈立武反复强调的核心管理哲学，意在通过超越预期的实际成果而非过度宣传来重建客户与市场对英特尔的信任**：\n\n**工程为本（Engineering First）——英特尔文化重塑的核心方向，强调回归以技术和工程能力为驱动的企业基因，吸引并赋权顶尖工程人才**：\n\n**代工服务（Intel Foundry）——英特尔面向外部客户开放先进制造能力的业务，依托18A等先进工艺节点，旨在打造与台积电竞争的世界级晶圆代工平台**：\n\n**由外向内设计（Outside-in Design）——从客户实际工作负载和问题出发进行芯片设计的思路转变，区别于传统以内部技术路线图为导向的产品开发模式**：\n\n**创业第一天文化（Day One Startup Culture）——借鉴初创企业的敏捷与创新精神，推动英特尔内部简化流程、小团队运作，激发组织活力与执行效率**：\n\n\n\n\n### 引言\n\n以下内容为您呈现的是英特尔公司首席执行官陈立武（Lip-Bu Tan ）在 Vision 2025 活动上的开幕主题演讲实录。本次演讲尤为引人关注，因为它发生在 Tan 先生履新CEO仅两周之际，标志着英特尔这家科技巨头在新领导层下的战略方向定调。演讲开篇，Tan 先生坦诚地回顾了英特尔近期面临的挑战，特别是未能完全满足客户期望之处，并表达了致力于修正错误、以“少承诺，多兑现”为原则重建信任的决心。\n\n在随后的阐述中，他结合自身在工程、风险投资（华登国际）以及领导 Cadence 实现转型的丰富经历，为即将推行的改革提供了背景和理念支撑。演讲的核心内容围绕着英特尔的未来战略展开，强调了回归“工程为本”的文化、借鉴初创企业的敏捷与创新精神、积极拥抱并利用人工智能（AI）这一颠覆性技术的重要性。同时，Tan 先生也具体规划了英特尔在关键产品领域（包括客户端计算、数据中心和AI加速）以及其寄予厚望的代工服务（Foundry）业务上的发展路径与优先事项，突出了性能、能效、质量以及与客户深度合作的必要性。\n\n他最后再次强调了对公司和客户的长期承诺，并真诚邀请业界伙伴提供坦率反馈，共同推动英特尔迈向新的阶段。\n\n### 内容纲要\n\n```\nIntel Vision 2025 开幕主题演讲 (CEO: Lip-Bu Tan)\n├── 一、开场与新任CEO愿景\n│   ├── 欢迎与致谢\n│   ├── 上任14天观察与首要任务（客户沟通）\n│   ├── 承认不足与承诺改进\n│   │   └── 核心承诺：“少承诺，多兑现”\n│   └── 目标：取悦客户，重建信任\n├── 二、CEO背景与理念\n│   ├── 教育背景（物理、核工程 @ MIT）\n│   ├── 职业经历\n│   │   ├── 华登国际（Walden International）创立与发展\n│   │   ├── 风险投资理念（重视真理、工匠精神、逆向投资）\n│   │   └── 投资领域（半导体、光子学、新材料、AI、生命科学等）\n│   ├── Cadence CEO经历\n│   │   ├── 文化重塑（一个团队、创新、客户满意）\n│   │   ├── 业务拓展（核心EDA、IP收购、系统设计赋能）\n│   │   └── 显著成果（增长、市场扩大、股东回报）\n│   ├── 英特尔董事会经历\n│   └── 出任英特尔CEO动机（热爱公司、帮助转型）\n├── 三、核心战略与文化重塑\n│   ├── 回归“工程为本”\n│   │   ├── 人才策略（留住与吸引）\n│   │   └── 文化建设（创新、赋权）\n│   ├── 强调团队合作（篮球类比）\n│   ├── 内部文化变革\n│   │   ├── “创业第一天”文化\n│   │   ├── 鼓励内部创新与自由度\n│   │   └── 简化工作方式，小团队运作\n│   ├── 财务与效率（加强资产负债表、提高效率）\n│   └── 设计思路转变\n│       ├── “由外向内”（问题/工作负载优先）\n│       ├── 拥抱“软件2.0”\n│       ├── AI驱动系统设计\n│       └── 发展专用与定制化芯片（含x86）\n├── 四、关键技术趋势：AI的影响\n│   ├── AI作为行业变革核心驱动力\n│   ├── 对计算架构的改变（云、算力需求）\n│   ├── 新兴技术推动（光子学、量子计算）\n│   ├── 对内容交互的革新（生成式AI、智能代理）\n│   └── 向物理世界扩展（人形机器人等）\n├── 五、产品策略重点\n│   ├── 核心信念：最好产品终将获胜\n│   ├── 不可妥协的优先项（性能、能效、质量与交付）\n│   ├── 客户端计算\n│   │   ├── 加强创新与领导力\n│   │   ├── 18A工艺产品（Panther Lake）\n│   │   └── 生态系统与边缘AI\n│   ├── 数据中心\n│   │   ├── 加强产品组合（招募人才）\n│   │   ├── 满足核心需求（性能、能效、TCO）\n│   │   └── CPU在AI中的角色\n│   └── 更广泛的AI领域（加速器）\n│       ├── 承认现状不理想\n│       └── 承诺改进，提供竞争力（需时日）\n├── 六、代工服务（Foundry）策略重点\n│   ├── 目标：建立世界一流代工服务\n│   ├── 市场驱动力（需求增长、供应链韧性）\n│   ├── 核心战略\n│   │   ├── 信任是基础\n│   │   └── 适应客户需求（方法论、IP、EDA）\n│   ├── 技术进展（18A量产、14A研发）\n│   ├── 发展模式（耐心、长期投入、关键客户）\n│   ├── 地缘角色（美国领导地位）\n│   └── 政府合作与未来活动（Direct Connect）\n└── 七、总结与承诺\n    ├── 统一优先事项：服务客户，赢得信任\n    ├── CEO个人长期承诺\n    ├── 重申核心愿景（工程为本、创业精神、倾听行动、解决问题）\n    ├── 呼吁客户提供坦诚反馈\n    └── 结束语与祝愿\n```\n\n\n***\n\n**法律声明与开场白**\n\n\u003e 本演示文稿中涉及未来计划或预期的陈述均为前瞻性陈述。这些陈述基于当前的预期，并涉及许多风险和不确定性，可能导致实际结果与此类陈述中明示或暗示的结果存在重大差异。有关可能导致实际结果产生重大差异的因素的更多信息，请参阅我们最新的收益发布和在美国证券交易委员会（SEC）备案的文件，网址为 www.intc.com。\n\n\u003e 事情是这样的。世界上所有的伟大，每一项壮举，每一次突破，每一个你所钦佩的改变游戏规则的范式成就，并非来自外部。看，伟大，你的伟大，可能很容易被忽视。但它就在这里。在内部。在我们所有人的内部。在你内部。而伟大，总是可以变得更伟大。它所需要的只是点燃。那么，让我们按下那个开关。加大油门，把那扇门一脚踹开。毕竟，关于内在的东西，我们略知一二。如何将其倍增，加速它。所以你不仅仅是倾向未来，你是在跃入未来。拥有更多的内在独创性，更多的内在创造力，更多的安全性、创新、智能，因为你内在的伟大，那就是你的超能力。帮助你释放它，那就是我们的使命。\n\u003e \n\u003e 请欢迎首席执行官 Lip-Bu Tan 登台。\n\n## 一、 开场与新任CEO愿景\n\n大家下午好。非常感谢大家莅临 Vision 2025。同时也要感谢我们的赞助商以及我们安排的出色的研讨会演讲嘉宾阵容，希望大家能在此行中有所收获。\n\n首先，我真心感谢大家的到来和支持。能在英特尔历史上这个决定性的时刻领导公司，我感到非常兴奋。这是我加入公司的第14天，时间很短，感谢大家的支持。时间不长，但足以让我形成一些清晰的观察和未来的计划。这里是与大家分享这些想法的绝佳场所。\n\n在我上任第一天，我的首要任务就是花时间与客户交流。几十年来，我与许多客户建立了值得信赖的友谊。基于我们的关系和我的谦逊态度，他们给了我非常诚实的反馈。从早期的对话中可以清楚地看到，我们面前还有很多艰苦的工作。在某些领域，我们未能达到你们的期望。我会组建强大的团队来纠正过去的错误，并开始赢得你们的信任。我的座右铭非常简单：少承诺，多兑现。这一直是我的标志。除非我们能让你们所有人都满意，否则我不会满足。\n\n我一直在花时间与我们的团队交流，包括许多架构师和工程师，我亲自与他们联系。\n\n承认英特尔的挣扎，并呼吁坦诚反馈：\n我知道这对英特尔来说是一段相当艰难的时期。我们在创新上落后了。结果，我们在适应和满足你们的需求方面行动过于迟缓。你们理应得到更好的，我们需要改进，而且我们会的。请对我们坦诚相告，越严厉越好。这就是我这周对你们的期望。我相信严厉的反馈是最有价值的。我从客户那里学到了很多，你们给我诚实的反馈，我就知道该做什么。我在执掌 Cadence Design Systems 时亲身体验了这一点，在我最初的一次主要客户评审中，我请他们给我的产品打分。那位高管说：“Lip-Bu，没有其他供应商敢问这个问题。” 好吧，我必须知道我的产品有多糟糕。告诉你们，我们收到了很多 D、E 和 F 的评分。这很丢人，但我学到了很多，因为在我的学术生涯中，我从未得过 B 以下的成绩。这很丢人。但它极大地激发了我去改变，那成为了公司的转折点。我们将重塑与客户互动的方式，从今天开始，我真切地期待与你们建立信任。我过去的竞争对手曾告诉我：“Lip-Bu，客户把我们当作供应商。” 但他们把你当作伙伴。在英特尔，我期望你们也同样对待我。在我看到同样的结果之前，我不会停歇。\n\n## 二、 CEO背景与理念\n\n在我谈论一些我认为可以实现的方式之前，让我先分享一点我的背景。我出生在马来西亚，后来搬到新加坡并在那里长大。我在大学读的是物理学本科，我曾在（南洋理工）大学担任了几年的校董，为学校提供咨询。然后我移居美国，在麻省理工学院（MIT）获得了核工程研究生学位。所以这是一个有趣的背景。我的教育背景让我深刻理解了如何通过工程设计解决棘手的技术问题。\n\n三里岛事故发生后，我决定不再继续攻读博士学位。相反，我搬到了旧金山。我妈妈非常担心我。他们都是大学教授。我怎么就辍学了呢？但至少我哥哥来看我后回复我妈妈说：“他挺好的。” 我爱上了硅谷。\n\n我创立了华登国际（Walden International），这是一个风险投资基金群体。刚开始时，我只管理着 $3 百万 美金，只有几个家庭朋友投资了我，多年来我将其发展到了 $50 亿 美金。这个名字的灵感来自于一位思想家和哲学家，亨利·戴维·梭罗（Henry David Thoreau）。你们中有多少人读过他的书？《瓦尔登湖》是一本了不起的书。他有一句我最喜欢的名言是：“与其给我爱、金钱和名誉，不如给我真理。” 这句话对我影响深远，贯穿我的一生，因为我希望我的客户、我的团队、我的伙伴、我的妻子都能给我真理。我的妻子。她也期望我给她真理。这样我们就能一起解决问题，作为一个团队向前迈进。\n\n我也很钦佩他，因为他是一位工匠——如果你参观他的小木屋，看他如何建造的，那是精美的手工艺品。我在那里待了半个多小时，仔细观察了每个角落，看他是如何建造得如此细致入微，那就是工匠精神。很多商业活动都关乎于建立工匠精神。它更多的是艺术，而非科学。\n\n作为一名风险投资家，我致力于在别人不关注的地方寻找隐藏的机会。二十年前当半导体不受欢迎时，我加倍投入。我仍然记得我去拜访了两家我尊敬和钦佩的顶级风险投资公司。当我安排好会议，他们来到会议室。在我谈论了半导体之后，一半的团队离开了，另一半则同情地听我说完，最后会议室只剩下两个人。他们低声问我：“你有没有我们可以谈谈的AI初创公司？” 所以那时半导体并不受欢迎。我采取了长远的眼光，即使我的投资者问我：“你疯了吗？” 顶级风投认为这是一个夕阳产业，甚至一些大学教授也认为它是夕阳产业。我决定逆势而行，加倍投入，这确实获得了回报。我在半导体领域投入了大量资金，其中一些像高速连接技术公司如 Credo，现在在光子学领域，以及一些记录技术，还有一些处理器功耗很高，如何通过冷却降低功耗，这对我来说真的非常令人兴奋。你需要转向一些基础设施，我称之为光子学，还有新材料。技术发展到一定程度，你需要新材料，如氮化镓（$GaN$）、碳化硅（$SiC$）和磷化铟（$InP$），以支持下一代应用。总的来说，我进行了 251 项与半导体相关的投资，其中有 43 家公司首次公开募股（IPO），25 家被收购。\n\n之后我转向了内容探索，比如你们看到的 Typeface，我是该公司的早期投资者。然后是搜索，我以前常用谷歌搜索，现在我改用 Perplexity 搜索，这是一种非常有趣的对话式搜索方式，我很喜欢。还有软件即服务（SaaS）和云服务，以及AI安全相关领域。所以我在这些公司投入了不少资金，还有人工智能和虚拟AI，以及许多生成式AI领域。最近，我专注于生成式AI和代理式AI（Agentic AI），以及生命科学和医疗创新。我的一位好朋友利用脑电波帮助帕金森患者，利用半导体驱动，实现了对话 $82\\%$ 的准确率，一些医疗创新令人惊叹。\n\n我的经验为我后来担任 Cadence Design Systems 的CEO做好了充分准备，当时他们请我出任CEO。首先，我所做的是塑造了“一个团队”的文化，改变了创新文化，取悦我们的客户，与客户建立深度伙伴关系以寻找解决方案。除了发展我们的核心EDA业务，我还认为IP（知识产权）非常重要，通过多次收购，基本上投入了我们拥有的现金，我收购了 Denali，你们有些人可能熟悉。我还收购了 Tensilica 和 Jasper Design Automation（用于形式验证，原文未明确说Jasper但暗示了），以及用于高速接口的 IP 公司。这至关重要。这有助于加速设计过程，并将IP业务增长到超过 $10\\%$ 的收入占比。我总是喜欢寻找下一个能带来 $10\\%$ 增长的领域，通过新的创新和我们可以进入的新领域来实现。我们更积极地向系统设计赋能（System Design Enablement）转型。这包括系统建模、系统分析，从而扩展了我们的可触达市场，并创造了新的收入流。\n\n所有这些使公司从低个位数的增长转变为两位数的增长。从过去没有新的内部有机开发文化和路线图，转变为每年都有内部有机开发的新产品，而不是从外部购买。我们将可触达市场扩大了三倍。并实现了 $3200\\%$ 的股东回报，使公司市值接近 $750 亿 美金。最重要的是，我们成为了客户信赖的伙伴，他们知道可以依赖我们。\n\n总的来说，这些经历教会了我很多。我在华登国际的经历训练我从初创公司的视角看待公司，拥有小团队、专注并解决公司需求。我在 Cadence 担任CEO的经历帮助我理解了设计方法论、代工生态系统以及如何取悦客户。我还在英特尔董事会工作了两年。我从我们的工程师那里学到了很多关于我们的问题、我们面临的挑战以及如何解决它们。所有这些都为我承担起建立新英特尔这项极具挑战性的任务做好了充分准备。\n\n这是一家标志性的、至关重要的公司。它对行业乃至美国都至关重要。我深切关心英特尔的成功，多年来有许多来自英特尔的导师激励着我。你们有些人可能记得 Albert Yu。有些人可能记得 Paul Otellini——他们中的一些人你们可能认识，他们是我的挚友。我从所有这些导师那里学到了很多关于半导体行业的知识。\n\n有些人问我：“Lip-Bu，在你职业生涯的这个阶段，为什么要接下这份工作？” 答案非常简单。我热爱这家公司。看到它挣扎，我很难过。我根本无法袖手旁观，明知自己可以帮助扭转局面。我认识到这不会容易。\n\n## 三、 核心战略与文化重塑\n\n这始于文化。我们必须在公司内部培养文化变革。我在大学里除了课堂和研究实验室学到的最重要、最有价值的一课是——我曾经在新加坡为我的大学队打大前锋。我学到了很多。是团队赢得冠军，即使有时我得了38分，也不是个人。最终是我们赢得了冠军，我发现我的队友投三分球，这帮助了我内外结合，我们赢了，我们每天放学后都努力训练。我们为赢得每场比赛而战，从错误中学习，并总是问我们如何能做得不同，我们回顾录像，研究如何改进。这就是为什么你们有些人知道我是勇士队的铁杆球迷。我热爱这场比赛，我真的很享受他们的团队合作，他们甚至不用看就能传球。你知道你的队友会接到球。这就是我想在英特尔建立的那种团队。\n\n最重要的是，我们需要每天努力扩展我们的梦想，致力于你们的成功。为了实现这一点，我们将重新聚焦公司于创新的基本要素。显然，我需要专注于加强我的资产负债表。我需要真正推动效率，我需要真正重组我们拥有的人才，并吸引一些新的人才，带着对我们未来目标的清晰愿景。\n\n创新始于孵化。我们是一家大公司。有时这会阻碍新想法获得发展和成长的空间。我希望真正实践“创业第一天”（startup day one）的文化。每天都像第一天的初创公司一样去工作。一个大型初创公司，然后我们可以真正推动一些新想法，让工程师拥有内部创新的自由。我过去的周末常常排满了与工程师和架构师的会面，他们有一些想要改变世界的绝妙想法，这正是我兴奋地与他们紧密合作的原因。我将把资源投入到那些我们能看到创新机会的人和想法上，并解放一些基础设施来真正推动创新和赋权。\n\n最重要的是，我们将简化我们的工作方式。在我的职业生涯中，我看到小型、专注的团队如何快速行动、创新并挑战现有的大公司。我们将在英特尔实践这一点。我们可能一开始并不完美，但最终你可以信赖我们会把它做到完美。这将释放出我知道存在于我团队中的潜力。这也将帮助我们从外部吸引新的人才，他们可以加入我们，进入这个创造创新、创建新英特尔的最激动人心的时期。你们知道我的电子邮件地址，如果你们感兴趣，给我打电话。我会花时间与你们交流。\n\n我们将重新定义我们的战略，然后释放带宽，有些业务——我们会将其剥离，但真正专注于我们的核心业务，以及如何利用AI和软件2.0进行扩展。这将需要一个基础性的转变，改变我们设计产品的方法。过去，英特尔的方法是“由内向外”。我们设计硬件，然后想办法开发软件使其工作。世界已经改变了。你必须反过来。未来，我们将从问题出发，即你试图解决什么问题，你需要处理和支持的工作负载，然后从那里反向工作。这需要拥抱“软件2.0”（Software 2.0）的心态，这意味着软件先行。我投资了几家软件2.0的初创公司，其中一些将非常令人兴奋和具有颠覆性。我们将使用AI驱动的系统设计来加速新计算架构平台的开发。\n\n我从执掌 Cadence 的经历中知道，我们采用AI可以显著提升性能和功耗效率，达到两位数以上的提升，你可以看到这种改变游戏规则的影响，以及如何帮助客户在设计中提高生产力。并且也帮助我们支持未来几年我们将享受到的新的计算密集型模型、应用和代理（agent）。\n\n所有这一切都将从根本上重塑我们对待硬件的方法。世界正朝着“专用芯片”（purpose-built silicon）的方向发展。即为你要解决的特定问题进行设计和优化。这也为新的 $X86$ 解决方案打开了大门。我也相信我们可以在开发为特定应用量身定制的“定制芯片”（custom silicon）方面发挥重要作用，以满足你们的需求。上周末我花了不少时间与三个主要的数据和AI平台交流。他们非常希望与我们合作，共同定义下一代 $X86$ 解决方案，我对这些机会感到着迷和非常兴奋。我们已经开始与我的工程团队进行深入探讨，以启动这一转型。我们将开始重新构想我们的产品组合。\n\n## 四、 关键技术趋势：AI的影响\n\n我们正处在一个非常动态、快速变化的行业中。技术的采用和颠覆正在以前所未有的速度加速。这正由一种名为AI的变革性力量所驱动。AI并非新生事物。但在数据大规模可用的时代，你确实可以驱动一些新的学习方式、新的解读方式以及预测未来的新方法。这确实正在重塑许多公司，并改变我们的日常生活。你能想象代理（agent）帮助你做决定并处理一些繁琐的流程吗？我喜欢代理，并且已经在使用一些。\n\n首先，AI正在驱动计算架构的全面变革，尤其是在云计算领域。无代码和低代码。我们会谈到这个。这正在推动创新，需要巨大的计算能力和新的数据容量。这加速了我们前进的步伐，以及我之前提到的一些基础设施向光子学（Photonics）领域的转移。而且我也投资了三家量子计算公司，这项技术正在到来，我密切关注着。它到来的速度比我们所有人想象的都要快。\n\nAI也在革新我们发现、创造和与内容互动的方式，通过生成式AI和智能代理（intelligent agents）。然后我的一些朋友正在努力成为所有AI的控制中心，他们跟我说：“Lip-Bu，我们非常希望将英特尔平台作为实验室和代理的基础。” 我喜欢这个想法。\n\nAI也在扩展到物理世界。你可能听说过人形机器人（humanoid robotics）。我对此非常着迷。这是一个新的前沿领域。它将重新定义从汽车到制造业的各个行业。它将创造一个机器人技术和智能系统嵌入我们周围无处不在的新时代。我在这方面有很多经验，请继续关注英特尔在这方面的动态，这将为我们未来创造巨大的机遇。\n\n## 五、 产品策略重点\n\n我坚信最好的产品总能胜出。团队去年已经开始重新聚焦于此，这将继续是我们未来的首要任务。\n\n对我来说，有几个领域是不可协商的。首先，我们必须开发并提供卓越的性能，这对支持你们未来的工作负载至关重要。我们必须预见未来。我们必须提供卓越的能效，这对于在日益功耗受限的世界中实现AI至关重要。我们今天的电力甚至无法满足我们试图构建的AI云基础设施的需求，这是我非常关注的事情，也是我重新加入MIT顾问委员会的主要原因。因为我的核工程背景，他们说：“Lip-Bu，未来是聚变和核能，Lip-Bu，请回来帮助我们。” 我很高兴能参与到这个关于未来的头脑风暴中。我们必须提供卓越的质量和准时交付，绝无例外。我们必须拥有一种“第一次就做对”的文化，我们目前还没做到，但我会推行下去。敬请期待。这是对我来说不可协商的，因为这是赢得客户信任的必要组成部分。这些是我们的北极星，这需要时间，但我们今天就开始行动。Michelle和团队将在明天早上给大家做深入介绍，今天我只强调几个我看到的具体优先事项。\n\n在客户端计算领域，我们将推动强劲的创新，这一直是我们的优势领域，但竞争加剧了。工作负载发生了变化，我们不能停滞不前。我们必须前进以满足这些要求。我们将继续加强我们的产品和路线图，并期待在今年晚些时候出货基于 $18A$ 工艺的产品（Panther Lake）。我们也将继续专注于构建由ISV（独立软件供应商）和AI应用组成的行业产品生态系统。我们将利用我们在（此处可能有遗漏的技术名称，脚本中是capabilities in --）方面的能力来帮助实现边缘AI（AI edge）。那是下一个前沿。\n\n在数据中心领域，我们需要加强我们的产品组合。我们流失了不少人才。我的首要任务是招募业内最优秀的人才回来，重新加入或加入英特尔。客户告诉我，我们需要更高的性能和效率，以及更低的总拥有成本（TCO），尤其是在你们的AI投资方面。我们最新的产品组合是提升我们竞争力的一步。我们将努力推动持续改进，CPU将在AI领域扮演越来越重要的角色，尤其是在低功耗、高效率的推理方面。\n\n在更广泛的AI数据（加速器）领域，我对我们目前的状况不满意。我知道你们也不满意。我已经清楚地听到了反馈。是时候翻开新的一页了。我们将从过去的错误中吸取教训，努力开发出能提供给你们的有竞争力的系统。这不会一蹴而就。但我知道我们能做到。\n\n## 六、 代工服务（Foundry）策略重点\n\n在加强英特尔产品的同时，我同样致力于建立一个伟大的代工服务（Foundry）。全球对芯片生产的需求正在增长，你们需要灵活、有韧性且安全的供应链。英特尔代工服务将扮演关键角色。我们将继续推进我们的代工战略以满足我们的需求。我每周都会收到我的团队领导的更新，然后我会深入到工程层面，了解我们如何改进工艺技术，我会随时向你们通报进展。你们必须满足我的要求，我的标准非常高。我正直接与我的团队合作，了解我们所处的位置，并定义清晰的前进道路。这显然需要加强我的资产负债表以推动更高的效率，把合适的人放在合适的位置，并扩展业务规模。\n\n代工是一项服务业务。它建立在信任原则的基础之上。这一点非常重要。同时也要认识到，每个代工客户都有自己独特的设计方法论和设计风格。这一点我从我在 Cadence 的日子里学到了很多。这是我们需要学习并适应不同客户的地方。他们都有自己偏好的IP供应商和偏好的EDA合作伙伴。为了优化性能、质量和良率，我们不会去改变它。我们会倾听客户的意见，然后专注于他们使用的特定模式识别、哪个EDA厂商、哪个IP，并进行优化，以驱动他们所需的性能和良率。这是一个我非常了解的生态系统，我正在积极参与以帮助推进我们的目标。\n\n我们正在持续推进我们的 $18A$ 工艺以及我们未来的节点 $14A$。$18A$ 计划于今年下半年实现大批量生产，首先用于我们自己的产品 Panther Lake。这是我们自身的需求，我们需要做到这一点，并且我们会快速审查其进展。同时也在接近我们的第一个外部（客户产品流片），我们正计划这样做。我们将持续改进质量和客户服务，以推动我们的代工业务向前发展。\n\n这需要一些时间。我非常有耐心。我总是喜欢着眼长远来做生意，建立一个成功的模式。对我来说非常重要的是，你需要两到三家非常重要的客户来帮助我们驱动性能和良率的提升。我非常了解这些客户，我将依靠他们来帮助我们，并随着时间的推移不断改进。\n\n我们是美国唯一一家设计和制造先进芯片的公司。我们被赋予在代工生态系统中扮演关键角色，尤其是在美国。我很高兴看到特朗普政府（注：原文为Trump administration，考虑到时间可能是指现任或泛指美国政府对产业的关注）专注于加强美国的技术和制造领导地位。我期待着，他们问我：“我们能帮什么忙？” 我肯定会去寻求他们的帮助来做我们需要做的事情。我期待与他们紧密合作，以推进共同的目标。\n\n我将在四月底的 Intel Foundry Direct Connect 活动上更多地谈论英特尔代工服务，希望届时你们中的许多人会参加。\n\n## 七、 总结与承诺\n\n无论是代工还是产品，我们的优先事项是相同的。我们在这里是为了服务你们，赢得你们的信任。在我们能够持续地按时、保质地交付，达到你们的期望之前，我不会感到高兴和满足，我们必须赢得它，我们知道这一点。我深切地致力于这段旅程，我个人也致力于这段旅程。人们在我刚加入（Cadence）时问我：“你会在那里待多久？” 我告诉他们：“只要公司需要，我就会一直待下去。” 即使他们当时只要求我待三个月，我最终待了15年，以确保我们真正交付并取悦客户。人们问我：“你到底为什么要接下这份具有挑战性的工作？” 我承诺长期投入。同样，人们问我，我会在英特尔待多久。我会在这里，只要公司需要。我深切地致力于这段旅程。\n\n在我的领导下，我们将回归我们的根基，成为一家“工程为本”（engineering-first）的公司。并追随我从 Albert Yu 那里学到的第一步。我们将再次像“创业第一天”（startup day one）那样行事。我们会仔细倾听并根据你们的意见采取行动。最重要的是，我们将创造产品，解决问题，并驱动成功。\n\n带着谦逊，我恳请你们帮助我，我无法独自完成。我需要你们作为客户的帮助，给我诚实的反馈。许多人知道我并不自负，不会仅仅因为要见另一位CEO就摆架子，我会深入到基层六、七层去接触工程师，获取你们的反馈。敬请期待。你们会经常见到我。\n\n这就是你们对我们的要求。也是我们应得的。\n\n最后，我只想祝愿大家在英特尔 Vision 大会上一切顺利。这里有很多分会场可以参加。有很多交流和社交活动，仅仅是建立人脉就非常棒了。祝愿大家一切顺利，享受这次活动。非常感谢大家。\n\n***\n\n好的，这是从提供的视频脚本中提取的框架与要点内容，以简体中文输出：\n\n**Intel Vision 2025 开幕主题演讲 (CEO: Lip-Bu Tan)**\n\n**一、 开场与新任CEO愿景**\n- Lip-Bu Tan 作为新任CEO（上任14天）欢迎与会者，并感谢赞助商和演讲嘉宾。\n- 首要任务是与客户沟通，承认英特尔在某些领域未达期望，将努力修正错误，重建信任。\n- 核心承诺：“少承诺，多兑现”（Under promise and over deliver）。\n- 目标是取悦所有客户。\n\n**二、 CEO背景与理念**\n- 教育背景：物理学本科，MIT核工程研究生。强调工程设计解决难题的能力。\n- 职业经历：\n    - 放弃博士学位，投身硅谷。\n    - 创立华登国际（Walden International），从管理 $3 百万美金起步，发展到管理 $50 亿美金。\n    - 受梭罗（Henry David Thoreau）思想启发，重视“真相”（truth）和“工匠精神”（craftsmanship）。\n    - 作为风险投资家，专注于发现隐藏机会，逆向投资半导体（当时被视为夕阳产业）。\n    - 投资领域广泛：高速连接、光子学（Photonics）、新材料（氮化镓 $GaN$，碳化硅 $SiC$，磷化铟 $InP$）、AI（生成式AI、Agentic AI、AI安全）、生命科学、量子计算等。\n    - 投资成就：251项半导体相关投资，产生43个IPO和25个并购。\n- Cadence CEO经历：\n    - 塑造“一个团队”文化，强调创新和客户满意。\n    - 发展核心EDA业务，通过收购（Denali, Tensilica, Jasper等）拓展IP业务（营收占比超 $10\\%$）。\n    - 向系统设计赋能（System Design Enablement）转型，扩大市场。\n    - 成果：公司从低个位数增长转变为两位数增长，可触达市场扩大3倍，股东回报达 $3200\\%$，市值达 $750 亿美金。\n    - 关键经验：初创公司视角、设计方法论、代工生态系统、客户满意的重要性。\n- 英特尔董事会经历：深入了解了英特尔面临的问题与挑战。\n- 出任英特尔CEO动机：热爱公司，不忍其挣扎，相信能帮助其转型。\n\n**三、 核心战略与文化重塑**\n- 英特尔将回归“工程为本”（engineering focus）的公司。\n    - 首要任务是留住和吸引顶尖工程人才。\n    - 创造创新和赋权的文化。\n- 借鉴篮球经验：强调团队合作赢得胜利（Teams win champion）。\n- 内部文化变革：\n    - 实践“创业第一天”（startup day one）文化。\n    - 鼓励内部创新，给予工程师自由度。\n    - 简化工作方式，采用小型、专注的团队模式快速行动。\n    - 加强资产负债表，提高效率，吸引人才。\n- 战略调整：\n    - 重新定义战略，聚焦核心业务，可能剥离非核心部分。\n    - 从“由内向外”（硬件优先）转变为“由外向内”（问题/工作负载优先）的设计思路。\n    - 拥抱“软件2.0”（Software 2.0）思维，软件先行。\n    - 利用AI驱动的系统设计加速新计算架构平台的开发。\n    - 转向为特定工作负载优化的“专用芯片”（purpose-built silicon）。\n    - 发展定制化芯片（custom silicon）能力，包括新的 $x86$ 解决方案（已与数据/AI平台沟通）。\n\n**四、 关键技术趋势：AI的影响**\n- 行业正被AI这一变革性力量加速重塑。\n- AI驱动计算架构（尤其云端）的全面变革，需要巨大的算力与数据容量。\n- 新兴技术推动力：光子学（Photonics）、量子计算（发展快于预期）。\n- AI正在革新内容发现、创作和交互方式（生成式AI、智能代理Agents）。\n- AI向物理世界扩展：人形机器人（Humanoid robotics）是新前沿，将重定义汽车、制造等行业，为英特尔带来机遇。\n\n**五、 产品策略重点**\n- 信念：最好的产品终将获胜。\n- 不可妥协的优先事项：\n    - 卓越的性能（Performance）。\n    - 卓越的能效（Efficiency），尤其是在功耗受限的AI时代（提及对核聚变/核能的关注）。\n    - 卓越的质量（Quality）和按时交付（On-time delivery），推行“一次成功”文化。\n- 客户端计算（Client Computing）：\n    - 加强创新，保持领先。\n    - 计划今年晚些时候出货基于 $18A$ 工艺的产品（Panther Lake）。\n    - 构建强大的ISV和AI应用生态系统。\n    - 赋能边缘AI（AI Edge）。\n- 数据中心（Data Center）：\n    - 需要加强产品组合（承认有人才流失，将大力招募）。\n    - 满足客户对更高性能、能效和更低总拥有成本（TCO）的需求。\n    - CPU将在低功耗AI推理中扮演重要角色。\n- 更广泛的AI领域（加速器等）：\n    - 对当前状况不满意（客户和自己都不满意）。\n    - 将吸取教训，努力提供有竞争力的系统（需要时间）。\n\n**六、 代工服务（Foundry）策略重点**\n- 致力于建立世界一流的代工服务。\n- 驱动力：全球芯片生产需求增长，对灵活、有韧性、安全的供应链需求。\n- 核心战略：\n    - 持续推进代工战略，满足客户需求。\n    - 代工是建立在“信任”基础上的服务业务。\n    - 适应不同客户独特的设计方法、风格、IP及EDA偏好，倾听客户，优化性能和良率。\n- 技术进展：\n    - 推进 $18A$ 工艺（计划今年下半年量产，首先用于内部产品Panther Lake，随后用于首个外部客户）。\n    - 研发未来节点 $14A$。\n- 发展模式：\n    - 需要耐心和长期投入。\n    - 需要2-3家重要的客户帮助驱动性能和良率提升。\n- 地缘角色：作为美国唯一能设计和制造先进芯片的公司，扮演关键角色。\n- 政府合作：期待与政府合作（提及Trump政府对科技领导力的关注），推进共同目标。\n- 后续活动：将在4月底的Intel Foundry Direct Connect活动上分享更多细节。\n\n**七、 总结与承诺**\n- 无论是产品还是代工，首要任务是服务客户、赢得信任。\n- 在准时、保质达到客户期望之前不会满足。\n- CEO个人长期承诺：“只要公司需要，我就会在这里”（As long as the company needs me）。\n- 重申英特尔将：\n    - 回归工程为本。\n    - 像初创公司一样运作。\n    - 倾听并根据客户反馈行动。\n    - 创造解决问题、驱动成功的产品。\n- 呼吁客户提供诚实、严厉的反馈以帮助英特尔改进。\n- 祝愿与会者在Intel Vision活动中有所收获。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"lip-bu-tan-intel-vision-2025-keynote\",\"slugSegments\":[\"notes\",\"missing-source-url\",\"lip-bu-tan-intel-vision-2025-keynote\"],\"pathSegments\":[\"notes\",\"missing-source-url\",\"lip-bu-tan-intel-vision-2025-keynote\"],\"urlPath\":\"/rosetta/notes/missing-source-url/lip-bu-tan-intel-vision-2025-keynote\",\"href\":\"/rosetta/notes/missing-source-url/lip-bu-tan-intel-vision-2025-keynote\",\"category\":\"missing-source-url\",\"title\":\"陈立武在Intel Vision 2025上的开幕主题演讲\",\"date\":\"2025-05-01\",\"excerpt\":\"英特尔新任CEO陈立武在Vision 2025活动上发表履新后首次公开演讲。他坦承英特尔近年在创新上的落后，提出以少承诺多兑现为原则重建客户信任，并围绕回归工程为本的文化、借鉴创业精神、拥抱AI技术变革三大方向阐述了公司未来战略，涵盖客户端计算、数据中心、AI加速器及代工服务等关键业务的发展路径与优先事项。\",\"coverImage\":\"$undefined\",\"author\":\"陈立武（Lip-Bu Tan）\",\"original\":\"陈立武的演讲.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"英特尔\",\"陈立武\",\"AI战略\",\"半导体代工\",\"企业转型\"],\"draft\": ional）创立与发展\n│   │   ├── 风险投资理念（重视真理、工匠精神、逆向投资）\n│   │   └── 投资领域（半导体、光子学、新材料、AI、生命科学等）\n│   ├── Cadence CEO经历\n│   │   ├── 文化重塑（一个团队、创新、客户满意）\n│   │   ├── 业务拓展（核心EDA、IP收购、系统设计赋能）\n│   │   └── 显著成果（增长、市场扩大、股东回报）\n│   ├── 英特尔董事会经历\n│   └── 出任英特尔CEO动机（热爱公司、帮助转型）\n├── 三、核心战略与文化重塑\n│   ├── 回归“工程为本”\n│   │   ├── 人才策略（留住与吸引）\n│   │   └── 文化建设（创新、赋权）\n│   ├── 强调团队合作（篮球类比）\n│   ├── 内部文化变革\n│   │   ├── “创业第一天”文化\n│   │   ├── 鼓励内部创新与自由度\n│   │   └── 简化工作方式，小团队运作\n│   ├── 财务与效率（加强资产负债表、提高效率）\n│   └── 设计思路转变\n│       ├── “由外向内”（问题/工作负载优先）\n│       ├── 拥抱“软件2.0”\n│       ├── AI驱动系统设计\n│       └── 发展专用与定制化芯片（含x86）\n├── 四、关键技术趋势：AI的影响\n│   ├── AI作为行业变革核心驱动力\n│   ├── 对计算架构的改变（云、算力需求）\n│   ├── 新兴技术推动（光子学、量子计算）\n│   ├── 对内容交互的革新（生成式AI、智能代理）\n│   └── 向物理世界扩展（人形机器人等）\n├── 五、产品策略重点\n│   ├── 核心信念：最好产品终将获胜\n│   ├── 不可妥协的优先项（性能、能效、质量与交付）\n│   ├── 客户端计算\n│   │   ├── 加强创新与领导力\n│   │   ├── 18A工艺产品（Panther Lake）\n│   │   └── 生态系统与边缘AI\n│   ├── 数据中心\n│   │   ├── 加强产品组合（招募人才）\n│   │   ├── 满足核心需求（性能、能效、TCO）\n│   │   └── CPU在AI中的角色\n│   └── 更广泛的AI领域（加速器）\n│       ├── 承认现状不理想\n│       └── 承诺改进，提供竞争力（需时日）\n├── 六、代工服务（Foundry）策略重点\n│   ├── 目标：建立世界一流代工服务\n│   ├── 市场驱动力（需求增长、供应链韧性）\n│   ├── 核心战略\n│   │   ├── 信任是基础\n│   │   └── 适应客户需求（方法论、IP、EDA）\n│   ├── 技术进展（18A量产、14A研发）\n│   ├── 发展模式（耐心、长期投入、关键客户）\n│   ├── 地缘角色（美国领导地位）\n│   └── 政府合作与未来活动（Direct Connect）\n└── 七、总结与承诺\n    ├── 统一优先事项：服务客户，赢得信任\n    ├── CEO个人长期承诺\n    ├── 重申核心愿景（工程为本、创业精神、倾听行动、解决问题）\n    ├── 呼吁客户提供坦诚反馈\n    └── 结束语与祝愿\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"英特尔新任CEO陈立武在Vision 2025活动上发表履新后首次公开演讲。他坦承英特尔近年在创新上的落后，提出以少承诺多兑现为原则重建客户信任，并围绕回归工程为本的文化、借鉴创业精神、拥抱AI技术变革三大方向阐述了公司未来战略，涵盖客户端计算、数据中心、AI加速器及代工服务等关键业务的发展路径与优先事项。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"少承诺多兑现（Under-promise and Over-deliver）——陈立武反复强调的核心管理哲学，意在通过超越预期的实际成果而非过度宣传来重建客户与市场对英特尔的信任\"}],\"：\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"工程为本（Engineering First）——英特尔文化重塑的核心方向，强调回归以技术和工程能力为驱动的企业基因，吸引并赋权顶尖工程人才\"}],\"：\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"代工服务（Intel Foundry）——英特尔面向外部客户开放先进制造能力的业务，依托18A等先进工艺节点，旨在打造与台积电竞争的世界级晶圆代工平台\"}],\"：\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"由外向内设计（Outside-in Design）——从客户实际工作负载和问题出发进行芯片设计的思路转变，区别于传统以内部技术路线图为导向的产品开发模式\"}],\"：\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"创业第一天文化（Day One Startup Culture）——借鉴初创企业的敏捷与创新精神，推动英特尔内部简化流程、小团队运作，激发组织活力与执行效率\"}],\"：\"]}],\"\\n\",[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"引言\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#引言\",\"children\":\"引言\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"以下内容为您呈现的是英特尔公司首席执行官陈立武（Lip-Bu Tan ）在 Vision 2025 活动上的开幕主题演讲实录。本次演讲尤为引人关注，因为它发生在 Tan 先生履新CEO仅两周之际，标志着英特尔这家科技巨头在新领导层下的战略方向定调。演讲开篇，Tan 先生坦诚地回顾了英特尔近期面临的挑战，特别是未能完全满足客户期望之处，并表达了致力于修正错误、以“少承诺，多兑现”为原则重建信任的决心。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在随后的阐述中，他结合自身在工程、风险投资（华登国际）以及领导 Cadence 实现转型的丰富经历，为即将推行的改革提供了背景和理念支撑。演讲的核心内容围绕着英特尔的未来战略展开，强调了回归“工程为本”的文化、借鉴初创企业的敏捷与创新精神、积极拥抱并利用人工智能（AI）这一颠覆性技术的重要性。同时，Tan 先生也具体规划了英特尔在关键产品领域（包括客户端计算、数据中心和AI加速）以及其寄予厚望的代工服务（Foundry）业务上的发展路径与优先事项，突出了性能、能效、质量以及与客户深度合作的必要性。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"他最后再次强调了对公司和客户的长期承诺，并真诚邀请业界伙伴提供坦率反馈，共同推动英特尔迈向新的阶段。\"}],\"\\n\",[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"内容纲要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#内容纲要\",\"children\":\"内容纲要\"}]}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-hidden border border-border bg-placeholder/40 shadow-sm\",\"children\":[null,[\"$\",\"pre\",null,{\"className\":\"overflow-x-auto px-[18px] py-[18px] text-[13px] leading-[1.8] text-text\",\"children\":[\"$\",\"code\",null,{\"className\":\"rounded-none border border-border bg-placeholder/45 px-[6px] py-[2px] font-mono text-[0.9em] text-text\",\"children\":\"$19\"}]}]]}],\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\",\"\\n\",\"$L4b\",\"\\n\",\"$L4c\",\"\\n\",\"$L4d\",\"\\n\",\"$L4e\",\"\\n\",\"$L4f\",\"\\n\",\"$L50\",\"\\n\",\"$L51\",\"\\n\",\ \":\"mb-6\",\"children\":\"在我上任第一天，我的首要任务就是花时间与客户交流。几十年来，我与许多客户建立了值得信赖的友谊。基于我们的关系和我的谦逊态度，他们给了我非常诚实的反馈。从早期的对话中可以清楚地看到，我们面前还有很多艰苦的工作。在某些领域，我们未能达到你们的期望。我会组建强大的团队来纠正过去的错误，并开始赢得你们的信任。我的座右铭非常简单：少承诺，多兑现。这一直是我的标志。除非我们能让你们所有人都满意，否则我不会满足。\"}]\n22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我一直在花时间与我们的团队交流，包括许多架构师和工程师，我亲自与他们联系。\"}]\n23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"承认英特尔的挣扎，并呼吁坦诚反馈：\\n我知道这对英特尔来说是一段相当艰难的时期。我们在创新上落后了。结果，我们在适应和满足你们的需求方面行动过于迟缓。你们理应得到更好的，我们需要改进，而且我们会的。请对我们坦诚相告，越严厉越好。这就是我这周对你们的期望。我相信严厉的反馈是最有价值的。我从客户那里学到了很多，你们给我诚实的反馈，我就知道"])</script><script>self.__next_f.push([1,"该做什么。我在执掌 Cadence Design Systems 时亲身体验了这一点，在我最初的一次主要客户评审中，我请他们给我的产品打分。那位高管说：“Lip-Bu，没有其他供应商敢问这个问题。” 好吧，我必须知道我的产品有多糟糕。告诉你们，我们收到了很多 D、E 和 F 的评分。这很丢人，但我学到了很多，因为在我的学术生涯中，我从未得过 B 以下的成绩。这很丢人。但它极大地激发了我去改变，那成为了公司的转折点。我们将重塑与客户互动的方式，从今天开始，我真切地期待与你们建立信任。我过去的竞争对手曾告诉我：“Lip-Bu，客户把我们当作供应商。” 但他们把你当作伙伴。在英特尔，我期望你们也同样对待我。在我看到同样的结果之前，我不会停歇。\"}]\n24:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"二-ceo背景与理念\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#二-ceo背景与理念\",\"children\":\"二、 CEO背景与理念\"}]}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在我谈论一些我认为可以实现的方式之前，让我先分享一点我的背景。我出生在马来西亚，后来搬到新加坡并在那里长大。我在大学读的是物理学本科，我曾在（南洋理工）大学担任了几年的校董，为学校提供咨询。然后我移居美国，在麻省理工学院（MIT）获得了核工程研究生学位。所以这是一个有趣的背景。我的教育背景让我深刻理解了如何通过工程设计解决棘手的技术问题。\"}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"三里岛事故发生后，我决定不再继续攻读博士学位。相反，我搬到了旧金山。我妈妈非常担心我。他们都是大学教授。我怎么就辍学了呢？但至少我哥哥来看我后回复我妈妈说：“他挺好"])</script><script>self.__next_f.push([1,"的。” 我爱上了硅谷。\"}]\n"])</script><script>self.__next_f.push([1,"27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"我创立了华登国际（Walden International），这是一个风险投资基金群体。刚开始时，我只管理着 \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\" -html\",\"aria-hidden\":\"true\",\"children\":[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.8056em\",\"verticalAlign\":\"-0.0556em\"}}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"10%\"}]]}]}]]}],\" 增长的领域，通过新的创新和我们可以进入的新领域来实现。我们更积极地向系统设计赋能（System Design Enablement）转型。这包括系统建模、系统分析，从而扩展了我们的可触达市场，并创造了新的收入流。\"]}]\n"])</script><script>self.__next_f.push([1,"2c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"所有这些使公司从低个位数的增长转变为两位数的增长。从过去没有新的内部有机开发文化和路线图，转变为每年都有内部有机开发的新产品，而不是从外部购买。我们将可触达市场扩大了三倍。并实现了 \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mn\",null,{\"children\":\"3200\"}],[\"$\",\"mi\",null,{\"mathvariant\":\"normal\",\"children\":\"%\"}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"3200\\\\%\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.8056em\",\"verticalAlign\":\"-0.0556em\"}}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"3200%\"}]]}]}]]}],\" 的股东回报，使公司市值接近 $750 亿 美金。最重要的是，我们成为了客户信赖的伙伴，他们知道可以依赖我们。\"]}]\n"])</script><script>self.__next_f.push([1,"2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"总的来说，这些经历教会了我很多。我在华登国际的经历训练我从初创公司的视角看待公司，拥有小团队、专注并解决公司需求。我在 Cadence 担任CEO的经历帮助我理解了设计方法论、代工生态系统以及如何取悦客户。我还在英特尔董事会工作了两年。我从我们的工程师那里学到了很多关于我们的问题、我们面临的挑战以及如何解决它们。所有这些都为我承担起建立新英特尔这项极具挑战性的任务做好了充分准备。\"}]\n2e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这是一家标志性的、至关重要的公司。它对行业乃至美国都至关重要。我深切关心英特尔的成功，多年来有许多来自英特尔的导师激励着我。你们有些人可能记得 Albert Yu。有些人可能记得 Paul Otellini——他们中的一些人你们可能认识，他们是我的挚友。我从所有这些导师那里学到了很多关于半导体行业的知识。\"}]\n2f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"有些人问我：“Lip-Bu，在你职业生涯的这个阶段，为什么要接下这份工作？” 答案非常简单。我热爱这家公司。看到它挣扎，我很难过。我根本无法袖手旁观，明知自己可以帮助扭转局面。我认识到这不会容易。\"}]\n30:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"三-核心战略与文化重塑\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#三-核心战略与文化重塑\",\"children\":\"三、 核心战略与文化重塑\"}]}]\n31:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这始于文化。我们必须在公司内部培养文化变革。我在大学里除了课堂和研究实验室学到的最重要、最有价值的一课是——我曾经在新加坡为我的大学队打大前锋。我学到了很多。是团队赢得"])</script><script>self.__next_f.push([1,"冠军，即使有时我得了38分，也不是个人。最终是我们赢得了冠军，我发现我的队友投三分球，这帮助了我内外结合，我们赢了，我们每天放学后都努力训练。我们为赢得每场比赛而战，从错误中学习，并总是问我们如何能做得不同，我们回顾录像，研究如何改进。这就是为什么你们有些人知道我是勇士队的铁杆球迷。我热爱这场比赛，我真的很享受他们的团队合作，他们甚至不用看就能传球。你知道你的队友会接到球。这就是我想在英特尔建立的那种团队。\"}]\n32:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最重要的是，我们需要每天努力扩展我们的梦想，致力于你们的成功。为了实现这一点，我们将重新聚焦公司于创新的基本要素。显然，我需要专注于加强我的资产负债表。我需要真正推动效率，我需要真正重组我们拥有的人才，并吸引一些新的人才，带着对我们未来目标的清晰愿景。\"}]\n33:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"创新始于孵化。我们是一家大公司。有时这会阻碍新想法获得发展和成长的空间。我希望真正实践“创业第一天”（startup day one）的文化。每天都像第一天的初创公司一样去工作。一个大型初创公司，然后我们可以真正推动一些新想法，让工程师拥有内部创新的自由。我过去的周末常常排满了与工程师和架构师的会面，他们有一些想要改变世界的绝妙想法，这正是我兴奋地与他们紧密合作的原因。我将把资源投入到那些我们能看到创新机会的人和想法上，并解放一些基础设施来真正推动创新和赋权。\"}]\n34:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最重要的是，我们将简化我们的工作方式。在我的职业生涯中，我看到小型、专注的团队如何快速行动、创新并挑战现有的大公司。我们将在英特尔实践这一点。我们可能一开始"])</script><script>self.__next_f.push([1,"并不完美，但最终你可以信赖我们会把它做到完美。这将释放出我知道存在于我团队中的潜力。这也将帮助我们从外部吸引新的人才，他们可以加入我们，进入这个创造创新、创建新英特尔的最激动人心的时期。你们知道我的电子邮件地址，如果你们感兴趣，给我打电话。我会花时间与你们交流。\"}]\n35:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们将重新定义我们的战略，然后释放带宽，有些业务——我们会将其剥离，但真正专注于我们的核心业务，以及如何利用AI和软件2.0进行扩展。这将需要一个基础性的转变，改变我们设计产品的方法。过去，英特尔的方法是“由内向外”。我们设计硬件，然后想办法开发软件使其工作。世界已经改变了。你必须反过来。未来，我们将从问题出发，即你试图解决什么问题，你需要处理和支持的工作负载，然后从那里反向工作。这需要拥抱“软件2.0”（Software 2.0）的心态，这意味着软件先行。我投资了几家软件2.0的初创公司，其中一些将非常令人兴奋和具有颠覆性。我们将使用AI驱动的系统设计来加速新计算架构平台的开发。\"}]\n36:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我从执掌 Cadence 的经历中知道，我们采用AI可以显著提升性能和功耗效率，达到两位数以上的提升，你可以看到这种改变游戏规则的影响，以及如何帮助客户在设计中提高生产力。并且也帮助我们支持未来几年我们将享受到的新的计算密集型模型、应用和代理（agent）。\"}]\n"])</script><script>self.__next_f.push([1,"37:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"所有这一切都将从根本上重塑我们对待硬件的方法。世界正朝着“专用芯片”（purpose-built silicon）的方向发展。即为你要解决的特定问题进行设计和优化。这也为新的 \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mi\",null,{\"children\":\"X\"}],[\"$\",\"mn\",null,{\"children\":\"86\"}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"X86\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.6833em\"}}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"style\":{\"marginRight\":\"0.0785em\"},\"children\":\"X\"}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"86\"}]]}]}]]}],\" 解决方案打开了大门。我也相信我们可以在开发为特定应用量身定制的“定制芯片”（custom silicon）方面发挥重要作用，以满足你们的需求。上周末我花了不少时间与三个主要的数据和AI平台交流。他们非常希望与我们合作，共同定义下一代 \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mi\",null,{\"children\":\"X\"}],[\"$\",\"mn\",null,{\"children\":\"86\"}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"X86\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.6833em\"}}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"style\":{\"marginRight\":\"0.0785em\"},\"children\":\"X\"}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"86\"}]]}]}]]}],\" 解决方案，我对这些机会感到着迷和非常兴奋。我们已经开始与我的工程团队进行深入探讨，以启动这一转型。我们将开始重新构想我们的产品组合。\"]}]\n"])</script><script>self.__next_f.push([1,"38:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"四-关键技术趋势ai的影响\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#四-关键技术趋势ai的影响\",\"children\":\"四、 关键技术趋势：AI的影响\"}]}]\n39:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们正处在一个非常动态、快速变化的行业中。技术的采用和颠覆正在以前所未有的速度加速。这正由一种名为AI的变革性力量所驱动。AI并非新生事物。但在数据大规模可用的时代，你确实可以驱动一些新的学习方式、新的解读方式以及预测未来的新方法。这确实正在重塑许多公司，并改变我们的日常生活。你能想象代理（agent）帮助你做决定并处理一些繁琐的流程吗？我喜欢代理，并且已经在使用一些。\"}]\n3a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"首先，AI正在驱动计算架构的全面变革，尤其是在云计算领域。无代码和低代码。我们会谈到这个。这正在推动创新，需要巨大的计算能力和新的数据容量。这加速了我们前进的步伐，以及我之前提到的一些基础设施向光子学（Photonics）领域的转移。而且我也投资了三家量子计算公司，这项技术正在到来，我密切关注着。它到来的速度比我们所有人想象的都要快。\"}]\n3b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI也在革新我们发现、创造和与内容互动的方式，通过生成式AI和智能代理（intelligent agents）。然后我的一些朋友正在努力成为所有AI的控制中心，他们跟我说：“Lip-Bu，我们非常希望将英特尔平台作为实验室和代理的基础。” 我喜欢这个想法。\"}]\n3c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI也在扩展到物理世界。你可能听说过人形机器人（humanoid robotics）。我对此非常着迷。这是一个新的前沿"])</script><script>self.__next_f.push([1,"领域。它将重新定义从汽车到制造业的各个行业。它将创造一个机器人技术和智能系统嵌入我们周围无处不在的新时代。我在这方面有很多经验，请继续关注英特尔在这方面的动态，这将为我们未来创造巨大的机遇。\"}]\n3d:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"五-产品策略重点\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#五-产品策略重点\",\"children\":\"五、 产品策略重点\"}]}]\n3e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我坚信最好的产品总能胜出。团队去年已经开始重新聚焦于此，这将继续是我们未来的首要任务。\"}]\n3f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"对我来说，有几个领域是不可协商的。首先，我们必须开发并提供卓越的性能，这对支持你们未来的工作负载至关重要。我们必须预见未来。我们必须提供卓越的能效，这对于在日益功耗受限的世界中实现AI至关重要。我们今天的电力甚至无法满足我们试图构建的AI云基础设施的需求，这是我非常关注的事情，也是我重新加入MIT顾问委员会的主要原因。因为我的核工程背景，他们说：“Lip-Bu，未来是聚变和核能，Lip-Bu，请回来帮助我们。” 我很高兴能参与到这个关于未来的头脑风暴中。我们必须提供卓越的质量和准时交付，绝无例外。我们必须拥有一种“第一次就做对”的文化，我们目前还没做到，但我会推行下去。敬请期待。这是对我来说不可协商的，因为这是赢得客户信任的必要组成部分。这些是我们的北极星，这需要时间，但我们今天就开始行动。Michelle和团队将在明天早上给大家做深入介绍，今天我只强调几个我看到的具体优先事项。\"}]\n"])</script><script>self.__next_f.push([1,"40:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"在客户端计算领域，我们将推动强劲的创新，这一直是我们的优势领域，但竞争加剧了。工作负载发生了变化，我们不能停滞不前。我们必须前进以满足这些要求。我们将继续加强我们的产品和路线图，并期待在今年晚些时候出货基于 \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mn\",null,{\"children\":\"18\"}],[\"$\",\"mi\",null,{\"children\":\"A\"}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"18A\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.6833em\"}}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"18\"}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"children\":\"A\"}]]}]}]]}],\" 工艺的产品（Panther Lake）。我们也将继续专注于构建由ISV（独立软件供应商）和AI应用组成的行业产品生态系统。我们将利用我们在（此处可能有遗漏的技术名称，脚本中是capabilities in --）方面的能力来帮助实现边缘AI（AI edge）。那是下一个前沿。\"]}]\n"])</script><script>self.__next_f.push([1,"41:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在数据中心领域，我们需要加强我们的产品组合。我们流失了不少人才。我的首要任务是招募业内最优秀的人才回来，重新加入或加入英特尔。客户告诉我，我们需要更高的性能和效率，以及更低的总拥有成本（TCO），尤其是在你们的AI投资方面。我们最新的产品组合是提升我们竞争力的一步。我们将努力推动持续改进，CPU将在AI领域扮演越来越重要的角色，尤其是在低功耗、高效率的推理方面。\"}]\n42:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在更广泛的AI数据（加速器）领域，我对我们目前的状况不满意。我知道你们也不满意。我已经清楚地听到了反馈。是时候翻开新的一页了。我们将从过去的错误中吸取教训，努力开发出能提供给你们的有竞争力的系统。这不会一蹴而就。但我知道我们能做到。\"}]\n43:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"六-代工服务foundry策略重点\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#六-代工服务foundry策略重点\",\"children\":\"六、 代工服务（Foundry）策略重点\"}]}]\n44:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在加强英特尔产品的同时，我同样致力于建立一个伟大的代工服务（Foundry）。全球对芯片生产的需求正在增长，你们需要灵活、有韧性且安全的供应链。英特尔代工服务将扮演关键角色。我们将继续推进我们的代工战略以满足我们的需求。我每周都会收到我的团队领导的更新，然后我会深入到工程层面，了解我们如何改进工艺技术，我会随时向你们通报进展。你们必须满足我的要求，我的标准非常高。我正直接与我的团队合作，了解我们所处的位置，并定义清晰的前进道路。这显然需要加强我"])</script><script>self.__next_f.push([1,"的资产负债表以推动更高的效率，把合适的人放在合适的位置，并扩展业务规模。\"}]\n45:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"代工是一项服务业务。它建立在信任原则的基础之上。这一点非常重要。同时也要认识到，每个代工客户都有自己独特的设计方法论和设计风格。这一点我从我在 Cadence 的日子里学到了很多。这是我们需要学习并适应不同客户的地方。他们都有自己偏好的IP供应商和偏好的EDA合作伙伴。为了优化性能、质量和良率，我们不会去改变它。我们会倾听客户的意见，然后专注于他们使用的特定模式识别、哪个EDA厂商、哪个IP，并进行优化，以驱动他们所需的性能和良率。这是一个我非常了解的生态系统，我正在积极参与以帮助推进我们的目标。\"}]\n"])</script><script>self.__next_f.push([1,"46:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"我们正在持续推进我们的 \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mn\",null,{\"children\":\"18\"}],[\"$\",\"mi\",null,{\"children\":\"A\"}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"18A\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"tr
