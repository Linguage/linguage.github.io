局、新知识领域的发现等，是超线性回报的第二大来源。\n\n**学习复利**：知识积累本身具有指数增长特性，学得越多学得越快，且能帮助跨越智识阈值发现全新领域，是通往超线性回报最可靠的路径。\n\n**去组织化趋势**：技术进步使个人不再依赖大型机构即可获取资源、受众和协作，导致表现回报的差异性进一步放大，为有抱负的个体创造了前所未有的机遇。\n\n\n- 原文链接：[Paul Graham: Superlinear Returns](https://paulgraham.com/superlinear.html)\n\n**超线性回报**\n\n2023年10月\n\n孩提时代，我对这个世界最重要的认知误区之一，就是未能理解“表现”与“回报”之间的超线性关系达到了何种程度。\n\n老师和教练们含蓄地告诉我们回报是线性的。“一分耕耘，一分收获，”这句话我听了不下千遍。他们本意是好的，但这很少是事实。如果你的产品只有竞争对手一半好，你得到的并非一半的客户，而是没有客户，然后你就破产倒闭了。\n\n在商业领域，表现的回报显然是超线性的。有些人认为这是资本主义的缺陷，如果我们改变规则，这种情况就会消失。但表现的超线性回报是世界的一个特征，而非我们发明的规则的人为产物。我们在名望、权力、军事胜利、知识，乃至对人类的贡献中都能看到同样的模式。在所有这些领域，都是富者愈富。[1]\n\n不理解超线性回报的概念，你就无法理解这个世界。如果你雄心勃勃，那你绝对应该理解它，因为这将是你乘风破浪的浪潮。\n\n看起来似乎有很多不同情况都存在超线性回报，但据我所知，它们可以归结为两个根本原因：指数级增长和阈值效应。\n\n超线性回报最明显的例子是你从事的工作本身具有指数级增长的特性。例如，培养细菌。当它们开始生长时，就会呈指数级增长。但培养它们很有技巧。这意味着精于此道的人和不擅此道的人，其结果会有天壤之别。\n\n初创企业也能实现指数级增长，我们在此也看到了同样的模式。有些企业设法达到了高增长率，大多数则不然。结果是你会得到性质上完全不同的结果：高增长率的公司往往变得极具价值，而增长率较低的公司甚至可能无法生存。\n\nY Combinator 鼓励创始人关注增长率而非绝对数字。这能防止他们在早期绝对数字尚低时感到沮丧。它还有助于他们决定专注点：你可以用增长率作为指南针，指引公司如何发展。但主要的好处在于，通过关注增长率，你往往能得到指数级增长的东西。\n\nYC 并没有明确告诉创始人增长率是“一分耕耘，一分收获”，但这离事实不远。如果增长率与表现成正比，那么在时间 t 内，表现 p 所获得的回报将与 pt 成正比。\n\n即使思考了数十年，我仍然觉得这句话令人吃惊。\n\n只要你的表现如何取决于你过去的表现如何，你就会得到指数级增长。但无论是我们的DNA还是我们的习俗，都没有让我们为此做好准备。没有人觉得指数级增长是自然的；每个孩子第一次听到那个国王赏赐大臣米粒的故事（第一天一粒，之后每天翻倍）时，都会感到惊讶。\n\n对于我们无法自然理解的事物，我们会发展出习俗来应对，但我们关于指数级增长的习俗也不多，因为它在人类历史上出现的实例太少了。原则上，畜牧业本应是其中之一：你拥有的牲畜越多，它们繁殖的后代就越多。但实际上，牧场是限制因素，而且没有指数级增长牧场的计划。\n\n或者更准确地说，没有普遍适用的计划。有一种方法可以指数级扩张领土：通过征服。你控制的领土越多，你的军队就越强大，征服新领土就越容易。这就是为什么历史上充满了帝国。但建立或管理帝国的人太少了，他们的经验并没有对习俗产生太大影响。皇帝是一个遥远而可怕的人物，而不是一个可以从中汲取生活经验的榜样。\n\n在前工业时代，指数级增长最常见的例子可能是学术研究。你知道的越多，学习新事物就越容易。其结果，无论是过去还是现在，都是某些人在特定主题上比其他人知识渊博得令人吃惊。但这同样没有对习俗产生太大影响。尽管思想的帝国可以重叠，因此可以有更多的“思想皇帝”，但在前工业时代，这种类型的帝国几乎没有实际影响。[2]\n\n在过去的几个世纪里，这种情况发生了变化。现在，思想的皇帝可以设计出击败领土皇帝的炸弹。但这种现象仍然很新，我们还没有完全消化它。甚至很少有参与者意识到他们正从指数级增长中受益，或者思考他们能从其他类似实例中学到什么。\n\n超线性回报的另一个来源体现在“赢家通吃”这个表述中。在一场体育比赛中，表现与回报的关系是一个阶跃函数：获胜的队伍得到一场胜利，无论他们是表现优异还是略胜一筹。[3]\n\n然而，阶跃函数的来源并非竞争本身，而是结果中存在阈值。你不需要竞争也能得到这些阈值。在你独自参与的情况下也可能存在阈值，比如证明一个定理或击中一个目标。\n\n值得注意的是，具有一种超线性回报来源的情况，往往也具有另一种。跨越阈值会导致指数级增长：战斗中的获胜方通常损失较小，这使得他们将来更有可能获胜。而指数级增长能帮助你跨越阈值：在一个具有网络效应的市场中，一个增长足够快的公司可以排挤掉潜在的竞争对手。\n\n名望是一个有趣的例子，它结合了两种超线性回报的来源。名望呈指数级增长，因为现有的粉丝会为你带来新的粉丝。但其如此集中的根本原因是阈值：在普通人的头脑中，A级名单上的位置是有限的。\n\n结合两种超线性回报来源的最重要案例可能是学习。知识呈指数级增长，但其中也存在阈值。例如，学习骑自行车。其中一些阈值类似于机床：一旦你学会阅读，你就能更快地学习其他任何东西。但最重要的阈值是那些代表新发现的阈值。知识似乎是分形的，意思是如果你在某个知识领域的边界上努力推进，你有时会发现一个全新的领域。如果你做到了，你就能首先获得其中所有新发现的机会。牛顿做到了，丢勒和达尔文也做到了。\n\n是否存在找到具有超线性回报情况的通用规则？最明显的一条是寻找能够产生复利效应的工作。\n\n工作产生复利效应有两种方式。它可以直接产生复利，即在一个周期中表现良好会导致你在下一个周期中表现更好。例如，当你建设基础设施、培养受众或品牌时，就会发生这种情况。或者，工作可以通过教给你知识来产生复利，因为学习本身就具有复利效应。第二种情况很有趣，因为在它发生时你可能会觉得自己做得不好。你可能未能实现你的直接目标。但如果你学到了很多，那么你仍然在获得指数级增长。\n\n这是硅谷如此容忍失败的原因之一。硅谷的人们并非盲目容忍失败。只有当你从失败中学习时，他们才会继续在你身上下注。但如果你确实在学习，你实际上是一个不错的赌注：也许你的公司没有像你期望的那样增长，但你本人成长了，这最终应该会产生结果。\n\n事实上，那些不包含学习成分的指数级增长形式，往往与学习紧密相连，我们或许应该将其视为规律而非例外。这就引出了另一个经验法则：永远保持学习。如果你不在学习，你可能就没有走在通往超线性回报的道路上。\n\n但不要过度优化你正在学习的内容。不要把自己局限于学习那些已知有价值的东西。你正在学习；你还不确定什么将来会有价值，如果你过于严格，就会ตัด掉那些异类。\n\n那么阶跃函数呢？是否存在诸如“寻找阈值”或“寻求竞争”之类的有用经验法则？这里的情况比较棘棘手。阈值的存在并不能保证游戏值得玩。如果你玩一轮俄罗斯轮盘赌，你肯定会处于一个有阈值的情况，但在最好的情况下，你的处境并没有改善。“寻求竞争”同样无用；如果奖品不值得竞争呢？足够快的指数级增长既保证了回报曲线的形状也保证了其幅度——因为增长足够快的东西即使最初微不足道也会变得巨大——但阈值只保证形状。[4]\n\n一个利用阈值的原则必须包含一个测试，以确保游戏值得玩。这里有一个：如果你遇到一些虽然平庸但仍然受欢迎的东西，取代它可能是一个好主意。例如，如果一家公司生产的产品人们不喜欢但仍然购买，那么如果你制造出更好的替代品，他们大概会购买。[5]\n\n如果有一种方法可以找到有前景的智力阈值，那就太好了。有没有办法判断哪些问题背后蕴藏着全新的领域？我怀疑我们永远无法确定地预测这一点，但奖赏如此巨大，以至于即使是比随机略好一点的预测器也会很有用，并且有希望找到这样的预测器。我们可以在某种程度上预测一个研究问题何时不太可能带来新发现：当它看起来合理但乏味时。而那些确实能带来新发现的问题往往看起来非常神秘，但可能并不重要。（如果它们既神秘又明显重要，它们就会成为著名的开放性问题，已经有很多人在研究了。）所以这里的一个经验法则是受好奇心驱动，而不是职业规划驱动——充分发挥你的好奇心，而不是做那些你应该做的事情。\n\n对于有抱负的人来说，表现带来的超线性回报前景令人兴奋。在这方面有好消息：这个领域正在向两个方向扩展。有更多类型的工作可以让你获得超线性回报，而且回报本身也在增长。\n\n这有两个原因，尽管它们紧密交织，更像是一个半原因：技术的进步，以及组织重要性的下降。\n\n五十年前，要想从事雄心勃勃的项目，成为某个组织的一员要重要得多。这是获得所需资源的唯一途径，是拥有同事的唯一途径，也是获得分发渠道的唯一途径。所以在1970年，你的声望在大多数情况下就是你所属组织的声望。声望是一个准确的预测指标，因为如果你不属于某个组织，你就不太可能取得太大成就。有一些例外，最著名的是艺术家和作家，他们使用廉价的工具独自工作，并拥有自己的品牌。但即使是他们，在接触观众方面也受制于组织。[6]\n\n一个由组织主导的世界抑制了表现回报的差异性。但在我的一生中，这个世界已经显著瓦解。现在更多的人可以拥有20世纪艺术家和作家所拥有的自由。有很多雄心勃勃的项目不需要太多初始资金，也有很多新的学习、赚钱、寻找同事和接触观众的方式。\n\n旧世界仍然大量存在，但按照历史标准来看，变革的速度是巨大的。尤其是考虑到所涉及的利害关系。很难想象还有比表现回报方面的变化更根本的变化了。\n\n没有了机构的抑制作用，结果的差异性将会更大。这并不意味着每个人都会变得更好：做得好的人会做得更好，但做得差的人会做得更差。这是一个需要牢记的重要观点。将自己暴露在超线性回报之下并不适合每个人。大多数人作为集体的一员会过得更好。那么谁应该追求超线性回报呢？有两类有抱负的人：那些知道自己足够优秀，在一个差异性更大的世界里最终会净赚的人；以及那些，尤其是年轻人，能够承担风险去尝试并找出答案的人。[7]\n\n从机构向外的转变，不仅仅是其现有成员的流失。许多新的赢家将是那些机构永远不会接纳的人。因此，由此产生的机会民主化，将比机构本身可能炮制的任何温和的内部版本都更广泛、更真实。\n\n并非所有人都对这种雄心的巨大释放感到高兴。它威胁到一些既得利益，也与一些意识形态相矛盾。[8] 但如果你是一个有抱负的个人，这对你来说是个好消息。你应该如何利用它呢？\n\n利用表现带来的超线性回报最明显的方式是做出色的工作。在曲线的远端，增量努力是划算的。尤其是在远端竞争较少的情况下——这不仅仅是因为做出色的工作很难这一显而易见的原因，还因为人们觉得这个前景如此令人生畏，以至于很少有人尝试。这意味着不仅做出色的工作是划算的，甚至尝试去做也是划算的。\n\n有很多变量会影响你的工作质量，如果你想成为一个异类，你需要几乎把所有这些变量都做好。例如，要做出色的工作，你必须对它感兴趣。仅仅勤奋是不够的。因此，在一个拥有超线性回报的世界里，了解自己的兴趣所在，并找到从事相关工作的方法，变得更加有价值。[9] 选择适合自己情况的工作也很重要。例如，如果有一种工作本身就需要大量的时间和精力投入，那么在你年轻、还没有孩子的时候去做它，价值会越来越大。\n\n做出色的工作有很多技巧。这不仅仅是努力尝试的问题。我打算用一段话来给出一个秘诀。\n\n选择你具有天赋并且深感兴趣的工作。养成从事自己项目的习惯；它们是什么并不重要，只要你觉得它们令人兴奋且雄心勃勃。尽你所能地努力工作，但不要筋疲力尽，这最终会将你带到知识的前沿之一。这些前沿从远处看是平滑的，但近看则充满了空白。注意并探索这些空白，如果你幸运的话，其中一个空白会扩展成一个全新的领域。承担你所能承受的最大风险；如果你不偶尔失败，你可能就过于保守了。寻找最优秀的同事。培养良好的品味，并向最好的榜样学习。要诚实，尤其是对自己诚实。锻炼身体、合理饮食、保证睡眠，并避免那些更危险的药物。当有疑问时，追随你的好奇心。它从不说谎，而且它比你更了解什么值得关注。[10]\n\n当然，你还需要另一件事：运气。运气总是一个因素，但当你独自工作而不是作为组织的一员时，它更是如此。尽管有一些关于运气是准备与机会相遇之类的有效格言，但也存在一个你无法控制的真正的偶然性成分。解决方法是多次尝试。这也是尽早开始承担风险的另一个原因。\n\n具有超线性回报的领域最好的例子可能是科学。它具有指数级增长（以学习的形式），并结合了在表现极端边缘的阈值——字面上讲，是在知识的极限处。\n\n其结果是科学发现方面的不平等程度，使得即使是最分层社会的财富不平等与之相比也显得温和。牛顿的发现可以说比他所有同时代人的发现总和还要大。[11]\n\n这一点可能看起来显而易见，但最好还是把它说清楚。超线性回报意味着不平等。回报曲线越陡峭，结果的差异就越大。\n\n事实上，超线性回报与不平等之间的相关性如此之强，以至于它产生了另一个寻找这类工作的经验法则：寻找那些少数大赢家表现远超其他所有人的领域。一个所有人表现都差不多的工作类型，不太可能具有超线性回报。\n\n哪些领域是少数大赢家表现远超其他所有人的领域？以下是一些明显的例子：体育、政治、艺术、音乐、表演、导演、写作、数学、科学、创办公司和投资。在体育领域，这种现象是由于外部设定的阈值造成的；你只需要快百分之几就能赢得所有比赛。在政治领域，权力的增长与皇帝时代非常相似。而在其他一些领域（包括政治），成功很大程度上是由名望驱动的，名望本身就有其超线性增长的来源。但是，当我们排除体育、政治和名望的影响后，一个显著的模式出现了：剩下的清单与那些你需要有独立思考能力才能成功的领域清单完全相同——在这些领域，你的想法不仅要正确，而且还要新颖。[12]\n\n这在科学领域显然是这样的。你不能发表别人已经说过的东西的论文。例如，在投资领域也是如此。相信一家公司会表现良好，只有在大多数其他投资者不这么认为时才有用；如果其他所有人都认为这家公司会表现良好，那么它的股价就已经反映了这一点，就没有赚钱的空间了。\n\n我们还能从这些领域学到什么？在所有这些领域，你都必须付出最初的努力。超线性回报起初看起来很小。“照这个速度，”你会想，“我永远也达不到目标。”但由于回报曲线在远端急剧上升，因此值得采取非凡的措施来到达那里。\n\n在初创企业界，这个原则的名称是“做那些不可规模化的事情”（do things that don't scale）。如果你对你最初那一小部分客户给予了异乎寻常的关注，理想情况下，你会通过口碑引发指数级增长。但这个原则同样适用于任何指数级增长的事物。例如，学习。当你刚开始学习某样东西时，你会感到迷茫。但值得付出最初的努力来站稳脚跟，因为你学得越多，就会变得越容易。\n\n在具有超线性回报的领域清单中，还有一个更微妙的教训：不要将工作等同于一份职业（job）。在20世纪的大部分时间里，对于几乎所有人来说，这两者是相同的，结果我们继承了一种将生产力等同于拥有一份职业的习惯。即使现在，对大多数人来说，“你的工作”指的是他们的职业。但对作家、艺术家或科学家来说，它指的是他们目前正在研究或创造的任何东西。对于这样的人来说，他们的工作是他们从一份职业带到另一份职业的东西，如果他们有职业的话。它可能是为雇主做的，但它是他们作品集的一部分。\n\n进入一个少数大赢家表现远超其他所有人的领域，前景令人生畏。有些人是故意这样做的，但你不需要。如果你有足够的天赋，并且足够深入地追随你的好奇心，你最终会进入其中一个领域。你的好奇心不会让你对无聊的问题感兴趣，而有趣的问题如果尚未成为超线性回报领域的一部分，往往会创造出这样的领域。\n\n超线性回报的领域绝非一成不变。事实上，最极端的回报来自于扩展它。因此，虽然雄心和好奇心都能让你进入这个领域，但好奇心可能是两者中更强大的一个。雄心倾向于让你攀登现有的高峰，但如果你足够专注于一个足够有趣的问题，它可能会在你脚下成长为一座大山。\n\n---\n\n注释\n\n[1] 我们很难严格区分努力、表现和回报，因为它们在事实上并没有严格区分。对一个人来说是回报的东西，对另一个人来说可能是表现。但是，尽管这些概念的边界是模糊的，但它们并非毫无意义。我试图尽可能精确地描述它们，而不至于出错。进化本身可能是超线性回报最普遍的例子。但我们很难对此产生共鸣，因为我们不是接受者；我们是回报本身。\n\n[2] 在工业革命之前，知识当然也具有实际影响。农业的发展彻底改变了人类生活。但这种改变是技术广泛、渐进改进的结果，而不是少数知识渊博人士的发现。\n\n[3] 从数学上讲，将阶跃函数描述为超线性的并不正确，但是当一个从零开始的阶跃函数描述理性行为者努力的回报曲线时，其作用类似于超线性函数。如果它从零开始，那么阶跃之前的部分低于任何线性增加的回报，而阶跃之后的部分必须高于该点的必要回报，否则没有人会费心去做。\n\n[4] 从某些人觉得有激励作用的意义上说，寻求竞争可能是一个好的经验法则。它在某种程度上也是有前景问题的指南，因为这是其他人也觉得它们有前景的标志。但这是一个非常不完美的标志：通常会有一群喧闹的人追逐某个问题，而他们最终都被某个悄悄研究另一个问题的人超越了。\n\n[5] 但并非总是如此。你必须小心使用这条规则。当某物虽然平庸但仍然受欢迎时，通常存在一个隐藏的原因。也许垄断或监管使其难以竞争。也许顾客品味不佳或购买决策程序有问题。由于这些原因，存在着大量平庸的事物。\n\n[6] 我二十多岁时想成为一名艺术家，甚至去艺术学校学习绘画。主要是因为我喜欢艺术，但我动机中一个不小的部分来自于艺术家似乎最不受组织摆布这一事实。\n\n[7] 原则上，每个人都在获得超线性回报。学习具有复利效应，每个人在一生中都在学习。但实际上，很少有人将这种日常学习推向回报曲线变得真正陡峭的程度。\n\n[8] “公平”（equity）的倡导者究竟指的是什么尚不清楚。他们自己似乎也存在分歧。但无论他们指的是什么，都可能与一个机构控制结果的权力减弱、少数异类远超其他所有人的世界相冲突。\n\n这个概念恰好在世界向相反方向转变的时刻出现，似乎是运气不好，但我认为这并非巧合。我认为它现在出现的一个原因是，其拥护者感受到了表现差异迅速扩大的威胁。\n\n[9] 推论：那些强迫孩子从事像医学这样有声望的工作，即使他们对此毫无兴趣的父母，将会比过去更严重地坑害他们的孩子。\n\n[10] 这段话的初稿是《如何做出色的工作》（How to Do Great Work）的第一稿。我一写完就意识到这是一个比超线性回报更重要的话题，所以我暂停了这篇文章，将这段话扩展成了独立的一篇。原始版本几乎荡然无存，因为在我完成《如何做出色的工作》之后，我根据那篇文章重写了这一段。\n\n[11] 在工业革命之前，致富的人通常像皇帝一样：攫取某种资源使他们更强大，并使他们能够攫取更多资源。现在，可以通过像科学家一样，发现或创造某种独特有价值的东西来致富。大多数致富的人混合使用新旧两种方式，但在最发达的经济体中，仅在过去半个世纪里，这种比例就已显著向发现倾斜。\n\n[12] 如果独立思考是造成不平等的最大驱动力之一，那么思想传统的人不喜欢不平等也就不足为奇了。但这不仅仅是他们不希望任何人拥有他们无法拥有的东西。思想传统的人根本无法想象拥有新颖想法是什么样的。因此，表现差异巨大的整个现象对他们来说似乎是不自然的，当他们遇到这种情况时，他们会认为这一定是由于作弊或某种不良的外部影响造成的。\n\n感谢 Trevor Blackwell, Patrick Collison, Tyler Cowen, Jessica Livingston, Harj Taggar, 和 Garry Tan 阅读了本文的草稿。\n\n---\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"superlinear-returns-paul-graham\",\"slugSegments\":[\"notes\",\"missing-source-url\",\"superlinear-returns-paul-graham\"],\"pathSegments\":[\"notes\",\"missing-source-url\",\"superlinear-returns-paul-graham\"],\"urlPath\":\"/rosetta/notes/missing-source-url/superlinear-returns-paul-graham\",\"href\":\"/rosetta/notes/missing-source-url/superlinear-returns-paul-graham\",\"category\":\"missing-source-url\",\"title\":\"超线性回报\",\"date\":\"2023-10-01\",\"excerpt\":\"保罗·格雷厄姆探讨了表现与回报之间的超线性关系，指出其两大根本来源是指数级增长与阈值效应。文章分析了在商业、学术、名望等领域中富者愈富的现象，并为有抱负的人提供了利用超线性回报的实用建议——选择具有复利效应的工作、持续学习、追随好奇心，以及在组织重要性下降的时代抓住个人崛起的机遇。\",\"coverImage\":\"$undefined\",\"author\":\"Paul Graham\",\"original\":\"超线性回报「保罗·格雷厄姆 Paul Graham」.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"超线性回报\",\"指数增长\",\"创业\",\"学习复利\",\"个人成长\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[\"/rosetta/humanity/superlinear-returns-paul-graham/\"],\"weight\":\"$undefined\",\"data\":{\"title\":\"超线性回报\",\"excerpt\":\"保罗·格雷厄姆探讨了表现与回报之间的超线性关系，指出其两大根本来源是指数级增长与阈值效应。文章分析了在商业、学术、名望等领域中富者愈富的现象，并为有抱负的人提供了利用超线性回报的实用建议——选择具有复利效应的工作、持续学习、追随好奇心，以及在组织重要性下降的时代抓住个人崛起的机遇。\",\"date\":\"2023-10-01\",\"author\":\"Paul Graham\",\"original\":\"超线性回报「保罗·格雷厄姆 Paul Graham」.md\",\"tags\":[\"超线性回报\",\"指数增长\",\"创业\",\"学习复利\",\"个人成长\"],\"aliases\":[\"/rosetta/humanity/superlinear-returns-paul-graham/\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/cont ific-research\"]},{\"type\":\"entry\",\"title\":\"自动化的讽刺\",\"href\":\"/rosetta/notes/missing-source-url/ironies-of-automation\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"ironies-of-automation\"]}]}]}]},\"directoryHref\":\"/rosetta/notes/missing-source-url\",\"children\":\"$L18\"}]\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"保罗·格雷厄姆探讨了表现与回报之间的超线性关系，指出其两大根本来源是指数级增长与阈值效应。文章分析了在商业、学术、名望等领域中富者愈富的现象，并为有抱负的人提供了利用超线性回报的实用建议——选择具有复利效应的工作、持续学习、追随好奇心，以及在组织重要性下降的时代抓住个人崛起的机遇。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"超线性回报\"}],\"：表现与回报之间并非线性关系，而是呈现出远超比例的增长。产品只有竞争对手一半好，得到的不是一半客户而是零客户。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"指数级增长\"}],\"：当当前表现取决于过去表现时就会产生指数增长，如初创企业增长率、知识积累和细菌培养等，是超线性回报的第一大来源。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"阈值效应\"}],\"：结果中存在关键临界点，跨越阈值即可获得不成比例的回报，如赢家通吃的竞争格局、新知识领域的发现等，是超线性回报的第二大来源。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"学习复利\"}],\"：知识积累本身具有指数增长特性，学得越多学得越快，且能帮助跨越智识阈值发现全新领域，是通往超线性回报最可靠的路径。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"去组织化趋势\"}],\"：技术进步使个人不再依赖大型机构即可获取资源、受众和协作，导致表现回报的差异性进一步放大，为有抱负的个体创造了前所未有的机遇。\"]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"原文链接：\",[\"$\",\"a\",null,{\"href\":\"https://paulgraham.com/superlinear.html\",\"children\":\"Paul Graham: Superlinear Returns\"}]]}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"超线性回报\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"2023年10月\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"孩提时代，我对这个世界最重要的认知误区之一，就是未能理解“表现”与“回报”之间的超线性关系达到了何种程度。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"老师和教练们含蓄地告诉我们回报是线性的。“一分耕耘，一分收获，”这句话我听了不下千遍。他们本意是好的，但这很少是事实。如果你的产品只有竞争对手一半好，你得到的并非一半的客户，而是没有客户，然后你就破产倒闭了。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在商业领域，表现的回报显然是超线性的。有些人认为这是资本主义的缺陷，如果我们改变规则，这种情况就会消失。但表现的超线性回报是世界的一个特征，而非我们发明的规则的人为产物。我们在名望、权力、军事胜利、知识，乃至对人类的贡献中都能看到同样的模式。在所有这些领域，都是富者愈富。[1]\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"不理解超线性回报的概念，你就无法理解这个世界。如果你雄心勃勃，那你绝对应该理解它，因为这将是你乘风破浪的浪潮。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"看起来似乎有很多不同情况都存在超线性回报，但据我所知，它们可以归结为两个根本原因：指数级增长和阈值效应。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"超线性回报最明显的例子是你从事的工作本身具有指数级增长的特性。例如，培养细菌。当它们开始生长时，就会呈指数级增长。但培养它们很有技巧。这意味着精于此道的人和不擅此道的人，其结果会有天壤之别。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"初创企业也能实现指数级增长，我们在此也看到了同样的模式。有些企业设法达到了高增长率，大多数则不然。结果是你会得到性质上完全不同的结果：高增长率的公司往往变得极具价值，而增长率较低的公司甚至可能无法生存。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Y Combinator 鼓励创始人关注增长率而非绝对数字。这能防止他们在早期绝对数字尚低时感到沮丧。它还有助于他们决定专注点：你可以用增长率作为指南针，指引公司如何发展。但主要的好处在于，通过关注增长率，你往往能得到指数级增长的东西。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"YC 并没有明确告诉创始人增长率是“一分耕耘，一分收获”，但这离事实不远。如果增长率与表现成正比，那么在时间 t 内，表现 p 所获得的回报将与 pt 成正比。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"即使思考了数十年，我仍然觉得这句话令人吃惊。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"只要你的表现如何取决于你过去的表现如何，你就会得到指数级增长。但无论是我们的DNA还是我们的习俗，都没有让我们为此做好准备。没有人觉得指数级增长是自然的；每个孩子第一次听到那个国王赏赐大臣米粒的故事（第一天一粒，之后每天翻倍）时，都会感到惊讶。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"对于我们无法自然理解的事物，我们会发展出习俗来应对，但我们关于指数级增长的习俗也不多，因为它在人类历史上出现的实例太少了。原则上，畜牧业本应是其中之一：你拥有的牲畜越多，它们繁殖的后代就越多。但实际上，牧场是限制因素，而且没有指数级增长牧场的计划。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"或者更准确地说，没有普遍适用的计划。有一种方法可以指数级扩张领土：通过征服。你控制的领土越多，你的军队就越强大，征服新领土就越容易。这就是为什么历史上充满了帝国。但建立或管理帝国的人太少了，他们的经验并没有对习俗产生太大影响。皇帝是一个遥远而可怕的人物，而不是一个可以从中汲取生活经验的榜样。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在前工业时代，指数级增长最常见的例子可能是学术研究。你知道的越多，学习新事物就越容易。其结果，无论是过去还是现在，都是某些人在特定主题上比其他人知识渊博得令人吃惊。但这同样没有对习俗产生太大影响。尽管思想的帝国可以重叠，因此可以有更多的“思想皇帝”，但在前工业时代，这种类型的帝国几乎没有实际影响。[2]\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在过去的几个世纪里，这种情况发生了变化。现在，思想的皇帝可以设计出击败领土皇帝的炸弹。但这种现象仍然很新，我们还没有完全消化它。甚至很少有参与者意识到他们正从指数级增长中受益，或者思考他们能从其他类似实例中学到什么。\"}],\"\\n\",\"$L19\",\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\",\"\\n\",\"$L4b\",\"\\n\",\"$L4c\",\"\\n\",\"$L4d\",\"\\n\",\"$L4e\"]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"超线性回报的另一个来源体现在“赢家通吃”这个表述中。在一场体育比赛中，表现与回报的关系是一个阶跃函数：获胜的队伍得到一场胜利，无论他们是表现优异还是略胜一筹。[3]\"}]\n1a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"然而，阶跃函数的来源并非竞争本身，而是结果中存在阈值。你不需要竞争也能得到这些阈值。在你独自参与的情况下也可能存在阈值，比如证明一个定理或击中一个目标。\"}]\n1b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"值得注意的是，具有一种超线性回报来源的情况，往往也具有另一种。跨越阈值会导致指数级增长：战斗中的获胜方通常损失较小，这使得他们将来更有可能获胜。而指数级增长能帮助你跨越阈值：在一个具有网络效应的市场中，一个增长足够快的公司可以排挤掉潜在的竞争对手。\"}]\n1c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"名望是一个有趣的例子，它结合了两种超线性回报的来源。名望呈指数级增长，因为现有的粉丝会为你带来新的粉丝。但其如此集中的根本原因是阈值：在普通人的头脑中，A级名单上的位置是有限的。\"}]\n1d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"结合两种超线性回报来源的最重要案例可能是学习。知识呈指数级增长，但其中也存在阈值。例如，学习骑自行车。其中一些阈值类似于机床：一旦你学会阅读，你就能更快地学习其他任何东西。但最重要的阈值是那些代表新发现的阈值。知识似乎是分形的，意思是如果你在某个知识领域的边界上努力推进，你有时会发现一个全新的领域。如果你做到了，你就能首先获得其中所有新发现的机会。牛顿做到了，丢勒和达尔文也做到了。\"}]\n1e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"是否存在找到具有超线性回报情况的通"])</script><script>self.__next_f.push([1,"用规则？最明显的一条是寻找能够产生复利效应的工作。\"}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"工作产生复利效应有两种方式。它可以直接产生复利，即在一个周期中表现良好会导致你在下一个周期中表现更好。例如，当你建设基础设施、培养受众或品牌时，就会发生这种情况。或者，工作可以通过教给你知识来产生复利，因为学习本身就具有复利效应。第二种情况很有趣，因为在它发生时你可能会觉得自己做得不好。你可能未能实现你的直接目标。但如果你学到了很多，那么你仍然在获得指数级增长。\"}]\n20:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这是硅谷如此容忍失败的原因之一。硅谷的人们并非盲目容忍失败。只有当你从失败中学习时，他们才会继续在你身上下注。但如果你确实在学习，你实际上是一个不错的赌注：也许你的公司没有像你期望的那样增长，但你本人成长了，这最终应该会产生结果。\"}]\n21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"事实上，那些不包含学习成分的指数级增长形式，往往与学习紧密相连，我们或许应该将其视为规律而非例外。这就引出了另一个经验法则：永远保持学习。如果你不在学习，你可能就没有走在通往超线性回报的道路上。\"}]\n22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"但不要过度优化你正在学习的内容。不要把自己局限于学习那些已知有价值的东西。你正在学习；你还不确定什么将来会有价值，如果你过于严格，就会ตัด掉那些异类。\"}]\n23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"那么阶跃函数呢？是否存在诸如“寻找阈值”或“寻求竞争”之类的有用经验法则？这里的情况比较棘棘手。阈值的存在并不能保证游戏值得玩。如果你玩一轮俄罗斯轮盘赌，你肯定会处于一个有阈值的情况，但在最好的情况"])</script><script>self.__next_f.push([1,"下，你的处境并没有改善。“寻求竞争”同样无用；如果奖品不值得竞争呢？足够快的指数级增长既保证了回报曲线的形状也保证了其幅度——因为增长足够快的东西即使最初微不足道也会变得巨大——但阈值只保证形状。[4]\"}]\n24:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"一个利用阈值的原则必须包含一个测试，以确保游戏值得玩。这里有一个：如果你遇到一些虽然平庸但仍然受欢迎的东西，取代它可能是一个好主意。例如，如果一家公司生产的产品人们不喜欢但仍然购买，那么如果你制造出更好的替代品，他们大概会购买。[5]\"}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"如果有一种方法可以找到有前景的智力阈值，那就太好了。有没有办法判断哪些问题背后蕴藏着全新的领域？我怀疑我们永远无法确定地预测这一点，但奖赏如此巨大，以至于即使是比随机略好一点的预测器也会很有用，并且有希望找到这样的预测器。我们可以在某种程度上预测一个研究问题何时不太可能带来新发现：当它看起来合理但乏味时。而那些确实能带来新发现的问题往往看起来非常神秘，但可能并不重要。（如果它们既神秘又明显重要，它们就会成为著名的开放性问题，已经有很多人在研究了。）所以这里的一个经验法则是受好奇心驱动，而不是职业规划驱动——充分发挥你的好奇心，而不是做那些你应该做的事情。\"}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"对于有抱负的人来说，表现带来的超线性回报前景令人兴奋。在这方面有好消息：这个领域正在向两个方向扩展。有更多类型的工作可以让你获得超线性回报，而且回报本身也在增长。\"}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这有两个原因，尽管它们紧密交织，更像是一个半原因：技术的进步，以及组织重要"])</script><script>self.__next_f.push([1,"性的下降。\"}]\n28:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"五十年前，要想从事雄心勃勃的项目，成为某个组织的一员要重要得多。这是获得所需资源的唯一途径，是拥有同事的唯一途径，也是获得分发渠道的唯一途径。所以在1970年，你的声望在大多数情况下就是你所属组织的声望。声望是一个准确的预测指标，因为如果你不属于某个组织，你就不太可能取得太大成就。有一些例外，最著名的是艺术家和作家，他们使用廉价的工具独自工作，并拥有自己的品牌。但即使是他们，在接触观众方面也受制于组织。[6]\"}]\n29:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"一个由组织主导的世界抑制了表现回报的差异性。但在我的一生中，这个世界已经显著瓦解。现在更多的人可以拥有20世纪艺术家和作家所拥有的自由。有很多雄心勃勃的项目不需要太多初始资金，也有很多新的学习、赚钱、寻找同事和接触观众的方式。\"}]\n2a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"旧世界仍然大量存在，但按照历史标准来看，变革的速度是巨大的。尤其是考虑到所涉及的利害关系。很难想象还有比表现回报方面的变化更根本的变化了。\"}]\n2b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"没有了机构的抑制作用，结果的差异性将会更大。这并不意味着每个人都会变得更好：做得好的人会做得更好，但做得差的人会做得更差。这是一个需要牢记的重要观点。将自己暴露在超线性回报之下并不适合每个人。大多数人作为集体的一员会过得更好。那么谁应该追求超线性回报呢？有两类有抱负的人：那些知道自己足够优秀，在一个差异性更大的世界里最终会净赚的人；以及那些，尤其是年轻人，能够承担风险去尝试并找出答案的人。[7]\"}]\n2c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"从机构向外的转变，不"])</script><script>self.__next_f.push([1,"仅仅是其现有成员的流失。许多新的赢家将是那些机构永远不会接纳的人。因此，由此产生的机会民主化，将比机构本身可能炮制的任何温和的内部版本都更广泛、更真实。\"}]\n2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"并非所有人都对这种雄心的巨大释放感到高兴。它威胁到一些既得利益，也与一些意识形态相矛盾。[8] 但如果你是一个有抱负的个人，这对你来说是个好消息。你应该如何利用它呢？\"}]\n2e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"利用表现带来的超线性回报最明显的方式是做出色的工作。在曲线的远端，增量努力是划算的。尤其是在远端竞争较少的情况下——这不仅仅是因为做出色的工作很难这一显而易见的原因，还因为人们觉得这个前景如此令人生畏，以至于很少有人尝试。这意味着不仅做出色的工作是划算的，甚至尝试去做也是划算的。\"}]\n2f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"有很多变量会影响你的工作质量，如果你想成为一个异类，你需要几乎把所有这些变量都做好。例如，要做出色的工作，你必须对它感兴趣。仅仅勤奋是不够的。因此，在一个拥有超线性回报的世界里，了解自己的兴趣所在，并找到从事相关工作的方法，变得更加有价值。[9] 选择适合自己情况的工作也很重要。例如，如果有一种工作本身就需要大量的时间和精力投入，那么在你年轻、还没有孩子的时候去做它，价值会越来越大。\"}]\n30:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"做出色的工作有很多技巧。这不仅仅是努力尝试的问题。我打算用一段话来给出一个秘诀。\"}]\n31:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"选择你具有天赋并且深感兴趣的工作。养成从事自己项目的习惯；它们是什么并不重要，只要你觉得它们令人兴奋且雄心勃勃。尽你所能地努力工作，但"])</script><script>self.__next_f.push([1,"不要筋疲力尽，这最终会将你带到知识的前沿之一。这些前沿从远处看是平滑的，但近看则充满了空白。注意并探索这些空白，如果你幸运的话，其中一个空白会扩展成一个全新的领域。承担你所能承受的最大风险；如果你不偶尔失败，你可能就过于保守了。寻找最优秀的同事。培养良好的品味，并向最好的榜样学习。要诚实，尤其是对自己诚实。锻炼身体、合理饮食、保证睡眠，并避免那些更危险的药物。当有疑问时，追随你的好奇心。它从不说谎，而且它比你更了解什么值得关注。[10]\"}]\n32:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"当然，你还需要另一件事：运气。运气总是一个因素，但当你独自工作而不是作为组织的一员时，它更是如此。尽管有一些关于运气是准备与机会相遇之类的有效格言，但也存在一个你无法控制的真正的偶然性成分。解决方法是多次尝试。这也是尽早开始承担风险的另一个原因。\"}]\n33:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"具有超线性回报的领域最好的例子可能是科学。它具有指数级增长（以学习的形式），并结合了在表现极端边缘的阈值——字面上讲，是在知识的极限处。\"}]\n34:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"其结果是科学发现方面的不平等程度，使得即使是最分层社会的财富不平等与之相比也显得温和。牛顿的发现可以说比他所有同时代人的发现总和还要大。[11]\"}]\n35:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这一点可能看起来显而易见，但最好还是把它说清楚。超线性回报意味着不平等。回报曲线越陡峭，结果的差异就越大。\"}]\n36:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"事实上，超线性回报与不平等之间的相关性如此之强，以至于它产生了另一个寻找这类工作的经验法则：寻找那些少数大赢家表现远超其他所有"])</script><script>self.__next_f.push([1,"人的领域。一个所有人表现都差不多的工作类型，不太可能具有超线性回报。\"}]\n37:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"哪些领域是少数大赢家表现远超其他所有人的领域？以下是一些明显的例子：体育、政治、艺术、音乐、表演、导演、写作、数学、科学、创办公司和投资。在体育领域，这种现象是由于外部设定的阈值造成的；你只需要快百分之几就能赢得所有比赛。在政治领域，权力的增长与皇帝时代非常相似。而在其他一些领域（包括政治），成功很大程度上是由名望驱动的，名望本身就有其超线性增长的来源。但是，当我们排除体育、政治和名望的影响后，一个显著的模式出现了：剩下的清单与那些你需要有独立思考能力才能成功的领域清单完全相同——在这些领域，你的想法不仅要正确，而且还要新颖。[12]\"}]\n38:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这在科学领域显然是这样的。你不能发表别人已经说过的东西的论文。例如，在投资领域也是如此。相信一家公司会表现良好，只有在大多数其他投资者不这么认为时才有用；如果其他所有人都认为这家公司会表现良好，那么它的股价就已经反映了这一点，就没有赚钱的空间了。\"}]\n39:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们还能从这些领域学到什么？在所有这些领域，你都必须付出最初的努力。超线性回报起初看起来很小。“照这个速度，”你会想，“我永远也达不到目标。”但由于回报曲线在远端急剧上升，因此值得采取非凡的措施来到达那里。\"}]\n3a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在初创企业界，这个原则的名称是“做那些不可规模化的事情”（do things that don't scale）。如果你对你最初那一小部分客户给予了异乎寻常的关注，理想情况下，你会通过口碑引发指数级增长。"])</script><script>self.__next_f.push([1,"但这个原则同样适用于任何指数级增长的事物。例如，学习。当你刚开始学习某样东西时，你会感到迷茫。但值得付出最初的努力来站稳脚跟，因为你学得越多，就会变得越容易。\"}]\n3b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在具有超线性回报的领域清单中，还有一个更微妙的教训：不要将工作等同于一份职业（job）。在20世纪的大部分时间里，对于几乎所有人来说，这两者是相同的，结果我们继承了一种将生产力等同于拥有一份职业的习惯。即使现在，对大多数人来说，“你的工作”指的是他们的职业。但对作家、艺术家或科学家来说，它指的是他们目前正在研究或创造的任何东西。对于这样的人来说，他们的工作是他们从一份职业带到另一份职业的东西，如果他们有职业的话。它可能是为雇主做的，但它是他们作品集的一部分。\"}]\n3c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"进入一个少数大赢家表现远超其他所有人的领域，前景令人生畏。有些人是故意这样做的，但你不需要。如果你有足够的天赋，并且足够深入地追随你的好奇心，你最终会进入其中一个领域。你的好奇心不会让你对无聊的问题感兴趣，而有趣的问题如果尚未成为超线性回报领域的一部分，往往会创造出这样的领域。\"}]\n3d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"超线性回报的领域绝非一成不变。事实上，最极端的回报来自于扩展它。因此，虽然雄心和好奇心都能让你进入这个领域，但好奇心可能是两者中更强大的一个。雄心倾向于让你攀登现有的高峰，但如果你足够专注于一个足够有趣的问题，它可能会在你脚下成长为一座大山。\"}]\n3e:[\"$\",\"hr\",null,{}]\n3f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"注释\"}]\n40:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[1] 我们很难严格区分努力、表现和回报，"])</script><script>self.__next_f.push([1,"因为它们在事实上并没有严格区分。对一个人来说是回报的东西，对另一个人来说可能是表现。但是，尽管这些概念的边界是模糊的，但它们并非毫无意义。我试图尽可能精确地描述它们，而不至于出错。进化本身可能是超线性回报最普遍的例子。但我们很难对此产生共鸣，因为我们不是接受者；我们是回报本身。\"}]\n41:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[2] 在工业革命之前，知识当然也具有实际影响。农业的发展彻底改变了人类生活。但这种改变是技术广泛、渐进改进的结果，而不是少数知识渊博人士的发现。\"}]\n42:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[3] 从数学上讲，将阶跃函数描述为超线性的并不正确，但是当一个从零开始的阶跃函数描述理性行为者努力的回报曲线时，其作用类似于超线性函数。如果它从零开始，那么阶跃之前的部分低于任何线性增加的回报，而阶跃之后的部分必须高于该点的必要回报，否则没有人会费心去做。\"}]\n43:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[4] 从某些人觉得有激励作用的意义上说，寻求竞争可能是一个好的经验法则。它在某种程度上也是有前景问题的指南，因为这是其他人也觉得它们有前景的标志。但这是一个非常不完美的标志：通常会有一群喧闹的人追逐某个问题，而他们最终都被某个悄悄研究另一个问题的人超越了。\"}]\n44:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[5] 但并非总是如此。你必须小心使用这条规则。当某物虽然平庸但仍然受欢迎时，通常存在一个隐藏的原因。也许垄断或监管使其难以竞争。也许顾客品味不佳或购买决策程序有问题。由于这些原因，存在着大量平庸的事物。\"}]\n45:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[6] 我二十多岁时想成为一名艺术家，甚至去艺术学校学习绘画。主要是因"])</script><script>self.__next_f.push([1,"为我喜欢艺术，但我动机中一个不小的部分来自于艺术家似乎最不受组织摆布这一事实。\"}]\n46:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[7] 原则上，每个人都在获得超线性回报。学习具有复利效应，每个人在一生中都在学习。但实际上，很少有人将这种日常学习推向回报曲线变得真正陡峭的程度。\"}]\n47:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[8] “公平”（equity）的倡导者究竟指的是什么尚不清楚。他们自己似乎也存在分歧。但无论他们指的是什么，都可能与一个机构控制结果的权力减弱、少数异类远超其他所有人的世界相冲突。\"}]\n48:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这个概念恰好在世界向相反方向转变的时刻出现，似乎是运气不好，但我认为这并非巧合。我认为它现在出现的一个原因是，其拥护者感受到了表现差异迅速扩大的威胁。\"}]\n49:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[9] 推论：那些强迫孩子从事像医学这样有声望的工作，即使他们对此毫无兴趣的父母，将会比过去更严重地坑害他们的孩子。\"}]\n4a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[10] 这段话的初稿是《如何做出色的工作》（How to Do Great Work）的第一稿。我一写完就意识到这是一个比超线性回报更重要的话题，所以我暂停了这篇文章，将这段话扩展成了独立的一篇。原始版本几乎荡然无存，因为在我完成《如何做出色的工作》之后，我根据那篇文章重写了这一段。\"}]\n4b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[11] 在工业革命之前，致富的人通常像皇帝一样：攫取某种资源使他们更强大，并使他们能够攫取更多资源。现在，可以通过像科学家一样，发现或创造某种独特有价值的东西来致富。大多数致富的人混合使用新旧两种方式，但在最发达的经济体中，仅在过去半个世纪里，这种比例就"])</script><script>self.__next_f.push([1,"已显著向发现倾斜。\"}]\n4c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"[12] 如果独立思考是造成不平等的最大驱动力之一，那么思想传统的人不喜欢不平等也就不足为奇了。但这不仅仅是他们不希望任何人拥有他们无法拥有的东西。思想传统的人根本无法想象拥有新颖想法是什么样的。因此，表现差异巨大的整个现象对他们来说似乎是不自然的，当他们遇到这种情况时，他们会认为这一定是由于作弊或某种不良的外部影响造成的。\"}]\n4d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"感谢 Trevor Blackwell, Patrick Collison, Tyler Cowen, Jessica Livingston, Harj Taggar, 和 Garry Tan 阅读了本文的草稿。\"}]\n4e:[\"$\",\"hr\",null,{}]\n"])</script><script>self.__next_f.push([1,"11:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nd:null\n"])</script><script>self.__next_f.push([1,"4f:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"f:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"超线性回报 | Linguista\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"保罗·格雷厄姆探讨了表现与回报之间的超线性关系，指出其两大根本来源是指数级增长与阈值效应。文章分析了在商业、学术、名望等领域中富者愈富的现象，并为有抱负的人提供了利用超线性回报的实用建议——选择具有复利效应的工作、持续学习、追随好奇心，以及在组织重要性下降的时代抓住个人崛起的机遇。\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"超线性回报,指数增长,创业,学习复利,个人成长\"}],[\"$\",\"link\",\"3\",{\"rel\":\"canonical\",\"href\":\"https://linguista.cn/rosetta/notes/missing-source-url/superlinear-returns-paul-graham/\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:title\",\"content\":\"超线性回报 | Linguista\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:description\",\"content\":\"保罗·格雷厄姆探讨了表现与回报之间的超线性关系，指出其两大根本来源是指数级增长与阈值效应。文章分析了在商业、学术、名望等领域中富者愈富的现象，并为有抱负的人提供了利用超线性回报的实用建议——选择具有复利效应的工作、持续学习、追随好奇心，以及在组织重要性下降的时代抓住个人崛起的机遇。\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:url\",\"content\":\"https://linguista.cn/rosetta/notes/missing-source-url/superlinear-returns-paul-graham/\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:site_name\",\"content\":\"Linguista\"}],[\"$\",\"meta\",\"8\",{\"property\":\"og:locale\",\"content\":\"zh_CN\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:image\",\"content\":\"https://linguista.cn/img/rosetta-social.png\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:image:alt\",\"content\":\"超线性回报\"}],[\"$\",\"meta\",\"11\",{\"property\":\"og:image:width\",\"content\":\"512\"}],[\"$\",\"meta\",\"12\",{\"property\":\"og:image:height\",\"content\":\"512\"}],[\"$\",\"meta\",\"13\",{\"property\":\
