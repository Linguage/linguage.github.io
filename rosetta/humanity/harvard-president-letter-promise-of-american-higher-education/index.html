学术独立与自由，同时承诺自主推进反犹主义治理与校园多元化建设。\n\n## 核心概念及解读\n\n**第一修正案权利**：美国宪法保障的言论与学术自由，哈佛据此主张政府无权干涉私立大学的教学、研究与招聘决策\n\n**民权法案第六章**：禁止接受联邦资助的机构实施歧视，政府以此为法律依据向哈佛施压，但哈佛认为政府的要求已超出该法条授权范围\n\n**学术独立性**：大学自主决定教学内容、招生标准、人事任免及研究方向的核心原则，是本次争议的焦点所在\n\n**反犹主义**：近年来美国大学校园中针对犹太群体的偏见与歧视现象，成为联邦政府介入高校治理的直接理由\n\n**Veritas（真理）**：哈佛大学校训，象征对真理的无畏追求，校长以此为精神指引回应外部压力并重申大学使命\n\n\n## 美国高等教育的承诺\n\u003e [原文链接](https://www.harvard.edu/president/news/2025/the-promise-of-american-higher-education/?utm_source=twitter\u0026utm_campaign=hu-twitter-general\u0026utm_medium=social)\n\n**致哈佛社区全体成员：**\n\n七十五年来，联邦政府一直向哈佛及其他大学提供拨款和合同，资助相关研究工作。这些工作，连同大学自身的投入，已在医学、工程和科学等广泛领域带来了突破性的创新。这些创新使我们国家乃至全世界无数人的健康和安全得到了改善。然而近几周，联邦政府以我们校园存在反犹主义为由，威胁要中断其与包括哈佛在内的几所大学的合作关系。这些合作关系堪称美国历史上最高效、最有益的典范之一。新的前沿领域正向我们招手，预示着改变生活的进步——从阿尔茨海默病、帕金森病和糖尿病等疾病的治疗方法，到人工智能、量子科学与工程以及众多其他可能领域的突破。政府若在此时退出这些合作关系，不仅将危及数百万人的健康福祉，也将危及我们国家的经济安全与活力。\n\n上周五深夜，（联邦）行政当局发布了一份更新且扩大的要求清单，警告哈佛若想“维持与联邦政府的财政关系”，就必须遵从。这清楚地表明，其意图并非以合作和建设性的方式与我们共同解决反犹主义问题。尽管政府列出的一些要求旨在打击反犹主义，但其中大部分构成了对哈佛“思想学术环境”的直接政府管制。\n\n我鼓励大家阅读[这封信](https://www.harvard.edu/research-funding/wp-content/uploads/sites/16/2025/04/Letter-Sent-to-Harvard-2025-04-11.pdf)，以更全面地了解联邦政府为控制哈佛社区所提出的这些前所未有的要求。其中包括要求“审查”我们的学生、教职员工的观点，以及“削弱”某些因其意识形态观点而被针对的学生、教员和管理人员的“权力”。我们已通过法律顾问告知行政当局，[我们不会接受他们提出的协议](https://www.harvard.edu/research-funding/wp-content/uploads/sites/16/2025/04/Harvard-Response-2025-04-14.pdf)。大学不会放弃其独立性，也不会让渡其宪法权利。\n\n行政当局开出的“药方”超出了联邦政府的权力范围。它侵犯了哈佛的第一修正案权利，并超越了《民权法案》第六章授予政府的法定权限。而且，它威胁到我们作为一个致力于追求、生产和传播知识的私立机构的价值观。任何政府——无论哪个政党执政——都不应规定私立大学可以教什么、可以录取和聘用谁，以及可以追求哪些研究和探究领域。\n\n我们的校训——Veritas（真理）——指引着我们前行在这条充满挑战的道路上。寻求真理是一段永无止境的旅程。它要求我们对新的信息和不同的视角保持开放，对我们的信念进行持续的审视，并随时准备改变想法。它迫使我们承担起承认自身缺陷的艰巨工作，以便我们能够实现大学的全部承诺，尤其是在这一承诺受到威胁之时。\n\n我们已非常明确地表示，我们绝不轻视打击反犹主义的道德责任。在过去的十五个月里，我们已采取了许多措施来应对校园内的反犹主义问题。我们计划做得更多。在捍卫哈佛的同时，我们将继续：\n\n*   在校园内培育蓬勃发展的开放探究文化；发展相互进行建设性交流所需的工具、技能和实践；并拓宽我们社区内的思想和观点多样性；\n*   申明我们共同享有的权利和责任；尊重言论自由和异议，同时确保抗议活动在不干扰教学、学习和研究的时间、地点和方式下进行；并提高纪律程序的连贯性和公平性；以及\n*   共同努力，寻找符合法律的方式，来培养和支持一个能够体现、尊重并拥抱差异的充满活力的社区。在此过程中，我们也将继续遵守“学生争取公平录取组织诉哈佛案”（Students For Fair Admissions v. Harvard）的判决，该判决裁定《民权法案》第六章规定大学基于“种族”做出决定是非法的。\n\n这些目标无法通过脱离法律、旨在控制哈佛教学与学习、并指令我们如何运作的强权主张来实现。解决我们的不足、履行我们的承诺、体现我们的价值观，这项工作应由我们作为一个社区来界定和承担。思想和探究的自由，加之政府长期以来对其尊重和保护的承诺，使得大学能够为自由社会以及世界各地人民更健康、更繁荣的生活做出至关重要的贡献。维护这份自由，关乎我们所有人的利益。我们现在一如既往地秉持着这样的信念前行：无畏而不受束缚地追求真理能解放人类——并坚信[美国高校为我们国家和世界所承载的永恒承诺](https://www.harvard.edu/research-funding/)。\n\n此致，\n艾伦·M·加伯 (Alan M. Garber)\n\n\n---\n\n## 哈佛公开信要点内容\n\n1.  **背景与威胁：** 哈佛等大学与美国联邦政府长期存在卓有成效的科研合作关系（特别是在医学、工程、科学领域），为国家和社会带来巨大福祉。但近期，联邦政府以校园反犹主义为由，威胁要中断与包括哈佛在内的几所大学的合作关系。\n2.  **政府的过度要求：** 政府向哈佛提出了一系列“更新且扩大”的要求，并威胁称若不遵守将影响联邦资助。哈佛认为这些要求的意图并非合作解决反犹问题，而是大部分构成了对哈佛“思想学术环境”的直接政府管制。\n3.  **哈佛的拒绝与理由：** 哈佛明确拒绝接受政府的提议，认为这些要求是前所未有的，试图控制大学社区（如审查观点、削弱特定意识形态群体的权力）。哈佛坚持不会放弃其独立性和宪法权利。\n4.  **法律与原则立场：** 哈佛认为政府的要求超越了其权力范围，侵犯了哈佛的第一修正案权利，超出了《民权法案》第六章授予政府的法定权限，并威胁到哈佛作为私立研究机构的核心价值观（追求、生产和传播知识）。哈佛强调任何政府都不应干涉私立大学的教学、招生、聘用和研究方向。\n5.  **哈佛的承诺与行动方向：**\n    *   **反犹主义：** 哈佛严肃对待打击反犹主义的道德责任，已采取并将继续采取更多措施。\n    *   **核心价值：** 以“真理”（Veritas）为指引，坚持开放探究、建设性对话、观点多样性。\n    *   **校园治理：** 维护言论自由和异议权，同时确保抗议活动不干扰教学科研，并提升纪律程序的公平性。\n    *   **多元化与合规：** 致力于在法律框架内（包括遵守“学生争取公平录取组织诉哈佛案”关于禁止基于种族的录取决定的裁决）建设一个尊重和拥抱差异的社群。\n6.  **捍卫学术自由：** 哈佛强调，解决自身问题、履行承诺应由大学社区自主进行，而非屈从于缺乏法律依据的政府强权。学术思想和探究自由（长期受政府尊重和保护）对大学贡献社会、促进人类福祉至关重要，必须予以捍卫。\n\n---\n\n## 联邦政府的信件\n\n\n2025年4月11日\n\n艾伦·M·加伯 博士 (Dr. Alan M. Garber)\n哈佛大学校长\n校长办公室\n马萨诸塞州大楼 (Massachusetts Hall)\n马萨诸塞州 剑桥市 02138\n\n彭妮·普利茨克 女士 (Penny Pritzker)\n哈佛理事会首席成员\n哈佛理事会\n马萨诸塞州大楼 (Massachusetts Hall)\n马萨诸塞州 剑桥市 02138\n\n**尊敬的加伯博士：**\n\n美国之所以投资于哈佛大学的运营，是因为学术发现和卓越学识对国家具有价值。但投资并非一项应得权利。它取决于哈佛是否遵守联邦民权法律，并且只有当哈佛能培育出那种能够产生智力创造力和学术严谨性的环境时，这种投资才有意义——这两者都与意识形态俘获水火不容。\n\n近年来，哈佛未能达到支撑联邦投资所需的智力条件和民权条件。但我们赞赏您表达的致力于修复这些失败的承诺，并欢迎您合作以恢复大学的应有前景。因此，我们提出以下条款，作为维持哈佛与联邦政府财政关系的原则性协议的基础。\n\n若哈佛接受，本文件将构成一份原则性协议，双方将本着诚意努力将其转化为一份更详尽、具有约束力的和解协议。如您所见，本函包含并取代了联邦政府先前于2025年4月3日发出的信函条款。\n\n-   **治理与领导力改革。** 到2025年8月，哈佛必须进行有意义的治理改革和重组，以实现与本函精神一致的重大变革，包括：建立清晰的权责界限；赋予终身教授和高层领导权力，并且，在终身教授群体和高层领导中，权力专门赋予那些最致力于大学学术使命并承诺实施本函所述变革的人士；削减学生和非终身教职员工所持有的权力；削减那些（无论是终身还是非终身）更倾向于社会活动主义而非学术研究的教职员工和管理人员所持有的权力；以及削减那些干扰本函所述改革可能性的治理臃肿、重复或权力下放的形式。\n\n-   **基于绩效的聘用改革。** 到2025年8月，大学必须采纳并实施基于绩效的聘用政策，并在其教职员工和领导层的聘用、晋升、薪酬及相关实践中，停止所有基于种族、肤色、宗教、性别或国籍的偏好。此类政策的采纳和实施必须是持久的，并通过结构性和人事变动来证明。所有现有及未来的教员都应接受剽窃审查，哈佛的剽窃政策必须得到一贯执行。在改革实施期间（至少持续到2028年底），所有聘用及相关数据应与联邦政府共享，并接受联邦政府的全面审计。\n\n-   **基于绩效的招生改革。** 到2025年8月，大学必须在其本科项目、每个独立的研究生项目、每个专业学院及其他项目中，采纳并实施基于绩效的招生政策，并停止所有基于种族、肤色、国籍或其替代指标的偏好。此类政策的采纳和实施必须是持久的，并通过结构性和人事变动来证明。在改革实施期间（至少持续到2028年底），所有招生数据应与联邦政府共享，并接受联邦政府的全面审计——并且，关于招生的非个体化统计信息应向公众公开，包括按种族、肤色、国籍、平均绩点（GPA）和标准化考试成绩细分的被拒和录取学生信息。在同一时期内，每个项目或学院的招生主任必须在每个招生周期结束后签署一份公开声明，证明这些规则已得到遵守。\n\n-   **国际招生改革。** 到2025年8月，大学必须改革其对国际学生的招募、筛选和录取工作，以防止录取那些对美国宪法和独立宣言所载明的美国价值观和制度怀有敌意、包括支持恐怖主义或反犹主义的学生。哈佛将立即向联邦当局，包括国土安全部和国务院，报告任何违反行为准则的外国学生，包括持签证和绿卡者。如上所述，这些改革必须是持久的，并通过结构性和人事变动来证明；全面覆盖哈佛所有项目；并且，在改革期间，相关数据需与联邦政府共享以供审计，以非个体化形式与公众共享，并由招生主任认证。\n\n-   **招生与聘用中的观点多样性。** 到2025年8月，大学应委托一个外部方（该方需在能力和诚信方面令联邦政府满意）对学生群体、教职员工和领导层的观点多样性进行审计，以确保每个系、领域或教学单位都必须具有个体化的观点多样性。此审计应不迟于2025年夏季开始，并酌情按系、按领域或按教学单位逐一进行。外部方的报告应不迟于2025年底提交给大学领导层和联邦政府。哈佛必须在其招生和聘用实践中，废除所有强制性或选择性的、功能上作为意识形态“试金石”的标准、偏好和做法。每个被发现缺乏观点多样性的系或领域，都必须通过在该系或领域内聘用足够数量（critical mass）能提供观点多样性的新教员来进行改革；每个被发现缺乏观点多样性的教学单位，都必须通过录取足够数量能提供观点多样性的学生来进行改革。如果审查发现相关系或领域的现有教员无能力为实现观点多样性而进行聘用，或者相关教学单位无能力录取足够数量具有多样观点的学生，则该系、领域或教学单位的聘用或招生工作应转移至能够实现观点多样性的最接近的同源系、领域或教学单位。在改革实施期间（至少持续到2028年底），此审计应每年进行，并采取相同步骤以建立观点多样性。\n\n-   **改革具有严重反犹主义或其他偏见记录的项目。** 到2025年8月，大学应委托一个外部方（该方需在能力和诚信方面令联邦政府满意），对那些最助长反犹骚扰或反映意识形态俘获的项目和部门进行审计。\n    *   受关注的项目、学院和中心包括但不限于：神学院、教育研究生院、公共卫生学院、医学院、宗教与公共生活项目、FXB健康与人权中心、中东研究中心、哈佛肯尼迪学院卡尔人权中心、近东语言文化系，以及哈佛法学院国际人权诊所。\n    *   外部方的报告应包含有关歧视犹太或以色列学生、或在10月7日后煽动学生违反哈佛规定的个别教员的信息，大学和联邦政府将在学术自由和第一修正案的框架内合作，确定对这些教员的适当处分。\n    *   外部方的报告应不迟于2025年底提交给大学领导层和联邦政府，并采取改革措施修复问题。在改革实施期间（至少持续到2028年底），此审计应每年进行，并采取相同步骤进行修复。\n\n-   **终止DEI。** 大学必须立即关闭所有名为“多元化、公平和包容性”（DEI）或类似名称的项目、办公室、委员会、职位和倡议，并停止所有基于DEI的政策，包括基于DEI的纪律或言论控制政策（无论其名称如何）；向联邦政府证明其已做到这一点且令联邦政府满意；并通过结构性和人事变动向联邦政府证明这些改革是持久和有效的，且令联邦政府满意。到2025年8月，大学必须向政府提交一份经准确性认证的报告，确认这些改革。\n\n-   **学生纪律改革与问责。** 哈佛必须立即改革其学生纪律政策和程序，以便迅速、透明地以一致性和公正性执行其现有的纪律政策，并且不因身份或意识形态而实行双重标准。如果现有政策不足以防止学术研究、课堂学习和教学或其他正常校园生活的方面受到干扰，哈佛必须制定并实施足以防止这些干扰的纪律政策。这包括但不限于以下内容：\n    -  哈佛的纪律处分必须包括立即干预和制止干扰或“平台驱逐”（deplatforming），必要时可动用哈佛警察来制止干扰或“平台驱逐”；有力执行并恢复校园内现有的时间、地点和方式规定，必要时命令哈佛警察制止违反时间、地点和方式规定的事件；设立一个统一的、对哈佛校长或其他最高负责人负责的纪律处理机构；移除或改革那些延迟和阻碍执法的机构和做法，包括相关的行政委员会（Administrative Boards）和文理学院教员委员会（FAS Faculty Council）。\n    -  哈佛必须采纳一项关于学生团体或俱乐部的新政策，禁止认可、资助或提供便利给任何支持或提倡犯罪活动、非法暴力或非法骚扰的学生团体或俱乐部；禁止邀请经常违反校园规则的非学生进入校园；或禁止充当已被禁止的校园学生俱乐部掩护组织的团体。对于违反这些政策的已获认可和未获认可的学生团体的领导者或组织者，必须作为学生纪律问题追究责任，并使其失去在其他获认可学生组织中担任职务的资格。未来，学生团体或俱乐部的资助决定必须完全由一个对大学高层领导负责的大学教员机构做出。特别是，哈佛必须终止对那些自2023年10月7日以来从事反犹活动的学生团体或俱乐部的支持和认可，包括哈佛巴勒斯坦团结委员会、哈佛研究生支持巴勒斯坦组织、法学院学生支持巴勒斯坦组织、学生支持巴勒斯坦正义组织，以及全国律师协会（在哈佛的分支），并对这些学生组织的负责人和活跃成员进行纪律处分并取消其资格。\n    -  哈佛必须实施一项全面的口罩禁令，对违规行为处以严厉且立即的处罚，处罚程度不低于停学。\n    -  哈佛必须对2023-2024学年和2024-2025学年期间发生的所有违规行为进行调查并执行有意义的纪律处分，包括2023年10月的哈佛商学院抗议活动、2023年11月的大学办公楼（University Hall）静坐示威，以及2024年春季的营地扎营活动。这必须包括永久开除参与10月18日袭击一名以色列籍哈佛商学院学生的学生，并根据个案事实，对参与占领大学建筑的学生处以停学处分。\n    -  哈佛校长和警察局长必须公开澄清，哈佛大学警察局将执行大学规定和法律。哈佛还必须承诺本着诚意与执法部门合作。\n\n-  **举报人报告与保护。** 大学必须立即建立程序，允许任何哈佛关联人员向大学领导层和联邦政府报告不遵守本函所述改革的情况。任何此类举报人应受到充分保护，免因举报而遭受任何不利行动。\n\n-  **透明度与监督。** 大学应进行组织变革，以确保对所有联邦监管机构的完全透明与合作。不迟于2025年6月30日，以及此后在改革实施期间（至少持续到2028年底）的每个季度，大学应向联邦政府提交一份经准确性认证的报告，记录其在执行本函所述改革方面的进展。大学还必须（达到令联邦政府满意的程度）披露所有外国资金的来源和目的；配合联邦政府对外国资金来源和使用的法务审计，包括这些资金如何被哈佛、其代理人以及（在可获取信息范围内）在哈佛校园内活动的第三方使用；向美国国土安全部报告所有要求的移民及相关信息；并遵守与SEVIS（学生和交流访问学者信息系统）相关的所有要求。\n\n我们期望您立即合作实施这些关键改革，这将使哈佛能够回归其创新研究和学术卓越的初衷使命。\n\n---\n\n## 联邦政府信函要点\n\n\n1.  **条件性资助：** 美国联邦政府对哈佛大学的投资是基于其学术发现和卓越成就对国家的价值，但这并非必然权利，取决于哈佛遵守联邦民权法，并营造能产生智力创造力和学术严谨性（而非被“意识形态俘获”）的环境。\n2.  **哈佛的失败与整改要求：** 信中声称哈佛近年来未能达到支撑联邦投资所需的智力及民权条件。信件认可哈佛表达的修复承诺，并提出了一系列条款作为维持联邦财政关系的基础性“原则性协议”。\n3.  **治理结构改革（2025年8月前）：** 要求哈佛进行重大治理改革，包括：明确权责、赋予忠于学术使命并致力于信中改革的终身教授和高层领导权力、削减学生/非终身教职/倾向社会活动主义的教职员工及管理人员的权力、精简妨碍改革的臃肿/重复/分散的治理形式。\n4.  **基于绩效的聘用改革（2025年8月前）：** 要求哈佛采用并实施基于绩效的聘用政策，在教职员工和领导层的聘用、晋升、薪酬等环节停止所有基于种族、肤色、宗教、性别或国籍的偏好。需通过结构和人事变动确保持久性。对所有现有及未来教员进行剽窃审查并统一执行政策。聘用数据需与联邦政府共享并接受审计（至少到2028年底）。\n5.  **基于绩效的招生改革（2025年8月前）：** 要求哈佛在本科、各研究生项目、各专业学院等全面采用并实施基于绩效的招生政策，停止所有基于种族、肤色、国籍或其替代指标的偏好。需通过结构和人事变动确保持久性。招生数据需与联邦政府共享并接受审计，非个性化的统计信息（按种族、GPA、标化成绩等分类的录取/拒绝学生数据）需向公众公开（至少到2028年底）。各项目招生主任需在每轮招生后签署公开声明确认遵守规则。\n6.  **国际招生改革（2025年8月前）：** 要求改革国际学生的招募、筛选和录取，防止录取敌视美国价值观和制度（宪法/独立宣言）、支持恐怖主义或反犹主义的学生。需立即向联邦当局（国土安全部/国务院）报告违反行为准则的外国学生（含签证/绿卡持有者）。同样要求持久性、全面性、数据共享、审计、公开和主任认证。\n7.  **招生与聘用中的观点多样性（2025年8月前）：** 要求委托联邦政府认可的外部方审计学生、教职员工和领导层的观点多样性，确保每个系、领域或教学单位都具有观点多样性。废除所有意识形态“试金石”式的标准/偏好/做法。缺乏多样性的单位必须通过聘用/招收能带来多样性观点的新成员来改革；若无法自行完成，则将聘用/招生权移交给有能力的相关单位。此审计和改革需每年进行（至少到2028年底）。\n8.  **改革有严重反犹主义或其他偏见记录的项目（2025年8月前）：** 要求委托联邦政府认可的外部方审计助长反犹骚扰或反映意识形态俘获的项目和部门（列举了神学院、教育学院、公共卫生学院等多个具体单位）。报告需包含歧视犹太/以色列学生或煽动违规的教员信息，并与联邦政府合作确定（在学术自由和第一修正案范围内的）适当处分。此审计和改革需每年进行（至少到2028年底）。\n9.  **终止DEI（立即执行）：** 要求立即关闭所有名为“多元化、公平和包容性”（DEI）或类似名称的项目、办公室、委员会、职位和倡议，停止所有基于DEI的政策（包括纪律或言论控制）。需向联邦政府证明改革的彻底性和持久性（通过结构和人事变动）。需在2025年8月前提交经认证的确认报告。\n10. **学生纪律改革与问责（立即执行）：** 要求立即改革学生纪律政策和程序，以迅速、透明、一致、公正地执行现有纪律政策，杜绝基于身份或意识形态的双重标准。需制定足够政策防止学术、教学等正常活动受干扰。具体包括：及时干预制止干扰（必要时动用校警）、严格执行时间地点方式规定（必要时动用校警）、将纪律程序归于一个对校长负责的机构、移除或改革阻碍执法的机构（如行政委员会、文理学院教员委员会）。对学生组织的新政策：禁止认可/资助支持犯罪/暴力/骚扰、邀请违规校外人员、或为被禁社团作掩护的组织；追究违规组织领导者责任。学生组织资助由对高层负责的教员机构决定。必须终止对2023年10月7日以来从事反犹活动的特定学生组织（列举了多个巴勒斯坦支持组织）的支持和认可，并处分其负责人和活跃成员。实施全面的口罩禁令，违者严惩（至少停学）。调查并对2023-24及2024-25学年的违规行为（包括特定的抗议和占领事件）进行有意义的纪律处分（包括开除袭击者、停学占领者）。校长和警察局长需公开声明校警将执行校规和法律，并承诺与执法部门合作。\n11. **举报人报告与保护（立即执行）：** 要求立即建立程序，允许任何哈佛成员向校领导层*和*联邦政府报告不遵守本信改革的情况，并保护举报人免受报复。\n12. **透明度与监督（立即执行）：** 要求进行组织变革以确保对联邦监管机构完全透明与合作。从2025年6月30日起每季度提交经认证的改革进展报告（至少到2028年底）。需向联邦政府披露所有外国资金来源和目的，并配合联邦政府对外国资金来源和使用的法务审计。向国土安全部报告所要求的移民相关信息，并遵守SEVIS系统的所有要求。\n13. **最终要求：** 期望哈佛立即合作实施这些改革，以回归其创新研究和学术卓越的“初衷”。\n\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"harvard-president-letter-promise-of-american-higher-education\",\"slugSegments\":[\"notes\",\"missing-source-url\",\"harvard-pre n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://www.harvard.edu/president/news/2025/the-promise-of-american-higher-education/?utm_source=twitter\u0026utm_campaign=hu-twitter-general\u0026utm_medium=social\",\"children\":\"原文链接\"}]}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"致哈佛社区全体成员：\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"七十五年来，联邦政府一直向哈佛及其他大学提供拨款和合同，资助相关研究工作。这些工作，连同大学自身的投入，已在医学、工程和科学等广泛领域带来了突破性的创新。这些创新使我们国家乃至全世界无数人的健康和安全得到了改善。然而近几周，联邦政府以我们校园存在反犹主义为由，威胁要中断其与包括哈佛在内的几所大学的合作关系。这些合作关系堪称美国历史上最高效、最有益的典范之一。新的前沿领域正向我们招手，预示着改变生活的进步——从阿尔茨海默病、帕金森病和糖尿病等疾病的治疗方法，到人工智能、量子科学与工程以及众多其他可能领域的突破。政府若在此时退出这些合作关系，不仅将危及数百万人的健康福祉，也将危及我们国家的经济安全与活力。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"上周五深夜，（联邦）行政当局发布了一份更新且扩大的要求清单，警告哈佛若想“维持与联邦政府的财政关系”，就必须遵从。这清楚地表明，其意图并非以合作和建设性的方式与我们共同解决反犹主义问题。尽管政府列出的一些要求旨在打击反犹主义，但其中大部分构成了对哈佛“思想学术环境”的直接政府管制。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"我鼓励大家阅读\",[\"$\",\"a\",null,{\"href\":\"https://www.harvard.edu/research-funding/wp-content/uploads/sites/16/2025/04/Letter-Sent-to-Harvard-2025-04-11.pdf\",\"children\":\"这封信\"}],\"，以更全面地了解联邦政府为控制哈佛社区所提出的这些前所未有的要求。其中包括要求“审查”我们的学生、教职员工的观点，以及“削弱”某些因其意识形态观点而被针对的学生、教员和管理人员的“权力”。我们已通过法律顾问告知行政当局，\",[\"$\",\"a\",null,{\"href\":\"https://www.harvard.edu/research-funding/wp-content/uploads/sites/16/2025/04/Harvard-Response-2025-04-14.pdf\",\"children\":\"我们不会接受他们提出的协议\"}],\"。大学不会放弃其独立性，也不会让渡其宪法权利。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"行政当局开出的“药方”超出了联邦政府的权力范围。它侵犯了哈佛的第一修正案权利，并超越了《民权法案》第六章授予政府的法定权限。而且，它威胁到我们作为一个致力于追求、生产和传播知识的私立机构的价值观。任何政府——无论哪个政党执政——都不应规定私立大学可以教什么、可以录取和聘用谁，以及可以追求哪些研究和探究领域。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们的校训——Veritas（真理）——指引着我们前行在这条充满挑战的道路上。寻求真理是一段永无止境的旅程。它要求我们对新的信息和不同的视角保持开放，对我们的信念进行持续的审视，并随时准备改变想法。它迫使我们承担起承认自身缺陷的艰巨工作，以便我们能够实现大学的全部承诺，尤其是在这一承诺受到威胁之时。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们已非常明确地表示，我们绝不轻视打击反犹主义的道德责任。在过去的十五个月里，我们已采取了许多措施来应对校园内的反犹主义问题。我们计划做得更多。在捍卫哈佛的同时，我们将继续：\"}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"在校园内培育蓬勃发展的开放探究文化；发展相互进行建设性交流所需的工具、技能和实践；并拓宽我们社区内的思想和观点多样性；\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"申明我们共同享有的权利和责任；尊重言论自由和异议，同时确保抗议活动在不干扰教学、学习和研究的时间、地点和方式下进行；并提高纪律程序的连贯性和公平性；以及\"}],\"\\n\",\"$L1a\",\"\\n\"]}],\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\"]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"li\",null,{\"children\":\"共同努力，寻找符合法律的方式，来培养和支持一个能够体现、尊重并拥抱差异的充满活力的社区。在此过程中，我们也将继续遵守“学生争取公平录取组织诉哈佛案”（Students For Fair Admissions v. Harvard）的判决，该判决裁定《民权法案》第六章规定大学基于“种族”做出决定是非法的。\"}]\n1b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"这些目标无法通过脱离法律、旨在控制哈佛教学与学习、并指令我们如何运作的强权主张来实现。解决我们的不足、履行我们的承诺、体现我们的价值观，这项工作应由我们作为一个社区来界定和承担。思想和探究的自由，加之政府长期以来对其尊重和保护的承诺，使得大学能够为自由社会以及世界各地人民更健康、更繁荣的生活做出至关重要的贡献。维护这份自由，关乎我们所有人的利益。我们现在一如既往地秉持着这样的信念前行：无畏而不受束缚地追求真理能解放人类——并坚信\",[\"$\",\"a\",null,{\"href\":\"https://www.harvard.edu/research-funding/\",\"children\":\"美国高校为我们国家和世界所承载的永恒承诺\"}],\"。\"]}]\n1c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"此致，\\n艾伦·M·加伯 (Alan M. Garber)\"}]\n1d:[\"$\",\"hr\",null,{}]\n1e:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"哈佛公开信要点内容\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#哈佛公开信要点内容\",\"children\":\"哈佛公开信要点内容\"}]}]\n"])</script><script>self.__next_f.push([1,"1f:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"背景与威胁：\"}],\" 哈佛等大学与美国联邦政府长期存在卓有成效的科研合作关系（特别是在医学、工程、科学领域），为国家和社会带来巨大福祉。但近期，联邦政府以校园反犹主义为由，威胁要中断与包括哈佛在内的几所大学的合作关系。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"政府的过度要求：\"}],\" 政府向哈佛提出了一系列“更新且扩大”的要求，并威胁称若不遵守将影响联邦资助。哈佛认为这些要求的意图并非合作解决反犹问题，而是大部分构成了对哈佛“思想学术环境”的直接政府管制。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"哈佛的拒绝与理由：\"}],\" 哈佛明确拒绝接受政府的提议，认为这些要求是前所未有的，试图控制大学社区（如审查观点、削弱特定意识形态群体的权力）。哈佛坚持不会放弃其独立性和宪法权利。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"法律与原则立场：\"}],\" 哈佛认为政府的要求超越了其权力范围，侵犯了哈佛的第一修正案权利，超出了《民权法案》第六章授予政府的法定权限，并威胁到哈佛作为私立研究机构的核心价值观（追求、生产和传播知识）。哈佛强调任何政府都不应干涉私立大学的教学、招生、聘用和研究方向。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"哈佛的承诺与行动方向：\"}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"反犹主义：\"}],\" 哈佛严肃对待打击反犹主义的道德责任，已采取并将继续采取更多措施。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"核心价值：\"}],\" 以“真理”（Veritas）为指引，坚持开放探究、建设性对话、观点多样性。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"校园治理：\"}],\" 维护言论自由和异议权，同时确保抗议活动不干扰教学科研，并提升纪律程序的公平性。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"多元化与合规：\"}],\" 致力于在法律框架内（包括遵守“学生争取公平录取组织诉哈佛案”关于禁止基于种族的录取决定的裁决）建设一个尊重和拥抱差异的社群。\"]}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"捍卫学术自由：\"}],\" 哈佛强调，解决自身问题、履行承诺应由大学社区自主进行，而非屈从于缺乏法律依据的政府强权。学术思想和探究自由（长期受政府尊重和保护）对大学贡献社会、促进人类福祉至关重要，必须予以捍卫。\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"20:[\"$\",\"hr\",null,{}]\n21:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"联邦政府的信件\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#联邦政府的信件\",\"children\":\"联邦政府的信件\"}]}]\n22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"2025年4月11日\"}]\n23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"艾伦·M·加伯 博士 (Dr. Alan M. Garber)\\n哈佛大学校长\\n校长办公室\\n马萨诸塞州大楼 (Massachusetts Hall)\\n马萨诸塞州 剑桥市 02138\"}]\n24:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"彭妮·普利茨克 女士 (Penny Pritzker)\\n哈佛理事会首席成员\\n哈佛理事会\\n马萨诸塞州大楼 (Massachusetts Hall)\\n马萨诸塞州 剑桥市 02138\"}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"尊敬的加伯博士：\"}]}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"美国之所以投资于哈佛大学的运营，是因为学术发现和卓越学识对国家具有价值。但投资并非一项应得权利。它取决于哈佛是否遵守联邦民权法律，并且只有当哈佛能培育出那种能够产生智力创造力和学术严谨性的环境时，这种投资才有意义——这两者都与意识形态俘获水火不容。\"}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"近年来，哈佛未能达到支撑联邦投资所需的智力条件和民权条件。但我们赞赏您表达的致力于修复这些失败的承诺，并欢迎您合作以恢复大学的应有前景。因此，我们提出以下条款，作为维持哈佛与联邦政府财政关系的原则性协议的基础。\"}]\n28:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"若哈佛接受，本文件将构成一份原则性协议，双方将本着诚意努力将其转化为一份更详尽、具有约束力的和解协议。如您所见，本函包含并取代了联邦政府先前于2025年4月3日发出的信函条款。\"}]\n"])</script><script>self.__next_f.push([1,"29:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"治理与领导力改革。\"}],\" 到2025年8月，哈佛必须进行有意义的治理改革和重组，以实现与本函精神一致的重大变革，包括：建立清晰的权责界限；赋予终身教授和高层领导权力，并且，在终身教授群体和高层领导中，权力专门赋予那些最致力于大学学术使命并承诺实施本函所述变革的人士；削减学生和非终身教职员工所持有的权力；削减那些（无论是终身还是非终身）更倾向于社会活动主义而非学术研究的教职员工和管理人员所持有的权力；以及削减那些干扰本函所述改革可能性的治理臃肿、重复或权力下放的形式。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"基于绩效的聘用改革。\"}],\" 到2025年8月，大学必须采纳并实施基于绩效的聘用政策，并在其教职员工和领导层的聘用、晋升、薪酬及相关实践中，停止所有基于种族、肤色、宗教、性别或国籍的偏好。此类政策的采纳和实施必须是持久的，并通过结构性和人事变动来证明。所有现有及未来的教员都应接受剽窃审查，哈佛的剽窃政策必须得到一贯执行。在改革实施期间（至少持续到2028年底），所有聘用及相关数据应与联邦政府共享，并接受联邦政府的全面审计。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"基于绩效的招生改革。\"}],\" 到2025年8月，大学必须在其本科项目、每个独立的研究生项目、每个专业学院及其他项目中，采纳并实施基于绩效的招生政策，并停止所有基于种族、肤色、国籍或其替代指标的偏好。此类政策的采纳和实施必须是持久的，并通过结构性和人事变动来证明。在改革实施期间（至少持续到2028年底），所有招生数据应与联邦政府共享，并接受联邦政府的全面审计——并且，关于招生的非个体化统计信息应向公众公开，包括按种族、肤色、国籍、平均绩点（GPA）和标准化考试成绩细分的被拒和录取学生信息。在同一时期内，每个项目或学院的招生主任必须在每个招生周期结束后签署一份公开声明，证明这些规则已得到遵守。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"国际招生改革。\"}],\" 到2025年8月，大学必须改革其对国际学生的招募、筛选和录取工作，以防止录取那些对美国宪法和独立宣言所载明的美国价值观和制度怀有敌意、包括支持恐怖主义或反犹主义的学生。哈佛将立即向联邦当局，包括国土安全部和国务院，报告任何违反行为准则的外国学生，包括持签证和绿卡者。如上所述，这些改革必须是持久的，并通过结构性和人事变动来证明；全面覆盖哈佛所有项目；并且，在改革期间，相关数据需与联邦政府共享以供审计，以非个体化形式与公众共享，并由招生主任认证。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"招生与聘用中的观点多样性。\"}],\" 到2025年8月，大学应委托一个外部方（该方需在能力和诚信方面令联邦政府满意）对学生群体、教职员工和领导层的观点多样性进行审计，以确保每个系、领域或教学单位都必须具有个体化的观点多样性。此审计应不迟于2025年夏季开始，并酌情按系、按领域或按教学单位逐一进行。外部方的报告应不迟于2025年底提交给大学领导层和联邦政府。哈佛必须在其招生和聘用实践中，废除所有强制性或选择性的、功能上作为意识形态“试金石”的标准、偏好和做法。每个被发现缺乏观点多样性的系或领域，都必须通过在该系或领域内聘用足够数量（critical mass）能提供观点多样性的新教员来进行改革；每个被发现缺乏观点多样性的教学单位，都必须通过录取足够数量能提供观点多样性的学生来进行改革。如果审查发现相关系或领域的现有教员无能力为实现观点多样性而进行聘用，或者相关教学单位无能力录取足够数量具有多样观点的学生，则该系、领域或教学单位的聘用或招生工作应转移至能够实现观点多样性的最接近的同源系、领域或教学单位。在改革实施期间（至少持续到2028年底），此审计应每年进行，并采取相同步骤以建立观点多样性。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"改革具有严重反犹主义或其他偏见记录的项目。\"}],\" 到2025年8月，大学应委托一个外部方（该方需在能力和诚信方面令联邦政府满意），对那些最助长反犹骚扰或反映意识形态俘获的项目和部门进行审计。\"]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"受关注的项目、学院和中心包括但不限于：神学院、教育研究生院、公共卫生学院、医学院、宗教与公共生活项目、FXB健康与人权中心、中东研究中心、哈佛肯尼迪学院卡尔人权中心、近东语言文化系，以及哈佛法学院国际人权诊所。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"外部方的报告应包含有关歧视犹太或以色列学生、或在10月7日后煽动学生违反哈佛规定的个别教员的信息，大学和联邦政府将在学术自由和第一修正案的框架内合作，确定对这些教员的适当处分。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"外部方的报告应不迟于2025年底提交给大学领导层和联邦政府，并采取改革措施修复问题。在改革实施期间（至少持续到2028年底），此审计应每年进行，并采取相同步骤进行修复。\"}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"终止DEI。\"}],\" 大学必须立即关闭所有名为“多元化、公平和包容性”（DEI）或类似名称的项目、办公室、委员会、职位和倡议，并停止所有基于DEI的政策，包括基于DEI的纪律或言论控制政策（无论其名称如何）；向联邦政府证明其已做到这一点且令联邦政府满意；并通过结构性和人事变动向联邦政府证明这些改革是持久和有效的，且令联邦政府满意。到2025年8月，大学必须向政府提交一份经准确性认证的报告，确认这些改革。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"学生纪律改革与问责。\"}],\" 哈佛必须立即改革其学生纪律政策和程序，以便迅速、透明地以一致性和公正性执行其现有的纪律政策，并且不因身份或意识形态而实行双重标准。如果现有政策不足以防止学术研究、课堂学习和教学或其他正常校园生活的方面受到干扰，哈佛必须制定并实施足以防止这些干扰的纪律政策。这包括但不限于以下内容：\"]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"哈佛的纪律处分必须包括立即干预和制止干扰或“平台驱逐”（deplatforming），必要时可动用哈佛警察来制止干扰或“平台驱逐”；有力执行并恢复校园内现有的时间、地点和方式规定，必要时命令哈佛警察制止违反时间、地点和方式规定的事件；设立一个统一的、对哈佛校长或其他最高负责人负责的纪律处理机构；移除或改革那些延迟和阻碍执法的机构和做法，包括相关的行政委员会（Administrative Boards）和文理学院教员委员会（FAS Faculty Council）。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"哈佛必须采纳一项关于学生团体或俱乐部的新政策，禁止认可、资助或提供便利给任何支持或提倡犯罪活动、非法暴力或非法骚扰的学生团体或俱乐部；禁止邀请经常违反校园规则的非学生进入校园；或禁止充当已被禁止的校园学生俱乐部掩护组织的团体。对于违反这些政策的已获认可和未获认可的学生团体的领导者或组织者，必须作为学生纪律问题追究责任，并使其失去在其他获认可学生组织中担任职务的资格。未来，学生团体或俱乐部的资助决定必须完全由一个对大学高层领导负责的大学教员机构做出。特别是，哈佛必须终止对那些自2023年10月7日以来从事反犹活动的学生团体或俱乐部的支持和认可，包括哈佛巴勒斯坦团结委员会、哈佛研究生支持巴勒斯坦组织、法学院学生支持巴勒斯坦组织、学生支持巴勒斯坦正义组织，以及全国律师协会（在哈佛的分支），并对这些学生组织的负责人和活跃成员进行纪律处分并取消其资格。\"}],\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\"]}],\"\\n\"]}],\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"2a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们期望您立即合作实施这些关键改革，这将使哈佛能够回归其创新研究和学术卓越的初衷使命。\"}]\n2b:[\"$\",\"hr\",null,{}]\n2c:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"联邦政府信函要点\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#联邦政府信函要点\",\"children\":\"联邦政府信函要点\"}]}]\n"])</script><script>self.__next_f.push([1,"2d:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"条件性资助：\"}],\" 美国联邦政府对哈佛大学的投资是基于其学术发现和卓越成就对国家的价值，但这并非必然权利，取决于哈佛遵守联邦民权法，并营造能产生智力创造力和学术严谨性（而非被“意识形态俘获”）的环境。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"哈佛的失败与整改要求：\"}],\" 信中声称哈佛近年来未能达到支撑联邦投资所需的智力及民权条件。信件认可哈佛表达的修复承诺，并提出了一系列条款作为维持联邦财政关系的基础性“原则性协议”。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"治理结构改革（2025年8月前）：\"}],\" 要求哈佛进行重大治理改革，包括：明确权责、赋予忠于学术使命并致力于信中改革的终身教授和高层领导权力、削减学生/非终身教职/倾向社会活动主义的教职员工及管理人员的权力、精简妨碍改革的臃肿/重复/分散的治理形式。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"基于绩效的聘用改革（2025年8月前）：\"}],\" 要求哈佛采用并实施基于绩效的聘用政策，在教职员工和领导层的聘用、晋升、薪酬等环节停止所有基于种族、肤色、宗教、性别或国籍的偏好。需通过结构和人事变动确保持久性。对所有现有及未来教员进行剽窃审查并统一执行政策。聘用数据需与联邦政府共享并接受审计（至少到2028年底）。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"基于绩效的招生改革（2025年8月前）：\"}],\" 要求哈佛在本科、各研究生项目、各专业学院等全面采用并实施基于绩效的招生政策，停止所有基于种族、肤色、国籍或其替代指标的偏好。需通过结构和人事变动确保持久性。招生数据需与联邦政府共享并接受审计，非个性化的统计信息（按种族、GPA、标化成绩等分类的录取/拒绝学生数据）需向公众公开（至少到2028年底）。各项目招生主任需在每轮招生后签署公开声明确认遵守规则。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"国际招生改革（2025年8月前）：\"}],\" 要求改革国际学生的招募、筛选和录取，防止录取敌视美国价值观和制度（宪法/独立宣言）、支持恐怖主义或反犹主义的学生。需立即向联邦当局（国土安全部/国务院）报告违反行为准则的外国学生（含签证/绿卡持有者）。同样要求持久性、全面性、数据共享、审计、公开和主任认证。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"招生与聘用中的观点多样性（2025年8月前）：\"}],\" 要求委托联邦政府认可的外部方审计学生、教职员工和领导层的观点多样性，确保每个系、领域或教学单位都具有观点多样性。废除所有意识形态“试金石”式的标准/偏好/做法。缺乏多样性的单位必须通过聘用/招收能带来多样性观点的新成员来改革；若无法自行完成，则将聘用/招生权移交给有能力的相关单位。此审计和改革需每年进行（至少到2028年底）。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[
