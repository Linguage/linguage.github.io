**根与芽项目**：古道尔创立的全球青年环保行动计划,旨在赋予年轻人力量,通过集体行动为社区和环境带来积极改变\n\n**万物相互关联**：古道尔在森林中领悟到的核心信念,强调人类是自然世界的一部分,破坏自然即是破坏人类自身的未来\n\n**希望的力量**：面对环境危机,古道尔坚持传递希望,认为数十亿人做出正确的道德选择就能推动世界走向不同的方向\n\n## 摘要\n\n该纪录片记录了珍·古道尔博士非凡的一生和工作，重点介绍了她从黑猩猩研究科学家转变为全球环保活动家的历程。脚本首先回顾了她早年在坦桑尼亚贡贝国家公园的开创性工作，包括她证明黑猩猩能够制造和使用工具的突破性发现。\n\n然而，1986年的一次会议促使古道尔博士认识到野生和圈养黑猩猩所面临的严峻危机，这标志着她将重心转向保护的转折点。脚本详细描述了她作为活动家的务实方法，包括她与石油公司康菲合作，在刚果建立钦潘加黑猩猩庇护所，以及她坚持“要触及内心才能改变思想”的理念。\n\n此外，本片也呈现了古道尔博士为地球的未来而奔波的忙碌生活，以及她对“根与芽”（Roots \u0026 Shoots）青年项目的深切投入。该项目旨在赋予年轻人力量，让他们通过集体行动，为世界带来积极改变。脚本最终凸显了古道尔博士关于希望和万物相互关联的信息，强调了每一个人的选择和行动都能产生影响，为环境和野生动物保护树立了社区参与的典范。\n\n---\n## 纪录片脚本\n### 缘起：从科学家到偶像\n\n**MALE:** 各位先生女士，今晚您将享受到一场特别的款待。珍·古道尔博士。\n\n**MALE:** 我是您的忠实粉丝，但我相信您肯定一直听到这样的话。\n\n**DR GOODALL:** 这总比听到“我恨你”要好，不是吗？\n\n**DR WRANGHAM:** 人们以为她只与黑猩猩有关联。但实际上，她远不止于此。这关乎地球的未来。\n\n**MICHAEL:** 所有这些年轻人都像看待一位神明一样看着她。\n\n**DR GOODALL:** 我获得了如此多的爱。有一刻我意识到：“嗯，这将帮助我做我正在做的事情。”\n\n**MERLIN:** 在我成长的过程中，我并不知道我的祖母对世界产生了多大的影响。\n\n**MARY:** 改变了这么多人的生活，多年来，这幅图景变得越来越宏大。\n\n**RODNEY:** 她追求的是世界所渴望的那种改变。\n\n**MICHAEL:** 珍·古道尔为什么会和一家石油公司合作？好吧，如果你想做出改变，你就得这么做，你得和“坏人”合作。\n\n**DR GOODALL:** 我的工作是四处奔走，激励人们，让他们采取行动。\n\n**DR COLLINS:** 我们说：“慢下来，”她说：“不，不，时间不多了，是时候加速了。”\n\n**DR GOODALL:** 我得跑，我得跑。\n\n**DR COLLINS:** 我认为代价非常高昂，但她是被她的使命所驱动。\n\n**DR GOODALL:** 如果你想让某人改变主意，争论是没有用的，你必须触及内心。\n\n**DR GARROD:** 大多数科学家不谈论希望，简提供了人性的一面。\n\n**LAMIS:** 她开始了某件事情，我们不希望它停止。\n\n**DR GOODALL:** 当我离开后，世界各地会有成百上千的年轻人，他们已经在接管了。我觉得我有一个需要传达的信息，我被放置在这个星球上就是为了做这件事。我必须做。我觉得自己被选为一名信使。向信使们致敬！\n\n**DR GOODALL:** 谢谢。我从小是一个非常害羞的孩子，如果当时有人告诉我，我想要从事的职业会让我成为一种奇怪的偶像，而这并非我计划、也非我意图或努力争取的，我想我可能不会走这条路。看，这是我拥有的第一本书。花了六先令。上面写着……瓦莱丽·简。1942年圣诞节。就是这张图。猴子搭了一座桥。杜立德医生走了过去。嗯。要不是你（指布偶黑猩猩），我可能永远不会去非洲。\n\n**MALE:** 1960年7月，珍·古道尔，一位26岁的英国女孩，踏上了一场非凡的冒险。应英国人类学家路易斯·李奇（Dr L.S.B. Leakey）博士的请求，她将在东非观察黑猩猩的日常生活。\n\n**DR GOODALL:** 人们经常想知道我是否想念家里的便利。我可以诚实地说，我在这里的保护区非常快乐。这是我一直向往的生活，我从未后悔过选择它。人们知道我出去研究黑猩猩时，没有人这样做。在他们的脑海中，浮现出这些毛茸茸的猿类和一位年轻的金发英国女性在丛林中的画面，这很迷人。\n\n**MALE:** 现在，珍将成为第一位能够确凿证明未经训练的黑猩猩不仅会使用、而且会制造工具的科学家。在珍发现之后，李奇博士说：“我们必须重新定义人类，重新定义工具，或者接受黑猩猩也是人类。”\n\n**DR GOODALL:** 嗨。哦，是的，我们在这里。\n\n**DR GOODALL:** 我得跑，我得跑。我得跑。暖和一下，否则我上不了台讲话。\n\n**MALE:** 在过去的六十年里，她开创性的工作已经演变成一项个人的追求，即赋予他人力量，让世界成为所有生物更美好的地方。\n\n**MALE:** 各位先生女士，今晚您将享受到一场特别的款待：珍·古道尔博士。\n\n**DR GOODALL:** 哇。谢谢您如此热烈的欢迎。给您一个特别的问候，因为您给了我一个特别的、特别的问候。\\[黑猩猩叫声\\] 这只是意味着这是我，这是珍。黑猩猩，你知道，它们是我们最亲近的亲戚。我们都是猿类，最先开始渗透并打动我的是黑猩猩和我们是多么地相似。它们会交流，拥抱，亲吻，牵手，互相爱抚。在森林里，我有一种强烈的精神觉知，感受到某种精神力量，在森林里这种感觉非常强烈。你无法不明白万物是如何相互关联的。我经常独自坐在那里思考，也许那种伟大的精神力量在我们每个人身上都有一丝火花。如果真是这样，也许每一种动物身上也有，也许这就是赋予我们生命的。因为我们必须给每样事物贴标签，我们称之为灵魂。所以，如果我们有灵魂，那么黑猩猩也有。我可以在森林里和黑猩猩待上几个小时。那是我生命中最美好的日子。\n\n### 转折：从研究者到行动家\n\n**DR GOODALL:** 那么我为什么离开了呢？我本可以一直在那里的。1986年，我协助组织了一次会议，把当时在非洲其他6个地方研究黑猩猩的科学家们聚集在一起。我们有一个关于保护的议程，结果令人震惊！森林正在被破坏。非洲的人口正在不断深入黑猩猩的栖息地，并且仍然存在活体动物贸易，通过射杀母亲来偷走它们的幼崽。\n\n**DR WRANGHAM:** 20世纪初，野生黑猩猩的数量约为200万，而到1980年代，这个数字下降到了这个数字的十分之一左右。我想，我们所有人都关心的最终目标是阻止黑猩猩被从野外捕获，但总的来说，我希望我们能进行自由的讨论。珍。到1986年，珍已经是黑猩猩非常重要的盟友，因为她相当有名。\n\n**DR WRANGHAM:** 但据我所知，珍当时并没有亲自将精力投入到研究贡贝（Gombe）以外的黑猩猩上。有时甚至让人感到沮丧，希望珍能就我们认为是棘手的问题发表一些公开声明。\n\n**DR GOODALL:** 动物权利问题是我逃避了相当长一段时间的事情，仅仅因为它是一个棘手的热门问题，因为我不是那种喜欢出风头的人。我真的很喜欢坐在贡贝的森林里，继续观察黑猩猩，但很明显，我必须利用这种力量，如果你愿意这么说，去倾听很多人的心声，来帮助那些让我能够做到这一点的生物们。我以科学家的身份参加了那次会议，计划继续那种美好的生活，但离开时，我成了一名活动家。\n\n**DR GOODALL:** 在这次地球峰会上，我们需要动物的声音，而不仅仅是人类的声音。\n\n**FEMALE:** 在坦桑尼亚的那个地区，是否存在栖息地破坏之类的环境威胁，需要我们关注？\n\n**DR GOODALL:** 不幸的是，在坦桑尼亚，就像在非洲黑猩猩分布的所有地区一样，栖息地正在消失。\n\n**CHARLES:** 您更喜欢您不为人知的时候吗？\n\n**DR GOODALL:** 我愿意付出一切回到我真正可以在贡贝，与黑猩猩在一起，沉浸在那个美妙世界中的日子，但一旦你意识到你可以努力做出改变，那么——那将是完全自私的，我不能再那样做了，所以如果我现在回去，我会不快乐。\n\n**CHARLES:** 所以，您是为了它们而走向公众的？\n\n**DR GOODALL:** 为了黑猩猩。如果我停止这样做，我会觉得自己是一个真正的叛徒，因为它们为我付出了太多。\n\n**DR COLLINS:** 珍·古道尔研究所是以珍·古道尔命名的。最初，它是保护黑猩猩，然后很快就说我们必须保护栖息地。但它扩展到了整个星球上的人类福祉。\n\n**DR GOODALL:** 气候变化，它正在发生。如果我们失去希望，那么我们不如都放弃，如果我们认为没有前进的方向，就像许多科学家告诉我们的那样，我们注定要失败，那么吃喝玩乐，因为明天我们都会死去。\\[笑\\]但我们绝不能让这种情况发生。你知道，我的工作是四处奔走，激励人们，让他们采取行动。信息是：我们是自然世界的一部分。土壤中有数十亿、数十亿的不知名的小生物，这就是工业化农业正在摧毁的。当我们破坏自然世界时，我们也在破坏我们自己的未来，而不仅仅是野生动物的未来。一旦你采取行动，一旦你有所作为，一旦你觉得，“好吧，这是我微不足道的一份力量，但我会尽我的微薄之力，如果我做到了，我会死得更安宁，”即使这没有用，我也会在尝试中死去。\n\n**DR GOODALL:** 我们每个人在这个星球上生活的每一天，都会产生某种影响，即使我们做出微小的选择。选择步行而不是乘车，我们从哪里购买？它来自哪里？它是否伤害了环境？当数十亿人做出正确的道德选择时，我们开始走向一个不同的世界。\n\n### 行动哲学：触及内心与务实合作\n\n**MICHAEL:** 珍的生活是什么样的？很艰难。\n\n**DR GOODALL:** 我喜欢我正在过的生活吗？实际上，答案是：不，因为自1986年以来，我每年有300天或更多时间在旅行，但这是我能和像你们这样的人群交谈的唯一方式。\n\n**DR GOODALL:** 我的学生们会（和我交流），但我总是在旅行。试图拯救世界，这是一项相当艰巨的工作。\n\n**MICHAEL:** 珍是24/7（全天候）工作的。当你成为环境界的特蕾莎修女时，你就会得到这种生活。\n\n**DR GOODALL:** 我总是将我的咖啡渣使用两次，只是为了多加一点。烤面包片。它运转得很好。你看，现在这个。这是一份尿液样本，但它是干净的。它非常紧密和安全。我可以在这里放小糖包，因为那些小包里通常糖太多，然后——然后你就浪费了。实际上，这样可以。\n\n**DR COLLINS:** 我们问：“珍，您是如何坚持下去的？”她说：“因为我正在做我相信的事情，而且时间不多了。”我们说：“慢下来，您年纪大了。”她说：“不，不，时间不多了，我必须加快速度。”我认为代价——代价非常高昂。她如何保持下去，我们只能说她是被对使命的承诺所驱动。我想，这就是让她保持活力的原因。尤其是和年轻人在一起，她得到了巨大的反馈。我想她是被她得到的反馈所牵引着前进的。\n\n**DR GOODALL:** 我决定我必须走访一些非洲国家，亲眼看看黑猩猩的遭遇。整个非洲的黑猩猩正在迅速消失。母亲被枪杀，幼崽被带走贩卖。它们经常被当作宠物出售。它们也被走私用于国际娱乐和生物医学研究贸易。\n\n**DR GOODALL:** 我能做到的很多事情都要感谢詹姆斯·贝克（James Baker）。说来奇怪，我跟他共进午餐。他当时是国务卿。他是一个猎人，他知道我不喜欢他狩猎，那他为什么要帮助我呢？\n\n**JAMES:** 我记得在那次午餐时告诉她，我热爱大自然，因为我是一个猎人和渔民。但我对清洁的水和清洁的空气，以及保护资源和保护环境感兴趣。\n\n**DR GOODALL:** 他似乎认为我正在做的事情是值得的，因为他发了电传，你还记得那些日子发传真吗？他给我将要去的国家的所有大使馆发了电传，他说：“请帮助珍。”\n\n**FEMALE:** 欢迎来到金沙萨，珍。\n\n**DR GOODALL:** 所以他们照做了。这真的，真的，我的意思是我能够住在大使馆里，他们在机场接我。\n\n**JAMES:** 她足够聪明，知道一旦你成为一名活动家，你最好了解政治，并且要足够务实才能把事情办成。\n\n**DR GOODALL:** 我去的一个国家是刚果共和国，因为有人告诉我应该去看看布拉柴维尔动物园里可怕的条件。那里真是太可怕了。动物园用几先令从猎人那里购买动物，然后将它们展出直到死亡，所以这些动物都快饿死了。\n\n**MICHAEL:** 当我遇到珍时，她的工作是倡导。尽她所能改变黑猩猩的处境，正是在那时我遇到了她。我去给她拍照，她是主角，我们会去布拉柴维尔动物园，那是一个非常可怕的动物园。\n\n**DR GOODALL:** 我发现了一只名叫格雷瓜尔（Gregoire）的黑猩猩，它在1944年被关进笼子，当我见到格雷瓜尔时，它完全是皮包骨，几乎没有毛发。我简直不敢相信它是一只黑猩猩，我想当时格雷瓜尔的照片比我见过的任何圈养黑猩猩都更让我心痛。\n\n**DR GOODALL:** 我知道我必须为格雷瓜尔做点什么。我必须设法建一个庇护所。\n\n**DR GOODALL:** 在刚果（布拉柴维尔）工作的康菲（Conoco）石油天然气公司，他们愿意帮助为所有这些孤儿黑猩猩建造一个庇护所。所以我把整件事都想了一遍，因为我知道会有批评。\n\n**DR GOODALL:** 我一直以来的感觉是，如果一家采掘公司，如果他们真的在努力寻找更好的做法，那么通过与他们合作，你就是在帮助他们做得更好。马克斯·皮彻（Max Pitcher）是当时的副总裁，康菲同意建造庇护所。而JGI将继续喂养黑猩猩并支付护理人员的费用。\n\n**RODNEY:** 这可能是一个石油国家经理所拥有的最不寻常的行军令：“如果可以的话，尽量找到石油，但无论你做什么，都不要让珍·古道尔失望。”\n\n**DR GOODALL:** 罗德！\n\n**RODNEY:** 珍！哇！这太棒了！\n\n**DR GOODALL:** 我正试图算出多少年了……\n\n**RODNEY:** 珍说：“如果你们能想出办法，为布拉柴维尔动物园的黑猩猩创建一个围栏，它们就可以尽可能自然地度过余生，并仍然得到人类的喂养和医疗护理。”所以我们说：“听起来很简单，我们来做吧。”很多时候，你并不能沿着笔直的道路走向目标。这实际上是我们考虑的第三个项目地点，当然，这也是我们最终的落脚点。当时的情况就像是：“罗德尼，想办法解决吧。”史蒂夫·马修斯（Steve Matthews）是英国的一位动物园承包商专家，负责建造黑猩猩的住所。这个设施必须拆卸，运到刚果，经过那段可怜的、残破不堪的道路，然后在一个像这里一样偏远和充满敌意的地方组装起来。这是我的工作，我信任它，我希望看到它实现。如果珍要求你做某事，你不会推辞说“不”，我的意思是，拒绝她？\\[笑\\]当然不。\n\n**DR GOODALL:** 可怜的家伙们。他们不知道发生了什么。\n\n**RODNEY:** 已经为不同体型的黑猩猩制作了运输箱。然后用平板卡车从布拉柴维尔动物园运走。我们包了一架飞机，可以运载所有这些板条箱和所有这些黑猩猩。然后是高潮时刻，它们必须被释放到黑猩猩设施中。没有人知道是否有任何死亡、受伤或任何不安。\n\n**MAN:** 一，二，三，四，五。克里斯托弗落在了后面。\n\n**RODNEY:** 令我们惊讶的是，一切都很好，进行得很顺利。有人告诉我们，我们可以凭借有史以来最大规模的黑猩猩空运载入吉尼斯世界纪录。\n\n**MAN:** 百分之百的成功。\n\n**DR GOODALL:** 看，他走了。\n\n**MICHAEL:** 它成为了一个官方庇护所，名叫钦潘加（Tchimpounga）。你必须照顾它们，直到它们生命的尽头。\n\n**DR GOODALL:** 格雷瓜尔是空运到钦潘加的黑猩猩之一。看到它在一个开放的空间里，非常非常暖心。你这个傻老头！\n\n**RODNEY:** 这是一个和我们如此相似的动物。它们有爱，它们有羁绊，它们有社区，就像我们一样。你必须欺骗自己，才会认为它们真的有什么不同。\n\n**DR GOODALL:** 哦，是的！你太傻了。\n\n**RODNEY:** 她会在当时普遍风气完全相反的时候，与一家石油公司交朋友。所以她不怕做一个反对者。\n\n**DR GOODALL:** 两个人比一个人强。\n\n**DR WRANGHAM:** 她认为，通过建立庇护所来取得一些进展，远比坚持纯粹主义并让黑猩猩受苦要好得多。\n\n**MICHAEL:** 珍向，我们姑且称之为“坏人”伸出援手。珍·古道尔为什么会和一家石油公司合作？好吧，如果你想做出改变，你就不能只与“合唱团”合作，你要和“坏人”合作，他们会变成“好人”。\n\n**DR GOODALL:** 我希望你和你提到的所有那些人，都将不再从事石油行业的工作，并在清洁绿色能源领域拥有美好的未来。\n\n**DR GOODALL:** 回想起那些帮助我前进的、最不可能的人，对我来说是如此奇怪。\n\n**RODNEY:** 正在发生一种演变，大多数人认为天然气是通往低碳的过渡燃料……\n\n**DR GOODALL:** ……听到了。那些你绝不会想到会提供帮助的人。\n\n**RODNEY:** 谈到更快乐的事情，包括今晚能在这里见到您，我的喜悦之情。\n\n**DR GOODALL:** 这也是我的荣幸。\n\n**RODNEY:** 谢谢您，珍。珍是一个能以最柔和的方式赢得你尊敬的人，并创造出世界渴望的那种改变。\n\n### 核心项目：庇护所、社区与青年\n\n**DR GOODALL:** 我在世界各地奔波，每次巡回演讲后都会回到这里。我第一次来这里生活是在我五岁的时候，战争爆发了。所以，我们是1940年来到这里的。现在它属于我和我的妹妹朱迪。我在楼顶有自己的小空间。这是我的根。当我在这里时，至少我在一个地方，一张床上，没有讲座。当我来到这里，我才能真正做回自己。这是家。\n\n**MARY:** 让我们看看我们的快速清单上还有什么。八月。没有回家的必要了。我们要考虑去钦潘加吗？然后再去坦桑尼亚……\n\n**DR GOODALL:** 是的。\n\n**MARY:** 规划珍的工作生活是一个巨大的拼图游戏。就在今年十月，拉伯克、洛杉矶、波特兰、多伦多、伦敦、威尔士、基奇纳、汉密尔顿。在过去30年的旅程中，对我来说，最令人兴奋的事情之一就是珍·古道尔研究所的发展。它已经能够改变这么多人的生活。珍知道她想帮助黑猩猩和当地社区。多年来，这幅图景变得越来越宏大。然后，您又回家待几天，然后去德国。我希望能给珍更多时间，我希望能看到我们的庇护所和项目得到足够的资金保障，这样珍就不用担心为了确保它们的安全而四处奔走筹集资金。又从清单上划掉了一件事。\n\n**DR GOODALL:** 我现在过的这种生活完全是疯狂的。有时我会想，“我不能再这样下去了。”你让我觉得不舒服。\n\n**MARY:** 我看着这个清单也觉得不舒服。这相当可怕。\n\n**DR GOODALL:** 我有一个小小的《圣经》盒子，是我为祖母制作的，里面卷着许多经文。当我向朱迪抱怨时，因为我又得准备另一次旅行了，我不想去，我得再次打包行李箱。我有三次从数百个小卷轴中随机抽取，内容都是：“手扶着犁向后看的人，不配进神的国。”朱迪说：“好吧，你去吧。”\n\n**MARY:** 二月的西班牙，因为您在那段时间有个空档。珍的工作从未如此重要。85岁的她感觉时间有限，就像我们所有人一样，在我们有望长寿的生命的最后几十年里。但我们不要做任何去任何地方的承诺，\\[笑\\]因为我们连分钟都快用完了，更别说日子了。\n\n**DR GOODALL:** 那土耳其呢？\n\n**MARY:** 啊，是的。土耳其。那个活动……我知道珍觉得自己被深深驱动，同时她也知道她的外展时间是有限的。所以她需要利用每一秒钟，在不能再做之前，尽可能多地做事情。\n\n**DR GOODALL:** 看看他们所有人。\n\n**DR GARROD:** 他们看起来像我一样。人们能够见到珍·古道尔，听到珍·古道尔，和她在同一个房间里，这是令人难以置信的。我第一次见到珍时，我还是个本科生。我是看着她长大的，她是我的学术超级英雄。正如你们已经看到的，我们今天有一位非常特别的访客，来帮助我们开启这座令人难以置信的新建筑。\n\n**DR GOODALL:** 我第一次遇到本·加罗德（Ben Garrod）是在剑桥做演讲时。他当时靠在餐桌旁服务赚钱，就像我以前为了筹钱去非洲一样。\n\n**DR GARROD:** 仅仅几周后，我最终去了乌干达西北部，这一切都是因为我给珍·古道尔端了汤。\n\n**DR GOODALL:** 我想你需要一个特别的早安问候，本可以帮我。你愿意吗？一、二、三。\\[黑猩猩叫声\\]\n\n**DR GARROD:** 她以我们从未做过的方式记录动物。她给它们命名，观察它们的行为，并将情感、感觉和想法归因于它们，而这些是我们曾紧紧抱住并用来定义我们物种的东西。这是一个巨大的突破，它为所有这些研究打开了闸门。\n\n**DR GOODALL:** 我很自豪我能够改变科学界对其他动物的态度。帮助他们摆脱这种狭隘的还原论思维，即声称：“我们是地球上唯一拥有个性、思想和情感的生物，”因为这显然不是真的。黑猩猩与我们共享$98.6\\%$的DNA。动物比我们过去认为的要聪明得多、得多、得多。\n\n**DR GARROD:** 珍帮助我们了解了类人猿的伟大之处。这些有感情、有情绪、有爱心的生物。\n\n**DR GOODALL:** 你好。\n\n**DR GARROD:** 就珍对科学界的影响而言，珍与最顶尖的人物并驾齐驱，她确实如此。\n\n**DR GOODALL:** 哦，是的。\n\n**DR GARROD:** 阿尔伯特·爱因斯坦（Albert Einstein）在物理学方面做出了他的贡献，毫无疑问，珍在生物学方面也做了完全相同的事情。\n\n**DR GOODALL:** 我希望的原因之一是我们人类的智慧。科学正开始提出创新的方法，让我们能与地球更加和谐地共存。而且，我们也在用我们自己的大脑思考我们自己的环境足迹，以及如何才能尽可能留下最轻微的印记。我坚信，正是因为这种非凡的智慧，我们能够，并且正在找到与自然和谐共处的方法。\n\n**DR GARROD:** 大多数科学家不谈论希望，然而，珍谈。珍为严谨的科学赋予了人性的一面。\n\n**DR GOODALL:** 我真的相信，只有当头脑和心灵和谐一致时，我们才能实现我们真正的人类潜力。\n\n**DR GOODALL:** 我第一次去贡贝时，那是我生命中最美妙的时光。\n\n**DR COLLINS:** 对她来说，重要的事情之一是离开并重新接触她的根源。\n\n**DR GOODALL:** 我得走这边。\n\n**MALE:** 需要帮忙吗？\n\n**DR GOODALL:** 不，没关系。\n\n**DR COLLINS:** 今天发生的一切，都源于她在森林里的经历。她需要从中汲取力量。\n\n**DR GOODALL:** 好了。\n\n**DR COLLINS:** 独自在森林里对她来说才是最重要的。\n\n**DR GOODALL:** 在森林里，我有一种强烈的感受，感受到那里有一种伟大的精神力量。这就像我有时在那些古老的大教堂里感受到的那种感觉，那里的人们年复一年地来朝拜。\n\n**DR GOODALL:** 我过去认识的黑猩猩几乎都离开了。但其中一个我称之为真正朋友的是格林姆林（Gremlin）。我最后一次见到格林姆林时，她径直走到我面前，看着我的眼睛。我的意思是，它们当然认得出我们，就像我们认得出它们一样。我总是与动物有一种奇特的连接。我和人通过语言连接，而和动物则是心与心的连接。我生活中有太多的事情看似巧合，但我不太相信这一点了，因为事情的发生，我认为它们似乎是有原因的。\n\n**DR GOODALL:** 我清楚地记得第一次秘密观看灵长类动物研究实验室拍摄的录像。因为黑猩猩在生物学上与我们如此相似，科学家们当时认为：“这太棒了，现在我们可以对黑猩猩进行医学研究了。”\n\n**DR WRANGHAM:** 在1980年代，美国约有$3000$只黑猩猩被圈养。与此同时，野外的黑猩猩是一个受威胁的物种。\n\n**DR COLLINS:** 当她听说黑猩猩处于危险之中时，她觉得，“我已经拥有了这份特权，现在我感到有责任，我可以为它们发声。”\n\n**DR GOODALL:** 我知道我必须进入实验室，这样我才能根据自己的亲身经历来谈论它，而不仅仅是别人的影片。\n\n**MICHAEL:** 我最终和珍一起去了实验室，如果你关心黑猩猩，这很难做到。黑猩猩知道，每当珍走进房间时，她都与其他人有所不同。它们知道。它们都来到笼子边缘，想要与她互动。\n\n**DR GOODALL:** 你想要它回去吗？不，你不想，是吗？你想要我拿着。哦，我知道了，你想要我照镜子。现在，如果我转过身，你就能在镜子里看到我和你。\n\n**MAN:** 今天，对黑猩猩的大部分研究涉及让它们接触疾病或疫苗，并监测它们的反应。如何有效地进行研究是实验室面临的一个问题。另一个问题是如何照顾这些聪明的生物。\n\n**DR GOODALL:** 我参观的一个实验室里，我被带进一个房间，两边各有四只黑猩猩，五英尺乘五英尺的笼子，七英尺高，第一个叫乔乔（Jo-Jo）。他是一只非常英俊的雄性。他已经独自生活了15年左右，我看着他的眼睛，我在想贡贝的黑猩猩躺在柔软的地面上，制作绿叶巢穴，互相梳理毛发，而他一直独自待在这里，所以眼泪开始从我的面罩下滴落，他伸出一根温柔的手指，擦去了我的眼泪。\n\n**DR GOODALL:** 哦，你流鼻涕了。\n\n**MALE:** 你可能在想，等它们长大了，我们甚至就不会再用它们进行研究了。\n\n**DR GOODALL:** 我们希望如此，不是吗？在第一次访问那些实验室之后，人们开始邀请我去参加会议。有些动物权利组织的人拒绝和我说话。他们说：“你怎么能和这些人坐下来喝咖啡？”但如果你不和人们交谈，你怎么能期望他们改变呢？我一直相信，如果你想让某人改变主意，争论是没有用的，你必须触及内心。\n\n**DR GOODALL:** 我没有站在那里指责他们是残忍的怪物，我展示了贡贝黑猩猩的一些幻灯片和影片，谈论了它们的生活。然后展示了一些黑猩猩在小笼子里的幻灯片，我说：“这就像把一个人关在那样的一个监狱里。”许多科学家说：“我们真的从未以这种方式思考过。”他们中很多人实际上哭了，所以我认为这开始了一种不同的思维方式。\n\n**DR GALLO:** 她是一位活动家，但她不会让你感到不适。她唤醒了我们的良知，你会说，嗯，你知道，这是一个真正的伦理困境，我们真的需要它吗？有没有替代方案？\n\n**DR GOODALL:** 因为有些事情我们可以做，有些事情我们必须做，就我自己而言，我打算将我的余生都奉献给为黑猩猩争取这些改善而奋斗。一点一点地，通过脱口秀主持人以及制作的各种影片，改变开始了。但即便如此，也花费了很长时间。\n\n**MAN:** 最近，科学家们开始意识到黑猩猩实际上是不佳的研究对象。例如，它们的免疫系统与人类有显著不同。\n\n**DR GOODALL:** 尽管它们与我们如此相似，但它们的反应方式与我们不同，这就是为什么现在大力推动寻找动物研究替代方案的原因。\n\n**DR COLLINS:** 我受邀参加在华盛顿举行的一个小型晚宴，主宾是珍·古道尔，我想，我们会进行一次友好的交谈。我本该更清楚的。她以极高的准确性告诉我，NIH（美国国立卫生研究院）仍在支持在不可接受的条件下对黑猩猩进行侵入性研究，而我作为NIH的主任，需要对此采取行动。这促使我去亲自查看证据。\n\n**DR COLLINS:** 经过广泛考虑，NIH计划大幅减少生物医学研究中的黑猩猩数量，并指定很大一部分NIH拥有的黑猩猩退役。\n\n**DENNIS:** 它们作为广泛使用的研究动物的日子似乎即将结束，那么它们现在将何去何从呢？\n\n**DR COLLINS:** 我们现在亏欠它们一种深思熟虑的方式来度过余生，这意味着将它们转移到庇护所。\n\n**DR GOODALL:** 当我听说NIH将不再对黑猩猩进行测试时，感觉就像，呼。这花了这么长时间。它们中的大多数现在都在“黑猩猩天堂”（Chimp Haven）。“黑猩猩天堂”是一个令人惊叹的地方。我去过那里，被带去参观了。对于圈养的黑猩猩来说，它几乎是完美的。\n\n**DR COLLINS:** 我认为珍非常有效。她不会站起来说你们都应该抱有希望，以某种模糊不清的方式。希望必须附着于我们所有人承担责任的行动上。\n\n### 个人代价与不懈使命\n\n**MERLIN:** 每当珍来看我们时，她并不经常来，她会来到我们这里的家庭住所。\n\n**ANGEL:** 我觉得当她在我们身边时，作为家人，她就是她自己，更像一个祖母的角色，确保我们做正确的事情，或者总是问我们，她如何能提供帮助，并找出我们生活中的热情所在。\n\n**DR GOODALL:** 那么，你的签证怎么办？\n\n**ANGEL:** 嗯，我拿到了我的护照，嗯，我本该今天拿到的，但我明天要去拿。\n\n**DR GOODALL:** 那么你也必须办一本新护照吗？\n\n**MERLIN:** 是的，不过我已经拿到了。\n\n**DR GOODALL:** 成为祖母是完全不同的，因为我没能和我的孙辈们相处太多时间。我为他们感到非常骄傲。我的意思是，梅林（Merlin）完全是出类拔萃的。安吉尔（Angel）正变得非常敬业和充满激情，我的小孙子尼克（Nick）现在和他父亲一起工作，学习盖房子的业务。他们都做得很好。\n\n**DR GOODALL:** 我在匈牙利，在欧洲第二大音乐节上向$60000$人谈论希望。\n\n**NICK:** 他们想，“哦天哪，是珍·古道尔，她要表演了吗？“\\[笑\\]\n\n**ANGEL:** 想象一下。\n\n**DR GOODALL:** 不，我不会表演的。\n\n**NICK:** 直到今天，你知道，她仍然在旅行，仍然在战斗，即使她年纪大了，她仍然有如此疯狂的动力。\n\n**ANGEL:** 她总是说，她这样做是为了她的孙辈和她自己的未来孩子，所以我认为这也激励着她继续做她所做的事情。这就是她为之而生的。\n\n**DR GOODALL:** 我们走那边吗？那边。\n\n**MERLIN:** 那边。\n\n**ANGEL:** 这边。你上次来这里的时候下雨了，还记得吗？这让我想起了贡贝。太陡峭了。外婆（Gaj），你的腿一定很强壮。它们是。我的意思是，你的照片看起来很棒，所以……\n\n**ANGEL:** 我们称我们的祖母为Gaj。这来自我们在英国的小表兄弟。他们叫她Great Aunt Jane（珍姨婆），所以他们缩写成了Gaj。她喜欢这个名字。我想她更喜欢这个，而不是祖母、奶奶。\n\n**ANGEL:** 我不认为我的任何朋友的奶奶会在这里徒步旅行。\n\n**DR GOODALL:** 你知道有些鸟会用印楝叶（neem leaves）来衬它们的巢吗？它能杀死寄生虫。\n\n**MERLIN:** 我不知道。每次我和珍在一起，就像是上课时间。\n\n**DR GOODALL:** 这太非凡了，不是吗？\n\n**MERLIN:** 在我成长的过程中，我并不知道我的祖母对世界产生了多大的影响，以及她接触了多少人。我在学校里并不以珍·古道尔博士的孙子而闻名。\n\n**DR GOODALL:** 看，这里有一只蛾子。那是在贡贝的。它很美，不是吗？\n\n**ANGEL:** 是的。\n\n**MERLIN:** 那是蛾子吗？\n\n**ANGEL:** 看，那里有——哦！我的错，是我的错。\n\n**DR GOODALL:** 你让它飞走了。你真没用。\n\n**ANGEL:** 我没有！\n\n**DR GOODALL:** 是的，你有。\n\n**ANGEL:** 所以，我的祖母教会我照顾大自然。照顾我们周围的一切是作为个体的我们的责任。是的，她每天都在激励着我。\n\n**DR GOODALL:** 美丽的颜色。\n\n**MERLIN:** 是的。\n\n**MERLIN:** 一天结束后，我们总会聚在一起，来一杯日落酒，就是著名的苏格兰威士忌。\n\n**DR GOODALL:** 三个孙子孙女不经常聚在一起。\n\n**MERLIN:** 我大约21岁时和她一起尝试过，因为她对此非常严格。她说，不到21岁不行。现在她对我弟弟妹妹更宽松了。我们总是会一起喝威士忌，我非常珍惜那些时刻。\n\n**DR GOODALL:** 这天气不是很完美吗？真美。\n\n**MALE:** 我感谢古道尔博士，她认识到贫困是驱动环境破坏和退化的燃料。在我接下来的领导任期内，我将竭尽全力来协助这项运动。\n\n**DR COLLINS:** 当珍成为一名保护活动家时，她经历了政府更迭的问题。她与总统相处得非常好。这很棒。但是，“咻”，他走了。她不得不重新开始。这在某种程度上让她思考，年轻人是未来的政府。至少他们中的一些人最终会登上权力职位，所以她实际上有这两种策略。争取高层政府，同时也从年轻人开始。所以，1991年，“根与芽”就是在坦桑尼亚成立的。今天，它遍布全球。\n\n**DR GOODALL:** 在一百个国家，成千上万不同年龄的人参与到我们的“根与芽”运动中。齐心协力，我们可以改变世界。\n\n**DR GARROD:** 这是一种非常新的方法。以前没有人真正做过的是让孩子参与到保护中。现在，30多年后，每个人都在敲响这个鼓。我认为仅在英国就有$100$万孩子参加过“根与芽”项目。这是巨大的。这不是一场运动；这是一支军队。这是一种社会层面的思维方式。这都归功于珍。\n\n**DR GOODALL:** 从“根与芽”一开始，我的目标之一就是将来自不同文化的年轻人聚集在一起，温莎的这个小组非常特别。多达30名年轻人。他们组成小组。这是一个非常民主的过程，涉及参与和共识。然后他们回到各自的国家，并采取行动。\n\n**JESS:** 我们要自我介绍吗？\n\n**DR GOODALL:** 嗯？\n\n**JESS:** 我们要自我介绍吗？\n\n**DR GOODALL:** 是的，你们自我介绍。你们来自哪里。\n\n**JESS:** 当我年轻的时候，我以为我的声音太小了，我没有任何影响或能力来做出改变。但这真的是错误的思维。\n\n**DR GOODALL:** 我努力传授给年轻人的、我学到的东西是：不要对抗，要触及人们的心灵来改变他们的想法。不要因为你想要荣誉和荣耀而去做某事。\n\n**MAN:** 欢迎！\n\n**DR GOODALL:** 我们又见面了。\n\n**PRINCE HARRY:** 您好吗？\n\n**DR GOODALL:** 我很好，您呢？\n\n**DR GOODALL:** 殿下哈里王子要来了。这非常特别。他真的对我们正在做的事情感兴趣，当然，他以对非洲保护的浓厚兴趣而闻名。首先，我们非常兴奋您能来到这里，因为这表明了一种我们并不总是听到的兴趣程度。您可能记得，“根与芽”始于1991年，它的成立是因为我遇到了很多年轻人，他们对未来似乎没有太多希望。他们说，“因为你们，指的是老一代，已经损害了我们的未来，我们对此无能为力”我们应该感到羞耻，但我不认为我们真的对此无能为力。如果我们集体做出明智的选择，我们就能带来巨大的改变。\n\n**PRINCE HARRY:** 我们看到了所有的原木堆起来了，但是……\n\n**GIRL:** 就像，那是家园所在的地方。\n\n**DR GOODALL:** 把叶子拉起来。\n\n**JESS:** 是的，我认为我们真的需要努力培养孩子们在这个世界成长过程中正确的价值观，因为我们已经失去了对什么重要的认识，我们已经失去了与环境的联系，以及与他人的联系。这真的很重要。\n\n**PRINCE HARRY:** 各位，做得好。\n\n**DR GOODALL:** 它们是如此充满激情和奉献精神。正是它们给了我在一个黑暗世界中的希望。\n\n**PRINCE HARRY:** 您认为现在比以往任何时候都有更多的意识吗？\n\n**GIRL:** 是的，当然。\n\n**PRINCE HARRY:** 是吗？您认为改变可以由消费者主导吗？\n\n**DR GOODALL:** 我认为哈里王子对温莎这些年轻人的素质印象深刻，因为他们是由各自国家选拔出来的。他们代表着他们国家的“根与芽”小组，所以他们在到来之前就已经很优秀了。\n\n**PRINCE HARRY:** 珍，如果我可以说，我也同意年轻人拥有拯救我们星球的力量、同情心和工具。这就是“根与芽”项目如此鼓舞人心的原因。当我听说在座的各位都是一个由超过$150000$个“根与芽”小组组成的网络的一部分时，很容易看到在你们所居住的地方产生巨大影响的潜力，并一起延伸到全世界。我们对问题有所贡献，现在我们需要成为创造解决方案的人。正如我的祖母女王曾经说过的，有时候世界的问题太大，我们觉得我们帮不上什么忙。靠我们自己，我们无法结束战争，也无法消除不公正，但成千上万的小善举的累积影响可以比我们想象的更大。改变始于你。\n\n**DR GOODALL:** 等等，等等，等等。不，我要考考你。\n\n**PRINCE HARRY:** 哦，不。\n\n**DR GOODALL:** 你还记得黑猩猩的问候吗？\n\n**PRINCE HARRY:** 嗯，有点模糊。\n\n**DR GOODALL:** 来吧。拍我的头。\\[黑猩猩叫声\\]好了。做得好。\n\n**JESS:** 我过去在了解我们面临的这些问题时，会感到非常愤怒，以及人们普遍缺乏行动和缺乏领导力。而珍实际上在我这段旅程中是一个非常重要的人物，因为她传达的希望信息是如此强大，她传达的每个人都很重要，每个人都能带来改变的信息是赋能的。\n\n**PRINCE HARRY:** 你们真的是池塘里的一块石头，对吗？涟漪效应。\n\n**DR GOODALL:** 对，是的。\n\n**PRINCE HARRY:** 你们所做的一切，所说的一切，都会对周围的每个人产生影响。\n\n**DR GOODALL:** 谢谢你的到来，哈里。\n\n**PRINCE HARRY:** 再见，各位。\n\n**ALL:** 再见。\n\n**GIRL:** 我希望我让您感到骄傲了。\n\n**DR GOODALL:** 你们确实让我感到骄傲了。\n\n### 核心项目：庇护所、社区与青年 (续)\n\n**GRUB:** 我记得有一段时间，她放松得多，可以在家度过很多时间。嗨。欢迎回来。您想喝咖啡还是茶？然后一切都变了。我想是在90年代初，实际上，最主要的是一种愤怒，她对世界上的情况感到非常愤怒，这就是激发她热情的原因。\n\n**DR GOODALL:** 1990年我飞越贡贝上空时，看到贡贝这个微小的森林绿洲被完全光秃秃的山丘包围，令人震惊。我越来越多地了解到生活在黑猩猩栖息地周围许多人的困境， crippling poverty (极度贫困)，随着人口增长，缺乏良好的医疗和教育设施。土地在退化。\n\n**BILL:** 贡贝真的只是一张邮票。它不到30平方英里。它是一个被人群包围的微小区域。\n\n**JACK:** 人类是生态的巨大决定因素。我们正在成为一个入侵物种。不仅在贡贝，而且在全世界都是如此。\n\n**DR GOODALL:** 就在那一刻，我明白了：如果我们不帮助人们找到不破坏环境的生存方式，我们甚至无法尝试拯救黑猩猩。我很高兴今天能来到这里见到你们所有人。\n\n**DR GARROD:** 当珍真正开始从事保护工作时，它的目标非常不同。当时是当地社区和环保主义者之间的“我们”和“他们”的模式。\n\n**DR WRANGHAM:** 珍是最早认识到，为了开展有效的保护，你不仅要与当地人接触，你还必须通过保护努力，积极地改善他们的生活的人之一。\n\n**DR GOODALL:** 因此，这导致了JGI的社区保护方法，我们称之为“关爱”（Take Care）或TACARE。一种非常整体的方法。\n\n**DR GOODALL:** 那么，一、二、三，米基（Meekee）……\n\n**EMMANUEL:** 这让她被接受了。\n\n**DR GOODALL:** 当今保护领域最大的问题之一是栖息地的破碎化。坦桑尼亚剩余的大约$2000$只黑猩猩中，大多数不在保护区内，当我1990年飞越贡贝时，很明显，黑猩猩与其他黑猩猩是隔绝的。\n\n**DR GARROD:** 但为了在接下来的$100$年或$1000$年中取得长期成功，它们还需要在基因上可行。因此，创建森林走廊，这些小片区域、这些小股林带、这些连接这些小绿色岛屿的小鞋带，可以实现这种连通性。\n\n**DR GOODALL:** 这已经开始奏效，因为当地社区看到了这对他们自己的未来有价值。\n\n**DR GOODALL:** 哦，大约三次？\n\n**MALE:** 三次。\n\n**DR PINTEA:** 我们开始使用的首批技术之一是卫星图像。社区地图绘制过程，它为我们谈论景观、资源、什么重要、它是如何变化的，开启了惊人的可能性。\n\n**DR GOODALL:** 随着村民们开始看到这些卫星地图后发生的第一件事是，他们必须制定土地使用管理计划。\n\n**DR GOODALL:** 所有村庄都提供了志愿者来成为森林监测员，并使用智能手机，他们共同决定要记录非法砍伐的树木、动物陷阱。\n\n**DR GOODALL:** 现在村民们正在监测和保护他们自己的森林，这给了黑猩猩生存的机会。一群人明白重新造林的重要性，明白保护森林不仅是为了拯救野生动物，也是为了他们自己的未来。他们明白了这一点。\n\n**DR PINTEA:** 当我看着基加利村（Kigalye Village）的卫星图像，开始看到那些树木重新长回来时，这是大自然再生的力量。它看起来很美，森林正在变得越来越大。所以非常感谢您给予我们所有人希望。\n\n**DR COLLINS:** 长期效果正在扩散。其他非政府组织现在也在模仿。有模仿者。所以我们对此感到非常自豪。\n\n**DR GOODALL:** 谢谢。祝您旅途平安。\n\n**DR GOODALL:** 我在雨林中学到了一切都是相互关联的。试图通过划出一块土地并将人们赶走来拯救黑猩猩是徒劳的。现在一些残留的黑猩猩群体沿着走廊移动出来。去年，我想是两只，也许现在是三只，来自外部的雌性进来了，它们正在为贡贝的黑猩猩提供新的希望。\n\n### 核心项目：庇护所、社区与青年 (续)\n\n**RODNEY:** 我们在刚果建造这个孤儿黑猩猩庇护所时，有一个愿景，那就是这只是更大图景的一部分。\n\n**DR GOODALL:** 钦潘加最初只有几只来自布拉柴维尔动物园的黑猩猩。即使在今天，他们仍然面临着孤儿黑猩猩的巨大问题。所以当丽贝卡·阿滕西亚（Rebeca Atencia）同意来接管钦潘加时，一切都变得更好了。\n\n**DR GOODALL:** 她是一名兽医，并建立起了钦潘加。现在我们在河上有三个岛屿，黑猩猩可以在那里过上更野生的生活，这完全令人惊叹。\n\n**DR ATENCIA:** 在钦潘加庇护所，我们有$137$只黑猩猩。我们拥有非洲最大的庇护所。\n\n**DR GOODALL:** 她必须应对生病和垂死的黑猩猩。她必须应对带着可怕伤口进来的幼崽，这绝非易事。一点也不容易。\n\n**DR ATENCIA:** 我接到一个电话，他们说请，我们有这样一个案例，两只黑猩猩，它们已经被圈养了这么多年。请问，您的庇护所有空间接收这两只黑猩猩吗？\n\n**DR GOODALL:** 令人难过的是，当某些努力失败时。\n\n**DR ATENCIA:** 有很多黑猩猩被圈养，情况非常糟糕。把箱子靠近门？黑猩猩需要进入它们的宿舍。同时，当她进入宿舍时，我们会关上门。\n\n**DR ATENCIA:** 我们很累，我们想要水，我们说，已经很晚了，但我们非常高兴，因为我们在这里，在刚果，在钦潘加，它们和我们在一起。现在这些黑猩猩安全了。\n\n**DR GOODALL:** 当你将黑猩猩从一个地方移动到另一个地方时，无论在何种情况下，这对它们来说都是一种压力。因此，有不同的应对方式。有时是两只互相是朋友的黑猩猩，可以互相作伴。\n\n**DR ATENCIA:** 我们想看看它们与它们的反应。我们想看看它们的行为。看看是正常的黑猩猩行为，还是它们在和占主导地位的雄性在一起时会有任何问题，因为它们从未和占主导地位的雄性在一起过。有时这并不容易。\n\n**DR ATENCIA:** 我一直希望它们能有一个好的群体，也许我们可以将它们融入其中一个岛屿。但我们需要等待。这取决于每一个个体。在那之后，我们打算将她与我们在森林里的三个小宝宝融合在一起。她将在这里的森林里度过一段时间，学习如何在这里移动，如何爬树，如何吃一些天然的水果。那是，那个宝宝的未来。\n\n**DR GOODALL:** 我见过太多在我手中幸存下来，经历过可怕待遇的黑猩猩，令人惊奇的是，它们中的几乎每一个都设法形成某种社会群体。获救并获得另一次机会的动物是如此绝对的非凡。\n\n### 个人代价与不懈使命 (续)\n\n**MERLIN:** 我一年只能见到珍两次。所以她每次在我身边，都非常特别。说实话，你永远不知道明天，或者后天会发生什么，我不确定我还有多少时间可以和珍在一起，所以我和她一起度过的每一个时刻，以及她极其繁忙的日程，都是一个珍贵的时刻。我在珍·古道尔研究所工作，在普古（Pugu）开发自然教育中心，普古就在达累斯萨拉姆的郊区。它曾经是贯穿东非海岸的森林的一部分。我们的中心，森林那一侧都是绿色的，另一侧是这些带屋顶的房子。有很多发展正在发生。很多人涌入城市，空间非常稀缺。我们想要做的是带那些通常没有机会沉浸在森林中并感受联系的孩子们进来。我们去看看实验室。因为如果你不在那里，如果你看不到它，你就看不到它的价值。你就无法建立联系。如果你没有建立联系，看不到价值，那么你就不会关心。如果你不关心，你就不会采取任何行动来帮助保护它。\n\n**HENDRY:** 我叫亨德里·迈克尔·卡尼亚马（Hendry Michael Kanyama）。我十岁。快$11$岁了。这个地方叫普古。我以前从未来过这里。当我听到通知时，我想，这是什么？这是个什么地方？\n\n**MAN:** 我们都知道森林，对吧？我们都知道树木？但树木是从哪里来的？所以这些是树苗圃。那么我们在做什么？我们在培育幼苗，好吗？好的，现在我们走吧。\n\n**HENDRY:** 当我进入五年级时，我非常害怕，因为是新一年级，来自不同学校的新同学。\n\n**MAN:** 哦，你发现了一些叶子。它上面好像有一些毛发。\n\n**HENDRY:** 是的。\n\n**MAN:** 所以它可以……\n\n**HENDRY:** 是的。我看到了这个俱乐部，“根与芽”，然后我们开始做很酷的活动，所以我说这很棒，我要留在这里。\n\n**GIRL:** 谢谢。\n\n**HENDRY:** 孩子们，我们是下一代，对吧？现在我们需要开始将我们的想法传达给成年人，这样当他们去世后，我们站在前面，我们会记得我们在十岁时说过的话。\n\n**WOMAN:** 这些是保护地球免受气候变化影响的$17$个目标。\n\n**MAN:** 所以每个小组将至少选择一到两个目标。\n\n**MERLIN:** 谈论砍伐树木以及砍伐树木如何影响气候行动。\n\n**DR GOODALL:** 我们做到了。\n\n**MERLIN:** 我想他们完全投入了。是的，他们很喜欢。嘿，伙计们，请注意一下。\n\n**MAN:** 注意！你们中有多少人知道我们这位特邀嘉宾的名字？\n\n**GIRL:** 珍·古道尔。\n\n**MAN:** 真的吗？哇，太棒了。\n\n**HENDRY:** 珍·古道尔，她，当人们谈论大自然的理论时，我想她就是——她就是大自然之母。\n\n**BOY:** 亲爱的大自然母亲，感谢您的水。它维持着我们所有的身体功能。感谢您的动物，它们是我们的伴侣，向我们展示爱，并教导我们如何玩耍和亲近大地。\n\n**HENDRY:** 珍博士，她已经拯救世界将近$86$年了。明年她就要$86$岁了。我想告诉她，她需要保持健康，这样她就可以继续“根与芽”，成为有史以来最温暖人心的大自然母亲。是的。\n\n**DR GOODALL:** 没有大自然母亲，我们就无法生存，就像你说的，我们得到了水，我们得到了干净的空气。我们每一个人都很重要。我们每一个人都有自己的角色要扮演。\n\n**MERLIN:** 所以，如果我们能在孩子们成长时接触到他们，这就是我们通过“根与芽”项目正在做的，那么你就有机会真正触及某人的内心。当这些孩子们长大后，他们将担任权威和决策的职位。水里有什么样的生命？水下有什么？\n\n**GIRLS:** 鱼。\n\n**MERLIN:** 好的，还有什么？\n\n**DR GOODALL:** 说实话，我没有给梅林太多建议。我想他从听我与年轻人交谈中学到了很多，但他自己也有这种特质。黑猩猩！\n\n**PEOPLE:** 黑猩猩！\n\n**DR GOODALL:** 猴子！\n\n**PEOPLE:** 猴子！\n\n**DR GOODALL:** 种一棵树！\n\n**PEOPLE:** 种一棵树！\n\n**DR GOODALL:** 你需要过来拿威士忌。好了。这是孙子孙女们做的很有趣的事情，不是吗？我有趣的到达方式。看这个！那是你的，对吗？H先生，你想要威士忌吗？你值得拥有。给你。\n\n**DR GOODALL:** “谢谢”，他说。好了。天空的颜色真美。当我离开后，我已经足够努力地工作了，世界各地有成百上千的年轻人，他们已经在接管了。他们正在外面努力。\n\n**DR GOODALL:** 这么多珍宝！它们都应该被装裱起来……\n\n**MAN:** 放在一个地方。\n\n**MARY:** 是的，嗯，它们最终会的。我们的珍·古道尔博物馆正在筹备中。\n\n**DR GOODALL:** 我在这个星球上生活了将近$86$年，我觉得我一生都在努力工作。我充满激情。\n\n**MARY:** 你的很多书都在上面，还有各种语言版本，当然不是全部。\n\n**DR GOODALL:** 我就是我，我觉得我有一个需要传达的信息，我被放置在这个星球上就是为了做这件事，我必须做，我不能放弃。因为我不是一个失败主义者，这只会使我成功的决心更强。从未想过放弃。如果我放弃了，我将永远失去所有的自尊。\n\n**DR GARROD:** 你想让我帮你打开它吗？看看他写了什么？\n\n**DR GOODALL:** 看看他写了什么。\n\n**DR GARROD:** 珍·古道尔太棒了。\n\n**DR GOODALL:** 珍·古道尔太棒了。哦，看！\n\n**DR GARROD:** 哦，他给你写了一整封信！\n\n**DR GOODALL:** 读给我听。\n\n**DR GARROD:** 致珍，我写信给您是因为我被您迷住了。您是有史以来最酷的女性。我长大后会像您一样，卢卡（Luca）。\n\n**DR GOODALL:** 成为珍·古道尔会让人感到非常不知所措。我的意思是，有如此多的爱倾注在我身上。\n\n**MAN:** 非常感谢！\n\n**DR GOODALL:** 嗨。给你。\n\n**DR GOODALL:** 这变得完全压倒性。\n\n**MAN:** 我是您的忠实粉丝，但我相信您一直听到这样的话。\n\n**DR GOODALL:** 这总比听到“我恨你”要好，不是吗？\n\n**MAN:** 这是真的！非常真实。\n\n**DR GOODALL:** 但在某一时刻，我想，好吧，这会帮助我做我正在做的事情。\n\n**DR GARROD:** 我们今晚的嘉宾绝对不需要介绍。珍·古道尔博士。\n\n**DR GOODALL:** 前几天有人问我：“你的下一个冒险是什么？”我的下一个冒险是什么？所以我说，嗯，死亡。现场出现了一种惊愕的沉默。我说：“好吧，当你死去时，要么什么都没有，在这种情况下很好，结束了，你不再知道了，要么有什么东西。”我碰巧相信不仅仅只有这一个物质生命。我不知道还有什么，但如果这是真的，那还有什么比这更伟大的冒险呢？\n\n**MICHAEL:** 这个使命，它不是黑猩猩。拜托。它是地球。我们是它的管理者，我们必须照顾好它。\n\n**DR COLLINS:** 她是一个榜样，因为如果气馁，失去希望，无所作为，我们都会沉沦。\n\n**MERLIN:** 她是连接我们所有人的催化剂。\n\n**MARY:** 她就是有那种魔力，能激励人们改变他们的生活方式并提供帮助。\n\n**MUNAWAR:** 我想成为像珍·古道尔一样的，世界上的第二个神奇女侠。\n\n**DR GARROD:** 珍·古道尔只有一个。但你可以有点像珍，我想就是这样。我想我们都可以立志有点像珍，那就是她的影响力。\n\n**DR GOODALL:** 这场气候危机，是我们星球上的一个关键时刻。很多人都明白这个问题，但他们无所作为，因为他们感到无助。因为就算我捡起垃圾又怎样？就算我关掉水龙头又怎样？就算我在购物时考虑做出道德选择又怎样？就算怎样？如果只有我一个人，那就完全不会有任何区别。但这不是真的，我们正开始做得更好。希望取决于我们很快一起采取行动。我们所有人。我们每一个人。我们都必须尽自己的一份力。我们必须一起行动。我们必须快速一起行动。在“根与芽”开始的坦桑尼亚的每一次活动结束时，我发现年轻人有一种结束的方式，他们会说，“齐心协力，我们可以拯救世界！”所以我说，“是的，我们能，但我们会吗？”所以现在，他们说，“齐心协力，我们能，齐心协力，我们必将！”所以，如果我们关心，如果我们相信，我们所有人都能做到吗？齐心协力，我们能，齐心协力，我们必将拯救世界！谢谢你们。感谢你们成为我对未来希望的一部分。这就是让我坚持下去的原因。观众带来了巨大的不同。\n\n\n---\n\n## 概要\n\n### 缘起：从科学家到偶像\n\n- 珍·古道尔童年时深受一本关于杜立德医生（Doctor Dolittle）的书的启发，梦想着去非洲。\n- 1960年7月，26岁的珍·古道尔受英国人类学家路易斯·李奇（L.S.B. Leakey）博士的委托，前往东非观察黑猩猩的日常生活。\n- 她取得了突破性的发现，首次确凿地证明了未经训练的黑猩猩不仅会使用工具，还会制造工具。\n- 李奇博士对此评价道：“我们必须重新定义人类、重新定义工具，或者接受黑猩猩也是人类。”\n- 古道尔认为，黑猩猩在很多方面与人类相似，它们会通过拥抱、亲吻、牵手等方式进行交流。\n- 她在森林中感受到了强烈的精神力量，并认识到万物是相互关联的。她认为，如果人类有灵魂，那么黑猩猩也同样拥有。\n\n### 转折：从研究者到行动家\n\n- 1986年，一场关于黑猩猩保护的会议成为她职业生涯的转折点。\n- 会议揭示了严峻的现实：森林被破坏，人类不断侵占黑猩猩的栖息地，以及为获取幼崽而射杀母猩猩的动物交易依然存在。\n- 20世纪初，野生黑猩猩的数量约为200万，而到1980年代，这一数字锐减至原来的十分之一左右。\n- 古道尔意识到自己必须利用其影响力来帮助这些将她置于此地位的生物。\n- 她说：“我以科学家的身份参加了那次会议……离开时，我成了一名活动家。”\n\n### 行动哲学：触动人心与务实合作\n\n- 古道尔的核心理念是，要改变人们的想法，争论是无用的，必须触及他们的内心。\n- 她采取务实的策略，即使这意味着与被视为“坏人”的组织合作，例如与康菲（Conoco）石油公司合作，为获救的黑猩猩建造庇护所。\n- 她相信，通过与开采公司合作，可以帮助他们以更好的方式运作。\n- 她的工作是在世界各地激励人们并促使他们采取行动。\n\n### 核心项目：庇护所、社区与青年\n\n- **Tchimpounga黑猩猩庇护所**\n    - 建立的起因是古道尔在布拉柴维尔动物园看到了极其恶劣的条件，一只名叫格雷瓜尔（Gregoire）的黑猩猩自1944年起就被关在笼子里。\n    - 在康菲公司的帮助下，庇护所得以建成，并通过一次大规模的空运，将动物园的黑猩猩转移到了新家。\n- **社区保护项目TACARE**\n    - 古道尔意识到，如果不帮助当地民众找到不破坏环境的生存方式，就无法拯救黑猩猩。\n    - JGI（珍·古道尔研究所）因此推出了名为TACARE的社区保护方法，这是一种整体性的策略，通过卫星图像帮助村民制定土地使用管理计划，并由村民志愿者担任森林监督员。\n    - 目标是建立森林走廊，连接孤立的黑猩猩种群，从而保证其基因多样性。\n- **“根与芽”（Roots \u0026 Shoots）青年项目**\n    - 该项目始于1991年的坦桑尼亚，起因是古道尔发现许多年轻人对未来感到绝望。\n    - 项目旨在赋权年轻人，让他们认识到每个人都很重要，每天都能通过自己的选择对地球产生影响。\n    - 如今，“根与芽”项目已遍布全球约100个国家。\n\n### 个人代价与不懈使命\n\n- 自1986年以来，古道尔每年有超过300天在旅行。\n- 她承认自己并不享受这种生活，但认为这是她能与大众交流的唯一方式。\n- 她认为自己被选中成为一名信使，有责任传递信息，因此必须坚持下去。\n- 即使年事已高，她也认为时间紧迫，必须加快步伐。\n\n### 科学遗产与希望的传递\n\n- 古道尔的工作改变了科学界对动物的态度，证明了人类并非唯一拥有个性、思想和情感的物种。\n- 黑猩猩与人类共享$98.6\\%$的DNA。\n- 她与美国国立卫生研究院（NIH）等机构沟通，最终促使NIH大幅减少对黑猩猩的侵入性研究，并将大部分黑猩猩安置到庇护所。\n- 她最大的希望在于人类的智慧和年轻一代。她相信，当头脑与心灵和谐共事时，人类才能发挥出真正的潜力。\n- 她认为，尽管世界面临危机，但希望在于集体行动。她以“我们能做到，我们必将做到！”（Together we can, together we will!）的口号来激励人们。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"jane-goodall-hope-national-geographic\",\"slugSegments\":[\"notes\",\"to-modify\",\"jane-goodall-hope-national-geographic\"],\"pathSegments\":[\"notes\",\"to-modify\",\"jane-goodall-hope-national-geographic\"],\"urlPath\":\"/rosetta/notes/to-modify/jane-goodall-hope-national-geographic\",\"href\":\"/rosetta/notes/to-modify/jane-goodall-hope-national-geographic\",\"category\":\"to-modify\",\"title\":\"珍·古道尔：从黑猩猩研究者到全球环保信使\",\"date\":\"2026-01-27\",\"excerpt\":\"本片记录了珍·古道尔博士从坦桑尼亚贡贝国家公园的黑猩猩研究者转变为全球环保活动家的非凡历程。1986年的一次会议成为她人生的转折点,此后她将毕生精力投入到野生动物保护与青年赋权事业中,创立根与芽项目,倡导每个人通过日常选择为地球带来改变,传递希望与万物相连的理念。\",\"coverImage\":\"$undefined\",\"author\":\"国家地理\",\"original\":\"古道尔-希望-国家地理.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"珍·古道尔\",\"黑猩猩保护\",\"环境保护\",\"纪录片\",\"根与芽\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[\"/rosetta/humanity/jane-goodall-hope-national-geographic/\"],\"weight\":\"$undefined\",\"data\":{\"title\":\"珍·古道尔：从黑猩猩研究者到全球环保信使\",\"excerpt\":\"本片记录了珍·古道尔博士从坦桑尼亚贡贝国家公园的黑猩猩研究者转变为全球环保活动家的非凡历程。1986年的一次会议成为她人生的转折点,此后她将毕生精力投入到野生动物保护与青年赋权事 n\",[\"$\",\"li\",null,{\"children\":\"珍·古道尔童年时深受一本关于杜立德医生（Doctor Dolittle）的书的启发，梦想着去非洲。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"1960年7月，26岁的珍·古道尔受英国人类学家路易斯·李奇（L.S.B. Leakey）博士的委托，前往东非观察黑猩猩的日常生活。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"她取得了突破性的发现，首次确凿地证明了未经训练的黑猩猩不仅会使用工具，还会制造工具。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"李奇博士对此评价道：“我们必须重新定义人类、重新定义工具，或者接受黑猩猩也是人类。”\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"古道尔认为，黑猩猩在很多方面与人类相似，它们会通过拥抱、亲吻、牵手等方式进行交流。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"她在森林中感受到了强烈的精神力量，并认识到万物是相互关联的。她认为，如果人类有灵魂，那么黑猩猩也同样拥有。\"}],\"\\n\"]}]\n158:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"转折从研究者到行动家-1\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#转折从研究者到行动家-1\",\"children\":\"转折：从研究者到行动家\"}]}]\n159:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\""])</script><script>self.__next_f.push([1,"1986年，一场关于黑猩猩保护的会议成为她职业生涯的转折点。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"会议揭示了严峻的现实：森林被破坏，人类不断侵占黑猩猩的栖息地，以及为获取幼崽而射杀母猩猩的动物交易依然存在。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"20世纪初，野生黑猩猩的数量约为200万，而到1980年代，这一数字锐减至原来的十分之一左右。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"古道尔意识到自己必须利用其影响力来帮助这些将她置于此地位的生物。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"她说：“我以科学家的身份参加了那次会议……离开时，我成了一名活动家。”\"}],\"\\n\"]}]\n15a:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"行动哲学触动人心与务实合作\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#行动哲学触动人心与务实合作\",\"children\":\"行动哲学：触动人心与务实合作\"}]}]\n15b:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"古道尔的核心理念是，要改变人们的想法，争论是无用的，必须触及他们的内心。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"她采取务实的策略，即使这意味着与被视为“坏人”的组织合作，例如与康菲（Conoco）石油公司合作，为获救的黑猩猩建造庇护所。\"}],\"\\n\",[ ,{\"children\":\"她与美国国立卫生研究院（NIH）等机构沟通，最终促使NIH大幅减少对黑猩猩的侵入性研究，并将大部分黑猩猩安置到庇护所。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"她最大的希望在于人类的智慧和年轻一代。她相信，当头脑与心灵和谐共事时，人类才能发挥出真正的潜力。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"她认为，尽管世界面临危机，但希望在于集体行动。她以“我们能做到，我们必将做到！”（Together we can, together we will!）的口号来激励人们。\"}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"11:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nd:null\n"])</script><script>self.__next_f.push([1,"162:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"f:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"珍·古道尔：从黑猩猩研究者到全球环保信使 | Linguista\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"本片记录了珍·古道尔博士从坦桑尼亚贡贝国家公园的黑猩猩研究者转变为全球环保活动家的非凡历程。1986年的一次会议成为她人生的转折点,此后她将毕生精力投入到野生动物保护与青年赋权事业中,创立根与芽项目,倡导每个人通过日常选择为地球带来改变,传递希望与万物相连的理念。\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"珍·古道尔,黑猩猩保护,环境保护,纪录片,根与芽\"}],[\"$\",\"link\",\"3\",{\"rel\":\"canonical\",\"href\":\"https://linguista.cn/rosetta/notes/to-modify/jane-goodall-hope-national-geographic/\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:title\",\"content\":\"珍·古道尔：从黑猩猩研究者到全球环保信使 | Linguista\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:description\",\"content\":\"本片记录了珍·古道尔博士从坦桑尼亚贡贝国家公园的黑猩猩研究者转变为全球环保活动家的非凡历程。1986年的一次会议成为她人生的转折点,此后她将毕生精力投入到野生动物保护与青年赋权事业中,创立根与芽项目,倡导每个人通过日常选择为地球带来改变,传递希望与万物相连的理念。\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:url\",\"content\":\"https://linguista.cn/rosetta/notes/to-modify/jane-goodall-hope-national-geographic/\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:site_name\",\"content\":\"Linguista\"}],[\"$\",\"meta\",\"8\",{\"property\":\"og:locale\",\"content\":\"zh_CN\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:image\",\"content\":\"https://linguista.cn/img/rosetta-social.png\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:image:alt\",\"content\":\"珍·古道尔：从黑猩猩研究者到全球环保信使\"}],[\"$\",\"meta\",\"11\"
