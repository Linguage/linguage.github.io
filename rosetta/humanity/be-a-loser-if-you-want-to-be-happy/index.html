用性比直接追求幸福更能带来持久的满足，真正的成功来自创造价值而非追逐情绪\n\n**做一个失败者**：在主流社会标准下显得格格不入，敢于违背父母期望、朋友质疑去追随自己的兴趣和事业，反而通向真正的幸福\n\n### why fitting in will make you unsuccessful\n\n[\n\n![DAN KOE's avatar](https://substackcdn.com/image/fetch/w_36,h_36,c_fill,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F7591b09e-6d83-4960-a71c-e2060766c42a_728x728.jpeg)\n\n\n\n](https://substack.com/@thedankoe)\n\n[DAN KOE](https://substack.com/@thedankoe)\n\nJun 13, 2025\n\n241\n\n[\n\n18\n\n](https://letters.thedankoe.com/p/be-a-loser-if-you-want-to-be-happy/comments)\n\n29\n\nIf you want to be happy, be a loser.\n\nLet your parents think you're stupid for not following their path.\n\nStart the business even when your friends don't believe in you.\n\nStudy the interests that nobody else seems to care about.\n\nBecause the Western notion of success is wrong. The life you want doesn't lie on the other end of a degree, a high-paying job, a calendar full of social obligations and events, vapid relationships to hide your loneliness, buying more things, or rotting your brain with entertainment.\n\nThe eastern notion of success is also wrong. Rejecting the manifest world to discover the intricacies of your inner world is a valid pursuit. More valid than ever, but it often leads to people rejecting an entire dimension of reality, closing them off to a deeper happiness that can't be found through an isolated spirituality.\n\nLife doesn't reduce down to only a Western doing, nor an Eastern being, but an integration of them both as becoming.\n\nNow, \"happiness\" is a confusing term.\n\nEveryone has their own interpretations and definitions for it, and frankly, there will never be a time when you can sustain a peak state of happiness. That's not how the mind works. Happiness can only exist when compared to a sad reference point. Happiness is a _state_ of consciousness. A state is not permanent.\n\nFor that reason, let's use the term \"success\" for a bit and define it in a way that finally allows you to start acting toward a better life.\n\n---\n\nSubtle reminder:\n\nThe build a profitable personal brand in 30 days challenge starts in 4 days.\n\nIf you have interests, skills, or expertise you want to share with the world to build a modern career, [consider enrolling.](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)\n\n## A New Paradigm Of Success\n\n\u003e Pursuing usefulness will make you a lot happier than pursuing happiness.\n\nThe dictionary definition of success is circular:\n\n\"A degree or measure of succeeding.\"\n\nOr, \"Favorable or desired outcome.\"\n\nThis makes sense for achieving something on the micro scale, like the tangible goal of making $1,000, since you can see that in your bank account, but what happens when we apply it to the macro scale?\n\nWhen you search for further definitions of success, you get a bunch of blog articles giving you 19 definitions for success that involve something along the lines of: _challenge yourself, learn, grow, always do your best, and have a place you call home._\n\nWow. Very wise. Much insight.\n\nBut when we dig deeper into the 4 dimensions of reality, we discover a much more useful application that transcends the shallow self-help interpretations that have plagued us for the past decade.\n\n[\n\n![](https://substackcdn.com/image/fetch/w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F21949844-fcad-484e-96fd-9a8fd0477e3c_1000x1000.png)\n\n\n\n](https://substackcdn.com/image/fetch/f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F21949844-fcad-484e-96fd-9a8fd0477e3c_1000x1000.png)\n\nThe four dimensions, or perspectives, of reality are:\n\n- **Internal individual (Subjective)** – our emotions, thoughts, and experiences.\n    \n- **External individual (Objective)** – how we measure our brain or body's behavior, which often correlates with our experiences (i.e., dopamine signaling a feeling of motivation).\n    \n- **Internal collective (Subjective)** – the shared values, morals, or beliefs of a group. Culture is a shared mind, in a sense.\n    \n- **External collective (Objective)** – economic, political, and social systems that keep civilization together.\n    \n\nI call these \"dimensions\" because they each develop as a natural hierarchy of increasing complexity and depth – like the exterior quadrants moving from atoms to molecules to cells to organisms and the interior moving from egocentric to ethnocentric to worldcentric value systems.\n\n[\n\n![](https://substackcdn.com/image/fetch/w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fa3e9961c-7e21-4736-8ddb-be364943090a_1099x736.png)\n\n\n\n](https://substackcdn.com/image/fetch/f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fa3e9961c-7e21-4736-8ddb-be364943090a_1099x736.png)\n\nWestern thought tends to value the objective, scientific, and materialistic which influences the subjective – the culture we are raised in which influences our outlook on the world. We reduce the world to atoms and chase material success.\n\nEastern thought tends to value the opposite. Master the internal world, cultivate community, and flow with the external.\n\nThe problem with both of these is that they tend to reject the validity of either side rather than taking what is useful from all to orient our lives in a meaningful way.\n\nIf you reduce higher states of consciousness (internal individual) to simple neurotransmitters that stem from a brain composed of atoms, it is rare that you will ever experience or even register those states, let alone reach a higher baseline of development that adds a layer of peace and enjoyment to your life.\n\nIf you are conditioned to write off money, science, and the pursuit of status, the ramifications are twofold: One, you allow people less conscious than you to build the world you live in, which by your standards is \"evil.\" Two, you are unable to solve the problems that can't be solved by letting go and meditating, which pile drive you into a further state of stress, dampening your spirituality. Material problems often can't be solved with a purely spiritual solution.\n\nIf we look to psychology, neuroscience, perennial philosophy, and the current state of modern life – covering all dimensions – we find that a potential definition for happiness is the combination of progress being made, a contribution to something greater than yourself, and the ability to manage emotional turbulence.\n\nThe dopamine from achieving goals, the fulfillment from helping others, and mastering how you respond to external triggers and internal rumination is a rather solid argument for what should be included in your life – at least for what we can fit into a sentence that sounds nice.\n\nThis poses both a problem and a question:\n\nFirst, society is structured in such a way that by the time you enter adulthood, your mind is conditioned with beliefs of success. This version of success comes from getting an education to be trained into a specific role within that society until you've \"done your time\" and are able to stop working.\n\nSecond, how do we pursue a new version of success?\n\nOne that prevents us from looking back at our choices with regret?\n\nlatest paid post: the full one-person business launchpad course\n\nSubscribe\n\n## The Key To Success Is Being A Useful Loser\n\n\u003e To transform the world, we must begin with ourselves; and what is important in beginning with ourselves is the intention. The intention must be to understand ourselves and not to leave it to others to transform themselves or to bring about a modified change through revolution, either of the left or of the right.\n\u003e \n\u003e – Krishnamurti\n\nIf you want control over your happiness, you must have control over your life.\n\nAnd while full control isn't always possible, at bare minimum you must accept that you can influence how successful you are by auditing the choices you make.\n\nThe choice of all choices is to reject the path laid out for you at birth.\n\nTo act with intention. To generate goals rather than accept them. To see advice, opinions, and beliefs that others may project on you as a small piece of the map, not the territory, and definitely not the law.\n\nBut when you check the box of this life task, others will not be happy because they have not done the same. They do not have a semblance of control over their mind. They will do anything in their power to make you feel as if you are wrong, dumb, and misled. They will perceive you as a loser even when they silently yearn to join you.\n\n### 1) Master Yourself\n\nAlmost nobody practices the one habit that makes all the difference:\n\nSelf-reflection.\n\nI can suggest how to improve yourself, but nothing will ever trump an unclouded awareness of past mistakes. Because once you are aware – brutally aware – of the mistake, it doesn't happen again. The more mistakes you gain awareness of, the more you move in the direction you were meant to.\n\nTo master your _individual, internal_ world is the foundation of how you interact with the external world at large. If you want money, you must develop yourself to be useful enough to a community, system, or organization. If you don't want to be lonely, you must do the same to find worthy friends and partners.\n\nHow do you pursue self-mastery?\n\nYou level up.\n\n\"Developmental lines\" are like abilities on a skill tree in a video game.\n\n[\n\n![](https://substackcdn.com/image/fetch/w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fcbc29c35-0c8b-474a-8def-0d95ed9c8055_1000x1000.png)\n\n\n\n](https://substackcdn.com/image/fetch/f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fcbc29c35-0c8b-474a-8def-0d95ed9c8055_1000x1000.png)\n\nOnce you reach a certain level of experience, you can choose to add \"points\" to traits like intellect and stamina. Doing so unlocks more opportunities. It makes life easier by replacing shallow problems with deep.\n\nIn developmental psychology, there is a large list of lines that can be developed. Here's what AI spat out for me:\n\n**Core Lines:**\n\n- **Cognitive Line** - Mental reasoning, logic, and conceptual thinking\n    \n- **Moral Line** - Ethical reasoning and care/justice orientations\n    \n- **Emotional Line** - Emotional intelligence and maturity\n    \n- **Spiritual Line** - Spiritual intelligence and transpersonal development\n    \n- **Interpersonal Line** - Social skills and relationship intelligence\n    \n- **Psychosexual Line** - Sexual and intimate relationship development\n    \n- **Self-Identity Line** - Sense of self and ego development\n    \n\n**Additional Lines:**\n\n- **Aesthetic Line** - Artistic appreciation and creative expression\n    \n- **Somatic Line** - Bodily awareness and physical intelligence\n    \n- **Values Line** - What individuals consider important or meaningful\n    \n- **Needs Line** - Hierarchy of human needs and motivations\n    \n- **Worldview Line** - How one sees and interprets reality\n    \n- **Mathematical Line** - Numerical and spatial reasoning\n    \n- **Musical Line** - Musical intelligence and appreciation\n    \n- **Kinesthetic Line** - Body-movement intelligence\n    \n\nThere is a crucial point I want to make here, and it may sound crazy.\n\nMany people place thinkers and gurus of the past on a pedestal. The thing is, many of them max out one line – the spiritual or contemplative line – and neglect the rest. There are various cases of teachers we regard as wise who are verifiably sexist, racist, and, on a more practical note, are so locked into whatever worldview they have that they demonize money as a necessary part of modern life.\n\nWe don't live in a single location, within a specific culture, with limited access to information anymore. We are connected to the world's knowledge and a melting pot of worldviews.\n\nThe above-average person in today's world has the potential to become more developed than any other being in history.\n\nDo not take that for granted.\n\n### 2) True Education\n\nTrue education is not memorization, it's discovery.\n\nTrue education occurs once you realize that when you are told what to learn, you don't learn a thing, so you take matters into your own hands and become your own teacher.\n\nWhen you study the information given to you within a system, the information biases the outcome of that system. You did not create the curriculum. You did not fund the curriculum. And no matter how much you attempt to justify it, the current education system built on the foundation of industrial values has the purpose of creating useful workers. If you do not self-educate with interest as your compass, the default option is to narrow your attention on that end goal. You miss out on opportunities that are tailor-made for you.\n\nTrue education is the pursuit of truth.\n\nTruth is not found in the words uttered from someone else's mouth.\n\nAnd while there is no _right_ way to learn, you can't go wrong by following nature's compass:\n\n- Pursue a self-generated goal (high in interest and meaning)\n    \n- Break that down into the core skills necessary to achieve it\n    \n- Break those down into the fundamentals\n    \n- Spend 40+ hours experimenting with _techniques_\n    \n- Note which get results for your situation, note which don't\n    \n- Reflect on your progress often, refine your goal, continue learning\n    \n\nKnowledge is the hypothesis, practice is the experiment, results are the data. A study of the external grounded through the internal.\n\nYou must study enough to have conviction in a guess as to what gets results, then realize that skill acquisition is actually _technique stacking_.\n\nYou don't \"learn\" PhotoShop, AI, or writing.\n\nYou have a goal. You find a technique to try, like using a writing framework or a specific way to select an object you want to mask. You see if it works for the unique context of _your_ mind and situation.\n\nYou add the technique to your toolbox and continue on until you can create enough value to do what you want for a living.\n\n### 3) Modern Belonging\n\nLoneliness has its place.\n\nBrief periods of isolation and focus are incredible for developing independent thought. But that does not change the fact that we are social creatures. I'd like to think it's undisputed at this point that a sense of belonging is a basic need that follows food, water, shelter, and a stable environment.\n\nThe downside of the information age is that the world is so fragmented.\n\nRare is it that you will find people with similar interests and goals in your physical location, because rare has it been that we can discover such interests thanks to the information we are exposed to.\n\nNow, as enticing as it seems to desire a past generation (i.e. \"I was born in the wrong generation!\") that's quite literally impossible to make real. You are here. You are in this beautiful world of technology and interconnectedness. You just need to learn how to use it in a way that doesn't turn you into a drooling bag of bones hooked up to a dopamine IV.\n\nFor all of social media's downsides, it makes up for it in our ability to curate who we receive information from and form relationships with almost anyone who has an internet connection.\n\nThe solution is simple: reduce randomness.\n\nThe For You page built to grab your attention at all costs must be used sparingly to discover people who share your interests. Once they are found, connect with them. Save their feed somewhere safe. Dive deeper into what they teach.\n\nAs illustrated with self-mastery, interpersonal relationships is a developmental line. There is no quick fix to becoming someone who can talk to anyone. I'll write another letter on that at some point.\n\nUntil then, let's tie this all together.\n\n### 4) Contribute To Society\n\nYou are improving yourself (individual interior).\n\nYou are pursuing truth (individual exterior).\n\nYou are cultivating community (collective interior).\n\nAll of which blend in various ways leading to a deep sense of fulfillment.\n\nBut there is one more piece. The one that everyone struggles with.\n\nThe system. The game. The corporate careers. The talked-about-way-too-much-to-the-point-of-it-becoming-annoying fact that “everyone” hates their jobs.\n\nThe \"what do I do with my life?\"\n\nLet's make this almost too simple:\n\n_Find the intersection of what you care about and what others care about._\n\nThe act of creation. That's what ties everything together. Becoming valuable. Taking your mind and molding it into something worth sharing with the world. Not being assigned what to create, but choosing what to create.\n\nBut again, if we make the critical mistake of prioritizing one dimension over another, we end up a starving artist. We create to please our ego. We justify our creative desire with regurgitated ideas about being authentic and creating what _you_ want. Again, by doing this, you are unconsciously choosing to impose more problems on yourself and relinquishing your ability to solve them.\n\nA more worthwhile goal is to get paid for being yourself.\n\nThere are two parts to that:\n\n- Becoming someone who is valuable enough to pay\n    \n- Understanding the desires of others to create something they care about enough to pay for\n    \n\nIn most cases, this requires entrepreneurship.\n\nI have no gripes with climbing the ladder until you can find a 1% job that gives you the autonomy – a documented psychological need – to create what you want.\n\nBut if you take a critical look at the world, you will see that when I say \"the opportunity has never been higher,\" it is not just a cliche thrown around by people who don't understand your situation.\n\nEveryone reading this has an internet connection.\n\nTherefore, everyone reading this has the ability to put their knowledge, interests, and creations out into the world.\n\nFrom there, all you need to do is refer back to the process of self-education.\n\nThe internet is a giant feedback loop.\n\nIf people don't care about what you have to offer, that is but a problem that can be identified, hypothesized, turned into an experiment, and solved.\n\nThank you for reading.\n\nI hope this was insightful.\n\n– Dan\n\nOne more thing.\n\nIf you want to try the path of entrepreneurship, the '[build a profitable personal brand in 30 days](https://stan.store/thedankoe/p/build-a-profitable-personal-brand-in-30-days)' challenge starts in 4 days.\n\nAs lame as personal branding may sound, it encapsulates everything we've discussed here: self-mastery to become valuable, self-education to have something worth saying, finding like-minded people you won't find elsewhere, and getting paid to be yourself.\n\nConsider joining if that sounds useful.\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"be-a-loser-if-you-want-to-be-happy\",\"slugSegments\":[\"notes\",\"to-modify\",\"be-a-loser-if-you-want-to-be-happy\"],\"pathSegments\":[\"notes\",\"to-modify\",\"be-a-loser-if-you-want-to-be-happy\"],\"urlPath\":\"/rosetta/notes/to-modify/be-a-loser-if-you-want-to-be-happy\",\"href\":\"/rosetta/notes/to-modify/be-a-loser-if-you-want-to-be-happy\",\"category\":\"to-modify\",\"title\":\"想要幸福，就做一个失败者\",\"date\":\"2025-06-13\",\"excerpt\":\"文章挑战了传统的成功与幸福观念，指出西方追求物质成就和东方纯粹内观灵修都存在局限。作者主张将内在存在与外在行动整合为一种成为的状态，并通过现实的四个维度——主观个体、客观个体、主观集体和客观集体——重新定义成功，从而超越浅层的自我提升话语，走向更深层的生命理解。\",\"coverImage\":\"$undefined\",\"author\":\"Dan Koe\",\"original\":\"if you want to be happy, be a loser.md\",\"o ur brain with entertainment.\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The eastern notion of success is also wrong. Rejecting the manifest world to discover the intricacies of your inner world is a valid pursuit. More valid than ever, but it often leads to people rejecting an entire dimension of reality, closing them off to a deeper happiness that can't be found through an isolated spirituality.\"}],\"\\n\",\"$L19\",\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\",\"\\n\",\"$L4b\",\"\\n\",\"$L4c\",\"\\n\",\"$L4d\",\"\\n\",\"$L4e\",\"\\n\",\"$L4f\",\"\\n\",\"$L50\",\"\\n\",\"$L51\",\"\\n\",\"$L52\",\"\\n\",\"$L53\",\"\\n\",\"$L54\",\"\\n\",\"$L55\",\"\\n\",\"$L56\",\"\\n\",\"$L57\",\"\\n\",\"$L58\",\"\\n\",\"$L59\",\"\\n\",\"$L5a\",\"\\n\",\"$L5b\",\"\\n\",\"$L5c\",\"\\n\",\"$L5d\",\"\\n\",\"$L5e\",\"\\n\",\"$L5f\",\"\\n\",\"$L60\",\"\\n\",\"$L61\",\"\\n\",\"$L62\",\"\\n\",\"$L63\",\"\\n\",\"$L64\",\"\\n\",\"$L65\",\"\\n\",\"$L66\",\"\\n\",\"$L67\",\"\\n\",\"$L68\",\"\\n\",\"$L69\",\"\\n\",\"$L6a\",\"\\n\",\"$L6b\",\"\\n\",\"$L6c\",\"\\n\",\"$L6d\",\"\\n\",\"$L6e\",\"\\n\",\"$L6f\",\"\\n\",\"$L70\",\"\\n\",\"$L71\",\"\\n\",\"$L72\",\"\\n\",\"$L73\",\"\\n\",\"$L74\",\"\\n\ with the external.\"}]\n35:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The problem with both of these is that they tend to reject the validity of either side rather than taking what is useful from all to orient our lives in a meaningful way.\"}]\n36:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"If you reduce higher states of consciousness (internal individual) to simple neurotransmitters that stem from a brain composed "])</script><script>self.__next_f.push([1,"of atoms, it is rare that you will ever experience or even register those states, let alone reach a higher baseline of development that adds a layer of peace and enjoyment to your life.\"}]\n37:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"If you are conditioned to write off money, science, and the pursuit of status, the ramifications are twofold: One, you allow people less conscious than you to build the world you live in, which by your standards is \\\"evil.\\\" Two, you are unable to solve the problems that can't be solved by letting go and meditating, which pile drive you into a further state of stress, dampening your spirituality. Material problems often can't be solved with a purely spiritual solution.\"}]\n38:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"If we look to psychology, neuroscience, perennial philosophy, and the current state of modern life – covering all dimensions – we find that a potential definition for happiness is the combination of progress being made, a contribution to something greater than yourself, and the ability to manage emotional turbulence.\"}]\n39:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The dopamine from achieving goals, the fulfillment from helping others, and mastering how you respond to external triggers and internal rumination is a rather solid argument for what should be included in your life – at least for what we can fit into a sentence that sounds nice.\"}]\n3a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"This poses both a problem and a question:\"}]\n3b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"First, society is structured in such a way that by the time you enter adulthood, your mind is conditioned with beliefs of success. This version of success comes from getting an education to be trained into a specific role within that society until you've \\\"done your time\\\" and are able to stop working.\"}]\n3c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Second, how do we pursue a new version of success?\"}]\n3d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"One that prevents us "])</script><script>self.__next_f.push([1,"from looking back at our choices with regret?\"}]\n3e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"latest paid post: the full one-person business launchpad course\"}]\n3f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Subscribe\"}]\n40:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"the-key-to-success-is-being-a-useful-loser\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#the-key-to-success-is-being-a-useful-loser\",\"children\":\"The Key To Success Is Being A Useful Loser\"}]}]\n41:[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"To transform the world, we must begin with ourselves; and what is important in beginning with ourselves is the intention. The intention must be to understand ourselves and not to leave it to others to transform themselves or to bring about a modified change through revolution, either of the left or of the right.\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"– Krishnamurti\"}],\"\\n\"]}]\n42:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"If you want control over your happiness, you must have control over your life.\"}]\n43:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"And while full control isn't always possible, at bare minimum you must accept that you can influence how successful you are by auditing the choices you make.\"}]\n44:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The choice of all choices is to reject the path laid out for you at birth.\"}]\n45:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"To act with intention. To generate goals rather than accept them. To see advice, opinions, and beliefs that others may project on you as a small piece of the map, not the territory, and definitely not the law.\"}]\n46:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"But when you check the box of this life task, others will not be happy because they have not done the same. They do not have a semblance of control over their mind. They will do a"])</script><script>self.__next_f.push([1,"nything in their power to make you feel as if you are wrong, dumb, and misled. They will perceive you as a loser even when they silently yearn to join you.\"}]\n47:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"1-master-yourself\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#1-master-yourself\",\"children\":\"1) Master Yourself\"}]}]\n48:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Almost nobody practices the one habit that makes all the difference:\"}]\n49:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Self-reflection.\"}]\n4a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"I can suggest how to improve yourself, but nothing will ever trump an unclouded awareness of past mistakes. Because once you are aware – brutally aware – of the mistake, it doesn't happen again. The more mistakes you gain awareness of, the more you move in the direction you were meant to.\"}]\n4b:[\"$\",\ }],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"58:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"There is a crucial point I want to make here, and it may sound crazy.\"}]\n59:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Many people place thinkers and gurus of the past on a pedestal. The thing is, many of them max out one line – the spiritual or contemplative line – and neglect the rest. There are various cases of teachers we regard as wise who are verifiably sexist, racist, and, on a more practical note, are so locked into whatever worldview they have that they demonize money as a necessary part of modern life.\"}]\n5a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"We don't live in a single location, within a specific culture, with limited access to information anymore. We are connected to the world's knowledge and a melting pot of worldviews.\"}]\n5b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The above-average person in today's world has the potential to become more developed than any other being in history.\"}]\n5c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Do not take that for granted.\"}]\n5d:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"2-true-education\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#2-true-education\",\"children\":\"2) True Education\"}]}]\n5e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"True education is not memorization, it's discovery.\"}]\n5f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"True education occurs once you realize that when you are told what to learn, you don't learn a thing, so you take matters into your own hands and become your own teacher.\"}]\n60:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"When you study the information given to you within a system, the information biases the outcome of that system. You did not create the curriculum. You did not fund the curriculum. And no matter how much you attempt to justify it, the current education system built on the foundation of industrial values has th"])</script><script>self.__next_f.push([1,"e purpose of creating useful workers. If you do not self-educate with interest as your compass, the default option is to narrow your attention on that end goal. You miss out on opportunities that are tailor-made for you.\"}]\n61:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"True education is the pursuit of truth.\"}]\n62:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Truth is not found in the words uttered from someone else's mouth.\"}]\n63:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"And while there is no \",[\"$\",\"em\",null,{\"children\":\"right\"}],\" way to learn, you can't go wrong by following nature's compass:\"]}]\n"])</script><script>self.__next_f.push([1,"64:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Pursue a self-generated goal (high in interest and meaning)\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Break that down into the core skills necessary to achieve it\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Break those down into the fundamentals\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Spend 40+ hours experimenting with \",[\"$\",\"em\",null,{\"children\":\"techniques\"}]]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Note which get results for your situation, note which don't\"}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Reflect on your progress often, refine your goal, continue learning\"}],\"\\n\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"65:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Knowledge is the hypothesis, practice is the experiment, results are the data. A study of the external grounded through the internal.\"}]\n66:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"You must study enough to have conviction in a guess as to what gets results, then realize that skill acquisition is actually \",[\"$\",\"em\",null,{\"children\":\"technique stacking\"}],\".\"]}]\n67:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"You don't \\\"learn\\\" PhotoShop, AI, or writing.\"}]\n68:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"You have a goal. You find a technique to try, like using a writing framework or a specific way to select an object you want to mask. You see if it works for the unique context of \",[\"$\",\"em\",null,{\"children\":\"your\"}],\" mind and situation.\"]}]\n69:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"You add the technique to your toolbox and continue on until you can create enough value to do what you want for a living.\"}]\n6a:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"3-modern-belonging\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#3-modern-belonging\",\"children\":\"3) Modern Belonging\"}]}]\n6b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Loneliness has its place.\"}]\n6c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Brief periods of isolation and focus are incredible for developing independent thought. But that does not change the fact that we are social creatures. I'd like to think it's undisputed at this point that a sense of belonging is a basic need that follows food, water, shelter, and a stable environment.\"}]\n6d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The downside of the information age is that the world is so fragmented.\"}]\n6e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Rare is it that you will find people with similar interests and goals in your physical location, because rare has it been that we can discover such "])</script><script>self.__next_f.push([1,"interests thanks to the information we are exposed to.\"}]\n6f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Now, as enticing as it seems to desire a past generation (i.e. \\\"I was born in the wrong generation!\\\") that's quite literally impossible to make real. You are here. You are in this beautiful world of technology and interconnectedness. You just need to learn how to use it in a way that doesn't turn you into a drooling bag of bones hooked up to a dopamine IV.\"}]\n70:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"For all of social media's downsides, it makes up for it in our ability to curate who we receive information from and form relationships with almost anyone who has an internet connection.\"}]\n71:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The solution is simple: reduce randomness.\"}]\n72:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The For You page built to grab your attention at all costs must be used sparingly to discover people who share your interests. Once they are found, connect with them. Save their feed somewhere safe. Dive deeper into what they teach.\"}]\n73:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"As illustrated with self-mastery, interpersonal relationships is a developmental line. There is no quick fix to becoming someone who can talk to anyone. I'll write another letter on that at some point.\"}]\n74:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Until then, let's tie this all together.\"}]\n75:[\"$\",\"h3\",null,{\"classNam
