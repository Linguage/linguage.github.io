**代理性（Agentic）**：区别于传统代码补全，Claude Code 能理解指令、自主规划并执行多步骤任务，涵盖从需求理解到测试和版本控制的完整链路\n\n**Claude.md 记忆系统**：通过多层级 Markdown 配置文件向 AI 传递项目上下文、编码规范和工作指令，支持团队共享与个人私有配置\n\n**MCP（多代理通信协议）**：Claude Code 支持的扩展协议，可作为服务器或客户端连接数据库、文档等外部工具，拓展 AI 编码能力边界\n\n**扩展思考（Extended Thinking）**：一种高级提示策略，要求 AI 先阅读文件再暂停思考和头脑风暴，最后再编码，以获得更优质的输出结果\n\n**投资回报率思维**：将 AI 编码工具的使用成本视为对工程师生产力的投资，通过合理选择模型和订阅计划平衡效能与开支\n\n\n\n\n**Claude Code：重塑开发范式的 AI 编码代理**\n\n在人工智能飞速发展的今天，AI 技术正以前所未有的深度和广度渗透到各行各业，软件开发领域亦不例外。Anthropic 公司推出的 Claude Code，作为一款基于终端的 AI 编码代理，正以其独特的定位和强大的功能，挑战着传统的开发模式，并预示着软件工程未来的新图景。它不仅仅是一个代码补全工具，更是一个能够理解复杂指令、自主规划并执行多步骤任务的智能伙伴，旨在与开发者现有的工具链无缝集成，从而极大地提升生产力。\n\n**一、核心定位与价值主张：从助手到代理的范式跃迁**\n\nClaude Code 的核心价值在于其“代理性”（Agentic）。传统的 AI 代码助手，如集成开发环境（IDE）中的代码补全，大多停留在提供代码行或小段代码建议的层面。而 Claude Code 则致力于成为一个真正的“编码代理”。\n\n1.  **超越代码补全的“代理”角色：**\n    正如资料中反复强调的，“Claude Code 不仅仅是完成代码行或几行代码，它更具代理性。它会理解用户的查询，并使用 Bash、文件编辑等工具探索代码库、读取文件、获取所需上下文，然后编辑文件并进行更改。” 这种能力使其能够处理从需求理解到代码实现、再到测试和版本控制的完整任务链。它能“探索信息、彻底完成任务以及有效组合不同工具”，这是其与传统工具最根本的区别。\n\n2.  **“原始工具”与“力量工具”的哲学：**\n    Anthropic 将 Claude Code 定位为一个“原始”（Primitive）或“力量”（Power）工具。这意味着它旨在“为高级用户提供强大的工作负载工具”，提供对底层 AI 模型能力的直接访问。这种设计哲学允许开发者将其像 Unix 实用工具一样组合和编排到更广泛、更复杂的工作流中，例如“并行处理大量任务”或“修复数千个 lint 违规”。\n\n3.  **无缝集成现有生态，降低认知负荷：**\n    Claude Code 的一个核心设计原则是“无需您采用新的工具或集成开发环境（IDE）”。它巧妙地利用了开发者最为熟悉的终端作为主要交互界面，并能轻松集成到现有的 IDE（如 VS Code、Cursor）、版本控制系统（Git）和持续集成/持续部署（CI/CD）流程中，最大限度地减少了开发者的学习曲线和工具迁移成本。\n\n4.  **生产力倍增器与普惠赋能：**\n    通过自动化繁琐的编码任务、辅助复杂逻辑的实现、快速构建原型，Claude Code 的目标是将开发者生产力提升“2倍，甚至更多”。更深远的影响在于，它还有可能赋能非技术人员，如“传播团队成员也可以利用 Claude Code 提交 Bug 修复和 PR”，极大地降低了软件开发的门槛，实现了更广泛的技术普惠。\n\n**二、关键能力与核心特性：构建智能编码的基石**\n\nClaude Code 的强大功能源于其精心设计的核心特性和与开发生态的深度集成。\n\n1.  **深度工具链集成：打造无摩擦体验**\n    *   **终端原生，无处不在：** 作为一款命令行界面（CLI）工具，Claude Code “可在任何终端中运行，例如 iTerm2、Apple Terminal，甚至在 SSH 或 TMUX 会话中”。它“利用终端作为最通用的接口，因为它具有灵活性并已融入每个开发人员的工作流程中”。\n    *   **IDE 增强体验：** 当在 IDE（如 VS Code、Cursor）的内置终端中运行时，Claude Code 的能力得到进一步增强。“它会变得更强大”，例如可以直接在 IDE 中“显示文件编辑”，并“利用 IDE 提供的更多信号来提高 Claude 的智能性”。\n    *   **版本控制 (Git) 协同：** Claude Code 与 Git 配合默契，这是使用它时最重要的“安全网”。用户可以要求 Claude “在每次重大更改后进行提交，并自动编写提交信息”。这种频繁提交的习惯，结合 Git Worktrees（“使用 Git worktrees 来运行多个 Claude Code 实例处理不同的功能分支”），使得开发者能够大胆尝试，并在出现问题时轻松回滚。\n    *   **GitHub Actions \u0026 CI/CD 系统集成：** Claude Code 可以无缝嵌入到 GitHub Actions 和其他 CI 系统中，“以便在后台执行任务，例如修复问题、编写测试和创建拉取请求（PR）”。通过 `/install GitHub Action` 命令，可以将其集成到 GitHub 仓库，允许通过 `@mention Claude` 在问题或 PR 中触发自动化操作。\n    *   **MCP 服务器与外部工具扩展：** Claude Code 支持多代理通信协议（MCP），既可以作为 MCP 服务器，也可以作为客户端。“它可以连接到各种 MCP 服务器，例如用于数据库交互的 Postgres 服务器，或用于提供最新文档（如 Cloudflare 的文档）的服务器”。此外，其“Web Fetch 功能允许其获取 URL 内容”，从而可以从外部获取知识或文档辅助编码，例如通过读取 unorules.com 来编码 Uno 游戏逻辑。\n\n2.  **智能记忆与指令系统：精确传达意图**\n    *   **`Claude.md` 文件——核心记忆与指令中枢：** 这是 Claude Code 最具特色的功能之一。`Claude.md` 文件是 Claude 的“记忆”，也是向其传递项目上下文和指令的强大方式。它是一个 Markdown 文件，开发者可以在其中定义“常用 Bash 命令、样式指南、Linting 规则、测试运行方式以及仓库规范”。\n        *   **多层级配置：** `Claude.md` 文件可以放置在仓库根目录（团队共享）、`Claude.local.md`（个人私有，不提交到版本控制）、用户主目录下的 `.Claude` 文件夹内（全局共享，跨项目），甚至在任何嵌套子目录中（Claude 会自动拉取相关指令）。\n        *   **自动化生成与维护：** `/init` 命令可以“扫描当前目录并自动生成一个 Claude.md 文件，总结代码库结构”，极大地方便了现有项目的接入。同时，建议“定期重构 Claude.md 文件，确保其简洁、具体，避免冗余信息”。\n    *   **记忆模式 (`#`)——动态指令捕获：** 在与 Claude 的交互过程中，用户可以通过键入 `#` 符号进入记忆模式，“告诉 Claude 记住特定指令（例如，‘每次更改代码时都要运行 linter’）”，这些指令随后会被整合到相应的记忆文件中。\n    *   **斜杠命令 (`Slash Commands`)——任务自动化快捷方式：** 用户可以在 `~/.Claude/commands` 文件夹中定义自定义的斜杠命令。这些命令本质上是“提示模板”，可以接受参数，用于快速执行常见的开发任务，如“重构、Linting 或代码审查”。\n\n3.  **灵活的 AI 模型选择与高级交互：驾驭强大模型**\n    *   **多模型支持与动态切换：** Claude Code 支持 Anthropic 旗下的多种模型，如功能强大的 Opus、性能均衡的 Sonnet，以及用于后台优化（如上下文压缩、文件摘要）的 Haiku。用户可以通过 `/model` 命令在不同模型间切换，以适应不同的“速度、成本和能力需求”。例如，“Claude Sonnet 4 (Sonnet)：虽然功能上稍逊于 Opus，但价格更经济实惠，是大多数用户日常工作流程的推荐选择”，而“Claude Opus 4 (Opus)：是最强大的编码模型……然而，它的运行成本非常高”。\n    *   **高级提示策略——引导 AI 深度思考：** 仅仅给出任务是不够的，有效的提示是发挥 AI潜能的关键。\n        *   **规划先行：** “在使用 Claude Code 编程之前，先要求它制定计划”。让 Claude “集思广益，列出处理问题的方案，并先征求你的同意”，这有助于校准双方意图。\n        *   **扩展思考（Extended Thinking）：** 要求 Claude “先阅读相关文件，然后暂停思考和头脑风暴，最后再开始编码”。这种分阶段的思考方式能带来更好的结果。\n        *   **特定指令短语：** 使用如“ultra think”、“architect plan and implement”等短语引导 Claude 进行更深入的思考和规划。\n        *   **格式化提示：** “将提示词格式化为 Markdown 或 XML，模型会更好地遵循指令”。\n    *   **实时反馈与中断控制：** 开发者并非被动接受者。在 Claude 执行任务时，“可以通过发送消息来添加额外指令，它会将其纳入考量”。如果发现方向错误，“应立即按下 escape 键中断它，然后要求它撤销操作并提供更明确的指令”。\n    *   **操作审批机制：** 对于关键操作，如文件删除，Claude Code 会请求用户批准。用户可以选择“yes, yes and don't ask again for mk command in this directory”，从而对常用且安全的命令实现自动执行，Claude 会“记住这些偏好”。\n\n4.  **成本与效率优化：平衡效能与投入**\n    *   **精明模型选择：** 日常工作推荐使用 Sonnet 模型，其成本“约为 Opus 的五分之一”。Opus 模型虽然强大，但“一次不到一小时的会话可能花费超过 50 美元”，因此仅建议在复杂任务或对成本不敏感时使用。\n    *   **订阅计划的经济性：** 相较于按 API 调用量付费（可能“一天内烧掉 20-80 美元”），Claude Max 订阅计划（如每月 100 美元的 Max 5X 或 200 美元的 Max 20X）通常“更为划算”，能满足大部分用户的“无限”使用需求。\n    *   **上下文窗口精细化管理：** “密切关注自动压缩指示器”，并在任务完成或提交代码等“自然断点处手动进行压缩，以释放令牌”。同时，“尽量利用外部文件作为知识来源，而不是将所有信息都塞入对话上下文”。\n    *   **投资回报率（ROI）思维：** Anthropic 鼓励用户将 Claude Code 的成本视为对工程师生产力的投资。如果能带来“50-70%”的生产力提升，那么即使是“每天 6 美元”的平均成本也是值得的。\n    *   **OpenTelemetry 支持：** 对于团队而言，Claude Code 支持 OpenTelemetry，“可以将其连接到 DataDog 等工具来生成使用情况仪表板”，实现精细化的成本和使用情况监控。\n\n**三、高效工作流实践：与 AI 协同的新范式**\n\n掌握 Claude Code 的核心功能后，更重要的是将其融入日常工作流，形成高效的人机协作模式。\n\n1.  **任务分层与策略化处理：**\n    *   **简单任务（如编写测试、小型 bug 修复）：** 可以“直接在 GitHub Issues 中 @Claude”，或者在终端中开启多个 Claude 实例并使用“自动接受模式（auto-accept mode）”，任务完成后会收到通知。\n    *   **复杂任务（大部分工程工作）：** 建议“在 IDE 终端中运行 Claude”，当它遇到困难或代码不完美时，人工介入在 IDE 中进行“最后几公里”的编辑和完善。\n\n2.  **计划驱动的协作 (`tasks/todo.md`)：**\n    创建一个如 `tasks/to-do.md` 的文件，作为与 Claude 协调工作的中心。先让 Claude “制定计划”并写入该文件。当文件发生更改时，“Claude 会感知文件的变化，并能实时适应更新”。这提供了一种轻量级的项目管理系统，实现了异步工作流。\n\n3.  **迭代学习与预期校准：**\n    用户需要一个“学习期来校准 Claude 能‘一次性’或‘两次性’完成哪些任务”。随着模型能力的增强（“每次新模型发布时，其能力都会增强”），用户应“重置其直觉，尝试让 Claude 完成更多任务”。\n\n4.  **“安全网”优先——版本控制的艺术：**\n    “版本控制（Git）：这是使用 Claude Code 最重要的‘安全网’”。\n    *   **频繁提交：** “要求 Claude 在每次重大更改后提交代码，甚至让它生成提交消息”，这有助于保存检查点，易于回溯。\n    *   **果断回滚：** 如果出现问题，“与其尝试修复，不如直接回滚到上一个有效提交点，然后用更精确的指令重新开始”。\n\n5.  **图像输入与视觉反馈循环：**\n    用户可以直接“拖拽图像到终端，或通过截图工具……粘贴图片”。这可用于提供 UI 设计稿（mockups）或将应用截图反馈给 Claude 进行迭代改进。结合 Puppeteer MCP server，“可以自动捕获应用程序的屏幕截图，并将其反馈给 Claude 以便迭代 UI 设计”，形成高效的视觉反馈循环。\n\n6.  **AI 辅助测试与质量保障：**\n    让 Claude Code “编写单元测试，它能非常快速地完成，确保代码的正确性”。结合类型系统（如 TypeScript）和 ORM（如 Drizzle, Prisma），可以为数据库提供类型安全，帮助 AI 更好地验证和改进代码质量。\n\n7.  **多代理并行与“振奋学习”：**\n    可以“同时运行多个 Claude Code 实例”，甚至让 Claude Code 启动子代理（subclaude）并行调查不同的解决方案。在 Claude Code 工作时，开发者也无需空闲，可以在 Cursor 等 IDE 中，“同时使用其内置的 AI 聊天功能（如 Gemini 2.5 Pro）来询问问题，学习代码库概念，从而进行‘振奋学习’（vibe learning）”，减少技术债。\n\n**四、挑战与未来展望：迈向更智能的软件工程**\n\n尽管 Claude Code 展现出巨大的潜力，但在其发展过程中也面临一些挑战，并指明了未来的发展方向。\n\n1.  **当前挑战：**\n    *   **平台支持：** 目前主要支持 Linux 和 Mac，Windows 用户“推荐的解决方案是运行 Windows Subsystem for Linux (WSL)”。\n    *   **模型局限性：** 即使是最新模型，有时也会“过于字面化”地理解指令，或在“常识”方面有所欠缺。代码格式（制表符与空格）、合并冲突等问题有时仍需人工干预。\n    *   **成本与会话记忆：** 虽然订阅模式改善了成本可预测性，但用户仍需关注上下文管理。目前“Claude Code 目前没有会话间记忆”，最佳实践是让 Claude 将会话状态写入文本文件。\n\n2.  **未来发展方向：**\n    *   **更强大的自主性与复杂任务完成：** Anthropic 的核心愿景是让模型能够“以尽可能高的自主性完成越来越复杂的任务”。\n    *   **深化工具集成与生态协同：** “未来将致力于让 Claude Code 更好地与所有工具协同工作”，包括更深度的 GitHub 集成，如直接创建和管理 PR，甚至进行代码审查。\n    *   **聊天应用集成：** 设想未来用户能“直接在聊天界面中 @Claude 来解决问题，就像在 GitHub 中一样”。\n    *   **记忆架构的探索：** 尽管目前 `Claude.md` 是有效的记忆机制，但未来仍有探索“更复杂的外部记忆存储和知识图谱”的空间，尽管 Anthropic 当前倾向于模型本身最终会内化这些知识。\n\n**总结：**\n\nClaude Code 不仅仅是 Anthropic 在 AI 编码领域的一次技术展示，它更像是一场对未来软件开发工作方式的深刻探索。通过其强大的终端集成能力、高度的代理性、灵活的记忆与指令系统，以及对现有开发生态的尊重与融入，Claude Code 极大地提升了开发者的生产力，并为非技术人员参与软件开发提供了新的可能性。它正在推动软件开发从传统的“指令式编程”向更高级的“意图驱动、AI协作式编程”转变。\n\n尽管仍面临平台兼容性、模型局限性和成本管理等挑战，但 Claude Code 以其独特的“原始工具”定位和强大的“代理”能力，清晰地指明了 AI 辅助编程的未来方向——一个 AI 不再仅仅是助手，而是与开发者并肩作战、能够自主执行复杂任务的智能伙伴的时代。Anthropic 致力于将其打造成一款“强大且彻底”的工具，让开发者能够更专注于创新与创造，将更多的精力从繁琐的实现细节中解放出来，从而更高效地将想法变为现实。Claude Code 的旅程才刚刚开始，它所引领的这场开发范式革命，值得每一位技术从业者关注与期待。\n\n---\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"claude-code-ai-coding-agent-reshaping-development\",\"slugSegments\":[\"notes\",\"to-modify\",\"claude-code-ai-coding-agent-re \"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"代理性（Agentic）\"}],\"：区别于传统代码补全，Claude Code 能理解指令、自主规划并执行多步骤任务，涵盖从需求理解到测试和版本控制的完整链路\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Claude.md 记忆系统\"}],\"：通过多层级 Markdown 配置文件向 AI 传递项目上下文、编码规范和工作指令，支持团队共享与个人私有配置\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"MCP（多代理通信协议）\"}],\"：Claude Code 支持的扩展协议，可作为服务器或客户端连接数据库、文档等外部工具，拓展 AI 编码能力边界\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"扩展思考（Extended Thinking）\"}],\"：一种高级提示策略，要求 AI 先阅读文件再暂停思考和头脑风暴，最后再编码，以获得更优质的输出结果\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"投资回报率思维\"}],\"：将 AI 编码工具的使用成本视为对工程师生产力的投资，通过合理选择模型和订阅计划平衡效能与开支\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"Claude Code：重塑开发范式的 AI 编码代理\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在人工智能飞速发展的今天，AI 技术正以前所未有的深度和广度渗透到各行各业，软件开发领域亦不例外。Anthropic 公司推出的 Claude Code，作为一款基于终端的 AI 编码代理，正以其独特的定位和强大的功能，挑战着传统的开发模式，并预示着软件工程未来的新图景。它不仅仅是一个代码补全工具，更是一个能够理解复杂指令、自主规划并执行多步骤任务的智能伙伴，旨在与开发者现有的工具链无缝集成，从而极大地提升生产力。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"一、核心定位与价值主张：从助手到代理的范式跃迁\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Claude Code 的核心价值在于其“代理性”（Agentic）。传统的 AI 代码助手，如集成开发环境（IDE）中的代码补全，大多停留在提供代码行或小段代码建议的层面。而 Claude Code 则致力于成为一个真正的“编码代理”。\"}],\"\\n\",[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"超越代码补全的“代理”角色：\"}],\"\\n正如资料中反复强调的，“Claude Code 不仅仅是完成代码行或几行代码，它更具代理性。它会理解用户的查询，并使用 Bash、文件编辑等工具探索代码库、读取文件、获取所需上下文，然后编辑文件并进行更改。” 这种能力使其能够处理从需求理解到代码实现、再到测试和版本控制的完整任务链。它能“探索信息、彻底完成任务以及有效组合不同工具”，这是其与传统工具最根本的区别。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"“原始工具”与“力量工具”的哲学：\"}],\"\\nAnthropic 将 Claude Code 定位为一个“原始”（Primitive）或“力量”（Power）工具。这意味着它旨在“为高级用户提供强大的工作负载工具”，提供对底层 AI 模型能力的直接访问。这种设计哲学允许开发者将其像 Unix 实用工具一样组合和编排到更广泛、更复杂的工作流中，例如“并行处理大量任务”或“修复数千个 lint 违规”。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"无缝集成现有生态，降低认知负荷：\"}],\"\\nClaude Code 的一个核心设计原则是“无需您采用新的工具或集成开发环境（IDE）”。它巧妙地利用了开发者最为熟悉的终端作为主要交互界面，并能轻松集成到现有的 IDE（如 VS Code、Cursor）、版本控制系统（Git）和持续集成/持续部署（CI/CD）流程中，最大限度地减少了开发者的学习曲线和工具迁移成本。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"生产力倍增器与普惠赋能：\"}],\"\\n通过自动化繁琐的编码任务、辅助复杂逻辑的实现、快速构建原型，Claude Code 的目标是将开发者生产力提升“2倍，甚至更多”。更深远的影响在于，它还有可能赋能非技术人员，如“传播团队成员也可以利用 Claude Code 提交 Bug 修复和 PR”，极大地降低了软件开发的门槛，实现了更广泛的技术普惠。\"]}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"二、关键能力与核心特性：构建智能编码的基石\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Claude Code 的强大功能源于其精心设计的核心特性和与开发生态的深度集成。\"}],\"\\n\",[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"深度工具链集成：打造无摩擦体验\"}]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"终端原生，无处不在：\"}],\" 作为一款命令行界面（CLI）工具，Claude Code “可在任何终端中运行，例如 iTerm2、Apple Terminal，甚至在 SSH 或 TMUX 会话中”。它“利用终端作为最通用的接口，因为它具有灵活性并已融入每个开发人员的工作流程中”。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"IDE 增强体验：\"}],\" 当在 IDE（如 VS Code、Cursor）的内置终端中运行时，Claude Code 的能力得到进一步增强。“它会变得更强大”，例如可以直接在 IDE 中“显示文件编辑”，并“利用 IDE 提供的更多信号来提高 Claude 的智能性”。\"]}],\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\"]}],\"\\n\"]}],\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\"]}],\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\"]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"版本控制 (Git) 协同：\"}],\" Claude Code 与 Git 配合默契，这是使用它时最重要的“安全网”。用户可以要求 Claude “在每次重大更改后进行提交，并自动编写提交信息”。这种频繁提交的习惯，结合 Git Worktrees（“使用 Git worktrees 来运行多个 Claude Code 实例处理不同的功能分支”），使得开发者能够大胆尝试，并在出现问题时轻松回滚。\"]}]\n1b:[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"GitHub Actions \u0026 CI/CD 系统集成：\"}],\" Claude Code 可以无缝嵌入到 GitHub Actions 和其他 CI 系统中，“以便在后台执行任务，例如修复问题、编写测试和创建拉取请求（PR）”。通过 \",[\"$\",\"code\",null,{\"className\":\"rounded-none border border-border bg-placeholder/45 px-[6px] py-[2px] font-mono text-[0.9em] text-text\",\"children\":\"/install GitHub Action\"}],\" 命令，可以将其集成到 GitHub 仓库，允许通过 \",[\"$\",\"code\",null,{\"className\":\"rounded-none border border-border bg-placeholder/45 px-[6px] py-[2px] font-mono text-[0.9em] text-text\",\"children\":\"@mention Claude\"}],\" 在问题或 PR 中触发自动化操作。\"]}]\n1c:[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"MCP 服务器与外部工具扩展：\"}],\" Claude Code 支持多代理通信协议（MCP），既可以作为 MCP 服务器，也可以作为客户端。“它可以连接到各种 MCP 服务器，例如用于数据库交互的 Postgres 服务器，或用于提供最新文档（如 Cloudflare 的文档）的服务器”。此外，其“Web Fetch 功能允许其获取 URL 内容”，从而可以从外部获取知识或文档辅助编码，例如通过读取 unorules.com 来编码 Uno 游戏逻辑。\"]}]\n"])</script><script>self.__next_f.push(
