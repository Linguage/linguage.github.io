窗口，不吃早餐，通过控制饮食节奏来维持身体状态和精力水平\n\n**日程留白**：保持约10%的日程空闲，为意外机会、偶然交流和新想法留出空间，避免将时间排满导致错失重要事项\n\n## 你从事的工作\n* 方向比速度更重要——选择正确的事情去做是最重要的\n* 对世界建立自己坚定的独立见解\n* 在你的日程中留出足够的时间来思考要做什么\n* 根据别人喜欢做并且擅长做的事情来分配任务\n* 如果你长期不喜欢自己正在做的事情，可以考虑换一份主要工作\n* 与聪明、高效、快乐、不贬低你雄心壮志的人为伍\n* 职业生涯中的复利增长，50 年来微小的进步会产生巨大的差异\n\n## 优先次序\n* 三个关键支柱：“把重要的事情搞定”，“不要在愚蠢的事情上浪费时间”，以及“多列清单”\n* 使用书面清单来制定年度、月度和每日目标\n* 经常重新抄写清单以强迫自己思考优先事项\n* 由于时间成本巨大，避免参加大多数会议和研讨会\n* 保持 10% 的日程空闲，以应对偶然的相遇和新想法\n* 将会议安排在 15-20 分钟或 2 小时，而不是默认的 1 小时\n* 恰当地衡量你的时间价值——不要花费数小时去节省少量金钱\n* 专注于优化你的一年，而不是你的一天\n\n## 睡眠和锻炼\n* 生产力最重要的生理因素\n* 使用睡眠追踪器来优化睡眠模式\n* 配备优质床垫的阴冷、黑暗、安静的房间\n* 睡前避免进食或饮酒\n* 每周举重 3 次，每次一小时\n* 偶尔进行高强度间歇训练\n\n## 营养\n* 不吃早餐，进行 15 小时的日常禁食\n* 醒来后一杯浓缩咖啡，午餐后一杯（总共约 200 毫克咖啡因）\n* 坚决避免糖分，因为它会导致最糟糕的感觉\n* 避免会引发炎症或加重消化的食物\n\n## 工作空间和习惯\n* 自然光线，安静的环境，长时间不被打扰的工作时段\n* 学会快速打字并掌握键盘快捷键\n* 预料到偶尔会出现几周没有动力的情况——等待它过去\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"sam-altman-on-productivity\",\"slugSegments\":[\"notes\",\"to-modify\",\"sam-altman-on-productivity\"],\"pathSegments\":[\"notes\",\"to-modify\",\"sam-altman-on-productivity\"],\"urlPath\":\"/rosetta/notes/to-modify/sam-altman-on-productivity\",\"href\":\"/rosetta/notes/to-modify/sam-altman-on-productivity\",\"category\":\"to-modify\",\"title\":\"Sam Altman 谈生产力\",\"date\":\"2026-01-27\",\"excerpt\":\"Sam Altman 分享了他关于生产力的核心理念与实践方法，涵盖工作方向选择、优先级管理、睡眠与锻炼、营养习惯以及工作环境优化等方面。他强调方向比速度更重要，主张通过清单管理目标、保持身体健康、减少无效会议，并以年为单位优化时间分配，从而实现长期复利式的职业成长。\",\"coverImage\":\"$undefined\",\"author\":\"Sam Altman\",\"original\":\"Sam Altman 谈生产力.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"生产力\",\"时间管理\",\"优先级\",\"健康习惯\",\"职业发展\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[\"/rosetta/humanity/sam-altman-on-productivity/\"],\"weight\":\"$undefined\",\"data\":{\"title\":\"Sam Altman 谈生产力\",\"excerpt\":\"Sam Altman 分享了他关于生产力的核心理念与实践方法，涵盖工作方向选择、优先级管理、睡眠与锻炼
