\n\n##  多则不同\n\n**对称性破缺与科学层级结构的本质**\n\n还原论假说或许在哲学家中仍有争议，但在绝大多数活跃的科学家中，我认为它已被毫无疑问地接受了。我们心智和身体的运作，以及我们所了解的所有有生命或无生命的物质，都被假定受同一套基本定律的控制，除非在某些极端条件下，我们感觉对这些定律已经相当了解了。\n\n似乎不可避免地会不加批判地走向一个初看起来是还原论显而易见的推论：如果万物都遵循相同的基本定律，那么唯一在研究真正基础问题的科学家就是那些致力于研究这些定律的人。在实践中，这包括了一些天体物理学家、一些基本粒子物理学家、一些逻辑学家和其他数学家，以及少数其他人。这种观点是本文主要反对的，魏斯科普夫 (Weisskopf) 在一段相当著名的论述中表达了这一点 [1]：\n\n\u003e 审视二十世纪科学的发展，可以区分出两种趋势，我称之为“深度”研究和“广度”研究，因为缺乏更好的术语。简而言之：深度研究追求基本定律，广度研究致力于用已知基本定律解释现象。像往常一样，这种区分并非没有模糊之处，但在大多数情况下是清晰的。固态物理学、等离子体物理学，或许还有生物学，都属于广度研究。高能物理学和核物理学的很大部分属于深度研究。深度研究的数量总是远少于广度研究。一旦新的基本定律被发现，大量且不断增长的活动便开始，将这些发现应用于迄今未解释的现象。因此，基础研究有两个维度。科学的前沿沿着一条长线延伸，从最新、最现代的深度研究，经过由昨日深度研究催生的广度研究，直至基于过去几十年深度研究的、广阔且发展完善的广度研究活动网络。\n\n这种说法的有效性可以从以下事实中看出：我最近听到一位材料科学领域的领导者引用了它，他敦促一个致力于“凝聚态物理学中基本问题”会议的与会者接受这样一个观点：几乎没有或根本没有这类问题了，剩下的只有广度科学，而他似乎将其等同于器件工程。\n\n这种思维方式的主要谬误在于，还原论假说绝不意味着“建构论”假说：能够将万物还原为简单的基本定律，并不意味着能够从这些定律出发重建宇宙。事实上，基本粒子物理学家告诉我们越多关于基本定律的性质，这些定律似乎与科学其他领域的非常现实的问题，更不用说社会问题，就越缺乏关联性。\n\n建构论假说在面对尺度和复杂性这对双重困难时便会失效。事实证明，大量复杂的基本粒子集合体的行为，是不能通过简单外推少数粒子的性质来理解的。相反，在每一个复杂性层次上，全新的属性都会显现，而理解这些新行为所需的研究，我认为其基础性不亚于任何其他研究。也就是说，在我看来，人们可以根据这样一个理念将科学大致线性地排列在一个层级结构中：科学 X 的基本实体遵循科学 Y 的定律。\n\n| X                  | Y                  |\n| ------------------ | ------------------ |\n| 固态或多体物理学   | 基本粒子物理学     |\n| 化学               | 多体物理学         |\n| 分子生物学         | 化学               |\n| 细胞生物学         | 分子生物学         |\n| 心理学             | 生理学             |\n| 社会科学           | 心理学             |\n\n但这个层级结构并不意味着科学 X 仅仅是“应用 Y”。在每个阶段，全新的定律、概念和概括都是必需的，它们需要的灵感和创造力，与前一阶段相比毫不逊色。心理学不是应用生物学，生物学也不是应用化学。\n\n在我自己的多体物理学领域，我们或许比其他任何出现非平凡复杂性的科学领域都更接近我们的基础、深度的根基，因此我们已经开始构建一个关于这种从量变到质变是如何发生的普适理论。这个被称为“对称性破缺”理论的表述，可能有助于更普遍地阐明建构论（作为还原论的反面）的失效。我将对这些思想给出一个初步且不完整的解释，然后就其他层级上的类比和类似现象进行一些更具推测性的一般评论。\n\n在开始之前，我想澄清两个可能的误解来源。首先，当我说尺度变化引起根本性变化时，我并非指那个相当容易理解的观点，即新尺度上的现象可能实际遵循不同的基本定律——例如，广义相对论在宇宙学尺度上是必需的，而量子力学在原子尺度上是必需的。我想大家会接受，所有普通物质都遵循简单的电动力学和量子理论，这实际上涵盖了我将要讨论的大部分内容。（正如我所说，我们都必须从还原论开始，我完全接受这一点。）第二个混淆的来源可能是，对称性破缺的概念已被基本粒子物理学家借用，但他们使用这个术语严格来说是一种类比，这种类比是深刻的还是貌似有理的，仍有待理解。\n\n那么，让我从一个最简单层面上的例子开始我的讨论，这个例子对我来说很自然，因为我在读研究生时研究过它：氨分子。那时，每个人都知道氨，并用它来校准他们的理论或仪器，我也不例外。化学家会告诉你，氨“是”一个三角锥体结构\n\n![](https://jerkwin.github.io/pic/More-1.jpg)\n\n\n氮原子带负电荷，氢原子带正电荷，因此它具有一个电偶极矩 ($\\mu$)，负极指向锥体的顶点。这对我来说似乎非常奇怪，因为我当时正在学习，任何物体都没有电偶极矩。教授实际上是在证明原子核没有偶极矩，因为他教的是核物理，但由于他的论证是基于空间和时间的对称性，它们应该普遍适用。\n\n我很快了解到，事实上，它们是正确的（或者更准确地说，不是不正确的），因为他一直小心翼翼地说，系统的任何**稳态**（即不随时间变化的态）都没有电偶极矩。如果氨分子从上述不对称状态开始，它不会在其中停留很久。通过量子力学隧穿效应，氮原子可以泄漏穿过氢原子组成的三角形到达另一侧，使锥体由内向外翻转，而且，事实上，它可以非常迅速地做到这一点。这就是所谓的“翻转”，其频率约为每秒 $3 \\times 10^{10}$ 次。一个真正的稳态只能是这个不对称锥体与其翻转后形态的等量叠加。这种混合态没有偶极矩。（我再次提醒读者，我正在极大简化，并请他参考教科书获取细节。）\n\n我不打算详述证明过程，但结果是，系统的状态，如果要保持稳态，必须始终具有与其运动定律相同的对称性。原因可以很简单地表述：在量子力学中，除非对称性禁止，总有办法从一个状态跃迁到另一个状态。因此，如果我们从任何一个不对称状态开始，系统会跃迁到其他状态，所以只有通过对称地叠加所有可能的不对称状态，我们才能得到一个稳态。氨分子案例中涉及的对称性是宇称性，即左手和右手看待事物方式的等效性。（基本粒子实验学家发现的某些宇称破坏与此问题无关；那些效应太弱，不足以影响普通物质。）\n\n看过氨分子如何满足我们的“没有偶极矩”定理后，我们可以研究其他情况，特别是研究逐渐增大的系统，看看状态和对称性是否总是相关的。还有其他类似的锥体分子，由更重的原子构成。磷化氢 ($\\mathbf{PH_3}$) 比氨重两倍，它也会翻转，但频率只有氨的十分之一。三氟化磷 ($\\mathbf{PF_3}$)，其中更重的氟取代了氢，未观察到以可测量的速率翻转，尽管理论上可以确定，一个处于单一取向的状态会在合理的时间内翻转。\n\n然后我们可以继续研究更复杂的分子，比如糖，大约有 40 个原子。对于这些分子，期望分子自身翻转就不再有意义了。生物体产生的每个糖分子都具有相同的螺旋方向，并且它们从不翻转，无论是通过量子力学隧穿还是在常温下的热搅动下。到这一点，我们必须忘记翻转的可能性，并忽略宇称对称性：对称定律不是被废除了，而是被**破缺**了。\n\n另一方面，如果我们通过或多或少处于热平衡的化学反应合成糖分子，我们会发现平均而言，左手性分子并不比右手性分子多，反之亦然。在没有任何比自由分子集合更复杂的东西存在的情况下，对称定律平均而言从未被破缺。我们需要生命物质才能在群体中产生实际的不对称性。\n\n在真正巨大但仍是无生命的原子聚合体中，可能会发生一种完全不同类型的对称性破缺，同样导致净偶极矩或净旋光能力，或两者兼有。许多晶体在每个基本晶胞中都有净偶极矩（热释电性），而在某些晶体中，这个矩可以通过电场反转（铁电性）。这种不对称性是晶体寻求其最低能量状态的一种自发效应。当然，具有相反矩的状态也存在，并且根据对称性具有完全相同的能量，但是系统如此之大，以至于没有任何热力或量子力学力能够在一个有限的时间内（比如与宇宙年龄相比）导致从一种状态向另一种状态的转换。\n\n由此至少可以得出三个推论。其一，对称性在物理学中至关重要。我们所说的对称性是指存在不同的视角，从这些视角看系统是相同的。说物理学是对称性的研究，只是略有夸张。这个思想力量的首次展示可能是牛顿，他可能问过自己这样一个问题：如果我手中的物质与天上的物质遵循相同的定律——也就是说，如果空间和物质是均匀且各向同性的，会怎样？\n\n第二个推论是，一块物质的内部结构不必是对称的，即使它的整体状态是对称的。我敢挑战你，让你从量子力学的基本定律出发，预测氨分子的翻转及其易于观察的性质，而不经过使用不对称锥体结构这个阶段，即使没有任何一个“态”曾经具有那种结构。令人着迷的是，直到几十年前 [2]，核物理学家才停止将原子核视为一个没有特征的、对称的小球，并意识到虽然它确实从未有过偶极矩，但它可以变成橄榄球形状或盘子形状。这在核物理学研究的反应和激发谱中具有可观察的后果，尽管比氨分子翻转要难直接证明得多。在我看来，无论是否称之为深度研究，其本质的基础性与许多可以如此标记的事物一样。但这并不需要关于基本定律的新知识，并且要从这些定律综合推导出它极其困难；它仅仅是一个灵感，当然是基于日常直觉，突然间将一切融会贯通了。\n\n这个结果难以推导的基本原因，对于我们进一步的思考很重要。如果原子核足够小，没有真正的方法可以严格定义其形状：三个、四个或十个粒子相互围绕旋转，并不能定义一个旋转的“盘子”或“橄榄球”。只有当原子核被视为一个多体系统——在通常所谓的 $N \\to \\infty$ 极限下——这种行为才能被严格定义。我们对自己说：一个具有那种形状的宏观物体会具有某种特定的旋转和振动激发谱，其性质与那些表征无特征系统的激发谱完全不同。当我们看到这样的谱，即使分离得不那么清晰，且有些不完美，我们认识到原子核毕竟不是宏观的；它仅仅是在接近宏观行为。从基本定律和一台计算机出发，我们必须做两件不可能的事情——解决一个具有无限多体的问题，然后将结果应用于一个有限系统——才能综合出这种行为。\n\n第三个洞见是，一个真正巨大的系统的状态完全不必具有支配它的定律的对称性；事实上，它通常具有更少的对称性。这方面最突出的例子是晶体：根据表达空间完美均匀性的定律，从原子和空间的基底构建而来，晶体突然且不可预测地展现出一种全新的、非常美丽的对称性。然而，普遍的规则是，即使在晶体的情况下，大系统也比底层结构所暗示的对称性要低：尽管晶体是对称的，但它比完美的均匀性对称性要低。\n\n也许在晶体的情况下，这似乎仅仅是一种混淆视听的练习。晶体的规则性在 19 世纪中叶就可以通过半经验方法推导出来，根本不需要任何复杂的推理。但有时，就像超导性的情况一样，新的对称性——现在称为对称性破缺，因为原始的对称性不再明显——可能是一种完全意想不到的类型，并且极难可视化。就超导性而言，从物理学家掌握了所有解释它所必需的基本定律，到实际完成解释，经历了 30 年的时间。\n\n超导现象是普通宏观物体所经历的对称性破缺中最引人注目的例子，但它当然不是唯一的。反铁磁体、铁电体、液晶以及处于许多其他状态的物质，都遵循一套相当普遍的规则和思想，一些多体理论家将其统称为对称性破缺。我将不再进一步讨论历史，但在本文末尾给出了参考文献 [3]。\n\n核心思想是，在所谓的大系统 $N \\to \\infty$ 极限（在我们自己的宏观尺度上），不仅方便而且至关重要的是要认识到，物质将经历数学上尖锐、奇异的“相变”，转变为某种意义上违背了微观对称性，甚至微观运动方程的状态。对称性留下的表现仅仅是某些特征行为，例如，长波振动，其中熟悉的例子是声波；或者是超导体的异常宏观导电现象；或者，在一个非常深刻的类比中，是晶格的刚性，从而也是大多数固体物质的刚性。当然，系统并非真正违反对称性，而是破缺了空间和时间的对称性，但是因为它的各个部分发现保持彼此之间特定的固定关系在能量上更有利，所以对称性只允许物体作为一个整体来响应外力。\n\n这导致了一种“刚性”，尽管超导性和超流体表面上看起来是“流体”行为，这个描述对它们也很贴切。[对于前者，伦敦 (London) 很早就注意到了这一方面 (4)]。实际上，对于一个假设存在于木星或银河系中心某处氢云中的、有智慧的气态居民来说，普通晶体的性质很可能比超流氦的性质更令人困惑和着迷。\n\n我并非想给人留下一切都已解决的印象。例如，我认为关于玻璃和其他非晶相仍然存在着迷人的原则性问题，它们可能揭示出更复杂的行为类型。尽管如此，这种类型的对称性破缺在惰性但宏观的物质体的性质中的作用，现在至少在原则上被理解了。在这种情况下，我们可以看到整体如何不仅大于部分之和，而且与部分之和截然不同。\n\n逻辑上的下一步是追问，是否可能对空间和时间的基本对称性进行更彻底的破坏，以及是否会出现本质上不同于代表凝聚成较低对称状态的“简单”相变的新现象。\n\n我们已经排除了液体、气体和玻璃这些表面上不对称的情况。（在任何实际意义上，它们更对称。）在我看来，下一个阶段是考虑那种规则但包含信息的系统。也就是说，它在空间上某种意义上是规则的，以便可以被“读出”，但它包含的元素可以从一个“单元”到下一个“单元”变化。一个明显的例子是 DNA；在日常生活中，一行文字或一段电影胶片具有相同的结构。这种类型的“信息承载晶体结构”似乎对生命至关重要。生命的发展是否需要任何进一步的对称性破缺，还远未清楚。\n\n继续尝试刻画生命体中发生的对称性破缺类型，我发现至少还有一种现象似乎可以被识别出来，并且要么是普遍的，要么是极其常见的，即时间维度上的有序性（规则性或周期性）。已经出现了一些生命过程的理论，其中规律性的时间脉冲扮演着重要角色：关于发育、生长和生长限制以及记忆的理论。时间上的规律性在生物体中非常普遍地被观察到。它至少扮演着两种角色。首先，大多数从环境中提取能量以建立持续的、准稳定过程的方法都涉及时间周期性的机器，例如振荡器和发电机，生命过程也以同样的方式运作。其次，时间规律性是处理信息的一种方式，类似于承载信息的空间规律性。人类口语就是一个例子，值得注意的是，所有计算机都使用时间脉冲。上面提到的一些理论提出了可能的第三种角色：利用时间脉冲的相位关系来处理信息并控制细胞和生物体的生长与发育 [5]。\n\n在某种意义上，结构——目的论意义上的功能结构，而非仅仅是晶体形状——也必须被视为对称性破缺层级中的一个阶段，可能介于晶体结构和信息串之间。\n\n把推测堆积在推测之上，我想说下一个阶段可能是层级结构或功能专门化，或者两者兼有。在某个点上，我们必须停止谈论对称性降低，而开始称之为复杂性增加。因此，随着每个阶段复杂性的增加，我们沿着科学的层级结构向上走。我们期望在将较不复杂的部件组装成更复杂的系统，并理解由此产生的基本新型行为时，在每个阶段都会遇到引人入胜且我相信是非常基础性的问题。\n\n在多体理论和化学的最简单案例中复杂性出现的方式，与在真正复杂的文化和生物案例中复杂性出现的方式之间，很可能没有可以借鉴的有益的相似之处，或许除了可以说，总的来说，系统与其部分之间的关系在智力上是一条单行道。期望综合几乎是不可能的；另一方面，分析不仅可能，而且在各种方面都富有成效：例如，如果不理解超导性中的对称性破缺，约瑟夫森 (Josephson) 可能就不会发现他的效应。[约瑟夫森效应的另一个名称是“宏观量子干涉现象”：在超导体中的电子或超流液氦中的氦原子的宏观波函数之间观察到的干涉效应。这些现象已经极大地扩展了电磁测量的精度，并有望在未来的计算机等领域发挥重要作用，因此从长远来看，它们可能导致本十年的一些重大技术成就 (6)]。再举一个例子，生物学无疑因遗传学还原为生物化学和生物物理学而呈现出全新的面貌，这将产生不可估量的后果。因此，最近一篇文章 [7] 的说法是不正确的，即我们每个人都应该“耕耘好自己的山谷，不要试图在科学之间的山脉上修建道路”。相反，我们应该认识到，这样的道路虽然常常是通往我们自己科学领域另一部分的最快捷径，但仅从一门科学的视角是看不到的。\n\n粒子物理学家及其深度研究的傲慢可能已成为过去（正电子的发现者曾说“剩下的都是化学”），但我们尚未从一些分子生物学家的傲慢中恢复过来，他们似乎决心试图将关于人类有机体的一切都还原为“仅仅是”化学，从普通感冒和所有精神疾病到宗教本能。当然，在人类行为学和 DNA 之间存在的组织层级，比 DNA 和量子电动力学之间存在的层级要多得多，而且每个层级都可能需要一个全新的概念结构。\n\n最后，我引用两个来自经济学的例子，来总结我希望表达的观点。马克思说过，量变会引起质变，但 20 世纪 20 年代在巴黎的一段对话更清晰地总结了这一点：\n\n\u003e 菲茨杰拉德：富人与我们不同。\n\u003e\n\u003e 海明威：是的，他们有更多的钱。\n\n---\n\n# 参考文献\n\n- [1] V. F. Weisskopf, in *Brookhaven Nat. Lab. Publ. 888T360* (1965). Also see *Nuovo Cimento Suppl. Ser 1* 4, 465 (1966); *Phys. Today* **20** (No. 5), 23 (1967).\n- [2] A. Bohr and B. R. Mottelson, *Kgl. Dan. Vidensk. Selsk. Mat. Fys. Medd.* **27**, 16 (1953).\n- [3] 对称性破缺与相变: L. D. Landau, *Phys. Z. Sowjetunion* **11**, 26, 542 (1937). 对称性破缺与集体运动, 综述: J. Goldstone, A. Salam, S. Weinberg, *Phys. Rev.* **127**, 965 (1962); P. W. Anderson, *Concepts in Solids* (Benjamin, New York, 1963), pp. 175-182; B. D. Josephson, thesis, Trinity College, Cambridge University (1962). 特例: 反铁磁性, P. W. Anderson, *Phys. Rev.* **86**, 694 (1952); 超导性, ibid. **110**, 827 (1958); ibid. **112**, 1900 (1958); Y. Nambu, ibid. **117**, 648 (1960).\n- [4] F. London, *Superfluids* (Wiley, New York, 1950), vol. 1.\n- [5] M. H. Cohen, *J. Theor. Biol.* **31**, 101 (1971).\n- [6] J. Clarke, *Amer. J. Phys.* **38**, 1075 (1969); P. W. Anderson, *Phys. Today* **23** (No. 11), 23 (1970).\n- [7] A. B. Pippard, *Reconciling Physics with Reality* (Cambridge Univ. Press, London, 1972).\n\n\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L15\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"more-is-different\",\"slugSegments\":[\"notes\",\"to-modify\",\"more-is-different\"],\"pathSegments\":[\"notes\",\"to-modify\",\"more-is-different\"],\"urlPath\":\"/rosetta/notes/to-modify/more-is-different\",\"href\":\"/rosetta/notes/to-modify/more-is-different\",\"category\":\"to-modify\",\"title\":\"多则不同\",\"date\":\"1972-08-04T00:00:00.000Z\",\"excerpt\":\"$undefined\",\"coverImage\":\"$undefined\",\"author\":\"P. W. Anderson\",\"original\":\"$undefined\",\"originalUrl\":\"http://links.jstor.org/sici?sici=0036-8075%2819720804%293%3A177%3A4047%3C393%3AMID%3E2.0.CO%3B2-N\",\"score\":\"$undefined\",\"content\":\"$16\",\"tags\":[\"物理学\",\"哲学\"],\"draft\":false,\"toc\":false,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"多则不同\",\"date\":\"1972-08-04T00:00:00.000Z\",\"author\":\"P. W. Anderson\",\"originalUrl\":\"http://links.jstor.org/sici?sici=0036-8075%2819720804%293%3A177%3A4047%3C393%3AMID%3E2.0.CO%3B2-N\",\"tags\":[\"物理学\",\"哲学\"],\"toc\":false},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/rosetta/notes/to-modify/more-is-different.md\"},\"neighbors\":{\"previous\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"peter-thiel-tech-freedom-and-limits-of-progress\",\"slugSegments\":[\"notes\",\"to-modify\",\"peter-thiel-tech-freedom-and-limits-of-progress\"],\"pathSegments\":[\"notes\",\"to-modify\",\"peter-thiel-tech-freedom-and-limits-of-progress\"],\"urlPath\":\"/rosetta/notes/to-modify/peter-thiel-tech-free 则不同\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#多则不同\",\"children\":\"多则不同\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"对称性破缺与科学层级结构的本质\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"还原论假说或许在哲学家中仍有争议，但在绝大多数活跃的科学家中，我认为它已被毫无疑问地接受了。我们心智和身体的运作，以及我们所了解的所有有生命或无生命的物质，都被假定受同一套基本定律的控制，除非在某些极端条件下，我们感觉对这些定律已经相当了解了。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"似乎不可避免地会不加批判地走向一个初看起来是还原论显而易见的推论：如果万物都遵循相同的基本定律，那么唯一在研究真正基础问题的科学家就是那些致力于研究这些定律的人。在实践中，这包括了一些天体物理学家、一些基本粒子物理学家、一些逻辑学家和其他数学家，以及少数其他人。这种观点是本文主要反对的，魏斯科普夫 (Weisskopf) 在一段相当著名的论述中表达了这一点 [1]：\"}],\"\\n\",[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"审视二十世纪科学的发展，可以区分出两种趋势，我称之为“深度”研究和“广度”研究，因为缺乏更好的术语。简而言之：深度研究追求基本定律，广度研究致力于用已知基本定律解释现象。像往常一样，这种区分并非没有模糊之处，但在大多数情况下是清晰的。固态物理学、等离子体物理学，或许还有生物学，都属于广度研究。高能物理学和核物理学的很大部分属于深度研究。深度研究的数量总是远少于广度研究。一旦新的基本定律被发现，大量且不断增长的活动便开始，将这些发现应用于迄今未解释的现象。因此，基础研究有两个维度。科学的前沿沿着一条长线延伸，从最新、最现代的深度研究，经过由昨日深度研究催生的广度研究，直至基于过去几十年深度研究的、广阔且发展完善的广度研究活动网络。\"}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这种说法的有效性可以从以下事实中看出：我最近听到一位材料科学领域的领导者引用了它，他敦促一个致力于“凝聚态物理学中基本问题”会议的与会者接受这样一个观点：几乎没有或根本没有这类问题了，剩下的只有广度科学，而他似乎将其等同于器件工程。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这种思维方式的主要谬误在于，还原论假说绝不意味着“建构论”假说：能够将万物还原为简单的基本定律，并不意味着能够从这些定律出发重建宇宙。事实上，基本粒子物理学家告诉我们越多关于基本定律的性质，这些定律似乎与科学其他领域的非常现实的问题，更不用说社会问题，就越缺乏关联性。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"建构论假说在面对尺度和复杂性这对双重困难时便会失效。事实证明，大量复杂的基本粒子集合体的行为，是不能通过简单外推少数粒子的性质来理解的。相反，在每一个复杂性层次上，全新的属性都会显现，而理解这些新行为所需的研究，我认为其基础性不亚于任何其他研究。也就是说，在我看来，人们可以根据这样一个理念将科学大致线性地排列在一个层级结构中：科学 X 的基本实体遵循科学 Y 的定律。\"}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-x-auto border border-border shadow-sm\",\"children\":[\"$\",\"table\",null,{\"className\":\"w-full text-left border-collapse text-[14px] font-sans\",\"children\":[[\"$\",\"thead\",null,{\"className\":\"bg-placeholder/40 border-b border-accent/20\",\"children\":[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"X\"}],[\"$\",\"th\",null,{\"className\":\"py-4 px-6 font-bold text-text/80\",\"children\":\"Y\"}]]}]}],[\"$\",\"tbody\",null,{\"className\":\"divide-y divide-border/50\",\"children\":[[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"固态或多体物理学\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"基本粒子物理学\"}]]}],[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"化学\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"多体物理学\"}]]}],[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"分子生物学\"}],\"$L19\"]}],\"$L1a\",\"$L1b\",\"$L1c\"]}]]}]}],\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\"]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"化学\"}]\n1a:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"细胞生物学\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"分子生物学\"}]]}]\n1b:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"心理学\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"生理学\"}]]}]\n1c:[\"$\",\"tr\",null,{\"className\":\"hover:bg-accent/5 transition-colors\",\"children\":[[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"社会科学\"}],[\"$\",\"td\",null,{\"className\":\"py-4 px-6 text-text/90 align-top\",\"children\":\"心理学\"}]]}]\n1d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"但这个层级结构并不意味着科学 X 仅仅是“应用 Y”。在每个阶段，全新的定律、概念和概括都是必需的，它们需要的灵感和创造力，与前一阶段相比毫不逊色。心理学不是应用生物学，生物学也不是应用化学。\"}]\n1e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在我自己的多体物理学领域，我们或许比其他任何出现非平凡复杂性的科学领域都更接近我们的基础、深度的根基，因此我们已经开始构建一个关于这种从量变到质变是如何发生的普适理论。这个被称为“对称性破缺”理论的表述，可能有助于更普遍地阐明建构论（作为还原论的反面）的失效。我将对这些思想给出一个初步且不完整的解释，然后就其他层级上的类比和类似现象进行一些更具推测性的一般评论。\"}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在开始之前，我想澄清两个可能的误解来源。首先，当我说尺度变化引起根本性变化时，我并非指那个相当容易理解的观点，即新尺度上的现"])</script><script>self.__next_f.push([1,"象可能实际遵循不同的基本定律——例如，广义相对论在宇宙学尺度上是必需的，而量子力学在原子尺度上是必需的。我想大家会接受，所有普通物质都遵循简单的电动力学和量子理论，这实际上涵盖了我将要讨论的大部分内容。（正如我所说，我们都必须从还原论开始，我完全接受这一点。）第二个混淆的来源可能是，对称性破缺的概念已被基本粒子物理学家借用，但他们使用这个术语严格来说是一种类比，这种类比是深刻的还是貌似有理的，仍有待理解。\"}]\n20:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"那么，让我从一个最简单层面上的例子开始我的讨论，这个例子对我来说很自然，因为我在读研究生时研究过它：氨分子。那时，每个人都知道氨，并用它来校准他们的理论或仪器，我也不例外。化学家会告诉你，氨“是”一个三角锥体结构\"}]\n21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://jerkwin.github.io/pic/More-1.jpg\",\"alt\":\"\"}]}]\n"])</script><script>self.__next_f.push([1,"22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"氮原子带负电荷，氢原子带正电荷，因此它具有一个电偶极矩 (\",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[\"$\",\"mi\",null,{\"children\":\"μ\"}]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"\\\\mu\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.625em\",\"verticalAlign\":\"-0.1944em\"}}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"children\":\"μ\"}]]}]}]]}],\")，负极指向锥体的顶点。这对我来说似乎非常奇怪，因为我当时正在学习，任何物体都没有电偶极矩。教授实际上是在证明原子核没有偶极矩，因为他教的是核物理，但由于他的论证是基于空间和时间的对称性，它们应该普遍适用。\"]}]\n"])</script><script>self.__next_f.push([1,"23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"我很快了解到，事实上，它们是正确的（或者更准确地说，不是不正确的），因为他一直小心翼翼地说，系统的任何\",[\"$\",\"strong\",null,{\"children\":\"稳态\"}],\"（即不随时间变化的态）都没有电偶极矩。如果氨分子从上述不对称状态开始，它不会在其中停留很久。通过量子力学隧穿效应，氮原子可以泄漏穿过氢原子组成的三角形到达另一侧，使锥体由内向外翻转，而且，事实上，它可以非常迅速地做到这一点。这就是所谓的“翻转”，其频率约为每秒 \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mn\",null,{\"children\":\"3\"}],[\"$\",\"mo\",null,{\"children\":\"×\"}],[\"$\",\"msup\",null,{\"children\":[[\"$\",\"mn\",null,{\"children\":\"10\"}],[\"$\",\"mn\",null,{\"children\":\"10\"}]]}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"3 \\\\times 10^{10}\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.7278em\",\"verticalAlign\":\"-0.0833em\"}}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"3\"}],[\"$\",\"span\",null,{\"className\":\"mspace\",\"style\":{\"marginRight\":\"0.2222em\"}}],[\"$\",\"span\",null,{\"className\":\"mbin\",\"children\":\"×\"}],[\"$\",\"span\",null,{\"className\":\"mspace\",\"style\":{\"marginRight\":\"0.2222em\"}}]]}],[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.8141em\"}}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"1\"}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":[[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"0\"}],[\"$\",\"span\",null,{\"className\":\"msupsub\",\"children\":[\"$\",\"span\",null,{\"className\":\"vlist-t\",\"children\":[\"$\",\"span\",null,{\"className\":\"vlist-r\",\"children\":[\"$\",\"span\",null,{\"className\":\"vlist\",\"style\":{\"height\":\"0.8141em\"},\"children\":[\"$\",\"span\",null,{\"style\":{\"top\":\"-3.063em\",\"marginRight\":\"0.05em\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"pstrut\",\"style\":{\"height\":\"2.7em\"}}],[\"$\",\"span\",null,{\"className\":\"sizing reset-size6 size3 mtight\",\"children\":[\"$\",\"span\",null,{\"className\":\"mord mtight\",\"children\":[\"$\",\"span\",null,{\"className\":\"mord mtight\",\"children\":\"10\"}]}]}]]}]}]}]}]}]]}]]}]]}]]}],\" 次。一个真正的稳态只能是这个不对称锥体与其翻转后形态的等量叠加。这种混合态没有偶极矩。（我再次提醒读者，我正在极大简化，并请他参考教科书获取细节。）\"]}]\n"])</script><script>self.__next_f.push([1,"24:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我不打算详述证明过程，但结果是，系统的状态，如果要保持稳态，必须始终具有与其运动定律相同的对称性。原因可以很简单地表述：在量子力学中，除非对称性禁止，总有办法从一个状态跃迁到另一个状态。因此，如果我们从任何一个不对称状态开始，系统会跃迁到其他状态，所以只有通过对称地叠加所有可能的不对称状态，我们才能得到一个稳态。氨分子案例中涉及的对称性是宇称性，即左手和右手看待事物方式的等效性。（基本粒子实验学家发现的某些宇称破坏与此问题无关；那些效应太弱，不足以影响普通物质。）\"}]\n"])</script><script>self.__next_f.push([1,"25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"看过氨分子如何满足我们的“没有偶极矩”定理后，我们可以研究其他情况，特别是研究逐渐增大的系统，看看状态和对称性是否总是相关的。还有其他类似的锥体分子，由更重的原子构成。磷化氢 (\",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mi\",null,{\"mathvariant\":\"bold\",\"children\":\"P\"}],[\"$\",\"msub\",null,{\"children\":[[\"$\",\"mi\",null,{\"mathvariant\":\"bold\",\"children\":\"H\"}],[\"$\",\"mn\",null,{\"mathvariant\":\"bold\",\"children\":\"3\"}]]}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"\\\\mathbf{PH_3}\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.8361em\",\"verticalAlign\":\"-0.15em\"}}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":[[\"$\",\"span\",null,{\"className\":\"mord mathbf\",\"children\":\"P\"}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":[[\"$\",\"span\",null,{\"className\":\"mord mathbf\",\"children\":\"H\"}],[\"$\",\"span\",null,{\"className\":\"msupsub\",\"children\":[\"$\",\"span\",null,{\"className\":\"vlist-t vlist-t2\",\"children\":[[\"$\",\"span\",null,{\"className\":\"vlist-r\",\"children\":[[\"$\",\"span\",null,{\"className\":\"vlist\",\"style\":{\"height\":\"0.3011em\"},\"children\":[\"$\",\"span\",null,{\"style\":{\"top\":\"-2.55em\",\"marginLeft\":\"0em\",\"marginRight\":\"0.05em\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"pstrut\",\"style\":{\"height\":\"2.7em\"}}],[\"$\",\"span\",null,{\"className\":\"sizing reset-size6 size3 mtight\",\"children\":[\"$\",\"span\",null,{\"className\":\"mord mathbf mtight\",\"children\":\"3\"}]}]]}]}],[\"$\",\"span\",null,{\"className\":\"vlist-s\",\" ,\"span\",null,{\"className\":\"mord mathbf mtight\",\"children\":\"3\"}]}]]}]}],[\"$\",\"span\",null,{\"className\":\"vlist-s\",\"children\":\"​\"}]]}],[\"$\",\"span\",null,{\"className\":\"vlist-r\",\"children\":[\"$\",\"span\",null,{\"className\":\"vlist\",\"style\":{\"height\":\"0.15em\"},\"children\":[\"$\",\"span\",null,{}]}]}]]}]}]]}]]}]]}]}]]}],\")，其中更重的氟取代了氢，未观察到以可测量的速率翻转，尽管理论上可以确定，一个处于单一取向的状态会在合理的时间内翻转。\"]}]\n"])</script><script>self.__next_f.push([1,"26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"然后我们可以继续研究更复杂的分子，比如糖，大约有 40 个原子。对于这些分子，期望分子自身翻转就不再有意义了。生物体产生的每个糖分子都具有相同的螺旋方向，并且它们从不翻转，无论是通过量子力学隧穿还是在常温下的热搅动下。到这一点，我们必须忘记翻转的可能性，并忽略宇称对称性：对称定律不是被废除了，而是被\",[\"$\",\"strong\",null,{\"children\":\"破缺\"}],\"了。\"]}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"另一方面，如果我们通过或多或少处于热平衡的化学反应合成糖分子，我们会发现平均而言，左手性分子并不比右手性分子多，反之亦然。在没有任何比自由分子集合更复杂的东西存在的情况下，对称定律平均而言从未被破缺。我们需要生命物质才能在群体中产生实际的不对称性。\"}]\n28:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在真正巨大但仍是无生命的原子聚合体中，可能会发生一种完全不同类型的对称性破缺，同样导致净偶极矩或净旋光能力，或两者兼有。许多晶体在每个基本晶胞中都有净偶极矩（热释电性），而在某些晶体中，这个矩可以通过电场反转（铁电性）。这种不对称性是晶体寻求其最低能量状态的一种自发效应。当然，具有相反矩的状态也存在，并且根据对称性具有完全相同的能量，但是系统如此之大，以至于没有任何热力或量子力学力能够在一个有限的时间内（比如与宇宙年龄相比）导致从一种状态向另一种状态的转换。\"}]\n29:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"由此至少可以得出三个推论。其一，对称性在物理学中至关重要。我们所说的对称性是指存在不同的视角，从这些视角看系统是相同的。说物理学是对称性的研究，只是略有夸张。这个思想力量的首次展示可能是"])</script><script>self.__next_f.push([1,"牛顿，他可能问过自己这样一个问题：如果我手中的物质与天上的物质遵循相同的定律——也就是说，如果空间和物质是均匀且各向同性的，会怎样？\"}]\n2a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"第二个推论是，一块物质的内部结构不必是对称的，即使它的整体状态是对称的。我敢挑战你，让你从量子力学的基本定律出发，预测氨分子的翻转及其易于观察的性质，而不经过使用不对称锥体结构这个阶段，即使没有任何一个“态”曾经具有那种结构。令人着迷的是，直到几十年前 [2]，核物理学家才停止将原子核视为一个没有特征的、对称的小球，并意识到虽然它确实从未有过偶极矩，但它可以变成橄榄球形状或盘子形状。这在核物理学研究的反应和激发谱中具有可观察的后果，尽管比氨分子翻转要难直接证明得多。在我看来，无论是否称之为深度研究，其本质的基础性与许多可以如此标记的事物一样。但这并不需要关于基本定律的新知识，并且要从这些定律综合推导出它极其困难；它仅仅是一个灵感，当然是基于日常直觉，突然间将一切融会贯通了。\"}]\n"])</script><script>self.__next_f.push([1,"2b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"这个结果难以推导的基本原因，对于我们进一步的思考很重要。如果原子核足够小，没有真正的方法可以严格定义其形状：三个、四个或十个粒子相互围绕旋转，并不能定义一个旋转的“盘子”或“橄榄球”。只有当原子核被视为一个多体系统——在通常所谓的 \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mi\",null,{\"children\":\"N\"}],[\"$\",\"mo\",null,{\"children\":\"→\"}],[\"$\",\"mi\",null,{\"mathvariant\":\"normal\",\"children\":\"∞\"}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"N \\\\to \\\\infty\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.6833em\"}}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"style\":{\"marginRight\":\"0.109em\"},\"children\":\"N\"}],[\"$\",\"span\",null,{\"className\":\"mspace\",\"style\":{\"marginRight\":\"0.2778em\"}}],[\"$\",\"span\",null,{\"className\":\"mrel\",\"children\":\"→\"}],[\"$\",\"span\",null,{\"className\":\"mspace\",\"style\":{\"marginRight\":\"0.2778em\"}}]]}],[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.4306em\"}}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"∞\"}]]}]]}]]}],\" 极限下——这种行为才能被严格定义。我们对自己说：一个具有那种形状的宏观物体会具有某种特定的旋转和振动激发谱，其性质与那些表征无特征系统的激发谱完全不同。当我们看到这样的谱，即使分离得不那么清晰，且有些不完美，我们认识到原子核毕竟不是宏观的；它仅仅是在接近宏观行为。从基本定律和一台计算机出发，我们必须做两件不可能的事情——解决一个具有无限多体的问题，然后将结果应用于一个有限系统——才能综合出这种行为。\"]}]\n"])</script><script>self.__next_f.push([1,"2c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"第三个洞见是，一个真正巨大的系统的状态完全不必具有支配它的定律的对称性；事实上，它通常具有更少的对称性。这方面最突出的例子是晶体：根据表达空间完美均匀性的定律，从原子和空间的基底构建而来，晶体突然且不可预测地展现出一种全新的、非常美丽的对称性。然而，普遍的规则是，即使在晶体的情况下，大系统也比底层结构所暗示的对称性要低：尽管晶体是对称的，但它比完美的均匀性对称性要低。\"}]\n2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"也许在晶体的情况下，这似乎仅仅是一种混淆视听的练习。晶体的规则性在 19 世纪中叶就可以通过半经验方法推导出来，根本不需要任何复杂的推理。但有时，就像超导性的情况一样，新的对称性——现在称为对称性破缺，因为原始的对称性不再明显——可能是一种完全意想不到的类型，并且极难可视化。就超导性而言，从物理学家掌握了所有解释它所必需的基本定律，到实际完成解释，经历了 30 年的时间。\"}]\n2e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"超导现象是普通宏观物体所经历的对称性破缺中最引人注目的例子，但它当然不是唯一的。反铁磁体、铁电体、液晶以及处于许多其他状态的物质，都遵循一套相当普遍的规则和思想，一些多体理论家将其统称为对称性破缺。我将不再进一步讨论历史，但在本文末尾给出了参考文献 [3]。\"}]\n"])</script><script>self.__next_f.push([1,"2f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"核心思想是，在所谓的大系统 \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mi\",null,{\"children\":\"N\"}],[\"$\",\"mo\",null,{\"children\":\"→\"}],[\"$\",\"mi\",null,{\"mathvariant\":\"normal\",\"children\":\"∞\"}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"N \\\\to \\\\infty\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.6833em\"}}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"style\":{\"marginRight\":\"0.109em\"},\"children\":\"N\"}],[\"$\",\"span\",null,{\"className\":\"mspace\",\"style\":{\"marginRight\":\"0.2778em\"}}],[\"$\",\"span\",null,{\"className\":\"mrel\",\"children\":\"→\"}],[\"$\",\"span\",null,{\"className\":\"mspace\",\"style\":{\"marginRight\":\"0.2778em\"}}]]}],[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.4306em\"}}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"∞\"}]]}]]}]]}],\" 极限（在我们自己的宏观尺度上），不仅方便而且至关重要的是要认识到，物质将经历数学上尖锐、奇异的“相变”，转变为某种意义上违背了微观对称性，甚至微观运动方程的状态。对称性留下的表现仅仅是某些特征行为，例如，长波振动，其中熟悉的例子是声波；或者是超导体的异常宏观导电现象；或者，在一个非常深刻的类比中，是晶格的刚性，从而也是大多数固体物质的刚性。当然，系统并非真正违反对称性，而是破缺了空间和时间的对称性，但是因为它的各个部分发现保持彼此之间特定的固定关系在能量上更有利，所以对称性只允许物体作为一个整体来响应外力。\"]}]\n"])</script><script>self.__next_f.push([1,"30:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这导致了一种“刚性”，尽管超导性和超流体表面上看起来是“流体”行为，这个描述对它们也很贴切。[对于前者，伦敦 (London) 很早就注意到了这一方面 (4)]。实际上，对于一个假设存在于木星或银河系中心某处氢云中的、有智慧的气态居民来说，普通晶体的性质很可能比超流氦的性质更令人困惑和着迷。\"}]\n31:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我并非想给人留下一切都已解决的印象。例如，我认为关于玻璃和其他非晶相仍然存在着迷人的原则性问题，它们可能揭示出更复杂的行为类型。尽管如此，这种类型的对称性破缺在惰性但宏观的物质体的性质中的作用，现在至少在原则上被理解了。在这种情况下，我们可以看到整体如何不仅大于部分之和，而且与部分之和截然不同。\"}]\n32:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"逻辑上的下一步是追问，是否可能对空间和时间的基本对称性进行更彻底的破坏，以及是否会出现本质上不同于代表凝聚成较低对称状态的“简单”相变的新现象。\"}]\n33:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们已经排除了液体、气体和玻璃这些表面上不对称的情况。（在任何实际意义上，它们更对称。）在我看来，下一个阶段是考虑那种规则但包含信息的系统。也就是说，它在空间上某种意义上是规则的，以便可以被“读出”，但它包含的元素可以从一个“单元”到下一个“单元”变化。一个明显的例子是 DNA；在日常生活中，一行文字或一段电影胶片具有相同的结构。这种类型的“信息承载晶体结构”似乎对生命至关重要。生命的发展是否需要任何进一步的对称性破缺，还远未清楚。\"}]\n34:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"继续尝试刻画生命体中发生的对称性破缺类型，我发现至"])</script><script>self.__next_f.push([1,"少还有一种现象似乎可以被识别出来，并且要么是普遍的，要么是极其常见的，即时间维度上的有序性（规则性或周期性）。已经出现了一些生命过程的理论，其中规律性的时间脉冲扮演着重要角色：关于发育、生长和生长限制以及记忆的理论。时间上的规律性在生物体中非常普遍地被观察到。它至少扮演着两种角色。首先，大多数从环境中提取能量以建立持续的、准稳定过程的方法都涉及时间周期性的机器，例如振荡器和发电机，生命过程也以同样的方式运作。其次，时间规律性是处理信息的一种方式，类似于承载信息的空间规律性。人类口语就是一个例子，值得注意的是，所有计算机都使用时间脉冲。上面提到的一些理论提出了可能的第三种角色：利用时间脉冲的相位关系来处理信息并控制细胞和生物体的生长与发育 [5]。\"}]\n35:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在某种意义上，结构——目的论意义上的功能结构，而非仅仅是晶体形状——也必须被视为对称性破缺层级中的一个阶段，可能介于晶体结构和信息串之间。\"}]\n36:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"把推测堆积在推测之上，我想说下一个阶段可能是层级结构或功能专门化，或者两者兼有。在某个点上，我们必须停止谈论对称性降低，而开始称之为复杂性增加。因此，随着每个阶段复杂性的增加，我们沿着科学的层级结构向上走。我们期望在将较不复杂的部件组装成更复杂的系统，并理解由此产生的基本新型行为时，在每个阶段都会遇到引人入胜且我相信是非常基础性的问题。\"}]\n37:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在多体理论和化学的最简单案例中复杂性出现的方式，与在真正复杂的文化和生物案例中复杂性出现的方式之间，很可能没有可以借鉴的有益的相似之处"])</script><script>self.__next_f.push([1,"，或许除了可以说，总的来说，系统与其部分之间的关系在智力上是一条单行道。期望综合几乎是不可能的；另一方面，分析不仅可能，而且在各种方面都富有成效：例如，如果不理解超导性中的对称性破缺，约瑟夫森 (Josephson) 可能就不会发现他的效应。[约瑟夫森效应的另一个名称是“宏观量子干涉现象”：在超导体中的电子或超流液氦中的氦原子的宏观波函数之间观察到的干涉效应。这些现象已经极大地扩展了电磁测量的精度，并有望在未来的计算机等领域发挥重要作用，因此从长远来看，它们可能导致本十年的一些重大技术成就 (6)]。再举一个例子，生物学无疑因遗传学还原为生物化学和生物物理学而呈现出全新的面貌，这将产生不可估量的后果。因此，最近一篇文章 [7] 的说法是不正确的，即我们每个人都应该“耕耘好自己的山谷，不要试图在科学之间的山脉上修建道路”。相反，我们应该认识到，这样的道路虽然常常是通往我们自己科学领域另一部分的最快捷径，但仅从一门科学的视角是看不到的。\"}]\n38:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"粒子物理学家及其深度研究的傲慢可能已成为过去（正电子的发现者曾说“剩下的都是化学”），但我们尚未从一些分子生物学家的傲慢中恢复过来，他们似乎决心试图将关于人类有机体的一切都还原为“仅仅是”化学，从普通感冒和所有精神疾病到宗教本能。当然，在人类行为学和 DNA 之间存在的组织层级，比 DNA 和量子电动力学之间存在的层级要多得多，而且每个层级都可能需要一个全新的概念结构。\"}]\n39:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后，我引用两个来自经济学的例子，来总结我希望表达的观点。马克思说过，量变会引起质变，但 20 世纪 20 年代在巴黎的一段对话更清晰"])</script><script>self.__next_f.push([1,"地总结了这一点：\"}]\n3a:[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"菲茨杰拉德：富人与我们不同。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"海明威：是的，他们有更多的钱。\"}],\"\\n\"]}]\n3b:[\"$\",\"hr\",null,{}]\n3c:[\"$\",\"h1\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[23px] md:text-[26px] font-bold text-text tracking-[-0.4px] mb-[22px] mt-[12px] leading-[1.2]\",\"id\":\"参考文献\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#参考文献\",\"children\":\"参考文献\"}]}]\n"])</script><script>self.__next_f.push([1,"3d:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"[1] V. F. Weisskopf, in \",[\"$\",\"em\",null,{\"children\":\"Brookhaven Nat. Lab. Publ. 888T360\"}],\" (1965). Also see \",[\"$\",\"em\",null,{\"children\":\"Nuovo Cimento Suppl. Ser 1\"}],\" 4, 465 (1966); \",[\"$\",\"em\",null,{\"children\":\"Phys. Today\"}],\" \",[\"$\",\"strong\",null,{\"children\":\"20\"}],\" (No. 5), 23 (1967).\"]}],\"\\n\",[\"$\",\"li\",null,{\"childre
