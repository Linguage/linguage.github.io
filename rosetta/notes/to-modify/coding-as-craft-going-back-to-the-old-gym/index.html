者在面对难题时经历的卡顿、思考和突破过程，这一过程能形成深层记忆和技能成长，是不可被AI替代的学习路径**：\n\n**主动自觉使用与有意识协作（Reflexive vs. Intentional）——前者指不假思索地依赖AI完成一切，后者强调在明确场景下有选择地使用AI，并对其输出保持批判性审视**：\n\n**旧式健身房（Old Gym）——借用电影洛奇的隐喻，代表开发者直接与问题搏斗、不依赖AI缓冲的原始训练环境，象征回归手艺磨炼的本源**：\n\n**编码手艺（Coding as Craft）——将编程视为一门需要持续打磨的手艺而非纯粹的产出活动，强调过程中的思考、设计与学习同样重要**：\n\n**AI使用界限（AI Usage Boundaries）——为AI辅助设定明确边界，将其限定于样板代码生成和文档查阅等辅助性任务，核心算法和架构决策则保留由人完成**：\n\n- 文章来源： [Coding as Craft: Going Back to the Old Gym](https://cekrem.github.io/posts/coding-as-craft-going-back-to-the-old-gym/)\n\n**2025年4月22日**\n\n近期，Shopify的CEO Tobi Lütke分享了他对AI在编码中作用的看法，指出“主动自觉地使用AI现已成为Shopify的基本要求”。他信息的核心要点是，AI正在彻底改变我们的工作方式，每个人都应该搭上这班列车，否则就有被甩下的风险。我稍微转述了一下，但大致如此——请查看原文以了解完整的背景和内容。\n\n这触动了我，但并非他所期望的那种方式。在与Elm工程师同行的Slack对话中，我发现自己输入了以下内容：\n\n\u003e 时间点很有趣。我刚切换回vim，就是为了进一步远离AI对我编码的干扰。我上次关于AI的演讲副标题是“自动化无聊的部分”（灵感来自那本经典的Python书籍），对我来说，AI就是干这个的。\n\u003e\n\u003e 然而，编码并非无聊的部分，它是我的手艺，我想享受它并保持敏锐。当然，如果你手头只有LLM（大语言模型），用它来提问和讨论话题是可以的。但“主动自觉地使用AI”听起来像是我不希望出现在我名下的诊断结果。\n\u003e\n\u003e 如果人们不再经历那种偶尔的僵局——咬紧牙关、审视问题、哭泣、散步、祈祷和呐喊，直到豁然开朗（并且你学到了东西！），我会称之为严重的倒退，而非进步。\n\n我对这次交流以及前辈们的其他评论反思得越多，就越意识到它关联到一些更深层次的东西，关乎我们与技术和手艺的关系。是时候谈谈回归旧式健身房了。\n\n## 洛奇·巴尔博亚原则 (The Rocky Balboa Principle)\n\n在电影《洛奇3》中，有一个关键时刻，米奇（Mickey）质问洛奇（Rocky）是如何失去锐气的：“你过去像超人一样，但最糟糕的事情发生在了一个拳手身上：你变得文明（安逸）了！”\n\n米奇的解决方案？“我们离开这儿，回那个旧健身房去！”\n\n这一幕一直留在我心中，因为它捕捉到了关于精通技艺和技能发展的一些深刻道理。“旧健身房”代表了真实成长发生的原始、必要条件。它不舒适，不豪华，但真正的锤炼在那里完成。\n\n在编码的语境下，我们的“旧式健身房”是我们直接与问题、算法和架构搏斗，而没有AI为我们生成解决方案这个缓冲垫的心智空间。\n\n## AI作为工具，而非替代品\n\n首先明确一点：我并非反对AI。事实上，我发现它极其有用——用于处理那些无聊的部分。\n\nAI擅长：\n\n*   生成样板代码\n*   总结文档\n*   解释复杂概念\n*   帮助调试棘手的错误信息\n*   起草单元测试\n*   格式化数据\n\n但是编程的核心——思考、设计、架构决策——这些是我希望作为我的手艺加以珍视的部分。这些是我希望通过在旧式健身房训练来保持强壮的肌肉。\n\n## 认知挣扎的价值 (The Value of Cognitive Struggle)\n\n与难题搏斗的过程有其不可替代的价值。当你卡住时，完全卡住时，你可能会：\n\n*   沮丧地咬紧牙关\n*   离开电脑\n*   去散步\n*   向上帝祈祷和/或痛哭一场\n*   回来再尝试不同方法\n*   重复直至……突然间，豁然开朗\n\n那个“啊哈！”的时刻会重塑你的大脑。它创建了神经通路，让你永久性地在你所做的事情上变得更强。这就是编码界的肌肉记忆，也是我们作为工程师成长的方式。\n\n当我们将这种挣扎外包给AI时，我们就剥夺了我们自身的这些成长机会。我们得到了解决方案却不理解其所以然。我们得到了代码却没有手艺的沉淀。\n\nAI可以生成代码，但它（目前）还不能理解那些使系统随着时间推移真正可维护和适应性强的细致入微的决策。它不会像拥有深厚经验和来之不易知识的人那样，用心和考量去设计你的领域层（domain layer）。并且重申：它是否在特定任务上成功不应是你唯一关心的，如果你在乎你的手艺——你是否学到了东西也应该重要！\n\n需要明确的是，早在LLM成为焦点之前，人们就已经在“逃避挣扎™”（Avoiding The Struggle™）了。StackOverflow、Google，甚至坐在旁边办公桌的同事，如果滥用，都可能成为剥夺你有效学习的绝佳工具。但是，AI工具这种直面而来、持续可用且范围巨大的特性，其影响要广泛和巨大得多——这就是我特别提出它的原因。\n\n## 主动自觉使用 vs. 有意识协作 (Reflexive Usage vs. Intentional Collaboration)\n\n“主动自觉地使用AI”（Reflexive AI usage）这个短语引发了我最强烈的反应。“主动自觉”（Reflexive）暗示着不假思索、自动化的依赖。它意味着不仅委托任务，还委托了判断力本身。\n\n我所提倡的，是有意识地与AI协作：\n\n*   在有意义时使用AI，而非默认使用\n*   对其输出保持批判性思维\n*   在集成之前理解你要集成的东西\n*   挑战它的假设并审查它的代码\n\n这种方法保留了你作为手艺人的自主性，同时仍然利用了AI能带来的效率。\n\n## 旧式健身房锻炼计划 (The Old Gym Workout Plan)\n\n那么，在2025年，“回归旧式健身房”对于编码来说意味着什么？这是我的方法：\n\n1.  **设定AI使用界限**：明确你何时会使用它，何时不会。我用它来查阅文档、获取解释和偶尔生成样板代码——很少用于核心算法或架构。而且我不用AI驱动的自动补全！\n2.  **练习手动编码**：定期在没有任何AI辅助的情况下解决问题。像Advent of Code、LeetCode这样的网站，或者甚至从零开始实现一些小工具，都能保持这些“肌肉”强壮。（AI不是唯一的问题——我特别针对你们这些“万事皆用现成npm包”的瘾君子们，以及你们这些“没有花哨IDE就迷失”的可怜人！）\n3.  **理解你使用的每一行代码**：如果AI为你生成了代码，不要只是粘贴进来。研究它。理解它。重构它。让它成为你自己的东西。永远，永远不要只是接受copilot / cursor的Tab建议然后继续！\n4.  **拥抱挣扎**：卡住时，抵制住立即询问AI的冲动。给自己时间去解决问题。挣扎之处即是成长之处。\n5.  **深入学习基础知识**：对算法、数据结构和设计模式的扎实掌握，使你能够批判性地评估AI生成的解决方案。与其让AI给出答案，不如（如果需要的话）与它讨论，并要求它提供相关的（人类编写的！）资源以供深入学习。\n\n## 寻找平衡 (Finding the Balance)\n\n这并非要拒绝进步或成为一个编码纯粹主义者。而是关于在一个日益自动化的手艺中保持人的要素。\n\n就像厨师可能会使用食物处理器来处理繁琐的准备工作，但绝不会梦想将食谱开发和风味平衡这些创造性方面自动化一样，我们应该利用AI做它擅长的事情，同时保留那些给我们带来乐趣和成长的编码部分。\n\n## 结论\n\n在一个推动“主动自觉地使用AI”的世界里，我倡导的是不同的东西：一种深思熟虑的、有意识的与AI协作，从而保留编码作为一门手艺的精髓。\n\n像洛奇一样，我们有时需要离开舒适、文明（安逸）的环境，回归旧式健身房——那个通过挣扎、坚持和专注的练习来实现真正成长的地方。\n\n因为编码不仅仅关乎产出。它是成为更好的问题解决者、更好的思考者和更好的工程师的旅程。而有些旅程是无法外包的，即使是给最先进的AI。\n\n让我们用AI自动化无聊的部分，但将手艺掌握在自己手中。\n\n\u003e “重要的不是你能出多重的拳，而是你能承受多重的打击并继续前进。” – 洛奇·巴尔博亚 (Rocky Balboa)\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"coding-as-craft-going-back-to-the-old-gym\",\"slugSegments\":[\"notes\",\"to-modify\",\"coding-as-craft-going-back-to-the-old-gym\"],\"pathSeg l,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"AI使用界限（AI Usage Boundaries）——为AI辅助设定明确边界，将其限定于样板代码生成和文档查阅等辅助性任务，核心算法和架构决策则保留由人完成\"}],\"：\"]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"文章来源： \",[\"$\",\"a\",null,{\"href\":\"https://cekrem.github.io/posts/coding-as-craft-going-back-to-the-old-gym/\",\"children\":\"Coding as Craft: Going Back to the Old Gym\"}]]}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"2025年4月22日\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"近期，Shopify的CEO Tobi Lütke分享了他对AI在编码中作用的看法，指出“主动自觉地使用AI现已成为Shopify的基本要求”。他信息的核心要点是，AI正在彻底改变我们的工作方式，每个人都应该搭上这班列车，否则就有被甩下的风险。我稍微转述了一下，但大致如此——请查看原文以了解完整的背景和内容。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这触动了我，但并非他所期望的那种方式。在与Elm工程师同行的Slack对话中，我发现自己输入了以下内容：\"}],\"\\n\",[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"时间点很有趣。我刚切换回vim，就是为了进一步远离AI对我编码的干扰。我上次关于AI的演讲副标题是“自动化无聊的部分”（灵感来自那本经典的Python书籍），对我来说，AI就是干这个的。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"然而，编码并非无聊的部分，它是我的手艺，我想享受它并保持敏锐。当然，如果你手头只有LLM（大语言模型），用它来提问和讨论话题是可以的。但“主动自觉地使用AI”听起来像是我不希望出现在我名下的诊断结果。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"如果人们不再经历那种偶尔的僵局——咬紧牙关、审视问题、哭泣、散步、祈祷和呐喊，直到豁然开朗（并且你学到了东西！），我会称之为严重的倒退，而非进步。\"}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我对这次交流以及前辈们的其他评论反思得越多，就越意识到它关联到一些更深层次的东西，关乎我们与技术和手艺的关系。是时候谈谈回归旧式健身房了。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"洛奇巴尔博亚原则-the-rocky-balboa-principle\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#洛奇巴尔博亚原则-the-rocky-balboa-principle\",\"children\":\"洛奇·巴尔博亚原则 (The Rocky Balboa Principle)\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在电影《洛奇3》中，有一个关键时刻，米奇（Mickey）质问洛奇（Rocky）是如何失去锐气的：“你过去像超人一样，但最糟糕的事情发生在了一个拳手身上：你变得文明（安逸）了！”\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"米奇的解决方案？“我们离开这儿，回那个旧健身房去！”\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这一幕一直留在我心中，因为它捕捉到了关于精通技艺和技能发展的一些深刻道理。“旧健身房”代表了真实成长发生的原始、必要条件。它不舒适，不豪华，但真正的锤炼在那里完成。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在编码的语境下，我们的“旧式健身房”是我们直接与问题、算法和架构搏斗，而没有AI为我们生成解决方案这个缓冲垫的心智空间。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"ai作为工具而非替代品\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#ai作为工具而非替代品\",\"children\":\"AI作为工具，而非替代品\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"首先明确一点：我并非反对AI。事实上，我发现它极其有用——用于处理那些无聊的部分。\"}],\"\\n\",\"$L19\",\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\"]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI擅长：\"}]\n1a:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"生成样板代码\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"总结文档\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"解释复杂概念\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"帮助调试棘手的错误信息\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"起草单元测试\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"格式化数据\"}],\"\\n\"]}]\n1b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"但是编程的核心——思考、设计、架构决策——这些是我希望作为我的手艺加以珍视的部分。这些是我希望通过在旧式健身房训练来保持强壮的肌肉。\"}]\n1c:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"认知挣扎的价值-the-value-of-cognitive-struggle\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#认知挣扎的价值-the-value-of-cognitive-struggle\",\"children\":\"认知挣扎的价值 (The Value of Cognitive Struggle)\"}]}]\n1d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"与难题搏斗的过程有其不可替代的价值。当你卡住时，完全卡住时，你可能会：\"}]\n1e:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"沮丧地咬紧牙关\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"离开电脑\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"去散步\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"向上帝祈祷和/或痛哭一场\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"回来再尝试不同方法\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"重复直至……突然间，豁然开朗\"}],\"\\n\"]}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"那个“啊哈！”的时刻会重塑你的大脑。它创建了神经通路，让你永久性地在你所做的事情上变得更强。这就是编码界的肌肉记忆，也是我们作为工程师成长的方式。\"}]\n20:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"当我们将这种挣扎外包给AI时，我们就剥夺了"])</script><script>self.__next_f.push([1,"我们自身的这些成长机会。我们得到了解决方案却不理解其所以然。我们得到了代码却没有手艺的沉淀。\"}]\n21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI可以生成代码，但它（目前）还不能理解那些使系统随着时间推移真正可维护和适应性强的细致入微的决策。它不会像拥有深厚经验和来之不易知识的人那样，用心和考量去设计你的领域层（domain layer）。并且重申：它是否在特定任务上成功不应是你唯一关心的，如果你在乎你的手艺——你是否学到了东西也应该重要！\"}]\n22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"需要明确的是，早在LLM成为焦点之前，人们就已经在“逃避挣扎™”（Avoiding The Struggle™）了。StackOverflow、Google，甚至坐在旁边办公桌的同事，如果滥用，都可能成为剥夺你有效学习的绝佳工具。但是，AI工具这种直面而来、持续可用且范围巨大的特性，其影响要广泛和巨大得多——这就是我特别提出它的原因。\"}]\n23:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"主动自觉使用-vs-有意识协作-reflexive-usage-vs-intentional-collaboration\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#主动自觉使用-vs-有意识协作-reflexive-usage-vs-intentional-collaboration\",\"children\":\"主动自觉使用 vs. 有意识协作 (Reflexive Usage vs. Intentional Collaboration)\"}]}]\n24:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“主动自觉地使用AI”（Reflexive AI usage）这个短语引发了我最强烈的反应。“主动自觉”（Reflexive）暗示着不假思索、自动化的依赖。它意味着不仅委托任务，还委托了判断力本身。\"}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我所提倡的，是有意识地与AI协作：\"}]\n26:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"在"])</script><script>self.__next_f.push([1,"有意义时使用AI，而非默认使用\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"对其输出保持批判性思维\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"在集成之前理解你要集成的东西\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"挑战它的假设并审查它的代码\"}],\"\\n\"]}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这种方法保留了你作为手艺人的自主性，同时仍然利用了AI能带来的效率。\"}]\n28:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"旧式健身房锻炼计划-the-old-gym-workout-plan\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#旧式健身房锻炼计划-the-old-gym-workout-plan\",\"children\":\"旧式健身房锻炼计划 (The Old Gym Workout Plan)\"}]}]\n29:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"那么，在2025年，“回归旧式健身房”对于编码来说意味着什么？这是我的方法：\"}]\n"])</script><script>self.__next_f.push([1,"2a:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"设定AI使用界限\"}],\"：明确你何时会使用它，何时不会。我用它来查阅文档、获取解释和偶尔生成样板代码——很少用于核心算法或架构。而且我不用AI驱动的自动补全！\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"练习手动编码\"}],\"：定期在没有任何AI辅助的情况下解决问题。像Advent of Code、LeetCode这样的网站，或者甚至从零开始实现一些小工具，都能保持这些“肌肉”强壮。（AI不是唯一的问题——我特别针对你们这些“万事皆用现成npm包”的瘾君子们，以及你们这些“没有花哨IDE就迷失”的可怜人！）\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"理解你使用的每一行代码\"}],\"：如果AI为你生成了代码，不要只是粘贴进来。研究它。理解它。重构它。让它成为你自己的东西。永远，永远不要只是接受copilot / cursor的Tab建议然后继续！\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"拥抱挣扎\"}],\"：卡住时，抵制住立即询问AI的冲动。给自己时间去解决问题。挣扎之处即是成长之处。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"深入学习基础知识\"}],\"：对算法、数据结构和设计模式的扎实掌握，使你能够批判性地评估AI生成的解决方案。与其让AI给出答案，不如（如果需要的话）与它讨论，并要求它提供相关的（人类编写的！）资源以供深入学习。\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"2b:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"寻找平衡-finding-the-balance\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#寻找平衡-finding-the-balance\",\"children\":\"寻找平衡 (Finding the Balance)\"}]}]\n2c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这并非要拒绝进步或成为一个编码纯粹主义者。而是关于在一个日益自动化的手艺中保持人的要素。\"}]\n2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"就像厨师可能会使用食物处理器来处理繁琐的准备工作，但绝不会梦想将食谱开发和风味平衡这些创造性方面自动化一样，我们应该利用AI做它擅长的事情，同时保留那些给我们带来乐趣和成长的编码部分。\"}]\n2e:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"结论\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#结论\",\"children\":\"结论\"}]}]\n2f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在一个推动“主动自觉地使用AI”的世界里，我倡导的是不同的东西：一种深思熟虑的、有意识的与AI协作，从而保留编码作为一门手艺的精髓。\"}]\n30:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"像洛奇一样，我们有时需要离开舒适、文明（安逸）的环境，回归旧式健身房——那个通过挣扎、坚持和专注的练习来实现真正成长的地方。\"}]\n31:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"因为编码不仅仅关乎产出。它是成为更好的问题解决者、更好的思考者和更好的工程师的旅程。而有些旅程是无法外包的，即使是给最先进的AI。\"}]\n32:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"让我们用AI自动化无聊的部分，但将手艺掌握在自己手中。\"}]\n33:[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"clas"])</script><script>self.__next_f.push([1,"sName\":\"mb-6\",\"children\":\"“重要的不是你能出多重的拳，而是你能承受多重的打击并继续前进。” – 洛奇·巴尔博亚 (Rocky Balboa)\"}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"13:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nd:null\n"])</script><script>self.__next_f.push([1,"34:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"f:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"编码作为手艺——回归旧式健身房 | Linguista\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"本文以洛奇·巴尔博亚的旧式健身房为隐喻，探讨在AI日益渗透编程工作的时代，开发者应如何保持对编码手艺的掌控。作者主张AI适合处理样板代码和文档总结等机械性工作，但编程的核心思考、架构设计和认知挣扎不应被外包，因为正是这些挣扎塑造了工程师的成长与能力。文章倡导有意识地与AI协作，而非不假思索地依赖AI。\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI辅助编程,编码手艺,认知挣扎,软件工程,开发者成长\"}],[\"$\",\"link\",\"3\",{\"rel\":\"canonical\",\"href\":\"https://linguista.cn/rosetta/notes/to-modify/coding-as-craft-going-back-to-the-old-gym/\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:title\",\"content\":\"编码作为手艺——回归旧式健身房 | Linguista\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:description\",\"content\":\"本文以洛奇·巴尔博亚的旧式健身房为隐喻，探讨在AI日益渗透编程工作的时代，开发者应如何保持对编码手艺的掌控。作者主张AI适合处理样板代码和文档总结等机械性工作，但编程的核心思考、架构设计和认知挣扎不应被外包，因为正是这些挣扎塑造了工程师的成长与能力。文章倡导有意识地与AI协作，而非不假思索地依赖AI。\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:url\",\"content\":\"https://linguista.cn/rosetta/notes/to-modify/coding-as-craft-going-back-to-the-old-gym/\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:site_name\",\"content\":\"Linguista\"}],[\"$\",\"meta\",\"8\",{\"property\":\"og:locale\",\"content\":\"zh_CN\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:image\",\"content\":\"https://linguista.cn/img/rosetta-social.png\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:image:alt\",\"content\":\"编码作为手艺——回归旧式健身房\"}],[\"$\",\"meta\",\"11\",{\"property\":\"og:image:width\",\"content\":\"512\"}],[\"$\",\"meta\",\"12\",{\"property\":\"og:image:height\",\"content\":\"512\"}],[\"$\",\"meta\",\"13\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"14\",{\"name\":\"twitter:card\",\"content
