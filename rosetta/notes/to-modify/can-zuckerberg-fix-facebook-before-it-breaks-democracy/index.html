frustrating and evasive reply. I asked him to specify the problem. He said, “Across the board, the solution to this is we need to move from what is fundamentally a reactive model to a model where we are using technical systems to flag things to a much larger number of people who speak all the native languages around the world and who can just capture much more of the content.”\"}]\n"])</script><script>self.__next_f.push([1,"65:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"I told him that people in Myanmar are incredulous that a company with Facebook’s resources has failed to heed their complaints. “We’re taking this seriously,” he said. “You can’t just snap your fingers and solve these problems. It takes time to hire the people and train them, and to build the systems that can flag stuff for them.” He promised that Facebook would have “a hundred or more Burmese-speaking people by the end of the year,” and added, “I hate that we’re in this position where we are not moving as quickly as we would like.” A few weeks after our conversation, Facebook announced that it was banning Myanmar’s Army chief and several other military officials.\"}]\n"])</script><script>self.__next_f.push([1,"66:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Over the years, Zuckerberg had come to see his ability to reject complaints as a virtue. But, by 2016, that stance had primed the company for a crisis. Tristan Harris, the design ethicist, said, “When you’re running anything like Facebook, you get criticized all the time, and you just stop paying attention to criticism if a lot of it is not well founded. You learn to treat it as naïve and uninformed.” He went on, “The problem is it also puts you out of touch with genuine criticism from people who actually understand the issues.”\"}]\n67:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The 2016 election was supposed to be good for Facebook. That January, Sheryl Sandberg told investors that the election would be “a big deal in terms of ad spend,” comparable to the Super Bowl and the World Cup. According to Borrell Associates, a research and consulting firm, candidates and other political groups were on track to spend $1.4 billion online in the election, up ninefold from four years earlier.\"}]\n68:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Facebook offered to “embed” employees, for free, in Presidential campaign offices to help them use the platform effectively. Clinton’s campaign said no. Trump’s said yes, and Facebook employees helped his campaign craft messages. Although Trump’s language was openly hostile to ethnic minorities, inside Facebook his behavior felt, to some executives, like just part of the distant cesspool of Washington. Americans always seemed to be choosing between a hated Republican and a hated Democrat, and Trump’s descriptions of Mexicans as rapists was simply an extension of that.\"}]\n69:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"During the campaign, Trump used Facebook to raise two hundred and eighty million dollars. Just days before the election, his team paid for a voter-suppression effort on the platform. According to \",[\"$\",\"em\",null,{\"children\":\"Bloomberg Businessweek\"}],\", it targeted three Democratic constituen"])</script><script>self.__next_f.push([1,"cies—“idealistic white liberals, young women, and African Americans”—sending them videos precisely tailored to discourage them from turning out for Clinton. Theresa Hong, the Trump campaign’s digital-content director, later told an interviewer, “Without Facebook we wouldn’t have won.”\"]}]\n"])</script><script>self.__next_f.push([1,"6a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"After the election, Facebook executives fretted that the company would be blamed for the spread of fake news. Zuckerberg’s staff gave him statistics showing that the vast majority of election information on the platform was legitimate. At a tech conference a few days later, Zuckerberg was defensive. “The idea that fake news on Facebook—of which, you know, it’s a very small amount of the content—influenced the election in any way, I think, is a pretty crazy idea,” he said. To some at Facebook, Zuckerberg’s defensiveness was alarming. A former executive told \",[\"$\",\"a\",null,{\"href\":\"https://www.wired.com/story/inside-facebook-mark-zuckerberg-2-years-of-hell/\",\"children\":[[\"$\",\"em\",null,{\"children\":\"Wired\"}],\",\"]}],\" “We had to really flip him on that. We realized that if we didn’t, the company was going to start heading down this pariah path.”\"]}]\n"])</script><script>self.__next_f.push([1,"6b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"When I asked Zuckerberg about his “pretty crazy” comment, he said that he was wrong to have been “glib.” He told me, “Nobody wants any amount of fake news. It is an issue on an ongoing basis, and we need to take that seriously.” But he still bristles at the implication that Facebook may have distorted voter behavior. “I find the notion that people would only vote some way because they were tricked to be almost viscerally offensive,” he said. “Because it goes against the whole notion that you should trust people and that individuals are smart and can understand their own experience and can make their own assessments about what direction they want their community to go in.”\"}]\n"])</script><script>self.__next_f.push([1,"6c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Shortly after the election, Mark Warner, the ranking Democrat on the Senate Intelligence Committee, contacted Facebook to discuss Russian interference. “The initial reaction was completely dismissive,” he told me. But, by the spring, he sensed that the company was realizing that it had a serious problem. “They were seeing an enormous amount of Russian activity in the French elections,” Warner said. “It was getting better, but I still don’t think they were putting nearly enough resources behind this.” Warner, who made a fortune in the telecom business, added, “Most of the companies in the Valley think that policymakers, one, don’t get it, and, two, that ultimately, if they just stonewall us, then we’ll go away.”\"}]\n"])</script><script>self.__next_f.push([1,"6d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Facebook moved fitfully to acknowledge the role it had played in the election. In September of 2017, after Robert Mueller obtained a search warrant, Facebook agreed to give his office an inventory of ads linked to Russia and the details of who had paid for them. In October, Facebook disclosed that Russian operatives had published about eighty thousand posts, reaching a hundred and twenty-six million Americans.\"}]\n6e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"In March, after the Cambridge Analytica news broke, Zuckerberg and Facebook were paralyzed. For five days, Zuckerberg said nothing. His personal Facebook profile offered no statements or analysis. Its most recent post was a photo of him and Chan baking hamantaschen for Purim.\"}]\n"])</script><script>self.__next_f.push([1,"6f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“I feel like we’ve let people down and that feels terrible,” he told me later. “But it goes back to this notion that we shouldn’t be making the same mistake multiple times.” He insists that fake news is less common than people imagine: “The average person might perceive, from how much we and others talk about it, that there is more than ten times as much misinformation or hoax content on Facebook than the academic measures that we’ve seen so far suggest.” He is still not convinced that the spread of misinformation had an impact on the election. “I actually don’t consider that a closed thing,” he said. “I still think that’s the kind of thing that needs to be studied.”\"}]\n"])</script><script>self.__next_f.push([1,"70:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"In conversation, Zuckerberg is, unsurprisingly, highly analytical. When he encounters a theory that doesn’t accord with his own, he finds a seam of disagreement—a fact, a methodology, a premise—and hammers at it. It’s an effective technique for winning arguments, but one that makes it difficult to introduce new information. Over time, some former colleagues say, his deputies have begun to filter out bad news from presentations before it reaches him. A former Facebook official told me, “They only want to hear good news. They don’t want people who are disagreeing with them. There is a culture of ‘You go along to get along.’ ”\"}]\n"])</script><script>self.__next_f.push([1,"71:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://pocket-image-cache.com//filters:format(jpg):extract_focal()/https%3A%2F%2Fmedia.newyorker.com%2Fcartoons%2F5b92f3cfbc66792cd5fab4be%2Fmaster%2Fw_1600%252Cc_limit%2F180917_a22146.jpg\",\"alt\":\"“No, Bobby. No.”\"}]}]\n72:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“No, Bobby. No.”\"}]\n73:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"I once asked Zuckerberg what he reads to get the news. “I probably mostly read aggregators,” he said. “I definitely follow Techmeme”—a roundup of headlines about his industry—“and the media and political equivalents of that, just for awareness.” He went on, “There’s really no newspaper that I pick up and read front to back. Well, that might be true of most people these days—most people don’t read the physical paper—but there aren’t many news Web sites where I go to browse.”\"}]\n74:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"A couple of days later, he called me and asked to revisit the subject. “I felt like my answers were kind of vague, because I didn’t necessarily feel like it was appropriate for me to get into which specific organizations or reporters I read and follow,” he said. “I guess what I tried to convey, although I’m not sure if this came across clearly, is that the job of uncovering new facts and doing it in a trusted way is just an absolutely critical function for society.”\"}]\n75:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Zuckerberg and Sandberg have attributed their mistakes to excessive optimism, a blindness to the darker applications of their service. But that explanation ignores their fixation on growth, and their unwillingness to heed warnings. Zuckerberg resisted calls to reorganize the company around a new understanding of privacy, or to reconsider the depth of data it collects for advertisers.\"}]\n"])</script><script>self.__next_f.push([1,"76:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"James P. Steyer, the founder and C.E.O. of Common Sense Media, an organization that promotes safety in technology and media for children, visited Facebook’s headquarters in the spring of 2018 to discuss his concerns about a product called Messenger Kids, which allows children under thirteen—the minimum age to use the primary Facebook app—to make video calls and send messages to contacts that a parent approves. He met with Sandberg and Elliot Schrage, at the time the head of policy and communications. “I respect their business success, and like Sheryl personally, and I was hoping they might finally consider taking steps to better protect kids. Instead, they said that the best thing for young kids was to spend more time on Messenger Kids,” Steyer told me. “They still seemed to be in denial. Would \",[\"$\",\"em\",null,{\"children\":\"you\"}],\" ‘move fast and break things’ when it comes to children? To our democracy? No, because you can damage them forever.”\"]}]\n"])</script><script>self.__next_f.push([1,"77:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"To some people in the company, the executives seemed concentrated not on solving the problems or on preventing the next ones but on containing the damage. Tavis McGinn, a former Google pollster, started working at Facebook in the spring of 2017, doing polls with a narrow focus: measuring the public perception of Zuckerberg and Sandberg. During the next six months, McGinn conducted eight surveys and four focus groups in three countries, collecting the kinds of measurements favored by politicians and advertisers. Facebook polled reactions to the company’s new stated mission to “bring the world closer together,” as well as to items on Zuckerberg’s social-media feed, including his writings, photographs, and even his casual banter during a back-yard barbecue broadcast on Facebook Live.\"}]\n"])</script><script>self.__next_f.push([1,"78:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"In September, McGinn resigned. In an interview, he told the Web site the Verge that he had become discouraged. “I was not going to be able to change the way that the company does business,” he said. “I couldn’t change the values. I couldn’t change the culture.” He concluded that measuring the “true social outcomes” of Facebook was of limited interest to senior staffers. “I think research can be very powerful, if people are willing to listen,” he said. “But I decided after six months that it was a waste of my time to be there. I didn’t feel great about the product. I didn’t feel proud to tell people I worked at Facebook. I didn’t feel I was helping the world.” (McGinn, who has signed a nondisclosure agreement with Facebook, declined to comment for this article.)\"}]\n"])</script><script>self.__next_f.push([1,"79:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"In March, Zuckerberg agreed to testify before Congress for the first time about Facebook’s handling of user data. The hearing was scheduled for April. As the date approached, the hearing acquired the overtones of a trial.\"}]\na3:T421,"])</script><script>self.__next_f.push([1," that began, “Imagine a not-too-distant future in which trustbusters force Facebook to sell off Instagram and WhatsApp.” It was accompanied by a sepia-toned illustration in which portraits of Zuckerberg, Tim Cook, and other tech C.E.O.s had been grafted onto overstuffed torsos meant to evoke the robber barons. In 1915, Louis Brandeis, the reformer and future Supreme Court Justice, testified before a congressional committee about the dangers of corporations large enough that they could achieve a level of near-sovereignty “so powerful that the ordinary social and industrial forces existing are insufficient to cope with it.” He called this the “curse of bigness.” Tim Wu, a Columbia law-school professor and the author of a forthcoming book inspired by Brandeis’s phrase, told me, “Today, no sector exemplifies more clearly the threat of bigness to democracy than Big Tech.” He added, “When a concentrated private power has such control over what we see and hear, it has a power that rivals or exceeds that of elected government.”"])</script><script>self.__next_f.push([1,"7a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"In barely two years, the mood in Washington had shifted. Internet companies and entrepreneurs, formerly valorized as the vanguard of American ingenuity and the astronauts of our time, were being compared to Standard Oil and other monopolists of the Gilded Age. This spring, the \",[\"$\",\"em\",null,{\"children\":\"Wall Street Journal\"}],\" published \",[\"$\",\"a\",null,{\"href\":\"https://www.wsj.com/articles/techs-titans-tiptoe-toward-monopoly-1527783845\",\"children\":\"an article\"}],\"$a3\"]}]\na4:T45c,"])</script><script>self.__next_f.push([1,"Shortly before Zuckerberg was due to testify, a team from the Washington law firm of WilmerHale flew to Menlo Park to run him through mock hearings and to coach him on the requisite gestures of humility. Even before the recent scandals, Bill Gates had advised Zuckerberg to be alert to the opinions of lawmakers, a lesson that Gates had learned in 1998, when Microsoft faced accusations of monopolistic behavior. Gates testified to Congress, defiantly, that “the computer-software industry is not broken, and there is no need to fix it.” Within months, the Department of Justice sued Microsoft for violating federal antitrust law, leading to three years of legal agony before a settlement was reached. Gates told me that he regretted “taunting” regulators, saying, “Not something I would choose to repeat.” He encouraged Zuckerberg to be attentive to D.C. “I said, ‘Get an office there—now.’ And Mark did, and he owes me,” Gates said. Last year, Facebook spent $11.5 million on lobbying in Washington, ranking it between the American Bankers Association and General Dynamics among top spenders."])</script><script>self.__next_f.push([1,"7b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"$a4\"}]\n"])</script><script>self.__next_f.push([1,"7c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"On April 10th, when Zuckerberg arrived at the \",[\"$\",\"a\",null,{\"href\":\"https://www.newyorker.com/tech/elements/what-was-missing-from-mark-zuckerbergs-first-day-of-congressional-testimony\",\"children\":\"Senate hearing\"}],\", he wore a sombre blue suit, and took a seat before more than forty senators. In front of him, his notes outlined likely questions and answers, including the prospect that a senator might ask him to step down from the company. His answer, in shorthand, would be: “Founded Facebook. My decisions. I made mistakes. Big challenge, but we’ve solved problems before, going to solve this one. Already taking action.”\"]}]\n"])</script><script>self.__next_f.push([1,"7d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"As it turned out, nobody asked him to resign—or much of anything difficult. Despite scattered moments of pressure, the overwhelming impression left by the event was how poorly some senators grasped the issues. In the most revealing moment, Orrin Hatch, the eighty-four-year-old Republican from Utah, demanded to know how Facebook makes money if “users don’t pay for your service.” Zuckerberg replied, “Senator, we run ads,” allowing a small smile.\"}]\n7e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"To observers inclined to distrust Zuckerberg, he was evasive to the point of amnesiac—he said, more than forty times, that he would need to follow up—but when the hearing concluded, after five hours, he had emerged unscathed, and Wall Street, watching closely, rewarded him by boosting the value of Facebook’s stock by twenty billion dollars. A few days later, on the internal Facebook message board, an employee wrote that he planned to buy T-shirts reading “Senator, we run ads.”\"}]\n"])</script><script>self.__next_f.push([1,"7f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"When I asked Zuckerberg whether policymakers might try to break up Facebook, he replied, adamantly, that such a move would be a mistake. The field is “extremely competitive,” he told me. “I think sometimes people get into this mode of ‘Well, there’s not, like, an exact replacement for Facebook.’ Well, actually, that makes it \",[\"$\",\"em\",null,{\"children\":\"more\"}],\" competitive, because what we really are is a system of different things: we compete with Twitter as a broadcast medium; we compete with Snapchat as a broadcast medium; we do messaging, and iMessage is default-installed on every iPhone.” He acknowledged the deeper concern. “There’s this other question, which is just, laws aside, how do we feel about these tech companies being big?” he said. But he argued that efforts to “curtail” the growth of Facebook or other Silicon Valley heavyweights would cede the field to China. “I think that anything that we’re doing to constrain them will, first, have an impact on how successful we can be in other places,” he said. “I wouldn’t worry in the near term about Chinese companies or anyone else winning in the U.S., for the most part. But there are all these places where there are day-to-day more competitive situations—in Southeast Asia, across Europe, Latin America, lots of different places.”\"]}]\n"])</script><script>self.__next_f.push([1,"80:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The rough consensus in Washington is that regulators are unlikely to try to break up Facebook. The F.T.C. will almost certainly fine the company for violations, and may consider blocking it from buying big potential competitors, but, as a former F.T.C. commissioner told me, “in the United States you’re allowed to have a monopoly position, as long as you achieve it and maintain it without doing illegal things.”\"}]\n"])</script><script>self.__next_f.push([1,"81:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Facebook is encountering tougher treatment in Europe, where antitrust laws are stronger and the history of fascism makes people especially wary of intrusions on privacy. One of the most formidable critics of Silicon Valley is the \",[\"$\",\"a\",null,{\"href\":\"https://www.newyorker.com/tag/european-union\",\"children\":\"European Union\"}],\"’s top antitrust regulator, Margrethe Vestager. Last year, after an investigation of Google’s search engine, Vestager accused the company of giving an “illegal advantage” to its shopping service and fined it $2.7 billion, at that time the largest fine ever imposed by the E.U. in an antitrust case. In July, she added another five-billion-dollar fine for the company’s practice of requiring device makers to preinstall Google apps.\"]}]\n"])</script><script>self.__next_f.push([1,"82:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"In Brussels, Vestager is a high-profile presence—nearly six feet tall, with short black-and-silver hair. She grew up in rural Denmark, the eldest child of two Lutheran pastors, and, when I spoke to her recently, she talked about her enforcement powers in philosophical terms. “What we’re dealing with, when people start doing something illegal, is exactly as old as Adam and Eve,” she said. “Human decisions very often are guided by greed, by fear of being pushed out of the marketplace, or of losing something that’s important to you. And then, if you throw power into that cocktail of greed and fear, you have something that you can recognize throughout time.”\"}]\n"])</script><script>self.__next_f.push([1,"83:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Vestager told me that her office has no open cases involving Facebook, but she expressed concern that the company was taking advantage of users, beginning with terms of service that she calls “unbalanced.” She paraphrased those terms as “It’s your data, but you give us a royalty-free global license to do, basically, whatever we want.” Imagine, she said, if a brick-and-mortar business asked to copy all your photographs for its unlimited, unspecified uses. “Your children, from the very first day until the confirmation, the rehearsal dinner for the wedding, the wedding itself, the first child being baptized. You would never accept that,” she said. “But this is what you accept without a blink of an eye when it’s digital.”\"}]\n"])</script><script>self.__next_f.push([1,"84:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"In Vestager’s view, a healthy market should produce competitors to Facebook that position themselves as ethical alternatives, collecting less data and seeking a smaller share of user attention. “We need social media that will allow us to have a nonaddictive, advertising-free space,” she said. “You’re more than welcome to be successful and to dramatically outgrow your competitors if customers like your product. But, if you grow to be dominant, you have a special responsibility not to misuse your dominant position to make it very difficult for others to compete against you and to attract potential customers. Of course, we keep an eye on it. If we get worried, we will start looking.”\"}]\n"])</script><script>self.__next_f.push([1,"85:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://pocket-image-cache.com//filters:format(jpg):extract_focal()/https%3A%2F%2Fmedia.newyorker.com%2Fcartoons%2F5b92f3cf477b8357353ab503%2Fmaster%2Fw_1600%252Cc_limit%2F180917_a22153.jpg\",\"alt\":\"“Temperatures are expected to rise throughout the day, sir. May we remove our frock coats?”\"}]}]\n86:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“Temperatures are expected to rise throughout the day, sir. May we remove our frock coats?”\"}]\n"])</script><script>self.__next_f.push([1,"87:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"As the pressure on Facebook has intensified, the company has been moving to fix its vulnerabilities. In December, after Sean Parker and Chamath Palihapitiya spoke publicly about the damaging psychological effects of social media, Facebook acknowledged evidence that heavy use can exacerbate anxiety and loneliness. After years of perfecting addictive features, such as “auto-play” videos, it announced a new direction: it would promote the quality, rather than the quantity, of time spent on the site. The company modified its algorithm to emphasize updates from friends and family, the kind of content most likely to promote “active engagement.” In a post, Zuckerberg wrote, “We can help make sure that Facebook is time well spent.”\"}]\n"])</script><script>self.__next_f.push([1,"88:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The company also grappled with the possibility that it would once again become a vehicle for election-season propaganda. In 2018, hundreds of millions of people would be voting in elections around the world, including in the U.S. midterms. After years of lobbying against requirements to disclose the sources of funding for political ads, the company announced that users would now be able to look up who paid for a political ad, whom the ad targeted, and which other ads the funders had run.\"}]\n89:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Samidh Chakrabarti, the product manager in charge of Facebook’s “election integrity” work, told me that the revelations about Russia’s Internet Research Agency were deeply alarming. “This wasn’t the kind of product that any of us thought that we were working on,” he said. With the midterms approaching, the company had discovered that Russia’s model for exploiting Facebook had inspired a generation of new actors similarly focussed on skewing political debate. “There are lots of copycats,” Chakrabarti said.\"}]\n"])</script><script>self.__next_f.push([1,"8a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Zuckerberg used to rave about the virtues of “frictionless sharing,” but these days Facebook is working on “imposing friction” to slow the spread of disinformation. In January, the company hired Nathaniel Gleicher, the former director for cybersecurity policy on President Obama’s National Security Council, to blunt “information operations.” In July, it removed thirty-two accounts running disinformation campaigns that were traced to Russia. A few weeks later, it removed more than six hundred and fifty accounts, groups, and pages with links to Russia or Iran. Depending on your point of view, the removals were a sign either of progress or of the growing scale of the problem. Regardless, they highlighted the astonishing degree to which the security of elections around the world now rests in the hands of Gleicher, Chakrabarti, and other employees at Facebook.\"}]\n"])</script><script>self.__next_f.push([1,"8b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"As hard as it is to curb election propaganda, Zuckerberg’s most intractable problem may lie elsewhere—in the struggle over which opinions can appear on Facebook, which cannot, and who gets to decide. As an engineer, Zuckerberg never wanted to wade into the realm of content. Initially, Facebook tried blocking certain kinds of material, such as posts featuring nudity, but it was forced to create long lists of exceptions, including images of breast-feeding, “acts of protest,” and works of art. Once Facebook became a venue for political debate, the problem exploded. In April, in a call with investment analysts, Zuckerberg said glumly that it was proving “easier to build an A.I. system to detect a nipple than what is hate speech.”\"}]\n"])</script><script>self.__next_f.push([1,"8c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"The cult of growth leads to the curse of bigness: every day, a billion things were being posted to Facebook. At any given moment, a Facebook “content moderator” was deciding whether a post in, say, Sri Lanka met the standard of hate speech or whether a dispute over Korean politics had crossed the line into bullying. Zuckerberg sought to avoid banning users, preferring to be a “platform for all ideas.” But he needed to prevent Facebook from becoming a swamp of hoaxes and abuse. His solution was to ban “hate speech” and impose lesser punishments for “misinformation,” a broad category that ranged from crude deceptions to simple mistakes. Facebook tried to develop rules about how the punishments would be applied, but each idiosyncratic scenario prompted more rules, and over time they became byzantine. According to Facebook training slides published by the \",[\"$\",\"em\",null,{\"children\":\"Guardian\"}],\" last year, moderators were told that it was permissible to say “You are such a Jew” but not permissible to say “Irish are the best, but really French sucks,” because the latter was defining another people as “inferiors.” Users could not write “Migrants are scum,” because it is dehumanizing, but they could write “Keep the horny migrant teen-agers away from our daughters.” The distinctions were explained to trainees in arcane formulas such as “Not Protected + Quasi protected = not protected.”\"]}]\n"])</script><script>self.__next_f.push([1,"8d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"In July, the issue landed, inescapably, in Zuckerberg’s lap. For years, Facebook had provided a platform to the conspiracy theorist Alex Jones, whose delusions include that the parents of children killed in the \",[\"$\",\"a\",null,{\"href\":\"https://www.newyorker.com/tag/newtown-shooting\",\"children\":\"Sandy Hook school massacre\"}],\" are paid actors with an anti-gun agenda. Facebook was loath to ban Jones. When people complained that his rants violated rules against harassment and fake news, Facebook experimented with punishments. At first, it “reduced” him, tweaking the algorithm so that his messages would be shown to fewer people, while feeding his fans articles that fact-checked his assertions.\"]}]\n"])</script><script>self.__next_f.push([1,"8e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Then, in late July, Leonard Pozner and Veronique De La Rosa, the parents of Noah Pozner, a child killed at Sandy Hook, published an open letter addressed “Dear Mr Zuckerberg,” in which they described “living in hiding” because of death threats from conspiracy theorists, after “an almost inconceivable battle with Facebook to provide us with the most basic of protections.” In their view, Zuckerberg had “deemed that the attacks on us are immaterial, that providing assistance in removing threats is too cumbersome, and that our lives are less important than providing a safe haven for hate.”\"}]\n"])</script><script>self.__next_f.push([1,"8f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Facebook relented, somewhat. On July 27th, it took down four of Jones’s videos and suspended him for a month. But public pressure did not let up. On August 5th, the dam broke after Apple, saying that the company “does not tolerate hate speech,” stopped distributing five podcasts associated with Jones. Facebook shut down four of Jones’s pages for “repeatedly” violating rules against hate speech and bullying. I asked Zuckerberg why Facebook had wavered in its handling of the situation. He was prickly about the suggestion: “I don’t believe that it is the right thing to ban a person for saying something that is factually incorrect.”\"}]\n"])</script><script>self.__next_f.push([1,"90:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Jones seemed a lot more than factually incorrect, I said.\"}]\n"])</script><script>self.__next_f.push([1,"91:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"“O.K., but I think the facts here are pretty clear,” he said, homing in. “The \",[\"$\",\"em\",null,{\"children\":\"initial\"}],\" questions were around misinformation.” He added, “We don’t take it down and ban people unless it’s directly inciting violence.” He told me that, after Jones was reduced, more complaints about him flooded in, alerting Facebook to older posts, and that the company was debating what to do when Apple announced its ban. Zuckerberg said, “When they moved, it was, like, O.K., we shouldn’t just be sitting on this content and these enforcement decisions. We should move on what we know violates the policy. We need to make a decision now.”\"]}]\n"])</script><script>self.__next_f.push([1,"a5:T427,"])</script><script>self.__next_f.push([1,"It will hardly be the last quandary of this sort. Facebook’s free-speech dilemmas have no simple answers—you don’t have to be a fan of Alex Jones to be unnerved by the company’s extraordinary power to silence a voice when it chooses, or, for that matter, to amplify others, to pull the levers of what we see, hear, and experience. Zuckerberg is hoping to erect a scalable system, an orderly decision tree that accounts for every eventuality and exception, but the boundaries of speech are a bedevilling problem that defies mechanistic fixes. The Supreme Court, defining obscenity, landed on “I know it when I see it.” For now, Facebook is making do with a Rube Goldberg machine of policies and improvisations, and opportunists are relishing it. Senator Ted Cruz, Republican of Texas, seized on the ban of Jones as a fascist assault on conservatives. In a moment that was rich even by Cruz’s standards, he quoted Martin Niemöller’s famous lines about the Holocaust, saying, “As the poem goes, you know, ‘First they came for Alex Jones.’ ”"])</script><script>self.__next_f.push([1,"92:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"$a5\"}]\na6:T52d,"])</script><script>self.__next_f.push([1,"Last week, testifying before the Senate Intelligence Committee, Sandberg said, “We now have over twenty thousand people and we are able to review reports in fifty languages, twenty-four hours a day.” (In the hallway before the session, as if to underscore the complexities ahead, Alex Jones had made a scene, heckling Senator Marco Rubio for not doing more to get him back on Facebook.) In recent years, Sandberg has gained fame for her work outside the company, including her books, “Lean In,” a best-seller on women’s empowerment, and “Option B,” which she wrote after the sudden death of her husband, Dave Goldberg. But her responsibility for the Facebook fallout is likely to grow, and her reputation as C.O.O. hinges on the implementation of changes. Many people in Silicon Valley believe that Sandberg and Facebook’s board of directors must do more to prevent the company from making another major mistake. “I know a couple of guys who are color-blind,” a prominent executive told me, “and their wives lay their clothes out for them in the morning if they don’t want to go out every day looking like Bozo the Clown. Sheryl and the board are expected to lay the clothes out for Mark.” He went on, “If you have blind spots, then you rely on the people around you to tell you where they are.”"])</script><script>self.__next_f.push([1,"93:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"$a6\"}]\n94:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"In one of our conversations, I asked Zuckerberg whether he finds it insulting when people speculate that he lacks emotions. “Insulting?” he asked, and then paused for several seconds to consider. “I don’t find it insulting. I don’t think it’s \",[\"$\",\"em\",null,{\"children\":\"accurate\"}],\". I mean, I definitely care a lot. There’s a difference between letting emotions drive impulsive decisions and caring.” He went on, “Ultimately, I think the reason that we built this successful thing is because we just solve problem after problem after problem, and typically you don’t do that by making impulsive, emotional decisions.”\"]}]\n95:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"The caricature of Zuckerberg is that of an automaton with little regard for the human dimensions of his work. The truth is something else: he decided long ago that no historical change is painless. Like Augustus, he is at peace with his trade-offs. Between speech and truth, he chose speech. Between speed and perfection, he chose speed. Between scale and safety, he chose scale. His life thus far has convinced him that he can solve “problem after problem after problem,” no matter the howling from the public it may cause.\"}]\n96:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"At a certain point, the habits of mind that served Zuckerberg well on his ascent will start to work against him. To avoid further crises, he will have to embrace the fact that he’s now a protector of the peace, not a disrupter of it. Facebook’s colossal power of persuasion has delivered fortune but also peril. Like it or not, Zuckerberg is a gatekeeper. The era when Facebook could learn by doing, and fix the mistakes later, is over. The costs are too high, and idealism is not a defense against negligence.\"}]\n"])</script><script>self.__next_f.push([1,"97:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"In some sense, the “Mark Zuckerberg production”—as he called Facebook in its early years—has only just begun. Zuckerberg is not yet thirty-five, and the ambition with which he built his empire could well be directed toward shoring up his company, his country, and his name. The question is not whether Zuckerberg has the power to fix Facebook but whether he has the will; whether he will kick people out of his office—with the gusto that he once mustered for the pivot to mobile—if they don’t bring him ideas for preventing violence in Myanmar, or protecting privacy, or mitigating the toxicity of social media. He succeeded, long ago, in making Facebook great. The challenge before him now is to make it good. ♦\"}]\n"])</script><script>self.__next_f.push([1,"98:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://pocket-image-cache.com//filters:format(jpg):extract_focal()/https%3A%2F%2Fwww.newyorker.com%2Fverso%2Fstatic%2Fthe-new-yorker%2Fassets%2Flogo-header.svg\",\"alt\":\"\"}]}]\n99:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://pocket-image-cache.com//filters:format(jpg):extract_focal()/https%3A%2F%2Fmedia.newyorker.com%2Fphotos%2F5b92bd9501fe0d4c650955f2%2Fmaster%2Fw_2560%252Cc_limit%2F180917_r32804.gif\",\"alt\":\"Zuckerberg is at the center of a debate about the moral character of Silicon Valley and the conscience of its leaders.Illustration by Javier Jaén; photograph by David Yellen / Corbis / Getty\"}]}]\n9a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Zuckerberg is at the center of a debate about the moral character of Silicon Valley and the conscience of its leaders.Illustration by Javier Jaén; photograph by David Yellen / Corbis / Getty\"}]\n"])</script><script>self.__next_f.push([1,"14:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n10:null\n"])</script><script>self.__next_f.push([1,"a7:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"12:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"扎克伯格能在Facebook破坏民主之前修复它吗 | Linguista\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"本文是《纽约客》对Facebook创始人马克·扎克伯格的深度特写。在经历了两年持续不断的争议之后，记者走进扎克伯格位于帕洛阿尔托的家中，试图探究这位全球最知名的科
