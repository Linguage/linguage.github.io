Agentic Coding**：指由 AI 代理自主完成编码任务的开发模式，AI 能够自动拉取上下文、理解代码结构并执行多步骤操作\n\n**CLAUDE.md**：Claude Code 的专用配置文件，用于定义项目规范、常用命令和代码风格等信息，启动对话时自动加载到上下文中\n\n**Context Gathering**：上下文收集机制，Claude Code 自动获取项目相关信息以辅助生成代码，但会消耗时间和 token，需要通过环境调优来优化\n\n**Prompt Tuning**：提示词调优，通过迭代和优化 CLAUDE.md 中的指令内容来提升模型的指令遵循能力，包括添加强调标记等技巧\n\n**Low-level Tool Design**：低层级工具设计理念，Claude Code 有意保持底层和无预设立场的设计，提供接近原始模型访问的灵活性而非强制特定工作流\n\n![](https://www-cdn.anthropic.com/images/4zrzovbb/website/6295100fcf8952bed666ba69536c581af87eef15-2554x2554.svg)\n\nPublished Apr 18, 2025\n\nClaude Code is a command line tool for agentic coding. This post covers tips and tricks that have proven effective for using Claude Code across various codebases, languages, and environments.\n\nWe recently [released Claude Code](https://www.anthropic.com/news/claude-3-7-sonnet), a command line tool for agentic coding. Developed as a research project, Claude Code gives Anthropic engineers and researchers a more native way to integrate Claude into their coding workflows.\n\nClaude Code is intentionally low-level and unopinionated, providing close to raw model access without forcing specific workflows. This design philosophy creates a flexible, customizable, scriptable, and safe power tool. While powerful, this flexibility presents a learning curve for engineers new to agentic coding tools—at least until they develop their own best practices.\n\nThis post outlines general patterns that have proven effective, both for Anthropic's internal teams and for external engineers using Claude Code across various codebases, languages, and environments. Nothing in this list is set in stone nor universally applicable; consider these suggestions as starting points. We encourage you to experiment and find what works best for you!\n\n_Looking for more detailed information? Our comprehensive documentation at [claude.ai/code](https://claude.ai/code)_ _covers all the features mentioned in this post and provides additional examples, implementation details, and advanced techniques._\n\n## 1. Customize your setup\n\nClaude Code is an agentic coding assistant that automatically pulls context into prompts. This context gathering consumes time and tokens, but you can optimize it through environment tuning.\n\n### a. Create CLAUDE.md files\n\nCLAUDE.md is a special file that Claude automatically pulls into context when starting a conversation. This makes it an ideal place for documenting:\n\n- Common bash commands\n- Core files and utility functions\n- Code style guidelines\n- Testing instructions\n- Repository etiquette (e.g., branch naming, merge vs. rebase, etc.)\n- Developer environment setup (e.g., pyenv use, which compilers work)\n- Any unexpected behaviors or warnings particular to the project\n- Other information you want Claude to remember\n\nThere’s no required format for CLAUDE.md files. We recommend keeping them concise and human-readable. For example:\n\n```\n# Bash commands\n- npm run build: Build the project\n- npm run typecheck: Run the typechecker\n\n# Code style\n- Use ES modules (import/export) syntax, not CommonJS (require)\n- Destructure imports when possible (eg. import { foo } from 'bar')\n\n# Workflow\n- Be sure to typecheck when you’re done making a series of code changes\n- Prefer running single tests, and not the whole test suite, for performance\n```\n\nYou can place CLAUDE.md files in several locations:\n\n- **The root of your repo**, or wherever you run _claude_ from (the most common usage). Name it CLAUDE.md and check it into git so that you can share it across sessions and with your team (recommended), or name it CLAUDE.local.md and .gitignore it\n- **Any parent of the directory** where you run _claude_. This is most useful for monorepos, where you might run _claude_ from _root/foo_, and have CLAUDE.md files in both _root/CLAUDE.md_ and _root/foo/CLAUDE.md_. Both of these will be pulled into context automatically\n- **Any child of the directory** where you run _claude_. This is the inverse of the above, and in this case, Claude will pull in CLAUDE.md files on demand when you work with files in child directories\n- **Your home folder** (_~/.claude/CLAUDE.md_), which applies it to all your _claude_ sessions\n\nWhen you run the /init command, Claude will automatically generate a CLAUDE.md for you.\n\n### b. Tune your CLAUDE.md files\n\nYour CLAUDE.md files become part of Claude’s prompts, so they should be refined like any frequently used prompt. A common mistake is adding extensive content without iterating on its effectiveness. Take time to experiment and determine what produces the best instruction following from the model.\n\nYou can add content to your CLAUDE.md manually or press the # key to give Claude an instruction that it will automatically incorporate into the relevant CLAUDE.md. Many engineers use # frequently to document commands, files, and style guidelines while coding, then include CLAUDE.md changes in commits so team members benefit as well.\n\nAt Anthropic, we occasionally run CLAUDE.md files through the [prompt improver](https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/prompt-improver) and often tune instructions (e.g. adding emphasis with \"IMPORTANT\" or \"YOU MUST\") to improve adherence.\n\n![Claude Code tool allowlist](https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F6961243cc6409e41ba93895faded4f4bc1772366-1600x1231.png\u0026w=3840\u0026q=75)\n\n### c. Curate Claude's list of allowed tools\n\nBy default, Claude Code requests permission for any action that might modify your system: file writes, many bash commands, MCP tools, etc. We designed Claude Code with this deliberately conservative approach to prioritize safety. You can customize the allowlist to permit additional tools that you know are safe, or to allow potentially unsafe tools that are easy to undo (e.g., file editing, _git commit_).\n\nThere are four ways to manage allowed tools:\n\n- **Select \"Always allow\"** when prompted during a session.\n- **Use the _/allowed-tools_ command** after starting Claude Code to add or remove tools from the allowlist. For example, you can add _Edit_ to always allow file edits, _Bash(git commit:*)_ to allow git commits, or _mcp__puppeteer__puppeteer_navigate_ to allow navigating with the Puppeteer MCP server.\n- **Manually edit** your _.claude/settings.json_ or _~/.claude.json_ (we recommend checking the former into source control to share with your team)_._\n- **Use the _--allowedTools_ CLI flag** for session-specific permissions.\n\n### d. If using GitHub, install the gh CLI\n\nClaude knows how to use the _gh_ CLI to interact with GitHub for creating issues, opening pull requests, reading comments, and more. Without _gh_ installed, Claude can still use the GitHub API or MCP server if you have those installed.\n\n## 2. Give Claude more tools\n\nClaude has access to your shell environment, where you can build up sets of convenience scripts and functions for it just like you would for yourself. It can also leverage more complex tools through MCP and REST APIs.\n\n### a. Use Claude with bash tools\n\nClaude Code inherits your bash environment, giving it access to all your tools. While Claude knows common utilities like unix tools and _gh_, it won't know about your custom bash tools without instructions:\n\n1. Tell Claude the tool name with usage examples\n2. Tell Claude to run _--help_ to see tool documentation\n3. Document frequently used tools in CLAUDE.md\n\n### b. Use Claude with MCP\n\nClaude Code functions as both an MCP server and client. As a client, it can connect to any number of MCP servers to access their tools in three ways:\n\n- **In project config** (available when running Claude Code in that directory)\n- **In global config** (available in all projects)\n- **In a checked-in _.mcp.json_ file** (available to anyone working in your codebase). For example, you can add Puppeteer and Sentry servers to your _.mcp.json_, so that every engineer working on your repo can use these out of the box.\n\nWhen working with MCP, it can also be helpful to launch Claude with the _--mcp-debug_ flag to help identify configuration issues.\n\n### c. Use custom slash commands\n\nFor repeated workflows—debugging loops, log analysis, etc.—store prompt templates in Markdown files within the _.claude/commands_ folder. These become available through the slash commands menu when you type /. You can check these commands into git to make them available for the rest of your team.\n\nCustom slash commands can include the special keyword _$ARGUMENTS_ to pass parameters from command invocation.\n\nFor example, here’s a slash command that you could use to automatically pull and fix a Github issue:\n\n```\nPlease analyze and fix the GitHub issue: $ARGUMENTS.\n\nFollow these steps:\n\n1. Use `gh issue view` to get the issue details\n2. Understand the problem described in the issue\n3. Search the codebase for relevant files\n4. Implement the necessary changes to fix the issue\n5. Write and run tests to verify the fix\n6. Ensure code passes linting and type checking\n7. Create a descriptive commit message\n8. Push and create a PR\n\nRemember to use the GitHub CLI (`gh`) for all GitHub-related tasks.\n```\n\nPutting the above content into _.claude/commands/fix-github-issue.md_ makes it available as the _/project:fix-github-issue_ command in Claude Code. You could then for example use _/project:fix-github-issue 1234_ to have Claude fix issue #1234. Similarly, you can add your own personal commands to the _~/.claude/commands_ folder for commands you want available in all of your sessions.\n\n## 3. Try common workflows\n\nClaude Code doesn’t impose a specific workflow, giving you the flexibility to use it how you want. Within the space this flexibility affords, several successful patterns for effectively using Claude Code have emerged across our community of users:\n\n### a. Explore, plan, code, commit\n\nThis versatile workflow suits many problems:\n\n1. **Ask Claude to read relevant files, images, or URLs**, providing either general pointers (\"read the file that handles logging\") or specific filenames (\"read logging.py\"), but explicitly tell it not to write any code just yet.\n    1. This is the part of the workflow where you should consider strong use of subagents, especially for complex problems. Telling Claude to use subagents to verify details or investigate particular questions it might have, especially early on in a conversation or task, tends to preserve context availability without much downside in terms of lost efficiency.\n2. **Ask Claude to make a plan for how to approach a specific problem**. We recommend using the word \"think\" to trigger extended thinking mode, which gives Claude additional computation time to evaluate alternatives more thoroughly. These specific phrases are mapped directly to increasing levels of thinking budget in the system: \"think\" \u0026lt; \"think hard\" \u0026lt; \"think harder\" \u0026lt; \"ultrathink.\" Each level allocates progressively more thinking budget for Claude to use.\n    2. If the results of this step seem reasonable, you can have Claude create a document or a GitHub issue with its plan so that you can reset to this spot if the implementation (step 3) isn’t what you want.\n3. **Ask Claude to implement its solution in code**. This is also a good place to ask it to explicitly verify the reasonableness of its solution as it implements pieces of the solution.\n4. **Ask Claude to commit the result and create a pull request**. If relevant, this is also a good time to have Claude update any READMEs or changelogs with an explanation of what it just did.\n\nSteps #1-#2 are crucial—without them, Claude tends to jump straight to coding a solution. While sometimes that's what you want, asking Claude to research and plan first significantly improves performance for problems requiring deeper thinking upfront.\n\n### b. Write tests, commit; code, iterate, commit\n\nThis is an Anthropic-favorite workflow for changes that are easily verifiable with unit, integration, or end-to-end tests. Test-driven development (TDD) becomes even more powerful with agentic coding:\n\n1. **Ask Claude to write tests based on expected input/output pairs**. Be explicit about the fact that you’re doing test-driven development so that it avoids creating mock implementations, even for functionality that doesn’t exist yet in the codebase.\n2. **Tell Claude to run the tests and confirm they fail**. Explicitly telling it not to write any implementation code at this stage is often helpful.\n3. **Ask Claude to commit the tests** when you’re satisfied with them.\n4. **Ask Claude to write code that passes the tests**, instructing it not to modify the tests. Tell Claude to keep going until all tests pass. It will usually take a few iterations for Claude to write code, run the tests, adjust the code, and run the tests again.\n    1. At this stage, it can help to ask it to verify with independent subagents that the implementation isn’t overfitting to the tests\n5. **Ask Claude to commit the code** once you’re satisfied with the changes.\n\nClaude performs best when it has a clear target to iterate against—a visual mock, a test case, or another kind of output. By providing expected outputs like tests, Claude can make changes, evaluate results, and incrementally improve until it succeeds.\n\n### c. Write code, screenshot result, iterate\n\nSimilar to the testing workflow, you can provide Claude with visual targets:\n\n1. **Give Claude a way to take browser screenshots** (e.g., with the [Puppeteer MCP server](https://github.com/modelcontextprotocol/servers/tree/c19925b8f0f2815ad72b08d2368f0007c86eb8e6/src/puppeteer), an [iOS simulator MCP server](https://github.com/joshuayoes/ios-simulator-mcp), or manually copy / paste screenshots into Claude).\n2. **Give Claude a visual mock** by copying / pasting or drag-dropping an image, or giving Claude the image file path.\n3. **Ask Claude to implement the design** in code, take screenshots of the result, and iterate until its result matches the mock.\n4. **Ask Claude to commit** when you're satisfied.\n\nLike humans, Claude's outputs tend to improve significantly with iteration. While the first version might be good, after 2-3 iterations it will typically look much better. Give Claude the tools to see its outputs for best results.\n\n![Safe yolo mode](https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F6ea59a36fe82c2b300bceaf3b880a4b4852c552d-1600x1143.png\u0026w=3840\u0026q=75)\n\n### d. Safe YOLO mode\n\nInstead of supervising Claude, you can use _claude_ _--dangerously-skip-permissions_ to bypass all permission checks and let Claude work uninterrupted until completion. This works well for workflows like fixing lint errors or generating boilerplate code.\n\nLetting Claude run arbitrary commands is risky and can result in data loss, system corruption, or even data exfiltration (e.g., via prompt injection attacks). To minimize these risks, use _--dangerously-skip-permissions_ in a container without internet access. You can follow this [reference implementation](https://github.com/anthropics/claude-code/tree/main/.devcontainer) using Docker Dev Containers.\n\n### e. Codebase Q\u0026A\n\nWhen onboarding to a new codebase, use Claude Code for learning and exploration. You can ask Claude the same sorts of questions you would ask another engineer on the project when pair programming. Claude can agentically search the codebase to answer general questions like:\n\n- How does logging work?\n- How do I make a new API endpoint?\n- What does `async move { ... }` do on line 134 of foo.rs?\n- What edge cases does _CustomerOnboardingFlowImpl_ handle?\n- Why are we calling _foo()_ instead of _bar()_ on line 333?\n- What’s the equivalent of line 334 of _baz.py_ in Java?\n\nAt Anthropic, using Claude Code in this way has become our core onboarding workflow, significantly improving ramp-up time and reducing load on other engineers. No special prompting is required! Simply ask questions, and Claude will explore the code to find answers.\n\n![Use Claude to interact with git](https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2Fa08ea13c2359aac0eceacebf2e15f81e8e8ec8d2-1600x1278.png\u0026w=3840\u0026q=75)\n\n### f. Use Claude to interact with git\n\nClaude can effectively handle many git operations. Many Anthropic engineers use Claude for 90%+ of our _git_ interactions:\n\n- **Searching _git_ history** to answer questions like \"What changes made it into v1.2.3?\", \"Who owns this particular feature?\", or \"Why was this API designed this way?\" It helps to explicitly prompt Claude to look through git history to answer queries like these.\n- **Writing commit messages**. Claude will look at your changes and recent history automatically to compose a message taking all the relevant context into account\n- **Handling complex git operations** like reverting files, resolving rebase conflicts, and comparing and grafting patches\n\n### g. Use Claude to interact with GitHub\n\nClaude Code can manage many GitHub interactions:\n\n- **Creating pull requests**: Claude understands the shorthand \"pr\" and will generate appropriate commit messages based on the diff and surrounding context.\n- **Implementing one-shot resolutions** for simple code review comments: just tell it to fix comments on your PR (optionally, give it more specific instructions) and push back to the PR branch when it's done.\n- **Fixing failing builds** or linter warnings\n- **Categorizing and triaging open issues** by asking Claude to loop over open GitHub issues\n\nThis eliminates the need to remember _gh_ command line syntax while automating routine tasks.\n\n### h. Use Claude to work with Jupyter notebooks\n\nResearchers and data scientists at Anthropic use Claude Code to read and write Jupyter notebooks. Claude can interpret outputs, including images, providing a fast way to explore and interact with data. There are no required prompts or workflows, but a workflow we recommend is to have Claude Code and a .ipynb file open side-by-side in VS Code.\n\nYou can also ask Claude to clean up or make aesthetic improvements to your Jupyter notebook before you show it to colleagues. Specifically telling it to make the notebook or its data visualizations “aesthetically pleasing” tends to help remind it that it’s optimizing for a human viewing experience.\n\n## 4. Optimize your workflow\n\nThe suggestions below apply across all workflows:\n\n### a. Be specific in your instructions\n\nClaude Code’s success rate improves significantly with more specific instructions, especially on first attempts. Giving clear directions upfront reduces the need for course corrections later.\n\nFor example:\n\n|Poor|Good|\n|---|---|\n|add tests for foo.py|write a new test case for foo.py, covering the edge case where the user is logged out. avoid mocks|\n|why does ExecutionFactory have such a weird api?|look through ExecutionFactory's git history and summarize how its api came to be|\n|add a calendar widget|look at how existing widgets are implemented on the home page to understand the patterns and specifically how code and interfaces are separated out. HotDogWidget.php is a good example to start with. then, follow the pattern to implement a new calendar widget that lets the user select a month and paginate forwards/backwards to pick a year. Build from scratch without libraries other than the ones already used in the rest of the codebase.|\n\nClaude can infer intent, but it can't read minds. Specificity leads to better alignment with expectations.\n\n![Give Claude images](https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F75e1b57a0b696e7aafeca1ed5fa6ba7c601a5953-1360x1126.png\u0026w=3840\u0026q=75)\n\n### b. Give Claude images\n\nClaude excels with images and diagrams through several methods:\n\n- **Paste screenshots** (pro tip: hit _cmd+ctrl+shift+4_ in macOS to screenshot to clipboard and _ctrl+v_ to paste. Note that this is not cmd+v like you would usually use to paste on mac and does not work remotely.)\n- **Drag and drop** images directly into the prompt input\n- **Provide file paths** for images\n\nThis is particularly useful when working with design mocks as reference points for UI development, and visual charts for analysis and debugging. If you are not adding visuals to context, it can still be helpful to be clear with Claude about how important it is for the result to be visually appealing.\n\n![Mention files you want Claude to look at or work on](https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F7372868757dd17b6f2d3fef98d499d7991d89800-1450x1164.png\u0026w=3840\u0026q=75)\n\n### c. Mention files you want Claude to look at or work on\n\nUse tab-completion to quickly reference files or folders anywhere in your repository, helping Claude find or update the right resources.\n\n![Give Claude URLs](https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2Fe071de707f209bbaa7f16b593cc7ed0739875dae-1306x1088.png\u0026w=3840\u0026q=75)\n\n### d. Give Claude URLs\n\nPaste specific URLs alongside your prompts for Claude to fetch and read. To avoid permission prompts for the same domains (e.g., docs.foo.com), use _/allowed-tools_ to add domains to your allowlist.\n\n### e. Course correct early and often\n\nWhile auto-accept mode (shift+tab to toggle) lets Claude work autonomously, you'll typically get better results by being an active collaborator and guiding Claude's approach. You can get the best results by thoroughly explaining the task to Claude at the beginning, but you can also course correct Claude at any time.\n\nThese four tools help with course correction:\n\n- **Ask Claude to make a plan** before coding. Explicitly tell it not to code until you’ve confirmed its plan looks good.\n- **Press Escape to interrupt** Claude during any phase (thinking, tool calls, file edits), preserving context so you can redirect or expand instructions.\n- **Double-tap Escape to jump back in history**, edit a previous prompt, and explore a different direction. You can edit the prompt and repeat until you get the result you're looking for.\n- **Ask Claude to undo changes**, often in conjunction with option #2 to take a different approach.\n\nThough Claude Code occasionally solves problems perfectly on the first attempt, using these correction tools generally produces better solutions faster.\n\n### f. Use /clear to keep context focused\n\nDuring long sessions, Claude's context window can fill with irrelevant conversation, file contents, and commands. This can reduce performance and sometimes distract Claude. Use the _/clear_ command frequently between tasks to reset the context window.\n\n### g. Use checklists and scratchpads for complex workflows\n\nFor large tasks with multiple steps or requiring exhaustive solutions—like code migrations, fixing numerous lint errors, or running complex build scripts—improve performance by having Claude use a Markdown file (or even a GitHub issue!) as a checklist and working scratchpad:\n\nFor example, to fix a large number of lint issues, you can do the following:\n\n1. **Tell Claude to run the lint command** and write all resulting errors (with filenames and line numbers) to a Markdown checklist\n2. **Instruct Claude to address each issue one by one**, fixing and verifying before checking it off and moving to the next\n\n### h. Pass data into Claude\n\nSeveral methods exist for providing data to Claude:\n\n- **Copy and paste** directly into your prompt (most common approach)\n- **Pipe into Claude Code** (e.g., _cat foo.txt | claude_), particularly useful for logs, CSVs, and large data\n- **Tell Claude to pull data** via bash commands, MCP tools, or custom slash commands\n- **Ask Claude to read files** or fetch URLs (works for images too)\n\nMost sessions involve a combination of these approaches. For example, you can pipe in a log file, then tell Claude to use a tool to pull in additional context to debug the logs.\n\n## 5. Use headless mode to automate your infra\n\nClaude Code includes [headless mode](https://docs.anthropic.com/en/docs/agents-and-tools/claude-code/overview#automate-ci-and-infra-workflows) for non-interactive contexts like CI, pre-commit hooks, build scripts, and automation. Use the -p flag with a prompt to enable headless mode, and _--output-format stream-json_ for streaming JSON output.\n\nNote that headless mode does not persist between sessions. You have to trigger it each session.\n\n### a. Use Claude for issue triage\n\nHeadless mode can power automations triggered by GitHub events, such as when a new issue is created in your repository. For example, the public [Claude Code repository](https://github.com/anthropics/claude-code/blob/main/.github/actions/claude-issue-triage-action/action.yml) uses Claude to inspect new issues as they come in and assign appropriate labels.\n\n### b. Use Claude as a linter\n\nClaude Code can provide [subjective code reviews](https://github.com/anthropics/claude-code/blob/main/.github/actions/claude-code-action/action.yml) beyond what traditional linting tools detect, identifying issues like typos, stale comments, misleading function or variable names, and more.\n\n## 6. Uplevel with multi-Claude workflows\n\nBeyond standalone usage, some of the most powerful applications involve running multiple Claude instances in parallel:\n\n### a. Have one Claude write code; use another Claude to verify\n\nA simple but effective approach is to have one Claude write code while another reviews or tests it. Similar to working with multiple engineers, sometimes having separate context is beneficial:\n\n1. Use Claude to write code\n2. Run _/clear_ or start a second Claude in another terminal\n3. Have the second Claude review the first Claude's work\n4. Start another Claude (or _/clear_ again) to read both the code and review feedback\n5. Have this Claude edit the code based on the feedback\n\nYou can do something similar with tests: have one Claude write tests, then have another Claude write code to make the tests pass. You can even have your Claude instances communicate with each other by giving them separate working scratchpads and telling them which one to write to and which one to read from.\n\nThis separation often yields better results than having a single Claude handle everything.\n\n### b. Have multiple checkouts of your repo\n\nRather than waiting for Claude to complete each step, something many engineers at Anthropic do is:\n\n1. **Create 3-4 git checkouts** in separate folders\n2. **Open each folder** in separate terminal tabs\n3. **Start Claude in each folder** with different tasks\n4. **Cycle through** to check progress and approve/deny permission requests\n\n### c. Use git worktrees\n\nThis approach shines for multiple independent tasks, offering a lighter-weight alternative to multiple checkouts. Git worktrees allow you to check out multiple branches from the same repository into separate directories. Each worktree has its own working directory with isolated files, while sharing the same Git history and reflog.\n\nUsing git worktrees enables you to run multiple Claude sessions simultaneously on different parts of your project, each focused on its own independent task. For instance, you might have one Claude refactoring your authentication system while another builds a completely unrelated data visualization component. Since the tasks don't overlap, each Claude can work at full speed without waiting for the other's changes or dealing with merge conflicts:\n\n1. **Create worktrees**: _git worktree add ../project-feature-a feature-a_\n2. **Launch Claude in each worktree**: _cd ../project-feature-a \u0026\u0026 claude_\n3. **Create additional worktrees** as needed (repeat steps 1-2 in new terminal tabs)\n\nSome tips:\n\n- Use consistent naming conventions\n- Maintain one terminal tab per worktree\n- If you’re using iTerm2 on Mac, [set up notifications](https://docs.anthropic.com/en/docs/agents-and-tools/claude-code/overview#notification-setup) for when Claude needs attention\n- Use separate IDE windows for different worktrees\n- Clean up when finished: _git worktree remove ../project-feature-a_\n\n### d. Use headless mode with a custom harness\n\n_claude -p_ (headless mode) integrates Claude Code programmatically into larger workflows while leveraging its built-in tools and system prompt. There are two primary patterns for using headless mode:\n\n1. **Fanning out** handles large migrations or analyses (e.g., analyzing sentiment in hundreds of logs or analyzing thousands of CSVs):\n\n1. Have Claude write a script to generate a task list. For example, generate a list of 2k files that need to be migrated from framework A to framework B.\n2. Loop through tasks, calling Claude programmatically for each and giving it a task and a set of tools it can use. For example: _claude -p “migrate foo.py from React to Vue. When you are done, you MUST return the string OK if you succeeded, or FAIL if the task failed.” --allowedTools Edit Bash(git commit:*)”_\n3. Run the script several times and refine your prompt to get the desired outcome.\n\n2. **Pipelining** integrates Claude into existing data/processing pipelines:\n\n1. Call _claude -p \"\u0026lt;your prompt\u0026gt;\" --json | your_command_, where _your_command_ is the next step of your processing pipeline\n2. That’s it! JSON output (optional) can help provide structure for easier automated processing.\n\nFor both of these use cases, it can be helpful to use the _--verbose_ flag for debugging the Claude invocation. We generally recommend turning verbose mode off in production for cleaner output.\n\nWhat are your tips and best practices for working with Claude Code? Tag @AnthropicAI so we can see what you're building!\n\n## Acknowledgements\n\nWritten by Boris Cherny. This work draws upon best practices from across the broader Claude Code user community, whose creative approaches and workflows continue to inspire us. Special thanks also to Daisy Hollman, Ashwin Bhat, Cat Wu, Sid Bidasaria, Cal Rueb, Nodir Turakulov, Barry Zhang, Drew Hodun and many other Anthropic engineers whose valuable insights and practical experience with Claude Code helped shape these recommendations.\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"claude-code-best-practices-for-agentic-coding\",\"slugSegments\":[\"notes\",\"to-modify\",\"claude-code-best-practices-for-agentic-coding\"],\"pathSegments\":[\"notes\",\"to-modify\",\"claude-code-best-practices-for-agentic-coding\"],\"urlPath\":\"/rosetta/notes/to-modify/claude-code-best-practices-for-agentic-coding\",\"href\":\"/rosetta/notes/to-modify/claude-code-best-practices-for-agentic-coding\",\"category\":\"to-modify\",\"title\":\"Claude Code 智能编程最佳实践指南\",\"date\":\"2025-04-18\",\"excerpt\":\"本文介绍了 Anthropic 推出的命令行智能编程工具 Claude Code 的使用技巧与最佳实践。内容涵盖如何通过 CLAUDE.md 文件自定义开发环境、优化上下文配置、提升编码效率等方面，适用于不同代码库、编程语言和开发环境，帮助开发者更好地将 AI 融入日常编程工作流。\",\"coverImage\":\"$undefined\",\"author\":\"Anthropic\",\"original\":\"「Claude Code」Best practices for agentic coding.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"Claude Code\",\"agentic coding\",\"AI编程\",\"开发工具\",\"最佳实践\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"Claude Code 智能编程最佳实践指南\",\"excerpt\":\"本文介绍了 Anthropic 推出的命令行智能编程工具 Claude Code 的使用技巧与最佳实践。内容涵盖如何通过 CLAUDE.md 文件自定义开发环境、优化上下文配置、提升编码效率等方面，适用于不同代码库、编程语言和开发环境，帮助开发者更好地将 AI 融入日常编程工作流。\",\"date\":\"2025-04- [\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"The root of your repo\"}],\", or wherever you run \",[\"$\",\"em\",null,{\"children\":\"claude\"}],\" from (the most common usage). Name it CLAUDE.md and check it into git so that you can share it across sessions and with your team (recommended), or name it CLAUDE.local.md and .gitignore it\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Any parent of the directory\"}],\" where you run \",[\"$\",\"em\",null,{\"children\":\"claude\"}],\". This is most useful for monorepos, where you might run \",[\"$\",\"em\",null,{\"children\":\"claude\"}],\" from \",[\"$\",\"em\",null,{\"children\":\"root/foo\"}],\", and have CLAUDE.md files in both \",[\"$\",\"em\",null,{\"children\":\"root/CLAUDE.md\"}],\" and \",[\"$\",\"em\",null,{\"children\":\"root/foo/CLAUDE.md\"}],\". Both of these will be pulled into context automatically\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Any child of the directory\"}],\" where you run \",[\"$\",\"em\",null,{\"children\":\"claude\"}],\". This is the inverse of the above, and in this case, Claude will pull in CLAUDE.md files on demand when you work with files in child directories\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Your home folder\"}],\" (\",[\"$\",\"em\",null,{\"children\":\"~/.claude/CLAUDE.md\"}],\"), which applies it to all your \",[\"$\",\"em\",null,{\"children\":\"claude\"}],\" sessions\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"When you run the /init command, Claude will automatically generate a CLAUDE.md for you.\"}]\n23:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"b-tune-your-claudemd-files\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#b-tune-your-claudemd-files\",\"children\":\"b. Tune your CLAUDE.md files\"}]}]\n24:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Your CLAUDE.md files become part of Claude’s prompts, so they should be refined like any frequently used prompt. A common mistake is adding extensive content without iterating on its effectiveness. Take time to experiment and determine what produces the best instruction following from the model.\"}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"You can add content to your CLAUDE.md manually or press the # key to give Claude an instruction that it will automatically incorporate into the relevant CLAUDE.md. Many engineers use # frequently to document commands, files, and style guidelines while coding, then include CLAUDE.md changes in commits so team members benefit as well.\"}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"At Anthropic, we occasionally run CLAUDE.md files through the \",[\"$\",\"a\",null,{\"href\":\"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/prompt-improver\",\"children\":\"prompt improver\"}],\" and often tune instructions (e.g. adding emphasis with \\\"IMPORTANT\\\" or \\\"YOU MUST\\\") to improve adherence.\"]}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F6961243cc6409e41ba93895faded4f4bc1772366-1600x1231.png\u0026w=3840\u0026q=75\",\"alt\":\"Claude Code tool allowlist\"}]}]\n28:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"c-curate-claud"])</script><script>self.__next_f.push([1,"es-list-of-allowed-tools\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#c-curate-claudes-list-of-allowed-tools\",\"children\":\"c. Curate Claude's list of allowed tools\"}]}]\n29:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"By default, Claude Code requests permission for any action that might modify your system: file writes, many bash commands, MCP tools, etc. We designed Claude Code with this deliberately conservative approach to prioritize safety. You can customize the allowlist to permit additional tools that you know are safe, or to allow potentially unsafe tools that are easy to undo (e.g., file editing, \",[\"$\",\"em\",null,{\"children\":\"git commit\"}],\").\"]}]\n2a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"There are four ways to manage allowed tools:\"}]\n"])</script><script>self.__next_f.push([1,"2b:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Select \\\"Always allow\\\"\"}],\" when prompted during a session.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":[\"Use the \",[\"$\",\"em\",null,{\"children\":\"/allowed-tools\"}],\" command\"]}],\" after starting Claude Code to add or remove tools from the allowlist. For example, you can add \",[\"$\",\"em\",null,{\"children\":\"Edit\"}],\" to always allow file edits, \",[\"$\",\"em\",null,{\"children\":\"Bash(git commit:*)\"}],\" to allow git commits, or \",[\"$\",\"em\",null,{\"children\":\"mcp__puppeteer__puppeteer_navigate\"}],\" to allow navigating with the Puppeteer MCP server.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Manually edit\"}],\" your \",[\"$\",\"em\",null,{\"children\":\".claude/settings.json\"}],\" or \",[\"$\",\"em\",null,{\"children\":\"~/.claude.json\"}],\" (we recommend checking the former into source control to share with your team)\",[\"$\",\"em\",null,{\"children\":\".\"}]]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":[\"Use the \",[\"$\",\"em\",null,{\"children\":\"--allowedTools\"}],\" CLI flag\"]}],\" for session-specific permissions.\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"2c:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"d-if-using-github-install-the-gh-cli\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#d-if-using-github-install-the-gh-cli\",\"children\":\"d. If using GitHub, install the gh CLI\"}]}]\n2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Claude knows how to use the \",[\"$\",\"em\",null,{\"children\":\"gh\"}],\" CLI to interact with GitHub for creating issues, opening pull requests, reading comments, and more. Without \",[\"$\",\"em\",null,{\"children\":\"gh\"}],\" installed, Claude can still use the GitHub API or MCP server if you have those installed.\"]}]\n2e:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"2-give-claude-more-tools\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#2-give-claude-more-tools\",\"children\":\"2. Give Claude more tools\"}]}]\n2f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Claude has access to your shell environment, where you can build up sets of convenience scripts and functions for it just like you would for yourself. It can also leverage more complex tools through MCP and REST APIs.\"}]\n30:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"a-use-claude-with-bash-tools\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#a-use-claude-with-bash-tools\",\"children\":\"a. Use Claude with bash tools\"}]}]\n31:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Claude Code inherits your bash environment, giving it access to all your tools. While Claude knows common utilities like unix tools and \",[\"$\",\"em\",null,{\"children\":\"gh\"}],\", it won't know about your custom bash tools without instructions:\"]}]\n32:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"Tell Claude the tool name with usage exa"])</script><script>self.__next_f.push([1,"mples\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"Tell Claude to run \",[\"$\",\"em\",null,{\"children\":\"--help\"}],\" to see tool documentation\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"Document frequently used tools in CLAUDE.md\"}],\"\\n\"]}]\n33:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"b-use-claude-with-mcp\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#b-use-claude-with-mcp\",\"children\":\"b. Use Claude with MCP\"}]}]\n34:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Claude Code functions as both an MCP server and client. As a client, it can connect to any number of MCP servers to access their tools in three ways:\"}]\n35:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"In project config\"}],\" (available when running Claude Code in that directory)\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"In global config\"}],\" (available in all projects)\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":[\"In a checked-in \",[\"$\",\"em\",null,{\"children\":\".mcp.json\"}],\" file\"]}],\" (available to anyone working in your codebase). For example, you can add Puppeteer and Sentry servers to your \",[\"$\",\"em\",null,{\"children\":\".mcp.json\"}],\", so that every engineer working on your repo can use these out of the box.\"]}],\"\\n\"]}]\n36:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"When working with MCP, it can also be helpful to launch Claude with the \",[\"$\",\"em\",null,{\"children\":\"--mcp-debug\"}],\" flag to help identify configuration issues.\"]}]\n37:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"c-use-custom-slash-commands\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#c-use-custom-slash-commands\",\"children\":\"c. Use custom slash commands\"}]}]\n38:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"For repeated workflows"])</script><script>self.__next_f.push([1,"—debugging loops, log analysis, etc.—store prompt templates in Markdown files within the \",[\"$\",\"em\",null,{\"children\":\".claude/commands\"}],\" folder. These become available through the slash commands menu when you type /. You can check these commands into git to make them available for the rest of your team.\"]}]\n39:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Custom slash commands can include the special keyword \",[\"$\",\"em\",null,{\"children\":\"$$ARGUMENTS\"}],\" to pass parameters from command invocation.\"]}]\n3a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"For example, here’s a slash command that you could use to automatically pull and fix a Github issue:\"}]\n"])</script><script>self.__next_f.push([1,"3b:[\"$\",\"div\",null,{\"className\":\"my-8 overflow-hidden border border-border bg-placeholder/40 shadow-sm\",\"children\":[null,[\"$\",\"pre\",null,{\"className\":\"overflow-x-auto px-[18px] py-[18px] text-[13px] leading-[1.8] text-text\",\"children\":[\"$\",\"code\",null,{\"className\":\"rounded-none border border-border bg-placeholder/45 px-[6px] py-[2px] font-mono text-[0.9em] text-text\",\"children\":\"Please analyze and fix the GitHub issue: $ARGUMENTS.\\n\\nFollow these steps:\\n\\n1. Use `gh issue view` to get the issue details\\n2. Understand the problem described in the issue\\n3. Search the codebase for relevant files\\n4. Implement the necessary changes to fix the issue\\n5. Write and run tests to verify the fix\\n6. Ensure code passes linting and type checking\\n7. Create a descriptive commit message\\n8. Push and create a PR\\n\\nRemember to use the GitHub CLI (`gh`) for all GitHub-related tasks.\\n\"}]}]]}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Putting the above content into \",[\"$\",\"em\",null,{\"children\":\".claude/commands/fix-github-issue.md\"}],\" makes it available as the \",[\"$\",\"em\",null,{\"children\":\"/project:fix-github-issue\"}],\" command in Claude Code. You could then for example use \",[\"$\",\"em\",null,{\"children\":\"/project:fix-github-issue 1234\"}],\" to have Claude fix issue #1234. Similarly, you can add your own personal commands to the \",[\"$\",\"em\",null,{\"children\":\"~/.claude/commands\"}],\" folder for commands you want available in all of your sessions.\"]}]\n3d:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"3-try-common-workflows\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#3-try-common-workflows\",\"children\":\"3. Try common workflows\"}]}]\n3e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Claude Code doesn’t impose a specific workflow, giving you the flexibility to use it how you want. Within the space this flexibility affords, several successful patterns for effectively using Claude Code have emerged across our community of users:\"}]\n3f:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"a-explore-plan-code-commit\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#a-explore-plan-code-commit\",\"children\":\"a. Explore, plan, code, commit\"}]}]\n40:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"This versatile workflow suits many problems:\"}]\n"])</script><script>self.__next_f.push([1,"41:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to read relevant files, images, or URLs\"}],\", providing either general pointers (\\\"read the file that handles logging\\\") or specific filenames (\\\"read logging.py\\\"), but explicitly tell it not to write any code just yet.\",\"\\n\",[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"This is the part of the workflow where you should consider strong use of subagents, especially for complex problems. Telling Claude to use subagents to verify details or investigate particular questions it might have, especially early on in a conversation or task, tends to preserve context availability without much downside in terms of lost efficiency.\"}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to make a plan for how to approach a specific problem\"}],\". We recommend using the word \\\"think\\\" to trigger extended thinking mode, which gives Claude additional computation time to evaluate alternatives more thoroughly. These specific phrases are mapped directly to increasing levels of thinking budget in the system: \\\"think\\\" \u003c \\\"think hard\\\" \u003c \\\"think harder\\\" \u003c \\\"ultrathink.\\\" Each level allocates progressively more thinking budget for Claude to use.\\n2. If the results of this step seem reasonable, you can have Claude create a document or a GitHub issue with its plan so that you can reset to this spot if the implementation (step 3) isn’t what you want.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to implement its solution in code\"}],\". This is also a good place to ask it to explicitly verify the reasonableness of its solution as it implements pieces of the solution.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to commit the result and create a pull request\"}],\". If relevant, this is also a good time to have Claude update any READMEs or changelogs with an explanation of what it just did.\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"42:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Steps #1-#2 are crucial—without them, Claude tends to jump straight to coding a solution. While sometimes that's what you want, asking Claude to research and plan first significantly improves performance for problems requiring deeper thinking upfront.\"}]\n43:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"b-write-tests-commit-code-iterate-commit\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#b-write-tests-commit-code-iterate-commit\",\"children\":\"b. Write tests, commit; code, iterate, commit\"}]}]\n44:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"This is an Anthropic-favorite workflow for changes that are easily verifiable with unit, integration, or end-to-end tests. Test-driven development (TDD) becomes even more powerful with agentic coding:\"}]\n"])</script><script>self.__next_f.push([1,"45:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to write tests based on expected input/output pairs\"}],\". Be explicit about the fact that you’re doing test-driven development so that it avoids creating mock implementations, even for functionality that doesn’t exist yet in the codebase.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Tell Claude to run the tests and confirm they fail\"}],\". Explicitly telling it not to write any implementation code at this stage is often helpful.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to commit the tests\"}],\" when you’re satisfied with them.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to write code that passes the tests\"}],\", instructing it not to modify the tests. Tell Claude to keep going until all tests pass. It will usually take a few iterations for Claude to write code, run the tests, adjust the code, and run the tests again.\",\"\\n\",[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"At this stage, it can help to ask it to verify with independent subagents that the implementation isn’t overfitting to the tests\"}],\"\\n\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to commit the code\"}],\" once you’re satisfied with the changes.\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"46:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Claude performs best when it has a clear target to iterate against—a visual mock, a test case, or another kind of output. By providing expected outputs like tests, Claude can make changes, evaluate results, and incrementally improve until it succeeds.\"}]\n47:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"c-write-code-screenshot-result-iterate\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#c-write-code-screenshot-result-iterate\",\"children\":\"c. Write code, screenshot result, iterate\"}]}]\n48:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Similar to the testing workflow, you can provide Claude with visual targets:\"}]\n"])</script><script>self.__next_f.push([1,"49:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Give Claude a way to take browser screenshots\"}],\" (e.g., with the \",[\"$\",\"a\",null,{\"href\":\"https://github.com/modelcontextprotocol/servers/tree/c19925b8f0f2815ad72b08d2368f0007c86eb8e6/src/puppeteer\",\"children\":\"Puppeteer MCP server\"}],\", an \",[\"$\",\"a\",null,{\"href\":\"https://github.com/joshuayoes/ios-simulator-mcp\",\"children\":\"iOS simulator MCP server\"}],\", or manually copy / paste screenshots into Claude).\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Give Claude a visual mock\"}],\" by copying / pasting or drag-dropping an image, or giving Claude the image file path.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to implement the design\"}],\" in code, take screenshots of the result, and iterate until its result matches the mock.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to commit\"}],\" when you're satisfied.\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"4a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Like humans, Claude's outputs tend to improve significantly with iteration. While the first version might be good, after 2-3 iterations it will typically look much better. Give Claude the tools to see its outputs for best results.\"}]\n4b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://www.anthropic.com/_next/image?url=https%3A%2F%2Fwww-cdn.anthropic.com%2Fimages%2F4zrzovbb%2Fwebsite%2F6ea59a36fe82c2b300bceaf3b880a4b4852c552d-1600x1143.png\u0026w=3840\u0026q=75\",\"alt\":\"Safe yolo mode\"}]}]\n4c:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"d-safe-yolo-mode\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#d-safe-yolo-mode\",\"children\":\"d. Safe YOLO mode\"}]}]\n4d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Instead of supervising Claude, you can use \",[\"$\",\"em\",null,{\"children\":\"claude\"}],\" \",[\"$\",\"em\",null,{\"children\":\"--dangerously-skip-permissions\"}],\" to bypass all permission checks and let Claude work uninterrupted until completion. This works well for workflows like fixing lint errors or generating boilerplate code.\"]}]\n4e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Letting Claude run arbitrary commands is risky and can result in data loss, system corruption, or even data exfiltration (e.g., via prompt injection attacks). To minimize these risks, use \",[\"$\",\"em\",null,{\"children\":\"--dangerously-skip-permissions\"}],\" in a container without internet access. You can follow this \",[\"$\",\"a\",null,{\"href\":\"https://github.com/anthropics/claude-code/tree/main/.devcontainer\",\"children\":\"reference implementation\"}],\" using Docker Dev Containers.\"]}]\n4f:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"e-codebase-qa\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#e-codebase-qa\",\"children\":\"e. Cod"])</script><script>self.__next_f.push([1,"ebase Q\u0026A\"}]}]\n50:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"When onboarding to a new codebase, use Claude Code for learning and exploration. You can ask Claude the same sorts of questions you would ask another engineer on the project when pair programming. Claude can agentically search the codebase to answer general questions like:\"}]\n"])</script><script>self.__next_f.push([1,"51:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"How does logging work?\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"How do I make a new API endpoint?\"}],\"\\n\",[\"$\",\" ggle) lets Claude work autono"])</script><script>self.__next_f.push([1,"mously, you'll typically get better results by being an active collaborator and guiding Claude's approach. You can get the best results by thoroughly explaining the task to Claude at the beginning, but you can also course correct Claude at any time.\"}]\n72:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"These four tools help with course correction:\"}]\n"])</script><script>self.__next_f.push([1,"73:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to make a plan\"}],\" before coding. Explicitly tell it not to code until you’ve confirmed its plan looks good.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Press Escape to interrupt\"}],\" Claude during any phase (thinking, tool calls, file edits), preserving context so you can redirect or expand instructions.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Double-tap Escape to jump back in history\"}],\", edit a previous prompt, and explore a different direction. You can edit the prompt and repeat until you get the result you're looking for.\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to undo changes\"}],\", often in conjunction with option #2 to take a different approach.\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"74:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Though Claude Code occasionally solves problems perfectly on the first attempt, using these correction tools generally produces better solutions faster.\"}]\n75:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"f-use-clear-to-keep-context-focused\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#f-use-clear-to-keep-context-focused\",\"children\":\"f. Use /clear to keep context focused\"}]}]\n76:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"During long sessions, Claude's context window can fill with irrelevant conversation, file contents, and commands. This can reduce performance and sometimes distract Claude. Use the \",[\"$\",\"em\",null,{\"children\":\"/clear\"}],\" command frequently between tasks to reset the context window.\"]}]\n77:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"g-use-checklists-and-scratchpads-for-complex-workflows\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#g-use-checklists-and-scratchpads-for-complex-workflows\",\"children\":\"g. Use checklists and scratchpads for complex workflows\"}]}]\n78:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"For large tasks with multiple steps or requiring exhaustive solutions—like code migrations, fixing numerous lint errors, or running complex build scripts—improve performance by having Claude use a Markdown file (or even a GitHub issue!) as a checklist and working scratchpad:\"}]\n79:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"For example, to fix a large number of lint issues, you can do the following:\"}]\n7a:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Tell Claude to run the lint command\"}],\" and write all resulting errors (with filenames and line numbers) to a Markdown checklist\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"s"])</script><script>self.__next_f.push([1,"trong\",null,{\"children\":\"Instruct Claude to address each issue one by one\"}],\", fixing and verifying before checking it off and moving to the next\"]}],\"\\n\"]}]\n7b:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"h-pass-data-into-claude\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#h-pass-data-into-claude\",\"children\":\"h. Pass data into Claude\"}]}]\n7c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Several methods exist for providing data to Claude:\"}]\n7d:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Copy and paste\"}],\" directly into your prompt (most common approach)\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Pipe into Claude Code\"}],\" (e.g., \",[\"$\",\"em\",null,{\"children\":\"cat foo.txt | claude\"}],\"), particularly useful for logs, CSVs, and large data\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Tell Claude to pull data\"}],\" via bash commands, MCP tools, or custom slash commands\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ask Claude to read files\"}],\" or fetch URLs (works for images too)\"]}],\"\\n\"]}]\n7e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Most sessions involve a combination of these approaches. For example, you can pipe in a log file, then tell Claude to use a tool to pull in additional context to debug the logs.\"}]\n7f:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"5-use-headless-mode-to-automate-your-infra\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#5-use-headless-mode-to-automate-your-infra\",\"children\":\"5. Use headless mode to automate your infra\"}]}]\n80:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Claude Code includes \",[\"$\",\"a\",null,{\"href\":\"https://docs.anthropic.com/en/docs/agents-and-tools/claude-code/overview#aut"])</script><script>self.__next_f.push([1,"omate-ci-and-infra-workflows\",\"children\":\"headless mode\"}],\" for non-interactive contexts like CI, pre-commit hooks, build scripts, and automation. Use the -p flag with a prompt to enable headless mode, and \",[\"$\",\"em\",null,{\"children\":\"--output-format stream-json\"}],\" for streaming JSON output.\"]}]\n81:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Note that headless mode does not persist between sessions. You have to trigger it each session.\"}]\n82:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"a-use-claude-for-issue-triage\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#a-use-claude-for-issue-triage\",\"children\":\"a. Use Claude for issue triage\"}]}]\n83:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Headless mode can power automations triggered by GitHub events, such as when a new issue is created in your repository. For example, the public \",[\"$\",\"a\",null,{\"href\":\"https://github.com/anthropics/claude-code/blob/main/.github/actions/claude-issue-triage-action/action.yml\",\"children\":\"Claude Code repository\"}],\" uses Claude to inspect new issues as they come in and assign appropriate labels.\"]}]\n84:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"b-use-claude-as-a-linter\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#b-use-claude-as-a-linter\",\"children\":\"b. Use Claude as a linter\"}]}]\n85:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Claude Code can provide \",[\"$\",\"a\",null,{\"href\":\"https://github.com/anthropics/claude-code/blob/main/.github/actions/claude-code-action/action.yml\",\"children\":\"subjective code reviews\"}],\" beyond what traditional linting tools detect, identifying issues like typos, stale comments, misleading function or variable names, and more.\"]}]\n86:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bo"])</script><script>self.__next_f.push([1,"ld text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"6-uplevel-with-multi-claude-workflows\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#6-uplevel-with-multi-claude-workflows\",\"children\":\"6. Uplevel with multi-Claude workflows\"}]}]\n87:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Beyond standalone usage, some of the most powerful applications involve running multiple Claude instances in parallel:\"}]\n88:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"a-have-one-claude-write-code-use-another-claude-to-verify\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#a-have-one-claude-write-code-use-another-claude-to-verify\",\"children\":\"a. Have one Claude write code; use another Claude to verify\"}]}]\n89:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"A simple but effective approach is to have one Claude write code while another reviews or tests it. Similar to working with multiple engineers, sometimes having separate context is beneficial:\"}]\n8a:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"Use Claude to write code\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"Run \",[\"$\",\"em\",null,{\"children\":\"/clear\"}],\" or start a second Claude in another terminal\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"Have the second Claude review the first Claude's work\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"Start another Claude (or \",[\"$\",\"em\",null,{\"children\":\"/clear\"}],\" again) to read both the code and review feedback\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"Have this Claude edit the code based on the feedback\"}],\"\\n\"]}]\n8b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"You can do something similar with tests: have one Claude write tests, then have another Claude write code to make the tests pass. You can even have your Claude instances communicate with each other by giving them separate working scratchpads and telling them which one to write to and which one to read from.\"}]\n8c:[\"$\",\"p\",nu"])</script><script>self.__next_f.push([1,"ll,{\"className\":\"mb-6\",\"children\":\"This separation often yields better results than having a single Claude handle everything.\"}]\n8d:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"b-have-multiple-checkouts-of-your-repo\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#b-have-multiple-checkouts-of-your-repo\",\"children\":\"b. Have multiple checkouts of your repo\"}]}]\n8e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Rather than waiting for Claude to complete each step, something many engineers at Anthropic do is:\"}]\n8f:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Create 3-4 git checkouts\"}],\" in separate folders\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Open each folder\"}],\" in separate terminal tabs\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Start Claude in each folder\"}],\" with different tasks\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Cycle through\"}],\" to check progress and approve/deny permission requests\"]}],\"\\n\"]}]\n90:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"c-use-git-worktrees\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#c-use-git-worktrees\",\"children\":\"c. Use git worktrees\"}]}]\n91:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"This approach shines for multiple independent tasks, offering a lighter-weight alternative to multiple checkouts. Git worktrees allow you to check out multiple branches from the same repository into separate directories. Each worktree has its own working directory with isolated files, while sharing the same Git history and reflog.\"}]\n92:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Using git worktrees enables you to run multiple Claude sessions simultaneously on different parts of your project, e"])</script><script>self.__next_f.push([1,"ach focused on its own independent task. For instance, you might have one Claude refactoring your authentication system while another builds a completely unrelated data visualization component. Since the tasks don't overlap, each Claude can work at full speed without waiting for the other's changes or dealing with merge conflicts:\"}]\n93:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Create worktrees\"}],\": \",[\"$\",\"em\",null,{\"children\":\"git worktree add ../project-feature-a feature-a\"}]]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Launch Claude in each worktree\"}],\": \",[\"$\",\"em\",null,{\"children\":\"cd ../project-feature-a \u0026\u0026 claude\"}]]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Create additional worktrees\"}],\" as needed (repeat steps 1-2 in new terminal tabs)\"]}],\"\\n\"]}]\n94:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Some tips:\"}]\n95:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"Use consistent naming conventions\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"Maintain one terminal tab per worktree\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"If you’re using iTerm2 on Mac, \",[\"$\",\"a\",null,{\"href\":\"https://docs.anthropic.com/en/docs/agents-and-tools/claude-code/overview#notification-setup\",\"children\":\"set up notifications\"}],\" for when Claude needs attention\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"Use separate IDE windows for different worktrees\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"Clean up when finished: \",[\"$\",\"em\",null,{\"children\":\"git worktree remove ../project-feature-a\"}]]}],\"\\n\"]}]\n96:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"d-use-headless-mode-with-a-custom-harness\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#d-use-headless-mode-with-a-custom-harness\",\"children\":\"d. Use headless mode with a custom harness\"}]}]\n97:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"em\",null,{\"child"])</script><script>self.__next_f.push([1,"ren\":\"claude -p\"}],\" (headless mode) integrates Claude Code programmatically into larger workflows while leveraging its built-in tools and system prompt. There are two primary patterns for using headless mode:\"]}]\n98:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"1. \",[\"$\",\"strong\",null,{\"children\":\"Fanning out\"}],\" handles large migrations or analyses (e.g., analyzing sentiment in hundreds of logs or analyzing thousands of CSVs):\"]}]\n"])</script><script>self.__next_f.push([1,"99:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"Have Claude write a script to generate a task list. For example, generate a list of 2k files that need to be migrated from framework A to framework B.\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"Loop through tasks, calling Claude programmatically for each and giving it a task and a set of tools it can use. For example: \",[\"$\",\"em\",null,{\"children\":\"claude -p “migrate foo.py from React to Vue. When you are done, you MUST return the string OK if you succeeded, or FAIL if the task failed.” --allowedTools Edit Bash(git commit:*)”\"}]]}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"Run the script several times and refine your prompt to get the desired outcome.\"}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"9a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"2. \",[\"$\",\"strong\",null,{\"children\":\"Pipelining\"}],\" integrates Claude into existing data/processing pipelines:\"]}]\n9b:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"Call \",[\"$\",\"em\",null,{\"children\":\"claude -p \\\"\u003cyour prompt\u003e\\\" --json | your_command\"}],\", where \",[\"$\",\"em\",null,{\"children\":\"your_command\"}],\" is the next step of your processing pipeline\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"That’s it! JSON output (optional) can help provide structure for easier automated processing.\"}],\"\\n\"]}]\n9c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"For both of these use cases, it can be helpful to use the \",[\"$\",\"em\",null,{\"children\":\"--verbose\"}],\" flag for debugging the Claude invocation. We generally recommend turning verbose mode off in production for cleaner output.\"]}]\n9d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"What are your tips and best practices for working with Claude Code? Tag @AnthropicAI so we can see what you're building!\"}]\n9e:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"acknowledgements\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#acknowledgements\",\"children\":\"Acknowledgements\"}]}]\n9f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"W
