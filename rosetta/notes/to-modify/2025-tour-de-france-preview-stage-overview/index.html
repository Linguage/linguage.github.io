衫，是比赛最高荣誉的象征\n\n**个人计时赛（ITT）**：车手单独出发、不允许跟车借力的比赛形式，本届设有平路和山地两场计时赛\n\n**总成绩热门选手**：指波加查、温格高、埃弗内普尔和罗格利奇等具备争夺总冠军实力的顶级车手\n\n**HC级爬坡**：Hors Catégorie的缩写，意为超级爬坡，代表环法中难度最高的山地爬坡等级\n\n作者：Yasmin Vingtoft\n\n又到了每年的这个时候，自行车运动将成为焦点，数百万观众将目睹184名身穿莱卡服装的选手在法国的公路上奋力拼搏，争夺赛段冠军和享有盛誉的领骑衫，包括标志性的黄色领骑衫。因为，自行车赛历上最盛大的比赛终于来临了：环法自行车赛！🚴‍♂️✨\n\n![](https://static.wixstatic.com/media/ff69b3_08c79e4d697146a6879d390125673379~mv2.png/v1/fill/w_1480,h_1046,al_c,q_90,usm_0.66_1.00_0.01,enc_avif,quality_auto/ff69b3_08c79e4d697146a6879d390125673379~mv2.png)\n\n2025年的环法自行车赛全程约3338.8公里，累计爬升约51000米，分为21个赛段，中间仅有2个休息日。\n\n2025年环法自行车赛将于7月5日在里尔开赛。继去年尼斯非传统的个人计时赛（ITT）收官战后，本届赛事将重返香榭丽舍大街的标志性终点，尽管这个赛段并非一切都如往常。稍后我将详细介绍！\n\n#### 本预览包括：\n\n*   📍 2025年赛道概览\n*   📅 几个可能有用的可视化概览\n*   🗓️ 可下载的iCal日历（含基本赛段信息）\n\n## 赛道概览\n\n今年的环法自行车赛特点：\n*   🏔️ 6个高山赛段\n*   💥 6个丘陵赛段\n*   🚴 7个平路赛段\n*   ⏱️ 2个个人计时赛 — 一个平路，一个山地\n\n### 第一周 - 冲刺手、古典赛车手和黄衫梦想\n\n今年的环法自行车赛第一周将持续整整10天，之后车手们才能获得期待已久的休息日。这是因为第一个休息日从周一移到了周二，以避免与法国国庆日重合。开幕周主要由平路和丘陵赛段组成，为冲刺手和古典赛车手提供了大量机会。从纸面上看，这一周非常适合欧倍青-德科尼克车队（Alpecin-Deceuninck）的双星马修·范德普尔（Mathieu van der Poel）和贾斯珀·菲利普森（Jasper Philipsen），他们很可能会将目光投向赛段冠军并争取穿上黄衫。但他们并非唯一对第一周抱有雄心壮志的选手：乔纳森·米兰（Jonathan Milan）、蒂姆·梅利尔（Tim Merlier）以及速度快且强壮的瓦特·范阿尔特（Wout van Aert）等冲刺手也可能加入竞争。而且，不要忽视像塔代伊·波加查（Tadej Pogačar）这样爆发力强的总成绩热门选手，他可能在这些丘陵赛段有所动作。在丘陵赛段之间，第五赛段将进行一场33公里长的平路个人计时赛，计时赛专家将与总成绩热门选手争夺赛段冠军，而总成绩车手也将为关键的秒数而战。\n\n在第一周结束时，即法国国庆日（第10赛段），首个高山考验等待着车手们。这一天充满了爬坡，尽管没有HC级或一级爬坡。相反，这是一个持续起伏的赛段，将考验爬坡手的腿部力量。对于总成绩车手来说，这是一个大有可为的赛段，而突围车手也可能（或不可能）在前线争夺赛段冠军。\n\n![](https://static.wixstatic.com/media/ff69b3_5a906c1f74544e93a415418a7fe90a15~mv2.png/v1/fill/w_484,h_644,fp_0.50_0.50,q_90/ff69b3_5a906c1f74544e93a415418a7fe90a15~mv2.webp)\n\n![](https://static.wixstatic.com/media/ff69b3_1e8631f5290a491386a3a11a5a1b92e6~mv2.png/v1/fill/w_484,h_644,fp_0.50_0.50,q_90/ff69b3_1e8631f5290a491386a3a11a5a1b92e6~mv2.webp)\n\n![](https://static.wixstatic.com/media/ff69b3_409c89c712ca41e2bfa6de996419272c~mv2.jpg/v1/fill/w_492,h_644,fp_0.50_0.50,lg_1,q_90/ff69b3_409c89c712ca41e2bfa6de996419272c~mv2.webp)\n\n去年，乔纳森·米兰（Jonathan Milan）在巴勒鲁普世锦赛上赢得了个人追逐赛冠军，但今年夏天，他可能将目光投向黄衫，因为第一赛段预计将以大集团冲刺结束，这正是他擅长的。\n\n在第一周，瓦特·范阿尔特（Wout van Aert）（图3）也可能会获得一些争夺赛段冠军的机会，甚至可能冲击黄衫？\n\n### 第二周 - 山地和差距\n\n第二周以冲刺手的机会拉开序幕，随后比赛进入比利牛斯山脉，那里将迎来三个决定性赛段：两个高山赛段（第12和14赛段）和一个第13赛段的山地个人计时赛。这三个赛段很可能会引发总成绩热门选手之间的激烈竞争，并可能成为波加查（Pogačar）、温格高（Vingegaard）、埃弗内普尔（Evenepoel）和罗格利奇（Roglič）等总成绩热门选手之间拉开时间差距的关键。\n\n本周的第五个也是最后一个赛段（是的，第二周只有第一周的一半长！）是前往卡尔卡松（Carcassonne）的丘陵赛段，看起来为突围胜利提供了绝佳机会 💪\n\n总而言之，第二周虽然短暂，但它可能在塑造黄衫之争和决定2025年环法自行车赛冠军方面发挥关键作用 💛\n\n![](https://static.wixstatic.com/media/ff69b3_31c468eaad85444aa47e213e627e54a6~mv2.png/v1/fill/w_486,h_486,fp_0.50_0.50,q_90/ff69b3_31c468eaad85444aa47e213e627e54a6~mv2.webp)\n\n![](https://static.wixstatic.com/media/ff69b3_5541ddf8efbe46ad81aa8d93191b29dc~mv2.png/v1/fill/w_488,h_486,fp_0.50_0.50,q_90/ff69b3_5541ddf8efbe46ad81aa8d93191b29dc~mv2.webp)\n\n![](https://static.wixstatic.com/media/ff69b3_90ee8cd17fa745eca44958cb3b426a9e~mv2.png/v1/fill/w_486,h_486,fp_0.50_0.50,q_90/ff69b3_90ee8cd17fa745eca44958cb3b426a9e~mv2.webp)\n\n### 第三周 - 爬坡、混战与庆典\n\n第三周也是最后一周，以一个高山赛段拉开序幕，该赛段大部分平坦，直到旺图山（Mont Ventoux）脚下，车手们将在这里争夺赛段冠军和潜在的总成绩时间。第17赛段为幸存下来的冲刺手们提供了一个潜在的冲刺机会。但正如在大环赛最后一周常有的情况，惊喜可能发生，强大的突围集团也可能在这个赛段争取荣誉。\n\n此后，冲刺手们暂时可以忘记荣耀，因为第18和第19赛段将带来两个艰难的高山赛段。第18赛段是今年环法的“皇后赛段”，全程171.5公里，累计爬升5450米，包括在两个HC级爬坡之后，洛兹山口（Col de la Loze）的残酷终点爬坡（26.4公里，平均坡度6.5%）。第19赛段是最后一个高山赛段，它虽短但却力量十足，在短短129.9公里内累计爬升4550米。如果总成绩之争仍未定论，这个赛段将为总成绩热门选手提供相互挑战的场地——尽管到那时总成绩可能已经决定了。\n\n在最后一个周末，还有两次胜利的机会。第20赛段是一个丘陵赛段，看起来非常适合突围；而第21赛段则带来标志性的香榭丽舍大街终点，但却有出人意料的转折。受到奥运会路线的启发，组织者增加了蒙马特高地（Montmartre）的爬坡（1.1公里，平均坡度5.9%），车手们将爬坡三次，最后一次距离终点仅6公里。这可能为后期突围打开大门，并打破通常由冲刺手主导的局面。🔥\n\n![](https://static.wixstatic.com/media/ff69b3_d8540259f8574cc3897b0bdd38b77031~mv2.jpeg/v1/fill/w_486,h_486,fp_0.50_0.50,q_90/ff69b3_d8540259f8574cc3897b0bdd38b77031~mv2.webp)\n\n![](https://static.wixstatic.com/media/ff69b3_4aa6315d3a784b4db70ad0314e6f8a45~mv2.png/v1/fill/w_488,h_486,fp_0.50_0.50,q_90/ff69b3_4aa6315d3a784b4db70ad0314e6f8a45~mv2.webp)\n\n![](https://static.wixstatic.com/media/ff69b3_12161957af654418a260e8abe12a2eff~mv2.png/v1/fill/w_486,h_486,fp_0.50_0.50,q_90/ff69b3_12161957af654418a260e8abe12a2eff~mv2.webp)\n\n### 赛段概览：\n\n以下是本届环法自行车赛所有赛段的概览，概览中包含颜色编码，指示环法官网所示的赛段类型：\n\n*   💛 **黄色** - 高山赛段\n*   💙 **蓝色** - 个人计时赛\n*   🩷 **粉色** - 丘陵赛段\n*   💚 **绿色** - 平路赛段\n\n每个赛段都附有简短的预期描述，以及基于我对赛段精彩程度的预估而设定的“观赛指数”（_watch score_）😊 当然，任何情况都可能发生，天气、战术和比赛动态都可能发挥巨大作用。即使是理论上平淡无奇的赛段也可能带来惊喜，而理论上激动人心的赛段也可能令人失望。一如既往：车手决定比赛！🚴‍♂️\n\n![](https://static.wixstatic.com/media/ff69b3_08c79e4d697146a6879d390125673379~mv2.png/v1/fill/w_1480,h_1046,al_c,q_90,usm_0.66_1.00_0.01,enc_avif,quality_auto/ff69b3_08c79e4d697146a6879d390125673379~mv2.png)\n\n**在此下载：- 查看丹麦语版本 🇩🇰**[https://www.canva.com/design/DAGrGdIaOrk/5DAdvjaHwVqJD8DxYDH9pQ/edit?utm_content=DAGrGdIaOrk\u0026utm_campaign=designshare\u0026utm_medium=link2\u0026utm_source=sharebutton](https://www.canva.com/design/DAGrGdIaOrk/5DAdvjaHwVqJD8DxYDH9pQ/edit?utm_content=DAGrGdIaOrk\u0026utm_campaign=designshare\u0026utm_medium=link2\u0026utm_source=sharebutton)\n\n我还制作了一份各赛段预计开始和结束时间的概览，包括车手通过50公里处的预计时间。所有时间均以当地时间（CEST）显示，并基于环法官方时间表中最快的估算。车手可能会骑得慢一些，但有些赛段提早结束也不足为奇（：另请注意，列出的开始时间是指官方比赛开始时间，而非中立发车时间，中立发车会稍早一些）。\n\n![](https://static.wixstatic.com/media/ff69b3_cdfa161fa8904697b304f3eca5dc9535~mv2.png/v1/fill/w_1414,h_2000,al_c,q_95,enc_avif,quality_auto/ff69b3_cdfa161fa8904697b304f3eca5dc9535~mv2.png)\n\n**在此下载：**\n\n[https://www.canva.com/design/DAGrGZfL3Zg/46Cbext9a_QiZGJ695LzEA/edit?utm_content=DAGrGZfL3Zg\u0026utm_campaign=designshare\u0026utm_medium=link2\u0026utm_source=sharebutton](https://www.canva.com/design/DAGrGZfL3Zg/46Cbext9a_QiZGJ695LzEA/edit?utm_content=DAGrGZfL3Zg\u0026utm_campaign=designshare\u0026utm_medium=link2\u0026utm_source=sharebutton)\n\n**iCal日历**\n\n我还创建了一个iCalendar，其中包括本届环法自行车赛的所有21个赛段。每个赛段都附有简短的预期描述，以及赛段类型、起终点城市、预计起止时间以及观赛指数等信息。\n\n您应该能够将其集成到您的日历应用程序中，以便在比赛期间随时了解最新信息😊\n\n![](https://static.wixstatic.com/media/ff69b3_48e1dcdff2c844b4924494d3f55532b9~mv2.png/v1/fill/w_1480,h_670,al_c,q_90,usm_0.66_1.00_0.01,enc_avif,quality_auto/ff69b3_48e1dcdff2c844b4924494d3f55532b9~mv2.png)\n\n**在此下载：**\n\n**Google日历**\n\n[https://calendar.google.com/calendar/embed?src=a41b8d88c9cc94fb7d34e2e685c44b0e3bf3e737d2e54fed834fa2b8d620eac8%40group.calendar.google.com\u0026ctz=Europe%2FCopenhagen](https://calendar.google.com/calendar/embed?src=a41b8d88c9cc94fb7d34e2e685c44b0e3bf3e737d2e54fed834fa2b8d620eac8%40group.calendar.google.com\u0026ctz=Europe%2FCopenhagen)\n\n**其他应用程序**\n\n[https://calendar.google.com/calendar/ical/a41b8d88c9cc94fb7d34e2e685c44b0e3bf3e737d2e54fed834fa2b8d620eac8%40group.calendar.google.com/public/basic.ics](https://calendar.google.com/calendar/ical/a41b8d88c9cc94fb7d34e2e685c44b0e3bf3e737d2e54fed834fa2b8d620eac8%40group.calendar.google.com/public/basic.ics)\n\n赛道已简要介绍完毕，但正如所说，比赛的主角是车手。因此，我还有另一篇关于本届环法自行车赛主要竞争者的博客文章，其中包括总成绩热门选手、冲刺手和赛段猎人：\n\n[https://yasminlv07.wixsite.com/cyclingyazz-1/post/key-contenders-tdf-2025](https://yasminlv07.wixsite.com/cyclingyazz-1/post/key-contenders-tdf-2025)\n\n如果您读到了这里，感谢您的阅读，祝您环法观赛愉快！🌻💛🇫🇷\n\n---\n\n### 📅 赛程日历\n\n\n| 赛段    | 描述                                                                      | 观赛评分 |\n| :---- | :---------------------------------------------------------------------- | :--: |\n| 第1赛段  | 大环赛首日压力+冲刺手争夺黄衫💛🚴‍♂️💨 突围争夺爬坡王                                        |  5   |\n| 第2赛段  | 终点起伏+上坡冲刺——强力冲刺手和丘陵型选手的机会🤛 黄衫易主？                                       |  6   |\n| 第3赛段  | 又一次属于冲刺手的机会🚴‍♂️💨 有小概率出现侧风🌬️🌬️                                       |  3   |\n| 第4赛段  | 全程起伏，终点前有5个“小”爬坡，最后一个距离终点5公里（800米@10.6%） 丘陵型选手🤛                        |  6   |\n| 第5赛段  | 33公里平路个人计时赛⏱️ 计时赛高手✖️总成绩竞争者争胜 GC重要时间💛 黄衫或将易主                           |  5   |\n| 第6赛段  | 起伏路线+终点前4个“小”爬坡。距离终点4公里有1.2公里、坡度7.2%的爬坡，终点为上坡冲刺。丘陵型选手和总成绩竞争者都有机会。       |  6   |\n| 第7赛段  | 丘陵地形⛰️，终点设在Mûr-de-Bretagne（2公里@7%），依然是丘陵型选手和总成绩竞争者的舞台。                  |  7   |\n| 第8赛段  | 冲刺手的机会🚴‍♂️💨，终点略微上坡。                                                   |  2   |\n| 第9赛段  | 又是冲刺手争夺赛段胜利和积分的一天🥇🚴‍♂️💨。                                             |  2   |\n| 第10赛段 | 巴士底日🇫，首次真正的爬坡考验⛰️，共有7个爬坡点（2级和3级）。突围选手和总成绩竞争者都有机会争夺赛段冠军🏆。              |  9   |\n| 第11赛段 | 最后一次短时间内的冲刺机会，终点前有几个小坡，强力突围也有可能成功🤔。                                    |  3   |\n| 第12赛段 | 前半程为半平路，后半程多山，突围和总成绩选手都可能发力，终点设在Hautacam⛰️。                             |  7   |\n| 第13赛段 | 11公里山地个人计时赛⛰️，总成绩选手为争夺赛段胜利和关键时间展开激烈竞争⏱️💛。                              |  8   |\n| 第14赛段 | 前70公里为半平路，随后有4个爬坡，包括图尔马莱和Superbagnères终点⛰️。                             |  8   |\n| 第15赛段 | 强力型和速度型选手的机会🤙，可能来自突围，全程有3个分级爬坡（3级+2级）。                                 |  5   |\n| 第16赛段 | 前140公里为平路，随后迎来Mont Ventoux（15.7公里@8.8%），总成绩选手与突围选手将为赛段胜利和时间展开激烈争夺。      |  7   |\n| 第17赛段 | 理论上是冲刺赛段，但大环赛第三周，任何情况都有可能发生，强力突围也有机会🤙。                                 |  3   |\n| 第18赛段 | 皇后赛段👑，全程累计爬升5400米+，包含3个超级爬坡，终点设在Col de la Loze（26.4公里@6.5%），有可能拉开巨大差距。 |  9   |\n| 第19赛段 | 最后一个山地赛段，全长130公里🔥，多次爬坡，终点在La Plagne，是总成绩选手最后的机会。                       |  8   |\n| 第20赛段 | 丘陵赛段，起伏不断但难度适中，突围选手的绝佳机会，也是许多选手的最后一搏。                                   |  6   |\n| 第21赛段 | 香槟庆祝🥂，终点设在香榭丽舍大街，但3次经过蒙马特可能带来变数✨。                                      |  5   |\n\n---\n\n### ⭐ 观赛评分（WATCH SCORE）说明\n\n- **1分**：看最后10公里就行。\n    \n- **5分**：中途可以小睡一会儿。\n    \n- **10分**：建议提前上厕所，再准备点零食。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"2025-tour-de-france-preview-stage-overview\",\"slugSegments\":[\"notes\",\"to-modify\",\"2025-tour-de-france-preview-stage-overview\"],\"pathSegments\":[\"notes\",\"to-modify\",\"2025-tour-de-france-preview-stage-overview\"],\"urlPath\":\"/rosetta/notes/to-modify/2025-tour-de-france-preview-stage-overview\",\"href\":\"/rosetta/notes/to-modify/2025-tour-de-france-preview-stage-overview\",\"category\":\"to-modify\",\"title\":\"2025年环法自行车赛前瞻 + 赛段概览\",\"date\":\"2026-01-26\",\"excerpt\":\"本文全面介绍2025年环法自行车赛的赛道与赛段安排。全程约3338.8公里，累计爬升约51000米，共2 avif,quality_auto/ff69b3_08c79e4d697146a6879d390125673379~mv2.png\",\"alt\":\"\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"2025年的环法自行车赛全程约3338.8公里，累计爬升约51000米，分为21个赛段，中间仅有2个休息日。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"2025年环法自行车赛将于7月5日在里尔开赛。继去年尼斯非传统的个人计时赛（ITT）收官战后，本届赛事将重返香榭丽舍大街的标志性终点，尽管这个赛段并非一切都如往常。稍后我将详细介绍！\"}],\"\\n\",[\"$\",\"h4\",null,{\"id\":\"本预览包括\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#本预览包括\",\"children\":\"本预览包括：\"}]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"📍 2025年赛道概览\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"📅 几个可能有用的可视化概览\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"🗓️ 可下载的iCal日历（含基本赛段信息）\"}],\"\\n\"]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"赛道概览\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#赛道概览\",\"children\":\"赛道概览\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"今年的环法自行车赛特点：\"}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"🏔️ 6个高山赛段\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"💥 6个丘陵赛段\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"🚴 7个平路赛段\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"⏱️ 2个个人计时赛 — 一个平路，一个山地\"}],\"\\n\"]}],\"\\n\",[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"第一周---冲刺手古典赛车手和黄衫梦想\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#第一周---冲刺手古典赛车手和黄衫梦想\",\"children\":\"第一周 - 冲刺手、古典赛车手和黄衫梦想\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"今年的环法自行车赛第一周将持续整整10天，之后车手们才能获得期待已久的休息日。这是因为第一个休息日从周一移到了周二，以避免与法国国庆日重合。开幕周主要由平路和丘陵赛段组成，为冲刺手和古典赛车手提供了大量机会。从纸面上看，这一周非常适合欧倍青-德科尼克车队（Alpecin-Deceuninck）的双星马修·范德普尔（Mathieu van der Poel）和贾斯珀·菲利普森（Jasper Philipsen），他们很可能会将目光投向赛段冠军并争取穿上黄衫。但他们并非唯一对第一周抱有雄心壮志的选手：乔纳森·米兰（Jonathan Milan）、蒂姆·梅利尔（Tim Merlier）以及速度快且强壮的瓦特·范阿尔特（Wout van Aert）等冲刺手也可能加入竞争。而且，不要忽视像塔代伊·波加查（Tadej Pogačar）这样爆发力强的总成绩热门选手，他可能在这些丘陵赛段有所动作。在丘陵赛段之间，第五赛段将进行一场33公里长的平路个人计时赛，计时赛专家将与总成绩热门选手争夺赛段冠军，而总成绩车手也将为关键的秒数而战。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在第一周结束时，即法国国庆日（第10赛段），首个高山考验等待着车手们。这一天充满了爬坡，尽管没有HC级或一级爬坡。相反，这是一个持续起伏的赛段，将考验爬坡手的腿部力量。对于总成绩车手来说，这是一个大有可为的赛段，而突围车手也可能（或不可能）在前线争夺赛段冠军。\"}],\"\\n\",\"$L19\",\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\"]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://static.wixstatic.com/media/ff69b3_5a906c1f74544e93a415418a7fe90a15~mv2.png/v1/fill/w_484,h_644,fp_0.50_0.50,q_90/ff69b3_5a906c1f74544e93a415418a7fe90a15~mv2.webp\",\"alt\":\"\"}]}]\n1a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://static.wixstatic.com/media/ff69b3_1e8631f5290a491386a3a11a5a1b92e6~mv2.png/v1/fill/w_484,h_644,fp_0.50_0.50,q_90/ff69b3_1e8631f5290a491386a3a11a5a1b92e6~mv2.webp\",\"alt\":\"\"}]}]\n1b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://static.wixstatic.com/media/ff69b3_409c89c712ca41e2bfa6de996419272c~mv2.jpg/v1/fill/w_492,h_644,fp_0.50_0.50,lg_1,q_90/ff69b3_409c89c712ca41e2bfa6de996419272c~mv2.webp\",\"alt\":\"\"}]}]\n1c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"去年，乔纳森·米兰（Jonathan Milan）在巴勒鲁普世锦赛上赢得了个人追逐赛冠军，但今年夏天，他可能将目光投向黄衫，因为第一赛段预计将以大集团冲刺结束，这正是他擅长的。\"}]\n1d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在第一周，瓦特·范阿尔特（Wout van Aert）（图3）也可能会获得一些争夺赛段冠军的机会，甚至可能冲击黄衫？\"}]\n1e:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"第二周---山地和差距\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#第二周---山地和差距\",\"children\":\"第二周 - 山地和差距\"}]}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"第二周以冲刺手的机会拉开序幕，随后比赛进入比利牛斯山脉，那里将迎来三个决定性赛段：两个高山赛段（第12和14赛段）和一个第13赛段的山地个人计时赛。这三个赛段很可能会引发总成绩热门选手之间的激烈竞争，并可能成为波加查（Pogačar）、温格高（Vingegaard）、埃弗内普尔（Evenepoel）和罗格利奇（Rogl"])</script><script>self.__next_f.push([1,"ič）等总成绩热门选手之间拉开时间差距的关键。\"}]\n20:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本周的第五个也是最后一个赛段（是的，第二周只有第一周的一半长！）是前往卡尔卡松（Carcassonne）的丘陵赛段，看起来为突围胜利提供了绝佳机会 💪\"}]\n21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"总而言之，第二周虽然短暂，但它可能在塑造黄衫之争和决定2025年环法自行车赛冠军方面发挥关键作用 💛\"}]\n22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://static.wixstatic.com/media/ff69b3_31c468eaad85444aa47e213e627e54a6~mv2.png/v1/fill/w_486,h_486,fp_0.50_0.50,q_90/ff69b3_31c468eaad85444aa47e213e627e54a6~mv2.webp\",\"alt\":\"\"}]}]\n23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://static.wixstatic.com/media/ff69b3_5541ddf8efbe46ad81aa8d93191b29dc~mv2.png/v1/fill/w_488,h_486,fp_0.50_0.50,q_90/ff69b3_5541ddf8efbe46ad81aa8d93191b29dc~mv2.webp\",\"alt\":\"\"}]}]\n24:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"http
