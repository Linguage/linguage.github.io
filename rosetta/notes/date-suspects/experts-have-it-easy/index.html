taLayer = window.dataLayer || [];\\n            function gtag(){dataLayer.push(arguments);}\\n            gtag('js', new Date());\\n            gtag('config', 'G-99PGBGJH4S', {\\n              anonymize_ip: true,\\n              send_page_view: true,\\n            });\\n          \"}]]}]}]]}],{\"children\":[[\"slug\",\"rosetta/notes/date-suspects/experts-have-it-easy\",\"c\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L8\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",[\"$\",\"$1\",\"c\",{\"children\":[\"$Lb\",null,[\"$\",\"$Lc\",null,{\"children\":[\"$Ld\",[\"$\",\"$Le\",null,{\"promise\":\"$@f\"}]]}]]}],{},null,false]},null,false]},null,false],[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L10\",null,{\"children\":\"$L11\"}],null],[\"$\",\"$L12\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":\"$L13\"}]}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$14\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"13:[\"$\",\"$3\",null,{\"fallback\":null,\"children\":\"$L15\"}]\n"])</script><script>self.__next_f.push([1,"16:I[1203,[\"197\",\"static/chunks/197-f7c33a0114fc3db3.js\",\"373\",\"static/chunks/373-816263e744b1a0a1.js\",\"738\",\"static/chunks/738-b97c8b45db2c8cb9.js\",\"48\",\"static/chunks/app/%5B...slug%5D/page-b39f4036a39e3cb5.js\"],\"default\"]\n17:T3f05,"])</script><script>self.__next_f.push([1,"# 专家们游刃有余\n\n## 摘要\n\n本文通过迷宫比喻深入探讨了专家与新手之间的效率鸿沟。新手往往在自己制造的问题中越陷越深，而专家凭借经验和直觉能够避开陷阱、直击核心。文章指出新手最大的困境不在于能力不足，而在于无法识别关键决策点，也无法区分好建议与坏建议。作者强调找到有同理心的专家进行非正式交流对新手成长至关重要，同时鼓励新手主动探索小众领域以快速建立专长。\n\n## 核心概念及解读\n\n**决策盲区**：新手往往看不到专家能识别的关键决策点，甚至不知道有决策需要做出，导致无意识地走上错误路径\n\n**错误连锁效应**：新手的一个错误决策会引发后续一系列糟糕选择，使问题复杂度远超原始问题本身\n\n**专家直觉**：专家的许多关键决策已成为第二天性，但他们往往无法清晰地向新手解释其背后的逻辑和模式\n\n**非正式知识转移**：相比直接问答，新手通过观察专家工作和非正式闲聊所获得的隐性知识更为宝贵\n\n**小众领域深耕**：新手应主动投入时间研究冷门子领域，而非只关注常见知识，这是突破新手阶段的有效策略\n\n有一个令人遗憾地未被充分研究的课题是：专家如何在取得更佳成果的同时，比新手更有效率。我说研究不足，而非无人研究，是因为一个常识是：按时间向人收费，会导致专家因为工作速度更快而实际收入更少，这正是专家们会为自己的时间收取更高费用的原因。\n\n这种效应对于初入领域的新手所产生的影响，其研究尚不充分。新手起步时效率往往低得令人惋惜，他们会投入巨大的努力，绞尽脑汁，只为维护他们自己构建起来的、日益增多且难以维护的抽象概念。专家则无需经历这些周折。他们能更清晰地看清手头的实际问题，并更有效地投入时间和精力来解决问题。相比之下，新手会花费更多时间与自己制造出来的问题作斗争。让我们通过观察两个被困在迷宫中的角色以及他们如何设法逃脱，来探讨这个观点。\n\n### 困于迷宫：专家与新手[](read://https_boydkane.com/?url=https%3A%2F%2Fboydkane.com%2Fessays%2Fexperts#stuck-in-a-maze-expert-vs-novice)\n\n\u003e 想象一位世界级的导航员被置于迷宫之中。他装备精良，带着指南针和纸张，并且先前已成功逃脱过一些人类设计的最险恶的迷宫。同时，也想象一下你自己。在这个场景中，你就是新手。你甚至没有意识到自己被扔进了迷宫。你甚至不知道目标是逃出去还是找到中心。\n\u003e\n\u003e 随着你越来越深入迷宫，你意识到自己彻底迷路了。借着文学创作上的巧合，你的专家朋友打电话给你并提供了建议：“一旦开始，就用你的线球记录你走过的地方。它会帮助你追踪你所做的决定。”\n\u003e\n\u003e 你没有意识到猫咪玩具的重要性，所以没有带线球。你也不记得自己是从哪里开始的。你向专家朋友请教该怎么做，他回答说：“哦，我完全不知道。我从不不带线球出门。你当初就不该让自己陷入这种困境。”\n\n我处理过的一些最棘手的难题，并非因为核心问题本身有多困难，而是因为我当时在帮助经验不足的人，他们花了几个小时让自己越陷越深。在寻求帮助之前，他们做出了一个错误的决定，这个决定或许解决了他们的短期问题，但从长远来看却是搬起石头砸了自己的脚。这个糟糕的决定使得其他糟糕的决定更有可能发生，直到他们无助地陷入自己制造的陷阱之中。\n\n通常，这种陷阱远比任何专家会让自己陷入的困境要复杂得多。另一方面，新手很容易做出一系列糟糕的决定，导致解决手头问题的成本不断增加。你不仅在没有线球的情况下迷失在迷宫中，而且你还进入了一个起初看起来有点有趣的神秘洞穴，现在你在黑暗中迷路了。与此同时，世界级的专家正愉快地穿梭在迷宫中温暖阳光的部分，因为他们知道那个洞穴最终会通向死胡同。\n\n在这一点上，我想强调，这绝不是新手的错。他们和任何专家一样遵循同样的策略：“在当时采取你能采取的最佳行动”。告诉新手“做得更好一点”并非建设性的反馈。这种反馈并不能让他们随着时间的推移而进步，因为从这个场景中唯一重要的角度（新手的角度）来看，他们当时正在采取他们能采取的最佳行动。如果你给出的反馈不能带来改进，那么这种反馈又有什么意义呢？\n\n\u003e 仍然迷失在迷宫中，你继续行走。你的朋友提到了线球，思考片刻后，你意识到你的羊毛套衫，如果小心地拆开，可以成为一个很好的替代品。你尽职尽责地，带着明确的目标，坐下来开始拆解你的套衫。大约一个小时后，你得到了你的毛线球。在几次试图在你身后放出毛线失败后，你意识到单股毛线非常脆弱。你决定把毛线编起来，又坐下来花了一个小时做这件事。这相当无聊，但你认为解决迷宫就是这么回事。\n\u003e\n\u003e 过了一会儿，你的专家朋友打电话给你，斥责你浪费时间在这些毛线玩意儿上。“这显然永远不会成功的，”他说。他指示你使用构成迷宫的树篱上折断的树枝来标记你的路径。直到这时，你才意识到迷宫是由树篱构成的。\n\n新手常常将精力花费在修复那些与他们想解决的实际问题不相干的事情上，而专家则能更好地将精力导向他们想要解决的问题。这导致新手对一个领域产生极其扭曲的看法，因为他们最终解决的问题既比专家处理的问题更困难，也更无趣。没有人愿意为一个更无聊的问题投入更多的精力。\n\n\u003e 最后，有了一种标记你走过路径的方法，你开始穿越迷宫。或者也许是逃离它，你仍然不确定。你大步前进，边走边折断并放置树枝。你不太确定哪些路径是最好的，所以你大多只是随机选择。\n\n对于新手来说，绝大多数决策基本上都必须随机做出，几乎没有什么信息可以作为选择的依据。如果所有决策都是顺序性的，并且不依赖于任何其他决策，那么一个专注的新手在认真思考决策后，可能会想出一个比随机选择更好的解决方案。但我们生活的世界是分形的、复杂依赖的；许多决策以新手完全不知道的方式依赖于其他决策。即使是一个专注的新手，也会面临这样的情况：他们必须做出几个相互依赖的决策，然后才能得到关于这些决策有效性的反馈。新手（起初）被迫做出完全随意的选择，并承担其后果。希望他们能够学会哪些后果是由哪些决策造成的，但这并非总是可行的。\n\n从专家的角度来看，解决问题时所做的决策往往是第二天性，但这些决策都经过精心设计，以避免将来不必要的麻烦。新手审视专家的工作时，会很难区分这些少数重要的决策（基于多年的辛勤工作和学习）与大量远不那么重要的决策（主要基于个人喜好）。\n\n### 新手甚至看不到决策点[](read://https_boydkane.com/?url=https%3A%2F%2Fboydkane.com%2Fessays%2Fexperts#novices-dont-even-see-the-decision)\n\n\u003e 当你正轻松穿过迷宫中一段特别长而直的路段时，你的专家朋友再次打电话给你。“你为什么没有走几米前那个右转的路？”他们问。你断言那里没有路，回头一看也证实了这一点。\n\u003e\n\u003e 以防万一，你原路返回，果然，树篱中有一道细微的缝隙，你猜想那可能是一条路。与你迄今为止走过的宽阔干净的路径相比，它异常狭窄且杂草丛生，但它_确实_是一条路。现在仔细环顾四周，你意识到树篱实际上布满了裂缝、缺口和薄弱之处。谁知道你错过了多少条路？\n\n有时，新手甚至不知道有决策可做。当友好的专家指出决策点时，新手通常要么能做出正确的决策，要么在看到正确的解决方案时能够理解。但是，新手_一开始甚至不知道有决策要做_。这使得雄心勃勃的新手在没有外部帮助的情况下极难取得进展。他们不能仅仅“检查自己的工作是否有误”，因为对于任何实质性的工作，新手可能连自己一半的决策都指不出来。\n\n### 专家无法解释他们的决策[](read://https_boydkane.com/?url=https%3A%2F%2Fboydkane.com%2Fessays%2Fexperts#experts-cant-explain-their-decisions)\n\n\u003e 你挤过专家朋友推荐的树篱缝隙。不久，你来到迷宫的一个岔路口：一条路向左，另一条向右。左边的路看起来更宽阔也更明亮一些，但吸取了教训后，你决定打电话给你的专家朋友，听取他的建议并学习他的智慧。“右边的路更好。”你的朋友宣称。你请求解释，但他除了“右边的路是一个更强的选择，它显然看起来就很对劲。它绝不会让你失望的”之外，给不出任何更具体的说法。\n\u003e\n\u003e 由于缺乏可理解的智慧而感到沮丧，你选择了右边的路。果然，这看起来是正确的决定。据你判断，路变得清晰起来，并开始通向出口。但你仍然不明白你的专家朋友看到了什么，而且看起来他自己也不明白自己看到了什么。\n\n专家的直觉往往令人生畏，但很少能被理解。这种无法清晰解释其决策的能力，使得新手与专家共度时光变得如此有用。通常存在一种潜在的模式，即使专家和新手都无法恰当地阐明这种模式，新手也可以通过仔细观察来领会。\n\n\u003e 你的专家朋友因为你错过了那个明显的缺口、没有意识到可以爬过树篱、没有带树篱修剪器，以及无数其他你甚至没有意识到有不同选择的决定而斥责你。当你眼神呆滞时，你听到有人通过电话呼叫你的朋友。原来，你的专家朋友也有他自己的专家朋友，他们都在互相帮助！“我以为我应该自己想办法解决，”你哭喊道，但你的朋友问你是什么让你有这种想法的。\n\u003e\n\u003e 你问如何也能拥有一个可以帮助你穿越迷宫的同伴网络。你的朋友说去加入一些在线聊天室。不幸的是，他们要么在说难以理解的行话，要么在争论最佳的线球缠绕技巧。\n\n专家们通常拥有一个由人组成的网络，或者（如今更常见的是）知道可以指导他们思考的在线网站和用户名网络。他们能够迅速区分有用的见解和毫无帮助的通用总结，并且不必花费太多时间寻找他们需要的信息。但是新手_完全不知道_如何区分这两者，也不知道如何找到能够有效帮助他们的社区。\n\n\u003e 最终，你完成了迷宫。为了不想重复作为一个完全新手的经历，你致力于学习更多知识，避免陷入新手的陷阱。但是，具体来说，你应该怎么做呢？\n\n作为新手，你_需要_找到一位富有同情心的专家来帮助你，你可以向他提出所有问题，无论这些问题多么微不足道。一个替代方法是找到很多专家，这样你就可以将“负荷”分摊给他们。如今，通过网络你可以走得很远，使用人工智能工具更是如此。但是，新手容易陷入的许多上述困境并不会因为你接触了互联网或聊天机器人就奇迹般地消失。你仍然不知道如何识别微妙的决策。你仍然不知道如何区分好主意和坏主意。你仍然不知道如何避免因错误选择而导致的长期连锁反应。互联网确实有帮助，但有人在你身边则会好上无数倍。\n\n有一件事可能很难向你友好的专家传达，那就是有时你只是需要能够向他们展示你在做什么，而心中并没有具体的问题。我经常发现，我会对自己正在做的事情感到不安，然后与一位专家朋友交谈，很快就能发现我犯了一些以后会导致麻烦的错误。有一个乐于花时间“随便聊聊”，没有任何特定目标需要解决的人，将会大有裨益。\n\n在工作场所，新手和专家之间这种“随便聊聊”式的互动对于知识转移和培训至关重要。但是新手很少能在关键决策者面前有发言权，因此促进这种互动常常被忽视。仅仅指示高级员工回答新人的问题是不够的，因为绝大多数学习来自于新手观察专家如何施展他们的技能，而不是来自于直接的问答。使这种情况更加棘手的是，专家可能会认为“随便聊聊”式的互动基本上毫无价值，而回答具体问题则_感觉_更有用。另一方面，新手如果有足够的时间，很可能可以自己找到具体问题的答案。但是，当专家与新手“随便聊聊”时所培养起来的直觉，对新手来说却是极其宝贵的。这解释了当所有专家都远程工作时培训新员工的困难，因为远程工作几乎消除了任何形式的非正式、无引导的“茶水间”互动。\n\n你可以独立做的一件事（而且可能最好在没有专家监督的情况下进行），是对该领域的探索。你一无所知，对于什么可能有用或没用也没有任何偏见。_任何_时候，当你遇到让你觉得有深度的东西，比如写得很好的系列文章或深入的技术探讨，你都需要投入大量精力。作为新手，你的一个优势是_一切_都是新的，没有人期望你很快。因此，你可以花时间尽可能多地学习。\n\n我真的不认为这会做得过火。花一周时间探索你所在领域的某些特定秘辛，很可能会带来回报，因为你突然之间就在这个（_微不足道的_）方面达到了专家水平。你可以与专家一较高下，因为他们上一次阅读那个冷僻的子领域已经是 5 年前的事了。不要研究“常见”的东西，而是全力投入到那些小众领域。常见的东西足够常见，无论你的主要活动是什么，你都会通过耳濡目染学会它们。但是小众的东西需要主动学习，而忽视小众领域正是你一直停留在新手阶段的原因。\n\n在所有这些之中，新手需要勇气（在不知道后果的情况下做出决定）和自信（以便他们全心全意地致力于自己的决定，并赋予这些决定最大的成功机会）。这些特质并非微不足道，而自信很容易被专家一句尖刻的评论所摧毁。我不想想象有多少有前途的新手被平庸的专家所唾弃。这样一来，由于存在摧毁新手自信的风险，来自心地不善的专家的建议甚至比没有任何专家建议更糟糕。\n\n专家与新手之间缺乏一贯的同理心表明，尽管感觉很容易，但实际上却很困难。关于这一点，我在这里写了更多：[这里](https://boydkane.com/essays/hard)。\n\n在极端情况下，这种缺乏同理心会导致专家嘲笑新手的作品没有专家作品所巧妙展现的声望/品味/格调/地位。\n\n这是自我应验的：新手要么会遵从专家的审美观，要么会将该研究领域视为“不适合自己”，要么（在极少数情况下）在最终证明专家是错的之后，付出难以置信的努力。在最后一种情况下，新手无论如何都会成为专家。专家们倾向于对技术挑战性强的作品而非简单但有趣的作品有审美偏好，关于这种现象我在这里写了更多：[专家审美](https://boydkane.com/essays/expert_aesthetics)。\n\n---\n\n在 [Twitter (后来的 X)](https://twitter.com/beyarkay) 上关注我，我会在那里宣布我接下来要写的内容。\n\n在\n\n或使用下面的评论框讨论这篇文章。\n\n感谢 Daniël Goosen、Paul Hoft von Hoesslin、Lisa Kane 博士和 Tegan Green，以及 AI Safety Cape Town 写作小组审阅了本文的草稿。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"experts-have-it-easy\",\"slugSegments\":[\"notes\",\"date-suspects\",\"experts-have-it-easy\"],\"pathSegments\ tes\",\"missing-source-url\",\"superlinear-returns-paul-graham\"]},{\"type\":\"entry\",\"title\":\"大师系列 - 詹姆斯·西蒙斯：用数学赚钱的秘诀与慈善之路\",\"href\":\"/rosetta/notes/missing-source-url/james-simons-making-money-with-math\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"james-simons-making-money-with-math\"]},{\"type\":\"entry\",\"title\":\"博士生涯生存指南\",\"href\":\"/rosetta/notes/missing-source-url/phd-survival-guide-andrej-karpathy\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"phd-survival-guide-andrej-karpathy\"]},{\"type\":\"entry\",\"title\":\"美国众议院党派倾向和超级合作者的兴起\",\"href\":\"/rosetta/notes/missing-source-url/rise-of-partisanship-and-super-cooperators-in-us-house\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"rise-of-partisanship-and-super-cooperators-in-us-house\"]},{\"type\":\"entry\",\"title\":\"科学研究成功的三大黄金法则\",\"href\":\"/rosetta/notes/missing-source-url/three-golden-rules-for-successful-scientific-research\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"three-golden-rules-for-successful-scientific-research\"]},{\"type\":\"entry\",\"title\":\"自动化的讽刺\",\"href\":\"/rosetta/notes/missing-source-url/ironies-of-automation\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"ironies-of-automation\"]}]}]}]},\"directoryHref\":\"/rosetta/notes/date-suspects\",\"children\":\"$L18\"}]\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本文通过迷宫比喻深入探讨了专家与新手之间的效率鸿沟。新手往往在自己制造的问题中越陷越深，而专家凭借经验和直觉能够避开陷阱、直击核心。文章指出新手最大的困境不在于能力不足，而在于无法识别关键决策点，也无法区分好建议与坏建议。作者强调找到有同理心的专家进行非正式交流对新手成长至关重要，同时鼓励新手主动探索小众领域以快速建立专长。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"决策盲区\"}],\"：新手往往看不到专家能识别的关键决策点，甚至不知道有决策需要做出，导致无意识地走上错误路径\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"错误连锁效应\"}],\"：新手的一个错误决策会引发后续一系列糟糕选择，使问题复杂度远超原始问题本身\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"专家直觉\"}],\"：专家的许多关键决策已成为第二天性，但他们往往无法清晰地向新手解释其背后的逻辑和模式\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"非正式知识转移\"}],\"：相比直接问答，新手通过观察专家工作和非正式闲聊所获得的隐性知识更为宝贵\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"小众领域深耕\"}],\"：新手应主动投入时间研究冷门子领域，而非只关注常见知识，这是突破新手阶段的有效策略\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"有一个令人遗憾地未被充分研究的课题是：专家如何在取得更佳成果的同时，比新手更有效率。我说研究不足，而非无人研究，是因为一个常识是：按时间向人收费，会导致专家因为工作速度更快而实际收入更少，这正是专家们会为自己的时间收取更高费用的原因。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这种效应对于初入领域的新手所产生的影响，其研究尚不充分。新手起步时效率往往低得令人惋惜，他们会投入巨大的努力，绞尽脑汁，只为维护他们自己构建起来的、日益增多且难以维护的抽象概念。专家则无需经历这些周折。他们能更清晰地看清手头的实际问题，并更有效地投入时间和精力来解决问题。相比之下，新手会花费更多时间与自己制造出来的问题作斗争。让我们通过观察两个被困在迷宫中的角色以及他们如何设法逃脱，来探讨这个观点。\"}],\"\\n\",[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"困于迷宫专家与新手\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#困于迷宫专家与新手\",\"children\":[\"困于迷宫：专家与新手\",[\"$\",\"a\",null,{\"href\":\"read://https_boydkane.com/?url=https%3A%2F%2Fboydkane.com%2Fessays%2Fexperts#stuck-in-a-maze-expert-vs-novice\"}]]}]}],\"\\n\",[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"想象一位世界级的导航员被置于迷宫之中。他装备精良，带着指南针和纸张，并且先前已成功逃脱过一些人类设计的最险恶的迷宫。同时，也想象一下你自己。在这个场景中，你就是新手。你甚至没有意识到自己被扔进了迷宫。你甚至不知道目标是逃出去还是找到中心。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"随着你越来越深入迷宫，你意识到自己彻底迷路了。借着文学创作上的巧合，你的专家朋友打电话给你并提供了建议：“一旦开始，就用你的线球记录你走过的地方。它会帮助你追踪你所做的决定。”\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你没有意识到猫咪玩具的重要性，所以没有带线球。你也不记得自己是从哪里开始的。你向专家朋友请教该怎么做，他回答说：“哦，我完全不知道。我从不不带线球出门。你当初就不该让自己陷入这种困境。”\"}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我处理过的一些最棘手的难题，并非因为核心问题本身有多困难，而是因为我当时在帮助经验不足的人，他们花了几个小时让自己越陷越深。在寻求帮助之前，他们做出了一个错误的决定，这个决定或许解决了他们的短期问题，但从长远来看却是搬起石头砸了自己的脚。这个糟糕的决定使得其他糟糕的决定更有可能发生，直到他们无助地陷入自己制造的陷阱之中。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"通常，这种陷阱远比任何专家会让自己陷入的困境要复杂得多。另一方面，新手很容易做出一系列糟糕的决定，导致解决手头问题的成本不断增加。你不仅在没有线球的情况下迷失在迷宫中，而且你还进入了一个起初看起来有点有趣的神秘洞穴，现在你在黑暗中迷路了。与此同时，世界级的专家正愉快地穿梭在迷宫中温暖阳光的部分，因为他们知道那个洞穴最终会通向死胡同。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在这一点上，我想强调，这绝不是新手的错。他们和任何专家一样遵循同样的策略：“在当时采取你能采取的最佳行动”。告诉新手“做得更好一点”并非建设性的反馈。这种反馈并不能让他们随着时间的推移而进步，因为从这个场景中唯一重要的角度（新手的角度）来看，他们当时正在采取他们能采取的最佳行动。如果你给出的反馈不能带来改进，那么这种反馈又有什么意义呢？\"}],\"\\n\",[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"仍然迷失在迷宫中，你继续行走。你的朋友提到了线球，思考片刻后，你意识到你的羊毛套衫，如果小心地拆开，可以成为一个很好的替代品。你尽职尽责地，带着明确的目标，坐下来开始拆解你的套衫。大约一个小时后，你得到了你的毛线球。在几次试图在你身后放出毛线失败后，你意识到单股毛线非常脆弱。你决定把毛线编起来，又坐下来花了一个小时做这件事。这相当无聊，但你认为解决迷宫就是这么回事。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"过了一会儿，你的专家朋友打电话给你，斥责你浪费时间在这些毛线玩意儿上。“这显然永远不会成功的，”他说。他指示你使用构成迷宫的树篱上折断的树枝来标记你的路径。直到这时，你才意识到迷宫是由树篱构成的。\"}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"新手常常将精力花费在修复那些与他们想解决的实际问题不相干的事情上，而专家则能更好地将精力导向他们想要解决的问题。这导致新手对一个领域产生极其扭曲的看法，因为他们最终解决的问题既比专家处理的问题更困难，也更无趣。没有人愿意为一个更无聊的问题投入更多的精力。\"}],\"\\n\",\"$L19\",\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\"]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后，有了一种标记你走过路径的方法，你开始穿越迷宫。或者也许是逃离它，你仍然不确定。你大步前进，边走边折断并放置树枝。你不太确定哪些路径是最好的，所以你大多只是随机选择。\"}],\"\\n\"]}]\n1a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"对于新手来说，绝大多数决策基本上都必须随机做出，几乎没有什么信息可以作为选择的依据。如果所有决策都是顺序性的，并且不依赖于任何其他决策，那么一个专注的新手在认真思考决策后，可能会想出一个比随机选择更好的解决方案。但我们生活的世界是分形的、复杂依赖的；许多决策以新手完全不知道的方式依赖于其他决策。即使是一个专注的新手，也会面临这样的情况：他们必须做出几个相互依赖的决策，然后才能得到关于这些决策有效性的反馈。新手（起初）被迫做出完全随意的选择，并承担其后果。希望他们能够学会哪些后果是由哪些决策造成的，但这并非总是可行的。\"}]\n1b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"从专家的角度来看，解决问题时所做的决策往往是第二天性，但这些决策都经过精心设计，以避免将来不必要的麻烦。新手审视专家的工作时，会很难区分这些少数重要的决策（基于多年的辛勤工作和学习）与大量远不那么重要的决策（主要基于个人喜好）。\"}]\n1c:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"新手甚至看不到决策点\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#新手甚至看不到决策点\",\"children\":[\"新手甚至看不到决策点\",[\"$\",\"a\",null,{\"href\":\"read://https_boydkane.com/?url=https%3A%2F%2Fboydkane.com%2Fessays%2Fexperts#novices-dont-even-see-t"])</script><script>self.__next_f.push([1,"he-decision\"}]]}]}]\n1d:[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"当你正轻松穿过迷宫中一段特别长而直的路段时，你的专家朋友再次打电话给你。“你为什么没有走几米前那个右转的路？”他们问。你断言那里没有路，回头一看也证实了这一点。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"以防万一，你原路返回，果然，树篱中有一道细微的缝隙，你猜想那可能是一条路。与你迄今为止走过的宽阔干净的路径相比，它异常狭窄且杂草丛生，但它_确实_是一条路。现在仔细环顾四周，你意识到树篱实际上布满了裂缝、缺口和薄弱之处。谁知道你错过了多少条路？\"}],\"\\n\"]}]\n1e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"有时，新手甚至不知道有决策可做。当友好的专家指出决策点时，新手通常要么能做出正确的决策，要么在看到正确的解决方案时能够理解。但是，新手_一开始甚至不知道有决策要做_。这使得雄心勃勃的新手在没有外部帮助的情况下极难取得进展。他们不能仅仅“检查自己的工作是否有误”，因为对于任何实质性的工作，新手可能连自己一半的决策都指不出来。\"}]\n1f:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"专家无法解释他们的决策\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#专家无法解释他们的决策\",\"children\":[\"专家无法解释他们的决策\",[\"$\",\"a\",null,{\"href\":\"read://https_boydkane.com/?url=https%3A%2F%2Fboydkane.com%2Fessays%2Fexperts#experts-cant-explain-their-decisions\"}]]}]}]\n20:[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你挤过专家朋友推荐的树篱缝隙。不久，你来到迷宫的一个岔路口：一条路向左，另一条向右。左边的路看起来更宽"])</script><script>self.__next_f.push([1,"阔也更明亮一些，但吸取了教训后，你决定打电话给你的专家朋友，听取他的建议并学习他的智慧。“右边的路更好。”你的朋友宣称。你请求解释，但他除了“右边的路是一个更强的选择，它显然看起来就很对劲。它绝不会让你失望的”之外，给不出任何更具体的说法。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"由于缺乏可理解的智慧而感到沮丧，你选择了右边的路。果然，这看起来是正确的决定。据你判断，路变得清晰起来，并开始通向出口。但你仍然不明白你的专家朋友看到了什么，而且看起来他自己也不明白自己看到了什么。\"}],\"\\n\"]}]\n21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"专家的直觉往往令人生畏，但很少能被理解。这种无法清晰解释其决策的能力，使得新手与专家共度时光变得如此有用。通常存在一种潜在的模式，即使专家和新手都无法恰当地阐明这种模式，新手也可以通过仔细观察来领会。\"}]\n22:[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你的专家朋友因为你错过了那个明显的缺口、没有意识到可以爬过树篱、没有带树篱修剪器，以及无数其他你甚至没有意识到有不同选择的决定而斥责你。当你眼神呆滞时，你听到有人通过电话呼叫你的朋友。原来，你的专家朋友也有他自己的专家朋友，他们都在互相帮助！“我以为我应该自己想办法解决，”你哭喊道，但你的朋友问你是什么让你有这种想法的。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你问如何也能拥有一个可以帮助你穿越迷宫的同伴网络。你的朋友说去加入一些在线聊天室。不幸的是，他们要么在说难以理解的行话，要么在争论最佳的线球缠绕技巧。\"}],\"\\n\"]}]\n23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"专家们通常拥有一个由人组成的网络，或者"])</script><script>self.__next_f.push([1,"（如今更常见的是）知道可以指导他们思考的在线网站和用户名网络。他们能够迅速区分有用的见解和毫无帮助的通用总结，并且不必花费太多时间寻找他们需要的信息。但是新手_完全不知道_如何区分这两者，也不知道如何找到能够有效帮助他们的社区。\"}]\n24:[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最终，你完成了迷宫。为了不想重复作为一个完全新手的经历，你致力于学习更多知识，避免陷入新手的陷阱。但是，具体来说，你应该怎么做呢？\"}],\"\\n\"]}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"作为新手，你_需要_找到一位富有同情心的专家来帮助你，你可以向他提出所有问题，无论这些问题多么微不足道。一个替代方法是找到很多专家，这样你就可以将“负荷”分摊给他们。如今，通过网络你可以走得很远，使用人工智能工具更是如此。但是，新手容易陷入的许多上述困境并不会因为你接触了互联网或聊天机器人就奇迹般地消失。你仍然不知道如何识别微妙的决策。你仍然不知道如何区分好主意和坏主意。你仍然不知道如何避免因错误选择而导致的长期连锁反应。互联网确实有帮助，但有人在你身边则会好上无数倍。\"}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"有一件事可能很难向你友好的专家传达，那就是有时你只是需要能够向他们展示你在做什么，而心中并没有具体的问题。我经常发现，我会对自己正在做的事情感到不安，然后与一位专家朋友交谈，很快就能发现我犯了一些以后会导致麻烦的错误。有一个乐于花时间“随便聊聊”，没有任何特定目标需要解决的人，将会大有裨益。\"}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在工作场所，新手和专家之间这种“随便聊聊”式的互动对于知识转移和培训至关"])</script><script>self.__next_f.push([1,"重要。但是新手很少能在关键决策者面前有发言权，因此促进这种互动常常被忽视。仅仅指示高级员工回答新人的问题是不够的，因为绝大多数学习来自于新手观察专家如何施展他们的技能，而不是来自于直接的问答。使这种情况更加棘手的是，专家可能会认为“随便聊聊”式的互动基本上毫无价值，而回答具体问题则_感觉_更有用。另一方面，新手如果有足够的时间，很可能可以自己找到具体问题的答案。但是，当专家与新手“随便聊聊”时所培养起来的直觉，对新手来说却是极其宝贵的。这解释了当所有专家都远程工作时培训新员工的困难，因为远程工作几乎消除了任何形式的非正式、无引导的“茶水间”互动。\"}]\n28:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你可以独立做的一件事（而且可能最好在没有专家监督的情况下进行），是对该领域的探索。你一无所知，对于什么可能有用或没用也没有任何偏见。_任何_时候，当你遇到让你觉得有深度的东西，比如写得很好的系列文章或深入的技术探讨，你都需要投入大量精力。作为新手，你的一个优势是_一切_都是新的，没有人期望你很快。因此，你可以花时间尽可能多地学习。\"}]\n29:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"我真的不认为这会做得过火。花一周时间探索你所在领域的某些特定秘辛，很可能会带来回报，因为你突然之间就在这个（\",[\"$\",\"em\",null,{\"children\":\"微不足道的\"}],\"）方面达到了专家水平。你可以与专家一较高下，因为他们上一次阅读那个冷僻的子领域已经是 5 年前的事了。不要研究“常见”的东西，而是全力投入到那些小众领域。常见的东西足够常见，无论你的主要活动是什么，你都会通过耳濡目染学会它们。但是小众的东西需要主动学习，而忽视小众领域正是你一直停"])</script><script>self.__next_f.push([1,"留在新手阶段的原因。\"]}]\n2a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在所有这些之中，新手需要勇气（在不知道后果的情况下做出决定）和自信（以便他们全心全意地致力于自己的决定，并赋予这些决定最大的成功机会）。这些特质并非微不足道，而自信很容易被专家一句尖刻的评论所摧毁。我不想想象有多少有前途的新手被平庸的专家所唾弃。这样一来，由于存在摧毁新手自信的风险，来自心地不善的专家的建议甚至比没有任何专家建议更糟糕。\"}]\n2b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"专家与新手之间缺乏一贯的同理心表明，尽管感觉很容易，但实际上却很困难。关于这一点，我在这里写了更多：\",[\"$\",\"a\",null,{\"href\":\"https://boydkane.com/essays/hard\",\"children\":\"这里\"}],\"。\"]}]\n2c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在极端情况下，这种缺乏同理心会导致专家嘲笑新手的作品没有专家作品所巧妙展现的声望/品味/格调/地位。\"}]\n2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"这是自我应验的：新手要么会遵从专家的审美观，要么会将该研究领域视为“不适合自己”，要么（在极少数情况下）在最终证明专家是错的之后，付出难以置信的努力。在最后一种情况下，新手无论如何都会成为专家。专家们倾向于对技术挑战性强的作品而非简单但有趣的作品有审美偏好，关于这种现象我在这里写了更多：\",[\"$\",\"a\",null,{\"href\":\"https://boydkane.com/essays/expert_aesthetics\",\"children\":\"专家审美\"}],\"。\"]}]\n2e:[\"$\",\"hr\",null,{}]\n2f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"在 \",[\"$\",\"a\",null,{\"href\":\"https://twitter.com/beyarkay\",\"children\":\"Twitter (后来的 X)\"}],\" 上关注我，我会在那里宣布我接下来要写的内容。\"]}]\n30:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在\"}]\n31:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"或使用下面的评论框"])</script><script>self.__next_f.push([1,"讨论这篇文章。\"}]\n32:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"感谢 Daniël Goosen、Paul Hoft von Hoesslin、Lisa Kane 博士和 Tegan Green，以及 AI Safety Cape Town 写作小组审阅了本文的草稿。\"}]\n"])</script><script>self.__next_f.push([1,"11:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nd:null\n"])</script><script>self.__next_f.push([1,"33:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"f:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"专家们游刃有余 | Linguista\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"本文通过迷宫比喻深入探讨了专家与新手之间的效率鸿沟。新手往往在自己制造的问题中越陷越深，而专家凭借经验和直觉能够避开陷阱、直击核心。文章指出新手最大的困境不在于能力不足，而在于无法识别关键决策点，也无法区分好建议与坏建议。作者强调找到有同理心的专家进行非正式交流对新手成长至关重要，同时鼓励新手主动探索小众领域以快速建立专长。\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"专家与新手,学习成长,知识转移,决策能力,职场培训\"}],[\"$\",\"link\",\"3\",{\"rel\":\"canonical\",\"href\":\"https://linguis }]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"15:\"$f:metadata\"\n"])</script></body></html>
