物理的分与合\",\"date\":\"2026-01-27\",\"excerpt\":\"杨振宁从数学与物理同源的历史出发，回顾了微积分诞生于牛顿力学研究的背景，阐述了19世纪末以来数学日益抽象化导致两学科分离的趋势，并以魏尔的规范不变理论为线索，讲述了量子力学引入虚数i后如何使规范理论获得物理意义，最终推动数学与物理在20世纪下半叶重新走向融合。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-anthropic-teams-use-claude-code\",\"href\":\"/rosetta/notes/date-suspects/how-anthropic-teams-use-claude-code\",\"category\":\"date-suspects\",\"title\":\"Anthropic 团队如何使用 Claude Code\",\"date\":\"2026-01-27\",\"excerpt\":\"本文介绍了 Anthropic 内部多个团队使用 Claude Code 的实际案例，涵盖数据基础设施、产品开发、安全工程等部门。各团队通过 Claude Code 实现了 Kubernetes 调试、快速原型设计、测试驱动开发、代码库探索等工作流的显著提效，同时总结了详细编写 Claude.md 文件、建立自给自足循环、培养任务分类直觉等最佳实践。\",\"coverImage\":\"$undefined\"},{\"slug\":\"pytorch-documentary-powering-ai-revolution\",\"href\":\"/rosetta/notes/date-suspects/pytorch-documentary-powering-ai-revolution\",\"category\":\"date-suspects\",\"title\":\"PyTorch官方纪录片 - 驱动AI革命的力量\",\"date\":\"2026-01-27\",\"excerpt\":\"本片回顾了PyTorch从诞生到成为AI领域核心框架的完整历程。从早期碎片化的研究工具生态，到Facebook AI Research内部孵化，再到击败TensorFlow成为研究者首选，PyTorch凭借对研究者的友好设计、活跃的社区支持以及与硬件和云平台的深度集成，最终驱动了ChatGPT和Stable Diffusion等里程碑式产品的诞生。PyTorch基金会的成立标志着其向开放治理模式的转型。\",\"coverImage\":\"$undefined\"},{\"slug\":\"role-of-analytical-mechanics-in-mathematical-development\",\"href\":\"/rosetta/notes/date-suspects/role-of-analytical-mechanics-in-mathematical-development\",\"category\":\"date-suspects\",\"title\":\"分析力学在数学发展中的作用\",\"date\":\"2026-01-27\",\"excerpt\":\"本文考察了分析力学在数学发展中扮演的双重角色。分析力学既是经典力学的理论体系，也是一门纯粹的数学科学。文章梳理了从Euler、Lagrange到Hamilton、Jacobi等人的工作，阐明分析力学如何推动常微分方程理论、变分法、一阶偏微分方程理论、黎曼几何与辛几何等数学分支的形成与发展，揭示了力学结构与数学理论之间的深刻联系。\",\"coverImage\":\"$undefined\"},{\"slug\":\"saas-vibe-coding-guide-10k-monthly-revenue\",\"href\":\"/rosetta/notes/date-suspects/saas-vibe-coding-guide-10k-monthly-revenue\",\"category\":\"date-suspects\",\"title\":\"完整的月收入1万美元 SaaS Vibe 编程指南\",\"date\":\"2026-01-27\",\"excerpt\":\"本文介绍了如何利用 Vibe 编程工具构建月收入1万美元的 SaaS 产品。作者对比了 Bolt、Lovable、Replit 等工具后推荐 Emergent 平台，并分享了 Token 成本优化技巧、四类核心文档的提示词模板以及 AI Twitter 推文串生成器的完整构建思路，涵盖前端 React + Tailwind CSS 与后端 FastAPI 的技术选型。\",\"coverImage\":\"$undefined\"},{\"slug\":\"google-whitepaper-ai-agents\",\"href\":\"/rosetta/notes/date-suspects/google-whitepaper-ai-agents\",\"category\":\"date-suspects\",\"title\":\"智能体（Agent）——Google白皮书解读\",\"date\":\"2026-01-27\",\"excerpt\":\"本文为Google发布的智能体白皮书，系统阐述了生成式AI智能体的核心概念与架构。智能体由模型、工具和编排层三大组件构成，能够自主观察环境、调用外部工具并采取行动以实现目标。文章详细介绍了ReAct、思维链、思维树等推理框架，并对比了智能体与传统模型的本质差异，为构建生产级智能体应用提供了完整的技术参考。\",\"coverImage\":\"$undefined\"},{\"slug\":\"the-gentle-singularity\",\"href\":\"/rosetta/notes/date-suspects/the-gentle-singularity\",\"category\":\"date-suspects\",\"title\":\"温和的奇点\",\"date\":\"2026-01-27\",\"excerpt\":\"Sam Altman认为人类正在迈向数字超级智能的门槛，AI将通过加速科学进步和提升生产力深刻改变世界。智能与能源的极大丰裕将重塑社会，但奇点的到来并非剧变，而是一条平滑的指数曲线——向前看总显陡峭，回头看则趋于平坦。关键在于解决对齐问题并确保超级智能的广泛可及。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ilya-sutskever-unsupervised-learning-compression-theory\",\"href\":\"/rosetta/notes/date-suspects/ilya-sutskever-unsupervised-learning-compression-theory\",\"category\":\"date-suspects\",\"title\":\"Ilya Sutskever演讲 - 从压缩视角理解无监督学习的理论框架\",\"date\":\"2026-01-26\",\"excerpt\":\"Ilya Sutskever在本次演讲中探讨了无监督学习的理论基础，提出压缩是理解无监督学习的关键。他从监督学习的数学保证出发，引入Kolmogorov复杂性作为终极压缩器的概念，论证了通过联合压缩未标记数据与目标数据可以揭示共享结构，从而实现有效的无监督学习。演讲还结合iGPT实验验证了该理论，并讨论了线性表征涌现等开放问题。\",\"coverImage\":\"$undefined\"},{\"slug\":\"openai-practical-guide-to-building-agents\",\"href\":\"/rosetta/notes/date-suspects/openai-practical-guide-to-building-agents\",\"category\":\"date-suspects\",\"title\":\"OpenAI构建Agent的实用指南\",\"date\":\"2026-01-26\",\"excerpt\":\"本文是OpenAI发布的Agent构建实用指南，面向产品和工程团队，系统介绍了Agent的定义、适用场景、设计基础与编排模式。内容涵盖模型选择、工具定义、指令配置等核心组件，并提供了单Agent与多Agent系统的编排策略，帮助开发者从零开始构建安全、可预测且高效运行的智能Agent系统。\",\"coverImage\":\"$undefined\"},{\"slug\":\"the-second-half-of-ai\",\"href\":\"/rosetta/notes/date-suspects/the-second-half-of-ai\",\"category\":\"date-suspects\",\"title\":\"下半场——人工智能从解决问题转向定义问题\",\"date\":\"2026-01-26\",\"excerpt\":\"本文提出人工智能正处于中场休息阶段。上半场的核心是开发新的训练方法和模型，而下半场的焦点将从解决问题转向定义问题，评估将变得比训练更重要。作者通过强化学习的视角，阐述了语言预训练、规模化和推理行动三大要素如何构成一套通用配方，使得RL终于具备了泛化能力，从而彻底改变了AI研究的游戏规则。\",\"coverImage\":\"$undefined\"},{\"slug\":\"experts-always-have-slack\",\"href\":\"/rosetta/notes/date-suspects/experts-always-have-slack\",\"category\":\"date-suspects\",\"title\":\"专家们总是游刃有余\",\"date\":\"2026-01-26\",\"excerpt\":\"本文通过迷宫逃脱的生动比喻，深入剖析专家与新手之间的效率鸿沟。专家凭借经验和直觉能高效解决问题，而新手往往在自己制造的困境中越陷越深。文章探讨了新手看不到决策点、专家难以解释直觉、非正式交流对培训的重要性等核心议题，并为新手提供了切实的成长建议。\",\"coverImage\":\"$undefined\"},{\"slug\":\"experts-have-it-easy\",\"href\":\"/rosetta/notes/date-suspects/experts-have-it-easy\",\"category\":\"date-suspects\",\"title\":\"专家们游刃有余\",\"date\":\"2026-01-26\",\"excerpt\":\"本文通过迷宫比喻深入探讨了专家与新手之间的效率鸿沟。新手往往在自己制造的问题中越陷越深，而专家凭借经验和直觉能够避开陷阱、直击核心。文章指出新手最大的困境不在于能力不足，而在于无法识别关键决策点，也无法区分好建议与坏建议。作者强调找到有同理心的专家进行非正式交流对新手成长至关重要，同时鼓励新手主动探索小众领域以快速建立专长。\",\"coverImage\":\"$undefined\"},{\"slug\":\"why-i-am-not-going-to-use-ai-tools\",\"href\":\"/rosetta/notes/date-suspects/why-i-am-not-going-to-use-ai-tools\",\"category\":\"date-suspects\",\"title\":\"为什么我不打算使用AI工具\",\"date\":\"2026-01-26\",\"excerpt\":\"本文仿写温德尔·贝里1987年经典文章《我为什么不打算买电脑》，将其对电脑技术的质疑迁移至当下AI工具语境。作者从能源消耗与数据伦理、企业宣传的虚妄、思考主体性的丧失以及拒绝自我麻痹四个层面阐述了不使用AI工具的理由，并提出九条引入新技术的评判标准，强调技术不应取代深度思考、人际真实互动与个人判断力。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ten-principles-of-ai-programming\",\"href\":\"/rosetta/notes/date-suspects/ten-principles-of-ai-programming\",\"category\":\"date-suspects\",\"title\":\"使用 AI 编程的十大基本原则\",\"date\":\"2026-01-26\",\"excerpt\":\"本文基于 Anthropic 团队使用 Claude Code 的实践经验，总结了十大 AI 编程基本原则，涵盖上下文管理、迭代协作、检查点设置、任务分类、子代理拆分、自动化重复工作、技能拓展、安全合规、团队文化和生态系统构建等方面，为开发者提供了系统化的 AI 辅助编程方法论。\",\"coverImage\":\"$undefined\"},{\"slug\":\"google-agent2agent-a2a-protocol\",\"href\":\"/rosetta/notes/date-suspects/google-agent2agent-a2a-protocol\",\"category\":\"date-suspects\",\"title\":\"宣布推出 Agent2Agent (A2A) 协议\",\"date\":\"2026-01-26\",\"excerpt\":\"谷歌联合超过50家技术合作伙伴推出 Agent2Agent（A2A）开放协议，旨在让不同供应商和框架构建的 AI 智能体实现跨平台通信与协作。该协议基于 HTTP、SSE、JSON-RPC 等现有标准，支持能力发现、任务管理、多模态交互和长时间运行任务，为企业级多智能体生态系统提供标准化的互操作方案。\",\"coverImage\":\"$undefined\"},{\"slug\":\"yang-zhenning-forty-years-of-learning-and-teaching\",\"href\":\"/rosetta/notes/date-suspects/yang-zhenning-forty-years-of-learning-and-teaching\",\"category\":\"date-suspects\",\"title\":\"读书教学四十年\",\"date\":\"2026-01-26\",\"excerpt\":\"杨振宁回顾自己从合肥启蒙、清华园童年、西南联大求学到芝加哥大学深造的四十年读书与教学历程，讲述吴大猷和王竹溪两位恩师对其学术方向的引导，以及归纳法与推演法两种研究方法对科学研究的深远影响，展现了一代物理学家的成长轨迹与治学心得。\",\"coverImage\":\"$undefined\"}],\"heatmapDateCounts\":\"$undefined\",\"pagination\":{\"enabled\":false,\"pageSize\":20,\"currentPage\":1,\"totalPages\":1,\"baseHref\":\"/rosetta/notes/date-suspects\"},\"section\":\"rosetta\",\"currentHref\":\"/rosetta/notes/date-suspects\",\"sidebar\":{\"title\":\"Rosetta.\",\"href\":\"/rosetta\",\"items\":[{\"type\":\"collection\",\"title\":\"待整理与存档\",\"href\":\"/rosetta/notes\",\"pathSegments\":[\"notes\"],\"children\":[{\"type\":\"collection\",\"title\":\"日期存疑\",\"href\":\"/rosetta/notes/date-suspects\",\"pathSegments\":\"$b:props:children:props:config:pathSegments\",\"children\":[{\"type\":\"entry\",\"title\":\"20世纪数学与物理的分与合\",\"href\":\"/rosetta/notes/date-suspects/20th-century-mathematics-physics-divergence-and-convergence\",\"pathSegments\":[\"notes\",\"date-suspects\",\"20th-century-mathematics-physics-divergence-and-convergence\"]},{\"type\":\"entry\",\"title\":\"Anthropic 团队如何使用 Claude Code\",\"href\":\"/rosetta/notes/date-suspects/how-anthropic-teams-use-claude-code\",\"pathSegments\":[\"notes\",\"date-suspects\",\"how-anthropic-teams-use-claude-code\"]},{\"type\":\"entry\",\"title\":\"PyTorch官方纪录片 - 驱动AI革命的力量\",\"href\":\"/rosetta/notes/date-suspects/pytorch-documentary-powering-ai-revolution\",\"pathSegments\":[\"notes\",\"date-suspects\",\"pytorch-documentary-powering-ai-revolution\"]},{\"type\":\"entry\",\"title\":\"分析力学在数学发展中的作用\",\"href\":\"/rosetta/notes/date-suspects/role-of-analytical-mechanics-in-mathematical-development\",\"pathSegments\":[\"notes\",\"date
