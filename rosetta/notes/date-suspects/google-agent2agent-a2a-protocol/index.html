            window.dataLayer = window.dataLayer || [];\\n            function gtag(){dataLayer.push(arguments);}\\n            gtag('js', new Date());\\n            gtag('config', 'G-99PGBGJH4S', {\\n              anonymize_ip: true,\\n              send_page_view: true,\\n            });\\n          \"}]]}]}]]}],{\"children\":[[\"slug\",\"rosetta/notes/date-suspects/google-agent2agent-a2a-protocol\",\"c\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L8\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",[\"$\",\"$1\",\"c\",{\"children\":[\"$Lb\",null,[\"$\",\"$Lc\",null,{\"children\":[\"$Ld\",[\"$\",\"$Le\",null,{\"promise\":\"$@f\"}]]}]]}],{},null,false]},null,false]},null,false],[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$L10\",null],\"$L11\"]}],false]],\"m\":\"$undefined\",\"G\":[\"$12\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"13:I[433,[],\"ViewportBoundary\"]\n15:I[433,[],\"MetadataBoundary\"]\n10:[\"$\",\"$L13\",null,{\"children\":\"$L14\"}]\n11:[\"$\",\"$L15\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$3\",null,{\"fallback\":null,\"children\":\"$L16\"}]}]}]\n"])</script><script>self.__next_f.push([1,"17:I[1203,[\"197\",\"static/chunks/197-f7c33a0114fc3db3.js\",\"373\",\"static/chunks/373-816263e744b1a0a1.js\",\"738\",\"static/chunks/738-b97c8b45db2c8cb9.js\",\"48\",\"static/chunks/app/%5B...slug%5D/page-b39f4036a39e3cb5.js\"],\"default\"]\n18:T52ac,"])</script><script>self.__next_f.push([1,"# 宣布推出 Agent2Agent (A2A) 协议\n\n## 摘要\n\n谷歌联合超过50家技术合作伙伴推出 Agent2Agent（A2A）开放协议，旨在让不同供应商和框架构建的 AI 智能体实现跨平台通信与协作。该协议基于 HTTP、SSE、JSON-RPC 等现有标准，支持能力发现、任务管理、多模态交互和长时间运行任务，为企业级多智能体生态系统提供标准化的互操作方案。\n\n## 核心概念及解读\n\n**A2A 协议**：谷歌推出的开放协议，定义了客户端智能体与远程智能体之间的通信标准，使不同框架和供应商构建的 AI 智能体能够相互发现、协调任务并交换信息\n\n**智能体卡片（Agent Card）**：以 JSON 格式描述智能体能力的元数据文件，客户端智能体通过读取智能体卡片来识别并选择最适合执行特定任务的远程智能体\n\n**模型上下文协议（MCP）**：Anthropic 推出的协议，用于为智能体提供工具和上下文信息，A2A 与 MCP 形成互补关系，前者解决智能体间协作问题，后者解决智能体与工具的连接问题\n\n**智能体互操作性**：不同技术栈、不同供应商构建的 AI 智能体能够跨平台无缝协作的能力，是实现企业级多智能体生态系统的核心需求\n\n**任务生命周期管理**：A2A 协议中定义的任务对象具有完整的生命周期，支持即时完成和长时间运行两种模式，任务产出称为工件（Artifact），智能体之间可实时同步任务状态\n\n探索 A2A，谷歌推出的全新开放协议，赋能开发者构建可互操作的 AI 解决方案。\n\n作者：Rao Surapaneni, Miku Jha, Michael Vakoc, Todd Segal\n\n阅读时长：12 分钟\n\n## 智能体互操作性的新时代\n\nAI 智能体提供了一个独特的机会，通过自主处理许多日常重复性或复杂任务来帮助人们提高生产力。如今，企业越来越多地构建和部署自主智能体，以帮助在整个工作场所扩展、自动化和增强流程——从订购新笔记本电脑，到协助客户服务代表，再到辅助供应链规划。\n\n为了最大化智能体 AI 的效益，关键在于让这些智能体能够在跨越孤立数据系统和应用程序的动态多智能体生态系统中进行协作。使智能体能够相互操作，即使它们是由不同的供应商或在不同的框架中构建的，也将增加自主性并倍增生产力收益，同时降低长期成本。\n\n今天，我们推出了一个名为 Agent2Agent (A2A) 的全新开放协议，得到了超过 50 家技术合作伙伴的支持和贡献，例如 Atlassian、Box、Cohere、Intuit、Langchain、MongoDB、PayPal、Salesforce、SAP、ServiceNow、UKG 和 Workday；以及领先的服务提供商，包括 Accenture、BCG、Capgemini、Cognizant、Deloitte、HCLTech、Infosys、KPMG、McKinsey、PwC、TCS 和 Wipro。A2A 协议将允许 AI 智能体相互通信、安全地交换信息，并在各种企业平台或应用程序之上协调行动。我们相信 A2A 框架将为客户带来显著价值，他们的 AI 智能体现在将能够在其整个企业应用领域中工作。\n\n这项协作努力标志着一个共同的愿景，即未来 AI 智能体，无论其底层技术如何，都可以无缝协作，以自动化复杂的企业工作流，并推动前所未有的效率和创新水平。\n\nA2A 是一个开放协议，它补充了 Anthropic 的模型上下文协议 (MCP)，后者为智能体提供有用的工具和上下文。借鉴谷歌在扩展智能体系统方面的内部专业知识，我们设计了 A2A 协议，以解决我们在为客户部署大规模多智能体系统时发现的挑战。A2A 使开发者能够构建能够与使用该协议构建的任何其他智能体连接的智能体，并为用户提供了组合来自不同提供商的智能体的灵活性。关键的是，企业受益于一种跨不同平台和云环境管理其智能体的标准化方法。我们相信这种通用互操作性对于充分实现协作式 AI 智能体的潜力至关重要。\n\n## A2A 设计原则\n\nA2A 是一个开放协议，为智能体提供了一种标准的协作方式，无论其底层框架或供应商如何。在与合作伙伴设计该协议时，我们遵循了五个关键原则：\n\n*   **拥抱智能体能力 (Agentic Capabilities):** A2A 专注于使智能体能够以其自然的、非结构化的方式进行协作，即使它们不共享内存、工具和上下文。我们正在实现真正的多智能体场景，而不将智能体限制为“工具”。\n*   **基于现有标准构建:** 该协议构建在现有的流行标准之上，包括 HTTP、SSE、JSON-RPC，这意味着它更容易与企业日常使用的现有 IT 堆栈集成。\n*   **默认安全:** A2A 设计旨在支持企业级身份验证和授权，在发布时与 OpenAPI 的身份验证方案保持同等水平。\n*   **支持长时间运行的任务:** 我们将 A2A 设计得灵活，支持各种场景，无论是快速完成任务，还是需要数小时甚至数天（当有人类参与时）的深度研究，它都能出色完成。在此过程中，A2A 可以向其用户提供实时反馈、通知和状态更新。\n*   **模态无关 (Modality Agnostic):** 智能体的世界不仅限于文本，这就是为什么我们将 A2A 设计为支持各种模态，包括音频和视频流。\n\n## A2A 工作原理\n\nA2A 促进“客户端”智能体 (client agent) 和“远程”智能体 (remote agent) 之间的通信。客户端智能体负责制定和传达任务，而远程智能体负责执行这些任务，以尝试提供正确的信息或采取正确的行动。这种交互涉及几个关键能力：\n\n*   **能力发现 (Capability Discovery):** 智能体可以使用 JSON 格式的“智能体卡片” (Agent Card) 来宣传其能力，允许客户端智能体识别能够执行任务的最佳智能体，并利用 A2A 与远程智能体进行通信。\n*   **任务管理 (Task Management):** 客户端和远程智能体之间的通信以任务完成为导向，其中智能体致力于满足最终用户的请求。这个“任务”对象由协议定义并具有生命周期。它可以立即完成，或者对于长时间运行的任务，每个智能体可以进行通信以就完成任务的最新状态保持同步。任务的输出称为“工件” (artifact)。\n*   **协作 (Collaboration):** 智能体可以相互发送消息以传达上下文、回复、工件或用户指令。\n*   **用户体验协商 (User Experience Negotiation):** 每条消息都包含“部分” (parts)，这是一个完整的内容片段，例如生成的图像。每个部分都有指定的内容类型，允许客户端和远程智能体协商所需的正确格式，并明确包含用户 UI 能力的协商——例如，iframe、视频、Web 表单等。\n\n请在我们的[规范草案](https://github.com/google/A2A)中查看协议工作原理的完整细节。\n\n## 真实世界示例：候选人寻源\n\n(右键在新标签页中查看)\n\n通过 A2A 协作，招聘软件工程师的过程可以大大简化。在像 Agentspace 这样的统一界面中，用户（例如，招聘经理）可以指派其智能体查找符合职位列表、地点和技能要求的候选人。然后，该智能体与其他专门的智能体交互以寻找潜在候选人。用户收到这些建议后，可以指示其智能体安排进一步的面试，从而简化候选人寻源流程。面试过程结束后，可以调用另一个智能体来协助进行背景调查。这只是 AI 智能体需要跨系统协作以寻找合格职位候选人的一个示例。\n\n## 智能体互操作性的未来\n\nA2A 有潜力开启智能体互操作性的新时代，促进创新并创建更强大、更通用的智能体系统。我们相信该协议将为未来铺平道路，届时智能体可以无缝协作以解决复杂问题并改善我们的生活。\n\n我们致力于与我们的合作伙伴和社区在开放的环境中协作构建该协议。我们正在将该协议作为开源发布，并建立清晰的贡献途径。\n\n请在 [A2A 网站](软件工程师的疯狂挑战.md)上查阅完整的规范草案，试用代码示例，并查看示例场景，了解如何做出贡献。\n\n我们正在与合作伙伴合作，计划在今年晚些时候推出该协议的生产就绪版本。\n\n## 来自我们 A2A 合作伙伴的反馈\n\n我们很高兴拥有一个不断壮大且多元化的合作伙伴生态系统，他们积极为 A2A 协议及其技术规范的定义做出贡献。他们的见解和专业知识对于塑造 AI 互操作性的未来至关重要。\n\n以下是我们一些主要合作伙伴对 A2A 协议的看法：\n\n### 技术与平台合作伙伴\n\n**ask-ai.com**\n\u003e Ask-AI 很高兴能与谷歌就 A2A 协议进行合作，共同塑造 AI 互操作性和无缝智能体协作的未来，提升其在企业 AI 客户体验领域的领导地位。\n\u003e\n\u003e – Alon Talmor 博士，首席执行官\n\n**Atlassian**\n\u003e 随着 Atlassian 对 Rovo 智能体的投资，像 A2A 这样的标准化协议的开发将有助于智能体成功地发现、协调和相互推理，从而实现更大规模、更丰富的委托和协作形式。\n\u003e\n\u003e – Brendan Haire，Atlassian AI 平台工程副总裁\n\n**Articul8**\n\u003e 在 Articul8，我们相信 AI 必须协作和互操作才能真正在企业范围内扩展。我们很高兴能支持 A2A 互操作性协议的开发——这一举措与我们提供特定领域 GenAI 能力的使命完美契合，这些能力可在复杂的系统和工作流中无缝运行。我们正在使 Articul8 的 ModelMesh（一种“智能体的智能体”）将 A2A 视为一等公民，从而实现智能体之间的安全、无缝通信。\n\u003e\n\u003e – Arun Subramaniyan，Articul8 创始人兼首席执行官\n\n**Arize AI**\n\u003e 作为 A2A 互操作性协议的发布合作伙伴，Arize AI 很自豪能与谷歌合作，推动 AI 智能体之间无缝、安全的交互，这也是 Arize 致力于开源评估和可观测性框架的一部分。\n\u003e\n\u003e – Jason Lopatecki，Arize AI 联合创始人兼首席执行官\n\n**BCG**\n\u003e BCG 帮助企业以智能为核心重新设计组织。像 A2A 这样开放且可互操作的能力可以加速这一进程，实现持续的、自主的竞争优势。\n\u003e\n\u003e – Djon Kleine，BCG 董事总经理兼合伙人\n\n**Box**\n\u003e 我们期待扩展与谷歌的合作关系，使 Box 智能体能够使用 A2A 与 Google Cloud 的智能体生态系统协同工作，共同创新以塑造 AI 智能体的未来，同时赋能组织更好地自动化工作流、降低成本并生成可信赖的 AI 输出。\n\u003e\n\u003e – Ketan Kittur，Box 平台与集成产品管理副总裁\n\n**C3 AI**\n\u003e 在 C3 AI，我们相信开放、可互操作的系统是让企业 AI 发挥作用并在现实世界中交付价值的关键——而 A2A 有潜力帮助客户打破孤岛，安全地使 AI 智能体能够跨系统、团队和应用程序协同工作。\n\u003e\n\u003e – Nikhil Krishnan，C3 AI 高级副总裁兼数据科学首席技术官\n\n**Chronosphere**\n\u003e A2A 将实现可靠且安全的智能体专业化和协调，为新时代的计算编排打开大门，使公司能够更快、更可靠地交付产品和服务，并使他们能够将工程精力重新集中在推动创新和价值上。\n\u003e\n\u003e – Rob Skillington，创始人/首席技术官\n\n**Cohere**\n\u003e 在 Cohere，我们正在构建企业自信采用自主智能体所需的安全 AI 基础设施，而开放的 A2A 协议确保了无缝、可信的协作——即使在隔离环境中也是如此——以便企业可以在不影响控制或合规性的情况下进行规模化创新。\n\u003e\n\u003e – Autumn Moulder，Cohere 工程副总裁\n\n**Confluent**\n\u003e A2A 使智能体能够建立直接的实时数据交换，简化复杂的数据管道，从而从根本上改变智能体的通信方式并促进决策。\n\u003e\n\u003e – Pascal Vantrepote，Confluent 创新高级总监\n\n**Cotality (前身为 CoreLogic)**\n\u003e A2A 开启了智能、实时通信与协作的新时代，Cotality 将把它带给住房贷款、保险、房地产和政府领域的客户——帮助他们提高生产力、加快决策速度。\n\u003e\n\u003e – Sachin Rajpal，Cotality 数据解决方案董事总经理\n\n**DataStax**\n\u003e DataStax 很高兴能参与 A2A 并探索它如何支持 Langflow，这代表着朝着真正可互操作的 AI 系统迈出了重要一步，这些系统可以在跨多个环境的复杂任务上进行协作。\n\u003e\n\u003e – Ed Anuff，DataStax 首席产品官\n\n**Datadog**\n\u003e 我们很高兴看到 Google Cloud 推出 A2A 协议以简化复杂智能体系统的开发，这将帮助 Datadog 使其用户能够构建更具创新性、优化和安全的智能体 AI 应用程序。\n\u003e\n\u003e – Yrieix Garnier，Datadog 产品副总裁\n\n**Elastic**\n\u003e Elastic 支持开放、可互操作的智能体生态系统的愿景，期待与 Google Cloud 及其他行业领导者就 A2A 进行合作，并提供其数据管理和工作流编排经验以增强该协议。\n\u003e\n\u003e – Steve Kearns，Elastic 搜索业务组全球副总裁兼总经理\n\n**GrowthLoop**\n\u003e A2A 有潜力为我们的客户加速实现 GrowthLoop 的复合营销愿景——使我们的 AI 智能体能够与其他专业智能体无缝协作，更快地从企业数据中学习，并在整个营销生态系统中快速优化活动，同时在客户的云基础设施上尊重数据隐私。\n\u003e\n\u003e – Anthony Rotio，GrowthLoop 首席数据战略官\n\n**Harness**\n\u003e Harness 非常高兴能支持 A2A，并致力于通过将 AI 驱动的智能集成到软件生命周期的每个阶段来简化开发者体验，赋能团队从运行时数据中获得更深入的见解，自动化复杂的工作流，并提高系统性能。\n\u003e\n\u003e – Gurashish Brar，Harness 工程主管\n\n**Incorta**\n\u003e Incorta 很高兴能支持 A2A 并为客户推进智能体通信，使企业自动化的未来更智能、更快速且真正由数据驱动。\n\u003e\n\u003e – Osama Elkady，Incorta 首席执行官\n\n**Intuit**\n\u003e Intuit 坚信像 A2A 这样的开源协议将能够实现复杂的智能体工作流，加速我们的合作伙伴集成，并通过有效协作的跨平台智能体推动行业向前发展。\n\u003e\n\u003e – Tapasvi Moturu，Intuit 智能体框架软件工程副总裁\n\n**JetBrains**\n\u003e 我们很高兴成为 A2A 的发布合作伙伴，这一举措增强了智能体协作，使我们更接近一个真正的多智能体世界，赋能 JetBrains IDE、团队工具和 Google Cloud 的开发者。\n\u003e\n\u003e – Vladislav Tankov，JetBrains AI 总监\n\n**JFrog**\n\u003e JFrog 很高兴加入 A2A 协议，我们相信这一举措将有助于克服当今许多集成挑战，并成为下一代智能体应用的关键驱动力。\n\u003e\n\u003e – Yoav Landman，JFrog 首席技术官兼联合创始人\n\n**LabelBox**\n\u003e A2A 是实现 AI 智能体全部潜力的关键一步，支持一个 AI 能够真正增强人类能力、自动化复杂工作流并推动创新的未来。\n\u003e\n\u003e – Manu Sharma，创始人兼首席执行官\n\n**LangChain**\n\u003e LangChain 相信智能体与其他智能体的交互是近在咫尺的未来，我们很高兴能与 Google Cloud 合作，提出一个满足智能体构建者和用户需求的共享协议。\n\u003e\n\u003e – Harrison Chase，LangChain 联合创始人兼首席执行官\n\n**MongoDB**\n\u003e 通过将 MongoDB 强大的数据库基础设施和混合搜索能力与 A2A 及 Google Cloud 的前沿 AI 模型相结合，企业可以在零售、制造等行业解锁新的可能性，重新定义 AI 应用的未来。\n\u003e\n\u003e – Andrew Davidson，MongoDB 产品高级副总裁\n\n**Neo4j**\n\u003e Neo4j 很自豪能与 Google Cloud 合作，将我们图技术的知识图谱和 GraphRAG 能力与 A2A 相结合，帮助组织解锁新的自动化和智能水平，同时确保智能体交互保持上下文相关、可解释和可信赖。\n\u003e\n\u003e – Sudhir Hasbe，Neo4j 首席产品官\n\n**New Relic**\n\u003e 我们相信 Google Cloud 的 A2A 协议与 New Relic 的智能可观测性平台之间的协作将通过简化集成、促进跨不同系统的数据交换，并最终创建一个更统一的 AI 智能体生态系统，为我们的客户提供显著价值。\n\u003e\n\u003e – Thomas Lloyd，New Relic 首席业务与运营官\n\n**Pendo**\n\u003e 我们很自豪能就 Google Cloud 的 A2A 协议进行合作，这将是使 AI 智能体能够有效协同工作，同时保持大规模信任和可用性的关键一步。\n\u003e\n\u003e – Rahul Jain，Pendo 联合创始人兼首席产品官\n\n**PayPal**\n\u003e PayPal 支持 Google Cloud 的 A2A 协议，这代表了开发者和商家创造由智能体 AI 驱动的下一代商业体验的新方式。\n\u003e\n\u003e – Prakhar Mehrotra，PayPal 高级副总裁兼人工智能主管\n\n**SAP**\n\u003e SAP 致力于与 Google Cloud 及更广泛的生态系统合作，通过 A2A 协议塑造智能体互操作性的未来——这是使 SAP Joule 和其他 AI 智能体能够跨企业平台无缝工作并释放端到端业务流程全部潜力的关键一步。\n\u003e\n\u003e – Walter Sun，SAP 高级副总裁兼全球 AI 工程主管\n\n**Salesforce**\n\u003e Salesforce 率先支持 A2A 标准，以扩展我们的开放平台，使 AI 智能体能够在 Agentforce 和其他生态系统中无缝协同工作，将分散的能力转化为协调的解决方案，并为客户和员工提供增强的数字劳动力。\n\u003e\n\u003e – Gary Lerhaupt，产品架构副总裁\n\n**ServiceNow**\n\u003e ServiceNow 和 Google Cloud 正在合作制定智能体到智能体互操作性的新行业标准，我们相信 A2A 将为更高效、更互联的支持体验铺平道路。\n\u003e\n\u003e – Pat Casey，ServiceNow 首席技术官兼 DevOps 执行副总裁\n\n**Supertab**\n\u003e 借助 Google Cloud 的 A2A 协议和 Supertab Connect，智能体将能够像人类企业一样支付、收费和交换服务。\n\u003e\n\u003e – Cosmin Ene，Supertab 创始人\n\n**UKG**\n\u003e UKG 很高兴能与 Google Cloud 就新的 A2A 协议进行合作，该框架将使我们能够构建更智能、更具支持性的人力资本和劳动力体验，以前所未有的方式预测并响应员工需求。\n\u003e\n\u003e – Eli Tsinovoi，UKG AI 主管\n\n**Weights \u0026 Biases**\n\u003e Weights \u0026 Biases 很自豪能与 Google Cloud 就 A2A 协议进行合作，设定一个关键的开放标准，该标准将赋能组织自信地部署、编排和扩展各种 AI 智能体，无论其底层技术如何。\n\u003e\n\u003e – Shawn Lewis，Weights \u0026 Biases 首席技术官兼联合创始人\n\n### 服务合作伙伴\n\n**Accenture**\n\u003e 来自 Google Cloud 的多智能体 A2A 协议是连接跨不同平台的特定领域智能体以解决复杂挑战的桥梁，它将实现无缝通信和集体智能，从而带来更智能、更有效的智能体解决方案。\n\u003e\n\u003e – Scott Alfieri，Accenture AGBG 全球负责人\n\n**Deloitte**\n\u003e 智能体到智能体的互操作性是推动智能体 AI 架构演进的基础要素，Google Cloud 的 A2A 倡议汇集了技术行业参与者的生态系统，共同开发和支持该协议，这将极大地加速智能体 AI 的采用。\n\u003e\n\u003e – Gopal Srinivasan，德勤\n\n**EPAM**\n\u003e 我们已经通过专注于提供实际业务价值的行业解决方案，在 A2A 领域处于领先地位——节省时间、减少开销，并帮助我们的客户增加收入和改进流程，例如在药物发现过程中开发 FDA 文档。\n\u003e\n\u003e – Marc Cerro，EPAM 全球 Google Cloud 合作伙伴关系副总裁\n\n**HCLTech**\n\u003e HCLTech 处于智能体企业的前沿，我们很自豪能与 Google Cloud 合作，共同定义智能体到智能体的互操作性，并通过开放的 A2A 标准推进智能体 AI 的可能性。\n\u003e\n\u003e – Vijay Guntur，HCLTech 首席技术官兼生态系统主管\n\n**KPMG**\n\u003e 在毕马威，我们很高兴能参与这项新兴倡议，因为 A2A 提供了我们所需的基本标准，使不同的 AI 智能体能够真正有效且负责任地协作，这将使客户和企业能够无缝地利用 AI 进行创新和提高效率。\n\u003e\n\u003e – Sherif AbdElGawad，毕马威合伙人，Google Cloud 与 AI 负责人\n\n**Quantiphi**\n\u003e 智能体动态发现能力并在跨平台构建用户体验的能力对于释放企业的真正潜力至关重要。我们将 A2A 协议视为赋能企业构建此类可互操作智能体的关键一步。\n\u003e\n\u003e – Asif Hasan，Quantiphi 联合创始人\n\n**TCS (Tata Consultancy Services)**\n\u003e A2A 协议是下一个智能体自动化时代的基础，在这个时代，语义互操作性将占据突出地位，我们很自豪能引领这一变革之旅。\n\u003e\n\u003e – Anupam Singhal，塔塔咨询服务 (TCS) 制造业务总裁\n\n**Wipro**\n\u003e 因为 AI 的未来在于无缝协作，像 A2A 这样的开放协议将成为 AI 智能体推动规模化创新的生态系统的基础。\n\u003e\n\u003e – Nagendra P Bandaru，Wipro 执行合伙人兼技术服务全球主管\n\n## 了解有关 A2A 的更多信息\n\n要了解有关 A2A 框架的更多信息，请深入研究完整的[规范草案](软件工程师的疯狂挑战.md)并探索可用的[代码示例](软件工程师的疯狂挑战.md)，以检查协议的结构并试验其代码。\n\n我们鼓励您通过提交想法、为文档做出贡献以及与社区互动，来为协议的演进做出贡献，并帮助我们定义智能体互操作性的未来。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L17\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"google-agent2agent-a2a-protocol\",\"slugSegments\":[\"notes\",\"date-suspects\",\"google-agent2agent-a2a-protocol\"],\"pathSegments\":[\"notes\",\"date-suspects\",\"google-agent2agent-a2a-protocol\"],\"urlPath\":\"/rosetta/notes/date-suspects/google-agent2agent-a2a-protocol\",\"href\":\"/rosetta/notes/date-suspects/google-agent2agent-a2a-protocol\",\"category\":\"date-suspects\",\"title\":\"宣布推出 Agent2Agent (A2A) 协议\",\"date\":\"2026-01-26\",\"excerpt\":\"谷歌联合超过50家技术合作伙伴推出 Agent2Agent（A2A）开放协议，旨在让不同供应商和框架构建的 AI 智能体实现跨平台通信与协作。该协议基于 HTTP、SSE、JSON-RPC 等现有标准，支持能力发现、任务管理、多模态交互和长时间运行任务，为企业级多智能体生态系统提供标准化的互操作方案。\",\"coverImage\":\"$undefined\",\"author\":\"Rao Surapaneni, Miku Jha, Michael Vakoc, Todd Segal\",\"original\":\"A2A协议.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$18\",\"tags\":[\"A2A协议\",\"AI智能体\",\"多智能体协作\",\"互操作性\",\"Google Cloud\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"宣布推出 Agent2Agent (A2A) 协议\",\"excerpt\":\"谷歌联合超过50家技术合作伙伴推出 Agent2Agent（A2A）开放协议，旨在让不同供应商和框架构建的 AI 智能体实现跨平台通信与协作。该协议基于 HTTP、SSE、JSON-RPC 等现有标准，支持能力发现、任务管理、多模态交互和长时间运行任务，为企业级多智能体生态系统提供标准化的互操作方案。\",\"date\":\"2026-01-26\",\"author\":\"Rao Surapaneni, Miku Jha, Michael Vakoc, Todd Segal\",\"original\":\"A2A协议.md\",\"tags\":[\"A2A协议\",\"AI智能体\",\"多智能体协作\",\"互操作性\",\"Google Cloud\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/rosetta/notes/date-suspects/google-agent2agent-a2a-protocol.md\"},\"neighbors\":{\"previous\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"ten-principles-of-ai-programming\",\"slugSegments\":[\"notes\",\"date-suspects\",\"ten-principles-of-ai-programming\"],\"pathSegments\":[\"notes\",\"date-suspects\",\"ten-principles-of-ai-programming\"],\"urlPath\":\"/rosetta/notes/date-suspects/ten-principles-of-ai-programming\",\"href\":\"/rosetta/notes/date-suspects/ten-principles-of-ai-programming\",\"category\":\"date-suspects\",\"title\":\"使用 AI 编程的十大基本原则\",\"date\":\"2026-01-26\",\"excerpt\":\"本文基于 Anthropic 团队使用 Claude Code 的实践经验，总结了十大 AI 编程基本原则，涵盖上下文管理、迭代协作、检查点设置、任务分类、子代理拆分、自动化重复工作、技能拓展、安全合规、团队文化和生态系统构建等方面，为开发者提供了系统化的 AI 辅助编程方法论。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"使用 AI 编程的十大基本原则.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"\",\"tags\":[\"AI编程\",\"Claude Code\",\"开发效率\",\"人机协作\",\"工程实践\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"使用 AI 编程的十大基本原则\",\"excerpt\":\"本文基于 Anthropic 团队使用 Claude Code 的实践经验，总结了十大 AI 编程基本原则，涵盖上下文管理、迭代协作、检查点设置、任务分类、子代理拆分、自动化重复工作、技能拓展、安全合规、团队文化和生态系统构建等方面，为开发者提供了系统化的 AI 辅助编程方法论。\",\"date\":\"2026-01-26\",\"original\":\"使用 AI 编程的十大基本原则.md\",\"tags\":[\"AI编程\",\"Claude Code\",\"开发效率\",\"人机协作\",\"工程实践\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/rosetta/notes/date-suspects/ten-principles-of-ai-programming.md\"},\"next\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"yang-zhenning-forty-years-of-learning-and-teaching\",\"slugSegments\":[\"notes\",\"date-suspects\",\"yang-zhenning-forty-years-of-learning-and-teaching\"],\"pathSegments\":[\"notes\",\"date-suspects\",\"yang-zhenning-forty-years-of-learning-and-teaching\"],\"urlPath\":\"/rosetta/notes/date-suspects/yang-zhenning-forty-years-of-learning-and-teaching\",\"href\":\"/rosetta/notes/date-suspects/yang-zhenni \",\"pathSegments\":[\"notes\",\"missing-source-url\",\"rise-of-partisanship-and-super-cooperators-in-us-house\"]},{\"type\":\"entry\",\"title\":\"科学研究成功的三大黄金法则\",\"href\":\"/rosetta/notes/missing-source-url/three-golden-rules-for-successful-scientific-research\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"three-golden-rules-for-successful-scientific-research\"]},{\"type\":\"entry\",\"title\":\"自动化的讽刺\",\"href\":\"/rosetta/notes/missing-source-url/ironies-of-automation\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"ironies-of-automation\"]}]}]}]},\"directoryHref\":\"/rosetta/notes/date-suspects\",\"children\":\"$L19\"}]\n"])</script><script>self.__next_f.push([1,"19:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"谷歌联合超过50家技术合作伙伴推出 Agent2Agent（A2A）开放协议，旨在让不同供应商和框架构建的 AI 智能体实现跨平台通信与协作。该协议基于 HTTP、SSE、JSON-RPC 等现有标准，支持能力发现、任务管理、多模态交互和长时间运行任务，为企业级多智能体生态系统提供标准化的互操作方案。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"A2A 协议\"}],\"：谷歌推出的开放协议，定义了客户端智能体与远程智能体之间的通信标准，使不同框架和供应商构建的 AI 智能体能够相互发现、协调任务并交换信息\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"智能体卡片（Agent Card）\"}],\"：以 JSON 格式描述智能体能力的元数据文件，客户端智能体通过读取智能体卡片来识别并选择最适合执行特定任务的远程智能体\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"模型上下文协议（MCP）\"}],\"：Anthropic 推出的协议，用于为智能体提供工具和上下文信息，A2A 与 MCP 形成互补关系，前者解决智能体间协作问题，后者解决智能体与工具的连接问题\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"智能体互操作性\"}],\"：不同技术栈、不同供应商构建的 AI 智能体能够跨平台无缝协作的能力，是实现企业级多智能体生态系统的核心需求\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"任务生命周期管理\"}],\"：A2A 协议中定义的任务对象具有完整的生命周期，支持即时完成和长时间运行两种模式，任务产出称为工件（Artifact），智能体之间可实时同步任务状态\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"探索 A2A，谷歌推出的全新开放协议，赋能开发者构建可互操作的 AI 解决方案。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"作者：Rao Surapaneni, Miku Jha, Michael Vakoc, Todd Segal\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"阅读时长：12 分钟\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"智能体互操作性的新时代\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#智能体互操作性的新时代\",\"children\":\"智能体互操作性的新时代\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI 智能体提供了一个独特的机会，通过自主处理许多日常重复性或复杂任务来帮助人们提高生产力。如今，企业越来越多地构建和部署自主智能体，以帮助在整个工作场所扩展、自动化和增强流程——从订购新笔记本电脑，到协助客户服务代表，再到辅助供应链规划。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"为了最大化智能体 AI 的效益，关键在于让这些智能体能够在跨越孤立数据系统和应用程序的动态多智能体生态系统中进行协作。使智能体能够相互操作，即使它们是由不同的供应商或在不同的框架中构建的，也将增加自主性并倍增生产力收益，同时降低长期成本。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"今天，我们推出了一个名为 Agent2Agent (A2A) 的全新开放协议，得到了超过 50 家技术合作伙伴的支持和贡献，例如 Atlassian、Box、Cohere、Intuit、Langchain、MongoDB、PayPal、Salesforce、SAP、ServiceNow、UKG 和 Workday；以及领先的服务提供商，包括 Accenture、BCG、Capgemini、Cognizant、Deloitte、HCLTech、Infosys、KPMG、McKinsey、PwC、TCS 和 Wipro。A2A 协议将允许 AI 智能体相互通信、安全地交换信息，并在各种企业平台或应用程序之上协调行动。我们相信 A2A 框架将为客户带来显著价值，他们的 AI 智能体现在将能够在其整个企业应用领域中工作。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这项协作努力标志着一个共同的愿景，即未来 AI 智能体，无论其底层技术如何，都可以无缝协作，以自动化复杂的企业工作流，并推动前所未有的效率和创新水平。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"A2A 是一个开放协议，它补充了 Anthropic 的模型上下文协议 (MCP)，后者为智能体提供有用的工具和上下文。借鉴谷歌在扩展智能体系统方面的内部专业知识，我们设计了 A2A 协议，以解决我们在为客户部署大规模多智能体系统时发现的挑战。A2A 使开发者能够构建能够与使用该协议构建的任何其他智能体连接的智能体，并为用户提供了组合来自不同提供商的智能体的灵活性。关键的是，企业受益于一种跨不同平台和云环境管理其智能体的标准化方法。我们相信这种通用互操作性对于充分实现协作式 AI 智能体的潜力至关重要。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"a2a-设计原则\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#a2a-设计原则\",\"children\":\"A2A 设计原则\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"A2A 是一个开放协议，为智能体提供了一种标准的协作方式，无论其底层框架或供应商如何。在与合作伙伴设计该协议时，我们遵循了五个关键原则：\"}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"拥抱智能体能力 (Agentic Capabilities):\"}],\" A2A 专注于使智能体能够以其自然的、非结构化的方式进行协作，即使它们不共享内存、工具和上下文。我们正在实现真正的多智能体场景，而不将智能体限制为“工具”。\"]}],\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\"]}],\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\",\"\\n\",\"$L4b\",\"\\n\",\"$L4c\",\"\\n\",\"$L4d\",\"\\n\",\"$L4e\",\"\\n\",\"$L4f\",\"\\n\",\"$L50\",\"\\n\",\"$L51\",\"\\n\",\"$L52\",\"\\n\",\"$L53\",\"\\n\",\"$L54\",\"\\n\",\"$L55\",\"\\n\",\"$L56\",\"\\n\",\"$L57\",\"\\n\",\"$L58\",\"\\n\",\"$L59\",\"\\n\",\"$L5a\",\"\\n\",\"$L5b\",\"\\n\",\"$L5c\",\"\\n\",\"$L5d\",\"\\n\",\"$L5e\",\"\\n\",\"$L5f\",\"\\n\",\"$L60\",\"\\n\",\"$L61\",\"\\n\",\"$L62\",\"\\n\",\"$L63\",\"\\n\",\"$L64\",\"\\n\",\"$L65\",\"\\n\",\"$L66\",\"\\n\",\"$L67\",\"\\n\",\"$L68\",\"\\n\",\"$L69\",\"\\n\",\"$L6a\",\"\\n\",\"$L6b\",\"\\n\",\"$L6c\",\"\\n\",\"$L6d\",\"\\n\",\"$L6e\",\"\\n\",\"$L6f\",\"\\n\",\"$L70\",\"\\n\",\"$L71\",\"\\n\",\"$L72\",\"\\n\",\"$L73\",\"\\n\",\"$L74\",\"\\n\",\"$L75\",\"\\n\",\"$L76\",\"\\n\",\"$L77\",\"\\n\",\"$L78\",\"\\n\",\"$L79\",\"\\n\",\"$L7a\",\"\\n\",\"$L7b\",\"\\n\",\"$L7c\",\"\\n\",\"$L7d\",\"\\n\",\"$L7e\",\"\\n\",\"$L7f\",\"\\n\",\"$L80\",\"\\n\",\"$L81\",\"\\n\",\"$L82\",\"\\n\",\"$L83\"]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"基于现有标准构建:\"}],\" 该协议构建在现有的流行标准之上，包括 HTTP、SSE、JSON-RPC，这意味着它更容易与企业日常使用的现有 IT 堆栈集成。\"]}]\n1b:[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"默认安全:\"}],\" A2A 设计旨在支持企业级身份验证和授权，在发布时与 OpenAPI 的身份验证方案保持同等水平。\"]}]\n1c:[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"支持长时间运行的任务:\"}],\" 我们将 A2A 设计得灵活，支持各种场景，无论是快速完成任务，还是需要数小时甚至数天（当有人类参与时）的深度研究，它都能出色完成。在此过程中，A2A 可以向其用户提供实时反馈、通知和状态更新。\"]}]\n1d:[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"模态无关 (Modality Agnostic):\"}],\" 智能体的世界不仅限于文本，这就是为什么我们将 A2A 设计为支持各种模态，包括音频和视频流。\"]}]\n1e:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"a2a-工作原理\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#a2a-工作原理\",\"children\":\"A2A 工作原理\"}]}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"A2A 促进“客户端”智能体 (client agent) 和“远程”智能体 (remote agent) 之间的通信。客户端智能体负责制定和传达任务，而远程智能体负责执行这些任务，以尝试提供正确的信息或采取正确的行动。这种交互涉及几个关键能力：\"}]\n"])</script><script>self.__next_f.push([1,"20:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"能力发现 (Capability Discovery):\"}],\" 智能体可以使用 JSON 格式的“智能体卡片” (Agent Card) 来宣传其能力，允许客户端智能体识别能够执行任务的最佳智能体，并利用 A2A 与远程智能体进行通信。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"任务管理 (Task Management):\"}],\" 客户端和远程智能体之间的通信以任务完成为导向，其中智能体致力于满足最终用户的请求。这个“任务”对象由协议定义并具有生命周期。它可以立即完成，或者对于长时间运行的任务，每个智能体可以进行通信以就完成任务的最新状态保持同步。任务的输出称为“工件” (artifact)。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"协作 (Collaboration):\"}],\" 智能体可以相互发送消息以传达上下文、回复、工件或用户指令。\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"用户体验协商 (User Experience Negotiation):\"}],\" 每条消息都包含“部分” (parts)，这是一个完整的内容片段，例如生成的图像。每个部分都有指定的内容类型，允许客户端和远程智能体协商所需的正确格式，并明确包含用户 UI 能力的协商——例如，iframe、视频、Web 表单等。\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"请在我们的\",[\"$\",\"a\",null,{\"href\":\"https://github.com/google/A2A\",\"children\":\"规范草案\"}],\"中查看协议工作原理的完整细节。\"]}]\n22:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"真实世界示例候选人寻源\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#真实世界示例候选人寻源\",\"children\":\"真实世界示例：候选人寻源\"}]}]\n23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"(右键在新标签页中查看)\"}]\n24:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"通过 A2A 协作，招聘软件工程师的过程可以大大简化。在像 Agentspace 这样的统一界面中，用户（例如，招聘经理）可以指派其智能体查找符合职位列表、地点和技能要求的候选人。然后，该智能体与其他专门的智能体交互以寻找潜在候选人。用户收到这些建议后，可以指示其智能体安排进一步的面试，从而简化候选人寻源流程。面试过程结束后，可以调用另一个智能体来协助进行背景调查。这只是 AI 智能体需要跨系统协作以寻找合格职位候选人的一个示例。\"}]\n25:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] fon
