景信息，直接决定 AI 输出质量的核心实践\n\n**检查点工作流（Checkpointing Workflow）**：在 AI 辅助编码过程中频繁使用 git commit 等方式保存工作状态，形成安全回滚点，使开发者可以大胆实验而不惧代码偏离预期\n\n**子代理模式（Sub-agent Pattern）**：将复杂任务拆解为多个小而专注的子任务，分别由独立的 AI 代理处理，以提高约束条件下的输出质量和整体工作流效率\n\n**10倍通才（10x Generalist）**：借助 AI 工具快速跨越技能鸿沟，使非专业人员也能在陌生技术领域高效产出，从专才思维转向广泛能力覆盖的新型开发者角色\n\n**MCP 集成安全（MCP Integration Security）**：在将 AI 工具与敏感数据和核心基础设施深度集成时，需优先考虑安全控制和合规机制，防范因能力扩展带来的潜在风险\n\n\n- 参考资料：[ANTHROP\\C: How Anthropic teams use Claude Code](https://www-cdn.anthropic.com/58284b19e702b49db9302d5b6f135ad8871e7658.pdf)\n\n### **使用 AI 编程的十大基本原则**\n\n#### 1. 精通上下文的艺术（Garbage In, Garbage Out）\n**原则**：提供给 AI 的上下文质量直接决定了输出结果的质量。这不仅仅是编写提示，而是构建一个完整的工作环境。\n\n**案例支持**：\n*   **数据基础设施团队**强调编写详细的 `Claude.md` 文件来记录工作流程和期望。\n*   **产品设计团队**创建自定义内存文件，告知 Claude 自己的角色（设计师）和需求（需要详细解释），从而获得更好的指导。\n*   **法务团队**采用“先在 Claude.ai 中规划，再到 Claude Code 中构建”的两步流程，确保在编码前思路已完全清晰。\n\n#### 2. 拥抱迭代式协作，而非期待一次性奇迹\n**原则**：将 AI 视为一个迭代伙伴，而不是一个能一键解决所有问题的工具。通过持续的对话、修正和引导来共同完成任务。\n\n**案例支持**：\n*   **API 团队**明确建议“将其视为一个迭代伙伴”，而不是期望一次性获得完美解决方案。\n*   **数据科学团队**将其比作“老虎机”：让它尝试，如果不理想就重新开始，而不是试图修复一个糟糕的输出。\n*   **法务团队**要求 Claude “放慢速度”，一次只实现一步，以便跟上节奏并进行验证。\n\n#### 3. 频繁设置检查点（Checkpointing）\n**原则**：在使用 AI 进行重要或自主性较高的代码修改时，频繁地保存你的工作状态（如 `git commit`）。这为你提供了安全网，可以无风险地进行实验，并在 AI 偏离轨道时轻松回滚。\n\n**案例支持**：\n*   **产品开发团队**强调从“干净的 git 状态”开始，并定期提交检查点。\n*   **RL 工程团队**采用“检查点密集型工作流程”，使他们能够大胆尝试 AI 的自主实现，并在需要时轻松回滚。\n\n#### 4. 对任务进行分类（知道何时监督，何时授权）\n**原则**：学会判断哪些任务适合让 AI 自主运行（如原型设计、外围功能），哪些任务需要你密切监督（如核心业务逻辑、关键修复）。这种直觉是高效利用 AI 的关键。\n\n**案例支持**：\n*   **产品开发团队**明确区分了需要“同步监督”的核心功能和可以“自动接受模式”处理的异步任务。\n*   **增长营销团队**专注于寻找可通过 API 自动化的重复性任务，这是 AI 发挥最大价值的领域。\n\n#### 5. 分而治之（使用专业化的子代理）\n**原则**：当面对复杂的工作流程时，不要试图用一个庞大的提示解决所有问题。将其分解为更小、更具体的子任务，并可以为每个任务创建专门的“代理”或工作流。\n\n**案例支持**：\n*   **增长营销团队**为 Google Ads 创建了两个专门的子代理：一个负责生成标题，另一个负责生成描述，从而提高了处理复杂约束时的输出质量。\n\n#### 6. 自动化枯燥和重复的工作\n**原则**：将 AI 首先应用于那些消耗大量精力但创造性价值较低的任务，如编写单元测试、生成文档、格式化代码和进行简单的重构。\n\n**案例支持**：\n*   **多个团队（产品、推理、RL工程）**都将生成单元测试作为核心用例，从而解放了开发人员的精力。\n*   **安全团队**利用 AI 综合多个来源的文档，创建精简的运行手册。\n*   **增长营销团队**将广告文案的撰写时间从几小时缩短到几分钟。\n\n#### 7. 弥合技能差距（成为“10倍通才”）\n**原则**：利用 AI 快速进入你不熟悉的领域。无论是新的编程语言、复杂的框架还是陌生的代码库，AI 都能充当你的专家向导，让你在没有深厚背景的情况下也能高效工作。\n\n**案例支持**：\n*   **数据科学团队**在几乎不懂 TypeScript 的情况下，构建了 5000 行的 React 应用。\n*   **法务团队成员**在没有开发背景的情况下，为家人构建了定制化的无障碍应用。\n*   **各团队**都使用 Claude Code 快速理解和导航陌生的代码库，而无需等待同事的帮助。\n\n#### 8. 优先考虑安全与合规意识\n**原则**：当 AI 工具与你的系统（特别是敏感数据和核心基础设施）深度集成时，必须保持高度的安全警惕。理解集成的潜在风险，并优先考虑安全和合规性。\n\n**案例支持**：\n*   **数据基础设施团队**建议对敏感数据使用 MCP 服务器而非 CLI，以维持更好的安全控制。\n*   **法务团队**立即识别出深度 MCP 集成的安全隐患，并强调了在 AI 能力扩展时快速构建合规工具的重要性。\n\n#### 9. 培养分享与实验的文化\n**原则**：AI 编程工具不仅能提升个人生产力，还能改变团队协作方式。鼓励团队成员分享他们的使用技巧、工作流程甚至是不完美的“玩具”原型，以激发整个组织的创新。\n\n**案例支持**：\n*   **数据基础设施团队**通过举行“分享会”来传播最佳实践。\n*   **法务团队**强调要克服恐惧，分享“不完美”的原型，因为这能激励他人看到新的可能性。\n\n#### 10. 围绕 AI 构建生态系统\n**原则**：不要将 AI 视为一个孤立的工具。通过创建自定义命令、插件和集成，将其融入你现有的工作流程和工具链中，从而最大化其效用。\n\n**案例支持**：\n*   **安全团队**广泛使用自定义斜杠命令来简化特定工作流程。\n*   **增长营销团队**开发了 Figma 插件和 Meta Ads MCP 服务器，将 AI 的能力直接嵌入到他们的核心工具中。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"ten-principles-of-ai-programming\",\"slugSegments\":[\"notes\",\"date-suspects\",\"ten-principles-of-ai-programming\"],\"pathSegments\":[\"notes\",\"date-suspects\",\"ten-principles-of-ai-programming\"],\"urlPath\":\"/rosetta/notes/date-suspects/ten-principles-of-ai-programming\",\"href\":\"/rosetta/notes/date-suspects/ten-principles-of-ai-programming\",\"category\":\"date-suspects\",\"title\":\"使用 AI 编程的十大基本原则\",\"date\":\"2026-01-26\",\"excerpt\":\"本文基于 Anthropic 团队使用 Claude Code 的实践经验，总结了十大 AI 编程基本原则，涵盖上下文管理、迭代协作、检查点设置、任务分类、子代理拆分、自动化重复工作、技能拓展、安全合规、团队文化和生态系统构建等方面，为开发者提供了系统化的 AI 辅助编程方法论。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"使用 AI 编程的十大基本原则.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$19\",\"tags\":[\"AI编程\",\"Claude Code\",\"开发效率\",\"人机协作\",\"工程实践\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefi
