ve\",\"children\":\"\\n            window.dataLayer = window.dataLayer || [];\\n            function gtag(){dataLayer.push(arguments);}\\n            gtag('js', new Date());\\n            gtag('config', 'G-99PGBGJH4S', {\\n              anonymize_ip: true,\\n              send_page_view: true,\\n            });\\n          \"}]]}]}]]}],{\"children\":[[\"slug\",\"rosetta/notes/date-suspects/role-of-analytical-mechanics-in-mathematical-development\",\"c\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L8\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",\"$Lb\",{},null,false]},null,false]},null,false],\"$Lc\",false]],\"m\":\"$undefined\",\"G\":[\"$d\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"f:I[433,[],\"OutletBoundary\"]\n11:I[9884,[],\"AsyncMetadataOutlet\"]\n13:I[433,[],\"ViewportBoundary\"]\n15:I[433,[],\"MetadataBoundary\"]\nb:[\"$\",\"$1\",\"c\",{\"children\":[\"$Le\",null,[\"$\",\"$Lf\",null,{\"children\":[\"$L10\",[\"$\",\"$L11\",null,{\"promise\":\"$@12\"}]]}]]}]\nc:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L13\",null,{\"children\":\"$L14\"}],null],[\"$\",\"$L15\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$3\",null,{\"fallback\":null,\"children\":\"$L16\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"17:I[1203,[\"197\",\"static/chunks/197-f7c33a0114fc3db3.js\",\"373\",\"static/chunks/373-816263e744b1a0a1.js\",\"738\",\"static/chunks/738-b97c8b45db2c8cb9.js\",\"48\",\"static/chunks/app/%5B...slug%5D/page-b39f4036a39e3cb5.js\"],\"default\"]\n18:T796f,"])</script><script>self.__next_f.push([1,"# 分析力学在数学发展中的作用\n\n## 摘要\n\n本文考察了分析力学在数学发展中扮演的双重角色。分析力学既是经典力学的理论体系，也是一门纯粹的数学科学。文章梳理了从Euler、Lagrange到Hamilton、Jacobi等人的工作，阐明分析力学如何推动常微分方程理论、变分法、一阶偏微分方程理论、黎曼几何与辛几何等数学分支的形成与发展，揭示了力学结构与数学理论之间的深刻联系。\n\n## 核心概念及解读\n\n**分析力学的二重性**：分析力学既是力学体系的理论构造形式，又是可以脱离物理内容独立研究的数学方法与结构的集合，充当了力学与数学之间的媒介\n\n**变分法与最小作用原理**：经典力学可化为定积分的变分问题，Hamilton原理表明力学是变分法的一个分支，推动了极值场论和充分条件等理论的发展\n\n**Hamilton-Jacobi方程**：Jacobi在Hamilton特征函数方法基础上建立的一阶偏微分方程理论，将力学系统的二阶常微分方程组化为一个偏微分方程，成为分析力学的核心分支\n\n**常微分方程与力学**：Euler首先以常微分方程语言表述牛顿力学，力学问题推动了线性方程组理论、任意常量变易法以及微分方程定性理论的发展\n\n**Noether不变变分定理**：守恒定律与对称原理之间互相关系的建立，体现了分析力学对变分法乃至泛函分析等数学领域的深远影响\n\n **Vladimir Vizgin**\n\n寻根于 Lagrange, 而在 Euler, D'Alembert 和其他一些科学著作中发展起来的, 分析力学显示了它的二重性. 一方面, 它是有关力学体系的理论, 即一整套经典力学的构造形式; 另一方面, 用 C. Lanczos 的话说, 它是一门纯粹的数学科学, 即是相互联系的各种数学方法和数学结构的结合, 可以不考虑它们的物理内容加以研究. 根据这种观点, 分析力学似乎是数学的一个分支.\n\n分析力学的这种二重性使它成为一种自然的媒介, 把本属于“力学的”转变成“数学的”铺平了道路. 这样, 数学通过分析力学这个媒介从力学中获得的“外部”刺激就变成了促使数学发展的“内部”因素.\n\n历史上, 经典力学的第一个数学形式是二阶常微分方程组的理论. 接着, 力学的变分结构被揭示出来了, 因而, 按照数学的观点, 可以把力学看作变分法. 与此平行的, 力学的另一个数学特征也渐渐显示出来了, 即它可以用于一份偏微分方程来表示. Lagrange 形式体系的发展又导致了力学的几何化. 到19世纪末期, 分析力学已发展了多维黎曼几何的形式. 同时, Hamilton 体系的几何化又产生了, 这从实质上揭示了力学的另一个侧面的相空间的几何学——辛几何. 在这个过程中, 前面提到的某些数学分支也形成了. 主要的有变分学和一阶偏微分方程的理论, 它们伴随着分析力学的有关的形式体系的发展而不断进步. 对于另几个数学分支来说, 力学的形式体系和已经建立的某些数学理论的对应为这些理论的发展提供了额外的刺激.\n\n分析力学的各种不同的形式体系的等价性增进了对各个数学分支之间的深刻关系的了解. 象微分方程理论 (常微分和偏微分) 与变分法之间, 黎曼几何与辛几何之间, 一方面存在着深刻的联系, 另一方面又有着相当大的区别. 在某些具体形式的框架内的分析力学问题导致了 (例如, 与常微分方程的定性理论有关的) 拓扑论、李代数、拓扑群学等新的数学分支的发展, 这也不是稀罕的事.\n\n实现力学的数学结构和某些具体的数学理论的对应, 对于力学本身总是有利的. 它为解决范围广泛的力学问题以及在物理学和天文学中使用这些方法开辟了新的途径. 下面, 作者将考虑力学的一系列数学结构, 重点说明分析力学的具体概念是如何又是怎样看成数学理论的, 以及这种确认是怎样影响这个理论的发展的. 自然地, 这种了解按惯例确实需要相当长的时间, 且经常是在相关的数学结构在分析力学的框架中已经得到了重要的进步之后才提出来的. 对于那些在结构上与不同的分析力学形式体系等同的数学分支来说, 有一点是相当明确的, 即分析力学已做出了最值得引人注意的贡献.\n\n## 作为常微分方程理论的力学\n\n1736年 Euler 在其《力学》中首先用常微分方程的术语表述了\u003csup\u003e[1]\u003c/sup\u003e牛顿力学的分析形式. Euler 把力学分解为法向分量和切向分量, 力的笛卡尔分量和力学的运动方程的符号概念是 Maclaurin 在1742年引进的. 对于力学中的微分方程来说, 许多重要的积分方法首先是由 L. Euler, J. Bernoulli, D. Bernoulli, J. D'Alembert, A. Clairaut, J. Lagrange 等人发展起来的. 力学的大部分工作刺激了线性齐次和非齐次方程及其方程组理论的发展, 也刺激了任意常量变易法的发展. 解非线性方程的最早方法也是在天体力学框架中建立的; 特别是, 如 Euler 法、摆动法、利用三角级数法, 等等近似方法.\n\nJ. Lagrange, W. Hamilton 和 C. Jacobi 反复而十分清楚地写道: 从数学的观点看, 系统的经典力学就是下述二阶常微分方程组的理论:\n$$ m_i \\ddot{x}_i = \\frac{\\partial U}{\\partial x_i} ; \\quad m_i \\ddot{y}_i = \\frac{\\partial U}{\\partial y_i} ; \\quad m_i \\ddot{z}_i = \\frac{\\partial U}{\\partial z_i} $$\n其中, $m_i$ 是坐标为 $(x_i, y_i, z_i)$ 的第 $i$ 个质点的质量, $U(x,y,z)$ 是力函数. 1835年, Hamilton 写道: 系统运动的这些微分方程的积分问题代表了数学动力学的主要的 (或许也是唯一的) 问题\u003csup\u003e[2]\u003c/sup\u003e.\n\n根据 V. Arnold 的观察, 常微分方程论“使研究具有确定性、有限维、可微性性质的所有类型的发展过程成为可能”\u003csup\u003e[3]\u003c/sup\u003e. 离散系统的力学的基础正是这三个性质. 偶尔地, 确定性的概念在解常微分方程的存在唯—性定理中可获得准确的表达. 对于最简单的—价方程 $y' =f(x,y)$, 一个有关的定理最早是在19世纪20到30年代之间 A. Cauchy 的讲演中证明的\u003csup\u003e[4]\u003c/sup\u003e. Laplace 的决定论 (determinism) 和常微分方程的解的存在唯—性定理之间的联系是十分明确的.\n\n一些新的求解方法, 特别是用一系列特殊函数表示解的方法, 是在天体力学、振动理论、部分地在数学物理的框架中发展起来的. 后来, 这些方法得到了群论的解释. 在19世纪, 应用分析力学方法解天体力学中的应用问题时, 存在着难以积分求解的问题, 其中最主要是三体问题. 尤其重要的是, 这在 J. H. Poincaré 的工作中刺激了微分方程的定性理论的发展, 而定性理论是建立同伦拓扑学 (1880—1886) 的重要的出发点之一\u003csup\u003e[5]\u003c/sup\u003e.\n\n## 作为变分法的力学\n\nEuler 已经认识到, 所有的力学现象都可化成某种是积分的极值问题的解, 这些积分后来称为“作用积分”(“action integral”, G. Leibniz 引进的一个术语). Leibniz 和 P. L. Maupertuis 把“作用”定义为运动系统中各个物体的动量与它们通过的距离之积的积分, 即 $\\sum mvS$. 把分析方法应用于最速降线及有关的力学问题中的经验, 使 Euler 有可能在18世纪30到40年代建立变分法的初步内容, 并总结在《求有极大值或极小值的曲线的方法, 或等周问题》\u003csup\u003e[6]\u003c/sup\u003e 中. Euler 通过把变分问题化成相应的微分方程 (后以他的名字命名这个方程) 的解, 论证了牛顿力学 (例如, 在中心力作用时物体运动的情况) 下的运动方程就是这类方程. 在更复杂一点的情况下, 出现了一些数学上的困难. 它要求进一步发展变分法. Lagrange 继承了这个传统, 他在18世纪五六十年代把力学化成了一个变分原理, 即最小作用原理. 直接把它和发展起来的“变分法”联系在了一起. 然而, Lagrange 本人更喜欢基于 D'Alembert-Lagrange 原理之上的力学的公式化, 这显然是因为最小作用原理要求以能量守恒定律为补充, 而且还要涉及目的论, 而这与他的想法不一致.\n\n经典力学的更充分的变分提法是由 Hamilton 给出的\u003csup\u003e[7]\u003c/sup\u003e. 1834到1835年间, Hamilton 在建立他的特征函数方法的同时, 他证明了一个观点: 所有的分析力学都可化成定积分的变分问题:\n$$S=\\int(T+U)dt,$$\n$$ \\delta S = 0,$$\n其中 $U$ 是力函数, $T$ 是系统的动能. 后来, Jacobi 把这个论述称为 Hamilton 原理. 这样, 从数学的观点看, 力学变成了变分法的一个分支, 而且是比 Lagrange 的表述更明晰、更直接的一个分支. Hamilton 以典范化的形式用公式表示了这个原理, 并把它和对函数 $S$ 的一阶偏微分方程联系起来了.\n\n接着, 典范的形式结构和前述的一阶偏微分方程 (称为Hamilton-Jacobi方程) 以广义的形式进入了变分法. 在世纪之交发展起来的、极值场论建立在 Hamilton 和 Jacobi 的规范方法之上. Jacobi 和 M. Ostrogradsky 也清楚地认识到了力学的变分结构. 例如, Ostrogradsky 在他的详细研究报告《等周问题的微分方程》(1850)中写到: 动力学“仅是等周问题的一个极特别的例子.”\u003csup\u003e[8]\u003c/sup\u003e\n\n通过对“等周问题”的研究, Ostrogradsky 搞清楚了变分法. 在谈到 Jacobi 和 Ostrogradsky 提出变分法与分析力学在研究中的密切关系时, L. Pogrebysky 说: “就象 Jacobi 的《动力学讲义》(Vorlesungen über Dynamik) 从根本上包括了许多由 Jacobi 获得的变分法的结果一样, 《等周问题研究报告》与 Ostrogradsky 在力学上的工作密切地联系在一起.”\u003csup\u003e[9]\u003c/sup\u003e\n\n虽然 Euler 与 Lagrange 对于极值存在的必要条件已有了论断性的阐述, 而充足条件的问题的解决却拖延了相当长的时间. 结果出现了对于充分条件的第一个正确的阐述, 如 Jacobi 提出的, 也和分析力学的研究有关\u003csup\u003e[10]\u003c/sup\u003e. 在这里, 起决定性作用的是特征函数的 Hamilton 方法. 其中原始数据被看成是变量. Jacobi 在他的任意常量变易法中实际上利用了同样的想法, 并在实践这种方法的同时, 建立了与保持第二变分律有关的极值的充要条件 (1837).\n\n其后, 分析力学继续影响着变分法的发展. 在这里仅提一下 E. Noether 提出的不变变分问题中的几个定理. 分析力学中的守恒定律与对称原理间的互相关系的建立\u003csup\u003e[11]\u003c/sup\u003e 以及 Gilbert 不变积分及其“独立性定理”的建立在很大程度上为这些不变变分定理做了准备. 这两项工作都紧密地附着于 Ostrogradsky 和 E. Beltrami 在分析力学中的某些早期的研究, 以及积分不变式的理论\u003csup\u003e[12]\u003c/sup\u003e. 通过变分法, 分析力学也影响了泛函分析、积分方程论等其他一些数学分支的发展.\n\n## 作为一阶偏微分方程理论的力学\n\n与二阶偏微分方程不同, 在 Euler, D'Alembert, Lagrange, J. Pfaff 及 Cauchy 等人的著作中, 一阶偏微分方程没有和应用联系起来. 直到 Jacobi 才使一阶偏微分方程论有了真正的进步. 基本上依赖于 Hamilton 和他本人在分析力学方面的工作, 他发展了解一阶偏微分方程的两种方法 (称为第一种 Jacobi 法和第二种 Jacobi 法).\n\nLagrange, Pfaff 及 Cauchy 的工作说明了一阶偏微分方程的积分法与某些常微分方程组的积分法之间的遥远的关系. 在寻求积分天体力学问题的有效方法时, Hamilton 通过比较发现: 一个二阶常微分方程组可化为一个函数的两个一阶偏微分方程. Hamilton 称这个函数为特征函数 (1834)\u003csup\u003e[13]\u003c/sup\u003e. 它描述作为一个整体来看的力学系统的行为. Lagrange 之后, 研究力学系统的积分的重要性方便之处已相当清晰了. 新数学结构的引入也找到了其用处. Hamilton 从未发展积分他发现的方程的技巧, 而 Jacobi 则完成了这个任务.\n\nJacobi 的论述指出, 可以只考虑一个一阶偏微分方程, 该方程被称为 Hamilton-Jacobi 方程. 有关的理论最后形成了分析力学的一个重要分支. Jacobi 立刻意识到, 在偏微分方程的纯粹数学研究与 Hamilton 的工作之间存在着相当深刻的联系. 他在1842到1843年间完成了《动力学讲义》(Vorlesungen über Dynamik) 一书, 总结了自己的研究和发现, 该书于1866年出版\u003csup\u003e[14]\u003c/sup\u003e. 在书中他论述了积分一阶偏微分方程的前述方法. 因此, 从1837到1843年, Hamilton 和 Jacobi 是把力学作为一阶偏微分方程论的一个分支来介绍的. 这项工作一方面开辟了分析力学的一个新的富有成果的领域 (Hamilton-Jacobi 理论), 另一方面, 产生了建立一阶偏微分方程的相容性的理论中的决定性的成就.\n\n“第一种 Jacobi 法”的要求是: 建立相应于已知的常微分方程方程组 (在力学中, 这是一个典型方程组), 解这个方程组, 以及对此一阶偏微分方程的积分作些计算 (在力学中, 此对应于作用函数的计算). 这个方法是 Jacobi 在1837年的著作中提出的. 这工作中的推理方法, 与 Pfaff 所采用的相似, 而与 Hamilton 所采用者不同. 不过他的出发点可能始于 Hamilton 的想法, 因为他在1837年的著作中特别强调了 Hamilton 的工作对研究一阶偏微分方程的重要性意义, 并把他自己的“第一种方法”称为广义的 Hamilton 方法\u003csup\u003e[15]\u003c/sup\u003e.\n\n然而, 第一种 Jacobi 方法的理论价值, 比实用价值要大. 在使用中, Jacobi 的“第二方法”更加有效. Jacobi 在1838年的一篇文章中对“第二方法”做了轮廓性概述, 但他在后来的工作及《讲义》(Vorlesungen) 一书中均未作进一步的阐述. 此法也源于分析力学, 而且和 Poisson-Jacobi 定理的使用有关, 该定理是关于根据运动的两个积分获得称为 Poisson 括号的一个算子的第三个应用. 这把 Jacobi 直接引到了切换变换的概念上. 它是偏微分方程的一般理论结构的基础, 同时也是分析力学的最广泛的几何表示.\n\n关于切换变换理论的发展, S. Lie 将它应用到一阶偏微分方程. 利用适当的切换变换可把微分方程化成最简单的形式. 这样便有可能不用任何积分过程表示出方程的解来. 象在力学中一样, 在偏微分方程理论中的问题归结为找寻必要的切换变换. 尽管 Lie 强调他的工作的几何学来源, 但他的研究也依赖于 Hamilton 与 Jacobi 的工作. 因而分析力学也是 Lie 的工作的一个源头. 一阶偏微分方程的研究史在 S. Demidov 的著作中有更详细的论述\u003csup\u003e[16]\u003c/sup\u003e.\n\n## 作为黎曼几何的力学\n\nLagrange, Hamilton 和 Jacobi 等人的工作似乎把几何从力学中驱逐出去了, 但这只是表面现象. 随着时间的推移, 几何的概念不断得到扩展, 分析力学也变得具有了完全的几何特征. 由于 (Lagrange 的或 Hamilton 的) 形式化的使用, 分析力学既可以表示成黎曼几何的形式, 也可表示成辛几何的形式. 但是, 即使在黎曼几何采用其显型之前, 高斯曲面论与 Lagrange 形式化的力学 (使用广义坐标和第二类 Lagrange 方程) 之间的相似就已呈现出来了. 特别是由于 C. Gauss 从变分原理中导出了测地线方程而使他的曲面坐标与广义坐标十分相似. 这样, 分析力学为具有二次度量的多维微分几何开辟了道路.\n\nJacobi 从极小作用原理中除去了时间, 实际上获得了多维黎曼空间的测地线原理 (1837)\u003csup\u003e[17]\u003c/sup\u003e, 因而接近了力学的一种适当的几何学阐述.\n$$ \\delta\\int dS_e =0 $$\n其中 $dS_e^2 =2(U+H)\\sum m_i dS_i^2$; $dS_i =v_i dt$; $T−U=h$; $m_i$ 和 $v_i$ 是第 $i$ 个质点的质量和速度; $T$ 和 $U$ 分别是系统的动能和力函数.\n\n其实, 当 Riemann 在1854年编纂其著名的 Riemann 几何的概要时忽视了具有二次度量的多维微分几何这个显著的例子, 尽管物理及力学的考虑对他十分重要.\nF. Minding (1864), E. Beltrami (1869) 和 R. Lipschitz (1871) 以具有二次度量的多维微分几何的形式的 Lagrange 力学做了更详细的阐述. C. Darboux 在他的《一般曲面理论讲义》(1889) 中总结了这一时期力学几何化的进展. 由于考虑到多维微分几何的方法, Darboux 在讨论力学的那一章的开头写道: “我们在前两章中采用的方法能自行扩展到力学的一般问题上. 这里, 给出表示基础结果的一种新的 (几何) 方法是适宜的. 这些结果属于 Hamilton 和 Jacobi, 因为这样我们会获得二次型的某些一般性质, 它们不仅可以阐明先前的结果, 而且在以后也是有用的.”\u003csup\u003e[18]\u003c/sup\u003e\n\nH. R. Hertz 大大发展了力学的几何形式化, 并在经典力学结构中找到了它的重大应用 (Hertz 的著作《力学原理》在他死后于1894年出版)\u003csup\u003e[19]\u003c/sup\u003e. 他直接参考了 Beltrami, Lipschitz 和 Darboux 等人的工作, 放弃了力的概念, (它已包含在范围物理学的特征里,) 与 Beltrami, Lipschitz 和 Darboux 意义下的力学的运动的几何化结合在一起. 作为一个动力学定律, 他使用了 Gauss 的最小约束原理. 它在几何图表的 (框架) 内采用了测地路径原理的形式. 恰在广义相对论出现之前, 被译成了多维黎曼几何的术语的 Hertz 的“没有力”的力学 (在这种情况下, 空间曲率不是由引力来保证的, 而是由系统的限定特性运动的力学联络来保证的), 很象是 Einstein 的理论的有意义的预想. 但是, Einstein 本人和研究他的工作的人们都没有注意 Hertz 关于张力的几何概念的起源的思想的影响. 尽管 Einstein 无疑对 Hertz 的力学相当熟悉.\n\n张量方法是在 G. Ricci 和 T. Levi-Civita 的文章 (1901) 中被引入到分析力学中的\u003csup\u003e[20]\u003c/sup\u003e. 这篇文章被正确地认为是张量分析方面的重要经典作品, 并因在建立广义相对论的数学工具中起了重要作用而闻名于世. 在这篇文章中, 借助 Christoffel 符号把 Lagrange 方程改写成了测地线方程的形式. 尽管在分析力学和黎曼几何之间存在着如此深刻、如此多样化的联系, 但是前者并没有对后者形成本质的影响. 不过, 到了20世纪, 非完全性 (non-holonomic) 力学的几何化已成了推动非完全性流形微分几何发展的主要因素之一.\n\n## 作为辛几何的力学\n\n辛几何是相空间的几何学. “近几年来, 辛几何与切换几何” (切换几何\u003csup\u003e①\u003c/sup\u003e相当于索菲斯李几何学)\u003csup\u003e[21]\u003c/sup\u003e. V. Arnold 说: “已经在数学的所有分支中出现; 就象每一只云雀都会长出冠毛一样, 数学的每一区域终会变成李”\u003csup\u003e[22]\u003c/sup\u003e. 这样, 辛化就成了数学发展的一个主要而又富有成就的方向. V. Arnold 把它比作代数化、Bourbaki 化, 等等. 然而, 最初, 辛几何确是在分析力学, 在有关的数学领域 (变分法) 中, 以及在一阶偏微分方程论等中发展起来的. Arnold 在评论辛几何时写道: “它是力学、变分法等长期发展的结果. 在上个世纪, 几何学的这一分支被称为分析动力学”\u003csup\u003e[23]\u003c/sup\u003e.\n\n辛几何的论证以“泼线牲微分”为基础. 它相当于一对无穷小向量, 换言之, 对应于一个面元. 这些流形局部地构成辛线性空间, 即, 具有一个 skew 对称形式的偶数维线性空间. H. Weyl 把这个空间上的对称群称为一个辛 (Symplectic, 该词来源于希腊语, 意思是缠绕在一起 (twining together), 连结 (linking)) (1939)\u003csup\u003e[24]\u003c/sup\u003e.\n\n虽然在分析力学 (框架) 内的辛几何的形成主要是与典型变换理论的建立有关, 但是 Lagrange 的《分析力学》第一版中在建立任意常量变易法时已注意到了双线性微分型\u003csup\u003e②\u003c/sup\u003e $(\\delta q_i \\Delta p_i −\\delta p_i \\Delta q_i)$ 的不变性质, 更准确地说, 注意到了它的时间常量特征标\u003csup\u003e[25]\u003c/sup\u003e. 这样, “双线性不变式”就与 Lagrange 和 Poisson 关于 Lagrange-Poisson 括号的研究工作 (1808—1809) 联系起来了. 这在建立典型变换理论中起着相当重要的作用.\n\n力学的辛形式体系也被称为“Hamilton 形式体系”或“Hamilton 力学”. 这是十分正确的, 因为正是 Hamilton 在其1834—1835年的著作中导出了力学的典型方程, 为引入相空间开辟了道路. 他认为作用特别重要, 为此建立了力学的主要变分原理 (Hamilton 原理), 并获得了在本质上与典型变换有关的一阶偏微分方程 (Hamilton-Jacobi 方程). 最后, 正是 Hamilton 的光学—力学的类比导致了把力学运动解释成为切换变换的梯度不大的展开. 一本关于辛几何及其应用的现代专著认为, 辛流形的几何是 Hamilton-Jacobi 理论的现代版本\u003csup\u003e[26]\u003c/sup\u003e. 附带说一下, 正是 Hamilton 在19世纪40年代中期发现的四元数为例证辛群 $Sp(n)$ 提供了最恰当的例子.\n\nJacobi 发展了 Hamilton 的那些完全符合于典型变换的思想和方法. Ostrogradsky 也在同一方向上工作. 他广泛地使用了 Lagrange 的“双线性不变式”, 特别是在导出典型方程和证明切积分的 Poisson-Jacobi 定理时. N. Zhukovsky 在谈到 Ostrogradsky 的“论力学问题中任意常量的变易”(1847) 一文时写道, 说明括号中的表达式的时间恒定性的“方程 (23)”. “这正是 Ostrogradsky 的猜想 (推测) 的出发点, 从这里他导出了动力学的基本定理, 并用它们来解决与扰动函数有关的天体力学的某些问题”\u003csup\u003e[27]\u003c/sup\u003e.\n\n19世纪70年代初, S. Lie 在他的切换变换几何中把他以前的 G. Monge, J. Poncelet, J. Gergonne, J. Plücker 等人在几何方面的研究工作和 Hamilton 及 Jacobi 在分析力学的框架内的成就连接在了一起, 从而奠定了辛几何作为几何学的一个领域的全部基础. Lie 使切换变换几何成了一阶偏微分方程论的一个有机的组成部分. 另一方面, Lie 从切换变换几何及微分方程的积分的几何概念出发, 开始了他一生中最重要的工作, 发展 Lie 群论和 Lie 代数\u003csup\u003e[28]\u003c/sup\u003e. 前述理论的基本思想——无穷小变换的概念——是由他首先引入切换变换论中并在力学中加以应用的. 分析力学对辛几何的起作用的另一个重要渠道是它引入了由 J.H. Poincaré, S. Lie, E.J. Cartan 等人发展起来的积分不变量理论. 辛几何的现代解释是本世纪四五十年代在 A. Lichnerowicz, F. Klein, F. Calissot, C. Godbillon 等人的著作中开始成型的, 而在六七十年代, 系统的发展开创了被称作辛流形上的微分几何 (A. Weinstein, B. Kostant, J.M. Souriau, L. Hörmander, S. Sternberg, J. Moser, V. Arnold, A. Kirillov, A. Givental 等人).\n\n## 结束语\n\n分析力学的创造以及把它作为力学与数学之间的特殊媒介的理解过程是与发生于18世纪末和19世纪前半叶的引人注目的科学训练过程, 教育体系的变化, 学术活动中心从科学院向高等院校的转移, 新的科学训练方法的出现等因素有极为密切的关系\u003csup\u003e[29]\u003c/sup\u003e.\n\n虽然在法国, 发展分析力学中所必备的条件主要地只与多样性的应用力学方法的理论和数学基础的创立有关, 而且巴黎高等工艺学院教授了这些方法. 在德国, 分析力学高度发展的先决条件是在形成纯粹数学概念的过程中被创造出来的. 当时对此做出贡献的主要是哥尼斯堡大学的学者和 Jacobi.\n\n正是由于把数学分成纯粹的和应用的, 使得把分析力学的各种形式体系解释为相应的数学理论的特例成为可能. 其时, Hamilton 对于分析力学的特殊贡献与他的天文学研究诞生有关, 他渴望获得几何光学 (天文仪器的理论) 和天体力学 (天体运动的理论) 的单一的数学基础.\n\n本文所考虑的材料构成了精密科学中重要的方法论问题的概要. 如科学理论中的等价概念问题, 自然科学中数学的“不合理的有效性” 问题 (E. Wigner 语), 在物理学中分析力学类似的“过分有效性” 问题, 自然科学理论对数学施加影响的机制问题, 等等. 分析力学之所以有丰富的数学成果是因为这个理论存在着数量众多的等价的形式体系, 这点已经得到了证明. 按照 R. Ph. Feynman 的看法, 分析力学是既“好”而又深刻的科学理论的典型代表. 这解释了 I. Lacatos 的富有成果的研究进程的“数学”准则 (按常规, 所谓富有成果的进程是对数学的发展有强大刺激作用的那些进程)\u003csup\u003e[30]\u003c/sup\u003e.\n\n另一方面, “好”的物理理论 (如经典力学) 确实能产生“多价”的数学结构, 即具有丰富联系性的数学结构. 按照常规, 利用这些数学结构进一步做“数学游戏”, 使其一般化, 促进它的发展, 就会得到“好”的, 概念性更强的新数学内容来. 而这些新的内容在建立新的物理理论时又会有相当大的作用.\n\n尽管19和20世纪经历了物理学的深刻的滚动, 但是分析力学的结构至今仍在建立基本的物理理论的结构中起着决定性的作用. 虽然它好象是从质点力学这样薄弱的物理土壤中生长起来的. 在现代理论物理的概念中, “作用”、“Lagrange 函数”、“Hamilton 函数”及“典型变量”等词恰好就象是前面的关键词一样. 辛几何对于理论物理的意义也逐渐变得明朗起来了. 这里仍存在物理学中分析力学的“不合理的有效性”问题. 不过, 这已经是一个完全不同的问题. 尽管与本文讨论的问题有联系, 但总的讲偏离离开主题太远了.\n\n读者已经看到, 出现在分析力学领域中的力学结构与数学结构的对应是针对着与数学发展有关的力学体系中的基本运算技巧. 这种对应对于力学的发现是非常重要的, 因为它使强有力的数学手段进入了力学方法中, 从而提高了力学的可计算性指数, 使力学的理论模型变得更加清晰, 更加严密, 并为力学的一般化开辟了新的道路.\n\n(郭世荣译 管楚玲校)\n\n## 注 释\n\n*   [^title_note]: 原题: Analytical Mechanics As a Factor in the Development of Mathematics. 译自: The History of Science: Soviet Research, Vol. I, Problems of The Contemporary World, Series No. 115. Moscow, 1985. p. 151-168.\n① 切换几何是辛几何的奇数维的模拟. ——译注.\n② 即双线性微分型式 $(\\delta q_i \\Delta p_i −\\delta p_i \\Delta q_i)$. ——译注.\n\n## 参考文献目录\n\n- 1: L. Euler, Mechanica, Sive motus scientia analitices exposita, Vols. 1,2, Petropoli, 1736.\n- 2: W. R. Hamilton, “关于动力学的一般方法的第二篇论文”, 载皇家学会哲学学报 1 (1835), 95—144. 重印于 W. R. Hamilton 的《数学文集》卷2, 莫斯科, 1940, 第162—212页.\n- 3: V. I. Arnold, 《常微分方程》(俄文), 莫斯科, 1971, 第2页.\n- 4: M. Kline, 《古今数学思想》, 纽约, 1972 (有汉译本).\n- 5: E. Scholz, Geschichte des Mannigfaltigkeitsbegriffes von Riemann bis Poincaré, Boston, 1980, p. 430.\n- 6: L. Euler, Methodus inveniendi lineas curvas maximi minimive proprietate gaudentis, sive solutio problematis isoperimetrici latissimo sensu accepti, Lausanne-Geneva, 1744.\n- 7: L.S. Polak, 《力学的变分原理, 它的发展及其在物理中的应用》(俄文), 莫斯科, 1960, 第316页.\n- 8: M. V. Ostrogradsky, “等周问题的微分方程”, L.Polak 主编《力学的变分原理》(俄文), 莫斯科, 1959, 第316页.\n- 9: I. B. Pogrebysky, 《从 Lagrange 到 Einstein 的经典力学》(俄文), 莫斯科, 1966, 第227页.\n- 10: A. V. Dorofeyeva, 《变分法的形成史》, 《数学史研究》, 莫斯科, 第14辑, 第101—108页.\n- 11: V. P. Vizgin, 《经典物理中守恒定律和对称性原理的发展》(俄文), 莫斯科, 1972.\n- 12: 同上.\n- 13: W. R. Hamilton, “论动力学的一般方法”, 《皇家学会哲学学报》2 (1835), 第247—308页; 重印于 W. R. Hamilton 的《数学文集》卷2, 第163—162页.\n- 14: C. A. J. ,\"children\":[[\"$\",\"strong\",null,{\"children\":\"常微分方程与力学\"}],\"：Euler首先以常微分方程语言表述牛顿力学，力学问题推动了线性方程组理论、任意常量变易法以及微分方程定性理论的发展\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Noether不变变分定理\"}],\"：守恒定律与对称原理之间互相关系的建立，体现了分析力学对变分法乃至泛函分析等数学领域的深远影响\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"Vladimir Vizgin\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"寻根于 Lagrange, 而在 Euler, D'Alembert 和其他一些科学著作中发展起来的, 分析力学显示了它的二重性. 一方面, 它是有关力学体系的理论, 即一整套经典力学的构造形式; 另一方面, 用 C. Lanczos 的话说, 它是一门纯粹的数学科学, 即是相互联系的各种数学方法和数学结构的结合, 可以不考虑它们的物理内容加以研究. 根据这种观点, 分析力学似乎是数学的一个分支.\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"分析力学的这种二重性使它成为一种自然的媒介, 把本属于“力学的”转变成“数学的”铺平了道路. 这样, 数学通过分析力学这个媒介从力学中获得的“外部”刺激就变成了促使数学发展的“内部”因素.\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"历史上, 经典力学的第一个数学形式是二阶常微分方程组的理论. 接着, 力学的变分结构被揭示出来了, 因而, 按照数学的观点, 可以把力学看作变分法. 与此平行的, 力学的另一个数学特征也渐渐显示出来了, 即它可以用于一份偏微分方程来表示. Lagrange 形式体系的发展又导致了力学的几何化. 到19世纪末期, 分析力学已发展了多维黎曼几何的形式. 同时, Hamilton 体系的几何化又产生了, 这从实质上揭示了力学的另一个侧面的相空间的几何学——辛几何. 在这个过程中, 前面提到的某些数学分支也形成了. 主要的有变分学和一阶偏微分方程的理论, 它们伴随着分析力学的有关的形式体系的发展而不断进步. 对于另几个数学分支来说, 力学的形式体系和已经建立的某些数学理论的对应为这些理论的发展提供了额外的刺激.\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"分析力学的各种不同的形式体系的等价性增进了对各个数学分支之间的深刻关系的了解. 象微分方程理论 (常微分和偏微分) 与变分法之间, 黎曼几何与辛几何之间, 一方面存在着深刻的联系, 另一方面又有着相当大的区别. 在某些具体形式的框架内的分析力学问题导致了 (例如, 与常微分方程的定性理论有关的) 拓扑论、李代数、拓扑群学等新的数学分支的发展, 这也不是稀罕的事.\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"实现力学的数学结构和某些具体的数学理论的对应, 对于力学本身总是有利的. 它为解决范围广泛的力学问题以及在物理学和天文学中使用这些方法开辟了新的途径. 下面, 作者将考虑力学的一系列数学结构, 重点说明分析力学的具体概念是如何又是怎样看成数学理论的, 以及这种确认是怎样影响这个理论的发展的. 自然地, 这种了解按惯例确实需要相当长的时间, 且经常是在相关的数学结构在分析力学的框架中已经得到了重要的进步之后才提出来的. 对于那些在结构上与不同的分析力学形式体系等同的数学分支来说, 有一点是相当明确的, 即分析力学已做出了最值得引人注意的贡献.\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"作为常微分方程理论的力学\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#作为常微分方程理论的力学\",\"children\":\"作为常微分方程理论的力学\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"1736年 Euler 在其《力学》中首先用常微分方程的术语表述了\",[\"$\",\"sup\",null,{\"children\":\"[1]\"}],\"牛顿力学的分析形式. Euler 把力学分解为法向分量和切向分量, 力的笛卡尔分量和力学的运动方程的符号概念是 Maclaurin 在1742年引进的. 对于力学中的微分方程来说, 许多重要的积分方法首先是由 L. Euler, J. Bernoulli, D. Bernoulli, J. D'Alembert, A. Clairaut, J. Lagrange 等人发展起来的. 力学的大部分工作刺激了线性齐次和非齐次方程及其方程组理论的发展, 也刺激了任意常量变易法的发展. 解非线性方程的最早方法也是在天体力学框架中建立的; 特别是, 如 Euler 法、摆动法、利用三角级数法, 等等近似方法.\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"J. Lagrange, W. Hamilton 和 C. Jacobi 反复而十分清楚地写道: 从数学的观点看, 系统的经典力学就是下述二阶常微分方程组的理论:\\n\",\"$L1a\",\"\\n其中, \",\"$L1b\",\" 是坐标为 \",\"$L1c\",\" 的第 \",\"$L1d\",\" 个质点的质量, \",\"$L1e\",\" 是力函数. 1835年, Hamilton 写道: 系统运动的这些微分方程的积分问题代表了数学动力学的主要的 (或许也是唯一的) 问题\",\"$L1f\",\".\"]}],\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\"]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{ ,\"mn\",null,{\"children\":\"0\"}],[\"$\",\"mo\",null,{\"separator\":\"true\",\"children\":\",\"}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\" \\\\delta S = 0,\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.6944em\"}}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"style\":{\"marginRight\":\"0.0379em\"},\"children\":\"δ\"}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"style\":{\"marginRight\":\"0.0576em\"},\"children\":\"S\"}],[\"$\",\"span\",null,{\"className\":\"mspace\",\"style\":{\"marginRight\":\"0.2778em\"}}],[\"$\",\"span\",null,{\"className\":\"mrel\",\"children\":\"=\"}],[\"$\",\"span\",null,{\"className\":\"mspace\",\"style\":{\"marginRight\":\"0.2778em\"}}]]}],[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.8389em\",\"verticalAlign\":\"-0.1944em\"}}],[\"$\",\"span\",null,{\"className\":\"mord\",\"children\":\"0\"}],[\"$\",\"span\",null,{\"className\":\"mpunct\",\"children\":\",\"}]]}]]}]]}],\"\\n其中 \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[\"$\",\"mi\",null,{\"children\":\"U\"}]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"U\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"0.6833em\"}}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"style\":{\"marginRight\":\"0.109em\"},\"children\":\"U\"}]]}]}]]}],\" 是力函数, \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[\"$\",\"mi\",null,{\"children\":\"T\"}]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"T\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[\"$L4e\",\"$L4f\"]}]}]]}],\" 是系统的动能. 后来, Jacobi 把这个论述称为 Hamilton 原理. 这样, 从数学的观点看, 力学变成了变分法的一个分支, 而且是比 Lagrange 的表述更明晰、更直接的一个分支. Hamilton 以典范化的形式用公式表示了这个原理, 并把它和对函数 \",\"$L50\",\" 的一阶偏微分方程联系起来了.\"]}]\n"])</script><script>self.__next_f.push([1,"25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"接着, 典范的形式结构和前述的一阶偏微分方程 (称为Hamilton-Jacobi方程) 以广义的形式进入了变分法. 在世纪之交发展起来的、极值场论建立在 Hamilton 和 Jacobi 的规范方法之上. Jacobi 和 M. Ostrogradsky 也清楚地认识到了力学的变分结构. 例如, Ostrogradsky 在他的详细研究报告《等周问题的微分方程》(1850)中写到: 动力学“仅是等周问题的一个极特别的例子.”\",[\"$\",\"sup\",null,{\"children\":\"[8]\"}]]}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"通过对“等周问题”的研究, Ostrogradsky 搞清楚了变分法. 在谈到 Jacobi 和 Ostrogradsky 提出变分法与分析力学在研究中的密切关系时, L. Pogrebysky 说: “就象 Jacobi 的《动力学讲义》(Vorlesungen über Dynamik) 从根本上包括了许多由 Jacobi 获得的变分法的结果一样, 《等周问题研究报告》与 Ostrogradsky 在力学上的工作密切地联系在一起.”\",[\"$\",\"sup\",null,{\"children\":\"[9]\"}]]}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"虽然 Euler 与 Lagrange 对于极值存在的必要条件已有了论断性的阐述, 而充足条件的问题的解决却拖延了相当长的时间. 结果出现了对于充分条件的第一个正确的阐述, 如 Jacobi 提出的, 也和分析力学的研究有关\",[\"$\",\"sup\",null,{\"children\":\"[10]\"}],\". 在这里, 起决定性作用的是特征函数的 Hamilton 方法. 其中原始数据被看成是变量. Jacobi 在他的任意常量变易法中实际上利用了同样的想法, 并在实践这种方法的同时, 建立了与保持第二变分律有关的极值的充要条件 (1837).\"]}]\n28:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"其后, 分析力学继续影响着变分法的发展. 在这里仅提一下 E. Noether 提出的不变变分问题中的几个定理. 分析力学中的守恒定律与对称原理间的互相关系的建立\",[\"$\",\"sup\",null,{\"children\":\"[11]\"}],\" 以及 Gilbert 不变积"])</script><script>self.__next_f.push([1,"分及其“独立性定理”的建立在很大程度上为这些不变变分定理做了准备. 这两项工作都紧密地附着于 Ostrogradsky 和 E. Beltrami 在分析力学中的某些早期的研究, 以及积分不变式的理论\",[\"$\",\"sup\",null,{\"children\":\"[12]\"}],\". 通过变分法, 分析力学也影响了泛函分析、积分方程论等其他一些数学分支的发展.\"]}]\n29:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"作为一阶偏微分方程理论的力学\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#作为一阶偏微分方程理论的力学\",\"children\":\"作为一阶偏微分方程理论的力学\"}]}]\n2a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"与二阶偏微分方程不同, 在 Euler, D'Alembert, Lagrange, J. Pfaff 及 Cauchy 等人的著作中, 一阶偏微分方程没有和应用联系起来. 直到 Jacobi 才使一阶偏微分方程论有了真正的进步. 基本上依赖于 Hamilton 和他本人在分析力学方面的工作, 他发展了解一阶偏微分方程的两种方法 (称为第一种 Jacobi 法和第二种 Jacobi 法).\"}]\n2b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Lagrange, Pfaff 及 Cauchy 的工作说明了一阶偏微分方程的积分法与某些常微分方程组的积分法之间的遥远的关系. 在寻求积分天体力学问题的有效方法时, Hamilton 通过比较发现: 一个二阶常微分方程组可化为一个函数的两个一阶偏微分方程. Hamilton 称这个函数为特征函数 (1834)\",[\"$\",\"sup\",null,{\"children\":\"[13]\"}],\". 它描述作为一个整体来看的力学系统的行为. Lagrange 之后, 研究力学系统的积分的重要性方便之处已相当清晰了. 新数学结构的引入也找到了其用处. Hamilton 从未发展积分他发现的方程的技巧, 而 Jacobi 则完成了这个任务.\"]}]\n2c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Jacobi 的论述指出, 可以只考虑"])</script><script>self.__next_f.push([1,"一个一阶偏微分方程, 该方程被称为 Hamilton-Jacobi 方程. 有关的理论最后形成了分析力学的一个重要分支. Jacobi 立刻意识到, 在偏微分方程的纯粹数学研究与 Hamilton 的工作之间存在着相当深刻的联系. 他在1842到1843年间完成了《动力学讲义》(Vorlesungen über Dynamik) 一书, 总结了自己的研究和发现, 该书于1866年出版\",[\"$\",\"sup\",null,{\"children\":\"[14]\"}],\". 在书中他论述了积分一阶偏微分方程的前述方法. 因此, 从1837到1843年, Hamilton 和 Jacobi 是把力学作为一阶偏微分方程论的一个分支来介绍的. 这项工作一方面开辟了分析力学的一个新的富有成果的领域 (Hamilton-Jacobi 理论), 另一方面, 产生了建立一阶偏微分方程的相容性的理论中的决定性的成就.\"]}]\n2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"“第一种 Jacobi 法”的要求是: 建立相应于已知的常微分方程方程组 (在力学中, 这是一个典型方程组), 解这个方程组, 以及对此一阶偏微分方程的积分作些计算 (在力学中, 此对应于作用函数的计算). 这个方法是 Jacobi 在1837年的著作中提出的. 这工作中的推理方法, 与 Pfaff 所采用的相似, 而与 Hamilton 所采用者不同. 不过他的出发点可能始于 Hamilton 的想法, 因为他在1837年的著作中特别强调了 Hamilton 的工作对研究一阶偏微分方程的重要性意义, 并把他自己的“第一种方法”称为广义的 Hamilton 方法\",[\"$\",\"sup\",null,{\"children\":\"[15]\"}],\".\"]}]\n2e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"然而, 第一种 Jacobi 方法的理论价值, 比实用价值要大. 在使用中, Jacobi 的“第二方法”更加有效. Jacobi 在1838年的一篇文章中对“第二方法”做了轮廓性概述, 但他在后来的工作及《讲义》(Vorlesungen) 一书中均未作进一步的阐述. 此法也源于分析力学, 而且和 Poisson-Jacobi 定理的使用有关, 该定理是关于根据运动的两个积"])</script><script>self.__next_f.push([1,"分获得称为 Poisson 括号的一个算子的第三个应用. 这把 Jacobi 直接引到了切换变换的概念上. 它是偏微分方程的一般理论结构的基础, 同时也是分析力学的最广泛的几何表示.\"}]\n2f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"关于切换变换理论的发展, S. Lie 将它应用到一阶偏微分方程. 利用适当的切换变换可把微分方程化成最简单的形式. 这样便有可能不用任何积分过程表示出方程的解来. 象在力学中一样, 在偏微分方程理论中的问题归结为找寻必要的切换变换. 尽管 Lie 强调他的工作的几何学来源, 但他的研究也依赖于 Hamilton 与 Jacobi 的工作. 因而分析力学也是 Lie 的工作的一个源头. 一阶偏微分方程的研究史在 S. Demidov 的著作中有更详细的论述\",[\"$\",\"sup\",null,{\"children\":\"[16]\"}],\".\"]}]\n30:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"作为黎曼几何的力学\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#作为黎曼几何的力学\",\"children\":\"作为黎曼几何的力学\"}]}]\n31:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Lagrange, Hamilton 和 Jacobi 等人的工作似乎把几何从力学中驱逐出去了, 但这只是表面现象. 随着时间的推移, 几何的概念不断得到扩展, 分析力学也变得具有了完全的几何特征. 由于 (Lagrange 的或 Hamilton 的) 形式化的使用, 分析力学既可以表示成黎曼几何的形式, 也可表示成辛几何的形式. 但是, 即使在黎曼几何采用其显型之前, 高斯曲面论与 Lagrange 形式化的力学 (使用广义坐标和第二类 Lagrange 方程) 之间的相似就已呈现出来了. 特别是由于 C. Gauss 从变分原理中导出了测地线方程而使他的曲面坐标与广义坐标十分相似. 这样, 分析力学为具有二次度量的多维微分几何开辟了道路.\"}]\n"])</script><script>self.__next_f.push([1,"32:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Jacobi 从极小作用原理中除去了时间, 实际上获得了多维黎曼空间的测地线原理 (1837)\",[\"$\",\"sup\",null,{\"children\":\"[17]\"}],\", 因而接近了力学的一种适当的几何学阐述.\\n\",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\ L54\"]}],\"$L55\",\"$L56\"]}]]}],\"; \",\"$L57\",\"; \",\"$L58\",\"; \",\"$L59\",\" 和 \",\"$L5a\",\" 是第 \",\"$L5b\",\" 个质点的质量和速度; \",\"$L5c\",\" 和 \",\"$L5d\",\" 分别是系统的动能和力函数.\"]}]\n"])</script><script>self.__next_f.push([1,"33:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"其实, 当 Riemann 在1854年编纂其著名的 Riemann 几何的概要时忽视了具有二次度量的多维微分几何这个显著的例子, 尽管物理及力学的考虑对他十分重要.\\nF. Minding (1864), E. Beltrami (1869) 和 R. Lipschitz (1871) 以具有二次度量的多维微分几何的形式的 Lagrange 力学做了更详细的阐述. C. Darboux 在他的《一般曲面理论讲义》(1889) 中总结了这一时期力学几何化的进展. 由于考虑到多维微分几何的方法, Darboux 在讨论力学的那一章的开头写道: “我们在前两章中采用的方法能自行扩展到力学的一般问题上. 这里, 给出表示基础结果的一种新的 (几何) 方法是适宜的. 这些结果属于 Hamilton 和 Jacobi, 因为这样我们会获得二次型的某些一般性质, 它们不仅可以阐明先前的结果, 而且在以后也是有用的.”\",[\"$\",\"sup\",null,{\"children\":\"[18]\"}]]}]\n34:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"H. R. Hertz 大大发展了力学的几何形式化, 并在经典力学结构中找到了它的重大应用 (Hertz 的著作《力学原理》在他死后于1894年出版)\",[\"$\",\"sup\",null,{\"children\":\"[19]\"}],\". 他直接参考了 Beltrami, Lipschitz 和 Darboux 等人的工作, 放弃了力的概念, (它已包含在范围物理学的特征里,) 与 Beltrami, Lipschitz 和 Darboux 意义下的力学的运动的几何化结合在一起. 作为一个动力学定律, 他使用了 Gauss 的最小约束原理. 它在几何图表的 (框架) 内采用了测地路径原理的形式. 恰在广义相对论出现之前, 被译成了多维黎曼几何的术语的 Hertz 的“没有力”的力学 (在这种情况下, 空间曲率不是由引力来保证的, 而是由系统的限定特性运动的力学联络来保证的), 很象是 Einstein 的理论的有意义的预想. 但是, Einstein 本人和研究他的工作的人们都没有注意 Hertz 关于张力的几何概念的起源的思想的影响. 尽管 "])</script><script>self.__next_f.push([1,"Einstein 无疑对 Hertz 的力学相当熟悉.\"]}]\n35:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"张量方法是在 G. Ricci 和 T. Levi-Civita 的文章 (1901) 中被引入到分析力学中的\",[\"$\",\"sup\",null,{\"children\":\"[20]\"}],\". 这篇文章被正确地认为是张量分析方面的重要经典作品, 并因在建立广义相对论的数学工具中起了重要作用而闻名于世. 在这篇文章中, 借助 Christoffel 符号把 Lagrange 方程改写成了测地线方程的形式. 尽管在分析力学和黎曼几何之间存在着如此深刻、如此多样化的联系, 但是前者并没有对后者形成本质的影响. 不过, 到了20世纪, 非完全性 (non-holonomic) 力学的几何化已成了推动非完全性流形微分几何发展的主要因素之一.\"]}]\n36:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"作为辛几何的力学\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#作为辛几何的力学\",\"children\":\"作为辛几何的力学\"}]}]\n37:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"辛几何是相空间的几何学. “近几年来, 辛几何与切换几何” (切换几何\",[\"$\",\"sup\",null,{\"children\":\"①\"}],\"相当于索菲斯李几何学)\",[\"$\",\"sup\",null,{\"children\":\"[21]\"}],\". V. Arnold 说: “已经在数学的所有分支中出现; 就象每一只云雀都会长出冠毛一样, 数学的每一区域终会变成李”\",[\"$\",\"sup\",null,{\"children\":\"[22]\"}],\". 这样, 辛化就成了数学发展的一个主要而又富有成就的方向. V. Arnold 把它比作代数化、Bourbaki 化, 等等. 然而, 最初, 辛几何确是在分析力学, 在有关的数学领域 (变分法) 中, 以及在一阶偏微分方程论等中发展起来的. Arnold 在评论辛几何时写道: “它是力学、变分法等长期发展的结果. 在上个世纪, 几何学的这一分支被称为分析动力学”\",[\"$\",\"sup\",null,{\"children\":\"[23]\"}],\".\"]}]\n38:[\""])</script><script>self.__next_f.push([1,"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"辛几何的论证以“泼线牲微分”为基础. 它相当于一对无穷小向量, 换言之, 对应于一个面元. 这些流形局部地构成辛线性空间, 即, 具有一个 skew 对称形式的偶数维线性空间. H. Weyl 把这个空间上的对称群称为一个辛 (Symplectic, 该词来源于希腊语, 意思是缠绕在一起 (twining together), 连结 (linking)) (1939)\",[\"$\",\"sup\",null,{\"children\":\"[24]\"}],\".\"]}]\n"])</script><script>self.__next_f.push([1,"39:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"虽然在分析力学 (框架) 内的辛几何的形成主要是与典型变换理论的建立有关, 但是 Lagrange 的《分析力学》第一版中在建立任意常量变易法时已注意到了双线性微分型\",[\"$\",\"sup\",null,{\"children\":\"②\"}],\" \",[\"$\",\"span\",null,{\"className\":\"katex\",\"children\":[[\"$\",\"span\",null,{\"className\":\"katex-mathml\",\"children\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mo\",null,{\"stretchy\":\"false\",\"children\":\"(\"}],[\"$\",\"mi\",null,{\"children\":\"δ\"}],[\"$\",\"msub\",null,{\"children\":[[\"$\",\"mi\",null,{\"children\":\"q\"}],[\"$\",\"mi\",null,{\"children\":\"i\"}]]}],[\"$\",\"mi\",null,{\"mathvariant\":\"normal\",\"children\":\"Δ\"}],[\"$\",\"msub\",null,{\"children\":[[\"$\",\"mi\",null,{\"children\":\"p\"}],[\"$\",\"mi\",null,{\"children\":\"i\"}]]}],[\"$\",\"mo\",null,{\"children\":\"−\"}],[\"$\",\"mi\",null,{\"children\":\"δ\"}], en\":[\"$\",\"math\",null,{\"xmlns\":\"http://www.w3.org/1998/Math/MathML\",\"children\":[\"$\",\"semantics\",null,{\"children\":[[\"$\",\"mrow\",null,{\"children\":[[\"$\",\"mi\",null,{\"children\":\"S\"}],[\"$\",\"mi\",null,{\"children\":\"p\"}],[\"$\",\"mo\",null,{\"stretchy\":\"false\",\"children\":\"(\"}],[\"$\",\"mi\",null,{\"children\":\"n\"}],[\"$\",\"mo\",null,{\"stretchy\":\"false\",\"children\":\")\"}]]}],[\"$\",\"annotation\",null,{\"encoding\":\"application/x-tex\",\"children\":\"Sp(n)\"}]]}]}]}],[\"$\",\"span\",null,{\"className\":\"katex-html\",\"aria-hidden\":\"true\",\"children\":[\"$\",\"span\",null,{\"className\":\"base\",\"children\":[[\"$\",\"span\",null,{\"className\":\"strut\",\"style\":{\"height\":\"1em\",\"verticalAlign\":\"-0.25em\"}}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"style\":{\"marginRight\":\"0.0576em\"},\"children\":\"S\"}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"children\":\"p\"}],[\"$\",\"span\",null,{\"className\":\"mopen\",\"children\":\"(\"}],[\"$\",\"span\",null,{\"className\":\"mord mathnormal\",\"children\":\"n\"}],[\"$\",\"span\",null,{\"className\":\"mclose\",\"children\":\")\"}]]}]}]]}],\" 提供了最恰当的例子.\"]}]\n"])</script><script>self.__next_f.push([1,"3b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"Jacobi 发展了 Hamilton 的那些完全符合于典型变换的思想和方法. Ostrogradsky 也在同一方向上工作. 他广泛地使用了 Lagrange 的“双线性不变式”, 特别是在导出典型方程和证明切积分的 Poisson-Jacobi 定理时. N. Zhukovsky 在谈到 Ostrogradsky 的“论力学问题中任意常量的变易”(1847) 一文时写道, 说明括号中的表达式的时间恒定性的“方程 (23)”. “这正是 Ostrogradsky 的猜想 (推测) 的出发点, 从这里他导出了动力学的基本定理, 并用它们来解决与扰动函数有关的天体力学的某些问题”\",[\"$\",\"sup\",null,{\"children\":\"[27]\"}],\".\"]}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"19世纪70年代初, S. Lie 在他的切换变换几何中把他以前的 G. Monge, J. Poncelet, J. Gergonne, J. Plücker 等人在几何方面的研究工作和 Hamilton 及 Jacobi 在分析力学的框架内的成就连接在了一起, 从而奠定了辛几何作为几何学的一个领域的全部基础. Lie 使切换变换几何成了一阶偏微分方程论的一个有机的组成部分. 另一方面, Lie 从切换变换几何及微分方程的积分的几何概念出发, 开始了他一生中最重要的工作, 发展 Lie 群论和 Lie 代数\",[\"$\",\"sup\",null,{\"children\":\"[28]\"}],\". 前述理论的基本思想——无穷小变换的概念——是由他首先引入切换变换论中并在力学中加以应用的. 分析力学对辛几何的起作用的另一个重要渠道是它引入了由 J.H. Poincaré, S. Lie, E.J. Cartan 等人发展起来的积分不变量理论. 辛几何的现代解释是本世纪四五十年代在 A. Lichnerowicz, F. Klein, F. Calissot, C. Godbillon 等人的著作中开始成型的, 而在六七十年代, 系统的发展开创了被称作辛流形上的微分几何 (A. Weinstein, B. Kostant, J.M. Souriau, L. Hörmander, S. Sternberg, J. Moser, V. Arnold, A. Kirillov, A. Givental 等人).\"]}]\n"])</script><script>self.__next_f.push([1,"3d:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"结束语\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#结束语\",\"children\":\"结束语\"}]}]\n3e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"分析力学的创造以及把它作为力学与数学之间的特殊媒介的理解过程是与发生于18世纪末和19世纪前半叶的引人注目的科学训练过程, 教育体系的变化, 学术活动中心从科学院向高等院校的转移, 新的科学训练方法的出现等因素有极为密切的关系\",[\"$\",\"sup\",null,{\"children\":\"[29]\"}],\".\"]}]\n3f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"虽然在法国, 发展分析力学中所必备的条件主要地只与多样性的应用力学方法的理论和数学基础的创立有关, 而且巴黎高等工艺学院教授了这些方法. 在德国, 分析力学高度发展的先决条件是在形成纯粹数学概念的过程中被创造出来的. 当时对此做出贡献的主要是哥尼斯堡大学的学者和 Jacobi.\"}]\n40:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"正是由于把数学分成纯粹的和应用的, 使得把分析力学的各种形式体系解释为相应的数学理论的特例成为可能. 其时, Hamilton 对于分析力学的特殊贡献与他的天文学研究诞生有关, 他渴望获得几何光学 (天文仪器的理论) 和天体力学 (天体运动的理论) 的单一的数学基础.\"}]\n41:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"本文所考虑的材料构成了精密科学中重要的方法论问题的概要. 如科学理论中的等价概念问题, 自然科学中数学的“不合理的有效性” 问题 (E. Wigner 语), 在物理学中分析力学类似的“过分有效性” 问题, 自然科学理论对数学施加影响的机制问题, 等等. 分析力学之所以有丰富的数学成果是因为这个理论存在着数量众多的等价的形式体系, 这点已经得到了证"])</script><script>self.__next_f.push([1,"明. 按照 R. Ph. Feynman 的看法, 分析力学是既“好”而又深刻的科学理论的典型代表. 这解释了 I. Lacatos 的富有成果的研究进程的“数学”准则 (按常规, 所谓富有成果的进程是对数学的发展有强大刺激作用的那些进程)\",[\"$\",\"sup\",null,{\"children\":\"[30]\"}],\".\"]}]\n42:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"另一方面, “好”的物理理论 (如经典力学) 确实能产生“多价”的数学结构, 即具有丰富联系性的数学结构. 按照常规, 利用这些数学结构进一步做“数学游戏”, 使其一般化, 促进它的发展, 就会得到“好”的, 概念性更强的新数学内容来. 而这些新的内容在建立新的物理理论时又会有相当大的作用.\"}]\n43:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"尽管19和20世纪经历了物理学的深刻的滚动, 但是分析力学的结构至今仍在建立基本的物理理论的结构中起着决定性的作用. 虽然它好象是从质点力学这样薄弱的物理土壤中生长起来的. 在现代理论物理的概念中, “作用”、“Lagrange 函数”、“Hamilton 函数”及“典型变量”等词恰好就象是前面的关键词一样. 辛几何对于理论物理的意义也逐渐变得明朗起来了. 这里仍存在物理学中分析力学的“不合理的有效性”问题. 不过, 这已经是一个完全不同的问题. 尽管与本文讨论的问题有联系, 但总的讲偏离离开主题太远了.\"}]\n44:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"读者已经看到, 出现在分析力学领域中的力学结构与数学结构的对应是针对着与数学发展有关的力学体系中的基本运算技巧. 这种对应对于力学的发现是非常重要的, 因为它使强有力的数学手段进入了力学方法中, 从而提高了力学的可计算性指数, 使力学的理论模型变得更加清晰, 更加严密, 并为力学的一般化开辟了新的道路.\"}]\n45:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"(郭世荣译 "])</script><script>self.__next_f.push([1,"管楚玲校)\"}]\n46:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"注-释\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#注-释\",\"children\":\"注 释\"}]}]\n47:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{}],\"\\n\"]}]\n48:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"参考文献目录\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#参考文献目录\",\"children\":\"参考文献目录\"}]}]\n"])</script><script>self.__next_f.push([1,"49:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"1: L. Euler, Mechanica, Sive motus scientia analitices exposita, Vols. 1,2, Petropoli, 1736.\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"2: W. R. Hamilton, “关于动力学的一般方法的第二篇论文”, 载皇家学会哲学学报 1 (1835), 95—144. 重印于 W. R. Hamilton 的《数学文集》卷2, 莫斯科, 1940, 第162—212页.\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"3: V. I. Arnold, 《常微分方程》(俄文), 莫斯科, 1971, 第2页.\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"4: M. Kline, 《古今数学思想》, 纽约, 1972 (有汉译本).\"}],\"\\n\",[\"$\",\"li\",nul
