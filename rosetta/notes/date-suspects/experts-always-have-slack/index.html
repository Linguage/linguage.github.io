研究领域中冷门但有深度的子方向，而非只学习常见知识，这是突破新手阶段的关键路径\n\n\n**专家们总是游刃有余**\n\n有一个方面研究得少得可怜，那就是专家们是如何在取得更优成果的同时，展现出比新手更高的效率。我说“研究不足”，而非“无人研究”，因为众所周知，如果按耗时收费，专家们由于工作速度更快，反而可能拿到更少的报酬，这正是专家们时薪更高的原因。\n\n这种效应对于初入某个领域的新手所产生的影响，其研究更是不足。新手起步时效率奇差，他们会投入难以置信的精力，在脑海中绕过无数弯弯绕绕，只为维持他们自己构建起来的那套日益庞大却难以维护的抽象概念。而专家则无需经历这些周折。他们能更清晰地洞察手头问题的本质，并更高效地将时间和精力投入到解决问题的进程中。相比之下，新手会花费更多时间与自己制造出来的问题作斗争。让我们通过观察两个被困在迷宫中的角色，看看他们如何设法逃脱，来探讨这个观点。\n\n**迷宫困境：专家 vs. 新手**\n\n想象一位世界级的导航员被置于迷宫之中。他准备充分，带着指南针和纸张，并且先前已成功逃脱过一些人类设计的最险恶的迷宫。再想象一下你自己。在这个情境中，你就是新手。你甚至没意识到自己会被扔进迷宫。你连目标是逃出去还是找到中心都不清楚。\n\n随着你越来越深入迷宫，你意识到自己已是求助无门，彻底迷失了方向。仿佛文学作品中的情节一般巧合，你的专家朋友打来电话，给你建议：“你一开始就应该用你的线团记录走过的路。这能帮你追踪你所做的决策。”\n\n你没有意识到猫咪玩物的重要性，所以没带线团。你也不记得自己是从哪里开始的。你向专家朋友请教该怎么办，他回答说：“哦，我完全没主意。我到哪儿都离不开我的线团。你当初就不该让自己陷入这种困境。”\n\n我处理过的一些最棘手的难题，并非因为核心问题本身有多困难，而是因为我在帮助经验不足的人，他们已经花了几个小时让自己越陷越深。在求助之前，他们做了一个错误的决定，这个决定或许解决了他们的短期问题，但从长远来看却让他们自食其果。这个糟糕的决定使得其他糟糕的决定更有可能发生，直到他们无助地陷入自己制造的陷阱之中。\n\n通常，这种陷阱远比专家会让自己陷入的任何困境都要复杂得多。而新手则很容易做出一连串糟糕的决定，导致解决手头问题的成本不断增加。你不仅在没有线团的情况下迷失在迷宫里，还走进了一个起初看起来挺有趣的神秘洞穴，结果现在在黑暗中迷了路。与此同时，那位世界级的专家正愉快地在迷宫中阳光明媚、温暖宜人的部分轻松穿梭，因为他们知道那个洞穴最终会通向死胡同。\n\n此时此刻，我想强调，这绝不是新手的错。他们和任何专家一样，遵循着同样的原则：“在当时采取你能采取的最佳行动”。告诉新手“你要做得更好”并非建设性的反馈。这种反馈并不能帮助他们随着时间的推移而进步，因为从这个场景中唯一重要的视角（新手的视角）来看，他们当时的确采取了自己所能采取的最佳行动。而如果你给出的反馈不能带来改进，那反馈还有什么意义呢？\n\n你仍然迷失在迷宫中，继续前行。你的朋友提到了线团，你思索片刻后意识到，你的羊毛套头衫如果小心拆开，或许能成为一个不错的替代品。于是，你带着明确的目标，尽职尽责地坐下来开始拆解你的套头衫。大约一个小时后，你得到了你的毛线球。在几次尝试将毛线在你身后散开都失败后，你发现单股毛线实在太脆弱了。你决定把毛线编起来，又坐下来花了一个小时做这件事。这相当无聊，但你认为解决迷宫问题大概就是这么回事。\n\n过了一会儿，你的专家朋友打来电话，痛斥你浪费时间搞这些毛线。“这显然行不通，”他说。他指示你用构成迷宫的树篱上折断的树枝来标记你的路径。直到这时，你才意识到迷宫原来是由树篱构成的。\n\n新手们常常耗费精力去修正那些与他们真正想解决的问题风马牛不相及的事情，而专家们则能更好地将精力导向他们想要解决的问题。这导致新手对一个领域产生极其扭曲的看法，因为他们最终解决的问题既比专家们处理的更困难，也更乏味。没有人愿意投入更多精力去解决一个更无聊的问题。\n\n最后，有了标记走过路径的方法，你开始穿越迷宫。或者说是逃离它，你仍然不确定。你大步向前，边走边折断并放置树枝。你不太确定哪些路径是最佳的，所以你大多只是随机选择。\n\n对于新手来说，绝大多数决策都不得不在几乎没有信息的情况下随机做出。如果所有决策都是顺序性的，并且不依赖于任何其他决策，一个专注的新手在认真思考后，或许能想出一个比随机概率更好的解决方案。但我们生活的世界是分形且复杂相依的；许多决策以新手完全无法理解的方式相互依赖。即使是一个专注的新手，也会面临这样的情况：他们必须在得到这些决策有效性的反馈之前，就做出好几个相互依赖的决策。新手（起初）被迫做出完全随意的选择，并承担其后果。希望他们能学会哪些后果是由哪些决策造成的，但这并非总是可行。\n\n从专家的角度来看，解决问题时所做的决策往往是第二天性，但这些决策又都经过精心设计，以避免将来不必要的麻烦。新手观察专家的工作时，很难将这些基于多年辛勤工作和学习的少数重要决策，与那些很大程度上基于个人喜好的大量不那么重要的决策区分开来。\n\n**新手甚至看不到决策点**\n\n当你正轻松地穿过迷宫中一段特别长而直的路段时，你的专家朋友再次打来电话。“你为什么几米前没走右边那条路？”他们问。你坚称根本没有那条路，回头一瞥也证实了这一点。\n\n为了以防万一，你原路返回，果然，树篱中有一条极窄的缝隙，你猜想那可能是一条路。与你目前为止走过的宽阔整洁的路径相比，这条路异常狭窄且杂草丛生，但它确实是一条路。现在仔细环顾四周，你意识到树篱实际上布满了裂缝、缺口和稀疏之处。谁知道你错过了多少条路？\n\n有时，新手甚至不知道有决策可做。当友好的专家指出决策点时，新手通常要么能做出正确的决定，要么在看到正确的解决方案时能够理解其精妙之处。但新手起初甚至不知道那里存在一个决策点。这使得雄心勃勃的新手在没有外部帮助的情况下极难取得进展。他们不能仅仅“检查自己的工作是否有错”，因为对于任何实质性的工作成果，新手可能连自己一半的决策点都指不出来。\n\n**专家无法解释他们的决策**\n\n你挤过专家朋友推荐的树篱缝隙。不久，你来到迷宫的一个岔路口：一条路向左，另一条向右。左边的路看起来更宽敞明亮一些，但吸取了教训，你决定打电话给你的专家朋友，听取他的建议，学习他的智慧。“右边的路更好。”你的朋友断言。你请求解释，但他们除了“右边的路是更强的选择，它看起来就很对劲。它绝不会让你失望的”之外，给不出任何更具体的说法。\n\n由于得不到清晰易懂的智慧之言，你感到沮丧，但还是选择了右边的路。果然，这似乎是正确的决定。路变得开阔起来，并且据你判断，开始通向出口。但你仍然不明白你的专家朋友看到了什么，而且看起来他们自己也不明白自己看到了什么。\n\n专家的直觉往往非常强大，但却难以理解。这种无法清晰解释其决策的能力，正是新手与专家共度时光如此有益的原因。通常存在一种潜在的模式，新手可以通过仔细观察来领会，即使专家和新手都无法恰当地阐明这种模式。\n\n你的专家朋友正在斥责你错过了树篱上那个明显的缺口，没有意识到你可以翻过树篱，没有带绿篱修剪机，以及你做出的一系列其他选择——而你当时甚至没有意识到自己有其他选择。当你听得云里雾里时，你听到有人通过电话呼叫你的朋友。原来，你的专家朋友也有他们自己的专家朋友，他们都在互相帮助！“我以为我应该自己解决问题呢！”你哭着说，但你的朋友反问是什么让你有这种想法。\n\n你问怎样才能也拥有一个能帮你走出迷宫的同伴网络。你的朋友说去加入一些在线聊天室。不幸的是，对你而言，那些聊天室里的人要么说着难以理解的行话，要么在争论最佳的线团缠绕技巧。\n\n专家们通常要么拥有一个由人组成的网络，要么（如今更常见的是）知道可以指导他们思路的在线网站和用户名的网络。他们能迅速区分有用的见解和毫无帮助的泛泛之谈，并且不必花费太多时间寻找他们需要的信息。但新手完全不知道如何区分这两者，也不知道如何找到能有效帮助他们的社群。\n\n最终，你走出了迷宫。为了不再重复当一个彻底新手的经历，你决心学习更多，不再陷入新手的那些陷阱。但是，具体该怎么做呢？\n\n作为新手，你需要找到一位富有同情心的专家站在你这边帮助你，你可以向他提出所有问题，无论这些问题多么微不足道。一个替代方案是找到很多专家，这样你可以将请教的负担分摊给他们。如今，通过网络你可以走得很远，借助人工智能工具更是如此。但是，新手容易陷入的上述许多困境，并不会因为你能够上网或使用聊天机器人就奇迹般地消失。你仍然不知道如何识别那些微妙的决策点。你仍然不知道如何区分好主意和坏主意。你仍然不知道如何避免因错误选择而导致的长期连锁反应。互联网肯定有帮助，但身边有人指导则要好上无数倍。\n\n有一件事可能很难向你友好的专家传达，那就是有时你只是需要能够在没有任何具体问题的情况下向他们展示你正在做的事情。我经常发现，我会对自己正在做的事情感到不安，然后与一位专家朋友交谈后，很快就会发现我犯了一些会导致后续麻烦的错误。有一个乐于花时间“随便聊聊”而没有具体解决目标的人，将会大有裨益。\n\n在工作场所，新手和专家之间这种“随便聊聊”式的互动对于知识传递和培训至关重要。但新手很少能在关键决策者面前拥有话语权，因此促进这类互动往往被忽视。仅仅指示高级员工回答新人的问题是不够的，因为绝大多数学习来自于新手观察专家如何运用他们的技能，而不是直接的问答。使这种情况更加棘手的是，专家很可能会认为“随便聊聊”式的互动基本上毫无价值，而回答具体问题则感觉更有用。另一方面，新手只要有足够的时间，很可能可以自己找到具体问题的答案。但是，当专家与新手“随便聊聊”时所培养起来的直觉，对新手来说却非常有价值。这就解释了为什么当所有专家都远程工作时，培训新员工会如此困难，因为远程工作几乎消除了任何形式的非正式、无引导的“茶水间”式互动。\n\n有一件事你可以独立完成（而且可能最好在没有专家指导的情况下进行），那就是对该领域进行探索。你一无所知，对于什么可能有用、什么可能没用也没有任何偏见。每当你遇到一些感觉有深度的东西，比如写得很好的系列文章或深入的技术探讨，你就需要投入大量精力去研究。作为新手，你的一个优势就是一切都是新的，没有人期望你很快上手。因此，你可以花时间尽可能多地学习。\n\n老实说，我不认为这方面会做得过火。花一周时间探索你所在领域的一些特定秘辛，很可能会带来回报，因为突然之间，你在这个（微小的）方面就达到了专家水平。你可以与专家一较高下，因为他们上一次阅读那个冷僻的子领域可能还是5年前的事。不要研究那些“常见”的东西，而是要全力投入到那些小众的领域。常见的东西足够常见，无论你的主要活动是什么，你都会通过耳濡目染学会它们。但小众的东西需要主动学习，而忽视这些小众领域正是你一直停留在新手阶段的原因。\n\n在所有这些过程中，新手需要勇气（在不知道后果的情况下做出决定）和自信（以便全身心投入到自己的决定中，并赋予它们最大的成功机会）。这些特质并非微不足道，而专家的一个不屑评论就很容易摧毁新手的自信。我不敢想象有多少有前途的新手被那些平庸的专家所断送。从这个角度来看，由于存在摧毁新手自信的风险，来自一个刻薄专家的建议比根本没有专家建议更糟糕。\n\n专家和新手之间缺乏一贯的同理心表明，尽管感觉很容易，但实际上却很困难。我在这里对此有更详细的阐述。\n\n在极端情况下，这种缺乏同理心会导致专家嘲笑新手的作品没有专家作品所巧妙展现的那种声望/品位/格调/地位。\n\n这是一种自我实现的预言：新手要么顺从专家的审美观，要么认为该研究领域“不适合自己”，要么（在极少数情况下）付出难以置信的努力来最终证明专家是错的。在最后一种情况下，新手无论如何都会成为专家。专家们倾向于对技术上具有挑战性的工作有审美偏好，而不是那些简单但有趣的工作，关于这种现象我在这里有更详细的阐述：专家审美。\n\n\n---\n\n在Twitter（后来的X）上关注我，我会在那里宣布我接下来要写的内容。\n\n\n感谢Daniël Goosen、Paul Hoft von Hoesslin、Lisa Kane博士和Tegan Green，以及AI Safety Cape Town写作小组对本文草稿的审阅。\n\n---\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"experts-always-have-slack\",\"slugSegments\":[\"notes\",\"date-suspects\",\"experts-always-have-slack\"],\"pathSegments\":[\"notes\",\"date-suspects\",\"experts-always-have-slack\"],\"urlPath\":\"/rosetta/notes/date-suspects/experts-always-have-slack\",\"href\":\"/rosetta/notes/date-suspects/experts-always-have-slack\",\"category\":\"date-suspects\",\"title\":\"专家们总是游刃有余\",\"date\":\"2026-01-26\",\"excerpt\":\"本文通过迷宫逃脱的生动比喻，深入剖析专家与新手之间的效率鸿沟。专家凭借经验和直觉能高效解决问题，而新手往往在自己制造的困境中越陷越深。文章探讨了新手看不到决策点、专家难以解释直觉、非正式交流对培训的重要性等核心议题，并为新手提供了切实的成长建议。\",\"coverImage\":\"$undefined\",\"author\":\"$undefined\",\"original\":\"专家们总是游刃有余.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"专家与新手\",\"学习效率\",\"知识传递\",\"决策能力\",\"职业成长\"], },{\"type\":\"entry\",\"title\":\"软件工程师的疯狂挑战\",\"href\":\"/rosetta/notes/missing-source-url/the-insanity-of-being-a-software-engineer\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"the-insanity-of-being-a-software-engineer\"]},{\"type\":\"entry\",\"title\":\"山姆·奥特曼被OpenAI解雇的真实内幕\",\"href\":\"/rosetta/notes/missing-source-url/sam-altman-fired-openai-insider-story\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"sam-altman-fired-openai-insider-story\"]},{\"type\":\"entry\",\"title\":\"为你的软件工程职业生涯做好未来规划\",\"href\":\"/rosetta/notes/missing-source-url/future-proofing-software-engineering-career\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"future-proofing-software-engineering-career\"]},{\"type\":\"entry\",\"title\":\"关于《对泛化的一个观察》的笔记\",\"href\":\"/rosetta/notes/missing-source-url/notes-on-an-observation-on-generalization\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"notes-on-an-observation-on-generalization\"]},{\"type\":\"entry\",\"title\":\"超线性回报\",\"href\":\"/rosetta/notes/missing-source-url/superlinear-returns-paul-graham\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"superlinear-returns-paul-graham\"]},{\"type\":\"entry\",\"title\":\"大师系列 - 詹姆斯·西蒙斯：用数学赚钱的秘诀与慈善之路\",\"href\":\"/rosetta/notes/missing-source-url/james-simons-making-money-with-math\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"james-simons-making-money-with-math\"]},{\"type\":\"entry\",\"title\":\"博士生涯生存指南\",\"href\":\"/rosetta/notes/missing-source-url/phd-survival-guide-andrej-karpathy\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"phd-survival-guide-andrej-karpathy\"]},{\"type\":\"entry\",\"title\":\"美国众议院党派倾向和超级合作者的兴起\",\"href\":\"/rosetta/notes/missing-source-url/rise-of-partisanship-and-super-cooperators-in-us-house\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"rise-of-partisanship-and-super-cooperators-in-us-house\"]},{\"type\":\"entry\",\"title\":\"科学研究成功的三大黄金法则\",\"href\":\"/rosetta/notes/missing-source-url/three-golden-rules-for-successful-scientific-research\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"three-golden-rules-for-successful-scientific-research\"]},{\"type\":\"entry\",\"title\":\"自动化的讽刺\",\"href\":\"/rosetta/notes/missing-source-url/ironies-of-automation\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"ironies-of-automation\"]}]}]}]},\"directoryHref\":\"/rosetta/notes/date-suspects\",\"children\":\"$L18\"}]\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本文通过迷宫逃脱的生动比喻，深入剖析专家与新手之间的效率鸿沟。专家凭借经验和直觉能高效解决问题，而新手往往在自己制造的困境中越陷越深。文章探讨了新手看不到决策点、专家难以解释直觉、非正式交流对培训的重要性等核心议题，并为新手提供了切实的成长建议。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"效率鸿沟\"}],\"：专家在取得更优成果的同时耗费更少精力，而新手将大量时间花在与核心问题无关的自造困境上\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"隐性决策点\"}],\"：新手往往看不到关键的决策节点，导致错过最优路径并产生连锁负面后果\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"专家直觉\"}],\"：专家的判断力源于多年经验积累，往往强大却难以言说，无法通过简单问答传递给新手\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"非正式知识传递\"}],\"：新手从观察专家工作中获得的直觉培养，远比直接问答更有价值，远程工作的普及使这种茶水间式互动严重缺失\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"小众深耕策略\"}],\"：新手应主动深入研究领域中冷门但有深度的子方向，而非只学习常见知识，这是突破新手阶段的关键路径\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"专家们总是游刃有余\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"有一个方面研究得少得可怜，那就是专家们是如何在取得更优成果的同时，展现出比新手更高的效率。我说“研究不足”，而非“无人研究”，因为众所周知，如果按耗时收费，专家们由于工作速度更快，反而可能拿到更少的报酬，这正是专家们时薪更高的原因。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这种效应对于初入某个领域的新手所产生的影响，其研究更是不足。新手起步时效率奇差，他们会投入难以置信的精力，在脑海中绕过无数弯弯绕绕，只为维持他们自己构建起来的那套日益庞大却难以维护的抽象概念。而专家则无需经历这些周折。他们能更清晰地洞察手头问题的本质，并更高效地将时间和精力投入到解决问题的进程中。相比之下，新手会花费更多时间与自己制造出来的问题作斗争。让我们通过观察两个被困在迷宫中的角色，看看他们如何设法逃脱，来探讨这个观点。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"迷宫困境：专家 vs. 新手\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"想象一位世界级的导航员被置于迷宫之中。他准备充分，带着指南针和纸张，并且先前已成功逃脱过一些人类设计的最险恶的迷宫。再想象一下你自己。在这个情境中，你就是新手。你甚至没意识到自己会被扔进迷宫。你连目标是逃出去还是找到中心都不清楚。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"随着你越来越深入迷宫，你意识到自己已是求助无门，彻底迷失了方向。仿佛文学作品中的情节一般巧合，你的专家朋友打来电话，给你建议：“你一开始就应该用你的线团记录走过的路。这能帮你追踪你所做的决策。”\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你没有意识到猫咪玩物的重要性，所以没带线团。你也不记得自己是从哪里开始的。你向专家朋友请教该怎么办，他回答说：“哦，我完全没主意。我到哪儿都离不开我的线团。你当初就不该让自己陷入这种困境。”\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我处理过的一些最棘手的难题，并非因为核心问题本身有多困难，而是因为我在帮助经验不足的人，他们已经花了几个小时让自己越陷越深。在求助之前，他们做了一个错误的决定，这个决定或许解决了他们的短期问题，但从长远来看却让他们自食其果。这个糟糕的决定使得其他糟糕的决定更有可能发生，直到他们无助地陷入自己制造的陷阱之中。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"通常，这种陷阱远比专家会让自己陷入的任何困境都要复杂得多。而新手则很容易做出一连串糟糕的决定，导致解决手头问题的成本不断增加。你不仅在没有线团的情况下迷失在迷宫里，还走进了一个起初看起来挺有趣的神秘洞穴，结果现在在黑暗中迷了路。与此同时，那位世界级的专家正愉快地在迷宫中阳光明媚、温暖宜人的部分轻松穿梭，因为他们知道那个洞穴最终会通向死胡同。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"此时此刻，我想强调，这绝不是新手的错。他们和任何专家一样，遵循着同样的原则：“在当时采取你能采取的最佳行动”。告诉新手“你要做得更好”并非建设性的反馈。这种反馈并不能帮助他们随着时间的推移而进步，因为从这个场景中唯一重要的视角（新手的视角）来看，他们当时的确采取了自己所能采取的最佳行动。而如果你给出的反馈不能带来改进，那反馈还有什么意义呢？\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你仍然迷失在迷宫中，继续前行。你的朋友提到了线团，你思索片刻后意识到，你的羊毛套头衫如果小心拆开，或许能成为一个不错的替代品。于是，你带着明确的目标，尽职尽责地坐下来开始拆解你的套头衫。大约一个小时后，你得到了你的毛线球。在几次尝试将毛线在你身后散开都失败后，你发现单股毛线实在太脆弱了。你决定把毛线编起来，又坐下来花了一个小时做这件事。这相当无聊，但你认为解决迷宫问题大概就是这么回事。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"过了一会儿，你的专家朋友打来电话，痛斥你浪费时间搞这些毛线。“这显然行不通，”他说。他指示你用构成迷宫的树篱上折断的树枝来标记你的路径。直到这时，你才意识到迷宫原来是由树篱构成的。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"新手们常常耗费精力去修正那些与他们真正想解决的问题风马牛不相及的事情，而专家们则能更好地将精力导向他们想要解决的问题。这导致新手对一个领域产生极其扭曲的看法，因为他们最终解决的问题既比专家们处理的更困难，也更乏味。没有人愿意投入更多精力去解决一个更无聊的问题。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后，有了标记走过路径的方法，你开始穿越迷宫。或者说是逃离它，你仍然不确定。你大步向前，边走边折断并放置树枝。你不太确定哪些路径是最佳的，所以你大多只是随机选择。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"对于新手来说，绝大多数决策都不得不在几乎没有信息的情况下随机做出。如果所有决策都是顺序性的，并且不依赖于任何其他决策，一个专注的新手在认真思考后，或许能想出一个比随机概率更好的解决方案。但我们生活的世界是分形且复杂相依的；许多决策以新手完全无法理解的方式相互依赖。即使是一个专注的新手，也会面临这样的情况：他们必须在得到这些决策有效性的反馈之前，就做出好几个相互依赖的决策。新手（起初）被迫做出完全随意的选择，并承担其后果。希望他们能学会哪些后果是由哪些决策造成的，但这并非总是可行。\"}],\"\\n\",\"$L19\",\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\"]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"从专家的角度来看，解决问题时所做的决策往往是第二天性，但这些决策又都经过精心设计，以避免将来不必要的麻烦。新手观察专家的工作时，很难将这些基于多年辛勤工作和学习的少数重要决策，与那些很大程度上基于个人喜好的大量不那么重要的决策区分开来。\"}]\n1a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"新手甚至看不到决策点\"}]}]\n1b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"当你正轻松地穿过迷宫中一段特别长而直的路段时，你的专家朋友再次打来电话。“你为什么几米前没走右边那条路？”他们问。你坚称根本没有那条路，回头一瞥也证实了这一点。\"}]\n1c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"为了以防万一，你原路返回，果然，树篱中有一条极窄的缝隙，你猜想那可能是一条路。与你目前为止走过的宽阔整洁的路径相比，这条路异常狭窄且杂草丛生，但它确实是一条路。现在仔细环顾四周，你意识到树篱实际上布满了裂缝、缺口和稀疏之处。谁知道你错过了多少条路？\"}]\n1d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"有时，新手甚至不知道有决策可做。当友好的专家指出决策点时，新手通常要么能做出正确的决定，要么在看到正确的解决方案时能够理解其精妙之处。但新手起初甚至不知道那里存在一个决策点。这使得雄心勃勃的新手在没有外部帮助的情况下极难取得进展。他们不能仅仅“检查自己的工作是否有错”，因为对于任何实质性的工作成果，新手可能连自己一半的决策点都指不出来。\"}]\n1e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"专家无法解释他们的决策\"}]}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你挤过专家朋友推荐的树篱缝隙。不久，你来到迷宫的一个"])</script><script>self.__next_f.push([1,"岔路口：一条路向左，另一条向右。左边的路看起来更宽敞明亮一些，但吸取了教训，你决定打电话给你的专家朋友，听取他的建议，学习他的智慧。“右边的路更好。”你的朋友断言。你请求解释，但他们除了“右边的路是更强的选择，它看起来就很对劲。它绝不会让你失望的”之外，给不出任何更具体的说法。\"}]\n20:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"由于得不到清晰易懂的智慧之言，你感到沮丧，但还是选择了右边的路。果然，这似乎是正确的决定。路变得开阔起来，并且据你判断，开始通向出口。但你仍然不明白你的专家朋友看到了什么，而且看起来他们自己也不明白自己看到了什么。\"}]\n21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"专家的直觉往往非常强大，但却难以理解。这种无法清晰解释其决策的能力，正是新手与专家共度时光如此有益的原因。通常存在一种潜在的模式，新手可以通过仔细观察来领会，即使专家和新手都无法恰当地阐明这种模式。\"}]\n22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你的专家朋友正在斥责你错过了树篱上那个明显的缺口，没有意识到你可以翻过树篱，没有带绿篱修剪机，以及你做出的一系列其他选择——而你当时甚至没有意识到自己有其他选择。当你听得云里雾里时，你听到有人通过电话呼叫你的朋友。原来，你的专家朋友也有他们自己的专家朋友，他们都在互相帮助！“我以为我应该自己解决问题呢！”你哭着说，但你的朋友反问是什么让你有这种想法。\"}]\n23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你问怎样才能也拥有一个能帮你走出迷宫的同伴网络。你的朋友说去加入一些在线聊天室。不幸的是，对你而言，那些聊天室里的人要么说着难以理解的行话，要么在争论最佳的线团缠绕技巧。\"}]\n24:[\"$\",\"p\",nu"])</script><script>self.__next_f.push([1,"ll,{\"className\":\"mb-6\",\"children\":\"专家们通常要么拥有一个由人组成的网络，要么（如今更常见的是）知道可以指导他们思路的在线网站和用户名的网络。他们能迅速区分有用的见解和毫无帮助的泛泛之谈，并且不必花费太多时间寻找他们需要的信息。但新手完全不知道如何区分这两者，也不知道如何找到能有效帮助他们的社群。\"}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最终，你走出了迷宫。为了不再重复当一个彻底新手的经历，你决心学习更多，不再陷入新手的那些陷阱。但是，具体该怎么做呢？\"}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"作为新手，你需要找到一位富有同情心的专家站在你这边帮助你，你可以向他提出所有问题，无论这些问题多么微不足道。一个替代方案是找到很多专家，这样你可以将请教的负担分摊给他们。如今，通过网络你可以走得很远，借助人工智能工具更是如此。但是，新手容易陷入的上述许多困境，并不会因为你能够上网或使用聊天机器人就奇迹般地消失。你仍然不知道如何识别那些微妙的决策点。你仍然不知道如何区分好主意和坏主意。你仍然不知道如何避免因错误选择而导致的长期连锁反应。互联网肯定有帮助，但身边有人指导则要好上无数倍。\"}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"有一件事可能很难向你友好的专家传达，那就是有时你只是需要能够在没有任何具体问题的情况下向他们展示你正在做的事情。我经常发现，我会对自己正在做的事情感到不安，然后与一位专家朋友交谈后，很快就会发现我犯了一些会导致后续麻烦的错误。有一个乐于花时间“随便聊聊”而没有具体解决目标的人，将会大有裨益。\"}]\n28:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在工作场所，新手和专家之间这种“随便聊聊”式"])</script><script>self.__next_f.push([1,"的互动对于知识传递和培训至关重要。但新手很少能在关键决策者面前拥有话语权，因此促进这类互动往往被忽视。仅仅指示高级员工回答新人的问题是不够的，因为绝大多数学习来自于新手观察专家如何运用他们的技能，而不是直接的问答。使这种情况更加棘手的是，专家很可能会认为“随便聊聊”式的互动基本上毫无价值，而回答具体问题则感觉更有用。另一方面，新手只要有足够的时间，很可能可以自己找到具体问题的答案。但是，当专家与新手“随便聊聊”时所培养起来的直觉，对新手来说却非常有价值。这就解释了为什么当所有专家都远程工作时，培训新员工会如此困难，因为远程工作几乎消除了任何形式的非正式、无引导的“茶水间”式互动。\"}]\n29:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"有一件事你可以独立完成（而且可能最好在没有专家指导的情况下进行），那就是对该领域进行探索。你一无所知，对于什么可能有用、什么可能没用也没有任何偏见。每当你遇到一些感觉有深度的东西，比如写得很好的系列文章或深入的技术探讨，你就需要投入大量精力去研究。作为新手，你的一个优势就是一切都是新的，没有人期望你很快上手。因此，你可以花时间尽可能多地学习。\"}]\n2a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"老实说，我不认为这方面会做得过火。花一周时间探索你所在领域的一些特定秘辛，很可能会带来回报，因为突然之间，你在这个（微小的）方面就达到了专家水平。你可以与专家一较高下，因为他们上一次阅读那个冷僻的子领域可能还是5年前的事。不要研究那些“常见”的东西，而是要全力投入到那些小众的领域。常见的东西足够常见，无论你的主要活动是什么，你都会通过耳濡目染学会它们。但小众的东西"])</script><script>self.__next_f.push([1,"需要主动学习，而忽视这些小众领域正是你一直停留在新手阶段的原因。\"}]\n2b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在所有这些过程中，新手需要勇气（在不知道后果的情况下做出决定）和自信（以便全身心投入到自己的决定中，并赋予它们最大的成功机会）。这些特质并非微不足道，而专家的一个不屑评论就很容易摧毁新手的自信。我不敢想象有多少有前途的新手被那些平庸的专家所断送。从这个角度来看，由于存在摧毁新手自信的风险，来自一个刻薄专家的建议比根本没有专家建议更糟糕。\"}]\n2c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"专家和新手之间缺乏一贯的同理心表明，尽管感觉很容易，但实际上却很困难。我在这里对此有更详细的阐述。\"}]\n2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在极端情况下，这种缺乏同理心会导致专家嘲笑新手的作品没有专家作品所巧妙展现的那种声望/品位/格调/地位。\"}]\n2e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这是一种自我实现的预言：新手要么顺从专家的审美观，要么认为该研究领域“不适合自己”，要么（在极少数情况下）付出难以置信的努力来最终证明专家是错的。在最后一种情况下，新手无论如何都会成为专家。专家们倾向于对技术上具有挑战性的工作有审美偏好，而不是那些简单但有趣的工作，关于这种现象我在这里有更详细的阐述：专家审美。\"}]\n2f:[\"$\",\"hr\",null,{}]\n30:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在Twitter（后来的X）上关注我，我会在那里宣布我接下来要写的内容。\"}]\n31:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"感谢Daniël Goosen、Paul Hoft von Hoesslin、Lisa Kane博士和Tegan Green，以及AI Safety Cape Town写作小组对本文草稿的审阅。\"}]\n32:[\"$\",\"hr\",null,{}]\n"])</script><script>self.__next_f.push([1,"11:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nd:null\n"])</script><script>self.__next_f.push([1,"33:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"f:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"专家们总是游刃有余 | Linguista\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"本文通过迷宫逃脱的生动比喻，深入剖析专家与新手之间的效率鸿沟。专家凭借经验和直觉能高效解决问题，而新手往往在自己制造的困境中越陷越深。文章探讨了新手看不到决策点、专家难以解释直觉、非正式交流对培训的重要性等核心议题，并为新手提供了切实的成长建议。\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"专家与新手,学习效率,知识传递,决策能力,职业成长\"}],[\"$\",\"link\",\"3\",{\"rel\":\"canonical\",\"href\":\"https://linguista.cn/rosetta/notes/date-suspects/experts-always-have-slack/\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:title\",\"content\":\"专家们总是游刃有余 | Linguista\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:description\",\"content\":\"本文通过迷宫逃脱的生动比喻，深入剖析专家与新手之间的效率鸿沟。专家凭借经验和直觉能高效解决问题，而新手往往在自己制造的困境中越陷越深。文章探讨了新手看不到决策点、专家难以解释直觉、非正式交流对培训的重要性等核心议题，并为新手提供了切实的成长建议。\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:url\",\"content\":\"https://linguista.cn/rosetta/notes/date-suspects/experts-always-have-slack/\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:site_name\",\"content\":\"Linguista\"}],[\"$\",\"meta\",\"8\",{\"property\":\"og:locale\",\"content\":\"zh_CN\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:image\",\"content\":\"https://linguista.cn/img/rosetta-social.png\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:image:al
