AI模型的行为，类比历史上的圈地运动，暗示对公共知识资源的私有化占取\n\n**思考主体性**：指个体独立进行思考、判断和创作的能力与权利，作者担忧AI工具会侵蚀这种主体性，使人沦为技术的附庸\n\n**技术评判标准**：作者提出的九条准则，涵盖成本、隐私、透明度、环境足迹和社会影响等维度，用以衡量是否值得引入一项新技术\n\n**自我麻痹**：指人们在AI工具的便利性面前放弃审慎判断，不加反思地接受技术万能论，从而丧失对自身能力和创作过程的信心\n\n**仿写与致敬**：本文在结构和论证逻辑上严格对应温德尔·贝里1987年原文，通过语境置换揭示技术焦虑的历史延续性，也邀请读者反思新旧技术批判之间的异同\n\n与当下许多人一样，我置身于科技巨头构建的网络之中，但我对此并无多少崇敬之情。我希望能减少对它们的依赖。在我的思考和创作中，我努力尽可能少地受其束缚。作为思考者，我主要依赖书籍、与人的交谈以及自身的经验。作为创作者，我使用键盘敲击文字，或用笔在纸上勾画。\n\n我的想法通过我自己的大脑进行酝酿和筛选。在写作过程中，我会反复审视、修改，这个过程缓慢而充满挣扎，但也常常带来意外的发现。这是我与自己思想最直接的对话，也是自我批判和完善的过程。有时，与朋友或同行的讨论能带来比我独自思考更深刻的洞见。我们拥有一种，我认为，缓慢但真实的智力劳动方式，它运作起来或许不高效，但足够真诚。我看不出这有什么不好。\n\n如今，越来越多的人告诉我，使用AI工具可以极大地提升效率和创造力。我的回答是，我不打算这么做。我有几个理由，而且都是深思熟虑的。\n\n![](https://substackcdn.com/image/fetch/f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F65340fb6-dbf2-49de-918f-b8d8fea77a07_1536x1024.jpeg)\n\n第一个理由源于我对这些工具背后运作方式的担忧。我讨厌想到，我的思考和创作过程，需要直接依赖于那些通过“数字圈地”抓取海量数据、能源消耗巨大的数据中心。如果我在创作的行为本身，就隐含着对他人知识产权的模糊利用、对环境的间接破坏以及对算法偏见的默认，我又怎能心安理得地探讨真理、伦理与可持续性呢？出于同样的原因，我的深度思考尽量在不依赖即时网络干扰的环境下进行，这对我来说很重要。\n\n我对AI科技巨头的欣赏程度，并不比我对那些唯利是图的能源公司的欣赏程度高多少。我见过他们的宣传，试图让焦虑的知识工作者和创意人士相信，他们可以通过购买或订阅最新的AI服务来解决创作瓶颈或效率难题。我熟悉他们推动AI进入教育领域的宣传攻势，而这些领域往往更需要的是基础的人文关怀和批判性思维的培养。至于AI工具将在“未来”变得像智能手机一样无处不在，这并不能打动我，也与我无关。我并不认为这些工具让我们更接近任何对我而言真正重要的事物：深刻的理解、真正的创造力、人与人之间真诚的情感连接、社会的公平正义、心智的成熟与独立。\n\nAI工具会让我付出什么代价？首先，可能是持续的订阅费用，或是投入学习和适应这些工具的时间成本，这些都是我宁愿投入到更基础的阅读和思考上的资源。但代价绝不仅限于此。众所周知，强大的技术革新总是要求抛弃“旧模式”——这里的“旧模式”不仅仅是我缓慢的思考和写作习惯，更可能是我独立思考、信息辨别、深度分析的能力本身，以及在挣扎中形成独特风格和观点的过程。因此（我认为这是当前AI技术革新的典型特征），被取代的将不仅仅是一种方法，更可能是思考者本身的主体性。为了在技术上显得“与时俱进”，我可能不得不牺牲掉我所依赖并珍视的、那种在不确定性中探索的自由和形成个人判断的能力。\n\n我不使用AI工具的最后一个，或许也是最好的理由是，我不想自我麻痹。我怀疑，并因此强烈反感这种断言：即我或任何其他人可以通过AI工具思考得更深刻、创作得更有原创性。我看不出为什么我不能对此保持审慎：当有人使用AI工具创作出了在思想深度和艺术价值上明显优于莎士比亚或爱因斯坦的作品，并且这种优越性可以明确归因于AI的使用时，那时我或许会用更严肃的态度谈论AI工具，尽管我可能仍然不会依赖它。\n\n为了尽可能清楚地表达我的观点，我应该给出我对在自身工作和生活中引入新技术的标准。它们如下：\n\n1.  新工具从长远来看，其综合成本（包括金钱、时间、认知负荷）应低于它所取代的方式。\n2.  它应比它所取代的方式更尊重个人隐私和数据主权。\n3.  它所带来的成果（无论是效率还是质量），应清晰且可证明地优于不使用它时的成果，尤其是在核心价值层面（如原创性、深度、伦理考量）。\n4.  它的能源消耗和环境足迹应低于或有助于改善现有模式。\n5.  如果可能，它应增强而非削弱使用者的自主思考和判断能力。\n6.  它的运作机制和潜在偏见应足够透明，能够被普通使用者理解和评估。\n7.  它的服务条款和数据使用政策应公平合理，易于用户理解和控制。\n8.  它应来自对其社会和伦理影响负责任、并愿意接受监督的开发者或机构。\n9.  它不应取代或侵蚀任何已经存在的美好事物，这包括深度思考的习惯、人际间的真实互动以及社区的知识共享生态。\n\n（仿写结束）\n\n---\n\n\n# 原文：我为什么不打算买电脑（1987年）\n\n- 原文链接：[Why am I not going to buy a computer](https://classes.matthewjbrown.net/teaching-files/philtech/berry-computer.pdf)\n\n温德尔·贝里\n\n和几乎所有人一样，我依赖于能源公司，但我并不欣赏它们。我希望能减少对它们的依赖。在我的工作中，我尽量少地依赖它们。作为农民，我几乎所有的农活都用马匹完成。作为作家，我用铅笔或钢笔在纸上写作。\n\n我的妻子用一台1956年新买的皇家标准打字机打出我的作品，这台打字机至今仍和当年一样好用。在她打字时，她会发现错误，并在页边空白处用小小的勾号标记出来。她是我最好的批评家，因为她最熟悉我习惯性的错误和弱点。她有时甚至比我更清楚应该表达什么。我们拥有一个，我认为，运作良好且令人愉快的文学家庭作坊。我觉得这没什么不好。\n\n到目前为止，已经有不少人告诉我，买一台电脑可以大大改善我的工作。我的回答是，我不打算这么做。我有几个理由，而且都是充分的理由。\n\n第一个理由就是我开头提到的那个。我讨厌想到我作为作家的工作，竟然离不开对露天开采煤矿的直接依赖。如果我在写作的行为本身就参与了对自然的蹂躏，我又怎能凭良心去写反对蹂躏自然的文章呢？出于同样的原因，我的写作是在白天完成，不用电灯，这对我来说很重要。\n\n我对电脑制造商的欣赏程度，并不比对能源产业高多少。我见过他们的广告，试图诱使那些苦苦挣扎或濒临失败的农民相信，他们可以通过购买又一件昂贵的设备来解决问题。我熟悉他们的宣传活动，这些活动把电脑送进了需要书籍的公立学校。至于电脑在“未来”会像电视机一样普及，这并不能打动我，也与我无关。我没有电视机。我看不出电脑让我们向任何对我重要的事情靠近了一步：和平、经济正义、生态健康、政治诚信、家庭和社区的稳定、好的工作。\n\n一台电脑会让我付出什么代价？首先，是金钱上的代价，超出了我的承受能力，也超过了我愿意付给我不欣赏的人的数额。但代价不仅仅是金钱。众所周知，技术创新总是要求抛弃“旧模式”——这里的“旧模式”不仅指我们那台老旧的皇家标准打字机，也指我的妻子，我的批评家，我最亲近的读者，我的同事。因此（我认为这是当今技术创新的典型特征），被取代的将不仅仅是某样东西，还有某个人。为了在技术上保持作家的先进性，我将不得不牺牲掉我所依赖并珍视的一种联系。\n\n我不拥有电脑的最后一个，或许也是最好的理由是，我不想自欺欺人。我不相信，并因此强烈反感这种说法：即我或任何其他人用电脑能比用铅笔写得更好或更容易。我看不出为什么我不能像其他人一样对此持科学态度：当有人用电脑写出了明显优于但丁的作品，并且这种优越性可以明确归因于电脑的使用时，那时我才会用更尊敬的语气谈论电脑，尽管我仍然不会买一台。\n\n为了尽可能清楚地表达我的观点，我应该给出我对自身工作中技术创新的标准。它们如下：\n\n1.  新工具应比它所取代的工具更便宜。\n2.  它的规模应至少与它所取代的工具一样小。\n3.  它所做的工作应清晰且可证明地优于它所取代的工具。\n4.  它应比它所取代的工具消耗更少的能源。\n5.  如果可能，它应使用某种形式的太阳能，例如身体的能量。\n6.  一个普通智力的人，只要有必要的工具，就应该能够修复它。\n7.  它应尽可能在家附近购买和维修。\n8.  它应来自一个小型、私营的商店，该商店愿意回收它进行维护和修理。\n9.  它不应取代或破坏任何已经存在的美好事物，这包括家庭和社区关系。\n\n——1987年\n\n前文首次发表于《新英格兰评论与面包面包季刊》(New England Review and Bread Loaf Quarterly)，后在《哈泼斯杂志》(Harper's)转载。《哈泼斯杂志》的编辑们刊登了以下回应信件，并允许我作答。 W.B.\n\n# 来信\n\n温德尔·贝里为那些被电脑奴役的作家提供了一个方便的选择：妻子——一种低技术、节能的设备。把一堆手写笔记交给妻子，你就能拿回一份完成的手稿，而且在打字时就已经编辑好了。哪台电脑能做到这一点？妻子满足了贝里所有不妥协的技术创新标准：她便宜，可以在家附近修复，并且有益于家庭结构。最棒的是，妻子在政治上是正确的，因为她打破了作家对“露天开采煤矿的直接依赖”。\n\n历史告诉我们，妻子还可以用来手打地毯、手洗衣物，从而消除了对吸尘器和洗衣机的需求，这是另外两种威胁写作行为的讨厌机器。\n\n戈登·英克尔斯 (Gordon Inkeles)\n加利福尼亚州，米兰达\n\n我与贝里先生并无争执，因为他选择用铅笔和纸写作；那是他的选择。但他暗示我和其他人选择用电脑写作，在某种程度上是不纯洁的。我也不欣赏能源公司。它们的缺点不在于生产电力，而在于它们生产电力的方式。它们管理不善，因为它们对长期后果视而不见。要解决这个问题，难道纠正它们正在犯的确切错误，而不是简单地忽略它们的产品，不是更合理吗？我很乐意与贝里先生一起抗议露天开采，但我打算继续心安理得地把这台电脑插到墙上。\n\n詹姆斯·罗兹 (James Rhoads)\n密歇根州，巴特尔克里克\n\n我读贝里先生宣称永不购买个人电脑的声明时，感到很有趣，就像我读到不熟悉的部落文化的信仰体系一样。我试图想象一种能满足贝里先生标准的、优于他那台老式手动打字机的工具。显而易见的赢家是鹅毛笔。它更便宜、更小巧、更节能、人力驱动、易于修复，并且不破坏现有关系。\n\n贝里先生还要求这个工具必须“清晰且可证明地优于”它所取代的工具。但我们现在肯定都认识到，“更好”是见仁见智的。对于鹅毛笔爱好者来说，优雅书法所带来的好处很可能超过所有其他好处。\n\n我并不特别希望看到贝里先生使用文字处理器；如果他不喜欢电脑，我完全没意见。然而，我反对他将这种不情愿描绘成一种道德美德。我们中的许多人发现，电脑可以成为保护环境斗争中极其宝贵的工具。除了帮助我写作，我的个人电脑还让我能够获取美国环保署（EPA）和核工业运作的最新报告。我参与电子公告板，环保活动家们在上面讨论策略，并就紧急的立法问题相互提醒。也许贝里先生认为塞拉俱乐部（Sierra Club）应该摒弃高度浪费能源的现代印刷技术，转而让其成员每月手抄俱乐部的杂志和其他邮件？\n\n纳撒尼尔·S·博伦斯坦 (Nathaniel S. Borenstein)\n宾夕法尼亚州，匹兹堡\n\n电脑对作家的价值在于，它不是产生思想的工具，而是打字和编辑文字的工具。它比秘书（或妻子！）便宜，而且可以说更节能。它还能让那些不愿意提供免费劳动的配偶有更多时间专注于自己的工作。\n\n我们应该支持替代方案，既要替代燃煤发电，也要替代IBM式的技术统治。但我不愿意考虑那些以一个阶级对另一个阶级的传统屈从为前提的替代方案。让个人电脑普及吧，让妻子和仆人们去寻找更有意义的工作。\n\n托比·库斯曼 (Toby Koosman)\n田纳西州，诺克斯维尔\n\n贝里先生问，如果他在用电脑写作的行为中参与了对自然的蹂躏，他怎能凭良心去写反对这种蹂躏的文章。我发现具有讽刺意味的是，一位看到事物内在联系的作家，竟然允许他反对电脑的长篇檄文发表在一本刊登着全国农村电力合作社协会、万宝路、菲利普斯石油、麦道公司，甚至还有史密斯-科罗娜广告的杂志上。如果贝里先生晚上能安然入睡，他一定是服用了安眠药。\n\n布拉德利·C·约翰逊 (Bradley C. Johnson)\n北达科他州，大福克斯\n\n# 温德尔·贝里 回复\n\n前述信件所表达的情感强度令我惊讶。根据写信人的证词，他们的电脑没有任何问题；他们对电脑及其所代表的一切都完全满意。我的通信者们确信我错了，而且，我站在失败的一方，一个已经被扔进历史垃圾箱的一方。然而，他们却因为我微不足道的异议而变得傲慢和居高临下。他们到底在焦虑什么？\n\n我只能得出结论，我触及了一种技术原教旨主义的表皮，这种原教旨主义，像其他原教旨主义一样，希望垄断整个社会，因此不能容忍丝毫的意见分歧。一旦他们的自满情绪受到最轻微的威胁，他们就像一群合唱的蟾蜍，重复着他们在工业界领袖们发出的音符。过去是阴郁的、充满苦役的、卑躬屈膝的、毫无意义的和缓慢的。现在，仅仅由于可购买的产品，变得有意义、光明、生机勃勃、集中化和快速。未来，仅仅由于更多可购买的产品，将会更加美好。于是，消费者变成了推销员，世界对公司来说变得更安全了。\n\n我也对其中两位写信人提及我妻子时的刻薄感到惊讶。为了暗示我是个暴君，他们通过直接陈述和含沙射影的方式，暗示她是顺从的、没有个性的、愚蠢的——一个可以轻易被强迫提供毫无意义的“免费劳动”的“设备”。我明白，要为自己的私生活做出充分的公开辩护是不可能的，所以我只想指出，存在一些我的批评者们不屑去想象的更友善的可能性：我的妻子做这项工作可能是因为她愿意并且喜欢；她可能从中找到了一些用处和意义；她可能并非无偿工作。这些先生们显然自认为是最高尚、最有原则的女权主义者，然而他们却毫不犹豫地，仅凭一个事实，就对一位他们不认识的女性进行刻板印象化和侮辱。他们是胆大妄为、不负责任的八卦者。\n\n布拉德利·C·约翰逊在他的信中，忽略了我文章中可能存在的道理，暗示我是或应该是一个狂热分子。我在文章开头就已经充分承认，我身处这个世纪，并牵涉于许多我感到遗憾的做法中。我没有说我建议立刻结束我所有与有害技术的牵连，因为我不知道如何做到这一点。我只是说我想限制这种牵连，并且在一定程度上我知道如何做到。如果某些技术对世界造成了损害——正如上面两封信似乎都同意的那样——那么，为什么尝试限制自己对该技术的使用不是合理的，甚至是道德的呢？当然，我认为我这样做是对的。\n\n显然，如果我同意纳撒尼尔·S·博伦斯坦的观点，即“‘更好’是见仁见智的”，我就不会这么想了。但如果他真的相信这一点，我不明白他为什么还要费心去看他的个人电脑上“关于环保署和核工业运作的最新报告”，或者为什么他希望被警告“紧急的立法问题”。按照他的体系，官僚、工业或立法头脑中的“更好”和他头脑中的“更好”一样好。他的思想显然正在被某种客观标准所颠覆，他最好小心点。\n\n博伦斯坦没有说他的电脑把他唤醒后他做了什么。我从他的信中推断，他肯定会向环保组织捐款，并给官员写信。无论如何，他和詹姆斯·罗兹一样，都问心无愧。但这正是环保运动的问题所在。它问心无愧。有罪的总是别人，错误总在别处。这就是为什么博伦斯坦觉得他的“电子公告板”如此方便。对于环保运动来说，只有生产才会导致环境退化；支持生产的消费很少被承认是错误的。普通环保主义者的理想是，在不限制消费或不增加消费者良心负担的情况下，对生产施加限制。\n\n但现在我们几乎所有的消费都是奢侈的，几乎所有的消费都在消耗世界。大多数电力来自露天开采的煤炭，这一点并非无关紧要。阿巴拉契亚煤田被开采的历史很长，读者可以查阅。我不知道有谁读了这段历史后，还能问心无愧地插上任何电器的插头。如果罗兹能做到，那并不意味着他问心无愧；那意味着他的良心没有在工作。\n\n在我们目前的情况下，我们在多大程度上消费，我们就有多大程度的罪过。我们这些有罪的消费者在多大程度上是环保主义者，我们就有多大程度的荒谬。但我们能做什么呢？我们必须继续给政客写信，向环保组织捐款，直到我们的大多数同胞都同意我们吗？或者我们能直接做些什么来解决我们自己那份问题？\n\n我是一个环保主义者。我全心全意地相信要向政客施压，要维持环保组织。但我写这篇小文章，部分原因是对中心化的不信任。我不认为仅靠政府和环保组织就能使我们成为一个节约型社会。“我为什么需要一个中心化的计算机系统来提醒我环境危机？我每时每刻都生活在环境危机中，我所有的感官都知道这一点。那么，为什么我的首要责任不是尽可能地减少我自己的消费呢？\n\n最后，在我看来，我的所有通信者都没有认识到我文章的创新性。如果使用电脑是一个新想法，那么一个更新的想法就是不使用它。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"why-i-am-not-going-to-use-ai-tools\",\"slugSegments\":[\"notes\",\"date-suspects\",\"why-i-am-not-going-to-use-ai-tools\"],\"pathSegments\":[\"notes\",\"date-suspects\",\"why-i-am-not-going-to-use-ai-tools\"],\"urlPath\":\"/rosetta/notes/date-suspects/why-i-am-not-going-to-use-ai-tools\",\"href\":\"/rosetta/notes/date-suspects/why-i-am-not-going-to-use-ai-tools\",\"category\":\"date-suspects\",\"title\":\"为什么我不打算使用AI工具\",\"date\":\"2026-01-26\",\"excerpt\":\"本文仿写温德尔·贝里1987年经典文章《我为什么不打算买电脑》，将其对电脑技术的质疑迁移至当下AI工具语境。作者从能源消耗与数据伦理、企业宣传的虚妄、思考主体性的丧失以及拒绝自我麻痹四个层面阐述了不使用AI工具的理由，并提出九条引入新技术的评判标准，强调技术不应取代深度思考、人际真实 ":[\"notes\",\"missing-source-url\",\"harvard-president-letter-promise-of-american-higher-education\"]},{\"type\":\"entry\",\"title\":\"主动自觉地使用AI现已成为Shopify的基本要求\",\"href\":\"/rosetta/notes/missing-source-url/shopify-ai-as-baseline-expectation\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"shopify-ai-as-baseline-expectation\"]},{\"type\":\"entry\",\"title\":\"软件工程师的疯狂挑战\",\"href\":\"/rosetta/notes/missing-source-url/the-insanity-of-being-a-software-engineer\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"the-insanity-of-being-a-software-engineer\"]},{\"type\":\"entry\",\"title\":\"山姆·奥特曼被OpenAI解雇的真实内幕\",\"href\":\"/rosetta/notes/missing-source-url/sam-altman-fired-openai-insider-story\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"sam-altman-fired-openai-insider-story\"]},{\"type\":\"entry\",\"title\":\"为你的软件工程职业生涯做好未来规划\",\"href\":\"/rosetta/notes/missing-source-url/future-proofing-software-engineering-career\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"future-proofing-software-engineering-career\"]},{\"type\":\"entry\",\"title\":\"关于《对泛化的一个观察》的笔记\",\"href\":\"/rosetta/notes/missing-source-url/notes-on-an-observation-on-generalization\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"notes-on-an-observation-on-generalization\"]},{\"type\":\"entry\",\"title\":\"超线性回报\",\"href\":\"/rosetta/notes/missing-source-url/superlinear-returns-paul-graham\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"superlinear-returns-paul-graham\"]},{\"type\":\"entry\",\"title\":\"大师系列 - 詹姆斯·西蒙斯：用数学赚钱的秘诀与慈善之路\",\"href\":\"/rosetta/notes/missing-source-url/james-simons-making-money-with-math\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"james-simons-making-money-with-math\"]},{\"type\":\"entry\",\"title\":\"博士生涯生存指南\",\"href\":\"/rosetta/notes/missing-source-url/phd-survival-guide-andrej-karpathy\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"phd-survival-guide-andrej-karpathy\"]},{\"type\":\"entry\",\"title\":\"美国众议院党派倾向和超级合作者的兴起\",\"href\":\"/rosetta/notes/missing-source-url/rise-of-partisanship-and-super-cooperators-in-us-house\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"rise-of-partisanship-and-super-cooperators-in-us-house\"]},{\"type\":\"entry\",\"title\":\"科学研究成功的三大黄金法则\",\"href\":\"/rosetta/notes/missing-source-url/three-golden-rules-for-successful-scientific-research\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"three-golden-rules-for-successful-scientific-research\"]},{\"type\":\"entry\",\"title\":\"自动化的讽刺\",\"href\":\"/rosetta/notes/missing-source-url/ironies-of-automation\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"ironies-of-automation\"]}]}]}]},\"directoryHref\":\"/rosetta/notes/date-suspects\",\"children\":\"$L1a\"}]\n"])</script><script>self.__next_f.push([1,"1a:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本文仿写温德尔·贝里1987年经典文章《我为什么不打算买电脑》，将其对电脑技术的质疑迁移至当下AI工具语境。作者从能源消耗与数据伦理、企业宣传的虚妄、思考主体性的丧失以及拒绝自我麻痹四个层面阐述了不使用AI工具的理由，并提出九条引入新技术的评判标准，强调技术不应取代深度思考、人际真实互动与个人判断力。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"数字圈地\"}],\"：指科技巨头通过大规模抓取互联网数据来训练AI模型的行为，类比历史上的圈地运动，暗示对公共知识资源的私有化占取\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"思考主体性\"}],\"：指个体独立进行思考、判断和创作的能力与权利，作者担忧AI工具会侵蚀这种主体性，使人沦为技术的附庸\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"技术评判标准\"}],\"：作者提出的九条准则，涵盖成本、隐私、透明度、环境足迹和社会影响等维度，用以衡量是否值得引入一项新技术\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"自我麻痹\"}],\"：指人们在AI工具的便利性面前放弃审慎判断，不加反思地接受技术万能论，从而丧失对自身能力和创作过程的信心\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"仿写与致敬\"}],\"：本文在结构和论证逻辑上严格对应温德尔·贝里1987年原文，通过语境置换揭示技术焦虑的历史延续性，也邀请读者反思新旧技术批判之间的异同\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"与当下许多人一样，我置身于科技巨头构建的网络之中，但我对此并无多少崇敬之情。我希望能减少对它们的依赖。在我的思考和创作中，我努力尽可能少地受其束缚。作为思考者，我主要依赖书籍、与人的交谈以及自身的经验。作为创作者，我使用键盘敲击文字，或用笔在纸上勾画。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我的想法通过我自己的大脑进行酝酿和筛选。在写作过程中，我会反复审视、修改，这个过程缓慢而充满挣扎，但也常常带来意外的发现。这是我与自己思想最直接的对话，也是自我批判和完善的过程。有时，与朋友或同行的讨论能带来比我独自思考更深刻的洞见。我们拥有一种，我认为，缓慢但真实的智力劳动方式，它运作起来或许不高效，但足够真诚。我看不出这有什么不好。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"如今，越来越多的人告诉我，使用AI工具可以极大地提升效率和创造力。我的回答是，我不打算这么做。我有几个理由，而且都是深思熟虑的。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://substackcdn.com/image/fetch/f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F65340fb6-dbf2-49de-918f-b8d8fea77a07_1536x1024.jpeg\",\"alt\":\"\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"第一个理由源于我对这些工具背后运作方式的担忧。我讨厌想到，我的思考和创作过程，需要直接依赖于那些通过“数字圈地”抓取海量数据、能源消耗巨大的数据中心。如果我在创作的行为本身，就隐含着对他人知识产权的模糊利用、对环境的间接破坏以及对算法偏见的默认，我又怎能心安理得地探讨真理、伦理与可持续性呢？出于同样的原因，我的深度思考尽量在不依赖即时网络干扰的环境下进行，这对我来说很重要。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我对AI科技巨头的欣赏程度，并不比我对那些唯利是图的能源公司的欣赏程度高多少。我见过他们的宣传，试图让焦虑的知识工作者和创意人士相信，他们可以通过购买或订阅最新的AI服务来解决创作瓶颈或效率难题。我熟悉他们推动AI进入教育领域的宣传攻势，而这些领域往往更需要的是基础的人文关怀和批判性思维的培养。至于AI工具将在“未来”变得像智能手机一样无处不在，这并不能打动我，也与我无关。我并不认为这些工具让我们更接近任何对我而言真正重要的事物：深刻的理解、真正的创造力、人与人之间真诚的情感连接、社会的公平正义、心智的成熟与独立。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI工具会让我付出什么代价？首先，可能是持续的订阅费用，或是投入学习和适应这些工具的时间成本，这些都是我宁愿投入到更基础的阅读和思考上的资源。但代价绝不仅限于此。众所周知，强大的技术革新总是要求抛弃“旧模式”——这里的“旧模式”不仅仅是我缓慢的思考和写作习惯，更可能是我独立思考、信息辨别、深度分析的能力本身，以及在挣扎中形成独特风格和观点的过程。因此（我认为这是当前AI技术革新的典型特征），被取代的将不仅仅是一种方法，更可能是思考者本身的主体性。为了在技术上显得“与时俱进”，我可能不得不牺牲掉我所依赖并珍视的、那种在不确定性中探索的自由和形成个人判断的能力。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我不使用AI工具的最后一个，或许也是最好的理由是，我不想自我麻痹。我怀疑，并因此强烈反感这种断言：即我或任何其他人可以通过AI工具思考得更深刻、创作得更有原创性。我看不出为什么我不能对此保持审慎：当有人使用AI工具创作出了在思想深度和艺术价值上明显优于莎士比亚或爱因斯坦的作品，并且这种优越性可以明确归因于AI的使用时，那时我或许会用更严肃的态度谈论AI工具，尽管我可能仍然不会依赖它。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"为了尽可能清楚地表达我的观点，我应该给出我对在自身工作和生活中引入新技术的标准。它们如下：\"}],\"\\n\",[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"新工具从长远来看，其综合成本（包括金钱、时间、认知负荷）应低于它所取代的方式。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"它应比它所取代的方式更尊重个人隐私和数据主权。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"它所带来的成果（无论是效率还是质量），应清晰且可证明地优于不使用它时的成果，尤其是在核心价值层面（如原创性、深度、伦理考量）。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"它的能源消耗和环境足迹应低于或有助于改善现有模式。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"如果可能，它应增强而非削弱使用者的自主思考和判断能力。\"}],\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\"]}],\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\"]\n"])</script><script>self.__next_f.push([1,"1b:[\"$\",\"li\",null,{\"children\":\"它的运作机制和潜在偏见应足够透明，能够被普通使用者理解和评估。\"}]\n1c:[\"$\",\"li\",null,{\"children\":\"它的服务条款和数据使用政策应公平合理，易于用户理解和控制。\"}]\n1d:[\"$\",\"li\",null,{\"children\":\"它应来自对其社会和伦理影响负责任、并愿意接受监督的开发者或机构。\"}]\n1e:[\"$\",\"li\",null,{\"children\":\"它不应取代或侵蚀任何已经存在的美好事物，这包括深度思考的习惯、人际间的真实互动以及社区的知识共享生态。\"}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"（仿写结束）\"}]\n20:[\"$\",\"hr\",null,{}]\n21:[\"$\",\"h1\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[23px] md:text-[26px] font-bold text-text tracking-[-0.4px] mb-[22px] mt-[12px] leading-[1.2]\",\"id\":\"原文我为什么不打算买电脑1987年\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#原文我为什么不打算买电脑1987年\",\"children\":\"原文：我为什么不打算买电脑（1987年）\"}]}]\n22:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"原文链接：\",[\"$\",\"a\",null,{\"href\":\"https://classes.matthewjbrown.net/teaching-files/philtech/berry-computer.pdf\",\"children\":\"Why am I not going to buy a computer\"}]]}],\"\\n\"]}]\n23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"温德尔·贝里\"}]\n24:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"和几乎所有人一样，我依赖于能源公司，但我并不欣赏它们。我希望能减少对它们的依赖。在我的工作中，我尽量少地依赖它们。作为农民，我几乎所有的农活都用马匹完成。作为作家，我用铅笔或钢笔在纸上写作。\"}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我的妻子用一台1956年新买的皇家标准打字机打出我的作品，这台打字机至今仍和当年一样好用。在她打字时，她会发现错误，并在页边空白处用小小的勾号标记出来。她是我最好的批评家，因为她最熟悉我习惯性的错误和"])</script><script>self.__next_f.push([1,"弱点。她有时甚至比我更清楚应该表达什么。我们拥有一个，我认为，运作良好且令人愉快的文学家庭作坊。我觉得这没什么不好。\"}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"到目前为止，已经有不少人告诉我，买一台电脑可以大大改善我的工作。我的回答是，我不打算这么做。我有几个理由，而且都是充分的理由。\"}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"第一个理由就是我开头提到的那个。我讨厌想到我作为作家的工作，竟然离不开对露天开采煤矿的直接依赖。如果我在写作的行为本身就参与了对自然的蹂躏，我又怎能凭良心去写反对蹂躏自然的文章呢？出于同样的原因，我的写作是在白天完成，不用电灯，这对我来说很重要。\"}]\n28:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我对电脑制造商的欣赏程度，并不比对能源产业高多少。我见过他们的广告，试图诱使那些苦苦挣扎或濒临失败的农民相信，他们可以通过购买又一件昂贵的设备来解决问题。我熟悉他们的宣传活动，这些活动把电脑送进了需要书籍的公立学校。至于电脑在“未来”会像电视机一样普及，这并不能打动我，也与我无关。我没有电视机。我看不出电脑让我们向任何对我重要的事情靠近了一步：和平、经济正义、生态健康、政治诚信、家庭和社区的稳定、好的工作。\"}]\n29:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"一台电脑会让我付出什么代价？首先，是金钱上的代价，超出了我的承受能力，也超过了我愿意付给我不欣赏的人的数额。但代价不仅仅是金钱。众所周知，技术创新总是要求抛弃“旧模式”——这里的“旧模式”不仅指我们那台老旧的皇家标准打字机，也指我的妻子，我的批评家，我最亲近的读者，我的同事。因此（我认为这是当今技术创新的典型特征），被取代的"])</script><script>self.__next_f.push([1,"将不仅仅是某样东西，还有某个人。为了在技术上保持作家的先进性，我将不得不牺牲掉我所依赖并珍视的一种联系。\"}]\n2a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我不拥有电脑的最后一个，或许也是最好的理由是，我不想自欺欺人。我不相信，并因此强烈反感这种说法：即我或任何其他人用电脑能比用铅笔写得更好或更容易。我看不出为什么我不能像其他人一样对此持科学态度：当有人用电脑写出了明显优于但丁的作品，并且这种优越性可以明确归因于电脑的使用时，那时我才会用更尊敬的语气谈论电脑，尽管我仍然不会买一台。\"}]\n2b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"为了尽可能清楚地表达我的观点，我应该给出我对自身工作中技术创新的标准。它们如下：\"}]\n2c:[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"新工具应比它所取代的工具更便宜。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"它的规模应至少与它所取代的工具一样小。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"它所做的工作应清晰且可证明地优于它所取代的工具。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"它应比它所取代的工具消耗更少的能源。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"如果可能，它应使用某种形式的太阳能，例如身体的能量。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"一个普通智力的人，只要有必要的工具，就应该能够修复它。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"它应尽可能在家附近购买和维修。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"它应来自一个小型、私营的商店，该商店愿意回收它进行维护和修理。\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"它不应取代或破坏任何已经存在的美好事物，这包括家庭和社区关系。\"}],\"\\n\"]}]\n2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"——1987年\"}]\n2e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"前文首次发表于《新英格兰评论与面包面包"])</script><script>self.__next_f.push([1,"季刊》(New England Review and Bread Loaf Quarterly)，后在《哈泼斯杂志》(Harper's)转载。《哈泼斯杂志》的编辑们刊登了以下回应信件，并允许我作答。 W.B.\"}]\n2f:[\"$\",\"h1\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[23px] md:text-[26px] font-bold text-text tracking-[-0.4px] mb-[22px] mt-[12px] leading-[1.2]\",\"id\":\"来信\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#来信\",\"children\":\"来信\"}]}]\n30:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"温德尔·贝里为那些被电脑奴役的作家提供了一个方便的选择：妻子——一种低技术、节能的设备。把一堆手写笔记交给妻子，你就能拿回一份完成的手稿，而且在打字时就已经编辑好了。哪台电脑能做到这一点？妻子满足了贝里所有不妥协的技术创新标准：她便宜，可以在家附近修复，并且有益于家庭结构。最棒的是，妻子在政治上是正确的，因为她打破了作家对“露天开采煤矿的直接依赖”。\"}]\n31:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"历史告诉我们，妻子还可以用来手打地毯、手洗衣物，从而消除了对吸尘器和洗衣机的需求，这是另外两种威胁写作行为的讨厌机器。\"}]\n32:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"戈登·英克尔斯 (Gordon Inkeles)\\n加利福尼亚州，米兰达\"}]\n33:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我与贝里先生并无争执，因为他选择用铅笔和纸写作；那是他的选择。但他暗示我和其他人选择用电脑写作，在某种程度上是不纯洁的。我也不欣赏能源公司。它们的缺点不在于生产电力，而在于它们生产电力的方式。它们管理不善，因为它们对长期后果视而不见。要解决这个问题，难道纠正它们正在犯的确切错误，而不是简单地忽略它们的产品，不是更合理吗？我很乐意与贝里先生一起抗议露天开采，但我打算继续心安理得地把这台电脑插到墙上。"])</script><script>self.__next_f.push([1,"\"}]\n34:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"詹姆斯·罗兹 (James Rhoads)\\n密歇根州，巴特尔克里克\"}]\n35:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我读贝里先生宣称永不购买个人电脑的声明时，感到很有趣，就像我读到不熟悉的部落文化的信仰体系一样。我试图想象一种能满足贝里先生标准的、优于他那台老式手动打字机的工具。显而易见的赢家是鹅毛笔。它更便宜、更小巧、更节能、人力驱动、易于修复，并且不破坏现有关系。\"}]\n36:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"贝里先生还要求这个工具必须“清晰且可证明地优于”它所取代的工具。但我们现在肯定都认识到，“更好”是见仁见智的。对于鹅毛笔爱好者来说，优雅书法所带来的好处很可能超过所有其他好处。\"}]\n37:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我并不特别希望看到贝里先生使用文字处理器；如果他不喜欢电脑，我完全没意见。然而，我反对他将这种不情愿描绘成一种道德美德。我们中的许多人发现，电脑可以成为保护环境斗争中极其宝贵的工具。除了帮助我写作，我的个人电脑还让我能够获取美国环保署（EPA）和核工业运作的最新报告。我参与电子公告板，环保活动家们在上面讨论策略，并就紧急的立法问题相互提醒。也许贝里先生认为塞拉俱乐部（Sierra Club）应该摒弃高度浪费能源的现代印刷技术，转而让其成员每月手抄俱乐部的杂志和其他邮件？\"}]\n38:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"纳撒尼尔·S·博伦斯坦 (Nathaniel S. Borenstein)\\n宾夕法尼亚州，匹兹堡\"}]\n39:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"电脑对作家的价值在于，它不是产生思想的工具，而是打字和编辑文字的工具。它比秘书（或妻子！）便宜，而且可以说更节能。它还能让那些不愿意提供免费劳动的配偶有更多时间专注"])</script><script>self.__next_f.push([1,"于自己的工作。\"}]\n3a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们应该支持替代方案，既要替代燃煤发电，也要替代IBM式的技术统治。但我不愿意考虑那些以一个阶级对另一个阶级的传统屈从为前提的替代方案。让个人电脑普及吧，让妻子和仆人们去寻找更有意义的工作。\"}]\n3b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"托比·库斯曼 (Toby Koosman)\\n田纳西州，诺克斯维尔\"}]\n3c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"贝里先生问，如果他在用电脑写作的行为中参与了对自然的蹂躏，他怎能凭良心去写反对这种蹂躏的文章。我发现具有讽刺意味的是，一位看到事物内在联系的作家，竟然允许他反对电脑的长篇檄文发表在一本刊登着全国农村电力合作社协会、万宝路、菲利普斯石油、麦道公司，甚至还有史密斯-科罗娜广告的杂志上。如果贝里先生晚上能安然入睡，他一定是服用了安眠药。\"}]\n3d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"布拉德利·C·约翰逊 (Bradley C. Johnson)\\n北达科他州，大福克斯\"}]\n3e:[\"$\",\"h1\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[23px] md:text-[26px] font-bold text-text tracking-[-0.4px] mb-[22px] mt-[12px] leading-[1.2]\",\"id\":\"温德尔贝里-回复\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#温德尔贝里-回复\",\"children\":\"温德尔·贝里 回复\"}]}]\n3f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"前述信件所表达的情感强度令我惊讶。根据写信人的证词，他们的电脑没有任何问题；他们对电脑及其所代表的一切都完全满意。我的通信者们确信我错了，而且，我站在失败的一方，一个已经被扔进历史垃圾箱的一方。然而，他们却因为我微不足道的异议而变得傲慢和居高临下。他们到底在焦虑什么？\"}]\n40:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我只能得出结论，我触及了一种技术原教旨主义的"])</script><script>self.__next_f.push([1,"表皮，这种原教旨主义，像其他原教旨主义一样，希望垄断整个社会，因此不能容忍丝毫的意见分歧。一旦他们的自满情绪受到最轻微的威胁，他们就像一群合唱的蟾蜍，重复着他们在工业界领袖们发出的音符。过去是阴郁的、充满苦役的、卑躬屈膝的、毫无意义的和缓慢的。现在，仅仅由于可购买的产品，变得有意义、光明、生机勃勃、集中化和快速。未来，仅仅由于更多可购买的产品，将会更加美好。于是，消费者变成了推销员，世界对公司来说变得更安全了。\"}]\n41:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我也对其中两位写信人提及我妻子时的刻薄感到惊讶。为了暗示我是个暴君，他们通过直接陈述和含沙射影的方式，暗示她是顺从的、没有个性的、愚蠢的——一个可以轻易被强迫提供毫无意义的“免费劳动”的“设备”。我明白，要为自己的私生活做出充分的公开辩护是不可能的，所以我只想指出，存在一些我的批评者们不屑去想象的更友善的可能性：我的妻子做这项工作可能是因为她愿意并且喜欢；她可能从中找到了一些用处和意义；她可能并非无偿工作。这些先生们显然自认为是最高尚、最有原则的女权主义者，然而他们却毫不犹豫地，仅凭一个事实，就对一位他们不认识的女性进行刻板印象化和侮辱。他们是胆大妄为、不负责任的八卦者。\"}]\n42:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"布拉德利·C·约翰逊在他的信中，忽略了我文章中可能存在的道理，暗示我是或应该是一个狂热分子。我在文章开头就已经充分承认，我身处这个世纪，并牵涉于许多我感到遗憾的做法中。我没有说我建议立刻结束我所有与有害技术的牵连，因为我不知道如何做到这一点。我只是说我想限制这种牵连，并且在一定程度上我知道如何做到。如果"])</script><script>self.__next_f.push([1,"某些技术对世界造成了损害——正如上面两封信似乎都同意的那样——那么，为什么尝试限制自己对该技术的使用不是合理的，甚至是道德的呢？当然，我认为我这样做是对的。\"}]\n43:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"显然，如果我同意纳撒尼尔·S·博伦斯坦的观点，即“‘更好’是见仁见智的”，我就不会这么想了。但如果他真的相信这一点，我不明白他为什么还要费心去看他的个人电脑上“关于环保署和核工业运作的最新报告”，或者为什么他希望被警告“紧急的立法问题”。按照他的体系，官僚、工业或立法头脑中的“更好”和他头脑中的“更好”一样好。他的思想显然正在被某种客观标准所颠覆，他最好小心点。\"}]\n44:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"博伦斯坦没有说他的电脑把他唤醒后他做了什么。我从他的信中推断，他肯定会向环保组织捐款，并给官员写信。无论如何，他和詹姆斯·罗兹一样，都问心无愧。但这正是环保运动的问题所在。它问心无愧。有罪的总是别人，错误总在别处。这就是为什么博伦斯坦觉得他的“电子公告板”如此方便。对于环保运动来说，只有生产才会导致环境退化；支持生产的消费很少被承认是错误的。普通环保主义者的理想是，在不限制消费或不增加消费者良心负担的情况下，对生产施加限制。\"}]\n45:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"但现在我们几乎所有的消费都是奢侈的，几乎所有的消费都在消耗世界。大多数电力来自露天开采的煤炭，这一点并非无关紧要。阿巴拉契亚煤田被开采的历史很长，读者可以查阅。我不知道有谁读了这段历史后，还能问心无愧地插上任何电器的插头。如果罗兹能做到，那并不意味着他问心无愧；那意味着他的良心没有在工作。\"}]\n46:[\"$\",\"p\",null,{\"className\":\"mb"])</script><script>self.__next_f.push([1,"-6\",\"children\":\"在我们目前的情况下，我们在多大程度上消费，我们就有多大程度的罪过。我们这些有罪的消费者在多大程度上是环保主义者，我们就有多大程度的荒谬。但我们能做什么呢？我们必须继续给政客写信，向环保组织捐款，直到我们的大多数同胞都同意我们吗？或者我们能直接做些什么来解决我们自己那份问题？\"}]\n47:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我是一个环保主义者。我全心全意地相信要向政客施压，要维持环保组织。但我写这篇小文章，部分原因是对中心化的不信任。我不认为仅靠政府和环保组织就能使我们成为一个节约型社会。“我为什么需要一个中心化的计算机系统来提醒我环境危机？我每时每刻都生活在环境危机中，我所有的感官都知道这一点。那么，为什么我的首要责任不是尽可能地减少我自己的消费呢？\"}]\n48:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后，在我看来，我的所有通信者都没有认识到我文章的创新性。如果使用电脑是一个新想法，那么一个更新的想法就是不使用它。\"}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nd:null\n"])</script><script>self.__next_f.push([1,"49:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"f:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"为什么我不打算使用AI工具 | Linguista\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"本文仿写温德尔·贝里1987年经典文章《我为什么不打算买电脑》，将其对电脑技术的质疑迁移至当下AI工具语境。作者从能源消耗与数据伦理、企业宣传的虚妄、思考主体性的丧失以及拒绝自我麻痹四个层面阐述了不使用AI工具的理由，并提出九条引入新技术的评判标准，强调技术不应取代深度思考、人际真实互动与个人判断力。\"}],[\"$\",\
