为了发展思想而写作时，文笔之美与观点之正确才存在紧密联系，单纯记录或描述他人思想时则不然\n\n- 原文链接：[Good Writing](https://paulgraham.com/goodwriting.html)\n- 作者：Paul Graham\n- 时间：2025年5月\n\n写作之“好”有两层含义：其一，读来顺畅悦耳；其二，思想观点正确。它可以拥有优美流畅的句子，也可以就重要事物得出正确的结论。这两种“好”似乎并无关联，就像汽车的速度和其喷涂的颜色一样。然而，我并不这么认为。我认为，读来顺畅的文字，其观点也更可能是正确的。\n\n于是，我们便有了最激动人心的一种想法：它既看似荒谬，又似乎真实。让我们来审视一下。这怎么可能成真呢？\n\n我从写作中知道这是真的。你无法同时优化两个不相关的事物；当你将一个推向极致时，总会牺牲另一个。然而，无论我如何努力，我从未发现自己需要在听起来最好的句子和表达思想最好的句子之间做出选择。如果我真的需要选择，那么在意句子的音韵就会显得轻浮。但在实践中，这感觉与轻浮恰恰相反。修改听起来不顺的句子似乎有助于把观点理顺。\u003csup\u003e[1]\u003c/sup\u003e\n\n我所说的“正确”，不仅仅指“真实”。把观点理顺意味着将它们充分发展——得出最重要的结论，并对每个结论进行恰当程度的探讨。所以，把观点理顺不仅仅是说出真实的事情，更是说出那些*恰当的*真实事情。\n\n那么，努力让句子听起来顺畅是如何帮助你做到这一点的呢？答案的线索是我30年前在为我的第一本书排版时注意到的事情。有时候，排版文字时运气会不好。例如，某个章节会比页面多出一行。我不知道普通的排版员在这种情况下会怎么做，但我的做法是重写这一节，使其缩短一行。你可能会觉得这种随意的限制会使文字变得更糟。但我惊讶地发现，情况从未如此。我最终总是能得到我更喜欢的东西。\n\n我不认为这是因为我的写作特别粗心。我想，如果你随便指着任何人写的任何一段文字，告诉他们把它改得稍微短一点（或长一点），他们或许都能拿出更好的东西。\n\n对于这种现象，最好的类比是当你摇晃一个装满不同物体的容器。摇晃是随意的动作。或者更准确地说，这些动作并非为了让任意两个特定的物体更紧密地结合在一起。然而，反复的摇晃不可避免地会使物体发现极其巧妙的自我堆叠方式。重力不允许它们变得不那么紧密，所以任何变化都必须是向好的方向变化。\u003csup\u003e[2]\u003c/sup\u003e\n\n写作也是如此。如果你必须重写一段生涩的文字，你绝不会以一种使其不那么真实的方式去做。你无法忍受那样做，就像重力无法忍受物体向上漂浮一样。所以，思想上的任何改变都必须是向好的方向改变。\n\n一旦你思考这个问题，它就显而易见了。读起来顺畅的文字更可能是正确的，原因与一个被充分摇晃过的容器更可能被紧密填充的原因相同。但还有其他因素在起作用。听起来顺畅并不仅仅是一种随机的外部力量，让文章中的思想变得更好。它实际上帮助你把思想理顺。\n\n原因是它使文章更容易阅读。阅读流畅的文字不那么费力。这对作者有什么帮助呢？因为作者是第一个读者。当我写一篇文章时，我花在阅读上的时间远多于写作。我会把某些部分重读50或100遍，在脑海中回放其中的思想，并问自己，就像一个打磨木头的人一样：有什么不顺畅的地方吗？有什么感觉不对劲吗？文章越容易阅读，就越容易注意到是否有不顺畅之处。\n\n所以，是的，好文笔的这两种含义至少在两个方面是相关的。努力让文字听起来顺畅会让你在不自觉中修正错误，同时也有助于你有意识地修正错误；它摇晃了思想的容器，也使得错误更容易被发现。但是，既然我们已经消解了一层荒谬感，我忍不住要再增加一层。听起来顺畅仅仅是帮助你把思想理顺吗？听起来顺畅的文字本身就更可能是正确的吗？尽管听起来很疯狂，但我认为这也是真的。\n\n显然，在单个词语的层面上存在联系。英语中有很多词听起来就像它们的意思，通常是以非常微妙的方式。例如 *Glitter*（闪耀）、*Round*（圆）、*Scrape*（刮擦）、*Prim*（拘谨的）、*Cavalcade*（行列）。但好文笔的音韵更多地取决于你如何将词语组合在一起，在这个层面上也存在联系。\n\n当文字听起来顺畅时，主要是因为它有良好的节奏。但好文笔的节奏不同于音乐的节奏，也不同于诗歌的格律。它不那么规整。如果规整，它就算不上好，因为好文笔的节奏必须与其思想相匹配，而思想具有各种不同的形态。有时它们很简单，你只需陈述出来。但其他时候它们更为微妙，你需要更长、更复杂的句子来梳理出所有的含义。\n\n一篇文章是整理过的思路，就像对话是整理过的谈话一样，而思路具有自然的节奏。所以，当一篇文章听起来顺畅时，不仅仅是因为它有悦耳的节奏，更是因为它拥有其自然的节奏。这意味着你可以将把握好节奏作为理顺思想的启发式方法。这不仅仅是理论上的：优秀的作者通常会同时处理这两个问题。我常常甚至不区分这两个问题。我只是想：嗯，这听起来不对；我这里到底想说什么？\u003csup\u003e[3]\u003c/sup\u003e\n\n文字的音韵更像是飞机的外形，而不是汽车的颜色。正如凯利·约翰逊（Kelly Johnson）常说的，如果它看起来好，它就能飞得好。\n\n不过，这只适用于用来发展思想的写作。当你以其他方式获得思想，然后再写下来时——例如，你建造了某个东西，或进行了一项实验，然后就此写一篇论文——这种情况就不适用了。在这种情况下，思想更多地存在于工作本身而非文字中，所以即使思想很好，文字也可能很糟糕。教科书和科普读物中的文字也可能因为同样的原因而糟糕：作者并非在发展思想，仅仅是在描述他人的思想。只有当你为了发展思想而写作时，这两种“好”之间才存在如此紧密的联系。\n\n好吧，许多人会想，到目前为止这似乎有道理，但是骗子呢？那些能言善辩的骗子写出优美却完全虚假的东西，难道不是很常见吗？\n\n当然是。但并非没有“方法派演技”。写出优美而虚假东西的方法是，首先让自己几乎相信它。所以，就像写出优美而真实东西的人一样，你呈现的是一个完美形成的思路。不同之处在于它与现实世界的连接点。你说的是在某些错误前提下会成立的事情。如果出于某种离奇的原因，一个国家的就业岗位是固定的，那么移民就真的会抢走我们的工作。\n\n所以，说听起来更好的文字更可能是真实的，并不完全正确。听起来更好的文字更可能是*内部一致*的。如果作者是诚实的，内部一致性与真实性就会趋于一致。\n\n但是，虽然我们不能安全地断定优美的文字就是真实的，但通常可以安全地得出相反的结论：那些读起来显得笨拙的文字，通常其思想观点也是错误的。\n\n的确，好文笔的这两种含义更像是一件事物的两端。它们之间的联系并非僵硬的；好文笔之“好”不是一根硬杆，而是一根绳索，其中有多重交织的联系贯穿始终。但你很难只移动一端而不触动另一端。很难做到观点正确而听起来不正确。\n\n---\n\n**注**\n\n\u003csup\u003e[1]\u003c/sup\u003e 最接近例外的例外是，当你不得不回头在你已写好的东西中间插入一个新的观点时。这常常会打乱行文的流畅性，有时甚至是你永远无法完全修复的。但我认为这个问题的根本原因在于，思想是树状结构的，而文章是线性的。当你试图将前者硬塞进后者时，不可避免地会遇到困难。坦白说，你能侥幸成功已经很令人惊讶了。但即便如此，有时你也不得不求助于尾注。\n\n\u003csup\u003e[2]\u003c/sup\u003e 显然，如果你摇晃容器的力道足够大，里面的物体可能会变得不那么紧密。同样，如果你对写作施加一些巨大的外部约束，比如交替使用单音节和双音节词，那么思想就会开始受损。\n\n\u003csup\u003e[3]\u003c/sup\u003e 颇为离奇的是，在写这一段时就发生了这种情况。较早的一个版本与前一段有几个相同的短语，每次重读时，这种重复都让我感到困扰。当我恼火到足以去修改它时，我发现这种重复反映了潜在思想中的一个问题，于是我同时解决了这两个问题。\n\n---\n\n感谢 Jessica Livingston 和 Courtenay Pipkin 阅读了本文的草稿。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"good-writing\",\"slugSegments\":[\"notes\",\"missing-source-url\",\"good-writing\"],\"pathSegments\":[\"notes\",\"missing-source-url\",\"good-writing\"],\"urlPath\":\"/rosetta/notes/missing-source-url/good-writing\",\"href\":\"/rosetta/notes/missing-source-url/good-writing\",\"category\":\"missing-source-url\",\"title\":\"好文笔\",\"date\":\"2025-05-01\",\"excerpt\":\"Paul Graham 探讨了好文笔的两层含义——读来顺畅与思想正确——之间的深层联系。他认为这两者并非无关，而是相 heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"摇晃容器类比\"}],\"：将修改文字比作摇晃容器中的物体，随机的扰动在真实性这一重力约束下只能让思想排列得更紧密、更准确\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"思想的自然节奏\"}],\"：好文笔的节奏不同于音乐或诗歌的规整韵律，而是与思想本身的复杂形态相匹配的自然节奏\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"内部一致性与真实性\"}],\"：优美的文字更可能具备内部一致性，当作者诚实时，内部一致性就趋近于真实性\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"作者即第一读者\"}],\"：写作过程中作者花大量时间反复阅读自己的文字，流畅的文字降低阅读负担从而更容易发现思想上的瑕疵\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"发展思想的写作\"}],\"：只有为了发展思想而写作时，文笔之美与观点之正确才存在紧密联系，单纯记录或描述他人思想时则不然\"]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"原文链接：\",[\"$\",\"a\",null,{\"href\":\"https://paulgraham.com/goodwriting.html\",\"children\":\"Good Writing\"}]]}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"作者：Paul Graham\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"时间：2025年5月\"}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"写作之“好”有两层含义：其一，读来顺畅悦耳；其二，思想观点正确。它可以拥有优美流畅的句子，也可以就重要事物得出正确的结论。这两种“好”似乎并无关联，就像汽车的速度和其喷涂的颜色一样。然而，我并不这么认为。我认为，读来顺畅的文字，其观点也更可能是正确的。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"于是，我们便有了最激动人心的一种想法：它既看似荒谬，又似乎真实。让我们来审视一下。这怎么可能成真呢？\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"我从写作中知道这是真的。你无法同时优化两个不相关的事物；当你将一个推向极致时，总会牺牲另一个。然而，无论我如何努力，我从未发现自己需要在听起来最好的句子和表达思想最好的句子之间做出选择。如果我真的需要选择，那么在意句子的音韵就会显得轻浮。但在实践中，这感觉与轻浮恰恰相反。修改听起来不顺的句子似乎有助于把观点理顺。\",[\"$\",\"sup\",null,{\"children\":\"[1]\"}]]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"我所说的“正确”，不仅仅指“真实”。把观点理顺意味着将它们充分发展——得出最重要的结论，并对每个结论进行恰当程度的探讨。所以，把观点理顺不仅仅是说出真实的事情，更是说出那些\",[\"$\",\"em\",null,{\"children\":\"恰当的\"}],\"真实事情。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"那么，努力让句子听起来顺畅是如何帮助你做到这一点的呢？答案的线索是我30年前在为我的第一本书排版时注意到的事情。有时候，排版文字时运气会不好。例如，某个章节会比页面多出一行。我不知道普通的排版员在这种情况下会怎么做，但我的做法是重写这一节，使其缩短一行。你可能会觉得这种随意的限制会使文字变得更糟。但我惊讶地发现，情况从未如此。我最终总是能得到我更喜欢的东西。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我不认为这是因为我的写作特别粗心。我想，如果你随便指着任何人写的任何一段文字，告诉他们把它改得稍微短一点（或长一点），他们或许都能拿出更好的东西。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"对于这种现象，最好的类比是当你摇晃一个装满不同物体的容器。摇晃是随意的动作。或者更准确地说，这些动作并非为了让任意两个特定的物体更紧密地结合在一起。然而，反复的摇晃不可避免地会使物体发现极其巧妙的自我堆叠方式。重力不允许它们变得不那么紧密，所以任何变化都必须是向好的方向变化。\",[\"$\",\"sup\",null,{\"children\":\"[2]\"}]]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"写作也是如此。如果你必须重写一段生涩的文字，你绝不会以一种使其不那么真实的方式去做。你无法忍受那样做，就像重力无法忍受物体向上漂浮一样。所以，思想上的任何改变都必须是向好的方向改变。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"一旦你思考这个问题，它就显而易见了。读起来顺畅的文字更可能是正确的，原因与一个被充分摇晃过的容器更可能被紧密填充的原因相同。但还有其他因素在起作用。听起来顺畅并不仅仅是一种随机的外部力量，让文章中的思想变得更好。它实际上帮助你把思想理顺。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"原因是它使文章更容易阅读。阅读流畅的文字不那么费力。这对作者有什么帮助呢？因为作者是第一个读者。当我写一篇文章时，我花在阅读上的时间远多于写作。我会把某些部分重读50或100遍，在脑海中回放其中的思想，并问自己，就像一个打磨木头的人一样：有什么不顺畅的地方吗？有什么感觉不对劲吗？文章越容易阅读，就越容易注意到是否有不顺畅之处。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"所以，是的，好文笔的这两种含义至少在两个方面是相关的。努力让文字听起来顺畅会让你在不自觉中修正错误，同时也有助于你有意识地修正错误；它摇晃了思想的容器，也使得错误更容易被发现。但是，既然我们已经消解了一层荒谬感，我忍不住要再增加一层。听起来顺畅仅仅是帮助你把思想理顺吗？听起来顺畅的文字本身就更可能是正确的吗？尽管听起来很疯狂，但我认为这也是真的。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"显然，在单个词语的层面上存在联系。英语中有很多词听起来就像它们的意思，通常是以非常微妙的方式。例如 \",[\"$\",\"em\",null,{\"children\":\"Glitter\"}],\"（闪耀）、\",[\"$\",\"em\",null,{\"children\":\"Round\"}],\"（圆）、\",[\"$\",\"em\",null,{\"children\":\"Scrape\"}],\"（刮擦）、\",[\"$\",\"em\",null,{\"children\":\"Prim\"}],\"（拘谨的）、\",\"$L19\",\"（行列）。但好文笔的音韵更多地取决于你如何将词语组合在一起，在这个层面上也存在联系。\"]}],\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\"]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"em\",null,{\"children\":\"Cavalcade\"}]\n1a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"当文字听起来顺畅时，主要是因为它有良好的节奏。但好文笔的节奏不同于音乐的节奏，也不同于诗歌的格律。它不那么规整。如果规整，它就算不上好，因为好文笔的节奏必须与其思想相匹配，而思想具有各种不同的形态。有时它们很简单，你只需陈述出来。但其他时候它们更为微妙，你需要更长、更复杂的句子来梳理出所有的含义。\"}]\n1b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"一篇文章是整理过的思路，就像对话是整理过的谈话一样，而思路具有自然的节奏。所以，当一篇文章听起来顺畅时，不仅仅是因为它有悦耳的节奏，更是因为它拥有其自然的节奏。这意味着你可以将把握好节奏作为理顺思想的启发式方法。这不仅仅是理论上的：优秀的作者通常会同时处理这两个问题。我常常甚至不区分这两个问题。我只是想：嗯，这听起来不对；我这里到底想说什么？\",[\"$\",\"sup\",null,{\"children\":\"[3]\"}]]}]\n1c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"文字的音韵更像是飞机的外形，而不是汽车的颜色。正如凯利·约翰逊（Kelly Johnson）常说的，如果它看起来好，它就能飞得好。\"}]\n1d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"不过，这只适用于用来发展思想的写作。当你以其他方式获得思想，然后再写下来时——例如，你建造了某个东西，或进行了一项实验，然后就此写一篇论文——这种情况就不适用了。在这种情况下，思想更多地存在于工作本身而非文字中，所以即使思想很好，文字也可能很糟糕。教科书和科普读物中的文字也可能因为同样的原因而糟糕：作者并非在发展思想，仅仅是在描述他人的思想。只有当你为了发展思想而写作时，这两种“好”之间才存在如此紧密的联系。\"}]\n1e:[\""])</script><script>self.__next_f.push([1,"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"好吧，许多人会想，到目前为止这似乎有道理，但是骗子呢？那些能言善辩的骗子写出优美却完全虚假的东西，难道不是很常见吗？\"}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"当然是。但并非没有“方法派演技”。写出优美而虚假东西的方法是，首先让自己几乎相信它。所以，就像写出优美而真实东西的人一样，你呈现的是一个完美形成的思路。不同之处在于它与现实世界的连接点。你说的是在某些错误前提下会成立的事情。如果出于某种离奇的原因，一个国家的就业岗位是固定的，那么移民就真的会抢走我们的工作。\"}]\n20:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"所以，说听起来更好的文字更可能是真实的，并不完全正确。听起来更好的文字更可能是\",[\"$\",\"em\",null,{\"children\":\"内部一致\"}],\"的。如果作者是诚实的，内部一致性与真实性就会趋于一致。\"]}]\n21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"但是，虽然我们不能安全地断定优美的文字就是真实的，但通常可以安全地得出相反的结论：那些读起来显得笨拙的文字，通常其思想观点也是错误的。\"}]\n22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"的确，好文笔的这两种含义更像是一件事物的两端。它们之间的联系并非僵硬的；好文笔之“好”不是一根硬杆，而是一根绳索，其中有多重交织的联系贯穿始终。但你很难只移动一端而不触动另一端。很难做到观点正确而听起来不正确。\"}]\n23:[\"$\",\"hr\",null,{}]\n24:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"注\"}]}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"sup\",null,{\"children\":\"[1]\"}],\" 最接近例外的例外是，当你不得不回头在你已写好的东西中间插入一个新的观点时。这常常会打乱行文的流畅性，有时甚至是你永远无法完全修"])</script><script>self.__next_f.push([1,"复的。但我认为这个问题的根本原因在于，思想是树状结构的，而文章是线性的。当你试图将前者硬塞进后者时，不可避免地会遇到困难。坦白说，你能侥幸成功已经很令人惊讶了。但即便如此，有时你也不得不求助于尾注。\"]}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"sup\",null,{\"children\":\"[2]\"}],\" 显然，如果你摇晃容器的力道足够大，里面的物体可能会变得不那么紧密。同样，如果你对写作施加一些巨大的外部约束，比如交替使用单音节和双音节词，那么思想就会开始受损。\"]}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"sup\",null,{\"children\":\"[3]\"}],\" 颇为离奇的是，在写这一段时就发生了这种情况。较早的一个版本与前一段有几个相同的短语，每次重读时，这种重复都让我感到困扰。当我恼火到足以去修改它时，我发现这种重复反映了潜在思想中的一个问题，于是我同时解决了这两个问题。\"]}]\n28:[\"$\",\"hr\",null,{}]\n29:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"感谢 Jessica Livingston 和 Courtenay Pipkin 阅读了本文的草稿。\"}]\n"])</script><script>self.__next_f.push([1,"11:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nd:null\n"])</script><script>self.__next_f.push([1,"2a:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"f:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"好文笔 | Linguista\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Paul Graham 探讨了好文笔的两层含义——读来顺畅与思想正确——之间的深层联系。他认为这两者并非无关，而是相互促进的。努力让文字听起来顺畅，既能在不自觉中修正思想错误，也能使错误更容易被发现。好文笔的节奏必须与思想的自然节奏相匹配，因此打磨语言本身就是理顺思想的过程。\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"写作,文笔,思想,修辞,Paul Graham\"}],[\"$\",\"link\",\"3\",{\"rel\":\"canonical\",\"href\":\"https://linguista.cn/rosetta/notes/missing-source-url/good-writing/\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:title\",\"content\":\"好文笔 | Linguista\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og
