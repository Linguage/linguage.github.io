ve\",\"children\":\"\\n            window.dataLayer = window.dataLayer || [];\\n            function gtag(){dataLayer.push(arguments);}\\n            gtag('js', new Date());\\n            gtag('config', 'G-99PGBGJH4S', {\\n              anonymize_ip: true,\\n              send_page_view: true,\\n            });\\n          \"}]]}]}]]}],{\"children\":[[\"slug\",\"rosetta/notes/missing-source-url/rise-of-partisanship-and-super-cooperators-in-us-house\",\"c\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L8\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",\"$Lb\",{},null,false]},null,false]},null,false],\"$Lc\",false]],\"m\":\"$undefined\",\"G\":[\"$d\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"f:I[433,[],\"OutletBoundary\"]\n11:I[9884,[],\"AsyncMetadataOutlet\"]\n13:I[433,[],\"ViewportBoundary\"]\n15:I[433,[],\"MetadataBoundary\"]\nb:[\"$\",\"$1\",\"c\",{\"children\":[\"$Le\",null,[\"$\",\"$Lf\",null,{\"children\":[\"$L10\",[\"$\",\"$L11\",null,{\"promise\":\"$@12\"}]]}]]}]\nc:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L13\",null,{\"children\":\"$L14\"}],null],[\"$\",\"$L15\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$3\",null,{\"fallback\":null,\"children\":\"$L16\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"17:I[1203,[\"197\",\"static/chunks/197-f7c33a0114fc3db3.js\",\"373\",\"static/chunks/373-816263e744b1a0a1.js\",\"738\",\"static/chunks/738-b97c8b45db2c8cb9.js\",\"48\",\"static/chunks/app/%5B...slug%5D/page-b39f4036a39e3cb5.js\"],\"default\"]\n18:T96e4,"])</script><script>self.__next_f.push([1,"# 美国众议院党派倾向和超级合作者的兴起\n\n## 摘要\n\n本文通过构建包含超过500万对议员的网络，量化了1949年至2012年间美国众议院民主党与共和党成员之间的合作水平。研究发现美国国会的党派倾向在过去60多年里呈指数级增长，且没有减弱迹象。然而仍有一群议员持续进行跨党派合作，被称为超级合作者。研究采用网络方法替代传统线性指数，揭示了个体议员间意识形态关系的演变趋势。\n\n## 核心概念及解读\n\n**党派倾向（Partisanship）**：指政治人物严格遵循本党立场、难以与反对党合作的现象，本文通过跨党派投票一致率的下降来量化这一趋势\n\n**超级合作者（Super-Cooperators）**：在党派极化日益加剧的背景下，仍然坚持与反对党成员保持高跨党派合作率的少数议员群体\n\n**网络分析方法**：将每位议员作为节点、以投票一致率作为边权重构建网络图，用以替代传统的单一线性维度极化指数，能够揭示个体间的有机合作关系\n\n**跨党派对与同党派对**：将议员两两配对后按党派归属分为跨党派对和同党派对，通过比较两类配对在点名投票中一致次数的分布差异来衡量政党分裂程度\n\n**投票交易（Logrolling）**：议员之间以票易票的行为，是促成跨党派合作的动机之一，但因其非公开性质而难以量化\n\n- **作者列表**：\tClio Andris,\n\t David Lee,\n\tMarcus J. Hamilton,\n\tMauro Martino,\n\tChristian E. Gunning,\n\tJohn Armistead Selden\n- **文章来源：**[The Rise of Partisanship and Super-Cooperators in the U.S. House of Representatives | PLOS One](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0123507)\n\n## 摘要\n\n据广泛报道，美国国会中的党派倾向正处于历史高位。考虑到议员们既被劝说遵守党派路线，同时又有机会和动机与反对党成员合作，我们的目标是衡量立法者与反对党成员形成意识形态关系程度。我们量化了1949年至2012年间美国众议院民主党和共和党成员之间的合作（或缺乏合作）水平。我们定义了一个包含超过500万对议员的网络，并比较了两类不同议员对立法决定的共同一致率：同党派议员对和由不同党派成员组成的议员对。我们发现，尽管存在短期波动，美国国会的党派倾向或不合作现象在过去60多年里呈指数级增长，且没有减弱或逆转的迹象。然而，尽管党派倾向日益严重，仍有一群议员继续跨党派合作。\n\n\n\n## 引言\n\n今天的美国人民由那些前所未有地难以跨越党派界限合作的政治人物代表着，这导致了备受瞩目的财政和政策斗争、政府停摆以及无法解决问题或制定指导国家内政外交政策的立法 [1]。党派倾向归因于许多原因，包括美国人日益分化的财富分配 [2]；边界重新划分 [3]；初选中的活动家活动 [4]；国会程序规则的变化 [5]；美国南部的政治重组 [6]；从选举温和派议员到选举党派化议员的转变 [7]；现有议员向意识形态两极移动 [8]；以及日益政治化、无处不在的媒体 [9]。\n\n个人议员在促进党派倾向方面的作用不太清楚。党派归属显著影响着立法者的投票记录 [10], [11]，以至于在某些情况下，立法者党派归属的改变会导致投票行为立即并显著地向新政党议程重新调整 [12]。这种变化过于迅速，不能归因于同期选区意识形态的变化，这表明议员与其选区之间存在脱节。党派领导人还通过提供激励措施来确保服从，例如有可能将议员分配到受青睐的委员会，或推动议员起草的立法进入最终投票阶段，即把立法“提上议程” [13]。正如许多人所总结的 [1]，这种由党派驱动的安排具有很大的风险。\n\n尽管存在党派层面的压力，但个人议员仍有动机在特定选区地理特征相关的问题上与反对党成员投票一致，例如老龄化人口、自然资源管理、退伍军人事务或地区性问题 [14]。此外，无论党派归属如何，个人关系都可能因为发起法案、与说客互动、建立沟通信任网络、分享想法、争取倡议支持、协商条款以及分享自身的道德感和正统实践而形成。投票交易，也称为“以票易票”(logrolling)，是跨党派合作的另一个动机 [15]。尽管由于投票交易讨论并非公开信息而难以量化，但这将导致在意识形态投票上增加跨党派合作。\n\n考虑到个人被劝说遵守党派路线 [10]–[13]，同时有机会和动机与反对党成员合作 [14], [15]，我们的目标是衡量立法者与反对党成员形成意识形态关系的程度。具体来说，我们利用一份全面的数据集来揭示国会单个成员之间的合作率，该数据集记录了在特定国会会议期间，每位立法者与每一位其他立法者在点名投票决定上的同意或不同意情况。这个过程构建了一个国会代表的网络。这种网络结构已被证明可以预测未来的连任，界定国会内部社区，并描述国会会议的时间动态 [16]–[21]。\n\n在将国会代表建模为网络中的节点的研究中，节点之间基于节点间的给定相似性（例如法案共同发起或在同一委员会任职）连接边 [16]–[21]。我们根据个体点名投票记录上的相似性来连接节点，这代表了意识形态的相似性。值得注意的是，网络方法不同于流行的立法者党派倾向指数方法 [22]–[24]，因为后者需要对每个成员在单一（从自由派到保守派）线性尺度（即维度）上的主观量化。这些维度被认为有价值，因为它们与美国历史上标志性时期和事件的时间相关联 [24]。这些维度独特且具有开创性，被接受为量化极化的标准实践，因为它们是衡量政治气候的可靠指标。\n\n然而，上述方法最适合衡量整个系统的行为，而不适合发现由议员对形成的个人间一致模式。网络方法能够避免当前党派倾向衡量工具的以下考量 [22]–[24]。首先，在根据选定的重要决定向量对代表进行评分时，指数可能会被（也许不正确地）操纵以匹配事件的相关性。用于创建指数的实际投票组合以及如何将此值转换为线性值，对于非专业人士——也许甚至对于经验丰富的社会科学家——来说并不清楚。此外，极化量表似乎有一个取决于创建者主观选择的任意最小值和最大值。其次，当使用两个代表的指数值之差来描述一对代表之间的意识形态距离时，如 [24] 中所示，可能会出现虚假的相似性。在这种方法中，指数以零为中心，表示中立，而一方党派中越来越“强硬”的成员是越来越正（另一方党派是负）的数字。然而，两名温和派成员可能各自拥有零指数，但实际上可能在每一个非程序性问题上都意见不合。第三，索引方法完全由聚合度量来描述，例如成员指数的平均值作为极化指标 [22]–[24]，这模糊了个体作用。相反，网络方法利用关于每个成员投票行为的原始、非聚合数据来揭示国会中跨党派对如何形成有机关系。关于传统指数方法的更多缺点，特别是在检测群体方面的不足，在 [21] 中得到了敏锐的描述。\n\n在本文中，我们首先研究了在提议立法上与反对党代表意见一致的代表的减少情况，以及这种合作投票的缺乏如何反映了过去60年（1949-2012）党派倾向的变化。我们的结果显示了1960年代后期和1970年代早期跨党派合作相对容易的情况如何导致政党的分离以及少数推动高跨党派合作率的个人的崛起。接下来，我们讨论了合作减少与1990年代和2000年代立法效率下降之间的相关性。最后，我们结合政治气候的总体趋势、乘法增长过程、公众行为以及对美国选民的影响来解释这些发现。\n\n## 材料与方法\n\n我们使用了1949年（第81届国会开始）至2012年（第112届国会休会）（见 [表 1]）美国众议院的点名投票数据，这些数据由美国众议院议员办公室通过 Govtrak 提供 [26]，如 [27] 中所述。在点名投票中，代表选择是回应（“赞成”/“反对”）还是放弃对法案或议案的投票。弃权相对较少，并被计为“反对”，因为它们不支持立法。大多数弃权来自缺席或无法在大多数投票中投票的成员，并且没有网络连接（即不予考虑）。实质性点名投票是关于产生新法律的议题的提议行动、法案和立法，例如退伍军人福利、预算和健康保险。程序性点名投票反映了关于议程组织和时间的投票 [27]，例如休会的动议。我们不区分这些类型，尽管后者往往是全体一致的投票，并且很大程度上被排除在数据集之外。\n\n![表 1](https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.t001)\n\n[PPT](https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.t001) | [PNG](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.t001) | [TIFF](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.t001)\n\n表 1. 国会代表和投票记录摘要统计。\n\n[https://doi.org/10.1371/journal.pone.0123507.t001](https://doi.org/10.1371/journal.pone.0123507.t001)\n\n对于给定国会中所有B(n,2)种可能的代表对，我们计算他们投票方式相同的点名投票次数。当一对投票都投“赞成”/“赞成”或“反对”/“反对”时，我们计为一次一致。例如，在一次会议中，众议员A与众议员B的投票相似次数是与众议员C的五倍，这使得A-B关系的权重是A-C的五倍。结果是一个B(n,2)单元格的、加权的、无向的代表对关系图。每对被分类为“同党派”（SP）对，如果他们属于同一政党；或“跨党派”（CP）对，如果一名代表是共和党人，另一名是民主党人。独立派很少，并被视为与所有其他非独立派代表组成CP对。独立派不被列为超级合作者，因为他们倾向于与国会大多数成员组成跨党派对。代表的缺席被忽略。一致性不按总可能投票次数或其他因素进行标准化。\n\n## 结果\n\n在我们的研究的60年间，总共有3,424,343对跨党派 (CP) 对（由一名共和党人和一名民主党人组成）和2,239,357对同党派 (SP) 对（由两名民主党人或两名共和党人组成）（[表 1]）。\n\n对于每一届国会，阈值被定义为CP对和SP对点名投票一致次数的对立频率分布（即直方图）的交叉点（[图 1]）。例如，第109届国会的阈值为766次一致（[表 1]，在 [图 1] 中可见）。虽然这个值本身很大程度上取决于特定国会期间的点名投票总数，但阈值表示任何随机对如果达到这个一致次数，则同样可能是CP对或SP对。一致次数更多的对（即在右侧）更有可能是同党派（SP）对；一致次数更少的对（即在左侧）则更有可能是跨党派（CP）对（[图 1]）。在第91届国会中，CP对和SP对几乎无法区分，但如今它们明显不同（[图 1]）。为了找出个体立法者随时间变化的成对一致情况，我们构建了一个由代表（节点）组成网络，如果一对代表的投票一致率高于该特定国会的阈值，则他们之间用边连接（[图 2]）。这种配置展示了政党随时间的分裂，同时突出了每个个体。（交互式可视化可在 [S1 数据库] 中获取。）\n\n![图 1](https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.g001)\n\n[PPT](https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.g001) | [PNG](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.g001) | [TIFF](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.g001)\n\n图 1. 同党派和跨党派对随时间变化的概率密度函数。\n\n同党派 (SP) 对和跨党派 (CP) 对的点名投票一致次数的概率密度函数。图表显示了CP对和SP对一致率随时间的稳定分化。每个分布上方写着国会届数 (81-112)，接着是国会开始的年份，以及每届国会两个会期期间的点名投票总数。一致次数很少（低于持续增长的CP分布的局部最小值）的对，包括来自华盛顿特区、波多黎各的代表，已被移除。\n\n[https://doi.org/10.1371/journal.pone.0123507.g001](https://doi.org/10.1371/journal.pone.0123507.g001)\n\n![图 2](https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.g002)\n\n[PPT](https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.g002) | [PNG](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.g002) | [TIFF](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.g002)\n\n图 2. 民主党和共和党成员随时间的分裂。\n\n1949-2012年期间的每一位美国众议院议员都被描绘成一个单独的节点。共和党(R)代表用红色表示，民主党(D)代表用蓝色表示，党派归属的变化未予反映。如果一对议员的投票一致率高于该届国会的*阈值*，则他们之间用边连接。*阈值*是一致次数，达到此次数的任意一对同样可能是同党派（例如D-D或R-R），也可能是跨党派对（例如D-R）。每个节点的大小与其总连接数成正比；如果一对议员在更多投票中达成一致，则边的厚度更粗。每届两年期国会的起始年份写在网络上方。网络使用Barnes Hut优化 [33] 的线性引力线性斥力模型绘制。\n\n[https://doi.org/10.1371/journal.pone.0123507.g002](https://doi.org/10.1371/journal.pone.0123507.g002)\n\n### 合作者对\n\n高于*阈值*的跨党派 (CP) 对（[表 1]）被定义为*合作者*。这些合作者在点名投票上比随机的SP对更频繁地达成一致。从1970年代到2000年代，合作者的数量减少了两个数量级。从1967年到1979年，国会通常有超过10,000对合作者（最大值：12,921），并且至少由10%的合作者组成（最大值：13.4%），即至少10%的CP对在比SP对更多的问题上达成一致。相比之下，2001-2010年合作者少于1,500对（最小值：181），CP对中只有不到1.5%（最小值：0.2%）是合作者（[表 1]）。从纵向来看，过去60年里，国会的党派倾向/不合作以每年约5%的速度增长。CP对之间在点名投票上的平均不一致次数呈指数级增长（[图 3A]），这由 y = c0eγt 形式的指数增长模型所证实，该模型拟合良好 (*F*₃₁ = 236.22, *α* = 0.05, *R*² = 0.88, *p* \u003c 0.0001)。这条曲线很好地拟合了每届会期投票不一致次数的原始数字的指数增长。当投票不一致次数按总可能点名投票次数标准化时，趋势显示1950年代和1960年代早期不一致率很高（[S1 图]）。合作与不合作时期与 [24] 的发现一致。\n\n![图 3](https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.g003)\n\n[PPT](https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.g003) | [PNG](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.g003) | [TIFF](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.g003)\n\n图 3. 国会合作率随时间的变化。\n\n四张国会不合作随时间变化的图：(a) 跨党派 (CP) 对之间点名投票不一致的平均次数随时间的变化。(b) 合作者对（即比随机同党派 (SP) 对更频繁地达成一致的跨党派 (CP) 对）的数量随时间的变化。(c) 参与至少一对合作者对的代表数量随时间的变化。(d) 每个合作者相对于所有CP对出现的次数随时间的变化，显示了从1990年代后期至今的超级合作者。\n\n[https://doi.org/10.1371/journal.pone.0123507.g003](https://doi.org/10.1371/journal.pone.0123507.g003)\n\n### 超级合作者\n\n尽管今天合作者对相对较少（[图 3B]），但现存的合作者对由极少数个体驱动（[图 3C 和 3D]）。我们将超级合作者定义为在特定国会会议期间，至少出现在5%合作者对中的立法者。超级合作者，例如得克萨斯州民主党众议员 Ralph Hall，引导了所有合作者对的48%（参见 [S1 表] 获取86位超级合作者的详细信息）。来自北得克萨斯农村地区（最大城市：Sherman）的资深民主党众议员 Hall，在第108届国会中，通过与230名共和党人中的220人达成了高于阈值的一致，独自推动了近一半的跨党合作关系（[表 2]）。类似地，俄克拉荷马州民主党众议员 Dan Boren，其选区（最大城市：Muskogee）与 Hall 众议员的选区接壤，在第109届会期中通过与119位不同的共和党人合作，贡献了所有合作者对的42%（[表 2]）。超级合作者俄克拉荷马州民主党众议员 Dan Boren 和亚拉巴马州民主党众议员 Robert Cramer 在第109届国会中共计贡献了所有合作者对的71.4%。总共有七名议员在第110届国会中贡献了所有合作者对的98.3%（[图 3D] 和 [S1 表]）。合作大量集中在极少数立法者手中是一个新现象。1990年之前，任何一位立法者在合作者对中的最大参与率都低于5%，通常低于1%。\n\n![表 2](https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.t002)\n\n[PPT](https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.t002) | [PNG](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.t002) | [TIFF](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.t002)\n\n表 2. 各届国会中占所有合作者对至少15%的顶级超级合作者\n\n[https://doi.org/10.1371/journal.pone.0123507.t002](https://doi.org/10.1371/journal.pone.0123507.t002)\n\n大多数超级合作者是来自德克萨斯州（出现12次）、密西西比州（7次）、亚拉巴马州（5次）、路易斯安那州、印第安纳州（各出现4次）、佐治亚州、肯塔基州、俄克拉荷马州、俄亥俄州、宾夕法尼亚州和弗吉尼亚州（各出现3次）的民主党人。第104届国会（1995-1996）拥有最多的超级合作者（13位），他们全部是民主党人，主要来自南部州。共和党超级合作者主要出现在纽约州（10次）、新泽西州（5次）和马里兰州（4次），大多位于纽约市和华盛顿特区以外的郊区。这种趋势可能正在转变，因为第113届国会的初步结果显示，大多数超级合作者是来自纽约州和新泽西州的共和党代表。\n\n这少数超级合作者，他们精心挑选立法并与各党派成员合作，尽管面临被本党派疏远的威胁 [28], [29]，可能代表了当今精心代表选区的典范。这些超级合作者通过独自在分裂的党派之间开拓日益减少的联系，可能赢得了强大的声誉。\n\n### 与现有统计方法的比较\n\n我们将合作者方法生成的CP对合作率与DW-NOMINATE多维尺度方法的“极化分数”（第一维度党派均值的差值）以及“重叠度”（民主党和共和党之间的意识形态重叠度）进行比较 [25]（[S2 图]）。\n\nCP对进行合作（即出现在阈值之上）的国会会议，即1949-1983年期间，具有宽泛的合作者值范围和狭窄的极化分数域。这些国会会议位于所有CP对出现概率的50%范围内（整个范围：0.02-13.5%中的6.5-13.5%），但在“极化分数”范围中仅占20%（0.43-1.09中的0.43-0.57），这表明这些30多年的国会会议在由极化分数指数定义时难以区分（[S2A 图]）。对于1993-2011年之间的一些国会会议，情况则相反，它们出现在阈值之上的概率在相对狭窄的0.02%到2.0%之间（相对于上述范围），而极化分数则在0.73到1.09之间自由变化，因此这些年份在政治变异性上比合作者方法更能区分。本质上，本文提出的合作者方法和DW-NOMINATE极化分数对后期年份更敏感，尽管这些值相关（r2：0.73）。此外，DW-NOMINATE方法发现1951年和1953年开始的国会极化程度最低（指数分别为0.435和0.433），而合作者方法显示1973年和1979年开始的国会合作性最强，其中每位代表与反对党成员出现在阈值之上的几率为13%。\n\nDW-NOMINATE的“重叠度”统计数据与CP对出现在点名投票一致性阈值之上（即成为合作者）的概率显示出更好的相关性（r2：0.83）（[S2B 图]）。然而，合作者方法的1995-2011年的值范围很大，而重叠度方法产生的值的有效数字很少：1995-1999年测量值为0.009，2011年为0.007，2003-2011年为0.000，表明其精确度较低。这些值随时间难以区分，而合作者方法为这个范围内的国会会议分配了更多样化的值（[S2B 图]）。\n\n两种DW-NOMINATE统计数据与新的合作者统计数据的比较并不表明任何一种结果更正确。合作者方法可以为某些时间段的特征描述增加更多维度，而DW-NOMINATE统计数据在其他时间段产生更高的保真度。然而，我们认为合作者方法产生的值是*直接的概率*，可以用以下问题简单解释：任何给定的代表成为“合作者”的几率是多少？这个概率更简单，但也比DW-NOMINATE更透明，后者需要了解特征空间和成分分析来解释这些指数。相反，合作者方法提供了一个快速概览，可以应用于全球各地的代表制政府和其他投票机构。DW-NOMINATE应该作为合作者方法的补充，因为它对于检查每届国会的多个方面仍然是有益的。例如，它提供了多个描述性统计数据，而合作者方法只提供了少数几个。\n\n### 共识与公众舆论\n\n不出所料，党派倾向与立法提出和通过的失败相关。提交的法案数量（[图 4A]）、通过的法案数量（[图 4B]）以及通过的法案占提交法案的百分比（[图 4C]）随时间呈指数下降，这与合作者对减少相符 [30]。提交的法案数量似乎受不合作的负面影响最大。这种趋势令人担忧，因为不合作的增加与国会生产力的大幅下降密切相关（[图 4]）。此外，效率下降也受到提交法案数量显著减少的驱动 [30]，这表明不合作的增加扼杀了国会创新的动力。这种僵局导致了极度党派化和当前普遍的批评，认为2013年国会创造了生产力最低的记录 [31]。\n\n![图 4](https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.g004)\n\n[PPT](https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.g004) | [PNG](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.g004) | [TIFF](https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.g004)\n\n图 4. 国会生产力与合作率的关系。\n\n三张图显示了国会生产力与国会合作的关系：(a) 会议期间提交的法案数量。(b) 通过的法案数量。(c) 通过的法案与提交的法案的比例。实线表示指数拟合。数据来自 [30]。\n\n[https://doi.org/10.1371/journal.pone.0123507.g004](https://doi.org/10.1371/journal.pone.0123507.g004)\n\n此外，公众对国会的看法也同时下降，从1960年代的60%赞成率降至今天的10%赞成率 [30]，这也与国会在同一时期内日益分歧相关。我们在下文将进一步讨论这些观点。\n\n## 讨论\n\n我们的分析显示，国会党派倾向在过去60多年来呈指数级增长，并对国会生产力产生了负面影响。这在提交到议程上的法案数量稳步减少中尤为明显，表明党派倾向加剧的主要负面影响是国会创新能力的丧失。\n\n但是，为什么这种日益加剧的党派倾向模式如此强烈地出现呢？在众议院，决策和成对关系受到复杂的相互作用驱动。虽然我们的数据除了与协变量的相关性关联外，未能明确归因机制，但我们发现极化是长期指数趋势的一部分，这意味着不合作现象呈*乘法*繁殖，导致更多不合作。换句话说，今天的党派氛围可能并非近期政治分裂（例如南方民主党人 [32] 或共和党茶党团体）的产物。相反，这些团体可能是从日益增加的不合作转变中出现的，同时又助长了这种转变。因此，虽然说近期分裂的政治人物是导致党派倾向加剧的罪魁祸首是不正确的，但他们确实积极地助长了它，因为这些正是乘法系统选择的不合作人物和派系。不合作的指数增长没有放缓或逆转的迹象，因此，尽管国会在20世纪后半叶稳步变得更加不合作，但这种趋势似乎很可能在未来继续下去。\n\n这种不合作的增加导致了一个有趣的选举悖论。虽然美国选民在过去40年里一直在选择越来越党派化的代表，但公众对美国国会的看法却一直在稳步下降。这种下降 [30] 表明，选民在地方基础上投票给他们认为最能代表其日益党派化关切的、越来越党派化的代表，这使得几乎没有温和派立法者来连接各党派，以形成一个更具凝聚力的国会。当选代表在国家国会层面越来越无法合作，但他们的连任率至少达90%，这反映了集体责任的回避。选民可能认为高度党派化的候选人会“扭转局面”，使某一方党派获益。然而，根据本文所示的相关性，党派化的候选人可能缺乏通过立法所需的合作。温和派立法者在为本党立法进行谈判时可能具有竞争优势。\n\n随着时间的推移，要根本扭转不合作现象的加剧，可能需要改变地方意识形态观念（导致选择性转向较少党派化的代表），或者根本改变选民的投票方式（从关注党派问题转向关注整体效率）。当然，当前的事态似乎并未分裂潜在的合作者，因为跨党派关系在可以说是美国近代史上最动荡的时期达到了顶峰，该时期发生了多起政治暗杀事件、越南战争以及尼克松总统辞职，正如 [23]–[25] 等人所阐述的那样。可能是华盛顿特区国会社交互动减少，加上远程通讯和通勤回家乡选区增加，阻碍了代表们合作的能力。\n\n美国由435个独特的国会选区组成，每个选区都有独特的地理、经济、社区、文化和政治意识形态。曾经，这些独特的选区似乎由民主党和共和党不同意识形态组合来代表。过去，立法者表现出一种混合的理想，这些理想跨越了党派平台，使得每个人都能形成反映其独特选区和选民特殊视角的个人投票指纹。\n\n今天，尽管选区可能和过去一样在社会经济和地理上独一无二，但代表们几乎失去了其与个人化选区相辅相成的个人投票记录。相反，今天的美国人民由政治人物代表，他们在国会中的意识形态点名投票记录通常只类似*两种*类型：共和党平台或民主党平台，很少有组合。这种前所未有的高度党派化将对未来美国的内政外交政策产生何种影响，尚有待观察。这项工作主要在圣达菲研究所完成。\n\n## 致谢\n\n本文报告的数据来自美国众议院议员办公室，通过Govtrak访问了国会图书馆在线汤玛斯系统。感谢约翰·坦普尔顿基金会、麻省理工学院Senseable城市实验室、国防科学与工程研究生奖学金（NDSEG Fellowship）和洛克菲勒研究所的支持。作者感谢我们的四位有益的审稿人和两位学术编辑，特别是Rodrigo Huerta-Quintanilla博士。感谢Thomas Ding和Wei Luo协助收集数据；Brian King、Luis M.A. Bettencourt和Chris Wood的讨论；以及Nathan Frey、Leon Andris和Deryck Holdsworth在内容编辑方面的建议协助。\n\n## 作者贡献\n\n构思并设计实验: CA MJH. 进行实验: CA CEG MJH. 分析数据: CA DL CEG MJH MM JAS. 贡献试剂/材料/分析工具: DL CA. 撰写论文: JAS CA DL MJH. 设计交互式网站: MM.\n\n## 参考文献\n\n- 1. Snowe O. The effect of modern partisanship on legislative effectiveness 变趋势。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"党派倾向（Partisanship）\"}],\"：指政治人物严格遵循本党立场、难以与反对党合作的现象，本文通过跨党派投票一致率的下降来量化这一趋势\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"超级合作者（Super-Cooperators）\"}],\"：在党派极化日益加剧的背景下，仍然坚持与反对党成员保持高跨党派合作率的少数议员群体\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"网络分析方法\"}],\"：将每位议员作为节点、以投票一致率作为边权重构建网络图，用以替代传统的单一线性维度极化指数，能够揭示个体间的有机合作关系\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"跨党派对与同党派对\"}],\"：将议员两两配对后按党派归属分为跨党派对和同党派对，通过比较两类配对在点名投票中一致次数的分布差异来衡量政党分裂程度\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"投票交易（Logrolling）\"}],\"：议员之间以票易票的行为，是促成跨党派合作的动机之一，但因其非公开性质而难以量化\"]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"作者列表\"}],\"：\\tClio Andris,\\nDavid Lee,\\nMarcus J. Hamilton,\\nMauro Martino,\\nChristian E. Gunning,\\nJohn Armistead Selden\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"文章来源：\"}],[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0123507\",\"children\":\"The Rise of Partisanship and Super-Cooperators in the U.S. House of Representatives | PLOS One\"}]]}],\"\\n\"]}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要-1\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要-1\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"据广泛报道，美国国会中的党派倾向正处于历史高位。考虑到议员们既被劝说遵守党派路线，同时又有机会和动机与反对党成员合作，我们的目标是衡量立法者与反对党成员形成意识形态关系程度。我们量化了1949年至2012年间美国众议院民主党和共和党成员之间的合作（或缺乏合作）水平。我们定义了一个包含超过500万对议员的网络，并比较了两类不同议员对立法决定的共同一致率：同党派议员对和由不同党派成员组成的议员对。我们发现，尽管存在短期波动，美国国会的党派倾向或不合作现象在过去60多年里呈指数级增长，且没有减弱或逆转的迹象。然而，尽管党派倾向日益严重，仍有一群议员继续跨党派合作。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"引言\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#引言\",\"children\":\"引言\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"今天的美国人民由那些前所未有地难以跨越党派界限合作的政治人物代表着，这导致了备受瞩目的财政和政策斗争、政府停摆以及无法解决问题或制定指导国家内政外交政策的立法 [1]。党派倾向归因于许多原因，包括美国人日益分化的财富分配 [2]；边界重新划分 [3]；初选中的活动家活动 [4]；国会程序规则的变化 [5]；美国南部的政治重组 [6]；从选举温和派议员到选举党派化议员的转变 [7]；现有议员向意识形态两极移动 [8]；以及日益政治化、无处不在的媒体 [9]。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"个人议员在促进党派倾向方面的作用不太清楚。党派归属显著影响着立法者的投票记录 [10], [11]，以至于在某些情况下，立法者党派归属的改变会导致投票行为立即并显著地向新政党议程重新调整 [12]。这种变化过于迅速，不能归因于同期选区意识形态的变化，这表明议员与其选区之间存在脱节。党派领导人还通过提供激励措施来确保服从，例如有可能将议员分配到受青睐的委员会，或推动议员起草的立法进入最终投票阶段，即把立法“提上议程” [13]。正如许多人所总结的 [1]，这种由党派驱动的安排具有很大的风险。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"尽管存在党派层面的压力，但个人议员仍有动机在特定选区地理特征相关的问题上与反对党成员投票一致，例如老龄化人口、自然资源管理、退伍军人事务或地区性问题 [14]。此外，无论党派归属如何，个人关系都可能因为发起法案、与说客互动、建立沟通信任网络、分享想法、争取倡议支持、协商条款以及分享自身的道德感和正统实践而形成。投票交易，也称为“以票易票”(logrolling)，是跨党派合作的另一个动机 [15]。尽管由于投票交易讨论并非公开信息而难以量化，但这将导致在意识形态投票上增加跨党派合作。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"考虑到个人被劝说遵守党派路线 [10]–[13]，同时有机会和动机与反对党成员合作 [14], [15]，我们的目标是衡量立法者与反对党成员形成意识形态关系的程度。具体来说，我们利用一份全面的数据集来揭示国会单个成员之间的合作率，该数据集记录了在特定国会会议期间，每位立法者与每一位其他立法者在点名投票决定上的同意或不同意情况。这个过程构建了一个国会代表的网络。这种网络结构已被证明可以预测未来的连任，界定国会内部社区，并描述国会会议的时间动态 [16]–[21]。\"}],\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\",\"\\n\",\"$L4b\",\"\\n\",\"$L4c\",\"\\n\",\"$L4d\",\"\\n\",\"$L4e\",\"\\n\",\"$L4f\",\"\\n\",\"$L50\",\"\\n\",\"$L51\",\"\\n\",\"$L52\",\"\\n\",\"$L53\",\"\\n\",\"$L54\",\"\\n\",\"$L55\",\"\\n\",\"$L56\",\"\\n\",\"$L57\",\"\\n\",\"$L58\",\"\\n\",\"$L59\",\"\\n\",\"$L5a\",\"\\n\",\"$L5b\",\"\\n\",\"$L5c\",\"\\n\",\"$L5d\",\"\\n\",\"$L5e\",\"\\n\",\"$L5f\",\"\\n\",\"$L60\",\"\\n\",\"$L61\",\"\\n\",\"$L62\"]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在将国会代表建模为网络中的节点的研究中，节点之间基于节点间的给定相似性（例如法案共同发起或在同一委员会任职）连接边 [16]–[21]。我们根据个体点名投票记录上的相似性来连接节点，这代表了意识形态的相似性。值得注意的是，网络方法不同于流行的立法者党派倾向指数方法 [22]–[24]，因为后者需要对每个成员在单一（从自由派到保守派）线性尺度（即维度）上的主观量化。这些维度被认为有价值，因为它们与美国历史上标志性时期和事件的时间相关联 [24]。这些维度独特且具有开创性，被接受为量化极化的标准实践，因为它们是衡量政治气候的可靠指标。\"}]\n1b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"然而，上述方法最适合衡量整个系统的行为，而不适合发现由议员对形成的个人间一致模式。网络方法能够避免当前党派倾向衡量工具的以下考量 [22]–[24]。首先，在根据选定的重要决定向量对代表进行评分时，指数可能会被（也许不正确地）操纵以匹配事件的相关性。用于创建指数的实际投票组合以及如何将此值转换为线性值，对于非专业人士——也许甚至对于经验丰富的社会科学家——来说并不清楚。此外，极化量表似乎有一个取决于创建者主观选择的任意最小值和最大值。其次，当使用两个代表的指数值之差来描述一对代表之间的意识形态距离时，如 [24] 中所示，可能会出现虚假的相似性。在这种方法中，指数以零为中心，表示中立，而一方党派中越来越“强硬”的成员是越来越正（另一方党派是负）的数字。然而，两名温和派成员可能各自拥有零指数，但实际上可能在每一个非程序性问题上都意见不合。第三，索引方法完全由聚合度量来描述，例如成员指数的平均值作为极化指"])</script><script>self.__next_f.push([1,"标 [22]–[24]，这模糊了个体作用。相反，网络方法利用关于每个成员投票行为的原始、非聚合数据来揭示国会中跨党派对如何形成有机关系。关于传统指数方法的更多缺点，特别是在检测群体方面的不足，在 [21] 中得到了敏锐的描述。\"}]\n1c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在本文中，我们首先研究了在提议立法上与反对党代表意见一致的代表的减少情况，以及这种合作投票的缺乏如何反映了过去60年（1949-2012）党派倾向的变化。我们的结果显示了1960年代后期和1970年代早期跨党派合作相对容易的情况如何导致政党的分离以及少数推动高跨党派合作率的个人的崛起。接下来，我们讨论了合作减少与1990年代和2000年代立法效率下降之间的相关性。最后，我们结合政治气候的总体趋势、乘法增长过程、公众行为以及对美国选民的影响来解释这些发现。\"}]\n1d:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"材料与方法\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#材料与方法\",\"children\":\"材料与方法\"}]}]\n1e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们使用了1949年（第81届国会开始）至2012年（第112届国会休会）（见 [表 1]）美国众议院的点名投票数据，这些数据由美国众议院议员办公室通过 Govtrak 提供 [26]，如 [27] 中所述。在点名投票中，代表选择是回应（“赞成”/“反对”）还是放弃对法案或议案的投票。弃权相对较少，并被计为“反对”，因为它们不支持立法。大多数弃权来自缺席或无法在大多数投票中投票的成员，并且没有网络连接（即不予考虑）。实质性点名投票是关于产生新法律的议题的提议行动、法案和立法，例如退伍军人福利、预算和健康保险。程序性"])</script><script>self.__next_f.push([1,"点名投票反映了关于议程组织和时间的投票 [27]，例如休会的动议。我们不区分这些类型，尽管后者往往是全体一致的投票，并且很大程度上被排除在数据集之外。\"}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.t001\",\"alt\":\"表 1\"}]}]\n20:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.t001\",\"children\":\"PPT\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.t001\",\"children\":\"PNG\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.t001\",\"children\":\"TIFF\"}]]}]\n21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"表 1. 国会代表和投票记录摘要统计。\"}]\n22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://doi.org/10.1371/journal.pone.0123507.t001\",\"children\":\"https://doi.org/10.1371/journal.pone.0123507.t001\"}]}]\n23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"对于给定国会中所有B(n,2)种可能的代表对，我们计算他们投票方式相同的点名投票次数。当一对投票都投“赞成”/“赞成”或“反对”/“反对”时，我们计为一次一致。例如，在一次会议中，众议员A与众议员B的投票相似次数是与众议员C的五倍，这使得A-B关系的权重是A-C的五倍。结果是一个B(n,2)单元格的、加权的、无向的代表对关系图。每对被分类为“同党派”（SP）对，如果他们属于同一政党；或“跨党派”（CP）对，如果一名代表是共和党人，另一名是民主党人。独立派很少，并被视为与所有其他非独立派代表组成CP对。独立派不被列"])</script><script>self.__next_f.push([1,"为超级合作者，因为他们倾向于与国会大多数成员组成跨党派对。代表的缺席被忽略。一致性不按总可能投票次数或其他因素进行标准化。\"}]\n24:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"结果\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#结果\",\"children\":\"结果\"}]}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在我们的研究的60年间，总共有3,424,343对跨党派 (CP) 对（由一名共和党人和一名民主党人组成）和2,239,357对同党派 (SP) 对（由两名民主党人或两名共和党人组成）（[表 1]）。\"}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"对于每一届国会，阈值被定义为CP对和SP对点名投票一致次数的对立频率分布（即直方图）的交叉点（[图 1]）。例如，第109届国会的阈值为766次一致（[表 1]，在 [图 1] 中可见）。虽然这个值本身很大程度上取决于特定国会期间的点名投票总数，但阈值表示任何随机对如果达到这个一致次数，则同样可能是CP对或SP对。一致次数更多的对（即在右侧）更有可能是同党派（SP）对；一致次数更少的对（即在左侧）则更有可能是跨党派（CP）对（[图 1]）。在第91届国会中，CP对和SP对几乎无法区分，但如今它们明显不同（[图 1]）。为了找出个体立法者随时间变化的成对一致情况，我们构建了一个由代表（节点）组成网络，如果一对代表的投票一致率高于该特定国会的阈值，则他们之间用边连接（[图 2]）。这种配置展示了政党随时间的分裂，同时突出了每个个体。（交互式可视化可在 [S1 数据库] 中获取。）\"}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.g001\",\"alt\":\"图 1\"}]}"])</script><script>self.__next_f.push([1,"]\n28:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.g001\",\"children\":\"PPT\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.g001\",\"children\":\"PNG\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.g001\",\"children\":\"TIFF\"}]]}]\n29:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"图 1. 同党派和跨党派对随时间变化的概率密度函数。\"}]\n2a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"同党派 (SP) 对和跨党派 (CP) 对的点名投票一致次数的概率密度函数。图表显示了CP对和SP对一致率随时间的稳定分化。每个分布上方写着国会届数 (81-112)，接着是国会开始的年份，以及每届国会两个会期期间的点名投票总数。一致次数很少（低于持续增长的CP分布的局部最小值）的对，包括来自华盛顿特区、波多黎各的代表，已被移除。\"}]\n2b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://doi.org/10.1371/journal.pone.0123507.g001\",\"children\":\"https://doi.org/10.1371/journal.pone.0123507.g001\"}]}]\n2c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.g002\",\"alt\":\"图 2\"}]}]\n2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.g002\",\"children\":\"PPT\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.g002\",\"children\":\"PNG\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.13"])</script><script>self.__next_f.push([1,"71/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.g002\",\"children\":\"TIFF\"}]]}]\n2e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"图 2. 民主党和共和党成员随时间的分裂。\"}]\n2f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"1949-2012年期间的每一位美国众议院议员都被描绘成一个单独的节点。共和党(R)代表用红色表示，民主党(D)代表用蓝色表示，党派归属的变化未予反映。如果一对议员的投票一致率高于该届国会的\",[\"$\",\"em\",null,{\"children\":\"阈值\"}],\"，则他们之间用边连接。\",[\"$\",\"em\",null,{\"children\":\"阈值\"}],\"是一致次数，达到此次数的任意一对同样可能是同党派（例如D-D或R-R），也可能是跨党派对（例如D-R）。每个节点的大小与其总连接数成正比；如果一对议员在更多投票中达成一致，则边的厚度更粗。每届两年期国会的起始年份写在网络上方。网络使用Barnes Hut优化 [33] 的线性引力线性斥力模型绘制。\"]}]\n30:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://doi.org/10.1371/journal.pone.0123507.g002\",\"children\":\"https://doi.org/10.1371/journal.pone.0123507.g002\"}]}]\n31:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"合作者对\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#合作者对\",\"children\":\"合作者对\"}]}]\n"])</script><script>self.__next_f.push([1,"32:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"高于\",[\"$\",\"em\",null,{\"children\":\"阈值\"}],\"的跨党派 (CP) 对（[表 1]）被定义为\",[\"$\",\"em\",null,{\"children\":\"合作者\"}],\"。这些合作者在点名投票上比随机的SP对更频繁地达成一致。从1970年代到2000年代，合作者的数量减少了两个数量级。从1967年到1979年，国会通常有超过10,000对合作者（最大值：12,921），并且至少由10%的合作者组成（最大值：13.4%），即至少10%的CP对在比SP对更多的问题上达成一致。相比之下，2001-2010年合作者少于1,500对（最小值：181），CP对中只有不到1.5%（最小值：0.2%）是合作者（[表 1]）。从纵向来看，过去60年里，国会的党派倾向/不合作以每年约5%的速度增长。CP对之间在点名投票上的平均不一致次数呈指数级增长（[图 3A]），这由 y = c0eγt 形式的指数增长模型所证实，该模型拟合良好 (\",[\"$\",\"em\",null,{\"children\":\"F\"}],\"₃₁ = 236.22, \",[\"$\",\"em\",null,{\"children\":\"α\"}],\" = 0.05, \",[\"$\",\"em\",null,{\"children\":\"R\"}],\"² = 0.88, \",[\"$\",\"em\",null,{\"children\":\"p\"}],\" \u003c 0.0001)。这条曲线很好地拟合了每届会期投票不一致次数的原始数字的指数增长。当投票不一致次数按总可能点名投票次数标准化时，趋势显示1950年代和1960年代早期不一致率很高（[S1 图]）。合作与不合作时期与 [24] 的发现一致。\"]}]\n"])</script><script>self.__next_f.push([1,"33:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.g003\",\"alt\":\"图 3\"}]}]\n34:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.g003\",\"children\":\"PPT\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.g003\",\"children\":\"PNG\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.g003\",\"children\":\"TIFF\"}]]}]\n35:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"图 3. 国会合作率随时间的变化。\"}]\n36:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"四张国会不合作随时间变化的图：(a) 跨党派 (CP) 对之间点名投票不一致的平均次数随时间的变化。(b) 合作者对（即比随机同党派 (SP) 对更频繁地达成一致的跨党派 (CP) 对）的数量随时间的变化。(c) 参与至少一对合作者对的代表数量随时间的变化。(d) 每个合作者相对于所有CP对出现的次数随时间的变化，显示了从1990年代后期至今的超级合作者。\"}]\n37:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://doi.org/10.1371/journal.pone.0123507.g003\",\"children\":\"https://doi.org/10.1371/journal.pone.0123507.g003\"}]}]\n38:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"超级合作者\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#超级合作者\",\"children\":\"超级合作者\"}]}]\n39:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"尽管今天合作者对相对较少（[图 3B]），但现存的合作者对由极少数个体驱动（[图 3C 和 3D]）。我们将超"])</script><script>self.__next_f.push([1,"级合作者定义为在特定国会会议期间，至少出现在5%合作者对中的立法者。超级合作者，例如得克萨斯州民主党众议员 Ralph Hall，引导了所有合作者对的48%（参见 [S1 表] 获取86位超级合作者的详细信息）。来自北得克萨斯农村地区（最大城市：Sherman）的资深民主党众议员 Hall，在第108届国会中，通过与230名共和党人中的220人达成了高于阈值的一致，独自推动了近一半的跨党合作关系（[表 2]）。类似地，俄克拉荷马州民主党众议员 Dan Boren，其选区（最大城市：Muskogee）与 Hall 众议员的选区接壤，在第109届会期中通过与119位不同的共和党人合作，贡献了所有合作者对的42%（[表 2]）。超级合作者俄克拉荷马州民主党众议员 Dan Boren 和亚拉巴马州民主党众议员 Robert Cramer 在第109届国会中共计贡献了所有合作者对的71.4%。总共有七名议员在第110届国会中贡献了所有合作者对的98.3%（[图 3D] 和 [S1 表]）。合作大量集中在极少数立法者手中是一个新现象。1990年之前，任何一位立法者在合作者对中的最大参与率都低于5%，通常低于1%。\"}]\n3a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.t002\",\"alt\":\"表 2\"}]}]\n3b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.t002\",\"children\":\"PPT\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.t002\",\"children\":\"PNG\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.t002\",\"children\":\"TIFF\"}]]}]\n3c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":"])</script><script>self.__next_f.push([1,"\"表 2. 各届国会中占所有合作者对至少15%的顶级超级合作者\"}]\n3d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://doi.org/10.1371/journal.pone.0123507.t002\",\"children\":\"https://doi.org/10.1371/journal.pone.0123507.t002\"}]}]\n3e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"大多数超级合作者是来自德克萨斯州（出现12次）、密西西比州（7次）、亚拉巴马州（5次）、路易斯安那州、印第安纳州（各出现4次）、佐治亚州、肯塔基州、俄克拉荷马州、俄亥俄州、宾夕法尼亚州和弗吉尼亚州（各出现3次）的民主党人。第104届国会（1995-1996）拥有最多的超级合作者（13位），他们全部是民主党人，主要来自南部州。共和党超级合作者主要出现在纽约州（10次）、新泽西州（5次）和马里兰州（4次），大多位于纽约市和华盛顿特区以外的郊区。这种趋势可能正在转变，因为第113届国会的初步结果显示，大多数超级合作者是来自纽约州和新泽西州的共和党代表。\"}]\n3f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这少数超级合作者，他们精心挑选立法并与各党派成员合作，尽管面临被本党派疏远的威胁 [28], [29]，可能代表了当今精心代表选区的典范。这些超级合作者通过独自在分裂的党派之间开拓日益减少的联系，可能赢得了强大的声誉。\"}]\n40:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"与现有统计方法的比较\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#与现有统计方法的比较\",\"children\":\"与现有统计方法的比较\"}]}]\n41:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们将合作者方法生成的CP对合作率与DW-NOMINATE多维尺度方法的“极化分数”（第一维度党派均值的差值）以及“重叠度”（民主党和共和党之间的意识形"])</script><script>self.__next_f.push([1,"态重叠度）进行比较 [25]（[S2 图]）。\"}]\n42:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"CP对进行合作（即出现在阈值之上）的国会会议，即1949-1983年期间，具有宽泛的合作者值范围和狭窄的极化分数域。这些国会会议位于所有CP对出现概率的50%范围内（整个范围：0.02-13.5%中的6.5-13.5%），但在“极化分数”范围中仅占20%（0.43-1.09中的0.43-0.57），这表明这些30多年的国会会议在由极化分数指数定义时难以区分（[S2A 图]）。对于1993-2011年之间的一些国会会议，情况则相反，它们出现在阈值之上的概率在相对狭窄的0.02%到2.0%之间（相对于上述范围），而极化分数则在0.73到1.09之间自由变化，因此这些年份在政治变异性上比合作者方法更能区分。本质上，本文提出的合作者方法和DW-NOMINATE极化分数对后期年份更敏感，尽管这些值相关（r2：0.73）。此外，DW-NOMINATE方法发现1951年和1953年开始的国会极化程度最低（指数分别为0.435和0.433），而合作者方法显示1973年和1979年开始的国会合作性最强，其中每位代表与反对党成员出现在阈值之上的几率为13%。\"}]\n43:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"DW-NOMINATE的“重叠度”统计数据与CP对出现在点名投票一致性阈值之上（即成为合作者）的概率显示出更好的相关性（r2：0.83）（[S2B 图]）。然而，合作者方法的1995-2011年的值范围很大，而重叠度方法产生的值的有效数字很少：1995-1999年测量值为0.009，2011年为0.007，2003-2011年为0.000，表明其精确度较低。这些值随时间难以区分，而合作者方法为这个范围内的国会会议分配了更多样化的值（[S2B 图]）。\"}]\n44:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"两种DW-NOMINATE统计数据与新的合作者统计数据的比较并不表明任何一种结果更正确。合作者方法可以为某些时间段的特征描述增加更多"])</script><script>self.__next_f.push([1,"维度，而DW-NOMINATE统计数据在其他时间段产生更高的保真度。然而，我们认为合作者方法产生的值是\",[\"$\",\"em\",null,{\"children\":\"直接的概率\"}],\"，可以用以下问题简单解释：任何给定的代表成为“合作者”的几率是多少？这个概率更简单，但也比DW-NOMINATE更透明，后者需要了解特征空间和成分分析来解释这些指数。相反，合作者方法提供了一个快速概览，可以应用于全球各地的代表制政府和其他投票机构。DW-NOMINATE应该作为合作者方法的补充，因为它对于检查每届国会的多个方面仍然是有益的。例如，它提供了多个描述性统计数据，而合作者方法只提供了少数几个。\"]}]\n45:[\"$\",\"h3\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[16px] md:text-[17px] font-bold text-text mb-[11px] tracking-wide mt-[24px] leading-[1.32]\",\"id\":\"共识与公众舆论\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#共识与公众舆论\",\"children\":\"共识与公众舆论\"}]}]\n46:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"不出所料，党派倾向与立法提出和通过的失败相关。提交的法案数量（[图 4A]）、通过的法案数量（[图 4B]）以及通过的法案占提交法案的百分比（[图 4C]）随时间呈指数下降，这与合作者对减少相符 [30]。提交的法案数量似乎受不合作的负面影响最大。这种趋势令人担忧，因为不合作的增加与国会生产力的大幅下降密切相关（[图 4]）。此外，效率下降也受到提交法案数量显著减少的驱动 [30]，这表明不合作的增加扼杀了国会创新的动力。这种僵局导致了极度党派化和当前普遍的批评，认为2013年国会创造了生产力最低的记录 [31]。\"}]\n47:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://journals.plos.org/plosone/article/figure/image?size=inline\u0026id=10.1371/journal.pone.0123507.g004\",\"alt\":\"图 4\"}]}]\n48:[\"$\",\"p\",null,{\"className\":\"m"])</script><script>self.__next_f.push([1,"b-6\",\"children\":[[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/powerpoint?id=10.1371/journal.pone.0123507.g004\",\"children\":\"PPT\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=large\u0026id=10.1371/journal.pone.0123507.g004\",\"children\":\"PNG\"}],\" | \",[\"$\",\"a\",null,{\"href\":\"https://journals.plos.org/plosone/article?id=10.1371/article/figure/image?download\u0026size=original\u0026id=10.1371/journal.pone.0123507.g004\",\"children\":\"TIFF\"}]]}]\n49:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"图 4. 国会生产力与合作率的关系。\"}]\n4a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"三张图显示了国会生产力与国会合作的关系：(a) 会议期间提交的法案数量。(b) 通过的法案数量。(c) 通过的法案与提交的法案的比例。实线表示指数拟合。数据来自 [30]。\"}]\n4b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"a\",null,{\"href\":\"https://doi.org/10.1371/journal.pone.0123507.g004\",\"children\":\"https://doi.org/10.1371/journal.pone.0123507.g004\"}]}]\n4c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"此外，公众对国会的看法也同时下降，从1960年代的60%赞成率降至今天的10%赞成率 [30]，这也与国会在同一时期内日益分歧相关。我们在下文将进一步讨论这些观点。\"}]\n4d:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"讨论\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#讨论\",\"children\":\"讨论\"}]}]\n4e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们的分析显示，国会党派倾向在过去60多年来呈指数级增长，并对国会生产力产生了负面影响。这在提交到议程上的法案数量稳步减少中尤为明显，表明党派倾向加剧的主要负面影响是国会创新能力的丧失。\"}]\n4f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"但是，为什么这种"])</script><script>self.__next_f.push([1,"日益加剧的党派倾向模式如此强烈地出现呢？在众议院，决策和成对关系受到复杂的相互作用驱动。虽然我们的数据除了与协变量的相关性关联外，未能明确归因机制，但我们发现极化是长期指数趋势的一部分，这意味着不合作现象呈\",[\"$\",\"em\",null,{\"children\":\"乘法\"}],\"繁殖，导致更多不合作。换句话说，今天的党派氛围可能并非近期政治分裂（例如南方民主党人 [32] 或共和党茶党团体）的产物。相反，这些团体可能是从日益增加的不合作转变中出现的，同时又助长了这种转变。因此，虽然说近期分裂的政治人物是导致党派倾向加剧的罪魁祸首是不正确的，但他们确实积极地助长了它，因为这些正是乘法系统选择的不合作人物和派系。不合作的指数增长没有放缓或逆转的迹象，因此，尽管国会在20世纪后半叶稳步变得更加不合作，但这种趋势似乎很可能在未来继续下去。\"]}]\n50:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这种不合作的增加导致了一个有趣的选举悖论。虽然美国选民在过去40年里一直在选择越来越党派化的代表，但公众对美国国会的看法却一直在稳步下降。这种下降 [30] 表明，选民在地方基础上投票给他们认为最能代表其日益党派化关切的、越来越党派化的代表，这使得几乎没有温和派立法者来连接各党派，以形成一个更具凝聚力的国会。当选代表在国家国会层面越来越无法合作，但他们的连任率至少达90%，这反映了集体责任的回避。选民可能认为高度党派化的候选人会“扭转局面”，使某一方党派获益。然而，根据本文所示的相关性，党派化的候选人可能缺乏通过立法所需的合作。温和派立法者在为本党立法进行谈判时可能具有竞争优势。\"}]\n51:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"随着时间的推移，要根本扭转不合作现象的加"])</script><script>self.__next_f.push([1,"剧，可能需要改变地方意识形态观念（导致选择性转向较少党派化的代表），或者根本改变选民的投票方式（从关注党派问题转向关注整体效率）。当然，当前的事态似乎并未分裂潜在的合作者，因为跨党派关系在可以说是美国近代史上最动荡的时期达到了顶峰，该时期发生了多起政治暗杀事件、越南战争以及尼克松总统辞职，正如 [23]–[25] 等人所阐述的那样。可能是华盛顿特区国会社交互动减少，加上远程通讯和通勤回家乡选区增加，阻碍了代表们合作的能力。\"}]\n52:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"美国由435个独特的国会选区组成，每个选区都有独特的地理、经济、社区、文化和政治意识形态。曾经，这些独特的选区似乎由民主党和共和党不同意识形态组合来代表。过去，立法者表现出一种混合的理想，这些理想跨越了党派平台，使得每个人都能形成反映其独特选区和选民特殊视角的个人投票指纹。\"}]\n53:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"今天，尽管选区可能和过去一样在社会经济和地理上独一无二，但代表们几乎失去了其与个人化选区相辅相成的个人投票记录。相反，今天的美国人民由政治人物代表，他们在国会中的意识形态点名投票记录通常只类似\",[\"$\",\"em\",null,{\"children\":\"两种\"}],\"类型：共和党平台或民主党平台，很少有组合。这种前所未有的高度党派化将对未来美国的内政外交政策产生何种影响，尚有待观察。这项工作主要在圣达菲研究所完成。\"]}]\n54:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"致谢\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#致谢\",\"children\":\"致谢\"}]}]\n55:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本文报告的数据来自美国众议"])</script><script>self.__next_f.push([1,"院议员办公室，通过Govtrak访问了国会图书馆在线汤玛斯系统。感谢约翰·坦普尔顿基金会、麻省理工学院Senseable城市实验室、国防科学与工程研究生奖学金（NDSEG Fellowship）和洛克菲勒研究所的支持。作者感谢我们的四位有益的审稿人和两位学术编辑，特别是Rodrigo Huerta-Quintanilla博士。感谢Thomas Ding和Wei Luo协助收集数据；Brian King、Luis M.A. Bettencourt和Chris Wood的讨论；以及Nathan Frey、Leon Andris和Deryck Holdsworth在内容编辑方面的建议协助。\"}]\n56:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"作者贡献\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#作者贡献\",\"children\":\"作者贡献\"}]}]\n57:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"构思并设计实验: CA MJH. 进行实验: CA CEG MJH. 分析数据: CA DL CEG MJH MM JAS. 贡献试剂/材料/分析工具: DL CA. 撰写论文: JAS CA DL MJH. 设计交互式网站: MM.\"}]\n58:[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"参考文献\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#参考文献\",\"children\":\"参考文献\"}]}]\n"])</script><script>self.__next_f.push([1,"59:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"ol\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"Snowe O. The effect of modern pa
