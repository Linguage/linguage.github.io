why-large-neural-networks-work\",\"category\":\"missing-source-url\",\"title\":\"AI研究人员如何意外发现他们对学习的固有认知是错误的\",\"date\":\"2025-08-18\",\"excerpt\":\"传统机器学习理论认为过大的模型必然导致过拟合，但研究人员发现大规模神经网络反而表现更优，出现了双重下降现象。彩票假说为此提供了解释——大型网络的成功并非源于学习复杂解决方案，而是因为拥有更多随机初始化的子网络，从而大幅提升找到简单优雅解决方案的概率。这一发现调和了经典理论与实践之间的矛盾，也重新定义了我们对智能本身的理解。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-native-software-engineer\",\"href\":\"/rosetta/notes/missing-source-url/ai-native-software-engineer\",\"category\":\"missing-source-url\",\"title\":\"AI原生软件工程师\",\"date\":\"2025-07-02\",\"excerpt\":\"本文定义了AI原生软件工程师的概念，即将AI深度融入日常开发工作流程、视其为协作伙伴而非威胁的工程师。文章阐述了核心思维转变——从恐惧AI取代转向主动利用AI放大自身能力，提出信任但验证的协作原则，并给出了从工具准备到逐步建立AI熟练度的实践路径，强调工程师仍需对代码质量承担全部责任。\",\"coverImage\":\"$undefined\"},{\"slug\":\"lessons-learned-after-8-years-of-python\",\"href\":\"/rosetta/notes/missing-source-url/lessons-learned-after-8-years-of-python\",\"category\":\"missing-source-url\",\"title\":\"我用Python八年后学到的东西\",\"date\":\"2025-05-10\",\"excerpt\":\"作者基于八年Python开发经验，结合Python之禅的核心原则，系统阐述了一套实用的编程最佳实践。文章涵盖代码命名规范、简洁设计、避免过度工程、提升可读性、正确处理异常以及善用命名空间等关键要点，帮助开发者写出更优雅、更健壮的Pythonic代码。\",\"coverImage\":\"$undefined\"},{\"slug\":\"good-writing\",\"href\":\"/rosetta/notes/missing-source-url/good-writing\",\"category\":\"missing-source-url\",\"title\":\"好文笔\",\"date\":\"2025-05-01\",\"excerpt\":\"Paul Graham 探讨了好文笔的两层含义——读来顺畅与思想正确——之间的深层联系。他认为这两者并非无关，而是相互促进的。努力让文字听起来顺畅，既能在不自觉中修正思想错误，也能使错误更容易被发现。好文笔的节奏必须与思想的自然节奏相匹配，因此打磨语言本身就是理顺思想的过程。\",\"coverImage\":\"$undefined\"},{\"slug\":\"lip-bu-tan-intel-vision-2025-keynote\",\"href\":\"/rosetta/notes/missing-source-url/lip-bu-tan-intel-vision-2025-keynote\",\"category\":\"missing-source-url\",\"title\":\"陈立武在Intel Vision 2025上的开幕主题演讲\",\"date\":\"2025-05-01\",\"excerpt\":\"英特尔新任CEO陈立武在Vision 2025活动上发表履新后首次公开演讲。他坦承英特尔近年在创新上的落后，提出以少承诺多兑现为原则重建客户信任，并围绕回归工程为本的文化、借鉴创业精神、拥抱AI技术变革三大方向阐述了公司未来战略，涵盖客户端计算、数据中心、AI加速器及代工服务等关键业务的发展路径与优先事项。\",\"coverImage\":\"$undefined\"},{\"slug\":\"new-proof-settles-decades-old-bet-about-connected-networks\",\"href\":\"/rosetta/notes/missing-source-url/new-proof-settles-decades-old-bet-about-connected-networks\",\"category\":\"missing-source-url\",\"title\":\"新证明解决了关于互连网络数十年来的争论\",\"date\":\"2025-04-18\",\"excerpt\":\"20世纪80年代末，数学家Peter Sarnak和Noga Alon就最优扩展图（拉马努金图）在所有正则图中的比例打了一个赌。Sarnak认为拉马努金图极为稀少，Alon则认为几乎所有正则图都是拉马努金图。经过数十年的研究，哈佛大学的Horng-Tzer Yau及其合作者通过将随机矩阵普适性猜想推广到正则图的邻接矩阵，最终证明双方都错了。\",\"coverImage\":\"$undefined\"},{\"slug\":\"krugman-tankus-interview-financial-crisis-tariffs\",\"href\":\"/rosetta/notes/missing-source-url/krugman-tankus-interview-financial-crisis-tariffs\",\"category\":\"missing-source-url\",\"title\":\"保罗·克鲁格曼对谈内森·坦库斯（第二部分）——流动性、波动性和市场疯狂\",\"date\":\"2025-04-16\",\"excerpt\":\"保罗·克鲁格曼与内森·坦库斯围绕2025年4月特朗普关税引发的金融市场动荡展开深入对话。坦库斯指出这场危机的独特之处在于它直接源自一个人反复无常的决策，同时与支付系统的根本安全性、美元走弱、利率异常飙升等长期金融监管问题相互交织。市场并非理性的信息处理器，而更像是传统智慧处理器，在极端政策不确定性下剧烈震荡。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-as-normal-technology\",\"href\":\"/rosetta/notes/missing-source-url/ai-as-normal-technology\",\"category\":\"missing-source-url\",\"title\":\"作为普通技术的人工智能\",\"date\":\"2025-04-15\",\"excerpt\":\"本文提出将人工智能视为一种普通技术而非超级智能实体的分析框架。作者从技术扩散速度、人机协作分工、风险分类与政策韧性四个维度展开论述，指出AI的经济社会变革将以数十年为尺度渐进发生，主张拒绝技术决定论，通过韧性导向的政策应对不确定性，而非诉诸激进干预或末日叙事。\",\"coverImage\":\"$undefined\"},{\"slug\":\"harvard-president-letter-promise-of-american-higher-education\",\"href\":\"/rosetta/notes/missing-source-url/harvard-president-letter-promise-of-american-higher-education\",\"category\":\"missing-source-url\",\"title\":\"哈佛校长公开信——美国高等教育的承诺\",\"date\":\"2025-04-14\",\"excerpt\":\"哈佛大学校长艾伦·加伯发表公开信，回应联邦政府以反犹主义为由威胁中断科研合作与资助的举措。哈佛明确拒绝政府提出的涉及治理改革、招生聘用审查及观点审计等一系列要求，认为其超越法定权限并侵犯第一修正案权利。公开信重申哈佛将捍卫学术独立与自由，同时承诺自主推进反犹主义治理与校园多元化建设。\",\"coverImage\":\"$undefined\"},{\"slug\":\"shopify-ai-as-baseline-expectation\",\"href\":\"/rosetta/notes/missing-source-url/shopify-ai-as-baseline-expectation\",\"category\":\"missing-source-url\",\"title\":\"主动自觉地使用AI现已成为Shopify的基本要求\",\"date\":\"2025-04-07\",\"excerpt\":\"Shopify CEO Tobi Lutke发布内部备忘录，宣布主动使用AI已成为公司对所有员工的基本要求。备忘录指出AI是倍增器，能让优秀员工产出百倍成果，并将AI使用纳入绩效评估体系。团队在申请增加人员前须先证明无法通过AI完成目标，公司致力于在AI普及时代重新定义创业形态。\",\"coverImage\":\"$undefined\"},{\"slug\":\"the-insanity-of-being-a-software-engineer\",\"href\":\"/rosetta/notes/missing-source-url/the-insanity-of-being-a-software-engineer\",\"category\":\"missing-source-url\",\"title\":\"软件工程师的疯狂挑战\",\"date\":\"2025-04-06\",\"excerpt\":\"本文以略带讽刺的口吻揭示了现代软件工程师面临的荒诞处境。从掌握多种编程语言、框架到被迫成为全栈工程师，再到学习Docker、AWS和Terraform等运维技能，工程师的职责不断膨胀。作者感叹软件行业缺乏专业分工，一个人被期望承担从前端到后端、从开发到运维甚至管理的所有角色，并以建筑行业的分工模式作为对比进行反思。\",\"coverImage\":\"$undefined\"},{\"slug\":\"sam-altman-fired-openai-insider-story\",\"href\":\"/rosetta/notes/missing-source-url/sam-altman-fired-openai-insider-story\",\"category\":\"missing-source-url\",\"title\":\"山姆·奥特曼被OpenAI解雇的真实内幕\",\"date\":\"2025-03-28\",\"excerpt\":\"2023年11月，OpenAI董事会秘密投票解雇了CEO山姆·奥特曼。本文基于数十位亲历者的采访，揭示了奥特曼被罢免的深层原因——包括反复误导董事会、隐瞒创业基金所有权、绕过安全审查流程，以及挑拨高管内斗等信任破裂行为，还原了这场科技史上最戏剧性权力更迭的完整经过。\",\"coverImage\":\"$undefined\"},{\"slug\":\"future-proofing-software-engineering-career\",\"href\":\"/rosetta/notes/missing-source-url/future-proofing-software-engineering-career\",\"category\":\"missing-source-url\",\"title\":\"为你的软件工程职业生涯做好未来规划\",\"date\":\"2024-12-24\",\"excerpt\":\"本文以务实视角分析了大型语言模型对软件工程职业的实际影响。作者指出AI工具正在增强而非取代工程师，并针对初级、中级工程师分别提出适应策略。文章给出六项未来保障建议，包括深化计算机基础、发展系统设计能力、建立领域专长、精通开发运维、提升沟通技巧以及积极使用AI工具，同时强调设计思维和产品意识的重要性。\",\"coverImage\":\"$undefined\"},{\"slug\":\"notes-on-an-observation-on-generalization\",\"href\":\"/rosetta/notes/missing-source-url/notes-on-an-observation-on-generalization\",\"category\":\"missing-source-url\",\"title\":\"关于《对泛化的一个观察》的笔记\",\"date\":\"2023-10-01\",\"excerpt\":\"本文是对 Ilya Sutskever 在2023年西蒙斯研究所研讨会演讲的详细笔记。演讲从压缩理论的视角解释无监督学习为何有效，核心论点是预测与压缩之间存在一一对应关系。通过引入柯尔莫戈洛夫复杂度、条件复杂度和联合压缩等概念，论证了好的无监督学习算法本质上是好的压缩器，并最终将联合压缩与最大似然估计联系起来。\",\"coverImage\":\"$undefined\"},{\"slug\":\"superlinear-returns-paul-graham\",\"href\":\"/rosetta/notes/missing-source-url/superlinear-returns-paul-graham\",\"category\":\"missing-source-url\",\"title\":\"超线性回报\",\"date\":\"2023-10-01\",\"excerpt\":\"保罗·格雷厄姆探讨了表现与回报之间的超线性关系，指出其两大根本来源是指数级增长与阈值效应。文章分析了在商业、学术、名望等领域中富者愈富的现象，并为有抱负的人提供了利用超线性回报的实用建议——选择具有复利效应的工作、持续学习、追随好奇心，以及在组织重要性下降的时代抓住个人崛起的机遇。\",\"coverImage\":\"$undefined\"},{\"slug\":\"james-simons-making-money-with-math\",\"href\":\"/rosetta/notes/missing-source-url/james-simons-making-money-with-math\",\"category\":\"missing-source-url\",\"title\":\"大师系列 - 詹姆斯·西蒙斯：用数学赚钱的秘诀与慈善之路\",\"date\":\"2022-09-01\",\"excerpt\":\"本期播客聚焦世界级数学家詹姆斯·西蒙斯，探讨他如何将深厚的数学背景转化为量化投资领域的传奇成功。内容涵盖文艺复兴科技公司的核心策略——顶尖人才、卓越基础设施与极度合作，以及他通过西蒙斯基金会和美国数学等机构回馈社会、推动基础科学与教育的慈善之路。\",\"coverImage\":\"$undefined\"},{\"slug\":\"phd-survival-guide-andrej-karpathy\",\"href\":\"/rosetta/notes/missing-source-url/phd-survival-guide-andrej-karpathy\",\"category\":\"missing-source-url\",\"title\":\"博士生涯生存指南\",\"date\":\"2016-09-07\",\"excerpt\":\"Andrej Karpathy 在博士生涯结束之际撰写的回顾性指南，涵盖是否应该读博的考量因素、如何选择学校与导师、研究课题的选择与迭代、论文写作与代码发布的技巧、学术报告与会议参与策略，以及以诚信为本的核心原则。文章结合个人经历与实用建议，为计算机科学领域的博士生提供了系统性的生存参考。\",\"coverImage\":\"$undefined\"},{\"slug\":\"rise-of-partisanship-and-super-cooperators-in-us-house\",\"href\":\"/rosetta/notes/missing-source-url/rise-of-partisanship-and-super-cooperators-in-us-house\",\"category\":\"missing-source-url\",\"title\":\"美国众议院党派倾向和超级合作者的兴起\",\"date\":\"2015-04-21\",\"excerpt\":\"本文通过构建包含超过500万对议员的网络，量化了1949年至2012年间美国众议院民主党与共和党成员之间的合作水平。研究发现美国国会的党派倾向在过去60多年里呈指数级增长，且没有减弱迹象。然而仍有一群议员持续进行跨党派合作，被称为超级合作者。研究采用网络方法替代传统线性指数，揭示了个体议员间意识形态关系的演变趋势。\",\"coverImage\":\"$undefined\"},{\"slug\":\"three-golden-rules-for-successful-scientific-research\",\"href\":\"/rosetta/notes/missing-source-url/three-golden-rules-for-successful-scientific-research\",\"category\":\"missing-source-url\",\"title\":\"科学研究成功的三大黄金法则\",\"date\":\"2003-06-19\",\"excerpt\":\"本文由计算机科学先驱Dijkstra撰写，提出科研成功的三条黄金法则。第一条要求研究者始终在能力边界上工作，追求最高质量标准；第二条主张当社会意义与科学严谨性冲突时，应优先保证严谨性；第三条建议不要去解决别人同样能做好的问题，确保自身贡献的独特性。这三条规则务实而冷峻，揭示了科学世界残酷无情的本质。\",\"coverImage
