，近年来将关注重点转向防范人工智能带来的存在性风险，OpenAI多位董事会成员与该运动有关联\n\n**非营利治理结构**：OpenAI采用非营利董事会管理营利性业务的特殊架构，董事会对全人类而非股东负责，CEO不持有公司股权，这一设计旨在确保AI安全但也埋下了权力冲突的隐患\n\n**联合安全委员会**：OpenAI与微软共同设立的安全审查机制，负责在新产品发布前评估风险，奥特曼被指控多次绕过或虚报该委员会的审批结果\n\n**OpenAI创业基金（Startup Fund）**：2021年启动的AI初创公司投资基金，对外宣称由OpenAI管理，但董事会后来发现该基金实际由奥特曼个人持有，成为信任危机的关键导火索\n\n**伊利亚·苏茨克维（Ilya Sutskever）**：OpenAI联合创始人兼首席科学家，在解雇事件中扮演关键角色，他秘密收集奥特曼失信证据并推动董事会采取行动\n\n\n\n**山姆·奥特曼被 OpenAI 解雇的真实内幕**\n\n秘密、误导与信任破裂。这家最热门科技公司的 CEO 如何被罢免，又如何迅速复活的内幕故事。\n\n（插图：彼得·蒂尔和山姆·奥特曼在艺术区用餐。）\n\n2023 年 11 月，在洛杉矶艺术区的一顿晚餐上，亿万富翁彼得·蒂尔向 OpenAI 首席执行官山姆·奥特曼发出了警告。插图：Jan Feindt\n\n作者：\nKeach Hagey\n2025 年 3 月 28 日 下午 5:00 (美国东部时间)\n\n2023 年 11 月中旬一个温和的夜晚，亿万富翁风险投资家彼得·蒂尔 (Peter Thiel) 在洛杉矶艺术区一座百年历史的改造银行大楼内的前卫日式餐厅 YESS 为他的丈夫举办了一场生日派对。坐在他旁边的是他的朋友山姆·奥特曼 (Sam Altman)。\n\n十多年前，蒂尔就投资了奥特曼的第一个风险基金，并在奥特曼作为 OpenAI 的首席执行官成为人工智能革命的代言人后，一直担任这位年轻投资者的导师。OpenAI 于 2022 年 11 月即时病毒式发布的 ChatGPT，推动科技股迎来了几十年来表现最好的年份之一。然而，蒂尔却感到担忧。\n\n在认识奥特曼的几年前，蒂尔曾将另一位痴迷于人工智能的神童埃利泽·尤德科夫斯基 (Eliezer Yudkowsky) 纳入麾下，资助了他的研究所。该研究所致力于确保任何比人类更聪明的人工智能都对其创造者友好。当年三月，尤德科夫斯基在《时代》杂志上撰文称，除非当前的人工智能研究浪潮被阻止，否则“地球上的每一个人都将死去”。\n\n“你不明白埃利泽是如何给你公司里一半的人洗脑，让他们相信那些东西的，”蒂尔警告奥特曼。“你需要更严肃地对待这个问题。”\n\n奥特曼拨弄着他的素食餐点，强忍着没有翻白眼。这并非蒂尔第一次在晚餐时警告他，公司已被“有效利他主义者”（EAs）接管——他指的是那些信奉有效利他主义 (Effective Altruism) 的人。有效利他主义近来已从试图消除全球贫困转向试图阻止失控的人工智能屠杀人类。蒂尔曾多次预言，“人工智能安全人士”将“摧毁”OpenAI。\n\n“嗯，埃隆（马斯克）或许有点这样，但我们已经摆脱了埃隆，”奥特曼在晚宴上回应道，他指的是 2018 年与联合创始人埃隆·马斯克 (Elon Musk) 那场混乱的分手。马斯克曾将创造人工智能的尝试称为“召唤恶魔”。\n\n近 800 名 OpenAI 员工一直搭乘着火箭般的发展快车，随着一项对公司估值达 860 亿美元的要约收购即将完成，他们马上就有机会购买海滨别墅作为第二居所了。没必要恐慌。\n\n（图片：蒂尔，摄于 2022 年 4 月比特币会议，他是奥特曼的导师。）\n\n蒂尔，摄于 2022 年 4 月比特币会议，他是奥特曼的导师。照片：法新社/盖蒂图片社\n\n38 岁的奥特曼正结束他顺风顺水的职业生涯中最辉煌的一年。在这一年里，他家喻户晓，与世界各地的总统和总理会面，并且——在硅谷的价值体系内最重要的是——他交付了一项看起来极有可能改变一切的新技术。\n\n但就在这两位投资伙伴在洛杉矶最热门新餐厅的裸露椽木下庆祝时，OpenAI 六人董事会中的四名成员，包括两名与有效利他主义社群有直接联系的成员，正在秘密举行视频会议。他们正在决定是否应该解雇山姆·奥特曼——尽管并非出于有效利他主义的原因。\n\n本报道基于对数十位亲历这件史上最疯狂商业故事之一的人物的采访——这颗星球上最热门科技公司的 CEO 突然被解雇，几天后又复职。故事的核心是一位反复无常的领导者，他用技术愿景激励着周围的人，但也时常因他错综复杂的秘密和误导而让人感到困惑与不安。\n\n从一开始，OpenAI 就被设定为一种不同类型的科技公司，由一个非营利董事会管理，其职责并非对股东负责，而是对“人类”负责。奥特曼当年早些时候在国会宣誓作证时称，他不持有自己联合创办的公司任何股权，这让立法者们感到震惊。他同意了这项前所未有的安排进入董事会，该安排要求大多数董事与公司没有财务联系。2023 年 6 月，他告诉彭博电视台：“董事会可以解雇我。这很重要。”\n\n而在幕后，董事会越来越沮丧地发现，奥特曼才是真正发号施令的人。\n\n过去一年里，董事会在增补哪位人工智能安全专家的问题上陷入僵局。董事会面试了有效利他主义慈善机构 Open Philanthropy 的人工智能安全专家 Ajeya Cotra，但过程停滞不前，很大程度上是由于奥特曼和他的联合创始人、同为董事会成员的格雷格·布罗克曼 (Greg Brockman) 的拖延。奥特曼则提出了自己的人选建议。\n\n“当时有点权力斗争，”Airbnb 的 CEO 布莱恩·切斯基 (Brian Chesky) 说，他是奥特曼建议的潜在董事会成员之一。“基本情况就是，如果萨姆提名了某个人，那他们肯定忠于萨姆，所以（其他董事）就会拒绝。”\n\n（图片：奥特曼于 2023 年 11 月 6 日在 OpenAI 首届开发者大会上发言，不到两周后他被董事会解雇。）\n\n奥特曼于 2023 年 11 月 6 日在 OpenAI 首届开发者大会上发言，不到两周后他被董事会解雇。照片：Justin Sullivan/Getty Images\n\n2023 年初，三名亲奥特曼阵营的董事会成员因各种利益冲突相继卸任后，董事会内部的动态变得更具争议性。这使得管理这家盈利性人工智能巨头的非营利董事会剩下六人：奥特曼、他的亲密盟友布罗克曼、他们的另一位联合创始人伊利亚·苏茨克维 (Ilya Sutskever)，以及三位独立董事。他们是：Quora 的 CEO、前 Facebook 高管亚当·德安吉洛 (Adam D’Angelo)；乔治城大学安全与新兴技术中心战略总监、Open Philanthropy 的资深成员海伦·托纳 (Helen Toner)；以及前科技公司 CEO、有效利他主义慈善机构 Effective Ventures 英国董事会成员塔莎·麦考利 (Tasha McCauley)。\n\n在 2022 年夏天看到 GPT-4 的演示后——这是一个更强大、能够在美国大学预修生物学考试中取得优异成绩的人工智能——公司治理以及董事会监督奥特曼能力的问题，对几位董事会成员来说变得更加紧迫。\n\n“像 ChatGPT 和 GPT-4 这样的东西是促使董事会意识到风险越来越高的重要转变，”托纳说。“并非我们明天就会死，但董事会需要良好运作。”\n\n托纳和麦考利已经开始对奥特曼失去信任。为了在发布新产品前审查其风险，OpenAI 与其主要支持者微软设立了一个联合安全委员会。微软在其产品中有使用 OpenAI 技术的特殊权限。在 2022 年冬天的一次会议上，当董事会权衡如何发布 GPT-4 的三项有些争议的增强功能时，奥特曼声称所有三项都已获得联合安全委员会的批准。托纳要求提供证据，结果发现实际上只有一个获批。\n\n大约在同一时间，微软在印度启动了对当时尚未发布的 GPT-4 的测试，这是该革命性代码首次在未经联合安全委员会批准的情况下被公开发布。而且没有人费心告知 OpenAI 董事会这次跳过了安全审批。独立董事们是在其中一人参加完长达六小时的董事会会议、离开时在走廊被一名 OpenAI 员工拦下才得知的。在那次会议中，奥特曼或布罗克曼从未提及这次违规行为。\n\n然后，在 2023 年夏天的一个晚上，一位 OpenAI 董事会成员在一个晚宴上无意中听到有人在讨论 OpenAI 的创业基金 (Startup Fund)。该基金于 2021 年启动，旨在投资与人工智能相关的初创公司，OpenAI 曾宣布该基金将由 OpenAI “管理”。但这位董事会成员听到有人抱怨该基金的利润并未流向 OpenAI 投资者。\n\n（图片：2023 年 OpenAI 董事会成员。顺时针从左上起：山姆·奥特曼、格雷格·布罗克曼、伊利亚·苏茨克维、塔莎·麦考利、海伦·托纳和亚当·德安吉洛）\n\n这对董事会来说是新闻，于是他们询问了奥特曼。经过数月了解，董事们得知奥特曼个人拥有该基金。OpenAI 的高管们最初表示这是出于税务原因，后来最终解释说奥特曼设立该基金是因为这样更快，而且只是一个“临时”安排。OpenAI 表示奥特曼没有从该基金中获得任何费用或利润——这是一种不同寻常的安排。\n\n对于独立董事们来说，这种行政疏忽令人难以置信——并让他们将之前的疏忽视为可能存在的蓄意欺骗模式的一部分。例如，去年秋天 OpenAI 发布 ChatGPT 时，他们也没有收到通知。当时 ChatGPT 被认为是使用现有技术的“研究预览版”，但最终席卷了全球。（《华尔街日报》的所有者新闻集团与 OpenAI 签订了内容授权合作协议。）\n\n九月下旬，苏茨克维给托纳发邮件，问她第二天是否有时间谈话。这极不寻常。他们在董事会会议之外几乎不交谈。电话里，苏茨克维支支吾吾了一番，最后透露了一个线索：“你应该多和米拉谈谈。”\n\n米拉·穆拉蒂 (Mira Murati) 于 2022 年 5 月被提升为 OpenAI 的首席技术官，并从那时起实际上一直在负责公司的日常运营。当托纳打电话给她时，穆拉蒂描述了她所认为的奥特曼的有毒管理风格多年来是如何引发问题的，以及奥特曼和布罗克曼之间的动态关系——布罗克曼向她汇报，但每当她试图约束他时，他就会去找奥特曼——让她几乎无法工作。\n\n几个月前，穆拉蒂曾直接向奥特曼提出过其中一些问题，而奥特曼的回应是连续几周带着人力资源主管参加他们的一对一会议，直到她最终告诉他，她不打算将她的反馈分享给董事会。\n\n托纳回头去找了公司那位预言家般的首席科学家苏茨克维。苏茨克维明确表示，他因为多种原因对奥特曼失去了信任，包括奥特曼倾向于挑拨高级员工互斗。2021 年，苏茨克维规划并启动了一个团队来探索 OpenAI 的下一个研究方向，但几个月后，另一位 OpenAI 研究员雅库布·帕乔基 (Jakub Pachocki) 开始进行非常相似的研究。两个团队合并了，在苏茨克维将重心转向人工智能安全后，帕乔基接管了团队。奥特曼后来提拔帕乔基为研究总监，并私下向两人都承诺他们可以领导公司的研究方向，这导致了数月的生产力损失。\n\n苏茨克维一直在等待一个董事会动态允许替换奥特曼 CEO 职位的时机。\n\n接下来的几周里，穆拉蒂和苏茨克维小心翼翼，生怕被奥特曼发现，分别与每位独立董事进行了交谈。正是因为他们每天保持联系，独立董事们才抓住了奥特曼一个特别恶劣的谎言。\n\n（图片：2023 年 10 月，OpenAI 首席技术官米拉·穆拉蒂在《华尔街日报》Tech Live 会议上发言。）\n\n2023 年 10 月，OpenAI 首席技术官米拉·穆拉蒂在《华尔街日报》Tech Live 会议上发言。照片：Nikki Ritcher for WSJ\n\n托纳在 10 月份发表了一篇论文，其中重申了对 OpenAI 安全方法的批评。奥特曼对此大怒。他告诉苏茨克维，麦考利说过托纳显然应该因为这篇文章离开董事会。当麦考利从苏茨克维那里听到这种说法时，她吃了一惊——她知道自己从未说过这样的话。\n\n苏茨克维和穆拉蒂一直在收集证据，现在苏茨克维愿意分享了。他使用 Gmail 的阅后即焚邮件功能，给托纳、麦考利和德安吉洛发送了两份冗长的 PDF 文档。\n\n一份是关于奥特曼的，另一份是关于布罗克曼的。关于奥特曼的文件包含了他被指控的数十个谎言和其他有害行为的例子，大部分有穆拉蒂 Slack 频道的截屏作为佐证。其中一个例子是，奥特曼告诉穆拉蒂，公司法务部门表示 GPT-4 Turbo 无需通过联合安全委员会的审查。当穆拉蒂向公司最高级别的律师核实时，律师表示他并未说过这话。关于布罗克曼的文件则主要集中在他被指控的欺凌行为上。\n\n苏茨克维警告说，如果他们要行动，就必须迅速行动。\n\n于是，在 2023 年 11 月 16 日星期四下午，他和三位独立董事登录了视频通话，投票决定解雇奥特曼。考虑到如果穆拉蒂需要向布罗克曼汇报，她不太可能同意担任临时 CEO，他们还投票决定将布罗克曼从董事会除名。投票后，独立董事们告诉苏茨克维，他们一直担心他是被派来试探他们忠诚度的间谍。\n\n那天晚上，穆拉蒂正在参加一个会议，四位董事会成员打电话告诉她，他们将在第二天解雇奥特曼，并请她担任临时 CEO。她同意了。当她问及解雇原因时，他们没有告诉她。\n\n“你把这事告知萨提亚（纳德拉）了吗？”穆拉蒂问道，她深知微软 CEO 萨提亚·纳德拉 (Satya Nadella) 对他们合作关系的承诺对公司至关重要。他们还没有。他们决定由穆拉蒂在消息发布到 OpenAI 网站之前告知微软。\n\n奥特曼被突然解雇的消息立即成为全球爆炸性的头条新闻。\n\n但对于奥特曼被解雇的原因，除了他未能对董事会“一贯坦诚”之外，董事会无法向员工或更广泛的公众提供任何答案。\n\n周五晚上，OpenAI 的董事会和高管团队召开了一系列气氛日益紧张的会议。穆拉蒂开始担忧，董事会未能更好地为奥特曼被解雇的后果做准备，正在将 OpenAI 置于风险之中。有一次，她和高管团队的其他成员给了董事会 30 分钟的最后期限，要求他们解释解雇奥特曼的原因或辞职——否则高管团队将集体辞职。\n\n董事会觉得他们不能透露是穆拉蒂向他们提供了部分关于奥特曼管理失误的最详细证据。他们原本指望穆拉蒂在他们寻找 CEO 期间安抚员工。结果，她却在领导同事反抗董事会。\n\n一种说法开始在奥特曼的盟友中散布，称整件事是苏茨克维因对帕乔基晋升感到愤怒而发动的“政变”，并得到了托纳因奥特曼试图将她逐出董事会而感愤怒的助推。\n\n苏茨克维惊呆了。他原本期望 OpenAI 的员工会欢呼。\n\n到周一早上，几乎所有员工都签署了一封联名信，威胁如果奥特曼不复职就辞职。签名者中包括穆拉蒂和苏茨克维。情况已经很明显，阻止公司崩溃的唯一方法就是请回奥特曼。\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"sam-altman-fired-openai-insider-story\",\"slugSegments\":[\"notes\",\"missing-source-url\",\"sam-altman-fired-openai-insider-story\"],\"pathSegments\":[\"notes\",\"missing-source-url\",\"sam-altman-fired-openai-insider-story\"],\"urlPath\":\"/rosetta/notes/missing-source-url/sam-altman-fired-openai-insider-story\",\"href\":\"/rosetta/notes/missing-source-url/sam-altman-fired-openai-insider-story\",\"category\":\"missing-source-url\",\"title\":\"山姆·奥特曼被OpenAI解雇的真实内幕\",\"date\":\"2025-03-28\",\"excerpt\":\"2023年11月，OpenAI董事会秘密投票解雇了CEO山姆·奥特曼。本文基于数十位亲历者的采访，揭示了奥特曼被罢免的深层原因——包括反复误导董事会、隐瞒创业基金所有权、绕过安全审查流程，以及挑拨高管内斗等信任破裂行为，还原了这场科技史上最戏剧性权力更迭的完整经过。\",\"coverImage\":\"$undefined\",\"author\":\"Keach Hagey\",\"original\":\"山姆·奥特曼被 OpenAI 解雇的真实内幕.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"OpenAI\",\"山姆·奥特曼\",\"公司治理\",\"人工智能\",\"董事会政变\"],\"draft\":false,\"toc\":true,\"math\":false,\"layout\":\"$undefined\",\"aliases\":[],\"weight\":\"$undefined\",\"data\":{\"title\":\"山姆·奥特曼被OpenAI解雇的真实内幕\",\"excerpt\":\"2023年11月，OpenAI董事会秘密投票解雇了CEO山姆·奥特曼。本文基于数十位亲历者的采访，揭示了奥特曼被罢免的深层原因——包括反复误导董事会、隐瞒创业基金所有权、绕过安全审查流程，以及挑拨高管内斗等信任破裂行为，还原了这场科技史上最戏剧性权力更迭的完整经过。\",\"date\":\"2025-03-28\",\"author\":\"Keach Hagey\",\"original\":\"山姆·奥特曼被 OpenAI 解雇的真实内幕.md\",\"tags\":[\"OpenAI\",\"山姆·奥特曼\",\"公司治理\",\"人工智能\",\"董事会政变\"],\"toc\":true},\"sourcePath\":\"/home/runner/work/linguista-main-private/linguista-main-private/src/contents/rosetta/notes/missing-source-url/sam-altman-fired-openai-insider-story.md\"},\"neighbors\":{\"previous\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"the-insanity-o \n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"2023年11月，OpenAI董事会秘密投票解雇了CEO山姆·奥特曼。本文基于数十位亲历者的采访，揭示了奥特曼被罢免的深层原因——包括反复误导董事会、隐瞒创业基金所有权、绕过安全审查流程，以及挑拨高管内斗等信任破裂行为，还原了这场科技史上最戏剧性权力更迭的完整经过。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"有效利他主义（Effective Altruism）\"}],\"：一种倡导用理性和证据最大化公益的社会运动，近年来将关注重点转向防范人工智能带来的存在性风险，OpenAI多位董事会成员与该运动有关联\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"非营利治理结构\"}],\"：OpenAI采用非营利董事会管理营利性业务的特殊架构，董事会对全人类而非股东负责，CEO不持有公司股权，这一设计旨在确保AI安全但也埋下了权力冲突的隐患\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"联合安全委员会\"}],\"：OpenAI与微软共同设立的安全审查机制，负责在新产品发布前评估风险，奥特曼被指控多次绕过或虚报该委员会的审批结果\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"OpenAI创业基金（Startup Fund）\"}],\"：2021年启动的AI初创公司投资基金，对外宣称由OpenAI管理，但董事会后来发现该基金实际由奥特曼个人持有，成为信任危机的关键导火索\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"伊利亚·苏茨克维（Ilya Sutskever）\"}],\"：OpenAI联合创始人兼首席科学家，在解雇事件中扮演关键角色，他秘密收集奥特曼失信证据并推动董事会采取行动\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"山姆·奥特曼被 OpenAI 解雇的真实内幕\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"秘密、误导与信任破裂。这家最热门科技公司的 CEO 如何被罢免，又如何迅速复活的内幕故事。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"（插图：彼得·蒂尔和山姆·奥特曼在艺术区用餐。）\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"2023 年 11 月，在洛杉矶艺术区的一顿晚餐上，亿万富翁彼得·蒂尔向 OpenAI 首席执行官山姆·奥特曼发出了警告。插图：Jan Feindt\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"作者：\\nKeach Hagey\\n2025 年 3 月 28 日 下午 5:00 (美国东部时间)\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"2023 年 11 月中旬一个温和的夜晚，亿万富翁风险投资家彼得·蒂尔 (Peter Thiel) 在洛杉矶艺术区一座百年历史的改造银行大楼内的前卫日式餐厅 YESS 为他的丈夫举办了一场生日派对。坐在他旁边的是他的朋友山姆·奥特曼 (Sam Altman)。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"十多年前，蒂尔就投资了奥特曼的第一个风险基金，并在奥特曼作为 OpenAI 的首席执行官成为人工智能革命的代言人后，一直担任这位年轻投资者的导师。OpenAI 于 2022 年 11 月即时病毒式发布的 ChatGPT，推动科技股迎来了几十年来表现最好的年份之一。然而，蒂尔却感到担忧。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在认识奥特曼的几年前，蒂尔曾将另一位痴迷于人工智能的神童埃利泽·尤德科夫斯基 (Eliezer Yudkowsky) 纳入麾下，资助了他的研究所。该研究所致力于确保任何比人类更聪明的人工智能都对其创造者友好。当年三月，尤德科夫斯基在《时代》杂志上撰文称，除非当前的人工智能研究浪潮被阻止，否则“地球上的每一个人都将死去”。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“你不明白埃利泽是如何给你公司里一半的人洗脑，让他们相信那些东西的，”蒂尔警告奥特曼。“你需要更严肃地对待这个问题。”\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"奥特曼拨弄着他的素食餐点，强忍着没有翻白眼。这并非蒂尔第一次在晚餐时警告他，公司已被“有效利他主义者”（EAs）接管——他指的是那些信奉有效利他主义 (Effective Altruism) 的人。有效利他主义近来已从试图消除全球贫困转向试图阻止失控的人工智能屠杀人类。蒂尔曾多次预言，“人工智能安全人士”将“摧毁”OpenAI。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“嗯，埃隆（马斯克）或许有点这样，但我们已经摆脱了埃隆，”奥特曼在晚宴上回应道，他指的是 2018 年与联合创始人埃隆·马斯克 (Elon Musk) 那场混乱的分手。马斯克曾将创造人工智能的尝试称为“召唤恶魔”。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"近 800 名 OpenAI 员工一直搭乘着火箭般的发展快车，随着一项对公司估值达 860 亿美元的要约收购即将完成，他们马上就有机会购买海滨别墅作为第二居所了。没必要恐慌。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"（图片：蒂尔，摄于 2022 年 4 月比特币会议，他是奥特曼的导师。）\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"蒂尔，摄于 2022 年 4 月比特币会议，他是奥特曼的导师。照片：法新社/盖蒂图片社\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"38 岁的奥特曼正结束他顺风顺水的职业生涯中最辉煌的一年。在这一年里，他家喻户晓，与世界各地的总统和总理会面，并且——在硅谷的价值体系内最重要的是——他交付了一项看起来极有可能改变一切的新技术。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"但就在这两位投资伙伴在洛杉矶最热门新餐厅的裸露椽木下庆祝时，OpenAI 六人董事会中的四名成员，包括两名与有效利他主义社群有直接联系的成员，正在秘密举行视频会议。他们正在决定是否应该解雇山姆·奥特曼——尽管并非出于有效利他主义的原因。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本报道基于对数十位亲历这件史上最疯狂商业故事之一的人物的采访——这颗星球上最热门科技公司的 CEO 突然被解雇，几天后又复职。故事的核心是一位反复无常的领导者，他用技术愿景激励着周围的人，但也时常因他错综复杂的秘密和误导而让人感到困惑与不安。\"}],\"\\n\",\"$L19\",\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\",\"\\n\",\"$L22\",\"\\n\",\"$L23\",\"\\n\",\"$L24\",\"\\n\",\"$L25\",\"\\n\",\"$L26\",\"\\n\",\"$L27\",\"\\n\",\"$L28\",\"\\n\",\"$L29\",\"\\n\",\"$L2a\",\"\\n\",\"$L2b\",\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\"]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"从一开始，OpenAI 就被设定为一种不同类型的科技公司，由一个非营利董事会管理，其职责并非对股东负责，而是对“人类”负责。奥特曼当年早些时候在国会宣誓作证时称，他不持有自己联合创办的公司任何股权，这让立法者们感到震惊。他同意了这项前所未有的安排进入董事会，该安排要求大多数董事与公司没有财务联系。2023 年 6 月，他告诉彭博电视台：“董事会可以解雇我。这很重要。”\"}]\n1a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"而在幕后，董事会越来越沮丧地发现，奥特曼才是真正发号施令的人。\"}]\n1b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"过去一年里，董事会在增补哪位人工智能安全专家的问题上陷入僵局。董事会面试了有效利他主义慈善机构 Open Philanthropy 的人工智能安全专家 Ajeya Cotra，但过程停滞不前，很大程度上是由于奥特曼和他的联合创始人、同为董事会成员的格雷格·布罗克曼 (Greg Brockman) 的拖延。奥特曼则提出了自己的人选建议。\"}]\n1c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“当时有点权力斗争，”Airbnb 的 CEO 布莱恩·切斯基 (Brian Chesky) 说，他是奥特曼建议的潜在董事会成员之一。“基本情况就是，如果萨姆提名了某个人，那他们肯定忠于萨姆，所以（其他董事）就会拒绝。”\"}]\n1d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"（图片：奥特曼于 2023 年 11 月 6 日在 OpenAI 首届开发者大会上发言，不到两周后他被董事会解雇。）\"}]\n1e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"奥特曼于 2023 年 11 月 6 日在 OpenAI 首届开发者大会上发言，不到两周后他被董事会解雇。照片：Justin Sullivan/Getty Images\"}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"2023 年初，三名亲奥特曼阵营的董事会成员因各种利益冲突相继卸任后，"])</script><script>self.__next_f.push([1,"董事会内部的动态变得更具争议性。这使得管理这家盈利性人工智能巨头的非营利董事会剩下六人：奥特曼、他的亲密盟友布罗克曼、他们的另一位联合创始人伊利亚·苏茨克维 (Ilya Sutskever)，以及三位独立董事。他们是：Quora 的 CEO、前 Facebook 高管亚当·德安吉洛 (Adam D’Angelo)；乔治城大学安全与新兴技术中心战略总监、Open Philanthropy 的资深成员海伦·托纳 (Helen Toner)；以及前科技公司 CEO、有效利他主义慈善机构 Effective Ventures 英国董事会成员塔莎·麦考利 (Tasha McCauley)。\"}]\n20:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在 2022 年夏天看到 GPT-4 的演示后——这是一个更强大、能够在美国大学预修生物学考试中取得优异成绩的人工智能——公司治理以及董事会监督奥特曼能力的问题，对几位董事会成员来说变得更加紧迫。\"}]\n21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“像 ChatGPT 和 GPT-4 这样的东西是促使董事会意识到风险越来越高的重要转变，”托纳说。“并非我们明天就会死，但董事会需要良好运作。”\"}]\n22:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"托纳和麦考利已经开始对奥特曼失去信任。为了在发布新产品前审查其风险，OpenAI 与其主要支持者微软设立了一个联合安全委员会。微软在其产品中有使用 OpenAI 技术的特殊权限。在 2022 年冬天的一次会议上，当董事会权衡如何发布 GPT-4 的三项有些争议的增强功能时，奥特曼声称所有三项都已获得联合安全委员会的批准。托纳要求提供证据，结果发现实际上只有一个获批。\"}]\n23:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"大约在同一时间，微软在印度启动了对当时尚未发布的 GPT-4 的测试，这是该革命性代码首次在未经联合安全委员会批准的情况下被公开发布。而且没有人费心告知 OpenAI 董事会这次跳过了安全审批"])</script><script>self.__next_f.push([1,"。独立董事们是在其中一人参加完长达六小时的董事会会议、离开时在走廊被一名 OpenAI 员工拦下才得知的。在那次会议中，奥特曼或布罗克曼从未提及这次违规行为。\"}]\n24:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"然后，在 2023 年夏天的一个晚上，一位 OpenAI 董事会成员在一个晚宴上无意中听到有人在讨论 OpenAI 的创业基金 (Startup Fund)。该基金于 2021 年启动，旨在投资与人工智能相关的初创公司，OpenAI 曾宣布该基金将由 OpenAI “管理”。但这位董事会成员听到有人抱怨该基金的利润并未流向 OpenAI 投资者。\"}]\n25:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"（图片：2023 年 OpenAI 董事会成员。顺时针从左上起：山姆·奥特曼、格雷格·布罗克曼、伊利亚·苏茨克维、塔莎·麦考利、海伦·托纳和亚当·德安吉洛）\"}]\n26:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这对董事会来说是新闻，于是他们询问了奥特曼。经过数月了解，董事们得知奥特曼个人拥有该基金。OpenAI 的高管们最初表示这是出于税务原因，后来最终解释说奥特曼设立该基金是因为这样更快，而且只是一个“临时”安排。OpenAI 表示奥特曼没有从该基金中获得任何费用或利润——这是一种不同寻常的安排。\"}]\n27:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"对于独立董事们来说，这种行政疏忽令人难以置信——并让他们将之前的疏忽视为可能存在的蓄意欺骗模式的一部分。例如，去年秋天 OpenAI 发布 ChatGPT 时，他们也没有收到通知。当时 ChatGPT 被认为是使用现有技术的“研究预览版”，但最终席卷了全球。（《华尔街日报》的所有者新闻集团与 OpenAI 签订了内容授权合作协议。）\"}]\n28:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"九月下旬，苏茨克维给托纳发邮件，问她第二天是否有时间谈话。这极不寻常。他们在董事会"])</script><script>self.__next_f.push([1,"会议之外几乎不交谈。电话里，苏茨克维支支吾吾了一番，最后透露了一个线索：“你应该多和米拉谈谈。”\"}]\n29:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"米拉·穆拉蒂 (Mira Murati) 于 2022 年 5 月被提升为 OpenAI 的首席技术官，并从那时起实际上一直在负责公司的日常运营。当托纳打电话给她时，穆拉蒂描述了她所认为的奥特曼的有毒管理风格多年来是如何引发问题的，以及奥特曼和布罗克曼之间的动态关系——布罗克曼向她汇报，但每当她试图约束他时，他就会去找奥特曼——让她几乎无法工作。\"}]\n2a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"几个月前，穆拉蒂曾直接向奥特曼提出过其中一些问题，而奥特曼的回应是连续几周带着人力资源主管参加他们的一对一会议，直到她最终告诉他，她不打算将她的反馈分享给董事会。\"}]\n2b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"托纳回头去找了公司那位预言家般的首席科学家苏茨克维。苏茨克维明确表示，他因为多种原因对奥特曼失去了信任，包括奥特曼倾向于挑拨高级员工互斗。2021 年，苏茨克维规划并启动了一个团队来探索 OpenAI 的下一个研究方向，但几个月后，另一位 OpenAI 研究员雅库布·帕乔基 (Jakub Pachocki) 开始进行非常相似的研究。两个团队合并了，在苏茨克维将重心转向人工智能安全后，帕乔基接管了团队。奥特曼后来提拔帕乔基为研究总监，并私下向两人都承诺他们可以领导公司的研究方向，这导致了数月的生产力损失。\"}]\n2c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"苏茨克维一直在等待一个董事会动态允许替换奥特曼 CEO 职位的时机。\"}]\n2d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"接下来的几周里，穆拉蒂和苏茨克维小心翼翼，生怕被奥特曼发现，分别与每位独立董事进行了交谈。正是因为他们每天保"])</script><script>self.__next_f.push([1,"持联系，独立董事们才抓住了奥特曼一个特别恶劣的谎言。\"}]\n2e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"（图片：2023 年 10 月，OpenAI 首席技术官米拉·穆拉蒂在《华尔街日报》Tech Live 会议上发言。）\"}]\n2f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"2023 年 10 月，OpenAI 首席技术官米拉·穆拉蒂在《华尔街日报》Tech Live 会议上发言。照片：Nikki Ritcher for WSJ\"}]\n30:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"托纳在 10 月份发表了一篇论文，其中重申了对 OpenAI 安全方法的批评。奥特曼对此大怒。他告诉苏茨克维，麦考利说过托纳显然应该因为这篇文章离开董事会。当麦考利从苏茨克维那里听到这种说法时，她吃了一惊——她知道自己从未说过这样的话。\"}]\n31:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"苏茨克维和穆拉蒂一直在收集证据，现在苏茨克维愿意分享了。他使用 Gmail 的阅后即焚邮件功能，给托纳、麦考利和德安吉洛发送了两份冗长的 PDF 文档。\"}]\n32:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"一份是关于奥特曼的，另一份是关于布罗克曼的。关于奥特曼的文件包含了他被指控的数十个谎言和其他有害行为的例子，大部分有穆拉蒂 Slack 频道的截屏作为佐证。其中一个例子是，奥特曼告诉穆拉蒂，公司法务部门表示 GPT-4 Turbo 无需通过联合安全委员会的审查。当穆拉蒂向公司最高级别的律师核实时，律师表示他并未说过这话。关于布罗克曼的文件则主要集中在他被指控的欺凌行为上。\"}]\n33:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"苏茨克维警告说，如果他们要行动，就必须迅速行动。\"}]\n34:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"于是，在 2023 年 11 月 16 日星期四下午，他和三位独立董事登录了视频通话，投票决定解雇奥特曼。考虑到如果穆拉蒂需要向布罗克曼汇报，她不太可能同意担"])</script><script>self.__next_f.push([1,"任临时 CEO，他们还投票决定将布罗克曼从董事会除名。投票后，独立董事们告诉苏茨克维，他们一直担心他是被派来试探他们忠诚度的间谍。\"}]\n35:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"那天晚上，穆拉蒂正在参加一个会议，四位董事会成员打电话告诉她，他们将在第二天解雇奥特曼，并请她担任临时 CEO。她同意了。当她问及解雇原因时，他们没有告诉她。\"}]\n36:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“你把这事告知萨提亚（纳德拉）了吗？”穆拉蒂问道，她深知微软 CEO 萨提亚·纳德拉 (Satya Nadella) 对他们合作关系的承诺对公司至关重要。他们还没有。他们决定由穆拉蒂在消息发布到 OpenAI 网站之前告知微软。\"}]\n37:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"奥特曼被突然解雇的消息立即成为全球爆炸性的头条新闻。\"}]\n38:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"但对于奥特曼被解雇的原因，除了他未能对董事会“一贯坦诚”之外，董事会无法向员工或更广泛的公众提供任何答案。\"}]\n39:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"周五晚上，OpenAI 的董事会和高管团队召开了一系列气氛日益紧张的会议。穆拉蒂开始担忧，董事会未能更好地为奥特曼被解雇的后果做准备，正在将 OpenAI 置于风险之中。有一次，她和高管团队的其他成员给了董事会 30 分钟的最后期限，要求他们解释解雇奥特曼的原因或辞职——否则高管团队将集体辞职。\"}]\n3a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"董事会觉得他们不能透露是穆拉蒂向他们提供了部分关于奥特曼管理失误的最详细证据。他们原本指望穆拉蒂在他们寻找 CEO 期间安抚员工。结果，她却在领导同事反抗董事会。\"}]\n3b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"一种说法开始在奥特曼的盟友中散布，称整件事是苏茨克维因对帕乔基晋升感"])</script><script>self.__next_f.push([1,"到愤怒而发动的“政变”，并得到了托纳因奥特曼试图将她逐出董事会而感愤怒的助推。\"}]\n3c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"苏茨克维惊呆了。他原本期望 OpenAI 的员工会欢呼。\"}]\n3d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"到周一早上，几乎所有员工都签署了一封联名信，威胁如果奥特曼不复职就辞职。签名者中包括穆拉蒂和苏茨克维。情况已经很明显，阻止公司崩溃的唯一方法就是请回奥特曼。\"}]\n"])</script><script>self.__next_f.push([1,"13:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nd:null\n"])</script><script>self.__next_f.push([1,"3e:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"f:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"山姆·奥特曼被OpenAI解雇的真实内幕 | Linguista\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"2023年11月，OpenAI董事会秘密投票解雇了CEO山姆·奥特曼。本文基于数十位亲历者的采访，揭示了奥特曼被罢免的深层原因——包括反复误导董事会、隐瞒创业基金所有权、绕过安全审查流程，以及挑拨高管内斗等信任破裂行为，还原了这场科技史上最戏剧性权力更迭的完整经过。\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"OpenAI,山姆·奥特曼,公司治理,人工智能,董事会政变\"}],[\"$\",\"link\",\"3\",{\"rel\":\"canonical\",\"href\":\"https://linguista.cn/rosetta/notes/missing-source-url/sam-altman-fired-openai-insider-story/\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:title\",\"content\":\"山姆·奥特曼被OpenAI解雇的真实内幕 | Linguista\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:description\",\"content\":\"2023年11月，OpenAI董事会秘密投票解雇了CEO山姆·奥特曼。本文基于数十位亲历者的采访，揭示了奥特曼被罢免的深层原因——包括反复误导董事会、隐瞒创业基金所有权、绕过安全审查流程，以及挑拨高管内斗等信任破裂行为，还原了这场科技史上最戏剧性权力更迭的完整经过。\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:url\",\"content\":\"https://linguista.cn/rosetta/notes/missing-source-url/sam-altman-fired-openai-insider-story/\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:site_name\",\"content\":\"Linguista\"}],[\"$\",\"meta\",\"8\",{\"property\":\"og:locale\",\"content\":\"zh_CN\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:image\",\"content\":\"https://linguista.cn/img/rosetta-social.png\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:image:alt\",\"content\":\"山姆·奥特曼被OpenAI解雇的真实内幕\"}],[\"$\",\"meta\",\"11\",{\"property\":\"og:image:width\",\"content\":\"512\"}],[\"$\",\"meta\",\"12\",{\"property\":\"og:image:height\",\"content\":\"512\"}],[\"$\",\"meta\",\"13\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"14\",{\"na
