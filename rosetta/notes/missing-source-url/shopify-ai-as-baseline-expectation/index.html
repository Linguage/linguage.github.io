仙境的隐喻，指在快速发展的环境中必须持续进步才能维持现有位置，Shopify以此描述员工需要不断成长以匹配公司年增长率\n\n**GSD原型阶段**：Get Stuff Done的缩写，指Shopify内部项目推进流程中的原型验证环节，备忘录要求该阶段必须以AI探索为主导来加速学习和信息创造\n\n**AI倍增器效应**：指AI不同于传统工具，能将优秀人才的产出从十倍放大至百倍，使团队有能力应对此前认为不可能完成的任务\n\n**自主AI智能体**：指能够独立执行任务的AI系统，备忘录要求团队在规划资源时将其视为潜在的虚拟团队成员加以考量\n\n**复杂性曲线**：Shopify的核心理念之一，指创业过程中技能和知识门槛随阶段递增的难度曲线，AI的引入旨在大幅降低这条曲线让更多人得以创业\n\n来源：[Tobi Lutke的X](https://x.com/tobi/status/1909251946235437514)\n\n**背景**：这是一份Shopify内部备忘录，我在此分享是因为它正在被泄露，并且（据推测）会被恶意展示。\n\n---\n\n**团队成员们，**\n\n我们正进入一个可能比历史上任何时期都能创造出更多商家和创业者的时代。我们常说要降低复杂性曲线，让更多人能选择创业作为职业。创业路上的每一步都充满了需要技能、判断力和知识的决策。让AI伴随这段旅程，并且越来越多地不仅提供咨询，还为我们的商家完成实际工作，这是一个令人惊叹的阶跃式变化。\n\n我们在Shopify的任务是，让我们的软件毫无疑问地成为孕育未来最佳企业的最佳画布。我们通过让每个人保持前沿，并引入所有最好的工具来实现这一点，以便我们的商家能够取得超乎他们自己想象的成功。为此，我们必须绝对领先。\n\n**主动自觉地使用AI现已成为Shopify的基本要求**\n\n也许你已经做到了，觉得这份备忘录令人费解。那样的话，你已经将AI用作思想伙伴、深度研究员、批评家、导师或结对程序员。我一直都在使用它，但即便如此，我仍感觉自己只是触及了皮毛。这是我职业生涯中见过的最快的工作方式转变，我对它的热情也表达得相当明确：你们在每周视频、播客、全体会议以及……峰会（Summit）上都听我谈论过AI！去年夏天，我使用智能体（agents）创作了我的演讲稿，并分享了相关经验。我这样做是为了号召和邀请大家去探索尝试AI，以消除任何关于此事在各个层面都至关重要的疑虑或困惑。你们中的许多人响应了号召，而我们所有这样做的人都对AI能够增强我们的技能、技艺并填补我们不足之处的新能力和工具感到无比敬畏。\n\n到目前为止，我们学到的是，善用AI是一项需要通过……大量使用来仔细学习的技能。它与其他任何事物都太不一样了。号召大家去探索尝试是正确的，但这更像是一个建议。这就是我今天想要改变的地方。我们还了解到，与大多数工具不同，AI扮演着倍增器的角色。我们都很幸运能与一些了不起的同事共事，他们能贡献出以前认为可能的10倍成果。这是我最喜欢这家公司的一点。更令人惊叹的是，我们第一次看到工具本身也变成了10倍的工具。我见过许多这样的人，通过本能且出色地运用AI，处理那些我们以前甚至不会选择去 tackling 的、看似不可能完成的任务，完成了100倍的工作量。\n\n多年前，在我的《关于领导力》（On Leadership）备忘录中，我引用《爱丽丝梦游仙境》的故事，将Shopify描述为一场红皇后赛跑——你必须不停奔跑才能保持原地。在一个年增长20-40%的公司里，你每年至少要进步这么多，才能重新证明自己的价值。这对我以及其他所有人都适用。\n\n这听起来令人生畏，但考虑到这些工具的特性，这对我来说甚至不再显得特别有野心了。这也正是我们的顶尖员工告诉我们他们想要的那种环境。在一个由同样处于个人成长旅程、致力于解决有价值、有意义且困难问题的人们所围绕的环境中共同学习，这正是Shopify旨在创造的环境。这既代表了机遇，也代表了要求，与我们的核心价值观“保持学习”（Be a Constant Learner）和“拥抱变化”（Thrive on Change）紧密相连。这些不仅仅是鼓舞人心的口号——它们是成为这个世界级团队一员的基本期望。这是我们创始人想要的，也是我们建立起来的。\n\n**这意味着什么**\n\n*   有效使用AI现在是对Shopify每个人的基本要求。它如今是万能工具，而且只会越来越重要。坦白说，我认为选择不去学习在你的专业领域应用AI这项技能是不可行的；你可以尝试，但我想坦诚地说，我看不到这在今天行得通，明天肯定更不行。停滞不前几乎是必然的，而停滞就是慢动作的失败。不进则退。\n\n*   AI必须成为你GSD原型（Prototype）阶段的一部分。任何GSD项目的原型阶段都应以AI探索为主导。原型旨在学习和创造信息。AI极大地加速了这一过程。你可以在过去所需时间的一小部分内，学会制作出其他团队成员可以查看、使用和推演的东西。\n\n*   我们将在绩效和同事互评问卷中增加关于AI使用的问题。学会善用AI是一项并非显而易见的技能。我的感觉是，很多人在编写了一个提示（prompt）却没有立即得到理想结果后就放弃了。学习如何编写提示和加载上下文非常重要，让同事就此进展提供反馈将很有价值。\n\n*   学习是自主进行的，但要分享你学到的东西。你可以接触到尽可能多的最前沿的AI工具。我们有已经使用了几年的 chat.shopify.io。开发者有 proxy、Copilot、Cursor、Claude code，都已预先配置好，随时可用。我们将作为一个团队共同学习和适应。在尝试新的AI功能时，我们会互相分享成功经验（和失败教训！），并将在月度业务回顾和产品开发周期中专门安排时间讨论AI集成。Slack和Vault（内部工具名）上有很多地方供大家分享他们开发的提示，比如 #revenue-ai-use-cases 和 #ai-centaurs。\n\n*   在要求增加人员编制和资源之前，团队必须证明为什么他们无法利用AI来完成想做的事情。如果自主AI智能体（autonomous AI agents）已经是团队的一部分，这个领域会是什么样子？这个问题可以引出非常有趣的讨论和项目。\n\n*   每个人就是指所有人。这适用于我们所有人——包括我和高管团队。\n\n**前行之路**\n\nAI将彻底改变Shopify、我们的工作以及我们生活的方方面面。我们对此全力以赴！我想不出比在这里更能参与这场真正前所未有的变革的地方了。你不仅能获得前排座位，而且被整个公司共同学习、共同推动事物前进的氛围所包围。\n\n我们的工作是弄清楚，在一个AI普及的世界里，创业会是什么样子。我希望我们能把这项工作做到最好，而要做到这一点，我需要每个人的帮助。我已经在今年的主题中规划了许多AI项目——我们的路线图是清晰的，我们的产品将更好地契合我们的使命。我们需要的是我们集体技能和雄心的总和，再乘以AI的力量，来为我们的商家创造福祉。\n\n\\- Tobi\nShopify CEO\n\n\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L16\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"shopify-ai-as-baseline-expectation\",\"slugSegments\":[\"notes\",\"missing-source-url\",\"shopify-ai-as-baseline-expectation\"],\"pathSegments\":[\"notes\",\"missing-source-url\",\"shopify-ai-as-baseline-expectation\"],\"urlPath\":\"/rosetta/notes/missing-source-url/shopify-ai-as-baseline-expectation\",\"href\":\"/rosetta/notes/missing-source-url/shopify-ai-as-baseline-expectation\",\"category\":\"missing-source-url\",\"title\":\"主动自觉地使用AI现已成为Shopify的基本要求\",\"date\":\"2025-04-07\",\"excerpt\":\"Shopify CEO Tobi Lutke发布内部备忘录，宣布主动使用AI已成为公司对所有员工的基本要求。备忘录指出AI是倍增器，能让优秀员工产出百倍成果，并将AI使用纳入绩效评估体系。团队在申请增加人员前须先证明无法通过AI完成目标，公司致力于在AI普及时代重新定义创业形态。\",\"coverImage\":\"$undefined\",\"author\":\"Tobi Lutke\",\"original\":\"「Shopify内部备忘录」主动自觉地使用AI现已成为Shopify的基本要求.md\",\"originalUrl\":\"$undefined\",\"score\":\"$undefined\",\"content\":\"$17\",\"tags\":[\"Shopify\",\"AI转型\",\"企业管理\",\"组织变革\",\"创业\"],\"draft\":fal \"]},{\"type\":\"entry\",\"title\":\"博士生涯生存指南\",\"href\":\"/rosetta/notes/missing-source-url/phd-survival-guide-andrej-karpathy\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"phd-survival-guide-andrej-karpathy\"]},{\"type\":\"entry\",\"title\":\"美国众议院党派倾向和超级合作者的兴起\",\"href\":\"/rosetta/notes/missing-source-url/rise-of-partisanship-and-super-cooperators-in-us-house\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"rise-of-partisanship-and-super-cooperators-in-us-house\"]},{\"type\":\"entry\",\"title\":\"科学研究成功的三大黄金法则\",\"href\":\"/rosetta/notes/missing-source-url/three-golden-rules-for-successful-scientific-research\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"three-golden-rules-for-successful-scientific-research\"]},{\"type\":\"entry\",\"title\":\"自动化的讽刺\",\"href\":\"/rosetta/notes/missing-source-url/ironies-of-automation\",\"pathSegments\":[\"notes\",\"missing-source-url\",\"ironies-of-automation\"]}]}]}]},\"directoryHref\":\"/rosetta/notes/missing-source-url\",\"children\":\"$L18\"}]\n"])</script><script>self.__next_f.push([1,"18:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Shopify CEO Tobi Lutke发布内部备忘录，宣布主动使用AI已成为公司对所有员工的基本要求。备忘录指出AI是倍增器，能让优秀员工产出百倍成果，并将AI使用纳入绩效评估体系。团队在申请增加人员前须先证明无法通过AI完成目标，公司致力于在AI普及时代重新定义创业形态。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"红皇后赛跑\"}],\"：源自爱丽丝梦游仙境的隐喻，指在快速发展的环境中必须持续进步才能维持现有位置，Shopify以此描述员工需要不断成长以匹配公司年增长率\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"GSD原型阶段\"}],\"：Get Stuff Done的缩写，指Shopify内部项目推进流程中的原型验证环节，备忘录要求该阶段必须以AI探索为主导来加速学习和信息创造\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"AI倍增器效应\"}],\"：指AI不同于传统工具，能将优秀人才的产出从十倍放大至百倍，使团队有能力应对此前认为不可能完成的任务\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"自主AI智能体\"}],\"：指能够独立执行任务的AI系统，备忘录要求团队在规划资源时将其视为潜在的虚拟团队成员加以考量\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"复杂性曲线\"}],\"：Shopify的核心理念之一，指创业过程中技能和知识门槛随阶段递增的难度曲线，AI的引入旨在大幅降低这条曲线让更多人得以创业\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"来源：\",[\"$\",\"a\",null,{\"href\":\"https://x.com/tobi/status/1909251946235437514\",\"children\":\"Tobi Lutke的X\"}]]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"背景\"}],\"：这是一份Shopify内部备忘录，我在此分享是因为它正在被泄露，并且（据推测）会被恶意展示。\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"团队成员们，\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们正进入一个可能比历史上任何时期都能创造出更多商家和创业者的时代。我们常说要降低复杂性曲线，让更多人能选择创业作为职业。创业路上的每一步都充满了需要技能、判断力和知识的决策。让AI伴随这段旅程，并且越来越多地不仅提供咨询，还为我们的商家完成实际工作，这是一个令人惊叹的阶跃式变化。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们在Shopify的任务是，让我们的软件毫无疑问地成为孕育未来最佳企业的最佳画布。我们通过让每个人保持前沿，并引入所有最好的工具来实现这一点，以便我们的商家能够取得超乎他们自己想象的成功。为此，我们必须绝对领先。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"主动自觉地使用AI现已成为Shopify的基本要求\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"也许你已经做到了，觉得这份备忘录令人费解。那样的话，你已经将AI用作思想伙伴、深度研究员、批评家、导师或结对程序员。我一直都在使用它，但即便如此，我仍感觉自己只是触及了皮毛。这是我职业生涯中见过的最快的工作方式转变，我对它的热情也表达得相当明确：你们在每周视频、播客、全体会议以及……峰会（Summit）上都听我谈论过AI！去年夏天，我使用智能体（agents）创作了我的演讲稿，并分享了相关经验。我这样做是为了号召和邀请大家去探索尝试AI，以消除任何关于此事在各个层面都至关重要的疑虑或困惑。你们中的许多人响应了号召，而我们所有这样做的人都对AI能够增强我们的技能、技艺并填补我们不足之处的新能力和工具感到无比敬畏。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"到目前为止，我们学到的是，善用AI是一项需要通过……大量使用来仔细学习的技能。它与其他任何事物都太不一样了。号召大家去探索尝试是正确的，但这更像是一个建议。这就是我今天想要改变的地方。我们还了解到，与大多数工具不同，AI扮演着倍增器的角色。我们都很幸运能与一些了不起的同事共事，他们能贡献出以前认为可能的10倍成果。这是我最喜欢这家公司的一点。更令人惊叹的是，我们第一次看到工具本身也变成了10倍的工具。我见过许多这样的人，通过本能且出色地运用AI，处理那些我们以前甚至不会选择去 tackling 的、看似不可能完成的任务，完成了100倍的工作量。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"多年前，在我的《关于领导力》（On Leadership）备忘录中，我引用《爱丽丝梦游仙境》的故事，将Shopify描述为一场红皇后赛跑——你必须不停奔跑才能保持原地。在一个年增长20-40%的公司里，你每年至少要进步这么多，才能重新证明自己的价值。这对我以及其他所有人都适用。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这听起来令人生畏，但考虑到这些工具的特性，这对我来说甚至不再显得特别有野心了。这也正是我们的顶尖员工告诉我们他们想要的那种环境。在一个由同样处于个人成长旅程、致力于解决有价值、有意义且困难问题的人们所围绕的环境中共同学习，这正是Shopify旨在创造的环境。这既代表了机遇，也代表了要求，与我们的核心价值观“保持学习”（Be a Constant Learner）和“拥抱变化”（Thrive on Change）紧密相连。这些不仅仅是鼓舞人心的口号——它们是成为这个世界级团队一员的基本期望。这是我们创始人想要的，也是我们建立起来的。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"这意味着什么\"}]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"有效使用AI现在是对Shopify每个人的基本要求。它如今是万能工具，而且只会越来越重要。坦白说，我认为选择不去学习在你的专业领域应用AI这项技能是不可行的；你可以尝试，但我想坦诚地说，我看不到这在今天行得通，明天肯定更不行。停滞不前几乎是必然的，而停滞就是慢动作的失败。不进则退。\"}],\"\\n\"]}],\"\\n\",\"$L19\",\"\\n\",\"$L1a\",\"\\n\",\"$L1b\",\"\\n\",\"$L1c\",\"\\n\",\"$L1d\",\"\\n\"]}],\"\\n\",\"$L1e\",\"\\n\",\"$L1f\",\"\\n\",\"$L20\",\"\\n\",\"$L21\"]\n"])</script><script>self.__next_f.push([1,"19:[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI必须成为你GSD原型（Prototype）阶段的一部分。任何GSD项目的原型阶段都应以AI探索为主导。原型旨在学习和创造信息。AI极大地加速了这一过程。你可以在过去所需时间的一小部分内，学会制作出其他团队成员可以查看、使用和推演的东西。\"}],\"\\n\"]}]\n1a:[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们将在绩效和同事互评问卷中增加关于AI使用的问题。学会善用AI是一项并非显而易见的技能。我的感觉是，很多人在编写了一个提示（prompt）却没有立即得到理想结果后就放弃了。学习如何编写提示和加载上下文非常重要，让同事就此进展提供反馈将很有价值。\"}],\"\\n\"]}]\n1b:[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"学习是自主进行的，但要分享你学到的东西。你可以接触到尽可能多的最前沿的AI工具。我们有已经使用了几年的 chat.shopify.io。开发者有 proxy、Copilot、Cursor、Claude code，都已预先配置好，随时可用。我们将作为一个团队共同学习和适应。在尝试新的AI功能时，我们会互相分享成功经验（和失败教训！），并将在月度业务回顾和产品开发周期中专门安排时间讨论AI集成。Slack和Vault（内部工具名）上有很多地方供大家分享他们开发的提示，比如 #revenue-ai-use-cases 和 #ai-centaurs。\"}],\"\\n\"]}]\n1c:[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在要求增加人员编制和资源之前，团队必须证明为什么他们无法利用AI来完成想做的事情。如果自主AI智能体（autonomous AI agents）已经是团队的一部分，这个领域会是什么样子？这个问题可以引出非常有趣的讨论和项目。\"}],\"\\n\"]}]\n1d:[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"每个人"])</script><script>self.__next_f.push([1,"就是指所有人。这适用于我们所有人——包括我和高管团队。\"}],\"\\n\"]}]\n1e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"前行之路\"}]}]\n1f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI将彻底改变Shopify、我们的工作以及我们生活的方方面面。我们对此全力以赴！我想不出比在这里更能参与这场真正前所未有的变革的地方了。你不仅能获得前排座位，而且被整个公司共同学习、共同推动事物前进的氛围所包围。\"}]\n20:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们的工作是弄清楚，在一个AI普及的世界里，创业会是什么样子。我希望我们能把这项工作做到最好，而要做到这一点，我需要每个人的帮助。我已经在今年的主题中规划了许多AI项目——我们的路线图是清晰的，我们的产品将更好地契合我们的使命。我们需要的是我们集体技能和雄心的总和，再乘以AI的力量，来为我们的商家创造福祉。\"}]\n21:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"- Tobi\\nShopify CEO\"}]\n"])</script><script>self.__next_f.push([1,"13:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nd:null\n"])</script><script>self.__next_f.push([1,"22:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"f:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"主动自觉地使用AI现已成为Shopify的基本要求 | Linguista\"}]
