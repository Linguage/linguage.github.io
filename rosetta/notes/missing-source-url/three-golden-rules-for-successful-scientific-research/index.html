不要去解决别人同样能做好的问题，确保自身贡献的独特性。这三条规则务实而冷峻，揭示了科学世界残酷无情的本质。\n\n## 核心概念及解读\n\n**能力边界工作法**：不做太简单或太难的研究，始终在个人能力的临界点上探索，以此不断拓展自身的研究边界\n\n**科学严谨性优先**：当研究的社会实用价值与学术严谨性发生矛盾时，必须优先保障严谨性，避免为紧迫问题提供不成熟的方案\n\n**独特贡献原则**：避免与同行竞争同一问题，只投入那些你能比任何人做得更好的领域，从而确保研究成果不可替代\n\n**江湖骗术警示**：在不治之症等紧迫领域，不成熟的解决方案容易被急切采纳，这正是伪科学滋生的温床\n\n**务实科研观**：科学世界并非温和之地，认清其残酷本质有助于研究者更理性地规划科研路径与资源分配\n\n- 原文链接：[The Three Golden Rules for Successful Scientific Research.](https://www.cs.utexas.edu/~EWD/transcriptions/EWD06xx/EWD637.html)\n\n本文致力于阐述三条规则，若想在科研中获得成功，遵循这些规则是必要的。（如果你能设法遵循它们，它们将被证明近乎充分，但那是另一回事了。）记录这些规则是为了那些渴望在科研中取得成功，却因未意识到这些规则并违反了它们而失败的人们。为避免任何误解，我想在第一段就强调，本文纯粹是务实的：不包含任何道德评判，你完全可以自行决定是否将追求科研成功视作人生中的崇高目标。我甚至把完全不做此决定的选择权留给你。\n\n第一条规则是“内在”的：它与你同他人的关系无关，只关乎孤立的你自己。内容如下：\n\n\u003e “尽可能提高你的质量标准，达到你能承受的最高水平，避免在常规问题上浪费时间，并始终尝试尽可能在你的能力边界上工作。这样做，因为这是发现如何向前推动该边界的唯一途径。”\n\n这条规则告诉我们，显而易见的可能以及显而易见的不可能都应避开：前者不具启发性，后者则毫无希望，两者都各有其贫瘠之处。\n\n第二条规则是“外在”的：它处理“科学世界”与“现实世界”之间的关系。内容如下：\n\n\u003e “我们都希望自己的工作既有社会意义，又具科学严谨性。如果我们能找到一个能同时满足这两个愿望的课题，那我们是幸运的；如果这两个目标相互冲突，那么应让科学严谨性的要求占上风。”\n\n这条规则的理由显而易见。如果你完成了一项无人感兴趣的“完美”工作，并无害处，恰恰相反：至少有一些“完美”的东西——即便它无关紧要——被增添到了我们的文化之中。然而，如果你为一个紧迫的问题提供了一个不成熟的、所谓的解决方案，你确实对世界造成了伤害，因为鉴于问题的紧迫性，世界只会非常乐意应用你那无效的“药方”。难怪江湖骗术总是在不治之症相关的领域大行其道。（我们的第二条规则传统上被社会科学所违背，其程度之深，以至于人们现在可以质疑它们是否还配得上“科学”这个名称。）\n\n第三条规则在“内在/外在”的标尺上介于两者之间：它处理你与你的科研同事之间的关系。内容如下：\n\n\u003e “永远不要去解决一个问题，如果你能相当确定（现在或在不久的将来）其他人也会着手解决它，而且那些人在解决该问题上至少和你一样有能力、条件一样好。”\n\n理由同样显而易见。如果其他人能得出与你所能获得的同样好的解决方案，那么你放手不管，世界也不会有任何损失。第三条规则的一个推论是，永远不要与同事竞争。如果你相当确定在某一领域你会比任何人都做得更好，请全身心投入去做；但若存有疑虑，则应放弃。第三条规则确保你的贡献——如果确实有贡献的话！——将是独一无二的。\n\n***\n\n我曾与来自世界各地、生活和工作环境迥异的多位同事核对过这三大黄金法则。他们都表示同意，并且也未感到震惊。这些规则或许让你觉得有点残酷……如果是这样，它们就应该如此，因为你越早发现科学世界并非一个温和之地，而是——就此而言，像其他大多数世界一样——一个相当残酷无情的世界，对你越好。愿你顺利。\n\n```\n- Plataanstraat 5\n- 5671 AL NUENEN\n- The Netherlands\t\n- 埃兹格·W·迪杰斯特拉 教授博士 (prof.dr. Edsger W. Dijkstra)\n- Burroughs 研究员 (Burroughs Research Fellow)\n\n```\n\nTranscription by Hai Zhou.\n\n最后修订于 2003年6月19日，星期四 (Last revised on Thu, 19 Jun 2003.)\n"])</script><script>self.__next e:props:post:pathSegments\"},{\"type\":\"entry\",\"title\":\"自动化的讽刺\",\"href\":\"/rosetta/notes/missing-source-url/ironies-of-automation\",\"pathSegments\":\"$e:props:neighbors:next:pathSegments\"}]}]}]},\"directoryHref\":\"/rosetta/notes/missing-source-url\",\"children\":\"$L19\"}]\n"])</script><script>self.__next_f.push([1,"19:[[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"摘要\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#摘要\",\"children\":\"摘要\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本文由计算机科学先驱Dijkstra撰写，提出科研成功的三条黄金法则。第一条要求研究者始终在能力边界上工作，追求最高质量标准；第二条主张当社会意义与科学严谨性冲突时，应优先保证严谨性；第三条建议不要去解决别人同样能做好的问题，确保自身贡献的独特性。这三条规则务实而冷峻，揭示了科学世界残酷无情的本质。\"}],\"\\n\",[\"$\",\"h2\",null,{\"className\":\"scroll-mt-[120px] font-serif text-[20px] md:text-[22px] font-bold text-text tracking-tight mt-[34px] mb-[15px] leading-[1.28]\",\"id\":\"核心概念及解读\",\"children\":[\"$\",\"a\",null,{\"className\":\"heading-anchor\",\"href\":\"#核心概念及解读\",\"children\":\"核心概念及解读\"}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"能力边界工作法\"}],\"：不做太简单或太难的研究，始终在个人能力的临界点上探索，以此不断拓展自身的研究边界\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"科学严谨性优先\"}],\"：当研究的社会实用价值与学术严谨性发生矛盾时，必须优先保障严谨性，避免为紧迫问题提供不成熟的方案\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"独特贡献原则\"}],\"：避免与同行竞争同一问题，只投入那些你能比任何人做得更好的领域，从而确保研究成果不可替代\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"江湖骗术警示\"}],\"：在不治之症等紧迫领域，不成熟的解决方案容易被急切采纳，这正是伪科学滋生的温床\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"务实科研观\"}],\"：科学世界并非温和之地，认清其残酷本质有助于研究者更理性地规划科研路径与资源分配\"]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"原文链接：\",[\"$\",\"a\",null,{\"href\":\"https://www.cs.utexas.edu/~EWD/transcriptions/EWD06xx/EWD637.html\",\"children\":\"The Three Golden Rules for Successful Scientific Research.\"}]]}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"本文致力于阐述三条规则，若想在科研中获得成功，遵循这些规则是必要的。（如果你能设法遵循它们，它们将被证明近乎充分，但那是另一回事了。）记录这些规则是为了那些渴望在科研中取得成功，却因未意识到这些规则并违反了它们而失败的人们。为避免任何误解，我想在第一段就强调，本文纯粹是务实的：不包含任何道德评判，你完全可以自行决定是否将追求科研成功视作人生中的崇高目标。我甚至把完全不做此决定的选择权留给你。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"第一条规则是“内在”的：它与你同他人的关系无关，只关乎孤立的你自己。内容如下：\"}],\"\\n\",[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“尽可能提高你的质量标准，达到你能承受的最高水平，避免在常规问题上浪费时间，并始终尝试尽可能在你的能力边界上工作。这样做，因为这是发现如何向前推动该边界的唯一途径。”\"}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这条规则告诉我们，显而易见的可能以及显而易见的不可能都应避开：前者不具启发性，后者则毫无希望，两者都各有其贫瘠之处。\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"第二条规则是“外在”的：它处理“科学世界”与“现实世界”之间的关系。内容如下：\"}],\"\\n\",[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“我们都希望自己的工作既有社会意义，又具科学严谨性。如果我们能找到一个能同时满足这两个愿望的课题，那我们是幸运的；如果这两个目标相互冲突，那么应让科学严谨性的要求占上风。”\"}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这条规则的理由显而易见。如果你完成了一项无人感兴趣的“完美”工作，并无害处，恰恰相反：至少有一些“完美”的东西——即便它无关紧要——被增添到了我们的文化之中。然而，如果你为一个紧迫的问题提供了一个不成熟的、所谓的解决方案，你确实对世界造成了伤害，因为鉴于问题的紧迫性，世界只会非常乐意应用你那无效的“药方”。难怪江湖骗术总是在不治之症相关的领域大行其道。（我们的第二条规则传统上被社会科学所违背，其程度之深，以至于人们现在可以质疑它们是否还配得上“科学”这个名称。）\"}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"第三条规则在“内在/外在”的标尺上介于两者之间：它处理你与你的科研同事之间的关系。内容如下：\"}],\"\\n\",[\"$\",\"blockquote\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"“永远不要去解决一个问题，如果你能相当确定（现在或在不久的将来）其他人也会着手解决它，而且那些人在解决该问题上至少和你一样有能力、条件一样好。”\"}],\"\\n\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"理由同样显而易见。如果其他人能得出与你所能获得的同样好的解决方案，那么你放手不管，世界也不会有任何损失。第三条规则的一个推论是，永远不要与同事竞争。如果你相当确定在某一领域你会比任何人都做得更好，请全身心投入去做；但若存有疑虑，则应放弃。第三条规则确保你的贡献——如果确实有贡献的话！——将是独一无二的。\"}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我曾与来自世界各地、生活和工作环境迥异的多位同事核对过这三大黄金法则。他们都表示同意，并且也未感到震惊。这些规则或许让你觉得有点残酷……如果是这样，它们就应该如此，因为你越早发现科学世界并非一个温和之地，而是——就此而言，像其他大多数世界一样——一个相当残酷无情的世界，对你越好。愿你顺利。\"}],\"\\n\",[\"$\",\"div\",null,{\"className\":\"my-8 overflow-hidden border border-border bg-placeholder/40 shadow-sm\",\"children\":[null,[\"$\",\"pre\",null,{\"className\":\"overflow-x-auto px-[18px] py-[18px] text-[13px] leading-[1.8] text-text\",\"children\":[\"$\",\"code\",null,{\"className\":\"rounded-none border border-border bg-placeholder/45 px-[6px] py-[2px] font-mono text-[0.9em] text-text\",\"children\":\"- Plataanstraat 5\\n- 5671 AL NUENEN\\n- The Netherlands\\t\\n- 埃兹格·W·迪杰斯特拉 教授博士 (prof.dr. Edsger W. Dijkstra)\\n- Burroughs 研究员 (Burroughs Research Fellow)\\n\\n\"}]}]]}],\"\\n\",\"$L1a\",\"\\n\",\"$L1b\"]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"Transcription by Hai Zhou.\"}]\n1b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后修订于 2003年6月19日，星期四 (Last revised on Thu, 19 Jun 2003.)\"}]\n"])</script><script>self.__next_f.push([1,"14:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n10:null\n"])</script><script>self.__next_f.push([1,"1c:I[6644,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"12:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"科学研究成功的三大黄金法则 | Linguista\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"本文由计算机科学先驱Dijkstra撰写，提出科研成功的三条黄金法则。第一条要求研究者始终在能力边界上工作，追求最高质量标准；第二条主张当社会意义与科学严谨性冲突时，应优先保证严谨性；第三条建议不要去解决别人同样能做好的问题，确保自身贡献的独特性。这三条规则务实而冷峻，揭示了科学世界残酷无情的本质。\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"科学研究,方法论,Dijkstra,学术准则,科研策略\"}],[\"$\",\"link\",\"3\
