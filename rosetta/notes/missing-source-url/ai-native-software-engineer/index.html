成高质量输出的技术手段，是高级工程师发挥专业优势的关键能力\n\n**信任但验证**：将AI视为知识丰富但经验尚浅的结对编程伙伴，利用其速度和信息量的同时，工程师必须对每一行代码的质量和正确性负最终责任\n\n**工程师即管理者**：AI时代工程师角色从亲力亲为转向协调和监督AI智能体完成任务，通过规则文件和结构化代码塑造人机协作环境\n\n**渐进式采用**：从小处着手逐步建立AI熟练度，先将任务交给AI模型观察表现，再结合编码助手和智能体工具形成完整的AI优先工作流程\n\n- 作者：Addy Osmani\n- 日期：2025年7月2日\n- 原文链接：[The AI-Native Software Engineer](https://addyo.substack.com/p/the-ai-native-software-engineer)\n- 交互式报告：[AI原生软件工程师](https://linguage.github.io/articles/ai-native-software-engineer.html)\n\n\n---\n\n**_AI原生软件工程师_ 是指那些将AI深度融入日常工作流程，视其为伙伴以放大自身能力的人。**\n\n这需要一个根本性的**思维转变**。AI原生工程师不会想“AI可能会取代我”，而是对每项任务都问自己：“_AI能帮助我更快、更好或以不同方式完成这项任务吗？_”。\n\n这种思维模式是乐观和积极主动的——你将AI视为提高生产力和创造力的倍增器，而非威胁。采用正确的方法，**AI可以将你作为工程师的产出提高2倍、5倍，甚至可能10倍**。经验丰富的开发者尤其会发现，他们的专业知识使他们能够以产生高水平结果的方式来提示AI；高级工程师可以通过适当的[上下文工程](https://x.com/karpathy/status/1937902205765607626)，向AI提出正确的问题，从而获得与同行交付结果相当的答案。\n\n\n\n![](https://substackcdn.com/image/fetch/$s_!t2_Y!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F2ae2c5e0-27c6-4959-b37d-67f2c40b2e09_1024x1024.png)\n\n\n\n成为AI原生意味着拥抱**持续学习和适应**——工程师从一开始就将基于AI的辅助和自动化融入软件构建中。这种思维模式会带来对可能性的兴奋而非恐惧。\n\n是的，可能会有不确定性和学习曲线——我们许多人都经历过兴奋、恐惧然后又回到兴奋的情绪过山车——但最终目标是落脚于兴奋和机遇。AI原生工程师将AI视为一种委派开发中重复或耗时部分（如样板代码、文档起草或测试生成）的方式，从而解放自己，专注于更高层次的问题解决和创新。\n\n**核心原则——AI是协作者，而非替代品：** AI原生工程师将AI视为一个知识渊博但经验尚浅的结对编程伙伴，并且全天候可用。\n\n你仍然主导开发过程，但会不断利用AI获取想法、解决方案，甚至是警告。例如，你可能会使用AI助手来集思广益架构方案，然后凭借自己的专业知识来完善这些想法。这种协作可以显著加快开发速度，同时提高质量——_如果你能保持监督_。\n\n重要的是，你不能将责任完全推给AI。把它想象成与一个阅读过所有StackOverflow帖子和API文档的初级开发者合作：他们拥有大量信息，可以快速生成代码，但**你负责指导他们并验证其输出**。这种“[信任但验证](https://addyo.substack.com/p/the-trust-but-verify-pattern-for)”的思维模式至关重要，我们稍后会再次讨论。\n\n\n![](https://substackcdn.com/image/fetch/$s_!qzj1!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F4ff8ce3d-bcdc-45ed-933b-c0a1038c63ea_1024x1024.png)\n\n\n\n坦率地说：AI 生成的劣质内容是真实存在的，这不能成为[低质量工作](https://addyo.substack.com/p/vibe-coding-is-not-an-excuse-for)的借口。使用这些工具的一个持续风险是草率批准的建议、微妙的幻觉和简单的懒惰相结合，这远远低于专业工程标准。这就是为什么“验证”是这个口号中不可协商的部分。作为工程师，你不仅仅是工具的使用者；你是最终的担保人。你仍然对你提交的每一行代码的质量、可读性、安全性和正确性负有全部直接责任。\n\n\n\n![](https://substackcdn.com/image/fetch/$s_!Qzt7!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F61fdf82a-2bcc-4a81-853e-779af54c24a2_1024x1024.png)\n\n\n\n**核心原则——现在每个工程师都是管理者：** 工程师的角色正在发生根本性变化。有了AI智能体，你更多地是协调工作，而不是亲力亲为地执行所有工作。\n\n你仍然对提交到主分支的每一项改动负责，但你更多地关注定义和“分配”要完成的工作。在不远的将来，我们可能会越来越多地说“[现在每个工程师都是管理者](https://x.com/levie/status/1938647740554092586)”。合法的工作可以指派给Jules或Codex等后台智能体，或者你可以让Claude Code/Gemini CLI/OpenCode处理分析或代码迁移项目。工程师需要有意识地塑造代码库，使其更容易与AI协作，这可以通过使用规则文件（例如GEMINI.md）、良好的READMEs和结构良好的代码来实现。这使得工程师扮演了[监督者、导师和验证者](https://www.infoworld.com/article/3994519/the-tough-task-of-making-ai-code-production-ready.html)的角色。AI优先的团队规模更小，能完成更多工作，并且能够[缩短SDLC的步骤](https://www.forrester.com/blogs/appgen-is-here-say-goodbye-to-software-development-as-you-know-it/)，从而更快地交付更高质量的产品。\n\n\n![](https://substackcdn.com/image/fetch/$s_!wUui!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F0f7cfea4-0f99-4c8d-81bd-d4c81070eee4_1024x1024.png)\n\n\n\n**高级优势：** 通过将AI完全融入你的工作流程，你可以实现显著的生产力飞跃，可能更快地发布更多功能，而不会牺牲质量（当然，这需要考虑任务复杂性等细微差别）。\n\n日常任务（从代码格式化到编写单元测试）可以在几秒钟内完成。也许更重要的是，AI可以增强你的理解：就像有一个随叫随到的专家，可以解释代码或在你专业领域之外的领域提出解决方案。结果是，AI原生工程师可以承担更雄心勃勃的项目，或者以更小的团队处理相同的工作量。从本质上讲，**AI扩展了你的能力**，让你在更高的抽象层次上工作。但前提是需要有效使用它——这就是正确的思维模式和实践发挥作用的地方。\n\n**示例——思维模式的实践：** 想象你正在调试一个棘手的问题或评估一个新的技术栈。传统方法可能涉及大量的Google搜索或阅读文档。而AI原生方法是与支持搜索基础或深度研究的AI助手互动：描述错误或询问技术栈的优缺点，让AI提供见解甚至代码示例。\n\n你仍然负责解释和实施，但AI会加速信息收集和可能的解决方案。一旦你习惯了，这种协作式问题解决就会成为第二天性。养成习惯，问自己：“_AI如何能帮助我完成这项任务？_”直到这成为一种反射。随着时间的推移，你将培养出AI擅长什么以及如何有效提示它的直觉。\n\n总而言之，**成为AI原生意味着将AI内化为你思考问题和构建软件的核心方式**。这是一种与机器协作的思维模式：利用它们的优势（速度、知识、模式识别）来补充你自己的优势（创造力、判断力、上下文）。有了这个基础，我们就可以进入将AI融入日常工作的实用步骤。\n\n如果你对AI原生工作流程完全陌生，一开始可能会感到望而生畏。关键是**从小处着手，逐步建立**你的AI熟练度。在本节中，我们将提供具体指导，帮助你在日常工程任务中从零开始，高效地使用AI。\n\n\n![](https://substackcdn.com/image/fetch/$s_!OGxs!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F3ef50d3c-e6f1-4b5e-a850-2177e561bbc1_1536x1024.png)\n\n\n\n_以上是对我们最终可能在软件生命周期中实现AI的推测性展望。我仍然坚信需要人工参与（工程、设计、产品、用户体验等），以确保质量不会下降。_\n\n**步骤1：第一个改变是什么？你通常从AI开始。**\n\nAI原生工作流程并非偶尔寻找AI可以提供帮助的任务；它通常是首先将任务交给AI模型，看看它的表现如何。[一个团队指出](https://www.ignorance.ai/p/ai-at-pulley)：\n\n\u003e 典型的工作流程是首先将任务交给AI模型（通过Cursor或CLI程序）……并理解很多任务仍然是“碰运气”。\n\n你是在研究一个领域还是一个竞争对手？从Gemini深度研究开始。发现自己陷入关于某个设计方面的无休止争论？当你的团队争论不休时，你可能已经用AI构建了三个原型来验证这个想法。Google员工已经[用它来制作幻灯片、调试生产事故等等](https://x.com/rmedranollamas/status/1938305816185966898)。\n\n当你听到“但LLM会产生幻觉，聊天机器人给出糟糕的答案”时，是时候更新你的工具链了。今天任何[认真使用AI编码的人都在使用智能体](https://fly.io/blog/youre-all-nuts/)。幻觉可以通过适当的[上下文工程](https://blog.langchain.com/the-rise-of-context-engineering/)和智能体反馈循环得到显著缓解和管理。思维转变是基础性的：我们所有人都应该立即成为AI优先的用户。\n\n**步骤2：准备好正确的AI工具。**\n\n要顺利集成AI，你需要在你的环境中至少设置一个编码助手。许多工程师从VS Code中的**GitHub Copilot**开始，它具有代码自动完成和代码生成功能。如果你使用VS Code等IDE，可以考虑安装一个AI扩展（例如，**Cursor**是一个专门的AI增强代码编辑器，而**[Cline](https://addyo.substack.com/p/why-i-use-cline-for-ai-engineering)**是一个用于AI智能体的VS Code插件——稍后会详细介绍这些）。这些工具非常适合初学者，因为它们在后台运行，为你正在编辑的任何文件实时提供代码建议。在编辑器之外，你还可以在单独的窗口中探索**ChatGPT、Gemini或Claude**，以获取问答式的帮助。从工具开始很重要，因为它降低了使用AI的摩擦。一旦安装，每当你想到“也许AI可以帮助我完成这项任务”时，AI就近在咫尺。\n\n**步骤3：学习提示基础——具体并提供上下文。**\n\n有效使用AI是一项技能，这项技能的核心是**[提示工程](https://addyo.substack.com/p/the-prompt-engineering-playbook-for)**。新用户常犯的一个错误是给AI一个过于模糊的指令，然后对结果感到失望。记住，AI不是读心术；它对你给出的提示做出反应。多一点上下文或清晰度会大有帮助。例如，如果你有一段代码，想要它的解释或单元测试，不要只说_“为这个写测试。”_ 相反，**在你的提示中描述代码的预期行为和要求**。比较以下两个为React登录表单组件编写测试的提示：\n\n*   **糟糕的提示：** “你能为我的React组件写测试吗？”\n\n*   **更好的提示：** “我有一个`LoginForm` React组件，包含一个电子邮件字段、密码字段和提交按钮。它在成功提交时显示成功消息，在失败时显示错误消息，通过`onSubmit`回调。**请编写一个Jest测试文件**，该文件：(1) 渲染表单，(2) 填写有效和无效输入，(3) 提交表单，(4) 断言`onSubmit`以正确数据被调用，以及 (5) 检查成功和错误状态是否正确渲染。”\n\n第二个提示更长，但它给了AI我们所需的一切。结果将**更准确和有用得多**，因为AI不会猜测我们的意图——我们已经明确说明了。实际上，多花一分钟澄清你的提示可以为你节省**数小时**的后期AI生成代码修正时间。\n\n\n![](https://substackcdn.com/image/fetch/$s_!NG0k!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F4d693ee6-61be-4250-ad42-b43ace337365_1024x1024.png)\n\n\n有效的提示是一项如此重要的技能，以至于Google发布了完整的指南（参见**[Google的提示指南101](https://workspace.google.com/learning/content/gemini-prompt-guide)**以获取一个很好的起点）。随着你的练习，你将对如何措辞请求有感觉。一些快速提示：明确你想要的格式（例如，“将输出返回为JSON”），在你的提示中将复杂任务分解为有序的步骤或项目符号，并尽可能提供示例。这些技术有助于AI更好地理解你的请求。\n\n**步骤4：使用AI进行代码生成和补全。**\n\n在设置好工具并掌握了如何提示后，开始将AI应用于实际的编码任务。一个好的首次用例是生成样板代码或重复性代码。例如，如果你需要一个函数来解析多种格式的日期字符串，请让AI来草拟。你可以说：_“编写一个Python函数，该函数接受可能为X、Y或Z格式的日期字符串，并返回一个datetime对象。包括对无效格式的错误处理。”_\n\nAI将生成一个初步实现。**不要盲目接受**——阅读它并运行测试。这种实践会让你对AI何时可靠建立信任。许多开发人员惊喜地发现AI在几秒钟内生成了一个不错的解决方案，然后他们可以对其进行调整。随着时间的推移，你可以转向更重要的代码生成任务，例如搭建整个类或模块的脚手架。例如，**Cursor**甚至提供根据描述生成整个文件或重构代码的功能。早期，依赖AI生成_辅助代码_——你理解但需要时间编写的东西——而不是核心的、关键的算法逻辑。这样，你可以在低风险任务上建立对AI能力的信心。\n\n**步骤5：将AI集成到非编码任务中。**\n\nAI原生不仅仅是更快地编写代码；它关乎改进你工作的方方面面。一个很好的起点是使用AI进行围绕编码的写作或分析任务。例如，尝试使用AI在你进行代码更改后**编写提交信息或拉取请求描述**。你可以粘贴一个git diff并询问：“用专业的PR描述总结这些更改。”AI会起草一些你可以润色的内容。\n\n这是休闲用户和真正的AI原生工程师之间的关键区别。**最优秀的工程师一直都知道，他们的主要价值不仅仅在于敲代码，还在于围绕代码的思考、规划、研究和沟通。** 将AI应用于这些领域——加速研究、澄清文档或构建项目计划——是一个巨大的倍增器。将AI视为整个工程流程的助手，而不仅仅是编码部分，对于充分发挥其在速度和创新方面的潜力至关重要。\n\n沿着这些思路，使用AI来**记录代码**：让它根据你的代码库生成文档字符串，甚至整个技术文档部分。另一个想法是使用AI进行**规划**——如果你不确定如何实现某个功能，描述需求并让AI概述一个可能的方案。这可以为你提供一个起始蓝图，然后你可以进行调整。不要忘记日常沟通：许多工程师使用AI来起草电子邮件或Slack消息，特别是在传达复杂想法时。\n\n例如，如果你需要向产品经理解释某个bug为何棘手，你可以让AI帮助清晰地阐述解释。这听起来微不足道，但它确实能提高生产力，并有助于确保你有效沟通。记住，_“并非所有事情都与代码有关”_——AI也可以协助会议、头脑风暴和表达想法。AI原生工程师会利用这些机会。\n\n**步骤6：通过反馈迭代和改进。**\n\n当你开始日常使用AI时，将其视为你自己的学习过程。注意AI输出需要修正的地方，并尝试推断原因。是提示不完整？AI是否假设了错误的上下文？利用这些反馈在下次创建更好的提示。大多数AI编码助手都允许迭代过程：你可以说“哎呀，那个函数没有正确处理空输入，请修复一下”，AI会完善它的答案。利用这种交互性——通过告诉AI需要更改什么来纠正AI的草稿通常比从头开始编写更快。\n\n随着时间的推移，你将开发出一个运行良好的提示模式库。例如，你可能会发现_“像我是一个新团队成员一样解释X”_对于文档目的可以产生非常好的高层代码解释。或者，在你的提示中提供一个简短的输入和输出示例可以极大地改进AI对数据转换任务的答案。将这些发现融入你的工作流程。\n\n**步骤7：始终验证和测试AI输出。**\n\n这一点再怎么强调也不为过：**永远不要假设AI是100%正确的**。即使代码编译通过或者答案看起来合理，也要尽职尽责地进行检查。运行代码，编写额外的测试，或者对推理进行健全性检查。许多AI生成的解决方案表面上可以工作，但在边缘情况或有细微的bug时就会失败。\n\n你是工程师；AI是助手。对AI编写的代码，使用你所有正常的最佳实践（代码审查、测试、静态分析），就像对待人类编写的代码一样。实际上，这意味着要预算一些时间来检查AI生成的内容。好消息是，阅读和理解代码通常比从头编写更快，所以即使经过验证，你在生产力方面仍然会领先。\n\n随着经验的积累，你还会了解到AI**弱势**的任务类型——例如，许多LLM在精确算术或高度领域特定的逻辑方面表现不佳——你就会知道要格外仔细地双重检查这些部分，或者避免将AI用于这些方面。建立这种直觉可以确保，当你信任AI生成的更改足以提交或部署时，你已经降低了风险。一个有用的思维模型是**将AI视为一个高效但不万能的队友**：你重视它的贡献，但始终亲自进行最终审查。\n\n**步骤8：逐步扩展到更复杂的用例。**\n\n一旦你习惯了AI处理小任务，你就可以探索更高级的集成。例如，从被动使用AI（在你想到时寻求帮助）转变为主动使用：让AI在你编码时进行监控。像**Cursor**或**Windsurf**这样的工具可以在智能体模式下运行，它们会监视错误或TODO注释并自动提出修复建议。或者你也可以尝试像**Cline**提供的**自主智能体**模式，其中AI可以规划多步骤任务（创建文件、在其中编写代码、运行测试等），并在每一步获得你的批准。\n\n这些高级用法可以释放更大的生产力，但它们也需要更高的警惕性（想象一下给一个初级开发者更大的自主权——你仍然需要定期检查）。\n\n一个强大的中间步骤是使用AI进行**端到端原型设计**。例如，挑战自己在周末主要借助AI辅助来构建一个简单的应用程序：描述你想要的应用程序，看看Replit的AI或Bolt能帮你做到多远，然后用你的技能来填补空白。这种练习对于理解AI当前的局限性以及学习如何更好地指导它非常有帮助。而且这很有趣——当你几个小时内就拥有一个可能需要几天甚至几周手动编码才能完成的工作原型时，你会感觉自己拥有了超能力。\n\n通过遵循这些步骤并逐步提升，你将从AI新手转变为一个能够本能地将AI融入其开发工作流程的人。下一节将更深入地探讨可用的**工具和平台**——了解针对不同任务使用何种工具是利用AI提高生产力的重要组成部分。\n\n现在成为工程师令人兴奋的原因之一是，AI驱动的工具种类繁多。作为一名AI原生软件工程师，你的技能之一就是知道**针对不同任务如何利用哪些工具**。在本节中，我们将考察AI编码工具和平台的现状，并提供关于如何有效选择和使用它们的指导。我们将它们大致分为两类——**AI编码助手**（它们集成到你的开发环境中，帮助你编写代码）和**AI驱动的原型设计工具**（它们可以根据提示生成整个项目脚手架或应用程序）。两者都很有价值，但它们服务于不同的需求。\n\n_在深入探讨具体工具之前，任何专业人士都必须将“数据隐私防火墙”作为其核心思维模式的一部分。始终问自己：“我是否愿意将此提示及其上下文记录在第三方服务器上？”这种自律是负责任地使用这些工具的基础。AI原生工程师学会区分适合公共云AI的任务和需要企业级、注重隐私甚至自托管的本地模型的任务。_\n\n这些工具就像与你的编辑器或IDE集成的“AI结对编程伙伴”。当你处理现有代码库或以传统方式（逐文件编写代码）构建项目时，它们非常宝贵。以下是一些值得注意的例子及其细微差别：\n\n*   **GitHub Copilot** 已从一个自动完成工具转变为一个真正的编码智能体：一旦你为其分配了一个问题或任务，它就能自主分析你的代码库，启动环境（例如通过GitHub Actions），提出多文件编辑建议，运行命令/测试，修复错误，并提交包含其推理日志的草稿拉取请求。它基于最先进的模型构建，支持多模型选择，并利用模型上下文协议（MCP）集成外部工具和工作区上下文，使其能够导航复杂的仓库结构，包括单体仓库、CI流水线、图像资产、API依赖项等。尽管取得了这些进步，它仍针对低到中等复杂度的任务进行了优化，并且仍然需要人工监督——尤其是在安全性、深层架构和多智能体协调方面。\n\n*   **Cursor - AI原生代码编辑器：** **Cursor**是一个深度集成AI的修改版VS Code编辑器。与作为插件的Copilot不同，Cursor是围绕AI从头开始构建的。它可以执行AI感知导航（要求它查找某个函数的使用位置等）和智能重构。值得注意的是，Cursor具有生成测试、解释代码，甚至“智能体”模式的功能，在该模式下它会尝试执行更大的任务。Cursor的理念是“超能”开发者，尤其是在**大型代码库**中。如果你在一个单体仓库或企业级项目中工作，Cursor理解项目级上下文（甚至可以使用.cursorrules文件等项目特定规则进行自定义）的能力可以改变游戏规则。许多开发人员最初以“提问”模式使用Cursor——你提出需求，获得确认，然后让它应用更改——这有助于确保它做正确的事情。Cursor的缺点是它是一个独立的编辑器（尽管VS Code用户会感到熟悉），目前它是一个付费产品。它非常受欢迎，有数百万开发者使用，包括在企业中，这说明了它的有效性。\n\n*   **Windsurf - 具有大上下文的AI编码智能体：** **Windsurf**是另一个AI增强的开发环境。Windsurf强调企业需求：它具有强大的数据隐私（无数据保留、自托管选项），甚至拥有HIPAA和FedRAMP等合规认证，这使其对关注代码安全的公司具有吸引力。功能上，Windsurf可以执行许多相同的辅助任务（代码补全、建议更改等），但根据经验，它在需要向AI提供整个文件或大量文档的场景中特别有用。如果你正在处理一个拥有数万行代码的代码库，并且需要AI了解其中大部分内容（例如，跨多个文件的全面重构），那么像Windsurf这样的工具值得考虑。\n\n*   **Cline - 用于VS Code的自主AI编码智能体：** **Cline**采用独特的方法，作为你编辑器内的_自主智能体_。它是一个开源的VS Code扩展，不仅可以建议代码，还可以在你的许可下创建文件、执行命令和执行多步任务。Cline在两种模式下运行：_计划_（它概述打算做什么）和_行动_（它在人工监督下执行这些步骤）。其理念是让AI处理更复杂的杂务，例如设置整个功能：它可以计划“添加一个新的API端点，包括路由、控制器和数据库迁移”，然后实现每个部分，并请求确认。这通过赋予开发者**对每一步的控制和可见性**，使AI辅助与专业工程工作流程对齐。我注意到Cline“不仅将AI视为代码生成器，还将其视为系统级工程工具”，这意味着它能够对项目结构进行推理并协调多个更改。缺点是：因为它能够运行代码或修改许多文件，你必须小心并审查其计划。如果你将其连接到强大的模型（一些用户指出，在非常自主地运行时，它可能会使用大量令牌，因此费用较高），也会产生费用。但对于严肃的用途——比如你想快速原型化应用程序中的一个新模块，包含测试和文档——Cline可以非常强大。它就像一个渴望工作的初级工程师，在每一步都问“我应该继续执行X吗？”许多开发人员喜欢这种更协作的风格（Cline“提更多问题”是设计使然），因为它减少了AI偏离轨道的可能性。\n\n当你迭代构建或维护代码库时，使用**AI编码助手**——这些工具自然地融入你的编辑-编译-测试循环。它们是编写新函数（只需输入函数签名，它们通常会自动补全函数体）、重构（“重构此函数以提高可读性”）或理解不熟悉的代码（“解释这段代码”——你会得到一个简洁的总结）等任务的理想选择。它们并非旨在一次性构建整个应用程序；相反，它们增强了你的日常工作流程。对于经验丰富的工程师来说，调用AI助手会成为第二天性——就像一个按需搜索引擎——每天使用数十次，以获得快速帮助或见解。\n\n在幕后，像[OpenAI Codex](https://openai.com/codex/)和[Google的Jules](https://jules.google/)这样的现代**异步编码智能体**更进一步。Codex作为一个自主云智能体运行——在隔离的沙盒中处理并行任务：编写功能、修复bug、运行测试、生成完整的PR——然后呈现日志和diff以供审查。\n\nGoogle的Jules由Gemini 2.5 Pro提供支持，为你的GitHub工作流程带来了异步自治：你分配一个问题（例如升级Next.js），它在VM中克隆你的仓库，规划其多文件编辑，执行它们，总结更改（包括音频摘要），并发出拉取请求——所有这些都在你继续工作时进行。这些智能体与行内自动完成不同：它们是自主协作者，在后台处理已定义的任务，并返回已完成的工作供你审查，让你专注于更高层次的挑战。\n\n除了集成开发环境中的助手外，还有一类新的工具可以从高层提示生成整个工作应用程序或其中大部分内容。当你希望**快速引导新项目或功能**时，这些工具非常有用——基本上是从零开始，以最少的手动编码获得第一个版本（“v0”）。它们通常不会在没有进一步迭代的情况下生成最终的生产质量代码，但它们能创建一个出色的起点。\n\n*   **[Bolt (bolt.new)](http://bolt.new/)** - _一键式全栈应用生成器：_ **Bolt**基于这样一个前提：你可以输入一个应用程序的自然语言描述，并在几分钟内获得一个可部署的全栈MVP。例如，你可能会说“一个带有用户登录和管理员仪表盘的招聘网站”，Bolt就会生成一个React前端（使用Tailwind CSS进行样式设置）和一个带有数据库的Node.js/Prisma后端，并附带了职位和用户的基本模型。在测试中，Bolt被证明**速度极快**——通常在大约15秒内完成一个项目的组装。输出的代码通常干净，并遵循现代实践（React组件、REST/GraphQL API等），因此你可以在IDE中打开它并继续开发。Bolt擅长**快速迭代**：你可以调整提示并重新生成，或使用其UI来调整它构建的内容。它甚至具有“导出到GitHub”功能，方便快捷。这使得它非常适合**创始人、黑客松参与者或任何希望缩短应用程序初始设置时间的开发者**。权衡之处在于，Bolt的创造力受其训练的限制——它可能会默认使用某些样式，并且可能无法在没有指导的情况下处理非常独特的需求。但作为一个起点，它通常令人印象深刻。在比较中，用户指出Bolt始终如一地生成外观出色的UI，并且是快速获得一个能“惊艳”用户或利益相关者的原型UI的首选。\n\n*   **[v0 (v0.dev by Vercel)](http://v0.dev/)** - _文本到Next.js应用程序生成器：_ **v0**是Vercel的一个工具，它同样生成应用程序，尤其专注于Next.js（因为Vercel是Next.js的幕后推手）。你给出你想要的提示，它就会创建一个项目。关于v0有一点需要注意：它有独特的设计美学。测试者观察到，**v0倾向于将所有内容都设计成流行的ShadCN UI风格**——基本上是一个时尚的极简主义组件库——无论你是否要求。如果你喜欢这种开箱即用的风格，这很好，但这意味着如果你想要一个非常定制的设计，v0可能无法精确匹配。在一个比较中，v0被发现“将设计重新主题化”为默认外观，而不是忠实地匹配给定的规范。所以，如果你的目标是快速的_功能性_原型，并且对外观灵活，那么v0可能是最好的选择。其代码输出通常是Next.js React代码，以及你指定的任何后端（它可能会设置一个简单的API或使用Vercel的边缘函数等）。作为Vercel生态系统的一部分，它也面向_可部署性_——其理念是你可以直接使用它生成的内容并立即部署到Vercel。如果你是Next.js的粉丝或正在构建计划托管在Vercel上的Web产品，v0是一个自然的选择。请记住，如果你有自己的设计，可能需要进行一些重新主题化，因为v0对外观有“自己的看法”。\n\n*   **[Lovable](https://lovable.dev/)** - _提示到UI模型（带一些代码）：_ **Lovable**更适合初学者或非工程师，他们希望通过更简单的界面构建应用程序。它允许你描述一个应用程序并提供一个可视化编辑器。用户指出Lovable的**优势在于易用性**——它非常引导式，并有一个很好的UI来组装你的应用程序——但其弱点是当你需要深入代码时，可能会很麻烦。它倾向于隐藏复杂性（如果你想要无代码，这很好），但如果你是一个想要调整它构建内容的工程师，你可能会发现这种体验令人沮丧。在输出方面，Lovable可以创建UI和一些逻辑，但可能不像Bolt或v0那样完整。在一项测试中，有趣的是，Lovable在给定屏幕截图进行模仿时表现优于给定Figma设计时——有点不一致。它旨在快速原型设计，也许是构建一些不需要太多编码的简单应用程序。如果你是一个技术负责人，与一个不能编码的设计师或产品经理合作，Lovable可能是一个让他们用来可视化想法的工具，然后你再在代码中完善。然而，对于经验丰富的工程师来说，Lovable可能会感觉有点受限。\n\n*   **[Replit](http://replit.com/):** Replit的在线IDE有一个AI模式，你可以在其中输入提示，例如“创建一款2D塞尔达式游戏”或“构建一个习惯追踪应用”，它将在其云环境中生成一个项目。Replit的优势在于它可以立即运行和托管结果，并且它通常无缝地处理前端和后端，因为它都在一个环境中。一个突出的例子是：当被要求制作一个简单的游戏时，Replit的AI智能体不仅编写了代码，而且_运行它并反复改进它_，通过截图检查自己的工作。在比较中，Replit有时会生成**功能最完整**的结果（例如，一个带有敌人和碰撞的完整游戏，而其他工具可能只生成一个移动的角色）。然而，它的运行时间可能会更长，并消耗更多的计算资源。如果你想要一个一次性的、实际可运行且可能更接近生产的结果，Replit是一个不错的选择。它就像一个AI，不仅能编写代码，还能_实时测试并修复它_。对于全栈应用，Replit同样可以连接客户端和服务器，甚至在要求时设置数据库。输出可能并非在所有情况下都最干净或最地道，但它通常是一个非常有用的起点。一个注意事项是：由于Replit的智能体在云中运行并可以执行代码，你可能会遇到一些针对非常大型应用程序的限制（并且如果你提示它执行可能运行恶意代码的操作，你需要小心——尽管它是在沙盒中运行的）。总的来说，如果你的目标是_“我想要一个可以立即运行和使用的应用程序，而且我不介意以后代码需要重构”_，Replit是首选。\n\n*   **[Firebase Studio](http://firebase.studio/)** 是Google基于云计算的智能体IDE，由Gemini驱动，让你可以在浏览器中快速原型设计和发布全栈、AI集成应用。你可以导入现有代码库——或通过App Prototyping智能体使用自然语言、图像或草图提示从零开始——生成一个可工作的Next.js原型（前端、后端、Firestore、Auth、托管等），并立即实时预览，然后无缝切换到由Nix驱动并集成Firebase模拟器的Code-OSS (VS Code) 工作区进行完整编码。Firebase中的Gemini提供行内代码建议、调试、测试生成、文档、迁移，甚至运行终端命令和解释输出，因此你可以提示“构建一个带上传和认证的照片画廊应用”，看到应用端到端启动，进行调整，部署到Hosting或Cloud Run，并监控使用情况——所有这些都无需切换工具。\n\n**何时使用原型工具：** 当你**启动新项目或功能**并希望消除初始设置的繁琐工作时，这些工具会大放异彩。例如，如果你是一名技术主管，需要一个快速的概念验证来向利益相关者展示，使用Bolt或v0来搭建基础并部署它，可以节省数天的工作量。它们对于探索想法也很有用——你可以生成应用程序的多个变体以查看不同的方法。然而，请预期需要迭代。将这些工具生成的内容视为**初稿**。\n\n生成后，你可能会将代码导入你自己的IDE（也许在那里有AI助手帮助你）并进行完善。在许多情况下，最佳工作流程是**混合式**的：_使用生成工具进行原型设计，然后使用IDE中的助手进行完善_。例如，你可以使用Bolt创建应用程序的MVP，然后在Cursor中打开该项目，继续使用AI结对编程处理更精细的细节。这些方法并非相互排斥——它们相互补充。在每个阶段使用正确的工具：原型设计工具用于初始脚手架和高层布局，助手工具用于深度代码工作和集成。\n\n另一个考虑因素是**局限性和学习**：通过检查这些原型工具生成的内容，你可以学习常见的模式。这几乎就像一次性阅读了十几个框架教程的输出。但也要注意它们_没有_做到的事情——通常它们不会完成应用程序的最后[20-30%](https://addyo.substack.com/p/beyond-the-70-maximizing-the-human)（比如打磨、性能调优、处理边缘业务逻辑），这些将由你来完成。\n\n这类似于AI辅助编码中观察到的“[70%问题](https://addyo.substack.com/p/the-70-problem-hard-truths-about)”：AI帮你完成了大部分工作，但最后一步需要人类的洞察力。了解这一点，你可以相应地预算时间。好消息是，最初的70%（启动UI组件、设置路由、连接基本CRUD）通常是无聊的部分——如果AI完成了这些，你就可以将精力集中在有趣的部分（自定义逻辑、用户体验优化等）。但不要因此而产生虚假的安全感；始终检查生成的代码，例如安全性（它是否硬编码了API密钥？）或正确性。\n\n**工具与用例总结：** 回顾和简化这些工具的差异很有帮助。简而言之：_当你正在演进或维护代码库时，使用IDE助手；当你需要快速生成新的代码库或模块时，使用生成式原型工具。_ 如果你已经有一个大型项目，像Cursor或[Cline](http://cline.bot/)这样插入VS Code的工具将成为你日常的盟友，帮助你智能地编写和修改代码。\n\n如果你从零开始一个项目，Bolt或v0这样的工具可以完成大部分设置工作，这样你就无需花一天时间配置构建工具或创建样板文件。如果你的工作涉及两者（这很常见：启动新服务和维护旧服务），你很可能定期使用这两种类型。许多团队报告**结合使用**它们取得了成功：例如，生成一个原型来启动开发，然后使用AI增强的IDE来管理和发展代码。\n\n最后，请注意有些人可能对AI生成的代码抱有的**“非我发明”偏见**。在团队内部沟通使用这些工具的情况很重要。一些传统主义者可能对非自己编写的代码持怀疑态度。克服这一点的最佳方法是展示其优势（速度，以及在你审查后，代码质量可以得到保证）并使AI使用具有协作性。例如，在PR描述中分享提示和输出（“这个控制器是使用v0.dev根据以下描述生成的……”）。这会揭开AI贡献的神秘面纱，并像对待人类生成的代码一样，邀请建设性的审查。\n\n现在我们已经了解了工具，在下一节中，我们将放大视角，探讨**如何将AI应用于整个软件开发生命周期**，从设计到部署。AI的作用不仅限于编码；它还可以协助需求、测试等更多方面。\n\nAI原生软件工程师不仅使用AI编写代码——他们将其应用于**[软件开发生命周期](https://www.geeksforgeeks.org/software-engineering/software-development-life-cycle-sdlc/)（SDLC）的每个阶段**。本节将探讨AI如何在工程工作的每个阶段实际应用，使整个过程更高效和创新。我们将保持领域无关性，示例略偏向于常见的Web开发场景，但这些想法适用于软件的许多领域（从云服务到移动应用）。\n\n任何项目的第一步是确定要构建_什么_。AI可以充当头脑风暴伙伴和需求分析师。\n\n例如，如果你有一个高层产品想法（“我们需要一个用于X的应用程序”），你可以请AI帮助**头脑风暴功能或用户故事**。一个提示，比如：_“我需要设计一个个人财务追踪器的移动应用程序。它应该具备哪些功能才能提供出色的用户体验？”_可以生成一份功能列表（例如，预算、费用分类、图表、提醒），你可能最初没有考虑到。\n\nAI可以汇总它已吸收的无数应用程序和文章中的想法。同样，你可以让AI编写初步的**用户故事或用例**：_“列出乘车共享服务MVP的五个用户故事。”_这可以通过结构良好的故事启动你的规划，你可以对其进行完善。AI还可以帮助澄清需求：如果某个需求模糊不清，你可以问_“我应该就这个需求提出哪些问题来澄清它？”_——AI会提出需要定义的关键点（例如，对于“为登录添加安全性”，AI可能会建议询问2FA、密码复杂性等）。这确保你不会在早期阶段遗漏任何东西。\n\n另一个构思用途：**竞品分析**。你可以提示：_“任务管理Web应用程序的常见功能和陷阱是什么？提供一份摘要。”_AI会列出此类应用程序通常会做什么以及常见的抱怨或挑战（例如，数据同步、离线支持）。这些信息可以塑造你的需求，以包含最佳功能或避免已知问题。本质上，AI可以充当**研究助手**，扫描集体知识库，这样你就无需手动阅读10篇博客文章。\n\n当然，所有AI输出都需要批判性评估——运用你的判断力过滤掉在特定上下文中合理的建议。但在早期阶段，想法的数量可能比质量更有用，因为它为你提供了与团队或利益相关者讨论的选项。具有AI原生思维的工程师通常会在参加规划会议时带上一份AI生成的想法列表，然后用自己的见解来补充。这加速了讨论并显示了主动性。\n\nAI还可以帮助**非技术利益相关者**在此阶段。如果你是一名技术负责人，与（比如）一名业务分析师合作，你可能会在AI的帮助下生成一份产品需求文档（PRD）草稿，然后分享供审查。编辑草稿比从头编写更快。Google的提示指南甚至为这种情况提供了特定角色的提示——例如，_“作为一名业务分析师，概述薪资系统升级的需求。”_结果会给每个人一些具体的东西来做出反应。总之，在需求和构思阶段，AI的目标是广泛撒网，组织思想，从而提供一个强大的起始基础。\n\n一旦需求到位，下一步就是系统设计。在这里，AI可以充当**架构的参考对象**。例如，你可以描述你正在考虑的高层架构——“我们计划使用一个微服务作为用户服务、一个API网关和一个React前端”——然后询问AI的意见：_“这种方法有什么优缺点？是否存在潜在的可伸缩性问题？”_ 一个精通技术的AI会列出一些点，可能类似于经验丰富的同事会说的话（例如，微服务允许独立部署但增加了开发运维的复杂性等）。这对于验证你的想法或发现你遗漏的角度很有用。\n\nAI还可以帮助解决**具体的、设计问题**：“我们应该为这个特性存储选择SQL还是NoSQL？”或“聊天应用中实时通知的健壮架构是什么样的？”它将为不同的选择提供理由。虽然你不应该将它的答案奉为圭臬，但它可以揭示一些考虑因素（延迟、一致性、成本），从而指导你的决策。有时，听到推理被阐述出来有助于你向他人论证或巩固自己的理解。把它想象成向AI阐述你的架构——只是这只“橡皮鸭”会用相当合理的观点回应！\n\n另一个用途是通过文本生成**图表或映射**。有些工具，如果你描述一个架构，AI可以输出一个伪图（例如，使用Mermaid markdown），你可以将其可视化。例如：_“绘制一个组件图：客户端 -\u003e 负载均衡器 -\u003e 3个后端服务 -\u003e 数据库。”_ AI可以生成一个Mermaid代码块，渲染成一个图表。这是从概念到文档的快速方式。或者你可以要求**API设计建议**：_“为图书馆系统设计一个REST API，包含书籍、作者和借阅的端点。”_ AI可能会列出端点（GET /books、POST /loans等）以及示例负载，这可以是一个有用的起点，然后你再进行调整。\n\n在此阶段，AI的一个特别强大的用途是**通过询问失败情况来验证假设**。例如：_“我们计划在某个数据中心使用内存缓存来存储会话数据。可能出现什么问题？”_ AI可能会提醒你缓存崩溃、数据中心中断或伸缩性问题等场景。它有点像一个**风险清单**生成器。这并不能取代进行适当的设计审查，但它是早期发现明显陷阱的一个很好的补充。\n\n另一方面，如果你在设计上遇到阻力，需要阐明你的理由，AI可以帮助你**清晰地表达论点**。你可以将上下文提供给AI，让它帮助阐明担忧并探索替代方案。AI会列举问题，你可以用这些来形成一个尊重、结构良好的回应。本质上，AI可以增强你围绕设计的**沟通能力**，这在团队环境中与设计本身同样重要。\n\n一个更深层次的转变是，**我们正在转向规范驱动的开发**。这不再是代码优先；事实上，我们几乎在[隐藏代码](https://x.com/danshipper/status/1937888424800719283)！现代软件工程师正在创建（或请求AI创建）[实施计划](https://x.com/_philschmid/status/1937887668710355265)。有些人通过要求工具首先创建一个技术设计（保存到markdown文件）和一个实施计划（同样本地保存并在稍后输入）来启动项目。\n\n[一些人](https://www.ignorance.ai/p/ai-at-pulley)指出，他们发现自己“更少思考如何编写代码，更多思考如何编写规范——将脑海中的想法转化为清晰、可重复的指令给AI。”这些设计规范[具有巨大的后续价值](https://writing.nikunjk.com/p/the-work-behind-the-work-is-dead)；它们可以用于生成PRD、第一轮产品文档、部署清单、营销信息，甚至销售团队的培训材料。今天的优秀工程师善于记录意图，而这些意图反过来又催生了技术解决方案。\n\nAI的这种战略性应用对当今高级工程师的定义产生了深远的影响。它标志着从优秀的“问题解决者”转变为具有前瞻性的“解决方案塑造者”。一位高级AI原生工程师不仅仅是更快地编写代码；他们利用AI来洞察先机——建模未来状态、分析行业趋势，并制定能够预见下一波创新的技术路线图。利用AI进行这种架构上的预见不再仅仅是锦上添花；它正迅速成为技术领导力的核心竞争力。\n\n这是大多数人立即想到AI辅助的阶段，确实，这也是最具变革性的阶段之一。我们之前已经讨论过如何在IDE中使用编码助手，因此在这里，我们围绕典型的编码子任务进行组织：\n\n*   **脚手架搭建与设置：** 设置新模块、库或配置文件可能很繁琐。AI可以根据描述生成样板配置（Dockerfile、CI流水线、ESLint配置等）。例如，_“为React应用程序提供一个最小的Vite和TypeScript配置”_可能会生成不错的配置文件，你可能只需稍微调整一下。同样，如果你需要使用一个新库（比如认证或日志），你可以问AI：_“展示一个将库X集成到Express.js服务器中的示例。”_它通常可以生成一个最小的工作示例，省去了你为了基础知识而翻阅文档的时间。\n\n*   **功能实现：** 在编写功能时，将AI作为伙伴。你可能开始编写一个函数，然后产生疑问——你可以简单地问：_“实现X的最佳方式是什么？”_也许你需要解析一个复杂的数据格式——AI甚至可能回忆起你需要使用的特定API。这就像有人为你即时总结了Stack Overflow上的帖子。许多AI原生开发者实际上采用一种节奏：他们用注释概述一个函数（它应该采取的步骤），然后提示AI用代码填充它。这通常会生成一个几乎完整的函数，然后你再进行调整。这是一种不同的编码方式：你专注于逻辑和意图，AI则填充语法和重复部分。\n\n*   **代码复用与引用：** 另一个日常场景——你模糊记得以前写过类似的代码，或者知道有一个算法可以解决这个问题。你可以描述它并询问AI。例如：_“我需要从Python的对象列表中移除重复项，将具有相同id的对象视为重复项。如何高效地完成？”_如果第一个答案不是你需要的，你可以细化或直接说“不太对，我需要考虑X”，它会再次尝试。这种交互式编码问答极大地提高了生活质量。\n\n*   **保持一致性和模式：** 在大型项目中，你经常遵循某些模式（比如处理错误或日志记录的特定方式）。如果你提供上下文，AI可以学习这些模式（有些工具允许你添加样式指南，或者让它读取你的仓库部分内容）。即使没有明确的训练，如果你将AI指向现有文件作为示例，你可以提示它_“创建一个与此模块类似的新模块，但用于[某个新实体]。”_它将模仿样式和结构，这意味着新代码能够自然地融入。这就像有一个助手，它阅读了你整个代码库和文档，并始终按照这些约定编写代码（有一天，AI可能真正通过像模型上下文协议这样的功能无缝地做到这一点，连接到不同的环境）。\n\n*   **伴随代码生成测试：** 一个非常有效的习惯是让AI在编写完一段代码后立即生成单元测试。许多工具（Cursor、Copilot等）可以按需或甚至自动地建议测试。例如，编写完一个函数后，你可以提示：_“为上述函数生成一个单元测试，覆盖边缘情况。”_AI将创建一个测试方法或测试用例代码。这有两个目的：它为你提供了快速测试，并且它也充当了对你代码的准审查（如果AI在测试中预期的行为与你的代码不同，可能是你的代码有问题或需求被误解了）。这就像进行测试驱动开发（TDD），其中AI编写测试，你验证它是否符合意图。即使你更喜欢自己编写测试，AI也可以建议你可能遗漏的额外用例（如大输入、奇怪字符等），充当安全网。\n\n*   **调试辅助：** 当你遇到bug或错误信息时，AI可以帮助诊断。例如，你可以复制一个错误堆栈跟踪或异常，然后问：_“什么可能导致这个错误？”_通常，它会用简单的语言解释错误的意思和常见原因。如果是一个没有明显错误的运行时bug，你可以描述行为：_“我的函数在输入X时返回null，但不应该这样。这是代码片段……你知道为什么吗？”_AI可能会发现逻辑缺陷。虽然不能保证，但即使只是通过写作（给AI）解释你的代码，有时也能让你自己找到解决方案——AI的建议可以证实这一点。一些集成到运行时的AI工具（如Replit中的工具）甚至可以执行代码并检查中间值，充当交互式调试器。你可以说：“用X输入运行上述代码，并在每一步显示变量Y”，它会模拟这个过程。这仍处于早期阶段，但它是调试的另一个维度，将来会不断发展。\n\n*   **性能调优与重构：** 如果你怀疑某段代码运行缓慢或可以更简洁，你可以要求AI对其进行性能或可读性重构。例如：_“重构此函数以降低其时间复杂度”_或_“这段代码正在进行三重嵌套循环，你能否使其更高效？”_AI可能会识别出使用字典查找或更好算法（例如，从O(n^2)到O(n log n)）的机会。或者为了可读性：_“将这个50行函数重构为更小的函数并添加注释。”_它会尝试这样做。始终仔细检查更改（特别是细微的bug），但这是快速查看替代实现的好方法。这就像拥有第二双不疲倦的眼睛，可以几秒钟内重写代码进行比较。\n\n在所有这些编码场景中，核心思想是**AI加速编码的机械部分并提供即时知识**，而你仍然是决策者和质量控制者。需要插入一条关于**版本控制和代码审查**的说明：对待AI的贡献就像对待初级开发者的拉取请求一样。勤奋使用git，比较AI所做的更改，在主要编辑后运行你的测试套件，并进行代码审查（即使你正在审查AI为你编写的代码！）。这确保了你在实现阶段的健壮性。\n\n测试是AI可以大放异彩的领域，因为它能减少繁重的工作。我们已经提到了单元测试生成，但让我们深入探讨：\n\n*   **单元测试生成：** 你可以系统地使用AI为现有代码生成单元测试。一种方法是：取出模块中的每个公共函数或类，并向AI提示其应执行功能的简短描述（如果没有清晰的文档，你可能需要推断或编写一行规范），然后请求测试。例如，_“函数`normalizeName(name)`应修剪空白并大写首字母。为它编写几个PyTest用例。”_AI将输出测试，包括典型和边缘情况，如空字符串、全大写输入等。这对于缺少测试的遗留代码极其有用——它就像AI驱动的测试回溯。请记住，AI不_知道_你的确切业务逻辑，除非你描述它，因此请验证断言的预期是否符合预期的行为。但即使不符合，它也提供了信息：AI可能会对函数做出错误的假设，这表明函数目的不明确或可能被误用。然后你可以改进代码或澄清测试。\n\n*   **基于属性的测试和模糊测试：** 你可以使用AI建议基于属性的测试的属性。例如，_“排序函数应满足哪些属性？”_可能会产生诸如“输出列表已排序，与输入具有相同元素，运行两次幂等”等答案。你可以使用Hypothesis或fast-check等框架将这些转化为基于属性的测试。AI甚至可以帮助编写属性测试代码。同样，对于模糊测试或生成大量输入组合，你可以要求AI以某种格式生成各种输入。_“给我10个JSON对象，代表边缘情况的用户配置文件（有些缺少字段，有些带有额外字段等）”_——使用这些作为测试夹具，查看你的解析器是否会崩溃。\n\n*   **集成测试与端到端测试：** 对于API端点或UI流程等更复杂的测试，AI可以通过概述测试场景来提供帮助。_“列出一些电子商务结账流程的端到端测试场景。”_它可能会列举出各种场景：正常购买、无效支付、缺货商品等。然后你可以编写这些脚本。如果你正在使用Cypress等测试框架进行Web UI测试，你可以要求AI根据场景描述编写测试脚本。它可能会生成伪代码，你可以将其调整为真实代码（Cypress或Selenium命令）。这再次节省了样板代码的时间，并确保你考虑了各种路径。\n\n*   **测试数据生成：** 创建真实的测试数据（例如复杂对象的有效JSON）是枯燥乏味的。AI可以生成看起来真实的假数据。例如，_“为一个拥有部门、教授和学生的大学生成一个示例JSON。”_它会编造姓名和数组等。然后这些数据可以用于测试或手动尝试API。这就像拥有无限量的真实虚拟数据，而无需自己编写。只需注意任何隐私问题——如果你用真实数据提示，请确保首先将其匿名化。\n\n*   **通过智能体进行的探索性测试：** 一个前沿领域：使用AI智能体模拟用户或对抗性输入。有一些实验性工具，AI可以像用户一样爬取你的Web应用程序，测试不同的输入，看看是否能破坏某些东西。Anthropic的_Claude Code_最佳实践谈到了多轮调试，其中AI迭代地发现并修复问题。你可能可以这样说：“这是我的函数，尝试不同的输入让它失败”，AI会在精神上进行一次小型模糊测试。这并非万无一失，但作为一个概念，它指出了AI在静态测试用例之外，通过积极尝试像QA工程师一样发现bug来帮助QA。\n\n*   **审查测试覆盖率：** 如果你进行了测试并希望确保它们覆盖了逻辑，你可以要求AI分析是否缺少某些场景。例如，提供一个函数或功能描述以及当前的测试，然后询问_“这里是否有任何重要的测试用例未覆盖？”_AI可能会注意到，例如，“测试没有覆盖输入为null或空的情况”或“没有测试负数”等。这就像对你的测试套件的第二次审查。它不会知道是否确实缺少了什么，除非很明显，但它可以发现一些空白。\n\n最终目标是以更少的手动工作实现更高的质量。测试通常是工程师_知道_他们应该做得更多，但时间压力常常限制了它。AI通过自动化测试的创建或至少其脚手架，帮助消除了一些摩擦。这使得你更有可能拥有一个更健壮的测试套件，从而减少回归并简化维护，带来回报。\n\nBug和维护任务占据了工程师大量的时间。AI也可以减少这些负担：\n\n*   **解释遗留代码：** 当你继承一个遗留代码库或重新审视很久以前编写的代码时，理解它是第一步。你可以使用AI来**总结或文档化**不清晰的代码。例如，复制一个100行的函数，然后询问：_“用简单的语言逐步解释这个函数的作用。”_AI将生成一份关于代码逻辑的叙述。这通常能加速你的理解，特别是当代码密集或注释不充分时。它还可能识别出代码应该做什么与实际做了什么之间的差异（捕获细微的bug）。有些工具集成了这一点——你可以点击一个函数并获得AI生成的文档字符串或摘要。这在你维护文档稀缺的系统时非常有价值。\n\n*   **识别根本原因：** 当你面临一个bug报告，比如“功能X在条件Y下崩溃”时，你可以让AI充当“橡皮鸭”来推理可能的原因。描述你所知道的情况和代码路径，并询问理论：_“鉴于这段代码片段和观察到的错误，什么可能导致空指针异常？”_AI可能会指出，“如果数据可以为null，那么`data.length`会抛出该异常，检查在条件Y下是否可能发生这种情况。”这类似于有一个知识渊博的同事可以共同探讨想法，即使他们看不到你的整个系统，他们也经常从已知模式中进行概括。这可以节省你在调试时走错路的时间。\n\n*   **用AI建议修复代码：** 如果你在一段代码中定位到bug，你可以简单地告诉AI修复它。_“修复这个函数在空输入时失败的bug。”_AI将提供一个补丁（例如添加一个空输入检查）。你仍然需要确保这是正确的修复，并且不会破坏其他东西，但它比你自己编写要快，特别是对于微不足道的修复。一些IDE会自动完成这一点：例如，如果一个测试失败，AI可以建议一个代码更改以使测试通过。这里必须小心——在接受此类更改后务必运行测试以确保没有副作用。但对于像升级库版本和修复已废弃的调用这样的维护任务，AI可以提供巨大帮助（例如，“我们升级到React Router v7，将此v6代码更新为v7语法”——它将使用新的API重写代码，这大大节省了时间）。\n\n*   **重构和改进旧代码：** 维护通常涉及为清晰度或性能进行重构。你可以雇佣AI半自动化地进行大规模重构。例如：_“我们的代码使用了大量基于回调的异步。将这些示例转换为async/await语法。”_它会向你展示如何更新一个代表性的片段，然后你可以将其应用于整个代码（可能通过搜索/替换或在AI的帮助下逐文件）。或者在较小的规模上，_“重构这个类以使用依赖注入，而不是硬编码数据库连接。”_AI将概述甚至实现一个更清晰的模式。这就是AI如何帮助你**保持代码库的现代化和清洁**，而无需在死记硬背的转换上花费过多时间。\n\n*   **文档与知识管理：** 维护软件也意味着保持文档最新。AI可以使文档化更改变得更容易。在实现功能或修复后，你可以要求AI起草一份简短的摘要或更新文档。例如：_“生成一个更新日志条目：通过添加重试机制，修复了支付模块处理过期信用卡的bug。”_它会生成一个措辞精美的条目。如果你需要更新API文档，你可以将新的函数签名提供给它，并要求提供描述。AI可能不了解你整个系统的上下文，但它可以创建文档的良好初稿，然后你再对其进行调整以使其完全准确。这降低了编写文档的启动能量。\n\n*   **与团队/用户沟通：** 维护涉及沟通——向他人解释变化了什么，影响是什么等等。AI可以帮助编写**发布说明**或**迁移指南**。例如：_“为从我们服务的API v1迁移到v2的开发人员编写一个简短指南，突出显示更改的端点。”_如果你向它提供更改列表，它可以将其格式化为连贯的指南。对于面向用户的说明，_“用非技术术语总结这些bug修复，用于我们的月度更新。”_再一次，你将对其进行润色，但繁重的散文工作由AI处理。这确保了重要信息能够得到传达（因为当工程师忙碌时，编写这些内容往往会被忽略）。\n\n本质上，**AI可以被视为维护过程中无处不在的助手**。它可以比你更快地搜索代码（如果集成得好），回忆某个功能应该如何工作，甚至关注潜在问题。例如，如果你让AI智能体扫描你的仓库，它可能会标记出可疑模式（例如，许多地方都存在没有错误处理的API调用）。\n\nAnthropic通过 CLAUDE.md 为AI提供你的仓库上下文的[方法](https://www.anthropic.com/engineering/claude-code-best-practices)是实现更多此类功能的一种技术。随着时间的推移，我们可能会看到AI工具主动为某些类别的问题（安全性或风格）创建工单或拉取请求。作为AI原生工程师，你将欢迎这些帮助——它们处理繁重的工作，你处理最终的判断和创造性问题解决。\n\n即使代码已经编写并测试完成，部署和运营软件仍然是生命周期中的重要组成部分。AI也可以在这里提供帮助：\n\n*   **基础设施即代码：** 像Terraform或Kubernetes清单这样的工具本质上就是代码——AI可以生成它们。如果你需要一个针对具有特定设置的AWS EC2的快速Terraform脚本，你可以提示：“_为 us-west-2 区域的 Ubuntu t2.micro AWS EC2 实例编写 Terraform 配置。_”它会给出一个合理的配置，你可以进行调整。类似地，_“为名为 myapp 的 Node.js 应用程序创建一个 Kubernetes Deployment 和 Service，镜像来自 ECR，3个副本。”_它生成的YAML将是一个很好的起点。这节省了大量搜索文档以查找语法的时间。一个注意事项：验证所有凭据和安全组等，但结构会存在。\n\n*   **CI/CD 流水线：** 如果你正在设置持续集成 (CI) 工作流（例如 GitHub Actions YAML 或 Jenkins 流水线），可以请 AI 帮忙起草。例如：“_编写一个 GitHub Actions 工作流 YAML，当代码推送到主分支时，它会执行代码检查、测试，并将 Python Flask 应用程序部署到 Heroku。_”AI 会很好地概述作业和步骤。它可能无法完全准确地获取每个键（因为这些语法会更新），但修正一个小键名错误比自己编写整个文件要容易得多。由于 CI 流水线可能很复杂，让 AI 处理样板文件，而你只需修复小错误，能大大节省时间。\n\n*   **监控与警报查询：** 如果你使用监控工具（如编写 Datadog 查询或 Grafana 警报规则），你可以描述你想要的内容，让 AI 提出配置建议。例如：“_在 PromQL 中，如何编写一个警报，当服务 X 在 5 分钟内错误率超过 5% 时触发？_”它会编写一个你可以插入的查询。这尤其方便，因为这些领域特定语言（如 PromQL、Splunk 查询语言等）可能晦涩难懂——AI 很可能见过示例并能为你进行调整。\n\n*   **事件分析：** 当生产环境中出现问题时，你通常需要查看日志、指标、追踪。AI 可以协助分析这些。例如，粘贴故障发生时附近的一段日志，然后问：“_这些日志中有什么突出显示的问题吗？_”它可能会指出噪音中的异常堆栈跟踪或可疑的延迟。或者描述症状并询问：“_午夜数据库CPU使用率过高的可能根本原因是什么？_”它可能会列出各种场景（正在运行备份、批处理作业等），帮助你进行调查。OpenAI 的企业指南强调使用 AI 从数据和日志中发现洞察——这正成为一个新兴用例：AI 运维或 AIOps。\n\n*   **聊天运维和自动化：** 一些团队将AI集成到他们的运维聊天中。例如，一个由LLM支持的Slack机器人，你可以问它，“嘿，最新部署的状态如何？有什么错误吗？”然后它就可以获取数据并进行总结。虽然这需要一些设置（将你的CI或监控连接到AI友好的格式），但这是一个有趣的方向。即使没有这些，你也可以手动完成：复制一些输出（如测试结果或部署日志），让AI总结或突出显示故障。这有点像一个私人助手，为你阅读长篇的文本回溯，并告诉你“这里是摘要：2个测试失败，看起来是数据库连接问题。”然后你就知道该把精力集中在哪里。\n\n*   **扩展和容量规划：** 如果你需要推断扩展性（例如，“如果每个用户执行X个请求，我们有Y个用户，我们需要多少个实例？”），AI可以帮助进行计算，甚至考虑你提到的因素。这不是魔法——它只是计算和估算，但向AI提问有时可以得到格式化的计划或表格，为你节省一些脑力劳动。此外，AI可能会回忆起已知的基准（例如“通常t2.micro可以为简单应用程序处理约100个请求/秒”），这有助于粗略的容量规划。始终从官方来源验证这些数字，但这是一个快速的初步估算。\n\n*   **文档和运行手册：** 最后，运维团队依赖运行手册——概述在特定场景下如何操作的文档。AI可以协助从事件事后复盘或指令中起草这些文档。如果你解决了一个生产问题，你可以将步骤提供给AI，并要求它编写一份结构良好的程序说明。它会提供一份整洁的markdown格式的步骤序列，你可以将其放入你的运行手册仓库。这降低了文档化运维知识的摩擦，这对团队来说通常是一个巨大的优势（部落知识以易于访问的形式被文档化）。Anthropic的企业信任指南强调流程和人员——拥有清晰的AI辅助文档是负责任地传播知识的一种方式。\n\n通过将AI贯穿部署和运维，你基本上拥有了一个不仅在编码方面，还在DevOps方面的副驾驶。它减少了查找时间（我们多久会搜索特定的YAML片段或AWS CLI命令？），直接提供可用的答案。然而，请始终记住，当涉及到基础设施时，要仔细检查AI建议的任何内容——Terraform脚本中的一个小错误可能会代价高昂。如果可能，请在安全环境中进行验证。随着时间的推移，当你微调提示或使用某些经过验证的AI“配方”时，你将对哪些建议是可靠的获得信心。\n\n正如我们所看到的，从构思到维护的整个生命周期中，都有机会注入AI辅助。\n\n模式是：**AI承担繁重的工作并提供知识，而你提供方向、监督和最终判断。**\n\n这提升了你的角色——你将更多时间花在创造性设计、批判性思维和决策上，更少时间花在样板代码和查找信息上。结果通常是更快的开发周期，如果管理得当，还会提高质量和开发人员的幸福感。在下一节中，我们将讨论一些最佳实践，以确保你有效且负责任地使用AI，以及如何持续改进你由AI增强的工作流程。\n\n在软件开发中使用AI可以带来变革，但要真正获得好处，必须遵循最佳实践并避免常见陷阱。在本节中，我们将提炼出在工程工作流程中高效使用AI的关键原则和指南。这些实践确保AI仍然是一个强大的盟友，而不是错误或虚假自信的来源。\n\n我们已经多次强调：**有效的提示至关重要**。将编写提示视为你工具箱中的一项新的核心技能——就像编写好的代码或好的提交信息一样。一个精心设计的提示，可能意味着AI答案是切中要害还是无用或误导性的分水岭。作为一项最佳实践，**始终为AI提供足够的上下文**。如果你在询问代码，请包含相关的代码片段或函数的目的描述。不要说：“我如何优化这个？”而要说“给定这段代码[包含代码片段]，我如何优化它以提高速度，特别是排序部分？”这有助于AI专注于你关心的问题。\n\n还要具体说明所需的输出格式。如果你想要JSON，就说出来；如果你期望逐步解释，也要提及。例如，_“逐步解释为什么这个测试失败”_或_“将结果作为JSON对象返回，包含键X、Y”_。这样的指令会产生更可预测、更有用的结果。提示工程中的一个很棒的技巧是**将任务分解为步骤或提供示例**。你可以提示：“首先，分析输入。然后提出解决方案。最后，给出解决方案代码。”这种结构可以引导AI完成复杂的任务。Google的高级提示工程指南涵盖了诸如思维链提示和提供示例以减少猜测的方法。如果你得到一个完全偏离的答案，不要只是叹气——**优化提示并再试一次**。有时迭代提示（“实际上忽略之前关于X的指令，只关注Y……”）会纠正方向。\n\n维护一个**成功的提示库**也很有价值。如果你发现一种提问方式始终能产生好的结果（例如，编写测试用例或解释代码的特定格式），就保存下来。随着时间的推移，你会建立一个个人“剧本”。有些工程师甚至有一个用于提示的文本片段管理器。鉴于像Google这样的公司已经发布了广泛的提示指南，你可以看到这项技能的价值正在日益增长。简而言之：**投入学习如何有效地与AI对话**，因为这将在输出质量方面带来丰厚回报。\n\n无论AI的答案多么令人印象深刻，**[永远不要盲目信任它](https://addyo.substack.com/p/the-trust-but-verify-pattern-for)**。这句话怎么强调都不为过。对待AI的输出，就像对待人类初级开发者的工作一样：可能有用，但需要审查和测试。无数的案例表明，由于有人在不理解AI代码的情况下接受了它，导致bug悄然潜入。养成检查AI建议更改的习惯。如果它编写了一段代码，请在脑海中或使用调试器逐步检查它。添加测试来验证它（AI可以帮助编写，正如我们讨论过的）。如果它给出了解释或分析，请交叉检查关键点。例如，如果AI说“这个API是O(N^2)，导致速度变慢”，请从官方文档或通过自己推理来验证复杂性。\n\n尤其要警惕**看起来精确的事实陈述**。AI有幻觉细节的倾向——比如看起来合理但实际上不存在的函数名或语法。如果AI的答案引用了API或配置键，请在官方文档中确认。在企业环境中，永远不要信任AI提供的公司特定事实（比如“根据我们内部政策……”），除非你已经将这些事实提供给它，并且它只是在复述。\n\n对于代码，一个好的做法是运行你所拥有的任何快速检查：代码检查工具（linters）、类型检查器、测试套件。AI代码可能不符合你的风格指南，或者可能使用了已弃用的方法。运行linter/formatter不仅能修复样式，还能捕获某些错误（例如，未使用的变量等）。一些AI工具集成了这一点——例如，AI可能会在沙盒中运行代码，如果发现异常则进行调整，但这并非万无一失。因此，作为工程师，你必须是安全网。\n\n在安全敏感或关键系统中，要格外小心。不要使用AI生成秘密或凭据。如果AI提供了一段处理认证或加密的代码片段，请对照已知的安全实践仔细检查。曾有案例表明，AI会提出不安全的算法，因为它优化了通过测试而不是实际安全性。**责任在于你**，确保所有输出都是安全和正确的。\n\n一个有用的提示：**使用AI验证AI**。例如，从AI获得一段代码后，你可以询问同一（或另一个）AI：“这段代码是否有任何bug或安全问题？”它可能会指出你遗漏的地方（比如，“它没有在这里清理输入”或“如果X发生，这可能会溢出”）。虽然AI的这种第二意见也不能保证，但它是一个快速的健全性检查。OpenAI和Anthropic的编码指南甚至建议这种迭代提示和审查的方法——本质上是借助AI进行调试。\n\n最后，保持健康的怀疑态度。如果输出中的某些内容让你觉得奇怪或好得不像真的，请进一步调查。AI很擅长听起来自信。成为AI原生的一部分是学习AI擅长和容易出错的地方。随着时间的推移，你将获得一种直觉（例如，“我知道LLM倾向于弄乱日期计算，我会仔细检查那一部分”）。这种直觉，结合彻底的审查，让你始终掌握主动权。\n\n虽然点击一个按钮就能让AI构建整个系统的想法很有吸引力，但在实践中，它很少如此简单或理想。最佳实践是**利用AI放大你的生产力，而不是完全自动化你无法监督的工作**。换句话说，对于任何非微不足道的结果，都要保持人工参与。如果你使用自主智能体生成应用程序（正如我们在原型工具中看到的），将输出视为原型或草稿，而不是成品。计划由你或你的团队进行**迭代**。\n\n将大任务分解成小的AI辅助块。例如，与其说“给我构建一个完整的电子商务网站”，不如将其分解：首先使用AI生成前端页面（你进行审查），然后使用AI创建基本的后端（审查它），最后进行集成和完善。这种模块化方法确保你保持理解和控制。它还利用了AI在集中任务上的优势，而不是期望它处理非常复杂的相互依赖任务（这往往是它可能遗漏重要内容的地方）。记住，AI并不能真正“理解”你项目的更高目标；那是你作为工程师或技术负责人的工作。你决定架构和约束，然后将AI作为一个强大的助手来实现部分愿景。\n\n**抵制过度依赖的诱惑。** 出于方便，你可能会忍不住让AI处理所有小事，甚至是你自己知道的事情。虽然将其用于繁琐任务没有问题，但请确保你仍在**学习和理解**。AI原生工程师不会关闭他们的大脑——恰恰相反，他们利用AI来解放大脑，进行更重要的思考。例如，如果AI为你编写了一个复杂的算法，花时间理解该算法（或者至少验证其正确性），然后才能部署。否则，你可能会积累“AI技术债”——代码能工作但没有人真正理解，这可能会在以后让你吃苦头。\n\n管理范围的一种方法是为**AI智能体设置清晰的边界**。如果你使用像Cline或Devin（自主编码智能体）这样的工具，用你的规则配置它们（例如，未经询问不得安装新依赖项，不得进行网络调用等）。并使用试运行或计划模式等功能。例如，让智能体向你展示其计划（就像Cline那样），并逐步批准。这确保了AI不会偏离主题或采取你不会采取的行动。本质上，你充当AI工作者的项目经理——你不会让一个初级开发人员在没有代码审查的情况下直接提交到主分支；同样，也不要让AI这样做。\n\n通过对AI的角色进行范围界定和监督，你可以避免在不知不觉中出现问题。你还能保持自己对项目的参与度，这对于质量和你自身的成长至关重要。反之亦然：确实要将AI用于所有那些耗时但不需要大量创造性工作的_小事_。让它编写第十个CRUD端点的变体或样板表单验证代码，而你则专注于需要人类洞察力的棘手集成逻辑或性能调优。这种分工——AI负责繁重工作，人类负责监督和创造性问题解决——是当前AI集成的最佳平衡点。\n\nAI领域和可用的工具发展速度惊人。“AI原生”今天的定义与一年后将会不同。因此，一个关键原则是：**永不停止学习**。关注新工具、新模型功能和新的最佳实践。订阅新闻通讯或社区（有一些专门针对编码AI工具的开发者新闻通讯）。与同行分享经验：他们使用了哪些提示策略，他们尝试了哪些新的智能体框架等等。社区正在共同探索这个问题，积极参与将让你保持领先。\n\n一个实际的学习方法是将AI融入副项目或黑客松。风险较低，你可以自由探索其能力。尝试纯粹在AI协助下构建一些东西作为实验——你将发现它的超能力和痛点，然后可以将其小心地应用到你的日常工作中。也许在这样做的过程中，你会发现一个巧妙的工作流程（比如将GPT的提示链接到编辑器中的Copilot），你可以教给你的团队。事实上，**指导团队中的其他人**使用AI也将巩固你自己的知识。举办一次关于提示工程的午餐会，或者分享一个AI如何帮助解决棘手问题的成功案例。这不仅帮助了同事，他们也经常会分享自己的技巧，从而提升每个人的水平。\n\n最后，也要投资于你的基本技能。AI可以自动化很多东西，但你对计算机科学、系统设计和问题解决的基础越扎实，你向AI提出的问题就越好，评估其答案的能力也就越强。人类的创造力和对系统的深度理解并没有被取代——事实上，它们变得更加重要，因为你现在正在指导一个强大的工具。正如我的一篇文章所建议的，关注“[最大化‘人类30%’](https://news.ycombinator.com/item?id=43361801)”——工作中人类洞察力不可替代的部分。这包括定义问题、做出判断和关键调试。通过持续学习来增强这些能力，让AI处理枯燥的70%。\n\n如果你在团队环境中工作（我们大多数人都是如此），那么**协作AI使用实践**非常重要。与队友分享你所学到的，也要倾听他们的经验。也许你发现使用某个AI工具提高了你的提交速度；向团队提出，看看大家是否愿意采纳。反之，也要接受指导方针——例如，有些团队决定“我们不会在未经至少一名人工审查和测试的情况下提交AI生成的代码”（这是一个明智的规则）。一致性很重要；如果每个人都遵循类似的方法，代码库就会保持一致，人们会信任彼此的AI增强贡献。\n\n你甚至可以将此正式化为团队惯例。例如，如果使用AI进行代码生成，一些团队会在PR或代码注释中注明，如 // Generated with Gemini, needs review。这种透明度有助于代码审查者集中注意力。这类似于我们处理来自自动化工具的代码（例如“此文件由Rails生成器搭建”）。知道某个内容是AI生成的可能会改变你的审查方式——也许在某些方面会更彻底。\n\n鼓励与AI进行结对编程。一个巧妙的做法是_AI驱动的代码审查_：当有人打开拉取请求时，他们可能会在diff上运行AI以获取初始审查意见列表，然后利用这些意见在人类看到PR之前进行完善。作为一个团队，你可以将此作为一步（但要小心AI可能无法捕捉所有问题，也无法理解业务上下文）。另一个协作角度是文档：也许维护一个内部FAQ，例如“我如何要求AI为我们的代码库做X？”——例如，如何用你的特定技术栈进行提示。这可以是新团队成员入门AI在你的项目中使用的部分。\n\n另一方面，尊重那些对AI持谨慎或怀疑态度的人。并非所有人都能立即感到舒适或被说服。以非威胁的方式展示结果比抽象地宣扬更好。展示它如何发现了一个bug或通过起草测试节省了一天的工作。也要诚实地面对失败（例如，“我们尝试用AI生成那个模块，但它引入了一个我们后来发现的细微bug。这是我们学到的。”）。这有助于建立集体智慧。一个共同学习的团队将比各自为政的个人更有效地集成AI。\n\n从领导角度（对于技术主管和经理而言），思考如何**整合AI培训和指南**。可以拨出时间让团队成员进行实验和分享发现（如黑客日或关于AI工具的闪电演讲）。此外，作为团队决定如何处理AI生成代码的许可或知识产权问题——例如，代码生成工具具有不同的许可或使用条款。确保遵守这些规定以及任何公司政策（有些公司禁止使用公共AI服务处理专有代码——在这种情况下，你或许可以投资内部AI解决方案或使用可本地运行的开源模型，以避免数据泄露）。\n\n简而言之，**将AI采纳视为一项团队运动**。每个人都应该朝着同一个方向努力，并使用大致兼容的工具和方法，以使代码库保持可维护性，并将收益在整个团队中倍增。组织层面的AI原生能力可以成为强大的竞争优势，但这需要一致性和集体学习。\n\n最后但同样重要的是，始终负责任地使用AI。这包括以下几点：\n\n*   **隐私与安全：** 请注意你向AI服务提供的数据。如果你使用的是托管服务，如OpenAI的API或IDE插件，你发送的代码或文本在某些条件下可能会被服务提供商存储或查看。对于敏感代码（与安全相关、专有算法、用户数据等），考虑使用自托管模型，或者至少在提示前剥离敏感部分。许多AI工具现在都提供企业版本或本地部署选项来缓解此问题。检查你公司的政策：例如，银行可能禁止使用任何外部AI进行代码处理。Anthropic的企业指南建议采用包括流程和技术在内的三管齐下方法，以安全部署AI。遵守这些准则是你的职责。此外，警惕网络钓鱼或恶意代码——讽刺的是，如果AI训练于恶意示例，它可能会插入恶意代码。因此，代码安全审查仍然很重要。\n\n*   **偏见与公平：** 如果AI帮助生成面向用户的内容或决策，请注意偏见。例如，如果你使用AI生成面试问题或分析简历（只是假设），请记住模型可能带有训练数据中的偏见。在软件上下文中，这可能不那么直接，但想象AI生成的代码注释或文档不经意间使用了非包容性语言。你仍然应该通过你通常的 DEI（多元化、公平、包容）标准流程来审查这些输出。OpenAI的企业AI指南讨论了确保公平性并检查模型输出是否存在偏见假设。作为工程师，如果你看到AI产生了有问题的内容（即使是在玩笑或示例中），请不要传播它。我们必须成为道德过滤器。\n\n*   **AI使用透明度：** 如果你的产品部分使用了AI（例如，AI生成的回复或由AI建议构建的功能），请考虑在适当的情况下对用户保持透明。这更多是关于产品决策，但用户期望知道他们何时阅读由AI生成的内容或与机器人互动，这已成为日益增长的期望。从工程角度来看，这可能意味着通过日志记录来指示AI的参与，或标记输出。它也可能意味着设置防护措施：例如，如果AI可能在你的应用程序中自由回答用户查询，请对该输出进行检查或审核。\n\n*   **知识产权（IP）问题：** 法律理解仍在演变，但在使用AI处理受许可材料时要谨慎。如果你要求AI生成“类似于库X”的代码，请确保你没有无意中复制受许可的代码（模型有时会重复训练数据）。同样，请注意归属——如果AI生成的结果受到特定来源的影响，除非你提示，否则它不会引用该来源。目前，将AI输出视为你自己的作品（在许可方面）是谨慎的做法——这意味着你承担责任，就好像是你自己编写的一样。一些公司甚至由于对生成代码的知识产权不确定性而限制使用Copilot。请密切关注这方面的更新，如有疑问，请咨询法律部门或坚持使用知名算法。\n\n*   **管理期望与人工监督：** 从道德角度讲，工程师应防止在关键领域过度依赖AI，因为错误可能造成危害（例如，医疗软件或自动驾驶中的AI）。即使你个人在一个简单的Web应用程序上工作，原则仍然成立：确保重要决策有人工备用方案。例如，如果AI总结了客户的需求，请让人工与客户确认摘要。在重要的地方，不要让AI成为唯一的真理仲裁者。这种负责任的态度可以保护你、你的用户和你的组织。\n\n总之，成为一名AI原生工程师也意味着成为一名**负责任的工程师**。我们构建可靠、安全、尊重用户的系统的核心职责没有改变；我们只是现在有了更强大的工具。以一种让你引以为豪的方式使用它们，就好像它们完全由你编写一样（因为实际上，你对此负有责任）。许多公司和组织（OpenAI、Google、Anthropic）已经发布了关于负责任AI使用的指南和手册——这些可以是深化你这方面理解的绝佳延伸阅读（参见**“延伸阅读”**部分）。\n\n如果你领导一个工程团队，你的职责不仅仅是允许AI的使用，而是要**战略性地倡导它**。这意味着从被动接受转向积极培养，重点关注以下几个关键领域：\n\n*   **以身作则：** 演示AI如何用于规划或起草提案等战略任务，并清晰阐述它将如何使团队及其产品变得更好。通过公开分享你在AI方面的成功和挫折，来示范学习过程。AI原生文化始于高层，并通过真实性而非仅仅命令来培养。\n\n*   **投资技能：** 超越简单的允许，积极为学习提供资源。赞助高级工具许可，正式批准实验时间（如黑客日或探索冲刺），并创建论坛（演示、共享维基），让团队建立一个最佳实践和有效提示的集体库。这表明技能发展是真正的优先事项。\n\n*   **培养心理安全：** 创造一个工程师感到安全的环境，可以进行实验、分享失败并提出基本问题而不会受到评判。通过将AI采纳视为一项集体旅程来明确解决能力不足的恐惧，并通过强调AI如何增强而非自动化定义高级工程的关键思维和判断力来消除被取代的恐惧。\n\n*   **重新审视路线图和流程：** 主动识别产品或开发周期中哪些部分适合AI驱动的加速。准备好调整时间表、估算和团队工作流程，以反映工程工作的性质正在从编写样板代码转向规范、验证和集成。发展你的代码审查流程，将更高的重点放在对AI生成输出进行关键性的人工验证上。\n\n遵循这些最佳实践将有助于确保你将AI集成到工程中能够产生积极的结果——更高的生产力、更好的代码、更快的学习——而不会带来草率使用带来的负面影响。它关乎将AI的最佳能力与你作为熟练人类的最佳能力相结合。下一节也是最后一节将总结我们的讨论，反思AI原生之旅和未来的道路，以及继续探索的额外资源。\n\n我们已经探讨了成为AI原生软件工程师的意义——从思维模式到实际工作流程，从工具领域到生命周期集成，再到最佳实践。很明显，软件工程师的角色正在随着AI能力的不断增长而演变。AI非但没有使工程师过时，反而证明了它是人类技能的强大增强。通过采纳AI原生方法，你将自己定位为**能够更快地构建、学到更多、应对比以往任何时候都更大的挑战**。\n\n总结几个关键要点：成为AI原生首先要将AI视为你技能的倍增器，而不是一个神奇的黑盒或威胁。它关乎不断追问：“AI能在这方面帮助我吗？”然后审慎地利用它来加速日常任务，探索创造性解决方案，甚至发现错误。它涉及提示工程和智能体编排等新技能，但也提升了永恒技能的重要性——架构设计、批判性思维和道德判断——因为这些指导着AI的应用。AI原生工程师始终在学习：学习如何更好地使用AI，并利用AI更快地学习其他领域（一个良性循环！）。\n\n实际上，我们看到有一个丰富的工具生态系统。没有放之四海而皆准的AI工具——你可能会根据自己的工作组建一个个人工具包（IDE助手、原型生成器等）。最优秀的工程师会知道何时选择何种工具，就像一个工具箱齐全的工匠一样。而且他们会随着新工具的出现而不断更新工具箱。重要的是，AI成为工作各个阶段的协作伙伴——不仅是编码，还包括编写测试、调试、生成文档，甚至在设计阶段进行头脑风暴。你让AI参与的领域越多，你就能将你独特的人类才能集中在最重要的地方。\n\n我们还强调了谨慎和责任。AI能力的兴奋应与健康的怀疑和严格的验证相平衡。通过遵循最佳实践——清晰的提示、代码审查、小步迭代、注意局限性——你可以避免陷阱，并在使用AI时建立信任。作为一名经验丰富的专业人士（特别是如果你是IC或技术负责人，就像你们中的许多人一样），你拥有有效指导AI和减轻其错误的背景。从某种意义上说，你的经验比以往任何时候都更有价值：初级工程师可以从AI获得提升来生成中级代码，但需要高级思维才能提示AI以健壮的方式解决复杂问题，并将其优雅地集成到更大的系统中。\n\n展望未来，我们只能预期AI将变得更加强大，并更深入地集成到我们使用的工具中。未来的IDE可能会有AI持续运行，检查我们的工作甚至在后台优化代码。我们可能会看到针对不同领域的专业AI（例如，擅长前端用户体验的AI与擅长数据库调优的AI）。成为AI原生意味着你将顺利适应这些进步——你将将其视为工作流程的自然演变。也许最终“AI原生”将简单地等同于“软件工程师”，因为使用AI将像今天使用Stack Overflow或Google一样普遍。在那之前，那些率先采用这种方法的人（就像你，阅读并应用这些概念的人）将拥有优势。\n\n还有一个更广泛的影响：通过加速开发，AI可以解放我们，让我们专注于更宏大的项目和工程中更具创造性的方面。它可能预示着一个快速原型设计和实验的时代。正如我在其中一篇文章中所思考的，我们甚至可能会看到软件构建者发生转变——随着AI降低门槛，更多人（甚至是非传统编码者）可以将想法变为现实。作为一名AI原生工程师，你可能会在其中发挥作用，通过构建工具或指导他人使用它们。这是一个令人兴奋的前景：工程变得更多地关乎想象力和设计，而重复的劳动则由我们的AI助手处理。\n\n总之，将AI融入你的日常工程实践并非一次性转变，而是一个旅程。从你所在的位置开始：尝试一个新工具，或将AI应用于下一个任务的一部分。逐步扩大你的舒适区。庆祝成功（比如第一次AI生成的测试捕获了你遗漏的bug），并从挫折中学习（也许AI重构破坏了什么——这是改进提示的教训）。\n\n鼓励你的团队也这样做，建立一个对AI友好的工程文化。通过务实的使用和持续的学习，你会发现AI不仅能提高你的生产力，还能重燃开发的热情——让你专注于创造性问题解决，并更快地将想法变为现实。\n\nAI辅助开发时代已经到来，那些巧妙驾驭这股浪潮的人将定义软件工程的下一个篇章。通过阅读本文并自行实践，你已然走上这条道路。继续前进，保持好奇心，继续编码——与你的新AI伙伴并肩作战。\n\n为了加深您的理解并持续改进您的AI辅助工作流程，这里有一些来自领先组织的优秀免费指南和资源。它们涵盖了从提示工程到构建智能体以及负责任地部署AI的方方面面：\n\n*   **[Google - 提示指南101（第二版）](https://services.google.com/fh/files/misc/gemini-for-google-workspace-prompting-guide-101.pdf)** - 一本快速入门手册，用于编写有效提示，其中包含大量针对Google Gemini模型的技巧和示例。非常适合学习提示基础知识以及如何措辞查询以获得最佳结果。\n\n*   **[Google - “更多信号，更少猜测”提示工程白皮书](https://www.kaggle.com/whitepaper-prompt-engineering)** - 一份68页的Google白皮书，深入探讨了高级提示技术（用于API使用、思维链提示、使用温度/top-p设置等）。对于希望在基础之外精进提示工程的工程师来说，这是一份极佳的资源。\n\n*   **[OpenAI -](https://cdn.openai.com/business-guides-and-resources/a-practical-guide-to-building-agents.pdf)** _**[智能体构建实践指南](https://cdn.openai.com/business-guides-and-resources/a-practical-guide-to-building-agents.pdf)**_ - OpenAI关于设计和实现在实际场景中工作的AI智能体的综合指南（约34页）。它涵盖了智能体架构（单一与多智能体）、工具集成、迭代循环以及部署自主智能体时的重要安全考虑。\n\n*   **[Anthropic -](https://www.anthropic.com/engineering/claude-code-best-practices)** _**[Claude Code：智能体编码最佳实践](https://www.anthropic.com/engineering/claude-code-best-practices)**_ - Anthropic工程师关于如何最大程度利用Claude（他们的AI）在编码场景中的指南。它包括用CLAUDE.md文件构建仓库以提供上下文、用于调试和功能构建的提示格式，以及如何与AI编码智能体进行迭代工作等技巧。对于在IDE中使用AI或计划将AI智能体集成到其代码库中的任何人来说都很有用。\n\n*   **[OpenAI -](https://cdn.openai.com/business-guides-and-resources/identifying-and-scaling-ai-use-cases.pdf)** _**[识别和扩展AI用例](https://cdn.openai.com/business-guides-and-resources/identifying-and-scaling-ai-use-cases.pdf)**_ - 本指南帮助组织（和团队）发现AI的高价值机会并有效地扩展它们。它介绍了一种方法来识别AI可以在哪里增加价值、如何快速原型设计以及如何在企业范围内可持续地推广AI解决方案。对于规划AI采纳的技术主管和经理来说非常有用。\n\n*   **[Anthropic -](https://assets.anthropic.com/m/66daaa23018ab0fd/original/Anthropic-enterprise-ebook-digital.pdf)** _**[在企业中构建可信赖的AI](https://assets.anthropic.com/m/66daaa23018ab0fd/original/Anthropic-enterprise-ebook-digital.pdf)**_ **[(对AI的信任)](https://assets.anthropic.com/m/66daaa23018ab0fd/original/Anthropic-enterprise-ebook-digital.pdf)** - 一本面向企业、关于负责任地部署AI的电子书。它概述了三维方法（人员、流程、技术），以确保AI系统可靠、安全并与组织价值观保持一致。它还专门讨论了AI安全和治理的最佳实践——这是理解AI项目中风险管理的必读之作。\n\n*   **[OpenAI -](https://cdn.openai.com/business-guides-and-resources/ai-in-the-enterprise.pdf)** _**[企业中的AI](https://cdn.openai.com/business-guides-and-resources/ai-in-the-enterprise.pdf)**_ - OpenAI关于顶级公司如何使用AI以及从这些合作中汲取经验教训的24页报告。它提供了战略见解和案例研究，包括将AI集成到产品和运营中并规模化应用的实用步骤。对于了解AI对业务的宏观影响以及从高层次AI集成中获取灵感很有用。\n\n*   **[Google -](https://www.kaggle.com/whitepaper-agent-companion)** _**[智能体伴侣白皮书](https://www.kaggle.com/whitepaper-agent-companion)**_ - Google关于其提示指南的高级“102级别”技术伴侣，重点关注AI智能体。本指南探讨了复杂主题，如智能体评估、工具使用和多个智能体编排。它是希望在智能体开发和部署方面突破界限的开发者的深度探索——本质上是高级AI构建者的工具包。\n\n每个资源都可以帮助您进一步发展您的AI原生工程技能，提供理论框架和实用技术。它们都是免费提供的（没有付费墙），阅读它们将巩固本节中讨论的许多概念，同时从行业专家那里引入新的见解。\n\n祝您学习愉快，构建愉快！\n\n_很高兴告诉大家，我正在与O'Reilly合作撰写一本新的[AI辅助工程书籍](https://www.oreilly.com/library/view/vibe-coding-the/9798341634749/)。如果您喜欢我在这里的文章，您可能会对它感兴趣。_\n\n\n![](https://substackcdn.com/image/fetch/$s_!WFGE!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Faba8cf11-c1d1-4cb8-8400-1fa7b7b91d83_5246x5246.png)\n\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"$L18\",null,{\"post\":{\"kind\":\"entry\",\"section\":\"rosetta\",\"slug\":\"ai-native-software-engineer\",\"slugSegments\":[\"notes\",\"missing-source-url\",\"ai-native-software-engineer\"],\"pathSegments\":[\"notes\",\"missing-source-url\",\"ai-native-software-engineer\"],\"urlPath\":\"/rosetta/notes/missing-source-url/ai-native-software-engineer\",\"href\":\"/rosetta/notes/missing-source-url/ai-native-software-engineer\",\"category\":\"missing-source-url\",\"title\":\"AI原生软件工程师\",\"date\":\"2025-07-02\",\"excerpt\":\"本文定义了AI原生软件工程师的概念，即将AI深度融入日常开发工作流程、视其为协作伙伴而非威胁的工程师。文章阐述了核心思维转变——从恐惧AI取代转向主动利用AI放大自身能力，提出信任但验证的协作原则，并给出了从工具准备到逐步建立AI熟练度的实践路径，强调工程师仍需对代码 ":[[\"$\",\"strong\",null,{\"children\":\"AI原生思维\"}],\"：将AI内化为思考问题和构建软件的核心方式，对每项任务主动思考AI如何协助完成，而非被动等待\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"上下文工程\"}],\"：通过精心构造提示词和上下文信息，引导AI生成高质量输出的技术手段，是高级工程师发挥专业优势的关键能力\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"信任但验证\"}],\"：将AI视为知识丰富但经验尚浅的结对编程伙伴，利用其速度和信息量的同时，工程师必须对每一行代码的质量和正确性负最终责任\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"工程师即管理者\"}],\"：AI时代工程师角色从亲力亲为转向协调和监督AI智能体完成任务，通过规则文件和结构化代码塑造人机协作环境\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"渐进式采用\"}],\"：从小处着手逐步建立AI熟练度，先将任务交给AI模型观察表现，再结合编码助手和智能体工具形成完整的AI优先工作流程\"]}],\"\\n\",[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":\"作者：Addy Osmani\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":\"日期：2025年7月2日\"}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"原文链接：\",[\"$\",\"a\",null,{\"href\":\"https://addyo.substack.com/p/the-ai-native-software-engineer\",\"children\":\"The AI-Native Software Engineer\"}]]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"交互式报告：\",[\"$\",\"a\",null,{\"href\":\"https://linguage.github.io/articles/ai-native-software-engineer.html\",\"children\":\"AI原生软件工程师\"}]]}],\"\\n\"]}],\"\\n\",[\"$\",\"hr\",null,{}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":[[\"$\",\"em\",null,{\"children\":\"AI原生软件工程师\"}],\" 是指那些将AI深度融入日常工作流程，视其为伙伴以放大自身能力的人。\"]}]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"这需要一个根本性的\",[\"$\",\"strong\",null,{\"children\":\"思维转变\"}],\"。AI原生工程师不会想“AI可能会取代我”，而是对每项任务都问自己：“\",[\"$\",\"em\",null,{\"children\":\"AI能帮助我更快、更好或以不同方式完成这项任务吗？\"}],\"”。\"]}],\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"这种思维模式是乐观和积极主动的——你将AI视为提高生产力和创造力的倍增器，而非威胁。采用正确的方法，\",[\"$\",\"strong\",null,{\"children\":\"AI可以 "$\",\"strong\",null,{\"children\":\"请编写一个Jest测试文件\"}],\"，该文件：(1) 渲染表单，(2) 填写有效和无效输入，(3) 提交表单，(4) 断言\",[\"$\",\"code\",null,{\"className\":\"rounded-none border border-border bg-placeholder/45 px-[6px] py-[2px] font-mono text-[0.9em] text-text\",\"children\":\"onSubmit\"}],\"以正确数据被调用，以及 (5) 检查成功和错误状态是否正确渲染。”\"]}],\"\\n\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"32:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"第二个提示更长，但它给了AI我们所需的一切。结果将\",[\"$\",\"strong\",null,{\"children\":\"更准确和有用得多\"}],\"，因为AI不会猜测我们的意图——我们已经明确说明了。实际上，多花一分钟澄清你的提示可以为你节省\",[\"$\",\"strong\",null,{\"children\":\"数小时\"}],\"的后期AI生成代码修正时间。\"]}]\n33:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"img\",null,{\"src\":\"https://substackcdn.com/image/fetch/$s_!NG0k!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F4d693ee6-61be-4250-ad42-b43ace337365_1024x1024.png\",\"alt\":\"\"}]}]\n34:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"有效的提示是一项如此重要的技能，以至于Google发布了完整的指南（参见**\",[\"$\",\"a\",null,{\"href\":\"https://workspace.google.com/learning/content/gemini-prompt-guide\",\"children\":\"Google的提示指南101\"}],\"**以获取一个很好的起点）。随着你的练习，你将对如何措辞请求有感觉。一些快速提示：明确你想要的格式（例如，“将输出返回为JSON”），在你的提示中将复杂任务分解为有序的步骤或项目符号，并尽可能提供示例。这些技术有助于AI更好地理解你的请求。\"]}]\n35:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"步骤4：使用AI进行代码生成和补全。\"}]}]\n36:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"在设置好工具并掌握了如何提示后，开始将AI应用于实际的编码任务。一个好的首次用例是生成样板代码或重复性代码。例如，如果你需要一个函数来解析多种格式的日期字符串，请让AI来草拟。你可以说：\",[\"$\",\"em\",null,{\"children\":\"“编写一个Python函数，该函数接受可能为X、Y或Z格式的日期字符串，并返回一个datetime对象。包括对无效格式的错误处理。”\"}]]}]\n37:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"chi"])</script><script>self.__next_f.push([1,"ldren\":[\"AI将生成一个初步实现。\",[\"$\",\"strong\",null,{\"children\":\"不要盲目接受\"}],\"——阅读它并运行测试。这种实践会让你对AI何时可靠建立信任。许多开发人员惊喜地发现AI在几秒钟内生成了一个不错的解决方案，然后他们可以对其进行调整。随着时间的推移，你可以转向更重要的代码生成任务，例如搭建整个类或模块的脚手架。例如，\",[\"$\",\"strong\",null,{\"children\":\"Cursor\"}],\"甚至提供根据描述生成整个文件或重构代码的功能。早期，依赖AI生成_辅助代码_——你理解但需要时间编写的东西——而不是核心的、关键的算法逻辑。这样，你可以在低风险任务上建立对AI能力的信心。\"]}]\n38:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"步骤5：将AI集成到非编码任务中。\"}]}]\n39:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"AI原生不仅仅是更快地编写代码；它关乎改进你工作的方方面面。一个很好的起点是使用AI进行围绕编码的写作或分析任务。例如，尝试使用AI在你进行代码更改后\",[\"$\",\"strong\",null,{\"children\":\"编写提交信息或拉取请求描述\"}],\"。你可以粘贴一个git diff并询问：“用专业的PR描述总结这些更改。”AI会起草一些你可以润色的内容。\"]}]\n3a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"这是休闲用户和真正的AI原生工程师之间的关键区别。\",[\"$\",\"strong\",null,{\"children\":\"最优秀的工程师一直都知道，他们的主要价值不仅仅在于敲代码，还在于围绕代码的思考、规划、研究和沟通。\"}],\" 将AI应用于这些领域——加速研究、澄清文档或构建项目计划——是一个巨大的倍增器。将AI视为整个工程流程的助手，而不仅仅是编码部分，对于充分发挥其在速度和创新方面的潜力至关重要。\"]}]\n3b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"沿着这些思路，使用AI来\",[\"$\",\"strong\",null,{\"chil"])</script><script>self.__next_f.push([1,"dren\":\"记录代码\"}],\"：让它根据你的代码库生成文档字符串，甚至整个技术文档部分。另一个想法是使用AI进行\",[\"$\",\"strong\",null,{\"children\":\"规划\"}],\"——如果你不确定如何实现某个功能，描述需求并让AI概述一个可能的方案。这可以为你提供一个起始蓝图，然后你可以进行调整。不要忘记日常沟通：许多工程师使用AI来起草电子邮件或Slack消息，特别是在传达复杂想法时。\"]}]\n3c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"例如，如果你需要向产品经理解释某个bug为何棘手，你可以让AI帮助清晰地阐述解释。这听起来微不足道，但它确实能提高生产力，并有助于确保你有效沟通。记住，\",[\"$\",\"em\",null,{\"children\":\"“并非所有事情都与代码有关”\"}],\"——AI也可以协助会议、头脑风暴和表达想法。AI原生工程师会利用这些机会。\"]}]\n3d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"步骤6：通过反馈迭代和改进。\"}]}]\n3e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"当你开始日常使用AI时，将其视为你自己的学习过程。注意AI输出需要修正的地方，并尝试推断原因。是提示不完整？AI是否假设了错误的上下文？利用这些反馈在下次创建更好的提示。大多数AI编码助手都允许迭代过程：你可以说“哎呀，那个函数没有正确处理空输入，请修复一下”，AI会完善它的答案。利用这种交互性——通过告诉AI需要更改什么来纠正AI的草稿通常比从头开始编写更快。\"}]\n3f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"随着时间的推移，你将开发出一个运行良好的提示模式库。例如，你可能会发现_“像我是一个新团队成员一样解释X”_对于文档目的可以产生非常好的高层代码解释。或者，在你的提示中提供一个简短的输入和输出示例可以极大地改进AI对数据转换任务的答案。将这些发现"])</script><script>self.__next_f.push([1,"融入你的工作流程。\"}]\n40:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"步骤7：始终验证和测试AI输出。\"}]}]\n41:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"这一点再怎么强调也不为过：\",[\"$\",\"strong\",null,{\"children\":\"永远不要假设AI是100%正确的\"}],\"。即使代码编译通过或者答案看起来合理，也要尽职尽责地进行检查。运行代码，编写额外的测试，或者对推理进行健全性检查。许多AI生成的解决方案表面上可以工作，但在边缘情况或有细微的bug时就会失败。\"]}]\n42:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你是工程师；AI是助手。对AI编写的代码，使用你所有正常的最佳实践（代码审查、测试、静态分析），就像对待人类编写的代码一样。实际上，这意味着要预算一些时间来检查AI生成的内容。好消息是，阅读和理解代码通常比从头编写更快，所以即使经过验证，你在生产力方面仍然会领先。\"}]\n43:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"随着经验的积累，你还会了解到AI\",[\"$\",\"strong\",null,{\"children\":\"弱势\"}],\"的任务类型——例如，许多LLM在精确算术或高度领域特定的逻辑方面表现不佳——你就会知道要格外仔细地双重检查这些部分，或者避免将AI用于这些方面。建立这种直觉可以确保，当你信任AI生成的更改足以提交或部署时，你已经降低了风险。一个有用的思维模型是\",[\"$\",\"strong\",null,{\"children\":\"将AI视为一个高效但不万能的队友\"}],\"：你重视它的贡献，但始终亲自进行最终审查。\"]}]\n44:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"strong\",null,{\"children\":\"步骤8：逐步扩展到更复杂的用例。\"}]}]\n45:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"一旦你习惯了AI处理小任务，你就可以探索更高级的集成。例如，从被动使用AI（在你想到时寻求帮助）转变为主动使用：让AI在你编码时"])</script><script>self.__next_f.push([1,"进行监控。像\",[\"$\",\"strong\",null,{\"children\":\"Cursor\"}],\"或\",[\"$\",\"strong\",null,{\"children\":\"Windsurf\"}],\"这样的工具可以在智能体模式下运行，它们会监视错误或TODO注释并自动提出修复建议。或者你也可以尝试像\",[\"$\",\"strong\",null,{\"children\":\"Cline\"}],\"提供的\",[\"$\",\"strong\",null,{\"children\":\"自主智能体\"}],\"模式，其中AI可以规划多步骤任务（创建文件、在其中编写代码、运行测试等），并在每一步获得你的批准。\"]}]\n46:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这些高级用法可以释放更大的生产力，但它们也需要更高的警惕性（想象一下给一个初级开发者更大的自主权——你仍然需要定期检查）。\"}]\n47:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"一个强大的中间步骤是使用AI进行\",[\"$\",\"strong\",null,{\"children\":\"端到端原型设计\"}],\"。例如，挑战自己在周末主要借助AI辅助来构建一个简单的应用程序：描述你想要的应用程序，看看Replit的AI或Bolt能帮你做到多远，然后用你的技能来填补空白。这种练习对于理解AI当前的局限性以及学习如何更好地指导它非常有帮助。而且这很有趣——当你几个小时内就拥有一个可能需要几天甚至几周手动编码才能完成的工作原型时，你会感觉自己拥有了超能力。\"]}]\n48:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"通过遵循这些步骤并逐步提升，你将从AI新手转变为一个能够本能地将AI融入其开发工作流程的人。下一节将更深入地探讨可用的\",[\"$\",\"strong\",null,{\"children\":\"工具和平台\"}],\"——了解针对不同任务使用何种工具是利用AI提高生产力的重要组成部分。\"]}]\n49:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"现在成为工程师令人兴奋的原因之一是，AI驱动的工具种类繁多。作为一名AI原生软件工程师，你的技能之一就是知道\",[\"$\",\"strong\",null,{\"children\":\"针对不同任务如何利用哪些工具\"}]"])</script><script>self.__next_f.push([1,",\"。在本节中，我们将考察AI编码工具和平台的现状，并提供关于如何有效选择和使用它们的指导。我们将它们大致分为两类——\",[\"$\",\"strong\",null,{\"children\":\"AI编码助手\"}],\"（它们集成到你的开发环境中，帮助你编写代码）和\",[\"$\",\"strong\",null,{\"children\":\"AI驱动的原型设计工具\"}],\"（它们可以根据提示生成整个项目脚手架或应用程序）。两者都很有价值，但它们服务于不同的需求。\"]}]\n4a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"$\",\"em\",null,{\"children\":\"在深入探讨具体工具之前，任何专业人士都必须将“数据隐私防火墙”作为其核心思维模式的一部分。始终问自己：“我是否愿意将此提示及其上下文记录在第三方服务器上？”这种自律是负责任地使用这些工具的基础。AI原生工程师学会区分适合公共云AI的任务和需要企业级、注重隐私甚至自托管的本地模型的任务。\"}]}]\n4b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这些工具就像与你的编辑器或IDE集成的“AI结对编程伙伴”。当你处理现有代码库或以传统方式（逐文件编写代码）构建项目时，它们非常宝贵。以下是一些值得注意的例子及其细微差别：\"}]\n"])</script><script>self.__next_f.push([1,"4c:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"GitHub Copilot\"}],\" 已从一个自动完成工具转变为一个真正的编码智能体：一旦你为其分配了一个问题或任务，它就能自主分析你的代码库，启动环境（例如通过GitHub Actions），提出多文件编辑建议，运行命令/测试，修复错误，并提交包含其推理日志的草稿拉取请求。它基于最先进的模型构建，支持多模型选择，并利用模型上下文协议（MCP）集成外部工具和工作区上下文，使其能够导航复杂的仓库结构，包括单体仓库、CI流水线、图像资产、API依赖项等。尽管取得了这些进步，它仍针对低到中等复杂度的任务进行了优化，并且仍然需要人工监督——尤其是在安全性、深层架构和多智能体协调方面。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"Cursor - AI原生代码编辑器：\"}],\" \",[\"$\",\"strong\",null,{\"children\":\"Cursor\"}],\"是一个深度集成AI的修改版VS Code编辑器。与作为插件的Copilot不同，Cursor是围绕AI从头开始构建的。它可以执行AI感知导航（要求它查找某个函数的使用位置等）和智能重构。值得注意的是，Cursor具有生成测试、解释代码，甚至“智能体”模式的功能，在该模式下它 ，邀请建设性的审查。\"}]\n59:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"现在我们已经了解了工具，在下一节中，我们将放大视角，探讨\",[\"$\",\"strong\",null,{\"children\":\"如何将AI应用于整个软件开发生命周期\"}],\"，从设计到部署。AI的作用不仅限于编码；它还可以协助需求、测试等更多方面。\"]}]\n5a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"AI原生软件工程师不仅使用AI编写代码——他们将其应用于**\",[\"$\",\"a\",null,{\"href\":\"https://www.geeksforgeeks.org/software-engineering/software-development-life-cycle-sdlc/\",\"children\":\"软件开发生命周期\"}],\"（SDLC）的每个阶段**。本节将探讨AI如何在工程工作的每个阶段实际应用，使整个过程更高效和创新。我们将保持领域无关性，示例略偏向于常见的Web开发场景，但这些想法适用于软件的许多领域（从云服务到移动应用）。\"]}]\n5b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"任何项目的第一步是确定要构建_什么_。AI可以充当头脑风暴伙伴和需求分析师。\"}]\n5c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"例如，如果你有一个高层产品想法（“我们需要一个用于X的应用程序”），你可以请AI帮助\",[\"$\",\"strong\",null,{\"children\":\"头脑风暴功能或用户故事\"}],\"。一个提示，比如：_“我需要设计一个个人财务追踪器的移动应用程序。它应该具备哪些功能才能提供出色的用户体验？”_可以生成一份功能列表（例如，预算、费用分类、图表、提醒），你可能最初没有考虑到。\"]}]\n5d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\""])</script><script>self.__next_f.push([1,":[\"AI可以汇总它已吸收的无数应用程序和文章中的想法。同样，你可以让AI编写初步的\",[\"$\",\"strong\",null,{\"children\":\"用户故事或用例\"}],\"：\",[\"$\",\"em\",null,{\"children\":[\"“列出乘车共享服务MVP的五个用户故事。”\",[\"$\",\"em\",null,{\"children\":\"这可以通过结构良好的故事启动你的规划，你可以对其进行完善。AI还可以帮助澄清需求：如果某个需求模糊不清，你可以问\"}],\"“我应该就这个需求提出哪些问题来澄清它？”\"]}],\"——AI会提出需要定义的关键点（例如，对于“为登录添加安全性”，AI可能会建议询问2FA、密码复杂性等）。这确保你不会在早期阶段遗漏任何东西。\"]}]\n5e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"另一个构思用途：\",[\"$\",\"strong\",null,{\"children\":\"竞品分析\"}],\"。你可以提示：_“任务管理Web应用程序的常见功能和陷阱是什么？提供一份摘要。”_AI会列出此类应用程序通常会做什么以及常见的抱怨或挑战（例如，数据同步、离线支持）。这些信息可以塑造你的需求，以包含最佳功能或避免已知问题。本质上，AI可以充当\",[\"$\",\"strong\",null,{\"children\":\"研究助手\"}],\"，扫描集体知识库，这样你就无需手动阅读10篇博客文章。\"]}]\n5f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"当然，所有AI输出都需要批判性评估——运用你的判断力过滤掉在特定上下文中合理的建议。但在早期阶段，想法的数量可能比质量更有用，因为它为你提供了与团队或利益相关者讨论的选项。具有AI原生思维的工程师通常会在参加规划会议时带上一份AI生成的想法列表，然后用自己的见解来补充。这加速了讨论并显示了主动性。\"}]\n60:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"AI还可以帮助\",[\"$\",\"strong\",null,{\"children\":\"非技术利益相关者\"}],\"在此阶段。如果你是一名技术负责人，与（比如）一名业务分析师合"])</script><script>self.__next_f.push([1,"作，你可能会在AI的帮助下生成一份产品需求文档（PRD）草稿，然后分享供审查。编辑草稿比从头编写更快。Google的提示指南甚至为这种情况提供了特定角色的提示——例如，_“作为一名业务分析师，概述薪资系统升级的需求。”_结果会给每个人一些具体的东西来做出反应。总之，在需求和构思阶段，AI的目标是广泛撒网，组织思想，从而提供一个强大的起始基础。\"]}]\n61:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"一旦需求到位，下一步就是系统设计。在这里，AI可以充当\",[\"$\",\"strong\",null,{\"children\":\"架构的参考对象\"}],\"。例如，你可以描述你正在考虑的高层架构——“我们计划使用一个微服务作为用户服务、一个API网关和一个React前端”——然后询问AI的意见：\",[\"$\",\"em\",null,{\"children\":\"“这种方法有什么优缺点？是否存在潜在的可伸缩性问题？”\"}],\" 一个精通技术的AI会列出一些点，可能类似于经验丰富的同事会说的话（例如，微服务允许独立部署但增加了开发运维的复杂性等）。这对于验证你的想法或发现你遗漏的角度很有用。\"]}]\n62:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"AI还可以帮助解决\",[\"$\",\"strong\",null,{\"children\":\"具体的、设计问题\"}],\"：“我们应该为这个特性存储选择SQL还是NoSQL？”或“聊天应用中实时通知的健壮架构是什么样的？”它将为不同的选择提供理由。虽然你不应该将它的答案奉为圭臬，但它可以揭示一些考虑因素（延迟、一致性、成本），从而指导你的决策。有时，听到推理被阐述出来有助于你向他人论证或巩固自己的理解。把它想象成向AI阐述你的架构——只是这只“橡皮鸭”会用相当合理的观点回应！\"]}]\n63:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"另一个用途是通过文本生成\",[\"$\",\"strong\",null,{\"children\":\"图表或映射\"}],\"。有些工具，"])</script><script>self.__next_f.push([1,"如果你描述一个架构，AI可以输出一个伪图（例如，使用Mermaid markdown），你可以将其可视化。例如：\",[\"$\",\"em\",null,{\"children\":\"“绘制一个组件图：客户端 -\u003e 负载均衡器 -\u003e 3个后端服务 -\u003e 数据库。”\"}],\" AI可以生成一个Mermaid代码块，渲染成一个图表。这是从概念到文档的快速方式。或者你可以要求\",[\"$\",\"strong\",null,{\"children\":\"API设计建议\"}],\"：\",[\"$\",\"em\",null,{\"children\":\"“为图书馆系统设计一个REST API，包含书籍、作者和借阅的端点。”\"}],\" AI可能会列出端点（GET /books、POST /loans等）以及示例负载，这可以是一个有用的起点，然后你再进行调整。\"]}]\n64:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"在此阶段，AI的一个特别强大的用途是\",[\"$\",\"strong\",null,{\"children\":\"通过询问失败情况来验证假设\"}],\"。例如：\",[\"$\",\"em\",null,{\"children\":\"“我们计划在某个数据中心使用内存缓存来存储会话数据。可能出现什么问题？”\"}],\" AI可能会提醒你缓存崩溃、数据中心中断或伸缩性问题等场景。它有点像一个\",[\"$\",\"strong\",null,{\"children\":\"风险清单\"}],\"生成器。这并不能取代进行适当的设计审查，但它是早期发现明显陷阱的一个很好的补充。\"]}]\n65:[\"$\",\"p\",null,{\"clas 注入AI辅助。\"}]\n77:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"模式是：\",[\"$\",\"strong\",null,{\"children\":\"AI承担繁重的工作并提供知识，而你提供方向、监督和最终判断。\"}]]}]\n78:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"这提升了你的角色——你将更多时间花在创造性设计、批判性思维和决策上，更少时间花在样板代码和查找信息上。结果通常是更快的开发周期，如果管理得当，还会提高质量和开发人员的幸福感。在下一节中，我们将讨论一些最佳实践，以确保你有效且负责任地使用AI，以及如何持续改进你由AI增强的工作流程。\"}]\n79:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"在软件开发中使用AI可以带来变革，但要真正获得好处，必须遵循最佳实践并避免常见陷阱。在本节中，我们将提炼出在工程工作流程中高效使用AI的关键原则和指南。这些实践确保AI仍然是一个强大的盟友，而不是错误或虚假自信的来源。\"}]\n7a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"我们已经多次强调：\",[\"$\",\"strong\",null,{\"children\":\"有效的提示至关重要\"}],\"。将编写提示视为你工具箱中的一项新的核心技能——就像"])</script><script>self.__next_f.push([1,"编写好的代码或好的提交信息一样。一个精心设计的提示，可能意味着AI答案是切中要害还是无用或误导性的分水岭。作为一项最佳实践，\",[\"$\",\"strong\",null,{\"children\":\"始终为AI提供足够的上下文\"}],\"。如果你在询问代码，请包含相关的代码片段或函数的目的描述。不要说：“我如何优化这个？”而要说“给定这段代码[包含代码片段]，我如何优化它以提高速度，特别是排序部分？”这有助于AI专注于你关心的问题。\"]}]\n7b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"还要具体说明所需的输出格式。如果你想要JSON，就说出来；如果你期望逐步解释，也要提及。例如，\",[\"$\",\"em\",null,{\"children\":[\"“逐步解释为什么这个测试失败”\",[\"$\",\"em\",null,{\"children\":\"或\"}],\"“将结果作为JSON对象返回，包含键X、Y”\"]}],\"。这样的指令会产生更可预测、更有用的结果。提示工程中的一个很棒的技巧是\",[\"$\",\"strong\",null,{\"children\":\"将任务分解为步骤或提供示例\"}],\"。你可以提示：“首先，分析输入。然后提出解决方案。最后，给出解决方案代码。”这种结构可以引导AI完成复杂的任务。Google的高级提示工程指南涵盖了诸如思维链提示和提供示例以减少猜测的方法。如果你得到一个完全偏离的答案，不要只是叹气——\",[\"$\",\"strong\",null,{\"children\":\"优化提示并再试一次\"}],\"。有时迭代提示（“实际上忽略之前关于X的指令，只关注Y……”）会纠正方向。\"]}]\n7c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"维护一个\",[\"$\",\"strong\",null,{\"children\":\"成功的提示库\"}],\"也很有价值。如果你发现一种提问方式始终能产生好的结果（例如，编写测试用例或解释代码的特定格式），就保存下来。随着时间的推移，你会建立一个个人“剧本”。有些工程师甚至有一个用于提示的文本片段管理器。鉴于像Google这样的公"])</script><script>self.__next_f.push([1,"司已经发布了广泛的提示指南，你可以看到这项技能的价值正在日益增长。简而言之：\",[\"$\",\"strong\",null,{\"children\":\"投入学习如何有效地与AI对话\"}],\"，因为这将在输出质量方面带来丰厚回报。\"]}]\n7d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"无论AI的答案多么令人印象深刻，\",[\"$\",\"strong\",null,{\"children\":[\"$\",\"a\",null,{\"href\":\"https://addyo.substack.com/p/the-trust-but-verify-pattern-for\",\"children\":\"永远不要盲目信任它\"}]}],\"。这句话怎么强调都不为过。对待AI的输出，就像对待人类初级开发者的工作一样：可能有用，但需要审查和测试。无数的案例表明，由于有人在不理解AI代码的情况下接受了它，导致bug悄然潜入。养成检查AI建议更改的习惯。如果它编写了一段代码，请在脑海中或使用调试器逐步检查它。添加测试来验证它（AI可以帮助编写，正如我们讨论过的）。如果它给出了解释或分析，请交叉检查关键点。例如，如果AI说“这个API是O(N^2)，导致速度变慢”，请从官方文档或通过自己推理来验证复杂性。\"]}]\n7e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"尤其要警惕\",[\"$\",\"strong\",null,{\"children\":\"看起来精确的事实陈述\"}],\"。AI有幻觉细节的倾向——比如看起来合理但实际上不存在的函数名或语法。如果AI的答案引用了API或配置键，请在官方文档中确认。在企业环境中，永远不要信任AI提供的公司特定事实（比如“根据我们内部政策……”），除非你已经将这些事实提供给它，并且它只是在复述。\"]}]\n7f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"对于代码，一个好的做法是运行你所拥有的任何快速检查：代码检查工具（linters）、类型检查器、测试套件。AI代码可能不符合你的风格指南，或者可能使用了已弃用的方法。运行linter/formatter不仅能修复样式，还能捕获某些错误（例如，未使用的"])</script><script>self.__next_f.push([1,"变量等）。一些AI工具集成了这一点——例如，AI可能会在沙盒中运行代码，如果发现异常则进行调整，但这并非万无一失。因此，作为工程师，你必须是安全网。\"}]\n80:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"在安全敏感或关键系统中，要格外小心。不要使用AI生成秘密或凭据。如果AI提供了一段处理认证或加密的代码片段，请对照已知的安全实践仔细检查。曾有案例表明，AI会提出不安全的算法，因为它优化了通过测试而不是实际安全性。\",[\"$\",\"strong\",null,{\"children\":\"责任在于你\"}],\"，确保所有输出都是安全和正确的。\"]}]\n81:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"一个有用的提示：\",[\"$\",\"strong\",null,{\"children\":\"使用AI验证AI\"}],\"。例如，从AI获得一段代码后，你可以询问同一（或另一个）AI：“这段代码是否有任何bug或安全问题？”它可能会指出你遗漏的地方（比如，“它没有在这里清理输入”或“如果X发生，这可能会溢出”）。虽然AI的这种第二意见也不能保证，但它是一个快速的健全性检查。OpenAI和Anthropic的编码指南甚至建议这种迭代提示和审查的方法——本质上是借助AI进行调试。\"]}]\n82:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后，保持健康的怀疑态度。如果输出中的某些内容让你觉得奇怪或好得不像真的，请进一步调查。AI很擅长听起来自信。成为AI原生的一部分是学习AI擅长和容易出错的地方。随着时间的推移，你将获得一种直觉（例如，“我知道LLM倾向于弄乱日期计算，我会仔细检查那一部分”）。这种直觉，结合彻底的审查，让你始终掌握主动权。\"}]\n83:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"虽然点击一个按钮就能让AI构建整个系统的想法很有吸引力，但在实践中，它很少如此简单或理想。最佳实践是\",[\"$\",\"strong\",null,{\"children\":\"利用AI放大你的"])</script><script>self.__next_f.push([1,"生产力，而不是完全自动化你无法监督的工作\"}],\"。换句话说，对于任何非微不足道的结果，都要保持人工参与。如果你使用自主智能体生成应用程序（正如我们在原型工具中看到的），将输出视为原型或草稿，而不是成品。计划由你或你的团队进行\",[\"$\",\"strong\",null,{\"children\":\"迭代\"}],\"。\"]}]\n84:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"将大任务分解成小的AI辅助块。例如，与其说“给我构建一个完整的电子商务网站”，不如将其分解：首先使用AI生成前端页面（你进行审查），然后使用AI创建基本的后端（审查它），最后进行集成和完善。这种模块化方法确保你保持理解和控制。它还利用了AI在集中任务上的优势，而不是期望它处理非常复杂的相互依赖任务（这往往是它可能遗漏重要内容的地方）。记住，AI并不能真正“理解”你项目的更高目标；那是你作为工程师或技术负责人的工作。你决定架构和约束，然后将AI作为一个强大的助手来实现部分愿景。\"}]\n85:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"抵制过度依赖的诱惑。\"}],\" 出于方便，你可能会忍不住让AI处理所有小事，甚至是你自己知道的事情。虽然将其用于繁琐任务没有问题，但请确保你仍在\",[\"$\",\"strong\",null,{\"children\":\"学习和理解\"}],\"。AI原生工程师不会关闭他们的大脑——恰恰相反，他们利用AI来解放大脑，进行更重要的思考。例如，如果AI为你编写了一个复杂的算法，花时间理解该算法（或者至少验证其正确性），然后才能部署。否则，你可能会积累“AI技术债”——代码能工作但没有人真正理解，这可能会在以后让你吃苦头。\"]}]\n86:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"管理范围的一种方法是为\",[\"$\",\"strong\",null,{\"children\":\"AI智能体设置清晰的边界\"}],\"。如果你使用像Clin"])</script><script>self.__next_f.push([1,"e或Devin（自主编码智能体）这样的工具，用你的规则配置它们（例如，未经询问不得安装新依赖项，不得进行网络调用等）。并使用试运行或计划模式等功能。例如，让智能体向你展示其计划（就像Cline那样），并逐步批准。这确保了AI不会偏离主题或采取你不会采取的行动。本质上，你充当AI工作者的项目经理——你不会让一个初级开发人员在没有代码审查的情况下直接提交到主分支；同样，也不要让AI这样做。\"]}]\n87:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"通过对AI的角色进行范围界定和监督，你可以避免在不知不觉中出现问题。你还能保持自己对项目的参与度，这对于质量和你自身的成长至关重要。反之亦然：确实要将AI用于所有那些耗时但不需要大量创造性工作的_小事_。让它编写第十个CRUD端点的变体或样板表单验证代码，而你则专注于需要人类洞察力的棘手集成逻辑或性能调优。这种分工——AI负责繁重工作，人类负责监督和创造性问题解决——是当前AI集成的最佳平衡点。\"}]\n88:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"AI领域和可用的工具发展速度惊人。“AI原生”今天的定义与一年后将会不同。因此，一个关键原则是：\",[\"$\",\"strong\",null,{\"children\":\"永不停止学习\"}],\"。关注新工具、新模型功能和新的最佳实践。订阅新闻通讯或社区（有一些专门针对编码AI工具的开发者新闻通讯）。与同行分享经验：他们使用了哪些提示策略，他们尝试了哪些新的智能体框架等等。社区正在共同探索这个问题，积极参与将让你保持领先。\"]}]\n89:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"一个实际的学习方法是将AI融入副项目或黑客松。风险较低，你可以自由探索其能力。尝试纯粹在AI协助下构建一些东西作为实验——你将发现它的超能力和痛点，然后可以将其"])</script><script>self.__next_f.push([1,"小心地应用到你的日常工作中。也许在这样做的过程中，你会发现一个巧妙的工作流程（比如将GPT的提示链接到编辑器中的Copilot），你可以教给你的团队。事实上，\",[\"$\",\"strong\",null,{\"children\":\"指导团队中的其他人\"}],\"使用AI也将巩固你自己的知识。举办一次关于提示工程的午餐会，或者分享一个AI如何帮助解决棘手问题的成功案例。这不仅帮助了同事，他们也经常会分享自己的技巧，从而提升每个人的水平。\"]}]\n8a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"最后，也要投资于你的基本技能。AI可以自动化很多东西，但你对计算机科学、系统设计和问题解决的基础越扎实，你向AI提出的问题就越好，评估其答案的能力也就越强。人类的创造力和对系统的深度理解并没有被取代——事实上，它们变得更加重要，因为你现在正在指导一个强大的工具。正如我的一篇文章所建议的，关注“\",[\"$\",\"a\",null,{\"href\":\"https://news.ycombinator.com/item?id=43361801\",\"children\":\"最大化‘人类30%’\"}],\"”——工作中人类洞察力不可替代的部分。这包括定义问题、做出判断和关键调试。通过持续学习来增强这些能力，让AI处理枯燥的70%。\"]}]\n8b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"如果你在团队环境中工作（我们大多数人都是如此），那么\",[\"$\",\"strong\",null,{\"children\":\"协作AI使用实践\"}],\"非常重要。与队友分享你所学到的，也要倾听他们的经验。也许你发现使用某个AI工具提高了你的提交速度；向团队提出，看看大家是否愿意采纳。反之，也要接受指导方针——例如，有些团队决定“我们不会在未经至少一名人工审查和测试的情况下提交AI生成的代码”（这是一个明智的规则）。一致性很重要；如果每个人都遵循类似的方法，代码库就会保持一致，人们会信任彼此的AI增强贡献。\"]}]\n8c:[\"$\""])</script><script>self.__next_f.push([1,",\"p\",null,{\"className\":\"mb-6\",\"children\":\"你甚至可以将此正式化为团队惯例。例如，如果使用AI进行代码生成，一些团队会在PR或代码注释中注明，如 // Generated with Gemini, needs review。这种透明度有助于代码审查者集中注意力。这类似于我们处理来自自动化工具的代码（例如“此文件由Rails生成器搭建”）。知道某个内容是AI生成的可能会改变你的审查方式——也许在某些方面会更彻底。\"}]\n8d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"鼓励与AI进行结对编程。一个巧妙的做法是_AI驱动的代码审查_：当有人打开拉取请求时，他们可能会在diff上运行AI以获取初始审查意见列表，然后利用这些意见在人类看到PR之前进行完善。作为一个团队，你可以将此作为一步（但要小心AI可能无法捕捉所有问题，也无法理解业务上下文）。另一个协作角度是文档：也许维护一个内部FAQ，例如“我如何要求AI为我们的代码库做X？”——例如，如何用你的特定技术栈进行提示。这可以是新团队成员入门AI在你的项目中使用的部分。\"}]\n8e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"另一方面，尊重那些对AI持谨慎或怀疑态度的人。并非所有人都能立即感到舒适或被说服。以非威胁的方式展示结果比抽象地宣扬更好。展示它如何发现了一个bug或通过起草测试节省了一天的工作。也要诚实地面对失败（例如，“我们尝试用AI生成那个模块，但它引入了一个我们后来发现的细微bug。这是我们学到的。”）。这有助于建立集体智慧。一个共同学习的团队将比各自为政的个人更有效地集成AI。\"}]\n8f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"从领导角度（对于技术主管和经理而言），思考如何\",[\"$\",\"strong\",null,{\"children\":\"整合AI培训和指南\"}],\"。可以拨出时间让团队成员进行实验和分享发现（如黑客日或关于AI"])</script><script>self.__next_f.push([1,"工具的闪电演讲）。此外，作为团队决定如何处理AI生成代码的许可或知识产权问题——例如，代码生成工具具有不同的许可或使用条款。确保遵守这些规定以及任何公司政策（有些公司禁止使用公共AI服务处理专有代码——在这种情况下，你或许可以投资内部AI解决方案或使用可本地运行的开源模型，以避免数据泄露）。\"]}]\n90:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"简而言之，\",[\"$\",\"strong\",null,{\"children\":\"将AI采纳视为一项团队运动\"}],\"。每个人都应该朝着同一个方向努力，并使用大致兼容的工具和方法，以使代码库保持可维护性，并将收益在整个团队中倍增。组织层面的AI原生能力可以成为强大的竞争优势，但这需要一致性和集体学习。\"]}]\n91:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"最后但同样重要的是，始终负责任地使用AI。这包括以下几点：\"}]\n"])</script><script>self.__next_f.push([1,"92:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"隐私与安全：\"}],\" 请注意你向AI服务提供的数据。如果你使用的是托管服务，如OpenAI的API或IDE插件，你发送的代码或文本在某些条件下可能会被服务提供商存储或查看。对于敏感代码（与安全相关、专有算法、用户数据等），考虑使用自托管模型，或者至少在提示前剥离敏感部分。许多AI工具现在都提供企业版本或本地部署选项来缓解此问题。检查你公司的政策：例如，银行可能禁止使用任何外部AI进行代码处理。Anthropic的企业指南建议采用包括流程和技术在内的三管齐下方法，以安全部署AI。遵守这些准则是你的职责。此外，警惕网络钓鱼或恶意代码——讽刺的是，如果AI训练于恶意示例，它可能会插入恶意代码。因此，代码安全审查仍然很重要。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"偏见与公平：\"}],\" 如果AI帮助生成面向用户的内容或决策，请注意偏见。例如，如果你使用AI生成面试问题或分析简历（只是假设），请记住模型可能带有训练数据中的偏见。在软件上下文中，这可能不那么直接，但想象AI生成的代码注释或文档不经意间使用了非包容性语言。你仍然应该通过你通常的 DEI（多元化、公平、包容）标准流程来审查这些输出。OpenAI的企业AI指南讨论了确保公平性并检查模型输出是否存在偏见假设。作为工程师，如果你看到AI产生了有问题的内容（即使是在玩笑或示例中），请不要传播它。我们必须成为道德过滤器。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"AI使用透明度：\"}],\" 如果你的产品部分使用了AI（例如，AI生成的回复或由AI建议构建的功能），请考虑在适当的情况下对用户保持透明。这更多是关于产品决策，但用户期望知道他们何时阅读由AI生成的内容或与机器人互动，这已成为日益增长的期望。从工程角度来看，这可能意味着通过日志记录来指示AI的参与，或标记输出。它也可能意味着设置防护措施：例如，如果AI可能在你的应用程序中自由回答用户查询，请对该输出进行检查或审核。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"知识产权（IP）问题：\"}],\" 法律理解仍在演变，但在使用AI处理受许可材料时要谨慎。如果你要求AI生成“类似于库X”的代码，请确保你没有无意中复制受许可的代码（模型有时会重复训练数据）。同样，请注意归属——如果AI生成的结果受到特定来源的影响，除非你提示，否则它不会引用该来源。目前，将AI输出视为你自己的作品（在许可方面）是谨慎的做法——这意味着你承担责任，就好像是你自己编写的一样。一些公司甚至由于对生成代码的知识产权不确定性而限制使用Copilot。请密切关注这方面的更新，如有疑问，请咨询法律部门或坚持使用知名算法。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"管理期望与人工监督：\"}],\" 从道德角度讲，工程师应防止在关键领域过度依赖AI，因为错误可能造成危害（例如，医疗软件或自动驾驶中的AI）。即使你个人在一个简单的Web应用程序上工作，原则仍然成立：确保重要决策有人工备用方案。例如，如果AI总结了客户的需求，请让人工与客户确认摘要。在重要的地方，不要让AI成为唯一的真理仲裁者。这种负责任的态度可以保护你、你的用户和你的组织。\"]}],\"\\n\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"93:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"总之，成为一名AI原生工程师也意味着成为一名\",[\"$\",\"strong\",null,{\"children\":\"负责任的工程师\"}],\"。我们构建可靠、安全、尊重用户的系统的核心职责没有改变；我们只是现在有了更强大的工具。以一种让你引以为豪的方式使用它们，就好像它们完全由你编写一样（因为实际上，你对此负有责任）。许多公司和组织（OpenAI、Google、Anthropic）已经发布了关于负责任AI使用的指南和手册——这些可以是深化你这方面理解的绝佳延伸阅读（参见**“延伸阅读”**部分）。\"]}]\n94:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"如果你领导一个工程团队，你的职责不仅仅是允许AI的使用，而是要\",[\"$\",\"strong\",null,{\"children\":\"战略性地倡导它\"}],\"。这意味着从被动接受转向积极培养，重点关注以下几个关键领域：\"]}]\n"])</script><script>self.__next_f.push([1,"95:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"以身作则：\"}],\" 演示AI如何用于规划或起草提案等战略任务，并清晰阐述它将如何使团队及其产品变得更好。通过公开分享你在AI方面的成功和挫折，来示范学习过程。AI原生文化始于高层，并通过真实性而非仅仅命令来培养。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"投资技能：\"}],\" 超越简单的允许，积极为学习提供资源。赞助高级工具许可，正式批准实验时间（如黑客日或探索冲刺），并创建论坛（演示、共享维基），让团队建立一个最佳实践和有效提示的集体库。这表明技能发展是真正的优先事项。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"培养心理安全：\"}],\" 创造一个工程师感到安全的环境，可以进行实验、分享失败并提出基本问题而不会受到评判。通过将AI采纳视为一项集体旅程来明确解决能力不足的恐惧，并通过强调AI如何增强而非自动化定义高级工程的关键思维和判断力来消除被取代的恐惧。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":\"重新审视路线图和流程：\"}],\" 主动识别产品或开发周期中哪些部分适合AI驱动的加速。准备好调整时间表、估算和团队工作流程，以反映工程工作的性质正在从编写样板代码转向规范、验证和集成。发展你的代码审查流程，将更高的重点放在对AI生成输出进行关键性的人工验证上。\"]}],\"\\n\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"96:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"遵循这些最佳实践将有助于确保你将AI集成到工程中能够产生积极的结果——更高的生产力、更好的代码、更快的学习——而不会带来草率使用带来的负面影响。它关乎将AI的最佳能力与你作为熟练人类的最佳能力相结合。下一节也是最后一节将总结我们的讨论，反思AI原生之旅和未来的道路，以及继续探索的额外资源。\"}]\n97:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[\"我们已经探讨了成为AI原生软件工程师的意义——从思维模式到实际工作流程，从工具领域到生命周期集成，再到最佳实践。很明显，软件工程师的角色正在随着AI能力的不断增长而演变。AI非但没有使工程师过时，反而证明了它是人类技能的强大增强。通过采纳AI原生方法，你将自己定位为\",[\"$\",\"strong\",null,{\"children\":\"能够更快地构建、学到更多、应对比以往任何时候都更大的挑战\"}],\"。\"]}]\n98:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"总结几个关键要点：成为AI原生首先要将AI视为你技能的倍增器，而不是一个神奇的黑盒或威胁。它关乎不断追问：“AI能在这方面帮助我吗？”然后审慎地利用它来加速日常任务，探索创造性解决方案，甚至发现错误。它涉及提示工程和智能体编排等新技能，但也提升了永恒技能的重要性——架构设计、批判性思维和道德判断——因为这些指导着AI的应用。AI原生工程师始终在学习：学习如何更好地使用AI，并利用AI更快地学习其他领域（一个良性循环！）。\"}]\n99:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"实际上，我们看到有一个丰富的工具生态系统。没有放之四海而皆准的AI工具——你可能会根据自己的工作组建一个个人工具包（IDE助手、原型生成器等）。最优秀的工程师会知道何时选择何种工具，就像一个工具箱齐全的工"])</script><script>self.__next_f.push([1,"匠一样。而且他们会随着新工具的出现而不断更新工具箱。重要的是，AI成为工作各个阶段的协作伙伴——不仅是编码，还包括编写测试、调试、生成文档，甚至在设计阶段进行头脑风暴。你让AI参与的领域越多，你就能将你独特的人类才能集中在最重要的地方。\"}]\n9a:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"我们还强调了谨慎和责任。AI能力的兴奋应与健康的怀疑和严格的验证相平衡。通过遵循最佳实践——清晰的提示、代码审查、小步迭代、注意局限性——你可以避免陷阱，并在使用AI时建立信任。作为一名经验丰富的专业人士（特别是如果你是IC或技术负责人，就像你们中的许多人一样），你拥有有效指导AI和减轻其错误的背景。从某种意义上说，你的经验比以往任何时候都更有价值：初级工程师可以从AI获得提升来生成中级代码，但需要高级思维才能提示AI以健壮的方式解决复杂问题，并将其优雅地集成到更大的系统中。\"}]\n9b:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"展望未来，我们只能预期AI将变得更加强大，并更深入地集成到我们使用的工具中。未来的IDE可能会有AI持续运行，检查我们的工作甚至在后台优化代码。我们可能会看到针对不同领域的专业AI（例如，擅长前端用户体验的AI与擅长数据库调优的AI）。成为AI原生意味着你将顺利适应这些进步——你将将其视为工作流程的自然演变。也许最终“AI原生”将简单地等同于“软件工程师”，因为使用AI将像今天使用Stack Overflow或Google一样普遍。在那之前，那些率先采用这种方法的人（就像你，阅读并应用这些概念的人）将拥有优势。\"}]\n9c:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"还有一个更广泛的影响：通过加速开发，AI可以解放我们，让我们专注于更宏大的项目和工程中更具创造性的方面"])</script><script>self.__next_f.push([1,"。它可能预示着一个快速原型设计和实验的时代。正如我在其中一篇文章中所思考的，我们甚至可能会看到软件构建者发生转变——随着AI降低门槛，更多人（甚至是非传统编码者）可以将想法变为现实。作为一名AI原生工程师，你可能会在其中发挥作用，通过构建工具或指导他人使用它们。这是一个令人兴奋的前景：工程变得更多地关乎想象力和设计，而重复的劳动则由我们的AI助手处理。\"}]\n9d:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"总之，将AI融入你的日常工程实践并非一次性转变，而是一个旅程。从你所在的位置开始：尝试一个新工具，或将AI应用于下一个任务的一部分。逐步扩大你的舒适区。庆祝成功（比如第一次AI生成的测试捕获了你遗漏的bug），并从挫折中学习（也许AI重构破坏了什么——这是改进提示的教训）。\"}]\n9e:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"鼓励你的团队也这样做，建立一个对AI友好的工程文化。通过务实的使用和持续的学习，你会发现AI不仅能提高你的生产力，还能重燃开发的热情——让你专注于创造性问题解决，并更快地将想法变为现实。\"}]\n9f:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"AI辅助开发时代已经到来，那些巧妙驾驭这股浪潮的人将定义软件工程的下一个篇章。通过阅读本文并自行实践，你已然走上这条道路。继续前进，保持好奇心，继续编码——与你的新AI伙伴并肩作战。\"}]\na0:[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":\"为了加深您的理解并持续改进您的AI辅助工作流程，这里有一些来自领先组织的优秀免费指南和资源。它们涵盖了从提示工程到构建智能体以及负责任地部署AI的方方面面：\"}]\n"])</script><script>self.__next_f.push([1,"a1:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"a\",null,{\"href\":\"https://services.google.com/fh/files/misc/gemini-for-google-workspace-prompting-guide-101.pdf\",\"children\":\"Google - 提示指南101（第二版）\"}]}],\" - 一本快速入门手册，用于编写有效提示，其中包含大量针对Google Gemini模型的技巧和示例。非常适合学习提示基础知识以及如何措辞查询以获得最佳结果。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[\"\\n\",[\"$\",\"p\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"a\",null,{\"href\":\"https://www.kaggle.com/whitepaper-prompt-engineering\",\"children\":\"Google - “更多信号，更少猜测”提示工程白皮书\"}]}],\" - 一份68页的Google白皮书，深入探讨了高级提示技术（用于API使用、思维链提示、使用温度/top-p设置等）。对于希望在基础之外精进提示工程的工程师来说，这是一份极佳的资源。\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"li\",
