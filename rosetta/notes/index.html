背景，阐述了19世纪末以来数学日益抽象化导致两学科分离的趋势，并以魏尔的规范不变理论为线索，讲述了量子力学引入虚数i后如何使规范理论获得物理意义，最终推动数学与物理在20世纪下半叶重新走向融合。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-anthropic-teams-use-claude-code\",\"href\":\"/rosetta/notes/date-suspects/how-anthropic-teams-use-claude-code\",\"category\":\"date-suspects\",\"title\":\"Anthropic 团队如何使用 Claude Code\",\"date\":\"2026-01-27\",\"excerpt\":\"本文介绍了 Anthropic 内部多个团队使用 Claude Code 的实际案例，涵盖数据基础设施、产品开发、安全工程等部门。各团队通过 Claude Code 实现了 Kubernetes 调试、快速原型设计、测试驱动开发、代码库探索等工作流的显著提效，同时总结了详细编写 Claude.md 文件、建立自给自足循环、培养任务分类直觉等最佳实践。\",\"coverImage\":\"$undefined\"},{\"slug\":\"pytorch-documentary-powering-ai-revolution\",\"href\":\"/rosetta/notes/date-suspects/pytorch-documentary-powering-ai-revolution\",\"category\":\"date-suspects\",\"title\":\"PyTorch官方纪录片 - 驱动AI革命的力量\",\"date\":\"2026-01-27\",\"excerpt\":\"本片回顾了PyTorch从诞生到成为AI领域核心框架的完整历程。从早期碎片化的研究工具生态，到Facebook AI Research内部孵化，再到击败TensorFlow成为研究者首选，PyTorch凭借对研究者的友好设计、活跃的社区支持以及与硬件和云平台的深度集成，最终驱动了ChatGPT和Stable Diffusion等里程碑式产品的诞生。PyTorch基金会的成立标志着其向开放治理模式的转型。\",\"coverImage\":\"$undefined\"},{\"slug\":\"sam-altman-on-productivity\",\"href\":\"/rosetta/notes/to-modify/sam-altman-on-productivity\",\"category\":\"to-modify\",\"title\":\"Sam Altman 谈生产力\",\"date\":\"2026-01-27\",\"excerpt\":\"Sam Altman 分享了他关于生产力的核心理念与实践方法，涵盖工作方向选择、优先级管理、睡眠与锻炼、营养习惯以及工作环境优化等方面。他强调方向比速度更重要，主张通过清单管理目标、保持身体健康、减少无效会议，并以年为单位优化时间分配，从而实现长期复利式的职业成长。\",\"coverImage\":\"$undefined\"},{\"slug\":\"role-of-analytical-mechanics-in-mathematical-development\",\"href\":\"/rosetta/notes/date-suspects/role-of-analytical-mechanics-in-mathematical-development\",\"category\":\"date-suspects\",\"title\":\"分析力学在数学发展中的作用\",\"date\":\"2026-01-27\",\"excerpt\":\"本文考察了分析力学在数学发展中扮演的双重角色。分析力学既是经典力学的理论体系，也是一门纯粹的数学科学。文章梳理了从Euler、Lagrange到Hamilton、Jacobi等人的工作，阐明分析力学如何推动常微分方程理论、变分法、一阶偏微分方程理论、黎曼几何与辛几何等数学分支的形成与发展，揭示了力学结构与数学理论之间的深刻联系。\",\"coverImage\":\"$undefined\"},{\"slug\":\"liu-zhenyun-laughing-and-thinking-about-life\",\"href\":\"/rosetta/notes/to-modify/liu-zhenyun-laughing-and-thinking-about-life\",\"category\":\"to-modify\",\"title\":\"刘震云：笑着笑着思考人生 - 演讲实录原稿\",\"date\":\"2026-01-27\",\"excerpt\":\"刘震云在星空演讲中围绕一句顶一万句的主题，通过与舅舅、外祖母的三段人生对话，阐述了关键时刻一句话改变命运的力量。他进一步以潘金莲故事和朋友爱国的经历为例，揭示日常话语背后蕴含的深远影响，并指出文学与电影能比现实更深入地探讨人性的复杂与幽微。\",\"coverImage\":\"$undefined\"},{\"slug\":\"saas-vibe-coding-guide-10k-monthly-revenue\",\"href\":\"/rosetta/notes/date-suspects/saas-vibe-coding-guide-10k-monthly-revenue\",\"category\":\"date-suspects\",\"title\":\"完整的月收入1万美元 SaaS Vibe 编程指南\",\"date\":\"2026-01-27\",\"excerpt\":\"本文介绍了如何利用 Vibe 编程工具构建月收入1万美元的 SaaS 产品。作者对比了 Bolt、Lovable、Replit 等工具后推荐 Emergent 平台，并分享了 Token 成本优化技巧、四类核心文档的提示词模板以及 AI Twitter 推文串生成器的完整构建思路，涵盖前端 React + Tailwind CSS 与后端 FastAPI 的技术选型。\",\"coverImage\":\"$undefined\"},{\"slug\":\"kobe-shaq-dynasty-rivalry-legacy\",\"href\":\"/rosetta/notes/to-modify/kobe-shaq-dynasty-rivalry-legacy\",\"category\":\"to-modify\",\"title\":\"巨人间的碰撞——科比·布莱恩特与沙奎尔·奥尼尔动荡王朝与复杂遗产的内幕\",\"date\":\"2026-01-27\",\"excerpt\":\"科比与奥尼尔是NBA历史上最具统治力也最具争议的二人组合。他们在湖人联手缔造三连冠王朝，却也经历了公开的不和与激烈竞争。从早年的惺惺相惜到矛盾激化后分道扬镳，再到各自证明自身价值后最终达成和解与尊重，这段交织着辉煌与纷争的传奇历程，折射出两位性格截然不同的巨星对胜利的极致追求。\",\"coverImage\":\"$undefined\"},{\"slug\":\"google-whitepaper-ai-agents\",\"href\":\"/rosetta/notes/date-suspects/google-whitepaper-ai-agents\",\"category\":\"date-suspects\",\"title\":\"智能体（Agent）——Google白皮书解读\",\"date\":\"2026-01-27\",\"excerpt\":\"本文为Google发布的智能体白皮书，系统阐述了生成式AI智能体的核心概念与架构。智能体由模型、工具和编排层三大组件构成，能够自主观察环境、调用外部工具并采取行动以实现目标。文章详细介绍了ReAct、思维链、思维树等推理框架，并对比了智能体与传统模型的本质差异，为构建生产级智能体应用提供了完整的技术参考。\",\"coverImage\":\"$undefined\"},{\"slug\":\"the-gentle-singularity\",\"href\":\"/rosetta/notes/date-suspects/the-gentle-singularity\",\"category\":\"date-suspects\",\"title\":\"温和的奇点\",\"date\":\"2026-01-27\",\"excerpt\":\"Sam Altman认为人类正在迈向数字超级智能的门槛，AI将通过加速科学进步和提升生产力深刻改变世界。智能与能源的极大丰裕将重塑社会，但奇点的到来并非剧变，而是一条平滑的指数曲线——向前看总显陡峭，回头看则趋于平坦。关键在于解决对齐问题并确保超级智能的广泛可及。\",\"coverImage\":\"$undefined\"},{\"slug\":\"jane-goodall-hope-national-geographic\",\"href\":\"/rosetta/notes/to-modify/jane-goodall-hope-national-geographic\",\"category\":\"to-modify\",\"title\":\"珍·古道尔：从黑猩猩研究者到全球环保信使\",\"date\":\"2026-01-27\",\"excerpt\":\"本片记录了珍·古道尔博士从坦桑尼亚贡贝国家公园的黑猩猩研究者转变为全球环保活动家的非凡历程。1986年的一次会议成为她人生的转折点,此后她将毕生精力投入到野生动物保护与青年赋权事业中,创立根与芽项目,倡导每个人通过日常选择为地球带来改变,传递希望与万物相连的理念。\",\"coverImage\":\"$undefined\"},{\"slug\":\"peter-thiel-stagnation-thesis-and-cultural-concerns\",\"href\":\"/rosetta/notes/to-modify/peter-thiel-stagnation-thesis-and-cultural-concerns\",\"category\":\"to-modify\",\"title\":\"访谈简报：我们为何停止前进——彼得·蒂尔的停滞论与深层忧思\",\"date\":\"2026-01-27\",\"excerpt\":\"彼得·蒂尔在与乔丹·彼得森的对话中指出，自上世纪70年代以来，物质世界的进步已大幅放缓，唯有数字领域持续活跃。他从核武器恐惧、文化内向化、过度监管等角度分析停滞成因，并借助吉拉尔的模仿理论揭示现代社会深陷横向竞争与末日焦虑的困境，追问人类文明是否仍在真正前行。\",\"coverImage\":\"$undefined\"},{\"slug\":\"2025-tour-de-france-preview-stage-overview\",\"href\":\"/rosetta/notes/to-modify/2025-tour-de-france-preview-stage-overview\",\"category\":\"to-modify\",\"title\":\"2025年环法自行车赛前瞻 + 赛段概览\",\"date\":\"2026-01-26\",\"excerpt\":\"本文全面介绍2025年环法自行车赛的赛道与赛段安排。全程约3338.8公里，累计爬升约51000米，共21个赛段。赛事7月5日从里尔出发，最终重返香榭丽舍大街。文章按三周分别解析了冲刺赛段、山地赛段和计时赛的看点，并提供了赛段类型图示与观赛指数等实用信息。\",\"coverImage\":\"$undefined\"},{\"slug\":\"windsurf-google-cognition-ai-deal\",\"href\":\"/rosetta/notes/to-modify/windsurf-google-cognition-ai-deal\",\"category\":\"to-modify\",\"title\":\"AI时代的奇特交易：Windsurf、谷歌与Cognition的三方谜局\",\"date\":\"2026-01-26\",\"excerpt\":\"围绕AI初创公司Windsurf展开的一桩三方交易引发业界关注。OpenAI因反垄断压力退出30亿美元收购后，谷歌以26亿美元抽取核心人才与IP，而Cognition则闪电般收购被掏空的剩余业务，凭借自身工程团队激活空壳价值。这场交易折射出AI时代人才争夺、监管博弈与资本运作的复杂生态。\",\"coverImage\":\"$undefined\"},{\"slug\":\"claude-code-ai-coding-agent-reshaping-development\",\"href\":\"/rosetta/notes/to-modify/claude-code-ai-coding-agent-reshaping-development\",\"category\":\"to-modify\",\"title\":\"Claude Code：重塑开发范式的 AI 编码代理\",\"date\":\"2026-01-26\",\"excerpt\":\"本文全面解析 Anthropic 推出的 Claude Code 终端 AI 编码代理，涵盖其代理性核心定位、深度工具链集成、智能记忆指令系统、多模型选择策略以及成本优化方案，展示了从代码补全到自主规划执行的范式跃迁，为开发者提供了高效人机协作的实践指南。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ilya-sutskever-unsupervised-learning-compression-theory\",\"href\":\"/rosetta/notes/date-suspects/ilya-sutskever-unsupervised-learning-compression-theory\",\"category\":\"date-suspects\",\"title\":\"Ilya Sutskever演讲 - 从压缩视角理解无监督学习的理论框架\",\"date\":\"2026-01-26\",\"excerpt\":\"Ilya Sutskever在本次演讲中探讨了无监督学习的理论基础，提出压缩是理解无监督学习的关键。他从监督学习的数学保证出发，引入Kolmogorov复杂性作为终极压缩器的概念，论证了通过联合压缩未标记数据与目标数据可以揭示共享结构，从而实现有效的无监督学习。演讲还结合iGPT实验验证了该理论，并讨论了线性表征涌现等开放问题。\",\"coverImage\":\"$undefined\"},{\"slug\":\"openai-practical-guide-to-building-agents\",\"href\":\"/rosetta/notes/date-suspects/openai-practical-guide-to-building-agents\",\"category\":\"date-suspects\",\"title\":\"OpenAI构建Agent的实用指南\",\"date\":\"2026-01-26\",\"excerpt\":\"本文是OpenAI发布的Agent构建实用指南，面向产品和工程团队，系统介绍了Agent的定义、适用场景、设计基础与编排模式。内容涵盖模型选择、工具定义、指令配置等核心组件，并提供了单Agent与多Agent系统的编排策略，帮助开发者从零开始构建安全、可预测且高效运行的智能Agent系统。\",\"coverImage\":\"$undefined\"},{\"slug\":\"what-is-amp-agentic-coding-tool\",\"href\":\"/rosetta/notes/to-modify/what-is-amp-agentic-coding-tool\",\"category\":\"to-modify\",\"title\":\"What is Amp\",\"date\":\"2026-01-26\",\"excerpt\":\"Amp 是由 Sourcegraph 开发的智能体编程工具，支持在 VS Code 及其兼容分支中运行，也提供命令行版本。它不限制 Token 用量，始终使用最佳模型，支持多人协作与线程共享。用户可通过 AGENT.md 文件配置项目信息，并借助图片上传、文件提及等功能高效完成编码任务。\",\"coverImage\":\"$undefined\"},{\"slug\":\"the-second-half-of-ai\",\"href\":\"/rosetta/notes/date-suspects/the-second-half-of-ai\",\"category\":\"date-suspects\",\"title\":\"下半场——人工智能从解决问题转向定义问题\",\"date\":\"2026-01-26\",\"excerpt\":\"本文提出人工智能正处于中场休息阶段。上半场的核心是开发新的训练方法和模型，而下半场的焦点将从解决问题转向定义问题，评估将变得比训练更重要。作者通过强化学习的视角，阐述了语言预训练、规模化和推理行动三大要素如何构成一套通用配方，使得RL终于具备了泛化能力，从而彻底改变了AI研究的游戏规则。\",\"coverImage\":\"$undefined\"},{\"slug\":\"experts-always-have-slack\",\"href\":\"/rosetta/notes/date-suspects/experts-always-have-slack\",\"category\":\"date-suspects\",\"title\":\"专家们总是游刃有余\",\"date\":\"2026-01-26\",\"excerpt\":\"本文通过迷宫逃脱的生动比喻，深入剖析专家与新手之间的效率鸿沟。专家凭借经验和直觉能高效解决问题，而新手往往在自己制造的困境中越陷越深。文章探讨了新手看不到决策点、专家难以解释直觉、非正式交流对培训的重要性等核心议题，并为新手提供了切实的成长建议。\",\"coverImage\":\"$undefined\"},{\"slug\":\"experts-have-it-easy\",\"href\":\"/rosetta/notes/date-suspects/experts-have-it-easy\",\"category\":\"date-suspects\",\"title\":\"专家们游刃有余\",\"date\":\"2026-01-26\",\"excerpt\":\"本文通过迷宫比喻深入探讨了专家与新手之间的效率鸿沟。新手往往在自己制造的问题中越陷越深，而专家凭借经验和直觉能够避开陷阱、直击核心。文章指出新手最大的困境不在于能力不足，而在于无法识别关键决策点，也无法区分好建议与坏建议。作者强调找到有同理心的专家进行非正式交流对新手成长至关重要，同时鼓励新手主动探索小众领域以快速建立专长。\",\"coverImage\":\"$undefined\"},{\"slug\":\"why-i-am-not-going-to-use-ai-tools\",\"href\":\"/rosetta/notes/date-suspects/why-i-am-not-going-to-use-ai-tools\",\"category\":\"date-suspects\",\"title\":\"为什么我不打算使用AI工具\",\"date\":\"2026-01-26\",\"excerpt\":\"本文仿写温德尔·贝里1987年经典文章《我为什么不打算买电脑》，将其对电脑技术的质疑迁移至当下AI工具语境。作者从能源消耗与数据伦理、企业宣传的虚妄、思考主体性的丧失以及拒绝自我麻痹四个层面阐述了不使用AI工具的理由，并提出九条引入新技术的评判标准，强调技术不应取代深度思考、人际真实互动与个人判断力。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ten-principles-of-ai-programming\",\"href\":\"/rosetta/notes/date-suspects/ten-principles-of-ai-programming\",\"category\":\"date-suspects\",\"title\":\"使用 AI 编程的十大基本原则\",\"date\":\"2026-01-26\",\"excerpt\":\"本文基于 Anthropic 团队使用 Claude Code 的实践经验，总结了十大 AI 编程基本原则，涵盖上下文管理、迭代协作、检查点设置、任务分类、子代理拆分、自动化重复工作、技能拓展、安全合规、团队文化和生态系统构建等方面，为开发者提供了系统化的 AI 辅助编程方法论。\",\"coverImage\":\"$undefined\"},{\"slug\":\"google-agent2agent-a2a-protocol\",\"href\":\"/rosetta/notes/date-suspects/google-agent2agent-a2a-protocol\",\"category\":\"date-suspects\",\"title\":\"宣布推出 Agent2Agent (A2A) 协议\",\"date\":\"2026-01-26\",\"excerpt\":\"谷歌联合超过50家技术合作伙伴推出 Agent2Agent（A2A）开放协议，旨在让不同供应商和框架构建的 AI 智能体实现跨平台通信与协作。该协议基于 HTTP、SSE、JSON-RPC 等现有标准，支持能力发现、任务管理、多模态交互和长时间运行任务，为企业级多智能体生态系统提供标准化的互操作方案。\",\"coverImage\":\"$undefined\"},{\"slug\":\"jane-goodall-the-hope-legacy-and-conservation\",\"href\":\"/rosetta/notes/to-modify/jane-goodall-the-hope-legacy-and-conservation\",\"category\":\"to-modify\",\"title\":\"珍·古道尔——从黑猩猩研究者到全球环保使者\",\"date\":\"2026-01-26\",\"excerpt\":\"本片讲述了珍·古道尔的非凡人生历程。她早年在非洲丛林中证明黑猩猩能够制造和使用工具，颠覆了人类对自身的传统定义。此后她从科学家转型为全球环保活动家，创立根与芽青年项目，倡导将人类福祉与野生动物保护相结合，以希望和集体行动的信念激励全世界的年轻人为地球的未来采取行动。\",\"coverImage\":\"$undefined\"},{\"slug\":\"yang-zhenning-forty-years-of-learning-and-teaching\",\"href\":\"/rosetta/notes/date-suspects/yang-zhenning-forty-years-of-learning-and-teaching\",\"category\":\"date-suspects\",\"title\":\"读书教学四十年\",\"date\":\"2026-01-26\",\"excerpt\":\"杨振宁回顾自己从合肥启蒙、清华园童年、西南联大求学到芝加哥大学深造的四十年读书与教学历程，讲述吴大猷和王竹溪两位恩师对其学术方向的引导，以及归纳法与推演法两种研究方法对科学研究的深远影响，展现了一代物理学家的成长轨迹与治学心得。\",\"coverImage\":\"$undefined\"},{\"slug\":\"lottery-ticket-hypothesis-why-large-neural-networks-work\",\"href\":\"/rosetta/notes/missing-source-url/lottery-ticket-hypothesis-why-large-neural-networks-work\",\"category\":\"missing-source-url\",\"title\":\"AI研究人员如何意外发现他们对学习的固有认知是错误的\",\"date\":\"2025-08-18\",\"excerpt\":\"传统机器学习理论认为过大的模型必然导致过拟合，但研究人员发现大规模神经网络反而表现更优，出现了双重下降现象。彩票假说为此提供了解释——大型网络的成功并非源于学习复杂解决方案，而是因为拥有更多随机初始化的子网络，从而大幅提升找到简单优雅解决方案的概率。这一发现调和了经典理论与实践之间的矛盾，也重新定义了我们对智能本身的理解。\",\"coverImage\":\"$undefined\"},{\"slug\":\"nvidia-gtc-2025-humanoid-robots-new-era\",\"href\":\"/rosetta/notes/to-modify/nvidia-gtc-2025-humanoid-robots-new-era\",\"category\":\"to-modify\",\"title\":\"通用人形机器人新纪元 - 从愿景到现实的探索\",\"date\":\"2025-08-12\",\"excerpt\":\"本文基于NVIDIA GTC 2025大会要点，系统梳理了通用人形机器人从模型架构、数据策略、仿真训练到硬件演进的全链条发展现状。文章介绍了数据金字塔策略、跨实体泛化技术、Groot N1开源模型等前沿进展，并展望了未来2至20年机器人产业的落地路径与社会变革潜力。\",\"coverImage\":\"$undefined\"},{\"slug\":\"windsurf-google-cognition-ai-deal-breakdown\",\"href\":\"/rosetta/notes/to-modify/windsurf-google-cognition-ai-deal-breakdown\",\"category\":\"to-modify\",\"title\":\"AI时代的奇特交易——Windsurf、谷歌与Cognition的三方谜局\",\"date\":\"2025-07-17\",\"excerpt\":\"本文基于20VC访谈整理，深入剖析围绕AI初创公司Windsurf的三方交易。Windsurf因营收骤降被迫出售，谷歌以26亿美元许可费形式获取其核心人才与IP并规避反垄断审查，而Cognition则以约4亿美元闪电收购被剥离的业务空壳，凭借自身工程团队实现价值重塑，完成了一场被誉为年度最精彩的资本运作。\",\"coverImage\":\"$undefined\"},{\"slug\":\"dhh-future-of-programming-ai-ruby-on-rails-lex-fridman-podcast-474\",\"href\":\"/rosetta/notes/to-modify/dhh-future-of-programming-ai-ruby-on-rails-lex-fridman-podcast-474\",\"category\":\"to-modify\",\"title\":\"DHH访谈：编程的未来、AI、Ruby on Rails、生产力与育儿（Lex Fridman播客第474期）\",\"date\":\"2025-07-12\",\"excerpt\":\"本期Lex Fridman播客邀请Ruby on Rails创始人DHH进行深度对话，话题涵盖编程语言设计哲学、JavaScript生态、动态类型与元编程、AI与vibe coding的未来趋势，以及小团队管理、云服务退出实践、开源社区治理等议题，同时涉及赛车、育儿与人生幸福观的探讨。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-native-software-engineer\",\"href\":\"/rosetta/notes/missing-source-url/ai-native-software-engineer\",\"category\":\"missing-source-url\",\"title\":\"AI原生软件工程师\",\"date\":\"2025-07-02\",\"excerpt\":\"本文定义了AI原生软件工程师的概念，即将AI深度融入日常开发工作流程、视其为协作伙伴而非威胁的工程师。文章阐述了核心思维转变——从恐惧AI取代转向主动利用AI放大自身能力，提出信任但验证的协作原则，并给出了从工具准备到逐步建立AI熟练度的实践路径，强调工程师仍需对代码质量承担全部责任。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-we-built-multi-agent-research-system\",\"href\":\"/rosetta/notes/to-modify/how-we-built-multi-agent-research-system\",\"category\":\"to-modify\",\"title\":\"Anthropic 如何构建多智能体研究系统\",\"date\":\"2025-06-13\",\"excerpt\":\"Anthropic 分享了其多智能体研究系统从原型到产品的构建经验。该系统采用编排者-工作者模式，由主智能体协调多个并行子智能体完成复杂研究任务。文章详述了系统架构设计、工具选择、提示工程原则以及评估方法，并指出多智能体系统在广度优先的并行研究任务中性能比单智能体高出90.2%，但令牌消耗也达到普通聊天的15倍。\",\"coverImage\":\"$undefined\"},{\"slug\":\"be-a-loser-if-you-want-to-be-happy\",\"href\":\"/rosetta/notes/to-modify/be-a-loser-if-you-want-to-be-happy\",\"category\":\"to-modify\",\"title\":\"想要幸福，就做一个失败者\",\"date\":\"2025-06-13\",\"excerpt\":\"文章挑战了传统的成功与幸福观念，指出西方追求物质成就和东方纯粹内观灵修都存在局限。作者主张将内在存在与外在行动整合为一种成为的状态，并通过现实的四个维度——主观个体、客观个体、主观集体和客观集体——重新定义成功，从而超越浅层的自我提升话语，走向更深层的生命理解。\",\"coverImage\":\"$undefined\"},{\"slug\":\"lessons-learned-after-8-years-of-python\",\"href\":\"/rosetta/notes/missing-source-url/lessons-learned-after-8-years-of-python\",\"category\":\"missing-source-url\",\"title\":\"我用Python八年后学到的东西\",\"date\":\"2025-05-10\",\"excerpt\":\"作者基于八年Python开发经验，结合Python之禅的核心原则，系统阐述了一套实用的编程最佳实践。文章涵盖代码命名规范、简洁设计、避免过度工程、提升可读性、正确处理异常以及善用命名空间等关键要点，帮助开发者写出更优雅、更健壮的Pythonic代码。\",\"coverImage\":\"$undefined\"},{\"slug\":\"good-writing\",\"href\":\"/rosetta/notes/missing-source-url/good-writing\",\"category\":\"missing-source-url\",\"title\":\"好文笔\",\"date\":\"2025-05-01\",\"excerpt\":\"Paul Graham 探讨了好文笔的两层含义——读来顺畅与思想正确——之间的深层联系。他认为这两者并非无关，而是相互促进的。努力让文字听起来顺畅，既能在不自觉中修正思想错误，也能使错误更容易被发现。好文笔的节奏必须与思想的自然节奏相匹配，因此打磨语言本身就是理顺思想的过程。\",\"coverImage\":\"$undefined\"},{\"slug\":\"lip-bu-tan-intel-vision-2025-keynote\",\"href\":\"/rosetta/notes/missing-source-url/lip-bu-tan-intel-vision-2025-keynote\",\"category\":\"missing-source-url\",\"title\":\"陈立武在Intel Vision 2025上的开幕主题演讲\",\"date\":\"2025-05-01\",\"excerpt\":\"英特尔新任CEO陈立武在Vision 2025活动上发表履新后首次公开演讲。他坦承英特尔近年在创新上的落后，提出以少承诺多兑现为原则重建客户信任，并围绕回归工程为本的文化、借鉴创业精神、拥抱AI技术变革三大方向阐述了公司未来战略，涵盖客户端计算、数据中心、AI加速器及代工服务等关键业务的发展路径与优先事项。\",\"coverImage\":\"$undefined\"},{\"slug\":\"coding-as-craft-going-back-to-the-old-gym\",\"href\":\"/rosetta/notes/to-modify/coding-as-craft-going-back-to-the-old-gym\",\"category\":\"to-modify\",\"title\":\"编码作为手艺——回归旧式健身房\",\"date\":\"2025-04-22\",\"excerpt\":\"本文以洛奇·巴尔博亚的旧式健身房为隐喻，探讨在AI日益渗透编程工作的时代，开发者应如何保持对编码手艺的掌控。作者主张AI适合处理样板代码和文档总结等机械性工作，但编程的核心思考、架构设计和认知挣扎不应被外包，因为正是这些挣扎塑造了工程师的成长与能力。文章倡导有意识地与AI协作，而非不假思索地依赖AI。\",\"coverImage\":\"$undefined\"},{\"slug\":\"claude-code-best-practices-for-agentic-coding\",\"href\":\"/rosetta/notes/to-modify/claude-code-best-practices-for-agentic-coding\",\"category\":\"to-modify\",\"title\":\"Claude Code 智能编程最佳实践指南\",\"date\":\"2025-04-18\",\"excerpt\":\"本文介绍了 Anthropic 推出的命令行智能编程工具 Claude Code 的使用技巧与最佳实践。内容涵盖如何通过 CLAUDE.md 文件自定义开发环境、优化上下文配置、提升编码效率等方面，适用于不同代码库、编程语言和开发环境，帮助开发者更好地将 AI 融入日常编程工作流。\",\"coverImage\":\"$undefined\"},{\"slug\":\"new-proof-settles-decades-old-bet-about-connected-networks\",\"href\":\"/rosetta/notes/missing-source-url/new-proof-settles-decades-old-bet-about-connected-networks\",\"category\":\"missing-source-url\",\"title\":\"新证明解决了关于互连网络数十年来的争论\",\"date\":\"2025-04-18\",\"excerpt\":\"20世纪80年代末，数学家Peter Sarnak和Noga Alon就最优扩展图（拉马努金图）在所有正则图中的比例打了一个赌。Sarnak认为拉马努金图极为稀少，Alon则认为几乎所有正则图都是拉马努金图。经过数十年的研究，哈佛大学的Horng-Tzer Yau及其合作者通过将随机矩阵普适性猜想推广到正则图的邻接矩阵，最终证明双方都错了。\",\"coverImage\":\"$undefined\"},{\"slug\":\"krugman-tankus-interview-financial-crisis-tariffs\",\"href\":\"/rosetta/notes/missing-source-url/krugman-tankus-interview-financial-crisis-tariffs\",\"category\":\"missing-source-url\",\"title\":\"保罗·克鲁格曼对谈内森·坦库斯（第二部分）——流动性、波动性和市场疯狂\",\"date\":\"2025-04-16\",\"excerpt\":\"保罗·克鲁格曼与内森·坦库斯围绕2025年4月特朗普关税引发的金融市场动荡展开深入对话。坦库斯指出这场危机的独特之处在于它直接源自一个人反复无常的决策，同时与支付系统的根本安全性、美元走弱、利率异常飙升等长期金融监管问题相互交织。市场并非理性的信息处理器，而更像是传统智慧处理器，在极端政策不确定性下剧烈震荡。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ai-as-normal-technology\",\"href\":\"/rosetta/notes/missing-source-url/ai-as-normal-technology\",\"category\":\"missing-source-url\",\"title\":\"作为普通技术的人工智能\",\"date\":\"2025-04-15\",\"excerpt\":\"本文提出将人工智能视为一种普通技术而非超级智能实体的分析框架。作者从技术扩散速度、人机协作分工、风险分类与政策韧性四个维度展开论述，指出AI的经济社会变革将以数十年为尺度渐进发生，主张拒绝技术决定论，通过韧性导向的政策应对不确定性，而非诉诸激进干预或末日叙事。\",\"coverImage\":\"$undefined\"},{\"slug\":\"harvard-president-letter-promise-of-american-higher-education\",\"href\":\"/rosetta/notes/missing-source-url/harvard-president-letter-promise-of-american-higher-education\",\"category\":\"missing-source-url\",\"title\":\"哈佛校长公开信——美国高等教育的承诺\",\"date\":\"2025-04-14\",\"excerpt\":\"哈佛大学校长艾伦·加伯发表公开信，回应联邦政府以反犹主义为由威胁中断科研合作与资助的举措。哈佛明确拒绝政府提出的涉及治理改革、招生聘用审查及观点审计等一系列要求，认为其超越法定权限并侵犯第一修正案权利。公开信重申哈佛将捍卫学术独立与自由，同时承诺自主推进反犹主义治理与校园多元化建设。\",\"coverImage\":\"$undefined\"},{\"slug\":\"google-cloud-next-2025-ai-infrastructure-and-agents\",\"href\":\"/rosetta/notes/to-modify/google-cloud-next-2025-ai-infrastructure-and-agents\",\"category\":\"to-modify\",\"title\":\"Google Cloud Next 2025 AI发布会全景解读\",\"date\":\"2025-04-09\",\"excerpt\":\"谷歌云在2025年度大会上发布了全栈AI创新成果，涵盖第七代TPU Ironwood芯片、Gemini 2.5系列模型、AI Hypercomputer超算架构、Agent Development Kit智能体开发框架以及Agentspace企业智能体平台，并宣布年度资本支出约750亿美元，全面推进基础设施、模型能力与行业应用落地。\",\"coverImage\":\"$undefined\"},{\"slug\":\"shopify-ai-as-baseline-expectation\",\"href\":\"/rosetta/notes/missing-source-url/shopify-ai-as-baseline-expectation\",\"category\":\"missing-source-url\",\"title\":\"主动自觉地使用AI现已成为Shopify的基本要求\",\"date\":\"2025-04-07\",\"excerpt\":\"Shopify CEO Tobi Lutke发布内部备忘录，宣布主动使用AI已成为公司对所有员工的基本要求。备忘录指出AI是倍增器，能让优秀员工产出百倍成果，并将AI使用纳入绩效评估体系。团队在申请增加人员前须先证明无法通过AI完成目标，公司致力于在AI普及时代重新定义创业形态。\",\"coverImage\":\"$undefined\"},{\"slug\":\"the-insanity-of-being-a-software-engineer\",\"href\":\"/rosetta/notes/missing-source-url/the-insanity-of-being-a-software-engineer\",\"category\":\"missing-source-url\",\"title\":\"软件工程师的疯狂挑战\",\"date\":\"2025-04-06\",\"excerpt\":\"本文以略带讽刺的口吻揭示了现代软件工程师面临的荒诞处境。从掌握多种编程语言、框架到被迫成为全栈工程师，再到学习Docker、AWS和Terraform等运维技能，工程师的职责不断膨胀。作者感叹软件行业缺乏专业分工，一个人被期望承担从前端到后端、从开发到运维甚至管理的所有角色，并以建筑行业的分工模式作为对比进行反思。\",\"coverImage\":\"$undefined\"},{\"slug\":\"sam-altman-fired-openai-insider-story\",\"href\":\"/rosetta/notes/missing-source-url/sam-altman-fired-openai-insider-story\",\"category\":\"missing-source-url\",\"title\":\"山姆·奥特曼被OpenAI解雇的真实内幕\",\"date\":\"2025-03-28\",\"excerpt\":\"2023年11月，OpenAI董事会秘密投票解雇了CEO山姆·奥特曼。本文基于数十位亲历者的采访，揭示了奥特曼被罢免的深层原因——包括反复误导董事会、隐瞒创业基金所有权、绕过安全审查流程，以及挑拨高管内斗等信任破裂行为，还原了这场科技史上最戏剧性权力更迭的完整经过。\",\"coverImage\":\"$undefined\"},{\"slug\":\"beyond-70-maximizing-human-30-in-ai-assisted-coding\",\"href\":\"/rosetta/notes/to-modify/beyond-70-maximizing-human-30-in-ai-assisted-coding\",\"category\":\"to-modify\",\"title\":\"超越70%：最大化AI辅助编码中人类贡献的30%\",\"date\":\"2025-03-14\",\"excerpt\":\"本文探讨了AI编码助手能够完成约70%的常规编码工作，但剩余30%的关键部分仍依赖人类技能。文章深入分析了AI在处理边缘情况、系统架构和代码正确性方面的局限，并为高级和初级开发者提供了在AI时代应重点培养的持久工程技能的实用指南。\",\"coverImage\":\"$undefined\"},{\"slug\":\"future-proofing-software-engineering-career\",\"href\":\"/rosetta/notes/missing-source-url/future-proofing-software-engineering-career\",\"category\":\"missing-source-url\",\"title\":\"为你的软件工程职业生涯做好未来规划\",\"date\":\"2024-12-24\",\"excerpt\":\"本文以务实视角分析了大型语言模型对软件工程职业的实际影响。作者指出AI工具正在增强而非取代工程师，并针对初级、中级工程师分别提出适应策略。文章给出六项未来保障建议，包括深化计算机基础、发展系统设计能力、建立领域专长、精通开发运维、提升沟通技巧以及积极使用AI工具，同时强调设计思维和产品意识的重要性。\",\"coverImage\":\"$undefined\"},{\"slug\":\"notes-on-an-observation-on-generalization\",\"href\":\"/rosetta/notes/missing-source-url/notes-on-an-observation-on-generalization\",\"category\":\"missing-source-url\",\"title\":\"关于《对泛化的一个观察》的笔记\",\"date\":\"2023-10-01\",\"excerpt\":\"本文是对 Ilya Sutskever 在2023年西蒙斯研究所研讨会演讲的详细笔记。演讲从压缩理论的视角解释无监督学习为何有效，核心论点是预测与压缩之间存在一一对应关系。通过引入柯尔莫戈洛夫复杂度、条件复杂度和联合压缩等概念，论证了好的无监督学习算法本质上是好的压缩器，并最终将联合压缩与最大似然估计联系起来。\",\"coverImage\":\"$undefined\"},{\"slug\":\"superlinear-returns-paul-graham\",\"href\":\"/rosetta/notes/missing-source-url/superlinear-returns-paul-graham\",\"category\":\"missing-source-url\",\"title\":\"超线性回报\",\"date\":\"2023-10-01\",\"excerpt\":\"保罗·格雷厄姆探讨了表现与回报之间的超线性关系，指出其两大根本来源是指数级增长与阈值效应。文章分析了在商业、学术、名望等领域中富者愈富的现象，并为有抱负的人提供了利用超线性回报的实用建议——选择具有复利效应的工作、持续学习、追随好奇心，以及在组织重要性下降的时代抓住个人崛起的机遇。\",\"coverImage\":\"$undefined\"},{\"slug\":\"james-simons-making-money-with-math\",\"href\":\"/rosetta/notes/missing-source-url/james-simons-making-money-with-math\",\"category\":\"missing-source-url\",\"title\":\"大师系列 - 詹姆斯·西蒙斯：用数学赚钱的秘诀与慈善之路\",\"date\":\"2022-09-01\",\"excerpt\":\"本期播客聚焦世界级数学家詹姆斯·西蒙斯，探讨他如何将深厚的数学背景转化为量化投资领域的传奇成功。内容涵盖文艺复兴科技公司的核心策略——顶尖人才、卓越基础设施与极度合作，以及他通过西蒙斯基金会和美国数学等机构回馈社会、推动基础科学与教育的慈善之路。\",\"coverImage\":\"$undefined\"},{\"slug\":\"how-close-are-computers-to-automating-mathematical-reasoning\",\"href\":\"/rosetta/notes/to-modify/how-close-are-computers-to-automating-mathematical-reasoning\",\"category\":\"to-modify\",\"title\":\"计算机距离自动化数学推理还有多远\",\"date\":\"2020-08-27\",\"excerpt\":\"本文探讨了计算机在自动化数学推理方面的进展与局限。文章介绍了自动定理证明器和交互式定理证明器两大类工具，回顾了开普勒猜想、四色定理等由计算机辅助完成的著名证明，并讨论了数学家对这些工具的复杂态度。研究者正尝试将机器学习与传统证明系统结合，以实现更接近人类的演绎推理能力。\",\"coverImage\":\"$undefined\"},{\"slug\":\"can-zuckerberg-fix-facebook-before-it-breaks-democracy\",\"href\":\"/rosetta/notes/to-modify/can-zuckerberg-fix-facebook-before-it-breaks-democracy\",\"category\":\"to-modify\",\"title\":\"扎克伯格能在Facebook破坏民主之前修复它吗\",\"date\":\"2018-09-10\",\"excerpt\":\"本文是《纽约客》对Facebook创始人马克·扎克伯格的深度特写。在经历了两年持续不断的争议之后，记者走进扎克伯格位于帕洛阿尔托的家中，试图探究这位全球最知名的科技企业家如何面对Facebook对民主制度造成的威胁，以及他能否真正修复这个拥有数十亿用户的社交平台所带来的深层问题。\",\"coverImage\":\"$undefined\"},{\"slug\":\"phd-survival-guide-andrej-karpathy\",\"href\":\"/rosetta/notes/missing-source-url/phd-survival-guide-andrej-karpathy\",\"category\":\"missing-source-url\",\"title\":\"博士生涯生存指南\",\"date\":\"2016-09-07\",\"excerpt\":\"Andrej Karpathy 在博士生涯结束之际撰写的回顾性指南，涵盖是否应该读博的考量因素、如何选择学校与导师、研究课题的选择与迭代、论文写作与代码发布的技巧、学术报告与会议参与策略，以及以诚信为本的核心原则。文章结合个人经历与实用建议，为计算机科学领域的博士生提供了系统性的生存参考。\",\"coverImage\":\"$undefined\"},{\"slug\":\"rise-of-partisanship-and-super-cooperators-in-us-house\",\"href\":\"/rosetta/notes/missing-source-url/rise-of-partisanship-and-super-cooperators-in-us-house\",\"category\":\"missing-source-url\",\"title\":\"美国众议院党派倾向和超级合作者的兴起\",\"date\":\"2015-04-21\",\"excerpt\":\"本文通过构建包含超过500万对议员的网络，量化了1949年至2012年间美国众议院民主党与共和党成员之间的合作水平。研究发现美国国会的党派倾向在过去60多年里呈指数级增长，且没有减弱迹象。然而仍有一群议员持续进行跨党派合作，被称为超级合作者。研究采用网络方法替代传统线性指数，揭示了个体议员间意识形态关系的演变趋势。\",\"coverImage\":\"$undefined\"},{\"slug\":\"peter-thiel-tech-freedom-and-limits-of-progress\",\"href\":\"/rosetta/notes/to-modify/peter-thiel-tech-freedom-and-limits-of-progress\",\"category\":\"to-modify\",\"title\":\"蒂尔眼中的未来：科技、自由与进步的局限\",\"date\":\"2011-11-28\",\"excerpt\":\"本文基于《纽约客》深度报道，梳理硅谷亿万富翁彼得·蒂尔的思想世界。他认为科技进步自1970年代起已陷入停滞，主张通过激进的技术创新突破人类生物极限与政治束缚，追求无死亡、无税收的乌托邦愿景，同时对高等教育、民主制度和互联网经济提出尖锐批判。\",\"coverImage\":\"$undefined\"},{\"slug\":\"three-golden-rules-for-successful-scientific-research\",\"href\":\"/rosetta/notes/missing-source-url/three-golden-rules-for-successful-scientific-research\",\"category\":\"missing-source-url\",\"title\":\"科学研究成功的三大黄金法则\",\"date\":\"2003-06-19\",\"excerpt\":\"本文由计算机科学先驱Dijkstra撰写，提出科研成功的三条黄金法则。第一条要求研究者始终在能力边界上工作，追求最高质量标准；第二条主张当社会意义与科学严谨性冲突时，应优先保证严谨性；第三条建议不要去解决别人同样能做好的问题，确保自身贡献的独特性。这三条规则务实而冷峻，揭示了科学世界残酷无情的本质。\",\"coverImage\":\"$undefined\"},{\"slug\":\"ironies-of-automation\",\"href\":\"/rosetta/notes/missing-source-url/ironies-of-automation\",\"category\":\"missing-source-url\",\"title\":\"自动化的讽刺\",\"date\":\"1983-01-01\",\"excerpt\":\"本文探讨了工业过程自动化中一系列讽刺性悖论——自动化程度越高，对操作人员的依赖反而越关键。自动化削弱了操作人员的手动技能和认知能力，却在异常情况下要求他们具备更高水平的判断与干预能力。文章分析了监控失效、技能退化、工作记忆不足等问题，并讨论了人机协作的可能解决途径。\",\"coverImage\":\"$undefined\"},{\"slug\":\"more-is-different\",\"href\":\"/rosetta/notes/to-modify/more-is-different\",\"category\":\"to-modify\",\"title\":\"多则不同\",\"date\":\"1972-08-04T00:00:00.000Z\",\"excerpt\":\"$undefined\",\"coverImage\":\"$undefined\"}],\"heatmapDateCounts\":\"$undefined\",\"pagination\":{\"enabled\":false,\"pageSize\":20,\"currentPage\":1,\"totalPages\":3,\"baseHref\":\"/rosetta/notes\"},\"section\":\"rosetta\",\"currentHref\":\"/rosetta/notes\",\"sidebar\":{\"title\":\"Rosetta.\",\"href\":\"/rosetta\",\"items\":[{\"type\":\"collection\",\"title\":\"待整理与存档\",\"href\":\"/rosetta/notes\",\"pathSegments\":\"$b:props:children:props:config:pathSegments\",\"children\":[{\"type\":\"collection\",\"title\":\"日期存疑\",\"href\":\"/rosetta/notes/date-suspects\",\"pathSegments\":[\"notes\",\"date-suspects\"],\"children\":[{\"type\":\"entry\",\"title\":\"20世纪数学与物理的分与合\",\"href\":\"/rosetta/notes/date-suspects/20th-century-mathematics-physics-divergence-and-convergence\",\"pathSegments\":[\"notes\",\"date-suspects\",\"20th-century-mathematics-physics-divergence-and-convergence\"]},{\"type\":\"entry\",\"title\":\"Anthropic 团队如何使用 Claude Code\",\"href\":\"/rosetta/notes/date-suspects/how-anthropic-teams-use-claude-code\",\"pathSegments\":[\"notes\",\"date-suspects\",\"how-anthropic-teams-use-claude-code\"]},{\"type\":\"entry\",\"title\":\"PyTorch官方纪录片 - 驱动AI革命的力量\",\"href\":\"/rosetta/notes/date-suspects/pytorch-documentary-powering-ai-revolution\",\"pathSegments\":[\"notes\",\"date-suspects\",\"pytorch-documentary-powering-ai-revolution\"]},{\"type\":\"entry\",\"title\":\"分析力学在数学发展中的作用\",\"href\":\"/rosetta/notes/date-suspects/role-of-analytical-mechanics-in-mathematical-development\",\"pathSegments\":[\"notes\",\"date-suspects\",\"role-of-analytical-mechanics-in-mathematical-development\"]},{\"type\":\"entry\",\"title\":\"完整的月收入1万美元 SaaS Vibe 编程指南\",\"href\":\"/rosetta/notes/d
